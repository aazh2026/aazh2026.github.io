<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="100%">
  <defs>
    <marker id="arr9" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#D97757"/>
    </marker>
    <filter id="shadow9" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#D1CFC5" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="760" height="380" fill="#FAF9F5" rx="8"/>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#141413">Prompt Registry 共享发现平台</text>

  <!-- Subgraph border -->
  <rect x="10" y="36" width="740" height="330" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Search bar (top) -->
  <g transform="translate(380,75)">
    <rect x="-180" y="-20" width="360" height="40" rx="8" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5" filter="url(#shadow9)"/>
    <text x="-160" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#87867F">🔍  搜索：code review python</text>
  </g>

  <!-- Popular prompts section -->
  <g transform="translate(380,175)">
    <rect x="-200" y="-55" width="400" height="110" rx="8" fill="#E3DACC" stroke="#D97757" stroke-width="2" filter="url(#shadow9)"/>
    <text x="-180" y="-32" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#D97757">热门 Prompt</text>
    <!-- Item 1 -->
    <text x="-180" y="-12" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">⭐ Code Review Pro (v2.1) — 4.8★</text>
    <text x="-180" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">后端团队 · 1.2k次使用 · 92%好评</text>
    <!-- Item 2 -->
    <text x="-180" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">⭐ API Design Assistant (v1.5) — 4.6★</text>
    <text x="-180" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">架构组 · 890次使用 · 88%好评</text>
  </g>

  <!-- Dept section -->
  <g transform="translate(160,320)">
    <rect x="-130" y="-40" width="260" height="80" rx="8" fill="#E3DACC" stroke="#788C5D" stroke-width="2" filter="url(#shadow9)"/>
    <text x="-110" y="-18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#788C5D">我的部门 (后端)</text>
    <text x="-110" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">• Django Model Generator</text>
    <text x="-110" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">• FastAPI CRUD Scaffolder</text>
    <text x="-110" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">• SQL Optimization Helper</text>
  </g>

  <!-- Standard section -->
  <g transform="translate(600,320)">
    <rect x="-130" y="-40" width="260" height="80" rx="8" fill="#E3DACC" stroke="#87867F" stroke-width="2" filter="url(#shadow9)"/>
    <text x="-110" y="-18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#141413">企业标准</text>
    <text x="-110" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">• Security Review Checklist</text>
    <text x="-110" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">• Performance Optimization Guide</text>
    <text x="-110" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#87867F">（全员可读）</text>
  </g>

  <!-- Arrows from Popular to Dept and Standard -->
  <path d="M 290,240 L 200,270" fill="none" stroke="#87867F" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr9)"/>
  <path d="M 470,240 L 560,270" fill="none" stroke="#87867F" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr9)"/>
</svg>