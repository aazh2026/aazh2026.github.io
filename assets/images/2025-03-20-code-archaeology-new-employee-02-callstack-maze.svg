<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 640 420">
  <title>15层调用的历史路径依赖</title>
  <desc>
    A vertical flowchart showing 15 nested function calls branching and looping back to origin
  </desc>
  <path fill="#faf9f5" d="M0 0h640v420H0z"/>
  <text x="320" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">15层调用的历史路径依赖</text>
  <text x="320" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">git blame · 循环依赖 · 历史债务</text>
  <rect width="160" height="32" x="40" y="60" fill="#d97757" rx="6"/>
  <text x="120" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">PaymentService</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M120 92v12"/>
  <path fill="#d1cfc5" d="m120 108-4-8h8z"/>
  <rect width="160" height="28" x="40" y="112" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="120" y="131" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">AmountCalculator</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M120 140v12"/>
  <path fill="#d1cfc5" d="m120 156-4-8h8z"/>
  <rect width="160" height="28" x="40" y="160" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="120" y="179" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">CurrencyConverter</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M120 188v12"/>
  <path fill="#d1cfc5" d="m120 204-4-8h8z"/>
  <rect width="160" height="28" x="40" y="208" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="120" y="227" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">PrecisionHandler</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M120 236v12"/>
  <path fill="#d1cfc5" d="m120 252-4-8h8z"/>
  <rect width="160" height="28" x="40" y="256" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="120" y="275" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">RoundingStrategy</text>
  <rect width="220" height="300" x="380" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="490" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">git blame 时间线</text>
  <text x="396" y="102" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2016 · 原始实现，简单粗暴</text>
  <text x="396" y="120" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2017 · 多币种转换层</text>
  <text x="396" y="138" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2018 · 精度问题修复</text>
  <text x="396" y="156" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2019 · 旧数据回退逻辑</text>
  <text x="396" y="174" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2020 · 性能优化，引入新 bug</text>
  <text x="396" y="192" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2021 · 修复 bug，破坏多币种</text>
  <text x="396" y="210" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5">2022 · 重新加多币种支持</text>
  <text x="396" y="228" fill="#d97757" font-family="ui-monospace, monospace" font-size="9.5">2023 · 补丁：两者共存，spaghetti</text>
  <rect width="188" height="42" x="396" y="248" fill="#f0eee6" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="490" y="268" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">⚠ 历史路径依赖</text>
  <text x="490" y="282" fill="#87867f" font-size="9" text-anchor="middle">每一层修改在当时都合理</text>
  <circle cx="388" cy="102" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="120" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="138" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="156" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="174" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="192" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="210" r="2" fill="#d1cfc5"/>
  <circle cx="388" cy="228" r="3" fill="#d97757"/>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" d="M200 270c80 0 80 70 180 70"/>
  <path fill="#d97757" d="m380 340-8-6v12z"/>
  <text x="290" y="264" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">追踪15层后回到起点</text>
  <text x="340" y="360" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">这不是循环，是历史的叠加</text>
  <path fill="none" stroke="#788c5d" stroke-dasharray="3,2" stroke-width="1.5" d="M200 174c60 0 60-44 180-44"/>
  <path fill="#788c5d" d="m380 130-8-6v12z"/>
  <text x="290" y="158" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8.5">2018年网关抽象</text>
  <text x="120" y="390" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Lisa追踪了15层调用后，发现自己回到了起点</text>
</svg>
