<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>15层调用的历史路径依赖</title>
  <desc>A vertical flowchart showing 15 nested function calls branching and looping back to origin</desc>

  <!-- Background -->
  <rect width="640" height="420" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">15层调用的历史路径依赖</text>
  <text x="320" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">git blame · 循环依赖 · 历史债务</text>

  <!-- Start node -->
  <rect x="40" y="60" width="160" height="32" rx="6" fill="#D97757"/>
  <text x="120" y="81" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace">PaymentService</text>

  <!-- Arrow -->
  <line x1="120" y1="92" x2="120" y2="104" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="120,108 116,100 124,100" fill="#D1CFC5"/>

  <!-- Node 2 -->
  <rect x="40" y="112" width="160" height="28" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="120" y="131" text-anchor="middle" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">AmountCalculator</text>

  <!-- Arrow -->
  <line x1="120" y1="140" x2="120" y2="152" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="120,156 116,148 124,148" fill="#D1CFC5"/>

  <!-- Node 3 -->
  <rect x="40" y="160" width="160" height="28" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="120" y="179" text-anchor="middle" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">CurrencyConverter</text>

  <!-- Arrow -->
  <line x1="120" y1="188" x2="120" y2="200" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="120,204 116,196 124,196" fill="#D1CFC5"/>

  <!-- Node 4 -->
  <rect x="40" y="208" width="160" height="28" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="120" y="227" text-anchor="middle" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">PrecisionHandler</text>

  <!-- Arrow -->
  <line x1="120" y1="236" x2="120" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="120,252 116,244 124,244" fill="#D1CFC5"/>

  <!-- Node 5 -->
  <rect x="40" y="256" width="160" height="28" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="120" y="275" text-anchor="middle" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">RoundingStrategy</text>

  <!-- Right side: git blame timeline for context -->
  <rect x="380" y="60" width="220" height="300" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="490" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">git blame 时间线</text>

  <!-- Timeline entries -->
  <text x="396" y="102" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2016 · 原始实现，简单粗暴</text>
  <text x="396" y="120" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2017 · 多币种转换层</text>
  <text x="396" y="138" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2018 · 精度问题修复</text>
  <text x="396" y="156" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2019 · 旧数据回退逻辑</text>
  <text x="396" y="174" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2020 · 性能优化，引入新 bug</text>
  <text x="396" y="192" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2021 · 修复 bug，破坏多币种</text>
  <text x="396" y="210" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">2022 · 重新加多币种支持</text>
  <text x="396" y="228" font-size="9.5" fill="#D97757" font-family="ui-monospace, monospace">2023 · 补丁：两者共存，spaghetti</text>

  <!-- Warning callout -->
  <rect x="396" y="248" width="188" height="42" rx="6" fill="#F0EEE6" stroke="#D97757" stroke-width="1.5"/>
  <text x="490" y="268" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">⚠ 历史路径依赖</text>
  <text x="490" y="282" text-anchor="middle" font-size="9" fill="#87867F">每一层修改在当时都合理</text>

  <!-- Vertical dots connecting timeline -->
  <circle cx="388" cy="102" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="120" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="138" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="156" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="174" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="192" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="210" r="2" fill="#D1CFC5"/>
  <circle cx="388" cy="228" r="3" fill="#D97757"/>

  <!-- Arrow from Node 5 to loop back -->
  <path d="M 200 270 C 280 270, 280 340, 380 340" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="380,340 372,334 372,346" fill="#D97757"/>
  <text x="290" y="264" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">追踪15层后回到起点</text>

  <!-- Loop arrow label -->
  <text x="340" y="360" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">这不是循环，是历史的叠加</text>

  <!-- Branch arrow going right from Node 3 -->
  <path d="M 200 174 C 260 174, 260 130, 380 130" stroke="#788C5D" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <polygon points="380,130 372,124 372,136" fill="#788C5D"/>
  <text x="290" y="158" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">2018年网关抽象</text>

  <!-- Bottom note -->
  <text x="120" y="390" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Lisa追踪了15层调用后，发现自己回到了起点</text>
</svg>