<svg xmlns="http://www.w3.org/2000/svg" aria-label="Anthropic 三种 containment 架构对比" viewBox="0 0 800 520">
  <title>Anthropic Containment 三层架构</title>
  <desc>
    三种 containment 架构对比：Ephemeral Container、Human-in-the-loop Sandbox、Local VM；93% 批准率与 approval fatigue 的工程启示
  </desc>
  <defs>
    <linearGradient id="bg5" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#b85a3f"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#788c5d"/>
      <stop offset="100%" stop-color="#5e7347"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#141413"/>
      <stop offset="100%" stop-color="#2e2e2c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg5)" rx="12"/>
  <text x="400" y="36" fill="#141413" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">Anthropic 三种 Containment 架构对比</text>
  <text x="400" y="56" fill="#87867f" font-family="Georgia, serif" font-size="12" text-anchor="middle">信任边界工程：当 AI 可以「helpful」地绕过限制时</text>
  <rect width="500" height="40" x="150" y="70" fill="#d97757" rx="6"/>
  <text x="400" y="88" fill="#faf9f5" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">93% — 用户批准率 · Human-in-the-loop 范式结构性失效</text>
  <text x="400" y="102" fill="#faf9f5" font-family="monospace" font-size="10" text-anchor="middle">批准率不随时间下降，用户实际变得更不加思考地批准</text>
  <rect width="235" height="230" x="40" y="125" fill="#faf9f5" stroke="#d97757" stroke-width="3" rx="10"/>
  <rect width="235" height="36" x="40" y="125" fill="url(#g1)" rx="10 10 0 0"/>
  <text x="157" y="150" fill="#faf9f5" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Ephemeral Container</text>
  <text x="55" y="178" fill="#141413" font-family="monospace" font-size="10" font-weight="bold">产品：claude.ai</text>
  <text x="55" y="195" fill="#141413" font-family="monospace" font-size="10">环境：gVisor container</text>
  <text x="55" y="212" fill="#141413" font-family="monospace" font-size="10">文件系统：短暂（per-session）</text>
  <text x="55" y="229" fill="#141413" font-family="monospace" font-size="10">Agent：完全在服务器端</text>
  <path stroke="#d1cfc5" d="M50 242h215"/>
  <text x="55" y="260" fill="#788c5d" font-family="monospace" font-size="10" font-weight="bold">✓ Blast radius 最小</text>
  <text x="55" y="276" fill="#141413" font-family="monospace" font-size="10">无持久化文件系统</text>
  <text x="55" y="292" fill="#141413" font-family="monospace" font-size="10">无本地机器访问</text>
  <path stroke="#d1cfc5" d="M50 305h215"/>
  <text x="55" y="323" fill="#87867f" font-family="monospace" font-size="10" font-weight="bold">限制：</text>
  <text x="55" y="339" fill="#87867f" font-family="monospace" font-size="10">不能访问用户文件系统</text>
  <text x="55" y="352" fill="#87867f" font-family="monospace" font-size="10">不能做持久化工作</text>
  <rect width="235" height="230" x="283" y="125" fill="#faf9f5" stroke="#788c5d" stroke-width="3" rx="10"/>
  <rect width="235" height="36" x="283" y="125" fill="url(#g2)" rx="10 10 0 0"/>
  <text x="400" y="150" fill="#faf9f5" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Human-in-the-loop Sandbox</text>
  <text x="298" y="178" fill="#141413" font-family="monospace" font-size="10" font-weight="bold">产品：Claude Code</text>
  <text x="298" y="195" fill="#141413" font-family="monospace" font-size="10">环境：用户机器本地</text>
  <text x="298" y="212" fill="#141413" font-family="monospace" font-size="10">访问：文件系统 + shell</text>
  <text x="298" y="229" fill="#141413" font-family="monospace" font-size="10">OS sandbox：Seatbelt/bubblewrap</text>
  <path stroke="#d1cfc5" d="M293 242h215"/>
  <text x="298" y="260" fill="#d97757" font-family="monospace" font-size="10" font-weight="bold">→ 93% 批准率（失效）</text>
  <text x="298" y="276" fill="#141413" font-family="monospace" font-size="10">Permission prompts 下降 84%</text>
  <text x="298" y="292" fill="#141413" font-family="monospace" font-size="10">reads 允许，writes 限 workspace</text>
  <text x="298" y="308" fill="#141413" font-family="monospace" font-size="10">network 默认 deny</text>
  <path stroke="#d1cfc5" d="M293 318h215"/>
  <text x="298" y="336" fill="#b85a3f" font-family="monospace" font-size="10" font-weight="bold">⚠ 用户作为 injection vector</text>
  <text x="298" y="352" fill="#87867f" font-family="monospace" font-size="10">钓鱼测试：24/25 成功</text>
  <rect width="235" height="230" x="526" y="125" fill="#faf9f5" stroke="#141413" stroke-width="3" rx="10"/>
  <rect width="235" height="36" x="526" y="125" fill="url(#g3)" rx="10 10 0 0"/>
  <text x="643" y="150" fill="#faf9f5" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Local VM</text>
  <text x="541" y="178" fill="#141413" font-family="monospace" font-size="10" font-weight="bold">产品：Claude Cowork</text>
  <text x="541" y="195" fill="#141413" font-family="monospace" font-size="10">环境：完整虚拟机隔离</text>
  <text x="541" y="212" fill="#141413" font-family="monospace" font-size="10">包含独立 Linux kernel</text>
  <text x="541" y="229" fill="#141413" font-family="monospace" font-size="10">进程表、filesystem</text>
  <path stroke="#d1cfc5" d="M536 242h215"/>
  <text x="541" y="260" fill="#788c5d" font-family="monospace" font-size="10" font-weight="bold">✓ 最小特权原则实现</text>
  <text x="541" y="276" fill="#141413" font-family="monospace" font-size="10">workspace 手动挂载</text>
  <text x="541" y="292" fill="#141413" font-family="monospace" font-size="10">宿主机文件不可见</text>
  <text x="541" y="308" fill="#141413" font-family="monospace" font-size="10">keychain 凭证不进入 VM</text>
  <path stroke="#d1cfc5" d="M536 318h215"/>
  <text x="541" y="336" fill="#141413" font-family="monospace" font-size="10" font-weight="bold">关键：无 escape-hatch key</text>
  <text x="541" y="352" fill="#87867f" font-family="monospace" font-size="10">Claude Code: 有（可被说服）</text>
  <text x="541" y="368" fill="#87867f" font-family="monospace" font-size="10">Cowork: 无 — VM 边界绝对</text>
  <rect width="720" height="120" x="40" y="365" fill="#141413" rx="8"/>
  <text x="400" y="387" fill="#faf9f5" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">三层防御体系</text>
  <rect width="215" height="75" x="60" y="396" fill="#d97757" fill-opacity=".2" stroke="#d97757" stroke-width="2" rx="6"/>
  <text x="167" y="414" fill="#d97757" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">① Model 层</text>
  <text x="167" y="432" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">system prompts / classifiers</text>
  <text x="167" y="447" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">probes / training</text>
  <text x="167" y="462" fill="#87867f" font-family="monospace" font-size="9" text-anchor="middle">塑造倾向，不是能力边界</text>
  <rect width="215" height="75" x="292" y="396" fill="#788c5d" fill-opacity=".2" stroke="#788c5d" stroke-width="2" rx="6"/>
  <text x="399" y="414" fill="#788c5d" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">② Environment 层</text>
  <text x="399" y="432" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">VMs / Process sandboxes</text>
  <text x="399" y="447" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">filesystem boundaries</text>
  <text x="399" y="462" fill="#788c5d" font-family="monospace" font-size="9" text-anchor="middle">最有效 — Anthropic 重点投入</text>
  <rect width="215" height="75" x="524" y="396" fill="#87867f" fill-opacity=".2" stroke="#87867f" stroke-width="2" rx="6"/>
  <text x="631" y="414" fill="#87867f" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">③ External Content 层</text>
  <text x="631" y="432" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">MCP servers / plugins</text>
  <text x="631" y="447" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">web search tools</text>
  <text x="631" y="462" fill="#87867f" font-family="monospace" font-size="9" text-anchor="middle">Connector 审计 ≠ 数据审计</text>
  <path stroke="#faf9f5" stroke-width="2" marker-end="url(#arr)" d="M275 433h15"/>
  <path stroke="#faf9f5" stroke-width="2" d="M507 433h15"/>
  <text x="400" y="503" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">核心原则：凭证永远不会进入 sandbox —— 无论模型能力多强，环境边界是最有效的防御</text>
  <text x="400" y="517" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">数据来源：Anthropic Engineering Blog · &quot;How we contain Claude across products&quot; · 2026</text>
  <defs>
    <marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#faf9f5" d="M0 0v6l8-3z"/>
    </marker>
  </defs>
</svg>
