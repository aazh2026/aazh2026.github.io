<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="Prompt工程阶梯">
  <title>Prompt工程梯队建设三阶段</title>
  <desc>初级开发者→中级开发者→高级开发者的Prompt工程能力成长阶梯</desc>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="420" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#141413" letter-spacing="1">Prompt Engineering 梯队建设</text>
  <line x1="200" y1="50" x2="600" y2="50" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Step 1: Junior -->
  <rect x="60" y="72" width="200" height="240" rx="10" fill="#788C5D" filter="url(#shadow2)"/>
  <text x="160" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#E3DACC">JUNIOR</text>
  <text x="160" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#FAF9F5" font-weight="bold">初级开发者</text>
  <text x="160" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#E3DACC">Prompt 使用者</text>
  <line x1="100" y1="156" x2="220" y2="156" stroke="#E3DACC" stroke-width="0.5" opacity="0.4"/>
  <text x="80" y="180" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 使用标准模板</text>
  <text x="80" y="200" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 修改占位符变量</text>
  <text x="80" y="220" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 评估输出质量</text>
  <text x="80" y="240" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 记录使用效果</text>
  <text x="80" y="270" font-family="Georgia, serif" font-size="11" fill="#D1CFC5">培养周期: 2-3月</text>
  <text x="80" y="290" font-family="Georgia, serif" font-size="11" fill="#D1CFC5">关键产出: 熟练使用模板</text>

  <!-- Arrow 1 -->
  <polygon points="280,192 268,182 268,202" fill="#D97757"/>
  <line x1="268" y1="182" x2="268" y2="202" stroke="#D97757" stroke-width="2"/>

  <!-- Step 2: Mid -->
  <rect x="300" y="72" width="200" height="240" rx="10" fill="#D97757" filter="url(#shadow2)"/>
  <text x="400" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#E3DACC">MID-LEVEL</text>
  <text x="400" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#FAF9F5" font-weight="bold">中级开发者</text>
  <text x="400" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#E3DACC">Prompt 设计者</text>
  <line x1="340" y1="156" x2="460" y2="156" stroke="#E3DACC" stroke-width="0.5" opacity="0.4"/>
  <text x="320" y="180" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 设计复杂Prompt</text>
  <text x="320" y="200" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 调试和优化</text>
  <text x="320" y="220" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ Context管理</text>
  <text x="320" y="240" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 质量评估体系</text>
  <text x="320" y="270" font-family="Georgia, serif" font-size="11" fill="#D1CFC5">培养周期: 6-12月</text>
  <text x="320" y="290" font-family="Georgia, serif" font-size="11" fill="#D1CFC5">关键产出: 设计优化能力</text>

  <!-- Arrow 2 -->
  <polygon points="520,192 508,182 508,202" fill="#D97757"/>
  <line x1="508" y1="182" x2="508" y2="202" stroke="#D97757" stroke-width="2"/>

  <!-- Step 3: Senior -->
  <rect x="540" y="72" width="200" height="240" rx="10" fill="#141413" filter="url(#shadow2)"/>
  <text x="640" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D1CFC5">SENIOR</text>
  <text x="640" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#FAF9F5" font-weight="bold">高级开发者</text>
  <text x="640" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#87867F">Prompt 架构师</text>
  <line x1="580" y1="156" x2="700" y2="156" stroke="#D1CFC5" stroke-width="0.5" opacity="0.4"/>
  <text x="560" y="180" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 企业级架构设计</text>
  <text x="560" y="200" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 制定团队规范</text>
  <text x="560" y="220" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 战略规划</text>
  <text x="560" y="240" font-family="Georgia, serif" font-size="11" fill="#FAF9F5">✦ 组织建设</text>
  <text x="560" y="270" font-family="Georgia, serif" font-size="11" fill="#87867F">培养周期: 2-3年</text>
  <text x="560" y="290" font-family="Georgia, serif" font-size="11" fill="#87867F">关键产出: 系统建设能力</text>

  <!-- Upward arrow on right -->
  <line x1="760" y1="300" x2="760" y2="100" stroke="#D97757" stroke-width="2.5" stroke-dasharray="5,4"/>
  <polygon points="760,95 753,108 767,108" fill="#D97757"/>
  <text x="778" y="200" font-family="Georgia, serif" font-size="10" fill="#D97757" transform="rotate(90,778,200)">能力递增</text>

  <!-- Bottom note -->
  <text x="400" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#87867F">Prompt能力不是天生的，而是可以系统化培养和评估的</text>

  <!-- Legend bar -->
  <rect x="200" y="382" width="400" height="28" rx="14" fill="#D1CFC5" opacity="0.3"/>
  <circle cx="240" cy="396" r="6" fill="#788C5D"/>
  <text x="254" y="400" font-family="Georgia, serif" font-size="10" fill="#141413">基础使用</text>
  <circle cx="350" cy="396" r="6" fill="#D97757"/>
  <text x="364" y="400" font-family="Georgia, serif" font-size="10" fill="#141413">设计优化</text>
  <circle cx="470" cy="396" r="6" fill="#141413"/>
  <text x="484" y="400" font-family="Georgia, serif" font-size="10" fill="#141413">架构规划</text>
</svg>
