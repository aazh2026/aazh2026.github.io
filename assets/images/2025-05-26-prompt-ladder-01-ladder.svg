<svg xmlns="http://www.w3.org/2000/svg" aria-label="Prompt工程阶梯" viewBox="0 0 800 420"><title>Prompt工程梯队建设三阶段</title><desc>初级开发者→中级开发者→高级开发者的Prompt工程能力成长阶梯</desc><defs><linearGradient id="bg2" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient><filter id="shadow2" width="110%" height="120%" x="-5%" y="-5%"><feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="6"/></filter></defs><path fill="url(#bg2)" d="M0 0h800v420H0z"/><text x="400" y="38" fill="#141413" font-family="Georgia, serif" font-size="18" letter-spacing="1" text-anchor="middle">Prompt Engineering 梯队建设</text><path stroke="#d1cfc5" d="M200 50h400"/><rect width="200" height="240" x="60" y="72" fill="#788c5d" filter="url(#shadow2)" rx="10"/><text x="160" y="102" fill="#e3dacc" font-family="Georgia, serif" font-size="13" text-anchor="middle">JUNIOR</text><text x="160" y="124" fill="#faf9f5" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">初级开发者</text><text x="160" y="142" fill="#e3dacc" font-family="Georgia, serif" font-size="11" text-anchor="middle">Prompt 使用者</text><path stroke="#e3dacc" stroke-width=".5" d="M100 156h120" opacity=".4"/><text x="80" y="180" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 使用标准模板</text><text x="80" y="200" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 修改占位符变量</text><text x="80" y="220" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 评估输出质量</text><text x="80" y="240" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 记录使用效果</text><text x="80" y="270" fill="#d1cfc5" font-family="Georgia, serif" font-size="11">培养周期: 2-3月</text><text x="80" y="290" fill="#d1cfc5" font-family="Georgia, serif" font-size="11">关键产出: 熟练使用模板</text><path fill="#d97757" d="m280 192-12-10v20z"/><path stroke="#d97757" stroke-width="2" d="M268 182v20"/><rect width="200" height="240" x="300" y="72" fill="#d97757" filter="url(#shadow2)" rx="10"/><text x="400" y="102" fill="#e3dacc" font-family="Georgia, serif" font-size="13" text-anchor="middle">MID-LEVEL</text><text x="400" y="124" fill="#faf9f5" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">中级开发者</text><text x="400" y="142" fill="#e3dacc" font-family="Georgia, serif" font-size="11" text-anchor="middle">Prompt 设计者</text><path stroke="#e3dacc" stroke-width=".5" d="M340 156h120" opacity=".4"/><text x="320" y="180" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 设计复杂Prompt</text><text x="320" y="200" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 调试和优化</text><text x="320" y="220" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ Context管理</text><text x="320" y="240" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 质量评估体系</text><text x="320" y="270" fill="#d1cfc5" font-family="Georgia, serif" font-size="11">培养周期: 6-12月</text><text x="320" y="290" fill="#d1cfc5" font-family="Georgia, serif" font-size="11">关键产出: 设计优化能力</text><path fill="#d97757" d="m520 192-12-10v20z"/><path stroke="#d97757" stroke-width="2" d="M508 182v20"/><rect width="200" height="240" x="540" y="72" fill="#141413" filter="url(#shadow2)" rx="10"/><text x="640" y="102" fill="#d1cfc5" font-family="Georgia, serif" font-size="13" text-anchor="middle">SENIOR</text><text x="640" y="124" fill="#faf9f5" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">高级开发者</text><text x="640" y="142" fill="#87867f" font-family="Georgia, serif" font-size="11" text-anchor="middle">Prompt 架构师</text><path stroke="#d1cfc5" stroke-width=".5" d="M580 156h120" opacity=".4"/><text x="560" y="180" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 企业级架构设计</text><text x="560" y="200" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 制定团队规范</text><text x="560" y="220" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 战略规划</text><text x="560" y="240" fill="#faf9f5" font-family="Georgia, serif" font-size="11">✦ 组织建设</text><text x="560" y="270" fill="#87867f" font-family="Georgia, serif" font-size="11">培养周期: 2-3年</text><text x="560" y="290" fill="#87867f" font-family="Georgia, serif" font-size="11">关键产出: 系统建设能力</text><path stroke="#d97757" stroke-dasharray="5,4" stroke-width="2.5" d="M760 300V100"/><path fill="#d97757" d="m760 95-7 13h14z"/><text x="778" y="200" fill="#d97757" font-family="Georgia, serif" font-size="10" transform="rotate(90 778 200)">能力递增</text><text x="400" y="365" fill="#87867f" font-family="Georgia, serif" font-size="11" text-anchor="middle">Prompt能力不是天生的，而是可以系统化培养和评估的</text><rect width="400" height="28" x="200" y="382" fill="#d1cfc5" opacity=".3" rx="14"/><circle cx="240" cy="396" r="6" fill="#788c5d"/><text x="254" y="400" fill="#141413" font-family="Georgia, serif" font-size="10">基础使用</text><circle cx="350" cy="396" r="6" fill="#d97757"/><text x="364" y="400" fill="#141413" font-family="Georgia, serif" font-size="10">设计优化</text><circle cx="470" cy="396" r="6" fill="#141413"/><text x="484" y="400" fill="#141413" font-family="Georgia, serif" font-size="10">架构规划</text></svg>