<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413">用户置信度指示器</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">归因可视化 · 分层展示</text>

  <!-- Memory card -->
  <rect x="48" y="60" width="420" height="240" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>

  <!-- Card header -->
  <rect x="48" y="60" width="420" height="36" rx="10" fill="#F0EEE6"/>
  <rect x="48" y="82" width="420" height="14" fill="#F0EEE6"/>
  <text x="68" y="84" font-size="12" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">记忆条目</text>

  <!-- Memory text content -->
  <text x="68" y="118" font-size="12" fill="#141413">"用户喜欢 Rails 的约定优于配置，推荐 FastAPI"</text>

  <!-- Four dimension badges -->
  <!-- Provenance badge -->
  <rect x="68" y="134" width="76" height="22" rx="11" fill="#788C5D"/>
  <text x="106" y="149" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">来源 0.82</text>

  <!-- Temporal badge -->
  <rect x="152" y="134" width="76" height="22" rx="11" fill="#D97757"/>
  <text x="190" y="149" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">时间 0.71</text>

  <!-- Reasoning badge -->
  <rect x="236" y="134" width="76" height="22" rx="11" fill="#5B8DB8"/>
  <text x="274" y="149" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">推理 0.64</text>

  <!-- Impact badge -->
  <rect x="320" y="134" width="76" height="22" rx="11" fill="#87867F"/>
  <text x="358" y="149" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">影响 0.55</text>

  <!-- Overall confidence bar -->
  <text x="68" y="182" font-size="10" fill="#141413" font-family="ui-monospace, monospace">综合置信度</text>
  <!-- Bar background -->
  <rect x="68" y="188" width="380" height="18" rx="9" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <!-- Bar fill (70%) -->
  <rect x="68" y="188" width="266" height="18" rx="9" fill="#D97757"/>
  <text x="430" y="201" font-size="10" fill="#141413" font-family="ui-monospace, monospace">0.70</text>

  <!-- "为什么推荐这个？" button -->
  <rect x="68" y="218" width="180" height="32" rx="16" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="158" y="239" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">为什么推荐这个？</text>

  <!-- Expandable detail (shown below button) -->
  <rect x="68" y="258" width="380" height="30" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="82" y="277" font-size="9" fill="#141413">来源: 对话记录 2024-10-15，片段 #47</text>
  <text x="82" y="290" font-size="9" fill="#141413">推理: "用户提到 Rails" → "用户对 Rails 有好感" → "推荐 FastAPI"</text>

  <!-- Right side: legend -->
  <rect x="488" y="60" width="164" height="240" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <text x="570" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">维度说明</text>

  <!-- Legend items -->
  <rect x="506" y="100" width="12" height="12" rx="2" fill="#788C5D"/>
  <text x="524" y="110" font-size="10" fill="#141413">来源 (Provenance)</text>
  <text x="524" y="124" font-size="9" fill="#87867F">记忆的出处</text>

  <rect x="506" y="142" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="524" y="152" font-size="10" fill="#141413">时间 (Temporal)</text>
  <text x="524" y="166" font-size="9" fill="#87867F">记忆的新鲜度</text>

  <rect x="506" y="184" width="12" height="12" rx="2" fill="#5B8DB8"/>
  <text x="524" y="194" font-size="10" fill="#141413">推理 (Reasoning)</text>
  <text x="524" y="208" font-size="9" fill="#87867F">推断链可信度</text>

  <rect x="506" y="226" width="12" height="12" rx="2" fill="#87867F"/>
  <text x="524" y="236" font-size="10" fill="#141413">影响 (Impact)</text>
  <text x="524" y="250" font-size="9" fill="#87867F">使用频率与准确性</text>

  <!-- Control hint -->
  <rect x="506" y="264" width="128" height="22" rx="11" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="570" y="279" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">查看 · 纠正 · 删除</text>

  <title>用户置信度指示器</title>
  <desc>用户界面的置信度指示器：记忆条目附带四个维度置信度 badge、综合置信度进度条、以及可展开的归因详情</desc>
</svg>