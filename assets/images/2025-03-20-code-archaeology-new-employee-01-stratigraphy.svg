<svg xmlns="http://www.w3.org/2000/svg" aria-label="代码地层学视图" viewBox="0 0 800 440"><title>代码考古学：代码库的地层结构</title><desc>将遗留代码库比作考古地层，每一层代表一个历史时期的决策和约束</desc><defs><marker id="arrowUp" markerHeight="8" markerWidth="8" orient="auto" refX="3" refY="1"><path fill="#d97757" d="m0 3 6-3v6z"/></marker></defs><path fill="#faf9f5" d="M0 0h800v440H0z"/><path fill="#141413" d="M0 0h800v50H0z"/><text x="400" y="32" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1" text-anchor="middle">代码地层学：读懂遗留代码的历史</text><g transform="translate(24 62)"><text y="12" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600">考古学视角</text><rect width="200" height="30" y="20" fill="#e3dacc" rx="4"/><text x="100" y="39" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">🌱 表土层（2024-2026）</text><rect width="200" height="30" y="52" fill="#d1cfc5" rx="0"/><rect width="200" height="30" y="52" fill="none" stroke="#87867f" rx="4"/><text x="100" y="71" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">📦 2023：紧急补丁</text><rect width="200" height="30" y="84" fill="#d1cfc5" rx="0"/><rect width="200" height="30" y="84" fill="none" stroke="#87867f" rx="4"/><text x="100" y="103" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">🦠 2021：COVID 应急代码</text><rect width="200" height="30" y="116" fill="#d1cfc5" rx="0"/><rect width="200" height="30" y="116" fill="none" stroke="#87867f" rx="4"/><text x="100" y="135" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">⚡ 2019：性能优化（引入了 bug）</text><rect width="200" height="30" y="148" fill="#d1cfc5" rx="0"/><rect width="200" height="30" y="148" fill="none" stroke="#87867f" rx="4"/><text x="100" y="167" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">🔧 2018：网关抽象层</text><rect width="200" height="30" y="180" fill="#d1cfc5" rx="0"/><rect width="200" height="30" y="180" fill="none" stroke="#87867f" rx="4"/><text x="100" y="199" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">💾 2017：多币种支持（硬编码汇率）</text><rect width="200" height="30" y="212" fill="#87867f" rx="4"/><text x="100" y="231" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">🏛️ 2016：核心支付引擎（张工、李工）</text><path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arrowUp)" d="M210 130h20"/></g><g transform="translate(245 62)"><rect width="260" height="260" fill="#e3dacc" filter="url(#shadow)" rx="10"/><text x="130" y="28" fill="#d97757" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">💡 考古学家的洞察</text><path stroke="#d1cfc5" d="M20 40h220"/><text x="20" y="64" fill="#141413" font-family="system-ui, sans-serif" font-size="11">每一层代码都记录着：</text><text x="20" y="84" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 当时的业务压力</text><text x="20" y="100" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 当时的技术约束</text><text x="20" y="116" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 当时的人员配置</text><text x="20" y="132" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 当时的认知水平</text><path stroke="#d1cfc5" d="M20 146h220"/><text x="20" y="166" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="600">&quot;代码不是乱写的&quot;</text><text x="20" y="182" fill="#141413" font-family="system-ui, sans-serif" font-size="11">每一行看似愚蠢的设计</text><text x="20" y="198" fill="#141413" font-family="system-ui, sans-serif" font-size="11">在当时都是最优解</text><path stroke="#d1cfc5" d="M20 212h220"/><text x="20" y="232" fill="#87867f" font-family="system-ui, sans-serif" font-size="11">责怪前人&quot;写得烂&quot;是公平的</text><text x="20" y="248" fill="#87867f" font-family="system-ui, sans-serif" font-size="11">但也是无用的</text></g><g transform="translate(520 62)"><text y="12" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600">决策依赖链</text><rect width="260" height="40" y="24" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="10" y="42" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600">2016 单体架构</text><text x="10" y="56" fill="#87867f" font-family="system-ui, sans-serif" font-size="9">Spring 3.x + MySQL</text><path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowUp)" d="M130 64v12"/><rect width="260" height="40" y="78" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="10" y="96" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600">2017 多币种 + 缓存优化</text><text x="10" y="110" fill="#87867f" font-family="system-ui, sans-serif" font-size="9">硬编码汇率 · 简化事务</text><path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowUp)" d="M130 118v12"/><rect width="260" height="40" y="132" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="10" y="150" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600">2018 网关抽象 vs 精度修复</text><text x="10" y="164" fill="#87867f" font-family="system-ui, sans-serif" font-size="9">双轨运行 · 复杂度翻倍</text><path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowUp)" d="M130 172v12"/><rect width="260" height="40" y="186" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="10" y="204" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600">2019 回退逻辑（解决冲突）</text><text x="10" y="218" fill="#87867f" font-family="system-ui, sans-serif" font-size="9">微妙的平衡</text><path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowUp)" d="M130 226v12"/><rect width="260" height="40" y="240" fill="#faf9f5" stroke="#d97757" stroke-dasharray="4,2" rx="6"/><text x="10" y="258" fill="#d97757" font-family="system-ui, sans-serif" font-size="10" font-weight="600">2023 紧急补丁 → 打破平衡</text><text x="10" y="272" fill="#d97757" font-family="system-ui, sans-serif" font-size="9">Bug 根源在这里</text></g><rect width="752" height="80" x="24" y="340" fill="#e3dacc" rx="8"/><text x="44" y="362" fill="#d97757" font-family="system-ui, sans-serif" font-size="12" font-weight="700">⚠️ 知识孤岛检测</text><text x="44" y="382" fill="#141413" font-family="system-ui, sans-serif" font-size="11">
    <tspan font-weight="600">王工（已离职）</tspan>持有 PaymentGateway.java 87% 的知识
  </text><text x="44" y="398" fill="#141413" font-family="system-ui, sans-serif" font-size="11">当人员离开时，组织记忆随之流失。代码考古学是组织记忆的外化。</text><text x="44" y="414" fill="#87867f" font-family="system-ui, sans-serif" font-size="11">&quot;CodeArchaeologist&quot; 工具将隐性知识转化为显性知识，为未来的考古学家留下线索。</text></svg>