<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="ivory" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ede5"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c4613f"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#788c5d"/>
      <stop offset="100%" stop-color="#5e7348"/>
    </linearGradient>
    <marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#87867f" d="m0 0 6 3-6 3Z"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="url(#ivory)" rx="12"/>
  <text x="450" y="36" fill="#141413" font-family="'ui-serif, Georgia, serif'" font-size="17" font-weight="700" text-anchor="middle">语义验证 vs 结构验证</text>
  <text x="450" y="56" fill="#87867f" font-size="12" text-anchor="middle">契约测试中，结构匹配 ≠ 语义正确</text>
  <g transform="translate(30 80)">
    <rect width="400" height="220" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <rect width="400" height="32" fill="#d1cfc5" clip-path="url(#clip1)" rx="8"/>
    <text x="200" y="22" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">❌ 传统结构验证（假阳性）</text>
    <text x="16" y="62" fill="#141413" font-size="11" font-weight="600">契约期望</text>
    <rect width="368" height="54" x="16" y="68" fill="#faf9f5" stroke="#d1cfc5" rx="4"/>
    <text x="28" y="84" fill="#141413" font-size="11"><tspan font-weight="600">status:</tspan> cancelled</text>
    <text x="28" y="98" fill="#141413" font-size="11"><tspan font-weight="600">cancelledAt:</tspan> &quot;2026-03-19T10:00:00Z&quot;</text>
    <text x="28" y="112" fill="#141413" font-size="11"><tspan font-weight="600">reason:</tspan> &quot;USER_REQUEST&quot;</text>
    <text x="16" y="140" fill="#141413" font-size="11" font-weight="600">实际响应</text>
    <rect width="368" height="54" x="16" y="146" fill="#faf9f5" stroke="#d1cfc5" rx="4"/>
    <text x="28" y="162" fill="#141413" font-size="11"><tspan font-weight="600">status:</tspan> cancelled</text>
    <text x="28" y="176" fill="#141413" font-size="11"><tspan font-weight="600">cancelledAt:</tspan> &quot;2026-03-19T10:00:00Z&quot;</text>
    <text x="28" y="190" fill="#141413" font-size="11"><tspan font-weight="600">reason:</tspan> &quot;SYSTEM_TIMEOUT&quot;</text>
    <rect width="120" height="26" x="140" y="206" fill="#d1cfc5" rx="13"/>
    <text x="200" y="223" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">✓ 结构匹配</text>
  </g>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr)" d="M0 0h35" transform="translate(415 165)"/>
  <text x="18" y="-10" fill="#87867f" font-size="10" text-anchor="middle" transform="translate(415 165)">AI</text>
  <text x="18" y="20" fill="#87867f" font-size="10" text-anchor="middle" transform="translate(415 165)">分析</text>
  <g transform="translate(470 80)">
    <rect width="400" height="220" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
    <rect width="400" height="32" fill="url(#clay)" clip-path="url(#clip2)" rx="8"/>
    <text x="200" y="22" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">⚠️ AI 语义分析（发现真问题）</text>
    <text x="16" y="62" fill="#d97757" font-size="11" font-weight="700">语义不匹配</text>
    <rect width="368" height="56" x="16" y="68" fill="#fff5f0" stroke="#d97757" rx="4"/>
    <text x="28" y="83" fill="#141413" font-size="10.5">契约期望：USER_REQUEST（用户主动取消）</text>
    <text x="28" y="97" fill="#141413" font-size="10.5">实际返回：SYSTEM_TIMEOUT（系统超时）</text>
    <text x="28" y="111" fill="#d97757" font-size="10.5">→ 业务逻辑影响完全不同！</text>
    <text x="16" y="142" fill="#d97757" font-size="11" font-weight="700">影响分析</text>
    <rect width="368" height="42" x="16" y="148" fill="#fff5f0" stroke="#d97757" rx="4"/>
    <text x="28" y="162" fill="#141413" font-size="10.5">• 用户主动取消 → 可重新下单</text>
    <text x="28" y="177" fill="#141413" font-size="10.5">• 系统超时取消 → 需客服介入</text>
    <rect width="144" height="26" x="128" y="198" fill="#d97757" rx="13"/>
    <text x="200" y="215" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">⚠ 语义不匹配</text>
  </g>
  <g transform="translate(30 318)">
    <rect width="840" height="220" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <text x="24" y="28" fill="#141413" font-size="13" font-weight="700">AI 增强的契约验证流水线</text>
    <g transform="translate(24 44)">
      <rect width="168" height="158" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
      <rect width="168" height="26" fill="url(#olive)" clip-path="url(#clip3)" rx="6"/>
      <text x="84" y="18" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">1. 结构验证</text>
      <text x="10" y="44" fill="#141413" font-size="10">对比契约与响应：</text>
      <text x="10" y="60" fill="#141413" font-size="10">• 字段存在性</text>
      <text x="10" y="74" fill="#141413" font-size="10">• 类型正确性</text>
      <text x="10" y="88" fill="#141413" font-size="10">• 格式匹配</text>
      <text x="10" y="102" fill="#141413" font-size="10">• 枚举值合法</text>
      <rect width="148" height="34" x="10" y="114" fill="#e3dacc" rx="4"/>
      <text x="84" y="128" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">快速 · 确定 · 必做</text>
      <text x="84" y="142" fill="#87867f" font-size="9" text-anchor="middle">传统 Pact 即可完成</text>
      <path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M178 79h30"/>
      <rect width="168" height="158" x="218" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
      <rect width="168" height="26" x="218" fill="#d97757" clip-path="url(#clip4)" rx="6"/>
      <text x="302" y="18" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">2. 语义验证</text>
      <text x="228" y="44" fill="#141413" font-size="10">AI 分析业务含义：</text>
      <text x="228" y="60" fill="#141413" font-size="10">• 字段值的业务含义</text>
      <text x="228" y="74" fill="#141413" font-size="10">• 组合字段的一致性</text>
      <text x="228" y="88" fill="#141413" font-size="10">• 状态转换合法性</text>
      <text x="228" y="102" fill="#141413" font-size="10">• 时序约束</text>
      <rect width="148" height="34" x="228" y="114" fill="#fff0e8" rx="4"/>
      <text x="302" y="128" fill="#d97757" font-size="10" font-weight="600" text-anchor="middle">AI 增强 · 关键</text>
      <text x="302" y="142" fill="#87867f" font-size="9" text-anchor="middle">发现隐藏的业务 Bug</text>
      <path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M396 79h30"/>
      <rect width="168" height="158" x="436" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
      <rect width="168" height="26" x="436" fill="url(#olive)" clip-path="url(#clip5)" rx="6"/>
      <text x="520" y="18" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">3. 业务规则验证</text>
      <text x="446" y="44" fill="#141413" font-size="10">基于领域知识：</text>
      <text x="446" y="60" fill="#141413" font-size="10">• 业务不变量检查</text>
      <text x="446" y="74" fill="#141413" font-size="10">• 跨字段约束</text>
      <text x="446" y="88" fill="#141413" font-size="10">• 权限规则</text>
      <text x="446" y="102" fill="#141413" font-size="10">• 金额精度</text>
      <rect width="148" height="34" x="446" y="114" fill="#edf3e5" rx="4"/>
      <text x="520" y="128" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">规则引擎 · 深度</text>
      <text x="520" y="142" fill="#87867f" font-size="9" text-anchor="middle">防止业务逻辑错误</text>
      <path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M614 79h30"/>
      <rect width="162" height="158" x="654" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="6"/>
      <rect width="162" height="26" x="654" fill="url(#olive)" clip-path="url(#clip6)" rx="6"/>
      <text x="735" y="18" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">4. 验证报告</text>
      <text x="664" y="44" fill="#141413" font-size="10">综合结果输出：</text>
      <text x="664" y="60" fill="#141413" font-size="10">• 通过 / 失败</text>
      <text x="664" y="74" fill="#141413" font-size="10">• 警告（语义问题）</text>
      <text x="664" y="88" fill="#141413" font-size="10">• 修复建议</text>
      <text x="664" y="102" fill="#141413" font-size="10">• 影响范围分析</text>
      <rect width="142" height="34" x="664" y="114" fill="#edf3e5" rx="4"/>
      <text x="735" y="128" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">完整 · 可操作</text>
      <text x="735" y="142" fill="#87867f" font-size="9" text-anchor="middle">指导开发者修复</text>
    </g>
  </g>
</svg>
