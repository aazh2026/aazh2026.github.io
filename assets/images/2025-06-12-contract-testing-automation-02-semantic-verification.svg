<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="ivory" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE5"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#C4613F"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#5E7348"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#87867F"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="url(#ivory)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#141413">语义验证 vs 结构验证</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#87867F">契约测试中，结构匹配 ≠ 语义正确</text>

  <!-- LEFT: Structural Match (PASS but wrong) -->
  <g transform="translate(30, 80)">
    <rect width="400" height="220" fill="white" stroke="#D1CFC5" stroke-width="1.5" rx="8"/>
    <rect width="400" height="32" fill="#D1CFC5" rx="8" clip-path="url(#clip1)"/>
    <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">❌ 传统结构验证（假阳性）</text>

    <!-- Expected -->
    <text x="16" y="62" font-size="11" font-weight="600" fill="#141413">契约期望</text>
    <rect x="16" y="68" width="368" height="54" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1" rx="4"/>
    <text x="28" y="84" font-size="11" fill="#141413"><tspan font-weight="600">status:</tspan> cancelled</text>
    <text x="28" y="98" font-size="11" fill="#141413"><tspan font-weight="600">cancelledAt:</tspan> "2026-03-19T10:00:00Z"</text>
    <text x="28" y="112" font-size="11" fill="#141413"><tspan font-weight="600">reason:</tspan> "USER_REQUEST"</text>

    <!-- Actual -->
    <text x="16" y="140" font-size="11" font-weight="600" fill="#141413">实际响应</text>
    <rect x="16" y="146" width="368" height="54" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1" rx="4"/>
    <text x="28" y="162" font-size="11" fill="#141413"><tspan font-weight="600">status:</tspan> cancelled</text>
    <text x="28" y="176" font-size="11" fill="#141413"><tspan font-weight="600">cancelledAt:</tspan> "2026-03-19T10:00:00Z"</text>
    <text x="28" y="190" font-size="11" fill="#141413"><tspan font-weight="600">reason:</tspan> "SYSTEM_TIMEOUT"</text>

    <!-- Result badge -->
    <rect x="140" y="206" width="120" height="26" fill="#D1CFC5" rx="13"/>
    <text x="200" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#141413">✓ 结构匹配</text>
  </g>

  <!-- CENTER: Arrow down -->
  <g transform="translate(415, 165)">
    <path d="M0,0 L35,0" stroke="#87867F" stroke-width="2" marker-end="url(#arr)"/>
    <text x="18" y="-10" text-anchor="middle" font-size="10" fill="#87867F">AI</text>
    <text x="18" y="20" text-anchor="middle" font-size="10" fill="#87867F">分析</text>
  </g>

  <!-- RIGHT: Semantic Analysis -->
  <g transform="translate(470, 80)">
    <rect width="400" height="220" fill="white" stroke="#D97757" stroke-width="2" rx="8"/>
    <rect width="400" height="32" fill="url(#clay)" rx="8" clip-path="url(#clip2)"/>
    <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="white">⚠️ AI 语义分析（发现真问题）</text>

    <text x="16" y="62" font-size="11" font-weight="700" fill="#D97757">语义不匹配</text>
    <rect x="16" y="68" width="368" height="56" fill="#FFF5F0" stroke="#D97757" stroke-width="1" rx="4"/>
    <text x="28" y="83" font-size="10.5" fill="#141413">契约期望：USER_REQUEST（用户主动取消）</text>
    <text x="28" y="97" font-size="10.5" fill="#141413">实际返回：SYSTEM_TIMEOUT（系统超时）</text>
    <text x="28" y="111" font-size="10.5" fill="#D97757">→ 业务逻辑影响完全不同！</text>

    <text x="16" y="142" font-size="11" font-weight="700" fill="#D97757">影响分析</text>
    <rect x="16" y="148" width="368" height="42" fill="#FFF5F0" stroke="#D97757" stroke-width="1" rx="4"/>
    <text x="28" y="162" font-size="10.5" fill="#141413">• 用户主动取消 → 可重新下单</text>
    <text x="28" y="177" font-size="10.5" fill="#141413">• 系统超时取消 → 需客服介入</text>

    <!-- Result badge -->
    <rect x="128" y="198" width="144" height="26" fill="#D97757" rx="13"/>
    <text x="200" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="white">⚠ 语义不匹配</text>
  </g>

  <!-- Bottom: Verification Pipeline -->
  <g transform="translate(30, 318)">
    <rect width="840" height="220" fill="white" stroke="#D1CFC5" stroke-width="1.5" rx="8"/>
    <text x="24" y="28" font-size="13" font-weight="700" fill="#141413">AI 增强的契约验证流水线</text>

    <!-- Pipeline steps -->
    <g transform="translate(24, 44)">
      <!-- Step 1 -->
      <rect x="0" y="0" width="168" height="158" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1" rx="6"/>
      <rect x="0" y="0" width="168" height="26" fill="url(#olive)" rx="6" clip-path="url(#clip3)"/>
      <text x="84" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="white">1. 结构验证</text>
      <text x="10" y="44" font-size="10" fill="#141413">对比契约与响应：</text>
      <text x="10" y="60" font-size="10" fill="#141413">• 字段存在性</text>
      <text x="10" y="74" font-size="10" fill="#141413">• 类型正确性</text>
      <text x="10" y="88" font-size="10" fill="#141413">• 格式匹配</text>
      <text x="10" y="102" font-size="10" fill="#141413">• 枚举值合法</text>
      <rect x="10" y="114" width="148" height="34" fill="#E3DACC" rx="4"/>
      <text x="84" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#141413">快速 · 确定 · 必做</text>
      <text x="84" y="142" text-anchor="middle" font-size="9" fill="#87867F">传统 Pact 即可完成</text>

      <!-- Arrow -->
      <path d="M178,79 L208,79" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Step 2 -->
      <rect x="218" y="0" width="168" height="158" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1" rx="6"/>
      <rect x="218" y="0" width="168" height="26" fill="#D97757" rx="6" clip-path="url(#clip4)"/>
      <text x="302" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="white">2. 语义验证</text>
      <text x="228" y="44" font-size="10" fill="#141413">AI 分析业务含义：</text>
      <text x="228" y="60" font-size="10" fill="#141413">• 字段值的业务含义</text>
      <text x="228" y="74" font-size="10" fill="#141413">• 组合字段的一致性</text>
      <text x="228" y="88" font-size="10" fill="#141413">• 状态转换合法性</text>
      <text x="228" y="102" font-size="10" fill="#141413">• 时序约束</text>
      <rect x="228" y="114" width="148" height="34" fill="#FFF0E8" rx="4"/>
      <text x="302" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757">AI 增强 · 关键</text>
      <text x="302" y="142" text-anchor="middle" font-size="9" fill="#87867F">发现隐藏的业务 Bug</text>

      <!-- Arrow -->
      <path d="M396,79 L426,79" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Step 3 -->
      <rect x="436" y="0" width="168" height="158" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1" rx="6"/>
      <rect x="436" y="0" width="168" height="26" fill="url(#olive)" rx="6" clip-path="url(#clip5)"/>
      <text x="520" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="white">3. 业务规则验证</text>
      <text x="446" y="44" font-size="10" fill="#141413">基于领域知识：</text>
      <text x="446" y="60" font-size="10" fill="#141413">• 业务不变量检查</text>
      <text x="446" y="74" font-size="10" fill="#141413">• 跨字段约束</text>
      <text x="446" y="88" font-size="10" fill="#141413">• 权限规则</text>
      <text x="446" y="102" font-size="10" fill="#141413">• 金额精度</text>
      <rect x="446" y="114" width="148" height="34" fill="#EDF3E5" rx="4"/>
      <text x="520" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#141413">规则引擎 · 深度</text>
      <text x="520" y="142" text-anchor="middle" font-size="9" fill="#87867F">防止业务逻辑错误</text>

      <!-- Arrow -->
      <path d="M614,79 L644,79" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>

      <!-- Step 4 -->
      <rect x="654" y="0" width="162" height="158" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5" rx="6"/>
      <rect x="654" y="0" width="162" height="26" fill="url(#olive)" rx="6" clip-path="url(#clip6)"/>
      <text x="735" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="white">4. 验证报告</text>
      <text x="664" y="44" font-size="10" fill="#141413">综合结果输出：</text>
      <text x="664" y="60" font-size="10" fill="#141413">• 通过 / 失败</text>
      <text x="664" y="74" font-size="10" fill="#141413">• 警告（语义问题）</text>
      <text x="664" y="88" font-size="10" fill="#141413">• 修复建议</text>
      <text x="664" y="102" font-size="10" fill="#141413">• 影响范围分析</text>
      <rect x="664" y="114" width="142" height="34" fill="#EDF3E5" rx="4"/>
      <text x="735" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#141413">完整 · 可操作</text>
      <text x="735" y="142" text-anchor="middle" font-size="9" fill="#87867F">指导开发者修复</text>
    </g>
  </g>

  <style>
    #clip1 { clip-path: inset(0 0 6px 0 round 8px); }
  </style>
</svg>