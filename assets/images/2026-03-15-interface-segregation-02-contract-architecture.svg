<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Human-AI Contract 三层接口架构</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Intent · Context · Prompt</text>

  <!-- Human (left) -->
  <rect x="30" y="130" width="100" height="100" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="80" y="162" text-anchor="middle" font-size="13" fill="#141413">人类</text>
  <text x="80" y="178" text-anchor="middle" font-size="11" fill="#87867F">调用者</text>
  <text x="80" y="194" text-anchor="middle" font-size="10" fill="#87867F">Caller</text>

  <!-- Arrow: Human to Intent -->
  <line x1="130" y1="165" x2="158" y2="165" stroke="#D97757" stroke-width="2"/>
  <polygon points="165,165 157,161 157,169" fill="#D97757"/>
  <text x="148" y="158" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">Intent</text>

  <!-- Intent Interface (card) -->
  <rect x="172" y="100" width="160" height="130" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="252" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Intent 接口</text>
  <text x="252" y="140" text-anchor="middle" font-size="10" fill="#87867F">我想要什么</text>

  <rect x="186" y="150" width="132" height="22" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="252" y="165" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">type: "REFACTOR_CODE"</text>

  <rect x="186" y="178" width="132" height="22" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="252" y="193" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">target: function_name</text>

  <rect x="186" y="206" width="132" height="14" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="252" y="217" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">constraints: [...]</text>

  <!-- Arrow: Intent to Context -->
  <line x1="332" y1="165" x2="360" y2="165" stroke="#788C5D" stroke-width="2"/>
  <polygon points="367,165 359,161 359,169" fill="#788C5D"/>
  <text x="348" y="158" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">Context</text>

  <!-- Context Interface (card) -->
  <rect x="374" y="100" width="160" height="130" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="454" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Context 接口</text>
  <text x="454" y="140" text-anchor="middle" font-size="10" fill="#87867F">我给了什么</text>

  <rect x="388" y="150" width="132" height="22" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="454" y="165" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">project_metadata</text>

  <rect x="388" y="178" width="132" height="22" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="454" y="193" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">relevant_files[]</text>

  <rect x="388" y="206" width="132" height="14" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="454" y="217" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">constraints / success_criteria</text>

  <!-- Arrow: Context to AI -->
  <line x1="534" y1="165" x2="562" y2="165" stroke="#141413" stroke-width="2"/>
  <polygon points="569,165 561,161 561,169" fill="#141413"/>
  <text x="550" y="158" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">Prompt</text>

  <!-- AI (right) -->
  <rect x="576" y="130" width="100" height="100" rx="10" fill="#FFFFFF" stroke="#141413" stroke-width="1.8"/>
  <text x="626" y="162" text-anchor="middle" font-size="13" fill="#141413">AI</text>
  <text x="626" y="178" text-anchor="middle" font-size="11" fill="#87867F">服务提供者</text>
  <text x="626" y="194" text-anchor="middle" font-size="10" fill="#87867F">Service Provider</text>

  <!-- Prompt Interface (bottom center) -->
  <rect x="230" y="268" width="220" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <text x="340" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Prompt 接口</text>
  <text x="340" y="308" text-anchor="middle" font-size="10" fill="#87867F">怎么表达（模板化、结构化）</text>
  <text x="340" y="326" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">{ intent, target, check, output_format }</text>

  <!-- Connecting lines to Prompt Interface -->
  <line x1="252" y1="230" x2="252" y2="268" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="340" y1="230" x2="340" y2="268" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="428" y1="230" x2="428" y2="268" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Legend (bottom left) -->
  <text x="40" y="300" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Intent = 我想要什么</text>
  <text x="40" y="314" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Context = 我已知什么</text>
  <text x="40" y="328" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Prompt = 怎么告诉 AI</text>
</svg>