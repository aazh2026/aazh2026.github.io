<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="AI security tax Jevons paradox">
  <title>AI 安全税：Jevons 悖论的结构性影响</title>
  <desc>发现成本趋近于零，修复成本完全由一人承担——安全领域的 Jevons 悖论</desc>

  <defs>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97757"/>
    </marker>
    <marker id="arrS" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#141413"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="gradRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#788C5D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#788C5D"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="#FAF9F5"/>

  <!-- Header -->
  <text x="400" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#141413">Jevons 悖论：漏洞发现变便宜，修复没有</text>
  <line x1="100" y1="48" x2="700" y2="48" stroke="#D1CFC5" stroke-width="1"/>

  <!-- LEFT: Discovery side -->
  <rect x="40" y="65" width="350" height="220" rx="10" fill="#E3DACC" stroke="#788C5D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="65" width="350" height="34" rx="10" fill="#788C5D"/>
  <rect x="40" y="89" width="350" height="10" fill="#788C5D"/>
  <text x="215" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">发现端：成本 → 零</text>

  <text x="215" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">AI 安全扫描</text>

  <!-- Cost bars -->
  <text x="55" y="148" font-family="Arial, sans-serif" font-size="11" fill="#141413">2024（AI 前）</text>
  <rect x="155" y="135" width="180" height="22" rx="4" fill="#788C5D"/>
  <text x="245" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FAF9F5">中等成本</text>

  <text x="55" y="183" font-family="Arial, sans-serif" font-size="11" fill="#141413">2026（AI 时代）</text>
  <rect x="155" y="170" width="8" height="22" rx="4" fill="#D97757"/>
  <text x="163" y="183" text-anchor="left" font-family="Arial, sans-serif" font-size="10" fill="#D97757" font-weight="bold">≈ 0</text>

  <text x="55" y="215" font-family="Arial, sans-serif" font-size="11" fill="#141413">AI 工具：1 分钟遍历 18 万行代码</text>

  <text x="55" y="248" font-family="Arial, sans-serif" font-size="10" fill="#87867F">→ 有效漏洞率回到 15-16%</text>
  <text x="55" y="265" font-family="Arial, sans-serif" font-size="10" fill="#87867F">→ 但 CVE 数量是历史 3 倍（~50 个）</text>

  <!-- CENTER: Arrow with imbalance -->
  <line x1="390" y1="175" x2="440" y2="175" stroke="#D97757" stroke-width="3" marker-end="url(#arrC)"/>
  <text x="415" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#D97757">Jevons</text>
  <text x="415" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#D97757">效应</text>

  <!-- RIGHT: Fix side -->
  <rect x="445" y="65" width="315" height="220" rx="10" fill="#E3DACC" stroke="#D97757" stroke-width="2" filter="url(#shadow)"/>
  <rect x="445" y="65" width="315" height="34" rx="10" fill="#D97757"/>
  <rect x="445" y="89" width="315" height="10" fill="#D97757"/>
  <text x="602" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">修复端：成本不变</text>

  <text x="602" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">人类维护者（Daniel Stenberg）</text>

  <text x="460" y="148" font-family="Arial, sans-serif" font-size="11" fill="#141413">情境知识不可替代</text>
  <rect x="460" y="153" width="285" height="4" rx="2" fill="#D97757" opacity="0.4"/>

  <text x="460" y="175" font-family="Arial, sans-serif" font-size="11" fill="#141413">兼容性约束（向后兼容）</text>
  <rect x="460" y="180" width="285" height="4" rx="2" fill="#D97757" opacity="0.4"/>

  <text x="460" y="202" font-family="Arial, sans-serif" font-size="11" fill="#141413">规模经济失效（每次修复定制化）</text>
  <rect x="460" y="207" width="285" height="4" rx="2" fill="#D97757" opacity="0.4"/>

  <text x="460" y="232" font-family="Arial, sans-serif" font-size="11" fill="#141413">激励结构崩溃</text>
  <rect x="460" y="237" width="285" height="4" rx="2" fill="#D97757" opacity="0.4"/>

  <text x="460" y="262" font-family="Arial, sans-serif" font-size="10" fill="#D97757" font-weight="bold">50 小时 / 周工作制</text>

  <!-- Bottom: Data table -->
  <rect x="40" y="300" width="720" height="185" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#141413">curl 项目 CVE 演变</text>
  <line x1="80" y1="332" x2="720" y2="332" stroke="#D1CFC5" stroke-width="0.8"/>

  <!-- Table header -->
  <rect x="80" y="342" width="640" height="28" rx="4" fill="#141413"/>
  <text x="190" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">时间</text>
  <text x="350" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">有效漏洞率</text>
  <text x="490" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">CVE 数量</text>
  <text x="630" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">工作量</text>

  <!-- Row 1 -->
  <rect x="80" y="376" width="640" height="26" rx="3" fill="#E3DACC"/>
  <text x="190" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#141413">2024（AI 前）</text>
  <text x="350" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#141413">~15%</text>
  <text x="490" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#141413">~15 个</text>
  <text x="630" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#788C5D">可管理</text>

  <!-- Row 2 -->
  <rect x="80" y="406" width="640" height="26" rx="3" fill="#FAF9F5" stroke="#E3DACC" stroke-width="0.5"/>
  <text x="190" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#141413">2025.07（AI slop 高峰）</text>
  <text x="350" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">&lt;5%</text>
  <text x="490" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">4-5 倍增长</text>
  <text x="630" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">30min–3h/份</text>

  <!-- Row 3 -->
  <rect x="80" y="436" width="640" height="26" rx="3" fill="#E3DACC"/>
  <text x="190" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#141413">2026（高质量混乱）</text>
  <text x="350" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#141413">15-16%</text>
  <text x="490" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757" font-weight="bold">约 50 个（历史最高）</text>
  <text x="630" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757" font-weight="bold">每周 50h</text>
</svg>
