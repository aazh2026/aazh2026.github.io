<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI security tax Jevons paradox" font-family="ui-serif, Georgia, serif" viewBox="0 0 800 500">
  <title>AI 安全税：Jevons 悖论的结构性影响</title>
  <desc>
    发现成本趋近于零，修复成本完全由一人承担——安全领域的 Jevons 悖论
  </desc>
  <defs>
    <marker id="arrC" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3">
      <path fill="#d97757" d="m0 0 8 3-8 3z"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" flood-color="#141413" flood-opacity=".1" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v500H0z"/>
  <text x="400" y="36" fill="#141413" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">Jevons 悖论：漏洞发现变便宜，修复没有</text>
  <path stroke="#d1cfc5" d="M100 48h600"/>
  <rect width="350" height="220" x="40" y="65" fill="#e3dacc" stroke="#788c5d" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="350" height="34" x="40" y="65" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M40 89h350v10H40z"/>
  <text x="215" y="87" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">发现端：成本 → 零</text>
  <text x="215" y="120" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">AI 安全扫描</text>
  <text x="55" y="148" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">2024（AI 前）</text>
  <rect width="180" height="22" x="155" y="135" fill="#788c5d" rx="4"/>
  <text x="245" y="150" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">中等成本</text>
  <text x="55" y="183" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">2026（AI 时代）</text>
  <rect width="8" height="22" x="155" y="170" fill="#d97757" rx="4"/>
  <text x="163" y="183" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" text-anchor="left">≈ 0</text>
  <text x="55" y="215" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">AI 工具：1 分钟遍历 18 万行代码</text>
  <text x="55" y="248" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="10">→ 有效漏洞率回到 15-16%</text>
  <text x="55" y="265" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="10">→ 但 CVE 数量是历史 3 倍（~50 个）</text>
  <path stroke="#d97757" stroke-width="3" marker-end="url(#arrC)" d="M390 175h50"/>
  <text x="415" y="163" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">Jevons</text>
  <text x="415" y="195" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">效应</text>
  <rect width="315" height="220" x="445" y="65" fill="#e3dacc" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="315" height="34" x="445" y="65" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M445 89h315v10H445z"/>
  <text x="602" y="87" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">修复端：成本不变</text>
  <text x="602" y="120" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">人类维护者（Daniel Stenberg）</text>
  <text x="460" y="148" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">情境知识不可替代</text>
  <rect width="285" height="4" x="460" y="153" fill="#d97757" opacity=".4" rx="2"/>
  <text x="460" y="175" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">兼容性约束（向后兼容）</text>
  <rect width="285" height="4" x="460" y="180" fill="#d97757" opacity=".4" rx="2"/>
  <text x="460" y="202" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">规模经济失效（每次修复定制化）</text>
  <rect width="285" height="4" x="460" y="207" fill="#d97757" opacity=".4" rx="2"/>
  <text x="460" y="232" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11">激励结构崩溃</text>
  <rect width="285" height="4" x="460" y="237" fill="#d97757" opacity=".4" rx="2"/>
  <text x="460" y="262" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold">50 小时 / 周工作制</text>
  <rect width="720" height="185" x="40" y="300" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="400" y="322" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">curl 项目 CVE 演变</text>
  <path stroke="#d1cfc5" stroke-width=".8" d="M80 332h640"/>
  <rect width="640" height="28" x="80" y="342" fill="#141413" rx="4"/>
  <text x="190" y="361" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">时间</text>
  <text x="350" y="361" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">有效漏洞率</text>
  <text x="490" y="361" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CVE 数量</text>
  <text x="630" y="361" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">工作量</text>
  <rect width="640" height="26" x="80" y="376" fill="#e3dacc" rx="3"/>
  <text x="190" y="394" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">2024（AI 前）</text>
  <text x="350" y="394" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">~15%</text>
  <text x="490" y="394" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">~15 个</text>
  <text x="630" y="394" fill="#788c5d" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">可管理</text>
  <rect width="640" height="26" x="80" y="406" fill="#faf9f5" stroke="#e3dacc" stroke-width=".5" rx="3"/>
  <text x="190" y="424" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">2025.07（AI slop 高峰）</text>
  <text x="350" y="424" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">&lt;5%</text>
  <text x="490" y="424" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">4-5 倍增长</text>
  <text x="630" y="424" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">30min–3h/份</text>
  <rect width="640" height="26" x="80" y="436" fill="#e3dacc" rx="3"/>
  <text x="190" y="454" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">2026（高质量混乱）</text>
  <text x="350" y="454" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">15-16%</text>
  <text x="490" y="454" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">约 50 个（历史最高）</text>
  <text x="630" y="454" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">每周 50h</text>
</svg>
