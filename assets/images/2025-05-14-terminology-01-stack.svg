<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 三层术语架构 -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">三层术语架构：业务语言到代码命名</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/14</text>

  <!-- Layer 3: Business Language (top) -->
  <rect x="40" y="50" width="480" height="52" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="50" width="480" height="20" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="66" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L3 · 业务层</text>
  <text x="140" y="66" font-size="12" fill="#141413" font-weight="600">Business Language</text>
  <text x="60" y="84" font-size="10" fill="#87867F">业务专家使用的自然语言</text>
  <text x="60" y="96" font-size="9.5" fill="#87867F">示例：客户、订单、支付、退款</text>
  <rect x="490" y="62" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="75" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L3</text>

  <!-- Arrow -->
  <line x1="280" y1="102" x2="280" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,112 280,120 284,102" fill="#D1CFC5"/>

  <!-- Layer 2: Mapping Layer (middle) -->
  <rect x="40" y="120" width="480" height="44" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="120" width="480" height="18" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="135" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L2 · 映射层</text>
  <text x="140" y="135" font-size="12" fill="#141413" font-weight="600">Mapping Layer</text>
  <text x="60" y="152" font-size="10" fill="#87867F">业务术语与代码命名的对应关系</text>
  <text x="60" y="164" font-size="9.5" fill="#87867F">示例：客户 → Customer</text>
  <rect x="490" y="130" width="18" height="18" rx="9" fill="#2563EB"/>
  <text x="499" y="143" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L2</text>

  <!-- Arrow -->
  <line x1="280" y1="164" x2="280" y2="174" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,174 280,182 284,174" fill="#D1CFC5"/>

  <!-- Layer 1: Code Language (bottom) -->
  <rect x="40" y="182" width="480" height="18" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="194" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L1 · 代码层</text>
  <text x="140" y="194" font-size="12" fill="#141413" font-weight="600">Code Language</text>
  <text x="300" y="194" font-size="10" fill="#87867F">类、方法、变量命名：Customer、Order、PaymentService</text>
  <rect x="490" y="185" width="18" height="12" rx="6" fill="#059669"/>
  <text x="499" y="194" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">L1</text>
</svg>