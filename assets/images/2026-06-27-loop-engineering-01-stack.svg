  <text x="527" y="267" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">质量</text>

  <!-- Arrow 2→1 -->
  <line x1="300" y1="308" x2="300" y2="320" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="300,324 296,316 304,316" fill="#D1CFC5"/>

  <!-- Level 1 -->
  <rect x="40" y="328" width="520" height="70" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
