  <text x="527" y="357" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">工作</text>

  <!-- Feedback arrow: Level 4 → Level 1 (yellow-orange, right side) -->
  <path d="M 560 88 C 578 88, 578 360, 560 356" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="560,356 554,348 566,348" fill="#D97757" opacity="0.6"/>
  <text x="572" y="225" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">反馈改进</text>
