  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Sydney Runkle · langchain.com · 2026/06/16</text>

  <!-- Level 4 -->
  <rect x="40" y="58" width="520" height="70" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="56" y="80" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Level 4</text>
  <text x="56" y="97" font-size="13" fill="#141413">Hill Climbing Loop</text>
  <text x="56" y="114" font-size="10.5" fill="#87867F">trace 分析 → harness 配置改进</text>
  <text x="430" y="97" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">LangSmith Engine</text>
  <rect x="508" y="74" width="38" height="18" rx="9" fill="#D97757"/>
  <text x="527" y="87" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">改进</text>

  <!-- Arrow 4→3 -->
  <line x1="300" y1="128" x2="300" y2="140" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="300,144 296,136 304,136" fill="#D1CFC5"/>

