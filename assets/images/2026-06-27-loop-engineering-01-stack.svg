  <text x="430" y="187" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">LangSmith Deployment / Fleet</text>
  <rect x="508" y="164" width="38" height="18" rx="9" fill="#788C5D"/>
  <text x="527" y="177" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">规模化</text>

