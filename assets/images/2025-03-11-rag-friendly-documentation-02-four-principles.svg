<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 400">
  <path fill="#faf9f5" d="M0 0h680v400H0z"/>
  <text x="340" y="28" fill="#141413" font-size="15" font-weight="500" letter-spacing="-.02em" text-anchor="middle">RAG-Friendly 四大原则</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">文档写作范式转移</text>
  <rect width="290" height="130" x="40" y="68" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="60" y="94" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">01 Self-Contained</text>
  <text x="60" y="112" fill="#141413" font-size="13">自包含</text>
  <text x="60" y="132" fill="#87867f" font-size="10.5">每个文档块必须包含理解它所需的</text>
  <text x="60" y="148" fill="#87867f" font-size="10.5">全部上下文，不依赖外部引用。</text>
  <text x="60" y="170" fill="#141413" font-size="10">避免：&quot;如前所述...&quot;、&quot;详见X文档&quot;</text>
  <rect width="46" height="18" x="270" y="82" fill="#d97757" rx="9"/>
  <text x="293" y="95" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">独立</text>
  <rect width="290" height="130" x="350" y="68" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="370" y="94" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">02 Explicit Structure</text>
  <text x="370" y="112" fill="#141413" font-size="13">显式结构</text>
  <text x="370" y="132" fill="#87867f" font-size="10.5">使用编号、列表、定义代替</text>
  <text x="370" y="148" fill="#87867f" font-size="10.5">隐含的段落结构。</text>
  <text x="370" y="170" fill="#141413" font-size="10">AI无法理解&quot;这段讲的是分层设计&quot;</text>
  <rect width="46" height="18" x="580" y="82" fill="#d97757" rx="9"/>
  <text x="603" y="95" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">结构</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M330 133h20"/>
  <path fill="#d1cfc5" d="m345 129 6 4-6 4z"/>
  <rect width="290" height="130" x="40" y="218" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <text x="60" y="244" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">03 Terminology Consistency</text>
  <text x="60" y="262" fill="#141413" font-size="13">术语一致性</text>
  <text x="60" y="282" fill="#87867f" font-size="10.5">每个概念只有一个标准名称，</text>
  <text x="60" y="298" fill="#87867f" font-size="10.5">别名需显式声明关联。</text>
  <text x="60" y="320" fill="#141413" font-size="10">避免：API网关 vs 网关层 vs 入口服务</text>
  <rect width="46" height="18" x="270" y="232" fill="#788c5d" rx="9"/>
  <text x="293" y="245" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">一致</text>
  <rect width="290" height="130" x="350" y="218" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <text x="370" y="244" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">04 QA-Oriented</text>
  <text x="370" y="262" fill="#141413" font-size="13">问答导向</text>
  <text x="370" y="282" fill="#87867f" font-size="10.5">直接写出问题和答案，</text>
  <text x="370" y="298" fill="#87867f" font-size="10.5">让AI精确匹配用户查询。</text>
  <text x="370" y="320" fill="#141413" font-size="10">避免：从陈述句中提取答案</text>
  <rect width="46" height="18" x="580" y="232" fill="#788c5d" rx="9"/>
  <text x="603" y="245" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">精准</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M330 283h20"/>
  <path fill="#d1cfc5" d="m345 279 6 4-6 4z"/>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M495 198v20"/>
  <path fill="#d1cfc5" d="m491 213 4-6 4 6z"/>
  <path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M330 170c10 190 210-70 230 48" opacity=".5"/>
  <text x="420" y="195" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" opacity=".7">四位一体</text>
  <title>RAG-Friendly 四大原则</title>
  <desc>
    RAG-Friendly文档写作的四大核心原则：自包含、显式结构、术语一致性、问答导向，以2x2卡片网格呈现。
  </desc>
</svg>
