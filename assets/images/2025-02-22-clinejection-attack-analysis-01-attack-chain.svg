<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#141413" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#141413">Clinejection 攻击链：五步沦陷</text>
  <text x="450" y="64" text-anchor="middle" font-size="12" fill="#87867F">从提交 Issue 到生产环境沦陷的全过程</text>

  <!-- Step 1: Recon -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="140" height="160" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="140" height="32" fill="#D97757" rx="8" ry="0"/>
    <rect y="24" width="140" height="8" fill="#D97757"/>
    <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="600" fill="#FAF9F5">Step 1</text>
    <text x="70" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">侦察与目标选择</text>
    <text x="70" y="82" text-anchor="middle" font-size="10" fill="#87867F">分析 CI/CD 配置</text>
    <text x="70" y="98" text-anchor="middle" font-size="10" fill="#87867F">识别权限漏洞</text>
    <text x="70" y="114" text-anchor="middle" font-size="10" fill="#87867F">寻找攻击入口</text>
    <text x="70" y="140" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">allowedTools: Bash,Read,Write</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M195 180 L235 180" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#D97757"/>
  </marker></defs>

  <!-- Step 2: Payload -->
  <g transform="translate(245, 100)" filter="url(#shadow)">
    <rect width="140" height="160" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="140" height="32" fill="#D97757" rx="8" ry="0"/>
    <rect y="24" width="140" height="8" fill="#D97757"/>
    <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="600" fill="#FAF9F5">Step 2</text>
    <text x="70" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">构造恶意 Payload</text>
    <text x="70" y="82" text-anchor="middle" font-size="10" fill="#87867F">Prompt Injection</text>
    <text x="70" y="98" text-anchor="middle" font-size="10" fill="#87867F">越狱指令注入</text>
    <text x="70" y="114" text-anchor="middle" font-size="10" fill="#87867F">恶意 workflow 创建</text>
    <text x="70" y="140" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">Disregard all instructions</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M390 180 L430 180" stroke="#D97757" stroke-width="2" fill="none"/>

  <!-- Step 3: Trigger -->
  <g transform="translate(440, 100)" filter="url(#shadow)">
    <rect width="140" height="160" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="140" height="32" fill="#D97757" rx="8" ry="0"/>
    <rect y="24" width="140" height="8" fill="#D97757"/>
    <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="600" fill="#FAF9F5">Step 3</text>
    <text x="70" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">触发 AI 执行</text>
    <text x="70" y="82" text-anchor="middle" font-size="10" fill="#87867F">提交恶意 Issue</text>
    <text x="70" y="98" text-anchor="middle" font-size="10" fill="#87867F">AI 接收并执行</text>
    <text x="70" y="114" text-anchor="middle" font-size="10" fill="#87867F">无边界区分能力</text>
    <text x="70" y="140" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">AI 误判为合法指令</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M585 180 L625 180" stroke="#D97757" stroke-width="2" fill="none"/>

  <!-- Step 4: Escalate -->
  <g transform="translate(635, 100)" filter="url(#shadow)">
    <rect width="140" height="160" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="140" height="32" fill="#D97757" rx="8" ry="0"/>
    <rect y="24" width="140" height="8" fill="#D97757"/>
    <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="600" fill="#FAF9F5">Step 4</text>
    <text x="70" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">权限升级与持久化</text>
    <text x="70" y="82" text-anchor="middle" font-size="10" fill="#87867F">创建恶意 workflow</text>
    <text x="70" y="98" text-anchor="middle" font-size="10" fill="#87867F">git push 推送代码</text>
    <text x="70" y="114" text-anchor="middle" font-size="10" fill="#87867F">建立持久化通道</text>
    <text x="70" y="140" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">每次 push 都触发</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M780 180 L810 180 L810 300" stroke="#D97757" stroke-width="2" fill="none"/>

  <!-- Step 5: Compromised -->
  <g transform="translate(635, 310)" filter="url(#shadow)">
    <rect width="140" height="160" fill="#FAF9F5" rx="8" stroke="#D97757" stroke-width="2"/>
    <rect width="140" height="32" fill="#788C5D" rx="8" ry="0"/>
    <rect y="24" width="140" height="8" fill="#788C5D"/>
    <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="600" fill="#FAF9F5">Step 5</text>
    <text x="70" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">生产环境沦陷</text>
    <text x="70" y="82" text-anchor="middle" font-size="10" fill="#87867F">植入后门代码</text>
    <text x="70" y="98" text-anchor="middle" font-size="10" fill="#87867F">窃取敏感数据</text>
    <text x="70" y="114" text-anchor="middle" font-size="10" fill="#87867F">恶意 release 发布</text>
    <text x="70" y="140" text-anchor="middle" font-size="10" fill="#788C5D" font-weight="600">供应链完全沦陷</text>
  </g>

  <!-- Left side annotation -->
  <g transform="translate(50, 310)">
    <rect width="565" height="160" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#141413">攻击成本分析</text>
    <text x="20" y="55" font-size="11" fill="#87867F">传统供应链攻击：</text>
    <text x="30" y="75" font-size="11" fill="#87867F">• 长期积累信任成为维护者</text>
    <text x="30" y="92" font-size="11" fill="#87867F">• 发现复杂代码漏洞</text>
    <text x="30" y="109" font-size="11" fill="#87867F">• 社会工程维护者</text>
    <text x="20" y="135" font-size="11" fill="#D97757" font-weight="600">Clinejection 攻击：只需一个 GitHub 账号</text>
    <text x="30" y="153" font-size="11" fill="#87867F">提交一个 Issue，等待 AI 自动执行 → 攻击成本接近零</text>
  </g>

  <!-- Footer -->
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#87867F">攻击复杂度：极低 | 影响范围：所有使用 AI Issue Triager 的公开仓库</text>
</svg>