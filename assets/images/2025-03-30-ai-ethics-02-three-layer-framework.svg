<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 600 380"><title>AI伦理治理三层框架</title><desc>数据层、模型层、应用层构成的三层AI伦理治理框架及对应的LangChain原语</desc><path fill="#faf9f5" d="M0 0h600v380H0z"/><text x="300" y="24" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">AI伦理治理三层框架</text><text x="300" y="40" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Data · Model · Application</text><rect width="520" height="80" x="40" y="54" fill="#fff" stroke="#788c5d" stroke-width="2" rx="8"/><text x="56" y="74" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 3 · 应用层治理</text><text x="56" y="92" fill="#141413" font-size="12">目标：防止偏见在真实场景中造成伤害</text><text x="56" y="108" fill="#87867f" font-size="10">影响评估 · 人在回路 · 持续监控</text><text x="440" y="78" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9.5">Human-in-the-loop</text><text x="440" y="92" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9.5">Audit / Review</text><text x="440" y="106" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9.5">Feedback Loop</text><rect width="46" height="18" x="500" y="62" fill="#788c5d" rx="9"/><text x="523" y="75" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">应用</text><path stroke="#d1cfc5" stroke-width="1.5" d="M300 134v12"/><path fill="#d1cfc5" d="m300 150-4-8h8z"/><rect width="520" height="80" x="40" y="156" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/><text x="56" y="176" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 2 · 模型层治理</text><text x="56" y="194" fill="#141413" font-size="12">目标：设计公平的算法，使模型输出与敏感属性无关</text><text x="56" y="210" fill="#87867f" font-size="10">公平性约束 · 对抗去偏见 · 可解释性</text><text x="440" y="180" fill="#d97757" font-family="ui-monospace, monospace" font-size="9.5">Fairness Constraint</text><text x="440" y="194" fill="#d97757" font-family="ui-monospace, monospace" font-size="9.5">SHAP / LIME</text><text x="440" y="208" fill="#d97757" font-family="ui-monospace, monospace" font-size="9.5">Adversarial Debiasing</text><rect width="46" height="18" x="500" y="164" fill="#d97757" rx="9"/><text x="523" y="177" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">验证</text><path stroke="#d1cfc5" stroke-width="1.5" d="M300 236v12"/><path fill="#d1cfc5" d="m300 252-4-8h8z"/><rect width="520" height="80" x="40" y="258" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="56" y="278" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 1 · 数据层治理</text><text x="56" y="296" fill="#141413" font-size="12">目标：确保训练数据的公平性和代表性</text><text x="56" y="312" fill="#87867f" font-size="10">数据审计 · 数据平衡 · 历史偏见修正</text><text x="440" y="282" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9.5">Data Audit</text><text x="440" y="296" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9.5">Resampling / Augmentation</text><text x="440" y="310" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9.5">Causal Inference</text><rect width="46" height="18" x="500" y="266" fill="#f0eee6" stroke="#d1cfc5" rx="9"/><text x="523" y="279" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">基础</text><path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.8" d="M560 88c20 0 20 222 0 210" opacity=".5"/><path fill="#d97757" d="m560 298-6-8h12z" opacity=".5"/><text x="572" y="200" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" opacity=".7">反馈</text><text x="572" y="212" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" opacity=".7">改进</text><text x="300" y="358" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">数据层是根本 · 模型层是关键 · 应用层是防线</text></svg>