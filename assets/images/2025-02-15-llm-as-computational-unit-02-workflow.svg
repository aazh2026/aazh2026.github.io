<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 300">
  <title>Software 3.0 验证工作流</title>
  <desc>
    Software 3.0 的 Generate → Verify → 反馈循环，中心节点为 Verify（以 clay 强调色高亮），包含人在回路分支
  </desc>
  <path fill="#faf9f5" d="M0 0h680v300H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Software 3.0 验证工作流</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Software 3.0 · 验证优先原则</text>
  <rect width="140" height="70" x="40" y="90" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="110" y="118" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">Generate</text>
  <text x="110" y="134" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">LLM / 模型</text>
  <text x="110" y="150" fill="#87867f" font-size="10" text-anchor="middle">生成输出</text>
  <path stroke="#d1cfc5" stroke-width="1.8" d="M180 125h32"/>
  <path fill="#d1cfc5" d="m212 121-8 4 8 4z"/>
  <text x="196" y="118" fill="#87867f" font-size="9" text-anchor="middle">输出</text>
  <rect width="160" height="90" x="220" y="80" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <rect width="160" height="24" x="220" y="80" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M220 96h160v8H220z"/>
  <text x="300" y="97" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Verify</text>
  <text x="300" y="126" fill="#d97757" font-size="13" font-weight="600" text-anchor="middle">验证</text>
  <text x="300" y="142" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">test / rubric / 形式化</text>
  <text x="300" y="158" fill="#87867f" font-size="10" text-anchor="middle">多层次检查</text>
  <path stroke="#788c5d" stroke-width="1.8" d="M300 170v22"/>
  <path fill="#788c5d" d="m300 192-4-8h8z"/>
  <text x="314" y="184" fill="#788c5d" font-size="9">pass</text>
  <rect width="140" height="50" x="230" y="200" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="300" y="223" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">Output</text>
  <text x="300" y="239" fill="#87867f" font-size="10" text-anchor="middle">可信输出</text>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M380 125h40"/>
  <path fill="#d97757" d="m420 121-8 4 8 4z"/>
  <text x="420" y="114" fill="#d97757" font-size="9" text-anchor="middle">人工审核</text>
  <rect width="110" height="50" x="428" y="100" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="483" y="123" fill="#d97757" font-size="12" font-weight="600" text-anchor="middle">人在回路</text>
  <text x="483" y="139" fill="#87867f" font-size="10" text-anchor="middle">关键节点介入</text>
  <path stroke="#d97757" stroke-width="1.8" d="M220 125h-38"/>
  <path fill="#d97757" d="m182 121 8 4-8 4z"/>
  <text x="182" y="114" fill="#d97757" font-size="9" text-anchor="middle">fail</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M110 165c0 45 190 45 190 5" opacity=".7"/>
  <path fill="#d97757" d="m300 170-4 8h8z" opacity=".7"/>
  <text x="200" y="205" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">反馈 → 重新生成</text>
  <rect width="105" height="90" x="560" y="80" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="6"/>
  <text x="572" y="100" fill="#141413" font-size="10" font-weight="600">核心原则</text>
  <text x="572" y="116" fill="#87867f" font-size="10">验证优先</text>
  <text x="572" y="130" fill="#87867f" font-size="10">模块化契约</text>
  <text x="572" y="144" fill="#87867f" font-size="10">人在回路</text>
  <text x="572" y="158" fill="#87867f" font-size="10">持续对齐</text>
  <text x="300" y="76" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">核心差异化</text>
  <path stroke="#d97757" stroke-width="1.5" d="M300 78v2"/>
</svg>
