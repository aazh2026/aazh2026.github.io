<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Prompt 多层防护框架</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">技术层 · 架构层 · 策略层</text>

  <!-- Layer 1: Technical — clay accent -->
  <rect x="40" y="60" width="520" height="88" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="60" width="6" height="88" rx="3" fill="#D97757"/>
  <text x="58" y="80" font-size="11" font-weight="700" fill="#D97757" font-family="ui-monospace, monospace">技术层</text>
  <text x="58" y="96" font-size="12" fill="#141413">动态组装 · 输出过滤 · 对抗性测试 · 混淆</text>
  <text x="58" y="114" font-size="10" fill="#87867F">拆分 Prompt 片段，运行时组装；输出层过滤敏感片段；</text>
  <text x="58" y="128" font-size="10" fill="#87867F">定期用套取变体测试；编码增加套取难度</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="148" x2="300" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="300,164 296,156 304,156" fill="#D1CFC5"/>

  <!-- Layer 2: Architecture — olive accent -->
  <rect x="40" y="168" width="520" height="88" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="40" y="168" width="6" height="88" rx="3" fill="#788C5D"/>
  <text x="58" y="188" font-size="11" font-weight="700" fill="#788C5D" font-family="ui-monospace, monospace">架构层</text>
  <text x="58" y="204" font-size="12" fill="#141413">Prompt as a Service · 分层权限模型</text>
  <text x="58" y="222" font-size="10" fill="#87867F">后端封装 Prompt，客户端只与 API 交互；</text>
  <text x="58" y="236" font-size="10" fill="#87867F">不同用户层级看到不同版本，泄露损失可控</text>

  <!-- Arrow 2→3 -->
  <line x1="300" y1="256" x2="300" y2="268" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="300,272 296,264 304,264" fill="#D1CFC5"/>

  <!-- Layer 3: Strategy — gray accent -->
  <rect x="40" y="276" width="520" height="88" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="40" y="276" width="6" height="88" rx="3" fill="#D1CFC5"/>
  <text x="58" y="296" font-size="11" font-weight="700" fill="#87867F" font-family="ui-monospace, monospace">策略层</text>
  <text x="58" y="312" font-size="12" fill="#141413">快速迭代 · 法律 + 技术双重保护 · 差异化壁垒</text>
  <text x="58" y="330" font-size="10" fill="#87867F">让泄露版本快速过时；服务条款 + 版本历史证据；</text>
  <text x="58" y="344" font-size="10" fill="#87867F">专有数据、用户反馈、品牌等真正护城河</text>

  <!-- Dashed return arrow on right side -->
  <path d="M 560 104 C 578 104, 578 276, 560 276" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="560,276 554,268 566,268" fill="#D97757" opacity="0.6"/>
  <text x="572" y="192" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">可访问性</text>
  <text x="572" y="206" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">vs</text>
  <text x="572" y="220" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">保密性</text>

  <!-- Footer -->
  <text x="300" y="370" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">核心困境 — Prompt 必须对 AI 可见，因此无法被完全保护</text>
</svg>
