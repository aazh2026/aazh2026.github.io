<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 600 380"><path fill="#faf9f5" d="M0 0h600v380H0z"/><text x="300" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Prompt 多层防护框架</text><text x="300" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">技术层 · 架构层 · 策略层</text><rect width="520" height="88" x="40" y="60" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><rect width="6" height="88" x="40" y="60" fill="#d97757" rx="3"/><text x="58" y="80" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="700">技术层</text><text x="58" y="96" fill="#141413" font-size="12">动态组装 · 输出过滤 · 对抗性测试 · 混淆</text><text x="58" y="114" fill="#87867f" font-size="10">拆分 Prompt 片段，运行时组装；输出层过滤敏感片段；</text><text x="58" y="128" fill="#87867f" font-size="10">定期用套取变体测试；编码增加套取难度</text><path stroke="#d1cfc5" stroke-width="1.5" d="M300 148v12"/><path fill="#d1cfc5" d="m300 164-4-8h8z"/><rect width="520" height="88" x="40" y="168" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/><rect width="6" height="88" x="40" y="168" fill="#788c5d" rx="3"/><text x="58" y="188" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="700">架构层</text><text x="58" y="204" fill="#141413" font-size="12">Prompt as a Service · 分层权限模型</text><text x="58" y="222" fill="#87867f" font-size="10">后端封装 Prompt，客户端只与 API 交互；</text><text x="58" y="236" fill="#87867f" font-size="10">不同用户层级看到不同版本，泄露损失可控</text><path stroke="#d1cfc5" stroke-width="1.5" d="M300 256v12"/><path fill="#d1cfc5" d="m300 272-4-8h8z"/><rect width="520" height="88" x="40" y="276" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/><rect width="6" height="88" x="40" y="276" fill="#d1cfc5" rx="3"/><text x="58" y="296" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" font-weight="700">策略层</text><text x="58" y="312" fill="#141413" font-size="12">快速迭代 · 法律 + 技术双重保护 · 差异化壁垒</text><text x="58" y="330" fill="#87867f" font-size="10">让泄露版本快速过时；服务条款 + 版本历史证据；</text><text x="58" y="344" fill="#87867f" font-size="10">专有数据、用户反馈、品牌等真正护城河</text><path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M560 104c18 0 18 172 0 172" opacity=".6"/><path fill="#d97757" d="m560 276-6-8h12z" opacity=".6"/><text x="572" y="192" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">可访问性</text><text x="572" y="206" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">vs</text><text x="572" y="220" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">保密性</text><text x="300" y="370" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">核心困境 — Prompt 必须对 AI 可见，因此无法被完全保护</text></svg>