<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 320">
  <title>记忆进化：从文件到数据库</title>
  <desc>
    A conceptual diagram showing the transition from file-based storage to database storage for AI agents
  </desc>
  <path fill="#faf9f5" d="M0 0h680v320H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">记忆的进化：从「给人翻」到「给机器查」</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">pgmemory 代表的不是更好的存储，是全新的记忆范式</text>
  <rect width="200" height="160" x="60" y="80" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="10"/>
  <text x="160" y="108" fill="#788c5d" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">文件存储</text>
  <rect width="60" height="50" x="100" y="120" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".15" rx="4"/>
  <rect width="35" height="10" x="100" y="114" fill="#788c5d" opacity=".15" rx="3"/>
  <text x="160" y="152" fill="#788c5d" font-size="10" text-anchor="middle">文件夹</text>
  <text x="160" y="182" fill="#141413" font-size="9" text-anchor="middle">给人类阅读</text>
  <text x="160" y="196" fill="#87867f" font-size="9" text-anchor="middle">手动检索 · grep 搜索</text>
  <text x="160" y="212" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">&quot;给人翻&quot;</text>
  <path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="2" d="m260 0 120 160"/>
  <path fill="#d1cfc5" d="m380 160-12-6v12z"/>
  <ellipse cx="320" cy="120" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="50" ry="24"/>
  <text x="320" y="117" fill="#141413" font-size="9" text-anchor="middle">AI Agent 需要</text>
  <text x="320" y="130" fill="#141413" font-size="9" text-anchor="middle">「回忆」时</text>
  <path fill="#fff" stroke="#d1cfc5" d="m295 142-7 6 12-4z"/>
  <rect width="200" height="160" x="420" y="80" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="10"/>
  <text x="520" y="108" fill="#d97757" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">数据库存储</text>
  <ellipse cx="490" cy="130" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".15" rx="28" ry="10"/>
  <path fill="#d97757" d="M462 130h56v36h-56z" opacity=".08"/>
  <ellipse cx="490" cy="166" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".15" rx="28" ry="10"/>
  <path stroke="#d97757" d="M462 140v20m56-20v20" opacity=".4"/>
  <text x="520" y="152" fill="#d97757" font-size="10" text-anchor="middle">pgvector</text>
  <text x="520" y="190" fill="#141413" font-size="9" text-anchor="middle">语义查询 · 自动归档</text>
  <text x="520" y="204" fill="#87867f" font-size="9" text-anchor="middle">精准匹配 · 多 Agent 隔离</text>
  <text x="520" y="218" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">&quot;给机器读&quot;</text>
  <rect width="440" height="36" x="120" y="270" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/>
  <text x="340" y="287" fill="#141413" font-size="11" font-style="italic" text-anchor="middle">&quot;文件是给人看的，数据库是给机器读的&quot;</text>
  <text x="340" y="300" fill="#87867f" font-size="9" text-anchor="middle">pgmemory 的设计逻辑：不是更好的文件管理，是重新定义记忆</text>
</svg>
