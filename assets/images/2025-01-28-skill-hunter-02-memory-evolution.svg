<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>记忆进化：从文件到数据库</title>
  <desc>A conceptual diagram showing the transition from file-based storage to database storage for AI agents</desc>

  <!-- Background -->
  <rect width="680" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">记忆的进化：从「给人翻」到「给机器查」</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">pgmemory 代表的不是更好的存储，是全新的记忆范式</text>

  <!-- Left node: File storage -->
  <rect x="60" y="80" width="200" height="160" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="160" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">文件存储</text>

  <!-- File folder icon -->
  <rect x="100" y="120" width="60" height="50" rx="4" fill="#788C5D" opacity="0.15" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="100" y="114" width="35" height="10" rx="3" fill="#788C5D" opacity="0.15"/>
  <text x="160" y="152" text-anchor="middle" font-size="10" fill="#788C5D">文件夹</text>

  <!-- Sub-labels under left node -->
  <text x="160" y="182" text-anchor="middle" font-size="9" fill="#141413">给人类阅读</text>
  <text x="160" y="196" text-anchor="middle" font-size="9" fill="#87867F">手动检索 · grep 搜索</text>
  <text x="160" y="212" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">"给人翻"</text>

  <!-- Dashed arrow: File → Database -->
  <line x1="260" y2="160" x2="380" y2="160" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="380,160 368,154 368,166" fill="#D1CFC5"/>

  <!-- Thought bubble above arrow -->
  <ellipse cx="320" cy="120" rx="50" ry="24" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="320" y="117" text-anchor="middle" font-size="9" fill="#141413">AI Agent 需要</text>
  <text x="320" y="130" text-anchor="middle" font-size="9" fill="#141413">「回忆」时</text>
  <!-- Bubble tail -->
  <polygon points="295,142 288,148 300,144" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Right node: Database storage -->
  <rect x="420" y="80" width="200" height="160" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="520" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">数据库存储</text>

  <!-- Database cylinder icon -->
  <ellipse cx="490" cy="130" rx="28" ry="10" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.5"/>
  <rect x="462" y="130" width="56" height="36" fill="#D97757" opacity="0.08"/>
  <ellipse cx="490" cy="166" rx="28" ry="10" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.5"/>
  <line x1="462" y1="140" x2="462" y2="160" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="518" y1="140" x2="518" y2="160" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <text x="520" y="152" text-anchor="middle" font-size="10" fill="#D97757">pgvector</text>

  <!-- Sub-labels under right node -->
  <text x="520" y="190" text-anchor="middle" font-size="9" fill="#141413">语义查询 · 自动归档</text>
  <text x="520" y="204" text-anchor="middle" font-size="9" fill="#87867F">精准匹配 · 多 Agent 隔离</text>
  <text x="520" y="218" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">"给机器读"</text>

  <!-- Key insight caption at bottom -->
  <rect x="120" y="270" width="440" height="36" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="340" y="287" text-anchor="middle" font-size="11" fill="#141413" font-style="italic">"文件是给人看的，数据库是给机器读的"</text>
  <text x="340" y="300" text-anchor="middle" font-size="9" fill="#87867F">pgmemory 的设计逻辑：不是更好的文件管理，是重新定义记忆</text>
</svg>
