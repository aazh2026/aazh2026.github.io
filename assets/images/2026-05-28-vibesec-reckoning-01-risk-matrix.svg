  <!-- Right: Solutions -->
  <rect x="450" y="118" width="145" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="522" y="133" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">SAST + DAST 自动化扫描</text>
  <rect x="450" y="145" width="145" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="522" y="160" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">安全上下文文件</text>
  <rect x="605" y="118" width="145" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="677" y="133" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">Harness 工程门控</text>
  <rect x="605" y="145" width="145" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="677" y="160" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">部署前强制扫描</text>

