<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E3DACC" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="440" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="40" y="38" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#141413">VibeSec 清算：AI 编程的安全代价</text>
  <text x="40" y="58" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">2026 年 AI 生成代码安全风险数据矩阵</text>

  <!-- Header row -->
  <rect x="40" y="75" width="720" height="28" rx="6" fill="#141413"/>
  <text x="95" y="93" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">统计</text>
  <text x="350" y="93" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">含义</text>
  <text x="620" y="93" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">应对方案</text>

  <!-- Row 1: 25% vulnerable -->
  <rect x="40" y="110" width="720" height="70" rx="0" fill="url(#grid)"/>
  <rect x="40" y="110" width="720" height="70" rx="0" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="0.5"/>
  <rect x="55" y="120" width="90" height="50" rx="6" fill="#D97757"/>
  <text x="100" y="145" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#FAF9F5" text-anchor="middle">25%</text>
  <text x="100" y="163" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">含漏洞代码</text>
  <text x="230" y="137" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">每 4 行 AI 代码就有 1 行含已知漏洞</text>
  <text x="230" y="156" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">AppSec Santa 2026 | 78% 代码库含高危/严重漏洞</text>
  <rect x="450" y="120" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="520" y="134" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">SAST + DAST 强制扫描</text>
  <rect x="450" y="148" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="520" y="162" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">安全上下文文件</text>
  <rect x="600" y="120" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="134" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">Harness 工程门控</text>
  <rect x="600" y="148" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="162" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">部署前强制门控</text>

  <!-- Row 2: 73% prompt injection -->
  <rect x="40" y="183" width="720" height="70" rx="0" fill="url(#grid)"/>
  <rect x="40" y="183" width="720" height="70" rx="0" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="0.5"/>
  <rect x="55" y="193" width="90" height="50" rx="6" fill="#D97757"/>
  <text x="100" y="218" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#FAF9F5" text-anchor="middle">73%</text>
  <text x="100" y="236" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">Prompt 注入暴露</text>
  <text x="230" y="210" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">近 3/4 AI 系统存在 prompt injection 暴露</text>
  <text x="230" y="229" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">SQ Magazine 2026 | 44% 应用漏洞攻击同比增长</text>
  <rect x="450" y="193" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="520" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">输入隔离沙箱</text>
  <rect x="450" y="221" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="520" y="235" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">最小权限原则</text>
  <rect x="600" y="193" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">Red Team Prompt 测试</text>
  <rect x="600" y="221" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="235" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">不可绕过规则编码</text>

  <!-- Row 3: 42% AI generated + 62% security team overwhelmed -->
  <rect x="40" y="256" width="720" height="70" rx="0" fill="url(#grid)"/>
  <rect x="40" y="256" width="720" height="70" rx="0" fill="#87867F" fill-opacity="0.06" stroke="#87867F" stroke-width="0.5"/>
  <rect x="55" y="266" width="90" height="50" rx="6" fill="#87867F"/>
  <text x="100" y="288" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#FAF9F5" text-anchor="middle">62%</text>
  <text x="100" y="306" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">安全团队超负荷</text>
  <text x="230" y="283" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">安全团队表示跟上 AI 代码量越来越难</text>
  <text x="230" y="302" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">ProjectDiscovery 2026 | 42% 新企业软件由 AI 生成</text>
  <rect x="450" y="266" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="520" y="280" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">自动化安全情报 Feed</text>
  <rect x="450" y="294" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="520" y="308" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">把安全规则进 Builder</text>
  <rect x="600" y="266" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="280" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">每日 CVE 情报</text>
  <rect x="600" y="294" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="308" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">安全默认模板</text>

  <!-- Row 4: 1/5 data breaches from AI code -->
  <rect x="40" y="329" width="720" height="70" rx="0" fill="url(#grid)"/>
  <rect x="40" y="329" width="720" height="70" rx="0" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="0.5"/>
  <rect x="55" y="339" width="90" height="50" rx="6" fill="#D97757"/>
  <text x="100" y="363" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#FAF9F5" text-anchor="middle">1/5</text>
  <text x="100" y="381" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">数据泄露来源</text>
  <text x="230" y="356" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">企业数据泄露由 AI 代码引起（Aikido Security 2026）</text>
  <text x="230" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">Thoughtworks 案例：AI 两次推荐严重安全风险配置，在造成实际伤害前拦截</text>
  <rect x="450" y="339" width="140" height="22" rx="4" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="1"/>
  <text x="520" y="353" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D97757" text-anchor="middle">质疑 AI 建议的每个权限</text>
  <rect x="450" y="367" width="140" height="22" rx="4" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="1"/>
  <text x="520" y="381" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#D97757" text-anchor="middle">安全路径 ≠ 阻力最小路径</text>
  <rect x="600" y="339" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="353" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">零信任执行</text>
  <rect x="600" y="367" width="140" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="670" y="381" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">Secret Manager 强制</text>

  <!-- Bottom insight bar -->
  <rect x="40" y="410" width="720" height="24" rx="6" fill="#141413"/>
  <text x="400" y="426" font-family="system-ui, sans-serif" font-size="11" fill="#D1CFC5" text-anchor="middle">告诉 AI「要安全」≠ 强制它安全：Prompt 可以被覆盖、被误解、被忽略 | 核心：从「建议」到「门控」的转换</text>
</svg>
