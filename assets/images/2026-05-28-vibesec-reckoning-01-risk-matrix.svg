<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E3DACC" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="440" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="40" y="38" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#141413">VibeSec 清算：AI 编程的安全代价</text>
  <text x="40" y="58" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">2026 年 AI 生成代码安全风险数据矩阵</text>

  <!-- Grid area: 4 columns × 3 rows -->
  <!-- Row labels: High/Critical Risk | Medium Risk | Low Risk -->
  <!-- Col labels: Stat | What It Means | Why It Matters -->

