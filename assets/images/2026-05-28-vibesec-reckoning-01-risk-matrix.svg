  <rect x="40" y="75" width="720" height="28" rx="6" fill="#141413"/>
  <text x="90" y="93" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">统计</text>
  <text x="340" y="93" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">含义</text>
  <text x="590" y="93" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">应对方案</text>

