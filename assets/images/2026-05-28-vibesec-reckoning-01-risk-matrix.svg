  <text x="230" y="229" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">来源：SQ Magazine 2026 | 44% 应用漏洞攻击同比增长</text>
  <rect x="450" y="191" width="145" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="522" y="206" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">输入隔离沙箱</text>
  <rect x="450" y="218" width="145" height="22" rx="4" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="522" y="233" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#788C5D" text-anchor="middle">最小权限原则</text>
