<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- TDD 死亡与重生：意图驱动四层架构 -->
  <rect width="560" height="220" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">意图驱动开发：四层协作架构</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/18</text>

  <!-- L4: Intent Definition (top) -->
  <rect x="40" y="50" width="480" height="52" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="50" width="480" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="65" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L4 · 意图定义层</text>
  <text x="60" y="82" font-size="10.5" fill="#141413">业务分析师 + 产品经理</text>
  <text x="60" y="96" font-size="10" fill="#87867F">提供业务规则、验收标准</text>
  <rect x="490" y="60" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="73" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L4</text>

  <!-- Arrow -->
  <line x1="280" y1="102" x2="280" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,112 280,120 284,102" fill="#D1CFC5"/>

  <!-- L3: Contract Design -->
  <rect x="40" y="120" width="480" height="44" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="40" y="120" width="480" height="18" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="60" y="135" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">L3 · 契约设计层</text>
  <text x="200" y="135" font-size="12" fill="#141413" font-weight="600">意图架构师</text>
  <text x="60" y="152" font-size="10" fill="#87867F">转化为可验证的意图表达</text>
  <rect x="490" y="130" width="18" height="18" rx="9" fill="#EA580C"/>
  <text x="499" y="143" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L3</text>

  <!-- Arrow -->
  <line x1="280" y1="164" x2="280" y2="174" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,174 280,182 284,164" fill="#D1CFC5"/>

  <!-- L2: AI Execution -->
  <rect x="40" y="182" width="480" height="36" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="182" width="480" height="16" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="196" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L2 · AI执行层</text>
  <text x="180" y="196" font-size="12" fill="#141413" font-weight="600">AI 工具链</text>
  <text x="60" y="212" font-size="10" fill="#87867F">生成代码 + 测试 + 文档</text>

  <!-- Note -->
  <text x="280" y="220" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">L4 提供意图 → L3 转化契约 → L2 AI 执行 → L1 人机协作验收</text>
</svg>