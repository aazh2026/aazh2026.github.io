<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 800 450">
  <path fill="#faf9f5" d="M0 0h800v450H0z"/>
  <text x="400" y="30" fill="#141413" font-size="16" font-weight="700" letter-spacing="1" text-anchor="middle">Weight Norm Clipping 效果对比</text>
  <text x="400" y="48" fill="#87867f" font-size="11" text-anchor="middle">强制平滑权重范数，18-66 倍加速 Grokking</text>
  <g transform="translate(175 230)">
    <rect width="310" height="310" x="-155" y="-155" fill="#e3dacc" opacity=".35" rx="16"/>
    <text y="-132" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">Baseline (AdamW)</text>
    <text y="-116" fill="#87867f" font-size="10" text-anchor="middle">无 Weight Norm Clipping</text>
    <text fill="#141413" font-size="11" font-weight="600" transform="translate(-130 -90)">训练 vs 验证准确率</text>
    <path stroke="#87867f" stroke-width="1.5" d="M-130-90V30m0 0h230"/>
    <text x="-5" y="5" fill="#87867f" font-size="9" text-anchor="end" transform="translate(-130 -90)">100%</text>
    <text x="-5" y="62" fill="#87867f" font-size="9" text-anchor="end" transform="translate(-130 -90)">50%</text>
    <text x="-5" y="120" fill="#87867f" font-size="9" text-anchor="end" transform="translate(-130 -90)">0%</text>
    <text x="115" y="138" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(-130 -90)">训练步数</text>
    <path fill="none" stroke="#d97757" stroke-width="2.5" d="m-130-85 40-2 40-1 40-1h80"/>
    <path fill="none" stroke="#141413" stroke-width="2.5" d="M-130 28H0l40-2 40-16 20-95"/>
    <text x="200" y="80" fill="#d97757" font-size="9" font-weight="600" transform="translate(-130 -90)">~100K步</text>
    <text x="200" y="92" fill="#d97757" font-size="9" transform="translate(-130 -90)">才泛化</text>
    <path stroke="#d97757" stroke-width="1.5" d="m65 6 15 4"/>
    <text y="88" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">泛化步数: ~100K</text>
    <text y="104" fill="#d97757" font-size="11" text-anchor="middle">失败率: 20%</text>
    <text y="120" fill="#87867f" font-size="10" text-anchor="middle">不稳定，大量试错</text>
  </g>
  <path stroke="#d1cfc5" stroke-dasharray="6 4" stroke-width="2" d="M400 60v320"/>
  <text x="400" y="55" fill="#d97757" font-size="20" text-anchor="middle">→</text>
  <g transform="translate(625 230)">
    <rect width="310" height="310" x="-155" y="-155" fill="#788c5d" opacity=".15" rx="16"/>
    <text y="-132" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">Lion + Weight Norm Clipping</text>
    <text y="-116" fill="#87867f" font-size="10" text-anchor="middle">max_norm=1.0, 每步裁剪</text>
    <text fill="#141413" font-size="11" font-weight="600" transform="translate(-130 -90)">训练 vs 验证准确率</text>
    <path stroke="#87867f" stroke-width="1.5" d="M-130-90V30m0 0h230"/>
    <text x="-5" y="5" fill="#87867f" font-size="9" text-anchor="end" transform="translate(-130 -90)">100%</text>
    <text x="-5" y="62" fill="#87867f" font-size="9" text-anchor="end" transform="translate(-130 -90)">50%</text>
    <text x="-5" y="120" fill="#87867f" font-size="9" text-anchor="end" transform="translate(-130 -90)">0%</text>
    <text x="115" y="138" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(-130 -90)">训练步数</text>
    <path fill="none" stroke="#d97757" stroke-width="2.5" d="m-130 20 20-60 20-40 20-7 40-1 60-1h40"/>
    <path fill="none" stroke="#788c5d" stroke-width="2.5" d="m-130 28 20-18 20-85 20-12 40-1 60-1h40"/>
    <text x="55" y="35" fill="#788c5d" font-size="9" font-weight="600" transform="translate(-130 -90)">~1.5K步</text>
    <text x="55" y="47" fill="#788c5d" font-size="9" transform="translate(-130 -90)">即泛化!</text>
    <path stroke="#788c5d" stroke-width="1.5" d="M-70-38v-42"/>
    <text y="88" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">泛化步数: ~1.5K</text>
    <text y="104" fill="#788c5d" font-size="11" text-anchor="middle">失败率: 0%</text>
    <text y="120" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">300 随机种子零失败</text>
  </g>
  <g transform="translate(400 395)">
    <rect width="180" height="44" x="-90" y="-22" fill="#d97757" rx="22"/>
    <text y="-4" fill="#faf9f5" font-size="14" font-weight="800" text-anchor="middle">66× Speedup</text>
    <text y="14" fill="#e3dacc" font-size="10" text-anchor="middle">仅需 5 行代码</text>
  </g>
  <text x="400" y="435" fill="#87867f" font-size="10" text-anchor="middle">核心：限制权重范数 → 阻止过度记忆 → 强制学习泛化规律</text>
</svg>
