<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#141413" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#141413" letter-spacing="-0.3">AI 原生写作：六维对比</text>
  <line x1="180" y1="50" x2="620" y2="50" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Radar chart: center at (260, 245), 6 axes, max radius 155 -->
  <!-- Axes: 0=Info Density, 1=Visual Clarity, 2=Sharing, 3=Interactivity, 4=>100 Lines, 5=Use Cases -->

  <!-- Markdown hexagon (smaller, gray) -->
  <!-- MD points (6 axes, radius 85): -->
  <!-- Info Density=2, Visual Clarity=2, Sharing=4, Interactivity=1, >100 Lines=1, Use Cases=5 -->
  <!-- Angles: -90, -30, 30, 90, 150, 210 (clockwise from top) -->
  <!-- Actually let's do: 0=top(-90°), 1=right-bottom(-30°), 2=right(30°), 3=right-bottom2(90°), 4=left-bottom2(150°), 5=left(210°) -->
  <!-- SVG angles: 0=right, clockwise positive -->
  <!-- Let's place 0 at top (270°), then 30° apart clockwise -->
  <!-- 0: 270° (top), 1: 300°, 2: 330°, 3: 0°(right), 4: 30°, 5: 60° -->

  <!-- Markdown polygon -->
  <!-- 0: 270°, r=60 -->
  <!-- 1: 300°, r=60 -->
  <!-- 2: 330°, r=65 -->
  <!-- 3: 0°, r=30 -->
  <!-- 4: 30°, r=40 -->
  <!-- 5: 60°, r=70 -->

  <!-- HTML polygon -->
  <!-- 0: 270°, r=130 -->
  <!-- 1: 300°, r=125 -->
  <!-- 2: 330°, r=130 -->
  <!-- 3: 0°, r=110 -->
  <!-- 4: 30°, r=120 -->
  <!-- 5: 60°, r=130 -->

  <!-- Grid circles -->
  <g transform="translate(280, 240)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#D1CFC5" stroke-width="1"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#D1CFC5" stroke-width="1"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>

    <!-- Axis lines -->
    <line x1="0" y1="-145" x2="0" y2="145" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="0" y1="-145" x2="125" y2="72" stroke="#D1CFC5" stroke-width="1" transform="rotate(0)"/>
    <line x1="0" y1="-145" x2="125" y2="72" stroke="#D1CFC5" stroke-width="1" transform="rotate(60)"/>
    <line x1="0" y1="-145" x2="0" y2="145" stroke="#D1CFC5" stroke-width="1" transform="rotate(120)"/>
    <line x1="0" y1="-145" x2="125" y2="72" stroke="#D1CFC5" stroke-width="1" transform="rotate(180)"/>
    <line x1="0" y1="-145" x2="125" y2="72" stroke="#D1CFC5" stroke-width="1" transform="rotate(240)"/>

    <!-- Markdown hexagon -->
    <!-- Axis 0 (top): r=60 -->
    <!-- Axis 1 (60°): r=62 -->
    <!-- Axis 2 (120°): r=65 -->
    <!-- Axis 3 (180°): r=30 -->
    <!-- Axis 4 (240°): r=40 -->
    <!-- Axis 5 (300°): r=72 -->
    <polygon points="0,-60 53.7,-31 32.5,56.3 -60,0 -20,-69.3 -36,62.2" fill="#D1CFC5" opacity="0.45" stroke="#87867F" stroke-width="1.5"/>

    <!-- HTML polygon -->
    <!-- Axis 0 (top): r=135 -->
    <!-- Axis 1 (60°): r=128 -->
    <!-- Axis 2 (120°): r=130 -->
    <!-- Axis 3 (180°): r=105 -->
    <!-- Axis 4 (240°): r=120 -->
    <!-- Axis 5 (300°): r=132 -->
    <polygon points="0,-135 110.9,-64 65,112.6 -105,0 -60,-103.9 -66,114.3" fill="#D97757" opacity="0.18" stroke="#D97757" stroke-width="2.5"/>

    <!-- Axis labels -->
    <text x="0" y="-152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">信息密度</text>
    <text x="0" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">HTML/MD</text>

    <text x="133" y="-62" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">视觉清晰度</text>

    <text x="133" y="78" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">分享便利</text>

    <text x="0" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">交互性</text>

    <text x="-133" y="78" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">>100行可读</text>

    <text x="-133" y="-62" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">适用场景</text>

    <!-- Legend -->
    <rect x="-20" y="195" width="14" height="14" rx="3" fill="#D1CFC5" stroke="#87867F" stroke-width="1"/>
    <text x="2" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">Markdown</text>
    <rect x="100" y="195" width="14" height="14" rx="3" fill="#D97757" opacity="0.25" stroke="#D97757" stroke-width="1.5"/>
    <text x="122" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">HTML</text>
  </g>

  <!-- Right panel: 4 usage scenarios -->
  <rect x="510" y="72" width="270" height="320" rx="14" fill="#FAF9F5" filter="url(#shadow2)"/>
  <rect x="510" y="72" width="270" height="48" rx="14" fill="#D97757" opacity="0.9"/>
  <rect x="510" y="106" width="270" height="14" fill="#D97757" opacity="0.9"/>
  <text x="645" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#FAF9F5">HTML 典型场景</text>

  <g transform="translate(528, 135)">
    <!-- Scenario 1 -->
    <rect x="0" y="0" width="234" height="50" rx="8" fill="#E3DACC" opacity="0.6"/>
    <circle cx="14" cy="25" r="6" fill="#D97757"/>
    <text x="28" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#141413">Specs &amp; 规划文档</text>
    <text x="28" y="36" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#87867F">tabs · 图表 · 链接导航</text>

    <!-- Scenario 2 -->
    <rect x="0" y="58" width="234" height="50" rx="8" fill="#E3DACC" opacity="0.4"/>
    <circle cx="14" cy="83" r="6" fill="#788C5D"/>
    <text x="28" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#141413">代码审查 &amp; 说明</text>
    <text x="28" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#87867F">diff · 流程图 · 模块关系</text>

    <!-- Scenario 3 -->
    <rect x="0" y="116" width="234" height="50" rx="8" fill="#E3DACC" opacity="0.4"/>
    <circle cx="14" cy="141" r="6" fill="#87867F"/>
    <text x="28" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#141413">设计 &amp; 原型</text>
    <text x="28" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#87867F">sliders · 参数调整 · 动画</text>

    <!-- Scenario 4 -->
    <rect x="0" y="174" width="234" height="50" rx="8" fill="#E3DACC" opacity="0.4"/>
    <circle cx="14" cy="199" r="6" fill="#D97757" opacity="0.7"/>
    <text x="28" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#141413">报告 &amp; 研究</text>
    <text x="28" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#87867F">SVG图表 · 多数据源综合</text>
  </g>

  <!-- Bottom insight -->
  <rect x="40" y="400" width="720" height="34" rx="10" fill="#141413" opacity="0.04"/>
  <text x="400" y="421" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#141413" font-style="italic">核心洞察：格式即思想 — HTML 是对话的延续，Markdown 是对话的终结</text>
</svg>
