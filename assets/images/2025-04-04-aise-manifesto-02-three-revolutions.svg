<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">软件工程的三次革命</text>
  <text x="300" y="46" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">AI-Native软件工程宣言 · 2025/04/04</text>

  <!-- Card 1: 1960s -->
  <rect x="40" y="66" width="160" height="150" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="66" width="160" height="26" rx="8" fill="#D97757"/>
  <rect x="40" y="84" width="160" height="8" fill="#D97757"/>
  <text x="120" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">1960s</text>
  <text x="120" y="114" text-anchor="middle" font-size="12" fill="#D97757" font-weight="600">高级语言革命</text>
  <text x="120" y="136" text-anchor="middle" font-size="10" fill="#141413">汇编 → Fortran / C</text>
  <text x="120" y="156" text-anchor="middle" font-size="10" fill="#87867F">程序员不再需要</text>
  <text x="120" y="170" text-anchor="middle" font-size="10" fill="#87867F">直接操作硬件</text>
  <!-- Arrow under card 1 -->
  <line x1="220" y1="141" x2="250" y2="141" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="250,141 242,137 242,145" fill="#D1CFC5"/>
  <text x="235" y="130" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">从机器思维</text>
  <text x="235" y="158" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">到人类思维</text>

  <!-- Card 2: 1990s -->
  <rect x="260" y="66" width="160" height="150" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="260" y="66" width="160" height="26" rx="8" fill="#D97757"/>
  <rect x="260" y="84" width="160" height="8" fill="#D97757"/>
  <text x="340" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">1990s</text>
  <text x="340" y="114" text-anchor="middle" font-size="12" fill="#D97757" font-weight="600">开源运动</text>
  <text x="340" y="136" text-anchor="middle" font-size="10" fill="#141413">封闭软件 → 开源协作</text>
  <text x="340" y="156" text-anchor="middle" font-size="10" fill="#87867F">软件不再是</text>
  <text x="340" y="170" text-anchor="middle" font-size="10" fill="#87867F">个人作品</text>
  <!-- Arrow under card 2 -->
  <line x1="440" y1="141" x2="470" y2="141" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="470,141 462,137 462,145" fill="#D1CFC5"/>
  <text x="455" y="130" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">从个人创造</text>
  <text x="455" y="158" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">到协作网络</text>

  <!-- Card 3: 2020s -->
  <rect x="480" y="66" width="80" height="150" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2.2"/>
  <rect x="480" y="66" width="80" height="26" rx="8" fill="#D97757"/>
  <rect x="480" y="84" width="80" height="8" fill="#D97757"/>
  <text x="520" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">2020s</text>
  <text x="520" y="114" text-anchor="middle" font-size="12" fill="#D97757" font-weight="600">AI-Native</text>
  <text x="520" y="136" text-anchor="middle" font-size="10" fill="#141413">人工编码</text>
  <text x="520" y="150" text-anchor="middle" font-size="10" fill="#141413">→ AI生成</text>
  <text x="520" y="170" text-anchor="middle" font-size="10" fill="#87867F">意图架构师</text>

  <!-- Source line -->
  <text x="300" y="280" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">AI-Native软件工程宣言 · 2025/04/04</text>

  <title>软件工程的三次革命</title>
  <desc>时间线图：1960s高级语言革命（汇编到Fortran/C）、1990s开源运动（封闭软件到开源协作）、2020s AI-Native（人工编码到AI生成）</desc>
</svg>