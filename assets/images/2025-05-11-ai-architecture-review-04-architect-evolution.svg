<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 300">
  <title>架构师角色演进：从设计者到治理者</title>
  <desc>
    传统架构师 vs AI时代架构师的角色变化对比
  </desc>
  <path fill="#faf9f5" d="M0 0h680v300H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">架构师角色演进：从设计者到治理者</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">关键转变：从执行者到治理者</text>
  <rect width="240" height="170" x="30" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="240" height="30" x="30" y="62" fill="#e3dacc" rx="8"/>
  <path fill="#e3dacc" d="M30 84h240v8H30z"/>
  <text x="150" y="81" fill="#141413" font-family="ui-monospace, monospace" font-size="11.5" font-weight="600" text-anchor="middle">传统架构师</text>
  <rect width="70" height="18" x="55" y="100" fill="#f0eee6" stroke="#d1cfc5" rx="9"/>
  <text x="90" y="113" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">执行者</text>
  <text x="55" y="140" fill="#141413" font-size="10.5">· 设计系统架构</text>
  <text x="55" y="158" fill="#141413" font-size="10.5">· 编写架构文档</text>
  <text x="55" y="176" fill="#141413" font-size="10.5">· 技术选型决策</text>
  <text x="55" y="194" fill="#141413" font-size="10.5">· 指导开发团队</text>
  <text x="55" y="212" fill="#141413" font-size="10.5">· 手工评审</text>
  <path stroke="#d97757" stroke-width="2" d="M270 147h60"/>
  <path fill="#d97757" d="m330 143-8 4v4z"/>
  <text x="300" y="136" fill="#d97757" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">角色演进</text>
  <rect width="280" height="170" x="340" y="62" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <rect width="280" height="30" x="340" y="62" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M340 84h280v8H340z"/>
  <text x="480" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="11.5" font-weight="600" text-anchor="middle">AI时代架构师</text>
  <rect width="70" height="18" x="365" y="100" fill="#d97757" rx="9"/>
  <text x="400" y="113" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">治理者</text>
  <text x="365" y="140" fill="#141413" font-size="10.5">· 定义架构原则与标准</text>
  <text x="365" y="158" fill="#141413" font-size="10.5">· 设计评审流程机制</text>
  <text x="365" y="176" fill="#141413" font-size="10.5">· 治理AI生成架构质量</text>
  <text x="365" y="194" fill="#141413" font-size="10.5">· 培养团队架构能力</text>
  <text x="365" y="212" fill="#141413" font-size="10.5">· 审查AI方案与决策</text>
  <rect width="620" height="36" x="30" y="246" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="6"/>
  <text x="340" y="268" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">核心转变：架构师从&quot;设计者&quot;进化为&quot;治理者&quot;——定义原则、评审AI产出、治理架构质量</text>
  <rect width="10" height="10" x="30" y="288" fill="#e3dacc" stroke="#d1cfc5" rx="2"/>
  <text x="46" y="297" fill="#87867f" font-size="9">传统角色</text>
  <rect width="10" height="10" x="110" y="288" fill="#d97757" rx="2"/>
  <text x="126" y="297" fill="#87867f" font-size="9">AI时代角色</text>
  <path stroke="#d97757" stroke-width="2" d="M210 293h30"/>
  <path fill="#d97757" d="m240 289-8 4v4z"/>
  <text x="250" y="297" fill="#87867f" font-size="9">角色转变</text>
</svg>
