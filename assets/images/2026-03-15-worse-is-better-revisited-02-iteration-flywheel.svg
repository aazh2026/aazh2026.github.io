<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 420">
  <title>Iteration Flywheel: Worse is Better + AI</title>
  <desc>
    迭代飞轮图：快速发布 → 获取反馈 → AI 迭代 → 持续进化，代码生成成本趋近于零使快速试错成为主动策略。
  </desc>
  <path fill="#faf9f5" d="M0 0h680v420H0z"/>
