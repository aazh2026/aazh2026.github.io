  <text x="340" y="390" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">飞轮一旦转动，每一圈都在加速</text>
  <rect width="110" height="30" x="550" y="180" fill="#fef9f5" stroke="#d97757" rx="4"/>
  <text x="605" y="195" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">试错成本 ↓ 90%</text>
  <text x="605" y="207" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">迭代速度 ↑ 10x</text>
