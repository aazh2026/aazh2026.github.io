  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AI-Native Engineering · 代码生成成本 → 0</text>
  <circle cx="340" cy="210" r="55" fill="#fff" stroke="#d1cfc5" stroke-width="1.5"/>
