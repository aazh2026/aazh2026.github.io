  <text x="340" y="216" fill="#141413" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Cost</text>
  <text x="340" y="234" fill="#d97757" font-family="ui-monospace, monospace" font-size="16" font-weight="700" text-anchor="middle">→ 0</text>
  <rect width="160" height="90" x="400" y="80" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <rect width="20" height="20" x="536" y="90" fill="#d97757" rx="10"/>
  <text x="546" y="105" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">1</text>
  <text x="480" y="112" fill="#d97757" font-size="13" font-weight="600">Quick Release</text>
  <text x="480" y="132" fill="#141413" font-size="10.5">快速发布可用的</text>
  <text x="480" y="148" fill="#141413" font-size="10.5">第一版本</text>
  <text x="480" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">AI 生成成本 ≈ 0</text>
  <rect width="160" height="90" x="400" y="250" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <rect width="20" height="20" x="536" y="260" fill="#788c5d" rx="10"/>
  <text x="546" y="275" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">2</text>
  <text x="480" y="282" fill="#788c5d" font-size="13" font-weight="600">Get Feedback</text>
  <text x="480" y="302" fill="#141413" font-size="10.5">在真实世界中</text>
  <text x="480" y="318" fill="#141413" font-size="10.5">获取用户反馈</text>
  <text x="480" y="334" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">验证方向正确性</text>
  <rect width="160" height="90" x="120" y="250" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <rect width="20" height="20" x="124" y="260" fill="#d97757" rx="10"/>
  <text x="134" y="275" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">3</text>
  <text x="200" y="282" fill="#d97757" font-size="13" font-weight="600">AI Iterate</text>
  <text x="200" y="302" fill="#141413" font-size="10.5">用 AI 快速修复</text>
  <text x="200" y="318" fill="#141413" font-size="10.5">问题和迭代</text>
  <text x="200" y="334" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">AI 重构 + 重新设计</text>
  <rect width="160" height="90" x="120" y="80" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <rect width="20" height="20" x="124" y="90" fill="#788c5d" rx="10"/>
  <text x="134" y="105" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">4</text>
  <text x="200" y="112" fill="#788c5d" font-size="13" font-weight="600">Evolve</text>
  <text x="200" y="132" fill="#141413" font-size="10.5">持续进化</text>
  <text x="200" y="148" fill="#141413" font-size="10.5">系统与能力</text>
  <text x="200" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">累积学习复利</text>
