<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400"><defs><style>text{font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif}</style></defs><rect width="620" height="400" fill="#faf9f5" rx="12"/><text x="24" y="36" fill="#141413" font-size="15" font-weight="700">RAG 工作原理：文档如何被 AI 读取</text><text x="24" y="54" fill="#87867f" font-size="10">How RAG Systems Read Documents: Chunking &amp; Retrieval</text><rect width="160" height="240" x="24" y="75" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="104" y="95" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">原始文档</text><text x="104" y="110" fill="#87867f" font-size="9" text-anchor="middle">Original Document</text><rect width="132" height="6" x="38" y="122" fill="#d1cfc5" rx="2"/><rect width="120" height="6" x="38" y="133" fill="#d1cfc5" rx="2"/><rect width="132" height="6" x="38" y="144" fill="#d1cfc5" rx="2"/><rect width="100" height="6" x="38" y="155" fill="#d1cfc5" rx="2"/><path stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M38 168h132"/><text x="40" y="180" fill="#d97757" font-size="8">切分点</text><rect width="132" height="6" x="38" y="188" fill="#d1cfc5" rx="2"/><rect width="120" height="6" x="38" y="199" fill="#d1cfc5" rx="2"/><rect width="132" height="6" x="38" y="210" fill="#d1cfc5" rx="2"/><rect width="90" height="6" x="38" y="221" fill="#d1cfc5" rx="2"/><path stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M38 234h132"/><text x="40" y="246" fill="#d97757" font-size="8">切分点</text><rect width="132" height="6" x="38" y="254" fill="#d1cfc5" rx="2"/><rect width="115" height="6" x="38" y="265" fill="#d1cfc5" rx="2"/><rect width="132" height="6" x="38" y="276" fill="#d1cfc5" rx="2"/><rect width="80" height="6" x="38" y="287" fill="#d1cfc5" rx="2"/><path stroke="#788c5d" stroke-width="2.5" d="M184 195h21"/><path fill="#788c5d" d="m205 191 7 4-7 4z"/><text x="194" y="186" fill="#788c5d" font-size="8.5" text-anchor="middle">切分</text><rect width="148" height="240" x="212" y="75" fill="#faf9f5" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" rx="8"/><text x="286" y="95" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">语义分块</text><text x="286" y="110" fill="#87867f" font-size="9" text-anchor="middle">Semantic Chunks</text><rect width="128" height="34" x="222" y="126" fill="#d97757" opacity=".75" rx="5"/><text x="286" y="138" fill="#faf9f5" font-size="9" text-anchor="middle">Chunk 1 · 512 tokens</text><rect width="128" height="34" x="222" y="166" fill="#d97757" opacity=".75" rx="5"/><text x="286" y="178" fill="#faf9f5" font-size="9" text-anchor="middle">Chunk 2 · 512 tokens</text><rect width="128" height="34" x="222" y="206" fill="#d97757" opacity=".75" rx="5"/><text x="286" y="218" fill="#faf9f5" font-size="9" text-anchor="middle">Chunk 3 · 512 tokens</text><rect width="128" height="34" x="222" y="246" fill="#d97757" opacity=".75" rx="5"/><text x="286" y="258" fill="#faf9f5" font-size="9" text-anchor="middle">Chunk N · 512 tokens</text><path stroke="#788c5d" stroke-width="2.5" d="M360 195h21"/><path fill="#788c5d" d="m381 191 7 4-7 4z"/><text x="370" y="186" fill="#788c5d" font-size="8.5" text-anchor="middle">向量化</text><rect width="208" height="150" x="388" y="75" fill="#141413" rx="8"/><text x="492" y="95" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">向量数据库</text><text x="492" y="110" fill="#87867f" font-size="9" text-anchor="middle">Vector Database</text><text x="404" y="132" fill="#d1cfc5" font-size="8">Chunk 1 → [0.12, -0.34, 0.87, ...]</text><text x="404" y="148" fill="#d1cfc5" font-size="8">Chunk 2 → [0.45, 0.21, -0.09, ...]</text><text x="404" y="164" fill="#d1cfc5" font-size="8">Chunk 3 → [-0.67, 0.43, 0.12, ...]</text><text x="404" y="180" fill="#d1cfc5" font-size="8">Chunk N → [0.33, -0.78, 0.56, ...]</text><text x="404" y="200" fill="#788c5d" font-size="8">语义相似度检索</text><rect width="208" height="80" x="388" y="235" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="404" y="255" fill="#141413" font-size="9" font-weight="700">用户提问</text><text x="404" y="270" fill="#141413" font-size="8.5">&quot;如何优化查询性能？&quot;</text><text x="404" y="286" fill="#87867f" font-size="8">→ 查询向量</text><text x="404" y="299" fill="#788c5d" font-size="8">→ 匹配最相似的 Chunk</text><path stroke="#d97757" stroke-width="2" d="M492 225v10"/><path fill="#d97757" d="m488 235 4 7 4-7z"/><rect width="572" height="56" x="24" y="330" fill="#d97757" stroke="#d97757" opacity=".1" rx="6"/><text x="40" y="350" fill="#d97757" font-size="9.5" font-weight="700">⚠ 关键问题：切分可能破坏上下文</text><text x="40" y="366" fill="#141413" font-size="9">&quot;这种设计模式的优势在于…（切分点）…能够显著提高性能&quot;</text><text x="40" y="380" fill="#87867f" font-size="8.5">AI 只看到&quot;能够显著提高性能&quot;，不知道&quot;这种设计模式&quot;是什么。</text></svg>