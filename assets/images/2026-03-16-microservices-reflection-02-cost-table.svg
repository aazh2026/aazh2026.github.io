<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">本地开发成本对比</text>
  <text x="300" y="40" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">单体 vs 微服务 · 日常开发场景</text>

  <!-- Left column: Monolith -->
  <rect x="40" y="55" width="230" height="280" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>

  <!-- Monolith header -->
  <rect x="40" y="55" width="230" height="36" rx="8" fill="#788C5D"/>
  <rect x="40" y="75" width="230" height="16" fill="#788C5D"/>
  <text x="155" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">单体 Monolith</text>

  <!-- Monolith rows -->
  <rect x="52" y="103" width="206" height="52" rx="6" fill="#F5F4F0" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="121" font-size="11" font-weight="600" fill="#141413">本地开发</text>
  <text x="64" y="137" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">python app.py</text>
  <text x="64" y="150" font-size="9.5" fill="#87867F">一个命令启动全部</text>

  <rect x="52" y="161" width="206" height="52" rx="6" fill="#F5F4F0" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="179" font-size="11" font-weight="600" fill="#141413">调试</text>
  <text x="64" y="195" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">单步调试</text>
  <text x="64" y="208" font-size="9.5" fill="#87867F">IDE 原生支持</text>

  <rect x="52" y="219" width="206" height="52" rx="6" fill="#F5F4F0" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="237" font-size="11" font-weight="600" fill="#141413">测试</text>
  <text x="64" y="253" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">单元 + 集成测试</text>
  <text x="64" y="266" font-size="9.5" fill="#87867F">单进程，无网络依赖</text>

  <rect x="52" y="277" width="206" height="52" rx="6" fill="#F5F4F0" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="295" font-size="11" font-weight="600" fill="#141413">API 变更</text>
  <text x="64" y="311" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">修改函数签名</text>
  <text x="64" y="324" font-size="9.5" fill="#87867F">IDE 重构，一次搞定</text>

  <!-- Right column: Microservices -->
  <rect x="330" y="55" width="230" height="280" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>

  <!-- Microservices header -->
  <rect x="330" y="55" width="230" height="36" rx="8" fill="#D97757"/>
  <rect x="330" y="75" width="230" height="16" fill="#D97757"/>
  <text x="445" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">微服务 Microservices</text>

  <!-- Microservices rows -->
  <rect x="342" y="103" width="206" height="52" rx="6" fill="#FDF6F4" stroke="#D1CFC5" stroke-width="1"/>
  <text x="354" y="121" font-size="11" font-weight="600" fill="#141413">本地开发</text>
  <text x="354" y="137" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">启动 N 个服务</text>
  <text x="354" y="150" font-size="9.5" fill="#87867F">配置端口，处理服务依赖</text>

  <rect x="342" y="161" width="206" height="52" rx="6" fill="#FDF6F4" stroke="#D1CFC5" stroke-width="1"/>
  <text x="354" y="179" font-size="11" font-weight="600" fill="#141413">调试</text>
  <text x="354" y="195" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">分布式追踪</text>
  <text x="354" y="208" font-size="9.5" fill="#87867F">日志聚合，跨服务跳转</text>

  <rect x="342" y="219" width="206" height="52" rx="6" fill="#FDF6F4" stroke="#D1CFC5" stroke-width="1"/>
  <text x="354" y="237" font-size="11" font-weight="600" fill="#141413">测试</text>
  <text x="354" y="253" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">契约 + 端到端</text>
  <text x="354" y="266" font-size="9.5" fill="#87867F">多服务协调，网络不稳定</text>

  <rect x="342" y="277" width="206" height="52" rx="6" fill="#FDF6F4" stroke="#D1CFC5" stroke-width="1"/>
  <text x="354" y="295" font-size="11" font-weight="600" fill="#141413">API 变更</text>
  <text x="354" y="311" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">版本管理</text>
  <text x="354" y="324" font-size="9.5" fill="#87867F">向后兼容，多团队协调</text>

  <!-- Hidden cost arrow on right side -->
  <line x1="560" y1="330" x2="560" y2="100" stroke="#D97757" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="560,100 554,112 566,112" fill="#D97757"/>
  <text x="570" y="215" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" writing-mode="tb">隐藏成本递进</text>

  <!-- Divider in middle -->
  <line x1="300" y1="70" x2="300" y2="320" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

</svg>