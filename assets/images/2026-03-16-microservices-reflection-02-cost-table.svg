<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 600 380"><path fill="#faf9f5" d="M0 0h600v380H0z"/><text x="300" y="24" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">本地开发成本对比</text><text x="300" y="40" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">单体 vs 微服务 · 日常开发场景</text><rect width="230" height="280" x="40" y="55" fill="#fff" stroke="#788c5d" stroke-width="2" rx="8"/><rect width="230" height="36" x="40" y="55" fill="#788c5d" rx="8"/><path fill="#788c5d" d="M40 75h230v16H40z"/><text x="155" y="77" fill="#fff" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">单体 Monolith</text><rect width="206" height="52" x="52" y="103" fill="#f5f4f0" stroke="#d1cfc5" rx="6"/><text x="64" y="121" fill="#141413" font-size="11" font-weight="600">本地开发</text><text x="64" y="137" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10">python app.py</text><text x="64" y="150" fill="#87867f" font-size="9.5">一个命令启动全部</text><rect width="206" height="52" x="52" y="161" fill="#f5f4f0" stroke="#d1cfc5" rx="6"/><text x="64" y="179" fill="#141413" font-size="11" font-weight="600">调试</text><text x="64" y="195" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10">单步调试</text><text x="64" y="208" fill="#87867f" font-size="9.5">IDE 原生支持</text><rect width="206" height="52" x="52" y="219" fill="#f5f4f0" stroke="#d1cfc5" rx="6"/><text x="64" y="237" fill="#141413" font-size="11" font-weight="600">测试</text><text x="64" y="253" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10">单元 + 集成测试</text><text x="64" y="266" fill="#87867f" font-size="9.5">单进程，无网络依赖</text><rect width="206" height="52" x="52" y="277" fill="#f5f4f0" stroke="#d1cfc5" rx="6"/><text x="64" y="295" fill="#141413" font-size="11" font-weight="600">API 变更</text><text x="64" y="311" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10">修改函数签名</text><text x="64" y="324" fill="#87867f" font-size="9.5">IDE 重构，一次搞定</text><rect width="230" height="280" x="330" y="55" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/><rect width="230" height="36" x="330" y="55" fill="#d97757" rx="8"/><path fill="#d97757" d="M330 75h230v16H330z"/><text x="445" y="77" fill="#fff" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">微服务 Microservices</text><rect width="206" height="52" x="342" y="103" fill="#fdf6f4" stroke="#d1cfc5" rx="6"/><text x="354" y="121" fill="#141413" font-size="11" font-weight="600">本地开发</text><text x="354" y="137" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">启动 N 个服务</text><text x="354" y="150" fill="#87867f" font-size="9.5">配置端口，处理服务依赖</text><rect width="206" height="52" x="342" y="161" fill="#fdf6f4" stroke="#d1cfc5" rx="6"/><text x="354" y="179" fill="#141413" font-size="11" font-weight="600">调试</text><text x="354" y="195" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">分布式追踪</text><text x="354" y="208" fill="#87867f" font-size="9.5">日志聚合，跨服务跳转</text><rect width="206" height="52" x="342" y="219" fill="#fdf6f4" stroke="#d1cfc5" rx="6"/><text x="354" y="237" fill="#141413" font-size="11" font-weight="600">测试</text><text x="354" y="253" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">契约 + 端到端</text><text x="354" y="266" fill="#87867f" font-size="9.5">多服务协调，网络不稳定</text><rect width="206" height="52" x="342" y="277" fill="#fdf6f4" stroke="#d1cfc5" rx="6"/><text x="354" y="295" fill="#141413" font-size="11" font-weight="600">API 变更</text><text x="354" y="311" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">版本管理</text><text x="354" y="324" fill="#87867f" font-size="9.5">向后兼容，多团队协调</text><path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M560 330V100"/><path fill="#d97757" d="m560 100-6 12h12z"/><text x="570" y="215" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" writing-mode="tb">隐藏成本递进</text><path stroke="#d1cfc5" stroke-dasharray="4,4" d="M300 70v250"/></svg>