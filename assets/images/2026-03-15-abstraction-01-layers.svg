<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" role="img" aria-label="抽象层级与认知负荷">
  <title>抽象层级与认知负荷</title>
  <desc>从自然语言到机器码的抽象层级金字塔</desc>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="620" height="360" fill="#FAF9F5"/>

  <!-- 外框标题 -->
  <rect x="15" y="12" width="590" height="336" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="30" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#141413">抽象层级与认知负荷</text>

  <!-- ========== L6: 自然语言 (最高抽象) ========== -->
  <rect x="30" y="48" width="560" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="40" y="58" width="44" height="32" rx="6" fill="#b45309"/>
  <text x="62" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">L6</text>
  <text x="100" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#92400e">高抽象层级</text>
  <text x="100" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b45309">"过滤错误日志" ← 领域概念</text>
  <text x="490" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#d97706">↑ 高生产力</text>

  <!-- ========== L5: Python ========== -->
  <rect x="60" y="110" width="500" height="45" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="120" width="44" height="25" rx="6" fill="#c2410c"/>
  <text x="92" y="137" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">L5</text>
  <text x="125" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#c2410c">[Python]</text>
  <text x="195" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#78716c">open().writelines(...) ← 标准库抽象</text>
  <text x="505" y="137" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#ea580c">↑</text>

  <!-- ========== L4: C ========== -->
  <rect x="90" y="165" width="440" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="175" width="44" height="25" rx="6" fill="#1e40af"/>
  <text x="122" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">L4</text>
  <text x="155" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1e40af">[C]</text>
  <text x="195" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#78716c">FILE*, fopen, fgets ← 系统调用封装</text>

  <!-- ========== L3: 内核 ========== -->
  <rect x="120" y="220" width="380" height="45" rx="8" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="230" width="44" height="25" rx="6" fill="#1d4ed8"/>
  <text x="152" y="247" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">L3</text>
  <text x="185" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1e40af">[内核]</text>
  <text x="235" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#78716c">read(), write(), 缓冲区管理 ← OS抽象</text>

  <!-- ========== L2: 硬件 (最低抽象) ========== -->
  <rect x="150" y="275" width="320" height="52" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="160" y="285" width="44" height="32" rx="6" fill="#047857"/>
  <text x="182" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">L2</text>
  <text x="215" y="297" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#065f46">低抽象层级</text>
  <text x="215" y="313" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">[硬件] 磁盘控制器, DMA, 中断 ← 物理世界</text>
  <text x="435" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#059669">↑ 高控制力</text>

  <!-- 右侧箭头指示 -->
  <path d="M570,74 L595,74" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#D1CFC5"/></marker></defs>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F" transform="rotate(-90,600,78)">认知负荷</text>
  <text x="600" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F" transform="rotate(-90,600,290)">认知负荷</text>

  <!-- 底部说明 -->
  <text x="310" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">核心洞见：优秀的程序员知道何时在正确的层级工作</text>
</svg>