<svg xmlns="http://www.w3.org/2000/svg" aria-label="四层成本监控模型" viewBox="0 0 520 260">
  <title>四层成本追踪模型</title>
  <desc>
    AI成本监控的四层追踪体系：资源层、请求层、会话层、业务层
  </desc>
  <defs>
    <filter id="shadow" width="110%" height="115%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h520v260H0z"/>
  <rect width="480" height="45" x="20" y="30" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <rect width="60" height="25" x="30" y="40" fill="#065f46" rx="4"/>
  <text x="60" y="57" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">L1</text>
  <text x="110" y="47" fill="#065f46" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600">资源层成本</text>
  <text x="110" y="63" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11">模型调用次数、缓存命中率、延迟</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#a1)" d="M260 75v20"/>
  <defs>
    <marker id="a1" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="6">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="480" height="45" x="20" y="100" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <rect width="60" height="25" x="30" y="110" fill="#1e40af" rx="4"/>
  <text x="60" y="127" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">L2</text>
  <text x="110" y="117" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600">请求层成本</text>
  <text x="110" y="133" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11">单次API调用的输入/输出Token</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#a2)" d="M260 145v20"/>
  <defs>
    <marker id="a2" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="6">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="480" height="45" x="20" y="170" fill="#fed7aa" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <rect width="60" height="25" x="30" y="180" fill="#c2410c" rx="4"/>
  <text x="60" y="197" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">L3</text>
  <text x="110" y="187" fill="#c2410c" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600">会话层成本</text>
  <text x="110" y="203" fill="#9a3412" font-family="system-ui,-apple-system,sans-serif" font-size="11">单次对话的累计Token和费用</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#a3)" d="M260 215v20"/>
  <defs>
    <marker id="a3" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="6">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="480" height="45" x="20" y="240" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <rect width="60" height="25" x="30" y="250" fill="#b45309" rx="4"/>
  <text x="60" y="267" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">L4</text>
  <text x="110" y="257" fill="#b45309" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600">业务层成本</text>
  <text x="110" y="273" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="11">每客户成本、每功能成本、ROI分析</text>
  <text x="490" y="52" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="end">最细粒度</text>
  <text x="490" y="240" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="end">最宏观</text>
</svg>
