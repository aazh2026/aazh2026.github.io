<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="100%">
  <defs>
    <marker id="arr6" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#D97757"/>
    </marker>
    <filter id="shadow6" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#D1CFC5" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="720" height="420" fill="#FAF9F5" rx="8"/>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#141413">Hierarchical 层级组织模式</text>

  <!-- CEO -->
  <g transform="translate(360,60)">
    <rect x="-100" y="-24" width="200" height="48" rx="8" fill="#E3DACC" stroke="#D97757" stroke-width="3" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#D97757">CEO Agent</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#141413">战略决策</text>
  </g>

  <!-- VP Layer -->
  <!-- Arrows CEO → VPs -->
  <path d="M 300,84 L 200,130" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arr6)"/>
  <path d="M 360,108 L 360,130" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arr6)"/>
  <path d="M 420,84 L 520,130" fill="none" stroke="#D97757" stroke-width="2" marker-end="url(#arr6)"/>

  <!-- VPSales -->
  <g transform="translate(180,160)">
    <rect x="-70" y="-22" width="140" height="44" rx="6" fill="#E3DACC" stroke="#87867F" stroke-width="2" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#141413">VP Sales</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">战术规划</text>
  </g>

  <!-- VPMkt -->
  <g transform="translate(360,160)">
    <rect x="-70" y="-22" width="140" height="44" rx="6" fill="#E3DACC" stroke="#87867F" stroke-width="2" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#141413">VP Marketing</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">战术规划</text>
  </g>

  <!-- VPProd -->
  <g transform="translate(540,160)">
    <rect x="-70" y="-22" width="140" height="44" rx="6" fill="#E3DACC" stroke="#87867F" stroke-width="2" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#141413">VP Product</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">战术规划</text>
  </g>

  <!-- Arrows VP → Manager -->
  <path d="M 150,186 L 100,230" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr6)"/>
  <path d="M 360,204 L 360,230" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr6)"/>
  <path d="M 570,186 L 620,230" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr6)"/>

  <!-- Manager Layer -->
  <!-- Mgr1 -->
  <g transform="translate(100,270)">
    <rect x="-60" y="-22" width="120" height="44" rx="6" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#141413">Manager</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">执行管理</text>
  </g>

  <!-- Mgr2 -->
  <g transform="translate(360,270)">
    <rect x="-60" y="-22" width="120" height="44" rx="6" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#141413">Manager</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">执行管理</text>
  </g>

  <!-- Mgr3 -->
  <g transform="translate(620,270)">
    <rect x="-60" y="-22" width="120" height="44" rx="6" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#141413">Manager</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">执行管理</text>
  </g>

  <!-- Arrows Mgr → Worker -->
  <path d="M 70,296 L 50,330" fill="none" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr6)"/>
  <path d="M 360,314 L 360,330" fill="none" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr6)"/>
  <path d="M 650,296 L 670,330" fill="none" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr6)"/>

  <!-- Worker Layer -->
  <!-- Worker1 -->
  <g transform="translate(50,370)">
    <rect x="-60" y="-20" width="120" height="40" rx="6" fill="#E3DACC" stroke="#788C5D" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#141413">Worker</text>
  </g>

  <!-- Worker2 -->
  <g transform="translate(360,370)">
    <rect x="-60" y="-20" width="120" height="40" rx="6" fill="#E3DACC" stroke="#788C5D" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#141413">Worker</text>
  </g>

  <!-- Worker3 -->
  <g transform="translate(670,370)">
    <rect x="-60" y="-20" width="120" height="40" rx="6" fill="#E3DACC" stroke="#788C5D" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#141413">Worker</text>
  </g>

  <!-- Layer labels on right -->
  <text x="690" y="65" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#D97757">战略层</text>
  <text x="690" y="170" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#87867F">战术层</text>
  <text x="690" y="280" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#141413">管理层</text>
  <text x="690" y="380" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#788C5D">执行层</text>
</svg>