<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%" role="img" aria-label="Two Pillars of AI Tool Evolution">
  <title>技能猎手：两大发现</title>
  <desc>pgmemory 与 deep-scout 构成 AI 工具的两大进化方向：持久记忆与深度研究</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#5a6b44"/>
    </linearGradient>
    <linearGradient id="scoutGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#b85f42"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="url(#bg)" rx="16"/>

  <!-- Header -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="13" fill="#87867F" text-anchor="middle" letter-spacing="2">AI 记忆进化论 · 2026-03-03</text>
  <line x1="280" y1="52" x2="520" y2="52" stroke="#D1CFC5" stroke-width="1"/>

  <!-- LEFT CARD: pgmemory -->
  <g filter="url(#shadow)">
    <rect x="40" y="68" width="340" height="320" rx="14" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>

  <!-- pgmemory header bar -->
  <rect x="40" y="68" width="340" height="48" rx="14" fill="url(#pgGrad)"/>
  <rect x="40" y="100" width="340" height="16" fill="url(#pgGrad)"/>
  <text x="210" y="98" font-family="Georgia, serif" font-size="16" fill="#FAF9F5" text-anchor="middle" font-weight="bold">pgmemory</text>
  <text x="210" y="116" font-family="system-ui, sans-serif" font-size="10" fill="#e8f0e0" text-anchor="middle">Agent 的「长期记忆」</text>

  <!-- pgmemory icon: brain + DB -->
  <g transform="translate(210, 182)">
    <!-- DB cylinder -->
    <ellipse cx="0" cy="20" rx="36" ry="12" fill="none" stroke="#788C5D" stroke-width="2"/>
    <line x1="-36" y1="20" x2="-36" y2="56" stroke="#788C5D" stroke-width="2"/>
    <line x1="36" y1="20" x2="36" y2="56" stroke="#788C5D" stroke-width="2"/>
    <ellipse cx="0" cy="56" rx="36" ry="12" fill="none" stroke="#788C5D" stroke-width="2"/>
    <ellipse cx="0" cy="38" rx="36" ry="12" fill="none" stroke="#788C5D" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- brain left half -->
    <path d="M-36,20 Q-48,5 -40,-8 Q-28,-18 -14,-14 Q-6,-22 6,-14 Q18,-22 28,-10 Q38,-2 36,14 Q38,28 24,38 Q10,48 -2,44 Q-14,48 -24,38 Q-34,28 -36,20Z" fill="#788C5D" opacity="0.25"/>
    <path d="M-36,20 Q-48,5 -40,-8 Q-28,-18 -14,-14 Q-6,-22 6,-14 Q18,-22 28,-10 Q38,-2 36,14 Q38,28 24,38 Q10,48 -2,44 Q-14,48 -24,38 Q-34,28 -36,20Z" fill="none" stroke="#788C5D" stroke-width="1.5"/>
    <!-- arrow -->
    <line x1="-4" y1="28" x2="4" y2="28" stroke="#788C5D" stroke-width="2" stroke-linecap="round"/>
    <polygon points="4,28 0,24 0,32" fill="#788C5D"/>
  </g>

  <!-- pgmemory features -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#141413">
    <text x="60" y="266" font-weight="bold" fill="#788C5D">●  语义搜索</text>
    <text x="60" y="284" font-weight="bold" fill="#788C5D">●  自动归档（Memory Decay）</text>
    <text x="60" y="302" font-weight="bold" fill="#788C5D">●  多 Agent 隔离</text>
    <text x="60" y="320" font-weight="bold" fill="#788C5D">●  精准查询 vs 人工翻阅</text>
  </g>

  <!-- insight tag -->
  <rect x="60" y="338" width="300" height="34" rx="6" fill="#E3DACC"/>
  <text x="210" y="360" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle" font-style="italic">"相关的时候能想起来"</text>

  <!-- RIGHT CARD: deep-scout -->
  <g filter="url(#shadow)">
    <rect x="420" y="68" width="340" height="320" rx="14" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>

  <!-- deep-scout header bar -->
  <rect x="420" y="68" width="340" height="48" rx="14" fill="url(#scoutGrad)"/>
  <rect x="420" y="100" width="340" height="16" fill="url(#scoutGrad)"/>
  <text x="590" y="98" font-family="Georgia, serif" font-size="16" fill="#FAF9F5" text-anchor="middle" font-weight="bold">deep-scout</text>
  <text x="590" y="116" font-family="system-ui, sans-serif" font-size="10" fill="#fde8e0" text-anchor="middle">研究界的「瑞士军刀」</text>

  <!-- deep-scout pipeline -->
  <g transform="translate(440, 148)">
    <!-- pipeline boxes -->
    <rect x="0"   y="0" width="68" height="28" rx="5" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.2"/>
    <text x="34"  y="18" font-family="system-ui, sans-serif" font-size="10" fill="#b85f42" text-anchor="middle" font-weight="bold">搜索</text>

    <line x1="72"  y1="14" x2="92" y2="14" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="92,14 86,10 86,18" fill="#D1CFC5"/>

    <rect x="96"  y="0" width="68" height="28" rx="5" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.2"/>
    <text x="130" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#b85f42" text-anchor="middle" font-weight="bold">LLM 过滤</text>

    <line x1="168" y1="14" x2="188" y2="14" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="188,14 182,10 182,18" fill="#D1CFC5"/>

    <rect x="192" y="0" width="68" height="28" rx="5" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.2"/>
    <text x="226" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#b85f42" text-anchor="middle" font-weight="bold">分层获取</text>

    <line x1="264" y1="14" x2="284" y2="14" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="284,14 278,10 278,18" fill="#D1CFC5"/>

    <rect x="288" y="0" width="68" height="28" rx="5" fill="#D97757" opacity="0.3" stroke="#D97757" stroke-width="1.5"/>
    <text x="322" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#b85f42" text-anchor="middle" font-weight="bold">综合报告</text>
  </g>

  <!-- deep-scout features -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#141413">
    <text x="440" y="266" font-weight="bold" fill="#D97757">●  策略性「挖掘」而非简单汇总</text>
    <text x="440" y="284" font-weight="bold" fill="#D97757">●  深度参数可调</text>
    <text x="440" y="302" font-weight="bold" fill="#D97757">●  多种输出格式可选</text>
    <text x="440" y="320" font-weight="bold" fill="#D97757">●  引用溯源</text>
  </g>

  <!-- insight tag -->
  <rect x="440" y="338" width="300" height="34" rx="6" fill="#E3DACC"/>
  <text x="590" y="360" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle" font-style="italic">"工业化流水线最佳实践"</text>

  <!-- Bottom trend line -->
  <line x1="40" y1="400" x2="760" y2="400" stroke="#D1CFC5" stroke-width="1"/>
  <text x="400" y="424" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">AI 工具：从「能用」→ 「好用」 | 文件存储 → 数据库存储 | 粗放研究 → 管道专业化</text>
</svg>
