<svg xmlns="http://www.w3.org/2000/svg" aria-label="Two Pillars of AI Tool Evolution" viewBox="0 0 800 440"><title>技能猎手：两大发现</title><desc>pgmemory 与 deep-scout 构成 AI 工具的两大进化方向：持久记忆与深度研究</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc" stop-opacity=".4"/></linearGradient><linearGradient id="pgGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#788c5d"/><stop offset="100%" stop-color="#5a6b44"/></linearGradient><linearGradient id="scoutGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#d97757"/><stop offset="100%" stop-color="#b85f42"/></linearGradient><filter id="shadow" width="120%" height="130%" x="-10%" y="-10%"><feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".12" stdDeviation="5"/></filter></defs><rect width="800" height="440" fill="url(#bg)" rx="16"/><text x="400" y="38" fill="#87867f" font-family="Georgia, serif" font-size="13" letter-spacing="2" text-anchor="middle">AI 记忆进化论 · 2026-03-03</text><path stroke="#d1cfc5" d="M280 52h240"/><g filter="url(#shadow)"><rect width="340" height="320" x="40" y="68" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="14"/></g><rect width="340" height="48" x="40" y="68" fill="url(#pgGrad)" rx="14"/><path fill="url(#pgGrad)" d="M40 100h340v16H40z"/><text x="210" y="98" fill="#faf9f5" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle">pgmemory</text><text x="210" y="116" fill="#e8f0e0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Agent 的「长期记忆」</text><g transform="translate(210 182)"><ellipse cy="20" fill="none" stroke="#788c5d" stroke-width="2" rx="36" ry="12"/><path stroke="#788c5d" stroke-width="2" d="M-36 20v36m72-36v36"/><ellipse cy="56" fill="none" stroke="#788c5d" stroke-width="2" rx="36" ry="12"/><ellipse cy="38" fill="none" stroke="#788c5d" stroke-dasharray="4,3" rx="36" ry="12"/><path fill="#788c5d" d="M-36 20Q-48 5-40-8q12-10 26-6 8-8 20 0 12-8 22 4 10 8 8 24 2 14-12 24t-26 6q-12 4-22-6t-12-18" opacity=".25"/><path fill="none" stroke="#788c5d" stroke-width="1.5" d="M-36 20Q-48 5-40-8q12-10 26-6 8-8 20 0 12-8 22 4 10 8 8 24 2 14-12 24t-26 6q-12 4-22-6t-12-18Z"/><path stroke="#788c5d" stroke-linecap="round" stroke-width="2" d="M-4 28h8"/><path fill="#788c5d" d="m4 28-4-4v8z"/></g><g fill="#788c5d" font-family="system-ui, sans-serif" font-size="12" font-weight="bold"><text x="60" y="266">●  语义搜索</text><text x="60" y="284">●  自动归档（Memory Decay）</text><text x="60" y="302">●  多 Agent 隔离</text><text x="60" y="320">●  精准查询 vs 人工翻阅</text></g><rect width="300" height="34" x="60" y="338" fill="#e3dacc" rx="6"/><text x="210" y="360" fill="#141413" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">&quot;相关的时候能想起来&quot;</text><g filter="url(#shadow)"><rect width="340" height="320" x="420" y="68" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="14"/></g><rect width="340" height="48" x="420" y="68" fill="url(#scoutGrad)" rx="14"/><path fill="url(#scoutGrad)" d="M420 100h340v16H420z"/><text x="590" y="98" fill="#faf9f5" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle">deep-scout</text><text x="590" y="116" fill="#fde8e0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">研究界的「瑞士军刀」</text><g transform="translate(440 148)"><rect width="68" height="28" fill="#d97757" stroke="#d97757" stroke-width="1.2" opacity=".15" rx="5"/><text x="34" y="18" fill="#b85f42" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">搜索</text><path stroke="#d1cfc5" stroke-dasharray="3,2" stroke-width="1.5" d="M72 14h20"/><path fill="#d1cfc5" d="m92 14-6-4v8z"/><rect width="68" height="28" x="96" fill="#d97757" stroke="#d97757" stroke-width="1.2" opacity=".15" rx="5"/><text x="130" y="18" fill="#b85f42" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">LLM 过滤</text><path stroke="#d1cfc5" stroke-dasharray="3,2" stroke-width="1.5" d="M168 14h20"/><path fill="#d1cfc5" d="m188 14-6-4v8z"/><rect width="68" height="28" x="192" fill="#d97757" stroke="#d97757" stroke-width="1.2" opacity=".15" rx="5"/><text x="226" y="18" fill="#b85f42" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">分层获取</text><path stroke="#d1cfc5" stroke-dasharray="3,2" stroke-width="1.5" d="M264 14h20"/><path fill="#d1cfc5" d="m284 14-6-4v8z"/><rect width="68" height="28" x="288" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".3" rx="5"/><text x="322" y="18" fill="#b85f42" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">综合报告</text></g><g fill="#d97757" font-family="system-ui, sans-serif" font-size="12" font-weight="bold"><text x="440" y="266">●  策略性「挖掘」而非简单汇总</text><text x="440" y="284">●  深度参数可调</text><text x="440" y="302">●  多种输出格式可选</text><text x="440" y="320">●  引用溯源</text></g><rect width="300" height="34" x="440" y="338" fill="#e3dacc" rx="6"/><text x="590" y="360" fill="#141413" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">&quot;工业化流水线最佳实践&quot;</text><path stroke="#d1cfc5" d="M40 400h720"/><text x="400" y="424" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">AI 工具：从「能用」→ 「好用」 | 文件存储 → 数据库存储 | 粗放研究 → 管道专业化</text></svg>