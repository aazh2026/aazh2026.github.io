  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/12</text>

  <!-- Layer 5: 度量层 (top) -->
  <rect x="40" y="50" width="480" height="38" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="50" width="480" height="20" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
