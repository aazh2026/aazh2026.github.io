<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#141413" letter-spacing="0.5">Claude Opus 4.6 的推理能力突破</text>
  <line x1="60" y1="52" x2="760" y2="52" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Left column: 传统 AI 局限性 -->
  <rect x="40" y="68" width="230" height="380" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="68" width="230" height="38" rx="10" fill="#87867F"/>
  <rect x="40" y="88" width="230" height="18" fill="#87867F"/>
  <text x="155" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#FAF9F5">传统 AI 的局限</text>

  <!-- Limitation items with X marks -->
  <circle cx="68" cy="140" r="14" fill="#D97757" opacity="0.15"/>
  <text x="68" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97757">✗</text>
  <text x="92" y="138" font-size="12" font-weight="bold" fill="#141413">模式匹配陷阱</text>
  <text x="68" y="158" font-size="10" fill="#87867F">只能套用已知解法，</text>
  <text x="68" y="172" font-size="10" fill="#87867F">无法处理从未被解决的</text>
  <text x="68" y="186" font-size="10" fill="#87867F">开放性问题</text>

  <circle cx="68" cy="224" r="14" fill="#D97757" opacity="0.15"/>
  <text x="68" y="229" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97757">✗</text>
  <text x="92" y="222" font-size="12" font-weight="bold" fill="#141413">推理深度限制</text>
  <text x="68" y="242" font-size="10" fill="#87867F">长链条推理容易</text>
  <text x="68" y="256" font-size="10" fill="#87867F">「迷失方向」，</text>
  <text x="68" y="270" font-size="10" fill="#87867F">每一步都建立在前一步</text>
  <text x="68" y="284" font-size="10" fill="#87867F">基础上，早期 AI 无法做到</text>

  <circle cx="68" cy="322" r="14" fill="#D97757" opacity="0.15"/>
  <text x="68" y="327" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97757">✗</text>
  <text x="92" y="320" font-size="12" font-weight="bold" fill="#141413">创造性构造缺失</text>
  <text x="68" y="340" font-size="10" fill="#87867F">给出存在性证明容易，</text>
  <text x="68" y="354" font-size="10" fill="#87867F">但构造性证明需要</text>
  <text x="68" y="368" font-size="10" fill="#87867F">具体展示解是什么——</text>
  <text x="68" y="382" font-size="10" fill="#87867F">这需要真正的创造性</text>

  <circle cx="68" cy="420" r="14" fill="#D97757" opacity="0.15"/>
  <text x="68" y="425" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97757">✗</text>
  <text x="92" y="418" font-size="12" font-weight="bold" fill="#141413">跨领域整合困难</text>
  <text x="68" y="438" font-size="10" fill="#87867F">组合数学、算法设计、</text>
  <text x="68" y="452" font-size="10" fill="#87867F">优化理论各自独立，</text>
  <text x="68" y="466" font-size="10" fill="#87867F">AI 难以找到连接点</text>

  <!-- Center arrow -->
  <line x1="275" y1="260" x2="335" y2="260" stroke="#D97757" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="305" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#D97757">突破</text>
  <text x="305" y="278" text-anchor="middle" font-size="10" fill="#87867F">范式转移</text>

  <!-- Right column: Claude Opus 4.6 突破 -->
  <rect x="550" y="68" width="230" height="380" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>

  <!-- Knuth quote at top -->
  <rect x="560" y="82" width="210" height="40" rx="6" fill="#E3DACC"/>
  <text x="665" y="100" text-anchor="middle" font-size="10" fill="#141413" font-style="italic">「我需要重新评估</text>
  <text x="665" y="114" text-anchor="middle" font-size="10" fill="#141413" font-style="italic">我对生成式 AI 的看法」</text>
  <text x="665" y="128" text-anchor="middle" font-size="9" fill="#87867F">— Donald Knuth, 图灵奖得主</text>

  <!-- Breakthrough items -->
  <circle cx="578" cy="180" r="14" fill="#788C5D" opacity="0.15"/>
  <text x="578" y="185" text-anchor="middle" font-size="16" font-weight="bold" fill="#788C5D">✓</text>
  <text x="602" y="178" font-size="12" font-weight="bold" fill="#141413">自动推理能力</text>
  <text x="578" y="198" font-size="10" fill="#87867F">多步逻辑推导，</text>
  <text x="578" y="212" font-size="10" fill="#87867F">每一步都保持</text>
  <text x="578" y="226" font-size="10" fill="#87867F">数学严谨性——</text>
  <text x="578" y="240" font-size="10" fill="#87867F">这是「证明」而非「猜测」</text>

  <circle cx="578" cy="272" r="14" fill="#788C5D" opacity="0.15"/>
  <text x="578" y="277" text-anchor="middle" font-size="16" font-weight="bold" fill="#788C5D">✓</text>
  <text x="602" y="270" font-size="12" font-weight="bold" fill="#141413">创造性问题解决</text>
  <text x="578" y="290" font-size="10" fill="#87867F">包含新颖构造——</text>
  <text x="578" y="304" font-size="10" fill="#87867F">一种之前未被提出的</text>
  <text x="578" y="318" font-size="10" fill="#87867F">数据结构组织方式，</text>
  <text x="578" y="332" font-size="10" fill="#87867F">扩展了可探索的边界</text>

  <circle cx="578" cy="364" r="14" fill="#788C5D" opacity="0.15"/>
  <text x="578" y="369" text-anchor="middle" font-size="16" font-weight="bold" fill="#788C5D">✓</text>
  <text x="602" y="362" font-size="12" font-weight="bold" fill="#141413">跨领域知识整合</text>
  <text x="578" y="382" font-size="10" fill="#87867F">整合组合数学、算法</text>
  <text x="578" y="396" font-size="10" fill="#87867F">设计和优化理论，找到</text>
  <text x="578" y="410" font-size="10" fill="#87867F">传统方法可能忽视的</text>
  <text x="578" y="424" font-size="10" fill="#87867F">连接点</text>

  <!-- Result box -->
  <rect x="560" y="432" width="210" height="34" rx="6" fill="#788C5D"/>
  <text x="665" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#FAF9F5">解决了 Knuth 的开放性问题</text>
  <text x="665" y="463" text-anchor="middle" font-size="9" fill="#E3DACC">构造性证明 · 最优性验证</text>

  <!-- Center panel: 关键问题描述 -->
  <rect x="295" y="140" width="240" height="240" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="295" y="140" width="240" height="38" rx="10" fill="#D97757"/>
  <rect x="295" y="160" width="240" height="18" fill="#D97757"/>
  <text x="415" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF9F5">Knuth 开放性问题</text>

  <text x="315" y="200" font-size="11" font-weight="bold" fill="#141413">问题本质</text>
  <text x="315" y="218" font-size="10" fill="#87867F">在特定约束条件下，</text>
  <text x="315" y="232" font-size="10" fill="#87867F">如何最优地组织和</text>
  <text x="315" y="246" font-size="10" fill="#87867F">访问数据？</text>

  <line x1="315" y1="264" x2="515" y2="264" stroke="#D1CFC5" stroke-width="1"/>

  <text x="315" y="284" font-size="11" font-weight="bold" fill="#141413">为什么是「开放」问题？</text>
  <text x="315" y="302" font-size="10" fill="#87867F">① 没有已知的最优解</text>
  <text x="315" y="320" font-size="10" fill="#87867F">② 需要原创性思维</text>
  <text x="315" y="338" font-size="10" fill="#87867F">③ 有实际应用价值</text>

  <line x1="315" y1="356" x2="515" y2="356" stroke="#D1CFC5" stroke-width="1"/>

  <text x="315" y="376" font-size="11" font-weight="bold" fill="#788C5D">Claude Opus 4.6 的回答</text>
  <text x="315" y="394" font-size="10" fill="#141413">给出了构造性证明——</text>
  <text x="315" y="412" font-size="10" fill="#141413">不仅「解存在」，而且</text>
  <text x="315" y="426" font-size="10" fill="#141413">具体构造出了这个解，</text>
  <text x="315" y="440" font-size="10" fill="#141413">并证明了其最优性</text>
</svg>