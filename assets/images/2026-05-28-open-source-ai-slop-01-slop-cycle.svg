<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#141413" letter-spacing="0.5">「Slop begets slop」：开源的 AI 困境循环</text>
  <line x1="60" y1="50" x2="760" y2="50" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Central quote -->
  <rect x="240" y="60" width="340" height="44" rx="8" fill="#E3DACC" stroke="#D97757" stroke-width="1.5"/>
  <text x="410" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#141413" font-style="italic">「AI 没有增加需要软件的人，</text>
  <text x="410" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#141413" font-style="italic">也没有增加能够 review 代码的维护者」</text>

  <!-- Cycle diagram: 4 nodes in a loop -->

  <!-- Node 1: User submits vague issue (top-left) -->
  <rect x="60" y="130" width="200" height="100" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="60" y="130" width="200" height="32" rx="10" fill="#D97757"/>
  <rect x="60" y="150" width="200" height="12" fill="#D97757"/>
  <text x="160" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF9F5">① 模糊 Issue</text>
  <text x="80" y="178" font-size="10" fill="#141413">用户把问题扔给 AI</text>
  <text x="80" y="194" font-size="10" fill="#141413">「帮我理解这个问题」</text>
  <text x="80" y="210" font-size="10" fill="#87867F">↓ AI 重新措辞</text>

  <!-- Node 2: AI generates slop (top-right) -->
  <rect x="560" y="130" width="200" height="100" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="560" y="130" width="200" height="32" rx="10" fill="#87867F"/>
  <rect x="560" y="150" width="200" height="12" fill="#87867F"/>
  <text x="660" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF9F5">② AI 生成 Slop</text>
  <text x="580" y="178" font-size="10" fill="#141413">充满假设的诊断</text>
  <text x="580" y="194" font-size="10" fill="#141413">假的最小复现</text>
  <text x="580" y="210" font-size="10" fill="#D97757">这是比没有更糟糕的结果</text>

  <!-- Node 3: Maintainer wastes time (bottom-right) -->
  <rect x="560" y="290" width="200" height="100" rx="10" fill="#FAF9F5" stroke="#141413" stroke-width="2"/>
  <rect x="560" y="290" width="200" height="32" rx="10" fill="#141413"/>
  <rect x="560" y="310" width="200" height="12" fill="#141413"/>
  <text x="660" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF9F5">③ 维护者白费力气</text>
  <text x="580" y="338" font-size="10" fill="#141413">先解开 AI 制造的混乱</text>
  <text x="580" y="354" font-size="10" fill="#141413">再处理原始问题</text>
  <text x="580" y="370" font-size="10" fill="#87867F">对话被拉回全局不变量</text>

  <!-- Node 4: More slop generated (bottom-left) -->
  <rect x="60" y="290" width="200" height="100" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="60" y="290" width="200" height="32" rx="10" fill="#788C5D"/>
  <rect x="60" y="310" width="200" height="12" fill="#788C5D"/>
  <text x="160" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF9F5">④ 循环往复</text>
  <text x="80" y="338" font-size="10" fill="#141413">AI 生成的代码同样</text>
  <text x="80" y="354" font-size="10" fill="#141413">过度工程化，局部防御</text>
  <text x="80" y="370" font-size="10" fill="#141413">累积更多 Technical Debt</text>

  <!-- Arrows clockwise: 1→2 -->
  <path d="M 265 180 Q 400 120 555 180" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="145" text-anchor="middle" font-size="9" fill="#87867F">扩大范围</text>

  <!-- 2→3 -->
  <path d="M 660 235 Q 720 260 660 285" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="728" y="265" text-anchor="middle" font-size="9" fill="#87867F">传递</text>

  <!-- 3→4 -->
  <path d="M 555 340 Q 400 400 265 340" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="380" text-anchor="middle" font-size="9" fill="#87867F">恶性循环</text>

  <!-- 4→1 -->
  <path d="M 160 285 Q 100 260 160 235" fill="none" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="88" y="265" text-anchor="middle" font-size="9" fill="#87867F">更多</text>

  <!-- Statistics panel -->
  <rect x="295" y="160" width="240" height="130" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="295" y="160" width="240" height="32" rx="10" fill="#D97757"/>
  <rect x="295" y="180" width="240" height="12" fill="#D97757"/>
  <text x="415" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF9F5">Pi Issue Tracker 数据</text>
  <text x="315" y="212" font-size="11" font-weight="bold" fill="#141413">90 天数据：</text>
  <text x="315" y="230" font-size="10" fill="#141413">• 外部 Issue + PR：3,145</text>
  <text x="315" y="248" font-size="10" fill="#D97757">• PR 最终被合并：8%</text>
  <text x="315" y="266" font-size="10" fill="#87867F">• 大多数是 AI 辅助的低质量 Spam</text>

  <!-- Bottom insight -->
  <rect x="295" y="310" width="240" height="90" rx="10" fill="#E3DACC" stroke="#141413" stroke-width="1.5"/>
  <text x="415" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#141413">核心洞察</text>
  <text x="315" y="356" font-size="10" fill="#141413">「GitHub 不是为这种</text>
  <text x="315" y="372" font-size="10" fill="#141413">新型 Open Source 建造的」</text>
  <text x="315" y="390" font-size="10" fill="#87867F">— Armin Ronacher</text>

  <!-- Key insight box -->
  <rect x="280" y="420" width="260" height="44" rx="8" fill="#141413"/>
  <text x="410" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#FAF9F5">开源需要协作，不是与机器隔离的工作</text>
  <text x="410" y="456" text-anchor="middle" font-size="10" fill="#D1CFC5">人类沟通是难的，但隔离不是开源的价值所在</text>
</svg>