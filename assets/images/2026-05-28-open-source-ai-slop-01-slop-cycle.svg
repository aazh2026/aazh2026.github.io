<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 820 480"><defs><marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#87867f" d="M0 0v6l8-3z"/></marker></defs><path fill="#faf9f5" d="M0 0h820v480H0z"/><text x="410" y="36" fill="#141413" font-size="18" font-weight="bold" letter-spacing=".5" text-anchor="middle">「Slop begets slop」：开源的 AI 困境循环</text><path stroke="#d1cfc5" d="M60 50h700"/><rect width="340" height="44" x="240" y="60" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="410" y="82" fill="#141413" font-size="13" font-style="italic" font-weight="bold" text-anchor="middle">「AI 没有增加需要软件的人，</text><text x="410" y="98" fill="#141413" font-size="13" font-style="italic" font-weight="bold" text-anchor="middle">也没有增加能够 review 代码的维护者」</text><rect width="200" height="100" x="60" y="130" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="10"/><rect width="200" height="32" x="60" y="130" fill="#d97757" rx="10"/><path fill="#d97757" d="M60 150h200v12H60z"/><text x="160" y="152" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">① 模糊 Issue</text><text x="80" y="178" fill="#141413" font-size="10">用户把问题扔给 AI</text><text x="80" y="194" fill="#141413" font-size="10">「帮我理解这个问题」</text><text x="80" y="210" fill="#87867f" font-size="10">↓ AI 重新措辞</text><rect width="200" height="100" x="560" y="130" fill="#faf9f5" stroke="#d97757" stroke-dasharray="5,3" stroke-width="2" rx="10"/><rect width="200" height="32" x="560" y="130" fill="#87867f" rx="10"/><path fill="#87867f" d="M560 150h200v12H560z"/><text x="660" y="152" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">② AI 生成 Slop</text><text x="580" y="178" fill="#141413" font-size="10">充满假设的诊断</text><text x="580" y="194" fill="#141413" font-size="10">假的最小复现</text><text x="580" y="210" fill="#d97757" font-size="10">这是比没有更糟糕的结果</text><rect width="200" height="100" x="560" y="290" fill="#faf9f5" stroke="#141413" stroke-width="2" rx="10"/><rect width="200" height="32" x="560" y="290" fill="#141413" rx="10"/><path fill="#141413" d="M560 310h200v12H560z"/><text x="660" y="312" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">③ 维护者白费力气</text><text x="580" y="338" fill="#141413" font-size="10">先解开 AI 制造的混乱</text><text x="580" y="354" fill="#141413" font-size="10">再处理原始问题</text><text x="580" y="370" fill="#87867f" font-size="10">对话被拉回全局不变量</text><rect width="200" height="100" x="60" y="290" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="10"/><rect width="200" height="32" x="60" y="290" fill="#788c5d" rx="10"/><path fill="#788c5d" d="M60 310h200v12H60z"/><text x="160" y="312" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">④ 循环往复</text><text x="80" y="338" fill="#141413" font-size="10">AI 生成的代码同样</text><text x="80" y="354" fill="#141413" font-size="10">过度工程化，局部防御</text><text x="80" y="370" fill="#141413" font-size="10">累积更多 Technical Debt</text><path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M265 180q135-60 290 0"/><text x="410" y="145" fill="#87867f" font-size="9" text-anchor="middle">扩大范围</text><path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M660 235q60 25 0 50"/><text x="728" y="265" fill="#87867f" font-size="9" text-anchor="middle">传递</text><path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M555 340q-155 60-290 0"/><text x="410" y="380" fill="#87867f" font-size="9" text-anchor="middle">恶性循环</text><path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M160 285q-60-25 0-50"/><text x="88" y="265" fill="#87867f" font-size="9" text-anchor="middle">更多</text><rect width="240" height="130" x="295" y="160" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="10"/><rect width="240" height="32" x="295" y="160" fill="#d97757" rx="10"/><path fill="#d97757" d="M295 180h240v12H295z"/><text x="415" y="182" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">Pi Issue Tracker 数据</text><text x="315" y="212" fill="#141413" font-size="11" font-weight="bold">90 天数据：</text><text x="315" y="230" fill="#141413" font-size="10">• 外部 Issue + PR：3,145</text><text x="315" y="248" fill="#d97757" font-size="10">• PR 最终被合并：8%</text><text x="315" y="266" fill="#87867f" font-size="10">• 大多数是 AI 辅助的低质量 Spam</text><rect width="240" height="90" x="295" y="310" fill="#e3dacc" stroke="#141413" stroke-width="1.5" rx="10"/><text x="415" y="334" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">核心洞察</text><text x="315" y="356" fill="#141413" font-size="10">「GitHub 不是为这种</text><text x="315" y="372" fill="#141413" font-size="10">新型 Open Source 建造的」</text><text x="315" y="390" fill="#87867f" font-size="10">— Armin Ronacher</text><rect width="260" height="44" x="280" y="420" fill="#141413" rx="8"/><text x="410" y="440" fill="#faf9f5" font-size="11" font-weight="bold" text-anchor="middle">开源需要协作，不是与机器隔离的工作</text><text x="410" y="456" fill="#d1cfc5" font-size="10" text-anchor="middle">人类沟通是难的，但隔离不是开源的价值所在</text></svg>