<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <rect width="900" height="560" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#141413">多 Agent 特有风险：级联故障</text>

  <!-- Risk cascade flow (top section) -->
  <!-- Agent A -->
  <rect x="60" y="80" width="160" height="90" rx="10" fill="#D97757" fill-opacity="0.2" stroke="#D97757" stroke-width="2"/>
  <text x="140" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D97757">Agent A</text>
  <text x="140" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">意图理解</text>
  <text x="140" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">错误判断市场方向</text>

  <!-- Arrow A->B -->
  <path d="M225 125 L285 125 M275 115 L285 125 L275 135" stroke="#D97757" stroke-width="2.5" fill="none"/>

  <!-- Agent B -->
  <rect x="290" y="80" width="160" height="90" rx="10" fill="#D97757" fill-opacity="0.2" stroke="#D97757" stroke-width="2"/>
  <text x="370" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D97757">Agent B</text>
  <text x="370" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">策略执行</text>
  <text x="370" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">基于错误信息执行</text>

  <!-- Arrow B->C -->
  <path d="M455 125 L515 125 M505 115 L515 125 L505 135" stroke="#D97757" stroke-width="2.5" fill="none"/>

  <!-- Agent C -->
  <rect x="520" y="80" width="160" height="90" rx="10" fill="#D97757" fill-opacity="0.3" stroke="#D97757" stroke-width="2.5"/>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D97757">Agent C</text>
  <text x="600" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">风险管理</text>
  <text x="600" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">放大仓位</text>

  <!-- Arrow C->Loss -->
  <path d="M685 125 L745 125 M735 115 L745 125 L735 135" stroke="#D97757" stroke-width="2.5" fill="none"/>

  <!-- Loss -->
  <rect x="750" y="90" width="110" height="70" rx="10" fill="#D97757"/>
  <text x="805" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">巨大损失</text>

  <!-- Warning box -->
  <rect x="50" y="190" width="820" height="50" rx="8" fill="#E3DACC" stroke="#D97757" stroke-width="1.5"/>
  <text x="460" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#141413">风险本质：错误被后续 Agent 放大，而非稀释</text>

  <!-- Feedback loop section -->
  <text x="450" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#141413">反馈循环风险</text>

  <rect x="80" y="295" width="740" height="130" rx="12" fill="#E3DACC" fill-opacity="0.3"/>

  <!-- Cycle nodes -->
  <rect x="120" y="330" width="150" height="60" rx="8" fill="#141413"/>
  <text x="195" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FAF9F5">多 TradingAgents</text>
  <text x="195" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FAF9F5">使用相似策略</text>

  <rect x="405" y="295" width="150" height="60" rx="8" fill="#D97757" fill-opacity="0.3" stroke="#D97757" stroke-width="2"/>
  <text x="480" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">同时检测信号</text>
  <text x="480" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">同时下单</text>

  <rect x="405" y="395" width="150" height="60" rx="8" fill="#D97757" fill-opacity="0.3" stroke="#D97757" stroke-width="2"/>
  <text x="480" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">市场冲击成本激增</text>
  <text x="480" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">策略失效</text>

  <!-- Arrows -->
  <path d="M270 360 L400 325" stroke="#87867F" stroke-width="2" fill="none"/>
  <path d="M480 355 L480 390" stroke="#87867F" stroke-width="2" fill="none"/>
  <path d="M560 425 L620 425" stroke="#87867F" stroke-width="2" fill="none"/>
  <path d="M625 425 Q700 360 625 300 Q550 240 265 360" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

  <!-- Historical lessons -->
  <text x="450" y="455" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#141413">历史教训</text>

  <rect x="80" y="480" width="370" height="65" rx="8" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="1.5"/>
  <text x="265" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D97757">Knight Capital (2012)</text>
  <text x="265" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">软件 bug → 45分钟 → 4.6亿美元损失</text>

  <rect x="470" y="480" width="370" height="65" rx="8" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="1.5"/>
  <text x="655" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D97757">LTCM (1998)</text>
  <text x="655" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413">诺奖模型忽视尾部风险，几乎拖垮全球金融</text>
</svg>
