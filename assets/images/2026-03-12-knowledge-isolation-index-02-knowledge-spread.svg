<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>知识传染 vs 知识阻断</title>
  <desc>知识传染模型对比图：正常情况下知识从专家传播到团队成员；AI时代知识传播链断裂</desc>

  <rect width="720" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#141413">知识传染 vs 知识阻断</text>
  <text x="360" y="46" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">知识孤岛指数 (KII) · 2026/03/12</text>

  <!-- Divider line -->
  <line x1="360" y1="70" x2="360" y2="340" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT: Normal knowledge spread (olive) -->
  <text x="180" y="75" text-anchor="middle" font-size="12" fill="#788C5D" font-weight="600">正常情况：知识传染</text>

  <!-- Expert node -->
  <rect x="110" y="95" width="140" height="52" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="180" y="117" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">Domain Expert</text>
  <text x="180" y="134" text-anchor="middle" font-size="10" fill="#87867F">知识源头</text>

  <!-- Team member nodes -->
  <rect x="30" y="185" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="80" y="203" text-anchor="middle" font-size="11" fill="#141413">Team Member A</text>
  <text x="80" y="218" text-anchor="middle" font-size="9" fill="#87867F">code review</text>

  <rect x="155" y="185" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="205" y="203" text-anchor="middle" font-size="11" fill="#141413">Team Member B</text>
  <text x="205" y="218" text-anchor="middle" font-size="9" fill="#87867F">documentation</text>

  <rect x="30" y="255" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="80" y="273" text-anchor="middle" font-size="11" fill="#141413">Team Member C</text>
  <text x="80" y="288" text-anchor="middle" font-size="9" fill="#87867F">discussion</text>

  <rect x="155" y="255" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="205" y="273" text-anchor="middle" font-size="11" fill="#141413">Team Member D</text>
  <text x="205" y="288" text-anchor="middle" font-size="9" fill="#87867F">walkthrough</text>

  <!-- Arrows from expert to team -->
  <line x1="130" y1="147" x2="65" y2="183" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>
  <line x1="180" y1="147" x2="180" y2="183" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>
  <line x1="230" y1="147" x2="220" y2="183" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>
  <line x1="130" y1="147" x2="65" y2="253" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>
  <line x1="230" y1="147" x2="220" y2="253" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>

  <!-- KII label -->
  <text x="180" y="325" text-anchor="middle" font-size="10" fill="#788C5D" font-weight="600">KII &lt; 0.3 · 知识持续传播</text>

  <!-- RIGHT: Broken knowledge flow (clay) -->
  <text x="540" y="75" text-anchor="middle" font-size="12" fill="#D97757" font-weight="600">AI时代：知识阻断</text>

  <!-- AI Expert node (replaced) -->
  <rect x="440" y="95" width="140" height="52" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="510" y="117" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">AI Agent</text>
  <text x="510" y="134" text-anchor="middle" font-size="10" fill="#D97757">生成代码 · 无解释</text>

  <!-- Question mark on broken edges -->
  <rect x="360" y="185" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="410" y="203" text-anchor="middle" font-size="11" fill="#141413">Team Member A</text>
  <text x="410" y="218" text-anchor="middle" font-size="9" fill="#D97757">? 无传递</text>

  <rect x="485" y="185" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="535" y="203" text-anchor="middle" font-size="11" fill="#141413">Team Member B</text>
  <text x="535" y="218" text-anchor="middle" font-size="9" fill="#D97757">? 无传递</text>

  <rect x="360" y="255" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="410" y="273" text-anchor="middle" font-size="11" fill="#141413">Team Member C</text>
  <text x="410" y="288" text-anchor="middle" font-size="9" fill="#D97757">? 无传递</text>

  <rect x="485" y="255" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="535" y="273" text-anchor="middle" font-size="11" fill="#141413">Team Member D</text>
  <text x="535" y="288" text-anchor="middle" font-size="9" fill="#D97757">? 无传递</text>

  <!-- Dashed broken lines with ? -->
  <line x1="450" y1="147" x2="380" y2="183" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowClayQ)"/>
  <line x1="510" y1="147" x2="510" y2="183" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowClayQ)"/>
  <line x1="570" y1="147" x2="550" y2="183" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowClayQ)"/>
  <line x1="450" y1="147" x2="380" y2="253" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowClayQ)"/>
  <line x1="570" y1="147" x2="550" y2="253" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowClayQ)"/>

  <!-- KII label right -->
  <text x="540" y="325" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">KII &gt; 0.6 · 知识链断裂</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOlive" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#788C5D"/>
    </marker>
    <marker id="arrowClayQ" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#D97757"/>
    </marker>
  </defs>
</svg>