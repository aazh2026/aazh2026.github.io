<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Agent OS 五层架构 -->
  <rect width="560" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Agent OS 五层架构</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/19</text>

  <!-- Layer 5: 角色层 (Agents) -->
  <rect x="40" y="50" width="480" height="44" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="60" y="72" font-size="10" fill="#D97706" font-family="ui-monospace, monospace" font-weight="600">L5 · 角色层</text>
  <text x="140" y="72" font-size="11" fill="#141413" font-weight="600">Agents · Planner / Coder / Reviewer</text>
  <text x="140" y="86" font-size="9.5" fill="#87867F">职责分离，避免"一个脑子"问题</text>

  <!-- Arrow -->
  <line x1="280" y1="94" x2="280" y2="104" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,104 280,112 284,94" fill="#D1CFC5"/>

  <!-- Layer 4: 能力层 (Skills) -->
  <rect x="40" y="114" width="480" height="44" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="60" y="136" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">L4 · 能力层</text>
  <text x="140" y="136" font-size="11" fill="#141413" font-weight="600">Skills · TDD / eval-harness / continuous-learning</text>
  <text x="140" y="150" font-size="9.5" fill="#87867F">可复用的能力模块，封装 AI 插件 + 行为模板</text>

  <!-- Arrow -->
  <line x1="280" y1="158" x2="280" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,168 280,176 284,168" fill="#D1CFC5"/>

  <!-- Layer 3: 控制层 (Rules) -->
  <rect x="40" y="178" width="480" height="44" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="60" y="200" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L3 · 控制层</text>
  <text x="140" y="200" font-size="11" fill="#141413" font-weight="600">Rules · coding-style / security / testing</text>
  <text x="140" y="214" font-size="9.5" fill="#87867F">机械约束，不是建议 · Reviewer Agent 强制检查</text>

  <!-- Arrow -->
  <line x1="280" y1="222" x2="280" y2="232" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,232 280,240 284,232" fill="#D1CFC5"/>

  <!-- Layer 2: 执行层 (Commands) -->
  <rect x="40" y="242" width="480" height="24" rx="6" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="258" font-size="10" fill="#3B82F6" font-family="ui-monospace, monospace" font-weight="600">L2 · 执行层</text>
  <text x="140" y="258" font-size="11" fill="#141413" font-weight="600">Commands · /plan /tdd /verify /review</text>
  <text x="490" y="258" font-size="9" fill="#3B82F6" font-family="ui-monospace, monospace">用户交互</text>

  <!-- Layer 1: 工具层 (MCP) -->
  <rect x="40" y="270" width="480" height="22" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="285" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L1 · 工具层</text>
  <text x="140" y="285" font-size="10" fill="#141413" font-weight="600">MCP · GitHub / Supabase / API</text>
  <text x="490" y="285" font-size="9" fill="#059669" font-family="ui-monospace, monospace">AI 直接操作</text>
</svg>