<svg xmlns="http://www.w3.org/2000/svg" aria-label="多抽象层级系统架构图" viewBox="0 0 780 920"><title>多抽象层级系统架构图</title><desc>展示智能日志分析平台从自然语言接口到硬件优化的六层架构设计</desc><defs><style>.border,.border-light{fill:none;stroke:#d1cfc5;stroke-width:1.5}.border-light{stroke-width:1}.text-layer{fill:#141413;font-family:&quot;Georgia&quot;,&quot;Noto Serif SC&quot;,serif;font-size:14px;font-weight:700}.text-code,.text-tools{fill:#87867f;font-family:&quot;Menlo&quot;,&quot;Consolas&quot;,monospace}.text-tools{font-size:11px}.text-code{font-size:10.5px}.text-abst,.text-desc{fill:#788c5d;font-family:&quot;Georgia&quot;,&quot;Noto Serif SC&quot;,serif;font-size:12px}.text-desc{fill:#141413}.accent-bar{fill:#d97757}.layer-bg-odd{fill:#f5f3ee}.layer-bg-even{fill:#faf9f5}.tree-h,.tree-v{stroke:#87867f;stroke-width:1;fill:none}</style></defs><path d="M0 0h780v920H0z" style="fill:#faf9f5"/><text x="390" y="28" class="text-layer" font-size="16" text-anchor="middle">智能日志分析平台 · 六层架构</text><path d="M80 38h620" class="border-light"/><rect width="700" height="120" x="40" y="50" class="layer-bg-odd" rx="4"/><rect width="700" height="120" x="40" y="50" class="border" rx="4"/><rect width="6" height="120" x="40" y="50" class="accent-bar" rx="3"/><text x="58" y="70" class="text-layer">Layer 6</text><text x="115" y="70" fill="#d97757" class="text-layer">自然语言接口</text><text x="222" y="70" fill="#87867f" class="text-layer" font-size="12"> 用户交互层</text><rect width="664" height="30" x="58" y="82" fill="#e3dacc" rx="3"/><text x="72" y="101" class="text-desc" font-style="italic">&quot;过去一小时内，支付服务有什么异常？&quot;</text><path d="M58 120v18" class="tree-v"/><path d="M58 138h62" class="tree-h"/><circle cx="58" cy="120" r="2" fill="#87867f"/><text x="126" y="134" fill="#d97757" class="text-tools">├─</text><text x="144" y="134" class="text-tools">工具: LLM API (OpenAI/Claude)</text><path d="M58 138h62" class="tree-h"/><text x="126" y="152" fill="#d97757" class="text-tools">└─</text><text x="144" y="152" class="text-abst">抽象: 意图理解 → 查询生成 → 结果解释</text><circle cx="58" cy="138" r="2" fill="#87867f"/><rect width="700" height="120" x="40" y="178" class="layer-bg-even" rx="4"/><rect width="700" height="120" x="40" y="178" class="border" rx="4"/><rect width="6" height="120" x="40" y="178" class="accent-bar" rx="3"/><text x="58" y="198" class="text-layer">Layer 5</text><text x="115" y="198" fill="#d97757" class="text-layer">查询DSL</text><text x="177" y="198" fill="#87867f" class="text-layer" font-size="12"> 业务逻辑层</text><rect width="664" height="26" x="58" y="210" fill="#f0ede6" rx="3"/><text x="70" y="227" class="text-code">query = LogQuery().service(&quot;payment&quot;).time_range(&quot;1h&quot;).severity(&quot;ERROR&quot;).aggregate(&quot;count&quot;)</text><path d="M58 244v18" class="tree-v"/><path d="M58 262h62" class="tree-h"/><circle cx="58" cy="244" r="2" fill="#87867f"/><text x="126" y="258" fill="#d97757" class="text-tools">├─</text><text x="144" y="258" class="text-tools">工具: Python / Pandas</text><path d="M58 262h62" class="tree-h"/><text x="126" y="276" fill="#d97757" class="text-tools">└─</text><text x="144" y="276" class="text-abst">抽象: 声明式数据查询</text><circle cx="58" cy="262" r="2" fill="#87867f"/><rect width="700" height="120" x="40" y="306" class="layer-bg-odd" rx="4"/><rect width="700" height="120" x="40" y="306" class="border" rx="4"/><rect width="6" height="120" x="40" y="306" class="accent-bar" rx="3"/><text x="58" y="326" class="text-layer">Layer 4</text><text x="115" y="326" fill="#d97757" class="text-layer">流处理框架</text><text x="207" y="326" fill="#87867f" class="text-layer" font-size="12"> 数据处理层</text><rect width="664" height="40" x="58" y="338" fill="#f0ede6" rx="3"/><text x="70" y="353" class="text-code">stream.filter(e → e.level == ERROR)</text><text x="70" y="367" class="text-code">      .window(TimeWindow.minutes(5)).aggregate(CountAgg())</text><path d="M58 386v18" class="tree-v"/><path d="M58 404h62" class="tree-h"/><circle cx="58" cy="386" r="2" fill="#87867f"/><text x="126" y="400" fill="#d97757" class="text-tools">├─</text><text x="144" y="400" class="text-tools">工具: Apache Flink / Kafka Streams</text><path d="M58 404h62" class="tree-h"/><text x="126" y="418" fill="#d97757" class="text-tools">└─</text><text x="144" y="418" class="text-abst">抽象: 声明式流处理，自动分布式执行</text><circle cx="58" cy="404" r="2" fill="#87867f"/><rect width="700" height="120" x="40" y="434" class="layer-bg-even" rx="4"/><rect width="700" height="120" x="40" y="434" class="border" rx="4"/><rect width="6" height="120" x="40" y="434" class="accent-bar" rx="3"/><text x="58" y="454" class="text-layer">Layer 3</text><text x="115" y="454" fill="#d97757" class="text-layer">高性能网络</text><text x="217" y="454" fill="#87867f" class="text-layer" font-size="12"> 通信层</text><rect width="664" height="26" x="58" y="466" fill="#e3dacc" rx="3"/><text x="72" y="483" class="text-desc">零拷贝传输，DPDK 网络栈</text><path d="M58 500v18" class="tree-v"/><path d="M58 518h62" class="tree-h"/><circle cx="58" cy="500" r="2" fill="#87867f"/><text x="126" y="514" fill="#d97757" class="text-tools">├─</text><text x="144" y="514" class="text-tools">工具: C / Rust + DPDK</text><path d="M58 518h62" class="tree-h"/><text x="126" y="532" fill="#d97757" class="text-tools">└─</text><text x="144" y="532" class="text-abst">抽象: 绕过内核的网络包处理</text><circle cx="58" cy="518" r="2" fill="#87867f"/><rect width="700" height="120" x="40" y="562" class="layer-bg-odd" rx="4"/><rect width="700" height="120" x="40" y="562" class="border" rx="4"/><rect width="6" height="120" x="40" y="562" class="accent-bar" rx="3"/><text x="58" y="582" class="text-layer">Layer 2</text><text x="115" y="582" fill="#d97757" class="text-layer">存储引擎</text><text x="187" y="582" fill="#87867f" class="text-layer" font-size="12"> 持久化层</text><rect width="664" height="26" x="58" y="594" fill="#e3dacc" rx="3"/><text x="72" y="611" class="text-desc">LSM-Tree，内存映射文件，RAID 配置</text><path d="M58 628v18" class="tree-v"/><path d="M58 646h62" class="tree-h"/><circle cx="58" cy="628" r="2" fill="#87867f"/><text x="126" y="642" fill="#d97757" class="text-tools">├─</text><text x="144" y="642" class="text-tools">工具: RocksDB / 自研引擎</text><path d="M58 646h62" class="tree-h"/><text x="126" y="660" fill="#d97757" class="text-tools">└─</text><text x="144" y="660" class="text-abst">抽象: 键值存储，隐藏 LSM 复杂性</text><circle cx="58" cy="646" r="2" fill="#87867f"/><rect width="700" height="120" x="40" y="690" class="layer-bg-even" rx="4"/><rect width="700" height="120" x="40" y="690" class="border" rx="4"/><rect width="6" height="120" x="40" y="690" class="accent-bar" rx="3"/><text x="58" y="710" class="text-layer">Layer 1</text><text x="115" y="710" fill="#d97757" class="text-layer">硬件优化</text><text x="187" y="710" fill="#87867f" class="text-layer" font-size="12"> 基础设施层</text><rect width="664" height="26" x="58" y="722" fill="#e3dacc" rx="3"/><text x="72" y="739" class="text-desc">NUMA 感知内存分配，CPU 亲和性，DMA</text><path d="M58 756v18" class="tree-v"/><path d="M58 774h62" class="tree-h"/><circle cx="58" cy="756" r="2" fill="#87867f"/><text x="126" y="770" fill="#d97757" class="text-tools">├─</text><text x="144" y="770" class="text-tools">工具: C / 汇编，系统调用</text><path d="M58 774h62" class="tree-h"/><text x="126" y="788" fill="#d97757" class="text-tools">└─</text><text x="144" y="788" class="text-abst">抽象: 最大化硬件利用率</text><circle cx="58" cy="774" r="2" fill="#87867f"/><path d="M40 828h700" class="border-light"/><rect width="12" height="12" x="40" y="840" class="accent-bar" rx="2"/><text x="58" y="851" class="text-desc" font-size="11">强调色 Clay #D97757</text><rect width="12" height="12" x="160" y="840" fill="#788c5d" rx="2"/><text x="178" y="851" class="text-desc" font-size="11">次级强调 Olive #788C5D</text><rect width="12" height="12" x="310" y="840" fill="#e3dacc" rx="2"/><text x="328" y="851" class="text-desc" font-size="11">辅助背景 Oat #E3DACC</text><rect width="12" height="12" x="450" y="840" fill="#f0ede6" rx="2"/><text x="468" y="851" class="text-desc" font-size="11">代码背景</text><defs><marker id="arrowhead" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><path fill="#d1cfc5" d="m0 0 8 3-8 3z"/></marker></defs><path marker-end="url(#arrowhead)" d="M22 80v710" style="fill:none;stroke:#d1cfc5;stroke-width:1;stroke-dasharray:4,3"/><text x="22" y="438" fill="#87867f" class="text-tools" font-size="10" text-anchor="middle" transform="rotate(-90 22 438)">数据流向</text></svg>