<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- TCP/IP 4层模型 vs OSI 7层 -->
  <rect width="560" height="160" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">TCP/IP 四层模型</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- App layer -->
  <rect x="40" y="48" width="480" height="30" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="48" width="480" height="14" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="61" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">应用层</text>
  <text x="140" y="61" font-size="11" fill="#141413">HTTP · FTP · DNS · SSH</text>
  <text x="360" y="61" font-size="9" fill="#87867F">(OSI L5-L7 合并)</text>

  <line x1="280" y1="78" x2="280" y2="86" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,86 280,94 284,78" fill="#D1CFC5"/>

  <!-- Transport -->
  <rect x="40" y="86" width="480" height="26" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="86" width="480" height="13" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="98" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">传输层</text>
  <text x="140" y="98" font-size="11" fill="#141413">TCP · UDP</text>
  <text x="240" y="98" font-size="9" fill="#87867F">(OSI L4)</text>

  <line x1="280" y1="112" x2="280" y2="120" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,120 280,128 284,112" fill="#D1CFC5"/>

  <!-- Network -->
  <rect x="40" y="120" width="480" height="26" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="40" y="120" width="480" height="13" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="60" y="132" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">网络层</text>
  <text x="140" y="132" font-size="11" fill="#141413">IP · ICMP · 路由协议</text>

  <line x1="280" y1="146" x2="280" y2="154" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,154 280,162 284,154" fill="#D1CFC5"/>

  <!-- Link -->
  <rect x="40" y="154" width="480" height="8" rx="4" fill="#F0EEE6" stroke="#87867F" stroke-width="1"/>
  <text x="60" y="160" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">网络接口层</text>
  <text x="180" y="160" font-size="9" fill="#141413">Ethernet · WiFi · 物理设备</text>
  <text x="360" y="160" font-size="8" fill="#87867F">(OSI L1-L2)</text>
</svg>