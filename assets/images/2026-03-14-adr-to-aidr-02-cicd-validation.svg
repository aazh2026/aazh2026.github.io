<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"><path fill="#faf9f5" d="M0 0h900v500H0z"/><defs><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#d1cfc5" d="M0 0v6l8-3z"/></marker><filter id="shadow" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/></filter></defs><text x="450" y="35" fill="#141413" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">AIDR CI/CD 自动化验证流程</text><text x="450" y="57" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">AIDR Validation in CI/CD Pipeline — From Decision to Deployment</text><g transform="translate(30 100)"><rect width="160" height="120" fill="#fff" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="10"/><rect width="160" height="36" fill="#d97757" rx="10"/><path fill="#d97757" d="M0 26h160v16H0z"/><text x="80" y="22" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 1</text><text x="80" y="60" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">AIDR 变更</text><text x="80" y="78" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">提交新决策或修改</text><text x="80" y="96" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">触发 Pipeline</text><text x="80" y="112" fill="#788c5d" font-family="monospace" font-size="9" text-anchor="middle">git push</text></g><path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arrow)" d="M195 160h35"/><g transform="translate(240 100)"><rect width="160" height="120" fill="#fff" stroke="#e3dacc" stroke-width="1.5" filter="url(#shadow)" rx="10"/><rect width="160" height="36" fill="#e3dacc" rx="10"/><path fill="#e3dacc" d="M0 26h160v16H0z"/><text x="80" y="22" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 2</text><text x="80" y="60" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">格式验证</text><text x="80" y="78" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Schema 检查</text><text x="80" y="96" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">YAML/JSON 解析</text><text x="80" y="112" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">aidr validate --format</text></g><path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arrow)" d="M405 160h35"/><g transform="translate(450 100)"><rect width="160" height="120" fill="#fff" stroke="#e3dacc" stroke-width="1.5" filter="url(#shadow)" rx="10"/><rect width="160" height="36" fill="#e3dacc" rx="10"/><path fill="#e3dacc" d="M0 26h160v16H0z"/><text x="80" y="22" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 3</text><text x="80" y="60" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">一致性检查</text><text x="80" y="78" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">依赖关系验证</text><text x="80" y="96" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">决策冲突检测</text><text x="80" y="112" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">aidr validate --consistency</text></g><path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arrow)" d="M615 160h35"/><g transform="translate(660 100)"><rect width="160" height="120" fill="#fff" stroke="#e3dacc" stroke-width="1.5" filter="url(#shadow)" rx="10"/><rect width="160" height="36" fill="#e3dacc" rx="10"/><path fill="#e3dacc" d="M0 26h160v16H0z"/><text x="80" y="22" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 4</text><text x="80" y="60" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">代码合规</text><text x="80" y="78" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">ArchUnit / Semgrep</text><text x="80" y="96" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">规则自动检查</text><text x="80" y="112" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">aidr verify --against=src/</text></g><g transform="translate(300 250)"><rect width="300" height="80" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="1.5" rx="10"/><text x="150" y="30" fill="#788c5d" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">✓ 验证通过</text><text x="150" y="50" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">生成合规报告 → PR 自动评论</text><text x="150" y="68" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">aidr report --output=aidr-compliance.md</text></g><g transform="translate(300 350)"><rect width="300" height="80" fill="#d97757" fill-opacity=".1" stroke="#d97757" stroke-width="1.5" rx="10"/><text x="150" y="30" fill="#d97757" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">✗ 验证失败</text><text x="150" y="50" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">列出违规详情 → 阻止合并</text><text x="150" y="68" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">CI 构建失败 · 通知作者</text></g><g transform="translate(30 350)"><rect width="250" height="80" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="125" y="22" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">违规示例</text><text x="12" y="44" fill="#141413" font-family="monospace" font-size="9">AIDR-001: 服务间调用</text><text x="12" y="58" fill="#141413" font-family="monospace" font-size="9">violation at order-service:82</text><text x="12" y="72" fill="#d97757" font-family="monospace" font-size="9">直接 HTTP 调用 → 应使用 EventBridge</text></g><g transform="translate(620 350)"><rect width="250" height="80" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="125" y="22" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">合规报告示例</text><text x="12" y="44" fill="#141413" font-family="monospace" font-size="9">✓ AIDR-001 规则检查: PASS</text><text x="12" y="58" fill="#141413" font-family="monospace" font-size="9">✓ AIDR-002 规则检查: PASS</text><text x="12" y="72" fill="#141413" font-family="monospace" font-size="9">✓ 格式验证: PASS · 0 违规</text></g><path stroke="#e3dacc" d="M40 460h820"/><text x="40" y="480" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">AIDR 验证机制：可执行的架构决策才有约束力</text><text x="860" y="480" fill="#d97757" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">违反即失败 · 自动阻止合并</text></svg>