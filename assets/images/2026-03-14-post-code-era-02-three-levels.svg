<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-label="编程三层次演进">
  <title>编程的三个层次：从语法到意图</title>
  <desc>传统编程 vs 自然语言编程的层次对比，展示人类与AI职责的转移</desc>

  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EFE9"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D1CFC5"/>
    </marker>
  </defs>

  <rect width="800" height="560" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#141413">编程的三个层次</text>
  <text x="400" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#87867F">From Syntax to Intent — The Paradigm Shift</text>

  <!-- Three level cards -->
  <!-- Level 1: 语法 -->
  <g filter="url(#shadow2)">
    <rect x="60" y="100" width="220" height="180" rx="10" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
  </g>
  <rect x="60" y="100" width="220" height="44" rx="10" fill="#D97757"/>
  <rect x="60" y="126" width="220" height="18" fill="#D97757"/>
  <text x="170" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5">Level 1</text>
  <text x="170" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">语法 Syntax</text>
  <text x="170" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">括号匹配</text>
  <text x="170" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">变量命名</text>
  <text x="170" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">类型使用</text>
  <text x="170" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#788C5D">✅ AI 处理</text>
  <text x="170" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">完全自动化</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="190" x2="325" y2="190" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Level 2: 语义 -->
  <g filter="url(#shadow2)">
    <rect x="330" y="100" width="220" height="180" rx="10" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
  </g>
  <rect x="330" y="100" width="220" height="44" rx="10" fill="#D97757"/>
  <rect x="330" y="126" width="220" height="18" fill="#D97757"/>
  <text x="440" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">语义 Semantics</text>
  <text x="440" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">逻辑正确性</text>
  <text x="440" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">算法效率</text>
  <text x="440" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">边界条件</text>
  <text x="440" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#788C5D">✅ AI 处理</text>
  <text x="440" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">大部分自动化</text>

  <!-- Arrow 2→3 -->
  <line x1="550" y1="190" x2="595" y2="190" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Level 3: 意图 -->
  <g filter="url(#shadow2)">
    <rect x="600" y="100" width="140" height="180" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>
  <rect x="600" y="100" width="140" height="44" rx="10" fill="#141413"/>
  <rect x="600" y="126" width="140" height="18" fill="#141413"/>
  <text x="670" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">意图 Intent</text>
  <text x="670" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">解决什么问题</text>
  <text x="670" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">为何如此解决</text>
  <text x="670" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#141413">业务目标</text>
  <text x="670" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#D97757">👤 人类专注</text>
  <text x="670" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">核心价值所在</text>

  <!-- Transition arrow label -->
  <text x="670" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">关注点</text>

  <!-- Paradigm shift section -->
  <line x1="60" y1="310" x2="740" y2="310" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Traditional paradigm -->
  <text x="170" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#141413">传统编程</text>
  <g filter="url(#shadow2)">
    <rect x="70" y="350" width="200" height="80" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>
  <text x="170" y="378" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">人类思维</text>
  <text x="170" y="394" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">  ↓ 高成本翻译</text>
  <text x="170" y="410" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">机器执行</text>

  <!-- Arrow -->
  <line x1="270" y1="390" x2="325" y2="390" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>

  <!-- Post-code paradigm -->
  <text x="530" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#141413">后代码时代</text>
  <g filter="url(#shadow2)">
    <rect x="370" y="350" width="410" height="80" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>
  <text x="480" y="374" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">人类意图</text>
  <text x="480" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">  ↓ 直接表达</text>
  <text x="560" y="374" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">AI 翻译</text>
  <text x="560" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">  ↓ 自动化</text>
  <text x="650" y="374" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">代码生成</text>
  <text x="650" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">  ↓</text>
  <text x="730" y="374" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">机器执行</text>
  <text x="730" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#87867F">  ↓</text>

  <!-- Human role callout -->
  <g filter="url(#shadow2)">
    <rect x="60" y="460" width="680" height="70" rx="8" fill="#E3DACC"/>
  </g>
  <text x="400" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#141413">👤 人类的新角色：意图架构师 Intent Architect</text>
  <text x="400" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">清晰表达意图 · 验证 AI 结果 · 设计系统架构 · 把控业务目标</text>
</svg>
