<svg xmlns="http://www.w3.org/2000/svg" aria-label="C4 Model 四层架构图" viewBox="0 0 560 400"><title>C4 Model 四层架构</title><desc>C4 Model 的四个层次：System Context、Container、Component、Code</desc><defs><style>.border{stroke:#d1cfc5;stroke-width:1.5;fill:none}.level-badge{fill:#d97757}.level-text{font-family:&quot;JetBrains Mono&quot;,&quot;Fira Code&quot;,&quot;SF Mono&quot;,monospace;font-size:11px;fill:#faf9f5;font-weight:600}.level-desc,.level-title{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif}.level-title{font-size:14px;fill:#141413;font-weight:600}.level-desc{font-size:12px;fill:#87867f}</style></defs><rect width="560" height="400" rx="10" style="fill:#faf9f5"/><rect width="560" height="400" class="border" rx="10"/><text x="28" y="38" class="level-title" style="font-size:16px;fill:#141413">C4 Model — 软件架构可视化方法论</text><path d="M28 50h504" class="border"/><path d="M80 210v40h160v-40M80 295v40h320v-40" style="stroke:#d1cfc5;stroke-width:1.5;stroke-dasharray:3 2"/><g transform="translate(28 68)"><rect width="48" height="20" class="level-badge" rx="4"/><text x="24" y="14.5" class="level-text" text-anchor="middle">L1</text><text x="60" y="10" class="level-title">System Context</text><text x="60" y="26" class="level-desc">系统上下文 — 系统与用户、外部系统的关系</text><rect width="504" height="58" y="38" fill="#e3dacc" stroke="#d1cfc5" rx="6"/><text x="14" y="64" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 用户/角色（Actors）— 与系统交互的人或外部系统</text><text x="14" y="82" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 系统边界 — 系统本身及其与外部参与者的边界</text></g><g transform="translate(28 170)"><rect width="48" height="20" class="level-badge" rx="4"/><text x="24" y="14.5" class="level-text" text-anchor="middle">L2</text><text x="60" y="10" class="level-title">Container</text><text x="60" y="26" class="level-desc">容器 — 应用/服务级别的组件</text><rect width="504" height="58" y="38" fill="#e3dacc" stroke="#d1cfc5" rx="6"/><text x="14" y="64" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 应用/服务 — 独立的可部署单元（Web App、微服务、数据库等）</text><text x="14" y="82" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 技术选型 — 明确技术栈和通信协议</text></g><g transform="translate(28 272)"><rect width="48" height="20" class="level-badge" rx="4"/><text x="24" y="14.5" class="level-text" text-anchor="middle">L3</text><text x="60" y="10" class="level-title">Component</text><text x="60" y="26" class="level-desc">组件 — 应用内部的模块/组件</text><rect width="504" height="58" y="38" fill="#e3dacc" stroke="#d1cfc5" rx="6"/><text x="14" y="64" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 模块分组 — 相关的类/接口归类为组件</text><text x="14" y="82" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 职责划分 — 明确组件的职责和依赖关系</text></g><g transform="translate(28 374)"><rect width="48" height="20" class="level-badge" rx="4"/><text x="24" y="14.5" class="level-text" text-anchor="middle">L4</text><text x="60" y="10" class="level-title">Code</text><text x="60" y="26" class="level-desc">代码 — 类/接口级别的结构</text><rect width="504" height="58" y="38" fill="#e3dacc" stroke="#d1cfc5" rx="6"/><text x="14" y="64" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 类/接口 — 具体的代码实现细节</text><text x="14" y="82" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:12px;fill:#141413">● 方法签名 — 函数名、参数、返回值类型</text></g><g transform="translate(14 78)"><circle cx="6" cy="6" r="4" fill="#d97757"/><path stroke="#d1cfc5" stroke-width="2" d="M6 10v40"/><circle cx="6" cy="60" r="4" fill="#d97757"/><path stroke="#d1cfc5" stroke-width="2" d="M6 64v40"/><circle cx="6" cy="114" r="4" fill="#d97757"/><path stroke="#d1cfc5" stroke-width="2" d="M6 118v40"/><circle cx="6" cy="168" r="4" fill="#d97757"/></g><text x="532" y="390" style="font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;font-size:10px;fill:#87867f" text-anchor="end">C4 Model — Simon Brown</text></svg>