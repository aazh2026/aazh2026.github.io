<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI成本结构图" viewBox="0 0 680 360">
  <title>AI成本结构分析</title>
  <desc>
    AI应用成本的四大组成部分：Token成本、存储成本、推理成本和其他成本
  </desc>
  <defs>
    <filter id="shadow" width="110%" height="115%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <rect width="160" height="60" x="20" y="20" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" filter="url(#shadow)" rx="10"/>
  <text x="100" y="44" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">总成本</text>
  <text x="100" y="64" fill="#d97706" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">$10,000</text>
  <rect width="200" height="100" x="200" y="20" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="300" y="42" fill="#991b1b" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Token成本</text>
  <text x="300" y="62" fill="#dc2626" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">$7,000</text>
  <text x="300" y="80" fill="#b91c1c" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">70%</text>
  <path stroke="#fca5a5" d="M210 88h180"/>
  <text x="220" y="103" fill="#991b1b" font-family="system-ui,-apple-system,sans-serif" font-size="10">输入: $2,000</text>
  <text x="310" y="103" fill="#991b1b" font-family="system-ui,-apple-system,sans-serif" font-size="10">输出: $5,000</text>
  <rect width="200" height="100" x="420" y="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="520" y="42" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">存储成本</text>
  <text x="520" y="62" fill="#2563eb" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">$1,500</text>
  <text x="520" y="80" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">15%</text>
  <path stroke="#93c5fd" d="M430 88h180"/>
  <text x="440" y="103" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="10">向量DB: $800</text>
  <text x="545" y="103" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="10">对话历史: $700</text>
  <rect width="200" height="100" x="200" y="140" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="300" y="162" fill="#065f46" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">其他成本</text>
  <text x="300" y="182" fill="#059669" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">$1,500</text>
  <text x="300" y="200" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">15%</text>
  <path stroke="#6ee7b7" d="M210 208h180"/>
  <text x="220" y="223" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="10">推理托管: $1,000</text>
  <text x="330" y="223" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="10">日志监控: $500</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arr)" d="M180 50h20"/>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arr)" d="M180 70h20"/>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arr)" d="M180 90h20"/>
  <defs>
    <marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#d1cfc5" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#arr2)" d="M100 80v60"/>
  <defs>
    <marker id="arr2" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="6">
      <path fill="#d1cfc5" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <circle cx="640" cy="60" r="40" fill="none" stroke="#d1cfc5"/>
  <path fill="#dc2626" d="M640 60V20a40 40 0 1 1-40 40Z" opacity=".8"/>
  <path fill="#2563eb" d="M640 60h-40a40 40 0 0 1 40-40Z" opacity=".8"/>
  <path fill="#059669" d="M640 60h-40a40 40 0 0 1 80 0Z" opacity=".8"/>
  <text x="640" y="120" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="9" text-anchor="middle">成本分布</text>
  <rect width="460" height="75" x="200" y="265" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="430" y="288" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">优化优先级</text>
  <path stroke="#d1cfc5" d="M220 298h420"/>
  <rect width="12" height="12" x="220" y="308" fill="#dc2626" rx="2"/>
  <text x="238" y="319" fill="#991b1b" font-family="system-ui,-apple-system,sans-serif" font-size="11">Token成本 (最重要)</text>
  <rect width="12" height="12" x="360" y="308" fill="#2563eb" rx="2"/>
  <text x="378" y="319" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="11">存储成本</text>
  <rect width="12" height="12" x="480" y="308" fill="#059669" rx="2"/>
  <text x="498" y="319" fill="#065f46" font-family="system-ui,-apple-system,sans-serif" font-size="11">推理成本</text>
</svg>
