<svg xmlns="http://www.w3.org/2000/svg" aria-label="代码敏感度分级金字塔" viewBox="0 0 800 500"><title>代码敏感度分级金字塔</title><desc>混合云架构中代码敏感度从L1到L4的分级模型，金字塔结构展示安全等级与代码类型的关系</desc><defs><linearGradient id="bgGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient><linearGradient id="l1Grad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#87867f"/><stop offset="100%" stop-color="#d1cfc5"/></linearGradient><linearGradient id="l2Grad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#788c5d"/><stop offset="100%" stop-color="#9aab80"/></linearGradient><linearGradient id="l3Grad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#d97757"/><stop offset="100%" stop-color="#e8957a"/></linearGradient><linearGradient id="l4Grad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#141413"/><stop offset="100%" stop-color="#3a3a38"/></linearGradient></defs><path fill="url(#bgGrad)" d="M0 0h800v500H0z"/><text x="400" y="38" fill="#141413" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">代码敏感度分级模型</text><text x="400" y="58" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Code Sensitivity Classification Model — 混合云架构核心</text><path fill="url(#l1Grad)" d="m400 90 90 70H310z"/><text x="400" y="132" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">L1</text><text x="400" y="148" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">公开代码</text><path fill="url(#l2Grad)" d="M310 165h180l50 75H260z"/><text x="400" y="208" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">L2</text><text x="400" y="226" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">内部代码</text><path fill="url(#l3Grad)" d="M260 245h280l50 75H210z"/><text x="400" y="288" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">L3</text><text x="400" y="306" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">敏感代码</text><path fill="url(#l4Grad)" d="M210 325h380l50 75H160z"/><text x="400" y="368" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">L4</text><text x="400" y="386" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">核心代码</text><g fill="#141413" font-family="system-ui, sans-serif" font-size="11"><text x="30" y="115" font-weight="600">Public</text><text x="30" y="130" fill="#87867f">开源工具、算法</text><text x="30" y="195" font-weight="600">Internal</text><text x="30" y="210" fill="#87867f">脚手架、配置</text><text x="30" y="275" font-weight="600">Sensitive</text><text x="30" y="290" fill="#87867f">业务逻辑、接口</text><text x="30" y="358" font-weight="600">Critical</text><text x="30" y="373" fill="#87867f">加密、风控</text></g><g font-family="system-ui, sans-serif" font-size="11"><text x="660" y="115" fill="#141413" font-weight="600">☁️ 云端生成</text><text x="660" y="130" fill="#87867f">无限制</text><text x="660" y="195" fill="#141413" font-weight="600">☁️ 云端生成</text><text x="660" y="210" fill="#87867f">内部审核</text><text x="660" y="275" fill="#141413" font-weight="600">🔀 混合模式</text><text x="660" y="290" fill="#87867f">本地+云端辅助</text><text x="660" y="358" fill="#141413" font-weight="600">🔒 纯本地生成</text><text x="660" y="373" fill="#87867f">AI仅提供建议</text></g><g transform="translate(760 90)"><defs><marker id="arrowUp" markerHeight="6" markerWidth="6" orient="auto" refX="3" refY="3"><path fill="#141413" d="m0 6 3-6 3 6"/></marker></defs><path stroke="#141413" stroke-width="2" marker-end="url(#arrowUp)" d="M0 310V0"/><text x="12" y="160" fill="#141413" font-family="system-ui, sans-serif" font-size="10" transform="rotate(90 12 160)">安全等级 →</text></g><g transform="translate(0 420)"><rect width="160" height="50" x="20" fill="#d1cfc5" rx="6"/><text x="100" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">示例：HTTP客户端</text><text x="100" y="35" fill="#87867f" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">日志格式化 · 配置解析</text><rect width="160" height="50" x="200" fill="#e3dacc" rx="6"/><text x="280" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">示例：订单处理</text><text x="280" y="35" fill="#87867f" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">用户权限模型 · 数据模型</text><rect width="160" height="50" x="420" fill="#d97757" opacity=".25" rx="6"/><text x="500" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">示例：交易引擎</text><text x="500" y="35" fill="#87867f" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">加密算法 · 风控模型</text><rect width="160" height="50" x="620" fill="#141413" opacity=".15" rx="6"/><text x="700" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">示例：密钥管理</text><text x="700" y="35" fill="#87867f" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">核心算法 · 密钥管理</text></g></svg>