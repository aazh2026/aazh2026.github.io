<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="代码敏感度分级金字塔">
  <title>代码敏感度分级金字塔</title>
  <desc>混合云架构中代码敏感度从L1到L4的分级模型，金字塔结构展示安全等级与代码类型的关系</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <linearGradient id="l1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87867F"/>
      <stop offset="100%" stop-color="#D1CFC5"/>
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#9aab80"/>
    </linearGradient>
    <linearGradient id="l3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#e8957a"/>
    </linearGradient>
    <linearGradient id="l4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141413"/>
      <stop offset="100%" stop-color="#3a3a38"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#141413">代码敏感度分级模型</text>
  <text x="400" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">Code Sensitivity Classification Model — 混合云架构核心</text>

  <!-- Pyramid L1 (top, smallest) -->
  <polygon points="400,90 490,160 310,160" fill="url(#l1Grad)"/>
  <text x="400" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">L1</text>
  <text x="400" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5">公开代码</text>

  <!-- Pyramid L2 -->
  <polygon points="310,165 490,165 540,240 260,240" fill="url(#l2Grad)"/>
  <text x="400" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">L2</text>
  <text x="400" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5">内部代码</text>

  <!-- Pyramid L3 -->
  <polygon points="260,245 540,245 590,320 210,320" fill="url(#l3Grad)"/>
  <text x="400" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">L3</text>
  <text x="400" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5">敏感代码</text>

  <!-- Pyramid L4 (bottom, largest) -->
  <polygon points="210,325 590,325 640,400 160,400" fill="url(#l4Grad)"/>
  <text x="400" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FAF9F5">L4</text>
  <text x="400" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5">核心代码</text>

  <!-- Left side labels -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#141413">
    <text x="30" y="115" font-weight="600">Public</text>
    <text x="30" y="130" fill="#87867F">开源工具、算法</text>

    <text x="30" y="195" font-weight="600">Internal</text>
    <text x="30" y="210" fill="#87867F">脚手架、配置</text>

    <text x="30" y="275" font-weight="600">Sensitive</text>
    <text x="30" y="290" fill="#87867F">业务逻辑、接口</text>

    <text x="30" y="358" font-weight="600">Critical</text>
    <text x="30" y="373" fill="#87867F">加密、风控</text>
  </g>

  <!-- Right side: generation mode -->
  <g font-family="system-ui, sans-serif" font-size="11">
    <text x="660" y="115" fill="#141413" font-weight="600">☁️ 云端生成</text>
    <text x="660" y="130" fill="#87867F">无限制</text>

    <text x="660" y="195" fill="#141413" font-weight="600">☁️ 云端生成</text>
    <text x="660" y="210" fill="#87867F">内部审核</text>

    <text x="660" y="275" fill="#141413" font-weight="600">🔀 混合模式</text>
    <text x="660" y="290" fill="#87867F">本地+云端辅助</text>

    <text x="660" y="358" fill="#141413" font-weight="600">🔒 纯本地生成</text>
    <text x="660" y="373" fill="#87867F">AI仅提供建议</text>
  </g>

  <!-- Arrow on right indicating security level -->
  <g transform="translate(760, 90)">
    <defs>
      <marker id="arrowUp" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,6 L3,0 L6,6" fill="#141413"/>
      </marker>
    </defs>
    <line x1="0" y1="310" x2="0" y2="0" stroke="#141413" stroke-width="2" marker-end="url(#arrowUp)"/>
    <text x="12" y="160" font-family="system-ui, sans-serif" font-size="10" fill="#141413" transform="rotate(90, 12, 160)">安全等级 →</text>
  </g>

  <!-- Examples at bottom -->
  <g transform="translate(0, 420)">
    <rect x="20" y="0" width="160" height="50" rx="6" fill="#D1CFC5"/>
    <text x="100" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#141413">示例：HTTP客户端</text>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">日志格式化 · 配置解析</text>

    <rect x="200" y="0" width="160" height="50" rx="6" fill="#E3DACC"/>
    <text x="280" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#141413">示例：订单处理</text>
    <text x="280" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">用户权限模型 · 数据模型</text>

    <rect x="420" y="0" width="160" height="50" rx="6" fill="#D97757" opacity="0.25"/>
    <text x="500" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#141413">示例：交易引擎</text>
    <text x="500" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">加密算法 · 风控模型</text>

    <rect x="620" y="0" width="160" height="50" rx="6" fill="#141413" opacity="0.15"/>
    <text x="700" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#141413">示例：密钥管理</text>
    <text x="700" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">核心算法 · 密钥管理</text>
  </g>
</svg>
