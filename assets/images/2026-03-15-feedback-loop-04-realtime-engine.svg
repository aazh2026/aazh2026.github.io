<svg xmlns="http://www.w3.org/2000/svg" aria-label="实时反馈系统三要素" viewBox="0 0 540 260">
  <title>实时反馈系统三要素</title>
  <desc>
    实时反馈系统的三个核心要素：Intent-Driven、Context-Rich、Action-Ready
  </desc>
  <defs>
    <filter id="shadow" width="110%" height="115%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h540v260H0z"/>
  <rect width="200" height="80" x="170" y="80" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)" rx="12"/>
  <text x="270" y="110" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" text-anchor="middle">实时反馈引擎</text>
  <text x="270" y="130" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">Real-Time Engine</text>
  <path stroke="#93c5fd" d="M185 142h170"/>
  <text x="270" y="156" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">核心处理中枢</text>
  <rect width="130" height="60" x="20" y="30" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="85" y="55" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Intent-Driven</text>
  <text x="85" y="73" fill="#b45309" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">意图驱动</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#a1)" d="m150 60 20 40"/>
  <defs>
    <marker id="a1" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="130" height="60" x="20" y="160" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="85" y="185" fill="#065f46" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Context-Rich</text>
  <text x="85" y="203" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">上下文丰富</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#a2)" d="m150 190 20-35"/>
  <defs>
    <marker id="a2" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="130" height="60" x="390" y="160" fill="#fed7aa" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="455" y="185" fill="#c2410c" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Action-Ready</text>
  <text x="455" y="203" fill="#9a3412" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">行动就绪</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="2" marker-end="url(#a3)" d="m370 155 20 35"/>
  <defs>
    <marker id="a3" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="130" height="110" x="390" y="30" fill="#faf9f5" stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="1.5" rx="8"/>
  <text x="455" y="50" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">三要素说明</text>
  <path stroke="#d1cfc5" d="M400 58h110"/>
  <text x="400" y="76" fill="#78716c" font-family="system-ui,-apple-system,sans-serif" font-size="10">• 反馈基于明确意图</text>
  <text x="400" y="92" fill="#78716c" font-family="system-ui,-apple-system,sans-serif" font-size="10">• 上下文质量决定</text>
  <text x="400" y="104" fill="#78716c" font-family="system-ui,-apple-system,sans-serif" font-size="10">  反馈质量</text>
  <text x="400" y="120" fill="#78716c" font-family="system-ui,-apple-system,sans-serif" font-size="10">• 反馈必须可</text>
  <text x="400" y="132" fill="#78716c" font-family="system-ui,-apple-system,sans-serif" font-size="10">  立即行动</text>
  <text x="270" y="230" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">三要素缺一不可，共同驱动实时反馈引擎</text>
</svg>
