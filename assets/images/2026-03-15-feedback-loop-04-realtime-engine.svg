<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260" role="img" aria-label="实时反馈系统三要素">
  <title>实时反馈系统三要素</title>
  <desc>实时反馈系统的三个核心要素：Intent-Driven、Context-Rich、Action-Ready</desc>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="540" height="260" fill="#FAF9F5"/>

  <!-- 中心引擎 -->
  <rect x="170" y="80" width="200" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="270" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1e40af">实时反馈引擎</text>
  <text x="270" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1e3a8a">Real-Time Engine</text>
  <line x1="185" y1="142" x2="355" y2="142" stroke="#93c5fd" stroke-width="1"/>
  <text x="270" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">核心处理中枢</text>

  <!-- Intent-Driven -->
  <rect x="20" y="30" width="130" height="60" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="55" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#92400e">Intent-Driven</text>
  <text x="85" y="73" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b45309">意图驱动</text>

  <!-- Arrow: Intent -> Engine -->
  <path d="M150,60 L170,100" stroke="#D1CFC5" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <defs><marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>

  <!-- Context-Rich -->
  <rect x="20" y="160" width="130" height="60" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#065f46">Context-Rich</text>
  <text x="85" y="203" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">上下文丰富</text>

  <!-- Arrow: Context -> Engine -->
  <path d="M150,190 L170,155" stroke="#D1CFC5" stroke-width="2" fill="none" marker-end="url(#a2)"/>
  <defs><marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>

  <!-- Action-Ready -->
  <rect x="390" y="160" width="130" height="60" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="455" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#c2410c">Action-Ready</text>
  <text x="455" y="203" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9a3412">行动就绪</text>

  <!-- Arrow: Engine -> Action -->
  <path d="M370,155 L390,190" stroke="#D1CFC5" stroke-width="2" fill="none" marker-end="url(#a3)"/>
  <defs><marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>

  <!-- 右侧说明 -->
  <rect x="390" y="30" width="130" height="110" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="455" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">三要素说明</text>
  <line x1="400" y1="58" x2="510" y2="58" stroke="#D1CFC5" stroke-width="1"/>
  <text x="400" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">• 反馈基于明确意图</text>
  <text x="400" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">• 上下文质量决定</text>
  <text x="400" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">  反馈质量</text>
  <text x="400" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">• 反馈必须可</text>
  <text x="400" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">  立即行动</text>

  <!-- 底部说明 -->
  <text x="270" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">三要素缺一不可，共同驱动实时反馈引擎</text>
</svg>