<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- CDD 五阶段循环 -->
  <rect width="560" height="220" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">CDD 五阶段上下文循环</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/06/08</text>

  <!-- S1: Harvest -->
  <rect x="40" y="60" width="90" height="70" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="60" width="90" height="16" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="85" y="73" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">S1 · Harvest</text>
  <text x="85" y="92" text-anchor="middle" font-size="8.5" fill="#141413">采集</text>
  <text x="85" y="105" text-anchor="middle" font-size="8" fill="#87867F">代码·文档·数据库</text>
  <text x="85" y="117" text-anchor="middle" font-size="8" fill="#87867F">人工录入业务知识</text>
  <rect x="122" y="80" width="12" height="12" rx="6" fill="#D97757"/>
  <text x="128" y="89" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">1</text>

  <!-- Arrow 1→2 -->
  <line x1="130" y1="95" x2="148" y2="95" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="148,91 156,95 148,99" fill="#D1CFC5"/>

  <!-- S2: Process -->
  <rect x="156" y="60" width="90" height="70" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="156" y="60" width="90" height="16" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="201" y="73" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">S2 · Process</text>
  <text x="201" y="92" text-anchor="middle" font-size="8.5" fill="#141413">加工</text>
  <text x="201" y="105" text-anchor="middle" font-size="8" fill="#87867F">清洗·去重·冲突解决</text>
  <text x="201" y="117" text-anchor="middle" font-size="8" fill="#87867F">摘要·索引</text>
  <rect x="238" y="80" width="12" height="12" rx="6" fill="#EA580C"/>
  <text x="244" y="89" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">2</text>

  <!-- Arrow 2→3 -->
  <line x1="246" y1="95" x2="264" y2="95" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="264,91 272,95 264,99" fill="#D1CFC5"/>

  <!-- S3: Store -->
  <rect x="272" y="60" width="90" height="70" rx="6" fill="#FFFFFF" stroke="#F97316" stroke-width="1.5"/>
  <rect x="272" y="60" width="90" height="16" rx="6" fill="#FDBA74" stroke="#F97316" stroke-width="1"/>
  <text x="317" y="73" text-anchor="middle" font-size="9" fill="#F97316" font-family="ui-monospace, monospace" font-weight="600">S3 · Store</text>
  <text x="317" y="92" text-anchor="middle" font-size="8.5" fill="#141413">存储</text>
  <text x="317" y="105" text-anchor="middle" font-size="8" fill="#87867F">版本控制</text>
  <text x="317" y="117" text-anchor="middle" font-size="8" fill="#87867F">分层组织·权限管理</text>
  <rect x="354" y="80" width="12" height="12" rx="6" fill="#F97316"/>
  <text x="360" y="89" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">3</text>

  <!-- Arrow 3→4 -->
  <line x1="362" y1="95" x2="380" y2="95" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="380,91 388,95 380,99" fill="#D1CFC5"/>

  <!-- S4: Deliver -->
  <rect x="388" y="60" width="90" height="70" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="388" y="60" width="90" height="16" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="433" y="73" text-anchor="middle" font-size="9" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">S4 · Deliver</text>
  <text x="433" y="92" text-anchor="middle" font-size="8.5" fill="#141413">配送</text>
  <text x="433" y="105" text-anchor="middle" font-size="8" fill="#87867F">动态组装上下文</text>
  <text x="433" y="117" text-anchor="middle" font-size="8" fill="#87867F">注入AI会话·监控token</text>
  <rect x="470" y="80" width="12" height="12" rx="6" fill="#2563EB"/>
  <text x="476" y="89" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">4</text>

  <!-- Arrow 4→5 -->
  <line x1="433" y1="130" x2="433" y2="150" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="429,150 433,158 437,150" fill="#D1CFC5"/>

  <!-- S5: Feedback (bottom center) -->
  <rect x="388" y="158" width="90" height="52" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="388" y="158" width="90" height="16" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="433" y="171" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">S5 · Feedback</text>
  <text x="433" y="186" text-anchor="middle" font-size="8.5" fill="#141413">反馈</text>
  <text x="433" y="199" text-anchor="middle" font-size="8" fill="#87867F">收集AI输出质量</text>
  <rect x="470" y="168" width="12" height="12" rx="6" fill="#059669"/>
  <text x="476" y="177" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">5</text>

  <!-- Feedback loop: S5 → S1 -->
  <path d="M 388 184 Q 20 184 85 130" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="85,130 80,137 90,137" fill="#D1CFC5"/>
  <text x="200" y="200" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">持续优化循环</text>
</svg>