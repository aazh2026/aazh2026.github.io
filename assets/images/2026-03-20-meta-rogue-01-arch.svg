<svg xmlns="http://www.w3.org/2000/svg" aria-label="企业级 AI Agent 典型架构" viewBox="0 0 720 500">
  <title>企业级 AI Agent 典型架构</title>
  <desc>
    用户触发器 → Agent 核心（意图理解、任务规划、工具调用）→ 权限边界（文件系统、网络访问、代码执行）
  </desc>
  <defs>
    <filter id="shadow" width="108%" height="108%" x="-4%" y="-4%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/>
    </filter>
    <filter id="subshadow" width="116%" height="116%" x="-8%" y="-8%">
      <feDropShadow dx="0" dy="1" flood-color="#141413" flood-opacity=".12" stdDeviation="2"/>
    </filter>
    <marker id="arrow" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#d97757" d="m0 0 10 3.5L0 7z"/>
    </marker>
  </defs>
  <path fill="#faf9f5" d="M0 0h720v500H0z"/>
  <rect width="620" height="90" x="50" y="30" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <rect width="620" height="5" x="50" y="30" fill="#d97757" rx="3"/>
  <text x="360" y="68" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" font-weight="600" text-anchor="middle">用户 / 触发器</text>
  <text x="360" y="92" fill="#87867f" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" text-anchor="middle">自然语言指令 / API 调用 / 定时任务</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrow)" d="M360 120v30"/>
  <rect width="620" height="130" x="50" y="150" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <rect width="620" height="5" x="50" y="150" fill="#788c5d" rx="3"/>
  <text x="360" y="182" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" text-anchor="middle">Agent 核心</text>
  <rect width="160" height="58" x="88" y="200" fill="#e3dacc" stroke="#d1cfc5" filter="url(#subshadow)" rx="6"/>
  <text x="168" y="230" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" text-anchor="middle">意图理解</text>
  <text x="168" y="248" fill="#87867f" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">Intent Understanding</text>
  <rect width="160" height="58" x="280" y="200" fill="#e3dacc" stroke="#d1cfc5" filter="url(#subshadow)" rx="6"/>
  <text x="360" y="230" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" text-anchor="middle">任务规划</text>
  <text x="360" y="248" fill="#87867f" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">Task Planning</text>
  <rect width="160" height="58" x="472" y="200" fill="#e3dacc" stroke="#d1cfc5" filter="url(#subshadow)" rx="6"/>
  <text x="552" y="230" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" text-anchor="middle">工具调用</text>
  <text x="552" y="248" fill="#87867f" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">Tool Use</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrow)" d="M360 280v30"/>
  <rect width="620" height="160" x="50" y="310" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <rect width="620" height="5" x="50" y="310" fill="#d97757" rx="3"/>
  <text x="360" y="342" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" text-anchor="middle">权限边界</text>
  <rect width="160" height="82" x="88" y="360" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" filter="url(#subshadow)" rx="6"/>
  <rect width="32" height="32" x="152" y="372" fill="#d97757" opacity=".12" rx="50%"/>
  <text x="168" y="395" fill="#d97757" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" text-anchor="middle">🔒</text>
  <text x="168" y="418" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" text-anchor="middle">文件系统</text>
  <text x="168" y="434" fill="#d97757" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">受限</text>
  <rect width="160" height="82" x="280" y="360" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" filter="url(#subshadow)" rx="6"/>
  <rect width="32" height="32" x="344" y="372" fill="#d97757" opacity=".12" rx="50%"/>
  <text x="360" y="395" fill="#d97757" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" text-anchor="middle">🔒</text>
  <text x="360" y="418" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" text-anchor="middle">网络访问</text>
  <text x="360" y="434" fill="#d97757" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">受限</text>
  <rect width="160" height="82" x="472" y="360" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" filter="url(#subshadow)" rx="6"/>
  <rect width="32" height="32" x="536" y="372" fill="#d97757" opacity=".12" rx="50%"/>
  <text x="552" y="395" fill="#d97757" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" text-anchor="middle">🔒</text>
  <text x="552" y="418" fill="#141413" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" text-anchor="middle">代码执行</text>
  <text x="552" y="434" fill="#d97757" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">受限</text>
</svg>
