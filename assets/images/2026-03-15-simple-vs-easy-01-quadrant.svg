<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="简单性 vs 容易性四象限图">
  <title>简单性 vs 容易性四象限</title>
  <desc>基于心智负担和组合性两个维度，对比简单性与容易性的特征差异</desc>

  <!-- 背景 -->
  <rect width="800" height="420" fill="#FAF9F5"/>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#141413">简单性 vs 容易性：四象限对比</text>
  <text x="400" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">Rich Hickey "Simple Made Easy" 核心框架 · 心智负担 × 组合性</text>

  <!-- 轴线 -->
  <!-- X轴 (水平) -->
  <line x1="120" y1="340" x2="720" y2="340" stroke="#87867F" stroke-width="1.5"/>
  <text x="420" y="360" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#141413">认知负载 (Cognitive Load)</text>
  <text x="200" y="375" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87867F">低 · 一次理解</text>
  <text x="640" y="375" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87867F">高 · 交织复杂</text>
  <polygon points="720,335 730,340 720,345" fill="#87867F"/>

  <!-- Y轴 (垂直) -->
  <line x1="120" y1="340" x2="120" y2="80" stroke="#87867F" stroke-width="1.5"/>
  <text x="70" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#141413" transform="rotate(-90, 70, 210)">组合性 (Composability)</text>
  <text x="50" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87867F">高</text>
  <text x="50" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87867F">低</text>
  <polygon points="115,80 120,70 125,80" fill="#87867F"/>

  <!-- 象限分隔线 -->
  <line x1="420" y1="340" x2="420" y2="80" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="120" y1="210" x2="720" y2="210" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 象限1: 右上 - 复杂（高认知+低组合） -->
  <rect x="425" y="85" width="290" height="120" rx="8" fill="#D97757" opacity="0.15"/>
  <text x="570" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#D97757">⚠️ 复杂陷阱</text>
  <text x="570" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#141413">容易获得，难于摆脱</text>
  <text x="570" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 隐藏依赖链</text>
  <text x="570" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 黑盒魔法</text>
  <text x="570" y="171" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 债务累积</text>
  <text x="570" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#D97757">AI 快速生成的代码</text>

  <!-- 象限2: 左上 - 真正简单（低认知+高组合） -->
  <rect x="125" y="85" width="290" height="120" rx="8" fill="#788C5D" opacity="0.15"/>
  <text x="270" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#788C5D">✅ 真正简单</text>
  <text x="270" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#141413">高认知投入，低长期成本</text>
  <text x="270" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 单一职责</text>
  <text x="270" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 显式优于隐式</text>
  <text x="270" y="171" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 局部完整</text>
  <text x="270" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#788C5D">长期价值 · 可维护 · 可测试</text>

  <!-- 象限3: 左下 - 简单但困难（低认知+低组合） -->
  <rect x="125" y="215" width="290" height="120" rx="8" fill="#D1CFC5" opacity="0.3"/>
  <text x="270" y="238" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#87867F">⏸️ 简单但陌生</text>
  <text x="270" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#141413">需学习，但值得</text>
  <text x="270" y="275" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 函数式思维</text>
  <text x="270" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 低层语言</text>
  <text x="270" y="301" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 新范式</text>
  <text x="270" y="320" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">学习曲线，但终有回报</text>

  <!-- 象限4: 右下 - 表面容易（高认知+高组合=假象） -->
  <rect x="425" y="215" width="290" height="120" rx="8" fill="#E3DACC" opacity="0.5"/>
  <text x="570" y="238" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#141413">🎯 表面容易</text>
  <text x="570" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#141413">看起来顺手，实则复杂</text>
  <text x="570" y="275" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 复杂框架</text>
  <text x="570" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 大量依赖</text>
  <text x="570" y="301" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">• 魔法糖</text>
  <text x="570" y="320" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#141413">"感觉不错" ≠ "设计良好"</text>

  <!-- 关键引言 -->
  <rect x="120" y="355" width="600" height="50" rx="6" fill="#141413"/>
  <text x="420" y="374" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">"我们选择容易，是因为简单很难。"</text>
  <text x="420" y="394" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E3DACC">— Rich Hickey · Simple Made Easy (2011)</text>

  <!-- 位置标签 -->
  <text x="130" y="78" font-family="sans-serif" font-size="9" fill="#788C5D" font-weight="bold">理想区域</text>
  <text x="695" y="78" font-family="sans-serif" font-size="9" fill="#D97757" font-weight="bold">危险区域</text>
</svg>
