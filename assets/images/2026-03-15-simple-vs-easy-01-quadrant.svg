<svg xmlns="http://www.w3.org/2000/svg" aria-label="简单性 vs 容易性四象限图" viewBox="0 0 800 420"><title>简单性 vs 容易性四象限</title><desc>基于心智负担和组合性两个维度，对比简单性与容易性的特征差异</desc><path fill="#faf9f5" d="M0 0h800v420H0z"/><text x="400" y="28" fill="#141413" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle">简单性 vs 容易性：四象限对比</text><text x="400" y="46" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">Rich Hickey &quot;Simple Made Easy&quot; 核心框架 · 心智负担 × 组合性</text><path stroke="#87867f" stroke-width="1.5" d="M120 340h600"/><text x="420" y="360" fill="#141413" font-family="sans-serif" font-size="12" text-anchor="middle">认知负载 (Cognitive Load)</text><text x="200" y="375" fill="#87867f" font-family="sans-serif" font-size="10" text-anchor="middle">低 · 一次理解</text><text x="640" y="375" fill="#87867f" font-family="sans-serif" font-size="10" text-anchor="middle">高 · 交织复杂</text><path fill="#87867f" d="m720 335 10 5-10 5z"/><path stroke="#87867f" stroke-width="1.5" d="M120 340V80"/><text x="70" y="210" fill="#141413" font-family="sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 70 210)">组合性 (Composability)</text><text x="50" y="100" fill="#87867f" font-family="sans-serif" font-size="10" text-anchor="middle">高</text><text x="50" y="320" fill="#87867f" font-family="sans-serif" font-size="10" text-anchor="middle">低</text><path fill="#87867f" d="m115 80 5-10 5 10z"/><path stroke="#d1cfc5" stroke-dasharray="6,4" d="M420 340V80M120 210h600"/><rect width="290" height="120" x="425" y="85" fill="#d97757" opacity=".15" rx="8"/><text x="570" y="108" fill="#d97757" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">⚠️ 复杂陷阱</text><text x="570" y="126" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="middle">容易获得，难于摆脱</text><text x="570" y="145" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 隐藏依赖链</text><text x="570" y="158" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 黑盒魔法</text><text x="570" y="171" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 债务累积</text><text x="570" y="190" fill="#d97757" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">AI 快速生成的代码</text><rect width="290" height="120" x="125" y="85" fill="#788c5d" opacity=".15" rx="8"/><text x="270" y="108" fill="#788c5d" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">✅ 真正简单</text><text x="270" y="126" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="middle">高认知投入，低长期成本</text><text x="270" y="145" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 单一职责</text><text x="270" y="158" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 显式优于隐式</text><text x="270" y="171" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 局部完整</text><text x="270" y="190" fill="#788c5d" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">长期价值 · 可维护 · 可测试</text><rect width="290" height="120" x="125" y="215" fill="#d1cfc5" opacity=".3" rx="8"/><text x="270" y="238" fill="#87867f" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">⏸️ 简单但陌生</text><text x="270" y="256" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="middle">需学习，但值得</text><text x="270" y="275" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 函数式思维</text><text x="270" y="288" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 低层语言</text><text x="270" y="301" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 新范式</text><text x="270" y="320" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">学习曲线，但终有回报</text><rect width="290" height="120" x="425" y="215" fill="#e3dacc" opacity=".5" rx="8"/><text x="570" y="238" fill="#141413" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">🎯 表面容易</text><text x="570" y="256" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="middle">看起来顺手，实则复杂</text><text x="570" y="275" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 复杂框架</text><text x="570" y="288" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 大量依赖</text><text x="570" y="301" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">• 魔法糖</text><text x="570" y="320" fill="#141413" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">&quot;感觉不错&quot; ≠ &quot;设计良好&quot;</text><rect width="600" height="50" x="120" y="355" fill="#141413" rx="6"/><text x="420" y="374" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">&quot;我们选择容易，是因为简单很难。&quot;</text><text x="420" y="394" fill="#e3dacc" font-family="sans-serif" font-size="10" text-anchor="middle">— Rich Hickey · Simple Made Easy (2011)</text><text x="130" y="78" fill="#788c5d" font-family="sans-serif" font-size="9" font-weight="bold">理想区域</text><text x="695" y="78" fill="#d97757" font-family="sans-serif" font-size="9" font-weight="bold">危险区域</text></svg>