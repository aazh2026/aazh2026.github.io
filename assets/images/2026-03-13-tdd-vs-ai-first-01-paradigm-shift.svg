<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg4" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f5"/>
      <stop offset="100%" style="stop-color:#e3dacc"/>
    </linearGradient>
    <filter id="shadow4" width="140%" height="140%" x="-20%" y="-20%">
      <feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="900" height="480" fill="url(#bg4)" rx="12"/>
  <text x="450" y="38" fill="#141413" font-size="20" font-weight="700" text-anchor="middle">TDD vs AI-First 测试范式转变</text>
  <text x="450" y="60" fill="#87867f" font-size="12" text-anchor="middle">从&quot;人类写测试验证代码&quot;到&quot;人类定义意图，AI 生成验证&quot;</text>
  <g filter="url(#shadow4)" transform="translate(40 85)">
    <rect width="380" height="300" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <rect width="380" height="36" fill="#d1cfc5" rx="8" ry="0"/>
    <path fill="#d1cfc5" d="M0 28h380v8H0z"/>
    <text x="190" y="24" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">经典 TDD 流程</text>
    <g transform="translate(20 52)">
      <rect width="340" height="50" fill="#d97757" fill-opacity=".1" stroke="#d97757" rx="6"/>
      <circle cx="20" cy="25" r="14" fill="#d97757"/>
      <text x="20" y="30" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">红</text>
      <text x="45" y="20" fill="#d97757" font-size="12" font-weight="600">写一个失败的测试</text>
      <text x="45" y="36" fill="#87867f" font-size="10">人类先思考测试场景</text>
    </g>
    <g transform="translate(20 112)">
      <rect width="340" height="50" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" rx="6"/>
      <circle cx="20" cy="25" r="14" fill="#788c5d"/>
      <text x="20" y="30" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">绿</text>
      <text x="45" y="20" fill="#788c5d" font-size="12" font-weight="600">写最少代码让测试通过</text>
      <text x="45" y="36" fill="#87867f" font-size="10">速度假设：写测试快，写实现慢</text>
    </g>
    <g transform="translate(20 172)">
      <rect width="340" height="50" fill="#141413" fill-opacity=".05" stroke="#d1cfc5" rx="6"/>
      <circle cx="20" cy="25" r="14" fill="#141413"/>
      <text x="20" y="30" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">重构</text>
      <text x="45" y="20" fill="#141413" font-size="12" font-weight="600">优化代码，保持测试通过</text>
      <text x="45" y="36" fill="#87867f" font-size="10">测试作为安全网</text>
    </g>
    <text x="20" y="245" fill="#d97757" font-size="12" font-weight="700">AI 时代的困境</text>
    <text x="20" y="265" fill="#141413" font-size="10">• AI 生成代码极快，TDD 循环显得笨拙</text>
    <text x="20" y="280" fill="#141413" font-size="10">• 测试维护成本高（改文案需改 47 个测试）</text>
    <text x="20" y="295" fill="#141413" font-size="10">• 测试耦合实现细节，脆弱易碎</text>
  </g>
  <path fill="none" stroke="#d97757" stroke-width="3" marker-end="url(#arr2)" d="M430 235h50"/>
  <defs>
    <marker id="arr2" markerHeight="10" markerWidth="10" orient="auto" refX="9" refY="3">
      <path fill="#d97757" d="M0 0v6l9-3z"/>
    </marker>
  </defs>
  <g filter="url(#shadow4)" transform="translate(500 85)">
    <rect width="360" height="300" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/>
    <rect width="360" height="36" fill="#788c5d" rx="8" ry="0"/>
    <path fill="#788c5d" d="M0 28h360v8H0z"/>
    <text x="180" y="24" fill="#faf9f5" font-size="14" font-weight="700" text-anchor="middle">AI-First 测试三层</text>
    <g transform="translate(15 52)">
      <rect width="330" height="52" fill="#d97757" fill-opacity=".1" stroke="#d97757" stroke-width="1.5" rx="6"/>
      <text x="15" y="20" fill="#d97757" font-size="11" font-weight="700">意图层 (Intent Layer) — 人类维护</text>
      <text x="15" y="36" fill="#141413" font-size="10">自然语言定义期望行为</text>
      <text x="15" y="48" fill="#87867f" font-size="9">&quot;当用户未登录时，访问 /dashboard 重定向&quot;</text>
    </g>
    <g transform="translate(15 114)">
      <rect width="330" height="52" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" rx="6"/>
      <text x="15" y="20" fill="#788c5d" font-size="11" font-weight="700">场景层 (Scenario Layer) — AI 生成</text>
      <text x="15" y="36" fill="#141413" font-size="10">从意图扩展为具体测试场景</text>
      <text x="15" y="48" fill="#87867f" font-size="9">完全未登录 / token 过期 / 权限不足</text>
    </g>
    <g transform="translate(15 176)">
      <rect width="330" height="52" fill="#141413" fill-opacity=".05" stroke="#d1cfc5" rx="6"/>
      <text x="15" y="20" fill="#141413" font-size="11" font-weight="700">验证层 (Verification Layer) — AI 生成</text>
      <text x="15" y="36" fill="#141413" font-size="10">生成具体测试代码、mock、断言</text>
      <text x="15" y="48" fill="#87867f" font-size="9">人类审查关键场景</text>
    </g>
    <text x="15" y="250" fill="#141413" font-size="11" font-weight="700">核心洞察</text>
    <text x="15" y="270" fill="#141413" font-size="10">测试的终极目的不是证明代码正确</text>
    <text x="15" y="285" fill="#788c5d" font-size="10" font-weight="600">而是建立信任</text>
  </g>
  <text x="450" y="462" fill="#87867f" font-size="10" text-anchor="middle">测试即需求，需求即测试 — AI-First 让意图、测试、文档永远同步</text>
</svg>
