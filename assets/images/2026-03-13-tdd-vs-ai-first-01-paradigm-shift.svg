<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#141413">TDD vs AI-First 测试范式转变</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#87867F">从"人类写测试验证代码"到"人类定义意图，AI 生成验证"</text>

  <!-- Classic TDD Column -->
  <g transform="translate(40, 85)" filter="url(#shadow4)">
    <rect width="380" height="300" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="380" height="36" fill="#D1CFC5" rx="8" ry="0"/>
    <rect y="28" width="380" height="8" fill="#D1CFC5"/>
    <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#141413">经典 TDD 流程</text>

    <!-- Red -->
    <g transform="translate(20, 52)">
      <rect width="340" height="50" fill="#D97757" fill-opacity="0.1" rx="6" stroke="#D97757" stroke-width="1"/>
      <circle cx="20" cy="25" r="14" fill="#D97757"/>
      <text x="20" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">红</text>
      <text x="45" y="20" font-size="12" font-weight="600" fill="#D97757">写一个失败的测试</text>
      <text x="45" y="36" font-size="10" fill="#87867F">人类先思考测试场景</text>
    </g>

    <!-- Green -->
    <g transform="translate(20, 112)">
      <rect width="340" height="50" fill="#788C5D" fill-opacity="0.1" rx="6" stroke="#788C5D" stroke-width="1"/>
      <circle cx="20" cy="25" r="14" fill="#788C5D"/>
      <text x="20" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">绿</text>
      <text x="45" y="20" font-size="12" font-weight="600" fill="#788C5D">写最少代码让测试通过</text>
      <text x="45" y="36" font-size="10" fill="#87867F">速度假设：写测试快，写实现慢</text>
    </g>

    <!-- Refactor -->
    <g transform="translate(20, 172)">
      <rect width="340" height="50" fill="#141413" fill-opacity="0.05" rx="6" stroke="#D1CFC5" stroke-width="1"/>
      <circle cx="20" cy="25" r="14" fill="#141413"/>
      <text x="20" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">重构</text>
      <text x="45" y="20" font-size="12" font-weight="600" fill="#141413">优化代码，保持测试通过</text>
      <text x="45" y="36" font-size="10" fill="#87867F">测试作为安全网</text>
    </g>

    <!-- Problems -->
    <text x="20" y="245" font-size="12" font-weight="700" fill="#D97757">AI 时代的困境</text>
    <text x="20" y="265" font-size="10" fill="#141413">• AI 生成代码极快，TDD 循环显得笨拙</text>
    <text x="20" y="280" font-size="10" fill="#141413">• 测试维护成本高（改文案需改 47 个测试）</text>
    <text x="20" y="295" font-size="10" fill="#141413">• 测试耦合实现细节，脆弱易碎</text>
  </g>

  <!-- Arrow -->
  <path d="M430 235 L480 235" stroke="#D97757" stroke-width="3" fill="none" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#D97757"/>
  </marker></defs>

  <!-- AI-First Column -->
  <g transform="translate(500, 85)" filter="url(#shadow4)">
    <rect width="360" height="300" fill="#FAF9F5" rx="8" stroke="#788C5D" stroke-width="2"/>
    <rect width="360" height="36" fill="#788C5D" rx="8" ry="0"/>
    <rect y="28" width="360" height="8" fill="#788C5D"/>
    <text x="180" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF9F5">AI-First 测试三层</text>

    <!-- Intent Layer -->
    <g transform="translate(15, 52)">
      <rect width="330" height="52" fill="#D97757" fill-opacity="0.1" rx="6" stroke="#D97757" stroke-width="1.5"/>
      <text x="15" y="20" font-size="11" font-weight="700" fill="#D97757">意图层 (Intent Layer) — 人类维护</text>
      <text x="15" y="36" font-size="10" fill="#141413">自然语言定义期望行为</text>
      <text x="15" y="48" font-size="9" fill="#87867F">"当用户未登录时，访问 /dashboard 重定向"</text>
    </g>

    <!-- Scenario Layer -->
    <g transform="translate(15, 114)">
      <rect width="330" height="52" fill="#788C5D" fill-opacity="0.1" rx="6" stroke="#788C5D" stroke-width="1"/>
      <text x="15" y="20" font-size="11" font-weight="700" fill="#788C5D">场景层 (Scenario Layer) — AI 生成</text>
      <text x="15" y="36" font-size="10" fill="#141413">从意图扩展为具体测试场景</text>
      <text x="15" y="48" font-size="9" fill="#87867F">完全未登录 / token 过期 / 权限不足</text>
    </g>

    <!-- Verification Layer -->
    <g transform="translate(15, 176)">
      <rect width="330" height="52" fill="#141413" fill-opacity="0.05" rx="6" stroke="#D1CFC5" stroke-width="1"/>
      <text x="15" y="20" font-size="11" font-weight="700" fill="#141413">验证层 (Verification Layer) — AI 生成</text>
      <text x="15" y="36" font-size="10" fill="#141413">生成具体测试代码、mock、断言</text>
      <text x="15" y="48" font-size="9" fill="#87867F">人类审查关键场景</text>
    </g>

    <!-- Key Insight -->
    <text x="15" y="250" font-size="11" font-weight="700" fill="#141413">核心洞察</text>
    <text x="15" y="270" font-size="10" fill="#141413">测试的终极目的不是证明代码正确</text>
    <text x="15" y="285" font-size="10" fill="#788C5D" font-weight="600">而是建立信任</text>
  </g>

  <!-- Footer -->
  <text x="450" y="462" text-anchor="middle" font-size="10" fill="#87867F">测试即需求，需求即测试 — AI-First 让意图、测试、文档永远同步</text>
</svg>