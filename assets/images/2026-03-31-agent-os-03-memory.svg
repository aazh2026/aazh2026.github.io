<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Agent OS: Memory 四层架构 WM→STM→LTM→KG -->
  <rect width="560" height="220" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">Agent OS 记忆系统四层架构</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/31</text>

  <!-- WM (top) -->
  <rect x="40" y="50" width="480" height="46" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="50" width="480" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="64" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">WM · Working Memory</text>
  <text x="220" y="64" font-size="12" fill="#141413" font-weight="600">工作记忆</text>
  <text x="60" y="84" font-size="10" fill="#87867F">当前对话上下文 · 活跃任务状态 · 临时变量</text>
  <rect x="490" y="60" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="73" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">WM</text>

  <line x1="280" y1="96" x2="280" y2="106" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,106 280,114 284,96" fill="#D1CFC5"/>

  <!-- STM -->
  <rect x="40" y="114" width="480" height="38" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="40" y="114" width="480" height="18" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="60" y="128" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">STM · Short-term Memory</text>
  <text x="220" y="128" font-size="12" fill="#141413" font-weight="600">短期记忆</text>
  <text x="60" y="144" font-size="10" fill="#87867F">近期对话历史 · 最近执行的操作 · 临时知识</text>

  <line x1="280" y1="152" x2="280" y2="162" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,162 280,170 284,152" fill="#D1CFC5"/>

  <!-- LTM -->
  <rect x="40" y="170" width="480" height="34" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="170" width="480" height="16" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="184" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">LTM · Long-term Memory</text>
  <text x="220" y="184" font-size="12" fill="#141413" font-weight="600">长期记忆</text>
  <text x="60" y="196" font-size="10" fill="#87867F">用户偏好 · 业务规则 · 历史成功案例</text>

  <line x1="280" y1="204" x2="280" y2="212" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,212 280,220 284,212" fill="#D1CFC5"/>

  <!-- KG (bottom) -->
  <rect x="40" y="220" width="480" height="0" rx="0" fill="none"/>
  <text x="280" y="218" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">(KG 层在 LTM 之下，构成概念网络)</text>

  <text x="280" y="232" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">WM → STM → LTM → KG：容量↑ 速度↓ 持久性↑</text>
</svg>