<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>Context Engineering 数据流</title>
  <desc>从数据源到检索的完整数据管道：结构化数据、非结构化文档、知识图谱、实时系统 → 向量数据库 + 图数据库 → 多策略检索 → Context 窗口</desc>

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Context Engineering · 数据管道</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">数据源 → 处理 → 检索 → Context 窗口</text>

  <!-- === Data Sources (left column) === -->
  <text x="60" y="68" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">数据源</text>

  <!-- Structured DB -->
  <rect x="20" y="76" width="110" height="44" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="75" y="94" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">结构化数据</text>
  <text x="75" y="110" text-anchor="middle" font-size="9" fill="#141413">关系数据库</text>

  <!-- Unstructured Docs -->
  <rect x="20" y="126" width="110" height="44" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="75" y="144" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">非结构化文档</text>
  <text x="75" y="160" text-anchor="middle" font-size="9" fill="#141413">Markdown · PDF</text>

  <!-- Knowledge Graph -->
  <rect x="20" y="176" width="110" height="44" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="75" y="194" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">知识图谱</text>
  <text x="75" y="210" text-anchor="middle" font-size="9" fill="#141413">实体 · 关系</text>

  <!-- Real-time Systems -->
  <rect x="20" y="226" width="110" height="44" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="75" y="244" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">实时系统</text>
  <text x="75" y="260" text-anchor="middle" font-size="9" fill="#141413">库存 · 物流</text>

  <!-- === Processing / Embedding layer (center-left) === -->
  <rect x="155" y="76" width="100" height="194" rx="8" fill="#F0EEE6" stroke="#D97757" stroke-width="1.5"/>
  <text x="205" y="100" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">处理层</text>
  <text x="205" y="122" text-anchor="middle" font-size="9" fill="#141413">Embedding</text>
  <text x="205" y="138" text-anchor="middle" font-size="9" fill="#141413">向量化</text>
  <text x="205" y="160" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">存储层</text>
  <text x="205" y="182" text-anchor="middle" font-size="9" fill="#141413">索引构建</text>
  <text x="205" y="198" text-anchor="middle" font-size="9" fill="#141413">缓存管理</text>
  <text x="205" y="220" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">检索层</text>
  <text x="205" y="242" text-anchor="middle" font-size="9" fill="#141413">Query 解析</text>
  <text x="205" y="258" text-anchor="middle" font-size="9" fill="#141413">重排序</text>

  <!-- Arrow: sources → processing -->
  <line x1="130" y1="98" x2="145" y2="98" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="145,94 139,98 145,102" fill="#D97757"/>

  <line x1="130" y1="148" x2="145" y2="148" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="145,144 139,148 145,152" fill="#D1CFC5"/>

  <line x1="130" y1="198" x2="145" y2="198" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="145,194 139,198 145,202" fill="#D1CFC5"/>

  <line x1="130" y1="248" x2="145" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="145,244 139,248 145,252" fill="#D1CFC5"/>

  <!-- === Databases (center) === -->
  <!-- Vector DB -->
  <rect x="280" y="76" width="130" height="60" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="345" y="98" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">向量数据库</text>
  <text x="345" y="116" text-anchor="middle" font-size="9" fill="#141413">语义搜索</text>
  <text x="345" y="130" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">Pinecone / Milvus</text>

  <!-- Graph DB -->
  <rect x="280" y="146" width="130" height="60" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="345" y="168" text-anchor="middle" font-size="11" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">图数据库</text>
  <text x="345" y="186" text-anchor="middle" font-size="9" fill="#141413">关系查询</text>
  <text x="345" y="200" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">Neo4j / Nebula</text>

  <!-- Cache -->
  <rect x="280" y="216" width="130" height="54" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="345" y="238" text-anchor="middle" font-size="11" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">缓存层</text>
  <text x="345" y="256" text-anchor="middle" font-size="9" fill="#141413">热点数据加速</text>
  <text x="345" y="268" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">Redis</text>

  <!-- Arrow: processing → databases -->
  <line x1="255" y1="120" x2="270" y2="106" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="270,102 263,108 267,114" fill="#D97757"/>

  <line x1="255" y1="173" x2="270" y2="173" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="270,169 263,173 270,177" fill="#D1CFC5"/>

  <line x1="255" y1="243" x2="270" y2="243" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="270,239 263,243 270,247" fill="#D1CFC5"/>

  <!-- === Multi-strategy Retrieval (right) === -->
  <rect x="435" y="76" width="130" height="194" rx="8" fill="#F0EEE6" stroke="#D97757" stroke-width="1.5"/>
  <text x="500" y="100" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">多策略检索</text>

  <!-- Semantic -->
  <rect x="447" y="112" width="106" height="36" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1"/>
  <text x="500" y="130" text-anchor="middle" font-size="9.5" fill="#141413">语义搜索</text>
  <text x="500" y="143" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">向量相似度</text>

  <!-- Keyword -->
  <rect x="447" y="154" width="106" height="36" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="500" y="172" text-anchor="middle" font-size="9.5" fill="#141413">关键词搜索</text>
  <text x="500" y="185" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">BM25 / TF-IDF</text>

  <!-- Graph Traversal -->
  <rect x="447" y="196" width="106" height="36" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="500" y="214" text-anchor="middle" font-size="9.5" fill="#141413">图遍历</text>
  <text x="500" y="227" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">关系路径推理</text>

  <!-- Arrow: DBs → retrieval -->
  <line x1="410" y1="106" x2="437" y2="130" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="437,127 430,132 435,136" fill="#D97757"/>

  <line x1="410" y1="176" x2="437" y2="172" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="437,168 430,172 437,176" fill="#D1CFC5"/>

  <line x1="410" y1="243" x2="437" y2="214" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="437,211 430,216 435,220" fill="#D1CFC5"/>

  <!-- === Context Window (far right) === -->
  <rect x="585" y="100" width="75" height="146" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="622" y="124" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Context</text>
  <text x="622" y="140" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Window</text>
  <text x="622" y="160" text-anchor="middle" font-size="8.5" fill="#141413">最相关的</text>
  <text x="622" y="174" text-anchor="middle" font-size="8.5" fill="#141413">上下文片段</text>
  <text x="622" y="200" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">→ LLM</text>

  <!-- Arrow: retrieval → context window -->
  <line x1="565" y1="173" x2="575" y2="173" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="575,169 568,173 575,177" fill="#D97757"/>

  <!-- Legend -->
  <rect x="20" y="306" width="8" height="8" rx="2" fill="#D97757"/>
  <text x="34" y="314" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">核心管道</text>
  <rect x="100" y="306" width="8" height="8" rx="2" fill="#D1CFC5"/>
  <text x="114" y="314" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">支持管道</text>
  <rect x="185" y="306" width="8" height="8" rx="2" fill="#788C5D"/>
  <text x="199" y="314" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">技术栈</text>

  <!-- Bottom note -->
  <text x="340" y="340" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">多策略检索组合：语义 + 关键词 + 图遍历，结果经重排序后送入 Context Window</text>
</svg>