<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>evo 三阶段优化机制</title>
  <desc>Alok Bishoyi 的工具 evo 实现的三阶段闭环：并行探索、树搜索、Gates</desc>

  <!-- Background -->
  <rect width="720" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">evo 闭环优化机制</text>
  <text x="360" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Alok Bishoyi · evo-hq.com · 2026/05/27</text>

  <!-- ===== STAGE 1: Parallel Exploration ===== -->
  <!-- Stage label pill -->
  <rect x="40" y="58" width="76" height="22" rx="11" fill="#D97757"/>
  <text x="78" y="73" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">并行探索</text>

  <!-- Base node: SealQA -->
  <rect x="56" y="106" width="100" height="40" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="106" y="124" text-anchor="middle" font-size="11" fill="#141413" font-weight="600">SealQA base</text>
  <text x="106" y="139" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">5/20 → 11/20</text>

  <!-- Branching arrows from base -->
  <line x1="106" y1="146" x2="70" y2="166" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="106" y1="146" x2="106" y2="166" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="106" y1="146" x2="142" y2="166" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Agent hypothesis nodes -->
  <rect x="30" y="172" width="80" height="34" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="70" y="189" text-anchor="middle" font-size="9.5" fill="#141413">Accuracy</text>
  <text x="70" y="201" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">假设 A</text>

  <rect x="66" y="172" width="80" height="34" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="106" y="189" text-anchor="middle" font-size="9.5" fill="#141413">Coverage</text>
  <text x="106" y="201" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">假设 B</text>

  <rect x="102" y="172" width="80" height="34" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="142" y="189" text-anchor="middle" font-size="9.5" fill="#141413">Reasoning</text>
  <text x="142" y="201" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">假设 C</text>

  <!-- More agent branches (dimmed) -->
  <rect x="138" y="172" width="72" height="34" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" opacity="0.55"/>
  <text x="174" y="189" text-anchor="middle" font-size="9.5" fill="#141413">Format</text>
  <text x="174" y="201" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">…</text>

  <!-- Arrow 1→2 -->
  <path d="M 196 188 C 226 188, 226 188, 240 188" stroke="#D1CFC5" stroke-width="1.5" fill="none"/>
  <polygon points="244,188 236,184 236,192" fill="#D1CFC5"/>

  <!-- ===== STAGE 2: Tree Search ===== -->
  <!-- Stage label pill -->
  <rect x="250" y="58" width="76" height="22" rx="11" fill="#D97757"/>
  <text x="288" y="73" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">树搜索</text>

  <!-- Root node -->
  <rect x="280" y="100" width="90" height="36" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="325" y="117" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">Expert Branches</text>
  <text x="325" y="130" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">各维度胜出</text>

  <!-- Tree branching lines -->
  <line x1="325" y1="136" x2="268" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="325" y1="136" x2="325" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="325" y1="136" x2="382" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Dimension nodes -->
  <rect x="236" y="166" width="64" height="30" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="268" y="181" text-anchor="middle" font-size="9" fill="#141413">Accuracy</text>
  <text x="268" y="192" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">专家分支</text>

  <rect x="293" y="166" width="64" height="30" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="325" y="181" text-anchor="middle" font-size="9" fill="#141413">Coverage</text>
  <text x="325" y="192" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">专家分支</text>

  <rect x="350" y="166" width="64" height="30" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="382" y="181" text-anchor="middle" font-size="9" fill="#141413">Reasoning</text>
  <text x="382" y="192" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">专家分支</text>

  <!-- Merge arrows -->
  <line x1="268" y1="196" x2="268" y2="212" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="325" y1="196" x2="325" y2="212" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="382" y1="196" x2="382" y2="212" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Converge node -->
  <rect x="288" y="216" width="74" height="30" rx="5" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="325" y="231" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">合并尝试</text>
  <text x="325" y="242" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">merge</text>

  <!-- Arrow 2→3 -->
  <path d="M 362 230 C 392 230, 392 230, 406 230" stroke="#D1CFC5" stroke-width="1.5" fill="none"/>
  <polygon points="410,230 402,226 402,234" fill="#D1CFC5"/>

  <!-- ===== STAGE 3: Gates ===== -->
  <!-- Stage label pill -->
  <rect x="416" y="58" width="54" height="22" rx="11" fill="#D97757"/>
  <text x="443" y="73" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Gates</text>

  <!-- Gate funnel - passing branch (right, upward) -->
  <rect x="436" y="98" width="70" height="34" rx="5" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="471" y="117" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">Gate</text>
  <text x="471" y="128" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">回归测试</text>

  <!-- Arrow up from passing gate -->
  <line x1="471" y1="98" x2="471" y2="72" stroke="#788C5D" stroke-width="2"/>
  <polygon points="471,68 467,76 475,76" fill="#788C5D"/>
  <rect x="452" y="50" width="38" height="18" rx="9" fill="#788C5D"/>
  <text x="471" y="63" text-anchor="middle" font-size="8.5" fill="#FFFFFF" font-family="ui-monospace, monospace">通过</text>

  <!-- Filled but failing branch (left, X'd out) -->
  <rect x="430" y="140" width="70" height="34" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="465" y="159" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">Gate</text>
  <text x="465" y="170" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">高分但作弊</text>

  <!-- X mark -->
  <line x1="436" y1="146" x2="500" y2="168" stroke="#D97757" stroke-width="2.5"/>
  <line x1="500" y1="146" x2="436" y2="168" stroke="#D97757" stroke-width="2.5"/>

  <!-- ===== FEEDBACK LOOP: passing → next round ===== -->
  <!-- Curved feedback arrow from "通过" back to top -->
  <path d="M 471 68 C 471 28, 106 28, 106 86" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.65"/>
  <polygon points="106,86 100,78 112,78" fill="#D97757" opacity="0.65"/>
  <text x="280" y="24" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">下一轮迭代</text>

  <!-- Legend -->
  <rect x="536" y="90" width="160" height="140" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="552" y="110" font-size="10" fill="#141413" font-weight="600">图例</text>

  <rect x="548" y="120" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="566" y="130" font-size="9" fill="#141413">Stage 标签</text>

  <rect x="548" y="140" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="566" y="150" font-size="9" fill="#141413">节点</text>

  <rect x="548" y="160" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="566" y="170" font-size="9" fill="#141413">合并/通过</text>

  <line x1="548" y1="188" x2="564" y2="188" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.65"/>
  <text x="570" y="192" font-size="9" fill="#141413">反馈循环</text>

  <line x1="548" y1="208" x2="564" y2="208" stroke="#D97757" stroke-width="2.5"/>
  <line x1="548" y1="208" x2="564" y2="208" stroke="#D97757" stroke-width="2.5" transform="rotate(45,556,208)"/>
  <text x="570" y="212" font-size="9" fill="#141413">失败/Gate 未通过</text>

  <line x1="548" y1="226" x2="564" y2="226" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="570" y="230" font-size="9" fill="#141413">数据流向</text>
</svg>