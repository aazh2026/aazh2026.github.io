<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 340">
  <title>定价模式演进与 ARPU 增长</title>
  <desc>
    从 SaaS 1.0 到 Agent-enabled 的定价模式演进，展示 ARPU 从 $50-100 增长到 $300-1000 的路径
  </desc>
  <path fill="#faf9f5" d="M0 0h680v340H0z"/>
  <text x="340" y="28" fill="#141413" font-size="16" font-weight="600" text-anchor="middle">定价模式演进：从工具到结果</text>
  <text x="340" y="46" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">ARPU 增长轨迹</text>
  <rect width="170" height="150" x="40" y="70" fill="#fff" stroke="#788c5d" stroke-width="2" rx="10"/>
  <rect width="170" height="32" x="40" y="70" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M40 90h170v12H40z"/>
  <text x="125" y="90" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">SaaS 1.0</text>
  <text x="125" y="122" fill="#141413" font-size="11" text-anchor="middle">$/user/month</text>
  <text x="125" y="142" fill="#788c5d" font-size="18" font-weight="700" text-anchor="middle">$50-100</text>
  <text x="125" y="162" fill="#87867f" font-size="10" text-anchor="middle">ARPU</text>
  <text x="125" y="182" fill="#87867f" font-size="10" text-anchor="middle">按座位收费</text>
  <path stroke="#d1cfc5" stroke-width="2" d="M215 145h30"/>
  <path fill="#d1cfc5" d="m245 140 10 5-10 5z"/>
  <rect width="170" height="150" x="255" y="70" fill="#fff" stroke="#d97757" stroke-width="2" rx="10"/>
  <rect width="170" height="32" x="255" y="70" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M255 90h170v12H255z"/>
  <text x="340" y="90" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">SaaS 2.0</text>
  <text x="340" y="122" fill="#141413" font-size="11" text-anchor="middle">$/usage</text>
  <text x="340" y="142" fill="#d97757" font-size="18" font-weight="700" text-anchor="middle">$100-300</text>
  <text x="340" y="162" fill="#87867f" font-size="10" text-anchor="middle">ARPU</text>
  <text x="340" y="182" fill="#87867f" font-size="10" text-anchor="middle">按使用量收费</text>
  <path stroke="#d1cfc5" stroke-width="2" d="M430 145h30"/>
  <path fill="#d1cfc5" d="m460 140 10 5-10 5z"/>
  <rect width="170" height="150" x="470" y="70" fill="#fff" stroke="#141413" stroke-width="2" rx="10"/>
  <rect width="170" height="32" x="470" y="70" fill="#141413" rx="10"/>
  <path fill="#141413" d="M470 90h170v12H470z"/>
  <text x="555" y="90" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">Agent-enabled</text>
  <text x="555" y="122" fill="#141413" font-size="11" text-anchor="middle">$/outcome</text>
  <text x="555" y="142" fill="#141413" font-size="18" font-weight="700" text-anchor="middle">$300-1000</text>
  <text x="555" y="162" fill="#87867f" font-size="10" text-anchor="middle">ARPU</text>
  <text x="555" y="182" fill="#87867f" font-size="10" text-anchor="middle">按效果/工作量收费</text>
  <path stroke="#d97757" stroke-width="2.5" d="M640 220v-90"/>
  <path fill="#d97757" d="m635 130 5-12 5 12z"/>
  <text x="658" y="175" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">ARPU</text>
  <text x="658" y="188" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">增长</text>
  <rect width="320" height="40" x="180" y="248" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="340" y="273" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">卖结果，不是卖工具。</text>
  <text x="340" y="315" fill="#87867f" font-size="11" text-anchor="middle">因为你卖的不是软件，而是结果。客户愿意为结果付更多钱。</text>
</svg>
