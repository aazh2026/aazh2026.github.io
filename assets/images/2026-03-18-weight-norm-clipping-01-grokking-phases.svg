"url(#arr4)" d="M140 260q60 20 140 0" transform="translate(60 85)"/><text x="210" y="295" fill="#d97757" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" transform="translate(60 85)">加速 18-66×</text><g transform="translate(60 360)"><rect width="220" height="50" fill="#fff" filter="url(#sh4)" rx="8"/><rect width="6" height="50" fill="#5b8db8" rx="3"/><text x="20" y="20" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600">训练准确率</text><text x="20" y="38" fill="#87867f" font-family="system-ui,sans-serif" font-size="10">始终 100%（记忆数据）</text><rect width="220" height="50" x="240" fill="#fff" filter="url(#sh4)" rx="8"/><rect width="6" height="50" x="240" fill="#d1cfc5" rx="3"/><text x="260" y="20" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600">验证准确率（基线）</text><text x="260" y="38" fill="#87867f" font-family="system-ui,sans-serif" font-size="10">平台期后突然泛化 ~100K步</text><rect width="240" height="50" x="480" fill="#fff" filter="url(#sh4)" rx="8"/><rect width="6" height="50" x="480" fill="#d97757" rx="3"/><text x="500" y="20" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600">验证准确率（+WNC）</text><text x="500" y="38" fill="#87867f" font-family="system-ui,sans-serif" font-size="10">快速泛化 ~1.5K步，零失败</text></g></svg>