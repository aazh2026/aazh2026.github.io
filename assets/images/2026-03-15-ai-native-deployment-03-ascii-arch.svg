<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="100%" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .border { stroke: #D1CFC5; stroke-width: 1.5; fill: none; }
      .border-dashed { stroke: #D1CFC5; stroke-width: 1.5; stroke-dasharray: 6 4; fill: none; }
      .text-title { fill: #141413; font-size: 15px; font-weight: 700; }
      .text-section { fill: #141413; font-size: 13px; font-weight: 600; }
      .text-box { fill: #141413; font-size: 11px; }
      .text-sub { fill: #87867F; font-size: 10px; }
      .text-label { fill: #141413; font-size: 11px; font-weight: 600; }
      .fill-build { fill: #E3DACC; stroke: #87867F; stroke-width: 1.5; }
      .fill-test { fill: #E3DACC; stroke: #87867F; stroke-width: 1.5; }
      .fill-judge { fill: #E3DACC; stroke: #87867F; stroke-width: 1.5; }
      .fill-package { fill: #E3DACC; stroke: #87867F; stroke-width: 1.5; }
      .fill-pipeline { fill: #FAF9F5; stroke: #D1CFC5; stroke-width: 2; }
      .fill-decision { fill: #fef3c7; stroke: #D97757; stroke-width: 2; }
      .fill-canary { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .fill-monitor { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .fill-rollback { fill: #fce7f3; stroke: #788C5D; stroke-width: 2; }
      .fill-white { fill: #FFFFFF; }
      .fill-sm-box { fill: #FAF9F5; stroke: #D1CFC5; stroke-width: 1; }
      .arrow { stroke: #141413; stroke-width: 1.5; fill: none; }
      .arrow-head { fill: #141413; }
    </style>
  </defs>

  <rect width="860" height="520" class="bg"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" class="text-title">AI-Native Delivery Pipeline</text>

  <!-- ========== Phase 1: Build/Test/Judge/Package row ========== -->
  <!-- Outer container -->
  <rect x="40" y="45" width="780" height="80" rx="10" class="fill-pipeline"/>
  <text x="60" y="63" class="text-section" fill="#87867F">Phase 1</text>

  <!-- Build box -->
  <rect x="75" y="75" width="100" height="38" rx="6" class="fill-build"/>
  <text x="125" y="93" text-anchor="middle" class="text-box">Build</text>
  <text x="125" y="107" text-anchor="middle" class="text-sub">代码构建</text>

  <!-- Arrow -->
  <line x1="175" y1="94" x2="193" y2="94" class="arrow"/>
  <polygon points="193,94 186,90 186,98" class="arrow-head"/>

  <!-- Test box -->
  <rect x="200" y="75" width="100" height="38" rx="6" class="fill-test"/>
  <text x="250" y="93" text-anchor="middle" class="text-box">Test</text>
  <text x="250" y="107" text-anchor="middle" class="text-sub">自动化测试</text>

  <!-- Arrow -->
  <line x1="300" y1="94" x2="318" y2="94" class="arrow"/>
  <polygon points="318,94 311,90 311,98" class="arrow-head"/>

  <!-- AI Judge box -->
  <rect x="325" y="75" width="120" height="38" rx="6" class="fill-judge"/>
  <text x="385" y="93" text-anchor="middle" class="text-box">AI Judge</text>
  <text x="385" y="107" text-anchor="middle" class="text-sub">AI 质量评审</text>

  <!-- Arrow -->
  <line x1="445" y1="94" x2="463" y2="94" class="arrow"/>
  <polygon points="463,94 456,90 456,98" class="arrow-head"/>

  <!-- Package box -->
  <rect x="470" y="75" width="100" height="38" rx="6" class="fill-package"/>
  <text x="520" y="93" text-anchor="middle" class="text-box">Package</text>
  <text x="520" y="107" text-anchor="middle" class="text-sub">镜像打包</text>

  <!-- Phase 1 note -->
  <text x="60" y="72" class="text-sub" fill="#87867F" font-size="10"></text>

  <!-- ========== Arrow: Phase 1 → Intelligent Deployment Decision ========== -->
  <line x1="430" y1="125" x2="430" y2="148" class="arrow" stroke-width="2"/>
  <polygon points="430,148 425,140 435,140" class="arrow-head"/>

  <!-- ========== Phase 2: Intelligent Deployment Decision ========== -->
  <rect x="40" y="148" width="780" height="80" rx="10" class="fill-decision"/>
  <text x="60" y="166" class="text-section" fill="#D97757">Phase 2</text>

  <text x="430" y="168" text-anchor="middle" class="text-label" font-size="13">Intelligent Deployment Decision</text>
  <text x="430" y="183" text-anchor="middle" class="text-sub">智能部署决策 — 时机优化 · 风险评估 · 资源分配</text>

  <!-- Sub-boxes -->
  <rect x="130" y="193" width="160" height="26" rx="5" class="fill-sm-box"/>
  <text x="210" y="211" text-anchor="middle" class="text-box" font-size="10">时机预测优化</text>

  <rect x="310" y="193" width="160" height="26" rx="5" class="fill-sm-box"/>
  <text x="390" y="211" text-anchor="middle" class="text-box" font-size="10">风险等级评估</text>

  <rect x="490" y="193" width="160" height="26" rx="5" class="fill-sm-box"/>
  <text x="570" y="211" text-anchor="middle" class="text-box" font-size="10">资源智能预热</text>

  <!-- ========== Arrow: Phase 2 → Phase 3 ========== -->
  <line x1="430" y1="228" x2="430" y2="251" class="arrow" stroke-width="2"/>
  <polygon points="430,251 425,243 435,243" class="arrow-head"/>

  <!-- ========== Phase 3: Intelligent Canary Release ========== -->
  <rect x="40" y="251" width="780" height="80" rx="10" class="fill-canary"/>
  <text x="60" y="269" class="text-section" fill="#2563eb">Phase 3</text>

  <text x="430" y="271" text-anchor="middle" class="text-label" font-size="13">Intelligent Canary Release</text>
  <text x="430" y="286" text-anchor="middle" class="text-sub">智能金丝雀发布 — 动态流量分配 · 多维异常检测 · AI驱动推进</text>

  <!-- Sub-boxes -->
  <rect x="130" y="296" width="160" height="26" rx="5" class="fill-white border"/>
  <text x="210" y="314" text-anchor="middle" class="text-box" font-size="10">动态流量调优</text>

  <rect x="310" y="296" width="160" height="26" rx="5" class="fill-white border"/>
  <text x="390" y="314" text-anchor="middle" class="text-box" font-size="10">多维异常检测</text>

  <rect x="490" y="296" width="160" height="26" rx="5" class="fill-white border"/>
  <text x="570" y="314" text-anchor="middle" class="text-box" font-size="10">AI推进决策</text>

  <!-- ========== Arrow: Phase 3 → Phase 4 ========== -->
  <line x1="430" y1="331" x2="430" y2="354" class="arrow" stroke-width="2"/>
  <polygon points="430,354 425,346 435,346" class="arrow-head"/>

  <!-- ========== Phase 4: Continuous Risk Monitoring ========== -->
  <rect x="40" y="354" width="780" height="80" rx="10" class="fill-monitor"/>
  <text x="60" y="372" class="text-section" fill="#059669">Phase 4</text>

  <text x="430" y="374" text-anchor="middle" class="text-label" font-size="13">Continuous Risk Monitoring</text>
  <text x="430" y="389" text-anchor="middle" class="text-sub">持续风险监控 — 实时指标 · 漂移检测 · 预测性故障预警</text>

  <!-- Sub-boxes -->
  <rect x="130" y="399" width="160" height="26" rx="5" class="fill-white border"/>
  <text x="210" y="417" text-anchor="middle" class="text-box" font-size="10">实时指标采集</text>

  <rect x="310" y="399" width="160" height="26" rx="5" class="fill-white border"/>
  <text x="390" y="417" text-anchor="middle" class="text-box" font-size="10">模型漂移检测</text>

  <rect x="490" y="399" width="160" height="26" rx="5" class="fill-white border"/>
  <text x="570" y="417" text-anchor="middle" class="text-box" font-size="10">预测性故障检测</text>

  <!-- ========== Arrow: Phase 4 → Phase 5 (conditional) ========== -->
  <line x1="430" y1="434" x2="430" y2="450" class="arrow" stroke-dasharray="5 3" stroke-width="1.5"/>
  <polygon points="430,450 425,442 435,442" class="arrow-head"/>

  <!-- ========== Phase 5: Intelligent Rollback ========== -->
  <rect x="40" y="450" width="780" height="58" rx="10" class="fill-rollback"/>
  <text x="60" y="468" class="text-section" fill="#788C5D">Phase 5</text>

  <text x="430" y="470" text-anchor="middle" class="text-label" font-size="13">Intelligent Rollback (if needed)</text>
  <text x="430" y="485" text-anchor="middle" class="text-sub">智能回滚 — 影响评估 · 渐进回滚 · 安全状态迁移</text>

  <!-- Sub-boxes -->
  <rect x="130" y="477" width="160" height="22" rx="5" class="fill-white border"/>
  <text x="210" y="492" text-anchor="middle" class="text-box" font-size="9">影响评估引擎</text>

  <rect x="310" y="477" width="160" height="22" rx="5" class="fill-white border"/>
  <text x="390" y="492" text-anchor="middle" class="text-box" font-size="9">渐进/区域回滚</text>

  <rect x="490" y="477" width="160" height="22" rx="5" class="fill-white border"/>
  <text x="570" y="492" text-anchor="middle" class="text-box" font-size="9">状态安全迁移</text>

  <!-- ========== Legend ========== -->
  <rect x="660" y="44" width="160" height="140" rx="8" fill="none" class="border"/>
  <text x="740" y="62" text-anchor="middle" class="text-label" font-size="11">图例</text>

  <rect x="674" y="73" width="14" height="14" rx="3" class="fill-build"/>
  <text x="696" y="84" class="text-box" font-size="10">代码构建阶段</text>

  <rect x="674" y="93" width="14" height="14" rx="3" class="fill-decision"/>
  <text x="696" y="104" class="text-box" font-size="10">智能决策层</text>

  <rect x="674" y="113" width="14" height="14" rx="3" class="fill-canary"/>
  <text x="696" y="124" class="text-box" font-size="10">金丝雀发布层</text>

  <rect x="674" y="133" width="14" height="14" rx="3" class="fill-monitor"/>
  <text x="696" y="144" class="text-box" font-size="10">风险监控层</text>

  <rect x="674" y="153" width="14" height="14" rx="3" class="fill-rollback"/>
  <text x="696" y="164" class="text-box" font-size="10">智能回滚层</text>

  <line x1="674" y1="178" x2="755" y2="178" class="arrow" stroke-width="1.5"/>
  <polygon points="755,178 747,173 747,183" class="arrow-head"/>
  <text x="696" y="190" class="text-box" font-size="10">处理流程</text>

  <line x1="674" y1="202" x2="755" y2="202" class="arrow" stroke-dasharray="5 3" stroke-width="1.5"/>
  <polygon points="755,202 747,197 747,207" class="arrow-head"/>
  <text x="696" y="214" class="text-box" font-size="10">条件触发</text>
</svg>
