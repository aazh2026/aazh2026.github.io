<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <path fill="#faf9f5" d="M0 0h600v480H0z"/>
  <style>
    text{font-family:&quot;SF Mono&quot;,&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,monospace;font-size:11px;fill:#141413}.layer,.layer-alt{fill:#e3dacc;stroke:#d1cfc5;stroke-width:1;rx:4}.layer-alt{fill:#faf9f5}.arrow{stroke:#141413;stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}.label{font-size:10px;fill:#87867f}.subtitle{fill:#d97757;font-weight:700;font-size:11px}
  </style>
  <defs>
    <marker id="arrowhead" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3">
      <path fill="#141413" d="m0 0 8 3-8 3z"/>
    </marker>
  </defs>
  <text x="20" y="24" class="subtitle">模式1：直接调用（Synchronous）</text>
  <path stroke="#d97757" d="M20 32h180"/>
  <rect width="80" height="36" x="40" y="44" class="layer" rx="4"/>
  <text x="80" y="66" text-anchor="middle">Layer N</text>
  <rect width="80" height="36" x="200" y="44" class="layer-alt" rx="4"/>
  <text x="240" y="66" text-anchor="middle">Layer N-1</text>
  <path d="M80 80v20" class="arrow"/>
  <text x="80" y="110" class="label" text-anchor="middle">execute(ctx)</text>
  <path stroke="#87867f" stroke-dasharray="4,2" d="M240 80v20"/>
  <text x="240" y="110" class="label" text-anchor="middle">result</text>
  <text x="20" y="144" class="subtitle">模式2：事件总线（Event-Driven）</text>
  <path stroke="#d97757" d="M20 152h240"/>
  <rect width="80" height="36" x="40" y="164" class="layer" rx="4"/>
  <text x="80" y="186" text-anchor="middle">Layer N</text>
  <rect width="80" height="36" x="200" y="164" class="layer-alt" rx="4"/>
  <text x="240" y="186" text-anchor="middle">Layer N-1</text>
  <rect width="40" height="36" x="150" y="164" rx="4" style="fill:#788c5d;rx:4"/>
  <text x="170" y="186" fill="#faf9f5" font-size="9" text-anchor="middle">Event</text>
  <text x="170" y="196" fill="#faf9f5" font-size="9" text-anchor="middle">Bus</text>
  <path d="M120 182h28" class="arrow"/>
  <text x="134" y="176" class="label" text-anchor="middle">publish</text>
  <path d="M192 182h8" class="arrow"/>
  <text x="210" y="176" class="label" text-anchor="middle">route</text>
  <text x="320" y="24" class="subtitle">模式3：消息队列（Async Queue）</text>
  <path stroke="#d97757" d="M320 32h260"/>
  <rect width="80" height="36" x="340" y="44" class="layer" rx="4"/>
  <text x="380" y="66" text-anchor="middle">Layer N</text>
  <rect width="80" height="36" x="480" y="44" class="layer-alt" rx="4"/>
  <text x="520" y="66" text-anchor="middle">Layer N-1</text>
  <rect width="40" height="36" x="430" y="44" rx="4" style="fill:#d97757;rx:4"/>
  <text x="450" y="66" fill="#faf9f5" font-size="10" text-anchor="middle">Queue</text>
  <path d="M420 62h10" class="arrow"/>
  <text x="408" y="56" class="label" text-anchor="middle">enqueue</text>
  <path d="M470 62h10" class="arrow"/>
  <text x="490" y="56" class="label" text-anchor="middle">dequeue</text>
  <rect width="260" height="60" x="320" y="100" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="340" y="122" fill="#d97757" font-weight="bold">💡 关键洞察</text>
  <text x="340" y="140" fill="#141413">层间通信的成本决定了架构的成败</text>
  <text x="340" y="154" fill="#87867f" font-size="10">同步调用最简单，事件驱动最灵活，</text>
  <text x="340" y="166" fill="#87867f" font-size="10">消息队列最适合跨进程/跨服务。</text>
</svg>
