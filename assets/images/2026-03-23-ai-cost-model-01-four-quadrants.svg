<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI系统成本结构四象限模型" viewBox="0 0 800 520">
  <title>AI 系统成本结构四象限模型</title>
  <desc>
    高频/低频 × 复杂度高/低 = 四种优化策略：缓存优化、架构重构、模型降级、预计算
  </desc>
  <defs>
    <linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg4)" rx="12"/>
  <text x="400" y="36" fill="#141413" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">AI 系统成本结构四象限模型</text>
  <text x="400" y="56" fill="#87867f" font-family="Georgia, serif" font-size="12" text-anchor="middle">频率 × 复杂度 → 四种优化策略 · 成本降低 60-90%</text>
  <rect width="295" height="195" x="100" y="110" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" stroke-width="3" rx="10"/>
  <rect width="295" height="38" x="100" y="110" fill="#788c5d" rx="10 10 0 0"/>
  <text x="247" y="136" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Q1 · 高频 × 低复杂度</text>
  <text x="247" y="170" fill="#5e7347" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">缓存优化</text>
  <text x="247" y="190" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">Semantic Caching</text>
  <text x="247" y="206" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">Response Caching</text>
  <text x="247" y="222" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">智能预取</text>
  <path stroke="#788c5d" stroke-opacity=".4" d="M115 232h265"/>
  <text x="247" y="250" fill="#5e7347" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">成本降低 60-80%</text>
  <text x="247" y="268" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">案例：客服 Agent</text>
  <text x="247" y="282" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">$0.05 → $0.01/次</text>
  <text x="247" y="296" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">缓存命中率 &gt;70%</text>
  <rect width="295" height="195" x="405" y="110" fill="#d97757" fill-opacity=".15" stroke="#d97757" stroke-width="3" rx="10"/>
  <rect width="295" height="38" x="405" y="110" fill="#d97757" rx="10 10 0 0"/>
  <text x="552" y="136" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Q2 · 高频 × 高复杂度</text>
  <text x="552" y="170" fill="#b85a3f" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">架构重构</text>
  <text x="552" y="190" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">任务分解 (CoT)</text>
  <text x="552" y="206" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">异步处理</text>
  <text x="552" y="222" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">预计算 + 增量更新</text>
  <path stroke="#d97757" stroke-opacity=".4" d="M420 232h265"/>
  <text x="552" y="250" fill="#b85a3f" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">成本降低 40-60%</text>
  <text x="552" y="268" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">案例：金融分析 Agent</text>
  <text x="552" y="282" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">$10 → $4/报告</text>
  <text x="552" y="296" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">延迟降低 50%</text>
  <rect width="295" height="195" x="100" y="315" fill="#87867f" fill-opacity=".15" stroke="#87867f" stroke-width="3" rx="10"/>
  <rect width="295" height="38" x="100" y="315" fill="#87867f" rx="10 10 0 0"/>
  <text x="247" y="341" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Q3 · 低频 × 低复杂度</text>
  <text x="247" y="375" fill="#6a6860" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">模型降级</text>
  <text x="247" y="395" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">智能路由（用小模型）</text>
  <text x="247" y="411" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">边缘计算</text>
  <text x="247" y="427" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">批处理聚合</text>
  <path stroke="#87867f" stroke-opacity=".4" d="M115 437h265"/>
  <text x="247" y="455" fill="#6a6860" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">成本降低 70-90%</text>
  <text x="247" y="473" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">案例：内部工具 Agent</text>
  <text x="247" y="490" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">80% GPT-3.5 + 20% GPT-4</text>
  <rect width="295" height="195" x="405" y="315" fill="#141413" fill-opacity=".1" stroke="#141413" stroke-width="3" rx="10"/>
  <rect width="295" height="38" x="405" y="315" fill="#141413" rx="10 10 0 0"/>
  <text x="552" y="341" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Q4 · 低频 × 高复杂度</text>
  <text x="552" y="375" fill="#141413" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">预计算</text>
  <text x="552" y="395" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">离线预生成</text>
  <text x="552" y="411" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">增量更新</text>
  <text x="552" y="427" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">人机协作</text>
  <path stroke="#141413" stroke-opacity=".4" d="M420 437h265"/>
  <text x="552" y="455" fill="#141413" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">成本降低 50-70%</text>
  <text x="552" y="473" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">案例：市场研报生成</text>
  <text x="552" y="490" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">$50 → $15/报告</text>
  <text x="60" y="205" fill="#141413" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" transform="rotate(-90 60 205)">高频 ↑</text>
  <text x="730" y="205" fill="#141413" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" transform="rotate(90 730 205)">低频 ↓</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M85 115v390m630-390v390"/>
  <text x="400" y="100" fill="#141413" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">← 低复杂度 | 高复杂度 →</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M100 515h600"/>
  <path stroke="#d97757" stroke-dasharray="5,4" stroke-width="2" d="m247 430 158-125"/>
  <text x="330" y="370" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">架构</text>
  <text x="330" y="382" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">越复杂</text>
  <text x="330" y="394" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">→ 成本</text>
  <text x="330" y="406" fill="#d97757" font-family="monospace" font-size="9" text-anchor="middle">越高</text>
  <text x="400" y="505" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">核心洞察：80% 的成本浪费来自结构性错配 —— 优化架构比砍价更重要</text>
</svg>
