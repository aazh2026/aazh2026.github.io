<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg5" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <marker id="arr-green" markerHeight="8" markerWidth="8" orient="auto" refX="5" refY="4">
      <path fill="#788c5d" d="M0 0v8l8-4z"/>
    </marker>
    <filter id="shadow5" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="900" height="480" fill="url(#bg5)" rx="16"/>
  <text x="450" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-.3" text-anchor="middle">Carlini 并行 Agent 协调机制</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M200 56h500"/>
  <rect width="390" height="360" x="40" y="76" fill="#faf9f5" filter="url(#shadow5)" rx="14"/>
  <text x="60" y="108" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700">基础设施</text>
  <g font-family="monospace">
    <text fill="#788c5d" font-size="13" font-weight="700" transform="translate(60 125)">shared-bare-repo/</text>
    <text x="20" y="20" fill="#87867f" font-size="12" transform="translate(60 125)">├── upstream/         # 共享仓库</text>
    <text x="20" y="38" fill="#87867f" font-size="12" transform="translate(60 125)">│   ├── src/</text>
    <text x="20" y="56" fill="#87867f" font-size="12" transform="translate(60 125)">│   ├── tests/</text>
    <text x="20" y="74" fill="#87867f" font-size="12" transform="translate(60 125)">│   └── current_tasks/   ← 任务锁目录</text>
    <text x="40" y="92" fill="#d97757" font-size="11" transform="translate(60 125)">│       ├── parse_if_statement.txt  ← Agent A 持有</text>
    <text x="40" y="108" fill="#d97757" font-size="11" transform="translate(60 125)">│       ├── codegen_fn_def.txt      ← Agent B 持有</text>
    <text x="40" y="124" fill="#d97757" font-size="11" transform="translate(60 125)">│       └── opt_reg_alloc.txt       ← Agent C 持有</text>
    <text x="20" y="152" fill="#87867f" font-size="12" transform="translate(60 125)">└── workspace/        # 每个 Agent 本地克隆</text>
    <text x="40" y="170" fill="#87867f" font-size="12" transform="translate(60 125)">├── agent-1/  (Docker)</text>
    <text x="40" y="186" fill="#87867f" font-size="12" transform="translate(60 125)">├── agent-2/  (Docker)</text>
    <text x="40" y="202" fill="#87867f" font-size="12" transform="translate(60 125)">└── agent-16/ (Docker)</text>
  </g>
  <rect width="350" height="30" x="60" y="340" fill="#788c5d" opacity=".08" rx="8"/>
  <text x="235" y="360" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">容器化隔离，防止破坏性操作扩散</text>
  <rect width="410" height="360" x="450" y="76" fill="#faf9f5" filter="url(#shadow5)" rx="14"/>
  <text x="470" y="108" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700">任务锁协议（4 步循环）</text>
  <g transform="translate(470 122)">
    <rect width="370" height="52" fill="#788c5d" opacity=".08" rx="10"/>
    <circle cx="22" cy="26" r="14" fill="#788c5d"/>
    <text x="22" y="32" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">1</text>
    <text x="48" y="20" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Claim 任务锁</text>
    <text x="48" y="36" fill="#87867f" font-family="monospace" font-size="11">echo &quot;Agent-7&quot; &gt; current_tasks/parse_loops.txt</text>
    <text x="48" y="48" fill="#87867f" font-family="monospace" font-size="11">git add . &amp;&amp; git commit -m &quot;claim: parse_loops&quot;</text>
    <path stroke="#788c5d" stroke-width="2" marker-end="url(#arr-green)" d="M22 58v14" opacity=".5"/>
    <rect width="370" height="52" y="76" fill="#788c5d" opacity=".08" rx="10"/>
    <circle cx="22" cy="102" r="14" fill="#788c5d"/>
    <text x="22" y="108" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">2</text>
    <text x="48" y="96" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">git push → 检查冲突</text>
    <text x="48" y="112" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="11">冲突 → 锁被抢占，换其他任务</text>
    <text x="48" y="124" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="11">成功 → 独占该任务</text>
    <path stroke="#788c5d" stroke-width="2" marker-end="url(#arr-green)" d="M22 134v14" opacity=".5"/>
    <rect width="370" height="52" y="152" fill="#788c5d" opacity=".08" rx="10"/>
    <circle cx="22" cy="178" r="14" fill="#788c5d"/>
    <text x="22" y="184" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">3</text>
    <text x="48" y="172" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">完成：pull → merge → push</text>
    <text x="48" y="188" fill="#87867f" font-family="monospace" font-size="11">git pull origin main --rebase &amp;&amp; git push</text>
    <text x="48" y="200" fill="#87867f" font-family="monospace" font-size="11">rm current_tasks/parse_loops.txt</text>
    <path stroke="#788c5d" stroke-width="2" marker-end="url(#arr-green)" d="M22 210v14" opacity=".5"/>
    <rect width="370" height="52" y="228" fill="#788c5d" opacity=".08" rx="10"/>
    <circle cx="22" cy="254" r="14" fill="#788c5d"/>
    <text x="22" y="260" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">4</text>
    <text x="48" y="248" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Commit 完成状态</text>
    <text x="48" y="264" fill="#87867f" font-family="monospace" font-size="11">git commit -m &quot;complete: parse_loops&quot;</text>
    <text x="48" y="276" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="11">→ 返回步骤 1，争夺下一个任务</text>
  </g>
  <rect width="820" height="26" x="40" y="448" fill="#141413" opacity=".05" rx="13"/>
  <text x="450" y="466" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">没有中央调度器，没有复杂协议 — 只有 Git 的原始力量。</text>
</svg>
