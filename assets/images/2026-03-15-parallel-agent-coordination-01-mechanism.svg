<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <filter id="shadow5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#141413" flood-opacity="0.10"/>
    </filter>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#788C5D"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="url(#bg5)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#141413" letter-spacing="-0.3">Carlini 并行 Agent 协调机制</text>
  <line x1="200" y1="56" x2="700" y2="56" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Left: Infrastructure -->
  <rect x="40" y="76" width="390" height="360" rx="14" fill="#FAF9F5" filter="url(#shadow5)"/>
  <text x="60" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#141413">基础设施</text>

  <!-- File tree -->
  <g transform="translate(60,125)">
    <text x="0" y="0" font-family="monospace" font-size="13" fill="#788C5D" font-weight="700">shared-bare-repo/</text>
    <text x="20" y="20" font-family="monospace" font-size="12" fill="#87867F">├── upstream/         # 共享仓库</text>
    <text x="20" y="38" font-family="monospace" font-size="12" fill="#87867F">│   ├── src/</text>
    <text x="20" y="56" font-family="monospace" font-size="12" fill="#87867F">│   ├── tests/</text>
    <text x="20" y="74" font-family="monospace" font-size="12" fill="#87867F">│   └── current_tasks/   ← 任务锁目录</text>
    <text x="40" y="92" font-family="monospace" font-size="11" fill="#D97757">│       ├── parse_if_statement.txt  ← Agent A 持有</text>
    <text x="40" y="108" font-family="monospace" font-size="11" fill="#D97757">│       ├── codegen_fn_def.txt      ← Agent B 持有</text>
    <text x="40" y="124" font-family="monospace" font-size="11" fill="#D97757">│       └── opt_reg_alloc.txt       ← Agent C 持有</text>

    <text x="20" y="152" font-family="monospace" font-size="12" fill="#87867F">└── workspace/        # 每个 Agent 本地克隆</text>
    <text x="40" y="170" font-family="monospace" font-size="12" fill="#87867F">├── agent-1/  (Docker)</text>
    <text x="40" y="186" font-family="monospace" font-size="12" fill="#87867F">├── agent-2/  (Docker)</text>
    <text x="40" y="202" font-family="monospace" font-size="12" fill="#87867F">└── agent-16/ (Docker)</text>
  </g>

  <rect x="60" y="340" width="350" height="30" rx="8" fill="#788C5D" opacity="0.08"/>
  <text x="235" y="360" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#788C5D">容器化隔离，防止破坏性操作扩散</text>

  <!-- Right: Protocol -->
  <rect x="450" y="76" width="410" height="360" rx="14" fill="#FAF9F5" filter="url(#shadow5)"/>
  <text x="470" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#141413">任务锁协议（4 步循环）</text>

  <g transform="translate(470,122)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="370" height="52" rx="10" fill="#788C5D" opacity="0.08"/>
    <circle cx="22" cy="26" r="14" fill="#788C5D"/>
    <text x="22" y="32" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5">1</text>
    <text x="48" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#141413">Claim 任务锁</text>
    <text x="48" y="36" font-family="monospace" font-size="11" fill="#87867F">echo "Agent-7" &gt; current_tasks/parse_loops.txt</text>
    <text x="48" y="48" font-family="monospace" font-size="11" fill="#87867F">git add . &amp;&amp; git commit -m "claim: parse_loops"</text>

    <!-- Arrow -->
    <path d="M22,58 L22,72" stroke="#788C5D" stroke-width="2" marker-end="url(#arr-green)" opacity="0.5"/>

    <!-- Step 2 -->
    <rect x="0" y="76" width="370" height="52" rx="10" fill="#788C5D" opacity="0.08"/>
    <circle cx="22" cy="102" r="14" fill="#788C5D"/>
    <text x="22" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5">2</text>
    <text x="48" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#141413">git push → 检查冲突</text>
    <text x="48" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#D97757">冲突 → 锁被抢占，换其他任务</text>
    <text x="48" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#788C5D">成功 → 独占该任务</text>

    <!-- Arrow -->
    <path d="M22,134 L22,148" stroke="#788C5D" stroke-width="2" marker-end="url(#arr-green)" opacity="0.5"/>

    <!-- Step 3 -->
    <rect x="0" y="152" width="370" height="52" rx="10" fill="#788C5D" opacity="0.08"/>
    <circle cx="22" cy="178" r="14" fill="#788C5D"/>
    <text x="22" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5">3</text>
    <text x="48" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#141413">完成：pull → merge → push</text>
    <text x="48" y="188" font-family="monospace" font-size="11" fill="#87867F">git pull origin main --rebase &amp;&amp; git push</text>
    <text x="48" y="200" font-family="monospace" font-size="11" fill="#87867F">rm current_tasks/parse_loops.txt</text>

    <!-- Arrow -->
    <path d="M22,210 L22,224" stroke="#788C5D" stroke-width="2" marker-end="url(#arr-green)" opacity="0.5"/>

    <!-- Step 4 -->
    <rect x="0" y="228" width="370" height="52" rx="10" fill="#788C5D" opacity="0.08"/>
    <circle cx="22" cy="254" r="14" fill="#788C5D"/>
    <text x="22" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5">4</text>
    <text x="48" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#141413">Commit 完成状态</text>
    <text x="48" y="264" font-family="monospace" font-size="11" fill="#87867F">git commit -m "complete: parse_loops"</text>
    <text x="48" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#788C5D">→ 返回步骤 1，争夺下一个任务</text>
  </g>

  <!-- Bottom -->
  <rect x="40" y="448" width="820" height="26" rx="13" fill="#141413" opacity="0.05"/>
  <text x="450" y="466" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#87867F">没有中央调度器，没有复杂协议 — 只有 Git 的原始力量。</text>
</svg>
