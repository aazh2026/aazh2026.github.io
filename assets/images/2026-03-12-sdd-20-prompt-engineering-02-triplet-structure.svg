xt><text x="630" y="331" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">边界条件测试</text><text x="630" y="352" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">如何验证成功？</text><path stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="2" marker-end="url(#tripleArrow)" d="m440 210 90 30"/><path stroke="#d1cfc5" d="M60 395h680"/><text x="400" y="420" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">传统用户故事 vs SDD 2.0 三元组</text><g filter="url(#shadow4)"><rect width="310" height="65" x="80" y="435" fill="#faf9f5" stroke="#e3dacc" rx="8"/></g><text x="235" y="455" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">传统格式</text><text x="235" y="472" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">&quot;作为用户，我想要登录功能&quot;</text><text x="235" y="488" fill="#d97757" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">上下文缺失 · 约束模糊 · AC游离</text><g filter="url(#shadow4)"><rect width="310" height="65" x="410" y="435" fill="#faf9f5" stroke="#788c5d" rx="8"/></g><text x="565" y="455" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">SDD 2.0 三元组</text><text x="565" y="472" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">context + constraints + AC</text><text x="565" y="488" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">自包含 · 结构化 · 可验证</text></svg>