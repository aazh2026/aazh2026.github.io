<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #141413; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #87867F; }
      .lvl-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .lvl-desc { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; }
      .tag { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; }
      .divider { stroke: #D1CFC5; stroke-width: 1; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" width="900" height="540"/>

  <!-- Header -->
  <text x="30" y="34" class="title">RAG-DD 企业知识库：四层知识架构</text>
  <text x="30" y="54" class="subtitle">编码规范 → 架构模式 → 业务规则 → 历史代码，层层递进构成企业知识体系</text>
  <line x1="30" y1="64" x2="870" y2="64" class="divider"/>

  <!-- Layer 4: Historical Code (top, darkest) -->
  <g transform="translate(30, 80)">
    <rect width="400" height="90" rx="12" fill="#141413" filter="url(#shadow)"/>
    <rect width="400" height="6" rx="3" fill="#D97757"/>
    <text x="18" y="78" font-family="Helvetica Neue, Arial" font-size="40" font-weight="800" fill="#D97757" opacity="0.25">4</text>
    <text x="50" y="34" class="lvl-title" fill="#FAF9F5" font-size="16">历史代码 Historical Code</text>
    <text x="50" y="52" class="lvl-desc" fill="#87867F">参考实现 · 模式库 · ADR 架构决策记录</text>
    <g transform="translate(50, 64)">
      <rect width="70" height="16" rx="4" fill="#D97757" opacity="0.2"/>
      <text x="35" y="11" text-anchor="middle" class="tag" fill="#D97757" font-size="10">patterns/</text>
      <rect x="78" width="70" height="16" rx="4" fill="#D97757" opacity="0.2"/>
      <text x="113" y="11" text-anchor="middle" class="tag" fill="#D97757" font-size="10">examples/</text>
      <rect x="156" width="70" height="16" rx="4" fill="#D97757" opacity="0.2"/>
      <text x="191" y="11" text-anchor="middle" class="tag" fill="#D97757" font-size="10">decisions/</text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(228, 172)">
    <line x1="0" y1="0" x2="0" y2="14" stroke="#D1CFC5" stroke-width="2"/>
    <polygon points="-5,14 5,14 0,20" fill="#D1CFC5"/>
  </g>

  <!-- Layer 3: Business Rules -->
  <g transform="translate(30, 194)">
    <rect width="400" height="90" rx="12" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="400" height="6" rx="3" fill="#87867F"/>
    <text x="18" y="78" font-family="Helvetica Neue, Arial" font-size="40" font-weight="800" fill="#D1CFC5">3</text>
    <text x="50" y="34" class="lvl-title" fill="#141413" font-size="16">业务规则 Business Rules</text>
    <text x="50" y="52" class="lvl-desc" fill="#87867F">密码策略 · MFA 要求 · 定价规则 · 折扣逻辑</text>
    <g transform="translate(50, 64)">
      <rect width="110" height="16" rx="4" fill="#87867F" opacity="0.15"/>
      <text x="115" y="11" text-anchor="middle" class="tag" fill="#87867F" font-size="10">password_policy</text>
      <rect x="170" width="80" height="16" rx="4" fill="#87867F" opacity="0.15"/>
      <text x="210" y="11" text-anchor="middle" class="tag" fill="#87867F" font-size="10">pricing</text>
      <rect x="258" width="90" height="16" rx="4" fill="#87867F" opacity="0.15"/>
      <text x="303" y="11" text-anchor="middle" class="tag" fill="#87867F" font-size="10">discount_rules</text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(228, 286)">
    <line x1="0" y1="0" x2="0" y2="14" stroke="#D1CFC5" stroke-width="2"/>
    <polygon points="-5,14 5,14 0,20" fill="#D1CFC5"/>
  </g>

  <!-- Layer 2: Architecture Patterns -->
  <g transform="translate(30, 308)">
    <rect width="400" height="90" rx="12" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="400" height="6" rx="3" fill="#D1CFC5"/>
    <text x="18" y="78" font-family="Helvetica Neue, Arial" font-size="40" font-weight="800" fill="#D1CFC5">2</text>
    <text x="50" y="34" class="lvl-title" fill="#141413" font-size="16">架构模式 Architecture Patterns</text>
    <text x="50" y="52" class="lvl-desc" fill="#87867F">微服务通信 · Repository + UoW · Redis 缓存 · 异常处理</text>
    <g transform="translate(50, 64)">
      <rect width="80" height="16" rx="4" fill="#D1CFC5" opacity="0.3"/>
      <text x="95" y="11" text-anchor="middle" class="tag" fill="#87867F" font-size="10">microservices</text>
      <rect x="138" width="90" height="16" rx="4" fill="#D1CFC5" opacity="0.3"/>
      <text x="183" y="11" text-anchor="middle" class="tag" fill="#87867F" font-size="10">data_access</text>
      <rect x="236" width="90" height="16" rx="4" fill="#D1CFC5" opacity="0.3"/>
      <text x="281" y="11" text-anchor="middle" class="tag" fill="#87867F" font-size="10">error_handling</text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(228, 400)">
    <line x1="0" y1="0" x2="0" y2="14" stroke="#D1CFC5" stroke-width="2"/>
    <polygon points="-5,14 5,14 0,20" fill="#D1CFC5"/>
  </g>

  <!-- Layer 1: Coding Standards (bottom) -->
  <g transform="translate(30, 422)">
    <rect width="400" height="90" rx="12" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="400" height="6" rx="3" fill="#788C5D"/>
    <text x="18" y="78" font-family="Helvetica Neue, Arial" font-size="40" font-weight="800" fill="#788C5D" opacity="0.3">1</text>
    <text x="50" y="34" class="lvl-title" fill="#141413" font-size="16">编码规范 Coding Standards</text>
    <text x="50" y="52" class="lvl-desc" fill="#87867F">PEP8 · 参数化查询 · Argon2id 密码哈希 · AWS Secrets Manager</text>
    <g transform="translate(50, 64)">
      <rect width="50" height="16" rx="4" fill="#788C5D" opacity="0.2"/>
      <text x="75" y="11" text-anchor="middle" class="tag" fill="#788C5D" font-size="10">style</text>
      <rect x="108" width="70" height="16" rx="4" fill="#788C5D" opacity="0.2"/>
      <text x="143" y="11" text-anchor="middle" class="tag" fill="#788C5D" font-size="10">security</text>
      <rect x="186" width="60" height="16" rx="4" fill="#788C5D" opacity="0.2"/>
      <text x="216" y="11" text-anchor="middle" class="tag" fill="#788C5D" font-size="10">naming</text>
    </g>
  </g>

  <!-- ============ RIGHT SIDE: Vector DB &amp; Retrieval ============ -->

  <!-- Vector DB Box -->
  <g transform="translate(480, 80)">
    <rect width="390" height="170" rx="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="390" height="44" rx="14" fill="#141413"/>
    <rect y="14" width="390" height="30" fill="#141413"/>
    <text x="20" y="28" font-family="Helvetica Neue, Arial" font-size="13" font-weight="700" fill="#FAF9F5">向量数据库 Vector Store</text>

    <!-- DB icon simulation -->
    <g transform="translate(20, 56)">
      <rect width="120" height="88" rx="8" fill="#E3DACC"/>
      <line x1="20" y1="70" x2="100" y2="70" stroke="#D1CFC5" stroke-width="1"/>
      <line x1="20" y1="82" x2="100" y2="82" stroke="#D1CFC5" stroke-width="1"/>
      <line x1="20" y1="94" x2="100" y2="94" stroke="#D1CFC5" stroke-width="1"/>
      <line x1="60" y1="58" x2="60" y2="126" stroke="#D1CFC5" stroke-width="1"/>
      <text x="20" y="66" font-family="Courier New" font-size="8" fill="#87867F">chunk_id</text>
      <text x="20" y="78" font-family="Courier New" font-size="8" fill="#87867F">embedding</text>
      <text x="20" y="90" font-family="Courier New" font-size="8" fill="#87867F">content</text>
      <text x="20" y="102" font-family="Courier New" font-size="8" fill="#87867F">metadata</text>
    </g>

    <!-- Field descriptions -->
    <g transform="translate(155, 56)">
      <text font-family="Helvetica Neue" font-size="11" fill="#141413" font-weight="700">chunk_id</text>
      <text y="14" font-family="Helvetica Neue" font-size="10" fill="#87867F">唯一标识</text>
      <g transform="translate(0, 26)">
        <text font-family="Helvetica Neue" font-size="11" fill="#141413" font-weight="700">embedding</text>
        <text y="14" font-family="Helvetica Neue" font-size="10" fill="#87867F">1536维向量</text>
      </g>
      <g transform="translate(0, 52)">
        <text font-family="Helvetica Neue" font-size="11" fill="#141413" font-weight="700">content</text>
        <text y="14" font-family="Helvetica Neue" font-size="10" fill="#87867F">知识文本块</text>
      </g>
      <g transform="translate(0, 78)">
        <text font-family="Helvetica Neue" font-size="11" fill="#141413" font-weight="700">metadata</text>
        <text y="14" font-family="Helvetica Neue" font-size="10" fill="#87867F">{type, source, tags}</text>
      </g>
    </g>
  </g>

  <!-- Retrieval flow -->
  <g transform="translate(480, 268)">
    <rect width="390" height="200" rx="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="390" height="44" rx="14" fill="#788C5D"/>
    <rect y="14" width="390" height="30" fill="#788C5D"/>
    <text x="20" y="28" font-family="Helvetica Neue" font-size="13" font-weight="700" fill="#FAF9F5">检索融合流程 Retrieval Fusion</text>

    <!-- Step boxes -->
    <g transform="translate(16, 56)">
      <!-- Step 1: Intent Parse -->
      <rect width="110" height="58" rx="8" fill="#E3DACC"/>
      <text x="55" y="18" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#141413">意图解析</text>
      <text x="55" y="32" text-anchor="middle" font-family="Helvetica Neue" font-size="9" fill="#87867F">Intent Parser</text>
      <text x="55" y="46" text-anchor="middle" font-family="Courier New" font-size="8" fill="#141413">{domain, op}</text>
    </g>

    <text x="132" y="85" text-anchor="middle" font-size="16" fill="#D1CFC5">→</text>

    <!-- Step 2: Multi-dim retrieval -->
    <g transform="translate(144, 56)">
      <rect width="110" height="58" rx="8" fill="#E3DACC"/>
      <text x="55" y="18" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#141413">多维检索</text>
      <text x="55" y="32" text-anchor="middle" font-family="Helvetica Neue" font-size="9" fill="#87867F">Multi-Dim Search</text>
      <text x="55" y="46" text-anchor="middle" font-family="Courier New" font-size="8" fill="#141413">top_k=5</text>
    </g>

    <text x="260" y="85" text-anchor="middle" font-size="16" fill="#D1CFC5">→</text>

    <!-- Step 3: Fusion -->
    <g transform="translate(272, 56)">
      <rect width="110" height="58" rx="8" fill="#E3DACC"/>
      <text x="55" y="18" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#141413">上下文融合</text>
      <text x="55" y="32" text-anchor="middle" font-family="Helvetica Neue" font-size="9" fill="#87867F">Fusion Engine</text>
      <text x="55" y="46" text-anchor="middle" font-family="Courier New" font-size="8" fill="#141413">prompt += kb</text>
    </g>

    <!-- Results row -->
    <g transform="translate(16, 126)">
      <rect width="80" height="24" rx="6" fill="#141413"/>
      <text x="40" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="#FAF9F5">coding_standards</text>
      <rect x="88" width="80" height="24" rx="6" fill="#141413"/>
      <text x="128" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="#FAF9F5">arch_patterns</text>
      <rect x="176" width="80" height="24" rx="6" fill="#141413"/>
      <text x="216" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="#FAF9F5">business_rules</text>
      <rect x="264" width="80" height="24" rx="6" fill="#141413"/>
      <text x="304" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="#FAF9F5">similar_code</text>
    </g>
  </g>

  <!-- Bottom insight bar -->
  <rect x="30" y="526" width="840" height="32" rx="8" fill="#E3DACC" opacity="0.5"/>
  <text x="50" y="546" font-family="Helvetica Neue" font-size="12" fill="#141413" font-weight="600">💡 核心洞察</text>
  <text x="148" y="546" font-family="Helvetica Neue" font-size="12" fill="#87867F">知识库不是一次性的 — 定期更新 + 版本控制 + 使用反馈 + 自动化入库</text>
</svg>
