<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">双 Agent 协作模式</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Teddy Riker · Ramp · 2026/05/14</text>

  <!-- Horizontal flow: User → User's Agent → Software's Agent → Database -->

  <!-- Node 1: User (human icon) -->
  <circle cx="90" cy="155" r="28" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <!-- Simple human head -->
  <circle cx="90" cy="145" r="10" fill="#D1CFC5"/>
  <!-- Simple human body -->
  <path d="M 78 170 Q 90 158 102 170" stroke="#D1CFC5" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="90" y="200" text-anchor="middle" font-size="12" fill="#141413">User</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="155" x2="168" y2="155" stroke="#D97757" stroke-width="2"/>
  <polygon points="174,155 164,149 164,161" fill="#D97757"/>
  <text x="144" y="146" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">delegates</text>

  <!-- Node 2: User's Agent (small LLM) -->
  <rect x="180" y="127" width="100" height="56" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <!-- LLM sparkle icon inside -->
  <text x="230" y="152" text-anchor="middle" font-size="18" fill="#D97757">✦</text>
  <text x="230" y="173" text-anchor="middle" font-size="11" fill="#141413">User's Agent</text>
  <text x="230" y="185" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">LLM</text>

  <!-- Arrow 2→3 -->
  <line x1="282" y1="155" x2="330" y2="155" stroke="#D97757" stroke-width="2"/>
  <polygon points="336,155 326,149 326,161" fill="#D97757"/>
  <text x="309" y="146" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">calls via MCP/CLI</text>

  <!-- Node 3: Software's Agent (medium LLM) -->
  <rect x="342" y="127" width="120" height="56" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <!-- LLM sparkle icon inside -->
  <text x="402" y="152" text-anchor="middle" font-size="18" fill="#D97757">✦</text>
  <text x="402" y="173" text-anchor="middle" font-size="11" fill="#141413">Software's Agent</text>
  <text x="402" y="185" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">LLM + 业务逻辑</text>

  <!-- Arrow 3→4 -->
  <line x1="464" y1="155" x2="512" y2="155" stroke="#788C5D" stroke-width="2"/>
  <polygon points="518,155 508,149 508,161" fill="#788C5D"/>
  <text x="491" y="146" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">queries</text>

  <!-- Node 4: Database (cylinder) -->
  <ellipse cx="570" cy="133" rx="32" ry="12" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <path d="M 538 133 L 538 175 Q 538 187 570 187 Q 602 187 602 175 L 602 133" stroke="#788C5D" stroke-width="1.8" fill="none"/>
  <ellipse cx="570" cy="175" rx="32" ry="12" fill="none" stroke="#788C5D" stroke-width="1.8"/>
  <!-- Cylinder middle line -->
  <path d="M 538 154 Q 538 166 570 166 Q 602 166 602 154" stroke="#788C5D" stroke-width="1" fill="none" opacity="0.5"/>
  <text x="570" y="205" text-anchor="middle" font-size="11" fill="#141413">Database</text>

  <!-- Legend box (bottom-right) -->
  <rect x="534" y="220" width="126" height="64" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="546" y="238" font-size="10" font-weight="500" fill="#141413">图例</text>
  <!-- Legend item: Agent -->
  <rect x="546" y="246" width="14" height="10" rx="2" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="566" y="255" font-size="9" fill="#141413">Agent (LLM)</text>
  <!-- Legend item: Database -->
  <ellipse cx="553" cy="273" rx="7" ry="4" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="566" y="276" font-size="9" fill="#141413">Database</text>
  <!-- Legend item: Arrow -->
  <line x1="546" y1="288" x2="564" y2="288" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="566,288 560,284 560,292" fill="#D97757"/>
  <text x="572" y="292" font-size="9" fill="#141413">MCP/CLI</text>

  <!-- Source note -->
  <text x="340" y="286" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Ramp · Designing for Agents · 2026</text>
</svg>