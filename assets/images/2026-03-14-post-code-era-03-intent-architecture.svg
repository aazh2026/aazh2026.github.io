<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">从代码优先到意图优先：编程范式的转移</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">后代码时代 · 2026/03/14</text>

  <!-- Three-layer architecture -->
  <!-- Layer 3: Intent Layer (top) -->
  <rect x="60" y="70" width="560" height="80" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="60" y="70" width="560" height="24" rx="8" fill="#D97757"/>
  <rect x="60" y="86" width="560" height="8" fill="#D97757"/>
  <text x="80" y="87" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Intent Layer · 意图层</text>
  <text x="80" y="108" font-size="13" fill="#141413">自然语言描述需求</text>
  <text x="80" y="126" font-size="11" fill="#87867F">"在页面上显示用户最近 5 个订单"</text>
  <!-- Intent bubble -->
  <ellipse cx="540" cy="115" rx="60" ry="28" fill="#D97757" opacity="0.15"/>
  <text x="540" y="112" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">意图</text>
  <text x="540" y="126" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">Intent</text>

  <!-- Arrow: Intent → Abstraction -->
  <line x1="340" y1="150" x2="340" y2="170" stroke="#D97757" stroke-width="2"/>
  <polygon points="340,174 334,164 346,164" fill="#D97757"/>
  <text x="356" y="165" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">AI 翻译</text>

  <!-- Layer 2: Abstraction Layer (middle) -->
  <rect x="60" y="178" width="560" height="80" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="60" y="178" width="560" height="24" rx="8" fill="#788C5D"/>
  <rect x="60" y="194" width="560" height="8" fill="#788C5D"/>
  <text x="80" y="195" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Abstraction Layer · 抽象层</text>
  <text x="80" y="216" font-size="13" fill="#141413">DSL / 框架 / 中间代码</text>
  <text x="80" y="234" font-size="11" fill="#87867F">信息损耗 · 翻译成本</text>
  <!-- Info loss indicator -->
  <rect x="500" y="195" width="90" height="44" rx="6" fill="#788C5D" opacity="0.1"/>
  <text x="545" y="215" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">信息</text>
  <text x="545" y="229" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">损耗</text>

  <!-- Arrow: Abstraction → Code -->
  <line x1="340" y1="258" x2="340" y2="278" stroke="#788C5D" stroke-width="1.8"/>
  <polygon points="340,282 334,272 346,272" fill="#788C5D"/>
  <text x="356" y="273" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">编译/解释</text>

  <!-- Layer 1: Code Layer (bottom) -->
  <rect x="60" y="286" width="560" height="60" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="80" y="308" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">Code Layer · 代码层</text>
  <text x="200" y="308" font-size="13" fill="#141413">机器码 / 字节码 / 语法树</text>
  <text x="80" y="328" font-size="10" fill="#87867F">语法 · 编译 · 机器执行</text>

  <!-- Side annotation: Traditional path (dashed) -->
  <path d="M 620 90 L 620 330" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4" fill="none"/>
  <text x="628" y="200" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">传统</text>
  <text x="628" y="212" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">路径</text>
  <text x="628" y="224" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">需学</text>
  <text x="628" y="236" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">习</text>

  <!-- Side annotation: Intent path (solid, highlighted) -->
  <path d="M 40 90 L 40 330" stroke="#D97757" stroke-width="1.5" fill="none"/>
  <text x="28" y="200" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">意图</text>
  <text x="28" y="212" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">优先</text>
  <text x="28" y="224" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">路径</text>

  <!-- Bottom: Summary -->
  <rect x="180" y="344" width="320" height="14" rx="4" fill="#D97757" opacity="0.1"/>
  <text x="340" y="354" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-serif, Georgia, serif">意图 → 验证 → 解决真正的问题</text>
</svg>
