<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img" aria-label="技术债务仪表盘">
  <title>技术债务仪表盘</title>
  <desc>技术债务总览、类型分布和高风险债务列表</desc>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="340" fill="#FAF9F5"/>

  <!-- 外框标题 -->
  <rect x="15" y="12" width="730" height="316" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="30" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#141413">技术债务仪表盘</text>

  <!-- ========== 债务总览 ========== -->
  <rect x="25" y="45" width="230" height="135" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#92400e">债务总览</text>
  <line x1="35" y1="76" x2="245" y2="76" stroke="#fcd34d" stroke-width="1"/>
  <text x="40" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#78716c">总债务分数</text>
  <text x="40" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#d97706">156分</text>
  <text x="110" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">(↓12分/月)</text>
  <line x1="35" y1="128" x2="245" y2="128" stroke="#fcd34d" stroke-width="1"/>
  <circle cx="50" cy="145" r="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="62" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#78716c">P0债务</text>
  <text x="110" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#dc2626">0个</text>
  <text x="140" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#059669">✅</text>
  <circle cx="50" cy="165" r="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="62" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#78716c">P1债务</text>
  <text x="110" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#d97706">3个</text>
  <text x="145" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#d97706">⚠️</text>

  <!-- ========== 债务类型分布 ========== -->
  <rect x="265" y="45" width="230" height="135" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1e40af">债务类型分布</text>
  <line x1="275" y1="76" x2="485" y2="76" stroke="#93c5fd" stroke-width="1"/>
  <!-- Bar: 代码债务 45% -->
  <text x="275" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#78716c">代码债务</text>
  <rect x="350" y="84" width="135" height="14" rx="3" fill="#E3DACC"/>
  <rect x="350" y="84" width="60" height="14" rx="3" fill="#D97757"/>
  <text x="495" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">45%</text>
  <!-- Bar: 测试债务 30% -->
  <text x="275" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#78716c">测试债务</text>
  <rect x="350" y="104" width="135" height="14" rx="3" fill="#E3DACC"/>
  <rect x="350" y="104" width="40" height="14" rx="3" fill="#2563eb"/>
  <text x="495" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">30%</text>
  <!-- Bar: 架构债务 15% -->
  <text x="275" y="134" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#78716c">架构债务</text>
  <rect x="350" y="124" width="135" height="14" rx="3" fill="#E3DACC"/>
  <rect x="350" y="124" width="20" height="14" rx="3" fill="#059669"/>
  <text x="495" y="134" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">15%</text>
  <!-- Bar: 文档债务 10% -->
  <text x="275" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#78716c">文档债务</text>
  <rect x="350" y="144" width="135" height="14" rx="3" fill="#E3DACC"/>
  <rect x="350" y="144" width="14" height="14" rx="3" fill="#87867F"/>
  <text x="495" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">10%</text>

  <!-- ========== 高风险债务 ========== -->
  <rect x="505" y="45" width="230" height="280" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="66" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#991b1b">高风险债务 (TOP 5)</text>
  <line x1="515" y1="76" x2="725" y2="76" stroke="#fca5a5" stroke-width="1"/>

  <!-- Risk item 1 -->
  <circle cx="525" cy="94" r="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="525" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#b45309">1</text>
  <text x="542" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#991b1b">[P1]</text>
  <text x="570" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">order_service.py:156</text>
  <text x="542" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">函数长度120行</text>

  <!-- Risk item 2 -->
  <circle cx="525" cy="130" r="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="525" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#b45309">2</text>
  <text x="542" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#991b1b">[P1]</text>
  <text x="570" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">payment_module</text>
  <text x="542" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">循环依赖</text>

  <!-- Risk item 3 -->
  <circle cx="525" cy="166" r="10" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#78716c">3</text>
  <text x="542" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#b45309">[P2]</text>
  <text x="570" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">user_api.py</text>
  <text x="542" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">缺少测试覆盖</text>

  <!-- Risk item 4 -->
  <circle cx="525" cy="202" r="10" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="206" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#78716c">4</text>
  <text x="542" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#b45309">[P2]</text>
  <text x="570" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">auth_service</text>
  <text x="542" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">文档过时</text>

  <!-- Risk item 5 -->
  <circle cx="525" cy="238" r="10" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#78716c">5</text>
  <text x="542" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#b45309">[P2]</text>
  <text x="570" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">database.py</text>
  <text x="542" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78716c">重复代码</text>

  <!-- 图例 -->
  <rect x="25" y="290" width="10" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="40" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">高优先级</text>
  <rect x="110" y="290" width="10" height="10" rx="2" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="125" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">中优先级</text>
  <rect x="195" y="290" width="10" height="10" rx="2" fill="#D97757"/>
  <text x="210" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">代码债务</text>
  <rect x="280" y="290" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="295" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">测试债务</text>
  <rect x="360" y="290" width="10" height="10" rx="2" fill="#059669"/>
  <text x="375" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">架构债务</text>
  <rect x="440" y="290" width="10" height="10" rx="2" fill="#87867F"/>
  <text x="455" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">文档债务</text>
</svg>