<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c06548"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#788c5d"/>
      <stop offset="100%" stop-color="#667a4f"/>
    </linearGradient>
    <filter id="shadow" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="16"/>
  <text x="450" y="46" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-.3" text-anchor="middle">简单 vs 容易 — 核心对比</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M200 60h500"/>
  <rect width="390" height="390" x="40" y="82" fill="#faf9f5" filter="url(#shadow)" rx="14"/>
  <rect width="390" height="56" x="40" y="82" fill="url(#olive)" rx="14"/>
  <path fill="url(#olive)" d="M40 120h390v18H40z"/>
  <text x="235" y="120" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" text-anchor="middle">简单 Simple</text>
  <text x="65" y="168" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">词源 ETYMOLOGY</text>
  <text x="65" y="190" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="14"><tspan font-style="italic">simplex</tspan> = 单一的、不交织的</text>
  <text x="65" y="212" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="13">一个念头 · 一个任务 · 一个角色</text>
  <path stroke="#d1cfc5" d="M65 226h340"/>
  <text x="65" y="252" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">特征 ATTRIBUTES</text>
  <g transform="translate(65 265)">
    <circle cx="8" cy="8" r="4" fill="#788c5d"/>
    <text x="22" y="13" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">客观可度量</text>
    <circle cx="8" cy="33" r="4" fill="#788c5d"/>
    <text x="22" y="38" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">各部分不纠缠</text>
    <circle cx="8" cy="58" r="4" fill="#788c5d"/>
    <text x="22" y="63" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">理解 A 不需理解 B</text>
    <circle cx="8" cy="83" r="4" fill="#788c5d"/>
    <text x="22" y="88" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">可独立测试、推理、修改</text>
  </g>
  <path stroke="#d1cfc5" d="M65 362h340"/>
  <rect width="130" height="34" x="65" y="374" fill="#788c5d" opacity=".15" rx="8"/>
  <text x="130" y="396" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">长期价值 ✓</text>
  <rect width="130" height="34" x="210" y="374" fill="#788c5d" opacity=".15" rx="8"/>
  <text x="275" y="396" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">可组合 ✓</text>
  <rect width="130" height="34" x="65" y="420" fill="#788c5d" opacity=".15" rx="8"/>
  <text x="130" y="442" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">稳定可控 ✓</text>
  <rect width="130" height="34" x="210" y="420" fill="#788c5d" opacity=".15" rx="8"/>
  <text x="275" y="442" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">认知高效 ✓</text>
  <path stroke="#d1cfc5" stroke-dasharray="8,6" stroke-width="2" d="M450 110v360"/>
  <text x="450" y="300" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="28" text-anchor="middle" transform="rotate(-90 450 300)">VS</text>
  <rect width="390" height="390" x="470" y="82" fill="#faf9f5" filter="url(#shadow)" rx="14"/>
  <rect width="390" height="56" x="470" y="82" fill="url(#clay)" rx="14"/>
  <path fill="url(#clay)" d="M470 120h390v18H470z"/>
  <text x="665" y="120" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" text-anchor="middle">容易 Easy</text>
  <text x="495" y="168" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">词源 ETYMOLOGY</text>
  <text x="495" y="190" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="14"><tspan font-style="italic">ease</tspan> = 近在咫尺、触手可及</text>
  <text x="495" y="212" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="13">熟悉程度 · 获取难度</text>
  <path stroke="#d1cfc5" d="M495 226h340"/>
  <text x="495" y="252" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">特征 ATTRIBUTES</text>
  <g transform="translate(495 265)">
    <circle cx="8" cy="8" r="4" fill="#d97757"/>
    <text x="22" y="13" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">主观感受，因人而异</text>
    <circle cx="8" cy="33" r="4" fill="#d97757"/>
    <text x="22" y="38" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">隐藏交织和依赖</text>
    <circle cx="8" cy="58" r="4" fill="#d97757"/>
    <text x="22" y="63" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">API 顺手，但底层复杂</text>
    <circle cx="8" cy="83" r="4" fill="#d97757"/>
    <text x="22" y="88" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13">&quot;感觉不错&quot; ≠ 设计良好</text>
  </g>
  <path stroke="#d1cfc5" d="M495 362h340"/>
  <rect width="130" height="34" x="495" y="374" fill="#d97757" opacity=".12" rx="8"/>
  <text x="560" y="396" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">债务累积 ⚠</text>
  <rect width="130" height="34" x="640" y="374" fill="#d97757" opacity=".12" rx="8"/>
  <text x="705" y="396" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">认知超载 ⚠</text>
  <rect width="130" height="34" x="495" y="420" fill="#d97757" opacity=".12" rx="8"/>
  <text x="560" y="442" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">难以复用 ⚠</text>
  <rect width="130" height="34" x="640" y="420" fill="#d97757" opacity=".12" rx="8"/>
  <text x="705" y="442" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">维护噩梦 ⚠</text>
  <rect width="500" height="26" x="200" y="488" fill="#141413" opacity=".06" rx="13"/>
  <text x="450" y="506" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">我们选择容易，是因为简单很难。</text>
</svg>
