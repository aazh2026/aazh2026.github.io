<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Context Delivery 5层 pipeline -->
  <rect width="560" height="200" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">Context Engineering 上下文交付五层 Pipeline</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/04/09</text>

  <!-- L1: Sources -->
  <rect x="40" y="50" width="480" height="34" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="50" width="480" height="16" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="64" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L1 · Context Sources 上下文源层</text>
  <text x="300" y="64" font-size="9.5" fill="#141413">连接企业数据源（DB · 文档 · 知识库）</text>
  <rect x="490" y="60" width="18" height="18" rx="9" fill="#2563EB"/>
  <text x="499" y="73" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L1</text>

  <line x1="280" y1="84" x2="280" y2="92" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,92 280,100 284,84" fill="#D1CFC5"/>

  <!-- L2: Integration -->
  <rect x="40" y="92" width="480" height="28" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="40" y="92" width="480" height="14" rx="6" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="60" y="106" font-size="9" fill="#3B82F6" font-family="ui-monospace, monospace" font-weight="600">L2 · Context Integration 整合层</text>
  <text x="300" y="106" font-size="9" fill="#141413">从多源系统整合上下文数据</text>

  <line x1="280" y1="120" x2="280" y2="128" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,128 280,136 284,120" fill="#D1CFC5"/>

  <!-- L3: Indexing -->
  <rect x="40" y="128" width="480" height="24" rx="6" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="40" y="128" width="480" height="12" rx="6" fill="#93C5FD" stroke="#60A5FA" stroke-width="1"/>
  <text x="60" y="140" font-size="9" fill="#60A5FA" font-family="ui-monospace, monospace" font-weight="600">L3 · Context Indexing 索引层</text>
  <text x="280" y="140" font-size="9" fill="#141413">构建可检索的上下文索引</text>

  <line x1="280" y1="152" x2="280" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,160 280,168 284,152" fill="#D1CFC5"/>

  <!-- L4: Retrieval -->
  <rect x="40" y="160" width="480" height="24" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="40" y="160" width="480" height="12" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="60" y="172" font-size="9" fill="#3B82F6" font-family="ui-monospace, monospace" font-weight="600">L4 · Context Retrieval 检索层</text>
  <text x="280" y="172" font-size="9" fill="#141413">基于语义和规则检索相关上下文</text>

  <line x1="280" y1="184" x2="280" y2="192" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,192 280,200 284,184" fill="#D1CFC5"/>

  <!-- L5: Delivery -->
  <rect x="40" y="192" width="480" height="0" rx="0"/>
  <text x="280" y="204" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">L5 Delivery 将筛选后的上下文注入 Prompt，完成上下文工程闭环</text>
</svg>