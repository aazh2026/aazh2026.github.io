<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="契约漂移影响分析">
  <title>契约漂移的影响范围：级联效应</title>
  <desc>展示契约变更如何从直接调用方级联传播到整个微服务系统</desc>

  <defs>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EFE9"/>
    </linearGradient>
    <marker id="redArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97757"/>
    </marker>
    <marker id="grayArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D1CFC5"/>
    </marker>
    <marker id="oliveArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#788C5D"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad3)"/>

  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#141413">契约漂移影响范围分析</text>
  <text x="400" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#87867F">Contract Drift Cascade Effect</text>

  <!-- Service A (变更源头) -->
  <g filter="url(#shadow3)">
    <rect x="300" y="90" width="200" height="70" rx="10" fill="#D97757"/>
  </g>
  <text x="400" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FAF9F5">服务 A</text>
  <text x="400" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5">契约变更源头</text>
  <text x="400" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#E3DACC">order-service v2</text>

  <!-- Level 1 label -->
  <text x="120" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#D97757">直接影响</text>
  <text x="120" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">直接调用该服务的客户端</text>

  <!-- Direct arrows -->
  <line x1="300" y1="160" x2="120" y2="240" stroke="#D97757" stroke-width="2" marker-end="url(#redArrow)"/>
  <line x1="400" y1="160" x2="400" y2="240" stroke="#D97757" stroke-width="2" marker-end="url(#redArrow)"/>
  <line x1="500" y1="160" x2="680" y2="240" stroke="#D97757" stroke-width="2" marker-end="url(#redArrow)"/>

  <!-- Client B -->
  <g filter="url(#shadow3)">
    <rect x="60" y="240" width="120" height="56" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  </g>
  <text x="120" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#141413">客户端 B</text>
  <text x="120" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D97757">user-service</text>

  <!-- Client C -->
  <g filter="url(#shadow3)">
    <rect x="340" y="240" width="120" height="56" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  </g>
  <text x="400" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#141413">客户端 C</text>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D97757">payment-service</text>

  <!-- Client D -->
  <g filter="url(#shadow3)">
    <rect x="620" y="240" width="120" height="56" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  </g>
  <text x="680" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#141413">客户端 D</text>
  <text x="680" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D97757">inventory-svc</text>

  <!-- Level 2 label -->
  <text x="160" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#87867F">间接影响</text>
  <text x="160" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">调用这些客户端的服务（级联）</text>

  <line x1="120" y1="296" x2="120" y2="370" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#grayArrow)"/>
  <line x1="400" y1="296" x2="340" y2="370" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#grayArrow)"/>
  <line x1="680" y1="296" x2="680" y2="370" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#grayArrow)"/>

  <!-- Level 2 nodes -->
  <g filter="url(#shadow3)">
    <rect x="60" y="370" width="120" height="48" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>
  <text x="120" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#141413">服务 E</text>
  <text x="120" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">依赖 B</text>

  <g filter="url(#shadow3)">
    <rect x="280" y="370" width="120" height="48" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>
  <text x="340" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#141413">服务 F</text>
  <text x="340" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">依赖 C</text>

  <g filter="url(#shadow3)">
    <rect x="620" y="370" width="120" height="48" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  </g>
  <text x="680" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#141413">服务 G</text>
  <text x="680" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">依赖 D</text>

  <!-- Level 3 label -->
  <text x="160" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#788C5D">潜在影响</text>
  <text x="160" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">消息队列/事件总线的间接依赖</text>

  <!-- Message queue -->
  <line x1="120" y1="418" x2="120" y2="440" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#oliveArrow)"/>
  <line x1="340" y1="418" x2="340" y2="440" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#oliveArrow)"/>
  <line x1="680" y1="418" x2="680" y2="440" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#oliveArrow)"/>

  <g filter="url(#shadow3)">
    <rect x="560" y="440" width="200" height="40" rx="8" fill="#788C5D"/>
  </g>
  <text x="660" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FAF9F5">消息队列 / 事件总线</text>
</svg>
