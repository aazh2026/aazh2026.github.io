fill="#87867f" font-size="9" text-anchor="middle" transform="translate(560 170)">months</text><g filter="url(#shadow5)" transform="translate(630 85)"><rect width="220" height="200" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/><rect width="220" height="28" fill="#141413" rx="8"/><path fill="#141413" d="M0 16h220v12H0z"/><text x="110" y="19" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Stage 3: System</text><g transform="translate(20 50)"><rect width="60" height="36" x="70" y="15" fill="#141413" rx="6"/><text x="100" y="30" fill="#fff" font-size="8" font-weight="600" text-anchor="middle">OpenClaw</text><text x="100" y="42" fill="#d1cfc5" font-size="8" text-anchor="middle">Hub</text><path stroke="#d1cfc5" d="M70 33 40 15"/><rect width="35" height="22" x="5" fill="#788c5d" rx="3"/><text x="22" y="14" fill="#fff" font-size="7" text-anchor="middle">Notion</text><path stroke="#d1cfc5" d="m130 33 30-18"/><rect width="35" height="22" x="160" fill="#d97757" rx="3"/><text x="177" y="14" fill="#fff" font-size="7" text-anchor="middle">GitHub</text><path stroke="#d1cfc5" d="M70 51 40 68"/><rect width="35" height="22" x="5" y="55" fill="#87867f" rx="3"/><text x="22" y="69" fill="#fff" font-size="7" text-anchor="middle">Slack</text><path stroke="#d1cfc5" d="m130 51 30 17"/><rect width="35" height="22" x="160" y="55" fill="#788c5d" rx="3"/><text x="177" y="69" fill="#fff" font-size="7" text-anchor="middle">Telegram</text><path stroke="#d1cfc5" d="M100 51v21"/><rect width="36" height="22" x="82" y="72" fill="#d97757" rx="3"/><text x="100" y="86" fill="#fff" font-size="7" text-anchor="middle">+ more</text></g><text x="110" y="150" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">Integrated ecosystem</text><text x="110" y="166" fill="#87867f" font-size="10" text-anchor="middle">Skills + memory + reasoning</text><path stroke="#e3dacc" d="M20 180h180"/><text x="15" y="196" fill="#87867f" font-size="9">• 7+ skills active</text><text x="15" y="210" fill="#87867f" font-size="9">• Self-healing workflows</text><text x="110" y="228" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">Time saved: 4 hr/day</text></g><g filter="url(#shadow5)" transform="translate(50 310)"><rect width="380" height="145" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/><text x="190" y="22" fill="#788c5d" font-size="12" font-weight="700" text-anchor="middle">Success Formula</text><path stroke="#e3dacc" d="M20 34h340"/><g fill="#141413"><text font-size="11" font-weight="600" transform="translate(20 46)">Key Principles for Progression</text><text y="20" font-size="10" transform="translate(20 46)">① Start with the most painful, highest-frequency task</text><text y="36" font-size="10" transform="translate(20 46)">② Choose tasks that are rule-based, not judgment-based</text><text y="52" font-size="10" transform="translate(20 46)">③ Build trust with quick wins before complex flows</text><text y="68" font-size="10" transform="translate(20 46)">④ Always keep a &quot;manual override&quot; path for exceptions</text><text y="84" font-size="10" transform="translate(20 46)">⑤ Review monthly — remove broken, refine working flows</text></g></g><g filter="url(#shadow5)" transform="translate(460 310)"><rect width="390" height="145" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="195" y="22" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">ROI Timeline (Typical Knowledge Worker)</text><path stroke="#d1cfc5" d="M20 34h350"/><path stroke="#d1cfc5" stroke-width="2" d="M30 115h330"/><path stroke="#d1cfc5" stroke-width="1.5" d="M30 115v-8"/><text y="12" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(30 115)">M0</text><text y="-14" fill="#141413" font-size="9" text-anchor="middle" transform="translate(30 115)">Setup</text><path stroke="#d1cfc5" stroke-width="1.5" d="M105 115v-8"/><text y="12" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(105 115)">M1</text><text y="-14" fill="#141413" font-size="9" text-anchor="middle" transform="translate(105 115)">Payback</text><path stroke="#d1cfc5" stroke-width="1.5" d="M180 115v-8"/><text y="12" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(180 115)">M3</text><text y="-14" fill="#141413" font-size="9" text-anchor="middle" transform="translate(180 115)">ROI 3x</text><path stroke="#d1cfc5" stroke-width="1.5" d="M255 115v-8"/><text y="12" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(255 115)">M6</text><text y="-14" fill="#141413" font-size="9" text-anchor="middle" transform="translate(255 115)">ROI 10x</text><path stroke="#d1cfc5" stroke-width="1.5" d="M330 115v-8"/><text y="12" fill="#87867f" font-size="9" text-anchor="middle" transform="translate(330 115)">M12</text><text y="-14" fill="#141413" font-size="9" text-anchor="middle" transform="translate(330 115)">ROI 20x</text><path fill="none" stroke="#788c5d" stroke-width="2.5" d="m30 105 75-25 75-25 75-15 75-10"/><circle cx="30" cy="105" r="4" fill="#788c5d"/><circle cx="105" cy="80" r="4" fill="#788c5d"/><circle cx="180" cy="55" r="4" fill="#788c5d"/><circle cx="255" cy="40" r="4" fill="#788c5d"/><circle cx="330" cy="30" r="4" fill="#788c5d"/><text x="20" y="65" fill="#87867f" font-size="8" transform="rotate(-90 20 65)">Hours saved/week</text><text x="30" y="120" fill="#87867f" font-size="8">0h</text><text x="100" y="120" fill="#87867f" font-size="8">5h</text><text x="175" y="120" fill="#87867f" font-size="8">15h</text><text x="250" y="120" fill="#87867f" font-size="8">22h</text><text x="325" y="120" fill="#87867f" font-size="8">28h</text></g></svg>