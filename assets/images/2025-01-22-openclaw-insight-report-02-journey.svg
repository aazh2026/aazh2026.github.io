<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 900 480"><defs><linearGradient id="bg5" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient><filter id="shadow5" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/></filter></defs><rect width="900" height="480" fill="url(#bg5)" rx="12"/><text x="450" y="38" fill="#141413" font-size="18" font-weight="700" text-anchor="middle">Progressive Automation Journey</text><text x="450" y="58" fill="#87867f" font-size="12" text-anchor="middle">From single-point tasks to full system automation — the path successful OpenClaw users follow</text><g filter="url(#shadow5)" transform="translate(50 85)"><rect width="220" height="200" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="220" height="28" fill="#788c5d" rx="8"/><path fill="#788c5d" d="M0 16h220v12H0z"/><text x="110" y="19" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Stage 1: Single Task</text><circle cx="110" cy="80" r="28" fill="#e3dacc"/><text x="110" y="86" font-size="28" text-anchor="middle">⚡</text><text x="110" y="126" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">&quot;帮我写日报&quot;</text><text x="110" y="142" fill="#87867f" font-size="10" text-anchor="middle">One-off automation</text><path stroke="#d1cfc5" d="M20 158h180"/><text x="15" y="174" fill="#87867f" font-size="9">• Daily report generation</text><text x="15" y="188" fill="#87867f" font-size="9">• Single trigger + action</text><text x="15" y="202" fill="#87867f" font-size="9">• No state persistence</text><text x="110" y="228" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">Time saved: 15 min/day</text></g><path stroke="#d1cfc5" stroke-width="2.5" d="M270 185h40"/><path fill="#d1cfc5" d="m305 180 13 5-13 5z"/><text x="20" y=