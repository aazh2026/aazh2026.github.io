  <text x="202" y="200" fill="#141413" font-family="system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">CopyAI / Jasper / WriteSonic</text>
  <text x="202" y="218" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">通用 AI 写作工具</text>
