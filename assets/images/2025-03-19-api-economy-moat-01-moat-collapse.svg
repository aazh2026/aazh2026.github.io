  <rect width="180" height="18" x="436" y="282" fill="#d1cfc5" rx="4"/>
  <rect width="140" height="18" x="436" y="282" fill="#788c5d" rx="4"/>
  <text x="624" y="295" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">领域知识</text>
  <rect width="180" height="18" x="436" y="308" fill="#d1cfc5" rx="4"/>
  <rect width="165" height="18" x="436" y="308" fill="#788c5d" rx="4"/>
