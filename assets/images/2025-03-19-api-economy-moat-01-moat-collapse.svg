  <rect width="324" height="90" x="436" y="340" fill="#faf9f5" stroke="#d1cfc5" rx="8"/>
  <text x="452" y="362" fill="#d97757" font-family="system-ui, sans-serif" font-size="12" font-weight="600">核心洞察</text>
  <text x="452" y="380" fill="#141413" font-family="system-ui, sans-serif" font-size="11">技术优势 → 可复制</text>
  <text x="452" y="396" fill="#141413" font-family="system-ui, sans-serif" font-size="11">场景深度 → 难复制</text>
  <text x="452" y="412" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="600">&quot;场景才是护城河&quot;</text>
  <text x="400" y="468" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">CopyAI 案例：同一 API，更低定价，更好 SEO → 护城河幻觉崩塌</text>
