  <g fill="#788c5d" transform="translate(530 140)">
    <circle r="22" opacity=".15"/>
    <text y="5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">CS</text>
  </g>
  <g fill="#788c5d" transform="translate(600 140)">
    <circle r="22" opacity=".15"/>
    <text y="5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">JP</text>
