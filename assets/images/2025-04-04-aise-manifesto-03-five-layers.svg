  <polygon points="300,340 296,332 304,332" fill="#D1CFC5"/>

  <!-- Layer 1 (bottom) -->
  <rect x="40" y="280" width="520" height="48" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="48" y="292" width="46" height="18" rx="9" fill="#D97757"/>
  <text x="71" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Layer 1</text>
  <text x="112" y="300" font-size="13" fill="#141413" font-weight="600">Model Layer 模型层</text>
  <text x="112" y="317" font-size="10" fill="#87867F">基础模型（GPT-4 / Claude / Gemini）+ 工具链（IDE / API / SDK）</text>
  <text x="480" y="305" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">基础设施</text>

  <!-- Source line -->
  <text x="300" y="352" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">AI-Native软件工程宣言 · 2025/04/04</text>

  <!-- Feedback arrow: Layer 5 → Layer 1 (dashed clay, right side) -->
  <path d="M 560 78 C 578 78, 578 278, 560 280" stroke="#D97757" stroke-width="1.8" fill="none" stroke-dasharray="4,3" opacity="0.65"/>
  <polygon points="560,280 554,272 566,272" fill="#D97757" opacity="0.65"/>
  <text x="572" y="180" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">持续反馈</text>

  <title>AI-Native 软件工程五层架构</title>
  <desc>五层堆叠图：Layer 1 Model Layer（基础模型+工具链）、Layer 2 Context Engineering（上下文工程）、Layer 3 Agent Orchestration（多Agent协作）、Layer 4 Intent Architecture（意图设计与流转）、Layer 5 Human Workflow（人机工作流）。右侧有虚线反馈箭头从第五层回到第一层。</desc>
</svg>