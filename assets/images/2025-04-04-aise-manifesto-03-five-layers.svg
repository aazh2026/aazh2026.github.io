  <text x="480" y="81" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">战略层</text>

  <!-- Arrow 5→4 -->
  <line x1="300" y1="108" x2="300" y2="120" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="300,124 296,116 304,116" fill="#D1CFC5"/>

  <!-- Layer 4 -->
  <rect x="40" y="128" width="520" height="52" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="48" y="140" width="46" height="18" rx="9" fill="#D97757"/>
  <text x="71" y="153" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Layer 4</text>
  <text x="112" y="148" font-size="13" fill="#141413" font-weight="600">Intent Architecture 意图架构</text>
  <text x="112" y="165" font-size="10" fill="#87867F">意图设计与流转 · 知识资产管理 · Prompt工程</text>
  <text x="480" y="153" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">高级技能</text>

  <!-- Arrow 4→3 -->
  <line x1="300" y1="180" x2="300" y2="192" stroke="#D1CFC5" stroke-width="1.5"/>
