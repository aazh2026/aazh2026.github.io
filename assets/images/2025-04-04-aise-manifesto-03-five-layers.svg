  <rect x="40" y="56" width="520" height="52" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="48" y="68" width="46" height="18" rx="9" fill="#D97757"/>
  <text x="71" y="81" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Layer 5</text>
  <text x="112" y="76" font-size="13" fill="#141413" font-weight="600">Human Workflow 人机工作流</text>
