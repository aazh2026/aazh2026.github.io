  <text x="71" y="297" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Layer 2</text>
  <text x="112" y="292" font-size="13" fill="#141413" font-weight="600">Context Engineering 上下文工程</text>
