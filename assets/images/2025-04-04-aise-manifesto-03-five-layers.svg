  <rect x="40" y="200" width="520" height="52" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="48" y="212" width="46" height="18" rx="9" fill="#D97757"/>
  <text x="71" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Layer 3</text>
  <text x="112" y="220" font-size="13" fill="#141413" font-weight="600">Agent Orchestration Agent编排</text>
  <text x="112" y="237" font-size="10" fill="#87867F">多Agent协作 · 任务分解 · 依赖管理</text>
