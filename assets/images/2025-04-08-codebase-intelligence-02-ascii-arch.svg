<svg xmlns="http://www.w3.org/2000/svg" aria-label="服务依赖架构图" viewBox="0 0 680 420">
  <title>服务依赖架构图</title>
  <desc>
    Order Service → Pricing Service → Promotion Engine 的调用关系图
  </desc>
  <defs>
    <marker id="arrowHead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#d97757" d="m0 0 10 3.5L0 7z"/>
    </marker>
    <marker id="dotArrowHead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#87867f" d="m0 0 10 3.5L0 7z"/>
    </marker>
    <linearGradient id="boxGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ee"/>
      <stop offset="100%" stop-color="#ede8de"/>
    </linearGradient>
  </defs>
  <rect width="680" height="420" fill="#faf9f5" rx="8"/>
  <rect width="560" height="108" x="60" y="24" fill="url(#boxGrad)" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <rect width="560" height="30" x="60" y="24" fill="#d97757" rx="6"/>
  <path fill="#d97757" d="M60 44h560v10H60z"/>
  <text x="76" y="45" fill="#faf9f5" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="14" font-weight="700">Order Service</text>
  <path stroke="#d1cfc5" d="M60 54h560"/>
  <text x="84" y="74" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">├─</text>
  <text x="104" y="74" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">POST  /api/orders</text>
  <text x="84" y="92" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">├─</text>
  <text x="104" y="92" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">GET   /api/orders/{id}</text>
  <text x="84" y="110" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">└─</text>
  <text x="104" y="110" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">Event: order.created</text>
  <path stroke="#d1cfc5" d="M78 66v52m0-52h14M78 84h14m-14 18h14"/>
  <path stroke="#d1cfc5" stroke-dasharray="6,3" stroke-width="1.5" d="M530 132v38m0 0h25m0 0v15"/>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrowHead)" d="M555 185v15"/>
  <text x="555" y="164" fill="#d97757" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">calls</text>
  <rect width="560" height="80" x="60" y="200" fill="url(#boxGrad)" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <rect width="560" height="30" x="60" y="200" fill="#788c5d" rx="6"/>
  <path fill="#788c5d" d="M60 220h560v10H60z"/>
  <text x="76" y="221" fill="#faf9f5" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="14" font-weight="700">Pricing Service</text>
  <path stroke="#d1cfc5" d="M60 230h560"/>
  <text x="84" y="250" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">├─</text>
  <text x="104" y="250" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">calculatePrice()</text>
  <text x="84" y="266" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">└─</text>
  <text x="104" y="266" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">applyDiscount()</text>
  <path stroke="#d1cfc5" d="M78 242v32m0-32h14m-14 16h14"/>
  <path stroke="#d1cfc5" stroke-dasharray="6,3" stroke-width="1.5" d="M530 280v38m0 0h25"/>
  <path stroke="#87867f" stroke-dasharray="4,3" stroke-width="1.5" d="M555 318v15"/>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#dotArrowHead)" d="M555 333v15"/>
  <text x="555" y="312" fill="#87867f" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">uses</text>
  <rect width="560" height="64" x="60" y="348" fill="url(#boxGrad)" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <rect width="560" height="30" x="60" y="348" fill="#141413" rx="6"/>
  <path fill="#141413" d="M60 368h560v10H60z"/>
  <text x="76" y="369" fill="#faf9f5" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="14" font-weight="700">Promotion Engine</text>
  <path stroke="#d1cfc5" d="M60 378h560"/>
  <text x="84" y="396" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">├─</text>
  <text x="104" y="396" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">Black Friday Rules</text>
  <text x="84" y="408" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">└─</text>
  <text x="104" y="408" fill="#141413" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12">Member Discounts</text>
  <path stroke="#d1cfc5" d="M78 388v28m0-28h14m-14 12h14"/>
</svg>
