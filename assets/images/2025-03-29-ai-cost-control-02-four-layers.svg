<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI 成本冰山模型</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">四层成本结构 · 核心框架</text>

  <!-- Layer 1: Token Cost (emphasized, ~30%) -->
  <rect x="40" y="60" width="600" height="66" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="40" y="60" width="8" height="66" rx="4" fill="#D97757"/>
  <text x="64" y="81" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">L1</text>
  <text x="64" y="99" font-size="13" fill="#141413">Token 成本</text>
  <text x="148" y="81" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">可见性 高</text>
  <text x="148" y="99" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">增长 线性</text>
  <text x="240" y="81" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">占比 ~30%</text>
  <text x="240" y="99" font-size="10" fill="#141413">按 Token 计费，最容易预测和控制</text>
  <text x="580" y="90" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">↑ 显性</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="126" x2="340" y2="138" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,142 336,134 344,134" fill="#D1CFC5"/>

  <!-- Layer 2: Latency Cost (~25%) -->
  <rect x="40" y="146" width="600" height="66" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="146" width="8" height="66" rx="4" fill="#D1CFC5"/>
  <text x="64" y="167" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">L2</text>
  <text x="64" y="185" font-size="13" fill="#141413">延迟成本</text>
  <text x="148" y="167" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">可见性 中</text>
  <text x="148" y="185" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">增长 超线性</text>
  <text x="240" y="167" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">占比 ~25%</text>
  <text x="240" y="185" font-size="10" fill="#141413">用户体验下降 + 基础设施扩容需求</text>
  <text x="580" y="176" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">↑↓</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="212" x2="340" y2="224" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,228 336,220 344,220" fill="#D1CFC5"/>

  <!-- Layer 3: Error Cost (emphasized, ~30%) -->
  <rect x="40" y="232" width="600" height="66" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="40" y="232" width="8" height="66" rx="4" fill="#D97757"/>
  <text x="64" y="253" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">L3</text>
  <text x="64" y="271" font-size="13" fill="#141413">错误成本</text>
  <text x="148" y="253" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">可见性 低</text>
  <text x="148" y="271" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">增长 指数级</text>
  <text x="240" y="253" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">占比 ~30%</text>
  <text x="240" y="271" font-size="10" fill="#141413">一次严重错误的成本可超过一年 API 费用</text>
  <text x="580" y="262" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">↓ 隐性</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="298" x2="340" y2="310" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,314 336,306 344,306" fill="#D1CFC5"/>

  <!-- Layer 4: Maintenance Cost (~15%) -->
  <rect x="40" y="318" width="600" height="66" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="318" width="8" height="66" rx="4" fill="#D1CFC5"/>
  <text x="64" y="339" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">L4</text>
  <text x="64" y="357" font-size="13" fill="#141413">维护成本</text>
  <text x="148" y="339" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">可见性 极低</text>
  <text x="148" y="357" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">增长 隐性累积</text>
  <text x="240" y="339" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">占比 ~15%</text>
  <text x="240" y="357" font-size="10" fill="#141413">Prompt 调整、反馈循环、行为监控</text>
  <text x="580" y="343" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">↓↓ 冰山下</text>

  <!-- Right side: iceberg accumulation indicator -->
  <text x="654" y="90" font-size="8" fill="#D97757" font-family="ui-monospace, monospace" transform="rotate(-90,654,90)">TOKEN</text>
  <text x="654" y="176" font-size="8" fill="#87867F" font-family="ui-monospace, monospace" transform="rotate(-90,654,176)">LATENCY</text>
  <text x="654" y="262" font-size="8" fill="#D97757" font-family="ui-monospace, monospace" transform="rotate(-90,654,262)">ERRORS</text>
  <text x="654" y="343" font-size="8" fill="#87867F" font-family="ui-monospace, monospace" transform="rotate(-90,654,343)">MAINTENANCE</text>
</svg>
