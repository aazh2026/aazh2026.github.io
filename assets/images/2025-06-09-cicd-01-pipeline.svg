<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- CI/CD AI 注入点流程 -->
  <rect width="560" height="180" fill="#FAF9F5"/>

  <text x="280" y="18" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">CI/CD 流程中的 AI 注入点</text>
  <text x="280" y="34" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/06/09</text>

  <!-- Stage A: 开发者提交 -->
  <rect x="30" y="70" width="72" height="60" rx="6" fill="#F0EEE6" stroke="#87867F" stroke-width="1.5"/>
  <text x="66" y="92" text-anchor="middle" font-size="9" fill="#141413" font-weight="600">A · 开发者</text>
  <text x="66" y="106" text-anchor="middle" font-size="9" fill="#141413">提交代码</text>
  <text x="66" y="120" text-anchor="middle" font-size="8.5" fill="#87867F">git push</text>
  <rect x="94" y="90" width="12" height="12" rx="6" fill="#87867F"/>
  <text x="100" y="99" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">A</text>

  <!-- Arrow A→B -->
  <line x1="102" y1="100" x2="118" y2="100" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="118,96 126,100 118,104" fill="#D1CFC5"/>

  <!-- Stage B: 静态分析 -->
  <rect x="126" y="62" width="80" height="76" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="126" y="62" width="80" height="16" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="166" y="75" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">B · 静态分析</text>
  <text x="166" y="93" text-anchor="middle" font-size="9" fill="#141413">Lint / SAST</text>
  <text x="166" y="106" text-anchor="middle" font-size="8.5" fill="#141413">✓ 语法检查</text>
  <text x="166" y="118" text-anchor="middle" font-size="8.5" fill="#141413">✓ 代码规范</text>
  <text x="166" y="130" text-anchor="middle" font-size="8" fill="#059669">AI 可增强</text>
  <rect x="198" y="84" width="12" height="12" rx="6" fill="#059669"/>
  <text x="204" y="93" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">B</text>

  <!-- Arrow B→C -->
  <line x1="206" y1="100" x2="222" y2="100" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="222,96 230,100 222,104" fill="#D1CFC5"/>

  <!-- Stage C: 单元测试 -->
  <rect x="230" y="70" width="72" height="60" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="230" y="70" width="72" height="16" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="266" y="83" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">C · 单元测试</text>
  <text x="266" y="100" text-anchor="middle" font-size="9" fill="#141413">Unit Tests</text>
  <text x="266" y="114" text-anchor="middle" font-size="8.5" fill="#141413">✓ 函数正确性</text>
  <rect x="294" y="90" width="12" height="12" rx="6" fill="#059669"/>
  <text x="300" y="99" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">C</text>

  <!-- Arrow C→D -->
  <line x1="302" y1="100" x2="318" y2="100" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="318,96 326,100 318,104" fill="#D1CFC5"/>

  <!-- Stage D: 集成测试 -->
  <rect x="326" y="70" width="72" height="60" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="326" y="70" width="72" height="16" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="362" y="83" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">D · 集成测试</text>
  <text x="362" y="100" text-anchor="middle" font-size="9" fill="#141413">Integration</text>
  <text x="362" y="114" text-anchor="middle" font-size="8.5" fill="#141413">✓ 模块协作</text>
  <rect x="390" y="90" width="12" height="12" rx="6" fill="#059669"/>
  <text x="396" y="99" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">D</text>

  <!-- Arrow D→E (bottleneck) -->
  <line x1="398" y1="100" x2="414" y2="100" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="414,96 422,100 414,104" fill="#D1CFC5"/>

  <!-- Stage E: Code Review (bottleneck) -->
  <rect x="422" y="62" width="108" height="76" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="422" y="62" width="108" height="16" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="476" y="75" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">⚠ E · Code Review</text>
  <text x="476" y="93" text-anchor="middle" font-size="9" fill="#141413">人工审查</text>
  <text x="476" y="106" text-anchor="middle" font-size="8.5" fill="#DC2626">耗时、主观、不一致</text>
  <text x="476" y="118" text-anchor="middle" font-size="8.5" fill="#DC2626">意图偏离无法发现</text>
  <text x="476" y="130" text-anchor="middle" font-size="8" fill="#D97757">AI 替代目标</text>
  <rect x="522" y="84" width="12" height="12" rx="6" fill="#D97757"/>
  <text x="528" y="93" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">E</text>

  <!-- Arrow E→F -->
  <line x1="478" y1="138" x2="478" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="474,160 478,168 482,160" fill="#D1CFC5"/>

  <!-- Stage F: 部署上线 -->
  <rect x="440" y="160" width="76" height="20" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
  <text x="478" y="174" text-anchor="middle" font-size="9" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">F · 部署上线</text>
</svg>