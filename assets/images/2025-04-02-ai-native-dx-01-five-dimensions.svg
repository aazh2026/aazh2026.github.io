<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-primary { fill: #141413; font-size: 13px; font-weight: 600; }
      .text-secondary { fill: #87867F; font-size: 11px; }
      .text-light { fill: #FAF9F5; font-size: 12px; }
    </style>
  </defs>
  <rect width="800" height="520" class="bg"/>

  <!-- Title -->
  <text x="40" y="36" class="text-primary" font-size="15px">AI-Native 开发者体验五维模型</text>
  <text x="40" y="52" class="text-secondary">Five-Dimensional Developer Experience Model for AI-Native Era</text>

  <!-- Pentagon/Radar chart: center at 260, 280, radius 180 -->
  <!-- 5 axes: Cognitive Flow (top), Feedback Loop (top-right), Trust (right), Agency (bottom-right), Growth (bottom-left) -->
  <!-- Angles: -90° (top), -18° (top-right), 54° (bottom-right), 126° (bottom-left), 198° (top-left) -->

  <!-- Grid circles -->
  <circle cx="280" cy="280" r="40" fill="none" stroke="#D1CFC5" stroke-width="0.8"/>
  <circle cx="280" cy="280" r="80" fill="none" stroke="#D1CFC5" stroke-width="0.8"/>
  <circle cx="280" cy="280" r="120" fill="none" stroke="#D1CFC5" stroke-width="0.8"/>
  <circle cx="280" cy="280" r="160" fill="none" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Pentagon spokes and labels -->
  <!-- Axis 0: Cognitive Flow (top, -90°) -->
  <line x1="280" y1="280" x2="280" y2="120" stroke="#D1CFC5" stroke-width="1"/>
  <text x="280" y="108" fill="#141413" font-size="13px" font-weight="700" text-anchor="middle">认知流</text>
  <text x="280" y="122" fill="#87867F" font-size="10px" text-anchor="middle">Cognitive Flow</text>

  <!-- Axis 1: Feedback Loop (top-right, -18°) -->
  <!-- x = 280 + 160*cos(-18°), y = 280 + 160*sin(-18°) = 280 + 160*(-0.309) = 280-49.4=230.6 -->
  <line x1="280" y1="280" x2="430" y2="231" stroke="#D1CFC5" stroke-width="1"/>
  <text x="448" y="226" fill="#141413" font-size="13px" font-weight="700" text-anchor="start">反馈环</text>
  <text x="448" y="240" fill="#87867F" font-size="10px" text-anchor="start">Feedback Loop</text>

  <!-- Axis 2: Trust (right, 54°) -->
  <!-- x = 280 + 160*cos(54°) = 280+160*0.588=280+94.1=374.1, y = 280+160*0.809=280+129.4=409.4 -->
  <line x1="280" y1="280" x2="374" y2="409" stroke="#D1CFC5" stroke-width="1"/>
  <text x="392" y="420" fill="#141413" font-size="13px" font-weight="700" text-anchor="start">信任度</text>
  <text x="392" y="434" fill="#87867F" font-size="10px" text-anchor="start">Trust</text>

  <!-- Axis 3: Agency (bottom-left, 126°) -->
  <!-- x = 280 + 160*cos(126°) = 280+160*(-0.588)=280-94.1=185.9, y = 280+160*0.809=409.4 -->
  <line x1="280" y1="280" x2="186" y2="409" stroke="#D1CFC5" stroke-width="1"/>
  <text x="156" y="420" fill="#141413" font-size="13px" font-weight="700" text-anchor="end">控制感</text>
  <text x="156" y="434" fill="#87867F" font-size="10px" text-anchor="end">Agency</text>

  <!-- Axis 4: Growth (top-left, 198°) -->
  <!-- x = 280 + 160*cos(198°) = 280+160*(-0.951)=-152+280=128, y = 280+160*(-0.309)=280-49.4=230.6 -->
  <line x1="280" y1="280" x2="128" y2="231" stroke="#D1CFC5" stroke-width="1"/>
  <text x="110" y="226" fill="#141413" font-size="13px" font-weight="700" text-anchor="end">成长路径</text>
  <text x="110" y="240" fill="#87867F" font-size="10px" text-anchor="end">Growth Path</text>

  <!-- Pentagon polygon for the data (representing 5 dimensions, values 0.7-0.95) -->
  <!-- Cognitive Flow: 0.75, Feedback Loop: 0.8, Trust: 0.7, Agency: 0.85, Growth: 0.9 -->
  <!-- Points: (280, 280-160*0.75=160), (280+160*0.8*cos(-18°), 280-160*0.8*sin(18°)), etc. -->
  <!-- cos18=0.951, sin18=0.309 -->
  <!-- Point 0 (CF): 280, 160+120=160+120=280-160*0.75=280-120=160 -->
  <!-- Point 1 (FL): 280+160*0.8*0.951=280+122=402, 280-160*0.8*0.309=280-40=240 -->
  <!-- Point 2 (Trust): 280+160*0.7*0.588=280+66=346, 280+160*0.7*0.809=280+91=371 -->
  <!-- Point 3 (Agency): 280+160*0.85*(-0.588)=280-80=200, 280+160*0.85*0.809=280+110=390 -->
  <!-- Point 4 (Growth): 280+160*0.9*(-0.951)=280-137=143, 280-160*0.9*0.309=280-44=236 -->

  <!-- Fill polygon -->
  <polygon points="280,160 402,240 346,371 200,390 143,236" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="2"/>

  <!-- Axis endpoint dots -->
  <circle cx="280" cy="160" r="5" fill="#D97757"/>
  <circle cx="402" cy="240" r="5" fill="#D97757"/>
  <circle cx="346" cy="371" r="5" fill="#D97757"/>
  <circle cx="200" cy="390" r="5" fill="#D97757"/>
  <circle cx="143" cy="236" r="5" fill="#D97757"/>

  <!-- Dimension details panel (right side) -->
  <rect x="480" y="80" width="280" height="390" rx="12" fill="#141413"/>

  <text x="500" y="114" fill="#FAF9F5" font-size="14px" font-weight="700">五维详解</text>
  <line x1="500" y1="128" x2="740" y2="128" stroke="#D97757" stroke-width="2"/>

  <!-- Dimension 1: Cognitive Flow -->
  <rect x="500" y="140" width="240" height="56" rx="8" fill="#D97757"/>
  <text x="516" y="160" fill="#FAF9F5" font-size="12px" font-weight="700">① 认知流</text>
  <text x="516" y="176" fill="#FAF9F5" font-size="10px">流式响应减少等待 | 上下文保持 | 渐进式披露</text>

  <!-- Dimension 2: Feedback Loop -->
  <rect x="500" y="204" width="240" height="56" rx="8" fill="#2a2a2a" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="516" y="224" fill="#E3DACC" font-size="12px" font-weight="700">② 反馈环</text>
  <text x="516" y="240" fill="#87867F" font-size="10px">意图→代码时间 | 多模态反馈 | 快速撤销</text>

  <!-- Dimension 3: Trust -->
  <rect x="500" y="268" width="240" height="56" rx="8" fill="#2a2a2a" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="516" y="288" fill="#E3DACC" font-size="12px" font-weight="700">③ 信任度</text>
  <text x="516" y="304" fill="#87867F" font-size="10px">置信度可视化 | 不确定性提示 | AI思考过程展示</text>

  <!-- Dimension 4: Agency -->
  <rect x="500" y="332" width="240" height="56" rx="8" fill="#2a2a2a" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="516" y="352" fill="#E3DACC" font-size="12px" font-weight="700">④ 控制感</text>
  <text x="516" y="368" fill="#87867F" font-size="10px">关键决策人工确认 | 细粒度控制 | 可干预性</text>

  <!-- Dimension 5: Growth -->
  <rect x="500" y="396" width="240" height="56" rx="8" fill="#2a2a2a" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="516" y="416" fill="#E3DACC" font-size="12px" font-weight="700">⑤ 成长路径</text>
  <text x="516" y="432" fill="#87867F" font-size="10px">渐进功能暴露 | 学习嵌入工作流 | 专家/新手模式</text>

  <!-- Bottom insight -->
  <text x="40" y="500" fill="#87867F" font-size="10px">AI将开发者从"实现者"转变为"指导者" — 新的DX设计关注如何让开发者流畅表达意图、建立对AI的信任</text>
</svg>