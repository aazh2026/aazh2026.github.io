<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>多模型交叉审查：Ensemble 合成</title>
  <desc>Claude sub-agent、Codex、Cursor Bugbot 三个模型各自独立审查同一个 PR，输出独立判决，最后由 Ensemble Synthesis 综合输出排名 bug 列表</desc>

  <!-- Background -->
  <rect width="600" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">多模型交叉审查：Ensemble 合成</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Nolan Lawson · 2026/05/25</text>

  <!-- Three model review boxes -->
  <!-- Claude sub-agent -->
  <rect x="40" y="68" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="68" width="150" height="24" rx="8" fill="#D97757"/>
  <rect x="40" y="84" width="150" height="8" fill="#D97757"/>
  <text x="115" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Claude sub-agent</text>
  <text x="115" y="112" text-anchor="middle" font-size="10" fill="#141413">审查此 PR</text>
  <text x="115" y="130" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">Critical / High</text>
  <text x="115" y="146" text-anchor="middle" font-size="9" fill="#87867F">输出独立判决</text>

  <!-- Codex -->
  <rect x="225" y="68" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="225" y="68" width="150" height="24" rx="8" fill="#D97757"/>
  <rect x="225" y="84" width="150" height="8" fill="#D97757"/>
  <text x="300" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Codex</text>
  <text x="300" y="112" text-anchor="middle" font-size="10" fill="#141413">审查此 PR</text>
  <text x="300" y="130" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">High / Medium</text>
  <text x="300" y="146" text-anchor="middle" font-size="9" fill="#87867F">输出独立判决</text>

  <!-- Cursor Bugbot -->
  <rect x="410" y="68" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="410" y="68" width="150" height="24" rx="8" fill="#D97757"/>
  <rect x="410" y="84" width="150" height="8" fill="#D97757"/>
  <text x="485" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Cursor Bugbot</text>
  <text x="485" y="112" text-anchor="middle" font-size="10" fill="#141413">审查此 PR</text>
  <text x="485" y="130" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">Critical / Low</text>
  <text x="485" y="146" text-anchor="middle" font-size="9" fill="#87867F">输出独立判决</text>

  <!-- Arrows to synthesis -->
  <path d="M 115 158 C 115 190, 300 220, 300 228" stroke="#D1CFC5" stroke-width="1.5" fill="none"/>
  <polygon points="300,228 295,218 305,218" fill="#D1CFC5"/>

  <path d="M 300 158 C 300 190, 300 220, 300 228" stroke="#D97757" stroke-width="2" fill="none"/>
  <polygon points="300,228 295,218 305,218" fill="#D97757"/>

  <path d="M 485 158 C 485 190, 300 220, 300 228" stroke="#D1CFC5" stroke-width="1.5" fill="none"/>
  <polygon points="300,228 295,218 305,218" fill="#D1CFC5"/>

  <!-- Ensemble Synthesis box -->
  <rect x="190" y="228" width="220" height="80" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="300" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Ensemble Synthesis</text>
  <text x="300" y="272" text-anchor="middle" font-size="10" fill="#141413">综合三个独立判决</text>
  <text x="300" y="290" text-anchor="middle" font-size="10.5" fill="#788C5D" font-family="ui-monospace, monospace">Critical &gt; High &gt; Medium &gt; Low</text>
  <text x="300" y="304" text-anchor="middle" font-size="9" fill="#87867F">误报概率接近零</text>

  <!-- Source attribution -->
  <line x1="40" y1="328" x2="560" y2="328" stroke="#D1CFC5" stroke-width="1"/>
  <text x="300" y="338" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Nolan Lawson · 2026/05/25</text>
</svg>
