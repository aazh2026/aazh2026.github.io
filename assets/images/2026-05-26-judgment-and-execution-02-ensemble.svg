<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 600 340">
  <title>多模型交叉审查：Ensemble 合成</title>
  <desc>
    Claude sub-agent、Codex、Cursor Bugbot 三个模型各自独立审查同一个 PR，输出独立判决，最后由 Ensemble Synthesis 综合输出排名 bug 列表
  </desc>
  <path fill="#faf9f5" d="M0 0h600v340H0z"/>
  <text x="300" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">多模型交叉审查：Ensemble 合成</text>
  <text x="300" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Nolan Lawson · 2026/05/25</text>
  <rect width="150" height="90" x="40" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="150" height="24" x="40" y="68" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M40 84h150v8H40z"/>
  <text x="115" y="84" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Claude sub-agent</text>
  <text x="115" y="112" fill="#141413" font-size="10" text-anchor="middle">审查此 PR</text>
  <text x="115" y="130" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Critical / High</text>
  <text x="115" y="146" fill="#87867f" font-size="9" text-anchor="middle">输出独立判决</text>
  <rect width="150" height="90" x="225" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="150" height="24" x="225" y="68" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M225 84h150v8H225z"/>
  <text x="300" y="84" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Codex</text>
  <text x="300" y="112" fill="#141413" font-size="10" text-anchor="middle">审查此 PR</text>
  <text x="300" y="130" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">High / Medium</text>
  <text x="300" y="146" fill="#87867f" font-size="9" text-anchor="middle">输出独立判决</text>
  <rect width="150" height="90" x="410" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="150" height="24" x="410" y="68" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M410 84h150v8H410z"/>
  <text x="485" y="84" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Cursor Bugbot</text>
  <text x="485" y="112" fill="#141413" font-size="10" text-anchor="middle">审查此 PR</text>
  <text x="485" y="130" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Critical / Low</text>
  <text x="485" y="146" fill="#87867f" font-size="9" text-anchor="middle">输出独立判决</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" d="M115 158c0 32 185 62 185 70"/>
  <path fill="#d1cfc5" d="m300 228-5-10h10z"/>
  <path fill="none" stroke="#d97757" stroke-width="2" d="M300 158v70"/>
  <path fill="#d97757" d="m300 228-5-10h10z"/>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" d="M485 158c0 32-185 62-185 70"/>
  <path fill="#d1cfc5" d="m300 228-5-10h10z"/>
  <rect width="220" height="80" x="190" y="228" fill="#fff" stroke="#d97757" stroke-width="2" rx="10"/>
  <text x="300" y="252" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Ensemble Synthesis</text>
  <text x="300" y="272" fill="#141413" font-size="10" text-anchor="middle">综合三个独立判决</text>
  <text x="300" y="290" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5" text-anchor="middle">Critical &gt; High &gt; Medium &gt; Low</text>
  <text x="300" y="304" fill="#87867f" font-size="9" text-anchor="middle">误报概率接近零</text>
  <path stroke="#d1cfc5" d="M40 328h520"/>
  <text x="300" y="338" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Nolan Lawson · 2026/05/25</text>
