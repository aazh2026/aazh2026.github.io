<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 300">
  <path fill="#faf9f5" d="M0 0h680v300H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">EU AI Act 风险分级体系</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">eur-lex.europa.eu · 2024/08</text>
  <rect width="130" height="130" x="30" y="70" fill="#fff" stroke="#c0392b" stroke-width="2" rx="8"/>
  <rect width="130" height="28" x="30" y="70" fill="#c0392b" rx="8"/>
  <path fill="#c0392b" d="M30 84h130v14H30z"/>
  <text x="95" y="88" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="700" text-anchor="middle">不可接受风险</text>
  <text x="95" y="116" fill="#c0392b" font-size="12" font-weight="600" text-anchor="middle">Prohibited</text>
  <text x="95" y="134" fill="#87867f" font-size="9.5" text-anchor="middle">社会信用评分</text>
  <text x="95" y="148" fill="#87867f" font-size="9.5" text-anchor="middle">实时生物识别</text>
  <text x="95" y="162" fill="#87867f" font-size="9.5" text-anchor="middle">（公共场所）</text>
  <rect width="80" height="18" x="55" y="172" fill="#c0392b" opacity=".15" rx="9"/>
  <text x="95" y="184" fill="#c0392b" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">完全禁止</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M160 135h35"/>
  <path fill="#d1cfc5" d="m195 131-8 4v4z"/>
  <rect width="130" height="130" x="200" y="70" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <rect width="130" height="28" x="200" y="70" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M200 84h130v14H200z"/>
  <text x="265" y="88" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="700" text-anchor="middle">高风险</text>
  <text x="265" y="116" fill="#d97757" font-size="12" font-weight="600" text-anchor="middle">High Risk</text>
  <text x="265" y="134" fill="#87867f" font-size="9.5" text-anchor="middle">招聘筛选、信贷评估</text>
  <text x="265" y="148" fill="#87867f" font-size="9.5" text-anchor="middle">医疗诊断、教育评分</text>
  <text x="265" y="162" fill="#87867f" font-size="9.5" text-anchor="middle">关键基础设施</text>
  <rect width="80" height="18" x="225" y="172" fill="#d97757" opacity=".15" rx="9"/>
  <text x="265" y="184" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">严格合规义务</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M330 135h35"/>
  <path fill="#d1cfc5" d="m365 131-8 4v4z"/>
  <rect width="130" height="130" x="370" y="70" fill="#fff" stroke="#5b8db8" stroke-width="1.8" rx="8"/>
  <rect width="130" height="28" x="370" y="70" fill="#5b8db8" rx="8"/>
  <path fill="#5b8db8" d="M370 84h130v14H370z"/>
  <text x="435" y="88" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="700" text-anchor="middle">有限风险</text>
  <text x="435" y="116" fill="#5b8db8" font-size="12" font-weight="600" text-anchor="middle">Limited Risk</text>
  <text x="435" y="134" fill="#87867f" font-size="9.5" text-anchor="middle">聊天机器人</text>
  <text x="435" y="148" fill="#87867f" font-size="9.5" text-anchor="middle">情感识别系统</text>
  <text x="435" y="162" fill="#87867f" font-size="9.5" text-anchor="middle">深度伪造内容</text>
  <rect width="80" height="18" x="395" y="172" fill="#5b8db8" opacity=".15" rx="9"/>
  <text x="435" y="184" fill="#5b8db8" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">透明度义务</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M500 135h35"/>
  <path fill="#d1cfc5" d="m535 131-8 4v4z"/>
  <rect width="130" height="130" x="540" y="70" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <rect width="130" height="28" x="540" y="70" fill="#788c5d" rx="8"/>
  <path fill="#788c5d" d="M540 84h130v14H540z"/>
  <text x="605" y="88" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="700" text-anchor="middle">最小风险</text>
  <text x="605" y="116" fill="#788c5d" font-size="12" font-weight="600" text-anchor="middle">Minimal Risk</text>
  <text x="605" y="134" fill="#87867f" font-size="9.5" text-anchor="middle">垃圾邮件过滤</text>
  <text x="605" y="148" fill="#87867f" font-size="9.5" text-anchor="middle">游戏AI、智能推荐</text>
  <text x="605" y="162" fill="#87867f" font-size="9.5" text-anchor="middle">库存管理</text>
  <rect width="80" height="18" x="565" y="172" fill="#788c5d" opacity=".15" rx="9"/>
  <text x="605" y="184" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">自愿准则</text>
  <rect width="640" height="60" x="30" y="220" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="50" y="242" fill="#141413" font-size="11" font-weight="600">分类判定路径</text>
  <text x="50" y="260" fill="#87867f" font-size="10">1. 评估是否属于禁止类别 → 是则停止  2. 评估是否影响安全或基本权利 → 高风险</text>
  <text x="50" y="274" fill="#87867f" font-size="10">3. 评估是否有人机交互需透明度 → 有限风险  4. 其余 → 最小风险（自愿）</text>
  <title>EU AI Act 风险分级体系</title>
  <desc>
    EU AI Act采用基于风险的分级监管方法，将AI系统分为四个等级：不可接受风险（完全禁止）、高风险（严格合规）、有限风险（透明度义务）、最小风险（自愿准则）
  </desc>
</svg>
