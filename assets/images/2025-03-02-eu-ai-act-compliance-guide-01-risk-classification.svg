<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">EU AI Act 风险分级体系</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">eur-lex.europa.eu · 2024/08</text>

  <!-- Tier 1: Prohibited (red border) -->
  <rect x="30" y="70" width="130" height="130" rx="8" fill="#FFFFFF" stroke="#C0392B" stroke-width="2"/>
  <rect x="30" y="70" width="130" height="28" rx="8" fill="#C0392B"/>
  <rect x="30" y="84" width="130" height="14" fill="#C0392B"/>
  <text x="95" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, monospace">不可接受风险</text>
  <text x="95" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#C0392B">Prohibited</text>
  <text x="95" y="134" text-anchor="middle" font-size="9.5" fill="#87867F">社会信用评分</text>
  <text x="95" y="148" text-anchor="middle" font-size="9.5" fill="#87867F">实时生物识别</text>
  <text x="95" y="162" text-anchor="middle" font-size="9.5" fill="#87867F">（公共场所）</text>
  <rect x="55" y="172" width="80" height="18" rx="9" fill="#C0392B" opacity="0.15"/>
  <text x="95" y="184" text-anchor="middle" font-size="9" fill="#C0392B" font-family="ui-monospace, monospace">完全禁止</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="135" x2="195" y2="135" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="195,131 187,135 187,139" fill="#D1CFC5"/>

  <!-- Tier 2: High Risk (clay border) -->
  <rect x="200" y="70" width="130" height="130" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="200" y="70" width="130" height="28" rx="8" fill="#D97757"/>
  <rect x="200" y="84" width="130" height="14" fill="#D97757"/>
  <text x="265" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, monospace">高风险</text>
  <text x="265" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">High Risk</text>
  <text x="265" y="134" text-anchor="middle" font-size="9.5" fill="#87867F">招聘筛选、信贷评估</text>
  <text x="265" y="148" text-anchor="middle" font-size="9.5" fill="#87867F">医疗诊断、教育评分</text>
  <text x="265" y="162" text-anchor="middle" font-size="9.5" fill="#87867F">关键基础设施</text>
  <rect x="225" y="172" width="80" height="18" rx="9" fill="#D97757" opacity="0.15"/>
  <text x="265" y="184" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">严格合规义务</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="135" x2="365" y2="135" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="365,131 357,135 357,139" fill="#D1CFC5"/>

  <!-- Tier 3: Limited Risk (blue/olive) -->
  <rect x="370" y="70" width="130" height="130" rx="8" fill="#FFFFFF" stroke="#5B8DB8" stroke-width="1.8"/>
  <rect x="370" y="70" width="130" height="28" rx="8" fill="#5B8DB8"/>
  <rect x="370" y="84" width="130" height="14" fill="#5B8DB8"/>
  <text x="435" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, monospace">有限风险</text>
  <text x="435" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#5B8DB8">Limited Risk</text>
  <text x="435" y="134" text-anchor="middle" font-size="9.5" fill="#87867F">聊天机器人</text>
  <text x="435" y="148" text-anchor="middle" font-size="9.5" fill="#87867F">情感识别系统</text>
  <text x="435" y="162" text-anchor="middle" font-size="9.5" fill="#87867F">深度伪造内容</text>
  <rect x="395" y="172" width="80" height="18" rx="9" fill="#5B8DB8" opacity="0.15"/>
  <text x="435" y="184" text-anchor="middle" font-size="9" fill="#5B8DB8" font-family="ui-monospace, monospace">透明度义务</text>

  <!-- Arrow 3→4 -->
  <line x1="500" y1="135" x2="535" y2="135" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="535,131 527,135 527,139" fill="#D1CFC5"/>

  <!-- Tier 4: Minimal Risk (olive/green) -->
  <rect x="540" y="70" width="130" height="130" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="540" y="70" width="130" height="28" rx="8" fill="#788C5D"/>
  <rect x="540" y="84" width="130" height="14" fill="#788C5D"/>
  <text x="605" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, monospace">最小风险</text>
  <text x="605" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#788C5D">Minimal Risk</text>
  <text x="605" y="134" text-anchor="middle" font-size="9.5" fill="#87867F">垃圾邮件过滤</text>
  <text x="605" y="148" text-anchor="middle" font-size="9.5" fill="#87867F">游戏AI、智能推荐</text>
  <text x="605" y="162" text-anchor="middle" font-size="9.5" fill="#87867F">库存管理</text>
  <rect x="565" y="172" width="80" height="18" rx="9" fill="#788C5D" opacity="0.15"/>
  <text x="605" y="184" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">自愿准则</text>

  <!-- Classification note at bottom -->
  <rect x="30" y="220" width="640" height="60" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="50" y="242" font-size="11" font-weight="600" fill="#141413">分类判定路径</text>
  <text x="50" y="260" font-size="10" fill="#87867F">1. 评估是否属于禁止类别 → 是则停止  2. 评估是否影响安全或基本权利 → 高风险</text>
  <text x="50" y="274" font-size="10" fill="#87867F">3. 评估是否有人机交互需透明度 → 有限风险  4. 其余 → 最小风险（自愿）</text>

  <title>EU AI Act 风险分级体系</title>
  <desc>EU AI Act采用基于风险的分级监管方法，将AI系统分为四个等级：不可接受风险（完全禁止）、高风险（严格合规）、有限风险（透明度义务）、最小风险（自愿准则）</desc>
</svg>