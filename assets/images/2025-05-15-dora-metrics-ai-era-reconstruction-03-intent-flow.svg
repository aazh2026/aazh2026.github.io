  <title>意图流动 vs 代码流动</title>
  <desc>
    传统DORA与AI时代DORA的对比流程图。传统DORA追踪代码流动（代码提交→部署→故障检测→修复），质量门禁为部署失败。AI时代DORA追踪意图流动（意图定义→Prompt工程→AI生成→意图验证），质量门禁为意图偏离。
  </desc>
