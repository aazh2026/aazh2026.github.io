<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- AI-Native Testing Pyramid 对比图 -->
  <rect width="640" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">测试模型演变：传统金字塔 → AI-Native 三层模型</text>
  <text x="320" y="38" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- LEFT: Traditional Pyramid -->
  <!-- Base: Unit tests (largest) -->
  <polygon points="90,250 210,250 150,110" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="150" y="195" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">单元测试</text>
  <text x="150" y="210" text-anchor="middle" font-size="10" fill="#87867F">80%</text>
  <text x="150" y="224" text-anchor="middle" font-size="9" fill="#87867F">手写·维护成本高</text>

  <!-- Middle: Integration tests (medium) -->
  <polygon points="110,108 190,108 150,60" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="150" y="88" text-anchor="middle" font-size="10" fill="#87867F" font-weight="600">集成测试</text>
  <text x="150" y="100" text-anchor="middle" font-size="9" fill="#87867F">15%</text>

  <!-- Top: E2E (smallest) -->
  <polygon points="130,58 170,58 150,36" fill="#D1CFC5" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="150" y="50" text-anchor="middle" font-size="9" fill="#87867F">E2E</text>
  <text x="150" y="59" text-anchor="middle" font-size="8" fill="#87867F">5%</text>

  <!-- Label: Traditional -->
  <text x="150" y="270" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">传统测试金字塔</text>
  <text x="150" y="282" text-anchor="middle" font-size="9" fill="#87867F">边际收益递减·脆弱·维护噩梦</text>

  <!-- Arrow: Traditional → AI-Native -->
  <line x1="230" y1="155" x2="390" y2="155" stroke="#D97757" stroke-width="2"/>
  <polygon points="390,151 384,155 390,159" fill="#D97757"/>
  <text x="310" y="148" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">AI 介入后</text>
  <text x="310" y="168" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">成本反转</text>

  <!-- RIGHT: AI-Native Three-Layer Model -->
  <!-- E2E: Now largest (AI-driven) -->
  <polygon points="390,250 570,250 480,100" fill="#FEF3C7" stroke="#D97757" stroke-width="2"/>
  <text x="480" y="185" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">E2E · AI 驱动</text>
  <text x="480" y="200" text-anchor="middle" font-size="10" fill="#87867F">自然语言描述·自适应</text>
  <text x="480" y="214" text-anchor="middle" font-size="9" fill="#87867F">行为驱动·自动维护</text>

  <!-- Integration: Multi-Agent -->
  <polygon points="420,98 540,98 480,56" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="480" y="82" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="600">集成测试</text>
  <text x="480" y="94" text-anchor="middle" font-size="9" fill="#87867F">Multi-Agent 协作验证</text>

  <!-- Unit: AI-generated -->
  <polygon points="450,54 510,54 480,34" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="480" y="48" text-anchor="middle" font-size="9" fill="#3B82F6">单元</text>

  <!-- Label: AI-Native -->
  <text x="480" y="270" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">AI-Native 三层模型</text>
  <text x="480" y="282" text-anchor="middle" font-size="9" fill="#87867F">E2E 成主战场·单元/集成 AI 生成</text>

  <!-- Key insight callout -->
  <rect x="140" y="44" width="360" height="22" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="58" text-anchor="middle" font-size="9.5" fill="#141413" font-style="italic">核心转变：测试维护成本从人类转移到 AI，E2E 的 brittle 问题被 AI 自动化解决</text>
</svg>