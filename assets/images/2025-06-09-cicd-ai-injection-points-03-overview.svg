  <line x1="295" y1="118" x2="405" y2="158" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="250" y="85" width="90" height="35" rx="5" fill="#788C5D"/>
  <text x="295" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">09 覆盖率盲区</text>

  <!-- 10 PR摘要 → Review -->
  <line x1="405" y1="118" x2="515" y2="158" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="360" y="85" width="90" height="35" rx="5" fill="#788C5D"/>
  <text x="405" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">10 PR摘要</text>

  <!-- 11 审查优先级 → Review -->
  <line x1="515" y1="118" x2="605" y2="158" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="470" y="85" width="90" height="35" rx="5" fill="#788C5D"/>
  <text x="515" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">11 审查优先级</text>

  <!-- 12 部署风险 → Deploy -->
  <line x1="605" y1="118" x2="605" y2="158" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="560" y="85" width="90" height="35" rx="5" fill="#788C5D"/>
  <text x="605" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">12 部署风险</text>

  <!-- Layer labels (left side) -->
  <text x="12" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" writing-mode="tb">Pre-commit</text>
  <text x="12" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" writing-mode="tb" transform="translate(0,42)">On-commit</text>
  <text x="12" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" writing-mode="tb" transform="translate(0,84)">Pre-build</text>
  <text x="12" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" writing-mode="tb" transform="translate(0,126)">Post-build</text>
  <text x="12" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" writing-mode="tb" transform="translate(0,168)">Pre-review</text>
  <text x="12" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" writing-mode="tb" transform="translate(0,210)">Pre-deploy</text>

  <!-- Legend -->
  <rect x="30" y="56" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="46" y="66" font-size="9" fill="#141413" font-family="ui-monospace, monospace">分层防御卡点</text>
  <rect x="160" y="56" width="12" height="12" rx="2" fill="#788C5D"/>
  <text x="176" y="66" font-size="9" fill="#141413" font-family="ui-monospace, monospace">质量/审查卡点</text>

  <!-- Cost multiplier annotation -->
  <text x="664" y="174" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" text-anchor="end">修复成本</text>
  <text x="664" y="188" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" text-anchor="end">1x → 10x → 100x</text>

  <title>CI/CD AI 注入点全景图</title>
  <desc>12个AI验证卡点从代码提交到部署上线的全流程分布图，展示6个阶段与12个卡点的映射关系及防御层次</desc>
