  <rect x="30" y="158" width="90" height="35" rx="5" fill="#D97757"/>
  <text x="75" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">01 提交信息验证</text>

  <!-- 02 意图匹配 → Commit -->
  <line x1="185" y1="195" x2="185" y2="293" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="140" y="158" width="90" height="35" rx="5" fill="#D97757"/>
  <text x="185" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">02 意图匹配</text>

  <!-- 03 代码语义审查 → Build -->
  <line x1="295" y1="195" x2="295" y2="293" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="250" y="158" width="90" height="35" rx="5" fill="#D97757"/>
  <text x="295" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">03 代码语义审查</text>

