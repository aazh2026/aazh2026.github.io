  <rect x="360" y="295" width="90" height="44" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="405" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">04</text>
  <text x="405" y="330" text-anchor="middle" font-size="10" fill="#141413">Integration</text>
  <text x="405" y="342" text-anchor="middle" font-size="9" fill="#87867F">集成</text>

  <!-- Arrow 4→5 -->
  <line x1="452" y1="317" x2="466" y2="317" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="468,317 462,313 462,321" fill="#D1CFC5"/>

