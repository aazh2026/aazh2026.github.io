  <!-- 07 配置合理性 → Build -->
  <line x1="75" y1="118" x2="185" y2="158" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="30" y="85" width="90" height="35" rx="5" fill="#788C5D"/>
  <text x="75" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">07 配置合理性</text>

  <!-- 08 测试质量 → Test -->
  <line x1="185" y1="118" x2="295" y2="158" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="140" y="85" width="90" height="35" rx="5" fill="#788C5D"/>
  <text x="185" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">08 测试质量</text>

