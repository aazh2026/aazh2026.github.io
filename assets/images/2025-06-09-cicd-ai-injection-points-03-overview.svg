  <line x1="605" y1="195" x2="605" y2="293" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="560" y="158" width="90" height="35" rx="5" fill="#D97757"/>
  <text x="605" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">06 依赖风险</text>

