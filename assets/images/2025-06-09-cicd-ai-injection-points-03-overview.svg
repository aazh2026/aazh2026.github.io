  <rect x="360" y="158" width="90" height="35" rx="5" fill="#D97757"/>
  <text x="405" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">04 安全扫描</text>

  <!-- 05 复杂度预警 → Integration -->
  <line x1="515" y1="195" x2="515" y2="293" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="470" y="158" width="90" height="35" rx="5" fill="#D97757"/>
  <text x="515" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">05 复杂度预警</text>

