<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">CI/CD AI 注入点全景图：12个卡点的全流程分布</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">从提交到部署 · AI-Native 软件工程系列 #7</text>

  <!-- Pipeline stages (bottom row) -->
  <!-- Stage 1: Commit -->
  <rect x="30" y="295" width="90" height="44" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="75" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">01</text>
  <text x="75" y="330" text-anchor="middle" font-size="10" fill="#141413">Commit</text>
  <text x="75" y="342" text-anchor="middle" font-size="9" fill="#87867F">提交</text>

  <!-- Arrow 1→2 -->
  <line x1="122" y1="317" x2="136" y2="317" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="138,317 132,313 132,321" fill="#D1CFC5"/>

  <!-- Stage 2: Build -->
  <rect x="140" y="295" width="90" height="44" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="185" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">02</text>
  <text x="185" y="330" text-anchor="middle" font-size="10" fill="#141413">Build</text>
  <text x="185" y="342" text-anchor="middle" font-size="9" fill="#87867F">构建</text>

  <!-- Arrow 2→3 -->
  <line x1="232" y1="317" x2="246" y2="317" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="248,317 242,313 242,321" fill="#D1CFC5"/>

  <!-- Stage 3: Test -->
  <rect x="250" y="295" width="90" height="44" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="295" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">03</text>
  <text x="295" y="330" text-anchor="middle" font-size="10" fill="#141413">Test</text>
  <text x="295" y="342" text-anchor="middle" font-size="9" fill="#87867F">测试</text>

  <!-- Arrow 3→4 -->
  <line x1="342" y1="317" x2="356" y2="317" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="358,317 352,313 352,321" fill="#D1CFC5"/>

