<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="AI adoption S曲线">
  <title>AI Adoption 三层S曲线模型</title>
  <desc>企业AI adoption的三层嵌套S-curve：个人层、团队层、组织层，每层有自己的采用周期</desc>
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#87867F"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#141413" letter-spacing="1">AI Adoption 三层S-curve嵌套模型</text>
  <line x1="150" y1="40" x2="650" y2="40" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Y axis -->
  <line x1="100" y1="55" x2="100" y2="355" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="88" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#87867F">普及率</text>

  <!-- X axis -->
  <line x1="100" y1="355" x2="750" y2="355" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="755" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#87867F">时间</text>

  <!-- X axis labels -->
  <text x="200" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">早期</text>
  <text x="420" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">加速期</text>
  <text x="640" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">成熟期</text>

  <!-- Vertical phase dividers -->
  <line x1="310" y1="355" x2="310" y2="60" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="530" y1="355" x2="530" y2="60" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- S-curve 1: Individual (steepest, fastest) - Green -->
  <path d="M100,350 Q160,345 200,310 Q260,230 310,150 Q370,80 430,68 Q490,62 600,60 L750,58"
        fill="none" stroke="#788C5D" stroke-width="4" stroke-linecap="round"/>
  <text x="115" y="330" font-family="Georgia, serif" font-size="11" fill="#788C5D" font-weight="bold">个人层</text>
  <text x="115" y="343" font-family="Georgia, serif" font-size="9" fill="#788C5D">Individual (6月)</text>

  <!-- S-curve 2: Team (medium slope) - Clay -->
  <path d="M100,350 Q160,348 230,340 Q310,310 380,250 Q450,170 510,130 Q570,105 640,98 Q690,95 750,94"
        fill="none" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
  <text x="130" y="330" font-family="Georgia, serif" font-size="11" fill="#D97757" font-weight="bold">团队层</text>
  <text x="130" y="343" font-family="Georgia, serif" font-size="9" fill="#D97757">Team (12月)</text>

  <!-- S-curve 3: Organization (slowest) - Dark -->
  <path d="M100,350 Q180,348 280,342 Q380,325 460,285 Q530,240 580,195 Q630,155 680,130 Q710,118 750,115"
        fill="none" stroke="#141413" stroke-width="4" stroke-linecap="round"/>
  <text x="145" y="330" font-family="Georgia, serif" font-size="11" fill="#141413" font-weight="bold">组织层</text>
  <text x="145" y="343" font-family="Georgia, serif" font-size="9" fill="#141413">Organization (5年+)</text>

  <!-- Key insight callout -->
  <rect x="560" y="58" width="180" height="55" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5" opacity="0.9"/>
  <text x="650" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D97757" font-weight="bold">关键洞察</text>
  <text x="650" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#141413">上层依赖下层的成熟</text>
  <text x="650" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#141413">不能跳过任何一层</text>

  <!-- Phase labels on curves -->
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#788C5D" opacity="0.8">探索</text>
  <text x="310" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#788C5D" opacity="0.8">熟练</text>
  <text x="430" y="63" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#788C5D" opacity="0.8">创新</text>

  <!-- Legend -->
  <rect x="100" y="380" width="600" height="14" rx="7" fill="#D1CFC5" opacity="0.25"/>
  <rect x="120" y="382" width="18" height="10" rx="2" fill="#788C5D"/>
  <text x="145" y="390" font-family="Georgia, serif" font-size="9" fill="#141413">个人层: 6月</text>
  <rect x="240" y="382" width="18" height="10" rx="2" fill="#D97757"/>
  <text x="265" y="390" font-family="Georgia, serif" font-size="9" fill="#141413">团队层: 12月</text>
  <rect x="360" y="382" width="18" height="10" rx="2" fill="#141413"/>
  <text x="385" y="390" font-family="Georgia, serif" font-size="9" fill="#141413">组织层: 5年+</text>
</svg>
