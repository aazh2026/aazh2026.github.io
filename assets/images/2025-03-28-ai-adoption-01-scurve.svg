<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- AI Adoption 三层嵌套 S-curve -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI Adoption 三层嵌套 S-curve</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/03/28</text>

  <!-- Layer 3: Organizational (top) -->
  <rect x="40" y="52" width="480" height="46" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="52" width="480" height="20" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="68" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L3 · Organizational Adoption</text>
  <text x="250" y="68" font-size="12" fill="#141413" font-weight="600">组织层（2-5年）</text>
  <text x="60" y="86" font-size="10" fill="#87867F">整个组织的 AI 能力成熟度</text>
  <rect x="490" y="62" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="75" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L3</text>

  <!-- Arrow -->
  <line x1="280" y1="98" x2="280" y2="108" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,108 280,116 284,98" fill="#D1CFC5"/>

  <!-- Layer 2: Team -->
  <rect x="40" y="116" width="480" height="40" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="116" width="480" height="18" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="131" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L2 · Team Adoption</text>
  <text x="210" y="131" font-size="12" fill="#141413" font-weight="600">团队层（6-18个月）</text>
  <text x="60" y="148" font-size="10" fill="#87867F">团队的 AI 协作模式和工作流程</text>
  <rect x="490" y="126" width="18" height="14" rx="9" fill="#2563EB"/>
  <text x="499" y="137" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">L2</text>

  <!-- Arrow -->
  <line x1="280" y1="156" x2="280" y2="166" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,166 280,174 284,166" fill="#D1CFC5"/>

  <!-- Layer 1: Individual (bottom) -->
  <rect x="40" y="174" width="480" height="22" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="188" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L1 · Individual Adoption</text>
  <text x="240" y="188" font-size="12" fill="#141413" font-weight="600">个人层（1-6个月）</text>
  <text x="400" y="188" font-size="10" fill="#87867F">个人工程师的 AI 工具使用能力</text>

  <!-- Note -->
  <text x="280" y="200" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">每层都有自己的 S-curve，上层依赖下层成熟，不能跳过任何一层</text>
</svg>