<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Intent-Driven Development：意图替代文档</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">AI-Native SDLC · 2026/03/11</text>

  <!-- Central flow block -->
  <!-- Intent node -->
  <rect x="50" y="76" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="130" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Intent</text>
  <text x="130" y="114" text-anchor="middle" font-size="10" fill="#141413">业务目标</text>
  <text x="130" y="127" text-anchor="middle" font-size="9" fill="#87867F">为什么做</text>

  <!-- + symbol -->
  <text x="220" y="106" text-anchor="middle" font-size="16" fill="#87867F">+</text>

  <!-- Constraints node -->
  <rect x="240" y="76" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="320" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Constraints</text>
  <text x="320" y="114" text-anchor="middle" font-size="10" fill="#141413">边界条件</text>
  <text x="320" y="127" text-anchor="middle" font-size="9" fill="#87867F">不能做什么</text>

  <!-- + symbol -->
  <text x="410" y="106" text-anchor="middle" font-size="16" fill="#87867F">+</text>

  <!-- Examples node -->
  <rect x="430" y="76" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="510" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Examples</text>
  <text x="510" y="114" text-anchor="middle" font-size="10" fill="#141413">示例输入/输出</text>
  <text x="510" y="127" text-anchor="middle" font-size="9" fill="#87867F">期望行为</text>

  <!-- Down arrow to AI -->
  <line x1="340" y1="138" x2="340" y2="162" stroke="#D97757" stroke-width="2.5"/>
  <polygon points="340,168 335,158 345,158" fill="#D97757"/>
  <text x="340" y="157" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">结构化输入</text>

  <!-- AI Model node -->
  <rect x="240" y="172" width="200" height="52" rx="8" fill="#D97757"/>
  <text x="340" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">AI Model</text>
  <text x="340" y="212" text-anchor="middle" font-size="10" fill="#FAD8C8">代码生成 + 测试生成 + 审查</text>

  <!-- Down arrows to outputs -->
  <line x1="290" y1="224" x2="270" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="266,250 273,243 269,241" fill="#D1CFC5"/>
  <line x1="340" y1="224" x2="340" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,254 336,246 344,246" fill="#D1CFC5"/>
  <line x1="390" y1="224" x2="410" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="414,250 407,243 411,241" fill="#D1CFC5"/>

  <!-- Output cards -->
  <rect x="190" y="252" width="100" height="32" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="240" y="272" text-anchor="middle" font-size="10.5" fill="#141413">Code</text>
  <text x="240" y="280" text-anchor="middle" font-size="8" fill="#87867F">生产代码</text>

  <rect x="290" y="252" width="100" height="32" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="340" y="272" text-anchor="middle" font-size="10.5" fill="#141413">Test</text>
  <text x="340" y="280" text-anchor="middle" font-size="8" fill="#87867F">单元/集成测试</text>

  <rect x="390" y="252" width="100" height="32" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="440" y="272" text-anchor="middle" font-size="10.5" fill="#141413">Review</text>
  <text x="440" y="280" text-anchor="middle" font-size="8" fill="#87867F">PR 审查意见</text>

  <!-- Bottom annotation bar -->
  <rect x="30" y="300" width="620" height="28" rx="5" fill="#F5F3EE" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="318" text-anchor="middle" font-size="10" fill="#141413">
    <tspan fill="#87867F">Design Doc is now </tspan>
    <tspan fill="#D97757" font-weight="600">Context Artifacts</tspan>
    <tspan fill="#87867F"> — 50% of detailed design disappears</tspan>
  </text>
</svg>