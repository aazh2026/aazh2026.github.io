<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">质量左移的成本曲线</text>
  <text x="340" y="38" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">来源: IBM Systems Journal / 2025</text>

  <!-- Y axis label -->
  <text x="16" y="160" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" transform="rotate(-90, 16, 160)">Bug 修复成本</text>

  <!-- X axis label -->
  <text x="340" y="288" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">软件生命周期阶段</text>

  <!-- Grid lines (horizontal) -->
  <line x1="60" y1="70" x2="620" y2="70" stroke="#E3DACC" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="60" y1="110" x2="620" y2="110" stroke="#E3DACC" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="60" y1="150" x2="620" y2="150" stroke="#E3DACC" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="60" y1="190" x2="620" y2="190" stroke="#E3DACC" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="60" y1="230" x2="620" y2="230" stroke="#E3DACC" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Y axis cost labels -->
  <text x="50" y="74" text-anchor="end" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">100x</text>
  <text x="50" y="114" text-anchor="end" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">50x</text>
  <text x="50" y="154" text-anchor="end" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">20x</text>
  <text x="50" y="194" text-anchor="end" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">10x</text>
  <text x="50" y="234" text-anchor="end" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">1x</text>

  <!-- X axis stage labels -->
  <text x="110" y="252" text-anchor="middle" font-size="10" fill="#141413">需求</text>
  <text x="210" y="252" text-anchor="middle" font-size="10" fill="#141413">设计</text>
  <text x="310" y="252" text-anchor="middle" font-size="10" fill="#141413">开发</text>
  <text x="410" y="252" text-anchor="middle" font-size="10" fill="#141413">测试</text>
  <text x="510" y="252" text-anchor="middle" font-size="10" fill="#141413">上线</text>
  <text x="600" y="252" text-anchor="middle" font-size="10" fill="#141413">运维</text>

  <!-- Vertical grid lines -->
  <line x1="110" y1="60" x2="110" y2="245" stroke="#E3DACC" stroke-width="1"/>
  <line x1="210" y1="60" x2="210" y2="245" stroke="#E3DACC" stroke-width="1"/>
  <line x1="310" y1="60" x2="310" y2="245" stroke="#E3DACC" stroke-width="1"/>
  <line x1="410" y1="60" x2="410" y2="245" stroke="#E3DACC" stroke-width="1"/>
  <line x1="510" y1="60" x2="510" y2="245" stroke="#E3DACC" stroke-width="1"/>

  <!-- Cost curve line (exponential rise) -->
  <!-- Points: (110, 230) → (210, 200) → (310, 155) → (410, 105) → (510, 75) → (600, 68) -->
  <path d="M 110 230 C 155 218, 175 175, 210 200 C 255 228, 275 140, 310 155 C 345 170, 365 90, 410 105 C 455 120, 475 65, 510 75 C 545 85, 575 62, 600 68" stroke="#D97757" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Area fill under curve -->
  <path d="M 110 230 C 155 218, 175 175, 210 200 C 255 228, 275 140, 310 155 C 345 170, 365 90, 410 105 C 455 120, 475 65, 510 75 C 545 85, 575 62, 600 68 L 600 245 L 110 245 Z" fill="#D97757" opacity="0.08"/>

  <!-- 契约介入点 (at 需求 stage) -->
  <circle cx="110" cy="230" r="8" fill="#788C5D"/>
  <circle cx="110" cy="230" r="4" fill="#FFFFFF"/>
  <text x="110" y="220" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">契约介入点</text>

  <!-- Dashed vertical line from 契约介入点 to cost curve minimum -->
  <line x1="110" y1="232" x2="110" y2="62" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="118" y="70" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">最低成本</text>

  <!-- 发现成本 label on curve -->
  <text x="500" y="68" font-size="9.5" fill="#D97757" font-family="ui-monospace, monospace" font-style="italic">发现成本</text>
  <line x1="490" y1="72" x2="475" y2="78" stroke="#D97757" stroke-width="1"/>

  <!-- Annotation: cost multiplier callout -->
  <g transform="translate(560, 120)">
    <rect width="90" height="56" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
    <text x="45" y="20" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">修复成本倍数</text>
    <text x="45" y="36" text-anchor="middle" font-size="14" fill="#141413" font-weight="700">1x → 100x</text>
    <text x="45" y="50" text-anchor="middle" font-size="8.5" fill="#87867F">需求阶段 vs 运维阶段</text>
  </g>
</svg>
