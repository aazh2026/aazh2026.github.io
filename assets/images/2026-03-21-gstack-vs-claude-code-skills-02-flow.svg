<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>gstack 七阶段开发流程</title>
  <desc>水平流程图：Think(2命令) → Plan(3命令) → Review → Test → Ship，七个阶段横向排列</desc>

  <!-- Background -->
  <rect width="680" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">gstack 七阶段开发流程</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/21</text>

  <!-- Stage 1: Think -->
  <rect x="20" y="75" width="110" height="150" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="20" y="75" width="110" height="26" rx="8" fill="#D97757"/>
  <rect x="20" y="89" width="110" height="12" fill="#D97757"/>
  <text x="75" y="93" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Think</text>
  <text x="75" y="113" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">2 commands</text>
  <text x="75" y="130" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/office-hours</text>
  <text x="75" y="143" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/plan-ceo-review</text>
  <text x="75" y="165" text-anchor="middle" font-size="9" fill="#87867F">YC Office Hours</text>
  <text x="75" y="178" text-anchor="middle" font-size="8" fill="#87867F">重新定义产品</text>
  <text x="75" y="191" text-anchor="middle" font-size="8" fill="#87867F">重新思考问题</text>
  <text x="75" y="212" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">问题定义</text>

  <!-- Arrow 1→2 -->
  <line x1="130" y1="150" x2="148" y2="150" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="152,150 144,146 144,154" fill="#D1CFC5"/>

  <!-- Stage 2: Plan -->
  <rect x="158" y="75" width="110" height="150" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="158" y="75" width="110" height="26" rx="8" fill="#D97757"/>
  <rect x="158" y="89" width="110" height="12" fill="#D97757"/>
  <text x="213" y="93" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Plan</text>
  <text x="213" y="113" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">3 commands</text>
  <text x="213" y="130" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/plan-eng-review</text>
  <text x="213" y="143" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/plan-design-review</text>
  <text x="213" y="165" text-anchor="middle" font-size="9" fill="#87867F">工程经理 + 设计师</text>
  <text x="213" y="178" text-anchor="middle" font-size="8" fill="#87867F">数据流 · 边界情况</text>
  <text x="213" y="191" text-anchor="middle" font-size="8" fill="#87867F">设计评审 0-10分</text>
  <text x="213" y="212" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">架构设计</text>

  <!-- Arrow 2→3 -->
  <line x1="268" y1="150" x2="286" y2="150" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="290,150 282,146 282,154" fill="#D1CFC5"/>

  <!-- Stage 3: Review -->
  <rect x="296" y="75" width="90" height="150" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="296" y="75" width="90" height="26" rx="8" fill="#788C5D"/>
  <rect x="296" y="89" width="90" height="12" fill="#788C5D"/>
  <text x="341" y="93" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Review</text>
  <text x="341" y="113" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">1 command</text>
  <text x="341" y="130" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/review</text>
  <text x="341" y="165" text-anchor="middle" font-size="9" fill="#87867F">高级工程师</text>
  <text x="341" y="178" text-anchor="middle" font-size="8" fill="#87867F">发现 CI 通过</text>
  <text x="341" y="191" text-anchor="middle" font-size="8" fill="#87867F">但生产爆炸的 Bug</text>
  <text x="341" y="212" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">质量审查</text>

  <!-- Arrow 3→4 -->
  <line x1="386" y1="150" x2="404" y2="150" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="408,150 400,146 400,154" fill="#D1CFC5"/>

  <!-- Stage 4: Test -->
  <rect x="414" y="75" width="90" height="150" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="414" y="75" width="90" height="26" rx="8" fill="#788C5D"/>
  <rect x="414" y="89" width="90" height="12" fill="#788C5D"/>
  <text x="459" y="93" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Test</text>
  <text x="459" y="113" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">1 command</text>
  <text x="459" y="130" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/qa</text>
  <text x="459" y="165" text-anchor="middle" font-size="9" fill="#87867F">QA 主管</text>
  <text x="459" y="178" text-anchor="middle" font-size="8" fill="#87867F">真实浏览器</text>
  <text x="459" y="191" text-anchor="middle" font-size="8" fill="#87867F">点击测试 · 修复 Bug</text>
  <text x="459" y="212" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">测试验证</text>

  <!-- Arrow 4→5 -->
  <line x1="504" y1="150" x2="522" y2="150" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="526,150 518,146 518,154" fill="#D1CFC5"/>

  <!-- Stage 5: Ship -->
  <rect x="532" y="75" width="110" height="150" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="532" y="75" width="110" height="26" rx="8" fill="#141413"/>
  <rect x="532" y="89" width="110" height="12" fill="#141413"/>
  <text x="587" y="93" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Ship</text>
  <text x="587" y="113" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">1 command</text>
  <text x="587" y="130" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">/ship</text>
  <text x="587" y="165" text-anchor="middle" font-size="9" fill="#87867F">发布工程师</text>
  <text x="587" y="178" text-anchor="middle" font-size="8" fill="#87867F">同步 · 测试</text>
  <text x="587" y="191" text-anchor="middle" font-size="8" fill="#87867F">审计 · 推送 · 开 PR</text>
  <text x="587" y="212" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">发布上线</text>

  <!-- Phase pills at bottom -->
  <text x="75" y="258" text-anchor="middle" font-size="8" fill="#87867F">问题定义</text>
  <rect x="45" y="264" width="60" height="16" rx="8" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
  <text x="75" y="276" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">Phase 1</text>

  <text x="213" y="258" text-anchor="middle" font-size="8" fill="#87867F">架构设计</text>
  <rect x="183" y="264" width="60" height="16" rx="8" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
  <text x="213" y="276" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">Phase 2</text>

  <text x="341" y="258" text-anchor="middle" font-size="8" fill="#87867F">质量保障</text>
  <rect x="311" y="264" width="60" height="16" rx="8" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
  <text x="341" y="276" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">Phase 3</text>

  <text x="459" y="258" text-anchor="middle" font-size="8" fill="#87867F">测试验证</text>
  <rect x="429" y="264" width="60" height="16" rx="8" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
  <text x="459" y="276" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">Phase 4</text>

  <text x="587" y="258" text-anchor="middle" font-size="8" fill="#87867F">发布上线</text>
  <rect x="557" y="264" width="60" height="16" rx="8" fill="#F0EEE6" stroke="#141413" stroke-width="1"/>
  <text x="587" y="276" text-anchor="middle" font-size="8" fill="#141413" font-family="ui-monospace, monospace">Phase 5</text>

  <!-- Source line -->
  <text x="340" y="306" text-anchor="middle" font-size="9" fill="#D1CFC5" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/21</text>
</svg>
