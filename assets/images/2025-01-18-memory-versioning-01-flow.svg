<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">记忆版本控制流程</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">知识输入 → 版本化存储 → 验证 → 输出</text>

  <!-- Stage 1: Knowledge Input -->
  <rect x="30" y="65" width="130" height="80" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="95" y="89" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Knowledge Input</text>
  <text x="95" y="107" text-anchor="middle" font-size="10" fill="#141413">带时间戳的知识</text>
  <text x="95" y="122" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">t₀, t₁, t₂ ...</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="105" x2="190" y2="105" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="190,101 183,105 190,109" fill="#D1CFC5"/>
  <text x="175" y="97" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">写入</text>

  <!-- Stage 2: Versioned Memory Store -->
  <rect x="200" y="58" width="180" height="240" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="290" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Versioned Memory Store</text>

  <!-- Version card v1 -->
  <rect x="212" y="88" width="156" height="52" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="222" y="106" font-size="9" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">v1.0.0</text>
  <text x="222" y="120" font-size="9.5" fill="#141413">Python 有 GIL</text>
  <text x="222" y="133" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">valid_from: 2020</text>

  <!-- Version card v2 -->
  <rect x="212" y="148" width="156" height="52" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="222" y="166" font-size="9" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">v2.0.0</text>
  <text x="222" y="180" font-size="9.5" fill="#141413">Python 3.12+ 可禁用 GIL</text>
  <text x="222" y="193" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">valid_from: 2023.10</text>

  <!-- Version card v3 -->
  <rect x="212" y="208" width="156" height="52" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="222" y="226" font-size="9" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">v3.0.0</text>
  <text x="222" y="240" font-size="9.5" fill="#141413">PEP 703 正式支持</text>
  <text x="222" y="253" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">valid_from: 2024.03</text>

  <!-- Arrow 2→3 -->
  <line x1="380" y1="105" x2="410" y2="105" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="410,101 403,105 410,109" fill="#D1CFC5"/>
  <text x="395" y="97" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">查询</text>

  <!-- Stage 3: Validation Check -->
  <rect x="420" y="68" width="120" height="74" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="480" y="91" text-anchor="middle" font-size="10" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Validation Check</text>
  <text x="480" y="109" text-anchor="middle" font-size="9" fill="#141413">与真值比对</text>
  <text x="480" y="124" text-anchor="middle" font-size="9" fill="#141413">选择正确版本</text>

  <!-- Arrow 3→4 (valid path) -->
  <line x1="540" y1="105" x2="570" y2="105" stroke="#788C5D" stroke-width="2"/>
  <polygon points="570,101 563,105 570,109" fill="#788C5D"/>
  <text x="555" y="97" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">最新</text>

  <!-- Stage 4: Output -->
  <rect x="580" y="68" width="80" height="74" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="620" y="91" text-anchor="middle" font-size="10" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Output</text>
  <text x="620" y="109" text-anchor="middle" font-size="9" fill="#141413">环境适配</text>
  <text x="620" y="124" text-anchor="middle" font-size="9" fill="#141413">答案</text>

  <!-- Dashed Outdated arrow: Output → v1 (stale path) -->
  <path d="M 600 142 C 600 210, 380 240, 230 240" stroke="#87867F" stroke-width="1.8" fill="none" stroke-dasharray="5,4" opacity="0.7"/>
  <polygon points="230,240 238,234 236,243" fill="#87867F" opacity="0.7"/>
  <text x="420" y="238" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Outdated · 版本漂移</text>

  <!-- Legend -->
  <rect x="30" y="310" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="48" y="320" font-size="9" fill="#141413" font-family="ui-monospace, monospace">版本卡片</text>

  <rect x="130" y="310" width="12" height="12" rx="2" fill="#788C5D"/>
  <text x="148" y="320" font-size="9" fill="#141413" font-family="ui-monospace, monospace">当前有效</text>

  <line x1="230" y1="316" x2="260" y2="316" stroke="#87867F" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="268" y="320" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">过期路径</text>

  <!-- Source of truth badge -->
  <rect x="420" y="160" width="120" height="36" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="480" y="177" text-anchor="middle" font-size="9" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Source of Truth</text>
  <text x="480" y="190" text-anchor="middle" font-size="8.5" fill="#87867F">官方文档 / 用户反馈</text>
</svg>