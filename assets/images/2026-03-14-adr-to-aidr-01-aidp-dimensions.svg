<svg xmlns="http://www.w3.org/2000/svg" aria-label="AIDR Five Enhancement Dimensions" viewBox="0 0 800 520">
  <title>AIDR 五大增强维度</title>
  <desc>
    Architecture Decision Records 到 AI-Enhanced Architecture Decision Records 的五个增强维度对比
  </desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <linearGradient id="clayGrad" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c0634a"/>
    </linearGradient>
    <filter id="cardShadow" width="120%" height="130%" x="-10%" y="-10%">
      <feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".08" stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="520" fill="url(#bgGrad)" rx="16"/>
  <text x="400" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">AIDR 五大增强维度</text>
  <text x="400" y="65" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="middle">从 ADR 静态文档到 AIDR 可执行规范的演进</text>
  <rect width="360" height="400" x="30" y="90" fill="#fff" filter="url(#cardShadow)" rx="12"/>
  <rect width="360" height="44" x="30" y="90" fill="#87867f" rx="12"/>
  <path fill="#87867f" d="M30 118h360v16H30z"/>
  <text x="210" y="118" fill="#fff" dy="14" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">传统 ADR</text>
  <g transform="translate(50 155)">
    <rect width="320" height="60" fill="#f5f4f2" rx="8"/>
    <circle cx="22" cy="30" r="14" fill="#d1cfc5"/>
    <text x="22" y="35" fill="#87867f" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">1</text>
    <text x="48" y="22" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">结构化</text>
    <text x="48" y="40" fill="#87867f" font-family="system-ui,sans-serif" font-size="11">自然语言描述</text>
    <rect width="320" height="60" y="70" fill="#f5f4f2" rx="8"/>
    <circle cx="22" cy="100" r="14" fill="#d1cfc5"/>
    <text x="22" y="105" fill="#87867f" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2</text>
    <text x="48" y="92" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">可验证</text>
    <text x="48" y="110" fill="#87867f" font-family="system-ui,sans-serif" font-size="11">人类阅读理解</text>
    <rect width="320" height="60" y="140" fill="#f5f4f2" rx="8"/>
    <circle cx="22" cy="170" r="14" fill="#d1cfc5"/>
    <text x="22" y="175" fill="#87867f" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">3</text>
    <text x="48" y="162" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">可追溯</text>
    <text x="48" y="180" fill="#87867f" font-family="system-ui,sans-serif" font-size="11">记录决策结果</text>
    <rect width="320" height="60" y="210" fill="#f5f4f2" rx="8"/>
    <circle cx="22" cy="240" r="14" fill="#d1cfc5"/>
    <text x="22" y="245" fill="#87867f" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">4</text>
    <text x="48" y="232" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">可复用</text>
    <text x="48" y="250" fill="#87867f" font-family="system-ui,sans-serif" font-size="11">每个项目独立</text>
    <rect width="320" height="60" y="280" fill="#f5f4f2" rx="8"/>
    <circle cx="22" cy="310" r="14" fill="#d1cfc5"/>
    <text x="22" y="315" fill="#87867f" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">5</text>
    <text x="48" y="302" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">活的</text>
    <text x="48" y="320" fill="#87867f" font-family="system-ui,sans-serif" font-size="11">写完后很少更新</text>
  </g>
  <g fill="#d97757">
    <path d="m390 270 20 12-20 12z"/>
    <text x="10" y="38" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" transform="translate(390 270)">AI</text>
    <text x="10" y="48" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" transform="translate(390 270)">增强</text>
  </g>
  <rect width="360" height="400" x="410" y="90" fill="#fff" filter="url(#cardShadow)" rx="12"/>
  <rect width="360" height="44" x="410" y="90" fill="url(#clayGrad)" rx="12"/>
  <path fill="url(#clayGrad)" d="M410 118h360v16H410z"/>
  <text x="590" y="118" fill="#fff" dy="14" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">AIDR · AI-Enhanced ADR</text>
  <g transform="translate(430 155)">
    <rect width="320" height="60" fill="#fdf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="30" r="14" fill="url(#clayGrad)"/>
    <text x="22" y="35" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">1</text>
    <text x="48" y="22" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">结构化</text>
    <text x="48" y="40" fill="#788c5d" font-family="system-ui,sans-serif" font-size="11">结构化数据 + 自然语言，机器可解析</text>
    <rect width="320" height="60" y="70" fill="#fdf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="100" r="14" fill="url(#clayGrad)"/>
    <text x="22" y="105" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2</text>
    <text x="48" y="92" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">可验证</text>
    <text x="48" y="110" fill="#788c5d" font-family="system-ui,sans-serif" font-size="11">自动化验证规则，系统自动检查</text>
    <rect width="320" height="60" y="140" fill="#fdf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="170" r="14" fill="url(#clayGrad)"/>
    <text x="22" y="175" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">3</text>
    <text x="48" y="162" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">可追溯</text>
    <text x="48" y="180" fill="#788c5d" font-family="system-ui,sans-serif" font-size="11">完整推理链 + 支持证据</text>
    <rect width="320" height="60" y="210" fill="#fdf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="240" r="14" fill="url(#clayGrad)"/>
    <text x="22" y="245" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">4</text>
    <text x="48" y="232" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">可复用</text>
    <text x="48" y="250" fill="#788c5d" font-family="system-ui,sans-serif" font-size="11">决策模式库，跨项目复用</text>
    <rect width="320" height="60" y="280" fill="#fdf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="310" r="14" fill="url(#clayGrad)"/>
    <text x="22" y="315" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">5</text>
    <text x="48" y="302" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="600">活的</text>
    <text x="48" y="320" fill="#788c5d" font-family="system-ui,sans-serif" font-size="11">与代码同步演进，文档永不过时</text>
  </g>
</svg>
