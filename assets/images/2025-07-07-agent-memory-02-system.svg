<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" role="img" aria-label="Agent记忆系统架构图">
  <title>Agent记忆系统架构</title>
  <desc>Agent Memory System的四层架构：Working Memory、Short-term Memory、Long-term Memory和Knowledge Graph</desc>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="320" fill="#FAF9F5"/>

  <!-- 外框标题 -->
  <rect x="20" y="15" width="740" height="290" rx="12" fill="none" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="40" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#141413">Agent Memory System</text>

  <!-- ========== Working Memory ========== -->
  <rect x="40" y="55" width="340" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#92400e">Working Memory</text>
  <text x="210" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b45309">(In-Memory)</text>
  <line x1="50" y1="100" x2="370" y2="100" stroke="#fcd34d" stroke-width="1"/>
  <text x="60" y="117" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#92400e">• ContextWindow</text>
  <text x="60" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#92400e">• EntityTracker</text>
  <text x="60" y="149" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#92400e">• Summarizer</text>
  <text x="210" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#b45309">秒~分钟级</text>

  <!-- ========== Short-term Memory ========== -->
  <rect x="400" y="55" width="340" height="120" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1e40af">Short-term Memory</text>
  <text x="570" y="92" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">(Vector DB)</text>
  <line x1="410" y1="100" x2="750" y2="100" stroke="#93c5fd" stroke-width="1"/>
  <text x="420" y="117" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• Semantic retrieval</text>
  <text x="420" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• Temporal decay</text>
  <text x="420" y="149" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• Importance scoring</text>
  <text x="570" y="168" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1e3a8a">小时~天级</text>

  <!-- ========== Long-term Memory ========== -->
  <rect x="40" y="195" width="340" height="100" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#065f46">Long-term Memory</text>
  <text x="210" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">(Relational DB)</text>
  <line x1="50" y1="240" x2="370" y2="240" stroke="#6ee7b7" stroke-width="1"/>
  <text x="60" y="257" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">• User profiles</text>
  <text x="60" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">• Business rules</text>
  <text x="180" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">• Case studies</text>
  <text x="210" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#047857">永久</text>

  <!-- ========== Knowledge Graph ========== -->
  <rect x="400" y="195" width="340" height="100" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9d174d">Knowledge Graph</text>
  <text x="570" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#be185d">(Graph DB)</text>
  <line x1="410" y1="240" x2="750" y2="240" stroke="#f9a8d4" stroke-width="1"/>
  <text x="420" y="257" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#be185d">• Entity relationships</text>
  <text x="420" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#be185d">• Inference queries</text>
  <text x="610" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#be185d">• Path finding</text>
  <text x="570" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#be185d">关系推理</text>

  <!-- 层级标签 -->
  <text x="15" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F" writing-mode="tb">实时层</text>
  <text x="15" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F" writing-mode="tb">持久层</text>
</svg>