<svg xmlns="http://www.w3.org/2000/svg" aria-label="Agent记忆系统架构图" viewBox="0 0 780 320">
  <title>Agent记忆系统架构</title>
  <desc>
    Agent Memory System的四层架构：Working Memory、Short-term Memory、Long-term Memory和Knowledge Graph
  </desc>
  <defs>
    <filter id="shadow" width="110%" height="115%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h780v320H0z"/>
  <rect width="740" height="290" x="20" y="15" fill="none" stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="1.5" rx="12"/>
  <text x="40" y="38" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700">Agent Memory System</text>
  <rect width="340" height="120" x="40" y="55" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="210" y="76" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Working Memory</text>
  <text x="210" y="92" fill="#b45309" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">(In-Memory)</text>
  <path stroke="#fcd34d" d="M50 100h320"/>
  <text x="60" y="117" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="11">• ContextWindow</text>
  <text x="60" y="133" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="11">• EntityTracker</text>
  <text x="60" y="149" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Summarizer</text>
  <text x="210" y="168" fill="#b45309" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">秒~分钟级</text>
  <rect width="340" height="120" x="400" y="55" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="570" y="76" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Short-term Memory</text>
  <text x="570" y="92" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">(Vector DB)</text>
  <path stroke="#93c5fd" d="M410 100h340"/>
  <text x="420" y="117" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Semantic retrieval</text>
  <text x="420" y="133" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Temporal decay</text>
  <text x="420" y="149" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Importance scoring</text>
  <text x="570" y="168" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">小时~天级</text>
  <rect width="340" height="100" x="40" y="195" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="210" y="216" fill="#065f46" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Long-term Memory</text>
  <text x="210" y="232" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">(Relational DB)</text>
  <path stroke="#6ee7b7" d="M50 240h320"/>
  <text x="60" y="257" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11">• User profiles</text>
  <text x="60" y="273" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Business rules</text>
  <text x="180" y="273" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Case studies</text>
  <text x="210" y="290" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">永久</text>
  <rect width="340" height="100" x="400" y="195" fill="#fce7f3" stroke="#db2777" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="570" y="216" fill="#9d174d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Knowledge Graph</text>
  <text x="570" y="232" fill="#be185d" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">(Graph DB)</text>
  <path stroke="#f9a8d4" d="M410 240h340"/>
  <text x="420" y="257" fill="#be185d" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Entity relationships</text>
  <text x="420" y="273" fill="#be185d" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Inference queries</text>
  <text x="610" y="273" fill="#be185d" font-family="system-ui,-apple-system,sans-serif" font-size="11">• Path finding</text>
  <text x="570" y="290" fill="#be185d" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">关系推理</text>
  <text x="15" y="120" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="9" writing-mode="tb">实时层</text>
  <text x="15" y="250" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="9" writing-mode="tb">持久层</text>
</svg>
