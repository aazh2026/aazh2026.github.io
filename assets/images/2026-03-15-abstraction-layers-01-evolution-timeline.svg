<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">抽象层级的演进史</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Charlie · 2026/03/15</text>

  <!-- Timeline baseline -->
  <line x1="60" y1="76" x2="620" y2="76" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Arrow head -->
  <polygon points="620,76 612,71 612,81" fill="#D1CFC5"/>

  <!-- Era dots on timeline -->
  <circle cx="80" cy="76" r="5" fill="#D97757"/>
  <circle cx="180" cy="76" r="5" fill="#D97757"/>
  <circle cx="280" cy="76" r="5" fill="#D97757"/>
  <circle cx="380" cy="76" r="5" fill="#D97757"/>
  <circle cx="480" cy="76" r="5" fill="#D97757"/>
  <circle cx="580" cy="76" r="5" fill="#D97757"/>

  <!-- Layer 1: Machine Code -->
  <rect x="30" y="92" width="100" height="68" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="80" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 1</text>
  <text x="80" y="128" text-anchor="middle" font-size="12" fill="#141413">机器码</text>
  <text x="80" y="142" text-anchor="middle" font-size="10" fill="#87867F">1940s</text>
  <text x="80" y="156" text-anchor="middle" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">00110001...</text>

  <!-- Layer 2: Assembly -->
  <rect x="130" y="152" width="100" height="68" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="180" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 2</text>
  <text x="180" y="188" text-anchor="middle" font-size="12" fill="#141413">汇编语言</text>
  <text x="180" y="202" text-anchor="middle" font-size="10" fill="#87867F">1950s</text>
  <text x="180" y="216" text-anchor="middle" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">mov ax, 5</text>

  <!-- Layer 3: C -->
  <rect x="230" y="92" width="100" height="68" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="280" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 3</text>
  <text x="280" y="128" text-anchor="middle" font-size="12" fill="#141413">C语言</text>
  <text x="280" y="142" text-anchor="middle" font-size="10" fill="#87867F">1970s</text>
  <text x="280" y="156" text-anchor="middle" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">int a = 5;</text>

  <!-- Layer 4: OOP / Managed -->
  <rect x="330" y="152" width="100" height="68" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="380" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 4</text>
  <text x="380" y="188" text-anchor="middle" font-size="12" fill="#141413">OOP / 托管</text>
  <text x="380" y="202" text-anchor="middle" font-size="10" fill="#87867F">1980s-90s</text>
  <text x="380" y="216" text-anchor="middle" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">class Foo {}</text>

  <!-- Layer 5: Dynamic / Functional -->
  <rect x="430" y="92" width="100" height="68" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="480" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 5</text>
  <text x="480" y="128" text-anchor="middle" font-size="12" fill="#141413">动态 / 函数式</text>
  <text x="480" y="142" text-anchor="middle" font-size="10" fill="#87867F">2000s-10s</text>
  <text x="480" y="156" text-anchor="middle" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">map filter reduce</text>

  <!-- Layer 6: Natural Language -->
  <rect x="530" y="152" width="100" height="68" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="580" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Layer 6</text>
  <text x="580" y="188" text-anchor="middle" font-size="12" fill="#141413">自然语言</text>
  <text x="580" y="202" text-anchor="middle" font-size="10" fill="#87867F">2010s-2020s</text>
  <text x="580" y="216" text-anchor="middle" font-size="9.5" fill="#788C5D" font-family="ui-monospace, monospace">"帮我写个排序"</text>

  <!-- Vertical connecting lines between alternating blocks -->
  <line x1="80" y1="160" x2="80" y2="232" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="180" y1="160" x2="180" y2="232" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="160" x2="280" y2="232" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="380" y1="160" x2="380" y2="232" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="480" y1="160" x2="480" y2="232" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="232" x2="580" y2="232" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Source -->
  <text x="340" y="300" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">抽象层级每跃迁一次，表达意图就更接近人类思维</text>
</svg>
