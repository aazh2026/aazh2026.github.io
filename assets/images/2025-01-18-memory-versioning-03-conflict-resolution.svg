<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>冲突解决策略</title>
  <desc>Decision tree and Venn-style diagram showing three conflict types and their resolution strategies</desc>

  <!-- Background -->
  <rect width="600" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">版本冲突类型与解决策略</text>
  <text x="300" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">三圈交汇处 = 多版本共存 · 2025/01/18</text>

  <!-- Circle 1: 时间冲突 (left) -->
  <circle cx="195" cy="140" r="80" fill="#FFFFFF" stroke="#D97757" stroke-width="2" opacity="0.85"/>
  <text x="195" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">时间冲突</text>
  <text x="195" y="132" text-anchor="middle" font-size="9.5" fill="#141413">记忆来自</text>
  <text x="195" y="147" text-anchor="middle" font-size="9.5" fill="#141413">6个月前</text>
  <text x="195" y="162" text-anchor="middle" font-size="9.5" fill="#87867F">"最新 Ubuntu LTS"</text>

  <!-- Circle 2: 来源冲突 (top-right) -->
  <circle cx="345" cy="120" r="80" fill="#FFFFFF" stroke="#788C5D" stroke-width="2" opacity="0.85"/>
  <text x="345" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">来源冲突</text>
  <text x="345" y="115" text-anchor="middle" font-size="9.5" fill="#141413">两个权威来源</text>
  <text x="345" y="130" text-anchor="middle" font-size="9.5" fill="#141413">给出矛盾信息</text>
  <text x="345" y="145" text-anchor="middle" font-size="9.5" fill="#87867F">RFC ≠ 博客文章</text>

  <!-- Circle 3: 粒度冲突 (bottom-right) -->
  <circle cx="345" cy="195" r="80" fill="#FFFFFF" stroke="#141413" stroke-width="2" opacity="0.85"/>
  <text x="345" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">粒度冲突</text>
  <text x="345" y="189" text-anchor="middle" font-size="9.5" fill="#141413">高层摘要 vs</text>
  <text x="345" y="204" text-anchor="middle" font-size="9.5" fill="#141413">详细知识矛盾</text>
  <text x="345" y="219" text-anchor="middle" font-size="9.5" fill="#87867F">"Hooks" vs "Class存在"</text>

  <!-- Intersection label (center) -->
  <rect x="230" y="140" width="120" height="36" rx="8" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.5"/>
  <text x="290" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">多版本共存</text>
  <text x="290" y="171" text-anchor="middle" font-size="9.5" fill="#D97757">策略适用</text>

  <!-- Bottom section: Three resolution strategy cards -->
  <!-- Card 1: 最新优先 -->
  <rect x="40" y="290" width="160" height="72" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="52" y="302" width="68" height="18" rx="9" fill="#D97757"/>
  <text x="86" y="315" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">最新优先</text>
  <text x="52" y="336" font-size="10" fill="#141413">来源时间更新</text>
  <text x="52" y="351" font-size="10" fill="#141413">→ 优先采纳</text>

  <!-- Arrow: Card1 → Card2 -->
  <line x1="202" y1="326" x2="220" y2="326" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="224,326 216,321 216,331" fill="#D1CFC5"/>

  <!-- Card 2: 来源权重 -->
  <rect x="226" y="290" width="160" height="72" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="238" y="302" width="78" height="18" rx="9" fill="#788C5D"/>
  <text x="277" y="315" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">来源权重</text>
  <text x="238" y="336" font-size="10" fill="#141413">RFC > 博客 > 评论</text>
  <text x="238" y="351" font-size="10" fill="#141413">→ 权威优先</text>

  <!-- Arrow: Card2 → Card3 -->
  <line x1="388" y1="326" x2="406" y2="326" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="410,326 402,321 402,331" fill="#D1CFC5"/>

  <!-- Card 3: 手动仲裁 -->
  <rect x="412" y="290" width="148" height="72" rx="8" fill="#FFFFFF" stroke="#141413" stroke-width="1.5"/>
  <rect x="424" y="302" width="68" height="18" rx="9" fill="#141413"/>
  <text x="458" y="315" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">手动仲裁</text>
  <text x="424" y="336" font-size="10" fill="#141413">无法自动判断</text>
  <text x="424" y="351" font-size="10" fill="#141413">→ 升级人工</text>
</svg>
