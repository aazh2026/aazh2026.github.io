<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 600 380">
  <title>冲突解决策略</title>
  <desc>
    Decision tree and Venn-style diagram showing three conflict types and their resolution strategies
  </desc>
  <path fill="#faf9f5" d="M0 0h600v380H0z"/>
  <text x="300" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">版本冲突类型与解决策略</text>
  <text x="300" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">三圈交汇处 = 多版本共存 · 2025/01/18</text>
  <circle cx="195" cy="140" r="80" fill="#fff" stroke="#d97757" stroke-width="2" opacity=".85"/>
  <text x="195" y="115" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">时间冲突</text>
  <text x="195" y="132" fill="#141413" font-size="9.5" text-anchor="middle">记忆来自</text>
  <text x="195" y="147" fill="#141413" font-size="9.5" text-anchor="middle">6个月前</text>
  <text x="195" y="162" fill="#87867f" font-size="9.5" text-anchor="middle">&quot;最新 Ubuntu LTS&quot;</text>
  <circle cx="345" cy="120" r="80" fill="#fff" stroke="#788c5d" stroke-width="2" opacity=".85"/>
  <text x="345" y="98" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">来源冲突</text>
  <text x="345" y="115" fill="#141413" font-size="9.5" text-anchor="middle">两个权威来源</text>
  <text x="345" y="130" fill="#141413" font-size="9.5" text-anchor="middle">给出矛盾信息</text>
  <text x="345" y="145" fill="#87867f" font-size="9.5" text-anchor="middle">RFC ≠ 博客文章</text>
  <circle cx="345" cy="195" r="80" fill="#fff" stroke="#141413" stroke-width="2" opacity=".85"/>
  <text x="345" y="172" fill="#141413" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">粒度冲突</text>
  <text x="345" y="189" fill="#141413" font-size="9.5" text-anchor="middle">高层摘要 vs</text>
  <text x="345" y="204" fill="#141413" font-size="9.5" text-anchor="middle">详细知识矛盾</text>
  <text x="345" y="219" fill="#87867f" font-size="9.5" text-anchor="middle">&quot;Hooks&quot; vs &quot;Class存在&quot;</text>
  <rect width="120" height="36" x="230" y="140" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".15" rx="8"/>
  <text x="290" y="156" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">多版本共存</text>
  <text x="290" y="171" fill="#d97757" font-size="9.5" text-anchor="middle">策略适用</text>
  <rect width="160" height="72" x="40" y="290" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <rect width="68" height="18" x="52" y="302" fill="#d97757" rx="9"/>
  <text x="86" y="315" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">最新优先</text>
  <text x="52" y="336" fill="#141413" font-size="10">来源时间更新</text>
  <text x="52" y="351" fill="#141413" font-size="10">→ 优先采纳</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M202 326h18"/>
  <path fill="#d1cfc5" d="m224 326-8-5v10z"/>
  <rect width="160" height="72" x="226" y="290" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <rect width="78" height="18" x="238" y="302" fill="#788c5d" rx="9"/>
  <text x="277" y="315" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">来源权重</text>
  <text x="238" y="336" fill="#141413" font-size="10">RFC &gt; 博客 &gt; 评论</text>
  <text x="238" y="351" fill="#141413" font-size="10">→ 权威优先</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M388 326h18"/>
  <path fill="#d1cfc5" d="m410 326-8-5v10z"/>
  <rect width="148" height="72" x="412" y="290" fill="#fff" stroke="#141413" stroke-width="1.5" rx="8"/>
  <rect width="68" height="18" x="424" y="302" fill="#141413" rx="9"/>
  <text x="458" y="315" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">手动仲裁</text>
  <text x="424" y="336" fill="#141413" font-size="10">无法自动判断</text>
  <text x="424" y="351" fill="#141413" font-size="10">→ 升级人工</text>
</svg>
