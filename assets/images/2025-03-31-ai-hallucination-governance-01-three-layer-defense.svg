<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-primary { fill: #141413; font-size: 13px; font-weight: 600; }
      .text-secondary { fill: #87867F; font-size: 11px; }
      .text-light { fill: #FAF9F5; font-size: 12px; font-weight: 600; }
      .text-label { fill: #87867F; font-size: 10px; }
      .border { stroke: #D1CFC5; stroke-width: 1; fill: none; }
      .border-g { fill: none; stroke: #D1CFC5; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" class="bg"/>

  <!-- Title -->
  <text x="40" y="36" class="text-primary" font-size="15px">AI 幻觉三层防御体系</text>
  <text x="40" y="52" class="text-secondary">Three-Layer Defense System Against AI Hallucination</text>

  <!-- Three concentric/layered blocks representing the three layers -->
  <!-- Layer 3 (outermost): Recovery -->
  <rect x="40" y="80" width="440" height="430" rx="12" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="60" y="100" width="400" height="390" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="80" y="128" class="text-primary" font-size="13px">第三层 · 恢复 Recovery</text>
  <text x="80" y="144" class="text-secondary">目标：幻觉发生时最小化损失</text>

  <!-- Recovery items -->
  <rect x="80" y="160" width="360" height="56" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="96" y="180" fill="#141413" font-size="12px" font-weight="600">人在回路</text>
  <text x="96" y="196" fill="#87867F" font-size="11px">高风险场景必须人工确认，建立快速升级机制</text>

  <rect x="80" y="224" width="360" height="56" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="96" y="244" fill="#141413" font-size="12px" font-weight="600">影响隔离</text>
  <text x="96" y="260" fill="#87867F" font-size="11px">限制单次AI调用的影响范围，关键操作需多重确认</text>

  <rect x="80" y="288" width="360" height="56" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="96" y="308" fill="#141413" font-size="12px" font-weight="600">快速回滚</text>
  <text x="96" y="324" fill="#87867F" font-size="11px">撤销AI的建议/操作，建立审计日志追溯问题</text>

  <rect x="80" y="352" width="360" height="56" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="0.8"/>
  <text x="96" y="372" fill="#141413" font-size="12px" font-weight="600">持续学习</text>
  <text x="96" y="388" fill="#87867F" font-size="11px">从幻觉事件中学习，更新知识库和Prompt</text>

  <!-- Layer 2 (middle): Detection -->
  <rect x="60" y="100" width="400" height="390" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <rect x="80" y="120" width="360" height="350" rx="8" fill="#FAF9F5" stroke="#87867F" stroke-width="0.8"/>
  <text x="100" y="148" class="text-primary" font-size="13px">第二层 · 检测 Detection</text>
  <text x="100" y="164" class="text-secondary">目标：快速发现幻觉</text>

  <!-- Detection items -->
  <rect x="100" y="180" width="320" height="48" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  <text x="116" y="200" fill="#D97757" font-size="12px" font-weight="700">自一致性检查</text>
  <text x="116" y="214" fill="#87867F" font-size="10px">用不同方式问同一问题，检查答案是否一致</text>

  <rect x="100" y="236" width="320" height="48" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1"/>
  <text x="116" y="256" fill="#D97757" font-size="12px" font-weight="700">事实核查</text>
  <text x="116" y="270" fill="#87867F" font-size="10px">对关键事实进行外部验证，使用专门核查API</text>

  <rect x="100" y="292" width="320" height="48" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1"/>
  <text x="116" y="312" fill="#D97757" font-size="12px" font-weight="700">置信度评估</text>
  <text x="116" y="326" fill="#87867F" font-size="10px">训练模型评估自身置信度，低置信度标记人工审核</text>

  <rect x="100" y="348" width="320" height="48" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1"/>
  <text x="116" y="368" fill="#D97757" font-size="12px" font-weight="700">异常检测</text>
  <text x="116" y="382" fill="#87867F" font-size="10px">监控AI回答的"奇怪程度"，统计学方法检测离群</text>

  <!-- Layer 1 (inner): Prevention -->
  <rect x="100" y="180" width="320" height="216" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
  <text x="120" y="208" fill="#788C5D" font-size="13px" font-weight="700">第一层 · 预防 Prevention</text>
  <text x="120" y="224" fill="#87867F" font-size="11px">目标：减少幻觉发生的可能性</text>

  <rect x="120" y="240" width="280" height="40" rx="5" fill="#E3DACC" stroke="#788C5D" stroke-width="1"/>
  <text x="136" y="259" fill="#141413" font-size="12px" font-weight="600">RAG 检索增强生成</text>
  <text x="136" y="271" fill="#87867F" font-size="10px">基于可信知识库生成，而非凭空生成</text>

  <rect x="120" y="288" width="280" height="40" rx="5" fill="#E3DACC" stroke="#788C5D" stroke-width="1"/>
  <text x="136" y="307" fill="#141413" font-size="12px" font-weight="600">Few-shot 示例引导</text>
  <text x="136" y="319" fill="#87867F" font-size="10px">提供高质量输入输出示例，引导正确回答模式</text>

  <rect x="120" y="336" width="280" height="40" rx="5" fill="#E3DACC" stroke="#788C5D" stroke-width="1"/>
  <text x="136" y="355" fill="#141413" font-size="12px" font-weight="600">Prompt 工程</text>
  <text x="136" y="367" fill="#87867F" font-size="10px">明确要求"不知道时说不知道"，要求引用来源</text>

  <!-- Right side: Key insight box -->
  <rect x="510" y="80" width="250" height="430" rx="12" fill="#141413"/>
  <text x="530" y="116" fill="#FAF9F5" font-size="14px" font-weight="700">核心洞察</text>
  <line x1="530" y1="130" x2="740" y2="130" stroke="#D97757" stroke-width="2"/>

  <text x="530" y="160" fill="#D97757" font-size="12px" font-weight="600">幻觉不是 Bug</text>
  <text x="530" y="160" fill="#D97757" font-size="12px" font-weight="600">是 Feature</text>
  <text x="530" y="160" fill="#D97757" font-size="12px" font-weight="600">是 Feature</text>

  <text x="530" y="180" fill="#87867F" font-size="11px">幻觉率 3-8%</text>
  <text x="530" y="196" fill="#87867F" font-size="11px">百万次/天 =</text>
  <text x="530" y="212" fill="#D97757" font-size="14px" font-weight="700">3-8万次严重错误</text>

  <line x1="530" y1="232" x2="740" y2="232" stroke="#2a2a2a" stroke-width="1"/>

  <text x="530" y="258" fill="#E3DACC" font-size="12px" font-weight="600">三层防御缺一不可</text>
  <text x="530" y="276" fill="#87867F" font-size="11px">预防 → 检测 → 恢复</text>
  <text x="530" y="292" fill="#87867F" font-size="11px">层层递进，协同作战</text>

  <line x1="530" y1="312" x2="740" y2="312" stroke="#2a2a2a" stroke-width="1"/>

  <text x="530" y="338" fill="#E3DACC" font-size="12px" font-weight="600">高风险领域</text>
  <text x="530" y="356" fill="#87867F" font-size="11px">医疗 / 法律 / 金融</text>
  <text x="530" y="372" fill="#D97757" font-size="11px" font-weight="600">人在回路强制要求</text>

  <line x1="530" y1="392" x2="740" y2="392" stroke="#2a2a2a" stroke-width="1"/>

  <text x="530" y="418" fill="#E3DACC" font-size="12px" font-weight="600">历史在押韵</text>
  <text x="530" y="436" fill="#87867F" font-size="11px">机械故障 → 软件Bug</text>
  <text x="530" y="452" fill="#87867F" font-size="11px">→ AI 幻觉</text>
  <text x="530" y="470" fill="#87867F" font-size="11px">每一次范式都有</text>
  <text x="530" y="486" fill="#87867F" font-size="11px">新的"不可避免的错误"</text>

  <!-- Arrows between layers -->
  <text x="750" y="200" fill="#788C5D" font-size="20px" font-weight="bold">①</text>
  <text x="750" y="340" fill="#D97757" font-size="20px" font-weight="bold">②</text>
  <text x="750" y="430" fill="#87867F" font-size="20px" font-weight="bold">③</text>

  <text x="530" y="504" fill="#87867F" font-size="10px">Source: 2025-03-31 AI Hallucination Governance</text>
</svg>