<svg xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif" viewBox="0 0 800 560"><defs><style>.text-primary{fill:#141413;font-size:13px;font-weight:600}.text-secondary{fill:#87867f;font-size:11px}</style></defs><path d="M0 0h800v560H0z" style="fill:#faf9f5"/><text x="40" y="36" class="text-primary" font-size="15">AI 幻觉三层防御体系</text><text x="40" y="52" class="text-secondary">Three-Layer Defense System Against AI Hallucination</text><rect width="440" height="430" x="40" y="80" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="12"/><rect width="400" height="390" x="60" y="100" fill="#faf9f5" stroke="#d1cfc5" rx="10"/><text x="80" y="128" class="text-primary" font-size="13">第三层 · 恢复 Recovery</text><text x="80" y="144" class="text-secondary">目标：幻觉发生时最小化损失</text><rect width="360" height="56" x="80" y="160" fill="#e3dacc" stroke="#d1cfc5" stroke-width=".8" rx="6"/><text x="96" y="180" fill="#141413" font-size="12" font-weight="600">人在回路</text><text x="96" y="196" fill="#87867f" font-size="11">高风险场景必须人工确认，建立快速升级机制</text><rect width="360" height="56" x="80" y="224" fill="#e3dacc" stroke="#d1cfc5" stroke-width=".8" rx="6"/><text x="96" y="244" fill="#141413" font-size="12" font-weight="600">影响隔离</text><text x="96" y="260" fill="#87867f" font-size="11">限制单次AI调用的影响范围，关键操作需多重确认</text><rect width="360" height="56" x="80" y="288" fill="#e3dacc" stroke="#d1cfc5" stroke-width=".8" rx="6"/><text x="96" y="308" fill="#141413" font-size="12" font-weight="600">快速回滚</text><text x="96" y="324" fill="#87867f" font-size="11">撤销AI的建议/操作，建立审计日志追溯问题</text><rect width="360" height="56" x="80" y="352" fill="#e3dacc" stroke="#d1cfc5" stroke-width=".8" rx="6"/><text x="96" y="372" fill="#141413" font-size="12" font-weight="600">持续学习</text><text x="96" y="388" fill="#87867f" font-size="11">从幻觉事件中学习，更新知识库和Prompt</text><rect width="400" height="390" x="60" y="100" fill="#faf9f5" stroke="#d1cfc5" rx="10"/><rect width="360" height="350" x="80" y="120" fill="#faf9f5" stroke="#87867f" stroke-width=".8" rx="8"/><text x="100" y="148" class="text-primary" font-size="13">第二层 · 检测 Detection</text><text x="100" y="164" class="text-secondary">目标：快速发现幻觉</text><rect width="320" height="48" x="100" y="180" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="116" y="200" fill="#d97757" font-size="12" font-weight="700">自一致性检查</text><text x="116" y="214" fill="#87867f" font-size="10">用不同方式问同一问题，检查答案是否一致</text><rect width="320" height="48" x="100" y="236" fill="#faf9f5" stroke="#d97757" rx="6"/><text x="116" y="256" fill="#d97757" font-size="12" font-weight="700">事实核查</text><text x="116" y="270" fill="#87867f" font-size="10">对关键事实进行外部验证，使用专门核查API</text><rect width="320" height="48" x="100" y="292" fill="#faf9f5" stroke="#d97757" rx="6"/><text x="116" y="312" fill="#d97757" font-size="12" font-weight="700">置信度评估</text><text x="116" y="326" fill="#87867f" font-size="10">训练模型评估自身置信度，低置信度标记人工审核</text><rect width="320" height="48" x="100" y="348" fill="#faf9f5" stroke="#d97757" rx="6"/><text x="116" y="368" fill="#d97757" font-size="12" font-weight="700">异常检测</text><text x="116" y="382" fill="#87867f" font-size="10">监控AI回答的&quot;奇怪程度&quot;，统计学方法检测离群</text><rect width="320" height="216" x="100" y="180" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="120" y="208" fill="#788c5d" font-size="13" font-weight="700">第一层 · 预防 Prevention</text><text x="120" y="224" fill="#87867f" font-size="11">目标：减少幻觉发生的可能性</text><rect width="280" height="40" x="120" y="240" fill="#e3dacc" stroke="#788c5d" rx="5"/><text x="136" y="259" fill="#141413" font-size="12" font-weight="600">RAG 检索增强生成</text><text x="136" y="271" fill="#87867f" font-size="10">基于可信知识库生成，而非凭空生成</text><rect width="280" height="40" x="120" y="288" fill="#e3dacc" stroke="#788c5d" rx="5"/><text x="136" y="307" fill="#141413" font-size="12" font-weight="600">Few-shot 示例引导</text><text x="136" y="319" fill="#87867f" font-size="10">提供高质量输入输出示例，引导正确回答模式</text><rect width="280" height="40" x="120" y="336" fill="#e3dacc" stroke="#788c5d" rx="5"/><text x="136" y="355" fill="#141413" font-size="12" font-weight="600">Prompt 工程</text><text x="136" y="367" fill="#87867f" font-size="10">明确要求&quot;不知道时说不知道&quot;，要求引用来源</text><rect width="250" height="430" x="510" y="80" fill="#141413" rx="12"/><text x="530" y="116" fill="#faf9f5" font-size="14" font-weight="700">核心洞察</text><path stroke="#d97757" stroke-width="2" d="M530 130h210"/><text x="530" y="160" fill="#d97757" font-size="12" font-weight="600">幻觉不是 Bug</text><text x="530" y="160" fill="#d97757" font-size="12" font-weight="600">是 Feature</text><text x="530" y="160" fill="#d97757" font-size="12" font-weight="600">是 Feature</text><text x="530" y="180" fill="#87867f" font-size="11">幻觉率 3-8%</text><text x="530" y="196" fill="#87867f" font-size="11">百万次/天 =</text><text x="530" y="212" fill="#d97757" font-size="14" font-weight="700">3-8万次严重错误</text><path stroke="#2a2a2a" d="M530 232h210"/><text x="530" y="258" fill="#e3dacc" font-size="12" font-weight="600">三层防御缺一不可</text><text x="530" y="276" fill="#87867f" font-size="11">预防 → 检测 → 恢复</text><text x="530" y="292" fill="#87867f" font-size="11">层层递进，协同作战</text><path stroke="#2a2a2a" d="M530 312h210"/><text x="530" y="338" fill="#e3dacc" font-size="12" font-weight="600">高风险领域</text><text x="530" y="356" fill="#87867f" font-size="11">医疗 / 法律 / 金融</text><text x="530" y="372" fill="#d97757" font-size="11" font-weight="600">人在回路强制要求</text><path stroke="#2a2a2a" d="M530 392h210"/><text x="530" y="418" fill="#e3dacc" font-size="12" font-weight="600">历史在押韵</text><text x="530" y="436" fill="#87867f" font-size="11">机械故障 → 软件Bug</text><text x="530" y="452" fill="#87867f" font-size="11">→ AI 幻觉</text><text x="530" y="470" fill="#87867f" font-size="11">每一次范式都有</text><text x="530" y="486" fill="#87867f" font-size="11">新的&quot;不可避免的错误&quot;</text><text x="750" y="200" fill="#788c5d" font-size="20" font-weight="bold">①</text><text x="750" y="340" fill="#d97757" font-size="20" font-weight="bold">②</text><text x="750" y="430" fill="#87867f" font-size="20" font-weight="bold">③</text><text x="530" y="504" fill="#87867f" font-size="10">Source: 2025-03-31 AI Hallucination Governance</text></svg>