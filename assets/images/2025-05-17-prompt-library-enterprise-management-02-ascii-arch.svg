<svg xmlns="http://www.w3.org/2000/svg" aria-label="Prompt代码审查流程图" viewBox="0 0 520 420"><title>Prompt代码审查流程</title><desc>展示Prompt代码审查的完整流程：开发者提交 → 自动化检查 → 同行审查 → 效果测试 → 合并主分支 → 发布到Prompt库</desc><defs><marker id="arrowDown" markerHeight="8" markerWidth="8" orient="auto" refX="3" refY="6"><path fill="#87867f" d="M0 0h6L3 8z"/></marker></defs><rect width="520" height="420" fill="#faf9f5" rx="8"/><rect width="520" height="36" fill="#141413" rx="8"/><path fill="#141413" d="M0 20h520v16H0z"/><text x="260" y="23" fill="#faf9f5" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">审查流程</text><rect width="460" height="40" x="30" y="52" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="260" y="76" fill="#141413" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">开发者提交新Prompt</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrowDown)" d="M260 92v18"/><text x="272" y="103" fill="#87867f" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="11">↓</text><rect width="460" height="40" x="30" y="112" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="260" y="136" fill="#141413" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">自动化检查（格式、安全扫描）</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrowDown)" d="M260 152v18"/><text x="272" y="163" fill="#87867f" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="11">↓</text><rect width="460" height="40" x="30" y="172" fill="#d97757" fill-opacity=".15" stroke="#d97757" stroke-width="2" rx="6"/><text x="260" y="196" fill="#d97757" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">同行审查（Prompt工程师）</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrowDown)" d="M260 212v18"/><text x="272" y="223" fill="#87867f" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="11">↓</text><rect width="460" height="40" x="30" y="232" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="260" y="256" fill="#141413" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">效果测试（A/B测试）</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrowDown)" d="M260 272v18"/><text x="272" y="283" fill="#87867f" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="11">↓</text><rect width="460" height="40" x="30" y="292" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="260" y="316" fill="#141413" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">合并到主分支</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrowDown)" d="M260 332v18"/><text x="272" y="343" fill="#87867f" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="11">↓</text><rect width="460" height="40" x="30" y="352" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" stroke-width="2" rx="6"/><text x="260" y="376" fill="#788c5d" dominant-baseline="middle" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">发布到Prompt库</text></svg>