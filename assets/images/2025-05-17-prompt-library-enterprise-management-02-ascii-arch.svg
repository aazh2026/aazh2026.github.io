<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="Prompt代码审查流程图">
  <title>Prompt代码审查流程</title>
  <desc>展示Prompt代码审查的完整流程：开发者提交 → 自动化检查 → 同行审查 → 效果测试 → 合并主分支 → 发布到Prompt库</desc>

  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
    <!-- Down arrow marker -->
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="420" fill="#FAF9F5" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="520" height="36" fill="#141413" rx="8"/>
  <rect x="0" y="20" width="520" height="16" fill="#141413"/>
  <text x="260" y="23" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#FAF9F5" text-anchor="middle" dominant-baseline="middle">审查流程</text>

  <!-- Step boxes -->
  <!-- Step 1: 开发者提交新Prompt -->
  <rect x="30" y="52" width="460" height="40" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="260" y="76" font-family="'Courier New', monospace" font-size="13" fill="#141413" text-anchor="middle" dominant-baseline="middle">开发者提交新Prompt</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="92" x2="260" y2="110" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="272" y="103" font-family="'Courier New', monospace" font-size="11" fill="#87867F" dominant-baseline="middle">↓</text>

  <!-- Step 2: 自动化检查（格式、安全扫描） -->
  <rect x="30" y="112" width="460" height="40" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="260" y="136" font-family="'Courier New', monospace" font-size="13" fill="#141413" text-anchor="middle" dominant-baseline="middle">自动化检查（格式、安全扫描）</text>

  <!-- Arrow 2 -->
  <line x1="260" y1="152" x2="260" y2="170" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="272" y="163" font-family="'Courier New', monospace" font-size="11" fill="#87867F" dominant-baseline="middle">↓</text>

  <!-- Step 3: 同行审查（Prompt工程师） - highlighted -->
  <rect x="30" y="172" width="460" height="40" rx="6" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="2"/>
  <text x="260" y="196" font-family="'Courier New', monospace" font-size="13" fill="#D97757" text-anchor="middle" dominant-baseline="middle">同行审查（Prompt工程师）</text>

  <!-- Arrow 3 -->
  <line x1="260" y1="212" x2="260" y2="230" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="272" y="223" font-family="'Courier New', monospace" font-size="11" fill="#87867F" dominant-baseline="middle">↓</text>

  <!-- Step 4: 效果测试（A/B测试） -->
  <rect x="30" y="232" width="460" height="40" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="260" y="256" font-family="'Courier New', monospace" font-size="13" fill="#141413" text-anchor="middle" dominant-baseline="middle">效果测试（A/B测试）</text>

  <!-- Arrow 4 -->
  <line x1="260" y1="272" x2="260" y2="290" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="272" y="283" font-family="'Courier New', monospace" font-size="11" fill="#87867F" dominant-baseline="middle">↓</text>

  <!-- Step 5: 合并到主分支 -->
  <rect x="30" y="292" width="460" height="40" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="260" y="316" font-family="'Courier New', monospace" font-size="13" fill="#141413" text-anchor="middle" dominant-baseline="middle">合并到主分支</text>

  <!-- Arrow 5 -->
  <line x1="260" y1="332" x2="260" y2="350" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="272" y="343" font-family="'Courier New', monospace" font-size="11" fill="#87867F" dominant-baseline="middle">↓</text>

  <!-- Step 6: 发布到Prompt库 - highlighted with olive -->
  <rect x="30" y="352" width="460" height="40" rx="6" fill="#788C5D" fill-opacity="0.15" stroke="#788C5D" stroke-width="2"/>
  <text x="260" y="376" font-family="'Courier New', monospace" font-size="13" fill="#788C5D" text-anchor="middle" dominant-baseline="middle">发布到Prompt库</text>
</svg>