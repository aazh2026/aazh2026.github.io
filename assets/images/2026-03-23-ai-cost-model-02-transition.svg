<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 300">
  <title>AI成本模型转变：从单价驱动到架构驱动</title>
  <desc>
    对比旧模型（单价驱动）与新模型（架构驱动），展示2023到2026年AI成本结构的变化
  </desc>
  <path fill="#faf9f5" d="M0 0h680v300H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">成本模型转变：单价驱动 → 架构驱动</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">2023 → 2026</text>
  <rect width="260" height="210" x="40" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="170" y="82" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">旧模型：单价驱动</text>
  <text x="170" y="98" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">2023</text>
  <rect width="120" height="120" x="110" y="115" fill="#d97757" opacity=".85" rx="4"/>
  <text x="170" y="165" fill="#fff" font-size="11" font-weight="500" text-anchor="middle">Token单价</text>
  <text x="170" y="180" fill="#fff" font-size="10" opacity=".8" text-anchor="middle">占成本主体</text>
  <path stroke="#d1cfc5" d="M60 235h220"/>
  <text x="170" y="250" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">时间</text>
  <text x="170" y="268" fill="#141413" font-size="9.5" text-anchor="middle">单价是瓶颈</text>
  <path stroke="#d97757" stroke-dasharray="5,4" stroke-width="2" d="M310 160h60"/>
  <path fill="#d97757" d="m370 160-8-6v12z"/>
  <text x="340" y="150" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">单价↓</text>
  <text x="340" y="182" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">但架构成本↑</text>
  <rect width="260" height="210" x="380" y="60" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="510" y="82" fill="#d97757" font-size="12" font-weight="600" text-anchor="middle">新模型：架构驱动</text>
  <text x="510" y="98" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">2026</text>
  <rect width="220" height="30" x="400" y="115" fill="#141413" rx="3"/>
  <text x="510" y="134" fill="#fff" font-size="10" font-weight="500" text-anchor="middle">架构设计（固定成本）</text>
  <rect width="220" height="35" x="400" y="148" fill="#d97757" opacity=".8" rx="3"/>
  <text x="510" y="170" fill="#fff" font-size="10" font-weight="500" text-anchor="middle">API调用（变量成本）</text>
  <rect width="220" height="30" x="400" y="186" fill="#87867f" opacity=".7" rx="3"/>
  <text x="510" y="205" fill="#fff" font-size="10" font-weight="500" text-anchor="middle">认知债务/维护（Overhead）</text>
  <path stroke="#d1cfc5" d="M400 235h220"/>
  <text x="510" y="250" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">时间 →</text>
  <text x="510" y="268" fill="#141413" font-size="9.5" text-anchor="middle">架构成本成为主要来源</text>
  <path stroke="#d1cfc5" d="M40 282h600"/>
  <text x="340" y="296" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">关键差异：成本从&quot;变量成本&quot;变成了&quot;结构性成本&quot;</text>
</svg>
