<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>AI成本模型转变：从单价驱动到架构驱动</title>
  <desc>对比旧模型（单价驱动）与新模型（架构驱动），展示2023到2026年AI成本结构的变化</desc>

  <!-- Background -->
  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">成本模型转变：单价驱动 → 架构驱动</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">2023 → 2026</text>

  <!-- Left panel: 旧模型 -->
  <rect x="40" y="60" width="260" height="210" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="170" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">旧模型：单价驱动</text>
  <text x="170" y="98" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">2023</text>

  <!-- Single tall bar (token price) -->
  <rect x="110" y="115" width="120" height="120" rx="4" fill="#D97757" opacity="0.85"/>
  <text x="170" y="165" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="500">Token单价</text>
  <text x="170" y="180" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.8">占成本主体</text>

  <!-- X-axis label -->
  <line x1="60" y1="235" x2="280" y2="235" stroke="#D1CFC5" stroke-width="1"/>
  <text x="170" y="250" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">时间</text>

  <!-- Caption -->
  <text x="170" y="268" text-anchor="middle" font-size="9.5" fill="#141413">单价是瓶颈</text>

  <!-- Arrow between panels -->
  <line x1="310" y1="160" x2="370" y2="160" stroke="#D97757" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="370,160 362,154 362,166" fill="#D97757"/>
  <text x="340" y="150" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">单价↓</text>
  <text x="340" y="182" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">但架构成本↑</text>

  <!-- Right panel: 新模型 -->
  <rect x="380" y="60" width="260" height="210" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="510" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">新模型：架构驱动</text>
  <text x="510" y="98" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">2026</text>

  <!-- Stacked bars: 架构设计 (fixed), API调用 (variable), 认知债务 (overhead) -->
  <!-- 架构设计 (fixed cost) -->
  <rect x="400" y="115" width="220" height="30" rx="3" fill="#141413"/>
  <text x="510" y="134" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="500">架构设计（固定成本）</text>

  <!-- API调用 (variable cost) -->
  <rect x="400" y="148" width="220" height="35" rx="3" fill="#D97757" opacity="0.8"/>
  <text x="510" y="170" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="500">API调用（变量成本）</text>

  <!-- 认知债务/维护 (overhead) -->
  <rect x="400" y="186" width="220" height="30" rx="3" fill="#87867F" opacity="0.7"/>
  <text x="510" y="205" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="500">认知债务/维护（Overhead）</text>

  <!-- X-axis label -->
  <line x1="400" y1="235" x2="620" y2="235" stroke="#D1CFC5" stroke-width="1"/>
  <text x="510" y="250" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">时间 →</text>

  <!-- Caption -->
  <text x="510" y="268" text-anchor="middle" font-size="9.5" fill="#141413">架构成本成为主要来源</text>

  <!-- Bottom note -->
  <line x1="40" y1="282" x2="640" y2="282" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="296" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">关键差异：成本从"变量成本"变成了"结构性成本"</text>
</svg>