<svg viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 软件分层架构 -->
  <rect width="560" height="260" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">软件分层架构演进</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- L7: Application -->
  <rect x="40" y="50" width="480" height="28" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-width="2"/>
  <rect x="40" y="50" width="480" height="14" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="60" y="63" font-size="9" fill="#DC2626" font-family="ui-monospace, monospace" font-weight="600">L7</text>
  <text x="80" y="63" font-size="10.5" fill="#141413" font-weight="600">应用层 Application</text>
  <text x="240" y="63" font-size="9" fill="#87867F">HTTP · FTP · SMTP</text>
  <rect x="490" y="58" width="16" height="12" rx="6" fill="#DC2626"/>
  <text x="498" y="67" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">L7</text>

  <!-- L6: Presentation -->
  <rect x="40" y="78" width="480" height="28" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="78" width="480" height="14" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="91" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L6</text>
  <text x="80" y="91" font-size="10.5" fill="#141413" font-weight="600">表示层 Presentation</text>
  <text x="240" y="91" font-size="9" fill="#87867F">TLS · ASCII · JSON · XML</text>

  <!-- L5: Session -->
  <rect x="40" y="106" width="480" height="26" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="40" y="106" width="480" height="13" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="60" y="118" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">L5</text>
  <text x="80" y="118" font-size="10.5" fill="#141413" font-weight="600">会话层 Session</text>
  <text x="220" y="118" font-size="9" fill="#87867F">RPC · WebSocket · SSH</text>

  <!-- L4: Transport -->
  <rect x="40" y="132" width="480" height="26" rx="6" fill="#FFFFFF" stroke="#F97316" stroke-width="1.5"/>
  <rect x="40" y="132" width="480" height="13" rx="6" fill="#FDBA74" stroke="#F97316" stroke-width="1"/>
  <text x="60" y="144" font-size="9" fill="#F97316" font-family="ui-monospace, monospace" font-weight="600">L4</text>
  <text x="80" y="144" font-size="10.5" fill="#141413" font-weight="600">传输层 Transport</text>
  <text x="220" y="144" font-size="9" fill="#87867F">TCP · UDP</text>

  <!-- L3: Network -->
  <rect x="40" y="158" width="480" height="26" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="158" width="480" height="13" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="170" font-size="9" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L3</text>
  <text x="80" y="170" font-size="10.5" fill="#141413" font-weight="600">网络层 Network</text>
  <text x="220" y="170" font-size="9" fill="#87867F">IP · ICMP · BGP</text>

  <!-- L2: Data Link -->
  <rect x="40" y="184" width="480" height="26" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="40" y="184" width="480" height="13" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="60" y="196" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L2</text>
  <text x="80" y="196" font-size="10.5" fill="#141413" font-weight="600">数据链路层 Data Link</text>
  <text x="260" y="196" font-size="9" fill="#87867F">Ethernet · ARP · PPP</text>

  <!-- L1: Physical -->
  <rect x="40" y="210" width="480" height="22" rx="5" fill="#FFFFFF" stroke="#87867F" stroke-width="1"/>
  <text x="60" y="224" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">L1 · Physical</text>
  <text x="160" y="224" font-size="10" fill="#141413">物理层：电信号 · 光信号 · 比特</text>

  <text x="280" y="248" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">OSI 七层模型：每层只关心自己的职责，依赖下层服务</text>
</svg>