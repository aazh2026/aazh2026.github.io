<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">跨会话一致性的三个层面</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">AI-Native Engineering · 2025/01/12</text>

  <!-- Card 1: 身份一致性 -->
  <rect x="60" y="62" width="480" height="86" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="60" y="62" width="480" height="30" rx="8" fill="#D97757"/>
  <rect x="60" y="80" width="480" height="12" fill="#D97757"/> <!-- square bottom of header -->
  <text x="78" y="82" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">身份一致性</text>
  <text x="78" y="110" font-size="12.5" fill="#141413">用户是谁 — 偏好、历史、关系</text>
  <text x="78" y="128" font-size="11" fill="#87867F">Agent 知道「我是年费会员，经常遇到登录问题」</text>

  <!-- Card 2: 知识一致性 -->
  <rect x="60" y="160" width="480" height="86" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="60" y="160" width="480" height="30" rx="8" fill="#788C5D"/>
  <rect x="60" y="178" width="480" height="12" fill="#788C5D"/>
  <text x="78" y="182" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">知识一致性</text>
  <text x="78" y="210" font-size="12.5" fill="#141413">已经告诉 Agent 的事实与双方达成的共识</text>
  <text x="78" y="228" font-size="11" fill="#87867F">Agent 知道「用户曾提到把配色从蓝色改为绿色」</text>

  <!-- Card 3: 上下文一致性 -->
  <rect x="60" y="258" width="480" height="86" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="60" y="258" width="480" height="30" rx="8" fill="#87867F"/>
  <rect x="60" y="276" width="480" height="12" fill="#87867F"/>
  <text x="78" y="280" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">上下文一致性</text>
  <text x="78" y="308" font-size="12.5" fill="#141413">当前任务进度、之前决策的理由、待办事项</text>
  <text x="78" y="326" font-size="11" fill="#87867F">Agent 知道「上次讨论了方案修改，上周说想改蓝色配色」</text>

  <!-- Interconnection arrows (right side) -->
  <path d="M 552 90 C 566 90, 566 120, 552 120" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.7"/>
  <path d="M 552 188 C 566 188, 566 218, 552 218" stroke="#788C5D" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.7"/>
  <polygon points="552,120 546,112 558,112" fill="#D97757" opacity="0.7"/>
  <polygon points="552,218 546,210 558,210" fill="#788C5D" opacity="0.7"/>

  <!-- Source caption -->
  <text x="300" y="376" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">来源：AI-Native Engineering 系列</text>
</svg>