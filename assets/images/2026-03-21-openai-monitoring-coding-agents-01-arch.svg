<svg xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" viewBox="0 0 780 360"><defs><style>.border{fill:none;stroke:#d1cfc5;stroke-width:1.5}.row-bg{fill:#faf9f5}.accent-bar{fill:#d97757}.output-item,.row-item{fill:#87867f;font-size:12px}</style></defs><rect width="780" height="360" rx="6" style="fill:#faf9f5"/><rect width="740" height="320" x="20" y="20" rx="6" style="fill:none;stroke:#d1cfc5;stroke-width:2"/><rect width="740" height="84" x="20" y="20" rx="0" style="fill:#e3dacc"/><path d="M20 20h740v3H20z" class="accent-bar"/><text x="40" y="50" style="fill:#141413;font-size:12.5px;font-weight:700">监控层：GPT-5.4 Thinking (最大推理强度)</text><path d="M20 104h740" class="border"/><text x="52" y="130" class="row-item">• 审查完整对话历史</text><text x="52" y="155" class="row-item">• 分析思维链 (Chain of Thought)</text><text x="52" y="180" class="row-item">• 检测工具调用和输出</text><rect width="740" height="84" x="20" y="195" class="row-bg" rx="0"/><path d="M20 195h3v84h-3z" class="accent-bar"/><path d="M20 195h740" class="border"/><text x="40" y="219" style="fill:#141413;font-size:12.5px;font-weight:600">数据输入：编程 Agent 会话</text><text x="52" y="243" class="row-item">• 用户消息</text><text x="52" y="261" class="row-item">• 开发者消息</text><text x="240" y="243" class="row-item">• 助手消息（包括思维链）</text><text x="240" y="261" class="row-item">• 工具调用和输出</text><path d="M20 279h740" class="border"/><rect width="740" height="61" x="20" y="279" class="row-bg" rx="0"/><path fill="#788c5d" d="M20 279h3v61h-3z"/><path d="M20 279h740" class="border"/><text x="40" y="300" style="fill:#788c5d;font-size:12.5px;font-weight:700">输出：分类与警报</text><text x="52" y="320" class="output-item">• 严重程度分级</text><text x="240" y="320" class="output-item">• 人工审查队列</text><text x="440" y="320" class="output-item">• 自动通知安全团队</text></svg>