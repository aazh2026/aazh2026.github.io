<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .border { fill: none; stroke: #D1CFC5; stroke-width: 1.5; }
      .border-thick { fill: none; stroke: #D1CFC5; stroke-width: 2; }
      .header-bg { fill: #E3DACC; }
      .row-bg { fill: #FAF9F5; }
      .accent-bar { fill: #D97757; }
      .title-text { fill: #141413; font-size: 13px; font-weight: 700; }
      .header-text { fill: #141413; font-size: 12.5px; font-weight: 700; }
      .row-title { fill: #141413; font-size: 12.5px; font-weight: 600; }
      .row-item { fill: #87867F; font-size: 12px; }
      .output-title { fill: #788C5D; font-size: 12.5px; font-weight: 700; }
      .output-item { fill: #87867F; font-size: 12px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="360" class="bg" rx="6"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="740" height="320" rx="6" class="border-thick"/>

  <!-- ===== Layer 1: 监控层 ===== -->
  <!-- Header background with accent bar -->
  <rect x="20" y="20" width="740" height="84" rx="0" class="header-bg"/>
  <rect x="20" y="20" width="740" height="3" class="accent-bar"/>

  <!-- Row title -->
  <text x="40" y="50" class="header-text">监控层：GPT-5.4 Thinking (最大推理强度)</text>

  <!-- Divider line after header -->
  <line x1="20" y1="104" x2="760" y2="104" class="border"/>

  <!-- Bullet items -->
  <text x="52" y="130" class="row-item">• 审查完整对话历史</text>
  <text x="52" y="155" class="row-item">• 分析思维链 (Chain of Thought)</text>
  <text x="52" y="180" class="row-item">• 检测工具调用和输出</text>

  <!-- ===== Layer 2: 数据输入 ===== -->
  <!-- Row background -->
  <rect x="20" y="195" width="740" height="84" rx="0" class="row-bg"/>

  <!-- Left accent bar -->
  <rect x="20" y="195" width="3" height="84" class="accent-bar"/>

  <!-- Separator line top -->
  <line x1="20" y1="195" x2="760" y2="195" class="border"/>

  <!-- Row title -->
  <text x="40" y="219" class="row-title">数据输入：编程 Agent 会话</text>

  <!-- Bullet items -->
  <text x="52" y="243" class="row-item">• 用户消息</text>
  <text x="52" y="261" class="row-item">• 开发者消息</text>
  <text x="240" y="243" class="row-item">• 助手消息（包括思维链）</text>
  <text x="240" y="261" class="row-item">• 工具调用和输出</text>

  <!-- Separator line bottom -->
  <line x1="20" y1="279" x2="760" y2="279" class="border"/>

  <!-- ===== Layer 3: 输出 ===== -->
  <!-- Row background -->
  <rect x="20" y="279" width="740" height="61" rx="0" class="row-bg"/>

  <!-- Left accent bar (olive) -->
  <rect x="20" y="279" width="3" height="61" fill="#788C5D"/>

  <!-- Separator line top -->
  <line x1="20" y1="279" x2="760" y2="279" class="border"/>

  <!-- Row title -->
  <text x="40" y="300" class="output-title">输出：分类与警报</text>

  <!-- Bullet items -->
  <text x="52" y="320" class="output-item">• 严重程度分级</text>
  <text x="240" y="320" class="output-item">• 人工审查队列</text>
  <text x="440" y="320" class="output-item">• 自动通知安全团队</text>
</svg>
