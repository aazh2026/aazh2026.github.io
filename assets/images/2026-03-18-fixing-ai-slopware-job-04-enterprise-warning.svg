<svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Visual divider: 企业警示 成本对比 -->
  <rect width="600" height="140" fill="#FAF9F5"/>

  <!-- Left card: short-term savings (dashed) -->
  <rect x="60" y="20" width="200" height="100" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="160" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">短期思维</text>
  <text x="160" y="62" text-anchor="middle" font-size="10" fill="#87867F">AI + 初级开发者</text>
  <text x="160" y="80" text-anchor="middle" font-size="20" font-weight="600" fill="#D97757">$50K/月</text>
  <text x="160" y="98" text-anchor="middle" font-size="9" fill="#D97757">看似节约</text>

  <!-- Cost arrow -->
  <line x1="265" y1="70" x2="295" y2="70" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="295,66 303,70 295,74" fill="#D1CFC5"/>
  <text x="280" y="62" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">+cleanup</text>

  <!-- Right card: long-term true cost (solid, emphasized) -->
  <rect x="300" y="20" width="200" height="100" rx="6" fill="#FFFFFF" stroke="#141413" stroke-width="2"/>
  <text x="400" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">长期实际成本</text>
  <text x="400" y="62" text-anchor="middle" font-size="10" fill="#87867F">AI + 初级 + cleanup</text>
  <text x="400" y="80" text-anchor="middle" font-size="20" font-weight="600" fill="#141413">$750K+</text>
  <text x="400" y="98" text-anchor="middle" font-size="9" fill="#141413">质量妥协的代价</text>

  <!-- VS label -->
  <text x="300" y="24" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">6个月总成本对比</text>
</svg>