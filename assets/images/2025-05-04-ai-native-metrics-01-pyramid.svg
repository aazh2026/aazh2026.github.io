<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- AI-Native 效能度量金字塔 -->
  <rect width="560" height="280" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI-Native 效能度量金字塔</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/04</text>

  <!-- Pyramid layers: M1 at top (smallest), M5 at bottom (largest) -->

  <!-- M1: Business Value (top, smallest, most important) -->
  <polygon points="280,50 230,90 330,90" fill="#FEF3C7" stroke="#D97757" stroke-width="2"/>
  <text x="280" y="72" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">M1 · 业务价值</text>
  <text x="280" y="83" text-anchor="middle" font-size="9" fill="#87867F">收入 · 用户满意度</text>

  <!-- M2: Intent Achievement -->
  <polygon points="230,94 210,130 350,130 330,94" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="280" y="114" text-anchor="middle" font-size="10" fill="#EA580C" font-weight="600">M2 · 意图达成</text>
  <text x="280" y="126" text-anchor="middle" font-size="9" fill="#87867F">需求完成度 · 意图保真度</text>

  <!-- M3: Modification Capability -->
  <polygon points="210,134 190,170 370,170 350,134" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="280" y="154" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="600">M3 · 修改能力</text>
  <text x="280" y="166" text-anchor="middle" font-size="9" fill="#87867F">意图修改率 · 重构成本</text>

  <!-- M4: Delivery Efficiency -->
  <polygon points="190,174 170,210 390,210 370,174" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="280" y="194" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="600">M4 · 交付效率</text>
  <text x="280" y="206" text-anchor="middle" font-size="9" fill="#87867F">部署频率 · 前置时间</text>

  <!-- M5: Intent Complexity (bottom, largest, foundation) -->
  <polygon points="170,214 150,254 410,254 390,214" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="280" y="230" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">M5 · 意图复杂度</text>
  <text x="280" y="244" text-anchor="middle" font-size="9" fill="#141413">ICQ 四维度</text>
  <text x="280" y="255" text-anchor="middle" font-size="8.5" fill="#87867F">最底层基础指标</text>

  <!-- Left side: traditional metrics (shadow) -->
  <text x="60" y="100" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">传统指标</text>
  <text x="60" y="114" font-size="9" fill="#87867F">→ LOC</text>
  <text x="60" y="128" font-size="9" fill="#87867F">→velocity</text>
  <text x="60" y="142" font-size="9" fill="#87867F">→代码行数</text>
  <text x="60" y="156" font-size="9" fill="#87867F">→Bug数</text>

  <!-- Right side: AI-Native metrics -->
  <text x="500" y="100" font-size="9" fill="#059669" font-family="ui-monospace, monospace">AI-Native</text>
  <text x="500" y="114" font-size="9" fill="#059669">→业务价值</text>
  <text x="500" y="128" font-size="9" fill="#059669">→意图达成</text>
  <text x="500" y="142" font-size="9" fill="#059669">→修改能力</text>
  <text x="500" y="156" font-size="9" fill="#059669">→交付效率</text>
  <text x="500" y="170" font-size="9" fill="#059669">→意图复杂度</text>

  <!-- Arrow: traditional → AI-Native -->
  <line x1="100" y1="136" x2="440" y2="136" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="440,132 434,136 440,140" fill="#D1CFC5"/>
  <text x="270" y="130" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">演进方向</text>
</svg>