<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-primary { fill: #141413; font-size: 13px; font-weight: 600; }
      .text-secondary { fill: #87867F; font-size: 11px; }
      .text-light { fill: #FAF9F5; font-size: 12px; font-weight: 600; }
    </style>
  </defs>
  <rect width="800" height="540" class="bg"/>

  <!-- Title -->
  <text x="40" y="36" class="text-primary" font-size="15px">数据-模型-应用飞轮效应</text>
  <text x="40" y="52" class="text-secondary">Data-Model-Application Flywheel: The Self-Reinforcing Loop</text>

  <!-- Flywheel: circular flow, 5 nodes -->
  <!-- Center: High Quality Data -->
  <!-- Node positions around circle center 400,270 radius 170 -->
  <!-- Angles: -90° (top), -18° (tr), 54° (br), 126° (bl), 198° (tl) -->

  <!-- Connecting arrows (curved) -->
  <!-- Top to TR: arc from (400,100) to (560,208) -->
  <path d="M 400,100 Q 500,100 560,208" stroke="#D97757" stroke-width="2.5" fill="none"/>
  <polygon points="560,208 552,200 564,206" fill="#D97757"/>

  <!-- TR to BR -->
  <path d="M 560,332 Q 560,420 440,450" stroke="#D97757" stroke-width="2.5" fill="none"/>
  <polygon points="440,450 442,440 450,452" fill="#D97757"/>

  <!-- BR to BL -->
  <path d="M 240,450 Q 160,420 160,332" stroke="#D97757" stroke-width="2.5" fill="none"/>
  <polygon points="160,332 168,338 162,350" fill="#D97757"/>

  <!-- BL to TL -->
  <path d="M 160,208 Q 160,120 280,100" stroke="#D97757" stroke-width="2.5" fill="none"/>
  <polygon points="280,100 272,108 278,116" fill="#D97757"/>

  <!-- TL to Top (closing) -->
  <path d="M 360,105 Q 380,90 400,100" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="400,100 395,108 404,108" fill="#D97757"/>

  <!-- Node 1: High Quality Data (top center) -->
  <rect x="320" y="68" width="160" height="60" rx="10" fill="#D97757"/>
  <text x="400" y="93" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">高质量数据</text>
  <text x="400" y="110" fill="#FAF9F5" font-size="11px" text-anchor="middle">High Quality Data</text>
  <text x="400" y="126" fill="#FAF9F5" font-size="10px" text-anchor="middle">数据质量决定模型上限</text>

  <!-- Node 2: Better Model (top right) -->
  <rect x="530" y="200" width="160" height="60" rx="10" fill="#141413" stroke="#D1CFC5" stroke-width="1"/>
  <text x="610" y="225" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">更好的模型</text>
  <text x="610" y="242" fill="#87867F" font-size="11px" text-anchor="middle">Better Model</text>
  <text x="610" y="258" fill="#87867F" font-size="10px" text-anchor="middle">模型表现决定用户体验</text>

  <!-- Node 3: Better UX (bottom right) -->
  <rect x="530" y="340" width="160" height="60" rx="10" fill="#141413" stroke="#D1CFC5" stroke-width="1"/>
  <text x="610" y="365" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">更好的体验</text>
  <text x="610" y="382" fill="#87867F" font-size="11px" text-anchor="middle">Better UX</text>
  <text x="610" y="398" fill="#87867F" font-size="10px" text-anchor="middle">好体验带来高频使用</text>

  <!-- Node 4: More Data (bottom left) -->
  <rect x="110" y="340" width="160" height="60" rx="10" fill="#141413" stroke="#D1CFC5" stroke-width="1"/>
  <text x="190" y="365" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">更多行为数据</text>
  <text x="190" y="382" fill="#87867F" font-size="11px" text-anchor="middle">More User Data</text>
  <text x="190" y="398" fill="#87867F" font-size="10px" text-anchor="middle">使用越多，数据越多</text>

  <!-- Node 5: More Engagement (top left) -->
  <rect x="110" y="200" width="160" height="60" rx="10" fill="#141413" stroke="#D1CFC5" stroke-width="1"/>
  <text x="190" y="225" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">更多用户参与</text>
  <text x="190" y="242" fill="#87867F" font-size="11px" text-anchor="middle">More Engagement</text>
  <text x="190" y="258" fill="#87867F" font-size="10px" text-anchor="middle">用户参与产生数据</text>

  <!-- Center circle: Data as Intent -->
  <circle cx="400" cy="270" r="55" fill="#788C5D"/>
  <text x="400" y="260" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">数据</text>
  <text x="400" y="278" fill="#FAF9F5" font-size="13px" font-weight="700" text-anchor="middle">即意图</text>
  <text x="400" y="295" fill="#E3DACC" font-size="10px" text-anchor="middle">Data as Intent</text>

  <!-- Right panel: negative feedback trap -->
  <rect x="640" y="130" width="140" height="280" rx="12" fill="#141413"/>
  <text x="660" y="160" fill="#D97757" font-size="12px" font-weight="700">负反馈陷阱</text>
  <text x="660" y="160" fill="#D97757" font-size="12px" font-weight="700">负反馈陷阱</text>
  <line x1="660" y1="172" x2="760" y2="172" stroke="#D97757" stroke-width="1.5"/>
  <text x="660" y="192" fill="#87867F" font-size="10px">数据质量差</text>
  <text x="660" y="208" fill="#87867F" font-size="10px">↓</text>
  <text x="660" y="226" fill="#87867F" font-size="10px">模型表现差</text>
  <text x="660" y="242" fill="#87867F" font-size="10px">↓</text>
  <text x="660" y="260" fill="#87867F" font-size="10px">用户体验差</text>
  <text x="660" y="276" fill="#87867F" font-size="10px">↓</text>
  <text x="660" y="294" fill="#87867F" font-size="10px">用户流失</text>
  <text x="660" y="310" fill="#87867F" font-size="10px">↓</text>
  <text x="660" y="328" fill="#87867F" font-size="10px">数据减少</text>
  <text x="660" y="344" fill="#87867F" font-size="10px">↓</text>
  <text x="660" y="362" fill="#D97757" font-size="10px" font-weight="600">模型更差</text>
  <text x="660" y="382" fill="#E3DACC" font-size="10px">飞轮反向运转</text>
  <text x="660" y="396" fill="#E3DACC" font-size="10px">恶性循环</text>

  <!-- Bottom key stats -->
  <rect x="40" y="440" width="720" height="70" rx="10" fill="#E3DACC"/>
  <text x="60" y="464" fill="#141413" font-size="12px" font-weight="700">数据科学家的真实工作分配</text>
  <text x="60" y="484" fill="#141413" font-size="12px">80% 数据准备</text>
  <text x="60" y="500" fill="#87867F" font-size="11px">数据清洗、转换、标注、验证</text>
  <text x="300" y="484" fill="#D97757" font-size="20px" font-weight="700">vs</text>
  <text x="340" y="464" fill="#141413" font-size="12px" font-weight="700">20% 模型开发</text>
  <text x="340" y="484" fill="#141413" font-size="12px">仅20%用于模型训练</text>
  <text x="340" y="500" fill="#87867F" font-size="11px">架构设计、调参</text>
  <text x="560" y="464" fill="#D97757" font-size="12px" font-weight="700">优化数据</text>
  <text x="560" y="484" fill="#D97757" font-size="18px" font-weight="700">+15%</text>
  <text x="560" y="500" fill="#87867F" font-size="11px">优化模型仅+3%</text>
  <text x="680" y="464" fill="#141413" font-size="12px" font-weight="700">2周数据清理</text>
  <text x="680" y="484" fill="#141413" font-size="12px">vs</text>
  <text x="680" y="500" fill="#87867F" font-size="11px">6个月模型优化</text>
</svg>