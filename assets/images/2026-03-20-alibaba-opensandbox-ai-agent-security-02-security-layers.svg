<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"><path fill="#faf9f5" d="M0 0h900v520H0z"/><defs><filter id="shadow" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/></filter></defs><text x="450" y="35" fill="#141413" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">OpenSandbox 三层安全模型</text><text x="450" y="57" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Three-Layer Security Model — Runtime Isolation · Behavior Monitoring · Policy Orchestration</text><g transform="translate(40 80)"><rect width="820" height="120" fill="#fff" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="12"/><rect width="820" height="40" fill="#d97757" rx="12"/><path fill="#d97757" d="M0 28h820v16H0z"/><text x="410" y="26" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">第一层：运行时隔离 Runtime Isolation</text><g transform="translate(20 56)"><rect width="180" height="50" fill="#faf9f5" stroke="#e3dacc" rx="6"/><text x="90" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Namespace 隔离</text><text x="90" y="36" fill="#87867f" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">PID · Network · Mount · IPC · UTS</text></g><g transform="translate(215 56)"><rect width="180" height="50" fill="#faf9f5" stroke="#e3dacc" rx="6"/><text x="90" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Cgroups 限制</text><text x="90" y="36" fill="#87867f" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">CPU · 内存 · IO · 网络带宽</text></g><g transform="translate(410 56)"><rect width="180" height="50" fill="#faf9f5" stroke="#e3dacc" rx="6"/><text x="90" y="20" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font