<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE5"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#141413" font-family="ui-serif, serif">Harness 约束类型金字塔</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#87867F">确定性约束在底层（AI 无法绕过）→ LLM 约束在上层（AI 自我管理）</text>

  <!-- Left panel: constraint pyramid -->
  <g transform="translate(50, 80)">
    <text x="240" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">约束类型分层</text>

    <!-- Pyramid Layer 1 (bottom) - Deterministic hard -->
    <polygon points="10,350 470,350 450,280 30,280" fill="#788C5D" opacity="0.9" rx="4"/>
    <text x="240" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="white">确定性约束（不可绕过）</text>
    <text x="240" y="318" text-anchor="middle" font-size="10.5" fill="#E3DACC">TypeScript 编译 · ESLint · 架构测试 · 单元测试</text>
    <text x="240" y="334" text-anchor="middle" font-size="10.5" fill="#E3DACC">AI 必须遵守，否则代码无法运行</text>
    <text x="240" y="352" text-anchor="middle" font-size="11" fill="#E3DACC">优先级：★★★★★</text>

    <!-- Pyramid Layer 2 - Tool enforced -->
    <polygon points="30,278 450,278 430,206 50,206" fill="#D97757" opacity="0.9"/>
    <text x="240" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="white">工具强制约束（高度可靠）</text>
    <text x="240" y="246" text-anchor="middle" font-size="10.5" fill="#FAF9F5">Prettier · 覆盖率门禁 · 依赖分析</text>
    <text x="240" y="262" text-anchor="middle" font-size="10.5" fill="#FAF9F5">AI 可绕过，但会触发 CI 失败</text>
    <text x="240" y="280" text-anchor="middle" font-size="11" fill="#FAF9F5">优先级：★★★★</text>

    <!-- Pyramid Layer 3 - LLM self-check -->
    <polygon points="50,204 430,204 410,132 70,132" fill="#D1CFC5" opacity="0.95"/>
    <text x="240" y="154" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">LLM 自我约束（效果有限）</text>
    <text x="240" y="172" text-anchor="middle" font-size="10.5" fill="#141413">让 AI 检查自己的代码是否符合架构</text>
    <text x="240" y="188" text-anchor="middle" font-size="10.5" fill="#87867F">AI 可能忽略或自我合理化</text>
    <text x="240" y="206" text-anchor="middle" font-size="11" fill="#141413">优先级：★★</text>

    <!-- Pyramid Layer 4 (top) - Advisory -->
    <polygon points="70,130 410,130 390,78 90,78" fill="#E3DACC" opacity="0.95"/>
    <text x="240" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">建议性约束（软性指导）</text>
    <text x="240" y="111" text-anchor="middle" font-size="10.5" fill="#141413">Prompt 中的编码规范 · 注释提醒</text>
    <text x="240" y="127" text-anchor="middle" font-size="10.5" fill="#87867F">AI 参考，但不强制</text>
    <text x="240" y="145" text-anchor="middle" font-size="11" fill="#141413">优先级：★</text>

    <!-- Key insight callout -->
    <rect x="0" y="365" width="480" height="50" fill="#FFF0E8" stroke="#D97757" stroke-width="1.5" rx="6"/>
    <text x="240" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#D97757">💡 核心发现：确定性约束 > LLM 约束</text>
    <text x="240" y="403" text-anchor="middle" font-size="10.5" fill="#141413">让 AI "自觉遵守" 效果很差，用 Linter/测试强制约束更可靠</text>
  </g>

  <!-- Right panel: examples -->
  <g transform="translate(560, 80)">
    <text x="290" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">约束实施示例</text>

    <!-- Card 1 -->
    <rect x="0" y="18" width="290" height="108" fill="white" stroke="#788C5D" stroke-width="1.5" rx="6"/>
    <rect x="0" y="18" width="290" height="26" fill="#788C5D" rx="6" clip-path="url(#clip7)"/>
    <text x="16" y="36" font-size="11" font-weight="700" fill="white">确定性：ESLint 分层约束</text>
    <text x="12" y="58" font-size="10" fill="#141413"><tspan font-weight="600">规则：</tspan> Repository 层禁止导入 API 层</text>
    <text x="12" y="72" font-size="10" fill="#141413"><tspan font-weight="600">实施：</tspan> ESLint no-restricted-imports</text>
    <text x="12" y="86" font-size="10" fill="#141413"><tspan font-weight="600">效果：</tspan> 违规代码无法通过 CI</text>
    <text x="12" y="100" font-size="10" fill="#141413"><tspan font-weight="600">AI 行为：</tspan> 报错后自动调整</text>
    <text x="12" y="114" font-size="10" fill="#87867F"><tspan font-weight="600">可靠性：</tspan> 高（结构验证）</text>

    <!-- Card 2 -->
    <rect x="0" y="138" width="290" height="108" fill="white" stroke="#D97757" stroke-width="1.5" rx="6"/>
    <rect x="0" y="138" width="290" height="26" fill="#D97757" rx="6" clip-path="url(#clip8)"/>
    <text x="16" y="156" font-size="11" font-weight="700" fill="white">工具强制：架构测试（ArchUnit）</text>
    <text x="12" y="178" font-size="10" fill="#141413"><tspan font-weight="600">规则：</tspan> API → Service → Repository 分层</text>
    <text x="12" y="192" font-size="10" fill="#141413"><tspan font-weight="600">实施：</tspan> ArchUnit Java 架构测试</text>
    <text x="12" y="206" font-size="10" fill="#141413"><tspan font-weight="600">效果：</tspan> 跨越分层调用被检测</text>
    <text x="12" y="220" font-size="10" fill="#141413"><tspan font-weight="600">AI 行为：</tspan> 可能试图 disable 规则</text>
    <text x="12" y="234" font-size="10" fill="#87867F"><tspan font-weight="600">可靠性：</tspan> 中高（需防 disable）</text>

    <!-- Card 3 -->
    <rect x="0" y="258" width="290" height="108" fill="white" stroke="#D1CFC5" stroke-width="1.5" rx="6"/>
    <rect x="0" y="258" width="290" height="26" fill="#D1CFC5" rx="6" clip-path="url(#clip9)"/>
    <text x="16" y="276" font-size="11" font-weight="700" fill="#141413">LLM 约束：让 AI 检查自己的架构</text>
    <text x="12" y="298" font-size="10" fill="#141413"><tspan font-weight="600">规则：</tspan> "检查代码是否符合架构"</text>
    <text x="12" y="312" font-size="10" fill="#141413"><tspan font-weight="600">实施：</tspan> Prompt 要求 AI 自我审查</text>
    <text x="12" y="326" font-size="10" fill="#141413"><tspan font-weight="600">效果：</tspan> 不稳定，AI 可能忽略问题</text>
    <text x="12" y="340" font-size="10" fill="#141413"><tspan font-weight="600">AI 行为：</tspan> 自我合理化，跳过问题</text>
    <text x="12" y="354" font-size="10" fill="#87867F"><tspan font-weight="600">可靠性：</tspan> 低（LLM 自觉性差）</text>

    <!-- Escape hatch note -->
    <rect x="0" y="380" width="290" height="60" fill="#EDF3E5" stroke="#788C5D" stroke-width="1" rx="6"/>
    <text x="145" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">逃生舱口原则</text>
    <text x="145" y="416" text-anchor="middle" font-size="10" fill="#141413">保留 // harness-ignore 注释</text>
    <text x="145" y="430" text-anchor="middle" font-size="10" fill="#87867F">过度约束会让 AI 陷入死循环</text>
  </g>
</svg>