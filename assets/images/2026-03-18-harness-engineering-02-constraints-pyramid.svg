<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" viewBox="0 0 900 560"><defs><linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#f0ede5"/></linearGradient></defs><rect width="900" height="560" fill="url(#bg2)" rx="12"/><text x="450" y="36" fill="#141413" font-family="ui-serif, serif" font-size="17" font-weight="700" text-anchor="middle">Harness 约束类型金字塔</text><text x="450" y="56" fill="#87867f" font-size="12" text-anchor="middle">确定性约束在底层（AI 无法绕过）→ LLM 约束在上层（AI 自我管理）</text><g transform="translate(50 80)"><text x="240" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">约束类型分层</text><path fill="#788c5d" d="M10 350h460l-20-70H30z" opacity=".9"/><text x="240" y="300" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">确定性约束（不可绕过）</text><text x="240" y="318" fill="#e3dacc" font-size="10.5" text-anchor="middle">TypeScript 编译 · ESLint · 架构测试 · 单元测试</text><text x="240" y="334" fill="#e3dacc" font-size="10.5" text-anchor="middle">AI 必须遵守，否则代码无法运行</text><text x="240" y="352" fill="#e3dacc" font-size="11" text-anchor="middle">优先级：★★★★★</text><path fill="#d97757" d="M30 278h420l-20-72H50z" opacity=".9"/><text x="240" y="228" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">工具强制约束（高度可靠）</text><text x="240" y="246" fill="#faf9f5" font-size="10.5" text-anchor="middle">Prettier · 覆盖率门禁 · 依赖分析</text><text x="240" y="262" fill="#faf9f5" font-size="10.5" text-anchor="middle">AI 可绕过，但会触发 CI 失败</text><text x="240" y="280" fill="#faf9f5" font-size="11" text-anchor="middle">优先级：★★★★</text><path fill="#d1cfc5" d="M50 204h380l-20-72H70z" opacity=".95"/><text x="240" y="154" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">LLM 自我约束（效果有限）</text><text x="240" y="172" fill="#141413" font-size="10.5" text-anchor="middle">让 AI 检查自己的代码是否符合架构</text><text x="240" y="188" fill="#87867f" font-size="10.5" text-anchor="middle">AI 可能忽略或自我合理化</text><text x="240" y="206" fill="#141413" font-size="11" text-anchor="middle">优先级：★★</text><path fill="#e3dacc" d="M70 130h340l-20-52H90z" opacity=".95"/><text x="240" y="93" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">建议性约束（软性指导）</text><text x="240" y="111" fill="#141413" font-size="10.5" text-anchor="middle">Prompt 中的编码规范 · 注释提醒</text><text x="240" y="127" fill="#87867f" font-size="10.5" text-anchor="middle">AI 参考，但不强制</text><text x="240" y="145" fill="#141413" font-size="11" text-anchor="middle">优先级：★</text><rect width="480" height="50" y="365" fill="#fff0e8" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="240" y="385" fill="#d97757" font-size="11" font-weight="700" text-anchor="middle">💡 核心发现：确定性约束 &gt; LLM 约束</text><text x="240" y="403" fill="#141413" font-size="10.5" text-anchor="middle">让 AI &quot;自觉遵守&quot; 效果很差，用 Linter/测试强制约束更可靠</text></g><g transform="translate(560 80)"><text x="290" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">约束实施示例</text><rect width="290" height="108" y="18" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><rect width="290" height="26" y="18" fill="#788c5d" clip-path="url(#clip7)" rx="6"/><text x="16" y="36" fill="#fff" font-size="11" font-weight="700">确定性：ESLint 分层约束</text><text x="12" y="58" fill="#141413" font-size="10"><tspan font-weight="600">规则：</tspan> Repository 层禁止导入 API 层</text><text x="12" y="72" fill="#141413" font-size="10"><tspan font-weight="600">实施：</tspan> ESLint no-restricted-imports</text><text x="12" y="86" fill="#141413" font-size="10"><tspan font-weight="600">效果：</tspan> 违规代码无法通过 CI</text><text x="12" y="100" fill="#141413" font-size="10"><tspan font-weight="600">AI 行为：</tspan> 报错后自动调整</text><text x="12" y="114" fill="#87867f" font-size="10"><tspan font-weight="600">可靠性：</tspan> 高（结构验证）</text><rect width="290" height="108" y="138" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><rect width="290" height="26" y="138" fill="#d97757" clip-path="url(#clip8)" rx="6"/><text x="16" y="156" fill="#fff" font-size="11" font-weight="700">工具强制：架构测试（ArchUnit）</text><text x="12" y="178" fill="#141413" font-size="10"><tspan font-weight="600">规则：</tspan> API → Service → Repository 分层</text><text x="12" y="192" fill="#141413" font-size="10"><tspan font-weight="600">实施：</tspan> ArchUnit Java 架构测试</text><text x="12" y="206" fill="#141413" font-size="10"><tspan font-weight="600">效果：</tspan> 跨越分层调用被检测</text><text x="12" y="220" fill="#141413" font-size="10"><tspan font-weight="600">AI 行为：</tspan> 可能试图 disable 规则</text><text x="12" y="234" fill="#87867f" font-size="10"><tspan font-weight="600">可靠性：</tspan> 中高（需防 disable）</text><rect width="290" height="108" y="258" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><rect width="290" height="26" y="258" fill="#d1cfc5" clip-path="url(#clip9)" rx="6"/><text x="16" y="276" fill="#141413" font-size="11" font-weight="700">LLM 约束：让 AI 检查自己的架构</text><text x="12" y="298" fill="#141413" font-size="10"><tspan font-weight="600">规则：</tspan> &quot;检查代码是否符合架构&quot;</text><text x="12" y="312" fill="#141413" font-size="10"><tspan font-weight="600">实施：</tspan> Prompt 要求 AI 自我审查</text><text x="12" y="326" fill="#141413" font-size="10"><tspan font-weight="600">效果：</tspan> 不稳定，AI 可能忽略问题</text><text x="12" y="340" fill="#141413" font-size="10"><tspan font-weight="600">AI 行为：</tspan> 自我合理化，跳过问题</text><text x="12" y="354" fill="#87867f" font-size="10"><tspan font-weight="600">可靠性：</tspan> 低（LLM 自觉性差）</text><rect width="290" height="60" y="380" fill="#edf3e5" stroke="#788c5d" rx="6"/><text x="145" y="400" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">逃生舱口原则</text><text x="145" y="416" fill="#141413" font-size="10" text-anchor="middle">保留 // harness-ignore 注释</text><text x="145" y="430" fill="#87867f" font-size="10" text-anchor="middle">过度约束会让 AI 陷入死循环</text></g></svg>