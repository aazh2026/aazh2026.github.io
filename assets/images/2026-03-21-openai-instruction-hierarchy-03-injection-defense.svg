<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 640 340">
  <title>提示注入攻击与 IH 防御机制</title>
  <desc>
    序列图展示提示注入攻击路径以及指令层级如何防御：用户查询 → 工具输出（含注入） → 模型输出（被层级拦截）
  </desc>
  <path fill="#faf9f5" d="M0 0h640v340H0z"/>
  <text x="320" y="26" fill="#141413" font-size="14" font-weight="500" text-anchor="middle">提示注入攻击与 IH 防御机制</text>
  <text x="320" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">恶意指令嵌入在工具输出中 · OpenAI 2026</text>
  <rect width="120" height="60" x="30" y="70" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="90" y="95" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">User Query</text>
  <text x="90" y="113" fill="#141413" font-size="10" text-anchor="middle">正常用户指令</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M150 100h60"/>
  <path fill="#d1cfc5" d="m210 100-8-6v12z"/>
  <text x="180" y="92" fill="#87867f" font-size="9" text-anchor="middle">调用工具</text>
  <rect width="160" height="60" x="215" y="70" fill="#fff" stroke="#c9544d" stroke-width="1.8" rx="8"/>
  <text x="295" y="95" fill="#c9544d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Tool Output</text>
  <text x="295" y="113" fill="#c9544d" font-size="9" text-anchor="middle">&quot;ignore previous instructions&quot;</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M375 100h60"/>
  <path fill="#d1cfc5" d="m435 100-8-6v12z"/>
  <text x="405" y="92" fill="#87867f" font-size="9" text-anchor="middle">返回结果</text>
  <rect width="120" height="60" x="440" y="70" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <text x="500" y="95" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Model Output</text>
  <text x="500" y="113" fill="#141413" font-size="10" text-anchor="middle">✓ 指令层级生效</text>
  <rect width="110" height="160" x="500" y="155" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="90" height="32" x="510" y="165" fill="#d97757" rx="4"/>
  <text x="555" y="182" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">System</text>
  <text x="555" y="193" fill="#fff" font-size="8" text-anchor="middle">最高优先级</text>
  <rect width="90" height="28" x="510" y="200" fill="#d1cfc5" stroke="#d97757" stroke-width="1.2" rx="4"/>
  <text x="555" y="218" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Developer</text>
  <rect width="90" height="28" x="510" y="231" fill="#d1cfc5" stroke="#d97757" stroke-width="1.2" rx="4"/>
  <text x="555" y="249" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">User</text>
  <rect width="90" height="28" x="510" y="262" fill="#d1cfc5" stroke="#87867f" stroke-width="1.2" rx="4"/>
  <text x="555" y="280" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Tool</text>
  <path stroke="#c9544d" stroke-dasharray="4,3" stroke-width="1.5" d="m420 230 90-49" opacity=".7"/>
  <path fill="#c9544d" d="m510 181-6 8h8z" opacity=".7"/>
  <text x="465" y="195" fill="#c9544d" font-family="ui-monospace, monospace" font-size="9">注入被拦截</text>
  <rect width="140" height="70" x="30" y="160" fill="#f5e6e6" stroke="#c9544d" stroke-width="1.2" rx="6"/>
  <text x="100" y="180" fill="#c9544d" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">Attack Vector</text>
  <text x="100" y="196" fill="#141413" font-size="9" text-anchor="middle">恶意指令隐藏在</text>
  <text x="100" y="210" fill="#141413" font-size="9" text-anchor="middle">工具返回内容中</text>
  <text x="100" y="224" fill="#87867f" font-size="8" text-anchor="middle">例如：网页、RAG 文档</text>
  <rect width="140" height="70" x="30" y="245" fill="#e8efe2" stroke="#788c5d" stroke-width="1.2" rx="6"/>
  <text x="100" y="265" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">IH Defense</text>
  <text x="100" y="281" fill="#141413" font-size="9" text-anchor="middle">Tool 级指令无法</text>
  <text x="100" y="295" fill="#141413" font-size="9" text-anchor="middle">覆盖 System 级策略</text>
  <text x="100" y="309" fill="#87867f" font-size="8" text-anchor="middle">层级隔离保护</text>
  <path stroke="#d97757" d="M555 197v3m0 28v3"/>
  <path stroke="#87867f" d="M555 259v3"/>
</svg>
