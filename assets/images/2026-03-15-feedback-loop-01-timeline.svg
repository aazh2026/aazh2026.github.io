<svg viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 反馈周期压缩时间线：从月到分钟 -->
  <rect width="640" height="220" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">反馈周期压缩：从月到分钟</text>
  <text x="320" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- Timeline axis -->
  <line x1="60" y1="130" x2="600" y2="130" stroke="#D1CFC5" stroke-width="2"/>

  <!-- Era 1: Waterfall -->
  <circle cx="100" cy="130" r="10" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="52" y="148" width="96" height="60" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="100" y="164" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">瀑布时代</text>
  <text x="100" y="178" text-anchor="middle" font-size="9" fill="#141413">1950s–1990s</text>
  <text x="100" y="192" text-anchor="middle" font-size="14" fill="#D97757" font-weight="700">月</text>
  <text x="100" y="204" text-anchor="middle" font-size="8.5" fill="#87867F">反馈周期</text>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="130" x2="188" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="188,126 182,130 188,134" fill="#D1CFC5"/>

  <!-- Era 2: Agile -->
  <circle cx="220" cy="130" r="10" fill="#FFFFFF" stroke="#E3DACC" stroke-width="2"/>
  <rect x="172" y="148" width="96" height="60" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="220" y="164" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">敏捷时代</text>
  <text x="220" y="178" text-anchor="middle" font-size="9" fill="#141413">2000s–2010s</text>
  <text x="220" y="192" text-anchor="middle" font-size="14" fill="#87867F" font-weight="700">天</text>
  <text x="220" y="204" text-anchor="middle" font-size="8.5" fill="#87867F">反馈周期</text>

  <!-- Arrow 2→3 -->
  <line x1="272" y1="130" x2="308" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="308,126 302,130 308,134" fill="#D1CFC5"/>

  <!-- Era 3: DevOps -->
  <circle cx="340" cy="130" r="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>
  <rect x="292" y="148" width="96" height="60" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="340" y="164" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">DevOps 时代</text>
  <text x="340" y="178" text-anchor="middle" font-size="9" fill="#141413">2010s–2020s</text>
  <text x="340" y="192" text-anchor="middle" font-size="14" fill="#788C5D" font-weight="700">小时</text>
  <text x="340" y="204" text-anchor="middle" font-size="8.5" fill="#87867F">反馈周期</text>

  <!-- Arrow 3→4 -->
  <line x1="392" y1="130" x2="428" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="428,126 422,130 428,134" fill="#D1CFC5"/>

  <!-- Era 4: AI-Native (highlighted) -->
  <circle cx="460" cy="130" r="14" fill="#D97757" stroke="#D97757" stroke-width="2"/>
  <rect x="412" y="148" width="96" height="60" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1.8"/>
  <text x="460" y="164" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">AI-Native 时代</text>
  <text x="460" y="178" text-anchor="middle" font-size="9" fill="#141413">2020s–</text>
  <text x="460" y="192" text-anchor="middle" font-size="14" fill="#D97757" font-weight="700">分钟</text>
  <text x="460" y="204" text-anchor="middle" font-size="8.5" fill="#87867F">反馈周期</text>

  <!-- Arrow 4→ future (dashed) -->
  <line x1="512" y1="130" x2="580" y2="130" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="546" y="124" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">持续压缩</text>

  <!-- Compression callout -->
  <rect x="40" y="52" width="560" height="22" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="66" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">反馈周期压缩：月 → 天 → 小时 → 分钟；每一阶段都是上一阶段的 10-100 倍加速</text>

  <!-- Bottom: what changed -->
  <text x="100" y="106" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">人工</text>
  <text x="100" y="116" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">Review</text>
  <text x="220" y="106" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Sprint</text>
  <text x="220" y="116" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Planning</text>
  <text x="340" y="106" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">CI/CD</text>
  <text x="340" y="116" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">Pipeline</text>
  <text x="460" y="106" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">Agent Loop</text>
  <text x="460" y="116" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">实时验证</text>
</svg>