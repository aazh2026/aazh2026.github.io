<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <linearGradient id="ess-grad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#b05540"/>
    </linearGradient>
    <linearGradient id="acc-grad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#788c5d"/>
      <stop offset="100%" stop-color="#5f7249"/>
    </linearGradient>
    <linearGradient id="cog-grad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#87867f"/>
      <stop offset="100%" stop-color="#6a675f"/>
    </linearGradient>
    <filter id="shadow3" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg3)" rx="16"/>
  <text x="450" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-.3" text-anchor="middle">Brooks 框架：两种复杂度</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M200 56h500"/>
  <rect width="265" height="370" x="40" y="76" fill="#faf9f5" filter="url(#shadow3)" rx="14"/>
  <rect width="265" height="52" x="40" y="76" fill="url(#ess-grad)" rx="14"/>
  <path fill="url(#ess-grad)" d="M40 110h265v18H40z"/>
  <text x="172" y="108" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" text-anchor="middle">本质复杂度</text>
  <text x="172" y="128" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" opacity=".85" text-anchor="middle">Essential Complexity</text>
  <text x="60" y="160" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">无法消除，只能转移</text>
  <g transform="translate(60 178)">
    <circle cx="6" cy="6" r="4" fill="#d97757" opacity=".7"/>
