    <circle cx="6" cy="32" r="4" fill="#d97757" opacity=".7"/>
    <text x="20" y="37" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">约束条件相互冲突</text>
    <circle cx="6" cy="58" r="4" fill="#d97757" opacity=".7"/>
    <text x="20" y="63" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">边界情况爆炸</text>
    <circle cx="6" cy="84" r="4" fill="#d97757" opacity=".7"/>
    <text x="20" y="89" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">系统涌现行为</text>
  </g>
  <path stroke="#d1cfc5" d="M60 285h225"/>
  <text x="60" y="305" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">AI 解决能力</text>
  <rect width="220" height="32" x="60" y="320" fill="#d97757" opacity=".12" rx="8"/>
  <text x="170" y="341" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">❌ 无法解决</text>
  <rect width="220" height="32" x="60" y="365" fill="#d97757" opacity=".06" rx="8"/>
  <text x="170" y="386" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">需求理解、架构设计、系统思考</text>
  <rect width="265" height="370" x="318" y="76" fill="#faf9f5" filter="url(#shadow3)" rx="14"/>
  <rect width="265" height="52" x="318" y="76" fill="url(#acc-grad)" rx="14"/>
  <path fill="url(#acc-grad)" d="M318 110h265v18H318z"/>
  <text x="450" y="108" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" text-anchor="middle">偶然复杂度</text>
  <text x="450" y="128" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" opacity=".85" text-anchor="middle">Accidental Complexity</text>
  <text x="338" y="160" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">可以被消除或大幅减少</text>
  <g transform="translate(338 178)">
    <circle cx="6" cy="6" r="4" fill="#788c5d" opacity=".7"/>
    <text x="20" y="11" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">语法和样板代码</text>
    <circle cx="6" cy="32" r="4" fill="#788c5d" opacity=".7"/>
    <text x="20" y="37" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">API 记忆负担</text>
    <circle cx="6" cy="58" r="4" fill="#788c5d" opacity=".7"/>
    <text x="20" y="63" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">环境配置与工具链</text>
    <circle cx="6" cy="84" r="4" fill="#788c5d" opacity=".7"/>
    <text x="20" y="89" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">依赖地狱、版本冲突</text>
  </g>
  <path stroke="#d1cfc5" d="M338 285h225"/>
  <text x="338" y="305" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">AI 解决能力</text>
  <rect width="220" height="32" x="338" y="320" fill="#788c5d" opacity=".18" rx="8"/>
  <text x="448" y="341" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">✅ 大量削减</text>
  <rect width="220" height="32" x="338" y="365" fill="#788c5d" opacity=".06" rx="8"/>
  <text x="448" y="386" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">语法生成、API 提示、调试辅助</text>
  <rect width="265" height="370" x="596" y="76" fill="#faf9f5" filter="url(#shadow3)" rx="14"/>
  <rect width="265" height="52" x="596" y="76" fill="url(#cog-grad)" rx="14"/>
  <path fill="url(#cog-grad)" d="M596 110h265v18H596z"/>
  <text x="728" y="108" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" text-anchor="middle">认知复杂度</text>
  <text x="728" y="128" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="12" opacity=".85" text-anchor="middle">Cognitive Complexity (AI 引入)</text>
  <text x="616" y="160" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">AI 新引入的第三种复杂度</text>
  <g transform="translate(616 178)">
    <circle cx="6" cy="6" r="4" fill="#87867f" opacity=".7"/>
    <text x="20" y="11" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">验证负担：判断 AI 输出是否正确</text>
    <circle cx="6" cy="32" r="4" fill="#87867f" opacity=".7"/>
    <text x="20" y="37" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">信任校准：权威偏见 + 自动化偏见</text>
    <circle cx="6" cy="58" r="4" fill="#87867f" opacity=".7"/>
    <text x="20" y="63" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">知识幻觉：看似正确但实际错误</text>
    <circle cx="6" cy="84" r="4" fill="#87867f" opacity=".7"/>
    <text x="20" y="89" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12.5">技能退化：过度依赖导致能力萎缩</text>
  </g>
  <path stroke="#d1cfc5" d="M616 285h225"/>
  <text x="616" y="305" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" letter-spacing="1">AI 解决能力</text>
  <rect width="220" height="32" x="616" y="320" fill="#87867f" opacity=".12" rx="8"/>
  <text x="726" y="341" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">⚠️ 自身引入，难以自我解决</text>
  <rect width="220" height="32" x="616" y="365" fill="#87867f" opacity=".06" rx="8"/>
  <text x="726" y="386" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">必须靠人类判断力来对抗</text>
  <rect width="820" height="34" x="40" y="460" fill="#141413" opacity=".05" rx="10"/>
  <text x="450" y="482" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-style="italic" text-anchor="middle">&quot;AI 让写代码变快了，但让写正确的代码变难了。&quot;</text>
</svg>
