<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" font-family="'Courier New', Courier, monospace" font-size="12">
  <rect width="380" height="300" fill="#FAF9F5"/>
  <!-- Background -->
  <rect x="10" y="10" width="360" height="280" fill="none" stroke="#141413" stroke-width="2" rx="2"/>

