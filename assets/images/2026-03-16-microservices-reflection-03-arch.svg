  <!-- user files -->
  <text x="50" y="108" fill="#141413">│   │   ├── api.py</text>
  <text x="200" y="108" fill="#87867F"># 内部 API</text>
  <text x="50" y="124" fill="#141413">│   │   ├── models.py</text>
  <text x="200" y="124" fill="#87867F"># 数据模型</text>
  <text x="50" y="140" fill="#141413">│   │   └── service.py</text>
  <text x="200" y="140" fill="#87867F"># 业务逻辑</text>

