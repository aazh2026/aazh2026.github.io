<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 360"><title>Intent Verification Loop</title><desc>IDD工作流：业务意图 → 代码生成 → 意图验证引擎，失败则循环，成功则结束</desc><path fill="#faf9f5" d="M0 0h680v360H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">IDD 意图验证循环</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Intent-Driven Development · IDD</text><rect width="560" height="44" x="60" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="560" height="20" x="60" y="60" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="340" y="75" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Business Intent 输入</text><text x="340" y="93" fill="#141413" font-size="10.5" text-anchor="middle">结构化意图文档（SID）：业务规则 · 边界条件 · 性能约束</text><path stroke="#d1cfc5" stroke-width="1.5" d="M340 104v16"/><path fill="#d1cfc5" d="m340 124-4-8h8z"/><text x="358" y="116" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">SID 上下文</text><rect width="240" height="72" x="60" y="128" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="240" height="20" x="60" y="128" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="180" y="143" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Code Generation</text><text x="180" y="162" fill="#141413" font-size="10.5" text-anchor="middle">AI 接收 SID，生成代码</text><text x="180" y="178" fill="#87867f" font-size="10" text-anchor="middle">intent → function 映射</text><rect width="240" height="72" x="380" y="128" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><rect width="240" height="20" x="380" y="128" fill="#fef3c7" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="500" y="143" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Intent Verification Engine</text><text x="500" y="162" fill="#141413" font-size="10.5" text-anchor="middle">grader 按 rubric 检查</text><text x="500" y="178" fill="#87867f" font-size="10" text-anchor="middle">意图验证</text><path stroke="#d1cfc5" stroke-width="1.5" d="M300 164h80"/><path fill="#d1cfc5" d="m376 160-8 4 8 4z"/><text x="340" y="158" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">生成代码</text><path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.8" d="M380 170c-40 0-40 40-80 40s-40-40-120-40"/><path fill="#d97757" d="m180 166-6 4 6 4z"/><text x="260" y="224" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">验证失败 → 修正</text><path stroke="#788c5d" stroke-width="1.8" d="M500 200v28"/><path fill="#788c5d" d="m500 234-4-8h8z"/><text x="518" y="222" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10">Pass</text><rect width="140" height="36" x="430" y="240" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/><text x="500" y="262" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">Intent Satisfied</text><text x="380" y="256" fill="#141413" font-size="9.5" font-weight="600" text-anchor="middle">验证清单</text><rect width="180" height="40" x="60" y="268" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="72" y="285" fill="#141413" font-size="10">业务规则覆盖</text><text x="72" y="300" fill="#87867f" font-size="9">所有意图项均有对应实现</text><rect width="180" height="40" x="250" y="268" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="262" y="285" fill="#141413" font-size="10">边界条件处理</text><text x="262" y="300" fill="#87867f" font-size="9">负数、零值、极大值、None</text><rect width="180" height="40" x="440" y="268" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="452" y="285" fill="#141413" font-size="10">性能约束满足</text><text x="452" y="300" fill="#87867f" font-size="9">时间/空间复杂度达标</text><text x="340" y="336" fill="#87867f" font-size="9" font-style="italic" text-anchor="middle">IDD = TDD 的&quot;意图验证&quot;升级：不再是代码对不对，而是代码是否说了正确的事</text></svg>