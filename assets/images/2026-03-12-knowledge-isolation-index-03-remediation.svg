<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 720 340">
  <title>重建集体理解四策略</title>
  <desc>
    知识孤岛修复四策略：强制文档化、代码讲解会、Prompt共享、高KII代码重构
  </desc>
  <path fill="#faf9f5" d="M0 0h720v340H0z"/>
  <text x="360" y="28" fill="#141413" font-size="15" font-weight="500" text-anchor="middle">重建集体理解四策略</text>
  <text x="360" y="46" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">知识孤岛指数 (KII) · 2026/03/12</text>
  <rect width="295" height="100" x="30" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <rect width="295" height="8" x="30" y="68" fill="#788c5d" rx="4"/>
  <text x="50" y="92" fill="#141413" font-size="13" font-weight="600">策略1：强制文档化</text>
  <text x="50" y="110" fill="#87867f" font-size="10">AI代码必须附带业务逻辑、设计决策说明</text>
  <text x="50" y="128" fill="#87867f" font-size="10">CI门禁：PR无解释文档则拒绝合入</text>
  <text x="50" y="152" fill="#788c5d" font-size="11" font-weight="600">Target: KII &lt; 0.3</text>
  <rect width="295" height="100" x="345" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <rect width="295" height="8" x="345" y="68" fill="#788c5d" rx="4"/>
  <text x="365" y="92" fill="#141413" font-size="13" font-weight="600">策略2：代码讲解会</text>
  <text x="365" y="110" fill="#87867f" font-size="10">每周walkthrough，重点讲解AI生成模块</text>
  <text x="365" y="128" fill="#87867f" font-size="10">录屏存档供新人学习，索引可检索</text>
  <text x="365" y="152" fill="#788c5d" font-size="11" font-weight="600">Target: KII &lt; 0.3</text>
  <rect width="295" height="100" x="30" y="190" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <rect width="295" height="8" x="30" y="190" fill="#d97757" rx="4"/>
  <text x="50" y="214" fill="#141413" font-size="13" font-weight="600">策略3：Prompt共享</text>
  <text x="50" y="232" fill="#87867f" font-size="10">团队共享生成代码的Prompt及版本变更</text>
  <text x="50" y="250" fill="#87867f" font-size="10">理解Prompt即理解代码意图</text>
  <text x="50" y="274" fill="#d97757" font-size="11" font-weight="600">Target: KII &lt; 0.4</text>
  <rect width="295" height="100" x="345" y="190" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <rect width="295" height="8" x="345" y="190" fill="#d97757" rx="4"/>
  <text x="365" y="214" fill="#141413" font-size="13" font-weight="600">策略4：高KII代码重构</text>
  <text x="365" y="232" fill="#87867f" font-size="10">KII &gt; 0.6 的代码必须强制重构</text>
  <text x="365" y="250" fill="#87867f" font-size="10">重构目标：集体可理解，KII &lt; 0.3</text>
  <text x="365" y="274" fill="#d97757" font-size="11" font-weight="600">Target: KII &lt; 0.3</text>
  <path stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrowGray)" d="M325 118h18"/>
  <path stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrowGray)" d="M492 168v20"/>
  <path stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrowGray)" d="M345 240h-18"/>
  <path stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrowGray)" d="M177 190v-20"/>
  <text x="360" y="318" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">文档化 → 讲解会 → Prompt库 → 重构 → (循环)</text>
  <defs>
    <marker id="arrowGray" markerHeight="7" markerWidth="7" orient="auto" refX="6" refY="3">
      <path fill="#d1cfc5" d="M0 0v6l6-3z"/>
    </marker>
  </defs>
</svg>
