<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="ivory-bg3" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <marker id="arrow3" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#87867f" d="M0 0v6l8-3z"/>
    </marker>
    <filter id="shadow3" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <path fill="url(#ivory-bg3)" d="M0 0h960v540H0z"/>
  <text x="480" y="38" fill="#141413" font-size="20" font-weight="bold" text-anchor="middle">智能编排引擎 / Intelligent Orchestration Engine</text>
  <path stroke="#d1cfc5" d="M180 50h600"/>
  <rect width="200" height="110" x="30" y="65" fill="#fff" filter="url(#shadow3)" rx="10"/>
  <rect width="200" height="30" x="30" y="65" fill="#141413" rx="10"/>
  <path fill="#141413" d="M30 83h200v12H30z"/>
  <text x="130" y="85" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">自然语言需求输入</text>
  <text x="42" y="108" fill="#87867f" font-size="10">获取用户个人中心数据</text>
  <text x="42" y="122" fill="#87867f" font-size="10">包括：用户信息、最近5个</text>
  <text x="42" y="136" fill="#87867f" font-size="10">订单、商品详情、会员积分</text>
  <text x="42" y="156" fill="#d97757" font-size="10" font-style="italic">&quot;响应时间 &lt; 200ms&quot;</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrow3)" d="M230 120h40"/>
  <text x="250" y="110" fill="#d97757" font-size="9" text-anchor="middle">LLM</text>
  <rect width="280" height="420" x="270" y="65" fill="#fff" filter="url(#shadow3)" rx="10"/>
  <rect width="280" height="36" x="270" y="65" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M270 89h280v12H270z"/>
  <text x="410" y="87" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">🎯 智能编排引擎</text>
  <g transform="translate(285 115)">
    <rect width="250" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="6"/>
    <text x="10" y="18" fill="#141413" font-size="11" font-weight="bold">① 依赖分析与并行化</text>
    <text x="10" y="34" fill="#87867f" font-size="10">构建依赖图 → 拓扑排序 → 并行批次</text>
    <text x="10" y="46" fill="#788c5d" font-size="10">→ 最大化并行度</text>
  </g>
  <g transform="translate(285 175)">
    <rect width="250" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="6"/>
    <text x="10" y="18" fill="#141413" font-size="11" font-weight="bold">② 智能缓存策略</text>
    <text x="10" y="34" fill="#87867f" font-size="10">低频变化: TTL=3600s</text>
    <text x="10" y="46" fill="#87867f" font-size="10">高频变化: TTL=60s / 不缓存</text>
  </g>
  <g transform="translate(285 235)">
    <rect width="250" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="6"/>
    <text x="10" y="18" fill="#141413" font-size="11" font-weight="bold">③ 故障降级策略</text>
    <text x="10" y="34" fill="#87867f" font-size="10">服务不可用 → 缓存降级</text>
    <text x="10" y="46" fill="#87867f" font-size="10">→ 默认值兜底</text>
  </g>
  <g transform="translate(285 295)">
    <rect width="250" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="6"/>
    <text x="10" y="18" fill="#141413" font-size="11" font-weight="bold">④ 运行时动态优化</text>
    <text x="10" y="34" fill="#87867f" font-size="10">基于历史性能数据</text>
    <text x="10" y="46" fill="#87867f" font-size="10">自动调整超时、缓存、并行度</text>
  </g>
  <g transform="translate(285 355)">
    <rect width="250" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="6"/>
    <text x="10" y="18" fill="#141413" font-size="11" font-weight="bold">⑤ 前端字段裁剪</text>
    <text x="10" y="34" fill="#87867f" font-size="10">Web: 完整字段 / Mobile: 精简字段</text>
    <text x="10" y="46" fill="#87867f" font-size="10">Admin: 额外管理字段</text>
  </g>
  <g transform="translate(565 65)">
    <rect width="365" height="195" fill="#141413" filter="url(#shadow3)" rx="10"/>
    <rect width="365" height="28" fill="#1e1e1e" rx="10"/>
    <path fill="#1e1e1e" d="M0 16h365v12H0z"/>
    <text x="182" y="16" fill="#d1cfc5" font-size="11" font-weight="bold" text-anchor="middle">Generated BFF Code</text>
    <text x="12" y="46" fill="#e3dacc" font-family="monospace" font-size="10">@cache(ttl=300)</text>
    <text x="12" y="62" fill="#e3dacc" font-family="monospace" font-size="10">def get_user_center(user_id):</text>
    <text x="12" y="80" fill="#d97757" font-family="monospace" font-size="10">  # 并行获取独立数据</text>
    <text x="12" y="96" fill="#e3dacc" font-family="monospace" font-size="10">  with ThreadPoolExecutor() as ex:</text>
    <text x="24" y="112" fill="#e3dacc" font-family="monospace" font-size="10">user_f = ex.submit(user_svc.get, uid)</text>
    <text x="24" y="128" fill="#e3dacc" font-family="monospace" font-size="10">member_f = ex.submit(member_svc.get, uid)</text>
    <text x="12" y="146" fill="#e3dacc" font-family="monospace" font-size="10">  orders = order_svc.get_recent(uid, 5)</text>
    <text x="12" y="162" fill="#e3dacc" font-family="monospace" font-size="10">  products = product_svc.get_batch([...])</text>
    <text x="12" y="180" fill="#e3dacc" font-family="monospace" font-size="10">  return aggregate(user_f, member_f, ...)</text>
  </g>
  <g transform="translate(565 270)">
    <rect width="365" height="215" fill="#fff" filter="url(#shadow3)" rx="10"/>
    <rect width="365" height="28" fill="#d97757" rx="10"/>
    <path fill="#d97757" d="M0 16h365v12H0z"/>
    <text x="182" y="16" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">并行服务调用 / Parallel Execution</text>
    <g transform="translate(15 52)">
      <path stroke="#d1cfc5" d="M0 120h340"/>
      <text x="340" y="115" fill="#87867f" font-size="9">时间 →</text>
      <text y="15" fill="#141413" font-size="10" font-weight="bold">Batch 1 (并行)</text>
      <rect width="60" height="22" y="22" fill="#788c5d" fill-opacity=".2" stroke="#788c5d" stroke-width="1.5" rx="4"/>
      <text x="30" y="37" fill="#141413" font-size="9" text-anchor="middle">User Svc</text>
      <text x="30" y="50" fill="#87867f" font-size="8" text-anchor="middle">~100ms</text>
      <rect width="60" height="22" x="65" y="22" fill="#788c5d" fill-opacity=".2" stroke="#788c5d" stroke-width="1.5" rx="4"/>
      <text x="95" y="37" fill="#141413" font-size="9" text-anchor="middle">Member Svc</text>
      <text x="95" y="50" fill="#87867f" font-size="8" text-anchor="middle">~80ms</text>
      <text y="80" fill="#141413" font-size="10" font-weight="bold">Batch 2 (顺序)</text>
      <rect width="80" height="22" x="130" y="87" fill="#d97757" fill-opacity=".2" stroke="#d97757" stroke-width="1.5" rx="4"/>
      <text x="170" y="102" fill="#141413" font-size="9" text-anchor="middle">Order Svc</text>
      <text x="170" y="115" fill="#87867f" font-size="8" text-anchor="middle">~150ms</text>
      <rect width="80" height="22" x="215" y="87" fill="#d97757" fill-opacity=".2" stroke="#d97757" stroke-width="1.5" rx="4"/>
      <text x="255" y="102" fill="#141413" font-size="9" text-anchor="middle">Product Svc</text>
      <text x="255" y="115" fill="#87867f" font-size="8" text-anchor="middle">~120ms</text>
      <text y="145" fill="#788c5d" font-size="11" font-weight="bold">总耗时: ~270ms (目标 200ms)</text>
      <text y="162" fill="#87867f" font-size="10">→ 并行节省了 ~180ms</text>
      <path stroke="#d97757" stroke-dasharray="3,2" d="M140 33v65"/>
      <text x="143" y="70" fill="#d97757" font-size="8">等待</text>
    </g>
  </g>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrow3)" d="M550 270h5"/>
</svg>
