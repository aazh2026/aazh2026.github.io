<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Georgia, serif">
  <defs>
    <linearGradient id="ivory-bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE4"/>
    </linearGradient>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="url(#ivory-bg3)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" fill="#141413" font-weight="bold">智能编排引擎 / Intelligent Orchestration Engine</text>
  <line x1="180" y1="50" x2="780" y2="50" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Natural Language Input -->
  <rect x="40" y="65" width="200" height="100" rx="10" fill="white" filter="url(#shadow3)"/>
  <rect x="40" y="65" width="200" height="30" rx="10" fill="#141413"/>
  <rect x="40" y="83" width="200" height="12" fill="#141413"/>
  <text x="140" y="85" text-anchor="middle" font-size="11" fill="white" font-weight="bold">自然语言需求输入</text>
  <text x="52" y="108" font-size="10" fill="#87867F">获取用户个人中心数据</text>
  <text x="52" y="122" font-size="10" fill="#87867F">包括：用户信息、最近5个</text>
  <text x="52" y="136" font-size="10" fill="#87867F">订单、商品详情、会员积分</text>
  <text x="52" y="152" font-size="10" fill="#D97757" font-style="italic">"响应时间 &lt; 200ms"</text>

  <!-- Arrow from NL to orchestrator -->
  <line x1="240" y1="115" x2="280" y2="115" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="106" text-anchor="middle" font-size="9" fill="#D97757">LLM</text>

  <!-- Orchestrator Box -->
  <rect x="280" y="70" width="260" height="400" rx="10" fill="white" filter="url(#shadow3)"/>
  <rect x="280" y="70" width="260" height="36" rx="10" fill="#788C5D"/>
  <rect x="280" y="94" width="260" height="12" fill="#788C5D"/>
  <text x="410" y="92" text-anchor="middle" font-size="13" fill="white" font-weight="bold">🎯 智能编排引擎</text>

  <!-- Step 1: Dependency Analysis -->
  <g transform="translate(295, 115)">
    <rect width="230" height="55" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="12" y="18" font-size="11" fill="#141413" font-weight="bold">① 依赖分析与并行化</text>
    <text x="12" y="34" font-size="10" fill="#87867F">构建依赖图 → 拓扑排序</text>
    <text x="12" y="48" font-size="10" fill="#788C5D">→ 识别可并行批次</text>
  </g>

  <!-- Step 2: Smart Cache -->
  <g transform="translate(295, 180)">
    <rect width="230" height="55" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="12" y="18" font-size="11" fill="#141413" font-weight="bold">② 智能缓存策略</text>
    <text x="12" y="34" font-size="10" fill="#87867F">低频数据: TTL=3600s</text>
    <text x="12" y="48" font-size="10" fill="#87867F">高频数据: TTL=60s</text>
  </g>

  <!-- Step 3: Fallback -->
  <g transform="translate(295, 245)">
    <rect width="230" height="55" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="12" y="18" font-size="11" fill="#141413" font-weight="bold">③ 故障降级策略</text>
    <text x="12" y="34" font-size="10" fill="#87867F">服务不可用 → 缓存降级</text>
    <text x="12" y="48" font-size="10" fill="#87867F">→ 默认值兜底</text>
  </g>

  <!-- Step 4: Dynamic Optimization -->
  <g transform="translate(295, 310)">
    <rect width="230" height="55" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="12" y="18" font-size="11" fill="#141413" font-weight="bold">④ 运行时动态优化</text>
    <text x="12" y="34" font-size="10" fill="#87867F">基于历史延迟数据</text>
    <text x="12" y="48" font-size="10" fill="#87867F">自动调整超时与缓存</text>
  </g>

  <!-- Step 5: Field Selection -->
  <g transform="translate(295, 375)">
    <rect width="230" height="55" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="12" y="18" font-size="11" fill="#141413" font-weight="bold">⑤ 前端字段裁剪</text>
    <text x="12" y="34" font-size="10" fill="#87867F">Web: 完整字段</text>
    <text x="12" y="48" font-size="10" fill="#87867F">Mobile: 精简字段</text>
  </g>

  <!-- Generated Code Output -->
  <rect x="555" y="70" width="370" height="180" rx="10" fill="#141413" filter="url(#shadow3)"/>
  <rect x="555" y="70" width="370" height="30" rx="10" fill="#1e1e1e"/>
  <rect x="555" y="88" width="370" height="12" fill="#1e1e1e"/>
  <text x="740" y="88" text-anchor="middle" font-size="12" fill="#D1CFC5" font-weight="bold">Generated BFF Code</text>

  <text x="568" y="115" font-size="10" fill="#E3DACC" font-family="monospace">@cache(ttl=300)</text>
  <text x="568" y="130" font-size="10" fill="#E3DACC" font-family="monospace">def get_user_center(user_id):</text>
  <text x="568" y="145" font-size="10" fill="#E3DACC" font-family="monospace">  with ThreadPoolExecutor() as ex:</text>
  <text x="568" y="160" font-size="10" fill="#E3DACC" font-family="monospace">    user_f = ex.submit(user_svc.get, user_id)</text>
  <text x="568" y="175" font-size="10" fill="#E3DACC" font-family="monospace">    member_f = ex.submit(member_svc.get, user_id)</text>
  <text x="568" y="190" font-size="10" fill="#E3DACC" font-family="monospace">  orders = order_svc.get_recent(limit=5)</text>
  <text x="568" y="205" font-size="10" fill="#E3DACC" font-family="monospace">  products = product_svc.get_batch(ids)</text>
  <text x="568" y="220" font-size="10" fill="#E3DACC" font-family="monospace">  return aggregate(user, member, orders, ...)</text>
  <text x="568" y="238" font-size="10" fill="#87867F" font-style="italic">↑ 自动生成，自动优化</text>

  <!-- Service calls (parallel visualization) -->
  <rect x="555" y="265" width="365" height="205" rx="10" fill="white" filter="url(#shadow3)"/>
  <rect x="555" y="265" width="365" height="30" rx="10" fill="#D97757"/>
  <rect x="555" y="283" width="365" height="12" fill="#D97757"/>
  <text x="737" y="283" text-anchor="middle" font-size="11" fill="white" font-weight="bold">并行服务调用 / Parallel Service Calls</text>

  <!-- Parallel calls visualization -->
  <g transform="translate(575, 300)">
    <!-- User