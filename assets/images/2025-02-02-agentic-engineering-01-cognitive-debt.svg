<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">认知债务的四个阶段</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Agentic Engineering · 2026</text>

  <!-- Layer 1: AI生成代码 (top) -->
  <rect x="60" y="60" width="240" height="80" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="76" y="82" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">阶段 1</text>
  <text x="76" y="100" font-size="13" fill="#141413">AI 生成代码</text>
  <text x="76" y="118" font-size="10.5" fill="#87867F">快速交付 · 表面完成</text>
  <!-- clay accent bar left -->
  <rect x="60" y="60" width="4" height="80" rx="2" fill="#D97757"/>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="140" x2="180" y2="152" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="180,156 176,148 184,148" fill="#D1CFC5"/>

  <!-- Layer 2: 认知债务累积 -->
  <rect x="60" y="160" width="240" height="80" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="76" y="182" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">阶段 2</text>
  <text x="76" y="200" font-size="13" fill="#141413">认知债务累积</text>
  <!-- rising graph icon -->
  <polyline points="220,228 232,218 244,222 256,210 264,212" stroke="#D97757" stroke-width="2" fill="none"/>
  <circle cx="264" cy="212" r="3" fill="#D97757"/>
  <text x="76" y="222" font-size="10.5" fill="#87867F">不理解 · 边界不清 · 难以调试</text>
  <rect x="60" y="160" width="4" height="80" rx="2" fill="#D97757"/>

  <!-- Arrow 2→3 -->
  <line x1="180" y1="240" x2="180" y2="252" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="180,256 176,248 184,248" fill="#D1CFC5"/>

  <!-- Layer 3: 调试成本 -->
  <rect x="60" y="260" width="240" height="0" rx="0" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" opacity="0"/>

  <!-- Vertical label -->
  <text x="20" y="200" font-size="9" fill="#87867F" font-family="ui-monospace, monospace"
        transform="rotate(-90 20 200)" text-anchor="middle">复利增长</text>

  <!-- Layer 3 (below, showing negative) -->
  <!-- Let me redo this as a horizontal flow -->
  <rect x="380" y="60" width="240" height="80" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="396" y="82" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">阶段 3</text>
  <text x="396" y="100" font-size="13" fill="#141413">调试成本</text>
  <!-- wrench icon -->
  <path d="M 572 88 L 580 96 L 574 102 L 566 94 Z" stroke="#D97757" stroke-width="1.5" fill="none"/>
  <circle cx="580" cy="88" r="5" stroke="#D97757" stroke-width="1.5" fill="none"/>
  <text x="396" y="118" font-size="10.5" fill="#87867F">时间浪费 · 信心丧失</text>
  <rect x="380" y="60" width="4" height="80" rx="2" fill="#788C5D"/>

  <!-- Arrow 3→4 -->
  <line x1="500" y1="140" x2="500" y2="152" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="500,156 496,148 504,148" fill="#D1CFC5"/>

  <!-- Layer 4: 效率逆袭 (bottom right) -->
  <rect x="380" y="160" width="240" height="80" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="396" y="182" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">阶段 4</text>
  <text x="396" y="200" font-size="13" fill="#141413">效率逆袭</text>
  <!-- down arrow icon -->
  <line x1="558" y1="178" x2="558" y2="198" stroke="#788C5D" stroke-width="2"/>
  <polyline points="550,190 558,200 566,190" stroke="#788C5D" stroke-width="2" fill="none"/>
  <text x="396" y="222" font-size="10.5" fill="#87867F">理解代码 · 掌控边界 · 优雅调试</text>
  <rect x="380" y="160" width="4" height="80" rx="2" fill="#788C5D"/>

  <!-- Dashed cycle arrow from layer 4 back to layer 1 -->
  <path d="M 340 260 C 340 280, 340 280, 180 260" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="180,260 174,254 186,254" fill="#D97757" opacity="0.5"/>
  <text x="260" y="272" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">还债路径</text>

  <!-- Layer 2 repeat label (redundant in this layout, clear separately) -->
  <!-- Labels on right margin for clarity -->
  <text x="630" y="104" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">债务</text>
  <text x="630" y="204" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">解脱</text>

  <title>认知债务的四个阶段</title>
  <desc>认知债务的四个阶段：AI生成代码 → 认知债务累积 → 调试成本 → 效率逆袭</desc>
</svg>
