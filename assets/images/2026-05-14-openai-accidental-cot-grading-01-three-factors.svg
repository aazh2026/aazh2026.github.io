<svg xmlns="http://www.w3.org/2000/svg" aria-label="CoT grading 导致 obfuscation 的三个决定性因素" viewBox="0 0 800 480"><title>CoT Obfuscation 三因素模型</title><desc>Reward magnitude、Coverage、Conditional discoverability 决定 CoT grading 是否导致 monitorability 退化</desc><defs><linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient><linearGradient id="fact1" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#d97757"/><stop offset="100%" stop-color="#c0623f"/></linearGradient><linearGradient id="fact2" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#788c5d"/><stop offset="100%" stop-color="#5e7347"/></linearGradient><linearGradient id="fact3" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#141413"/><stop offset="100%" stop-color="#3a3a38"/></linearGradient></defs><rect width="800" height="480" fill="url(#bg2)" rx="12"/><text x="400" y="38" fill="#141413" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">CoT grading → Obfuscation：三个决定性因素</text><text x="400" y="58" fill="#87867f" font-family="Georgia, serif" font-size="12" text-anchor="middle">OpenAI 2026 CoT grading 事后分析 · 风险评估框架</text><rect width="400" height="38" x="200" y="72" fill="#141413" rx="6"/><text x="400" y="97" fill="#faf9f5" font-family="monospace" font-size="15" font-weight="bold" text-anchor="middle">CoT Obfuscation Risk = f(3 Factors)</text><rect width="230" height="200" x="40" y="135" fill="#faf9f5" stroke="#d97757" stroke-width="3" rx="10"/><rect width="230" height="40" x="40" y="135" fill="url(#fact1)" rx="10 10 0 0"/><text x="155" y="163" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">① Reward Magnitude</text><text x="155" y="195" fill="#d97757" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">奖励幅度</text><text x="155" y="215" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">CoT 奖励/惩罚相对于</text><text x="155" y="230" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">其他训练信号的大小</text><path stroke="#d1cfc5" d="M55 245h200"/><text x="155" y="262" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">当 CoT 奖励与其他奖励</text><text x="155" y="277" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">冲突时，幅度最重要</text><text x="155" y="295" fill="#d97757" font-family="monospace" font-size="11" font-style="italic" text-anchor="middle">幅度越高 × 风险越大</text><text x="155" y="323" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">→ 与其他奖励正交时</text><text x="155" y="336" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">影响较小</text><rect width="230" height="200" x="285" y="135" fill="#faf9f5" stroke="#788c5d" stroke-width="3" rx="10"/><rect width="230" height="40" x="285" y="135" fill="url(#fact2)" rx="10 10 0 0"/><text x="400" y="163" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">② Coverage</text><text x="400" y="195" fill="#788c5d" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">覆盖率</text><text x="400" y="215" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">训练中模型处于可被</text><text x="400" y="230" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">CoT 压力影响环境的频率</text><path stroke="#d1cfc5" d="M300 245h200"/><text x="400" y="262" fill="#141413" font-family="monospace" font-size="11" text-anchor="middle">Coverage ≈</text><text x="400" y="278" fill="#141413" font-family="monospace" font-size="11" text-anchor="middle">P(relevant environment)</text><text x="400" y="298" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">不可解释编码 grading：</text><text x="400" y="313" fill="#788c5d" font-family="monospace" font-size="10" text-anchor="middle">高覆盖率 ✓</text><text x="400" y="328" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">内部 hacking：</text><text x="400" y="343" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">相对较低覆盖率</text><rect width="230" height="200" x="530" y="135" fill="#faf9f5" stroke="#141413" stroke-width="3" rx="10"/><rect width="230" height="40" x="530" y="135" fill="url(#fact3)" rx="10 10 0 0"/><text x="645" y="163" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">③ Conditional</text><text x="645" y="178" fill="#faf9f5" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Discoverability</text><text x="645" y="195" fill="#87867f" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">条件可发现性</text><text x="645" y="215" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">在相关环境中，模型</text><text x="645" y="230" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">采样目标 CoT 行为的概率</text><path stroke="#d1cfc5" d="M545 245h200"/><text x="645" y="262" fill="#141413" font-family="monospace" font-size="11" text-anchor="middle">Discoverability ≈</text><text x="645" y="278" fill="#141413" font-family="monospace" font-size="11" text-anchor="middle">P(target CoT | env)</text><text x="645" y="298" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">不可解释编码：低可发现性</text><text x="645" y="313" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">（困难的探索问题）</text><text x="645" y="328" fill="#141413" font-family="monospace" font-size="10" text-anchor="middle">内部 hacking：略高</text><text x="645" y="343" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">可发现性</text><path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M400 340v25"/><path fill="#d97757" d="m400 370-5-10h10z"/><rect width="600" height="55" x="100" y="370" fill="#141413" rx="8"/><text x="400" y="390" fill="#d97757" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">关键洞察：稀疏 CoT 压力似乎不会自动产生泛化 CoT obfuscation</text><text x="400" y="408" fill="#d1cfc5" font-family="monospace" font-size="11" text-anchor="middle">现实 RL 条件下难以产生显著 monitorability 退化 —— 但原理上足够强的压力会导致降解</text><text x="400" y="448" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">数据来源：OpenAI Alignment 团队事后分析 · 2026-05-14</text><text x="400" y="464" fill="#d1cfc5" font-family="monospace" font-size="10" text-anchor="middle">注：Coverage ≠ Discoverability —— 两因素需分别评估</text></svg>