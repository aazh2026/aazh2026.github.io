<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>层聚合方式对比与 Block AttnRes</title>
  <desc>对比标准残差连接的固定权重导致贡献稀释，Attention Residuals 通过可学习权重实现自适应层聚合，以及 Block AttnRes 在保持内存效率的同时实现这一机制</desc>

  <!-- Background -->
  <rect width="640" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="24" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">层聚合方式对比与 Block AttnRes</text>
  <text x="320" y="40" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Kimi 团队 · arXiv:2603.15031 · 2026/03</text>

  <!-- LEFT SECTION: Fixed aggregation (Standard Residual) -->
  <rect x="20" y="56" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="115" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">固定聚合（Standard）</text>

  <!-- Layer 1-4 boxes -->
  <rect x="36" y="92" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="62" y="110" text-anchor="middle" font-size="9" fill="#141413">L1</text>
  <rect x="36" y="126" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="62" y="144" text-anchor="middle" font-size="9" fill="#141413">L2</text>
  <rect x="36" y="160" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="62" y="178" text-anchor="middle" font-size="9" fill="#141413">L3</text>
  <rect x="36" y="194" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="62" y="212" text-anchor="middle" font-size="9" fill="#141413">L4</text>

  <!-- Equal arrows -->
  <line x1="92" y1="106" x2="112" y2="106" stroke="#D97757" stroke-width="2"/>
  <line x1="92" y1="140" x2="112" y2="140" stroke="#D97757" stroke-width="2"/>
  <line x1="92" y1="174" x2="112" y2="174" stroke="#D97757" stroke-width="2"/>
  <line x1="92" y1="208" x2="112" y2="208" stroke="#D97757" stroke-width="2"/>

  <!-- =1.0 labels -->
  <text x="102" y="100" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">=1</text>
  <text x="102" y="134" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">=1</text>
  <text x="102" y="168" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">=1</text>
  <text x="102" y="202" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">=1</text>

  <!-- Problem annotation -->
  <rect x="118" y="130" width="84" height="36" rx="3" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="160" y="144" text-anchor="middle" font-size="8" fill="#141413">所有层</text>
  <text x="160" y="157" text-anchor="middle" font-size="8" fill="#141413">均等贡献</text>

  <!-- Arrow to middle -->
  <line x1="214" y1="156" x2="226" y2="156" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="226,156 220,152 220,160" fill="#D1CFC5"/>

  <!-- MIDDLE SECTION: Adaptive aggregation (AttnRes) -->
  <rect x="230" y="56" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="325" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">自适应聚合（AttnRes）</text>

  <!-- Layer 1-4 boxes -->
  <rect x="246" y="92" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#788C5D" stroke-width="1"/>
  <text x="272" y="110" text-anchor="middle" font-size="9" fill="#141413">L1</text>
  <rect x="246" y="126" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#788C5D" stroke-width="1"/>
  <text x="272" y="144" text-anchor="middle" font-size="9" fill="#141413">L2</text>
  <rect x="246" y="160" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#788C5D" stroke-width="1"/>
  <text x="272" y="178" text-anchor="middle" font-size="9" fill="#141413">L3</text>
  <rect x="246" y="194" width="52" height="28" rx="3" fill="#F0EEE6" stroke="#788C5D" stroke-width="1"/>
  <text x="272" y="212" text-anchor="middle" font-size="9" fill="#141413">L4</text>

  <!-- Variable arrows -->
  <line x1="302" y1="106" x2="322" y2="106" stroke="#788C5D" stroke-width="2.5"/>
  <line x1="302" y1="140" x2="322" y2="140" stroke="#788C5D" stroke-width="1.2"/>
  <line x1="302" y1="174" x2="322" y2="174" stroke="#788C5D" stroke-width="0.6"/>
  <line x1="302" y1="208" x2="322" y2="208" stroke="#788C5D" stroke-width="0.4"/>

  <!-- Variable weight labels -->
  <text x="326" y="100" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">α=0.6</text>
  <text x="326" y="134" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">α=0.25</text>
  <text x="326" y="168" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">α=0.1</text>
  <text x="326" y="202" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">α=0.05</text>

  <!-- Annotation -->
  <rect x="328" y="132" width="84" height="36" rx="3" fill="#788C5D" opacity="0.12" stroke="#788C5D" stroke-width="1"/>
  <text x="370" y="146" text-anchor="middle" font-size="8" fill="#141413">选择性</text>
  <text x="370" y="159" text-anchor="middle" font-size="8" fill="#141413">信息聚合</text>

  <!-- Problem: O(L²) memory -->
  <rect x="246" y="238" width="170" height="20" rx="3" fill="#D97757" opacity="0.12" stroke="#D97757" stroke-width="1"/>
  <text x="331" y="252" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">内存：O(L² × D) — 不可扩展</text>

  <!-- Arrow to right -->
  <line x1="424" y1="156" x2="436" y2="156" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="436,156 430,152 430,160" fill="#D1CFC5"/>

  <!-- RIGHT SECTION: Block AttnRes -->
  <rect x="440" y="56" width="190" height="220" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="535" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Block AttnRes（B=4）</text>

  <!-- Block 1 (L1-L4) -->
  <rect x="456" y="92" width="80" height="60" rx="4" fill="#D97757" opacity="0.08" stroke="#D97757" stroke-width="1.5"/>
  <rect x="460" y="98" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="476" y="112" text-anchor="middle" font-size="8" fill="#141413">L1</text>
  <rect x="460" y="122" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="476" y="136" text-anchor="middle" font-size="8" fill="#141413">L2</text>
  <rect x="496" y="98" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="512" y="112" text-anchor="middle" font-size="8" fill="#141413">L3</text>
  <rect x="496" y="122" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="512" y="136" text-anchor="middle" font-size="8" fill="#141413">L4</text>

  <!-- Intra-block attention arrows -->
  <line x1="492" y1="108" x2="496" y2="108" stroke="#788C5D" stroke-width="1.2"/>
  <line x1="492" y1="128" x2="496" y2="128" stroke="#788C5D" stroke-width="1.2"/>
  <line x1="460" y1="118" x2="460" y2="122" stroke="#788C5D" stroke-width="1.2"/>
  <line x1="528" y1="118" x2="528" y2="122" stroke="#788C5D" stroke-width="1.2"/>

  <!-- Block label -->
  <text x="496" y="148" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">块内 AttnRes</text>

  <!-- Inter-block residual arrow -->
  <line x1="536" y1="122" x2="558" y2="122" stroke="#D97757" stroke-width="2"/>
  <polygon points="558,122 552,118 552,126" fill="#D97757"/>
  <text x="547" y="116" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">残差</text>

  <!-- Next block -->
  <rect x="560" y="92" width="60" height="60" rx="4" fill="#D1CFC5" opacity="0.3" stroke="#D1CFC5" stroke-width="1"/>
  <text x="590" y="126" text-anchor="middle" font-size="9" fill="#87867F">Block 2</text>

  <!-- Second block rows -->
  <rect x="456" y="164" width="80" height="60" rx="4" fill="#D97757" opacity="0.08" stroke="#D97757" stroke-width="1.5"/>
  <rect x="460" y="170" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="476" y="184" text-anchor="middle" font-size="8" fill="#141413">L5</text>
  <rect x="460" y="194" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="476" y="208" text-anchor="middle" font-size="8" fill="#141413">L6</text>
  <rect x="496" y="170" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="512" y="184" text-anchor="middle" font-size="8" fill="#141413">L7</text>
  <rect x="496" y="194" width="32" height="20" rx="2" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="512" y="208" text-anchor="middle" font-size="8" fill="#141413">L8</text>
  <rect x="560" y="164" width="60" height="60" rx="4" fill="#D1CFC5" opacity="0.3" stroke="#D1CFC5" stroke-width="1"/>
  <text x="590" y="198" text-anchor="middle" font-size="9" fill="#87867F">Block 3</text>

  <!-- O(L²/B) memory label -->
  <rect x="456" y="238" width="170" height="20" rx="3" fill="#788C5D" opacity="0.15" stroke="#788C5D" stroke-width="1"/>
  <text x="541" y="252" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">内存：O(L²/B × D) — 可扩展</text>
</svg>
