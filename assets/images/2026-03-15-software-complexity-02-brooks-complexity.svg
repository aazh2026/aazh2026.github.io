<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 900 420"><defs><linearGradient id="bg2" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#faf9f5"/><stop offset="100%" style="stop-color:#e3dacc"/></linearGradient><filter id="shadow2" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/></filter></defs><rect width="900" height="420" fill="url(#bg2)" rx="12"/><text x="450" y="38" fill="#141413" font-size="20" font-weight="700" text-anchor="middle">Brooks 复杂度框架：AI 的能力边界</text><text x="450" y="60" fill="#87867f" font-size="12" text-anchor="middle">本质复杂度 vs 偶然复杂度，以及 AI 引入的新型复杂度</text><g filter="url(#shadow2)" transform="translate(40 90)"><rect width="260" height="280" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="130" y="28" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">Brooks 复杂度分类</text><rect width="230" height="95" x="15" y="48" fill="#d97757" fill-opacity=".1" stroke="#d97757" rx="6"/><text x="130" y="68" fill="#d97757" font-size="12" font-weight="700" text-anchor="middle">本质复杂度 (Essential)</text><text x="130" y="88" fill="#87867f" font-size="10" text-anchor="middle">来自问题本身，无法消除</text><text x="25" y="108" fill="#141413" font-size="10">• 需求的内在矛盾</text><text x="25" y="123" fill="#141413" font-size="10">• 状态空间爆炸</text><text x="25" y="138" fill="#141413" font-size="10">• 严格一致性要求</text><rect width="230" height="115" x="15" y="153" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" rx="6"/><text x="130" y="173" fill="#788c5d" font-size="12" font-weight="700" text-anchor="middle">偶然复杂度 (Accidental)</text><text x="130" y="193" fill="#87867f" font-size="10" text-anchor="middle">来自解决方案，可被消除</text><text x="25" y="213" fill="#141413" font-size="10">• 依赖地狱和版本冲突</text><text x="25" y="228" fill="#141413" font-size="10">• 配置文件的爆炸</text><text x="25" y="243" fill="#141413" font-size="10">• 微服务治理 overhead</text><text x="25" y="258" fill="#788c5d" font-size="10" font-weight="600">← AI 主要作用于此</text></g><g filter="url(#shadow2)" transform="translate(320 90)"><rect width="260" height="280" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="130" y="28" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">AI 擅长解决的</text><g transform="translate(15 48)"><rect width="230" height="40" fill="#788c5d" fill-opacity=".15" rx="4"/><text x="115" y="18" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">✅ 样板代码生成</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">CRUD、测试、配置、文档</text></g><g transform="translate(15 98)"><rect width="230" height="40" fill="#788c5d" fill-opacity=".15" rx="4"/><text x="115" y="18" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">✅ 记忆负担转移</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">API 细节、算法实现</text></g><g transform="translate(15 148)"><rect width="230" height="40" fill="#788c5d" fill-opacity=".15" rx="4"/><text x="115" y="18" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">✅ 快速原型探索</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">Demo、算法验证、代码解释</text></g><g transform="translate(15 198)"><rect width="230" height="70" fill="#d97757" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#d97757" font-size="11" font-weight="700" text-anchor="middle">❌ 无法替代的</text><text x="115" y="36" fill="#141413" font-size="10" text-anchor="middle">需求理解 · 架构设计 · 系统思考</text><text x="115" y="54" fill="#d97757" font-size="10" text-anchor="middle">&quot;AI 解决如何做，无法决定应不应该做&quot;</text></g></g><g filter="url(#shadow2)" transform="translate(600 90)"><rect width="260" height="280" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="130" y="28" fill="#d97757" font-size="14" font-weight="700" text-anchor="middle">AI 引入的新型复杂度</text><text fill="#141413" font-size="12" font-weight="600" transform="translate(15 50)">认知分裂</text><text y="18" fill="#87867f" font-size="10" transform="translate(15 50)">使用不理解的东西 vs 花费</text><text y="32" fill="#87867f" font-size="10" transform="translate(15 50)">额外精力去理解它</text><text fill="#141413" font-size="12" font-weight="600" transform="translate(15 100)">验证负担</text><text y="18" fill="#87867f" font-size="10" transform="translate(15 100)">每行 AI 代码都需要审查</text><text y="32" fill="#87867f" font-size="10" transform="translate(15 100)">从&quot;写&quot;转移到&quot;验证&quot;</text><text fill="#141413" font-size="12" font-weight="600" transform="translate(15 150)">信任校准</text><text y="18" fill="#87867f" font-size="10" transform="translate(15 150)">过度信任 vs 过度不信任</text><text y="32" fill="#87867f" font-size="10" transform="translate(15 150)">判断何时该信、何时该质疑</text><g transform="translate(15 200)"><rect width="230" height="65" fill="#141413" fill-opacity=".05" rx="4"/><text x="115" y="20" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">复杂性守恒定律</text><text x="115" y="40" fill="#87867f" font-size="10" text-anchor="middle">AI 没有消除复杂性</text><text x="115" y="54" fill="#87867f" font-size="10" text-anchor="middle">只是将它从一种形式转化为另一种</text></g></g><text x="450" y="400" fill="#87867f" font-size="10" text-anchor="middle">Fred Brooks, &quot;No Silver Bullet&quot; (1986) | AI 是一把更锋利的剑，wielder 的能力会被放大</text></svg>