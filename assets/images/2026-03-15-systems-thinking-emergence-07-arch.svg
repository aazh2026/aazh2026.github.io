<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="'Courier New', Courier, monospace" font-size="12">
  <rect width="520" height="280" fill="#FAF9F5"/>
  <!-- Outer frame -->
  <rect x="20" y="10" width="480" height="260" fill="none" stroke="#141413" stroke-width="2"/>
  <!-- Header text -->
  <text x="260" y="36" text-anchor="middle" fill="#141413" font-weight="bold" font-size="13">安全操作空间</text>
  <!-- Inner frame -->
  <rect x="60" y="52" width="400" height="150" fill="none" stroke="#141413" stroke-width="2"/>
  <!-- Inner label -->
  <rect x="60" y="52" width="400" height="28" fill="#D1CFC5"/>
  <text x="260" y="71" text-anchor="middle" fill="#141413" font-weight="bold">允许探索和失败的区域</text>
  <!-- Decorative inner lines -->
  <text x="260" y="115" text-anchor="middle" fill="#87867F" font-size="11">在这里，涌现性可以发生</text>
  <!-- Bottom hard boundary text -->
  <text x="260" y="235" text-anchor="middle" fill="#D97757" font-weight="bold">硬边界：成本、安全、合规性</text>
  <!-- Corner markers -->
  <rect x="36" y="18" width="12" height="12" fill="#D97757"/>
  <rect x="472" y="18" width="12" height="12" fill="#D97757"/>
  <rect x="36" y="250" width="12" height="12" fill="#D97757"/>
  <rect x="472" y="250" width="12" height="12" fill="#D97757"/>
</svg>
