<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500"><defs><style>.artifact-box{fill:#faf9f5;stroke:#d1cfc5;stroke-width:1.5}.artifact-name,.section-label{font-family:system-ui,sans-serif}.section-label{fill:#87867f;font-size:11px}.artifact-name{fill:#141413;font-size:13px;font-weight:600}.artifact-desc,.delta-label{fill:#87867f;font-family:system-ui,sans-serif;font-size:10px}.delta-label{fill:#d97757;font-size:11px;font-weight:600}.bad-text,.green-label{font-family:system-ui,sans-serif;font-size:10px}.green-label{fill:#788c5d;font-weight:600}.bad-text{fill:#87867f;text-decoration:line-through}</style></defs><path d="M0 0h720v500H0z" style="fill:#faf9f5"/><text x="24" y="32" font-size="16" font-weight="700" style="fill:#141413;font-family:system-ui,sans-serif">最小设计集合：4 个文件驱动 AI 代码生成</text><path stroke="#d1cfc5" d="M24 42h672"/><g transform="translate(24 58)"><text class="section-label">必须保留的 4 个 Artifacts</text><g transform="translate(0 14)"><rect width="280" height="72" rx="6" style="fill:#faf9f5;stroke:#d97757;stroke-width:2"/><rect width="36" height="36" x="8" y="8" fill="#d97757" rx="4"/><text x="26" y="34" fill="#fff" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">1</text><text x="56" y="24" class="artifact-name">intent.md</text><text x="56" y="40" class="artifact-desc">意图 · 目标 · 成功指标</text><text x="56" y="56" class="delta-label">AI 软件工程的北极星</text><text x="240" y="54" class="section-label">必须</text></g><g transform="translate(0 96)"><rect width="280" height="72" class="artifact-box" rx="6"/><rect width="36" height="36" x="8" y="8" fill="#788c5d" rx="4"/><text x="26" y="34" fill="#fff" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">2</text><text x="56" y="24" class="artifact-name">domain.md</text><text x="56" y="40" class="artifact-desc">Entity · Field · Rules</text><text x="56" y="56" class="green-label">划定 AI 的业务边界</text><text x="240" y="54" class="section-label">必须</text></g><g transform="translate(0 178)"><rect width="280" height="72" class="artifact-box" rx="6"/><rect width="36" height="36" x="8" y="8" fill="#788c5d" rx="4"/><text x="26" y="34" fill="#fff" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">3</text><text x="56" y="24" class="artifact-name">api.yaml</text><text x="56" y="40" class="artifact-desc">OpenAPI / JSON Schema</text><text x="56" y="56" class="green-label">结构化 · AI 可直接执行</text><text x="240" y="54" class="section-label">强烈建议</text></g><g transform="translate(0 260)"><rect width="280" height="72" class="artifact-box" rx="6"/><rect width="36" height="36" x="8" y="8" fill="#d97757" rx="4"/><text x="26" y="34" fill="#fff" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">4</text><text x="56" y="24" class="artifact-name">constraints.md</text><text x="56" y="40" class="artifact-desc">性能 · 安全 · 一致性</text><text x="56" y="56" class="delta-label">明确 AI 必须遵守的边界</text><text x="240" y="54" class="section-label">必须</text></g><rect width="280" height="28" y="344" fill="#d97757" rx="6"/><text x="140" y="363" fill="#fff" font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">足以驱动：代码 + 测试 + PR Review</text></g><g transform="translate(324 58)"><text class="section-label">可以删除的传统 Artifacts</text><rect width="372" height="358" y="14" class="artifact-box" rx="8"/><g transform="translate(16 30)"><rect width="16" height="16" fill="#87867f" rx="3"/><text x="24" y="13" class="artifact-name" font-size="12">Sequence Diagram（时序图）</text><text x="16" y="32" class="artifact-desc">传统：Puml 图</text><text x="16" y="46" class="bad-text">→ AI 解析图形能力弱</text><text x="16" y="60" class="bad-text">→ 维护成本高</text><text x="16" y="74" class="bad-text">→ 容易过期</text><text x="16" y="88" fill="#788c5d" font-family="system-ui" font-size="10">✅ 用文字场景描述替代</text></g><path stroke="#d1cfc5" d="M16 126h340"/><g transform="translate(16 136)"><rect width="16" height="16" fill="#87867f" rx="3"/><text x="24" y="13" class="artifact-name" font-size="12">Behavior Spec（行为规格）</text><text x="16" y="32" class="artifact-desc">传统：Given/When/Then 文档</text><text x="16" y="46" class="bad-text">→ 测试用例可直接表达</text><text x="16" y="60" class="artifact-desc">AI 更喜欢具体例子</text><text x="16" y="74" fill="#788c5d" font-family="system-ui" font-size="10">✅ 删掉，用测试用例替代</text></g><path stroke="#d1cfc5" d="M16 222h340"/><g transform="translate(16 232)"><rect width="16" height="16" fill="#87867f" rx="3"/><text x="24" y="13" class="artifact-name" font-size="12">Architecture Doc（架构文档）</text><text x="16" y="32" class="artifact-desc">传统：10+ 页架构设计</text><text x="16" y="46" class="bad-text">→ 如果 Repo 结构已存在</text><text x="16" y="60" class="artifact-desc">AI 通常已能理解</text><text x="16" y="74" fill="#788c5d" font-family="system-ui" font-size="10">✅ 用一个 tech.md（4行）替代</text></g><path stroke="#d1cfc5" d="M16 318h340"/><g transform="translate(16 328)"><rect width="16" height="16" fill="#87867f" rx="3"/><text x="24" y="13" class="artifact-name" font-size="12">Evaluation Spec（评估规格）</text><text x="16" y="32" class="artifact-desc">传统：独立的评估文档</text><text x="16" y="46" class="artifact-desc">有 API Contract + Domain Model</text><text x="16" y="60" fill="#788c5d" font-family="system-ui" font-size="10">✅ AI 可直接生成测试，删掉</text></g></g><text class="section-label" transform="translate(24 432)">AI 最喜欢的格式 vs 最不喜欢的</text><g transform="translate(24 444)"><rect width="120" height="36" fill="#788c5d" rx="6"/><text x="60" y="24" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">Markdown ✅</text></g><g transform="translate(152 444)"><rect width="80" height="36" fill="#788c5d" rx="6"/><text x="40" y="24" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">YAML ✅</text></g><g transform="translate(240 444)"><rect width="80" height="36" fill="#788c5d" rx="6"/><text x="40" y="24" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">SQL ✅</text></g><g transform="translate(340 444)"><rect width="80" height="36" fill="#87867f" rx="6"/><text x="40" y="24" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">PDF ❌</text></g><g transform="translate(428 444)"><rect width="80" height="36" fill="#87867f" rx="6"/><text x="40" y="24" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">PPT ❌</text></g><g transform="translate(516 444)"><rect width="120" height="36" fill="#87867f" rx="6"/><text x="60" y="24" fill="#fff" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle">图片/Diagram ❌</text></g></svg>