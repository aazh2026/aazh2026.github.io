<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img">
  <title>AI时代DORA指标重构对比</title>
  <desc>传统DORA指标与AI时代DORA指标对比</desc>

  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-family: system-ui, sans-serif; }
      .text-secondary { fill: #87867F; font-family: system-ui, sans-serif; }
      .text-accent { fill: #D97757; font-family: system-ui, sans-serif; font-weight: 600; }
      .text-olive { fill: #788C5D; font-family: system-ui, sans-serif; font-weight: 500; }
      .border { stroke: #D1CFC5; stroke-width: 1; fill: none; }
      .header-bg { fill: #141413; }
      .row-alt { fill: #E3DACC; opacity: 0.3; }
      .old-col { fill: #87867F; opacity: 0.1; }
      .new-col { fill: #788C5D; opacity: 0.1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="360" class="bg"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" class="text-main" font-size="18" font-weight="600">传统DORA → AI时代DORA</text>

  <!-- Table header -->
  <g transform="translate(0, 45)">
    <rect x="10" y="0" width="200" height="32" rx="4" fill="#87867F" opacity="0.15"/>
    <rect x="210" y="0" width="220" height="32" rx="4" fill="#87867F" opacity="0.08"/>
    <text x="110" y="21" text-anchor="middle" class="text-secondary" font-size="12">传统DORA</text>

    <rect x="430" y="0" width="340" height="32" rx="4" fill="#788C5D" opacity="0.15"/>
    <text x="600" y="21" text-anchor="middle" class="text-olive" font-size="12">AI时代DORA</text>
  </g>

  <!-- Arrow header -->
  <g transform="translate(0, 77)">
    <text x="390" y="0" text-anchor="middle" class="text-accent" font-size="11">→</text>
  </g>

  <!-- Table rows -->
  <g transform="translate(0, 85)">
    <!-- Row 1: 部署频率 -->
    <g transform="translate(0, 0)">
      <rect x="10" y="0" width="200" height="48" rx="4" fill="#E3DACC" opacity="0.4"/>
      <rect x="210" y="0" width="220" height="48" rx="0" fill="#87867F" opacity="0.06"/>
      <rect x="430" y="0" width="340" height="48" rx="4" fill="#788C5D" opacity="0.1"/>

      <text x="30" y="18" class="text-main" font-size="11" font-weight="500">部署频率</text>
      <text x="30" y="34" class="text-secondary" font-size="9">Deployment Frequency</text>

      <text x="320" y="18" text-anchor="middle" class="text-secondary" font-size="10">代码部署次数</text>
      <text x="320" y="34" text-anchor="middle" class="text-secondary" font-size="9">"多久部署一次"</text>

      <text x="600" y="18" text-anchor="middle" class="text-olive" font-size="10">意图交付频率</text>
      <text x="600" y="34" text-anchor="middle" class="text-main" font-size="9">业务意图实现数量</text>
    </g>

    <!-- Row 2: 变更前置时间 -->
    <g transform="translate(0, 56)">
      <rect x="10" y="0" width="200" height="48" rx="4" fill="#E3DACC" opacity="0.4"/>
      <rect x="210" y="0" width="220" height="48" rx="0" fill="#87867F" opacity="0.06"/>
      <rect x="430" y="0" width="340" height="48" rx="4" fill="#788C5D" opacity="0.1"/>

      <text x="30" y="18" class="text-main" font-size="11" font-weight="500">变更前置时间</text>
      <text x="30" y="34" class="text-secondary" font-size="9">Lead Time for Changes</text>

      <text x="320" y="18" text-anchor="middle" class="text-secondary" font-size="10">代码提交 → 上线</text>
      <text x="320" y="34" text-anchor="middle" class="text-secondary" font-size="9">"代码到生产的速度"</text>

      <text x="600" y="18" text-anchor="middle" class="text-olive" font-size="10">意图交付周期</text>
      <text x="600" y="34" text-anchor="middle" class="text-main" font-size="9">意图定义 → 交付</text>
    </g>

    <!-- Row 3: 恢复服务时间 -->
    <g transform="translate(0, 112)">
      <rect x="10" y="0" width="200" height="48" rx="4" fill="#E3DACC" opacity="0.4"/>
      <rect x="210" y="0" width="220" height="48" rx="0" fill="#87867F" opacity="0.06"/>
      <rect x="430" y="0" width="340" height="48" rx="4" fill="#788C5D" opacity="0.1"/>

      <text x="30" y="18" class="text-main" font-size="11" font-weight="500">恢复服务时间</text>
      <text x="30" y="34" class="text-secondary" font-size="9">Time to Restore Service</text>

      <text x="320" y="18" text-anchor="middle" class="text-secondary" font-size="10">修复生产故障</text>
      <text x="320" y="34" text-anchor="middle" class="text-secondary" font-size="9">技术问题</text>

      <text x="600" y="18" text-anchor="middle" class="text-olive" font-size="10">意图恢复时间</text>
      <text x="600" y="34" text-anchor="middle" class="text-main" font-size="9">修复意图误解</text>
    </g>

    <!-- Row 4: 变更失败率 -->
    <g transform="translate(0, 168)">
      <rect x="10" y="0" width="200" height="48" rx="4" fill="#E3DACC" opacity="0.4"/>
      <rect x="210" y="0" width="220" height="48" rx="0" fill="#87867F" opacity="0.06"/>
      <rect x="430" y="0" width="340" height="48" rx="4" fill="#788C5D" opacity="0.1"/>

      <text x="30" y="18" class="text-main" font-size="11" font-weight="500">变更失败率</text>
      <text x="30" y="34" class="text-secondary" font-size="9">Change Failure Rate</text>

      <text x="320" y="18" text-anchor="middle" class="text-secondary" font-size="10">导致故障的部署比例</text>
      <text x="320" y="34" text-anchor="middle" class="text-secondary" font-size="9">系统崩溃/错误</text>

      <text x="600" y="18" text-anchor="middle" class="text-olive" font-size="10">意图偏离率</text>
      <text x="600" y="34" text-anchor="middle" class="text-main" font-size="9">实现与意图不符</text>
    </g>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(0, 315)">
    <rect x="150" y="0" width="480" height="36" rx="6" fill="#D97757" opacity="0.1"/>
    <text x="390" y="23" text-anchor="middle" class="text-accent" font-size="11" font-weight="500">核心转变：从关注"代码流动"到关注"意图流动"</text>
  </g>
</svg>