<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- OpenClaw 四层架构模型 -->
  <rect width="560" height="240" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413">OpenClaw 四层架构模型</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/01/22</text>

  <!-- Layer 4: 模型层 (top) -->
  <rect x="40" y="50" width="480" height="44" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="2"/>
  <text x="60" y="72" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L4 · 模型层</text>
  <text x="140" y="72" font-size="11" fill="#141413" font-weight="600">Model Layer</text>
  <text x="140" y="86" font-size="9.5" fill="#87867F">Kimi / GPT / Claude 等大模型 · 推理能力 · 上下文理解</text>

  <!-- Arrow -->
  <line x1="280" y1="94" x2="280" y2="104" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,104 280,112 284,104" fill="#D1CFC5"/>

  <!-- Layer 3: 技能层 -->
  <rect x="40" y="114" width="480" height="44" rx="6" fill="#FED7AA" stroke="#788C5D" stroke-width="1.5"/>
  <text x="60" y="136" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">L3 · 技能层</text>
  <text x="140" y="136" font-size="11" fill="#141413" font-weight="600">Skill Layer · 13,000+ Skills</text>
  <text x="140" y="150" font-size="9.5" fill="#87867F">工具调用 (GitHub/Notion/Slack) · 领域能力 (SEO/数据分析/编程) · 自动化脚本</text>

  <!-- Arrow -->
  <line x1="280" y1="158" x2="280" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,168 280,176 284,168" fill="#D1CFC5"/>

  <!-- Layer 2: 执行层 -->
  <rect x="40" y="178" width="480" height="44" rx="6" fill="#DBEAFE" stroke="#788C5D" stroke-width="1.5"/>
  <text x="60" y="200" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">L2 · 执行层</text>
  <text x="140" y="200" font-size="11" fill="#141413" font-weight="600">Execution Layer · Cron / Agent / Workflow</text>
  <text x="140" y="214" font-size="9.5" fill="#87867F">定时任务 · 多步骤编排 · 异常处理</text>

  <!-- Baseline -->
  <line x1="40" y1="228" x2="520" y2="228" stroke="#D1CFC5" stroke-width="1"/>
  <text x="280" y="238" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">从模型理解到技能执行，层层递进，最终落地为可执行的任务编排</text>
</svg>