<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Intent-Driven 适用场景分层 -->
  <rect width="560" height="180" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="18" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Intent-Driven 适用场景分层</text>
  <text x="280" y="34" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/11</text>

  <!-- Layer 1: Intent-Driven (80%) - largest -->
  <rect x="20" y="50" width="520" height="52" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1.8"/>
  <text x="44" y="72" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="700">80%</text>
  <text x="80" y="72" font-size="13" fill="#141413" font-weight="600">Intent-Driven</text>
  <text x="44" y="90" font-size="10" fill="#87867F">大多数需求：意图描述 + Examples + 约束条件 → AI 自主推导实现</text>
  <rect x="490" y="64" width="34" height="20" rx="10" fill="#D97757"/>
  <text x="507" y="79" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">80%</text>

  <!-- Layer 2: Structured Design (15%) -->
  <rect x="60" y="110" width="440" height="38" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="84" y="128" font-size="11" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="700">15%</text>
  <text x="120" y="128" font-size="13" fill="#141413" font-weight="600">Structured Design</text>
  <text x="84" y="142" font-size="10" fill="#87867F">需要明确架构约束的场景：微服务边界、数据一致性要求</text>
  <rect x="462" y="120" width="26" height="18" rx="9" fill="#2563EB"/>
  <text x="475" y="133" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">15%</text>

  <!-- Layer 3: Detailed Design (5%) -->
  <rect x="100" y="156" width="360" height="18" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="120" y="168" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="700">5%</text>
  <text x="150" y="168" font-size="10" fill="#141413" font-weight="600">Detailed Design</text>
  <text x="300" y="168" font-size="9.5" fill="#87867F">安全关键、 regulatory compliance、极度复杂的算法</text>

  <!-- Arrow: layered approach -->
  <text x="280" y="176" text-anchor="middle" font-size="8.5" fill="#87867F" font-style="italic">按需选择详细程度，而不是为所有需求写完整 Spec</text>
</svg>