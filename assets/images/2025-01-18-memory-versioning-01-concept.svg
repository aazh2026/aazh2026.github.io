<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 600 300">
  <title>记忆版本控制流程</title>
  <desc>
    Horizontal flow diagram showing three stages: old knowledge, version detection, and new knowledge
  </desc>
  <path fill="#faf9f5" d="M0 0h600v300H0z"/>
  <text x="300" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">记忆版本控制流程</text>
  <text x="300" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">记忆版本控制 · 2025/01/18</text>
  <rect width="150" height="120" x="30" y="75" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="100" height="22" x="55" y="87" fill="#e3dacc" rx="11"/>
  <text x="105" y="103" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">旧知识 (过时)</text>
  <text x="105" y="130" fill="#141413" font-size="11" text-anchor="middle">Python 有 GIL</text>
  <text x="105" y="148" fill="#141413" font-size="11" text-anchor="middle">多线程性能受限</text>
  <text x="105" y="175" fill="#87867f" font-size="9.5" text-anchor="middle">v1.0.0 · 2023</text>
  <circle cx="155" cy="88" r="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5"/>
  <path stroke="#d97757" stroke-linecap="round" stroke-width="1.5" d="M155 88v-8m0 8 6 3"/>
  <path stroke="#d1cfc5" stroke-width="2" d="M182 135h36"/>
  <path fill="#d1cfc5" d="m222 135-8-5v10z"/>
  <rect width="160" height="120" x="220" y="75" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <rect width="90" height="22" x="255" y="87" fill="#d97757" rx="11"/>
  <text x="300" y="103" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">版本检测</text>
  <text x="300" y="132" fill="#141413" font-size="11" text-anchor="middle">检测到知识过期</text>
  <text x="300" y="150" fill="#141413" font-size="11" text-anchor="middle">发现新版本事实</text>
  <text x="300" y="168" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">v1.0.0 → v2.0.0</text>
  <text x="232" y="110" fill="#d97757" font-size="11">✦</text>
  <text x="356" y="110" fill="#d97757" font-size="11">✦</text>
  <path stroke="#d1cfc5" stroke-width="2" d="M382 135h36"/>
  <path fill="#d1cfc5" d="m422 135-8-5v10z"/>
  <rect width="150" height="120" x="420" y="75" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="100" height="22" x="445" y="87" fill="#788c5d" rx="11"/>
  <text x="495" y="103" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">新知识 (更新)</text>
  <text x="495" y="130" fill="#141413" font-size="11" text-anchor="middle">Python 3.12+</text>
  <text x="495" y="148" fill="#141413" font-size="11" text-anchor="middle">可禁用 GIL</text>
  <text x="495" y="175" fill="#87867f" font-size="9.5" text-anchor="middle">v2.0.0 · 2024</text>
  <circle cx="545" cy="88" r="12" fill="#788c5d"/>
  <path fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m539 88 4 4 8-8"/>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,4" stroke-width="1.5" d="M495 210c0 20-195 35-195 35s-195-15-195-35" opacity=".5"/>
  <path fill="#d97757" d="m105 210 6 5v-10z" opacity=".5"/>
  <text x="300" y="252" fill="#d97757" font-family="ui-monospace, monospace" font-size="9.5" text-anchor="middle">回滚可用</text>
</svg>
