<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Background -->
  <rect width="680" height="420" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">GitHub 三层AI战略</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Copilot → Workspace → Agent 演进路径</text>

  <!-- Layer 1: Copilot (base, mature) -->
  <rect x="40" y="62" width="600" height="88" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="56" y="78" width="70" height="22" rx="11" fill="#D97757"/>
  <text x="91" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Copilot</text>
  <text x="140" y="94" font-size="12" fill="#141413">AI辅助编程</text>
  <text x="56" y="120" font-size="10.5" fill="#87867F">代码补全 · 注释生成 · 测试生成</text>
  <rect x="500" y="78" width="126" height="22" rx="11" fill="#788C5D"/>
  <text x="563" y="94" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">已成熟</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="150" x2="340" y2="166" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="340,170 334,160 346,160" fill="#D1CFC5"/>
  <text x="356" y="164" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">推进中</text>

  <!-- Layer 2: Workspace (middle, in-progress) -->
  <rect x="40" y="174" width="600" height="88" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="56" y="190" width="82" height="22" rx="11" fill="#D97757"/>
  <text x="97" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Workspace</text>
  <text x="152" y="206" font-size="12" fill="#141413">平台原生AI开发环境</text>
  <text x="56" y="232" font-size="10.5" fill="#87867F">自然语言Issue · 自动PR生成 · 智能Code Review</text>
  <rect x="500" y="190" width="126" height="22" rx="11" fill="#E3DACC" stroke="#D97757" stroke-width="1.5"/>
  <text x="563" y="206" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">推进中</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="262" x2="340" y2="278" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="340,282 334,272 346,272" fill="#D1CFC5"/>
  <text x="356" y="276" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">未来形态</text>

  <!-- Layer 3: Agent (top, future) -->
  <rect x="40" y="286" width="600" height="88" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="56" y="302" width="60" height="22" rx="11" fill="#D97757"/>
  <text x="86" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Agent</text>
  <text x="130" y="318" font-size="12" fill="#141413">自主开发Agent</text>
  <text x="56" y="344" font-size="10.5" fill="#87867F">Issue-to-PR · Code Review · Architecture Agent</text>
  <rect x="500" y="302" width="126" height="22" rx="11" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="563" y="318" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">规划中</text>

  <!-- Source line -->
  <text x="340" y="400" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">github.com/AI-strategy · 2026</text>
</svg>