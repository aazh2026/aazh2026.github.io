<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <style>
    .bg { fill: #FAF9F5; }
    .border { stroke: #D1CFC5; stroke-width: 1.5; fill: none; }
    .border-dark { stroke: #87867F; stroke-width: 1.5; fill: none; }
    .box-planner { fill: #D97757; }
    .box-executor { fill: #E3DACC; }
    .box-critic { fill: #E3DACC; }
    .box-memory { fill: #E3DACC; }
    .box-tool { fill: #788C5D; }
    .box-generic { fill: #E3DACC; }
    .text-white { fill: #FAF9F5; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .text-dark { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .text-label { fill: #87867F; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; }
    .text-dark-small { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 500; }
    .text-heading { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 700; }
    .text-clay { fill: #D97757; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .arrow { stroke: #D1CFC5; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-dark { stroke: #87867F; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-dark); }
    .arrow-clay { stroke: #D97757; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-clay); }
    .divider { stroke: #D1CFC5; stroke-width: 1; }
    .cell-label { fill: #87867F; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 10px; }
    .cell-value { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 600; }
    .cell-value-clay { fill: #D97757; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1CFC5"/>
    </marker>
    <marker id="arrowhead-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
    <marker id="arrowhead-clay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97757"/>
    </marker>
  </defs>
  <rect class="bg" width="600" height="280" rx="8"/>

  <text x="300" y="35" text-anchor="middle" class="text-heading">两种设计哲学</text>
  <rect x="50" y="55" width="200" height="36" fill="#D1CFC5" rx="0"/>
  <text x="150.0" y="78" text-anchor="middle" class="text-dark-small" style="font-weight:700">Agent 编排</text>
  <rect x="250" y="55" width="200" height="36" fill="#D1CFC5" rx="0"/>
  <text x="350.0" y="78" text-anchor="middle" class="text-dark-small" style="font-weight:700">系统设计</text>
  <line x1="50" y1="91" x2="450" y2="91" class="divider"/>
  <rect x="50" y="91" width="400" height="36" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="0.5"/>
  <text x="62" y="114" class="text-dark-small">关注：每个 Agent 做什么</text>
  <text x="262" y="114" class="text-dark-small">关注：Agent 如何交互</text>
  <line x1="50" y1="127" x2="450" y2="127" class="divider"/>
  <rect x="50" y="127" width="400" height="36" fill="#F5F4F0" stroke="#D1CFC5" stroke-width="0.5"/>
  <text x="62" y="150" class="text-dark-small">隐喻：管弦乐队指挥</text>
  <text x="262" y="150" class="text-dark-small">隐喻：生态系统园丁</text>
  <line x1="50" y1="163" x2="450" y2="163" class="divider"/>
  <rect x="50" y="163" width="400" height="36" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="0.5"/>
  <text x="62" y="186" class="text-dark-small">控制：中央调度</text>
  <text x="262" y="186" class="text-dark-small">控制：规则与环境</text>
  <line x1="50" y1="199" x2="450" y2="199" class="divider"/>
  <rect x="50" y="199" width="400" height="36" fill="#F5F4F0" stroke="#D1CFC5" stroke-width="0.5"/>
  <text x="62" y="222" class="text-dark-small">优化：个体效率</text>
  <text x="262" y="222" class="text-dark-small">优化：整体适应力</text>
  <line x1="50" y1="235" x2="450" y2="235" class="divider"/>
  <rect x="50" y="235" width="400" height="36" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="0.5"/>
  <text x="62" y="258" class="text-dark-small">问题：&quot;Agent A 应该...&quot;</text>
  <text x="262" y="258" class="text-dark-small">问题：&quot;什么规则能让...&quot;</text>
  <line x1="50" y1="271" x2="450" y2="271" class="divider"/>
  <line x1="250" y1="55" x2="250" y2="271" class="divider"/>
  <rect x="50" y="55" width="400" height="216" class="border" rx="0"/>
</svg>