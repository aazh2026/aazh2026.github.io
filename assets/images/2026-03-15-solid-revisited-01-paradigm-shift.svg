<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 740" width="100%" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-size: 12px; }
      .text-sm { fill: #87867F; font-size: 10px; }
      .text-label { fill: #141413; font-size: 11px; font-weight: 500; }
      .border { stroke: #D1CFC5; stroke-width: 1.5; }
      .border-dashed { stroke: #D1CFC5; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .fill-blue { fill: #dbeafe; stroke: #2563eb; }
      .fill-amber { fill: #fef3c7; stroke: #D97757; stroke-width: 2; }
      .fill-white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1100" height="740" class="bg"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" class="text-main" font-size="15" font-weight="700">范式转移全景图：从传统 SOLID 到 AI-Native 新 SOLID</text>

  <!-- Top Labels row -->
  <text x="265" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600" fill="#2563eb">传统 SOLID (OOP)</text>
  <text x="550" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600" fill="#87867F">Interface 转变</text>
  <text x="835" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600" fill="#D97757">新 SOLID (AI-Native)</text>

  <!-- ===================== LEFT: Traditional ===================== -->
  <!-- Class box -->
  <rect x="170" y="72" width="190" height="55" rx="7" class="fill-blue border"/>
  <text x="265" y="92" text-anchor="middle" class="text-label">Class</text>
  <line x1="265" y1="97" x2="265" y2="113" class="border"/>
  <text x="265" y="118" text-anchor="middle" class="text-sm">Encapsulation</text>

  <!-- Encap / Method / State below -->
  <rect x="170" y="142" width="190" height="28" rx="5" class="fill-blue border"/>
  <text x="265" y="161" text-anchor="middle" class="text-main" font-size="11">Encapsulation</text>
  <rect x="170" y="180" width="190" height="28" rx="5" class="fill-blue border"/>
  <text x="265" y="199" text-anchor="middle" class="text-main" font-size="11">Method</text>
  <rect x="170" y="218" width="190" height="28" rx="5" class="fill-blue border"/>
  <text x="265" y="237" text-anchor="middle" class="text-main" font-size="11">State (fields)</text>

  <!-- Arrows from Class -->
  <line x1="265" y1="127" x2="265" y2="142" class="border"/>
  <polygon points="265,142 261,134 269,134" class="fill-blue"/>
  <line x1="265" y1="127" x2="300" y2="157" class="border"/>
  <polygon points="300,157 294,151 300,145" class="fill-blue"/>
  <line x1="265" y1="127" x2="230" y2="157" class="border"/>
  <polygon points="230,157 236,151 230,145" class="fill-blue"/>

  <!-- ===================== Interface 转变 (row 1) ===================== -->
  <!-- Interface (traditional) -->
  <rect x="430" y="72" width="155" height="55" rx="7" class="fill-blue border"/>
  <text x="507" y="92" text-anchor="middle" class="text-label">Interface</text>
  <line x1="507" y1="97" x2="507" y2="113" class="border"/>
  <text x="507" y="118" text-anchor="middle" class="text-sm">Static typing</text>

  <!-- Interface children -->
  <rect x="430" y="142" width="70" height="26" rx="4" class="fill-blue border"/>
  <text x="465" y="160" text-anchor="middle" class="text-sm">Static typing</text>
  <rect x="510" y="142" width="75" height="26" rx="4" class="fill-blue border"/>
  <text x="547" y="160" text-anchor="middle" class="text-sm">Compile check</text>
  <line x1="507" y1="127" x2="465" y2="142" class="border"/>
  <polygon points="465,142 472,136 465,130" class="fill-blue"/>
  <line x1="507" y1="127" x2="547" y2="142" class="border"/>
  <polygon points="547,142 540,136 547,130" class="fill-blue"/>

  <!-- Bidirectional arrows -->
  <line x1="360" y1="100" x2="430" y2="100" class="border" stroke-width="2"/>
  <line x1="360" y1="93" x2="360" y2="107" class="border"/>
  <line x1="430" y1="93" x2="430" y2="107" class="border"/>

  <!-- ===================== Contract (new, row 1) ===================== -->
  <!-- Capability Contract -->
  <rect x="595" y="72" width="155" height="55" rx="7" class="fill-amber border"/>
  <text x="672" y="92" text-anchor="middle" class="text-label">Capability Contract</text>
  <line x1="672" y1="97" x2="672" y2="113" class="border"/>
  <text x="672" y="118" text-anchor="middle" class="text-sm">Dynamic capability desc</text>

  <!-- Contract children -->
  <rect x="595" y="142" width="70" height="26" rx="4" class="fill-amber border"/>
  <text x="630" y="160" text-anchor="middle" class="text-sm">Dynamic desc</text>
  <rect x="675" y="142" width="75" height="26" rx="4" class="fill-amber border"/>
  <text x="712" y="160" text-anchor="middle" class="text-sm">Runtime validation</text>
  <line x1="672" y1="127" x2="630" y2="142" class="border"/>
  <polygon points="630,142 637,136 630,130" class="fill-amber"/>
  <line x1="672" y1="127" x2="712" y2="142" class="border"/>
  <polygon points="712,142 705,136 712,130" class="fill-amber"/>

  <!-- Bidirectional arrows -->
  <line x1="585" y1="100" x2="660" y2="100" class="border" stroke-width="2"/>
  <line x1="585" y1="93" x2="585" y2="107" class="border"/>
  <line x1="660" y1="93" x2="660" y2="107" class="border"/>

  <!-- Bridge: Class <-> Agent -->
  <line x1="360" y1="100" x2="595" y2="100" class="border" stroke-dasharray="5 5" stroke="#D97757"/>
  <text x="477" y="93" text-anchor="middle" class="text-sm" fill="#D97757">抽象层次跃迁</text>

  <!-- ===================== RIGHT: New SOLID ===================== -->
  <!-- Agent box -->
  <rect x="740" y="72" width="190" height="55" rx="7" class="fill-amber border"/>
  <text x="835" y="92" text-anchor="middle" class="text-label">Agent</text>
  <line x1="835" y1="97" x2="835" y2="113" class="border"/>
  <text x="835" y="118" text-anchor="middle" class="text-sm">Context Management</text>

  <!-- Agent children -->
  <rect x="740" y="142" width="190" height="28" rx="5" class="fill-amber border"/>
  <text x="835" y="161" text-anchor="middle" class="text-main" font-size="11">Intent + Tool Calling</text>
  <rect x="740" y="180" width="190" height="28" rx="5" class="fill-amber border"/>
  <text x="835" y="199" text-anchor="middle" class="text-main" font-size="11">Memory + Working Context</text>
  <rect x="740" y="218" width="190" height="28" rx="5" class="fill-amber border"/>
  <text x="835" y="237" text-anchor="middle" class="text-main" font-size="11">Context Management</text>

  <!-- Arrows from Agent -->
  <line x1="835" y1="127" x2="835" y2="142" class="border"/>
  <polygon points="835,142 831,134 839,134" class="fill-amber"/>
  <line x1="835" y1="127" x2="790" y2="157" class="border"/>
  <polygon points="790,157 797,151 790,145" class="fill-amber"/>
  <line x1="835" y1="127" x2="880" y2="157" class="border"/>
  <polygon points="880,157 873,151 880,145" class="fill-amber"/>

  <!-- ===================== Inheritance 转变 (row 2) ===================== -->
  <!-- Inheritance (traditional) -->
  <rect x="430" y="270" width="155" height="50" rx="7" class="fill-blue border"/>
  <text x="507" y="290" text-anchor="middle" class="text-label">Inheritance</text>
  <line x1="507" y1="295" x2="507" y2="308" class="border"/>
  <text x="507" y="318" text-anchor="middle" class="text-sm">Is-a / Override</text>

  <!-- Inheritance children -->
  <rect x="430" y="335" width="70" height="26" rx="4" class="fill-blue border"/>
  <text x="465" y="353" text-anchor="middle" class="text-sm">Is-a relationship</text>
  <rect x="510" y="335" width="75" height="26" rx="4" class="fill-blue border"/>
  <text x="547" y="353" text-anchor="middle" class="text-sm">Method override</text>
  <line x1="507" y1="320" x2="465" y2="335" class="border"/>
  <polygon points="465,335 472,329 465,323" class="fill-blue"/>
  <line x1="507" y1="320" x2="547" y2="335" class="border"/>
  <polygon points="547,335 540,329 547,323" class="fill-blue"/>

  <!-- Bidirectional arrows -->
  <line x1="360" y1="295" x2="430" y2="295" class="border" stroke-width="2"/>
  <line x1="360" y1="288" x2="360" y2="302" class="border"/>
  <line x1="430" y1="288" x2="430" y2="302" class="border"/>

  <!-- Composition (new) -->
  <rect x="595" y="270" width="155" height="50" rx="7" class="fill-amber border"/>
  <text x="672" y="290" text-anchor="middle" class="text-label">Composition + Prompting</text>
  <line x1="672" y1="295" x2="672" y2="308" class="border"/>
  <text x="672" y="318" text-anchor="middle" class="text-sm">Has-capability / Prompt</text>

  <!-- Composition children -->
  <rect x="595" y="335" width="70" height="26" rx="4" class="fill-amber border"/>
  <text x="630" y="353" text-anchor="middle" class="text-sm">Has-capability</text>
  <rect x="675" y="335" width="75" height="26" rx="4" class="fill-amber border"/>
  <text x="712" y="353" text-anchor="middle" class="text-sm">Prompt template</text>
  <line x1="672" y1="320" x2="630" y2="335" class="border"/>
  <polygon points="630,335 637,329 630,323" class="fill-amber"/>
  <line x1="672" y1="320" x2="712" y2="335" class="border"/>
  <polygon points="712,335 705,329 712,323" class="fill-amber"/>

  <!-- Bidirectional arrows -->
  <line x1="585" y1="295" x2="660" y2="295" class="border" stroke-width="2"/>
  <line x1="585" y1="288" x2="585" y2="302" class="border"/>
  <line x1="660" y1="288" x2="660" y2="302" class="border"/>

  <!-- Bridge: Inheritance <-> Composition -->
  <line x1="360" y1="295" x2="595" y2="295" class="border" stroke-dasharray="5 5" stroke="#D97757"/>
  <text x="477" y="288" text-anchor="middle" class="text-sm" fill="#D97757">组合优于继承</text>

  <!-- Dashed boxes around left and right columns -->
  <rect x="158" y="64" width="214" height="205" rx="10" fill="none" class="border-dashed"/>
  <rect x="728" y="64" width="214" height="205" rx="10" fill="none" stroke="#D97757" stroke-dasharray="5 4"/>

  <!-- ===================== BOTTOM TABLE ===================== -->
  <rect x="30" y="415" width="1040" height="295" rx="10" fill="none" class="border"/>
  <text x="550" y="438" text-anchor="middle" class="text-main" font-size="14" font-weight="700">核心转变总结</text>

  <!-- Table header row -->
  <rect x="50" y="452" width="180" height="26" rx="4" class="fill-blue border"/>
  <text x="140" y="469" text-anchor="middle" class="text-main" font-size="11" font-weight="600">特性</text>

  <rect x="230" y="452" width="250" height="26" rx="4" class="fill-blue border"/>
  <text x="355" y="469" text-anchor="middle" class="text-main" font-size="11" font-weight="600">Class</text>

  <rect x="480" y="452" width="250" height="26" rx="4" class="fill-amber border"/>
  <text x="605" y="469" text-anchor="middle" class="text-main" font-size="11" font-weight="600">Agent</text>

  <rect x="730" y="452" width="230" height="26" rx="4" class="border"/>
  <text x="845" y="469" text-anchor="middle" class="text-main" font-size="11" font-weight="600">意义</text>

  <!-- Table rows data -->
  <!-- Row 1 -->
  <rect x="50" y="483" width="180" height="26" rx="3" fill="none" class="border"/>
  <text x="140" y="500" text-anchor="middle" class="text-main" font-size="10">激活方式</text>
  <rect x="230" y="483" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="355" y="500" text-anchor="middle" class="text-main" font-size="10">方法调用</text>
  <rect x="480" y="483" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="605" y="500" text-anchor="middle" class="text-main" font-size="10">Intent + Context</text>
  <rect x="730" y="483" width="230" height="26" rx="3" fill="none" class="border"/>
  <text x="845" y="500" text-anchor="middle" class="text-main" font-size="10" fill="#788C5D">从同步到异步</text>

  <!-- Row 2 -->
  <rect x="50" y="514" width="180" height="26" rx="3" fill="none" class="border"/>
  <text x="140" y="531" text-anchor="middle" class="text-main" font-size="10">执行逻辑</text>
  <rect x="230" y="514" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="355" y="531" text-anchor="middle" class="text-main" font-size="10">确定性代码</text>
  <rect x="480" y="514" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="605" y="531" text-anchor="middle" class="text-main" font-size="10">LLM + Tool Calling</text>
  <rect x="730" y="514" width="230" height="26" rx="3" fill="none" class="border"/>
  <text x="845" y="531" text-anchor="middle" class="text-main" font-size="10" fill="#788C5D">从规则到推理</text>

  <!-- Row 3 -->
  <rect x="50" y="545" width="180" height="26" rx="3" fill="none" class="border"/>
  <text x="140" y="562" text-anchor="middle" class="text-main" font-size="10">状态管理</text>
  <rect x="230" y="545" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="355" y="562" text-anchor="middle" class="text-main" font-size="10">字段封装</text>
  <rect x="480" y="545" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="605" y="562" text-anchor="middle" class="text-main" font-size="10">Context + Memory</text>
  <rect x="730" y="545" width="230" height="26" rx="3" fill="none" class="border"/>
  <text x="845" y="562" text-anchor="middle" class="text-main" font-size="10" fill="#788C5D">从本地到全局</text>

  <!-- Row 4 -->
  <rect x="50" y="576" width="180" height="26" rx="3" fill="none" class="border"/>
  <text x="140" y="593" text-anchor="middle" class="text-main" font-size="10">能力扩展</text>
  <rect x="230" y="576" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="355" y="593" text-anchor="middle" class="text-main" font-size="10">继承 / 组合</text>
  <rect x="480" y="576" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="605" y="593" text-anchor="middle" class="text-main" font-size="10">Prompt + Tool 注册</text>
  <rect x="730" y="576" width="230" height="26" rx="3" fill="none" class="border"/>
  <text x="845" y="593" text-anchor="middle" class="text-main" font-size="10" fill="#788C5D">从编译到运行时</text>

  <!-- Row 5 -->
  <rect x="50" y="607" width="180" height="26" rx="3" fill="none" class="border"/>
  <text x="140" y="624" text-anchor="middle" class="text-main" font-size="10">交互模式</text>
  <rect x="230" y="607" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="355" y="624" text-anchor="middle" class="text-main" font-size="10">Request / Response</text>
  <rect x="480" y="607" width="250" height="26" rx="3" fill="none" class="border"/>
  <text x="605" y="624" text-anchor="middle" class="text-main" font-size="10">多轮对话 + 自主决策</text>
  <rect x="730" y="607" width="230" height="26" rx="3" fill="none" class="border"/>
  <text x="845" y="624" text-anchor="middle" class="text-main" font-size="10" fill="#788C5D">从单次到持续</text>

  <!-- Color legend -->
  <rect x="50" y="648" width="14" height="14" rx="3" class="fill-blue border"/>
  <text x="70" y="660" class="text-sm">传统 OOP 概念</text>
  <rect x="200" y="648" width="14" height="14" rx="3" class="fill-amber border" stroke="#D97757"/>
  <text x="220" y="660" class="text-sm">AI-Native 新概念</text>
</svg>
