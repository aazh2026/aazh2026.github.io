<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="AI colleague trust boundary model">
  <title>AI 同事信任边界：最小权限原则的违反</title>
  <desc>「同事」身份要求的权限与安全设计最小权限原则在结构上互斥</desc>

  <defs>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97757"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
    <marker id="arrBig" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#D97757"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#FAF9F5"/>

  <!-- Header -->
  <text x="400" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#141413">信任边界冲突：「同事」隐喻 vs 最小权限原则</text>
  <line x1="80" y1="48" x2="720" y2="48" stroke="#D1CFC5" stroke-width="1"/>

  <!-- LEFT: The conflict -->
  <rect x="40" y="65" width="340" height="310" rx="10" fill="#E3DACC" stroke="#141413" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="65" width="340" height="34" rx="10" fill="#141413"/>
  <rect x="40" y="89" width="340" height="10" fill="#141413"/>
  <text x="210" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">结构性冲突</text>

  <!-- Left side: Colleague -->
  <rect x="55" y="115" width="145" height="100" rx="8" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="1.5"/>
  <text x="127" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#D97757">「同事」要求</text>
  <line x1="75" y1="145" x2="180" y2="145" stroke="#D97757" stroke-width="0.8"/>
  <text x="65" y="163" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 邮箱访问权</text>
  <text x="65" y="179" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 文件访问权</text>
  <text x="65" y="195" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 代发消息权</text>
  <text x="65" y="211" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 主动发起行动</text>

  <!-- Right side: Least privilege -->
  <rect x="215" y="115" width="145" height="100" rx="8" fill="#788C5D" opacity="0.15" stroke="#788C5D" stroke-width="1.5"/>
  <text x="287" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#788C5D">最小权限要求</text>
  <line x1="235" y1="145" x2="340" y2="145" stroke="#788C5D" stroke-width="0.8"/>
  <text x="225" y="163" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 仅需的最小权限</text>
  <text x="225" y="179" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 明确边界</text>
  <text x="225" y="195" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 被动响应指令</text>
  <text x="225" y="211" font-family="Arial, sans-serif" font-size="10" fill="#141413">✦ 无主动行动权</text>

  <!-- X symbol between them -->
  <text x="210" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#D97757" font-weight="bold">✕</text>
  <text x="210" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757">在结构上互斥</text>

  <!-- Quote -->
  <rect x="55" y="245" width="310" height="55" rx="6" fill="#141413" filter="url(#shadow)"/>
  <text x="210" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FAF9F5" font-style="italic">"每个程序和用户应只使用</text>
  <text x="210" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FAF9F5" font-style="italic">完成任务所需的最小权限。"</text>
  <text x="210" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">Saltzer &amp; Schroeder, 1974</text>

  <!-- Saltzer date -->
  <text x="55" y="345" font-family="Arial, sans-serif" font-size="10" fill="#87867F">1974 年写下最小权限原则——48 年后，AI 同事在结构上违反了它</text>

  <!-- RIGHT: Three attack patterns -->
  <rect x="395" y="65" width="365" height="310" rx="10" fill="#E3DACC" stroke="#D97757" stroke-width="2" filter="url(#shadow)"/>
  <rect x="395" y="65" width="365" height="34" rx="10" fill="#D97757"/>
  <rect x="395" y="89" width="365" height="10" fill="#D97757"/>
  <text x="577" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">三种信任边界攻击模式</text>

  <!-- Attack 1 -->
  <rect x="410" y="110" width="335" height="78" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1"/>
  <rect x="410" y="110" width="28" height="78" rx="6" fill="#D97757"/>
  <text x="424" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FAF9F5">1</text>
  <text x="432" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#141413">信任传递</text>
  <text x="432" y="148" font-family="Arial, sans-serif" font-size="10" fill="#141413">Trust Transitivity</text>
  <text x="432" y="168" font-family="Arial, sans-serif" font-size="10" fill="#141413">用户信任 AI 同事发的邮件</text>
  <text x="432" y="183" font-family="Arial, sans-serif" font-size="10" fill="#141413">→ 攻击者让 AI 代发恶意邮件</text>

  <!-- Attack 2 -->
  <rect x="410" y="198" width="335" height="78" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1"/>
  <rect x="410" y="198" width="28" height="78" rx="6" fill="#D97757"/>
  <text x="424" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FAF9F5">2</text>
  <text x="432" y="218" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#141413">信任溢出</text>
  <text x="432" y="236" font-family="Arial, sans-serif" font-size="10" fill="#141413">Trust Overflow</text>
  <text x="432" y="256" font-family="Arial, sans-serif" font-size="10" fill="#141413">宽泛权限跨邮件/Teams/文档/云盘</text>
  <text x="432" y="271" font-family="Arial, sans-serif" font-size="10" fill="#141413">→ 一个漏洞影响所有这些系统</text>

  <!-- Attack 3 -->
  <rect x="410" y="286" width="335" height="78" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1"/>
  <rect x="410" y="286" width="28" height="78" rx="6" fill="#D97757"/>
  <text x="424" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FAF9F5">3</text>
  <text x="432" y="306" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#141413">信任假设</text>
  <text x="432" y="324" font-family="Arial, sans-serif" font-size="10" fill="#141413">Trust Assumption</text>
  <text x="432" y="344" font-family="Arial, sans-serif" font-size="10" fill="#141413">假设 AI 行为边界 = 人类道德边界</text>
  <text x="432" y="359" font-family="Arial, sans-serif" font-size="10" fill="#141413">→ AI 无法区分指令和数据（间接 prompt injection）</text>

  <!-- Bottom: Copilot Cowork case -->
  <rect x="40" y="390" width="720" height="95" rx="8" fill="#141413" filter="url(#shadow)"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#D97757">Copilot Cowork 漏洞案例（2026.05.25）</text>
  <line x1="100" y1="420" x2="700" y2="420" stroke="#87867F" stroke-width="0.8"/>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FAF9F5">攻击者通过「间接 prompt injection」——在邮件/文档中嵌入恶意指令——</text>
  <text x="400" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FAF9F5">让 AI 把用户的 SharePoint 和 OneDrive 文件发送给外部服务器</text>
  <text x="400" y="475" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#87867F" font-style="italic">"同事"身份要求的信任 = 安全攻击面</text>

  <!-- Legend -->
  <rect x="40" y="492" width="10" height="10" rx="2" fill="#D97757"/>
  <text x="56" y="501" font-family="Arial, sans-serif" font-size="9" fill="#87867F">「同事」隐喻</text>
  <rect x="130" y="492" width="10" height="10" rx="2" fill="#788C5D"/>
  <text x="146" y="501" font-family="Arial, sans-serif" font-size="9" fill="#87867F">最小权限原则</text>
</svg>
