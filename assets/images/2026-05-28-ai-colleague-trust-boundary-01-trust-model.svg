<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI colleague trust boundary model" viewBox="0 0 800 500">
  <title>AI 同事信任边界：最小权限原则的违反</title>
  <desc>
    「同事」身份要求的权限与安全设计最小权限原则在结构上互斥
  </desc>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" flood-color="#141413" flood-opacity=".1" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v500H0z"/>
  <text x="400" y="36" fill="#141413" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">信任边界冲突：「同事」隐喻 vs 最小权限原则</text>
  <path stroke="#d1cfc5" d="M80 48h640"/>
  <rect width="340" height="310" x="40" y="65" fill="#e3dacc" stroke="#141413" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="340" height="34" x="40" y="65" fill="#141413" rx="10"/>
  <path fill="#141413" d="M40 89h340v10H40z"/>
  <text x="210" y="87" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">结构性冲突</text>
  <rect width="145" height="100" x="55" y="115" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".15" rx="8"/>
  <text x="127" y="135" fill="#d97757" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">「同事」要求</text>
  <path stroke="#d97757" stroke-width=".8" d="M75 145h105"/>
  <text x="65" y="163" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 邮箱访问权</text>
  <text x="65" y="179" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 文件访问权</text>
  <text x="65" y="195" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 代发消息权</text>
  <text x="65" y="211" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 主动发起行动</text>
  <rect width="145" height="100" x="215" y="115" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".15" rx="8"/>
  <text x="287" y="135" fill="#788c5d" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">最小权限要求</text>
  <path stroke="#788c5d" stroke-width=".8" d="M235 145h105"/>
  <text x="225" y="163" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 仅需的最小权限</text>
  <text x="225" y="179" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 明确边界</text>
  <text x="225" y="195" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 被动响应指令</text>
  <text x="225" y="211" fill="#141413" font-family="Arial, sans-serif" font-size="10">✦ 无主动行动权</text>
  <text x="210" y="178" fill="#d97757" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle">✕</text>
  <text x="210" y="230" fill="#d97757" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">在结构上互斥</text>
  <rect width="310" height="55" x="55" y="245" fill="#141413" filter="url(#shadow)" rx="6"/>
  <text x="210" y="265" fill="#faf9f5" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">&quot;每个程序和用户应只使用</text>
  <text x="210" y="282" fill="#faf9f5" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">完成任务所需的最小权限。&quot;</text>
  <text x="210" y="297" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Saltzer &amp; Schroeder, 1974</text>
  <text x="55" y="345" fill="#87867f" font-family="Arial, sans-serif" font-size="10">1974 年写下最小权限原则——48 年后，AI 同事在结构上违反了它</text>
  <rect width="365" height="310" x="395" y="65" fill="#e3dacc" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="365" height="34" x="395" y="65" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M395 89h365v10H395z"/>
  <text x="577" y="87" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">三种信任边界攻击模式</text>
  <rect width="335" height="78" x="410" y="110" fill="#faf9f5" stroke="#d97757" rx="6"/>
  <rect width="28" height="78" x="410" y="110" fill="#d97757" rx="6"/>
  <text x="424" y="132" fill="#faf9f5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1</text>
  <text x="432" y="130" fill="#141413" font-family="Arial, sans-serif" font-size="12" font-weight="bold">信任传递</text>
  <text x="432" y="148" fill="#141413" font-family="Arial, sans-serif" font-size="10">Trust Transitivity</text>
  <text x="432" y="168" fill="#141413" font-family="Arial, sans-serif" font-size="10">用户信任 AI 同事发的邮件</text>
  <text x="432" y="183" fill="#141413" font-family="Arial, sans-serif" font-size="10">→ 攻击者让 AI 代发恶意邮件</text>
  <rect width="335" height="78" x="410" y="198" fill="#faf9f5" stroke="#d97757" rx="6"/>
  <rect width="28" height="78" x="410" y="198" fill="#d97757" rx="6"/>
  <text x="424" y="220" fill="#faf9f5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2</text>
  <text x="432" y="218" fill="#141413" font-family="Arial, sans-serif" font-size="12" font-weight="bold">信任溢出</text>
  <text x="432" y="236" fill="#141413" font-family="Arial, sans-serif" font-size="10">Trust Overflow</text>
  <text x="432" y="256" fill="#141413" font-family="Arial, sans-serif" font-size="10">宽泛权限跨邮件/Teams/文档/云盘</text>
  <text x="432" y="271" fill="#141413" font-family="Arial, sans-serif" font-size="10">→ 一个漏洞影响所有这些系统</text>
  <rect width="335" height="78" x="410" y="286" fill="#faf9f5" stroke="#d97757" rx="6"/>
  <rect width="28" height="78" x="410" y="286" fill="#d97757" rx="6"/>
  <text x="424" y="308" fill="#faf9f5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">3</text>
  <text x="432" y="306" fill="#141413" font-family="Arial, sans-serif" font-size="12" font-weight="bold">信任假设</text>
  <text x="432" y="324" fill="#141413" font-family="Arial, sans-serif" font-size="10">Trust Assumption</text>
  <text x="432" y="344" fill="#141413" font-family="Arial, sans-serif" font-size="10">假设 AI 行为边界 = 人类道德边界</text>
  <text x="432" y="359" fill="#141413" font-family="Arial, sans-serif" font-size="10">→ AI 无法区分指令和数据（间接 prompt injection）</text>
  <rect width="720" height="95" x="40" y="390" fill="#141413" filter="url(#shadow)" rx="8"/>
  <text x="400" y="412" fill="#d97757" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Copilot Cowork 漏洞案例（2026.05.25）</text>
  <path stroke="#87867f" stroke-width=".8" d="M100 420h600"/>
  <text x="400" y="440" fill="#faf9f5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">攻击者通过「间接 prompt injection」——在邮件/文档中嵌入恶意指令——</text>
  <text x="400" y="456" fill="#faf9f5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">让 AI 把用户的 SharePoint 和 OneDrive 文件发送给外部服务器</text>
  <text x="400" y="475" fill="#87867f" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">&quot;同事&quot;身份要求的信任 = 安全攻击面</text>
  <rect width="10" height="10" x="40" y="492" fill="#d97757" rx="2"/>
  <text x="56" y="501" fill="#87867f" font-family="Arial, sans-serif" font-size="9">「同事」隐喻</text>
  <rect width="10" height="10" x="130" y="492" fill="#788c5d" rx="2"/>
  <text x="146" y="501" fill="#87867f" font-family="Arial, sans-serif" font-size="9">最小权限原则</text>
</svg>
