<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 320"><path fill="#faf9f5" d="M0 0h680v320H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">复杂性守恒定律：AI 时代的转型</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">软件复杂性是守恒的 — 只能转化，不能消除</text><rect width="180" height="56" x="20" y="64" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="110" y="88" fill="#141413" font-size="12" text-anchor="middle">写代码的复杂性</text><text x="110" y="106" fill="#87867f" font-size="10" text-anchor="middle">AI code generation</text><path stroke="#d97757" stroke-width="2.5" d="M200 92h38"/><path fill="#d97757" d="m248 92-12-6v12z"/><text x="224" y="84" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">AI</text><rect width="180" height="56" x="252" y="64" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="342" y="88" fill="#141413" font-size="12" text-anchor="middle">验证代码的复杂性</text><text x="342" y="106" fill="#87867f" font-size="10" text-anchor="middle">每行 AI 代码都需审查</text><rect width="80" height="28" x="434" y="76" fill="#e3dacc" stroke="#d97757" rx="14"/><text x="474" y="95" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">守恒</text><rect width="180" height="56" x="20" y="136" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="110" y="160" fill="#141413" font-size="12" text-anchor="middle">记忆的复杂性</text><text x="110" y="178" fill="#87867f" font-size="10" text-anchor="middle">API 细节、语法规则</text><path stroke="#d97757" stroke-width="2.5" d="M200 164h38"/><path fill="#d97757" d="m248 164-12-6v12z"/><text x="224" y="156" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">AI</text><rect width="180" height="56" x="252" y="136" fill="#fff" stroke="#d97757" s