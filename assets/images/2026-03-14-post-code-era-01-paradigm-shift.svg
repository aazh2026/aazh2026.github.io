<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="编程范式演进图">
  <title>编程范式的演进：从机器语言到自然语言</title>
  <desc>展示编程语言从机器语言到自然语言编程的演进过程，每一层抽象都是一次飞跃</desc>

  <defs>
    <linearGradient id="grad-ivory" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <linearGradient id="grad-olive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#788C5D"/>
      <stop offset="100%" style="stop-color:#5a6d45"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="380" fill="#FAF9F5"/>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#141413">编程范式的演进</text>
  <text x="400" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">每一层抽象都是一次解放 | 后代码时代的核心转变</text>

  <!-- 演进阶段 -->
  <!-- 阶段1: 机器语言 -->
  <g transform="translate(50, 70)">
    <rect width="130" height="110" rx="8" fill="#141413"/>
    <text x="65" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">机器语言</text>
    <text x="65" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">1940s-1950s</text>
    <text x="65" y="58" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">00110101 0001</text>
    <text x="65" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">11010101 0101</text>
    <text x="65" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">00110101 ...</text>
    <text x="65" y="100" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D97757">极少数专家</text>
  </g>

  <!-- 阶段2: 汇编 -->
  <g transform="translate(200, 70)">
    <rect width="130" height="110" rx="8" fill="#141413"/>
    <text x="65" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">汇编语言</text>
    <text x="65" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">1950s-1960s</text>
    <text x="65" y="58" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">MOV AX, 5</text>
    <text x="65" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">ADD AX, 3</text>
    <text x="65" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">INT 21h</text>
    <text x="65" y="100" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D97757">少数专业人士</text>
  </g>

  <!-- 阶段3: 高级语言 -->
  <g transform="translate(350, 70)">
    <rect width="130" height="110" rx="8" fill="#141413"/>
    <text x="65" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">高级语言</text>
    <text x="65" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87867F">1970s-2000s</text>
    <text x="65" y="56" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">int sum = 0;</text>
    <text x="65" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">for(i=0;i&lt;10;i++)</text>
    <text x="65" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#D1CFC5">  sum += i;</text>
    <text x="65" y="100" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#788C5D">专业程序员</text>
  </g>

  <!-- 阶段4: 自然语言 -->
  <g transform="translate(500, 70)">
    <rect width="250" height="110" rx="8" fill="url(#grad-olive)"/>
    <text x="125" y="25" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">自然语言编程</text>
    <text x="125" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E3DACC">2023-2026 · 后代码时代</text>
    <text x="125" y="58" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FAF9F5">"创建一个用户资料页面，</text>
    <text x="125" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FAF9F5">显示头像、昵称、邮箱..."</text>
    <text x="125" y="88" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E3DACC">↓ AI 翻译</text>
    <text x="125" y="100" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#E3DACC">意图 → 代码 → 执行</text>
  </g>

  <!-- 箭头 -->
  <path d="M 185 125 Q 195 120 200 125" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow-navy)"/>
  <defs><marker id="arrow-navy" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#87867F"/></marker></defs>

  <path d="M 335 125 Q 345 120 350 125" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow-navy)"/>

  <path d="M 485 125 Q 495 120 500 125" stroke="#788C5D" stroke-width="2" fill="none" marker-end="url(#arrow-navy)"/>

  <!-- 编程三层次 -->
  <g transform="translate(50, 210)">
    <text x="0" y="0" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">编程的三个层次</text>

    <!-- Level 1 -->
    <rect x="0" y="15" width="680" height="38" rx="6" fill="#E3DACC"/>
    <text x="15" y="38" font-family="sans-serif" font-size="11" font-weight="bold" fill="#141413">Level 1 语法 (Syntax)</text>
    <text x="200" y="38" font-family="sans-serif" font-size="10" fill="#87867F">括号匹配 · 变量命名 · 类型使用</text>
    <text x="480" y="38" font-family="sans-serif" font-size="10" fill="#788C5D">✅ AI 完全自动化</text>

    <!-- Level 2 -->
    <rect x="0" y="58" width="680" height="38" rx="6" fill="#D1CFC5"/>
    <text x="15" y="81" font-family="sans-serif" font-size="11" font-weight="bold" fill="#141413">Level 2 语义 (Semantics)</text>
    <text x="200" y="81" font-family="sans-serif" font-size="10" fill="#87867F">逻辑正确 · 算法高效 · 边界处理</text>
    <text x="480" y="81" font-family="sans-serif" font-size="10" fill="#788C5D">✅ 大部分自动化</text>

    <!-- Level 3 -->
    <rect x="0" y="101" width="680" height="38" rx="6" fill="url(#grad-olive)"/>
    <text x="15" y="124" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">Level 3 意图 (Intent)</text>
    <text x="200" y="124" font-family="sans-serif" font-size="10" fill="#E3DACC">解决什么问题 · 业务目标 · 为什么这样</text>
    <text x="480" y="124" font-family="sans-serif" font-size="10" fill="#FAF9F5">✅ 人类核心价值</text>
  </g>

  <!-- 底部洞察 -->
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87867F" font-style="italic">"编程的本质从未改变——改变的是表达的媒介。"</text>
</svg>
