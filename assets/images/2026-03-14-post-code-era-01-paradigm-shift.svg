<svg xmlns="http://www.w3.org/2000/svg" aria-label="编程范式演进图" viewBox="0 0 800 380">
  <title>编程范式的演进：从机器语言到自然语言</title>
  <desc>
    展示编程语言从机器语言到自然语言编程的演进过程，每一层抽象都是一次飞跃
  </desc>
  <defs>
    <linearGradient id="grad-olive" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#788c5d"/>
      <stop offset="100%" style="stop-color:#5a6d45"/>
    </linearGradient>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v380H0z"/>
  <text x="400" y="28" fill="#141413" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle">编程范式的演进</text>
  <text x="400" y="46" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">每一层抽象都是一次解放 | 后代码时代的核心转变</text>
  <g transform="translate(50 70)">
    <rect width="130" height="110" fill="#141413" rx="8"/>
    <text x="65" y="25" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">机器语言</text>
    <text x="65" y="40" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">1940s-1950s</text>
    <text x="65" y="58" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">00110101 0001</text>
    <text x="65" y="70" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">11010101 0101</text>
    <text x="65" y="82" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">00110101 ...</text>
    <text x="65" y="100" fill="#d97757" font-family="sans-serif" font-size="8" text-anchor="middle">极少数专家</text>
  </g>
  <g transform="translate(200 70)">
    <rect width="130" height="110" fill="#141413" rx="8"/>
    <text x="65" y="25" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">汇编语言</text>
    <text x="65" y="40" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">1950s-1960s</text>
    <text x="65" y="58" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">MOV AX, 5</text>
    <text x="65" y="70" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">ADD AX, 3</text>
    <text x="65" y="82" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">INT 21h</text>
    <text x="65" y="100" fill="#d97757" font-family="sans-serif" font-size="8" text-anchor="middle">少数专业人士</text>
  </g>
  <g transform="translate(350 70)">
    <rect width="130" height="110" fill="#141413" rx="8"/>
    <text x="65" y="25" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">高级语言</text>
    <text x="65" y="40" fill="#87867f" font-family="sans-serif" font-size="9" text-anchor="middle">1970s-2000s</text>
    <text x="65" y="56" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">int sum = 0;</text>
    <text x="65" y="68" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">for(i=0;i&lt;10;i++)</text>
    <text x="65" y="80" fill="#d1cfc5" font-family="monospace" font-size="8" text-anchor="middle">  sum += i;</text>
    <text x="65" y="100" fill="#788c5d" font-family="sans-serif" font-size="8" text-anchor="middle">专业程序员</text>
  </g>
  <g transform="translate(500 70)">
    <rect width="250" height="110" fill="url(#grad-olive)" rx="8"/>
    <text x="125" y="25" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">自然语言编程</text>
    <text x="125" y="40" fill="#e3dacc" font-family="sans-serif" font-size="9" text-anchor="middle">2023-2026 · 后代码时代</text>
    <text x="125" y="58" fill="#faf9f5" font-family="sans-serif" font-size="9" text-anchor="middle">&quot;创建一个用户资料页面，</text>
    <text x="125" y="70" fill="#faf9f5" font-family="sans-serif" font-size="9" text-anchor="middle">显示头像、昵称、邮箱...&quot;</text>
    <text x="125" y="88" fill="#e3dacc" font-family="sans-serif" font-size="9" text-anchor="middle">↓ AI 翻译</text>
    <text x="125" y="100" fill="#e3dacc" font-family="sans-serif" font-size="8" text-anchor="middle">意图 → 代码 → 执行</text>
  </g>
  <path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow-navy)" d="M185 125q10-5 15 0"/>
  <defs>
    <marker id="arrow-navy" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="3">
      <path fill="#87867f" d="M0 0v6l7-3z"/>
    </marker>
  </defs>
  <path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow-navy)" d="M335 125q10-5 15 0"/>
  <path fill="none" stroke="#788c5d" stroke-width="2" marker-end="url(#arrow-navy)" d="M485 125q10-5 15 0"/>
  <g transform="translate(50 210)">
    <text fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold">编程的三个层次</text>
    <rect width="680" height="38" y="15" fill="#e3dacc" rx="6"/>
    <text x="15" y="38" fill="#141413" font-family="sans-serif" font-size="11" font-weight="bold">Level 1 语法 (Syntax)</text>
    <text x="200" y="38" fill="#87867f" font-family="sans-serif" font-size="10">括号匹配 · 变量命名 · 类型使用</text>
    <text x="480" y="38" fill="#788c5d" font-family="sans-serif" font-size="10">✅ AI 完全自动化</text>
    <rect width="680" height="38" y="58" fill="#d1cfc5" rx="6"/>
    <text x="15" y="81" fill="#141413" font-family="sans-serif" font-size="11" font-weight="bold">Level 2 语义 (Semantics)</text>
    <text x="200" y="81" fill="#87867f" font-family="sans-serif" font-size="10">逻辑正确 · 算法高效 · 边界处理</text>
    <text x="480" y="81" fill="#788c5d" font-family="sans-serif" font-size="10">✅ 大部分自动化</text>
    <rect width="680" height="38" y="101" fill="url(#grad-olive)" rx="6"/>
    <text x="15" y="124" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold">Level 3 意图 (Intent)</text>
    <text x="200" y="124" fill="#e3dacc" font-family="sans-serif" font-size="10">解决什么问题 · 业务目标 · 为什么这样</text>
    <text x="480" y="124" fill="#faf9f5" font-family="sans-serif" font-size="10">✅ 人类核心价值</text>
  </g>
  <text x="400" y="365" fill="#87867f" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle">&quot;编程的本质从未改变——改变的是表达的媒介。&quot;</text>
</svg>
