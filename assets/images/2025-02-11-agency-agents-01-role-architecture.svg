<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#D97757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#141413">agency-agents 角色架构 vs CrewAI 流程编排</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#87867F">两种多Agent协作范式的核心差异</text>

  <!-- Dividing line -->
  <line x1="400" y1="80" x2="400" y2="430" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LEFT: agency-agents (Role-based) -->
  <text x="200" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#D97757">agency-agents</text>
  <text x="200" y="108" text-anchor="middle" font-size="11" fill="#87867F">基于角色（Role）的编排</text>

  <!-- Role boxes -->
  <g>
    <!-- Frontend Expert -->
    <rect x="20" y="130" width="100" height="52" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="70" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">前端专家</text>
    <text x="70" y="168" text-anchor="middle" font-size="10" fill="#87867F">视觉优先 · UI/UX</text>

    <!-- Backend Architect -->
    <rect x="20" y="195" width="100" height="52" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="70" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">后端架构师</text>
    <text x="70" y="233" text-anchor="middle" font-size="10" fill="#87867F">系统优先 · 性能</text>

    <!-- Product Manager -->
    <rect x="20" y="260" width="100" height="52" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="70" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">产品经理</text>
    <text x="70" y="298" text-anchor="middle" font-size="10" fill="#87867F">业务语言转换</text>

    <!-- Community Ops -->
    <rect x="20" y="325" width="100" height="52" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="70" y="347" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">社区运营</text>
    <text x="70" y="363" text-anchor="middle" font-size="10" fill="#87867F">用户关系 · 内容</text>
  </g>

  <!-- Shared Knowledge Base -->
  <rect x="135" y="200" width="110" height="64" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <text x="190" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#788C5D">共享知识库</text>
  <text x="190" y="237" text-anchor="middle" font-size="9" fill="#87867F">代码规范</text>
  <text x="190" y="250" text-anchor="middle" font-size="9" fill="#87867F">设计系统</text>
  <text x="190" y="263" text-anchor="middle" font-size="9" fill="#87867F">架构原则</text>

  <!-- Arrows from roles to knowledge base -->
  <path d="M120,156 L135,220" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M120,221 L135,228" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M120,286 L135,236" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M120,351 L135,244" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Task flow from knowledge base -->
  <path d="M245,232 L280,232" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="262" y="224" text-anchor="middle" font-size="9" fill="#87867F">任务</text>

  <!-- Deliverable output -->
  <rect x="280" y="196" width="100" height="72" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="330" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">结构化交付物</text>
  <text x="330" y="234" text-anchor="middle" font-size="9" fill="#87867F">代码 + 文档</text>
  <text x="330" y="247" text-anchor="middle" font-size="9" fill="#87867F">可验证 · 可组合</text>
  <text x="330" y="260" text-anchor="middle" font-size="9" fill="#87867F">可追溯</text>

  <!-- RIGHT: CrewAI (Process-based) -->
  <text x="600" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#788C5D">CrewAI</text>
  <text x="600" y="108" text-anchor="middle" font-size="11" fill="#87867F">基于流程（Process）的编排</text>

  <!-- Process flow boxes -->
  <rect x="460" y="130" width="130" height="38" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">1. 市场调研</text>

  <path d="M525,168 L525,183" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="460" y="183" width="130" height="38" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="205" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">2. 竞品分析</text>

  <path d="M525,221 L525,236" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="460" y="236" width="130" height="38" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">3. 策略制定</text>

  <path d="M525,274 L525,289" stroke="#D97757" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="460" y="289" width="130" height="38" rx="6" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="525" y="311" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">4. 执行落地</text>

  <!-- Role assignment label -->
  <rect x="605" y="195" width="120" height="50" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <text x="665" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#788C5D">角色分配</text>
  <text x="665" y="232" text-anchor="middle" font-size="9" fill="#87867F">定义任务流程</text>
  <text x="665" y="245" text-anchor="middle" font-size="9" fill="#87867F">分配Agent角色</text>

  <!-- Key insight boxes -->
  <rect x="15" y="400" width="175" height="56" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  <text x="102" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#D97757">适合场景</text>
  <text x="102" y="432" text-anchor="middle" font-size="9" fill="#141413">探索性 · 创造性任务</text>
  <text x="102" y="446" text-anchor="middle" font-size="9" fill="#87867F">动态协作 · 灵活调整</text>

  <rect x="460" y="400" width="175" height="56" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
  <text x="547" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#788C5D">适合场景</text>
  <text x="547" y="432" text-anchor="middle" font-size="9" fill="#141413">流程确定的重复性任务</text>
  <text x="547" y="446" text-anchor="middle" font-size="9" fill="#87867F">结构清晰 · 步骤明确</text>

  <!-- Bottom note -->
  <text x="400" y="470" text-anchor="middle" font-size="10" fill="#87867F">角色优于流程：agency-agents更接近人类组织的实际运作方式</text>
</svg>