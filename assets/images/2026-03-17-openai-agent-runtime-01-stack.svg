<svg viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- OpenAI Agent Runtime 三层架构 -->
  <rect width="560" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">OpenAI Agent Runtime · 三层架构</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/17</text>

  <!-- Layer 3: Hosted Containers (top) -->
  <rect x="40" y="52" width="480" height="58" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="52" width="480" height="26" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1.5"/>
  <text x="60" y="70" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L3</text>
  <text x="84" y="70" font-size="12" fill="#141413" font-weight="600">Hosted Containers · 托管容器</text>
  <text x="60" y="88" font-size="10" fill="#87867F">隔离执行环境 · 资源限制与监控 · 快速启动/销毁</text>
  <rect x="490" y="64" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="77" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L3</text>

  <!-- Arrow down -->
  <line x1="280" y1="110" x2="280" y2="120" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,120 280,128 284,120" fill="#D1CFC5"/>

  <!-- Layer 2: Shell Tool (middle) -->
  <rect x="40" y="128" width="480" height="58" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="128" width="480" height="26" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="60" y="146" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L2</text>
  <text x="84" y="146" font-size="12" fill="#141413" font-weight="600">Shell Tool · 命令执行接口</text>
  <text x="60" y="164" font-size="10" fill="#87867F">文件系统操作 · 输出捕获与流式传输</text>
  <rect x="490" y="140" width="18" height="18" rx="9" fill="#2563EB"/>
  <text x="499" y="153" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L2</text>

  <!-- Arrow down -->
  <line x1="280" y1="186" x2="280" y2="196" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,196 280,204 284,196" fill="#D1CFC5"/>

  <!-- Layer 1: Responses API (bottom) -->
  <rect x="40" y="204" width="480" height="46" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="40" y="204" width="480" height="24" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="220" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L1</text>
  <text x="84" y="220" font-size="12" fill="#141413" font-weight="600">Responses API · Agent 神经系统</text>
  <text x="340" y="220" font-size="10" fill="#87867F">结构化输出 · 工具调用协议 · 状态与会话管理</text>
  <rect x="490" y="216" width="18" height="18" rx="9" fill="#059669"/>
  <text x="499" y="229" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L1</text>

  <!-- Key insight -->
  <text x="280" y="256" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">每一层有明确的职责边界：L1 提供大脑，L2 提供执行臂膀，L3 提供隔离环境</text>
</svg>