<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#141413">Jevons 悖论：知识便宜了，洞察变贵了</text>
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#87867F">@ZoharAtkins | 效率产生需求，瓶颈持续迁移</text>

  <!-- Jevons paradox visualization -->
  <!-- Coal era (left) -->
  <rect x="40" y="80" width="160" height="220" rx="10" fill="#E3DACC" filter="url(#sh2)"/>
  <text x="120" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#141413">1865 煤炭时代</text>
  <text x="120" y="124" text-anchor="middle" font-size="9" fill="#87867F">Jevons 悖论</text>

  <!-- Steam engine efficiency -->
  <rect x="55" y="138" width="130" height="24" rx="5" fill="#D97757"/>
  <text x="120" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">蒸汽机效率↑</text>

  <line x1="120" y1="165" x2="120" y2="185" stroke="#87867F" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="55" y="188" width="130" height="24" rx="5" fill="#D97757"/>
  <text x="120" y="204" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">煤炭消耗↑ 10倍</text>

  <line x1="120" y1="215" x2="120" y2="235" stroke="#87867F" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="55" y="238" width="130" height="24" rx="5" fill="#141413"/>
  <text x="120" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">需求爆炸</text>

  <text x="120" y="278" text-anchor="middle" font-size="9" fill="#87867F">效率↑ → 成本↓ →</text>
  <text x="120" y="291" text-anchor="middle" font-size="9" fill="#87867F">应用爆炸 → 总消耗↑</text>

  <!-- Arrow to knowledge era -->
  <line x1="210" y1="190" x2="250" y2="190" stroke="#D97757" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="230" y="180" text-anchor="middle" font-size="9" fill="#D97757" font-weight="700">类比</text>

  <!-- Knowledge era (right of center) -->
  <rect x="260" y="80" width="160" height="220" rx="10" fill="#E3DACC" filter="url(#sh2)"/>
  <text x="340" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#141413">2026 知识时代</text>
  <text x="340" y="124" text-anchor="middle" font-size="9" fill="#87867F">Jevons 悖论重现</text>

  <rect x="275" y="138" width="130" height="24" rx="5" fill="#788C5D"/>
  <text x="340" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">AI 咨询成本↓</text>

  <line x1="340" y1="165" x2="340" y2="185" stroke="#87867F" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="275" y="188" width="130" height="24" rx="5" fill="#788C5D"/>
  <text x="340" y="204" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">知识需求量↑</text>

  <line x1="340" y1="215" x2="340" y2="235" stroke="#87867F" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="275" y="238" width="130" height="24" rx="5" fill="#141413"/>
  <text x="340" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">洞察需求↑↑↑</text>

  <text x="340" y="278" text-anchor="middle" font-size="9" fill="#87867F">AI 消除可及性瓶颈</text>
  <text x="340" y="291" text-anchor="middle" font-size="9" fill="#87867F">真正的约束变洞察</text>

  <!-- Arrow to bottleneck migration -->
  <line x1="430" y1="190" x2="470" y2="190" stroke="#D97757" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="450" y="180" text-anchor="middle" font-size="9" fill="#D97757" font-weight="700">瓶颈迁移</text>

  <!-- Bottleneck migration (right) -->
  <rect x="480" y="80" width="280" height="220" rx="10" fill="#141413" filter="url(#sh2)"/>
  <text x="620" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">瓶颈迁移路径</text>

  <!-- Migration steps -->
  <rect x="498" y="128" width="244" height="26" rx="5" fill="#D97757"/>
  <text x="620" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">书很贵 → 可及性是瓶颈</text>

  <line x1="620" y1="157" x2="620" y2="172" stroke="#87867F" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr2)"/>

  <rect x="498" y="175" width="244" height="26" rx="5" fill="#E3DACC"/>
  <text x="620" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#141413">印刷松动 → 识字是瓶颈</text>

  <line x1="620" y1="204" x2="620" y2="219" stroke="#87867F" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr2)"/>

  <rect x="498" y="222" width="244" height="26" rx="5" fill="#E3DACC"/>
  <text x="620" y="239" text-anchor="middle" font-size="10" font-weight="600" fill="#141413">AI 松动咨询 → Chiddush 是瓶颈</text>

  <line x1="620" y1="251" x2="620" y2="266" stroke="#87867F" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr2)"/>

  <rect x="498" y="269" width="244" height="26" rx="5" fill="#788C5D"/>
  <text x="620" y="286" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">丰盛产生胃口，不是消除胃口</text>

  <!-- Bottom: Chiddush definition and key insight -->
  <rect x="40" y="320" width="340" height="100" rx="10" fill="#E3DACC" filter="url(#sh2)"/>
  <text x="210" y="344" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">Chiddush 是什么？</text>
  <text x="210" y="362" text-anchor="middle" font-size="10" fill="#141413">"在一本已经存在的文本中</text>
  <text x="210" y="376" text-anchor="middle" font-size="10" fill="#141413">看到之前没人看到的真实的东西"</text>
  <text x="210" y="394" text-anchor="middle" font-size="9" fill="#87867F">— 产生意义的阅读，而非吸收意义</text>
  <text x="210" y="408" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600">没有 Chiddush，学习室无法存续 (Chagigah 3a)</text>

  <!-- Raw wheat metaphor -->
  <rect x="400" y="320" width="360" height="100" rx="10" fill="#141413" filter="url(#sh2)"/>
  <text x="580" y="344" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">面包不是小麦</text>
  <text x="580" y="364" text-anchor="middle" font-size="10" fill="#D1CFC5">AI = 新的磨小麦师傅</text>
  <text x="580" y="380" text-anchor="middle" font-size="10" fill="#D1CFC5">吃生小麦的人 = 只消费 AI 生成的 Chiddush</text>
  <text x="580" y="396" text-anchor="middle" font-size="10" fill="#D1CFC5">而不转化它的人</text>
  <text x="580" y="412" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600">问题从"我能找到吗"变成"我看到了什么"</text>

  <!-- Key takeaway -->
  <rect x="40" y="436" width="720" height="32" rx="6" fill="#788C5D"/>
  <text x="400" y="457" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">你的问题，才是真正有价值的东西。</text>
</svg>