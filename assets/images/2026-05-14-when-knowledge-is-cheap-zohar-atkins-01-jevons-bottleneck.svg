<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" viewBox="0 0 800 480">
  <defs>
    <marker id="arr2" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3">
      <path fill="#87867f" d="m0 0 8 3-8 3z"/>
    </marker>
    <filter id="sh2" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v480H0z"/>
  <text x="400" y="36" fill="#141413" font-size="18" font-weight="700" text-anchor="middle">Jevons 悖论：知识便宜了，洞察变贵了</text>
  <text x="400" y="56" fill="#87867f" font-size="11" text-anchor="middle">@ZoharAtkins | 效率产生需求，瓶颈持续迁移</text>
  <rect width="160" height="220" x="40" y="80" fill="#e3dacc" filter="url(#sh2)" rx="10"/>
  <text x="120" y="108" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">1865 煤炭时代</text>
  <text x="120" y="124" fill="#87867f" font-size="9" text-anchor="middle">Jevons 悖论</text>
  <rect width="130" height="24" x="55" y="138" fill="#d97757" rx="5"/>
  <text x="120" y="154" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">蒸汽机效率↑</text>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr2)" d="M120 165v20"/>
  <rect width="130" height="24" x="55" y="188" fill="#d97757" rx="5"/>
  <text x="120" y="204" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">煤炭消耗↑ 10倍</text>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr2)" d="M120 215v20"/>
  <rect width="130" height="24" x="55" y="238" fill="#141413" rx="5"/>
  <text x="120" y="254" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">需求爆炸</text>
  <text x="120" y="278" fill="#87867f" font-size="9" text-anchor="middle">效率↑ → 成本↓ →</text>
  <text x="120" y="291" fill="#87867f" font-size="9" text-anchor="middle">应用爆炸 → 总消耗↑</text>
  <path stroke="#d97757" stroke-width="3" marker-end="url(#arr2)" d="M210 190h40"/>
  <text x="230" y="180" fill="#d97757" font-size="9" font-weight="700" text-anchor="middle">类比</text>
  <rect width="160" height="220" x="260" y="80" fill="#e3dacc" filter="url(#sh2)" rx="10"/>
  <text x="340" y="108" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">2026 知识时代</text>
  <text x="340" y="124" fill="#87867f" font-size="9" text-anchor="middle">Jevons 悖论重现</text>
  <rect width="130" height="24" x="275" y="138" fill="#788c5d" rx="5"/>
  <text x="340" y="154" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">AI 咨询成本↓</text>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr2)" d="M340 165v20"/>
  <rect width="130" height="24" x="275" y="188" fill="#788c5d" rx="5"/>
  <text x="340" y="204" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">知识需求量↑</text>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr2)" d="M340 215v20"/>
  <rect width="130" height="24" x="275" y="238" fill="#141413" rx="5"/>
  <text x="340" y="254" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">洞察需求↑↑↑</text>
  <text x="340" y="278" fill="#87867f" font-size="9" text-anchor="middle">AI 消除可及性瓶颈</text>
  <text x="340" y="291" fill="#87867f" font-size="9" text-anchor="middle">真正的约束变洞察</text>
  <path stroke="#d97757" stroke-width="3" marker-end="url(#arr2)" d="M430 190h40"/>
  <text x="450" y="180" fill="#d97757" font-size="9" font-weight="700" text-anchor="middle">瓶颈迁移</text>
  <rect width="280" height="220" x="480" y="80" fill="#141413" filter="url(#sh2)" rx="10"/>
  <text x="620" y="108" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">瓶颈迁移路径</text>
  <rect width="244" height="26" x="498" y="128" fill="#d97757" rx="5"/>
  <text x="620" y="145" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">书很贵 → 可及性是瓶颈</text>
  <path stroke="#87867f" stroke-dasharray="3,2" stroke-width="1.5" marker-end="url(#arr2)" d="M620 157v15"/>
  <rect width="244" height="26" x="498" y="175" fill="#e3dacc" rx="5"/>
  <text x="620" y="192" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">印刷松动 → 识字是瓶颈</text>
  <path stroke="#87867f" stroke-dasharray="3,2" stroke-width="1.5" marker-end="url(#arr2)" d="M620 204v15"/>
  <rect width="244" height="26" x="498" y="222" fill="#e3dacc" rx="5"/>
  <text x="620" y="239" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">AI 松动咨询 → Chiddush 是瓶颈</text>
  <path stroke="#87867f" stroke-dasharray="3,2" stroke-width="1.5" marker-end="url(#arr2)" d="M620 251v15"/>
  <rect width="244" height="26" x="498" y="269" fill="#788c5d" rx="5"/>
  <text x="620" y="286" fill="#faf9f5" font-size="10" font-weight="600" text-anchor="middle">丰盛产生胃口，不是消除胃口</text>
  <rect width="340" height="100" x="40" y="320" fill="#e3dacc" filter="url(#sh2)" rx="10"/>
  <text x="210" y="344" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">Chiddush 是什么？</text>
  <text x="210" y="362" fill="#141413" font-size="10" text-anchor="middle">&quot;在一本已经存在的文本中</text>
  <text x="210" y="376" fill="#141413" font-size="10" text-anchor="middle">看到之前没人看到的真实的东西&quot;</text>
  <text x="210" y="394" fill="#87867f" font-size="9" text-anchor="middle">— 产生意义的阅读，而非吸收意义</text>
  <text x="210" y="408" fill="#d97757" font-size="9" font-weight="600" text-anchor="middle">没有 Chiddush，学习室无法存续 (Chagigah 3a)</text>
  <rect width="360" height="100" x="400" y="320" fill="#141413" filter="url(#sh2)" rx="10"/>
  <text x="580" y="344" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">面包不是小麦</text>
  <text x="580" y="364" fill="#d1cfc5" font-size="10" text-anchor="middle">AI = 新的磨小麦师傅</text>
  <text x="580" y="380" fill="#d1cfc5" font-size="10" text-anchor="middle">吃生小麦的人 = 只消费 AI 生成的 Chiddush</text>
  <text x="580" y="396" fill="#d1cfc5" font-size="10" text-anchor="middle">而不转化它的人</text>
  <text x="580" y="412" fill="#d97757" font-size="9" font-weight="600" text-anchor="middle">问题从&quot;我能找到吗&quot;变成&quot;我看到了什么&quot;</text>
  <rect width="720" height="32" x="40" y="436" fill="#788c5d" rx="6"/>
  <text x="400" y="457" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">你的问题，才是真正有价值的东西。</text>
</svg>
