<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360"><title>AI安全左移流程</title><desc>从传统DevSecOps到AI驱动安全左移的流程对比</desc><defs><marker id="arrow5" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#87867f" d="m0 0 8 3-8 3z"/></marker><marker id="arrow-green" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#788c5d" d="m0 0 8 3-8 3z"/></marker><marker id="arrow-red" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#d97757" d="m0 0 8 3-8 3z"/></marker><style>.text-main{fill:#141413}.text-accent,.text-main,.text-olive,.text-secondary{font-family:system-ui,sans-serif}.text-secondary{fill:#87867f}.text-accent{fill:#d97757;font-weight:600}.text-olive{fill:#788c5d;font-weight:500}</style></defs><path d="M0 0h780v360H0z" style="fill:#faf9f5"/><text x="390" y="28" class="text-main" font-size="18" font-weight="600" text-anchor="middle">AI驱动的安全左移：终极形态</text><text x="160" class="text-secondary" font-size="13" font-weight="500" text-anchor="middle" transform="translate(0 50)">传统DevSecOps</text><text x="160" y="16" class="text-secondary" font-size="10" text-anchor="middle" transform="translate(0 50)">发现问题时机：CI/CD阶段</text><g transform="translate(0 85)"><rect width="80" height="45" fill="#e3dacc" opacity=".5" rx="6"/><text x="40" y="22" class="text-main" font-size="11" text-anchor="middle">开发</text><text x="40" y="36" class="text-secondary" font-size="9" text-anchor="middle">写代码</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrow5)" d="M80 22h25"/><rect width="80" height="45" x="105" fill="#e3dacc" opacity=".5" rx="6"/><text x="145" y="22" class="text-main" font-size="11" text-anchor="middle">测试</text><text x="145" y="36" class="text-secondary" font-size="9" text-anchor="middle">功能验证</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arrow5)" d="M185 22h25"/><rect width="90" height="45" x="210" fill="#d97757" opacity=".15" rx="6"/><rect width="90" height="45" x="21