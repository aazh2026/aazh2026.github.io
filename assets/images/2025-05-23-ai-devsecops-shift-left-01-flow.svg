<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img">
  <title>AI安全左移流程</title>
  <desc>从传统DevSecOps到AI驱动安全左移的流程对比</desc>

  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-family: system-ui, sans-serif; }
      .text-secondary { fill: #87867F; font-family: system-ui, sans-serif; }
      .text-accent { fill: #D97757; font-family: system-ui, sans-serif; font-weight: 600; }
      .text-olive { fill: #788C5D; font-family: system-ui, sans-serif; font-weight: 500; }
      .border { stroke: #D1CFC5; stroke-width: 1; fill: none; }
    </style>
    <marker id="arrow5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#788C5D"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="360" class="bg"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" class="text-main" font-size="18" font-weight="600">AI驱动的安全左移：终极形态</text>

  <!-- Left side: Traditional DevSecOps -->
  <g transform="translate(0, 50)">
    <text x="160" y="0" text-anchor="middle" class="text-secondary" font-size="13" font-weight="500">传统DevSecOps</text>
    <text x="160" y="16" text-anchor="middle" class="text-secondary" font-size="10">发现问题时机：CI/CD阶段</text>

    <!-- Traditional flow boxes -->
    <g transform="translate(0, 35)">
      <!-- 开发 -->
      <rect x="0" y="0" width="80" height="45" rx="6" fill="#E3DACC" opacity="0.5"/>
      <text x="40" y="22" text-anchor="middle" class="text-main" font-size="11">开发</text>
      <text x="40" y="36" text-anchor="middle" class="text-secondary" font-size="9">写代码</text>

      <!-- Arrow -->
      <line x1="80" y1="22" x2="105" y2="22" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow5)"/>

      <!-- 测试 -->
      <rect x="105" y="0" width="80" height="45" rx="6" fill="#E3DACC" opacity="0.5"/>
      <text x="145" y="22" text-anchor="middle" class="text-main" font-size="11">测试</text>
      <text x="145" y="36" text-anchor="middle" class="text-secondary" font-size="9">功能验证</text>

      <!-- Arrow -->
      <line x1="185" y1="22" x2="210" y2="22" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow5)"/>

      <!-- 安全扫描 (highlighted as problem) -->
      <rect x="210" y="0" width="90" height="45" rx="6" fill="#D97757" opacity="0.15"/>
      <rect x="210" y="0" width="90" height="45" rx="6" stroke="#D97757" stroke-width="2" fill="none"/>
      <text x="255" y="18" text-anchor="middle" class="text-accent" font-size="11">安全扫描</text>
      <text x="255" y="33" text-anchor="middle" class="text-secondary" font-size="9">发现问题</text>

      <!-- Arrow -->
      <line x1="300" y1="22" x2="325" y2="22" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrow-red)"/>

      <!-- 修复 -->
      <rect x="325" y="0" width="80" height="45" rx="6" fill="#E3DACC" opacity="0.5"/>
      <text x="365" y="22" text-anchor="middle" class="text-main" font-size="11">修复</text>
      <text x="365" y="36" text-anchor="middle" class="text-secondary" font-size="9">返工成本高</text>

      <!-- Arrow -->
      <line x1="405" y1="22" x2="430" y2="22" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow5)"/>

      <!-- 发布 -->
      <rect x="430" y="0" width="80" height="45" rx="6" fill="#E3DACC" opacity="0.5"/>
      <text x="470" y="22" text-anchor="middle" class="text-main" font-size="11">发布</text>
    </g>

    <!-- Problem annotation -->
    <g transform="translate(255, 55)">
      <text x="0" y="0" text-anchor="middle" class="text-accent" font-size="9">发现问题时</text>
      <text x="0" y="12" text-anchor="middle" class="text-accent" font-size="9">已写了很多代码</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="390" y1="60" x2="390" y2="310" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right side: AI DevSecOps -->
  <g transform="translate(400, 50)">
    <text x="175" y="0" text-anchor="middle" class="text-olive" font-size="13" font-weight="600">AI DevSecOps</text>
    <text x="175" y="16" text-anchor="middle" class="text-secondary" font-size="10">发现问题时机：代码生成阶段</text>

    <!-- AI flow boxes -->
    <g transform="translate(0, 35)">
      <!-- 开发者输入需求 -->
      <rect x="0" y="0" width="100" height="55" rx="6" fill="#E3DACC" opacity="0.5"/>
      <text x="50" y="18" text-anchor="middle" class="text-main" font-size="10">开发者</text>
      <text x="50" y="32" text-anchor="middle" class="text-main" font-size="10">输入需求</text>
      <text x="50" y="46" text-anchor="middle" class="text-secondary" font-size="8">定义意图</text>

      <!-- Arrow -->
      <line x1="100" y1="27" x2="125" y2="27" stroke="#788C5D" stroke-width="2" marker-end="url(#arrow-green)"/>

      <!-- AI分析+生成 (key step) -->
      <rect x="125" y="-10" width="110" height="75" rx="8" fill="#788C5D" opacity="0.12"/>
      <rect x="125" y="-10" width="110" height="75" rx="8" stroke="#788C5D" stroke-width="2" fill="none"/>
      <text x="180" y="10" text-anchor="middle" class="text-olive" font-size="10" font-weight="600">AI安全助手</text>
      <text x="180" y="25" text-anchor="middle" class="text-main" font-size="9">分析需求</text>
      <text x="180" y="38" text-anchor="middle" class="text-main" font-size="9">识别安全风险</text>
      <text x="180" y="51" text-anchor="middle" class="text-olive" font-size="9">生成安全代码</text>

      <!-- Arrow -->
      <line x1="235" y1="27" x2="260" y2="27" stroke="#788C5D" stroke-width="2" marker-end="url(#arrow-green)"/>

      <!-- 自动安全验证 -->
      <rect x="260" y="0" width="90" height="55" rx="6" fill="#788C5D" opacity="0.1"/>
      <text x="305" y="18" text-anchor="middle" class="text-olive" font-size="10">自动</text>
      <text x="305" y="32" text-anchor="middle" class="text-olive" font-size="10">安全验证</text>
      <text x="305" y="46" text-anchor="middle" class="text-secondary" font-size="8">实时检查</text>
    </g>

    <!-- Benefit annotation -->
    <g transform="translate(180, 75)">
      <rect x="-60" y="0" width="120" height="40" rx="6" fill="#788C5D" opacity="0.1"/>
      <text x="0" y="16" text-anchor="middle" class="text-olive" font-size="9">生成即安全</text>
      <text x="0" y="30" text-anchor="middle" class="text-secondary" font-size="8">预防胜于治疗</text>
    </g>
  </g>

  <!-- Bottom comparison bar -->
  <g transform="translate(0, 310)">
    <rect x="30" y="0" width="340" height="42" rx="6" fill="#D97757" opacity="0.08"/>
    <text x="200" y="16" text-anchor="middle" class="text-accent" font-size="10" font-weight="500">传统：修复成本高（返工）</text>
    <text x="200" y="32" text-anchor="middle" class="text-secondary" font-size="9">被动响应，安全专家参与</text>

    <rect x="410" y="0" width="340" height="42" rx="6" fill="#788C5D" opacity="0.08"/>
    <text x="580" y="16" text-anchor="middle" class="text-olive" font-size="10" font-weight="500">AI：预防成本低（立即重生成）</text>
    <text x="580" y="32" text-anchor="middle" class="text-secondary" font-size="9">主动预防，AI内置安全知识</text>
  </g>
</svg>