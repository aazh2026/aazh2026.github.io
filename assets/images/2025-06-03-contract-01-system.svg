<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- AI 契约管理系统架构 -->
  <rect width="560" height="240" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI 契约管理系统架构</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/06/03</text>

  <!-- RC: 契约注册中心 (top center) -->
  <rect x="200" y="52" width="160" height="46" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="200" y="52" width="160" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="280" y="67" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">RC · 契约注册中心</text>
  <text x="280" y="82" text-anchor="middle" font-size="9" fill="#141413">服务契约存储 · 版本管理 · 元数据</text>
  <rect x="352" y="62" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="359" y="73" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">RC</text>

  <!-- IA: 影响分析引擎 (left) -->
  <rect x="40" y="52" width="140" height="46" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="40" y="52" width="140" height="18" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="110" y="67" text-anchor="middle" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">IA · 影响分析引擎</text>
  <text x="110" y="82" text-anchor="middle" font-size="9" fill="#141413">依赖图谱 · 影响预测 · 风险评估</text>
  <rect x="172" y="62" width="14" height="14" rx="7" fill="#EA580C"/>
  <text x="179" y="73" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">IA</text>

  <!-- Arrows: RC→DD, IA→DD -->
  <line x1="340" y1="75" x2="360" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="180" y1="75" x2="200" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- DD: 漂移检测引擎 (center, largest) -->
  <rect x="200" y="118" width="160" height="56" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.8"/>
  <rect x="200" y="118" width="160" height="20" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="280" y="133" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">DD · 漂移检测引擎</text>
  <text x="280" y="150" text-anchor="middle" font-size="9" fill="#141413">语法检测 · 语义分析 · 兼容性评估</text>
  <text x="280" y="164" text-anchor="middle" font-size="9" fill="#141413">（核心枢纽）</text>
  <rect x="352" y="130" width="14" height="14" rx="7" fill="#2563EB"/>
  <text x="359" y="141" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">DD</text>

  <!-- Arrows: DD→AN, DD→AF -->
  <line x1="280" y1="174" x2="160" y2="196" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="280" y1="174" x2="400" y2="196" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- AN: 告警通知 (bottom left) -->
  <rect x="60" y="196" width="140" height="40" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="60" y="196" width="140" height="16" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="130" y="210" text-anchor="middle" font-size="10" fill="#7C3AED" font-family="ui-monospace, monospace" font-weight="600">AN · 告警通知</text>
  <text x="130" y="226" text-anchor="middle" font-size="9" fill="#141413">团队通知 · 阻断发布 · 升级指南</text>
  <rect x="192" y="208" width="14" height="14" rx="7" fill="#7C3AED"/>
  <text x="199" y="219" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">AN</text>

  <!-- AF: 自动修复引擎 (bottom right) -->
  <rect x="360" y="196" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="360" y="196" width="160" height="16" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="440" y="210" text-anchor="middle" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">AF · 自动修复引擎</text>
  <text x="440" y="226" text-anchor="middle" font-size="9" fill="#141413">代码更新 · 测试生成 · 文档更新</text>
  <rect x="512" y="208" width="14" height="14" rx="7" fill="#059669"/>
  <text x="519" y="219" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">AF</text>
</svg>