<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Supervisor Agent 模式 -->
  <rect width="560" height="180" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">Supervisor Agent 模式：任务分解与汇总</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/31</text>

  <!-- Supervisor (top) -->
  <rect x="160" y="48" width="240" height="42" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="160" y="48" width="240" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="280" y="62" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Supervisor Agent</text>
  <text x="280" y="78" text-anchor="middle" font-size="9" fill="#87867F">任务分解 · 分配 · 汇总</text>
  <rect x="392" y="56" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="399" y="67" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">S</text>

  <!-- Arrows S→W1, W2, W3, W4 -->
  <line x1="280" y1="90" x2="100" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="280" y1="90" x2="200" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="280" y1="90" x2="300" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="280" y1="90" x2="400" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- W1 -->
  <rect x="50" y="112" width="100" height="40" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="50" y="112" width="100" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="100" y="125" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Worker 1</text>
  <text x="100" y="143" text-anchor="middle" font-size="8.5" fill="#141413">内容生成</text>
  <rect x="142" y="122" width="12" height="12" rx="6" fill="#2563EB"/>
  <text x="148" y="131" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">W1</text>

  <!-- W2 -->
  <rect x="160" y="112" width="100" height="40" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="160" y="112" width="100" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="210" y="125" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Worker 2</text>
  <text x="210" y="143" text-anchor="middle" font-size="8.5" fill="#141413">审查编辑</text>
  <rect x="252" y="122" width="12" height="12" rx="6" fill="#2563EB"/>
  <text x="258" y="131" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">W2</text>

  <!-- W3 -->
  <rect x="300" y="112" width="100" height="40" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="300" y="112" width="100" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="350" y="125" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Worker 3</text>
  <text x="350" y="143" text-anchor="middle" font-size="8.5" fill="#141413">发布管理</text>
  <rect x="392" y="122" width="12" height="12" rx="6" fill="#2563EB"/>
  <text x="398" y="131" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">W3</text>

  <!-- W4 -->
  <rect x="410" y="112" width="100" height="40" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="410" y="112" width="100" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="460" y="125" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Worker 4</text>
  <text x="460" y="143" text-anchor="middle" font-size="8.5" fill="#141413">数据分析</text>
  <rect x="502" y="122" width="12" height="12" rx="6" fill="#2563EB"/>
  <text x="508" y="131" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">W4</text>

  <text x="280" y="168" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">Supervisor 单点协调，Worker 间不直接通信</text>
</svg>