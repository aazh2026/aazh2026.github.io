<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" font-family="'Courier New', Courier, monospace" font-size="12">
  <rect width="580" height="200" fill="#FAF9F5"/>
  <!-- Outer border -->
  <rect x="20" y="10" width="540" height="180" fill="none" stroke="#141413" stroke-width="2"/>
  <!-- Header -->
  <rect x="20" y="10" width="540" height="28" fill="#D97757"/>
  <text x="290" y="29" text-anchor="middle" fill="#FAF9F5" font-size="13" font-weight="bold">两种设计哲学</text>
  <!-- Column headers -->
  <rect x="20" y="38" width="270" height="22" fill="#D1CFC5"/>
  <text x="155" y="53" text-anchor="middle" fill="#141413" font-weight="bold">Agent 编排</text>
  <rect x="290" y="38" width="270" height="22" fill="#D1CFC5"/>
  <text x="425" y="53" text-anchor="middle" fill="#141413" font-weight="bold">系统设计</text>
  <!-- Divider -->
  <line x1="290" y1="38" x2="290" y2="188" stroke="#141413" stroke-width="1"/>
  <!-- Row 1 -->
  <line x1="20" y1="60" x2="560" y2="60" stroke="#141413" stroke-width="1"/>
  <text x="40" y="74" fill="#141413">关注：每个 Agent 做什么</text>
  <text x="310" y="74" fill="#141413">关注：Agent 如何交互</text>
  <!-- Row 2 -->
  <line x1="20" y1="84" x2="560" y2="84" stroke="#141413" stroke-width="1"/>
  <text x="40" y="98" fill="#141413">隐喻：管弦乐队指挥</text>
  <text x="310" y="98" fill="#141413">隐喻：生态系统园丁</text>
  <!-- Row 3 -->
  <line x1="20" y1="108" x2="560" y2="108" stroke="#141413" stroke-width="1"/>
  <text x="40" y="122" fill="#141413">控制：中央调度</text>
  <text x="310" y="122" fill="#141413">控制：规则与环境</text>
  <!-- Row 4 -->
  <line x1="20" y1="132" x2="560" y2="132" stroke="#141413" stroke-width="1"/>
  <text x="40" y="146" fill="#141413">优化：个体效率</text>
  <text x="310" y="146" fill="#141413">优化：整体适应力</text>
  <!-- Row 5 -->
  <text x="40" y="170" fill="#141413">问题："Agent A 应该..."</text>
  <text x="310" y="170" fill="#141413">问题："什么规则能让..."</text>
</svg>
