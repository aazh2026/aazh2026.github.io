<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <filter id="shadow6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#141413" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="900" height="460" fill="url(#bg6)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#141413" letter-spacing="-0.3">两种协调模式对比</text>
  <line x1="200" y1="56" x2="700" y2="56" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- LEFT: Centralized -->
  <rect x="40" y="76" width="390" height="340" rx="14" fill="#FAF9F5" filter="url(#shadow6)"/>
  <rect x="40" y="76" width="390" height="52" rx="14" fill="#D97757"/>
  <rect x="40" y="110" width="390" height="18" fill="#D97757"/>
  <text x="235" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#FAF9F5">OpenAI 模式：中心化协调</text>
  <text x="235" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FAF9F5" opacity="0.85">人类 + Agent 混合编排</text>

  <!-- Centralized diagram -->
  <g transform="translate(120,160)">
    <!-- Center orchestrator -->
    <circle cx="150" cy="60" r="30" fill="#D97757" opacity="0.2" stroke="#D97757" stroke-width="2"/>
    <text x="150" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#D97757">Orchestrator</text>
    <text x="150" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#D97757">（人类/Agent）</text>

    <!-- Agent 1 -->
    <circle cx="60" cy="160" r="22" fill="#FAF9F5" stroke="#87867F" stroke-width="1.5"/>
    <text x="60" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">Agent A</text>
    <text x="60" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">任务分配</text>

    <!-- Agent 2 -->
    <circle cx="150" cy="160" r="22" fill="#FAF9F5" stroke="#87867F" stroke-width="1.5"/>
    <text x="150" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">Agent B</text>
    <text x="150" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">任务分配</text>

    <!-- Agent 3 -->
    <circle cx="240" cy="160" r="22" fill="#FAF9F5" stroke="#87867F" stroke-width="1.5"/>
    <text x="240" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">Agent C</text>
    <text x="240" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">任务分配</text>

    <!-- Lines from orchestrator to agents -->
    <line x1="150" y1="90" x2="60" y2="138" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <line x1="150" y1="90" x2="150" y2="138" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <line x1="150" y1="90" x2="240" y2="138" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

    <!-- Lines back to orchestrator -->
    <line x1="60" y1="182" x2="60" y2="220" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" transform="translate(90,-122)"/>
    <line x1="150" y1="182" x2="150" y2="220" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" transform="translate(0,-60)"/>
    <line x1="240" y1="182" x2="240" y2="220" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" transform="translate(-90,-122)"/>
  </g>

  <!-- RIGHT: Decentralized -->
  <rect x="450" y="76" width="410" height="340" rx="14" fill="#FAF9F5" filter="url(#shadow6)"/>
  <rect x="450" y="76" width="410" height="52" rx="14" fill="#788C5D"/>
  <rect x="450" y="110" width="410" height="18" fill="#788C5D"/>
  <text x="655" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#FAF9F5">Carlini 模式：去中心化协调</text>
  <text x="655" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FAF9F5" opacity="0.85">Git + 文件锁，无 Orchestrator</text>

  <!-- Decentralized diagram -->
  <g transform="translate(470,150)">
    <!-- Git repo center -->
    <rect x="120" y="10" width="100" height="40" rx="10" fill="#788C5D" opacity="0.15" stroke="#788C5D" stroke-width="1.5"/>
    <text x="170" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#788C5D">Git Repo</text>
    <text x="170" y="42" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#788C5D">共享状态</text>

    <!-- Agents around the repo -->
    <!-- Agent 1 -->
    <circle cx="30" cy="130" r="20" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <text x="30" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#141413">Agent-1</text>
    <text x="30" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F">自主选择</text>

    <!-- Agent 2 -->
    <circle cx="100" cy="100" r="20" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <text x="100" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#141413">Agent-2</text>
    <text x="100" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F">自主选择</text>

    <!-- Agent 3 -->
    <circle cx="240" cy="100" r="20" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <text x="240" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#141413">Agent-3</text>
    <text x="240" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F">自主选择</text>

    <!-- Agent 4 -->
    <circle cx="310" cy="130" r="20" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <text x="310" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#141413">Agent-4</text>
    <text x="310" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#87867F">自主选择</text>

    <!-- Agent 5-16 as small dots -->
    <circle cx="170" cy="75" r="10" fill="#788C5D" opacity="0.3"/>
    <circle cx="200" cy="90" r="10" fill="#788C5D" opacity="0.3"/>
    <circle cx="140" cy="90" r="10" fill="#788C5D" opacity="0.3"/>
    <circle cx="55" cy="100" r="10" fill="#788C5D" opacity="0.3"/>
    <circle cx="285" cy="100" r="10" fill="#788C5D" opacity="0.3"/>
    <circle cx="70" cy="70" r="8" fill="#788C5D" opacity="0.2"/>
    <circle cx="270" cy="70" r="8" fill="#788C5D" opacity="0.2"/>
    <circle cx="170" cy="60" r="8" fill="#788C5D" opacity="0.2"/>
    <circle cx="120" cy="60" r="8" fill="#788C5D" opacity="0.2"/>
    <circle cx="220" cy="60" r="8" fill="#788C5D" opacity="0.2"/>

    <!-- Spontaneous lines to repo -->
    <line x1="30" y1="130" x2="170" y2="50" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="100" y1="100" x2="170" y2="50" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="240" y1="100" x2="170" y2="50" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="310" y1="130" x2="170" y2="50" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

    <!-- Emergent coordination label -->
    <text x="170" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#788C5D" font-weight="600">涌现的秩序</text>
    <text x="170" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">测试套件 = 隐性的协调机制</text>
  </g>

  <!-- Bottom comparison table -->
  <rect x="40" y="428" width="820" height="26" rx="13" fill="#141413" opacity="0.05"/>
  <text x="450" y="446" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#87867F">没有中央调度器 — 清晰的目标替代了复杂的指令，简单的同步原语足以处理大多数协调需求。</text>
</svg>
