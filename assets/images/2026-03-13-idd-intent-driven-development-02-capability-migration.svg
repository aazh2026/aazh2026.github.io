  <text x="550" y="231" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">AI协作能力 ⭐NEW</text>
  <rect width="70" height="22" x="630" y="216" fill="#e3dacc" rx="4"/>
  <text x="665" y="231" fill="#141413" font-size="9" text-anchor="middle">多轮对话</text>
  <rect width="70" height="22" x="710" y="216" fill="#e3dacc" rx="4"/>
  <text x="745" y="231" fill="#141413" font-size="9" text-anchor="middle">反馈优化</text>
  <rect width="330" height="22" x="480" y="246" fill="#e3dacc" rx="4"/>
  <text x="645" y="261" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">判断力 &gt; 知识（理解原理胜于记住细节）</text>
  <rect width="330" height="22" x="480" y="276" fill="#e3dacc" rx="4"/>
  <text x="645" y="291" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">跨域学习 &amp; 系统思考</text>
  <rect width="330" height="22" x="480" y="306" fill="#e3dacc" rx="4"/>
  <text x="645" y="321" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">验证流程 &gt; 生成速度</text>
  <text x="645" y="352" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">核心产出：意图描述 + 审查意见 + 架构设计</text>
  <rect width="220" height="26" x="30" y="368" fill="#e3dacc" rx="6"/>
  <text x="140" y="385" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">编码速度 → 意图表达速度</text>
  <rect width="220" height="26" x="265" y="368" fill="#e3dacc" rx="6"/>
  <text x="375" y="385" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">调试技能 → 审查判断技能</text>
  <rect width="220" height="26" x="500" y="368" fill="#e3dacc" rx="6"/>
  <text x="610" y="385" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">算法实现 → 算法选择</text>
  <rect width="95" height="26" x="735" y="368" fill="#d97757" rx="6"/>
  <text x="782" y="385" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">单元测试 → 意图验证</text>
