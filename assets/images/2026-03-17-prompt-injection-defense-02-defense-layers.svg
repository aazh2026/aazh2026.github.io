<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="420" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">分层防御架构：四层安全防线</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">OpenAI Agent 安全设计 · 2026/03/17</text>

  <!-- Layer 4: Output Layer (top) -->
  <rect x="40" y="58" width="600" height="68" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="60" y="82" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 4</text>
  <text x="60" y="102" font-size="14" fill="#141413">输出层（Output Layer）</text>
  <text x="230" y="102" font-size="12" fill="#87867F">审计审查</text>
  <text x="60" y="118" font-size="10.5" fill="#87867F">日志记录 · 异常检测 · 响应过滤</text>
  <rect x="570" y="72" width="52" height="22" rx="11" fill="#D97757"/>
  <text x="596" y="87" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">最后防线</text>

  <!-- Arrow 4→3 -->
  <line x1="340" y1="126" x2="340" y2="140" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="340,144 336,136 344,136" fill="#D1CFC5"/>

  <!-- Layer 3: Data Layer -->
  <rect x="40" y="152" width="600" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <text x="60" y="176" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 3</text>
  <text x="60" y="196" font-size="14" fill="#141413">数据层（Data Layer）</text>
  <text x="230" y="196" font-size="12" fill="#87867F">数据分类</text>
  <text x="60" y="212" font-size="10.5" fill="#87867F">敏感信息识别 · 访问控制 · 数据脱敏</text>
  <rect x="570" y="166" width="52" height="22" rx="11" fill="#788C5D"/>
  <text x="596" y="181" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">数据保护</text>

  <!-- Arrow 3→2 -->
  <line x1="340" y1="220" x2="340" y2="234" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="340,238 336,230 344,230" fill="#D1CFC5"/>

  <!-- Layer 2: Behavioral Layer -->
  <rect x="40" y="246" width="600" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <text x="60" y="270" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 2</text>
  <text x="60" y="290" font-size="14" fill="#141413">行为层（Behavioral Layer）</text>
  <text x="240" y="290" font-size="12" fill="#87867F">操作约束</text>
  <text x="60" y="306" font-size="10.5" fill="#87867F">白名单机制 · 参数验证 · 敏感操作确认</text>
  <rect x="570" y="260" width="52" height="22" rx="11" fill="#788C5D"/>
  <text x="596" y="275" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">操作约束</text>

  <!-- Arrow 2→1 -->
  <line x1="340" y1="314" x2="340" y2="328" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="340,332 336,324 344,324" fill="#D1CFC5"/>

  <!-- Layer 1: Input Layer (bottom) -->
  <rect x="40" y="340" width="600" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <text x="60" y="364" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 1</text>
  <text x="60" y="384" font-size="14" fill="#141413">输入层（Input Layer）</text>
  <text x="220" y="384" font-size="12" fill="#87867F">指令隔离</text>
  <text x="60" y="400" font-size="10.5" fill="#87867F">语义分析 · 输入过滤 · 指令优先级</text>
  <rect x="570" y="354" width="52" height="22" rx="11" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="596" y="369" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">第一道关</text>

  <!-- Feedback arrow: Layer 4 → Layer 1 (right side, dashed) -->
  <path d="M 638 88 C 658 88, 658 374, 638 372" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="638,372 632,364 644,364" fill="#D97757" opacity="0.5"/>
  <text x="660" y="230" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">反馈改进</text>
</svg>
