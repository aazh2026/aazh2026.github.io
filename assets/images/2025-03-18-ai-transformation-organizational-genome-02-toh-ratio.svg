<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 600 340">
  <title>投入与权重的倒置</title>
  <desc>
    T/O/H三因素投入比例与成功权重对比：技术采购70%投入但仅10%权重，组织适配度10%投入却占60%权重
  </desc>
  <path fill="#faf9f5" d="M0 0h600v340H0z"/>
  <text x="300" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">投入与权重的倒置</text>
  <text x="300" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">T · O · H 三因素分析</text>
  <rect width="220" height="36" x="40" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="150" y="83" fill="#141413" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">实际投入</text>
  <rect width="220" height="30" x="40" y="106" fill="#d97757" rx="5"/>
  <text x="50" y="126" fill="#fff" font-family="ui-monospace, monospace" font-size="11">技术采购</text>
  <text x="248" y="126" fill="#d97757" font-family="ui-monospace, monospace" font-size="11">70%</text>
  <rect width="138" height="30" x="40" y="144" fill="#d1cfc5" rx="5"/>
  <text x="50" y="164" fill="#141413" font-family="ui-monospace, monospace" font-size="11">人才培训</text>
  <text x="186" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="11">20%</text>
  <rect width="66" height="30" x="40" y="182" fill="#d1cfc5" rx="5"/>
  <text x="50" y="202" fill="#141413" font-family="ui-monospace, monospace" font-size="11">组织变革</text>
  <text x="114" y="202" fill="#87867f" font-family="ui-monospace, monospace" font-size="11">10%</text>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M268 168h54"/>
  <path fill="#d97757" d="m322 163 12 5-12 5z"/>
  <text x="300" y="158" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" font-weight="600" text-anchor="middle">认知盲区</text>
  <rect width="228" height="36" x="332" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="446" y="83" fill="#141413" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">成功权重</text>
  <rect width="180" height="30" x="332" y="106" fill="#d97757" rx="5"/>
  <text x="342" y="126" fill="#fff" font-family="ui-monospace, monospace" font-size="11">组织适配度</text>
  <text x="500" y="126" fill="#d97757" font-family="ui-monospace, monospace" font-size="11">60%</text>
  <rect width="86" height="30" x="332" y="144" fill="#d1cfc5" rx="5"/>
  <text x="342" y="164" fill="#141413" font-family="ui-monospace, monospace" font-size="11">人才储备</text>
  <text x="426" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="11">30%</text>
  <rect width="28" height="30" x="332" y="182" fill="#d1cfc5" rx="5"/>
  <text x="342" y="202" fill="#141413" font-family="ui-monospace, monospace" font-size="11">技术能力</text>
  <text x="368" y="202" fill="#87867f" font-family="ui-monospace, monospace" font-size="11">10%</text>
  <rect width="520" height="46" x="40" y="228" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="300" y="250" fill="#141413" font-size="11" text-anchor="middle">企业在影响力最小的因素上投入了最多的资源，</text>
  <text x="300" y="266" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">而在影响力最大的因素上投入最少。</text>
  <rect width="12" height="12" x="40" y="290" fill="#d97757" rx="2"/>
  <text x="58" y="301" fill="#141413" font-family="ui-monospace, monospace" font-size="10">高投入 / 低权重（错配）</text>
  <rect width="12" height="12" x="200" y="290" fill="#d1cfc5" rx="2"/>
  <text x="218" y="301" fill="#141413" font-family="ui-monospace, monospace" font-size="10">低投入 / 高权重（盲区）</text>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M380 296h20"/>
  <text x="408" y="301" fill="#87867f" font-family="ui-monospace, monospace" font-size="10">倒置关系</text>
</svg>
