<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>投入与权重的倒置</title>
  <desc>T/O/H三因素投入比例与成功权重对比：技术采购70%投入但仅10%权重，组织适配度10%投入却占60%权重</desc>

  <!-- Background -->
  <rect width="600" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">投入与权重的倒置</text>
  <text x="300" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">T · O · H 三因素分析</text>

  <!-- Left group: 实际投入 -->
  <rect x="40" y="60" width="220" height="36" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="150" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">实际投入</text>

  <!-- Left bars -->
  <!-- 技术采购 70% -->
  <rect x="40" y="106" width="220" height="30" rx="5" fill="#D97757"/>
  <text x="50" y="126" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace">技术采购</text>
  <text x="248" y="126" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">70%</text>

  <!-- 人才培训 20% -->
  <rect x="40" y="144" width="138" height="30" rx="5" fill="#D1CFC5"/>
  <text x="50" y="164" font-size="11" fill="#141413" font-family="ui-monospace, monospace">人才培训</text>
  <text x="186" y="164" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">20%</text>

  <!-- 组织变革 10% -->
  <rect x="40" y="182" width="66" height="30" rx="5" fill="#D1CFC5"/>
  <text x="50" y="202" font-size="11" fill="#141413" font-family="ui-monospace, monospace">组织变革</text>
  <text x="114" y="202" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">10%</text>

  <!-- Center arrow -->
  <line x1="268" y1="168" x2="322" y2="168" stroke="#D97757" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="322,163 334,168 322,173" fill="#D97757"/>
  <text x="300" y="158" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">认知盲区</text>

  <!-- Right group: 成功权重 -->
  <rect x="332" y="60" width="228" height="36" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="446" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">成功权重</text>

  <!-- Right bars -->
  <!-- 组织适配度 60% -->
  <rect x="332" y="106" width="180" height="30" rx="5" fill="#D97757"/>
  <text x="342" y="126" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace">组织适配度</text>
  <text x="500" y="126" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">60%</text>

  <!-- 人才储备 30% -->
  <rect x="332" y="144" width="86" height="30" rx="5" fill="#D1CFC5"/>
  <text x="342" y="164" font-size="11" fill="#141413" font-family="ui-monospace, monospace">人才储备</text>
  <text x="426" y="164" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">30%</text>

  <!-- 技术能力 10% -->
  <rect x="332" y="182" width="28" height="30" rx="5" fill="#D1CFC5"/>
  <text x="342" y="202" font-size="11" fill="#141413" font-family="ui-monospace, monospace">技术能力</text>
  <text x="368" y="202" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">10%</text>

  <!-- Bottom callout -->
  <rect x="40" y="228" width="520" height="46" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="300" y="250" text-anchor="middle" font-size="11" fill="#141413">企业在影响力最小的因素上投入了最多的资源，</text>
  <text x="300" y="266" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">而在影响力最大的因素上投入最少。</text>

  <!-- Legend labels -->
  <rect x="40" y="290" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="58" y="301" font-size="10" fill="#141413" font-family="ui-monospace, monospace">高投入 / 低权重（错配）</text>
  <rect x="200" y="290" width="12" height="12" rx="2" fill="#D1CFC5"/>
  <text x="218" y="301" font-size="10" fill="#141413" font-family="ui-monospace, monospace">低投入 / 高权重（盲区）</text>
  <line x1="380" y1="296" x2="400" y2="296" stroke="#D97757" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="408" y="301" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">倒置关系</text>
</svg>
