<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Agentic Engineering paradigm shift">
  <title>Agentic Engineering 范式转移：从 Vibe Coding 到智能体编排</title>
  <desc>从「用自然语言写代码」到「用自然语言编排智能体」的范式转移</desc>

  <defs>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97757"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#FAF9F5"/>

  <!-- Header -->
  <text x="400" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#141413">Software 3.0：意图驱动的智能体编排</text>
  <line x1="100" y1="48" x2="700" y2="48" stroke="#D1CFC5" stroke-width="1"/>

  <!-- LEFT: Vibe Coding -->
  <rect x="40" y="65" width="260" height="310" rx="10" fill="#E3DACC" stroke="#87867F" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="65" width="260" height="34" rx="10" fill="#87867F"/>
  <rect x="40" y="89" width="260" height="10" fill="#87867F"/>
  <text x="170" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">Vibe Coding (2024)</text>

  <text x="170" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#141413" font-style="italic">"The hottest new programming</text>
  <text x="170" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#141413" font-style="italic">language is English."</text>
  <text x="170" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">— Andrej Karpathy, 2024</text>
  <line x1="70" y1="162" x2="270" y2="162" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="55" y="183" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#141413">特点</text>
  <text x="55" y="200" font-family="Arial, sans-serif" font-size="10" fill="#141413">• 自然语言 = 编程语言</text>
  <text x="55" y="215" font-family="Arial, sans-serif" font-size="10" fill="#141413">• 描述氛围，AI 生成代码</text>
  <text x="55" y="230" font-family="Arial, sans-serif" font-size="10" fill="#141413">• 单次生成，交易完成</text>
  <text x="55" y="245" font-family="Arial, sans-serif" font-size="10" fill="#141413">• AI = 更好的代码生成器</text>
  <line x1="70" y1="258" x2="270" y2="258" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="55" y="278" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#D97757">局限性</text>
  <text x="55" y="295" font-family="Arial, sans-serif" font-size="10" fill="#D97757">✗ 不可维护（黑箱代码）</text>
  <text x="55" y="310" font-family="Arial, sans-serif" font-size="10" fill="#D97757">✗ 规模失控（无结构）</text>
  <text x="55" y="325" font-family="Arial, sans-serif" font-size="10" fill="#D97757">✗ 责任真空</text>
  <text x="55" y="340" font-family="Arial, sans-serif" font-size="10" fill="#D97757">✗ 判断力未被利用</text>

  <!-- CENTER: Arrow -->
  <text x="400" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#D97757">→</text>
  <rect x="330" y="225" width="140" height="30" rx="15" fill="#D97757"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">范式转移</text>

  <!-- RIGHT: Agentic Engineering -->
  <rect x="500" y="65" width="260" height="310" rx="10" fill="#E3DACC" stroke="#788C5D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="65" width="260" height="34" rx="10" fill="#788C5D"/>
  <rect x="500" y="89" width="260" height="10" fill="#788C5D"/>
  <text x="630" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">Agentic Engineering (2025+)</text>

  <text x="630" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#141413" font-style="italic">"用自然语言编排智能体"</text>
  <line x1="530" y1="133" x2="730" y2="133" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="515" y="154" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#141413">核心转变</text>
  <text x="515" y="171" font-family="Arial, sans-serif" font-size="10" fill="#141413">• AI = 具有自主能力的智能体</text>
  <text x="515" y="186" font-family="Arial, sans-serif" font-size="10" fill="#141413">• Prompt = 接口契约（类型/版本）</text>
  <text x="515" y="201" font-family="Arial, sans-serif" font-size="10" fill="#141413">• 持续交互（规划→执行→反馈）</text>
  <text x="515" y="216" font-family="Arial, sans-serif" font-size="10" fill="#141413">• 目标中心，而非代码中心</text>
  <text x="515" y="231" font-family="Arial, sans-serif" font-size="10" fill="#141413">• 多 Agent 协作治理</text>
  <line x1="530" y1="244" x2="730" y2="244" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="515" y="264" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#788C5D">Software 3.0 框架</text>
  <text x="515" y="281" font-family="Arial, sans-serif" font-size="10" fill="#141413">Software 1.0: 二进制代码</text>
  <text x="515" y="296" font-family="Arial, sans-serif" font-size="10" fill="#141413">  （确定、可解释、难编写）</text>
  <text x="515" y="311" font-family="Arial, sans-serif" font-size="10" fill="#141413">Software 2.0: 神经网络权重</text>
  <text x="515" y="326" font-family="Arial, sans-serif" font-size="10" fill="#141413">  （概率、黑箱、训练获得）</text>
  <text x="515" y="341" font-family="Arial, sans-serif" font-size="10" fill="#788C5D" font-weight="bold">Software 3.0: 智能体编排</text>
  <text x="515" y="356" font-family="Arial, sans-serif" font-size="10" fill="#141413">  （意图驱动、可验证、工程化管理）</text>

  <!-- Bottom: Core invariants -->
  <rect x="40" y="390" width="720" height="95" rx="8" fill="#141413" filter="url(#shadow)"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FAF9F5">核心不变量（跨技术代际不变）</text>
  <line x1="80" y1="420" x2="720" y2="420" stroke="#87867F" stroke-width="0.8"/>

  <!-- Four pillars -->
  <rect x="55" y="430" width="165" height="45" rx="6" fill="#E3DACC"/>
  <text x="137" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#141413">可验证性优先于生成</text>
  <text x="137" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">TDD 更加重要</text>

  <rect x="235" y="430" width="165" height="45" rx="6" fill="#E3DACC"/>
  <text x="317" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#141413">模块化是复杂度解药</text>
  <text x="317" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">良好架构设计</text>

  <rect x="415" y="430" width="165" height="45" rx="6" fill="#E3DACC"/>
  <text x="497" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#141413">人类在关键节点不可替代</text>
  <text x="497" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">最终责任/判断</text>

  <rect x="595" y="430" width="165" height="45" rx="6" fill="#E3DACC"/>
  <text x="677" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#141413">CI/CD 基础设施</text>
  <text x="677" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">构建/测试/部署/监控</text>

  <!-- Legend -->
  <rect x="40" y="492" width="10" height="10" rx="2" fill="#87867F"/>
  <text x="56" y="501" font-family="Arial, sans-serif" font-size="9" fill="#87867F">Vibe Coding</text>
  <rect x="130" y="492" width="10" height="10" rx="2" fill="#788C5D"/>
  <text x="146" y="501" font-family="Arial, sans-serif" font-size="9" fill="#87867F">Agentic Engineering</text>
  <text x="310" y="501" font-family="Arial, sans-serif" font-size="9" fill="#D97757">范式差异，非程度差异</text>
</svg>
