<svg xmlns="http://www.w3.org/2000/svg" aria-label="Agentic Engineering paradigm shift" viewBox="0 0 800 500"><title>Agentic Engineering 范式转移：从 Vibe Coding 到智能体编排</title><desc>从「用自然语言写代码」到「用自然语言编排智能体」的范式转移</desc><defs><filter id="shadow"><feDropShadow dx="2" dy="2" flood-color="#141413" flood-opacity=".1" stdDeviation="3"/></filter></defs><path fill="#faf9f5" d="M0 0h800v500H0z"/><text x="400" y="36" fill="#141413" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">Software 3.0：意图驱动的智能体编排</text><path stroke="#d1cfc5" d="M100 48h600"/><rect width="260" height="310" x="40" y="65" fill="#e3dacc" stroke="#87867f" stroke-width="1.5" filter="url(#shadow)" rx="10"/><rect width="260" height="34" x="40" y="65" fill="#87867f" rx="10"/><path fill="#87867f" d="M40 89h260v10H40z"/><text x="170" y="87" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Vibe Coding (2024)</text><text x="170" y="120" fill="#141413" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">&quot;The hottest new programming</text><text x="170" y="135" fill="#141413" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">language is English.&quot;</text><text x="170" y="152" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">— Andrej Karpathy, 2024</text><path stroke="#d1cfc5" stroke-width=".8" d="M70 162h200"/><text x="55" y="183" fill="#141413" font-family="Arial, sans-serif" font-size="11" font-weight="bold">特点</text><text x="55" y="200" fill="#141413" font-family="Arial, sans-serif" font-size="10">• 自然语言 = 编程语言</text><text x="55" y="215" fill="#141413" font-family="Arial, sans-serif" font-size="10">• 描述氛围，AI 生成代码</text><text x="55" y="230" fill="#141413" font-family="Arial, sans-serif" font-size="10">• 单次生成，交易完成</text><text x="55" y="245" fill="#141413" font-family="Arial, sans-serif" font-size="10">• AI = 更好的代码生成器</text><path stroke="#d1cfc5" stroke-width=".8" d="M70 258h200"/><text x="55" y="278" fill="#d97757" font-family="Arial, sans-serif" font-size="11" font-weight="bold">局限性</text><text x="55" y="295" fill="#d97757" font-family="Arial, sans-serif" font-size="10">✗ 不可维护（黑箱代码）</text><text x="55" y="310" fill="#d97757" font-family="Arial, sans-serif" font-size="10">✗ 规模失控（无结构）</text><text x="55" y="325" fill="#d97757" font-family="Arial, sans-serif" font-size="10">✗ 责任真空</text><text x="55" y="340" fill="#d97757" font-family="Arial, sans-serif" font-size="10">✗ 判断力未被利用</text><text x="400" y="210" fill="#d97757" font-family="Georgia, serif" font-size="36" text-anchor="middle">→</text><rect width="140" height="30" x="330" y="225" fill="#d97757" rx="15"/><text x="400" y="245" fill="#faf9f5" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">范式转移</text><rect width="260" height="310" x="500" y="65" fill="#e3dacc" stroke="#788c5d" stroke-width="2" filter="url(#shadow)" rx="10"/><rect width="260" height="34" x="500" y="65" fill="#788c5d" rx="10"/><path fill="#788c5d" d="M500 89h260v10H500z"/><text x="630" y="87" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Agentic Engineering (2025+)</text><text x="630" y="122" fill="#141413" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle">&quot;用自然语言编排智能体&quot;</text><path stroke="#d1cfc5" stroke-width=".8" d="M530 133h200"/><text x="515" y="154" fill="#141413" font-family="Arial, sans-serif" font-size="11" font-weight="bold">核心转变</text><text x="515" y="171" fill="#141413" font-family="Arial, sans-serif" font-size="10">• AI = 具有自主能力的智能体</text><text x="515" y="186" fill="#141413" font-family="Arial, sans-serif" font-size="10">• Prompt = 接口契约（类型/版本）</text><text x="515" y="201" fill="#141413" font-family="Arial, sans-serif" font-size="10">• 持续交互（规划→执行→反馈）</text><text x="515" y="216" fill="#141413" font-family="Arial, sans-serif" font-size="10">• 目标中心，而非代码中心</text><text x="515" y="231" fill="#141413" font-family="Arial, sans-serif" font-size="10">• 多 Agent 协作治理</text><path stroke="#d1cfc5" stroke-width=".8" d="M530 244h200"/><text x="515" y="264" fill="#788c5d" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Software 3.0 框架</text><text x="515" y="281" fill="#141413" font-family="Arial, sans-serif" font-size="10">Software 1.0: 二进制代码</text><text x="515" y="296" fill="#141413" font-family="Arial, sans-serif" font-size="10">  （确定、可解释、难编写）</text><text x="515" y="311" fill="#141413" font-family="Arial, sans-serif" font-size="10">Software 2.0: 神经网络权重</text><text x="515" y="326" fill="#141413" font-family="Arial, sans-serif" font-size="10">  （概率、黑箱、训练获得）</text><text x="515" y="341" fill="#788c5d" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Software 3.0: 智能体编排</text><text x="515" y="356" fill="#141413" font-family="Arial, sans-serif" font-size="10">  （意图驱动、可验证、工程化管理）</text><rect width="720" height="95" x="40" y="390" fill="#141413" filter="url(#shadow)" rx="8"/><text x="400" y="412" fill="#faf9f5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">核心不变量（跨技术代际不变）</text><path stroke="#87867f" stroke-width=".8" d="M80 420h640"/><rect width="165" height="45" x="55" y="430" fill="#e3dacc" rx="6"/><text x="137" y="448" fill="#141413" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">可验证性优先于生成</text><text x="137" y="464" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">TDD 更加重要</text><rect width="165" height="45" x="235" y="430" fill="#e3dacc" rx="6"/><text x="317" y="448" fill="#141413" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">模块化是复杂度解药</text><text x="317" y="464" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">良好架构设计</text><rect width="165" height="45" x="415" y="430" fill="#e3dacc" rx="6"/><text x="497" y="448" fill="#141413" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">人类在关键节点不可替代</text><text x="497" y="464" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">最终责任/判断</text><rect width="165" height="45" x="595" y="430" fill="#e3dacc" rx="6"/><text x="677" y="448" fill="#141413" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CI/CD 基础设施</text><text x="677" y="464" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">构建/测试/部署/监控</text><rect width="10" height="10" x="40" y="492" fill="#87867f" rx="2"/><text x="56" y="501" fill="#87867f" font-family="Arial, sans-serif" font-size="9">Vibe Coding</text><rect width="10" height="10" x="130" y="492" fill="#788c5d" rx="2"/><text x="146" y="501" fill="#87867f" font-family="Arial, sans-serif" font-size="9">Agentic Engineering</text><text x="310" y="501" fill="#d97757" font-family="Arial, sans-serif" font-size="9">范式差异，非程度差异</text></svg>