<svg viewBox="0 0 560 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Agent OS 五层架构 -->
  <!-- Blog colors: ivory #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5, g500 #87867F -->

  <rect width="560" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Agent OS 五层架构</text>
  <text x="280" y="38" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/31</text>

  <!-- Layer 5: Interface (top, warm) -->
  <rect x="40" y="52" width="480" height="52" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1.8"/>
  <text x="60" y="74" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L5</text>
  <text x="84" y="74" font-size="12" fill="#141413" font-weight="600">Interface Layer</text>
  <text x="84" y="90" font-size="10" fill="#87867F">用户交互层：自然语言接口、命令行、轻量 GUI</text>
  <text x="490" y="82" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">用户</text>

  <!-- Arrow down -->
  <line x1="280" y1="104" x2="280" y2="116" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,116 280,124 284,116" fill="#D1CFC5"/>

  <!-- Layer 4: Orchestration -->
  <rect x="40" y="124" width="480" height="52" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="60" y="146" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">L4</text>
  <text x="84" y="146" font-size="12" fill="#141413" font-weight="600">Orchestration Layer</text>
  <text x="84" y="162" font-size="10" fill="#87867F">编排层：多 Agent 协作、工作流管理、任务调度</text>
  <text x="490" y="154" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace">多 Agent</text>

  <!-- Arrow down -->
  <line x1="280" y1="176" x2="280" y2="188" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,188 280,196 284,188" fill="#D1CFC5"/>

  <!-- Layer 3: Agent Runtime -->
  <rect x="40" y="196" width="480" height="52" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="60" y="218" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L3</text>
  <text x="84" y="218" font-size="12" fill="#141413" font-weight="600">Agent Runtime Layer</text>
  <text x="84" y="234" font-size="10" fill="#87867F">运行时层：推理循环、工具调用、错误处理</text>
  <text x="490" y="226" font-size="9" fill="#2563EB" font-family="ui-monospace, monospace">推理+行动</text>

  <!-- Arrow down (L3 splits to L2 and L1) -->
  <line x1="280" y1="248" x2="280" y2="260" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,260 280,268 284,260" fill="#D1CFC5"/>

  <!-- Layer 2: Memory & State -->
  <rect x="40" y="268" width="220" height="52" rx="6" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="290" font-size="10" fill="#3B82F6" font-family="ui-monospace, monospace" font-weight="600">L2</text>
  <text x="84" y="290" font-size="12" fill="#141413" font-weight="600">Memory Layer</text>
  <text x="84" y="306" font-size="10" fill="#87867F">短期/长期记忆、知识图谱</text>

  <!-- Layer 1: Tools & Connectors (L1, right side) -->
  <rect x="300" y="268" width="220" height="52" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="320" y="290" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L1</text>
  <text x="344" y="290" font-size="12" fill="#141413" font-weight="600">Tools Layer</text>
  <text x="344" y="306" font-size="10" fill="#87867F">API 连接、数据读写、外部系统</text>

  <!-- L2 ↔ L1 bidirectional arrow -->
  <line x1="260" y1="294" x2="300" y2="294" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="264,290 258,294 264,298" fill="#D1CFC5"/>
  <polygon points="296,290 302,294 296,298" fill="#D1CFC5"/>

  <!-- Callout: data flow -->
  <rect x="40" y="330" width="480" height="22" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="344" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">数据流向：User → L5 → L4 → L3 → L2/L1；L2 ↔ L1 双向交互</text>
</svg>