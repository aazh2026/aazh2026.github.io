<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5, muted #87867F -->

  <!-- Background -->
  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="500" fill="#141413" letter-spacing="-0.02em">User Story Pack 核心概念</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">aazh2026 · 2025/04/28</text>

  <!-- Stage 1: Natural Language Story -->
  <rect x="30" y="70" width="170" height="140" rx="10" fill="#FFFFFF" stroke="#87867F" stroke-width="1.8"/>
  <rect x="30" y="70" width="170" height="32" rx="10" fill="#87867F"/>
  <rect x="30" y="88" width="170" height="14" fill="#87867F"/>
  <text x="115" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Stage 1</text>
  <text x="115" y="125" text-anchor="middle" font-size="12.5" fill="#141413">自然语言用户故事</text>
  <text x="115" y="145" text-anchor="middle" font-size="10.5" fill="#87867F">As a … I want …</text>
  <text x="115" y="165" text-anchor="middle" font-size="10.5" fill="#87867F">So that …</text>
  <text x="115" y="195" text-anchor="middle" font-size="10" fill="#87867F">给人读 · 自然语言</text>
  <!-- Pill tag -->
  <rect x="62" y="202" width="106" height="18" rx="9" fill="#E8E6DF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="115" y="215" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">无法自动验证</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="140" x2="245" y2="140" stroke="#D97757" stroke-width="2"/>
  <polygon points="245,135 237,143 237,137" fill="#D97757"/>
  <text x="222" y="132" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">手动解读</text>

  <!-- Stage 2: Structured Pack -->
  <rect x="250" y="70" width="180" height="140" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="250" y="70" width="180" height="32" rx="10" fill="#D97757"/>
  <rect x="250" y="88" width="180" height="14" fill="#D97757"/>
  <text x="340" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Stage 2</text>
  <text x="340" y="120" text-anchor="middle" font-size="12" fill="#141413">User Story Pack</text>
  <text x="340" y="138" text-anchor="middle" font-size="10" fill="#87867F">Story · Scenario · Example</text>
  <line x1="268" y1="150" x2="412" y2="150" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="165" text-anchor="middle" font-size="9.5" fill="#D97757">结构化 YAML / Gherkin</text>
  <text x="340" y="195" text-anchor="middle" font-size="10" fill="#87867F">机器可解析 · 业务可读</text>
  <!-- Pill tag -->
  <rect x="272" y="202" width="136" height="18" rx="9" fill="#F5DDD0" stroke="#D97757" stroke-width="1"/>
  <text x="340" y="215" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">三层结构化规格</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="140" x2="475" y2="140" stroke="#D97757" stroke-width="2"/>
  <polygon points="475,135 467,143 467,137" fill="#D97757"/>
  <text x="452" y="132" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">自动解析</text>

  <!-- Stage 3: Executable Test -->
  <rect x="480" y="70" width="170" height="140" rx="10" fill="#F0F5EC" stroke="#788C5D" stroke-width="2"/>
  <rect x="480" y="70" width="170" height="32" rx="10" fill="#788C5D"/>
  <rect x="480" y="88" width="170" height="14" fill="#788C5D"/>
  <text x="565" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Stage 3</text>
  <!-- Checkmark circle -->
  <circle cx="565" cy="135" r="22" fill="#788C5D"/>
  <polyline points="554,135 561,143 577,125" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="565" y="168" text-anchor="middle" font-size="12" fill="#141413">可执行测试</text>
  <text x="565" y="186" text-anchor="middle" font-size="10" fill="#788C5D">Given-When-Then</text>
  <text x="565" y="195" text-anchor="middle" font-size="10" fill="#87867F">Behave · Cucumber · pytest-bdd</text>
  <!-- Pill tag -->
  <rect x="512" y="202" width="106" height="18" rx="9" fill="#E3EDDA" stroke="#788C5D" stroke-width="1"/>
  <text x="565" y="215" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">验收即测试</text>

  <!-- Source line -->
  <line x1="30" y1="250" x2="650" y2="250" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="266" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">User Story Pack · Story → Scenario → Example → Test</text>
</svg>
