<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 800 500"><defs><style>.label,.label-sm{fill:#141413;font-size:13px;font-weight:600}.label-sm{font-size:11px;font-weight:500}.desc{fill:#87867f;font-size:11px}.desc-white{fill:rgba(255,255,255,.85);font-size:11px}.white{fill:#fff}</style></defs><path d="M0 0h800v500H0z" style="fill:#faf9f5"/><text x="40" y="38" style="fill:#141413;font-size:20px;font-weight:700">隐私合规成本曲线：越早发现，越低成本</text><text x="40" y="58" style="fill:#87867f;font-size:12px">合规问题发现阶段 vs 修复成本 — 需求阶段识别可节省 90% 以上</text><text x="40" y="90" class="label">各阶段发现合规问题的修复成本</text><text x="38" y="130" class="desc" text-anchor="end">$1M+</text><text x="38" y="210" class="desc" text-anchor="end">$500K</text><text x="38" y="290" class="desc" text-anchor="end">$100K</text><text x="38" y="370" class="desc" text-anchor="end">$50K</text><text x="38" y="420" class="desc" text-anchor="end">$10K</text><path stroke="#d1cfc5" stroke-dasharray="4,4" d="M50 127h330M50 207h330M50 287h330M50 367h330M50 417h330"/><rect width="50" height="4" x="70" y="413" fill="#788c5d" rx="2"/><text x="95" y="437" class="desc" text-anchor="middle">需求</text><text x="95" y="449" class="desc" text-anchor="middle">$1K</text><rect width="50" height="10" x="135" y="407" fill="#788c5d" rx="2"/><text x="160" y="437" class="desc" text-anchor="middle">设计</text><text x="160" y="449" class="desc" text-anchor="middle">$10K</text><rect width="50" height="40" x="200" y="377" fill="#e3dacc" rx="2"/><rect width="50" height="40" x="200" y="377" fill="none" stroke="#d1cfc5" rx="2"/><text x="225" y="437" class="desc" text-anchor="middle">开发</text><text x="225" y="449" class="desc" text-anchor="middle">$50K</text><rect width="50" height="120" x="265" y="297" fill="#e3dacc" rx="2"/><rect width="50" height="120" x="265" y="297" fill="none" stroke="#d1cfc5" rx="2"/><text x="290" y="437" class="desc" text-anchor="middle">测试</text><text x="290" y="449" class="desc" text-anchor="middle">$100K</text><rect width="50" height="220" x="330" y="197" fill="#d97757" rx="2"/><text x="355" y="437" class="desc" text-anchor="middle">上线前</text><text x="355" y="449" class="desc" text-anchor="middle">$500K+</text><path stroke="#d1cfc5" stroke-width="1.5" d="M50 422h330"/><path fill="none" stroke="#788c5d" stroke-dasharray="6,3" stroke-width="2" d="M90 410c30-50 210-110 265-190"/><text x="200" y="335" fill="#788c5d" class="label-sm">节省 90%+ 成本</text><path fill="#788c5d" d="m355 220-5 8h10z"/><text x="420" y="90" class="label">AI 驱动的合规左移</text><text x="420" y="106" class="desc">需求阶段 → 设计 → 开发 → 测试 → 上线（发现晚）</text><rect width="340" height="50" x="420" y="120" fill="#faf9f5" stroke="#d1cfc5" stroke-dasharray="4,3" rx="8"/><text x="436" y="140" class="desc">传统流程：上线前才做合规审查</text><text x="436" y="158" class="desc">→ 发现不合规，大规模返工</text><text x="590" y="188" font-size="18" style="fill:#d97757" text-anchor="middle">↓</text><rect width="340" height="200" x="420" y="196" fill="#e3dacc" rx="8"/><rect width="340" height="200" x="420" y="196" fill="none" stroke="#788c5d" stroke-width="2" rx="8"/><text x="436" y="218" class="label-sm" style="fill:#788c5d">AI 驱动的合规左移 ✦</text><text x="436" y="234" class="desc">需求文档 → AI 自动分析 → 早期预警</text><rect width="88" height="50" x="436" y="248" fill="#788c5d" rx="6"/><text x="480" y="270" class="label-sm white" text-anchor="middle">需求分析</text><text x="480" y="286" class="desc-white" text-anchor="middle">PRD → AI 提取</text><path stroke="#788c5d" stroke-width="1.5" marker-end="url(#arrowGreen)" d="M524 273h18"/><rect width="88" height="50" x="550" y="248" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="594" y="270" class="label-sm" text-anchor="middle">GDPR/个保法</text><text x="594" y="286" class="desc" text-anchor="middle">自动 Checklist</text><path stroke="#788c5d" stroke-width="1.5" d="M638 273h18"/><rect width="80" height="50" x="664" y="248" fill="#d97757" rx="6"/><text x="704" y="270" class="label-sm white" text-anchor="middle">风险报告</text><text x="704" y="286" class="desc-white" text-anchor="middle">高/中/低</text><rect width="308" height="76" x="436" y="308" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="450" y="328" class="label-sm">AI 识别的合规风险：</text><text x="450" y="344" class="desc">• RISK-001 敏感数据收集（身份证）→ HIGH</text><text x="450" y="358" class="desc">• RISK-002 数据跨境传输（美国）→ CRITICAL</text><text x="450" y="372" class="desc">• RISK-003 目的外使用（实名→营销）→ MEDIUM</text><text x="420" y="415" class="label">多法规支持</text><rect width="110" height="52" x="420" y="430" fill="#d97757" rx="6"/><text x="475" y="448" class="label-sm white" text-anchor="middle">GDPR</text><text x="475" y="462" class="desc-white" text-anchor="middle">欧盟 · 数据主体权</text><text x="475" y="476" class="desc-white" text-anchor="middle">DPO · 高额罚款</text><rect width="110" height="52" x="538" y="430" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="593" y="448" class="label-sm" text-anchor="middle">个保法</text><text x="593" y="462" class="desc" text-anchor="middle">中国 · 告知-同意</text><text x="593" y="476" class="desc" text-anchor="middle">数据本地化</text><rect width="104" height="52" x="656" y="430" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="708" y="448" class="label-sm" text-anchor="middle">CCPA</text><text x="708" y="462" class="desc" text-anchor="middle">加州 · 消费者权</text><text x="708" y="476" class="desc" text-anchor="middle">知情权、删除权</text><text x="40" y="490" class="desc">合规是设计出来的，不是检查出来的 — AI 让合规知识民主化</text><text x="700" y="490" class="desc">AI-Native 软件工程系列 #47</text><defs><marker id="arrowGreen" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#788c5d" d="M0 0v6l8-3z"/></marker></defs></svg>