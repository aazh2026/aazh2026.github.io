<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bg5" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f5"/>
      <stop offset="100%" style="stop-color:#e3dacc"/>
    </linearGradient>
    <filter id="shadow5" width="140%" height="140%" x="-20%" y="-20%">
      <feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg5)" rx="12"/>
  <text x="450" y="38" fill="#141413" font-size="20" font-weight="700" text-anchor="middle">AI 垃圾代码的典型症状</text>
  <text x="450" y="60" fill="#87867f" font-size="12" text-anchor="middle">资深开发者如何通过 cleanup 赚钱</text>
  <g filter="url(#shadow5)" transform="translate(40 85)">
    <rect width="260" height="160" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <rect width="260" height="32" fill="#d97757" rx="8" ry="0"/>
    <path fill="#d97757" d="M0 24h260v8H0z"/>
    <text x="130" y="21" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">症状 1: 过度工程化</text>
    <text x="15" y="55" fill="#141413" font-size="10">AI 生成 50 行</text>
    <text x="15" y="70" fill="#141413" font-size="10">实际只需要 3 行</text>
    <text x="15" y="90" fill="#87867f" font-size="10">引入不必要的依赖：</text>
    <text x="15" y="105" fill="#87867f" font-size="10">Redis、Metrics、Logger</text>
    <text x="15" y="120" fill="#87867f" font-size="10">难以测试，难以维护</text>
    <text x="15" y="145" fill="#788c5d" font-size="10" font-weight="600">修复：简化为一行 db.query()</text>
  </g>
  <g filter="url(#shadow5)" transform="translate(320 85)">
    <rect width="260" height="160" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <rect width="260" height="32" fill="#d97757" rx="8" ry="0"/>
    <path fill="#d97757" d="M0 24h260v8H0z"/>
    <text x="130" y="21" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">症状 2: 并发问题</text>
    <text x="15" y="55" fill="#141413" font-size="10">AI 不理解并发</text>
    <text x="15" y="70" fill="#141413" font-size="10">竞态条件普遍存在</text>
    <text x="15" y="90" fill="#d97757" font-size="10">if (stock &gt; 0) {</text>
    <text x="15" y="103" fill="#d97757" font-size="10">  stock -= 1;  // 两个请求</text>
    <text x="15" y="116" fill="#d97757" font-size="10">  // 同时通过检查！</text>
    <text x="15" y="145" fill="#788c5d" font-size="10" font-weight="600">修复：数据库事务锁</text>
  </g>
  <g filter="url(#shadow5)" transform="translate(600 85)">
    <rect width="260" height="160" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
    <rect width="260" height="32" fill="#d97757" rx="8" ry="0"/>
    <path fill="#d97757" d="M0 24h260v8H0z"/>
    <text x="130" y="21" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">症状 3: N+1 查询</text>
    <text x="15" y="55" fill="#141413" font-size="10">循环内查询数据库</text>
    <text x="15" y="70" fill="#d97757" font-size="10">for user in users:</text>
    <text x="15" y="83" fill="#d97757" font-size="10">  orders = db.query...</text>
    <text x="15" y="101" fill="#87867f" font-size="10">100 个用户 = 101 次查询</text>
    <text x="15" y="116" fill="#87867f" font-size="10">数据库 CPU 持续 90%+</text>
    <text x="15" y="145" fill="#788c5d" font-size="10" font-weight="600">修复：JOIN 或 eager loading</text>
  </g>
  <g filter="url(#shadow5)" transform="translate(40 265)">
    <rect width="820" height="135" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <text x="20" y="30" fill="#141413" font-size="14" font-weight="700">Cleanup 经济学</text>
    <rect width="180" height="80" x="20" y="45" fill="#d97757" fill-opacity=".08" rx="4"/>
    <text x="110" y="62" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">AI + 初级开发者</text>
    <text x="110" y="80" fill="#141413" font-size="10" text-anchor="middle">$50K/月</text>
    <text x="110" y="98" fill="#87867f" font-size="10" text-anchor="middle">快速生成，慢速修复</text>
    <text x="110" y="113" fill="#d97757" font-size="10" text-anchor="middle">最终账单：$750K+</text>
    <text x="215" y="90" fill="#87867f" font-size="20" font-weight="300">+</text>
    <rect width="180" height="80" x="235" y="45" fill="#788c5d" fill-opacity=".1" rx="4"/>
    <text x="325" y="62" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">资深开发者 Cleanup</text>
    <text x="325" y="80" fill="#141413" font-size="10" text-anchor="middle">$300-500/小时</text>
    <text x="325" y="98" fill="#87867f" font-size="10" text-anchor="middle">架构诊断、重构、性能调优</text>
    <text x="325" y="113" fill="#788c5d" font-size="10" text-anchor="middle">项目制 $50K-200K</text>
    <text x="430" y="90" fill="#87867f" font-size="20" font-weight="300">VS</text>
    <rect width="220" height="80" x="455" y="45" fill="#141413" fill-opacity=".05" rx="4"/>
    <text x="565" y="62" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">一开始就做对</text>
    <text x="565" y="80" fill="#141413" font-size="10" text-anchor="middle">资深开发者 + AI 辅助</text>
    <text x="565" y="98" fill="#87867f" font-size="10" text-anchor="middle">$80K/月 × 6 = $480K</text>
    <text x="565" y="113" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">质量达标，无需 cleanup</text>
    <rect width="145" height="80" x="695" y="45" fill="#788c5d" fill-opacity=".15" rx="4"/>
    <text x="767" y="62" fill="#788c5d" font-size="11" font-weight="700" text-anchor="middle">真实 ROI</text>
    <text x="767" y="82" fill="#141413" font-size="10" text-anchor="middle">页面加载 8s→0.5s</text>
    <text x="767" y="98" fill="#141413" font-size="10" text-anchor="middle">转化率 +40%</text>
    <text x="767" y="113" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">客户挽回 $2M+ ARR</text>
  </g>
  <text x="450" y="405" fill="#87867f" font-size="10" text-anchor="middle">AI 降低了写出能跑代码的门槛，但提高了写出好代码的门槛 — 为修复问题的人创造巨大机会</text>
</svg>
