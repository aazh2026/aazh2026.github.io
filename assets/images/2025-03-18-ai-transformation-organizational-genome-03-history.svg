<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>三次技术革命的演进模式</title>
  <desc>工厂制、福特流水线、丰田生产方式三次技术革命，都遵循"技术先行→组织滞后→重构突破"模式，AI转型正在重演</desc>

  <!-- Background -->
  <rect width="600" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">三次技术革命的演进模式</text>
  <text x="300" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">技术先行 → 组织重构 → 突破</text>

  <!-- Arrow flow line at top -->
  <line x1="60" y1="62" x2="540" y2="62" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="540,57 550,62 540,67" fill="#D1CFC5"/>
  <text x="300" y="58" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">技术先行</text>
  <text x="480" y="78" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">组织重构</text>

  <!-- Stage 1: 工厂制 -->
  <rect x="40" y="80" width="160" height="160" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="80" width="160" height="32" rx="10" fill="#D97757"/>
  <rect x="40" y="100" width="160" height="12" fill="#D97757"/>
  <text x="120" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">01 · 工厂制</text>
  <text x="120" y="130" text-anchor="middle" font-size="12" fill="#141413">18世纪 · 英国纺织业</text>
  <line x1="60" y1="140" x2="180" y2="140" stroke="#D1CFC5" stroke-width="1"/>
  <text x="120" y="156" text-anchor="middle" font-size="10" fill="#141413">珍妮纺纱机</text>
  <text x="120" y="172" text-anchor="middle" font-size="10" fill="#141413">水力纺纱机</text>
  <line x1="60" y1="184" x2="180" y2="184" stroke="#D1CFC5" stroke-width="1"/>
  <text x="120" y="200" text-anchor="middle" font-size="10" fill="#87867F">工厂集中 +</text>
  <text x="120" y="216" text-anchor="middle" font-size="10" fill="#87867F">标准化流程</text>
  <text x="120" y="232" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">→ 组织滞后约20年</text>

  <!-- Stage 2: 福特制 -->
  <rect x="220" y="80" width="160" height="160" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="220" y="80" width="160" height="32" rx="10" fill="#D97757"/>
  <rect x="220" y="100" width="160" height="12" fill="#D97757"/>
  <text x="300" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">02 · 福特流水线</text>
  <text x="300" y="130" text-anchor="middle" font-size="12" fill="#141413">20世纪初 · 美国汽车</text>
  <line x1="240" y1="140" x2="360" y2="140" stroke="#D1CFC5" stroke-width="1"/>
  <text x="300" y="156" text-anchor="middle" font-size="10" fill="#141413">装配流水线</text>
  <text x="300" y="172" text-anchor="middle" font-size="10" fill="#141413">专用机床</text>
  <line x1="240" y1="184" x2="360" y2="184" stroke="#D1CFC5" stroke-width="1"/>
  <text x="300" y="200" text-anchor="middle" font-size="10" fill="#87867F">分工细化 +</text>
  <text x="300" y="216" text-anchor="middle" font-size="10" fill="#87867F">绩效管理革命</text>
  <text x="300" y="232" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">→ 物理+组织双重革命</text>

  <!-- Stage 3: 丰田 -->
  <rect x="400" y="80" width="160" height="160" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="400" y="80" width="160" height="32" rx="10" fill="#788C5D"/>
  <rect x="400" y="100" width="160" height="12" fill="#788C5D"/>
  <text x="480" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">03 · 丰田生产方式</text>
  <text x="480" y="130" text-anchor="middle" font-size="12" fill="#141413">1980年代 · 日本汽车</text>
  <line x1="420" y1="140" x2="540" y2="140" stroke="#788C5D" stroke-width="1"/>
  <text x="480" y="156" text-anchor="middle" font-size="10" fill="#141413">看板管理</text>
  <text x="480" y="172" text-anchor="middle" font-size="10" fill="#141413">持续改善</text>
  <line x1="420" y1="184" x2="540" y2="184" stroke="#788C5D" stroke-width="1"/>
  <text x="480" y="200" text-anchor="middle" font-size="10" fill="#87867F">工人变改进主体</text>
  <text x="480" y="216" text-anchor="middle" font-size="10" fill="#87867F">质量成为共同责任</text>
  <text x="480" y="232" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">→ 组织基因全面重构</text>

  <!-- Connecting arrows between stages -->
  <line x1="200" y1="160" x2="218" y2="160" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="218,155 228,160 218,165" fill="#D97757"/>
  <line x1="380" y1="160" x2="398" y2="160" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="398,155 408,160 398,165" fill="#D97757"/>

  <!-- Breakthrough label -->
  <rect x="40" y="250" width="520" height="36" rx="8" fill="#D97757" opacity="0.1" stroke="#D97757" stroke-width="1.5"/>
  <text x="300" y="272" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">突破：组织形式跟上技术能力之后</text>

  <!-- AI转型 stage -->
  <rect x="40" y="298" width="520" height="76" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">04 · AI转型 (今)</text>
  <text x="300" y="340" text-anchor="middle" font-size="10" fill="#141413">LLM / 生成式AI / Agent系统</text>
  <text x="300" y="358" text-anchor="middle" font-size="10" fill="#141413">决策模式重构 · 协作结构重塑 · 学习机制重建</text>

  <!-- Label for dashed box -->
  <text x="300" y="385" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">与前三次技术革命遵循相同模式 — 正在等待组织重构的突破</text>
</svg>
