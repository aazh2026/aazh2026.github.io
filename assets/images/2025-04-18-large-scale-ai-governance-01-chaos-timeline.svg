<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="640" height="200" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">200人团队的AI混乱时间线</text>
  <text x="320" y="38" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/04/18</text>

  <!-- Timeline baseline -->
  <line x1="60" y1="130" x2="580" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Month 1: 自由探索期 (olive) -->
  <circle cx="120" cy="130" r="12" fill="#788C5D" stroke="#FAF9F5" stroke-width="2"/>
  <text x="120" y="134" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">1</text>
  <rect x="70" y="80" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="120" y="97" text-anchor="middle" font-size="11" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">Month 1</text>
  <text x="120" y="112" text-anchor="middle" font-size="10" fill="#141413">自由探索期</text>
  <text x="120" y="148" text-anchor="middle" font-size="9" fill="#87867F">工具爆发</text>

  <!-- Arrow 1→2 -->
  <line x1="132" y1="130" x2="188" y2="130" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="192,130 184,126 184,134" fill="#D1CFC5"/>

  <!-- Month 2: 代码风格爆炸 (clay) -->
  <circle cx="230" cy="130" r="12" fill="#D97757" stroke="#FAF9F5" stroke-width="2"/>
  <text x="230" y="134" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">2</text>
  <rect x="180" y="80" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="230" y="97" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Month 2</text>
  <text x="230" y="112" text-anchor="middle" font-size="10" fill="#141413">代码风格爆炸</text>
  <text x="230" y="148" text-anchor="middle" font-size="9" fill="#87867F">30种编码风格</text>

  <!-- Arrow 2→3 -->
  <line x1="242" y1="130" x2="298" y2="130" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="302,130 294,126 294,134" fill="#D1CFC5"/>

  <!-- Month 3: 溯源困难 (clay) -->
  <circle cx="350" cy="130" r="12" fill="#D97757" stroke="#FAF9F5" stroke-width="2"/>
  <text x="350" y="134" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">3</text>
  <rect x="300" y="80" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="350" y="97" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Month 3</text>
  <text x="350" y="112" text-anchor="middle" font-size="10" fill="#141413">溯源困难</text>
  <text x="350" y="148" text-anchor="middle" font-size="9" fill="#87867F">代码来源不明</text>

  <!-- Arrow 3→4 -->
  <line x1="362" y1="130" x2="418" y2="130" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="422,130 414,126 414,134" fill="#D1CFC5"/>

  <!-- Month 4: 技术债务爆炸 (dark red) -->
  <circle cx="470" cy="130" r="12" fill="#9B2C2C" stroke="#FAF9F5" stroke-width="2"/>
  <text x="470" y="134" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">4</text>
  <rect x="420" y="80" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#9B2C2C" stroke-width="1.5"/>
  <text x="470" y="97" text-anchor="middle" font-size="11" fill="#9B2C2C" font-family="ui-monospace, monospace" font-weight="600">Month 4</text>
  <text x="470" y="112" text-anchor="middle" font-size="10" fill="#141413">技术债务爆炸</text>
  <text x="470" y="148" text-anchor="middle" font-size="9" fill="#87867F">系统稳定性下降</text>

  <!-- Escalation arrow overlay -->
  <path d="M 60 170 Q 320 155, 580 170" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="320" y="165" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" opacity="0.7">混乱升级</text>

  <!-- Source line -->
  <text x="320" y="188" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">场景：200人微服务团队 · 2025 Q2</text>
</svg>
