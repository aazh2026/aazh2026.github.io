<svg xmlns="http://www.w3.org/2000/svg" aria-label="Quality Control System" viewBox="0 0 448.5 364">
  <path fill="#faf9f5" d="M0 0h448.5v364H0z"/>
  <rect width="448.5" height="364" fill="#d1cfc5" opacity=".15" rx="8"/>
  <text xml:space="preserve" x="20" y="33.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">┌─────────────────────────────────────────┐</text>
  <text xml:space="preserve" x="20" y="51.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│      Quality Control System             │</text>
  <text xml:space="preserve" x="20" y="69.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">├─────────────────────────────────────────┤</text>
  <text xml:space="preserve" x="20" y="87.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  Layer 1: Automated Validation          │</text>
  <text xml:space="preserve" x="20" y="105.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 规则检查（格式、范围、必填）           │</text>
  <text xml:space="preserve" x="20" y="123.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 交叉验证（属性间一致性）               │</text>
  <text xml:space="preserve" x="20" y="141.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 异常检测（统计离群值）                 │</text>
  <text xml:space="preserve" x="20" y="159.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">├─────────────────────────────────────────┤</text>
  <text xml:space="preserve" x="20" y="177.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  Layer 2: AI Verification               │</text>
  <text xml:space="preserve" x="20" y="195.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 自我一致性检查                        │</text>
  <text xml:space="preserve" x="20" y="213.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 与竞品对比                            │</text>
  <text xml:space="preserve" x="20" y="231.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 置信度评分                            │</text>
  <text xml:space="preserve" x="20" y="249.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">├─────────────────────────────────────────┤</text>
  <text xml:space="preserve" x="20" y="267.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  Layer 3: Human Review                  │</text>
  <text xml:space="preserve" x="20" y="285.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 抽样审核                              │</text>
  <text xml:space="preserve" x="20" y="303.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 异常标记审核                          │</text>
  <text xml:space="preserve" x="20" y="321.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  - 反馈闭环                              │</text>
  <text xml:space="preserve" x="20" y="339.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">└─────────────────────────────────────────┘</text>
</svg>
