<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="Strangler Fig Pattern Evolution Diagram">
  <title>Strangler Fig Pattern - 渐进式演进</title>
  <desc>展示了从单体架构到微服务架构的 Strangler Fig 迁移模式：初始状态、第一步、第二步和最终状态</desc>

  <defs>
    <!-- Box styles -->
    <linearGradient id="boxGradClient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#C0624A"/>
    </linearGradient>
    <linearGradient id="boxGradGateway" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#5E7350"/>
    </linearGradient>
    <linearGradient id="boxGradMonolith" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D1CFC5"/>
      <stop offset="100%" stop-color="#B8B5AC"/>
    </linearGradient>
    <linearGradient id="boxGradService" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3DACC"/>
      <stop offset="100%" stop-color="#D4C9B8"/>
    </linearGradient>
    <linearGradient id="boxGradShrinking" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3DACC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4C9B8" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#87867F"/>
    </marker>

    <!-- Dashed line -->
    <marker id="arrowDash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#87867F"/>
    </marker>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="#FAF9F5"/>

  <!-- ========== 初始状态 ========== -->
  <g id="stage-initial">
    <!-- Stage label -->
    <text x="90" y="30" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#141413" text-anchor="middle">初始状态</text>

    <!-- Client box -->
    <rect x="30" y="45" width="80" height="36" rx="4" fill="url(#boxGradClient)" filter="url(#shadow)"/>
    <text x="70" y="68" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Client</text>

    <!-- Arrow right -->
    <line x1="115" y1="63" x2="145" y2="63" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Monolith box -->
    <rect x="150" y="45" width="100" height="36" rx="4" fill="url(#boxGradMonolith)" filter="url(#shadow)"/>
    <text x="200" y="68" font-family="Georgia, serif" font-size="12" fill="#141413" text-anchor="middle">Monolith</text>
  </g>

  <!-- ========== 第一步 ========== -->
  <g id="stage-step1">
    <!-- Stage label -->
    <text x="270" y="30" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#141413" text-anchor="middle">第一步</text>

    <!-- Client box -->
    <rect x="190" y="100" width="80" height="36" rx="4" fill="url(#boxGradClient)" filter="url(#shadow)"/>
    <text x="230" y="123" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Client</text>

    <!-- Arrow right to Gateway -->
    <line x1="275" y1="118" x2="305" y2="118" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Gateway box -->
    <rect x="310" y="100" width="80" height="36" rx="4" fill="url(#boxGradGateway)" filter="url(#shadow)"/>
    <text x="350" y="123" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Gateway</text>

    <!-- Arrow down-right to Monolith -->
    <line x1="355" y1="136" x2="405" y2="165" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Monolith box -->
    <rect x="410" y="165" width="100" height="36" rx="4" fill="url(#boxGradMonolith)" filter="url(#shadow)"/>
    <text x="460" y="188" font-family="Georgia, serif" font-size="12" fill="#141413" text-anchor="middle">Monolith</text>

    <!-- Arrow down to New Service A -->
    <line x1="460" y1="201" x2="460" y2="231" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- New Service A box -->
    <rect x="410" y="236" width="100" height="36" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="460" y="259" font-family="Georgia, serif" font-size="12" fill="#141413" text-anchor="middle">Service A</text>

    <!-- Label for New Service -->
    <text x="460" y="288" font-family="Georgia, serif" font-size="10" fill="#788C5D" text-anchor="middle">New</text>
  </g>

  <!-- ========== 第二步 ========== -->
  <g id="stage-step2">
    <!-- Stage label -->
    <text x="90" y="215" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#141413" text-anchor="middle">第二步</text>

    <!-- Client box -->
    <rect x="30" y="285" width="80" height="36" rx="4" fill="url(#boxGradClient)" filter="url(#shadow)"/>
    <text x="70" y="308" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Client</text>

    <!-- Arrow right to Gateway -->
    <line x1="115" y1="303" x2="145" y2="303" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Gateway box -->
    <rect x="150" y="285" width="80" height="36" rx="4" fill="url(#boxGradGateway)" filter="url(#shadow)"/>
    <text x="190" y="308" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Gateway</text>

    <!-- Arrow down to Monolith (shrinking) -->
    <line x1="195" y1="321" x2="215" y2="345" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Monolith (shrinking) box - dashed border to indicate shrinking -->
    <rect x="220" y="345" width="70" height="30" rx="4" fill="url(#boxGradShrinking)" stroke="#D97757" stroke-width="2" stroke-dasharray="4,2" filter="url(#shadow)"/>
    <text x="255" y="365" font-family="Georgia, serif" font-size="11" fill="#87867F" text-anchor="middle">Monolith</text>

    <!-- Arrow down to Service A -->
    <line x1="190" y1="321" x2="190" y2="345" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Service A box -->
    <rect x="145" y="350" width="90" height="30" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="190" y="369" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle">Service A</text>

    <!-- Service B box -->
    <rect x="245" y="350" width="90" height="30" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="290" y="369" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle">Service B</text>
  </g>

  <!-- ========== 最终状态 ========== -->
  <g id="stage-final">
    <!-- Stage label -->
    <text x="570" y="30" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#141413" text-anchor="middle">最终状态</text>

    <!-- Client box -->
    <rect x="505" y="50" width="80" height="36" rx="4" fill="url(#boxGradClient)" filter="url(#shadow)"/>
    <text x="545" y="73" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Client</text>

    <!-- Arrow right to Gateway -->
    <line x1="590" y1="68" x2="610" y2="68" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Gateway box -->
    <rect x="615" y="50" width="80" height="36" rx="4" fill="url(#boxGradGateway)" filter="url(#shadow)"/>
    <text x="655" y="73" font-family="Georgia, serif" font-size="12" fill="#FAF9F5" text-anchor="middle">Gateway</text>

    <!-- Vertical line down from Gateway -->
    <line x1="655" y1="86" x2="655" y2="120" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Branch lines to services -->
    <line x1="655" y1="120" x2="535" y2="120" stroke="#87867F" stroke-width="1.5"/>
    <line x1="535" y1="120" x2="535" y2="135" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>
    <line x1="655" y1="120" x2="775" y2="120" stroke="#87867F" stroke-width="1.5"/>
    <line x1="775" y1="120" x2="775" y2="135" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrowHead)"/>

    <!-- Service A box -->
    <rect x="490" y="140" width="90" height="30" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="535" y="159" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle">Service A</text>

    <!-- Service B box -->
    <rect x="590" y="140" width="90" height="30" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="635" y="159" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle">Service B</text>

    <!-- Service C box -->
    <rect x="510" y="180" width="90" height="30" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="555" y="199" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle">Service C</text>

    <!-- Service D box -->
    <rect x="610" y="180" width="90" height="30" rx="4" fill="url(#boxGradService)" filter="url(#shadow)"/>
    <text x="655" y="199" font-family="Georgia, serif" font-size="11" fill="#141413" text-anchor="middle">Service D</text>
  </g>

  <!-- Horizontal separator lines -->
  <line x1="15" y1="90" x2="705" y2="90" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="15" y1="245" x2="705" y2="245" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Vertical section dividers -->
  <line x1="155" y1="15" x2="155" y2="395" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="405" y1="15" x2="405" y2="395" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

</svg>