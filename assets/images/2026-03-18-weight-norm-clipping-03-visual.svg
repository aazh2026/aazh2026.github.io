<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 360"><title>Weight Norm Clipping 可视化：记忆阶段 vs 泛化阶段</title><desc>两张折线图对比展示权重范数在有无裁剪情况下的变化轨迹</desc><path fill="#faf9f5" d="M0 0h680v360H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Weight Norm Clipping：记忆阶段 vs 泛化阶段</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">权重范数变化轨迹对比</text><rect width="280" height="230" x="40" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="180" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">无裁剪（记忆阶段）</text><path stroke="#d1cfc5" stroke-width="1.5" d="M70 100v150"/><text x="58" y="175" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" transform="rotate(-90 58 175)">权重范数</text><path stroke="#d1cfc5" stroke-width="1.5" d="M70 250h220"/><text x="180" y="268" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">训练步数</text><text x="62" y="108" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="end">高</text><text x="62" y="250" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="end">低</text><text x="70" y="260" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">0</text><text x="180" y="260" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">50K</text><text x="290" y="260" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">100K</text><path fill="none" stroke="#d97757" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="m70 248 25-13 25-17 25-23 25-30 25-30 25-27 25-18 25-12 20-6"/><text x="240" y="62" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">记忆阶段</text><text x="240" y="73" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">权重范数持续攀升</text><path stroke="#d97757" stroke-dasharray="3,2" d="m258 90-20 5"/><path fill="#d97757" d="m238 95 6-4 2 8z"/><rect width="280" height="230" x="360" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="500" y="82" fill="#788c5d" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">有裁剪（泛化阶段）</text><path stroke="#d1cfc5" stroke-width="1.5" d="M390 100v150"/><text x="378" y="175" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" transform="rotate(-90 378 175)">权重范数</text><path stroke="#d1cfc5" stroke-width="1.5" d="M390 250h220"/><text x="500" y="268" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">训练步数</text><text x="382" y="108" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="end">高</text><text x="382" y="250" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="end">低</text><text x="390" y="260" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">0</text><text x="500" y="260" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">50K</text><text x="610" y="260" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">100K</text><path stroke="#d97757" stroke-dasharray="6,4" stroke-width="1.5" d="M390 165h220"/><text x="616" y="168" fill="#d97757" font-family="ui-monospace, monospace" font-size="8.5">max_norm</text><path fill="none" stroke="#788c5d" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="m390 248 25-20 25-30 25-30h0l25-1 25-1h25l25-1h45"/><rect width="130" height="16" x="460" y="158" fill="#f0eee6" stroke="#d1cfc5" rx="4"/><text x="525" y="169" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">稳定在阈值以下</text><text x="500" y="62" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">泛化阶段</text><text x="500" y="73" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">权重范数受限于 max_norm</text><path stroke="#788c5d" stroke-dasharray="3,2" d="M530 155v-7"/><path fill="#788c5d" d="m526 148 4-6 4 6z"/><path stroke="#d1cfc5" stroke-width="1.5" d="M320 175h35"/><path fill="#d1cfc5" d="m355 171-7 4 7 4z"/><text x="338" y="168" fill="#87867f" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">+ WNC</text><rect width="600" height="38" x="40" y="305" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><rect width="10" height="10" x="56" y="318" fill="#d97757" rx="2"/><text x="72" y="328" fill="#141413" font-family="ui-monospace, monospace" font-size="9">无裁剪：权重范数无界增长</text><rect width="10" height="10" x="260" y="318" fill="#788c5d" rx="2"/><text x="276" y="328" fill="#141413" font-family="ui-monospace, monospace" font-size="9">有裁剪：稳定在 max_norm 阈值</text><path stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M420 318h16"/><text x="442" y="328" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">max_norm 裁剪边界</text></svg>