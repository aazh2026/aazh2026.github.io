<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="700" height="280" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Codebase Intelligence 五大核心能力</text>
  <text x="350" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">能力总览 · 2025/04/08</text>

  <!-- Row 1: 2 cards -->
  <!-- Card 1: Semantic Code Search -->
  <rect x="30" y="58" width="200" height="90" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="30" y="58" width="200" height="26" rx="8" ry="8" fill="#D97757"/>
  <rect x="30" y="74" width="200" height="10" fill="#D97757"/>
  <text x="40" y="76" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">能力 1</text>
  <text x="40" y="100" font-size="13" fill="#141413">Semantic Code Search</text>
  <text x="40" y="117" font-size="11" fill="#141413">语义代码搜索</text>
  <text x="40" y="135" font-size="10" fill="#87867F">基于意图的语义理解</text>

  <!-- Card 2: Architecture Mapping -->
  <rect x="250" y="58" width="200" height="90" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="250" y="58" width="200" height="26" rx="8" ry="8" fill="#D97757"/>
  <rect x="250" y="74" width="200" height="10" fill="#D97757"/>
  <text x="260" y="76" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">能力 2</text>
  <text x="260" y="100" font-size="13" fill="#141413">Architecture Mapping</text>
  <text x="260" y="117" font-size="11" fill="#141413">架构映射</text>
  <text x="260" y="135" font-size="10" fill="#87867F">自动生成服务依赖图</text>

  <!-- Row 2: 3 cards centered -->
  <!-- Card 3: Business Logic Discovery -->
  <rect x="100" y="160" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="100" y="160" width="150" height="26" rx="8" ry="8" fill="#788C5D"/>
  <rect x="100" y="176" width="150" height="10" fill="#788C5D"/>
  <text x="110" y="178" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">能力 3</text>
  <text x="110" y="202" font-size="12" fill="#141413">Business Logic</text>
  <text x="110" y="216" font-size="12" fill="#141413">业务逻辑发现</text>
  <text x="110" y="236" font-size="10" fill="#87867F">AI自动识别业务规则</text>

  <!-- Card 4: Impact Analysis -->
  <rect x="275" y="160" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="275" y="160" width="150" height="26" rx="8" ry="8" fill="#788C5D"/>
  <rect x="275" y="176" width="150" height="10" fill="#788C5D"/>
  <text x="285" y="178" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">能力 4</text>
  <text x="285" y="202" font-size="12" fill="#141413">Impact Analysis</text>
  <text x="285" y="216" font-size="12" fill="#141413">影响分析</text>
  <text x="285" y="236" font-size="10" fill="#87867F">修改代码前的风险评估</text>

  <!-- Card 5: System Reasoning -->
  <rect x="450" y="160" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="450" y="160" width="150" height="26" rx="8" ry="8" fill="#788C5D"/>
  <rect x="450" y="176" width="150" height="10" fill="#788C5D"/>
  <text x="460" y="178" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">能力 5</text>
  <text x="460" y="202" font-size="12" fill="#141413">System Reasoning</text>
  <text x="460" y="216" font-size="12" fill="#141413">系统推理</text>
  <text x="460" y="236" font-size="10" fill="#87867F">复杂问题的因果推理</text>

  <!-- Bottom note -->
  <text x="350" y="268" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">基于五层架构模型 · Codebase Intelligence System</text>

  <!-- Accessibility -->
  <title>Codebase Intelligence 五大核心能力总览图</title>
  <desc>展示五大核心能力的卡片布局：语义代码搜索、架构映射、业务逻辑发现、影响分析、系统推理</desc>
</svg>