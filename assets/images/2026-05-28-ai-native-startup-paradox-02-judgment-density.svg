<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">执行瓶颈 → 判断瓶颈</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">AI 改变了创始人时间的结构</text>

  <!-- Left panel: Before AI -->
  <rect x="40" y="68" width="270" height="220" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="68" width="270" height="36" rx="10" fill="#D1CFC5"/>
  <rect x="40" y="90" width="270" height="14" fill="#D1CFC5"/>
  <text x="175" y="91" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Before AI</text>
  <text x="175" y="110" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">执行瓶颈时代</text>

  <!-- Clock icon (simplified) -->
  <circle cx="175" cy="155" r="26" fill="none" stroke="#D1CFC5" stroke-width="2"/>
  <line x1="175" y1="155" x2="175" y2="138" stroke="#D1CFC5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="175" y1="155" x2="188" y2="162" stroke="#D1CFC5" stroke-width="2" stroke-linecap="round"/>
  <text x="175" y="195" text-anchor="middle" font-size="12" fill="#141413">时间 = 执行瓶颈</text>

  <!-- Person coding icon -->
  <rect x="158" y="205" width="34" height="28" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <rect x="162" y="209" width="26" height="3" rx="1" fill="#D1CFC5"/>
  <rect x="162" y="214" width="20" height="3" rx="1" fill="#D1CFC5"/>
  <rect x="162" y="219" width="24" height="3" rx="1" fill="#D1CFC5"/>
  <text x="175" y="252" text-anchor="middle" font-size="10" fill="#87867F">大量时间投入执行</text>
  <text x="175" y="268" text-anchor="middle" font-size="10" fill="#87867F">判断力随经验积累</text>

  <!-- Center arrow -->
  <line x1="310" y1="178" x2="370" y2="178" stroke="#788C5D" stroke-width="2.5"/>
  <polygon points="370,178 360,172 360,184" fill="#788C5D"/>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">AI</text>
  <text x="340" y="196" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">接管执行</text>

  <!-- Right panel: After AI -->
  <rect x="370" y="68" width="270" height="220" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="370" y="68" width="270" height="36" rx="10" fill="#D97757"/>
  <rect x="370" y="90" width="270" height="14" fill="#D97757"/>
  <text x="505" y="91" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">After AI</text>
  <text x="505" y="110" text-anchor="middle" font-size="10" fill="#F5C4B8" font-family="ui-monospace, monospace">判断瓶颈时代</text>

  <!-- Decision nodes (branching tree) -->
  <!-- Root node -->
  <circle cx="505" cy="148" r="14" fill="#D97757"/>
  <text x="505" y="152" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">决策</text>

  <!-- Branch lines -->
  <line x1="491" y1="158" x2="455" y2="172" stroke="#D97757" stroke-width="1.5"/>
  <line x1="505" y1="162" x2="505" y2="178" stroke="#D97757" stroke-width="1.5"/>
  <line x1="519" y1="158" x2="555" y2="172" stroke="#D97757" stroke-width="1.5"/>

  <!-- Leaf nodes -->
  <circle cx="450" cy="178" r="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="450" y="182" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">A</text>
  <circle cx="505" cy="186" r="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="505" y="190" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">B</text>
  <circle cx="560" cy="178" r="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="560" y="182" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">C</text>

  <!-- More branching from B -->
  <line x1="500" y1="196" x2="478" y2="212" stroke="#D97757" stroke-width="1.2"/>
  <line x1="510" y1="196" x2="532" y2="212" stroke="#D97757" stroke-width="1.2"/>
  <circle cx="472" cy="218" r="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.2"/>
  <circle cx="538" cy="218" r="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.2"/>

  <text x="505" y="245" text-anchor="middle" font-size="12" fill="#141413">判断 = 决策密度瓶颈</text>
  <text x="505" y="263" text-anchor="middle" font-size="10" fill="#87867F">每一次"让AI做什么"</text>
  <text x="505" y="277" text-anchor="middle" font-size="10" fill="#87867F">都是一次判断</text>

  <!-- Bottom formula card -->
  <rect x="40" y="308" width="600" height="68" rx="8" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="330" text-anchor="middle" font-size="10.5" fill="#141413">决策密度 = 选择让AI做什么的频率 × AI执行速度</text>

  <!-- Formula visualization -->
  <rect x="90" y="340" width="150" height="26" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="165" y="358" text-anchor="middle" font-size="10" fill="#87867F">AI执行速度 ↑</text>

  <text x="260" y="358" text-anchor="middle" font-size="14" fill="#D97757">×</text>

  <rect x="290" y="340" width="150" height="26" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="365" y="358" text-anchor="middle" font-size="10" fill="#87867F">判断频率 ↑↑↑</text>

  <text x="460" y="358" text-anchor="middle" font-size="14" fill="#D97757">=</text>

  <rect x="490" y="340" width="130" height="26" rx="6" fill="#D97757"/>
  <text x="555" y="358" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">判断瓶颈 ↑↑↑↑</text>
</svg>