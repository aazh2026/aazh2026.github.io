<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 640 320"><path fill="#faf9f5" d="M0 0h640v320H0z"/><text x="320" y="26" fill="#141413" font-size="13" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Multi-Agent 系统中的涌现行为</text><text x="320" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">三种常见涌现类型</text><rect width="170" height="32" x="235" y="54" fill="#d97757" rx="8"/><text x="320" y="74" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">涌现行为</text><path stroke="#d1cfc5" stroke-width="1.5" d="m280 86-100 34m140-34v34m40-34 100 34"/><rect width="272" height="170" x="44" y="124" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="180" y="146" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">协作模式涌现</text><text x="180" y="163" fill="#87867f" font-size="9.5" text-anchor="middle">spontaneous pipeline formation</text><rect width="64" height="36" x="72" y="172" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="104" y="185" fill="#141413" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">Agent A</text><text x="104" y="198" fill="#87867f" font-size="7.5" text-anchor="middle">预处理</text><path stroke="#d97757" stroke-width="2" d="M136 190h24"/><path fill="#d97757" d="m160 190-8-4v8z"/><rect width="64" height="36" x="164" y="172" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="196" y="185" fill="#141413" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">Agent B</text><text x="196" y="198" fill="#87867f" font-size="7.5" text-anchor="middle">分析</text><path stroke="#d97757" stroke-width="2" d="M228 190h24"/><path fill="#d97757" d="m252 190-8-4v8z"/><rect width="48" height="36" x="256" y="172" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="280" y="1