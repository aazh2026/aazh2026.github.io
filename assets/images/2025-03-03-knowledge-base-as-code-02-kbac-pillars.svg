<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="KBaaC三大支柱">
  <title>KBaaC 三大支柱：ADR / 编码规范 / 运行手册</title>
  <desc>知识库即代码的三大核心组成部分及其在Git中的组织结构</desc>

  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="460" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#141413">KBaaC 三大支柱</text>
  <text x="400" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">Knowledge Base as Code — 知识与代码共版本</text>

  <!-- Git repo label -->
  <g transform="translate(30, 75)">
    <rect width="100" height="30" rx="6" fill="#141413" opacity="0.1"/>
    <text x="50" y="20" text-anchor="middle" font-family="monospace" font-size="12" fill="#141413">repo/</text>
  </g>

  <!-- Central docs folder -->
  <g transform="translate(30, 115)">
    <rect width="740" height="40" rx="6" fill="#141413" opacity="0.08"/>
    <text x="370" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#141413">docs/</text>
  </g>

  <!-- Pillar 1: ADR -->
  <g transform="translate(30, 170)">
    <rect width="220" height="240" rx="10" fill="#D97757" opacity="0.12" stroke="#D97757" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#D97757">ADR</text>
    <text x="110" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Architecture Decision Records</text>
    <line x1="15" y1="56" x2="205" y2="56" stroke="#D97757" stroke-width="1" opacity="0.4"/>

    <!-- File tree -->
    <g font-family="monospace" font-size="10" fill="#141413">
      <text x="15" y="78">📁 adr/</text>
      <text x="25" y="96">├── 0001-record-arch-</text>
      <text x="25" y="108">│   decisions.md</text>
      <text x="25" y="124">├── 0002-use-postgresql.md</text>
      <text x="25" y="140">├── 0003-implement-cqrs.md</text>
      <text x="25" y="156">└── 0004-migrate-graphql.md</text>
    </g>

    <line x1="15" y1="170" x2="205" y2="170" stroke="#D97757" stroke-width="0.5" opacity="0.3"/>
    <text x="15" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#141413" font-weight="600">用途：记录架构决策</text>
    <text x="15" y="206" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 决策背景与约束</text>
    <text x="15" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 替代方案对比</text>
    <text x="15" y="238" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 决策理由与后果</text>
  </g>

  <!-- Pillar 2: Coding Standards -->
  <g transform="translate(290, 170)">
    <rect width="220" height="240" rx="10" fill="#788C5D" opacity="0.12" stroke="#788C5D" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#788C5D">编码规范</text>
    <text x="110" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Coding Standards</text>
    <line x1="15" y1="56" x2="205" y2="56" stroke="#788C5D" stroke-width="1" opacity="0.4"/>

    <!-- File tree -->
    <g font-family="monospace" font-size="10" fill="#141413">
      <text x="15" y="78">📁 standards/</text>
      <text x="25" y="96">├── 0001-python-style.md</text>
      <text x="25" y="112">├── 0002-api-design.md</text>
      <text x="25" y="128">├── 0003-error-handling.md</text>
      <text x="25" y="144">└── 0004-testing-strategy.md</text>
    </g>

    <line x1="15" y1="158" x2="205" y2="158" stroke="#788C5D" stroke-width="0.5" opacity="0.3"/>
    <text x="15" y="176" font-family="system-ui, sans-serif" font-size="10" fill="#141413" font-weight="600">用途：统一代码质量</text>
    <text x="15" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 代码风格规范</text>
    <text x="15" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• API 设计准则</text>
    <text x="15" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 测试策略要求</text>
  </g>

  <!-- Pillar 3: Runbooks -->
  <g transform="translate(550, 170)">
    <rect width="220" height="240" rx="10" fill="#141413" opacity="0.1" stroke="#141413" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">运行手册</text>
    <text x="110" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Runbooks</text>
    <line x1="15" y1="56" x2="205" y2="56" stroke="#141413" stroke-width="1" opacity="0.3"/>

    <!-- File tree -->
    <g font-family="monospace" font-size="10" fill="#141413">
      <text x="15" y="78">📁 runbooks/</text>
      <text x="25" y="96">├── 0001-oncall-proc.md</text>
      <text x="25" y="112">├── 0002-db-failover.md</text>
      <text x="25" y="128">├── 0003-security-incident.md</text>
      <text x="25" y="144">└── 0004-perf-degradation.md</text>
    </g>

    <line x1="15" y1="158" x2="205" y2="158" stroke="#141413" stroke-width="0.5" opacity="0.2"/>
    <text x="15" y="176" font-family="system-ui, sans-serif" font-size="10" fill="#141413" font-weight="600">用途：运维操作指南</text>
    <text x="15" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 故障处理流程</text>
    <text x="15" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 应急响应步骤</text>
    <text x="15" y="226" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">• 性能问题排查</text>
  </g>

  <!-- Bottom benefit row -->
  <g transform="translate(30, 420)">
    <g font-family="system-ui, sans-serif" font-size="10" fill="#141413">
      <text x="0" y="0" font-weight="600">✅ 与代码同仓库</text>
      <text x="160" y="0" font-weight="600">✅ Git 版本控制</text>
      <text x="320" y="0" font-weight="600">✅ PR 审核流程</text>
      <text x="490" y="0" font-weight="600">✅ 可追溯历史</text>
      <text x="640" y="0" font-weight="600">✅ 团队共享</text>
    </g>
  </g>
</svg>
