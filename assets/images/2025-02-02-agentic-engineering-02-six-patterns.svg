<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">六种核心协作模式</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Agentic Engineering · Simon Willison 框架 · 2026</text>

  <!-- 2x3 grid of pattern cards -->
  <!-- Row 1 -->

  <!-- Card 1: 交互式解释 (clay border - first/primary) -->
  <rect x="40" y="60" width="190" height="120" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="60" width="190" height="4" rx="2" fill="#D97757"/>
  <!-- chat-bubble icon -->
  <rect x="56" y="76" width="24" height="16" rx="4" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <polyline points="60,92 56,100 64,96" stroke="#D97757" stroke-width="1.5" fill="none"/>
  <text x="88" y="88" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">01</text>
  <text x="88" y="104" font-size="12.5" fill="#141413">交互式解释</text>
  <text x="56" y="124" font-size="10" fill="#87867F">边写边讲 · 共享上下文</text>
  <text x="56" y="140" font-size="10" fill="#87867F">防止 上下文崩溃</text>

  <!-- Card 2: 囤积技能 -->
  <rect x="245" y="60" width="190" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="245" y="60" width="190" height="4" rx="2" fill="#D1CFC5"/>
  <!-- database icon -->
  <ellipse cx="261" cy="82" rx="8" ry="4" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <line x1="253" y1="82" x2="253" y2="92" stroke="#87867F" stroke-width="1.5"/>
  <line x1="269" y1="82" x2="269" y2="92" stroke="#87867F" stroke-width="1.5"/>
  <ellipse cx="261" cy="92" rx="8" ry="4" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <line x1="253" y1="92" x2="253" y2="100" stroke="#87867F" stroke-width="1.5"/>
  <line x1="269" y1="92" x2="269" y2="100" stroke="#87867F" stroke-width="1.5"/>
  <ellipse cx="261" cy="100" rx="8" ry="4" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <text x="293" y="88" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">02</text>
  <text x="293" y="104" font-size="12.5" fill="#141413">囤积技能</text>
  <text x="261" y="124" font-size="10" fill="#87867F">认知外化 · AI 技能库</text>
  <text x="261" y="140" font-size="10" fill="#87867F">对抗 学习回避</text>

  <!-- Card 3: 边界探索 -->
  <rect x="450" y="60" width="190" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="450" y="60" width="190" height="4" rx="2" fill="#D1CFC5"/>
  <!-- compass icon -->
  <circle cx="466" cy="82" r="10" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <line x1="466" y1="74" x2="466" y2="90" stroke="#87867F" stroke-width="1.5"/>
  <line x1="458" y1="82" x2="474" y2="82" stroke="#87867F" stroke-width="1.5"/>
  <polygon points="466,74 463,80 469,80" fill="#87867F"/>
  <text x="498" y="88" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">03</text>
  <text x="498" y="104" font-size="12.5" fill="#141413">边界探索</text>
  <text x="466" y="124" font-size="10" fill="#87867F">系统性试错 · 建立心智地图</text>
  <text x="466" y="140" font-size="10" fill="#87867F">对抗 能力幻觉</text>

  <!-- Row 2 -->

  <!-- Card 4: 增量验证 -->
  <rect x="40" y="195" width="190" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="195" width="190" height="4" rx="2" fill="#D1CFC5"/>
  <!-- checkmark-steps icon -->
  <rect x="52" y="210" width="18" height="18" rx="3" fill="none" stroke="#87867F" stroke-width="1.5"/>
  <polyline points="57,220 61,224 67,214" stroke="#788C5D" stroke-width="2" fill="none"/>
  <line x1="52" y1="234" x2="70" y2="234" stroke="#87867F" stroke-width="1"/>
  <rect x="52" y="240" width="18" height="18" rx="3" fill="none" stroke="#87867F" stroke-width="1.5"/>
  <line x1="52" y1="250" x2="70" y2="250" stroke="#87867F" stroke-width="1"/>
  <rect x="52" y="256" width="18" height="18" rx="3" fill="none" stroke="#87867F" stroke-width="1.5"/>
  <text x="88" y="224" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">04</text>
  <text x="88" y="240" font-size="12.5" fill="#141413">增量验证</text>
  <text x="56" y="260" font-size="10" fill="#87867F">步步为营 · 每步可验证</text>
  <text x="56" y="276" font-size="10" fill="#87867F">对抗 自动化偏见</text>

  <!-- Card 5: 意图分层 -->
  <rect x="245" y="195" width="190" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="245" y="195" width="190" height="4" rx="2" fill="#D1CFC5"/>
  <!-- layers icon -->
  <rect x="253" y="210" width="22" height="8" rx="2" fill="none" stroke="#87867F" stroke-width="1.5"/>
  <rect x="253" y="220" width="22" height="8" rx="2" fill="none" stroke="#87867F" stroke-width="1.5"/>
  <rect x="253" y="230" width="22" height="8" rx="2" fill="#87867F" stroke="none"/>
  <text x="293" y="224" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">05</text>
  <text x="293" y="240" font-size="12.5" fill="#141413">意图分层</text>
  <text x="261" y="260" font-size="10" fill="#87867F">意图 → 策略 → 实现</text>
  <text x="261" y="276" font-size="10" fill="#87867F">防止 意图丢失</text>

  <!-- Card 6: 元认知监控 -->
  <rect x="450" y="195" width="190" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="450" y="195" width="190" height="4" rx="2" fill="#D1CFC5"/>
  <!-- eye/loop icon -->
  <ellipse cx="466" cy="222" rx="12" ry="7" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <circle cx="466" cy="222" r="3.5" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <path d="M 474 222 C 480 212, 480 232, 474 222" stroke="#87867F" stroke-width="1.5" fill="none"/>
  <text x="498" y="224" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">06</text>
  <text x="498" y="240" font-size="12.5" fill="#141413">元认知监控</text>
  <text x="466" y="260" font-size="10" fill="#87867F">监控你的理解状态</text>
  <text x="466" y="276" font-size="10" fill="#87867F">对抗 认知债务</text>

  <!-- Bottom note -->
  <text x="340" y="340" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">每种模式针对一种特定的人机协作失败模式</text>

  <title>六种核心协作模式</title>
  <desc>六种 Agentic Engineering 协作模式：交互式解释、囤积技能、边界探索、增量验证、意图分层、元认知监控</desc>
</svg>
