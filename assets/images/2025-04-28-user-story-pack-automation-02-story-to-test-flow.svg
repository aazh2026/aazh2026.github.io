<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="从用户故事到自动化测试">
  <title>User Story Pack → 自动化测试流程</title>
  <desc>展示 User Story Pack 如何无缝衔接到 BDD/Gherkin 测试，以及自动生成测试代码的流程</desc>

  <defs>
    <filter id="sf5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
    <marker id="gArr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#788C5D"/>
    </marker>
    <marker id="rArr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#D97757"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="30" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#141413">从用户故事到自动化测试</text>
  <text x="30" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">User Story Pack 的核心价值：验收标准可直接转化为自动化测试，无信息丢失</text>

  <!-- LEFT SIDE: Traditional Way -->
  <g filter="url(#sf5)">
    <rect x="30" y="65" width="200" height="280" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
    <rect x="30" y="65" width="200" height="35" rx="10" fill="#D97757"/>
    <rect x="30" y="90" width="200" height="10" fill="#D97757"/>
    <text x="130" y="88" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5" text-anchor="middle">传统方式</text>

    <!-- Step 1 -->
    <rect x="50" y="115" width="160" height="35" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1"/>
    <text x="130" y="136" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#141413" text-anchor="middle">产品经理写验收标准</text>

    <!-- Arrow -->
    <line x1="130" y1="150" x2="130" y2="165" stroke="#D97757" stroke-width="2" marker-end="url(#rArr)"/>
    <text x="130" y="158" font-family="system-ui,sans-serif" font-size="8" fill="#D97757" text-anchor="middle">理解偏差</text>

    <!-- Step 2 -->
    <rect x="50" y="168" width="160" height="35" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1"/>
    <text x="130" y="189" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#141413" text-anchor="middle">测试工程师理解</text>

    <!-- Arrow -->
    <line x1="130" y1="203" x2="130" y2="218" stroke="#D97757" stroke-width="2" marker-end="url(#rArr)"/>
    <text x="130" y="211" font-family="system-ui,sans-serif" font-size="8" fill="#D97757" text-anchor="middle">信息丢失</text>

    <!-- Step 3 -->
    <rect x="50" y="221" width="160" height="35" rx="6" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1"/>
    <text x="130" y="242" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#141413" text-anchor="middle">写测试代码</text>

    <!-- Problem -->
    <rect x="50" y="270" width="160" height="50" rx="6" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="1"/>
    <text x="130" y="288" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#D97757" text-anchor="middle">问题</text>
    <text x="130" y="303" font-family="system-ui,sans-serif" font-size="9" fill="#D97757" text-anchor="middle">需求 → 测试</text>
    <text x="130" y="315" font-family="system-ui,sans-serif" font-size="9" fill="#D97757" text-anchor="middle">理解偏差 + 沟通损耗</text>
  </g>

  <!-- CENTER: Arrow -->
  <text x="265" y="200" font-family="system-ui,sans-serif" font-size="20" fill="#D1CFC5" text-anchor="middle">→</text>

  <!-- RIGHT SIDE: User Story Pack Way -->
  <g filter="url(#sf5)">
    <rect x="290" y="65" width="580" height="280" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
    <rect x="290" y="65" width="580" height="35" rx="10" fill="#788C5D"/>
    <rect x="290" y="90" width="580" height="10" fill="#788C5D"/>
    <text x="580" y="88" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5" text-anchor="middle">User Story Pack 方式</text>

    <!-- Flow: Story Pack → Gherkin → Test Code -->
    <g transform="translate(310, 110)">
      <rect width="150" height="60" rx="6" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="1.5"/>
      <text x="75" y="25" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">Story Pack</text>
      <text x="75" y="42" font-family="system-ui,sans-serif" font-size="9" fill="#141413" text-anchor="middle">结构化规格</text>
      <text x="75" y="55" font-family="system-ui,sans-serif" font-size="8" fill="#87867F" text-anchor="middle">YAML/Gherkin</text>
    </g>

    <!-- Arrow -->
    <line x1="460" y1="140" x2="490" y2="140" stroke="#788C5D" stroke-width="2" marker-end="url(#gArr)"/>

    <!-- Gherkin -->
    <g transform="translate(495, 110)">
      <rect width="160" height="60" rx="6" fill="#D1CFC5" fill-opacity="0.3" stroke="#D1CFC5" stroke-width="1.5"/>
      <text x="80" y="25" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#141413" text-anchor="middle">BDD / Gherkin</text>
      <text x="80" y="42" font-family="system-ui,sans-serif" font-size="9" fill="#141413" text-anchor="middle">Given-When-Then</text>
      <text x="80" y="55" font-family="system-ui,sans-serif" font-size="8" fill="#87867F" text-anchor="middle">业务可读 DSL</text>
    </g>

    <!-- Arrow -->
    <line x1="655" y1="140" x2="685" y2="140" stroke="#788C5D" stroke-width="2" marker-end="url(#gArr)"/>

    <!-- Test Code -->
    <g transform="translate(690, 110)">
      <rect width="150" height="60" rx="6" fill="#788C5D"/>
      <text x="75" y="25" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">Test Code</text>
      <text x="75" y="42" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">Behave / Cucumber</text>
      <text x="75" y="55" font-family="system-ui,sans-serif" font-size="8" fill="#FAF9F5" text-anchor="middle" opacity="0.8">直接执行</text>
    </g>

    <!-- Gherkin Example -->
    <g filter="url(#sf5)">
      <rect x="310" y="185" width="530" height="80" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1"/>
      <text x="330" y="203" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#141413">Gherkin 示例</text>
      <text x="330" y="218" font-family="monospace" font-size="8" fill="#141413">Scenario: 正常使用优惠券</text>
      <text x="330" y="231" font-family="monospace" font-size="8" fill="#87867F">  Given 订单金额 ¥500</text>
      <text x="330" y="244" font-family="monospace" font-size="8" fill="#87867F">  And 有一张满400减100优惠券</text>
      <text x="330" y="257" font-family="monospace" font-size="8" fill="#87867F">  When 用户选择使用该优惠券</text>
      <text x="330" y="270" font-family="monospace" font-size="8" fill="#141413">  Then 实付 ¥400</text>
    </g>

    <!-- Benefits -->
    <g transform="translate(310, 280)">
      <circle cx="8" cy="8" r="8" fill="#788C5D"/>
      <text x="22" y="12" font-family="system-ui,sans-serif" font-size="9" fill="#141413">无信息丢失</text>

      <circle cx="130" cy="8" r="8" fill="#788C5D"/>
      <text x="144" y="12" font-family="system-ui/sans-serif" font-size="9" fill="#141413">100% 一致性</text>

      <circle cx="270" cy="8" r="8" fill="#788C5D"/>
      <text x="284" y="12" font-family="system-ui/sans-serif" font-size="9" fill="#141413">自动生成</text>

      <circle cx="410" cy="8" r="8" fill="#788C5D"/>
      <text x="424" y="12" font-family="system-ui/sans-serif" font-size="9" fill="#141413">可执行规格</text>

      <circle cx="530" cy="8" r="8" fill="#788C5D"/>
      <text x="544" y="12" font-family="system-ui/sans-serif" font-size="9" fill="#141413">验收 = 测试</text>
    </g>
  </g>
</svg>
