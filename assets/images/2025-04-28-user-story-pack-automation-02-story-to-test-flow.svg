<svg xmlns="http://www.w3.org/2000/svg" aria-label="从用户故事到自动化测试" viewBox="0 0 900 360"><title>User Story Pack → 自动化测试流程</title><desc>展示 User Story Pack 如何无缝衔接到 BDD/Gherkin 测试，以及自动生成测试代码的流程</desc><defs><marker id="gArr" markerHeight="8" markerWidth="8" orient="auto" refX="8" refY="4"><path fill="#788c5d" d="m0 0 8 4-8 4z"/></marker><marker id="rArr" markerHeight="8" markerWidth="8" orient="auto" refX="8" refY="4"><path fill="#d97757" d="m0 0 8 4-8 4z"/></marker><filter id="sf5" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".1" stdDeviation="3"/></filter></defs><path fill="#faf9f5" d="M0 0h900v360H0z"/><text x="30" y="32" fill="#141413" font-family="system-ui,sans-serif" font-size="15" font-weight="700">从用户故事到自动化测试</text><text x="30" y="50" fill="#87867f" font-family="system-ui,sans-serif" font-size="10">User Story Pack 的核心价值：验收标准可直接转化为自动化测试，无信息丢失</text><g filter="url(#sf5)"><rect width="200" height="280" x="30" y="65" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="10"/><rect width="200" height="35" x="30" y="65" fill="#d97757" rx="10"/><path fill="#d97757" d="M30 90h200v10H30z"/><text x="130" y="88" fill="#faf9f5" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">传统方式</text><rect width="160" height="35" x="50" y="115" fill="#faf9f5" stroke="#e3dacc" rx="6"/><text x="130" y="136" fill="#141413" font-family="system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">产品经理写验收标准</text><path stroke="#d97757" stroke-width="2" marker-end="url(#rArr)" d="M130 150v15"/><text x="130" y="158" fill="#d97757" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">理解偏差</text><rect width="160" height="35" x="50" y="168" fill="#faf9f5" stroke="#e3dacc" rx="6"/><text x="130" y="189" fill="#141413" font-family="system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">测试工程师理解</text><path stroke="#d97757" stroke-width="2" marker-end="url(#rArr)" d="M130 203v15"/><text x="130" y="211" fill="#d97757" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">信息丢失</text><rect width="160" height="35" x="50" y="221" fill="#faf9f5" stroke="#e3dacc" rx="6"/><text x="130" y="242" fill="#141413" font-family="system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">写测试代码</text><rect width="160" height="50" x="50" y="270" fill="#d97757" fill-opacity=".1" stroke="#d97757" rx="6"/><text x="130" y="288" fill="#d97757" font-family="system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">问题</text><text x="130" y="303" fill="#d97757" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">需求 → 测试</text><text x="130" y="315" fill="#d97757" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">理解偏差 + 沟通损耗</text></g><text x="265" y="200" fill="#d1cfc5" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">→</text><g filter="url(#sf5)"><rect width="580" height="280" x="290" y="65" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="10"/><rect width="580" height="35" x="290" y="65" fill="#788c5d" rx="10"/><path fill="#788c5d" d="M290 90h580v10H290z"/><text x="580" y="88" fill="#faf9f5" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">User Story Pack 方式</text><g transform="translate(310 110)"><rect width="150" height="60" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="75" y="25" fill="#788c5d" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Story Pack</text><text x="75" y="42" fill="#141413" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">结构化规格</text><text x="75" y="55" fill="#87867f" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">YAML/Gherkin</text></g><path stroke="#788c5d" stroke-width="2" marker-end="url(#gArr)" d="M460 140h30"/><g transform="translate(495 110)"><rect width="160" height="60" fill="#d1cfc5" fill-opacity=".3" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="80" y="25" fill="#141413" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">BDD / Gherkin</text><text x="80" y="42" fill="#141413" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Given-When-Then</text><text x="80" y="55" fill="#87867f" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">业务可读 DSL</text></g><path stroke="#788c5d" stroke-width="2" marker-end="url(#gArr)" d="M655 140h30"/><g transform="translate(690 110)"><rect width="150" height="60" fill="#788c5d" rx="6"/><text x="75" y="25" fill="#faf9f5" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Test Code</text><text x="75" y="42" fill="#faf9f5" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Behave / Cucumber</text><text x="75" y="55" fill="#faf9f5" font-family="system-ui,sans-serif" font-size="8" opacity=".8" text-anchor="middle">直接执行</text></g><g filter="url(#sf5)"><rect width="530" height="80" x="310" y="185" fill="#faf9f5" stroke="#e3dacc" rx="8"/><text x="330" y="203" fill="#141413" font-family="system-ui,sans-serif" font-size="9" font-weight="700">Gherkin 示例</text><text x="330" y="218" fill="#141413" font-family="monospace" font-size="8">Scenario: 正常使用优惠券</text><text x="330" y="231" fill="#87867f" font-family="monospace" font-size="8">  Given 订单金额 ¥500</text><text x="330" y="244" fill="#87867f" font-family="monospace" font-size="8">  And 有一张满400减100优惠券</text><text x="330" y="257" fill="#87867f" font-family="monospace" font-size="8">  When 用户选择使用该优惠券</text><text x="330" y="270" fill="#141413" font-family="monospace" font-size="8">  Then 实付 ¥400</text></g><g transform="translate(310 280)"><circle cx="8" cy="8" r="8" fill="#788c5d"/><text x="22" y="12" fill="#141413" font-family="system-ui,sans-serif" font-size="9">无信息丢失</text><circle cx="130" cy="8" r="8" fill="#788c5d"/><text x="144" y="12" fill="#141413" font-family="system-ui/sans-serif" font-size="9">100% 一致性</text><circle cx="270" cy="8" r="8" fill="#788c5d"/><text x="284" y="12" fill="#141413" font-family="system-ui/sans-serif" font-size="9">自动生成</text><circle cx="410" cy="8" r="8" fill="#788c5d"/><text x="424" y="12" fill="#141413" font-family="system-ui/sans-serif" font-size="9">可执行规格</text><circle cx="530" cy="8" r="8" fill="#788c5d"/><text x="544" y="12" fill="#141413" font-family="system-ui/sans-serif" font-size="9">验收 = 测试</text></g></g></svg>