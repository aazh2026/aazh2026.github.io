  <text xml:space="preserve" x="20" y="177.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">│  高性能IO，业务编排                    │</text>
  <text xml:space="preserve" x="20" y="195.5" fill="#141413" font-family="ui-monospace,SF Mono,Menlo,Monaco,Consolas,monospace" font-size="13.5">├─────────────────────────────────────┤</text>
