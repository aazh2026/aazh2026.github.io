<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>Architecture Spec 工作流</title>
  <desc>传统架构文档工作流与 Architecture Spec 工作流的对比流程图</desc>

  <!-- Background -->
  <rect width="680" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Architecture Spec 工作流</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">架构即代码</text>

  <!-- Divider line -->
  <line x1="340" y1="60" x2="340" y2="295" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT SIDE: Traditional workflow (gray) -->
  <text x="170" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">传统路径</text>

  <!-- Node 1: Architect draws diagram -->
  <rect x="60" y="82" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-size="11" fill="#141413">架构师画图</text>
  <text x="140" y="116" text-anchor="middle" font-size="10" fill="#87867F">PPT / Visio / draw.io</text>

  <!-- Arrow -->
  <line x1="140" y1="126" x2="140" y2="140" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="140,144 136,136 144,136" fill="#D1CFC5"/>

  <!-- Node 2: Engineer reads -->
  <rect x="60" y="150" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="140" y="168" text-anchor="middle" font-size="11" fill="#141413">工程师看图</text>
  <text x="140" y="184" text-anchor="middle" font-size="10" fill="#87867F">理解意图</text>

  <!-- Arrow -->
  <line x1="140" y1="194" x2="140" y2="208" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="140,212 136,204 144,204" fill="#D1CFC5"/>

  <!-- Node 3:各自理解 -->
  <rect x="60" y="218" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="140" y="236" text-anchor="middle" font-size="11" fill="#141413">各自理解</text>
  <text x="140" y="252" text-anchor="middle" font-size="10" fill="#87867F">上下文丢失</text>

  <!-- Arrow -->
  <line x1="140" y1="262" x2="140" y2="276" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="140,280 136,272 144,272" fill="#D1CFC5"/>

  <!-- Node 4: Deviation -->
  <rect x="60" y="286" width="160" height="24" rx="6" fill="#E8E4DC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="140" y="302" text-anchor="middle" font-size="10" fill="#87867F">实现偏差 · static · 滞后</text>

  <!-- RIGHT SIDE: Architecture Spec workflow (clay) -->
  <text x="510" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Architecture Spec 路径</text>

  <!-- Node 1: Architect writes spec -->
  <rect x="400" y="82" width="220" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="510" y="100" text-anchor="middle" font-size="11" fill="#141413">架构师编写 Architecture Spec</text>
  <text x="510" y="116" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">YAML / JSON / DSL</text>

  <!-- Arrow -->
  <line x1="510" y1="126" x2="510" y2="140" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="510,144 506,136 514,136" fill="#D97757"/>

  <!-- Node 2: AI generates/validates -->
  <rect x="400" y="150" width="220" height="44" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="510" y="168" text-anchor="middle" font-size="11" fill="#141413">AI 生成代码 / 验证</text>
  <text x="510" y="184" text-anchor="middle" font-size="10" fill="#87867F">结构化解析 · 无二义性</text>

  <!-- Bidirectional arrow between spec and code generators -->
  <path d="M 490 194 L 490 206 M 486 202 L 490 206 L 494 202" stroke="#788C5D" stroke-width="1.5" fill="none"/>
  <path d="M 530 206 L 530 194 M 526 200 L 530 194 L 534 200" stroke="#788C5D" stroke-width="1.5" fill="none"/>
  <text x="510" y="204" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">双向对齐</text>

  <!-- Node 3: Auto alignment -->
  <rect x="400" y="218" width="220" height="44" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="510" y="236" text-anchor="middle" font-size="11" fill="#141413">自动对齐</text>
  <text x="510" y="252" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">machine-readable · verifiable</text>

  <!-- Arrow -->
  <line x1="510" y1="262" x2="510" y2="276" stroke="#788C5D" stroke-width="1.5"/>
  <polygon points="510,280 506,272 514,272" fill="#788C5D"/>

  <!-- Node 4: Aligned output -->
  <rect x="400" y="286" width="220" height="24" rx="6" fill="#E8EDDE" stroke="#788C5D" stroke-width="1"/>
  <text x="510" y="302" text-anchor="middle" font-size="10" fill="#788C5D">代码 + 文档 + 部署配置</text>

  <!-- Legend bottom center -->
  <rect x="270" y="295" width="140" height="18" rx="9" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <circle cx="282" cy="304" r="5" fill="#D1CFC5"/>
  <text x="292" y="308" font-size="9" fill="#87867F">传统</text>
  <circle cx="332" cy="304" r="5" fill="#D97757"/>
  <text x="342" y="308" font-size="9" fill="#D97757">Arch Spec</text>
</svg>