<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI 编程工具决策树</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Cursor vs Claude Code · 2026</text>

  <!-- Root node -->
  <rect x="230" y="56" width="220" height="36" rx="8" fill="#141413"/>
  <text x="340" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">AI 编程工具选哪个？</text>

  <!-- Arrow: Root → IDE path -->
  <line x1="280" y1="92" x2="170" y2="116" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="168,114 176,108 174,118" fill="#D1CFC5"/>

  <!-- Arrow: Root → Terminal path -->
  <line x1="400" y1="92" x2="510" y2="116" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="512,114 504,108 506,118" fill="#D1CFC5"/>

  <!-- IDE path label -->
  <text x="148" y="124" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">IDE 派</text>

  <!-- Terminal path label -->
  <text x="532" y="124" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">Terminal 派</text>

  <!-- IDE branch: 需要开箱即用? -->
  <rect x="50" y="132" width="196" height="36" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="148" y="154" text-anchor="middle" font-size="11" fill="#141413">需要开箱即用？</text>

  <!-- IDE → Yes → Cursor -->
  <line x1="100" y1="168" x2="70" y2="194" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="68,192 78,188 74,198" fill="#D97757"/>
  <text x="56" y="188" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">是</text>

  <!-- IDE → No → 继续判断 -->
  <line x1="196" y1="168" x2="226" y2="194" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="228,192 218,188 222,198" fill="#D1CFC5"/>
  <text x="236" y="188" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">否</text>

  <!-- Cursor card -->
  <rect x="20" y="200" width="120" height="80" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="20" y="200" width="120" height="22" rx="8" fill="#D97757"/>
  <rect x="20" y="214" width="120" height="8" fill="#D97757"/>
  <text x="80" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Cursor</text>
  <text x="80" y="240" text-anchor="middle" font-size="10" fill="#141413">全功能 AI IDE</text>
  <text x="80" y="255" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">$20/月</text>
  <text x="80" y="270" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">VS Code 分支</text>

  <!-- Intermediate: IDE继续判断节点 -->
  <rect x="226" y="200" width="140" height="36" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="296" y="222" text-anchor="middle" font-size="11" fill="#141413">重度调试需求？</text>

  <!-- Arrow: 调试需求 → Yes → Cursor（替代路径） -->
  <line x1="280" y1="236" x2="140" y2="272" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="138,270 148,266 144,276" fill="#D1CFC5"/>
  <text x="204" y="262" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">也选 Cursor</text>

  <!-- Terminal branch: 追求极致控制? -->
  <rect x="434" y="132" width="196" height="36" rx="6" fill="#FFFFFF" stroke="#141413" stroke-width="1.5"/>
  <text x="532" y="154" text-anchor="middle" font-size="11" fill="#141413">追求极致控制？</text>

  <!-- Terminal → Yes → Claude Code -->
  <line x1="484" y1="168" x2="454" y2="194" stroke="#141413" stroke-width="1.5"/>
  <polygon points="452,192 462,188 458,198" fill="#141413"/>
  <text x="440" y="188" font-size="9" fill="#141413" font-family="ui-monospace, monospace">是</text>

  <!-- Terminal → No → 继续判断 -->
  <line x1="580" y1="168" x2="610" y2="194" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="612,192 602,188 606,198" fill="#D1CFC5"/>
  <text x="616" y="188" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">否</text>

  <!-- Claude Code card -->
  <rect x="404" y="200" width="120" height="80" rx="8" fill="#FFFFFF" stroke="#141413" stroke-width="2"/>
  <rect x="404" y="200" width="120" height="22" rx="8" fill="#141413"/>
  <rect x="404" y="214" width="120" height="8" fill="#141413"/>
  <text x="464" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Claude Code</text>
  <text x="464" y="240" text-anchor="middle" font-size="10" fill="#141413">终端极客之选</text>
  <text x="464" y="255" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">$0-100/月</text>
  <text x="464" y="270" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">原生 Agent</text>

  <!-- Intermediate: Terminal 继续判断 -->
  <rect x="570" y="200" width="100" height="36" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="620" y="222" text-anchor="middle" font-size="10" fill="#141413">成本优先？</text>

  <!-- Arrow: 成本优先 → No → Claude Code（替代路径） -->
  <line x1="610" y1="236" x2="524" y2="272" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="522,270 532,266 528,276" fill="#D1CFC5"/>
  <text x="578" y="262" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">选 Claude Code</text>

  <!-- Bottom decision criteria -->
  <rect x="40" y="300" width="600" height="32" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="320" text-anchor="middle" font-size="10.5" fill="#87867F">决策维度：学习曲线 · 调试需求 · 团队协作 · 成本控制</text>

  <!-- Legend -->
  <rect x="40" y="346" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="58" y="357" font-size="10" fill="#141413">Cursor 路径</text>
  <rect x="156" y="346" width="12" height="12" rx="2" fill="#141413"/>
  <text x="174" y="357" font-size="10" fill="#141413">Claude Code 路径</text>
  <line x1="290" y1="352" x2="320" y2="352" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="328" y="357" font-size="10" fill="#87867F">备选路径</text>

  <!-- Bottom note -->
  <text x="340" y="384" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">最佳选择：两者都用，根据场景切换。</text>
</svg>