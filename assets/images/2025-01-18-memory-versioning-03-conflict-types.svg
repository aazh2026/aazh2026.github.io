<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 360">
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">版本冲突的三种类型</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">时间冲突 · 来源冲突 · 粒度冲突</text>
  <rect width="200" height="270" x="20" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="200" height="32" x="20" y="60" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M20 76h200v16H20z"/>
  <text x="120" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">时间冲突</text>
  <circle cx="60" cy="115" r="18" fill="none" stroke="#d97757" stroke-width="1.8"/>
  <path stroke="#d97757" stroke-linecap="round" stroke-width="2" d="M60 115v-12m0 12h9"/>
  <text x="60" y="142" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">时间线重叠</text>
  <rect width="170" height="38" x="35" y="148" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="5"/>
  <text x="45" y="165" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" font-weight="600">t=2020</text>
  <text x="45" y="178" fill="#141413" font-size="9">&quot;Python 有 GIL&quot;</text>
  <rect width="170" height="38" x="35" y="192" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="5"/>
  <text x="45" y="209" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" font-weight="600">t=2023</text>
  <text x="45" y="222" fill="#141413" font-size="9">&quot;Python 可禁用 GIL&quot;</text>
  <rect width="170" height="28" x="35" y="236" fill="#d97757" fill-opacity=".1" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.2" rx="5"/>
  <text x="120" y="253" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" font-weight="600" text-anchor="middle">? 哪个才对</text>
  <text x="120" y="300" fill="#87867f" font-size="8.5" text-anchor="middle">例：&quot;现任总统是谁&quot;</text>
  <text x="120" y="314" fill="#87867f" font-size="8" text-anchor="middle">记忆来自不同选举年</text>
  <rect width="200" height="270" x="240" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="200" height="32" x="240" y="60" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M240 76h200v16H240z"/>
  <text x="340" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">来源冲突</text>
  <rect width="80" height="36" x="255" y="100" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="5"/>
  <text x="295" y="117" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" font-weight="600" text-anchor="middle">Web Search</text>
  <text x="295" y="130" fill="#141413" font-size="8" text-anchor="middle">说 X 是对的</text>
  <rect width="80" height="36" x="345" y="100" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="5"/>
  <text x="385" y="117" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" font-weight="600" text-anchor="middle">User Input</text>
  <text x="385" y="130" fill="#141413" font-size="8" text-anchor="middle">说 Y 是对的</text>
  <path stroke="#d97757" stroke-width="1.5" d="M295 136v24m90-24v24"/>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M295 155h90"/>
  <path fill="#d97757" d="m295 155 6-4v8zm90 0-6-4v8z"/>
  <circle cx="340" cy="185" r="28" fill="#fff" stroke="#d97757" stroke-width="2"/>
  <text x="340" y="181" fill="#d97757" font-size="20" font-weight="700" text-anchor="middle">?</text>
  <text x="340" y="198" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">矛盾事实</text>
  <text x="340" y="240" fill="#141413" font-size="8.5" text-anchor="middle">例：官方文档 vs</text>
  <text x="340" y="254" fill="#141413" font-size="8.5" text-anchor="middle">第三方博客说法不一</text>
  <rect width="170" height="28" x="255" y="265" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="1.2" rx="5"/>
  <text x="340" y="282" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8.5" font-weight="600" text-anchor="middle">Source-Priority 策略</text>
  <rect width="200" height="270" x="460" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="200" height="32" x="460" y="60" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M460 76h200v16H460z"/>
  <text x="560" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">粒度冲突</text>
  <rect width="170" height="36" x="475" y="100" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="5"/>
  <text x="485" y="114" fill="#87867f" font-family="ui-monospace, monospace" font-size="8">粗粒度</text>
  <text x="485" y="128" fill="#141413" font-size="9">&quot;Python 有 GIL&quot;</text>
  <text x="560" y="150" fill="#87867f" font-size="10" font-weight="600" text-anchor="middle">VS</text>
  <rect width="170" height="70" x="475" y="158" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="5"/>
  <text x="485" y="172" fill="#87867f" font-family="ui-monospace, monospace" font-size="8">细粒度</text>
  <text x="485" y="185" fill="#141413" font-size="8.5">• Python 有 GIL（默认）</text>
  <text x="485" y="198" fill="#141413" font-size="8.5">• 3.12+ 可通过 PEP 703 禁用</text>
  <text x="485" y="211" fill="#141413" font-size="8.5">• 禁用后多线程性能提升显著</text>
  <rect width="170" height="28" x="475" y="238" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="1.2" rx="5"/>
  <text x="560" y="255" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8.5" font-weight="600" text-anchor="middle">按 context_tags 选版本</text>
  <text x="560" y="280" fill="#87867f" font-size="8.5" text-anchor="middle">例：不同 Python 版本</text>
  <text x="560" y="294" fill="#87867f" font-size="8" text-anchor="middle">需要不同粒度的知识</text>
  <text x="560" y="308" fill="#87867f" font-size="8" text-anchor="middle">→ 多版本共存</text>
</svg>
