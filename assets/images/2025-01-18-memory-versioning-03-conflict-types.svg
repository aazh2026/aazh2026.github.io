<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">版本冲突的三种类型</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">时间冲突 · 来源冲突 · 粒度冲突</text>

  <!-- === Panel 1: 时间冲突 === -->
  <rect x="20" y="60" width="200" height="270" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="20" y="60" width="200" height="32" rx="8" fill="#D97757"/>
  <rect x="20" y="76" width="200" height="16" fill="#D97757"/>
  <text x="120" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">时间冲突</text>

  <!-- Clock icon (simple circle + hands) -->
  <circle cx="60" cy="115" r="18" fill="none" stroke="#D97757" stroke-width="1.8"/>
  <line x1="60" y1="115" x2="60" y2="103" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="115" x2="69" y2="115" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="142" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">时间线重叠</text>

  <!-- Two overlapping version cards -->
  <rect x="35" y="148" width="170" height="38" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="45" y="165" font-size="9" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">t=2020</text>
  <text x="45" y="178" font-size="9" fill="#141413">"Python 有 GIL"</text>

  <rect x="35" y="192" width="170" height="38" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="45" y="209" font-size="9" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">t=2023</text>
  <text x="45" y="222" font-size="9" fill="#141413">"Python 可禁用 GIL"</text>

  <!-- Overlap indicator -->
  <rect x="35" y="236" width="170" height="28" rx="5" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="120" y="253" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">? 哪个才对</text>

  <!-- Example note -->
  <text x="120" y="300" text-anchor="middle" font-size="8.5" fill="#87867F">例："现任总统是谁"</text>
  <text x="120" y="314" text-anchor="middle" font-size="8" fill="#87867F">记忆来自不同选举年</text>

  <!-- === Panel 2: 来源冲突 === -->
  <rect x="240" y="60" width="200" height="270" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="240" y="60" width="200" height="32" rx="8" fill="#D97757"/>
  <rect x="240" y="76" width="200" height="16" fill="#D97757"/>
  <text x="340" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">来源冲突</text>

  <!-- Source node 1: Web Search -->
  <rect x="255" y="100" width="80" height="36" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="295" y="117" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">Web Search</text>
  <text x="295" y="130" text-anchor="middle" font-size="8" fill="#141413">说 X 是对的</text>

  <!-- Source node 2: User Input -->
  <rect x="345" y="100" width="80" height="36" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="385" y="117" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">User Input</text>
  <text x="385" y="130" text-anchor="middle" font-size="8" fill="#141413">说 Y 是对的</text>

  <!-- Arrows pointing to fact node with question mark -->
  <line x1="295" y1="136" x2="295" y2="160" stroke="#D97757" stroke-width="1.5"/>
  <line x1="385" y1="136" x2="385" y2="160" stroke="#D97757" stroke-width="1.5"/>
  <line x1="295" y1="155" x2="385" y2="155" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="295,155 301,151 301,159" fill="#D97757"/>
  <polygon points="385,155 379,151 379,159" fill="#D97757"/>

  <!-- Fact node with question mark -->
  <circle cx="340" cy="185" r="28" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="340" y="181" text-anchor="middle" font-size="20" fill="#D97757" font-weight="700">?</text>
  <text x="340" y="198" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">矛盾事实</text>

  <!-- Example note -->
  <text x="340" y="240" text-anchor="middle" font-size="8.5" fill="#141413">例：官方文档 vs</text>
  <text x="340" y="254" text-anchor="middle" font-size="8.5" fill="#141413">第三方博客说法不一</text>

  <!-- Resolution hint -->
  <rect x="255" y="265" width="170" height="28" rx="5" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="1.2"/>
  <text x="340" y="282" text-anchor="middle" font-size="8.5" fill="#788C5D" font-weight="600" font-family="ui-monospace, monospace">Source-Priority 策略</text>

  <!-- === Panel 3: 粒度冲突 === -->
  <rect x="460" y="60" width="200" height="270" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="460" y="60" width="200" height="32" rx="8" fill="#D97757"/>
  <rect x="460" y="76" width="200" height="16" fill="#D97757"/>
  <text x="560" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">粒度冲突</text>

  <!-- Coarse fact -->
  <rect x="475" y="100" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="485" y="114" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">粗粒度</text>
  <text x="485" y="128" font-size="9" fill="#141413">"Python 有 GIL"</text>

  <!-- VS divider -->
  <text x="560" y="150" text-anchor="middle" font-size="10" fill="#87867F" font-weight="600">VS</text>

  <!-- Fine-grained facts -->
  <rect x="475" y="158" width="170" height="70" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="485" y="172" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">细粒度</text>
  <text x="485" y="185" font-size="8.5" fill="#141413">• Python 有 GIL（默认）</text>
  <text x="485" y="198" font-size="8.5" fill="#141413">• 3.12+ 可通过 PEP 703 禁用</text>
  <text x="485" y="211" font-size="8.5" fill="#141413">• 禁用后多线程性能提升显著</text>

  <!-- Context tag hint -->
  <rect x="475" y="238" width="170" height="28" rx="5" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="1.2"/>
  <text x="560" y="255" text-anchor="middle" font-size="8.5" fill="#788C5D" font-weight="600" font-family="ui-monospace, monospace">按 context_tags 选版本</text>

  <!-- Example note -->
  <text x="560" y="280" text-anchor="middle" font-size="8.5" fill="#87867F">例：不同 Python 版本</text>
  <text x="560" y="294" text-anchor="middle" font-size="8" fill="#87867F">需要不同粒度的知识</text>
  <text x="560" y="308" text-anchor="middle" font-size="8" fill="#87867F">→ 多版本共存</text>
</svg>