<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" width="100%">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="620" height="420" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="24" y="36" font-size="15" font-weight="700" fill="#141413">企业 AI 成熟度五阶段模型</text>
  <text x="24" y="54" font-size="10" fill="#87867F">Enterprise AI Maturity Model: Five Stages</text>

  <!-- Stage 5: Culture Transformation (top) -->
  <rect x="24" y="72" width="572" height="54" fill="#788C5D" opacity="0.85" rx="6"/>
  <rect x="24" y="72" width="572" height="54" fill="none" stroke="#788C5D" stroke-width="1.5" rx="6"/>
  <text x="44" y="92" font-size="11" font-weight="700" fill="#FAF9F5">阶段 5 · 文化重塑</text>
  <text x="150" y="92" font-size="10" fill="#E3DACC">Culture Transformation</text>
  <text x="44" y="109" font-size="8.5" fill="#FAF9F5">持续学习 · 实验容忍失败 · 混合决策模式 · AI成为默认运作方式</text>
  <text x="520" y="96" font-size="8.5" fill="#E3DACC">3-5年+</text>

  <!-- Connector 5-4 -->
  <line x1="310" y1="126" x2="310" y2="138" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="306,138 310,145 314,138" fill="#D1CFC5"/>

  <!-- Stage 4: Organizational Restructuring -->
  <rect x="24" y="138" width="572" height="54" fill="#141413" opacity="0.9" rx="6"/>
  <rect x="24" y="138" width="572" height="54" fill="none" stroke="#141413" stroke-width="1.5" rx="6"/>
  <text x="44" y="158" font-size="11" font-weight="700" fill="#FAF9F5">阶段 4 · 组织重构</text>
  <text x="160" y="158" font-size="10" fill="#D1CFC5">Organizational Restructuring</text>
  <text x="44" y="175" font-size="8.5" fill="#D1CFC5">AI产品经理 · 跨职能团队 · 决策权下放 · AI赋能中心</text>
  <text x="520" y="162" font-size="8.5" fill="#87867F">2-3年</text>

  <!-- Connector 4-3 -->
  <line x1="310" y1="192" x2="310" y2="204" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="306,204 310,211 314,204" fill="#D1CFC5"/>

  <!-- Stage 3: Capability Embedding -->
  <rect x="24" y="204" width="572" height="54" fill="#D97757" opacity="0.80" rx="6"/>
  <rect x="24" y="204" width="572" height="54" fill="none" stroke="#D97757" stroke-width="1.5" rx="6"/>
  <text x="44" y="224" font-size="11" font-weight="700" fill="#FAF9F5">阶段 3 · 能力嵌入</text>
  <text x="158" y="224" font-size="10" fill="#E3DACC">Capability Embedding</text>
  <text x="44" y="241" font-size="8.5" fill="#FAF9F5">AI成为标准工作流 · 绩效评估含AI协作维度 · 团队结构调整</text>
  <text x="520" y="228" font-size="8.5" fill="#E3DACC">1-2年</text>

  <!-- Connector 3-2 -->
  <line x1="310" y1="258" x2="310" y2="270" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="306,270 310,277 314,270" fill="#D1CFC5"/>

  <!-- Stage 2: Process Piloting -->
  <rect x="24" y="270" width="572" height="54" fill="#D1CFC5" rx="6"/>
  <rect x="24" y="270" width="572" height="54" fill="none" stroke="#D1CFC5" stroke-width="1.5" rx="6"/>
  <text x="44" y="290" font-size="11" font-weight="700" fill="#141413">阶段 2 · 流程试点</text>
  <text x="158" y="290" font-size="10" fill="#87867F">Process Piloting</text>
  <text x="44" y="307" font-size="8.5" fill="#141413">客服自动回复 · 会议纪要生成 · 代码审查辅助 · 试点成功但难规模化</text>
  <text x="520" y="294" font-size="8.5" fill="#87867F">6-18月</text>

  <!-- Connector 2-1 -->
  <line x1="310" y1="324" x2="310" y2="336" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="306,336 310,343 314,336" fill="#D1CFC5"/>

  <!-- Stage 1: Tool Experimentation (bottom) -->
  <rect x="24" y="336" width="572" height="54" fill="#E3DACC" rx="6"/>
  <rect x="24" y="336" width="572" height="54" fill="none" stroke="#D1CFC5" stroke-width="1.5" rx="6"/>
  <text x="44" y="356" font-size="11" font-weight="700" fill="#141413">阶段 1 · 工具实验</text>
  <text x="158" y="356" font-size="10" fill="#87867F">Tool Experimentation</text>
  <text x="44" y="373" font-size="8.5" fill="#87867F">个人/小团队自发使用AI · 缺乏统一策略 · 数据泄露风险</text>
  <text x="520" y="360" font-size="8.5" fill="#87867F">0-6月</text>

  <!-- Bottom note -->
  <rect x="24" y="402" width="572" height="1" fill="#D1CFC5"/>
  <text x="24" y="416" font-size="8.5" fill="#87867F">大多数企业停留在阶段2（试点漂亮但无法规模化）。</text>
  <text x="370" y="416" font-size="8.5" fill="#D97757">突破关键：开始触及组织变革核心——绩效评估、权力分配。</text>
</svg>
