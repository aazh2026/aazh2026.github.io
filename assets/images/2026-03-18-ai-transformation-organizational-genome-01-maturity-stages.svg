<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420"><defs><style>text{font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif}</style></defs><rect width="620" height="420" fill="#faf9f5" rx="12"/><text x="24" y="36" fill="#141413" font-size="15" font-weight="700">企业 AI 成熟度五阶段模型</text><text x="24" y="54" fill="#87867f" font-size="10">Enterprise AI Maturity Model: Five Stages</text><rect width="572" height="54" x="24" y="72" fill="#788c5d" opacity=".85" rx="6"/><rect width="572" height="54" x="24" y="72" fill="none" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="44" y="92" fill="#faf9f5" font-size="11" font-weight="700">阶段 5 · 文化重塑</text><text x="150" y="92" fill="#e3dacc" font-size="10">Culture Transformation</text><text x="44" y="109" fill="#faf9f5" font-size="8.5">持续学习 · 实验容忍失败 · 混合决策模式 · AI成为默认运作方式</text><text x="520" y="96" fill="#e3dacc" font-size="8.5">3-5年+</text><path stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="1.5" d="M310 126v12"/><path fill="#d1cfc5" d="m306 138 4 7 4-7z"/><rect width="572" height="54" x="24" y="138" fill="#141413" opacity=".9" rx="6"/><rect width="572" height="54" x="24" y="138" fill="none" stroke="#141413" stroke-width="1.5" rx="6"/><text x="44" y="158" fill="#faf9f5" font-size="11" font-weight="700">阶段 4 · 组织重构</text><text x="160" y="158" fill="#d1cfc5" font-size="10">Organizational Restructuring</text><text x="44" y="175" fill="#d1cfc5" font-size="8.5">AI产品经理 · 跨职能团队 · 决策权下放 · AI赋能中心</text><text x="520" y="162" fill="#87867f" font-size="8.5">2-3年</text><path stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="1.5" d="M310 192v12"/><path fill="#d1cfc5" d="m306 204 4 7 4-7z"/><rect width="572" height="54" x="24" y="204" fill="#d97757" opacity=".8" rx="6"/><rect width="572" height="54" x="24" y="204" fill="none" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="44" y="224" fill="#faf9f5" font-size="11" font-weight="700">阶段 3 · 能力嵌入</text><text x="158" y="224" fill="#e3dacc" font-size="10">Capability Embedding</text><text x="44" y="241" fill="#faf9f5" font-size="8.5">AI成为标准工作流 · 绩效评估含AI协作维度 · 团队结构调整</text><text x="520" y="228" fill="#e3dacc" font-size="8.5">1-2年</text><path stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="1.5" d="M310 258v12"/><path fill="#d1cfc5" d="m306 270 4 7 4-7z"/><rect width="572" height="54" x="24" y="270" fill="#d1cfc5" rx="6"/><rect width="572" height="54" x="24" y="270" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="44" y="290" fill="#141413" font-size="11" font-weight="700">阶段 2 · 流程试点</text><text x="158" y="290" fill="#87867f" font-size="10">Process Piloting</text><text x="44" y="307" fill="#141413" font-size="8.5">客服自动回复 · 会议纪要生成 · 代码审查辅助 · 试点成功但难规模化</text><text x="520" y="294" fill="#87867f" font-size="8.5">6-18月</text><path stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="1.5" d="M310 324v12"/><path fill="#d1cfc5" d="m306 336 4 7 4-7z"/><rect width="572" height="54" x="24" y="336" fill="#e3dacc" rx="6"/><rect width="572" height="54" x="24" y="336" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="44" y="356" fill="#141413" font-size="11" font-weight="700">阶段 1 · 工具实验</text><text x="158" y="356" fill="#87867f" font-size="10">Tool Experimentation</text><text x="44" y="373" fill="#87867f" font-size="8.5">个人/小团队自发使用AI · 缺乏统一策略 · 数据泄露风险</text><text x="520" y="360" fill="#87867f" font-size="8.5">0-6月</text><path fill="#d1cfc5" d="M24 402h572v1H24z"/><text x="24" y="416" fill="#87867f" font-size="8.5">大多数企业停留在阶段2（试点漂亮但无法规模化）。</text><text x="370" y="416" fill="#d97757" font-size="8.5">突破关键：开始触及组织变革核心——绩效评估、权力分配。</text></svg>