<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>gstack 与 Skills 的层次关系</title>
  <desc>两层堆叠图：gstack（开发流程工具/Application Layer）位于 Skills（能力扩展机制/Mechanism Layer）之上，两者通过 implemented by 箭头连接</desc>

  <!-- Background -->
  <rect width="680" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">gstack 与 Skills 的层次关系</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/21</text>

  <!-- Top layer: gstack card -->
  <rect x="120" y="70" width="440" height="130" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="340" y="100" text-anchor="middle" font-size="18" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">gstack</text>
  <text x="340" y="120" text-anchor="middle" font-size="11" fill="#87867F">开发流程工具（Application Layer）</text>

  <!-- 15 command icons inside gstack card -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#141413">
    <rect x="145" y="135" width="50" height="18" rx="4" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
    <text x="170" y="147" text-anchor="middle">/office-hours</text>
    <rect x="203" y="135" width="50" height="18" rx="4" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
    <text x="228" y="147" text-anchor="middle">/plan-ceo</text>
    <rect x="261" y="135" width="50" height="18" rx="4" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
    <text x="286" y="147" text-anchor="middle">/plan-eng</text>
    <rect x="319" y="135" width="50" height="18" rx="4" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
    <text x="344" y="147" text-anchor="middle">/review</text>
    <rect x="377" y="135" width="50" height="18" rx="4" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
    <text x="402" y="147" text-anchor="middle">/qa</text>
    <rect x="435" y="135" width="50" height="18" rx="4" fill="#FEF3EE" stroke="#D97757" stroke-width="1"/>
    <text x="460" y="147" text-anchor="middle">/ship</text>
    <!-- Second row of commands -->
    <rect x="145" y="160" width="50" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
    <text x="170" y="172" text-anchor="middle">/careful</text>
    <rect x="203" y="160" width="50" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
    <text x="228" y="172" text-anchor="middle">/freeze</text>
    <rect x="261" y="160" width="50" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
    <text x="286" y="172" text-anchor="middle">/guard</text>
    <rect x="319" y="160" width="50" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
    <text x="344" y="172" text-anchor="middle">/browse</text>
    <rect x="377" y="160" width="50" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
    <text x="402" y="172" text-anchor="middle">/setup</text>
    <rect x="435" y="160" width="50" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
    <text x="460" y="172" text-anchor="middle">+7 more</text>
  </g>

  <!-- Downward arrow: implemented by -->
  <line x1="340" y1="210" x2="340" y2="235" stroke="#D97757" stroke-width="2"/>
  <polygon points="340,245 334,233 346,233" fill="#D97757"/>
  <text x="340" y="230" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">implemented by</text>

  <!-- Bottom layer: Skills card -->
  <rect x="120" y="250" width="440" height="100" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="340" y="280" text-anchor="middle" font-size="18" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Skills</text>
  <text x="340" y="300" text-anchor="middle" font-size="11" fill="#87867F">能力扩展机制（Mechanism Layer）</text>

  <!-- Skill component icons inside card -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#141413">
    <rect x="155" y="312" width="56" height="18" rx="4" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
    <text x="183" y="324" text-anchor="middle">scripts/</text>
    <rect x="219" y="312" width="56" height="18" rx="4" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
    <text x="247" y="324" text-anchor="middle">assets/</text>
    <rect x="283" y="312" width="56" height="18" rx="4" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
    <text x="311" y="324" text-anchor="middle">data/</text>
    <rect x="347" y="312" width="56" height="18" rx="4" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
    <text x="375" y="324" text-anchor="middle">config.json</text>
    <rect x="411" y="312" width="56" height="18" rx="4" fill="#F2F5EE" stroke="#788C5D" stroke-width="1"/>
    <text x="439" y="324" text-anchor="middle">Hooks/</text>
  </g>

  <!-- Source line -->
  <text x="340" y="368" text-anchor="middle" font-size="9" fill="#D1CFC5" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/21</text>
</svg>
