<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 820 500"><defs><marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#87867f" d="M0 0v6l8-3z"/></marker></defs><path fill="#faf9f5" d="M0 0h820v500H0z"/><text x="410" y="36" fill="#141413" font-size="18" font-weight="bold" letter-spacing=".5" text-anchor="middle">代码水印的三重境界：从可见注释到隐形指纹</text><path stroke="#d1cfc5" d="M60 50h700"/><rect width="720" height="130" x="50" y="340" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><rect width="720" height="36" x="50" y="340" fill="#d97757" rx="10"/><path fill="#d97757" d="M50 362h720v14H50z"/><text x="410" y="363" fill="#faf9f5" font-size="13" font-weight="bold" text-anchor="middle">第一层：文本水印（Textual Watermark）</text><text x="80" y="400" fill="#141413" font-size="11" font-weight="bold">实现方式</text><text x="80" y="418" fill="#141413" font-size="10">在注释、变量名、代码结构中嵌入可见标识</text><text x="320" y="400" fill="#141413" font-size="11" font-weight="bold">示例</text><rect width="260" height="44" x="320" y="408" fill="#141413" rx="4"/><text x="330" y="424" fill="#e3dacc" font-size="9"># AI-GEN-COMPANY-X-2025Q1</text><text x="330" y="438" fill="#e3dacc" font-size="9">total_sum = sum(...) # LINEAR-AGG-V1</text><text x="600" y="400" fill="#788c5d" font-size="11" font-weight="bold">✓ 优点</text><text x="600" y="418" fill="#788c5d" font-size="10">简单、可验证</text><text x="600" y="436" fill="#d97757" font-size="11" font-weight="bold">✗ 缺点</text><text x="600" y="454" fill="#d97757" font-size="10">容易被删除或修改</text><rect width="600" height="130" x="110" y="195" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><rect width="600" height="36" x="110" y="195" fill="#87867f" rx="10"/><path fill="#87867f" d="M110 217h600v14H110z"/><text x="410" y="218" fill="#faf9f5" font-size="13" font-weight="bold" text-anchor="middle">第二层：语法水印（Syntactic Watermark）</text><text x="140" y="255" fill="#141413" font-size="11" font-weight="bold">原理</text><text x="140" y="273" fill="#141413" font-size="10">在不改变功能的前提下，</text><text x="140" y="291" fill="#141413" font-size="10">调整代码的语法结构特征</text><text x="330" y="255" fill="#141413" font-size="11" font-weight="bold">示例</text><rect width="200" height="50" x="330" y="261" fill="#141413" rx="4"/><text x="340" y="277" fill="#e3dacc" font-size="9">result = list()  # 用 list() 而非 []</text><text x="340" y="291" fill="#e3dacc" font-size="9">if item.valid == True:  # 显式比较</text><text x="340" y="305" fill="#e3dacc" font-size="9">    result.append(item)</text><text x="550" y="255" fill="#788c5d" font-size="11" font-weight="bold">✓ 优点</text><text x="550" y="273" fill="#788c5d" font-size="10">难以删除（需重写代码）</text><text x="550" y="291" fill="#d97757" font-size="11" font-weight="bold">✗ 缺点</text><text x="550" y="309" fill="#d97757" font-size="10">可能被格式化工具破坏</text><rect width="480" height="115" x="170" y="65" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="10"/><rect width="480" height="36" x="170" y="65" fill="#788c5d" rx="10"/><path fill="#788c5d" d="M170 87h480v14H170z"/><text x="410" y="88" fill="#faf9f5" font-size="13" font-weight="bold" text-anchor="middle">第三层：语义水印（Semantic Watermark）</text><text x="200" y="120" fill="#141413" font-size="11" font-weight="bold">原理</text><text x="200" y="138" fill="#141413" font-size="10">在算法逻辑中嵌入不可见特征：</text><text x="200" y="154" fill="#87867f" font-size="10">① 特定算法实现组合 ② 数学运算微小偏差 ③ 控制流模式</text><text x="440" y="120" fill="#141413" font-size="11" font-weight="bold">示例</text><rect width="200" height="44" x="440" y="126" fill="#141413" rx="4"/><text x="450" y="142" fill="#e3dacc" font-size="9"># 微小乘数因子作为水印</text><text x="450" y="158" fill="#e3dacc" font-size="9">return sorted(items, key=lambda x:</text><text x="450" y="172" fill="#e3dacc" font-size="9">    x.priority * 1.000001)</text><path stroke="#788c5d" stroke-width="1.5" marker-end="url(#arr)" d="M410 195v-12"/><text x="440" y="188" fill="#788c5d" font-size="9">更隐蔽</text><path stroke="#d97757" stroke-width="1.5" marker-end="url(#arr)" d="M410 340v-12"/><text x="440" y="338" fill="#d97757" font-size="9">更直接</text><rect width="420" height="40" x="200" y="450" fill="#e3dacc" rx="8"/><text x="410" y="468" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">「谁控制水印，谁就控制代码的流动」</text><text x="410" y="483" fill="#87867f" font-size="10" text-anchor="middle">在代码即权力的时代，控制指纹就是控制未来</text></svg>