<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="500" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#141413" letter-spacing="0.5">代码水印的三重境界：从可见注释到隐形指纹</text>
  <line x1="60" y1="50" x2="760" y2="50" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Layer 1: Textual (bottom, widest) -->
  <rect x="50" y="340" width="720" height="130" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="50" y="340" width="720" height="36" rx="10" fill="#D97757"/>
  <rect x="50" y="362" width="720" height="14" fill="#D97757"/>
  <text x="410" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="#FAF9F5">第一层：文本水印（Textual Watermark）</text>

  <text x="80" y="400" font-size="11" font-weight="bold" fill="#141413">实现方式</text>
  <text x="80" y="418" font-size="10" fill="#141413">在注释、变量名、代码结构中嵌入可见标识</text>

  <text x="320" y="400" font-size="11" font-weight="bold" fill="#141413">示例</text>
  <rect x="320" y="408" width="260" height="44" rx="4" fill="#141413"/>
  <text x="330" y="424" font-size="9" fill="#E3DACC"># AI-GEN-COMPANY-X-2025Q1</text>
  <text x="330" y="438" font-size="9" fill="#E3DACC">total_sum = sum(...) # LINEAR-AGG-V1</text>

  <text x="600" y="400" font-size="11" font-weight="bold" fill="#788C5D">✓ 优点</text>
  <text x="600" y="418" font-size="10" fill="#788C5D">简单、可验证</text>
  <text x="600" y="436" font-size="11" font-weight="bold" fill="#D97757">✗ 缺点</text>
  <text x="600" y="454" font-size="10" fill="#D97757">容易被删除或修改</text>

  <!-- Layer 2: Syntactic (middle) -->
  <rect x="110" y="195" width="600" height="130" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="110" y="195" width="600" height="36" rx="10" fill="#87867F"/>
  <rect x="110" y="217" width="600" height="14" fill="#87867F"/>
  <text x="410" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#FAF9F5">第二层：语法水印（Syntactic Watermark）</text>

  <text x="140" y="255" font-size="11" font-weight="bold" fill="#141413">原理</text>
  <text x="140" y="273" font-size="10" fill="#141413">在不改变功能的前提下，</text>
  <text x="140" y="291" font-size="10" fill="#141413">调整代码的语法结构特征</text>

  <text x="330" y="255" font-size="11" font-weight="bold" fill="#141413">示例</text>
  <rect x="330" y="261" width="200" height="50" rx="4" fill="#141413"/>
  <text x="340" y="277" font-size="9" fill="#E3DACC">result = list()  # 用 list() 而非 []</text>
  <text x="340" y="291" font-size="9" fill="#E3DACC">if item.valid == True:  # 显式比较</text>
  <text x="340" y="305" font-size="9" fill="#E3DACC">    result.append(item)</text>

  <text x="550" y="255" font-size="11" font-weight="bold" fill="#788C5D">✓ 优点</text>
  <text x="550" y="273" font-size="10" fill="#788C5D">难以删除（需重写代码）</text>
  <text x="550" y="291" font-size="11" font-weight="bold" fill="#D97757">✗ 缺点</text>
  <text x="550" y="309" font-size="10" fill="#D97757">可能被格式化工具破坏</text>

  <!-- Layer 3: Semantic (top, most robust) -->
  <rect x="170" y="65" width="480" height="115" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="170" y="65" width="480" height="36" rx="10" fill="#788C5D"/>
  <rect x="170" y="87" width="480" height="14" fill="#788C5D"/>
  <text x="410" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#FAF9F5">第三层：语义水印（Semantic Watermark）</text>

  <text x="200" y="120" font-size="11" font-weight="bold" fill="#141413">原理</text>
  <text x="200" y="138" font-size="10" fill="#141413">在算法逻辑中嵌入不可见特征：</text>
  <text x="200" y="154" font-size="10" fill="#87867F">① 特定算法实现组合 ② 数学运算微小偏差 ③ 控制流模式</text>

  <text x="440" y="120" font-size="11" font-weight="bold" fill="#141413">示例</text>
  <rect x="440" y="126" width="200" height="44" rx="4" fill="#141413"/>
  <text x="450" y="142" font-size="9" fill="#E3DACC"># 微小乘数因子作为水印</text>
  <text x="450" y="158" font-size="9" fill="#E3DACC">return sorted(items, key=lambda x:</text>
  <text x="450" y="172" font-size="9" fill="#E3DACC">    x.priority * 1.000001)</text>

  <!-- Upward arrow from layer 2 to layer 3 -->
  <line x1="410" y1="195" x2="410" y2="183" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="188" font-size="9" fill="#788C5D">更隐蔽</text>

  <!-- Downward arrow from layer 2 to layer 1 -->
  <line x1="410" y1="340" x2="410" y2="328" stroke="#D97757" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="338" font-size="9" fill="#D97757">更直接</text>

  <!-- Bottom note -->
  <rect x="200" y="450" width="420" height="40" rx="8" fill="#E3DACC"/>
  <text x="410" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#141413">「谁控制水印，谁就控制代码的流动」</text>
  <text x="410" y="483" text-anchor="middle" font-size="10" fill="#87867F">在代码即权力的时代，控制指纹就是控制未来</text>
</svg>