<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-family: system-ui, sans-serif; }
      .text-sub { fill: #87867F; font-family: system-ui, sans-serif; }
      .text-accent { fill: #D97757; font-family: system-ui, sans-serif; font-weight: 600; }
      .text-olive { fill: #788C5D; font-family: system-ui, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" class="bg"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" class="text-main" font-size="17" font-weight="700">代码水印的三重境界</text>
  <text x="450" y="56" text-anchor="middle" class="text-sub" font-size="12">Three Layers of Code Watermarking — From Visible to Invisible</text>

  <!-- Connecting arrow line -->
  <line x1="450" y1="100" x2="450" y2="540" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ============ LAYER 1: Textual Watermark ============ -->
  <circle cx="450" cy="110" r="26" fill="#D97757"/>
  <text x="450" y="115" text-anchor="middle" fill="#FAF9F5" font-size="14" font-weight="700" font-family="system-ui, sans-serif">1</text>

  <rect x="30" y="155" width="840" height="110" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="30" y="155" width="840" height="30" rx="10" fill="#D97757"/>
  <rect x="30" y="170" width="840" height="15" fill="#D97757"/>
  <text x="50" y="175" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">第一层：文本水印 (Textual Watermark)</text>
  <text x="840" y="175" text-anchor="end" fill="#FAF9F5" font-size="11" font-family="system-ui, sans-serif">⚠ 易删除</text>

  <!-- Code block -->
  <rect x="50" y="198" width="370" height="58" rx="4" fill="#141413"/>
  <text x="65" y="216" fill="#D97757" font-family="monospace" font-size="10"># AI-GEN-COMPANY-X-2025Q1</text>
  <text x="65" y="230" fill="#E3DACC" font-family="monospace" font-size="10">def calculate_total(items):</text>
  <text x="65" y="244" fill="#D1CFC5" font-family="monospace" font-size="10">  total_sum = sum(...)</text>

  <!-- Description -->
  <text x="435" y="215" class="text-main" font-size="11" font-weight="600">原理：在注释、变量名中嵌入标识</text>
  <text x="435" y="233" class="text-sub" font-size="11">✓ 简单、可验证</text>
  <text x="435" y="250" class="text-accent" font-size="11">✗ 容易被删除或修改</text>

  <!-- ============ LAYER 2: Syntactic Watermark ============ -->
  <circle cx="450" cy="290" r="26" fill="#788C5D"/>
  <text x="450" y="295" text-anchor="middle" fill="#FAF9F5" font-size="14" font-weight="700" font-family="system-ui, sans-serif">2</text>

  <rect x="30" y="335" width="840" height="110" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="30" y="335" width="840" height="30" rx="10" fill="#788C5D"/>
  <rect x="30" y="350" width="840" height="15" fill="#788C5D"/>
  <text x="50" y="355" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">第二层：语法水印 (Syntactic Watermark)</text>
  <text x="840" y="355" text-anchor="end" fill="#FAF9F5" font-size="11" font-family="system-ui, sans-serif">⚠ 格式敏感</text>

  <!-- Code block -->
  <rect x="50" y="378" width="370" height="58" rx="4" fill="#141413"/>
  <text x="65" y="396" fill="#788C5D" font-family="monospace" font-size="10"># 无水印</text>
  <text x="65" y="410" fill="#D1CFC5" font-family="monospace" font-size="10">result = []</text>
  <text x="65" y="424" fill="#E3DACC" font-family="monospace" font-size="10"># 有水印: list() / == True / continue</text>

  <!-- Description -->
  <text x="435" y="395" class="text-main" font-size="11" font-weight="600">原理：特定代码风格偏好组合（AI模型有signature）</text>
  <text x="435" y="413" class="text-sub" font-size="11">✓ 需重写代码才能删除</text>
  <text x="435" y="430" class="text-accent" font-size="11">✗ 可能被代码格式化工具破坏</text>

  <!-- ============ LAYER 3: Semantic Watermark ============ -->
  <circle cx="450" cy="470" r="26" fill="#141413"/>
  <text x="450" y="475" text-anchor="middle" fill="#FAF9F5" font-size="14" font-weight="700" font-family="system-ui, sans-serif">3</text>

  <rect x="30" y="515" width="840" height="110" rx="10" fill="#FAF9F5" stroke="#141413" stroke-width="1.5"/>
  <rect x="30" y="515" width="840" height="30" rx="10" fill="#141413"/>
  <rect x="30" y="530" width="840" height="15" fill="#141413"/>
  <text x="50" y="535" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">第三层：语义水印 (Semantic Watermark)</text>
  <text x="840" y="535" text-anchor="end" fill="#FAF9F5" font-size="11" font-family="system-ui, sans-serif">✓ 极难发现和删除</text>

  <!-- Code block -->
  <rect x="50" y="558" width="370" height="58" rx="4" fill="#141413"/>
  <text x="65" y="576" fill="#D97757" font-family="monospace" font-size="10"># 特定算法组合 + 微小数学偏差</text>
  <text x="65" y="590" fill="#E3DACC" font-family="monospace" font-size="10">items = quicksort(..) + mergesort(..)</text>
  <text x="65" y="604" fill="#D1CFC5" font-family="monospace" font-size="10">key=lambda x: x.priority * 1.000001</text>

  <!-- Description -->
  <text x="435" y="575" class="text-main" font-size="11" font-weight="600">原理：算法选择 + 数学运算微小偏差 + 控制流模式</text>
  <text x="435" y="593" class="text-olive" font-size="11">✓ 极其难以发现和删除</text>
  <text x="435" y="610" class="text-sub" font-size="11">✗ 可能影响性能，需精心设计</text>

  <!-- Bottom label -->
  <text x="450" y="22" text-anchor="middle" class="text-sub" font-size="10">隐蔽性递增 →</text>
</svg>
