<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 380"><path fill="#faf9f5" d="M0 0h680v380H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">API 厚度光谱</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">薄API vs 厚API — 护城河的分水岭</text><path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="1.5" d="M340 60v290"/><rect width="300" height="28" x="20" y="58" fill="#c4624a" rx="6"/><text x="170" y="77" fill="#fff" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">薄 API — Thin API</text><rect width="300" height="56" x="20" y="96" fill="#fff" stroke="#c4624a" stroke-width="1.5" rx="6"/><text x="36" y="116" fill="#c4624a" font-size="12" font-weight="600">OpenAI API</text><text x="36" y="132" fill="#87867f" font-size="9.5">模型能力 / 计算服务</text><rect width="64" height="18" x="240" y="106" fill="#f5d5cc" rx="9"/><text x="272" y="119" fill="#c4624a" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">易替代</text><rect width="300" height="56" x="20" y="160" fill="#fff" stroke="#c4624a" stroke-width="1.5" rx="6"/><text x="36" y="180" fill="#c4624a" font-size="12" font-weight="600">天气 API</text><text x="36" y="196" fill="#87867f" font-size="9.5">天气数据 / 数据源可替换</text><rect width="64" height="18" x="240" y="170" fill="#f5d5cc" rx="9"/><text x="272" y="183" fill="#c4624a" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">易替代</text><rect width="300" height="56" x="20" y="224" fill="#fff" stroke="#c4624a" stroke-width="1.5" rx="6"/><text x="36" y="244" fill="#c4624a" font-size="12" font-weight="600">短信 API</text><text x="36" y="260" fill="#87867f" font-size="9.5">仅发送通道 / 无附加价值</text><rect width="64" height="18" x="240" y="234" fill="#f5d5cc" rx="9"/><text x="272" y="247" fill="#c4624a" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">易替代</text><rect width="300" height="60" x="20" y="290" fill="#faf0ed" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="170" y="310" fill="#c4624a" font-size="10" font-weight="600" text-anchor="middle">护城河: ❌ 几乎没有</text><text x="170" y="328" fill="#87867f" font-size="9.5" text-anchor="middle">无数据积累 · 无网络效应 · 深度嵌入</text><text x="170" y="343" fill="#87867f" font-size="9.5" text-anchor="middle">切换成本低 · 可被价格战碾压</text><rect width="300" height="28" x="360" y="58" fill="#788c5d" rx="6"/><text x="510" y="77" fill="#fff" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">厚 API — Thick API</text><rect width="300" height="56" x="360" y="96" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="376" y="116" fill="#788c5d" font-size="12" font-weight="600">Stripe API</text><text x="376" y="132" fill="#87867f" font-size="9.5">支付 + 风控 + 合规 + 商户网络</text><rect width="64" height="18" x="580" y="106" fill="#d4e4c8" rx="9"/><text x="612" y="119" fill="#4a6b35" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">强护城河</text><rect width="300" height="56" x="360" y="160" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="376" y="180" fill="#788c5d" font-size="12" font-weight="600">Salesforce API</text><text x="376" y="196" fill="#87867f" font-size="9.5">数据操作 + 业务流程 + AppExchange 生态</text><rect width="64" height="18" x="580" y="170" fill="#d4e4c8" rx="9"/><text x="612" y="183" fill="#4a6b35" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">强护城河</text><rect width="300" height="56" x="360" y="224" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="376" y="244" fill="#788c5d" font-size="12" font-weight="600">Snowflake API</text><text x="376" y="260" fill="#87867f" font-size="9.5">查询 + 数据共享网络 + 行业生态</text><rect width="64" height="18" x="580" y="234" fill="#d4e4c8" rx="9"/><text x="612" y="247" fill="#4a6b35" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">强护城河</text><rect width="300" height="60" x="360" y="290" fill="#f0f4eb" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="510" y="310" fill="#4a6b35" font-size="10" font-weight="600" text-anchor="middle">护城河: ✅ 数据飞轮 + 网络效应 + 工作流嵌入</text><text x="510" y="328" fill="#87867f" font-size="9.5" text-anchor="middle">持续数据积累 · 深度工作流集成</text><text x="510" y="343" fill="#87867f" font-size="9.5" text-anchor="middle">高切换成本 · 随时间护城河增强</text><text x="340" y="365" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">来源：产业深度洞察系列 #01 · 2025/03/16</text></svg>