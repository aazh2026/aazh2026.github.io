<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">API 厚度光谱</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">薄API vs 厚API — 护城河的分水岭</text>

  <!-- Central divider line -->
  <line x1="340" y1="60" x2="340" y2="350" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Thin API column (left) -->
  <!-- Column header -->
  <rect x="20" y="58" width="300" height="28" rx="6" fill="#C4624A"/>
  <text x="170" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">薄 API — Thin API</text>

  <!-- Thin API card 1: OpenAI -->
  <rect x="20" y="96" width="300" height="56" rx="6" fill="#FFFFFF" stroke="#C4624A" stroke-width="1.5"/>
  <text x="36" y="116" font-size="12" font-weight="600" fill="#C4624A">OpenAI API</text>
  <text x="36" y="132" font-size="9.5" fill="#87867F">模型能力 / 计算服务</text>
  <rect x="240" y="106" width="64" height="18" rx="9" fill="#F5D5CC"/>
  <text x="272" y="119" text-anchor="middle" font-size="9" fill="#C4624A" font-family="ui-monospace, monospace">易替代</text>

  <!-- Thin API card 2: Weather -->
  <rect x="20" y="160" width="300" height="56" rx="6" fill="#FFFFFF" stroke="#C4624A" stroke-width="1.5"/>
  <text x="36" y="180" font-size="12" font-weight="600" fill="#C4624A">天气 API</text>
  <text x="36" y="196" font-size="9.5" fill="#87867F">天气数据 / 数据源可替换</text>
  <rect x="240" y="170" width="64" height="18" rx="9" fill="#F5D5CC"/>
  <text x="272" y="183" text-anchor="middle" font-size="9" fill="#C4624A" font-family="ui-monospace, monospace">易替代</text>

  <!-- Thin API card 3: SMS -->
  <rect x="20" y="224" width="300" height="56" rx="6" fill="#FFFFFF" stroke="#C4624A" stroke-width="1.5"/>
  <text x="36" y="244" font-size="12" font-weight="600" fill="#C4624A">短信 API</text>
  <text x="36" y="260" font-size="9.5" fill="#87867F">仅发送通道 / 无附加价值</text>
  <rect x="240" y="234" width="64" height="18" rx="9" fill="#F5D5CC"/>
  <text x="272" y="247" text-anchor="middle" font-size="9" fill="#C4624A" font-family="ui-monospace, monospace">易替代</text>

  <!-- Thin API summary bar -->
  <rect x="20" y="290" width="300" height="60" rx="6" fill="#FAF0ED" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="170" y="310" text-anchor="middle" font-size="10" fill="#C4624A" font-weight="600">护城河: ❌ 几乎没有</text>
  <text x="170" y="328" text-anchor="middle" font-size="9.5" fill="#87867F">无数据积累 · 无网络效应 · 深度嵌入</text>
  <text x="170" y="343" text-anchor="middle" font-size="9.5" fill="#87867F">切换成本低 · 可被价格战碾压</text>

  <!-- Thick API column (right) -->
  <!-- Column header -->
  <rect x="360" y="58" width="300" height="28" rx="6" fill="#788C5D"/>
  <text x="510" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">厚 API — Thick API</text>

  <!-- Thick API card 1: Stripe -->
  <rect x="360" y="96" width="300" height="56" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="376" y="116" font-size="12" font-weight="600" fill="#788C5D">Stripe API</text>
  <text x="376" y="132" font-size="9.5" fill="#87867F">支付 + 风控 + 合规 + 商户网络</text>
  <rect x="580" y="106" width="64" height="18" rx="9" fill="#D4E4C8"/>
  <text x="612" y="119" text-anchor="middle" font-size="9" fill="#4A6B35" font-family="ui-monospace, monospace">强护城河</text>

  <!-- Thick API card 2: Salesforce -->
  <rect x="360" y="160" width="300" height="56" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="376" y="180" font-size="12" font-weight="600" fill="#788C5D">Salesforce API</text>
  <text x="376" y="196" font-size="9.5" fill="#87867F">数据操作 + 业务流程 + AppExchange 生态</text>
  <rect x="580" y="170" width="64" height="18" rx="9" fill="#D4E4C8"/>
  <text x="612" y="183" text-anchor="middle" font-size="9" fill="#4A6B35" font-family="ui-monospace, monospace">强护城河</text>

  <!-- Thick API card 3: Snowflake -->
  <rect x="360" y="224" width="300" height="56" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="376" y="244" font-size="12" font-weight="600" fill="#788C5D">Snowflake API</text>
  <text x="376" y="260" font-size="9.5" fill="#87867F">查询 + 数据共享网络 + 行业生态</text>
  <rect x="580" y="234" width="64" height="18" rx="9" fill="#D4E4C8"/>
  <text x="612" y="247" text-anchor="middle" font-size="9" fill="#4A6B35" font-family="ui-monospace, monospace">强护城河</text>

  <!-- Thick API summary bar -->
  <rect x="360" y="290" width="300" height="60" rx="6" fill="#F0F4EB" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="510" y="310" text-anchor="middle" font-size="10" fill="#4A6B35" font-weight="600">护城河: ✅ 数据飞轮 + 网络效应 + 工作流嵌入</text>
  <text x="510" y="328" text-anchor="middle" font-size="9.5" fill="#87867F">持续数据积累 · 深度工作流集成</text>
  <text x="510" y="343" text-anchor="middle" font-size="9.5" fill="#87867F">高切换成本 · 随时间护城河增强</text>

  <!-- Bottom source -->
  <text x="340" y="365" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">来源：产业深度洞察系列 #01 · 2025/03/16</text>
</svg>
