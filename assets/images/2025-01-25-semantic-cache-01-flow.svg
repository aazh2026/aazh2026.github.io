<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 语义缓存工作流程 -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <text x="280" y="18" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">语义缓存工作流程</text>
  <text x="280" y="34" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/01/25</text>

  <!-- User Query -->
  <rect x="30" y="62" width="80" height="36" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="30" y="62" width="80" height="14" rx="5" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="70" y="74" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Step 1</text>
  <text x="70" y="90" text-anchor="middle" font-size="9" fill="#141413">用户查询</text>
  <rect x="102" y="74" width="12" height="12" rx="6" fill="#D97757"/>
  <text x="108" y="83" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">1</text>

  <!-- Arrow 1→2 -->
  <line x1="110" y1="80" x2="126" y2="80" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="126,76 134,80 126,84" fill="#D1CFC5"/>

  <!-- Embedding Model -->
  <rect x="134" y="62" width="80" height="36" rx="5" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="134" y="62" width="80" height="14" rx="5" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="174" y="74" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">Step 2</text>
  <text x="174" y="90" text-anchor="middle" font-size="9" fill="#141413">嵌入模型</text>
  <rect x="206" y="74" width="12" height="12" rx="6" fill="#EA580C"/>
  <text x="212" y="83" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">2</text>

  <!-- Arrow 2→3 -->
  <line x1="214" y1="80" x2="230" y2="80" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="230,76 238,80 230,84" fill="#D1CFC5"/>

  <!-- Vector Search -->
  <rect x="238" y="62" width="80" height="36" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="238" y="62" width="80" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="278" y="74" text-anchor="middle" font-size="9" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Step 3</text>
  <text x="278" y="90" text-anchor="middle" font-size="9" fill="#141413">向量检索</text>
  <rect x="310" y="74" width="12" height="12" rx="6" fill="#2563EB"/>
  <text x="316" y="83" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">3</text>

  <!-- Arrow 3→4 (decision) -->
  <line x1="318" y1="80" x2="334" y2="80" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="334,76 342,80 334,84" fill="#D1CFC5"/>

  <!-- Decision: Similarity > threshold? -->
  <rect x="342" y="52" width="90" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <rect x="342" y="52" width="90" height="16" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="387" y="65" text-anchor="middle" font-size="9" fill="#7C3AED" font-family="ui-monospace, monospace" font-weight="600">Decision</text>
  <text x="387" y="81" text-anchor="middle" font-size="9" fill="#141413">相似度</text>
  <text x="387" y="94" text-anchor="middle" font-size="8.5" fill="#141413">&gt; threshold?</text>
  <rect x="424" y="66" width="12" height="12" rx="6" fill="#7C3AED"/>
  <text x="430" y="75" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">?</text>

  <!-- YES branch (left, cache hit) -->
  <line x1="342" y1="80" x2="310" y2="130" stroke="#059669" stroke-width="1.5"/>
  <text x="320" y="112" font-size="8" fill="#059669" font-family="ui-monospace, monospace">是</text>

  <rect x="240" y="130" width="100" height="40" rx="5" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="240" y="130" width="100" height="14" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="290" y="142" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">Cache Hit ✓</text>
  <text x="290" y="158" text-anchor="middle" font-size="9" fill="#141413">返回缓存答案</text>
  <text x="290" y="170" text-anchor="middle" font-size="8" fill="#059669">节省 API 调用</text>

  <!-- NO branch (right, LLM call) -->
  <line x1="432" y1="80" x2="464" y2="80" stroke="#DC2626" stroke-width="1.5"/>
  <text x="450" y="76" font-size="8" fill="#DC2626" font-family="ui-monospace, monospace">否</text>

  <rect x="464" y="62" width="80" height="36" rx="5" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="464" y="62" width="80" height="14" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="504" y="74" text-anchor="middle" font-size="9" fill="#DC2626" font-family="ui-monospace, monospace" font-weight="600">Step 5</text>
  <text x="504" y="90" text-anchor="middle" font-size="9" fill="#141413">调用 LLM</text>

  <!-- Arrow LLM → Store -->
  <line x1="504" y1="98" x2="504" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="500,130 504,138 508,130" fill="#D1CFC5"/>

  <!-- Store in cache -->
  <rect x="464" y="138" width="80" height="32" rx="5" fill="#FFFFFF" stroke="#F97316" stroke-width="1.5"/>
  <rect x="464" y="138" width="80" height="14" rx="5" fill="#FDBA74" stroke="#F97316" stroke-width="1"/>
  <text x="504" y="150" text-anchor="middle" font-size="9" fill="#F97316" font-family="ui-monospace, monospace" font-weight="600">存入缓存</text>
  <text x="504" y="164" text-anchor="middle" font-size="8.5" fill="#141413">返回答案</text>

  <!-- Note -->
  <text x="280" y="192" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">语义缓存键 = 查询的向量表示，而非字符串本身</text>
</svg>