<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Georgia, serif">
  <defs>
    <linearGradient id="ivory-bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE4"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#ivory-bg2)"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" fill="#141413" font-weight="bold">Schema 兼容性检查层次 / Compatibility Layers</text>
  <line x1="200" y1="52" x2="760" y2="52" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Pyramid structure -->
  <!-- Layer 1: Syntax - widest at bottom -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="540" height="80" rx="8" fill="#D1CFC5" filter="url(#shadow2)"/>
    <rect x="0" y="0" width="540" height="30" rx="8" fill="#D1CFC5"/>
    <rect x="0" y="20" width="540" height="60" fill="#D1CFC5"/>
    <text x="270" y="22" text-anchor="middle" font-size="12" fill="#141413" font-weight="bold">Level 1 语法兼容 Syntax Compatibility</text>
    <text x="15" y="50" font-size="11" fill="#141413">• 字段是否存在</text>
    <text x="15" y="66" font-size="11" fill="#141413">• 类型是否匹配</text>
    <text x="270" y="50" font-size="11" fill="#141413">• 格式是否正确</text>
    <text x="270" y="66" font-size="11" fill="#141413">• 约束条件是否满足</text>
    <text x="460" y="50" font-size="10" fill="#87867F">❓ 传统工具可做</text>
  </g>

  <!-- Layer 2: Structure -->
  <g transform="translate(90, 170)">
    <rect x="0" y="0" width="480" height="80" rx="8" fill="#E3DACC" filter="url(#shadow2)"/>
    <rect x="0" y="0" width="480" height="30" rx="8" fill="#E3DACC"/>
    <rect x="0" y="20" width="480" height="60" fill="#E3DACC"/>
    <text x="240" y="22" text-anchor="middle" font-size="12" fill="#141413" font-weight="bold">Level 2 结构兼容 Structural Compatibility</text>
    <text x="15" y="50" font-size="11" fill="#141413">• 必填字段是否变化</text>
    <text x="15" y="66" font-size="11" fill="#141413">• 默认值是否变化</text>
    <text x="260" y="50" font-size="11" fill="#141413">• 字段顺序是否变化</text>
    <text x="260" y="66" font-size="11" fill="#141413">• 可选/必填语义是否变化</text>
    <text x="410" y="50" font-size="10" fill="#87867F">❓ 传统工具可做</text>
  </g>

  <!-- Layer 3: Semantic -->
  <g transform="translate(120, 260)">
    <rect x="0" y="0" width="420" height="80" rx="8" fill="#D97757" fill-opacity="0.2" stroke="#D97757" stroke-width="2" filter="url(#shadow2)"/>
    <rect x="0" y="0" width="420" height="30" rx="8" fill="#D97757" fill-opacity="0.3"/>
    <rect x="0" y="20" width="420" height="60" fill="#D97757" fill-opacity="0.15"/>
    <text x="210" y="22" text-anchor="middle" font-size="12" fill="#141413" font-weight="bold">Level 3 语义兼容 Semantic Compatibility ⚡ AI</text>
    <text x="15" y="50" font-size="11" fill="#141413">• 字段含义是否变化</text>
    <text x="15" y="66" font-size="11" fill="#141413">• 业务规则是否变化</text>
    <text x="220" y="50" font-size="11" fill="#141413">• 枚举值含义是否变化</text>
    <text x="220" y="66" font-size="11" fill="#141413">• 业务约束是否变化</text>
    <text x="355" y="50" font-size="10" fill="#D97757" font-weight="bold">✨ LLM 介入</text>
  </g>

  <!-- Layer 4: Behavioral - top -->
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="360" height="80" rx="8" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="2" filter="url(#shadow2)"/>
    <rect x="0" y="0" width="360" height="30" rx="8" fill="#788C5D" fill-opacity="0.3"/>
    <rect x="0" y="20" width="360" height="60" fill="#788C5D" fill-opacity="0.15"/>
    <text x="180" y="22" text-anchor="middle" font-size="12" fill="#141413" font-weight="bold">Level 4 行为兼容 Behavioral Compatibility ⚡ AI</text>
    <text x="15" y="50" font-size="11" fill="#141413">• 事件触发时机是否变化</text>
    <text x="15" y="66" font-size="11" fill="#141413">• 事件顺序保证是否变化</text>
    <text x="200" y="50" font-size="11" fill="#141413">• 消费端预期是否被破坏</text>
    <text x="200" y="66" font-size="11" fill="#141413">• 副作用是否超出预期</text>
    <text x="295" y="50" font-size="10" fill="#788C5D" font-weight="bold">✨ LLM 介入</text>
  </g>

  <!-- Right side: key insight callout -->
  <rect x="620" y="90" width="300" height="360" rx="12" fill="white" filter="url(#shadow2)"/>
  <rect x="620" y="90" width="300" height="40" rx="12" fill="#141413"/>
  <rect x="620" y="118" width="300" height="12" fill="#141413"/>
  <text x="770" y="115" text-anchor="middle" font-size="13" fill="white" font-weight="bold">💡 关键洞察</text>

  <text x="640" y="155" font-size="12" fill="#141413" font-weight="bold">向后兼容不只是</text>
  <text x="640" y="172" font-size="12" fill="#141413" font-weight="bold">"字段还在"，</text>
  <text x="640" y="192" font-size="12" fill="#D97757" font-weight="bold">更是"含义没变"</text>

  <line x1="640" y1="205" x2="900" y2="205" stroke="#E3DACC" stroke-width="1"/>

  <text x="640" y="225" font-size="11" fill="#87867F">AI 可以理解语义变化，</text>
  <text x="640" y="241" font-size="11" fill="#87867F">而不仅语法变化：</text>

  <text x="640" y="265" font-size="11" fill="#141413">• amount 从"订单金额"</text>
  <text x="640" y="280" font-size="11" fill="#141413">  变为"变更后金额"</text>
  <text x="640" y="298" font-size="11" fill="#141413">  → 语法兼容</text>
  <text x="640" y="314" font-size="11" fill="#D97757" font-weight="bold">  → 语义破坏！</text>

  <line x1="640" y1="328" x2="900" y2="328" stroke="#E3DACC" stroke-width="1"/>

  <text x="640" y="350" font-size="11" fill="#141413" font-weight="bold">AI 能力：</text>
  <text x="640" y="368" font-size="10" fill="#141413">• 分析文档描述变化</text>
  <text x="640" y="384" font-size="10" fill="#141413">• 提取并比对业务规则</text>
  <text x="640" y="400" font-size="10" fill="#141413">• 评估消费者影响范围</text>
  <text x="640" y="416" font-size="10" fill="#141413">• 生成迁移建议</text>

  <!-- Legend bottom -->
  <g transform="translate(60, 460)">
    <rect width="20" height="14" rx="3" fill="#D1CFC5"/>
    <text x="28" y="12" font-size="11" fill="#87867F">传统工具可检查</text>
    <rect x="160" width="20" height="14" rx="3" fill="#D97757" fill-opacity="0.3" stroke="#D97757" stroke-width="1.5"/>
    <text x="188" y="12" font-size="11" fill="#87867F">需要 AI / LLM 介入</text>
    <rect x="340" width="20" height="14" rx="3" fill="#788C5D" fill-opacity="0.3" stroke="#788C5D" stroke-width="1.5"/>
    <text x="368" y="12" font-size="11" fill="#87867F">深度 AI 分析</text>
  </g>
</svg>
