<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="ivory-bg2" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <filter id="shadow2" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <path fill="url(#ivory-bg2)" d="M0 0h960v540H0z"/>
  <text x="480" y="40" fill="#141413" font-size="20" font-weight="bold" text-anchor="middle">Schema 兼容性检查层次 / Compatibility Layers</text>
  <path stroke="#d1cfc5" d="M200 52h560"/>
  <g transform="translate(60 80)">
    <rect width="540" height="80" fill="#d1cfc5" filter="url(#shadow2)" rx="8"/>
    <rect width="540" height="30" fill="#d1cfc5" rx="8"/>
    <path fill="#d1cfc5" d="M0 20h540v60H0z"/>
    <text x="270" y="22" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">Level 1 语法兼容 Syntax Compatibility</text>
    <text x="15" y="50" fill="#141413" font-size="11">• 字段是否存在</text>
    <text x="15" y="66" fill="#141413" font-size="11">• 类型是否匹配</text>
    <text x="270" y="50" fill="#141413" font-size="11">• 格式是否正确</text>
    <text x="270" y="66" fill="#141413" font-size="11">• 约束条件是否满足</text>
    <text x="460" y="50" fill="#87867f" font-size="10">❓ 传统工具可做</text>
  </g>
  <g transform="translate(90 170)">
    <rect width="480" height="80" fill="#e3dacc" filter="url(#shadow2)" rx="8"/>
    <rect width="480" height="30" fill="#e3dacc" rx="8"/>
    <path fill="#e3dacc" d="M0 20h480v60H0z"/>
    <text x="240" y="22" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">Level 2 结构兼容 Structural Compatibility</text>
    <text x="15" y="50" fill="#141413" font-size="11">• 必填字段是否变化</text>
    <text x="15" y="66" fill="#141413" font-size="11">• 默认值是否变化</text>
    <text x="260" y="50" fill="#141413" font-size="11">• 字段顺序是否变化</text>
    <text x="260" y="66" fill="#141413" font-size="11">• 可选/必填语义是否变化</text>
    <text x="410" y="50" fill="#87867f" font-size="10">❓ 传统工具可做</text>
  </g>
  <g transform="translate(120 260)">
    <rect width="420" height="80" fill="#d97757" fill-opacity=".2" stroke="#d97757" stroke-width="2" filter="url(#shadow2)" rx="8"/>
    <rect width="420" height="30" fill="#d97757" fill-opacity=".3" rx="8"/>
    <path fill="#d97757" fill-opacity=".15" d="M0 20h420v60H0z"/>
    <text x="210" y="22" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">Level 3 语义兼容 Semantic Compatibility ⚡ AI</text>
    <text x="15" y="50" fill="#141413" font-size="11">• 字段含义是否变化</text>
    <text x="15" y="66" fill="#141413" font-size="11">• 业务规则是否变化</text>
    <text x="220" y="50" fill="#141413" font-size="11">• 枚举值含义是否变化</text>
    <text x="220" y="66" fill="#141413" font-size="11">• 业务约束是否变化</text>
    <text x="355" y="50" fill="#d97757" font-size="10" font-weight="bold">✨ LLM 介入</text>
  </g>
  <g transform="translate(150 350)">
    <rect width="360" height="80" fill="#788c5d" fill-opacity=".2" stroke="#788c5d" stroke-width="2" filter="url(#shadow2)" rx="8"/>
    <rect width="360" height="30" fill="#788c5d" fill-opacity=".3" rx="8"/>
    <path fill="#788c5d" fill-opacity=".15" d="M0 20h360v60H0z"/>
    <text x="180" y="22" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">Level 4 行为兼容 Behavioral Compatibility ⚡ AI</text>
    <text x="15" y="50" fill="#141413" font-size="11">• 事件触发时机是否变化</text>
    <text x="15" y="66" fill="#141413" font-size="11">• 事件顺序保证是否变化</text>
    <text x="200" y="50" fill="#141413" font-size="11">• 消费端预期是否被破坏</text>
    <text x="200" y="66" fill="#141413" font-size="11">• 副作用是否超出预期</text>
    <text x="295" y="50" fill="#788c5d" font-size="10" font-weight="bold">✨ LLM 介入</text>
  </g>
  <rect width="300" height="360" x="620" y="90" fill="#fff" filter="url(#shadow2)" rx="12"/>
  <rect width="300" height="40" x="620" y="90" fill="#141413" rx="12"/>
  <path fill="#141413" d="M620 118h300v12H620z"/>
  <text x="770" y="115" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">💡 关键洞察</text>
  <text x="640" y="155" fill="#141413" font-size="12" font-weight="bold">向后兼容不只是</text>
  <text x="640" y="172" fill="#141413" font-size="12" font-weight="bold">&quot;字段还在&quot;，</text>
  <text x="640" y="192" fill="#d97757" font-size="12" font-weight="bold">更是&quot;含义没变&quot;</text>
  <path stroke="#e3dacc" d="M640 205h260"/>
  <text x="640" y="225" fill="#87867f" font-size="11">AI 可以理解语义变化，</text>
  <text x="640" y="241" fill="#87867f" font-size="11">而不仅语法变化：</text>
  <text x="640" y="265" fill="#141413" font-size="11">• amount 从&quot;订单金额&quot;</text>
  <text x="640" y="280" fill="#141413" font-size="11">  变为&quot;变更后金额&quot;</text>
  <text x="640" y="298" fill="#141413" font-size="11">  → 语法兼容</text>
  <text x="640" y="314" fill="#d97757" font-size="11" font-weight="bold">  → 语义破坏！</text>
  <path stroke="#e3dacc" d="M640 328h260"/>
  <text x="640" y="350" fill="#141413" font-size="11" font-weight="bold">AI 能力：</text>
  <text x="640" y="368" fill="#141413" font-size="10">• 分析文档描述变化</text>
  <text x="640" y="384" fill="#141413" font-size="10">• 提取并比对业务规则</text>
  <text x="640" y="400" fill="#141413" font-size="10">• 评估消费者影响范围</text>
  <text x="640" y="416" fill="#141413" font-size="10">• 生成迁移建议</text>
  <g transform="translate(60 460)">
    <rect width="20" height="14" fill="#d1cfc5" rx="3"/>
    <text x="28" y="12" fill="#87867f" font-size="11">传统工具可检查</text>
    <rect width="20" height="14" x="160" fill="#d97757" fill-opacity=".3" stroke="#d97757" stroke-width="1.5" rx="3"/>
    <text x="188" y="12" fill="#87867f" font-size="11">需要 AI / LLM 介入</text>
    <rect width="20" height="14" x="340" fill="#788c5d" fill-opacity=".3" stroke="#788c5d" stroke-width="1.5" rx="3"/>
    <text x="368" y="12" fill="#87867f" font-size="11">深度 AI 分析</text>
  </g>
</svg>
