<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <marker id="arr" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#d97757" d="m0 0 10 3.5L0 7z"/>
    </marker>
    <filter id="shadow" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#d1cfc5" flood-opacity=".5" stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="800" height="320" fill="#faf9f5" rx="8"/>
  <text x="400" y="28" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">上下文的生命周期</text>
  <path fill="none" stroke="#d1cfc5" stroke-dasharray="8,4" stroke-width="2" d="M400 60c160 0 280 20 280 100S560 280 400 280s-280-40-280-120S240 60 400 60"/>
  <g transform="translate(400 80)">
    <rect width="140" height="44" x="-70" y="-22" fill="#d97757" filter="url(#shadow)" rx="8"/>
    <text y="-4" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">1. Create 创建</text>
    <text y="12" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">上下文文档编写</text>
  </g>
  <g transform="translate(580 160)">
    <rect width="120" height="44" x="-60" y="-22" fill="#788c5d" filter="url(#shadow)" rx="8"/>
    <text y="-4" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">2. Load 加载</text>
    <text y="12" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">按需读取上下文</text>
  </g>
  <g transform="translate(460 260)">
    <rect width="140" height="44" x="-70" y="-22" fill="#141413" filter="url(#shadow)" rx="8"/>
    <text y="-4" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">3. Assemble 组装</text>
    <text y="12" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">分层组装上下文</text>
  </g>
  <g transform="translate(340 260)">
    <rect width="130" height="44" x="-65" y="-22" fill="#87867f" filter="url(#shadow)" rx="8"/>
    <text y="-4" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">4. Inject 注入</text>
    <text y="12" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">传递给 AI 会话</text>
  </g>
  <g transform="translate(220 160)">
    <rect width="140" height="44" x="-70" y="-22" fill="#d97757" filter="url(#shadow)" rx="8"/>
    <text y="-4" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">5. Execute 执行</text>
    <text y="12" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">AI 消费上下文</text>
  </g>
  <g transform="translate(220 80)">
    <rect width="140" height="44" x="-70" y="-22" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
    <text y="-4" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">6. Validate 验证</text>
    <text y="12" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">输出质量验证</text>
  </g>
  <path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arr)" d="M470 80c50 0 90 30 110 60"/>
  <path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arr)" d="M580 200c0 30-40 55-80 60"/>
  <path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arr)" d="M390 260c-40 0-80-30-100-60"/>
  <path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arr)" d="M150 160c-20-30 0-70 40-80"/>
  <path fill="none" stroke="#d97757" stroke-width="1.5" marker-end="url(#arr)" d="M330 80H220"/>
</svg>
