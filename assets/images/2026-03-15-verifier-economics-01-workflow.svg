<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480"><defs><marker id="arr7" markerHeight="8" markerWidth="8" orient="auto" refX="5" refY="4"><path fill="#87867f" d="M0 0v8l8-4z"/></marker><marker id="arr8" markerHeight="8" markerWidth="8" orient="auto" refX="5" refY="4"><path fill="#788c5d" d="M0 0v8l8-4z"/></marker><linearGradient id="bg7" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient><filter id="shadow7" width="110%" height="110%" x="-5%" y="-5%"><feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="5"/></filter></defs><rect width="900" height="480" fill="url(#bg7)" rx="16"/><text x="450" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-.3" text-anchor="middle">验证器经济学：Generate vs Verify</text><path stroke="#d1cfc5" stroke-width="1.5" d="M200 56h500"/><rect width="395" height="175" x="40" y="76" fill="#faf9f5" filter="url(#shadow7)" rx="14"/><rect width="395" height="44" x="40" y="76" fill="#d97757" rx="14"/><path fill="#d97757" d="M40 104h395v16H40z"/><text x="237" y="102" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" text-anchor="middle">旧范式：直接生成</text><g transform="translate(60 135)"><rect width="130" height="65" fill="#d97757" opacity=".08" rx="10"/><text x="65" y="28" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Problem</text><text x="65" y="46" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">数学题 / 编码任务</text><path stroke="#87867f" stroke-width="2" marker-end="url(#arr7)" d="M138 32h24" opacity=".6"/><rect width="130" height="65" x="170" fill="#d97757" opacity=".15" rx="10"/><text x="235" y="28" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Agent Generate</text><text x="235" y="46" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">直接生成答案</text><path stroke="#87867f" stroke-width="2" marker-end="url(#arr7)" d="M308 32h24" opacity=".6"/><rect width="50" height="65" x="340" fill="#d97757" opacity=".25" rx="10"/><text x="365" y="38" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">50%</text></g><text x="237" y="228" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">线性增长，快速饱和</text><rect width="395" height="175" x="465" y="76" fill="#faf9f5" filter="url(#shadow7)" rx="14"/><rect width="395" height="44" x="465" y="76" fill="#788c5d" rx="14"/><path fill="#788c5d" d="M465 104h395v16H465z"/><text x="662" y="102" fill="#faf9f5" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" text-anchor="middle">新范式：生成多个 → 验证器筛选</text><g transform="translate(485 135)"><rect width="90" height="65" fill="#788c5d" opacity=".08" rx="10"/><text x="45" y="28" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Problem</text><text x="45" y="46" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">题目</text><path stroke="#87867f" stroke-width="2" marker-end="url(#arr7)" d="M98 32h20" opacity=".6"/><rect width="100" height="65" x="126" fill="#788c5d" opacity=".08" rx="10"/><text x="176" y="22" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Agent Generate</text><text x="176" y="40" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">× 100 个</text><text x="176" y="56" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">发散多样</text><path stroke="#87867f" stroke-width="2" marker-end="url(#arr7)" d="M234 32h20" opacity=".6"/><rect width="100" height="65" x="262" fill="#788c5d" opacity=".15" rx="10"/><text x="312" y="22" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Verifier</text><text x="312" y="40" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">评判每个答案</text><text x="312" y="56" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">打分类</text><path stroke="#788c5d" stroke-width="2" marker-end="url(#arr8)" d="M370 32h20" opacity=".6"/><rect width="55" height="65" x="398" fill="#788c5d" opacity=".25" rx="10"/><text x="425" y="38" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">70%</text></g><text x="662" y="228" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">超线性增长，扩展性好</text><rect width="820" height="195" x="40" y="248" fill="#faf9f5" filter="url(#shadow7)" rx="14"/><text x="60" y="276" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700">验证器设计原则</text><rect width="235" height="132" x="60" y="290" fill="#788c5d" opacity=".08" rx="10"/><text x="177" y="316" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">原则 1</text><text x="177" y="338" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">为 Agent 而非为自己设计</text><text x="177" y="360" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">最少量输出 · 标准错误格式</text><text x="177" y="378" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">预计算摘要 · 便于 grep</text><text x="177" y="396" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">避免 5000 行日志淹没 Agent</text><rect width="235" height="132" x="312" y="290" fill="#788c5d" opacity=".08" rx="10"/><text x="429" y="316" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">原则 2</text><text x="429" y="338" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">验证器的验证器</text><text x="429" y="360" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">观察 Claude 犯错的模式</text><text x="429" y="378" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">设计针对性的新测试</text><text x="429" y="396" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">持续迭代测试套件</text><rect width="235" height="132" x="564" y="290" fill="#788c5d" opacity=".08" rx="10"/><text x="681" y="316" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">原则 3</text><text x="681" y="338" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">从生成到筛选的范式转移</text><text x="681" y="360" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">不要试图一次性生成正确答案</text><text x="681" y="378" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">生成 100 个候选，验证器选最佳</text><text x="681" y="396" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">OpenAI: 50% → 70%</text><rect width="820" height="20" x="40" y="455" fill="#141413" opacity=".04" rx="10"/><text x="450" y="469" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="12" text-anchor="middle">&quot;瓶颈很快从代码生成转移到了人类 QA 容量。&quot; — OpenAI Harness</text></svg>