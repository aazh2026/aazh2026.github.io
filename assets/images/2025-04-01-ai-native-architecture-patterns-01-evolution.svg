  <text x="120" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">Monolith</text>
  <rect width="128" height="84" x="56" y="170" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
