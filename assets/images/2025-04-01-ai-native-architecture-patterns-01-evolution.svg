  <text x="560" y="103" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">2020s</text>
  <text x="560" y="136" fill="#141413" font-size="14" text-anchor="middle">AI-Native</text>
  <text x="560" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">？</text>
  <rect width="128" height="84" x="496" y="170" fill="#faf9f5" stroke="#d97757" rx="6"/>
  <text x="560" y="190" fill="#d97757" font-size="10.5" text-anchor="middle">新范式</text>
  <text x="560" y="208" fill="#87867f" font-size="10" text-anchor="middle">Context边界</text>
  <text x="560" y="222" fill="#87867f" font-size="10" text-anchor="middle">Intent对齐</text>
  <text x="560" y="236" fill="#87867f" font-size="10" text-anchor="middle">Context组织</text>
