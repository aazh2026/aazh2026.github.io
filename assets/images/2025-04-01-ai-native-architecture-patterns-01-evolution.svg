  <text x="340" y="288" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">复杂性：服务交互</text>
  <text x="560" y="288" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">复杂性：Context管理</text>
