  <text x="120" y="208" fill="#87867f" font-size="10" text-anchor="middle">精心设计</text>
  <text x="120" y="222" fill="#87867f" font-size="10" text-anchor="middle">长期规划</text>
  <text x="120" y="236" fill="#87867f" font-size="10" text-anchor="middle">代码组织</text>
  <rect width="160" height="190" x="260" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="160" height="36" x="260" y="80" fill="#d1cfc5" rx="8"/>
  <path fill="#d1cfc5" d="M260 104h160v12H260z"/>
  <text x="340" y="103" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">2010s</text>
  <text x="340" y="136" fill="#141413" font-size="14" text-anchor="middle">微服务架构</text>
  <text x="340" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">Microservices</text>
  <rect width="128" height="84" x="276" y="170" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="340" y="190" fill="#141413" font-size="10.5" text-anchor="middle">集市模式</text>
  <text x="340" y="208" fill="#87867f" font-size="10" text-anchor="middle">小团队</text>
  <text x="340" y="222" fill="#87867f" font-size="10" text-anchor="middle">独立部署</text>
  <text x="340" y="236" fill="#87867f" font-size="10" text-anchor="middle">服务拆分</text>
  <rect width="160" height="190" x="480" y="80" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <rect width="160" height="36" x="480" y="80" fill="#d97757" rx="8"/>
