<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 320">
  <title>软件架构范式演化史</title>
  <desc>
    1990年代单体架构、2010年代微服务架构、2020年代AI-Native架构的对比时间线
  </desc>
  <path fill="#faf9f5" d="M0 0h680v320H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">软件架构范式演化史</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AI-Native Engineering · 2025/04/01</text>
  <path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="2" d="M120 175h440"/>
  <path fill="#d1cfc5" d="m560 175-10-6v12z"/>
  <rect width="160" height="190" x="40" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
