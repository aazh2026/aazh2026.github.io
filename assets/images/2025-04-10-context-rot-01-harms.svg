<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Context Rot 三层危害 -->
  <rect width="560" height="240" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Context Rot 的三层危害</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/04/10</text>

  <!-- Layer 1: Outer, most visible -->
  <rect x="20" y="54" width="520" height="58" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="20" y="54" width="520" height="58" rx="8" fill="#FEF3C7" fill-opacity="0.3"/>
  <text x="44" y="76" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">第一层 · 显性危害</text>
  <text x="44" y="92" font-size="12" fill="#141413" font-weight="600">错误建议</text>
  <text x="140" y="92" font-size="10.5" fill="#87867F">AI 给出与当前代码库状态不符的建议，开发者直接看到错误</text>
  <rect x="490" y="72" width="34" height="18" rx="9" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="507" y="85" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">表面</text>

  <!-- Layer 2: Middle, hidden -->
  <rect x="40" y="122" width="480" height="58" rx="8" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="40" y="122" width="480" height="58" rx="8" fill="#FED7AA" fill-opacity="0.2"/>
  <text x="64" y="144" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">第二层 · 隐性危害</text>
  <text x="64" y="160" font-size="12" fill="#141413" font-weight="600">认知偏差</text>
  <text x="170" y="160" font-size="10.5" fill="#87867F">AI 的偏差渗入开发者的思考框架，形成隐性错误前提</text>
  <rect x="490" y="140" width="18" height="18" rx="9" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="499" y="153" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace">隐蔽</text>

  <!-- Layer 3: Inner, most insidious -->
  <rect x="60" y="190" width="440" height="42" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="60" y="190" width="440" height="42" rx="8" fill="#DBEAFE" fill-opacity="0.2"/>
  <text x="84" y="210" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">第三层 · 最隐蔽</text>
  <text x="84" y="224" font-size="11" fill="#141413" font-weight="600">决策路径污染</text>
  <text x="230" y="224" font-size="10" fill="#87867F">历史决策被固化，未来的决策建立在错误前提上</text>
  <rect x="470" y="204" width="18" height="14" rx="7" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="479" y="215" text-anchor="middle" font-size="8" fill="#2563EB" font-family="ui-monospace, monospace">极隐蔽</text>

  <!-- Severity arrow -->
  <text x="540" y="90" font-size="8" fill="#D97757" font-family="ui-monospace, monospace" transform="rotate(-90,540,90)">严重程度</text>
  <line x1="536" y1="68" x2="536" y2="220" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="2,2"/>
  <polygon points="536,68 532,74 540,74" fill="#D1CFC5"/>
  <polygon points="536,220 532,214 540,214" fill="#D1CFC5"/>

  <!-- Bottom callout -->
  <text x="280" y="234" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">第三层最难察觉：开发者甚至不知道自己基于错误前提在决策</text>
</svg>