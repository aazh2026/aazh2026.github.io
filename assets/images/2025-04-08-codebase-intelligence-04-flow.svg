<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="700" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Codebase Intelligence 数据流管道</text>
  <text x="350" y="40" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">代码库 → 知识系统 · 2025/04/08</text>

  <!-- Input layer (left) -->
  <rect x="20" y="60" width="100" height="80" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="70" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Raw Code</text>
  <text x="70" y="95" text-anchor="middle" font-size="9" fill="#87867F">Git repos</text>
  <text x="70" y="107" text-anchor="middle" font-size="9" fill="#87867F">Issues</text>
  <text x="70" y="119" text-anchor="middle" font-size="9" fill="#87867F">Docs</text>
  <text x="70" y="131" text-anchor="middle" font-size="9" fill="#87867F">Runtime logs</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="100" x2="138" y2="100" stroke="#D97757" stroke-width="2"/>
  <polygon points="138,96 144,100 138,104" fill="#D97757"/>

  <!-- Node 1: Code Ingestion -->
  <rect x="144" y="70" width="80" height="60" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="184" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Code</text>
  <text x="184" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Ingestion</text>
  <text x="184" y="120" text-anchor="middle" font-size="8.5" fill="#87867F">采集层</text>

  <!-- Arrow 2 -->
  <line x1="224" y1="100" x2="242" y2="100" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="242,96 248,100 242,104" fill="#D1CFC5"/>

  <!-- Node 2: AST/Parsing -->
  <rect x="248" y="70" width="80" height="60" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="288" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">AST /</text>
  <text x="288" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Parsing</text>
  <text x="288" y="120" text-anchor="middle" font-size="8.5" fill="#87867F">解析层</text>

  <!-- Arrow 3 -->
  <line x1="328" y1="100" x2="346" y2="100" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="346,96 352,100 346,104" fill="#D1CFC5"/>

  <!-- Node 3: Semantic Embedding -->
  <rect x="352" y="70" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="397" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Semantic</text>
  <text x="397" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Embedding</text>
  <text x="397" y="120" text-anchor="middle" font-size="8.5" fill="#87867F">语义层</text>

  <!-- Arrow 4 -->
  <line x1="442" y1="100" x2="460" y2="100" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="460,96 466,100 460,104" fill="#D1CFC5"/>

  <!-- Node 4: Knowledge Graph -->
  <rect x="466" y="70" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="511" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Knowledge</text>
  <text x="511" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Graph</text>
  <text x="511" y="120" text-anchor="middle" font-size="8.5" fill="#87867F">知识图谱层</text>

  <!-- Arrow 5 (curved up to Reasoning) -->
  <path d="M 556 100 Q 566 100, 566 60 Q 566 52, 580 52" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="580,52 574,46 586,46" fill="#D97757"/>
  <text x="568" y="76" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">推理</text>

  <!-- Node 5: Reasoning Engine (top right) -->
  <rect x="580" y="60" width="100" height="50" rx="6" fill="#D97757" stroke="#D97757" stroke-width="1.8"/>
  <text x="630" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Reasoning</text>
  <text x="630" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Engine</text>

  <!-- Output arrow down to Q&A -->
  <line x1="630" y1="110" x2="630" y2="140" stroke="#D97757" stroke-width="2"/>
  <polygon points="626,140 630,146 634,140" fill="#D97757"/>

  <!-- Output: Developer Q&A -->
  <rect x="560" y="148" width="140" height="50" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="630" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Developer Q&amp;A</text>
  <text x="630" y="184" text-anchor="middle" font-size="9" fill="#87867F">智能问答系统</text>

  <!-- Arrow down from Knowledge Graph to Q&A -->
  <line x1="511" y1="130" x2="511" y2="148" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="511" y1="148" x2="560" y2="148" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="556,144 560,148 556,152" fill="#D1CFC5"/>

  <!-- Semantic Embedding note: vector index -->
  <text x="397" y="145" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Vector Index</text>

  <!-- Bottom annotations row -->
  <rect x="20" y="205" width="130" height="36" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="85" y="222" text-anchor="middle" font-size="9.5" fill="#141413">Layer 1</text>
  <text x="85" y="234" text-anchor="middle" font-size="9" fill="#87867F">Code Ingestion</text>

  <rect x="164" y="205" width="130" height="36" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="229" y="222" text-anchor="middle" font-size="9.5" fill="#141413">Layer 2</text>
  <text x="229" y="234" text-anchor="middle" font-size="9" fill="#87867F">Code Parsing</text>

  <rect x="308" y="205" width="130" height="36" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="373" y="222" text-anchor="middle" font-size="9.5" fill="#141413">Layer 3</text>
  <text x="373" y="234" text-anchor="middle" font-size="9" fill="#87867F">Semantic Index</text>

  <rect x="452" y="205" width="130" height="36" rx="4" fill="#F0EEE6" stroke="#788C5D" stroke-width="1"/>
  <text x="517" y="222" text-anchor="middle" font-size="9.5" fill="#788C5D">Layer 4</text>
  <text x="517" y="234" text-anchor="middle" font-size="9" fill="#87867F">Knowledge Graph</text>

  <rect x="596" y="205" width="84" height="36" rx="4" fill="#D97757" stroke="#D97757" stroke-width="1"/>
  <text x="638" y="222" text-anchor="middle" font-size="9.5" fill="#FFFFFF">Layer 5</text>
  <text x="638" y="234" text-anchor="middle" font-size="9" fill="#F0EEE6">Reasoning</text>

  <!-- Accessibility -->
  <title>Codebase Intelligence 数据流管道</title>
  <desc>从原始代码到知识图谱的五层数据流：Raw Code → Code Ingestion → AST/Parsing → Semantic Embedding → Knowledge Graph → Reasoning Engine → Developer Q&amp;A</desc>
</svg>