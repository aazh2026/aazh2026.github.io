<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Harness Engineering 四大支柱 -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Harness Engineering 四大支柱</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/19</text>

  <!-- Eval Harness -->
  <rect x="30" y="52" width="120" height="100" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
  <text x="90" y="74" text-anchor="middle" font-size="10" fill="#D97706" font-family="ui-monospace, monospace" font-weight="600">1️⃣ Eval Harness</text>
  <text x="90" y="92" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">测试层</text>
  <text x="90" y="110" text-anchor="middle" font-size="9" fill="#87867F">把 AI 行为变成</text>
  <text x="90" y="124" text-anchor="middle" font-size="9" fill="#87867F">可测试对象</text>

  <!-- Arrow right -->
  <line x1="150" y1="102" x2="162" y2="102" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="158,98 166,102 158,106" fill="#D1CFC5"/>

  <!-- Rules Engine -->
  <rect x="168" y="52" width="120" height="100" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="228" y="74" text-anchor="middle" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">2️⃣ Rules Engine</text>
  <text x="228" y="92" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">约束层</text>
  <text x="228" y="110" text-anchor="middle" font-size="9" fill="#87867F">系统化强制</text>
  <text x="228" y="124" text-anchor="middle" font-size="9" fill="#87867F">不是建议</text>

  <!-- Arrow right -->
  <line x1="288" y1="102" x2="300" y2="102" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="296,98 304,102 296,106" fill="#D1CFC5"/>

  <!-- Hooks & Automation -->
  <rect x="306" y="52" width="120" height="100" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="366" y="74" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">3️⃣ Hooks</text>
  <text x="366" y="92" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">执行层</text>
  <text x="366" y="110" text-anchor="middle" font-size="9" fill="#87867F">无人值守的</text>
  <text x="366" y="124" text-anchor="middle" font-size="9" fill="#87867F">自动化流水线</text>

  <!-- Arrow right -->
  <line x1="426" y1="102" x2="438" y2="102" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="434,98 442,102 434,106" fill="#D1CFC5"/>

  <!-- Continuous Learning -->
  <rect x="444" y="52" width="86" height="100" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="487" y="74" text-anchor="middle" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">4️⃣ Learning</text>
  <text x="487" y="92" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">进化层</text>
  <text x="487" y="110" text-anchor="middle" font-size="9" fill="#87867F">经验自动</text>
  <text x="487" y="124" text-anchor="middle" font-size="9" fill="#87867F">沉淀为机制</text>

  <!-- AI Behavior center label -->
  <rect x="195" y="162" width="170" height="26" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="280" y="179" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">→ AI Behavior ←</text>
</svg>