<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Schema 版本的演进</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">字段结构随时间扩展与迁移</text>

  <!-- Card 1: Schema v1.0 -->
  <rect x="40" y="65" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="130" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Schema v1.0</text>
  <text x="130" y="103" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">初始版本 · 2020</text>

  <!-- Field rows for v1 -->
  <rect x="56" y="113" width="148" height="20" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="126" font-size="9" fill="#141413" font-family="ui-monospace, monospace">content</text>

  <rect x="56" y="137" width="148" height="20" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="150" font-size="9" fill="#141413" font-family="ui-monospace, monospace">source</text>

  <rect x="56" y="161" width="148" height="20" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="64" y="174" font-size="9" fill="#141413" font-family="ui-monospace, monospace">version</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="125" x2="250" y2="125" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="250,121 243,125 250,129" fill="#D1CFC5"/>
  <text x="235" y="117" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">Migration</text>
  <text x="235" y="144" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">Script v1→v2</text>

  <!-- Card 2: Schema v2.0 -->
  <rect x="260" y="65" width="180" height="120" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="350" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Schema v2.0</text>
  <text x="350" y="103" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">+valid_until · 2023.10</text>

  <!-- Field rows for v2 (inherited) -->
  <rect x="276" y="113" width="148" height="20" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="284" y="126" font-size="9" fill="#141413" font-family="ui-monospace, monospace">content</text>

  <rect x="276" y="137" width="148" height="20" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="284" y="150" font-size="9" fill="#141413" font-family="ui-monospace, monospace">source</text>

  <rect x="276" y="161" width="148" height="20" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="284" y="174" font-size="9" fill="#141413" font-family="ui-monospace, monospace">version</text>

  <!-- New field for v2: valid_until (highlighted in clay) -->
  <rect x="276" y="185" width="148" height="20" rx="4" fill="#D97757" fill-opacity="0.12" stroke="#D97757" stroke-width="1.5"/>
  <text x="284" y="198" font-size="9" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">valid_until ← NEW</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="125" x2="470" y2="125" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="470,121 463,125 470,129" fill="#D1CFC5"/>
  <text x="455" y="117" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">Migration</text>
  <text x="455" y="144" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">Script v2→v3</text>

  <!-- Card 3: Schema v3.0 -->
  <rect x="480" y="65" width="180" height="140" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="570" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Schema v3.0</text>
  <text x="570" y="103" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">+source_url, context_tags · 2024</text>

  <!-- Field rows for v3 (inherited) -->
  <rect x="496" y="113" width="148" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="504" y="125" font-size="9" fill="#141413" font-family="ui-monospace, monospace">content</text>

  <rect x="496" y="133" width="148" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="504" y="145" font-size="9" fill="#141413" font-family="ui-monospace, monospace">source</text>

  <rect x="496" y="153" width="148" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="504" y="165" font-size="9" fill="#141413" font-family="ui-monospace, monospace">version</text>

  <rect x="496" y="173" width="148" height="18" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="504" y="185" font-size="9" fill="#141413" font-family="ui-monospace, monospace">valid_until</text>

  <!-- New fields for v3: source_url and context_tags -->
  <rect x="496" y="193" width="148" height="18" rx="4" fill="#788C5D" fill-opacity="0.12" stroke="#788C5D" stroke-width="1.5"/>
  <text x="504" y="205" font-size="9" fill="#788C5D" font-weight="600" font-family="ui-monospace, monospace">source_url ← NEW</text>

  <rect x="496" y="213" width="148" height="18" rx="4" fill="#788C5D" fill-opacity="0.12" stroke="#788C5D" stroke-width="1.5"/>
  <text x="504" y="225" font-size="9" fill="#788C5D" font-weight="600" font-family="ui-monospace, monospace">context_tags ← NEW</text>

  <!-- Migration script legend (bottom) -->
  <rect x="40" y="265" width="620" height="80" rx="8" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="350" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Migration Script 示例（Flyway 风格命名）</text>

  <text x="60" y="302" font-size="9" fill="#141413" font-family="ui-monospace, monospace">V1__init_schema.sql</text>
  <text x="60" y="316" font-size="8.5" fill="#87867F">CREATE TABLE memory (content, source, version);</text>

  <text x="270" y="302" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">V2__add_valid_until.sql</text>
  <text x="270" y="316" font-size="8.5" fill="#87867F">ALTER TABLE memory ADD COLUMN valid_until TIMESTAMP;</text>

  <text x="490" y="302" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">V3__add_context.sql</text>
  <text x="490" y="316" font-size="8.5" fill="#87867F">ALTER TABLE memory ADD COLUMN source_url, context_tags;</text>
</svg>