<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"><defs><linearGradient id="bg5" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient><filter id="shadow5" width="120%" height="130%" x="-10%" y="-10%"><feDropShadow dx="0" dy="4" flood-color="#141413" flood-opacity=".12" stdDeviation="6"/></filter></defs><rect width="900" height="540" fill="url(#bg5)" rx="16"/><text x="450" y="42" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" text-anchor="middle">AI 时代效能度量范式转移</text><text x="450" y="64" fill="#87867f" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" text-anchor="middle">From Writing Speed to Changing Speed: The Paradigm Shift in Productivity Metrics</text><rect width="360" height="380" x="40" y="90" fill="#87867f" filter="url(#shadow5)" opacity=".85" rx="12"/><text x="220" y="120" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" text-anchor="middle">❌ 传统度量</text><text x="220" y="142" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" opacity=".75" text-anchor="middle">已失效</text><rect width="320" height="50" x="60" y="160" fill="#faf9f5" opacity=".15" rx="8"/><text x="80" y="185" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">LOC / 天</text><text x="300" y="185" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">代码行数越多越好</text><text x="80" y="202" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">问题：AI 可生成大量低质量代码</text><rect width="320" height="50" x="60" y="222" fill="#faf9f5" opacity=".15" rx="8"/><text x="80" y="247" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">提交次数</text><text x="300" y="247" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">提交越频繁效率越高</text><text x="80" y="264" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">问题：AI 辅助下提交过于频繁无意义</text><rect width="320" height="50" x="60" y="284" fill="#faf9f5" opacity=".15" rx="8"/><text x="80" y="309" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">功能点交付速度</text><text x="300" y="309" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">交付越快效能越高</text><text x="80" y="326" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">问题：速度快但维护成本高</text><rect width="320" height="50" x="60" y="346" fill="#faf9f5" opacity=".15" rx="8"/><text x="80" y="371" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">代码覆盖率</text><text x="300" y="371" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">覆盖率越高质量越好</text><text x="80" y="388" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">问题：AI 生成测试覆盖率高但有效性低</text><path stroke="#d97757" stroke-width="3" d="M60 280h340" opacity=".6"/><rect width="100" height="50" x="400" y="255" fill="#d97757" filter="url(#shadow5)" rx="25"/><text x="450" y="275" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" text-anchor="middle">范式</text><text x="450" y="292" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" text-anchor="middle">转移</text><rect width="360" height="380" x="500" y="90" fill="#788c5d" filter="url(#shadow5)" rx="12"/><text x="680" y="120" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" text-anchor="middle">✅ 新效能度量</text><text x="680" y="142" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" opacity=".75" text-anchor="middle">AI-Native 时代</text><rect width="320" height="50" x="520" y="160" fill="#faf9f5" opacity=".15" rx="8"/><text x="540" y="185" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">意图修改率 IMR</text><text x="760" y="185" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">需求变更时修改代码的比例</text><text x="540" y="202" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">低 IMR = 高可维护性 = 架构质量</text><rect width="320" height="50" x="520" y="222" fill="#faf9f5" opacity=".15" rx="8"/><text x="540" y="247" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">知识半衰期</text><text x="760" y="247" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">代码知识衰减的速度</text><text x="540" y="264" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">半衰期长 = 代码自解释性强</text><rect width="320" height="50" x="520" y="284" fill="#faf9f5" opacity=".15" rx="8"/><text x="540" y="309" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">重构成本预测</text><text x="760" y="309" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">AI 预测修改所需工作量</text><text x="540" y="326" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">耦合度 + 复杂度 + 测试覆盖</text><rect width="320" height="50" x="520" y="346" fill="#faf9f5" opacity=".15" rx="8"/><text x="540" y="371" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">可维护性指数</text><text x="760" y="371" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" opacity=".8" text-anchor="end">代码易于修改的程度 (0-100)</text><text x="540" y="388" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".65">可读性 · 模块化 · 可测试性 · 可文档化</text><rect width="820" height="40" x="40" y="488" fill="#d1cfc5" opacity=".4" rx="8"/><text x="60" y="512" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700">💡 核心公式：</text><text x="195" y="512" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13">AI 时代效能 = 1 / 意图修改率 × 变更成功率  |  写代码容易，改代码难</text></svg>