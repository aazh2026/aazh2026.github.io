<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Prompt 注入攻击面分类</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">威胁情报概览 · 2026/03/17</text>

  <!-- Central AI Agent node -->
  <circle cx="340" cy="200" r="52" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="340" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">AI Agent</text>
  <text x="340" y="210" text-anchor="middle" font-size="10" fill="#87867F">核心系统</text>

  <!-- Attack nodes radiating from center -->

  <!-- Node 1: 指令覆盖 (top) - clay/red = 极高 -->
  <rect x="260" y="58" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="260" y="58" width="28" height="52" rx="8" fill="#D97757"/>
  <text x="274" y="89" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">极高</text>
  <text x="346" y="82" text-anchor="middle" font-size="12" fill="#141413">指令覆盖</text>
  <text x="346" y="98" text-anchor="middle" font-size="9.5" fill="#87867F">直接覆盖系统指令</text>
  <!-- Arrow from node to center -->
  <line x1="340" y1="110" x2="340" y2="148" stroke="#D97757" stroke-width="2"/>
  <polygon points="340,148 336,140 344,140" fill="#D97757"/>

  <!-- Node 2: 上下文污染 (top-right) - yellow = 高 -->
  <rect x="468" y="100" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="468" y="100" width="28" height="52" rx="8" fill="#788C5D"/>
  <text x="482" y="131" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">高</text>
  <text x="554" y="123" text-anchor="middle" font-size="12" fill="#141413">上下文污染</text>
  <text x="554" y="139" text-anchor="middle" font-size="9.5" fill="#87867F">多轮对话逐步改变行为</text>
  <!-- Arrow -->
  <line x1="468" y1="140" x2="392" y2="168" stroke="#788C5D" stroke-width="2"/>
  <polygon points="392,168 398,162 406,170" fill="#788C5D"/>

  <!-- Node 3: 数据泄露诱导 (bottom-right) - yellow = 高 -->
  <rect x="468" y="230" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="468" y="230" width="28" height="52" rx="8" fill="#788C5D"/>
  <text x="482" y="261" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">高</text>
  <text x="554" y="253" text-anchor="middle" font-size="12" fill="#141413">数据泄露诱导</text>
  <text x="554" y="269" text-anchor="middle" font-size="9.5" fill="#87867F">诱导 AI 泄露敏感信息</text>
  <!-- Arrow -->
  <line x1="468" y1="256" x2="392" y2="232" stroke="#788C5D" stroke-width="2"/>
  <polygon points="392,232 400,236 398,244" fill="#788C5D"/>

  <!-- Node 4: 社会工程 (bottom-left) - orange = 中高 -->
  <rect x="52" y="230" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="52" y="230" width="28" height="52" rx="8" fill="#E3A873"/>
  <text x="66" y="261" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">中高</text>
  <text x="138" y="253" text-anchor="middle" font-size="12" fill="#141413">社会工程</text>
  <text x="138" y="269" text-anchor="middle" font-size="9.5" fill="#87867F">利用"帮助性"绕过限制</text>
  <!-- Arrow -->
  <line x1="212" y1="256" x2="288" y2="232" stroke="#E3A873" stroke-width="2"/>
  <polygon points="288,232 280,236 282,244" fill="#E3A873"/>

  <!-- Node 5: 间接注入 (left) - clay/red = 极高 -->
  <rect x="52" y="100" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="52" y="100" width="28" height="52" rx="8" fill="#D97757"/>
  <text x="66" y="131" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">极高</text>
  <text x="138" y="123" text-anchor="middle" font-size="12" fill="#141413">间接注入</text>
  <text x="138" y="139" text-anchor="middle" font-size="9.5" fill="#87867F">通过外部数据源注入</text>
  <!-- Arrow -->
  <line x1="212" y1="140" x2="288" y2="168" stroke="#D97757" stroke-width="2"/>
  <polygon points="288,168 280,162 282,170" fill="#D97757"/>

  <!-- Legend -->
  <text x="52" y="330" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">危险等级：</text>
  <rect x="112" y="320" width="14" height="14" rx="3" fill="#D97757"/>
  <text x="130" y="331" font-size="9.5" fill="#141413">极高</text>
  <rect x="170" y="320" width="14" height="14" rx="3" fill="#788C5D"/>
  <text x="188" y="331" font-size="9.5" fill="#141413">高</text>
  <rect x="216" y="320" width="14" height="14" rx="3" fill="#E3A873"/>
  <text x="234" y="331" font-size="9.5" fill="#141413">中高</text>
  <text x="280" y="331" font-size="9.5" fill="#87867F">箭头方向表示攻击指向 Agent</text>

  <!-- Source attribution -->
  <text x="680" y="370" text-anchor="end" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Simon Willison · OpenAI · OWASP</text>
</svg>
