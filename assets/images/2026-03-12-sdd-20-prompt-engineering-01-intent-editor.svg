<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <rect width="520" height="320" fill="#FAF9F5"/>
  <style>
    text { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; fill: #141413; }
    .box { fill: none; stroke: #141413; stroke-width: 1.5; }
    .title-bar { fill: #141413; }
    .title-text { fill: #FAF9F5; font-weight: bold; font-size: 13px; }
    .panel { fill: #E3DACC; stroke: #D1CFC5; stroke-width: 1; rx: 4; }
    .panel-header { fill: #D97757; font-weight: bold; font-size: 10px; }
    .section { fill: #FAF9F5; stroke: #D1CFC5; stroke-width: 1; rx: 4; }
    .btn { fill: #FAF9F5; stroke: #D1CFC5; stroke-width: 1; rx: 4; }
    .btn-text { font-size: 10px; fill: #141413; }
    .divider { stroke: #D1CFC5; stroke-width: 1; }
    .label { fill: #87867F; font-size: 10px; }
  </style>

  <!-- Main container -->
  <rect x="20" y="20" width="480" height="280" rx="8" class="box"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="480" height="36" rx="8" class="title-bar"/>
  <rect x="20" y="44" width="480" height="12" fill="#141413"/>
  <text x="40" y="43" class="title-text">意图编辑器（Intent Editor）</text>

  <!-- Divider -->
  <line x1="20" y1="56" x2="500" y2="56" class="divider"/>

  <!-- Three panels row -->
  <!-- Context Panel -->
  <rect x="32" y="68" width="140" height="90" rx="6" class="panel"/>
  <rect x="32" y="68" width="140" height="20" rx="6" fill="#D97757"/>
  <rect x="32" y="80" width="140" height="8" fill="#D97757"/>
  <text x="102" y="82" text-anchor="middle" fill="#FAF9F5" font-size="10" font-weight="bold">Context</text>
  <text x="42" y="104" class="panel-header">面板</text>
  <text x="42" y="120" class="label">Actor / State / Goal</text>
  <text x="42" y="136" class="label">前置条件</text>
  <text x="42" y="150" class="label">业务背景</text>

  <!-- Constraints Panel -->
  <rect x="188" y="68" width="140" height="90" rx="6" class="panel"/>
  <rect x="188" y="68" width="140" height="20" rx="6" fill="#788C5D"/>
  <rect x="188" y="80" width="140" height="8" fill="#788C5D"/>
  <text x="258" y="82" text-anchor="middle" fill="#FAF9F5" font-size="10" font-weight="bold">Constraints</text>
  <text x="198" y="104" class="panel-header">面板</text>
  <text x="198" y="120" class="label">功能 / 性能 / 安全</text>
  <text x="198" y="136" class="label">合规要求</text>
  <text x="198" y="150" class="label">依赖约束</text>

  <!-- AC Panel -->
  <rect x="344" y="68" width="140" height="90" rx="6" class="panel"/>
  <rect x="344" y="68" width="140" height="20" rx="6" fill="#141413"/>
  <rect x="344" y="80" width="140" height="8" fill="#141413"/>
  <text x="414" y="82" text-anchor="middle" fill="#FAF9F5" font-size="10" font-weight="bold">AC</text>
  <text x="354" y="104" class="panel-header">面板</text>
  <text x="354" y="120" class="label">验收标准</text>
  <text x="354" y="136" class="label">正常/异常路径</text>
  <text x="354" y="150" class="label">边界条件</text>

  <!-- Section divider -->
  <line x1="32" y1="172" x2="488" y2="172" class="divider"/>

  <!-- Auxiliary functions section -->
  <text x="42" y="192" font-weight="bold" fill="#141413">辅助功能：</text>

  <rect x="42" y="200" width="80" height="24" rx="4" class="btn"/>
  <text x="82" y="216" text-anchor="middle" class="btn-text">AI补全</text>

  <rect x="130" y="200" width="80" height="24" rx="4" class="btn"/>
  <text x="170" y="216" text-anchor="middle" class="btn-text">约束检查</text>

  <rect x="218" y="200" width="80" height="24" rx="4" class="btn"/>
  <text x="258" y="216" text-anchor="middle" class="btn-text">AC生成</text>

  <rect x="306" y="200" width="80" height="24" rx="4" class="btn"/>
  <text x="346" y="216" text-anchor="middle" class="btn-text">影响分析</text>

  <!-- Section divider -->
  <line x1="32" y1="240" x2="488" y2="240" class="divider"/>

  <!-- Output options section -->
  <text x="42" y="260" font-weight="bold" fill="#141413">输出选项：</text>

  <rect x="42" y="268" width="90" height="24" rx="4" class="btn"/>
  <text x="87" y="284" text-anchor="middle" class="btn-text">生成代码</text>

  <rect x="140" y="268" width="90" height="24" rx="4" class="btn"/>
  <text x="185" y="284" text-anchor="middle" class="btn-text">生成测试</text>

  <rect x="238" y="268" width="90" height="24" rx="4" class="btn"/>
  <text x="283" y="284" text-anchor="middle" class="btn-text">生成文档</text>

  <rect x="336" y="268" width="90" height="24" rx="4" class="btn"/>
  <text x="381" y="284" text-anchor="middle" class="btn-text">导出Prompt</text>
</svg>
