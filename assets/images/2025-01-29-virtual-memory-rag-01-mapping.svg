<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" viewBox="0 0 860 440">
  <rect width="860" height="440" fill="#faf9f5" rx="12"/>
  <text x="30" y="38" fill="#141413" font-size="15" font-weight="700">虚拟内存 → RAG 分页机制：核心概念映射</text>
  <text x="30" y="56" fill="#87867f" font-size="11">操作系统经典架构 → LLM 上下文窗口优化 — 虚拟内存是计算机科学最伟大的工程成就之一</text>
  <rect width="250" height="30" x="30" y="72" fill="#788c5d" rx="8"/>
  <text x="155" y="91" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">操作系统 (Virtual Memory)</text>
  <rect width="100" height="30" x="310" y="72" fill="#d1cfc5" rx="8"/>
  <text x="360" y="91" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">→</text>
  <rect width="390" height="30" x="440" y="72" fill="#d97757" rx="8"/>
  <text x="635" y="91" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">LLM / RAG 系统 (上下文窗口)</text>
  <rect width="250" height="34" x="30" y="114" fill="#e3dacc" rx="6"/>
  <text x="155" y="136" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">物理内存（RAM）</text>
  <rect width="100" height="34" x="310" y="114" fill="#faf9f5" rx="0"/>
  <path stroke="#d1cfc5" d="M340 118h60m-80 0v30m80-30v30m-80 0h80"/>
  <text x="360" y="140" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="114" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".15" rx="6"/>
  <text x="635" y="136" fill="#d97757" font-size="11" font-weight="700" text-anchor="middle">上下文窗口（Context Window）</text>
  <rect width="250" height="34" x="30" y="156" fill="#e3dacc" rx="6"/>
  <text x="155" y="178" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">磁盘 / SSD</text>
  <path fill="#faf9f5" d="M310 156h100v34H310z"/>
  <text x="360" y="178" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="156" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".15" rx="6"/>
  <text x="635" y="178" fill="#788c5d" font-size="11" font-weight="700" text-anchor="middle">向量数据库（Vector Store）</text>
  <rect width="250" height="34" x="30" y="198" fill="#e3dacc" rx="6"/>
  <text x="155" y="220" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">页表（Page Table）</text>
  <path fill="#faf9f5" d="M310 198h100v34H310z"/>
  <text x="360" y="220" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="198" fill="#87867f" stroke="#87867f" stroke-width="1.5" opacity=".12" rx="6"/>
  <text x="635" y="220" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">上下文映射表（Context Map）</text>
  <rect width="250" height="34" x="30" y="240" fill="#e3dacc" rx="6"/>
  <text x="155" y="262" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">页错误（Page Fault）</text>
  <path fill="#faf9f5" d="M310 240h100v34H310z"/>
  <text x="360" y="262" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="240" fill="#87867f" stroke="#87867f" stroke-width="1.5" opacity=".12" rx="6"/>
  <text x="635" y="262" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">检索触发（Retrieval Trigger）</text>
  <rect width="250" height="34" x="30" y="282" fill="#e3dacc" rx="6"/>
  <text x="155" y="304" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">页面置换算法（LRU/LFU）</text>
  <path fill="#faf9f5" d="M310 282h100v34H310z"/>
  <text x="360" y="304" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="282" fill="#87867f" stroke="#87867f" stroke-width="1.5" opacity=".12" rx="6"/>
  <text x="635" y="304" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">上下文淘汰策略（LRU / LFU）</text>
  <rect width="250" height="34" x="30" y="324" fill="#e3dacc" rx="6"/>
  <text x="155" y="346" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">工作集（Working Set）</text>
  <path fill="#faf9f5" d="M310 324h100v34H310z"/>
  <text x="360" y="346" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="324" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".15" rx="6"/>
  <text x="635" y="346" fill="#788c5d" font-size="11" font-weight="700" text-anchor="middle">活跃上下文（Active Context）</text>
  <rect width="250" height="34" x="30" y="366" fill="#e3dacc" rx="6"/>
  <text x="155" y="388" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">局部性原理（Locality）</text>
  <path fill="#faf9f5" d="M310 366h100v34H310z"/>
  <text x="360" y="388" fill="#87867f" font-size="13" text-anchor="middle">→</text>
  <rect width="390" height="34" x="440" y="366" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="635" y="388" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">预取（Prefetching） + 相邻段落加载</text>
</svg>
