  <!-- Row 5: Articles 13-15 (combined in one row with lighter styling) -->
  <rect x="30" y="346" width="110" height="42" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="30" y="346" width="110" height="20" rx="6" fill="#E3DACC"/>
  <rect x="30" y="356" width="110" height="10" fill="#E3DACC"/>
  <text x="85" y="361" text-anchor="middle" font-size="9" font-weight="700" fill="#D97757" font-family="ui-monospace, monospace">Art. 13–15</text>
  <text x="85" y="378" text-anchor="middle" font-size="10" fill="#141413">透明度/人督/安全</text>

  <rect x="150" y="346" width="450" height="42" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="375" y="372" text-anchor="middle" font-size="9.5" fill="#87867F">AI披露 · 人类监督机制 · 准确度基准 · 对抗鲁棒性测试 · 网络安全措施</text>

  <title>高风险AI系统技术要求（Article 9–15）</title>
  <desc>2x4网格图：纵轴为EU AI Act七项技术要求（Article 9-15），横轴为AI系统生命周期四阶段（设计/开发/部署/运营）</desc>
