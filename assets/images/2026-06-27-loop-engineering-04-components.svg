<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 六块积木：六组件围绕 Agent Loop，各自承担不同角色 -->
  <!-- Blog colors: ivory #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5, g500 #87867F -->

  <rect width="640" height="420" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="24" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Osmani 的六块积木</text>
  <text x="320" y="40" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">addyosmani.com · 2026/06/07</text>

  <!-- Center: Agent Loop core -->
  <circle cx="320" cy="218" r="50" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <circle cx="320" cy="218" r="38" fill="#F0EEE6" stroke="#D97757" stroke-width="1.5"/>
  <text x="320" y="212" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Agent</text>
  <text x="320" y="227" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Loop</text>
  <text x="320" y="240" text-anchor="middle" font-size="9" fill="#87867F">核心循环</text>

  <!-- Surrounding: 6 components positioned around the core -->

  <!-- Top: Automations (12 o'clock) -->
  <rect x="220" y="56" width="200" height="52" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="240" y="76" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">1 · Automations</text>
  <text x="240" y="91" font-size="10.5" fill="#141413">心跳 · 定时触发</text>
  <text x="240" y="103" font-size="9" fill="#87867F">/loop · /goal · Codex Automations</text>

  <!-- Top-right: Memory (2 o'clock) -->
  <rect x="430" y="100" width="176" height="52" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="450" y="120" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">6 · Memory</text>
  <text x="450" y="135" font-size="10.5" fill="#141413">记忆 · State 写磁盘</text>
  <text x="450" y="147" font-size="9" fill="#87867F">STATE.md · Linear · Git Issues</text>

  <!-- Right: Connectors (4 o'clock) -->
  <rect x="430" y="190" width="176" height="52" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="450" y="210" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">4 · Connectors</text>
  <text x="450" y="225" font-size="10.5" fill="#141413">连接 · MCP 协议</text>
  <text x="450" y="237" font-size="9" fill="#87867F">GitHub · Slack · DB · CI/CD</text>

  <!-- Bottom-right: Skills (6 o'clock right) -->
  <rect x="380" y="308" width="176" height="52" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="400" y="328" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">3 · Skills</text>
  <text x="400" y="343" font-size="10.5" fill="#141413">技能 · Intent Debt</text>
  <text x="400" y="355" font-size="9" fill="#87867F">SKILL.md · references/</text>

  <!-- Bottom-left: Sub-agents (6 o'clock left) -->
  <rect x="84" y="308" width="176" height="52" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="104" y="328" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">5 · Sub-agents</text>
  <text x="104" y="343" font-size="10.5" fill="#141413">子代理 · 写≠打分</text>
  <text x="104" y="355" font-size="9" fill="#87867F">独立的 verifier Agent</text>

  <!-- Left: Worktrees (8 o'clock) -->
  <rect x="34" y="190" width="176" height="52" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="54" y="210" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">2 · Worktrees</text>
  <text x="54" y="225" font-size="10.5" fill="#141413">工作树 · 并行安全</text>
  <text x="54" y="237" font-size="9" fill="#87867F">git worktree · 隔离工作区</text>

  <!-- Connecting lines from components to center -->
  <!-- Automations → Center (top) -->
  <line x1="320" y1="108" x2="320" y2="158" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,158 316,150 324,150" fill="#D97757"/>

  <!-- Memory → Center (top-right) -->
  <line x1="430" y1="130" x2="372" y2="180" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="372,180 371,172 378,176" fill="#D1CFC5"/>

  <!-- Connectors → Center (right) -->
  <line x1="430" y1="216" x2="374" y2="216" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="374,212 368,216 374,220" fill="#D1CFC5"/>

  <!-- Sub-agents → Center (bottom-left) -->
  <line x1="260" y1="326" x2="288" y2="266" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="288,266 286,274 294,270" fill="#D1CFC5"/>

  <!-- Skills → Center (bottom-right) -->
  <line x1="380" y1="326" x2="352" y2="266" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="352,266 354,274 346,270" fill="#D1CFC5"/>

  <!-- Worktrees → Center (left) -->
  <line x1="210" y1="216" x2="266" y2="216" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="266,212 272,216 266,220" fill="#D1CFC5"/>

  <!-- Core quote bottom -->
  <rect x="140" y="378" width="360" height="32" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="394" text-anchor="middle" font-size="9.5" fill="#141413" font-style="italic">"The agent forgets, the repo doesn't."</text>
  <text x="320" y="406" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">— Addy Osmani</text>
</svg>
