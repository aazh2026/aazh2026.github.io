<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="460" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="40" y="38" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#141413">范式转变：上传文件 → 带 AI 进文件夹</text>
  <text x="40" y="58" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">ChatGPT/Gemini vs Claude Code — 学术研究者交互模式对比 | 来源：Mushtaq Bilal, 4.2M views</text>

  <!-- LEFT: Browser AI (ChatGPT, Gemini) -->
  <rect x="40" y="80" width="330" height="340" rx="12" fill="#D97757" fill-opacity="0.08" stroke="#D97757" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="205" y="110" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#D97757" text-anchor="middle">浏览器 AI</text>
  <text x="205" y="130" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">ChatGPT · Claude (网页版) · Gemini</text>

  <!-- Flow diagram: User → File → AI → File -->
  <rect x="70" y="150" width="80" height="50" rx="8" fill="#D1CFC5"/>
  <text x="110" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">研究者</text>
  <text x="110" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">手动上传</text>

  <line x1="155" y1="175" x2="195" y2="175" stroke="#D97757" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="175" y="168" font-family="system-ui, sans-serif" font-size="9" fill="#D97757" text-anchor="middle">文件</text>

  <rect x="200" y="150" width="80" height="50" rx="8" fill="#D97757" fill-opacity="0.2" stroke="#D97757" stroke-width="1.5"/>
  <text x="240" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#D97757" text-anchor="middle">AI 模型</text>
  <text x="240" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">处理</text>

  <line x1="285" y1="175" x2="325" y2="175" stroke="#D97757" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="305" y="168" font-family="system-ui, sans-serif" font-size="9" fill="#D97757" text-anchor="middle">结果</text>

  <rect x="330" y="150" width="25" height="50" rx="4" fill="#D1CFC5"/>
  <text x="342" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">📄</text>

  <!-- Limitations box -->
  <rect x="60" y="220" width="290" height="120" rx="8" fill="#D97757" fill-opacity="0.08" stroke="#D97757" stroke-width="1"/>
  <text x="205" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#D97757" text-anchor="middle">局限</text>
  <text x="75" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 上下文窗口有限（少量文件）</text>
  <text x="75" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 处理后不保存工作历史</text>
  <text x="75" y="292" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 跨文件关联分析困难</text>
  <text x="75" y="309" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 无法同时创建/编辑项目文件</text>
  <text x="75" y="326" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 每次都是独立会话，无积累</text>

  <!-- File count badge -->
  <rect x="60" y="350" width="290" height="50" rx="8" fill="#D97757"/>
  <text x="205" y="373" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FAF9F5" text-anchor="middle">同时处理</text>
  <text x="205" y="392" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#FAF9F5" text-anchor="middle">~5 files</text>

  <!-- CENTER: Arrow -->
  <text x="400" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#141413" text-anchor="middle">vs</text>
  <text x="400" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">根本差异</text>
  <text x="400" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#141413" text-anchor="middle">不是技术</text>
  <text x="400" y="268" font-family="system-ui, sans-serif" font-size="11" fill="#141413" text-anchor="middle">是交互范式</text>

  <!-- RIGHT: Claude Code -->
  <rect x="430" y="80" width="330" height="340" rx="12" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="595" y="110" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#788C5D" text-anchor="middle">Claude Code</text>
  <text x="595" y="130" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">带 AI 进文件夹 · 原生工作留存</text>

  <!-- Flow: User opens folder → Claude Code inside folder -->
  <rect x="455" y="150" width="80" height="50" rx="8" fill="#D1CFC5"/>
  <text x="495" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">研究者</text>
  <text x="495" y="184" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">打开文件夹</text>

  <line x1="540" y1="175" x2="575" y2="175" stroke="#788C5D" stroke-width="2"/>
  <text x="557" y="168" font-family="system-ui, sans-serif" font-size="9" fill="#788C5D" text-anchor="middle">进入</text>

  <rect x="580" y="148" width="80" height="54" rx="8" fill="#788C5D" fill-opacity="0.2" stroke="#788C5D" stroke-width="1.5"/>
  <text x="620" y="168" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#788C5D" text-anchor="middle">Claude Code</text>
  <text x="620" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">读/写/编辑</text>
  <text x="620" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">所有文件</text>

  <!-- Auto-Memory box -->
  <rect x="445" y="220" width="300" height="70" rx="8" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="1"/>
  <text x="595" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#788C5D" text-anchor="middle">Auto-Memory 上下文积累</text>
  <text x="460" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• CLAUDE.md 定义角色/标准/写作风格</text>
  <text x="460" y="277" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 每次 session 自动读取上下文</text>
  <text x="460" y="294" font-family="system-ui, sans-serif" font-size="11" fill="#141413">• 成为真正了解你研究方向的助手</text>

  <!-- Use cases grid -->
  <rect x="445" y="300" width="140" height="55" rx="6" fill="#788C5D" fill-opacity="0.15" stroke="#788C5D" stroke-width="1"/>
  <text x="515" y="318" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">定性研究者</text>
  <text x="515" y="335" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">访谈编码 · 主题发现</text>
  <text x="515" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">矛盾观点识别</text>

  <rect x="595" y="300" width="140" height="55" rx="6" fill="#788C5D" fill-opacity="0.15" stroke="#788C5D" stroke-width="1"/>
  <text x="665" y="318" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">定量研究者</text>
  <text x="665" y="335" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">数据清洗 · 描述统计</text>
  <text x="665" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">审稿意见解释</text>

  <rect x="445" y="365" width="290" height="55" rx="6" fill="#788C5D" fill-opacity="0.15" stroke="#788C5D" stroke-width="1"/>
  <text x="590" y="383" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">系统性评价 · Literature Review</text>
  <text x="590" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">50+ 篇论文同时处理 · 按主题分类 · 反驳观点识别</text>

  <!-- File count badge -->
  <rect x="445" y="425" width="140" height="28" rx="6" fill="#788C5D"/>
  <text x="515" y="443" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">45+ files</text>

  <!-- Bottom note -->
  <rect x="40" y="428" width="720" height="26" rx="6" fill="#E3DACC" fill-opacity="0.5"/>
  <text x="400" y="445" font-family="system-ui, sans-serif" font-size="11" fill="#141413" text-anchor="middle">AI 擅长：labor intensive · time consuming · repetitive 任务 | 不擅长：创造真正算作学问的原创论点</text>
</svg>
