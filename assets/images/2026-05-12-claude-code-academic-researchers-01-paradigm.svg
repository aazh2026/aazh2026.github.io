<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <filter id="shadow" width="110%" height="120%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="800" height="460" fill="#faf9f5" rx="12"/>
  <text x="40" y="38" fill="#141413" font-family="system-ui, sans-serif" font-size="18" font-weight="700">范式转变：上传文件 → 带 AI 进文件夹</text>
  <text x="40" y="58" fill="#87867f" font-family="system-ui, sans-serif" font-size="12">ChatGPT/Gemini vs Claude Code — 学术研究者交互模式对比 | 来源：Mushtaq Bilal, 4.2M views</text>
  <rect width="330" height="340" x="40" y="80" fill="#d97757" fill-opacity=".08" stroke="#d97757" stroke-width="2.5" filter="url(#shadow)" rx="12"/>
  <text x="205" y="110" fill="#d97757" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">浏览器 AI</text>
  <text x="205" y="130" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">ChatGPT · Claude (网页版) · Gemini</text>
  <rect width="80" height="50" x="70" y="150" fill="#d1cfc5" rx="8"/>
  <text x="110" y="170" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">研究者</text>
  <text x="110" y="184" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">手动上传</text>
  <path stroke="#d97757" stroke-dasharray="5,3" stroke-width="2" d="M155 175h40"/>
  <text x="175" y="168" fill="#d97757" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">文件</text>
  <rect width="80" height="50" x="200" y="150" fill="#d97757" fill-opacity=".2" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="240" y="170" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">AI 模型</text>
  <text x="240" y="184" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">处理</text>
  <path stroke="#d97757" stroke-dasharray="5,3" stroke-width="2" d="M285 175h40"/>
  <text x="305" y="168" fill="#d97757" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">结果</text>
  <rect width="25" height="50" x="330" y="150" fill="#d1cfc5" rx="4"/>
  <text x="342" y="178" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">📄</text>
  <rect width="290" height="120" x="60" y="220" fill="#d97757" fill-opacity=".08" stroke="#d97757" rx="8"/>
  <text x="205" y="240" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">局限</text>
  <text x="75" y="258" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 上下文窗口有限（少量文件）</text>
  <text x="75" y="275" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 处理后不保存工作历史</text>
  <text x="75" y="292" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 跨文件关联分析困难</text>
  <text x="75" y="309" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 无法同时创建/编辑项目文件</text>
  <text x="75" y="326" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 每次都是独立会话，无积累</text>
  <rect width="290" height="50" x="60" y="350" fill="#d97757" rx="8"/>
  <text x="205" y="373" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">同时处理</text>
  <text x="205" y="392" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="20" font-weight="800" text-anchor="middle">~5 files</text>
  <text x="400" y="200" fill="#141413" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">vs</text>
  <text x="400" y="230" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">根本差异</text>
  <text x="400" y="250" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">不是技术</text>
  <text x="400" y="268" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">是交互范式</text>
  <rect width="330" height="340" x="430" y="80" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="2.5" filter="url(#shadow)" rx="12"/>
  <text x="595" y="110" fill="#788c5d" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">Claude Code</text>
  <text x="595" y="130" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">带 AI 进文件夹 · 原生工作留存</text>
  <rect width="80" height="50" x="455" y="150" fill="#d1cfc5" rx="8"/>
  <text x="495" y="170" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">研究者</text>
  <text x="495" y="184" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">打开文件夹</text>
  <path stroke="#788c5d" stroke-width="2" d="M540 175h35"/>
  <text x="557" y="168" fill="#788c5d" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">进入</text>
  <rect width="80" height="54" x="580" y="148" fill="#788c5d" fill-opacity=".2" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="620" y="168" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Claude Code</text>
  <text x="620" y="182" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">读/写/编辑</text>
  <text x="620" y="196" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">所有文件</text>
  <rect width="300" height="70" x="445" y="220" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" rx="8"/>
  <text x="595" y="240" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Auto-Memory 上下文积累</text>
  <text x="460" y="260" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• CLAUDE.md 定义角色/标准/写作风格</text>
  <text x="460" y="277" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 每次 session 自动读取上下文</text>
  <text x="460" y="294" fill="#141413" font-family="system-ui, sans-serif" font-size="11">• 成为真正了解你研究方向的助手</text>
  <rect width="140" height="55" x="445" y="300" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" rx="6"/>
  <text x="515" y="318" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">定性研究者</text>
  <text x="515" y="335" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">访谈编码 · 主题发现</text>
  <text x="515" y="350" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">矛盾观点识别</text>
  <rect width="140" height="55" x="595" y="300" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" rx="6"/>
  <text x="665" y="318" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">定量研究者</text>
  <text x="665" y="335" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">数据清洗 · 描述统计</text>
  <text x="665" y="350" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">审稿意见解释</text>
  <rect width="290" height="55" x="445" y="365" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" rx="6"/>
  <text x="590" y="383" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">系统性评价 · Literature Review</text>
  <text x="590" y="400" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">50+ 篇论文同时处理 · 按主题分类 · 反驳观点识别</text>
  <rect width="140" height="28" x="445" y="425" fill="#788c5d" rx="6"/>
  <text x="515" y="443" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">45+ files</text>
  <rect width="720" height="26" x="40" y="428" fill="#e3dacc" fill-opacity=".5" rx="6"/>
  <text x="400" y="445" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">AI 擅长：labor intensive · time consuming · repetitive 任务 | 不擅长：创造真正算作学问的原创论点</text>
</svg>
