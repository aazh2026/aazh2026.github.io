<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 360">
  <title>Context Layer三层模型</title>
  <desc>
    垂直堆叠的三层卡片：Layer 1项目上下文、Layer 2技术上下文、Layer 3业务上下文，显示层次依赖关系
  </desc>
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">三层Context模型</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">企业级AI系统的上下文分层</text>
  <rect width="400" height="80" x="140" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="10"/>
  <rect width="400" height="80" x="140" y="68" fill="#d97757" opacity=".06" rx="10"/>
  <text x="160" y="92" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600">Layer 3</text>
  <text x="160" y="112" fill="#141413" font-size="13">Business Context（业务上下文）</text>
  <text x="160" y="130" fill="#87867f" font-size="10">领域模型 · 业务规则 · 合规要求</text>
  <rect width="50" height="20" x="476" y="86" fill="#d97757" rx="10"/>
  <text x="501" y="100" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">最抽象</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M340 148v14"/>
  <path fill="#d1cfc5" d="m340 166-5-10h10z"/>
  <rect width="360" height="80" x="160" y="172" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="10"/>
  <rect width="360" height="80" x="160" y="172" fill="#d97757" opacity=".04" rx="10"/>
  <text x="180" y="196" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600">Layer 2</text>
  <text x="180" y="216" fill="#141413" font-size="13">Technical Context（技术上下文）</text>
  <text x="180" y="234" fill="#87867f" font-size="10">架构标准 · 技术栈 · 安全策略</text>
  <rect width="60" height="20" x="446" y="190" fill="#d1cfc5" rx="10"/>
  <text x="476" y="204" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">中层</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M340 252v14"/>
  <path fill="#d1cfc5" d="m340 270-5-10h10z"/>
  <rect width="320" height="68" x="180" y="276" fill="#fff" stroke="#d97757" stroke-width="2" rx="10"/>
  <text x="200" y="300" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600">Layer 1</text>
  <text x="200" y="318" fill="#141413" font-size="13">Project Context（项目上下文）</text>
  <text x="200" y="336" fill="#87867f" font-size="10">编码规范 · 命名约定 · 测试模式</text>
  <rect width="70" height="20" x="416" y="294" fill="#d97757" rx="10"/>
  <text x="451" y="308" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">最具体</text>
  <text x="560" y="200" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" transform="rotate(90 560 200)">依赖方向</text>
  <path fill="none" stroke="#d1cfc5" stroke-dasharray="3,2" stroke-width="1.5" d="M545 290q10-80 0-160"/>
  <path fill="#d1cfc5" d="m545 130-4 10h8z"/>
</svg>
