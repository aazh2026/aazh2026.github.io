    <text x="520" y="132" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">运行时</text>
  </g>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M120 168v20"/>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M320 168v20"/>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M520 168v20"/>
  <path stroke="#d97757" stroke-width="1.5" d="M120 188h400"/>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M520 188v12"/>
  <text x="40" y="214" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">处理层</text>
