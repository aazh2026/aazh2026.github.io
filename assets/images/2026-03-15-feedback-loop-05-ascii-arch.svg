<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" role="img" aria-label="实时反馈系统架构图">
  <title>实时反馈系统架构</title>
  <desc>AI-Native实时反馈系统的五层架构：输入层、处理层、输出层和学习层</desc>

  <defs>
    <!-- Background -->
    <rect id="bg" width="960" height="680" fill="#FAF9F5"/>

    <!-- Box styles -->
    <linearGradient id="boxHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#C0664A"/>
    </linearGradient>
    <linearGradient id="layerTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#141413"/>
      <stop offset="100%" stop-color="#2A2A28"/>
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowMain" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97757"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>

    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <use href="#bg"/>

  <!-- Outer frame -->
  <rect x="20" y="16" width="920" height="648" rx="6" fill="none" stroke="#D1CFC5" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="20" y="16" width="920" height="40" rx="6" fill="url(#boxHeader)"/>
  <rect x="20" y="46" width="920" height="10" fill="url(#boxHeader)"/>
  <text x="480" y="42" text-anchor="middle" fill="#FAF9F5" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" letter-spacing="2">实时反馈系统架构</text>

  <!-- ==================== INPUT LAYER ==================== -->
  <text x="40" y="84" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">输入层</text>

  <!-- IDE box -->
  <g filter="url(#shadow)">
    <rect x="40" y="92" width="160" height="76" rx="4" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect x="40" y="92" width="160" height="24" rx="4" fill="#E3DACC"/>
    <rect x="40" y="108" width="160" height="8" fill="#E3DACC"/>
    <text x="120" y="107" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">IDE集成</text>
    <text x="120" y="132" text-anchor="middle" fill="#87867F" font-family="system-ui, -apple-system, sans-serif" font-size="9">编码时</text>
  </g>

  <!-- Code repo box -->
  <g filter="url(#shadow)">
    <rect x="240" y="92" width="160" height="76" rx="4" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect x="240" y="92" width="160" height="24" rx="4" fill="#E3DACC"/>
    <rect x="240" y="108" width="160" height="8" fill="#E3DACC"/>
    <text x="320" y="107" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">代码托管</text>
    <text x="320" y="132" text-anchor="middle" fill="#87867F" font-family="system-ui, -apple-system, sans-serif" font-size="9">提交时</text>
  </g>

  <!-- Monitoring box -->
  <g filter="url(#shadow)">
    <rect x="440" y="92" width="160" height="76" rx="4" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect x="440" y="92" width="160" height="24" rx="4" fill="#E3DACC"/>
    <rect x="440" y="108" width="160" height="8" fill="#E3DACC"/>
    <text x="520" y="107" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">监控系统</text>
    <text x="520" y="132" text-anchor="middle" fill="#87867F" font-family="system-ui, -apple-system, sans-serif" font-size="9">运行时</text>
  </g>

  <!-- Input arrows to merge point -->
  <line x1="120" y1="168" x2="120" y2="188" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <line x1="320" y1="168" x2="320" y2="188" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>
  <line x1="520" y1="168" x2="520" y2="188" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>

  <!-- Merge lines to center -->
  <line x1="120" y1="188" x2="520" y2="188" stroke="#D97757" stroke-width="1.5"/>
  <line x1="520" y1="188" x2="520" y2="200" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>

  <!-- ==================== PROCESSING LAYER ==================== -->
  <text x="40" y="214" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">处理层</text>

  <!-- Context Engine box -->
  <g filter="url(#shadow)">
    <rect x="40" y="222" width="880" height="72" rx="4" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
    <rect x="40" y="222" width="880" height="24" rx="4" fill="#D97757" opacity="0.15"/>
    <rect x="40" y="238" width="880" height="8" fill="#D97757" opacity="0.15"/>
    <text x="480" y="237" text-anchor="middle" fill="#D97757" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Context Engine (上下文引擎)</text>
    <text x="80" y="258" fill="#87867F" font-family="monospace" font-size="9">• 代码解析和语义分析</text>
    <text x="340" y="258" fill="#87867F" font-family="monospace" font-size="9">• 项目结构和依赖分析</text>
    <text x="600" y="258" fill="#87867F" font-family="monospace" font-size="9">• 历史数据检索</text>
  </g>

  <!-- Arrow down -->
  <line x1="480" y1="294" x2="480" y2="310" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>

  <!-- Analysis Engine box -->
  <g filter="url(#shadow)">
    <rect x="40" y="314" width="880" height="72" rx="4" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <rect x="40" y="314" width="880" height="24" rx="4" fill="#788C5D" opacity="0.15"/>
    <rect x="40" y="330" width="880" height="8" fill="#788C5D" opacity="0.15"/>
    <text x="480" y="329" text-anchor="middle" fill="#788C5D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Analysis Engine (分析引擎)</text>
    <text x="80" y="350" fill="#87867F" font-family="monospace" font-size="9">• 静态分析和规则检查</text>
    <text x="340" y="350" fill="#87867F" font-family="monospace" font-size="9">• 模式识别和异常检测</text>
    <text x="600" y="350" fill="#87867F" font-family="monospace" font-size="9">• 机器学习预测</text>
  </g>

  <!-- Arrow down -->
  <line x1="480" y1="386" x2="480" y2="402" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>

  <!-- Feedback Generator box -->
  <g filter="url(#shadow)">
    <rect x="40" y="406" width="880" height="72" rx="4" fill="#FAF9F5" stroke="#87867F" stroke-width="1.5"/>
    <rect x="40" y="406" width="880" height="24" rx="4" fill="#E3DACC"/>
    <rect x="40" y="422" width="880" height="8" fill="#E3DACC"/>
    <text x="480" y="421" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Feedback Generator (反馈生成器)</text>
    <text x="80" y="442" fill="#87867F" font-family="monospace" font-size="9">• 优先级排序</text>
    <text x="340" y="442" fill="#87867F" font-family="monospace" font-size="9">• 建议生成和优化</text>
    <text x="600" y="442" fill="#87867F" font-family="monospace" font-size="9">• 个性化适配</text>
  </g>

  <!-- Arrow down -->
  <line x1="480" y1="478" x2="480" y2="494" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowMain)"/>

  <!-- ==================== OUTPUT LAYER ==================== -->
  <text x="40" y="502" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">输出层</text>

  <!-- IDE output box -->
  <g filter="url(#shadow)">
    <rect x="40" y="510" width="220" height="64" rx="4" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect x="40" y="510" width="220" height="22" rx="4" fill="#E3DACC"/>
    <rect x="40" y="524" width="220" height="8" fill="#E3DACC"/>
    <text x="150" y="523" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">IDE提示</text>
    <text x="150" y="547" text-anchor="middle" fill="#D97757" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">即时</text>
  </g>

  <!-- Report output box -->
  <g filter="url(#shadow)">
    <rect x="300" y="510" width="220" height="64" rx="4" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect x="300" y="510" width="220" height="22" rx="4" fill="#E3DACC"/>
    <rect x="300" y="524" width="220" height="8" fill="#E3DACC"/>
    <text x="410" y="523" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">报告/通知</text>
    <text x="410" y="547" text-anchor="middle" fill="#87867F" font-family="system-ui, -apple-system, sans-serif" font-size="9">聚合</text>
  </g>

  <!-- Auto action output box -->
  <g filter="url(#shadow)">
    <rect x="560" y="510" width="220" height="64" rx="4" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect x="560" y="510" width="220" height="22" rx="4" fill="#E3DACC"/>
    <rect x="560" y="524" width="220" height="8" fill="#E3DACC"/>
    <text x="670" y="523" text-anchor="middle" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">自动化动作</text>
    <text x="670" y="547" text-anchor="middle" fill="#87867F" font-family="system-ui, -apple-system, sans-serif" font-size="9">条件触发</text>
  </g>

  <!-- ==================== LEARNING LAYER ==================== -->
  <!-- Connector from output to learning -->
  <path d="M670,574 L670,592 L480,592 L480,598" stroke="#87867F" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <path d="M150,574 L150,592 L480,592" stroke="#87867F" stroke-width="1" stroke-dasharray="4,3" fill="none"/>

  <text x="40" y="606" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">学习层</text>

  <!-- Feedback Loop box -->
  <g filter="url(#shadow)">
    <rect x="40" y="614" width="880" height="46" rx="4" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
    <rect x="40" y="614" width="880" height="22" rx="4" fill="#D97757"/>
    <rect x="40" y="628" width="880" height="8" fill="#D97757"/>
    <text x="480" y="628" text-anchor="middle" fill="#FAF9F5" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">Feedback Loop (反馈学习)</text>
    <text x="80" y="650" fill="#87867F" font-family="monospace" font-size="9">• 采纳率追踪 → 优化建议质量</text>
    <text x="380" y="650" fill="#87867F" font-family="monospace" font-size="9">• 人工反馈 → 调整推荐策略</text>
    <text x="660" y="650" fill="#87867F" font-family="monospace" font-size="9">• 效果评估 → 持续改进模型</text>
  </g>

  <!-- Learning loop arrow going back to processing (curved feedback) -->
  <path d="M880,617 C920,617 920,340 880,340" stroke="#D97757" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowMain)"/>
  <text x="900" y="480" fill="#D97757" font-family="system-ui, -apple-system, sans-serif" font-size="8" transform="rotate(90,900,480)">学习反馈</text>
</svg>