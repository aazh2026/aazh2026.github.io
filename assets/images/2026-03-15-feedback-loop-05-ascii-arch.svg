    <text x="340" y="258" fill="#87867f" font-family="monospace" font-size="9">• 项目结构和依赖分析</text>
    <text x="600" y="258" fill="#87867f" font-family="monospace" font-size="9">• 历史数据检索</text>
  </g>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M480 294v16"/>
  <g filter="url(#shadow)">
    <rect width="880" height="72" x="40" y="314" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="4"/>
    <rect width="880" height="24" x="40" y="314" fill="#788c5d" opacity=".15" rx="4"/>
    <path fill="#788c5d" d="M40 330h880v8H40z" opacity=".15"/>
    <text x="480" y="329" fill="#788c5d" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Analysis Engine (分析引擎)</text>
    <text x="80" y="350" fill="#87867f" font-family="monospace" font-size="9">• 静态分析和规则检查</text>
    <text x="340" y="350" fill="#87867f" font-family="monospace" font-size="9">• 模式识别和异常检测</text>
    <text x="600" y="350" fill="#87867f" font-family="monospace" font-size="9">• 机器学习预测</text>
  </g>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M480 386v16"/>
  <g filter="url(#shadow)">
    <rect width="880" height="72" x="40" y="406" fill="#faf9f5" stroke="#87867f" stroke-width="1.5" rx="4"/>
    <rect width="880" height="24" x="40" y="406" fill="#e3dacc" rx="4"/>
    <path fill="#e3dacc" d="M40 422h880v8H40z"/>
    <text x="480" y="421" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Feedback Generator (反馈生成器)</text>
    <text x="80" y="442" fill="#87867f" font-family="monospace" font-size="9">• 优先级排序</text>
    <text x="340" y="442" fill="#87867f" font-family="monospace" font-size="9">• 建议生成和优化</text>
    <text x="600" y="442" fill="#87867f" font-family="monospace" font-size="9">• 个性化适配</text>
  </g>
  <path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowMain)" d="M480 478v16"/>
  <text x="40" y="502" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">输出层</text>
  <g filter="url(#shadow)">
    <rect width="220" height="64" x="40" y="510" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
    <rect width="220" height="22" x="40" y="510" fill="#e3dacc" rx="4"/>
    <path fill="#e3dacc" d="M40 524h220v8H40z"/>
