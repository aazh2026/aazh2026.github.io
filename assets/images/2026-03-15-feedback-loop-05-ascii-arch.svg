<svg xmlns="http://www.w3.org/2000/svg" aria-label="实时反馈系统架构图" viewBox="0 0 960 680">
  <title>实时反馈系统架构</title>
  <desc>
    AI-Native实时反馈系统的五层架构：输入层、处理层、输出层和学习层
  </desc>
  <defs>
    <linearGradient id="boxHeader" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c0664a"/>
    </linearGradient>
    <marker id="arrowMain" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#d97757" d="M0 0v6l8-3z"/>
    </marker>
    <filter id="shadow" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="2" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="3"/>
    </filter>
    <path id="bg" fill="#faf9f5" d="M0 0h960v680H0z"/>
  </defs>
  <use href="#bg"/>
  <rect width="920" height="648" x="20" y="16" fill="none" stroke="#d1cfc5" stroke-width="2" rx="6"/>
  <rect width="920" height="40" x="20" y="16" fill="url(#boxHeader)" rx="6"/>
  <path fill="url(#boxHeader)" d="M20 46h920v10H20z"/>
  <text x="480" y="42" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" letter-spacing="2" text-anchor="middle">实时反馈系统架构</text>
  <text x="40" y="84" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">输入层</text>
  <g filter="url(#shadow)">
    <rect width="160" height="76" x="40" y="92" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
    <rect width="160" height="24" x="40" y="92" fill="#e3dacc" rx="4"/>
    <path fill="#e3dacc" d="M40 108h160v8H40z"/>
    <text x="120" y="107" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">IDE集成</text>
    <text x="120" y="132" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">编码时</text>
  </g>
  <g filter="url(#shadow)">
    <rect width="160" height="76" x="240" y="92" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
    <rect width="160" height="24" x="240" y="92" fill="#e3dacc" rx="4"/>
    <path fill="#e3dacc" d="M240 108h160v8H240z"/>
