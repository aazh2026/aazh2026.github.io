    <text x="150" y="547" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" text-anchor="middle">即时</text>
  </g>
  <g filter="url(#shadow)">
    <rect width="220" height="64" x="300" y="510" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
    <rect width="220" height="22" x="300" y="510" fill="#e3dacc" rx="4"/>
    <path fill="#e3dacc" d="M300 524h220v8H300z"/>
    <text x="410" y="523" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">报告/通知</text>
    <text x="410" y="547" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">聚合</text>
  </g>
  <g filter="url(#shadow)">
    <rect width="220" height="64" x="560" y="510" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
    <rect width="220" height="22" x="560" y="510" fill="#e3dacc" rx="4"/>
    <path fill="#e3dacc" d="M560 524h220v8H560z"/>
    <text x="670" y="523" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">自动化动作</text>
    <text x="670" y="547" fill="#87867f" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">条件触发</text>
  </g>
  <path fill="none" stroke="#87867f" stroke-dasharray="4,3" d="M670 574v18H480v6m-330-24v18h330"/>
  <text x="40" y="606" fill="#141413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1">学习层</text>
  <g filter="url(#shadow)">
    <rect width="880" height="46" x="40" y="614" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="4"/>
    <rect width="880" height="22" x="40" y="614" fill="#d97757" rx="4"/>
    <path fill="#d97757" d="M40 628h880v8H40z"/>
    <text x="480" y="628" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Feedback Loop (反馈学习)</text>
    <text x="80" y="650" fill="#87867f" font-family="monospace" font-size="9">• 采纳率追踪 → 优化建议质量</text>
    <text x="380" y="650" fill="#87867f" font-family="monospace" font-size="9">• 人工反馈 → 调整推荐策略</text>
    <text x="660" y="650" fill="#87867f" font-family="monospace" font-size="9">• 效果评估 → 持续改进模型</text>
  </g>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" marker-end="url(#arrowMain)" d="M880 617c40 0 40-277 0-277"/>
  <text x="900" y="480" fill="#d97757" font-family="system-ui, -apple-system, sans-serif" font-size="8" transform="rotate(90 900 480)">学习反馈</text>
