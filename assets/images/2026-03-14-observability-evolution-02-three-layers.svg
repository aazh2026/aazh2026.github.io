<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <linearGradient id="systemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87867F"/>
      <stop offset="100%" stop-color="#5a5852"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#4f6b3a"/>
