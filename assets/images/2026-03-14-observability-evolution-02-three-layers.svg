  <!-- Arrows between layers -->
  <path d="M450 210 L450 226" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M450 348 L450 364" stroke="#D1CFC5" stroke-width="2"/>

  <!-- Key insight box -->
  <rect x="50" y="504" width="800" height="42" rx="8" fill="#D1CFC5" opacity="0.4"/>
  <text x="70" y="528" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#141413">💡 关键洞察：</text>
  <text x="195" y="528" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#141413">意图层是 AI-Native 可观测性的第三维度，解决"AI 为什么这么做"的问题</text>
