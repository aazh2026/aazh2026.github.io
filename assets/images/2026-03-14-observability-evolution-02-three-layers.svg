    <linearGradient id="intentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#b85a3d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#141413" flood-opacity="0.12"/>
