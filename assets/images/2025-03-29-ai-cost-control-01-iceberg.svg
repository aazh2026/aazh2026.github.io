<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI成本冰山模型" viewBox="0 0 800 440"><title>AI成本冰山模型</title><desc>AI成本的四层模型：Token成本（可见）、延迟成本、错误成本、维护成本（隐性但巨大）</desc><path fill="#faf9f5" d="M0 0h800v440H0z"/><path fill="#141413" d="M0 0h800v50H0z"/><text x="400" y="32" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1" text-anchor="middle">AI 成本冰山：你看到的只是冰山一角</text><path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="1.5" d="M40 200h720"/><text x="760" y="196" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">水面（可见成本）</text><text x="760" y="212" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">水下（隐性成本）</text><rect width="180" height="60" x="40" y="148" fill="#d97757" rx="8"/><text x="130" y="170" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">L1: Token 成本</text><text x="130" y="188" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">30% · 线性增长</text><rect width="180" height="60" x="40" y="210" fill="#d97757" opacity=".7" rx="8"/><text x="130" y="232" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">L2: 延迟成本</text><text x="130" y="250" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">25% · 超线性增长</text><rect width="180" height="60" x="40" y="280" fill="#d97757" opacity=".5" rx="8"/><text x="130" y="302" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">L3: 错误成本</text><text x="130" y="320" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">30% · 指数级增长</text><rect width="180" height="60" x="40" y="350" fill="#87867f" opacity=".6" rx="8"/><text x="130" y="372" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">L4: 维护成本</text><text x="130" y="390" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">15% · 隐性累积</text><g transform="translate(280 62)"><text fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700">成本失控三阶段</text><rect width="240" height="80" y="12" fill="#e3dacc" rx="8"/><rect width="240" height="28" y="12" fill="#788c5d" rx="8"/><path fill="#788c5d" d="M0 28h240v12H0z"/><text x="12" y="30" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">阶段一：蜜月期</text><text x="12" y="54" fill="#141413" font-family="system-ui, sans-serif" font-size="10">✓ 使用量稳定增长</text><text x="12" y="68" fill="#141413" font-family="system-ui, sans-serif" font-size="10">✓ 成本与使用量成正比</text><text x="12" y="82" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10">✓ 每个人都对 ROI 满意</text><rect width="240" height="80" y="102" fill="#e3dacc" rx="8"/><rect width="240" height="28" y="102" fill="#d97757" rx="8"/><path fill="#d97757" d="M0 118h240v12H0z"/><text x="12" y="120" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">阶段二：临界点</text><text x="12" y="144" fill="#141413" font-family="system-ui, sans-serif" font-size="10">⚠ 功能扩展 → Token 暴增</text><text x="12" y="158" fill="#141413" font-family="system-ui, sans-serif" font-size="10">⚠ 用户行为改变</text><text x="12" y="172" fill="#d97757" font-family="system-ui, sans-serif" font-size="10">⚠ 成本增速 &gt; 用户增速</text><rect width="240" height="80" y="192" fill="#e3dacc" rx="8"/><rect width="240" height="28" y="192" fill="#141413" rx="8"/><path fill="#141413" d="M0 208h240v12H0z"/><text x="12" y="210" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">阶段三：失控期</text><text x="12" y="234" fill="#d97757" font-family="system-ui, sans-serif" font-size="10">🔥 成本曲线几乎垂直</text><text x="12" y="248" fill="#141413" font-family="system-ui, sans-serif" font-size="10">🔥 紧急优化效果有限</text><text x="12" y="262" fill="#141413" font-family="system-ui, sans-serif" font-size="10">🔥 开始质疑 AI 策略可行性</text><rect width="240" height="120" y="284" fill="#faf9f5" stroke="#d1cfc5" rx="8"/><text x="12" y="300" fill="#141413" font-family="system-ui, sans-serif" font-size="10" font-weight="600">成本增长曲线</text><path stroke="#d1cfc5" d="M20 388h200M20 300v88"/><text x="225" y="392" fill="#87867f" font-family="system-ui, sans-serif" font-size="9">时间</text><text x="10" y="298" fill="#87867f" font-family="system-ui, sans-serif" font-size="9">$</text><path fill="none" stroke="#d97757" stroke-width="2" d="m20 380 40-5 40-10 30-25 25-45 25-40 20-45"/><text x="65" y="370" fill="#788c5d" font-family="system-ui, sans-serif" font-size="8">蜜月</text><text x="118" y="332" fill="#d97757" font-family="system-ui, sans-serif" font-size="8">临界点</text><text x="158" y="248" fill="#d97757" font-family="system-ui, sans-serif" font-size="8">失控</text></g><g transform="translate(540 62)"><text fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700">四层成本控制策略</text><rect width="236" height="68" y="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="12" y="30" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700">L1: Token 优化</text><text x="12" y="48" fill="#141413" font-family="system-ui, sans-serif" font-size="10">① 模型降级（简单任务用便宜模型）</text><text x="12" y="62" fill="#141413" font-family="system-ui, sans-serif" font-size="10">② Prompt 优化（减少 Context）</text><text x="12" y="76" fill="#141413" font-family="system-ui, sans-serif" font-size="10">③ 缓存策略（向量数据库）</text><rect width="236" height="60" y="90" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="12" y="108" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700">L2: 延迟优化</text><text x="12" y="126" fill="#141413" font-family="system-ui, sans-serif" font-size="10">① 异步处理 · 流式响应</text><text x="12" y="140" fill="#141413" font-family="system-ui, sans-serif" font-size="10">② 预计算常见场景结果</text><rect width="236" height="60" y="160" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="12" y="178" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700">L3: 错误成本控制</text><text x="12" y="196" fill="#141413" font-family="system-ui, sans-serif" font-size="10">① 置信度阈值（低置信度转人工）</text><text x="12" y="210" fill="#141413" font-family="system-ui, sans-serif" font-size="10">② 人在回路 · 高风险决策人工审核</text><rect width="236" height="60" y="230" fill="#faf9f5" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="12" y="248" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" font-weight="700">L4: 维护成本控制</text><text x="12" y="266" fill="#141413" font-family="system-ui, sans-serif" font-size="10">① Prompt 版本管理 + A/B 测试</text><text x="12" y="280" fill="#141413" font-family="system-ui, sans-serif" font-size="10">② 成本监控 + 告警阈值</text><rect width="236" height="108" y="300" fill="#e3dacc" rx="8"/><text x="12" y="318" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700">预算分配建议</text><rect width="140" height="10" x="12" y="328" fill="#d97757" rx="3"/><rect width="68" height="10" x="156" y="328" fill="#87867f" rx="3"/><text x="12" y="350" fill="#141413" font-family="system-ui, sans-serif" font-size="9">Token 费用 50%</text><text x="156" y="350" fill="#141413" font-family="system-ui, sans-serif" font-size="9">基础设施 25%</text><rect width="80" height="10" x="12" y="356" fill="#788c5d" rx="3"/><rect width="52" height="10" x="96" y="356" fill="#d1cfc5" rx="3"/><text x="12" y="378" fill="#141413" font-family="system-ui, sans-serif" font-size="9">质量保证 15%</text><text x="96" y="378" fill="#141413" font-family="system-ui, sans-serif" font-size="9">应急储备 10%</text></g></svg>