<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-label="AI成本冰山模型">
  <title>AI成本冰山模型</title>
  <desc>AI成本的四层模型：Token成本（可见）、延迟成本、错误成本、维护成本（隐性但巨大）</desc>

  <defs>
    <linearGradient id="icebergGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B55E40" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="#FAF9F5"/>
  <rect x="0" y="0" width="800" height="50" fill="#141413"/>
  <text x="400" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FAF9F5" text-anchor="middle" letter-spacing="1">AI 成本冰山：你看到的只是冰山一角</text>

  <!-- Water line -->
  <line x1="40" y1="200" x2="760" y2="200" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="760" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="end">水面（可见成本）</text>
  <text x="760" y="212" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="end">水下（隐性成本）</text>

  <!-- L1: Token cost (visible above water) -->
  <rect x="40" y="148" width="180" height="60" rx="8" fill="#D97757"/>
  <text x="130" y="170" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">L1: Token 成本</text>
  <text x="130" y="188" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">30% · 线性增长</text>

  <!-- Below water - L2 -->
  <rect x="40" y="210" width="180" height="60" rx="8" fill="#D97757" opacity="0.7"/>
  <text x="130" y="232" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">L2: 延迟成本</text>
  <text x="130" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">25% · 超线性增长</text>

  <!-- L3 - deeper -->
  <rect x="40" y="280" width="180" height="60" rx="8" fill="#D97757" opacity="0.5"/>
  <text x="130" y="302" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">L3: 错误成本</text>
  <text x="130" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">30% · 指数级增长</text>

  <!-- L4 - deepest -->
  <rect x="40" y="350" width="180" height="60" rx="8" fill="#87867F" opacity="0.6"/>
  <text x="130" y="372" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">L4: 维护成本</text>
  <text x="130" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">15% · 隐性累积</text>

  <!-- Right side: cost growth stages -->
  <g transform="translate(280, 62)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">成本失控三阶段</text>

    <!-- Stage 1: Honey period -->
    <rect x="0" y="12" width="240" height="80" rx="8" fill="#E3DACC"/>
    <rect x="0" y="12" width="240" height="28" rx="8" fill="#788C5D"/>
    <rect x="0" y="28" width="240" height="12" fill="#788C5D"/>
    <text x="12" y="30" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">阶段一：蜜月期</text>
    <text x="12" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#141413">✓ 使用量稳定增长</text>
    <text x="12" y="68" font-family="system-ui, sans-serif" font-size="10" fill="#141413">✓ 成本与使用量成正比</text>
    <text x="12" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#788C5D">✓ 每个人都对 ROI 满意</text>

    <!-- Stage 2: Critical point -->
    <rect x="0" y="102" width="240" height="80" rx="8" fill="#E3DACC"/>
    <rect x="0" y="102" width="240" height="28" rx="8" fill="#D97757"/>
    <rect x="0" y="118" width="240" height="12" fill="#D97757"/>
    <text x="12" y="120" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">阶段二：临界点</text>
    <text x="12" y="144" font-family="system-ui, sans-serif" font-size="10" fill="#141413">⚠ 功能扩展 → Token 暴增</text>
    <text x="12" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#141413">⚠ 用户行为改变</text>
    <text x="12" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#D97757">⚠ 成本增速 > 用户增速</text>

    <!-- Stage 3: Out of control -->
    <rect x="0" y="192" width="240" height="80" rx="8" fill="#E3DACC"/>
    <rect x="0" y="192" width="240" height="28" rx="8" fill="#141413"/>
    <rect x="0" y="208" width="240" height="12" fill="#141413"/>
    <text x="12" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">阶段三：失控期</text>
    <text x="12" y="234" font-family="system-ui, sans-serif" font-size="10" fill="#D97757">🔥 成本曲线几乎垂直</text>
    <text x="12" y="248" font-family="system-ui, sans-serif" font-size="10" fill="#141413">🔥 紧急优化效果有限</text>
    <text x="12" y="262" font-family="system-ui, sans-serif" font-size="10" fill="#141413">🔥 开始质疑 AI 策略可行性</text>

    <!-- Cost curve sketch -->
    <rect x="0" y="284" width="240" height="120" rx="8" fill="#FAF9F5" stroke="#D1CFC5"/>
    <text x="12" y="300" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#141413">成本增长曲线</text>
    <!-- Axes -->
    <line x1="20" y1="388" x2="220" y2="388" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="20" y1="300" x2="20" y2="388" stroke="#D1CFC5" stroke-width="1"/>
    <text x="225" y="392" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">时间</text>
    <text x="10" y="298" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">$</text>
    <!-- Curve -->
    <polyline points="20,380 60,375 100,365 130,340 155,295 180,255 200,210" stroke="#D97757" stroke-width="2" fill="none"/>
    <!-- Annotations -->
    <text x="65" y="370" font-family="system-ui, sans-serif" font-size="8" fill="#788C5D">蜜月</text>
    <text x="118" y="332" font-family="system-ui, sans-serif" font-size="8" fill="#D97757">临界点</text>
    <text x="158" y="248" font-family="system-ui, sans-serif" font-size="8" fill="#D97757">失控</text>
  </g>

  <!-- Right: Four-layer control strategy -->
  <g transform="translate(540, 62)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">四层成本控制策略</text>

    <!-- L1 control -->
    <rect x="0" y="12" width="236" height="68" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
    <text x="12" y="30" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#D97757">L1: Token 优化</text>
    <text x="12" y="48" font-family="system-ui, sans-serif" font-size="10" fill="#141413">① 模型降级（简单任务用便宜模型）</text>
    <text x="12" y="62" font-family="system-ui, sans-serif" font-size="10" fill="#141413">② Prompt 优化（减少 Context）</text>
    <text x="12" y="76" font-family="system-ui, sans-serif" font-size="10" fill="#141413">③ 缓存策略（向量数据库）</text>

    <!-- L2 control -->
    <rect x="0" y="90" width="236" height="60" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
    <text x="12" y="108" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#D97757">L2: 延迟优化</text>
    <text x="12" y="126" font-family="system-ui, sans-serif" font-size="10" fill="#141413">① 异步处理 · 流式响应</text>
    <text x="12" y="140" font-family="system-ui, sans-serif" font-size="10" fill="#141413">② 预计算常见场景结果</text>

    <!-- L3 control -->
    <rect x="0" y="160" width="236" height="60" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
    <text x="12" y="178" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#D97757">L3: 错误成本控制</text>
    <text x="12" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#141413">① 置信度阈值（低置信度转人工）</text>
    <text x="12" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#141413">② 人在回路 · 高风险决策人工审核</text>

    <!-- L4 control -->
    <rect x="0" y="230" width="236" height="60" rx="8" fill="#FAF9F5" stroke="#87867F" stroke-width="1.5"/>
    <text x="12" y="248" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#87867F">L4: 维护成本控制</text>
    <text x="12" y="266" font-family="system-ui, sans-serif" font-size="10" fill="#141413">① Prompt 版本管理 + A/B 测试</text>
    <text x="12" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#141413">② 成本监控 + 告警阈值</text>

    <!-- Budget allocation -->
    <rect x="0" y="300" width="236" height="108" rx="8" fill="#E3DACC"/>
    <text x="12" y="318" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413">预算分配建议</text>
    <rect x="12" y="328" width="140" height="10" rx="3" fill="#D97757"/>
    <rect x="156" y="328" width="68" height="10" rx="3" fill="#87867F"/>
    <text x="12" y="350" font-family="system-ui, sans-serif" font-size="9" fill="#141413">Token 费用 50%</text>
    <text x="156" y="350" font-family="system-ui, sans-serif" font-size="9" fill="#141413">基础设施 25%</text>
    <rect x="12" y="356" width="80" height="10" rx="3" fill="#788C5D"/>
    <rect x="96" y="356" width="52" height="10" rx="3" fill="#D1CFC5"/>
    <text x="12" y="378" font-family="system-ui, sans-serif" font-size="9" fill="#141413">质量保证 15%</text>
    <text x="96" y="378" font-family="system-ui, sans-serif" font-size="9" fill="#141413">应急储备 10%</text>
  </g>
</svg>