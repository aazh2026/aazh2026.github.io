<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 400">
  <title>多层级语义缓存架构</title>
  <desc>
    语义缓存的多层级架构图，对比 L1/L2/L3 缓存层与 API 调用的延迟与成本
  </desc>
  <path fill="#faf9f5" d="M0 0h680v400H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">多层级语义缓存架构</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AI-Native Engineering · 2025/01/25</text>
  <rect width="220" height="70" x="60" y="72" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <rect width="220" height="22" x="60" y="72" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M60 86h220v8H60z"/>
  <text x="75" y="87" fill="#fff" font-family="ui-monospace, monospace" font-size="10" font-weight="600">L1 Cache</text>
  <text x="75" y="103" fill="#141413" font-size="12">向量数据库（内存）</text>
  <text x="75" y="119" fill="#87867f" font-size="10.5">延迟 ~0.1ms · 容量最小</text>
  <text x="75" y="135" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">成本 ≈ $0</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M170 142v16"/>
  <path fill="#d1cfc5" d="m170 162-4-8h8z"/>
  <rect width="260" height="70" x="40" y="170" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <rect width="260" height="22" x="40" y="170" fill="#788c5d" rx="8"/>
  <path fill="#788c5d" d="M40 184h260v8H40z"/>
  <text x="55" y="185" fill="#fff" font-family="ui-monospace, monospace" font-size="10" font-weight="600">L2 Cache</text>
  <text x="55" y="201" fill="#141413" font-size="12">向量数据库（SSD）</text>
  <text x="55" y="217" fill="#87867f" font-size="10.5">延迟 ~5ms · 容量中等</text>
  <text x="55" y="233" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10">成本 ≈ $0.001/1k 查询</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M170 240v16"/>
  <path fill="#d1cfc5" d="m170 260-4-8h8z"/>
  <rect width="300" height="70" x="20" y="268" fill="#fff" stroke="#87867f" stroke-width="1.8" rx="8"/>
  <rect width="300" height="22" x="20" y="268" fill="#87867f" rx="8"/>
  <path fill="#87867f" d="M20 282h300v8H20z"/>
  <text x="35" y="283" fill="#fff" font-family="ui-monospace, monospace" font-size="10" font-weight="600">L3 Cache</text>
  <text x="35" y="299" fill="#141413" font-size="12">外部向量数据库（云存储）</text>
  <text x="35" y="315" fill="#87867f" font-size="10.5">延迟 ~50ms · 容量最大</text>
  <text x="35" y="331" fill="#87867f" font-family="ui-monospace, monospace" font-size="10">成本 ≈ $0.005/1k 查询</text>
  <rect width="220" height="160" x="420" y="148" fill="#fff" stroke="#141413" stroke-width="1.8" rx="8"/>
  <rect width="220" height="26" x="420" y="148" fill="#141413" rx="8"/>
  <path fill="#141413" d="M420 166h220v8H420z"/>
  <text x="435" y="166" fill="#fff" font-family="ui-monospace, monospace" font-size="10" font-weight="600">API Call</text>
  <text x="440" y="193" fill="#141413" font-size="12">OpenAI / Claude</text>
  <text x="440" y="213" fill="#141413" font-size="11">语义理解 + 生成</text>
  <text x="440" y="231" fill="#87867f" font-size="10.5">延迟 500–2000ms</text>
  <text x="440" y="249" fill="#d97757" font-family="ui-monospace, monospace" font-size="10">成本 $0.02/次</text>
  <text x="440" y="269" fill="#87867f" font-size="10">+ 网络往返 + Rate Limit</text>
  <text x="440" y="287" fill="#87867f" font-size="10">+ 隐私合规风险</text>
  <path stroke="#d1cfc5" stroke-dasharray="5,3" stroke-width="1.5" d="m320 107 90 63m-90 35 90-5m-90 103 90-43"/>
  <path stroke="#d97757" stroke-width="1.5" d="M170 338v27"/>
  <path fill="#d97757" d="m170 375-4-8h8z"/>
  <text x="188" y="355" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">未命中</text>
  <rect width="62" height="18" x="600" y="168" fill="#d97757" rx="9"/>
  <text x="631" y="181" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">5000x</text>
  <rect width="62" height="18" x="600" y="210" fill="#788c5d" rx="9"/>
  <text x="631" y="223" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">100x</text>
  <rect width="62" height="18" x="600" y="252" fill="#87867f" rx="9"/>
  <text x="631" y="265" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">10x</text>
  <text x="340" y="390" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">语义缓存 · 多层级架构 · AI-Native Engineering</text>
</svg>
