<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300">
  <style>
    .text-label{fill:#87867f;font-family:&quot;SF Mono&quot;,&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,monospace;font-size:11px}
  </style>
  <defs>
    <marker id="arrowhead" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3">
      <path fill="#d1cfc5" d="m0 0 8 3-8 3z"/>
    </marker>
    <marker id="arrowhead-dark" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3">
      <path fill="#87867f" d="m0 0 8 3-8 3z"/>
    </marker>
    <marker id="arrowhead-clay" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3">
      <path fill="#d97757" d="m0 0 8 3-8 3z"/>
    </marker>
  </defs>
  <rect width="460" height="300" rx="8" style="fill:#faf9f5"/>
  <text x="230" y="35" style="fill:#141413;font-family:&quot;SF Mono&quot;,&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,monospace;font-size:12px;font-weight:700" text-anchor="middle">策略三：安全试错空间</text>
  <rect width="380" height="220" x="40" y="55" rx="4" style="stroke:#d1cfc5;stroke-width:1.5;fill:none"/>
  <text x="230" y="80" class="text-label" text-anchor="middle">安全操作空间</text>
  <rect width="330" height="145" x="65" y="90" fill="#e3dacc" rx="4"/>
