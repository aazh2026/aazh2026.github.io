  <text x="230" y="155" style="fill:#141413;font-family:&quot;SF Mono&quot;,&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,monospace;font-size:12px;font-weight:500" text-anchor="middle">在这里，涌现性可以发生</text>
  <circle cx="95" cy="205" r="4" fill="#d97757" opacity=".5"/>
  <circle cx="365" cy="130" r="4" fill="#788c5d" opacity=".5"/>
  <circle cx="230" cy="205" r="3" fill="#87867f" opacity=".4"/>
  <text x="230" y="255" class="text-label" text-anchor="middle">硬边界：成本、安全、合规性</text>
