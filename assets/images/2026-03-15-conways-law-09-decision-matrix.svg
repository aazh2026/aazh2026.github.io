<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>AI-Native 职责划分决策矩阵</title>
  <desc>三维度决策矩阵：决策复杂度、出错成本、情感需求，决定某项工作由 Agent 还是人类负责</desc>

  <!-- Background -->
  <rect width="600" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI-Native 职责划分决策矩阵</text>
  <text x="300" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">康威定律 2.0 · 职责划分原则</text>

  <!-- Column headers background -->
  <rect x="80" y="58" width="440" height="32" rx="4" fill="#D1CFC5"/>

  <!-- Column headers -->
  <text x="160" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">决策复杂度</text>
  <text x="300" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">出错成本</text>
  <text x="440" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">情感需求</text>

  <!-- Row: → Agent (top) -->
  <rect x="20" y="100" width="50" height="130" rx="4" fill="#D97757"/>
  <text x="45" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">→</text>
  <text x="45" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Agent</text>

  <!-- Agent row cells -->
  <rect x="80" y="100" width="140" height="130" rx="4" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <!-- Icon: lightning bolt -->
  <polygon points="145,115 138,135 144,135 136,155 152,130 146,130 154,115" fill="#D97757"/>
  <text x="150" y="172" text-anchor="middle" font-size="10" fill="#141413">低复杂度</text>
  <text x="150" y="188" text-anchor="middle" font-size="9" fill="#87867F">规则判断</text>
  <text x="150" y="202" text-anchor="middle" font-size="9" fill="#87867F">结构化任务</text>
  <text x="150" y="216" text-anchor="middle" font-size="9" fill="#87867F">重复性工作</text>

  <rect x="230" y="100" width="140" height="130" rx="4" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <!-- Icon: checkmark in circle -->
  <circle cx="300" cy="135" r="14" fill="none" stroke="#788C5D" stroke-width="2"/>
  <polyline points="292,135 297,140 309,128" fill="none" stroke="#788C5D" stroke-width="2"/>
  <text x="300" y="172" text-anchor="middle" font-size="10" fill="#141413">低出错成本</text>
  <text x="300" y="188" text-anchor="middle" font-size="9" fill="#87867F">可逆操作</text>
  <text x="300" y="202" text-anchor="middle" font-size="9" fill="#87867F">自动恢复</text>
  <text x="300" y="216" text-anchor="middle" font-size="9" fill="#87867F">批量处理</text>

  <rect x="380" y="100" width="140" height="130" rx="4" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <!-- Icon: robot face -->
  <rect x="430" y="115" width="40" height="32" rx="6" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <circle cx="442" cy="128" r="3" fill="#D97757"/>
  <circle cx="458" cy="128" r="3" fill="#D97757"/>
  <rect x="438" y="136" width="24" height="3" rx="1.5" fill="#D97757"/>
  <text x="450" y="172" text-anchor="middle" font-size="10" fill="#141413">无情感需求</text>
  <text x="450" y="188" text-anchor="middle" font-size="9" fill="#87867F">信息查询</text>
  <text x="450" y="202" text-anchor="middle" font-size="9" fill="#87867F">数据处理</text>
  <text x="450" y="216" text-anchor="middle" font-size="9" fill="#87867F">事务性对话</text>

  <!-- Divider -->
  <line x1="80" y1="238" x2="520" y2="238" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Row: → 人类 (bottom) -->
  <rect x="20" y="248" width="50" height="130" rx="4" fill="#D1CFC5" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="45" y="313" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">→</text>
  <text x="45" y="326" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">人类</text>

  <!-- Human row cells -->
  <rect x="80" y="248" width="140" height="130" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Icon: brain/mind -->
  <path d="M145,260 Q130,255 130,270 Q130,285 145,280 Q155,290 165,280 Q180,285 180,270 Q180,255 165,260 Q155,250 145,260" fill="none" stroke="#141413" stroke-width="1.5"/>
  <text x="150" y="320" text-anchor="middle" font-size="10" fill="#141413">高复杂度决策</text>
  <text x="150" y="336" text-anchor="middle" font-size="9" fill="#87867F">战略判断</text>
  <text x="150" y="350" text-anchor="middle" font-size="9" fill="#87867F">跨领域权衡</text>
  <text x="150" y="364" text-anchor="middle" font-size="9" fill="#87867F">创新探索</text>

  <rect x="230" y="248" width="140" height="130" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Icon: warning triangle -->
  <polygon points="300,258 285,288 315,288" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <line x1="300" y1="268" x2="300" y2="278" stroke="#D97757" stroke-width="2"/>
  <circle cx="300" cy="283" r="2" fill="#D97757"/>
  <text x="300" y="320" text-anchor="middle" font-size="10" fill="#141413">高出错成本</text>
  <text x="300" y="336" text-anchor="middle" font-size="9" fill="#87867F">不可逆后果</text>
  <text x="300" y="350" text-anchor="middle" font-size="9" fill="#87867F">合规/法律风险</text>
  <text x="300" y="364" text-anchor="middle" font-size="9" fill="#87867F">声誉影响</text>

  <rect x="380" y="248" width="140" height="130" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Icon: heart -->
  <path d="M450,270 C450,260 440,255 435,260 C430,255 420,260 420,270 C420,285 435,295 450,308 C465,295 480,285 480,270 C480,260 470,255 465,260 C460,255 450,260 450,270" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" font-size="10" fill="#141413">高情感需求</text>
  <text x="450" y="336" text-anchor="middle" font-size="9" fill="#87867F">敏感对话</text>
  <text x="450" y="350" text-anchor="middle" font-size="9" fill="#87867F">冲突处理</text>
  <text x="450" y="364" text-anchor="middle" font-size="9" fill="#87867F">危机支持</text>

  <!-- Attribution -->
  <text x="300" y="392" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">康威定律 2.0 · 职责划分原则</text>
</svg>
