<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" role="img" aria-label="AI代码审查流程图">
  <title>AI代码审查流程</title>
  <desc>AI预审加人工精审的智能代码审查流程</desc>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="340" fill="#FAF9F5"/>

  <!-- PR提交节点 -->
  <rect x="20" y="135" width="120" height="52" rx="8" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="157" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#141413">PR提交</text>
  <text x="80" y="173" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">代码进入审查队列</text>

  <!-- 箭头: PR -> AIPre -->
  <path d="M140,161 L180,161" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>

  <!-- AI预审节点 -->
  <rect x="185" y="95" width="170" height="130" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="118" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1e40af">AI预审</text>
  <text x="270" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e40af">(30秒内完成)</text>
  <line x1="200" y1="145" x2="340" y2="145" stroke="#93c5fd" stroke-width="1"/>
  <text x="270" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• 安全扫描</text>
  <text x="270" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• 性能检查</text>
  <text x="270" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• 规范合规</text>
  <text x="270" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1e3a8a">• 测试覆盖</text>

  <!-- 分支1: 严重问题 -->
  <path d="M355,125 L395,85" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>
  <rect x="400" y="55" width="195" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="497" y="75" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#991b1b">🔴 自动阻止合并</text>
  <text x="497" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b91c1c">+ 建议修复方案</text>

  <!-- 分支2: 警告 -->
  <path d="M355,170 L395,195" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>
  <defs><marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>
  <rect x="400" y="168" width="145" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="472" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#92400e">🟡 标记供人工关注</text>
  <text x="472" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b45309">人工确认后处理</text>

  <!-- 分支3: 通过 -->
  <path d="M355,205 L395,260" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#arrow4)"/>
  <defs><marker id="arrow4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>
  <rect x="400" y="235" width="160" height="52" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="257" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#065f46">🟢 进入人工审查队列</text>
  <text x="480" y="275" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#047857">高价值判断</text>

  <!-- 人类审查节点 -->
  <path d="M560,260 L600,285" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#arrow5)"/>
  <defs><marker id="arrow5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#87867F"/></marker></defs>
  <rect x="605" y="255" width="65" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="637" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#92400e">Human</text>
  <text x="637" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#b45309">Review</text>

  <!-- 图例 -->
  <rect x="20" y="300" width="12" height="12" rx="2" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="38" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">严重问题</text>
  <rect x="105" y="300" width="12" height="12" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="123" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">警告</text>
  <rect x="175" y="300" width="12" height="12" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="193" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">通过</text>
  <rect x="245" y="300" width="12" height="12" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="263" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">AI预审</text>

  <!-- 人类审查关注点 -->
  <rect x="605" y="30" width="68" height="130" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="639" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#141413">人类关注:</text>
  <line x1="612" y1="58" x2="666" y2="58" stroke="#D1CFC5" stroke-width="1"/>
  <text x="639" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">架构设计</text>
  <text x="639" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">业务逻辑</text>
  <text x="639" y="102" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">创新方案</text>
</svg>