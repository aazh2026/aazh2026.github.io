<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI代码审查流程图" viewBox="0 0 680 340">
  <title>AI代码审查流程</title>
  <desc>
    AI预审加人工精审的智能代码审查流程
  </desc>
  <defs>
    <filter id="shadow" width="110%" height="115%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h680v340H0z"/>
  <rect width="120" height="52" x="20" y="135" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <text x="80" y="157" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">PR提交</text>
  <text x="80" y="173" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">代码进入审查队列</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow)" d="M140 161h40"/>
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="170" height="130" x="185" y="95" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <text x="270" y="118" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">AI预审</text>
  <text x="270" y="135" fill="#1e40af" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">(30秒内完成)</text>
  <path stroke="#93c5fd" d="M200 145h140"/>
  <text x="270" y="162" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">• 安全扫描</text>
  <text x="270" y="178" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">• 性能检查</text>
  <text x="270" y="194" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">• 规范合规</text>
  <text x="270" y="210" fill="#1e3a8a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">• 测试覆盖</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow2)" d="m355 125 40-40"/>
  <defs>
    <marker id="arrow2" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="195" height="52" x="400" y="55" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <text x="497" y="75" fill="#991b1b" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">🔴 自动阻止合并</text>
  <text x="497" y="93" fill="#b91c1c" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">+ 建议修复方案</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow3)" d="m355 170 40 25"/>
  <defs>
    <marker id="arrow3" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="145" height="52" x="400" y="168" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <text x="472" y="190" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">🟡 标记供人工关注</text>
  <text x="472" y="208" fill="#b45309" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">人工确认后处理</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow4)" d="m355 205 40 55"/>
  <defs>
    <marker id="arrow4" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="160" height="52" x="400" y="235" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <text x="480" y="257" fill="#065f46" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">🟢 进入人工审查队列</text>
  <text x="480" y="275" fill="#047857" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">高价值判断</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow5)" d="m560 260 40 25"/>
  <defs>
    <marker id="arrow5" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="4">
      <path fill="#87867f" d="m0 0 8 4-8 4Z"/>
    </marker>
  </defs>
  <rect width="65" height="52" x="605" y="255" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)" rx="8"/>
  <text x="637" y="273" fill="#92400e" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Human</text>
  <text x="637" y="288" fill="#b45309" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">Review</text>
  <rect width="12" height="12" x="20" y="300" fill="#fee2e2" stroke="#dc2626" rx="2"/>
  <text x="38" y="310" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10">严重问题</text>
  <rect width="12" height="12" x="105" y="300" fill="#fef3c7" stroke="#d97706" rx="2"/>
  <text x="123" y="310" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10">警告</text>
  <rect width="12" height="12" x="175" y="300" fill="#d1fae5" stroke="#059669" rx="2"/>
  <text x="193" y="310" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10">通过</text>
  <rect width="12" height="12" x="245" y="300" fill="#dbeafe" stroke="#2563eb" rx="2"/>
  <text x="263" y="310" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10">AI预审</text>
  <rect width="68" height="130" x="605" y="30" fill="#faf9f5" stroke="#d1cfc5" stroke-dasharray="4,3" rx="8"/>
  <text x="639" y="50" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">人类关注:</text>
  <path stroke="#d1cfc5" d="M612 58h54"/>
  <text x="639" y="74" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">架构设计</text>
  <text x="639" y="88" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">业务逻辑</text>
  <text x="639" y="102" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="10" text-anchor="middle">创新方案</text>
</svg>
