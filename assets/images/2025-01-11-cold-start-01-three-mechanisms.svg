<svg xmlns="http://www.w3.org/2000/svg" aria-label="Cold Start Three Mechanisms" viewBox="0 0 800 500">
  <title>冷启动：三种传承机制</title>
  <desc>
    知识蒸馏、组织记忆、合成经验——解决Agent冷启动问题的三种传承机制
  </desc>
  <defs>
    <marker id="arrBlue" markerHeight="7" markerWidth="7" orient="auto" refX="5" refY="3">
      <path fill="#788c5d" d="m0 0 7 3-7 4Z"/>
    </marker>
    <marker id="arrClay" markerHeight="7" markerWidth="7" orient="auto" refX="5" refY="3">
      <path fill="#d97757" d="m0 0 7 3-7 4Z"/>
    </marker>
    <marker id="arrGray" markerHeight="7" markerWidth="7" orient="auto" refX="5" refY="3">
      <path fill="#87867f" d="m0 0 7 3-7 4Z"/>
    </marker>
    <linearGradient id="bg4" x1="0" x2="1" y1="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc" stop-opacity=".4"/>
    </linearGradient>
    <filter id="shadow4" width="110%" height="115%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)" rx="16"/>
  <text x="400" y="34" fill="#141413" font-family="Georgia, serif" font-size="14" font-weight="bold" letter-spacing=".5" text-anchor="middle">冷启动：三种传承机制</text>
  <path stroke="#d1cfc5" d="M180 46h440"/>
  <text x="400" y="62" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">知识蒸馏 · 组织记忆 · 合成经验</text>
  <g filter="url(#shadow4)">
    <rect width="280" height="72" x="260" y="78" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="14"/>
  </g>
  <text x="400" y="100" fill="#788c5d" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">成熟 Agent</text>
  <text x="400" y="118" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">运行半年 · 10万+ 对话经验</text>
  <g stroke="#788c5d" opacity=".6">
    <path fill="none" stroke-width="1.5" d="M290 122q-6-8-3-15 6-6 12-1 4-5 10 1 6 7 3 15 3 8-4 12-8 4-15 0-7 4-13-2-4-6 0-10Z"/>
    <path d="M290 122h10"/>
  </g>
  <g fill="#788c5d" transform="translate(520 108)">
    <circle r="5" opacity=".3"/>
    <circle cx="14" r="5" opacity=".4"/>
    <circle cx="28" r="5" opacity=".5"/>
    <circle cx="42" r="5" opacity=".6"/>
    <circle cx="56" r="5" opacity=".8"/>
  </g>
  <path stroke="#788c5d" stroke-dasharray="5,3" stroke-width="2" marker-end="url(#arrBlue)" d="m0 0-50 52" transform="translate(130 168)"/>
  <g filter="url(#shadow4)">
    <rect width="236" height="100" x="24" y="228" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="12"/>
  </g>
  <rect width="236" height="32" x="24" y="228" fill="#788c5d" rx="12"/>
  <path fill="#788c5d" d="M24 250h236v10H24z"/>
  <text x="142" y="249" fill="#faf9f5" font-family="Georgia, serif" font-size="13" font-weight="bold" text-anchor="middle">① 知识蒸馏</text>
  <text x="142" y="274" fill="#5a6b44" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">从大师到学徒</text>
  <g fill="#141413" font-family="system-ui, sans-serif" font-size="11">
    <text x="36" y="294">→ 提取「思维模式」而非记忆</text>
    <text x="36" y="310">→ 如何理解模糊问题</text>
    <text x="36" y="326">→ 如何组织复杂回答</text>
  </g>
  <path stroke="#d97757" stroke-dasharray="5,3" stroke-width="2" marker-end="url(#arrClay)" d="M0 0v52" transform="translate(400 158)"/>
  <g filter="url(#shadow4)">
    <rect width="236" height="100" x="282" y="228" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="12"/>
  </g>
  <rect width="236" height="32" x="282" y="228" fill="#d97757" rx="12"/>
  <path fill="#d97757" d="M282 250h236v10H282z"/>
  <text x="400" y="249" fill="#faf9f5" font-family="Georgia, serif" font-size="13" font-weight="bold" text-anchor="middle">② 组织记忆库</text>
  <text x="400" y="274" fill="#b85f42" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">共享的基础设施</text>
  <g fill="#141413" font-family="system-ui, sans-serif" font-size="11">
    <text x="294" y="294">→ 产品知识（所有 Agent 共享）</text>
    <text x="294" y="310">→ 最佳实践（经验沉淀）</text>
    <text x="294" y="326">→ 常见错误（教训总结）</text>
  </g>
  <path stroke="#87867f" stroke-dasharray="5,3" stroke-width="2" marker-end="url(#arrGray)" d="m0 0 50 52" transform="translate(670 168)"/>
  <g filter="url(#shadow4)">
    <rect width="236" height="100" x="540" y="228" fill="#faf9f5" stroke="#87867f" stroke-width="1.5" rx="12"/>
  </g>
  <rect width="236" height="32" x="540" y="228" fill="#87867f" rx="12"/>
  <path fill="#87867f" d="M540 250h236v10H540z"/>
  <text x="658" y="249" fill="#faf9f5" font-family="Georgia, serif" font-size="13" font-weight="bold" text-anchor="middle">③ 合成经验</text>
  <text x="658" y="274" fill="#666" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">没有历史就创造历史</text>
  <g fill="#141413" font-family="system-ui, sans-serif" font-size="11">
    <text x="552" y="294">→ 文档 → 模拟对话</text>
    <text x="552" y="310">→ 教学案例（含思考过程）</text>
    <text x="552" y="326">→ 知识可以被「设计」出来</text>
  </g>
  <g stroke-dasharray="4,3" stroke-width="1.5">
    <path stroke="#788c5d" marker-end="url(#arrBlue)" d="M96 0 72-44" transform="translate(0 344)"/>
    <path stroke="#d97757" marker-end="url(#arrClay)" d="M400 0v-44" transform="translate(0 344)"/>
    <path stroke="#87867f" marker-end="url(#arrGray)" d="m704 0 24-44" transform="translate(0 344)"/>
  </g>
  <g filter="url(#shadow4)">
    <rect width="280" height="72" x="260" y="348" fill="#faf9f5" stroke="#d1cfc5" stroke-width="2" rx="14"/>
  </g>
  <text x="400" y="370" fill="#141413" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">新 Agent</text>
  <text x="400" y="388" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">部署第一天 → 继承半年经验</text>
  <g fill="#788c5d" transform="translate(520 380)">
    <circle r="5" opacity=".8"/>
    <circle cx="14" r="5" opacity=".8"/>
    <circle cx="28" r="5" opacity=".8"/>
    <circle cx="42" r="5" opacity=".8"/>
    <circle cx="56" r="5" opacity=".8"/>
  </g>
  <rect width="720" height="44" x="40" y="438" fill="#e3dacc" rx="10"/>
  <text x="400" y="460" fill="#141413" font-family="Georgia, serif" font-size="12" font-style="italic" text-anchor="middle">&quot;冷启动的解决，标志着 AI 从『个体智能』走向『集体智能』的转折点&quot;</text>
  <text x="400" y="496" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">个体智能（孤岛）→ 集体智能（传承网络）</text>
</svg>
