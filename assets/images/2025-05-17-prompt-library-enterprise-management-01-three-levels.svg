<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 300"><title>三级Prompt架构</title><desc>企业级Prompt管理的三级架构：Enterprise（企业级）、Department（部门级）、Project（项目级）</desc><path fill="#faf9f5" d="M0 0h680v300H0z"/><text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">三级Prompt架构</text><text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Enterprise · Department · Project</text><rect width="600" height="68" x="40" y="62" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/><rect width="600" height="68" x="40" y="62" fill="none" rx="8"/><rect width="22" height="18" x="56" y="76" fill="#d97757" rx="4"/><text x="67" y="89" fill="#fff" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">L1</text><text x="88" y="82" fill="#141413" font-size="13" font-weight="600">企业级（Enterprise）</text><rect width="60" height="16" x="88" y="88" fill="#788c5d" rx="8"/><text x="118" y="100" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">CoE 管理</text><rect width="44" height="16" x="156" y="88" fill="#e3dacc" rx="8"/><text x="178" y="100" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">全员可读</text><text x="56" y="118" fill="#87867f" font-family="ui-monospace, monospace" font-size="10">适用范围：全公司 · 内容：通用Prompt、安全规范、最佳实践</text><rect width="600" height="68" x="40" y="140" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="22" height="18" x="56" y="154" fill="#788c5d" rx="4"/><text x="67" y="167" fill="#fff" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">L2</text><text x="88" y="160" fill="#141413" font-size="13" font-weight="600">部门级（Department）</text><rect width="68" height="16" x="88" y="166" fill="#788c5d" rx="8"/><text x="122" y="178" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Tech Lead 管理</text><rect width="100" height="16" x="164" y="166" fill="#e3dacc" rx="8"/><text x="214" y="178" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">部门内读写·其他可读</text><text x="56" y="196" fill="#87867f" font-family="ui-monospace, monospace" font-size="10">适用范围：特定部门（后端/前端/数据）· 内容：领域专用Prompt、团队规范</text><rect width="600" height="68" x="40" y="218" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="22" height="18" x="56" y="232" fill="#d1cfc5" rx="4"/><text x="67" y="245" fill="#141413" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">L3</text><text x="88" y="238" fill="#141413" font-size="13" font-weight="600">项目级（Project）</text><rect width="68" height="16" x="88" y="244" fill="#d1cfc5" stroke="#d1cfc5" rx="8"/><text x="122" y="256" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">项目团队管理</text><rect width="68" height="16" x="164" y="244" fill="#f0eee6" stroke="#d1cfc5" rx="8"/><text x="198" y="256" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">项目团队内读写</text><text x="56" y="274" fill="#87867f" font-family="ui-monospace, monospace" font-size="10">适用范围：特定项目 · 内容：项目专用Prompt、临时Prompt</text></svg>