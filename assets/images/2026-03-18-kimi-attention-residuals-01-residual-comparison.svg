<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 640 300">
  <title>Standard Residual vs Attention Residuals</title>
  <desc>
    对比标准残差连接（固定权重=1.0的加法，所有层贡献均等）与 Attention Residuals（通过注意力机制动态决定各层聚合权重，实现选择性层聚合）
  </desc>
  <path fill="#faf9f5" d="M0 0h640v300H0z"/>
  <text x="320" y="24" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Standard Residual vs Attention Residuals</text>
  <text x="320" y="40" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Kimi 团队 · arXiv:2603.15031 · 2026/03</text>
  <rect width="280" height="220" x="30" y="56" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="170" y="80" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Standard Residual ❌</text>
  <text x="170" y="97" fill="#87867f" font-size="10" text-anchor="middle">output = input + SubLayer(output)</text>
  <rect width="60" height="36" x="50" y="112" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
  <text x="80" y="134" fill="#141413" font-size="10" text-anchor="middle">Layer 1</text>
  <rect width="60" height="36" x="50" y="158" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
  <text x="80" y="180" fill="#141413" font-size="10" text-anchor="middle">Layer 2</text>
  <rect width="60" height="36" x="50" y="204" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="4"/>
  <text x="80" y="226" fill="#141413" font-size="10" text-anchor="middle">Layer 3</text>
  <rect width="60" height="20" x="50" y="250" fill="#e3dacc" stroke="#d1cfc5" rx="4"/>
  <text x="80" y="264" fill="#87867f" font-size="9" text-anchor="middle">...</text>
  <text x="120" y="130" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">=1.0</text>
  <text x="120" y="176" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">=1.0</text>
  <text x="120" y="222" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">=1.0</text>
  <path stroke="#d97757" stroke-width="1.5" d="M110 130h20"/>
  <path fill="#d97757" d="m130 130-6-4v8z"/>
  <path stroke="#d97757" stroke-width="1.5" d="M110 176h20"/>
  <path fill="#d97757" d="m130 176-6-4v8z"/>
  <path stroke="#d97757" stroke-width="1.5" d="M110 222h20"/>
  <path fill="#d97757" d="m130 222-6-4v8z"/>
  <rect width="100" height="26" x="140" y="170" fill="#e3dacc" stroke="#d1cfc5" rx="4"/>
  <text x="190" y="187" fill="#141413" font-size="10" text-anchor="middle">贡献均等稀释</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M250 170h14"/>
  <path fill="#d1cfc5" d="m264 170-6-4v8z"/>
  <rect width="280" height="220" x="330" y="56" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="470" y="80" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Attention Residuals ✓</text>
  <text x="470" y="97" fill="#87867f" font-size="10" text-anchor="middle">y_l = Σ α_i · v^i, α = softmax(q·l·k^i)</text>
  <rect width="60" height="36" x="350" y="112" fill="#f0eee6" stroke="#d97757" stroke-width="1.5" rx="4"/>
  <text x="380" y="134" fill="#141413" font-size="10" text-anchor="middle">Layer 1</text>
  <rect width="60" height="36" x="350" y="158" fill="#f0eee6" stroke="#d97757" stroke-width="1.5" rx="4"/>
  <text x="380" y="180" fill="#141413" font-size="10" text-anchor="middle">Layer 2</text>
  <rect width="60" height="36" x="350" y="204" fill="#f0eee6" stroke="#d97757" stroke-width="1.5" rx="4"/>
  <text x="380" y="226" fill="#141413" font-size="10" text-anchor="middle">Layer 3</text>
  <rect width="60" height="20" x="350" y="250" fill="#e3dacc" stroke="#d1cfc5" rx="4"/>
  <text x="380" y="264" fill="#87867f" font-size="9" text-anchor="middle">...</text>
  <path stroke="#788c5d" stroke-width="3" d="M410 130h20"/>
  <path fill="#788c5d" d="m430 130-6-5v10z"/>
  <text x="440" y="126" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">α=0.8</text>
  <path stroke="#788c5d" stroke-width="1.2" d="M410 176h20"/>
  <path fill="#788c5d" d="m430 176-6-4v8z"/>
  <text x="440" y="172" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">α=0.15</text>
  <path stroke="#788c5d" stroke-width=".8" d="M410 222h20"/>
  <path fill="#788c5d" d="m430 222-6-4v8z"/>
  <text x="440" y="218" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">α=0.05</text>
  <rect width="110" height="26" x="450" y="170" fill="#788c5d" stroke="#788c5d" opacity=".15" rx="4"/>
  <text x="505" y="187" fill="#141413" font-size="10" text-anchor="middle">自适应选择聚合</text>
  <text x="470" y="252" fill="#87867f" font-size="9" text-anchor="middle">softmax(q_l · k^i) 控制权重</text>
</svg>
