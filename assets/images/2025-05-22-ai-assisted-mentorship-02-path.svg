<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->
  <title>个性化学习路径生成图</title>
  <desc>展示AI为初级开发者小王生成的个性化学习路径，从诊断到认证的完整流程</desc>

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">个性化学习路径生成</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">案例：初级开发者小王 · AI-Native · 2025/05/22</text>

  <!-- Input: Developer Profile (top card) -->
  <rect x="40" y="58" width="240" height="80" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="56" y="78" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">输入：开发者画像</text>
  <text x="56" y="96" font-size="10" fill="#141413">Python基础扎实 / 设计模式薄弱</text>
  <text x="56" y="110" font-size="10" fill="#141413">测试意识不足 / 学习速度快</text>
  <text x="56" y="124" font-size="9" fill="#87867F">职业目标：中级后端工程师</text>

  <!-- Arrow: Profile → Gap Analysis -->
  <line x1="280" y1="98" x2="320" y2="98" stroke="#D97757" stroke-width="2"/>
  <polygon points="320,98 312,94 312,102" fill="#D97757"/>
  <text x="300" y="90" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">分析</text>

  <!-- Processing: Gap Analysis -->
  <rect x="330" y="58" width="160" height="80" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="346" y="78" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Gap Analysis</text>
  <text x="346" y="96" font-size="9.5" fill="#87867F">识别能力缺口</text>
  <text x="346" y="110" font-size="9.5" fill="#87867F">匹配学习资源</text>
  <text x="346" y="124" font-size="9.5" fill="#87867F">排序列为里程碑</text>

  <!-- Arrow: Gap → Path -->
  <line x1="490" y1="98" x2="530" y2="98" stroke="#D97757" stroke-width="2"/>
  <polygon points="530,98 522,94 522,102" fill="#D97757"/>
  <text x="510" y="90" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">生成</text>

  <!-- Output: Learning Path (top right) -->
  <rect x="540" y="58" width="120" height="80" rx="8" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="1.8"/>
  <text x="556" y="78" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">学习路径</text>
  <text x="556" y="96" font-size="9.5" fill="#141413">4阶段里程碑</text>
  <text x="556" y="110" font-size="9.5" fill="#141413">配套资源</text>
  <text x="556" y="124" font-size="9.5" fill="#141413">时间线</text>

  <!-- Arrow: top row → timeline (down) -->
  <line x1="340" y1="138" x2="340" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,160 336,152 344,152" fill="#D1CFC5"/>

  <!-- Timeline / Milestone nodes -->
  <!-- Node 1 -->
  <rect x="60" y="170" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="60" y="170" width="130" height="22" rx="8" fill="#D97757"/>
  <rect x="60" y="184" width="130" height="8" fill="#D97757"/>
  <text x="125" y="186" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">M1 设计模式专项</text>
  <text x="76" y="202" font-size="9" fill="#141413">《设计模式》精读</text>
  <text x="76" y="216" font-size="9" fill="#141413">模式练习题 ×20</text>
  <text x="76" y="230" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">2周</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="205" x2="220" y2="205" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="220,205 212,201 212,209" fill="#D1CFC5"/>

  <!-- Node 2 -->
  <rect x="230" y="170" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="230" y="170" width="130" height="22" rx="8" fill="#788C5D"/>
  <rect x="230" y="184" width="130" height="8" fill="#788C5D"/>
  <text x="295" y="186" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">M2 测试驱动开发</text>
  <text x="246" y="202" font-size="9" fill="#141413">unittest / pytest</text>
  <text x="246" y="216" font-size="9" fill="#141413">TDD 实战项目</text>
  <text x="246" y="230" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">3周</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="205" x2="390" y2="205" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="390,205 382,201 382,209" fill="#D1CFC5"/>

  <!-- Node 3 -->
  <rect x="400" y="170" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="400" y="170" width="130" height="22" rx="8" fill="#141413"/>
  <rect x="400" y="184" width="130" height="8" fill="#141413"/>
  <text x="465" y="186" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">M3 开源贡献实践</text>
  <text x="416" y="202" font-size="9" fill="#141413">真实开源项目 PR</text>
  <text x="416" y="216" font-size="9" fill="#141413">代码审查参与</text>
  <text x="416" y="230" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">4周</text>

  <!-- Arrow 3→4 -->
  <line x1="530" y1="205" x2="560" y2="205" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="560,205 552,201 552,209" fill="#D1CFC5"/>

  <!-- Node 4 -->
  <rect x="570" y="170" width="90" height="70" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="570" y="170" width="90" height="22" rx="8" fill="#D97757"/>
  <rect x="570" y="184" width="90" height="8" fill="#D97757"/>
  <text x="615" y="186" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">认证</text>
  <text x="586" y="202" font-size="9" fill="#141413">中级工程师</text>
  <text x="586" y="216" font-size="9" fill="#141413">能力评估</text>
  <text x="586" y="230" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">×</text>

  <!-- Vertical timeline spine -->
  <line x1="340" y1="248" x2="340" y2="270" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Outcome comparison: Before / After -->
  <rect x="60" y="278" width="260" height="60" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="76" y="296" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">学习前</text>
  <text x="76" y="312" font-size="9" fill="#87867F">设计模式: ★☆☆</text>
  <text x="76" y="326" font-size="9" fill="#87867F">测试意识: ★☆☆</text>
  <text x="190" y="312" font-size="9" fill="#87867F">代码审查: 通过率 45%</text>
  <text x="190" y="326" font-size="9" fill="#87867F">平均周期: —</text>

  <rect x="360" y="278" width="260" height="60" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="376" y="296" font-size="10" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">学习后</text>
  <text x="376" y="312" font-size="9" fill="#141413">设计模式: ★★★</text>
  <text x="376" y="326" font-size="9" fill="#141413">测试意识: ★★★</text>
  <text x="490" y="312" font-size="9" fill="#141413">代码审查: 通过率 89%</text>
  <text x="490" y="326" font-size="9" fill="#141413">平均周期: 9周</text>

  <!-- Source line -->
  <text x="340" y="348" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">AI生成 · 2025-05-22</text>
</svg>