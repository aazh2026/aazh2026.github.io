<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>记忆 Schema 迁移</title>
  <desc>Layered stack diagram showing memory schema v1, migration script, and schema v2</desc>

  <!-- Background -->
  <rect width="600" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">记忆 Schema 迁移</text>
  <text x="300" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">数据库迁移模式 · 2025/01/18</text>

  <!-- Layer 1: Schema v1 (bottom) -->
  <rect x="40" y="60" width="340" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="60" y="84" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">记忆 Schema v1</text>
  <text x="60" y="102" font-size="10.5" fill="#141413">id: string</text>
  <text x="160" y="102" font-size="10.5" fill="#141413">version: "1.0.0"</text>
  <text x="60" y="118" font-size="10.5" fill="#141413">content: string</text>
  <text x="200" y="118" font-size="10.5" fill="#141413">last_updated: datetime</text>

  <!-- Arrow: v1 → Migration -->
  <line x1="210" y1="132" x2="210" y2="148" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="210,152 206,144 214,144" fill="#D1CFC5"/>

  <!-- Layer 2: Migration Script (middle, clay border) -->
  <rect x="40" y="160" width="340" height="88" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="56" y="174" width="120" height="20" rx="10" fill="#D97757"/>
  <text x="116" y="188" text-anchor="middle" font-size="9.5" fill="#FFFFFF" font-family="ui-monospace, monospace">Migration Script</text>
  <text x="60" y="210" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">source_version: "1.0.0"</text>
  <text x="60" y="226" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">target_version: "2.0.0"</text>
  <text x="60" y="242" font-size="10.5" fill="#141413" font-family="ui-monospace, monospace">transform: add_confidence_field()</text>

  <!-- Rollback arrow (right side) -->
  <path d="M 380 204 C 405 204, 405 240, 380 240" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="393" y="226" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">回滚</text>
  <polygon points="380,240 374,234 386,234" fill="#D97757"/>

  <!-- Arrow: Migration → v2 -->
  <line x1="210" y1="248" x2="210" y2="264" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="210,268 206,260 214,260" fill="#D1CFC5"/>

  <!-- Layer 3: Schema v2 (top) -->
  <rect x="40" y="276" width="340" height="52" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="60" y="300" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">记忆 Schema v2</text>
  <text x="60" y="316" font-size="10.5" fill="#141413">id · version · schema_version · content · confidence · last_updated · source_url</text>

  <!-- Right side: version pills -->
  <text x="430" y="88" font-size="10.5" fill="#87867F" font-family="ui-monospace, monospace">v1.0.0</text>
  <rect x="424" y="94" width="48" height="18" rx="9" fill="#E3DACC"/>
  <text x="448" y="107" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">1.0.0</text>

  <text x="430" y="200" font-size="10.5" fill="#D97757" font-family="ui-monospace, monospace">v1→v2</text>
  <rect x="424" y="206" width="50" height="18" rx="9" fill="#D97757"/>
  <text x="449" y="219" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">迁移</text>

  <text x="430" y="296" font-size="10.5" fill="#788C5D" font-family="ui-monospace, monospace">v2.0.0</text>
  <rect x="424" y="302" width="48" height="18" rx="9" fill="#788C5D"/>
  <text x="448" y="315" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">2.0.0</text>
</svg>
