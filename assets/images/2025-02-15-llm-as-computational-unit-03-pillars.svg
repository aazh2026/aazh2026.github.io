<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>Software 3.0 工程化六大支柱</title>
  <desc>Software 3.0 的六大工程化原则：验证优先（clay 高亮）、模块化契约、思维链显式化、工具约束、持续对齐、人在回路</desc>

  <!-- Background -->
  <rect width="680" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Software 3.0 工程化六大支柱</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Software 3.0 · 足够的确定性</text>

  <!-- Pillar 1: 验证优先 (clay highlight) -->
  <rect x="20" y="62" width="98" height="170" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="20" y="62" width="98" height="30" rx="8" fill="#D97757"/>
  <rect x="20" y="84" width="98" height="8" fill="#D97757"/>
  <text x="69" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">验证优先</text>
  <text x="69" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#D97757">验证</text>
  <text x="69" y="128" text-anchor="middle" font-size="9.5" fill="#87867F">多层次验证机制</text>
  <text x="69" y="142" text-anchor="middle" font-size="9.5" fill="#87867F">不盲目信任输出</text>
  <text x="69" y="156" text-anchor="middle" font-size="9.5" fill="#87867F">test + rubric</text>
  <text x="69" y="170" text-anchor="middle" font-size="9.5" fill="#87867F">+ 形式化</text>

  <!-- Pillar 2: 模块化契约 -->
  <rect x="126" y="62" width="98" height="170" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="126" y="62" width="98" height="30" rx="8" fill="#D1CFC5"/>
  <rect x="126" y="84" width="98" height="8" fill="#D1CFC5"/>
  <text x="175" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">模块化契约</text>
  <text x="175" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">契约</text>
  <text x="175" y="128" text-anchor="middle" font-size="9.5" fill="#87867F">模块输入输出</text>
  <text x="175" y="142" text-anchor="middle" font-size="9.5" fill="#87867F">接口明确</text>
  <text x="175" y="156" text-anchor="middle" font-size="9.5" fill="#87867F">可验证边界</text>

  <!-- Pillar 3: 思维链显式化 -->
  <rect x="232" y="62" width="98" height="170" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="232" y="62" width="98" height="30" rx="8" fill="#D1CFC5"/>
  <rect x="232" y="84" width="98" height="8" fill="#D1CFC5"/>
  <text x="281" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">思维链显式化</text>
  <text x="281" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">显式化</text>
  <text x="281" y="128" text-anchor="middle" font-size="9.5" fill="#87867F">Chain-of-Thought</text>
  <text x="281" y="142" text-anchor="middle" font-size="9.5" fill="#87867F">推理步骤可见</text>
  <text x="281" y="156" text-anchor="middle" font-size="9.5" fill="#87867F">可解释性近似</text>

  <!-- Pillar 4: 工具约束 -->
  <rect x="338" y="62" width="98" height="170" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="338" y="62" width="98" height="30" rx="8" fill="#D1CFC5"/>
  <rect x="338" y="84" width="98" height="8" fill="#D1CFC5"/>
  <text x="387" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">工具使用约束</text>
  <text x="387" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">约束</text>
  <text x="387" y="128" text-anchor="middle" font-size="9.5" fill="#87867F">工具定义良好</text>
  <text x="387" y="142" text-anchor="middle" font-size="9.5" fill="#87867F">前置/后置条件</text>
  <text x="387" y="156" text-anchor="middle" font-size="9.5" fill="#87867F">行为边界明确</text>

  <!-- Pillar 5: 持续对齐 -->
  <rect x="444" y="62" width="98" height="170" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="444" y="62" width="98" height="30" rx="8" fill="#D1CFC5"/>
  <rect x="444" y="84" width="98" height="8" fill="#D1CFC5"/>
  <text x="493" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">持续对齐与监控</text>
  <text x="493" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">对齐</text>
  <text x="493" y="128" text-anchor="middle" font-size="9.5" fill="#87867F">持续监控</text>
  <text x="493" y="142" text-anchor="middle" font-size="9.5" fill="#87867F">偏离即调整</text>
  <text x="493" y="156" text-anchor="middle" font-size="9.5" fill="#87867F">不放任漂移</text>

  <!-- Pillar 6: 人在回路 -->
  <rect x="550" y="62" width="110" height="170" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="550" y="62" width="110" height="30" rx="8" fill="#D1CFC5"/>
  <rect x="550" y="84" width="110" height="8" fill="#D1CFC5"/>
  <text x="605" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">人在关键节点介入</text>
  <text x="605" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">人机协作</text>
  <text x="605" y="128" text-anchor="middle" font-size="9.5" fill="#87867F">模型处理常规</text>
  <text x="605" y="142" text-anchor="middle" font-size="9.5" fill="#87867F">人类处理异常</text>
  <text x="605" y="156" text-anchor="middle" font-size="9.5" fill="#87867F">最终决策在人</text>

  <!-- Bottom note -->
  <text x="340" y="250" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">不追求 Software 1.0 的完美确定性，而是追求足够的确定性</text>
</svg>