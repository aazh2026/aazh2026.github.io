<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 260"><title>Software 3.0 工程化六大支柱</title><desc>Software 3.0 的六大工程化原则：验证优先（clay 高亮）、模块化契约、思维链显式化、工具约束、持续对齐、人在回路</desc><path fill="#faf9f5" d="M0 0h680v260H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Software 3.0 工程化六大支柱</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Software 3.0 · 足够的确定性</text><rect width="98" height="170" x="20" y="62" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/><rect width="98" height="30" x="20" y="62" fill="#d97757" rx="8"/><path fill="#d97757" d="M20 84h98v8H20z"/><text x="69" y="81" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">验证优先</text><text x="69" y="112" fill="#d97757" font-size="13" font-weight="600" text-anchor="middle">验证</text><text x="69" y="128" fill="#87867f" font-size="9.5" text-anchor="middle">多层次验证机制</text><text x="69" y="142" fill="#87867f" font-size="9.5" text-anchor="middle">不盲目信任输出</text><text x="69" y="156" fill="#87867f" font-size="9.5" text-anchor="middle">test + rubric</text><text x="69" y="170" fill="#87867f" font-size="9.5" text-anchor="middle">+ 形式化</text><rect width="98" height="170" x="126" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="98" height="30" x="126" y="62" fill="#d1cfc5" rx="8"/><path fill="#d1cfc5" d="M126 84h98v8h-98z"/><text x="175" y="81" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">模块化契约</text><text x="175" y="112" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">契约</text><text x="175" y="128" fill="#87867f" font-size="9.5" text-anchor="middle">模块输入输出</text><text x="175" y="142" fill="#87867f" font-size="9.5" text-anchor="middle">接口明确</text><text x="175" y="156" fill="#87867f" font-size="9.5" text-anchor="middle">可验证边界</text><rect width="98" height="170" x="232" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="98" height="30" x="232" y="62" fill="#d1cfc5" rx="8"/><path fill="#d1cfc5" d="M232 84h98v8h-98z"/><text x="281" y="81" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">思维链显式化</text><text x="281" y="112" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">显式化</text><text x="281" y="128" fill="#87867f" font-size="9.5" text-anchor="middle">Chain-of-Thought</text><text x="281" y="142" fill="#87867f" font-size="9.5" text-anchor="middle">推理步骤可见</text><text x="281" y="156" fill="#87867f" font-size="9.5" text-anchor="middle">可解释性近似</text><rect width="98" height="170" x="338" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="98" height="30" x="338" y="62" fill="#d1cfc5" rx="8"/><path fill="#d1cfc5" d="M338 84h98v8h-98z"/><text x="387" y="81" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">工具使用约束</text><text x="387" y="112" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">约束</text><text x="387" y="128" fill="#87867f" font-size="9.5" text-anchor="middle">工具定义良好</text><text x="387" y="142" fill="#87867f" font-size="9.5" text-anchor="middle">前置/后置条件</text><text x="387" y="156" fill="#87867f" font-size="9.5" text-anchor="middle">行为边界明确</text><rect width="98" height="170" x="444" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="98" height="30" x="444" y="62" fill="#d1cfc5" rx="8"/><path fill="#d1cfc5" d="M444 84h98v8h-98z"/><text x="493" y="81" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">持续对齐与监控</text><text x="493" y="112" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">对齐</text><text x="493" y="128" fill="#87867f" font-size="9.5" text-anchor="middle">持续监控</text><text x="493" y="142" fill="#87867f" font-size="9.5" text-anchor="middle">偏离即调整</text><text x="493" y="156" fill="#87867f" font-size="9.5" text-anchor="middle">不放任漂移</text><rect width="110" height="170" x="550" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="110" height="30" x="550" y="62" fill="#d1cfc5" rx="8"/><path fill="#d1cfc5" d="M550 84h110v8H550z"/><text x="605" y="81" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">人在关键节点介入</text><text x="605" y="112" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">人机协作</text><text x="605" y="128" fill="#87867f" font-size="9.5" text-anchor="middle">模型处理常规</text><text x="605" y="142" fill="#87867f" font-size="9.5" text-anchor="middle">人类处理异常</text><text x="605" y="156" fill="#87867f" font-size="9.5" text-anchor="middle">最终决策在人</text><text x="340" y="250" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5" text-anchor="middle">不追求 Software 1.0 的完美确定性，而是追求足够的确定性</text></svg>