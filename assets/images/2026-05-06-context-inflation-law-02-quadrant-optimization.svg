  <text x="571" y="370" fill="#d97757" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">高频 × 高价值</text>
  <text x="571" y="392" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">语义相似度匹配</text>
