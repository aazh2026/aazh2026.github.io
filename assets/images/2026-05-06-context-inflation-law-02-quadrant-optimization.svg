<svg xmlns="http://www.w3.org/2000/svg" aria-label="四象限优化框架" viewBox="0 0 800 560">
  <title>四象限成本优化框架</title>
  <desc>
    高频/低频 × 高价值/低价值的四象限成本优化策略图
  </desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0efe9"/>
    </linearGradient>
    <filter id="shadow" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/>
    </filter>
  </defs>
  <path fill="url(#bgGrad)" d="M0 0h800v560H0z"/>
  <text x="400" y="42" fill="#141413" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">四象限成本优化框架</text>
  <text x="400" y="66" fill="#87867f" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Context Cost Optimization Matrix</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M400 95v415M60 302h680"/>
  <text x="50" y="200" fill="#87867f" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" transform="rotate(-90 50 200)">低频</text>
  <text x="750" y="200" fill="#87867f" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" transform="rotate(90 750 200)">高频</text>
  <text x="400" y="530" fill="#87867f" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">低价值 → 高价值</text>
  <path fill="#d1cfc5" d="m400 93-7 12h14zm342 209-12-7v14z"/>
