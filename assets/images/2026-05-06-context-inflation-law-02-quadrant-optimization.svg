  <text x="229" y="182" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">批量聚合 · 异步处理</text>
  <text x="229" y="200" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">边缘计算 · 降低优先级</text>
