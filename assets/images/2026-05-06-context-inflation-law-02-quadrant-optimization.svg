  <text x="229" y="370" fill="#d97757" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">低频 × 高价值</text>
  <text x="229" y="392" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">复杂度分类 · 模型路由</text>
  <text x="229" y="410" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">人机协作 · 精准匹配</text>
  <text x="229" y="435" fill="#788c5d" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">成本↓ 50-70%</text>
  <text x="229" y="453" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">质量不降</text>
  <g filter="url(#shadow)">
    <rect width="322" height="190" x="410" y="313" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  </g>
  <rect width="322" height="36" x="410" y="313" fill="#788c5d" rx="10"/>
