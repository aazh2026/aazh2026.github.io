  <text x="571" y="435" fill="#788c5d" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">成本↓ 40-60%</text>
  <text x="571" y="453" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">延迟↓ 50%</text>
