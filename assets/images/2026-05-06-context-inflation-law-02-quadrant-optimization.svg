  <text x="400" y="297" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">架构</text>
  <text x="400" y="310" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">效率</text>
