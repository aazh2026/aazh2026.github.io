<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .title { fill: #141413; font-size: 20px; font-weight: 700; font-family: 'ui-serif, Georgia, serif'; }
      .subtitle { fill: #87867F; font-size: 12px; }
      .label { fill: #141413; font-size: 13px; font-weight: 600; }
      .label-sm { fill: #141413; font-size: 11px; font-weight: 500; }
      .desc { fill: #87867F; font-size: 11px; }
      .desc-white { fill: rgba(255,255,255,0.85); font-size: 11px; }
      .white { fill: #ffffff; }
      .accent-clay { fill: #D97757; }
      .accent-olive { fill: #788C5D; }
      .accent-g300 { fill: #D1CFC5; }
      .accent-g500 { fill: #87867F; }
      .accent-oat { fill: #E3DACC; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg"/>

  <!-- Title -->
  <text x="40" y="38" class="title">消费者驱动契约（CDC）：服务间解耦的关键</text>
  <text x="40" y="58" class="subtitle">消费者定义期望 → 提供者承诺实现 → 契约持续验证</text>

  <!-- ===== LEFT: CDC Flow Diagram ===== -->
  <text x="40" y="90" class="label">CDC 契约交换流程</text>

  <!-- Consumer box -->
  <rect x="40" y="108" width="180" height="130" rx="10" fill="#D97757"/>
  <rect x="40" y="108" width="180" height="130" rx="10" fill="none" stroke="#B5604A" stroke-width="1"/>
  <text x="130" y="132" text-anchor="middle" class="label white">消费者服务</text>
  <text x="130" y="150" text-anchor="middle" class="desc-white">Frontend / Order Service</text>
  <text x="56" y="172" class="desc-white">① 定义期望</text>
  <text x="56" y="190" class="desc-white">   期望的 API 响应格式</text>
  <text x="56" y="208" class="desc-white">   期望的字段和类型</text>
  <text x="56" y="226" class="desc-white">   约束条件</text>

  <!-- Provider box -->
  <rect x="280" y="108" width="180" height="130" rx="10" fill="#788C5D"/>
  <rect x="280" y="108" width="180" height="130" rx="10" fill="none" stroke="#5A6E44" stroke-width="1"/>
  <text x="370" y="132" text-anchor="middle" class="label white">提供者服务</text>
  <text x="370" y="150" text-anchor="middle" class="desc-white">Backend / Order API</text>
  <text x="296" y="172" class="desc-white">② 生成契约</text>
  <text x="296" y="190" class="desc-white">   Pact / OpenAPI</text>
  <text x="296" y="208" class="desc-white">   JSON Schema</text>
  <text x="296" y="226" class="desc-white">③ 实现并验证</text>

  <!-- Pact Broker -->
  <rect x="140" y="258" width="220" height="70" rx="10" fill="#141413"/>
  <text x="250" y="282" text-anchor="middle" class="label white">Pact Broker</text>
  <text x="250" y="300" text-anchor="middle" class="desc-white">契约仓库 + 版本管理</text>
  <text x="250" y="316" text-anchor="middle" class="desc-white">CI/CD 集成 + 兼容性检查</text>

  <!-- Connecting lines -->
  <line x1="190" y1="238" x2="190" y2="258" stroke="#D97757" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="310" y1="238" x2="310" y2="258" stroke="#788C5D" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="220" y1="175" x2="280" y2="175" stroke="#D97757" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="245" y="168" text-anchor="middle" class="desc" fill="#D97757">契约定义</text>

  <!-- Key insight below flow -->
  <rect x="40" y="340" width="420" height="60" rx="8" fill="#E3DACC"/>
  <rect x="40" y="340" width="420" height="60" rx="8" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="56" y="360" class="label-sm">💡 核心价值</text>
  <text x="56" y="376" class="desc">消费者定义期望（想要什么）→ 提供者实现契约（承诺什么）</text>
  <text x="56" y="392" class="desc">契约成为测试依据 → 任何一方变更都自动检测</text>

  <!-- ===== RIGHT: Test Type Comparison ===== -->
  <text x="490" y="90" class="label">契约测试 vs 其他测试类型</text>

  <!-- Table header -->
  <rect x="490" y="108" width="270" height="28" rx="6" fill="#141413"/>
  <text x="506" y="126" class="label-sm white">测试类型</text>
  <text x="598" y="126" class="label-sm white">速度</text>
  <text x="648" y="126" class="label-sm white">稳定性</text>
  <text x="720" y="126" class="label-sm white">适用场景</text>

  <!-- Unit Test -->
  <rect x="490" y="140" width="270" height="36" rx="0" fill="#FAF9F5"/>
  <rect x="490" y="140" width="270" height="36" rx="6" fill="#FAF9F5"/>
  <rect x="490" y="140" width="270" height="36" fill="none" stroke="#D1CFC5" stroke-width="1"/>
  <text x="506" y="162" class="label-sm">单元测试</text>
  <text x="598" y="162" text-anchor="middle" class="desc">毫秒</text>
  <text x="648" y="162" text-anchor="middle" class="desc">极高</text>
  <text x="720" y="162" text-anchor="middle" class="desc">算法逻辑</text>

  <!-- Contract Test - highlighted -->
  <rect x="490" y="180" width="270" height="40" rx="6" fill="#D97757"/>
  <text x="506" y="202" class="label-sm white">契约测试 ✦</text>
  <text x="598" y="202" text-anchor="middle" class="desc-white">秒级</text>
  <text x="648" y="202" text-anchor="middle" class="desc-white">高</text>
  <text x="720" y="202" text-anchor="middle" class="desc-white">服务边界</text>

  <!-- Integration Test -->
  <rect x="490" y="224" width="270" height="36" rx="6" fill="#E3DACC"/>
  <rect x="490" y="224" width="270" height="36" rx="6" fill="none" stroke="#D1CFC5" stroke-width="1"/>
  <text x="506" y="246" class="label-sm">集成测试</text>
  <text x="598" y="246" text-anchor="middle" class="desc">分钟</text>
  <text x="648" y="246" text-anchor="middle" class="desc">中</text>
  <text x="720" y="246" text-anchor="middle" class="desc">关键流程</text>

  <!-- E2E Test -->
  <rect x="490" y="264" width="270" height="36" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="506" y="286" class="label-sm">E2E 测试</text>
  <text x="598" y="286" text-anchor="middle" class="desc">小时</text>
  <text x="648" y="286" text-anchor="middle" class="desc">低</text>
  <text x="720" y="286" text-anchor="middle" class="desc">发布前验证</text>

  <!-- ===== BOTTOM: AI Contract Generation ===== -->
  <text x="490" y="320" class="label">AI 自动生成契约流程</text>

  <!-- Two paths -->
  <text x="490" y="338" class="desc">路径 1：消费者代码 → 契约</text>
  <text x="490" y="352" class="desc">路径 2：提供者代码 → 契约</text>

  <!-- Path boxes -->
  <rect x="490" y="362" width="128" height="58" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="498" y="380" class="label-sm">分析代码</text>
  <text x="498" y="396" class="desc">HTTP 调用提取</text>
  <text x="498" y="410" class="desc">响应字段使用分析</text>

  <line x1="618" y1="391" x2="638" y2="391" stroke="#D97757" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="648" y="362" width="112" height="58" rx="6" fill="#E3DACC"/>
  <rect x="648" y="362" width="112" height="58" rx="6" fill="none" stroke="#D1CFC5" stroke-width="1"/>
  <text x="656" y="380" class="label-sm">推断契约</text>
  <text x="656" y="396" class="desc">字段约束推断</text>
  <text x="656" y="410" class="desc">类型 / 枚举规则</text>

  <line x1="490" y1="430" x2="760" y2="430" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Pact output example -->
  <rect x="490" y="436" width="270" height="50" rx="6" fill="#141413"/>
  <text x="504" y="454" class="label-sm white">Pact 契约输出</text>
  <text x="504" y="470" class="desc-white">path: /api/orders/{id} · method: GET · status: 200</text>
  <text x="504" y="482" class="desc-white">body: { id, status, total.amount, total.currency }</text>

  <!-- Footer -->
  <text x="40" y="470" class="desc">契约测试是微服务架构的"安全带" — 平时感觉不到，关键时刻能救命</text>
  <text x="700" y="470" class="desc">AI-Native 软件工程系列 #9</text>

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97757"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#788C5D"/>
    </marker>
  </defs>
</svg>
