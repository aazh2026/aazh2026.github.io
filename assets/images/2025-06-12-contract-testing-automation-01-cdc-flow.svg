<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 800 500"><defs><style>.label,.label-sm{fill:#141413;font-size:13px;font-weight:600}.label-sm{font-size:11px;font-weight:500}.desc{fill:#87867f;font-size:11px}.desc-white{fill:rgba(255,255,255,.85);font-size:11px}.white{fill:#fff}</style></defs><path d="M0 0h800v500H0z" style="fill:#faf9f5"/><text x="40" y="38" style="fill:#141413;font-size:20px;font-weight:700;font-family:&quot;ui-serif, Georgia, serif&quot;">消费者驱动契约（CDC）：服务间解耦的关键</text><text x="40" y="58" style="fill:#87867f;font-size:12px">消费者定义期望 → 提供者承诺实现 → 契约持续验证</text><text x="40" y="90" class="label">CDC 契约交换流程</text><rect width="180" height="130" x="40" y="108" fill="#d97757" rx="10"/><rect width="180" height="130" x="40" y="108" fill="none" stroke="#b5604a" rx="10"/><text x="130" y="132" class="label white" text-anchor="middle">消费者服务</text><text x="130" y="150" class="desc-white" text-anchor="middle">Frontend / Order Service</text><text x="56" y="172" class="desc-white">① 定义期望</text><text x="56" y="190" class="desc-white">   期望的 API 响应格式</text><text x="56" y="208" class="desc-white">   期望的字段和类型</text><text x="56" y="226" class="desc-white">   约束条件</text><rect width="180" height="130" x="280" y="108" fill="#788c5d" rx="10"/><rect width="180" height="130" x="280" y="108" fill="none" stroke="#5a6e44" rx="10"/><text x="370" y="132" class="label white" text-anchor="middle">提供者服务</text><text x="370" y="150" class="desc-white" text-anchor="middle">Backend / Order API</text><text x="296" y="172" class="desc-white">② 生成契约</text><text x="296" y="190" class="desc-white">   Pact / OpenAPI</text><text x="296" y="208" class="desc-white">   JSON Schema</text><text x="296" y="226" class="desc-white">③ 实现并验证</text><rect width="220" height="70" x="140" y="258" fill="#141413" rx="10"/><text x="250" y="282" class="label white" text-anchor="middle">Pact Broker</text><text x="250" y="300" class="desc-white" text-anchor="middle">契约仓库 + 版本管理</text><text x="250" y="316" class="desc-white" text-anchor="middle">CI/CD 集成 + 兼容性检查</text><path stroke="#d97757" stroke-width="2" marker-end="url(#arrowRed)" d="M190 238v20"/><path stroke="#788c5d" stroke-width="2" marker-end="url(#arrowGreen)" d="M310 238v20"/><path stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" d="M220 175h60"/><text x="245" y="168" fill="#d97757" class="desc" text-anchor="middle">契约定义</text><rect width="420" height="60" x="40" y="340" fill="#e3dacc" rx="8"/><rect width="420" height="60" x="40" y="340" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="56" y="360" class="label-sm">💡 核心价值</text><text x="56" y="376" class="desc">消费者定义期望（想要什么）→ 提供者实现契约（承诺什么）</text><text x="56" y="392" class="desc">契约成为测试依据 → 任何一方变更都自动检测</text><text x="490" y="90" class="label">契约测试 vs 其他测试类型</text><rect width="270" height="28" x="490" y="108" fill="#141413" rx="6"/><text x="506" y="126" class="label-sm white">测试类型</text><text x="598" y="126" class="label-sm white">速度</text><text x="648" y="126" class="label-sm white">稳定性</text><text x="720" y="126" class="label-sm white">适用场景</text><rect width="270" height="36" x="490" y="140" fill="#faf9f5" rx="0"/><rect width="270" height="36" x="490" y="140" fill="#faf9f5" rx="6"/><path fill="none" stroke="#d1cfc5" d="M490 140h270v36H490z"/><text x="506" y="162" class="label-sm">单元测试</text><text x="598" y="162" class="desc" text-anchor="middle">毫秒</text><text x="648" y="162" class="desc" text-anchor="middle">极高</text><text x="720" y="162" class="desc" text-anchor="middle">算法逻辑</text><rect width="270" height="40" x="490" y="180" fill="#d97757" rx="6"/><text x="506" y="202" class="label-sm white">契约测试 ✦</text><text x="598" y="202" class="desc-white" text-anchor="middle">秒级</text><text x="648" y="202" class="desc-white" text-anchor="middle">高</text><text x="720" y="202" class="desc-white" text-anchor="middle">服务边界</text><rect width="270" height="36" x="490" y="224" fill="#e3dacc" rx="6"/><rect width="270" height="36" x="490" y="224" fill="none" stroke="#d1cfc5" rx="6"/><text x="506" y="246" class="label-sm">集成测试</text><text x="598" y="246" class="desc" text-anchor="middle">分钟</text><text x="648" y="246" class="desc" text-anchor="middle">中</text><text x="720" y="246" class="desc" text-anchor="middle">关键流程</text><rect width="270" height="36" x="490" y="264" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="506" y="286" class="label-sm">E2E 测试</text><text x="598" y="286" class="desc" text-anchor="middle">小时</text><text x="648" y="286" class="desc" text-anchor="middle">低</text><text x="720" y="286" class="desc" text-anchor="middle">发布前验证</text><text x="490" y="320" class="label">AI 自动生成契约流程</text><text x="490" y="338" class="desc">路径 1：消费者代码 → 契约</text><text x="490" y="352" class="desc">路径 2：提供者代码 → 契约</text><rect width="128" height="58" x="490" y="362" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="498" y="380" class="label-sm">分析代码</text><text x="498" y="396" class="desc">HTTP 调用提取</text><text x="498" y="410" class="desc">响应字段使用分析</text><path stroke="#d97757" stroke-width="1.5" marker-end="url(#arrowRed)" d="M618 391h20"/><rect width="112" height="58" x="648" y="362" fill="#e3dacc" rx="6"/><rect width="112" height="58" x="648" y="362" fill="none" stroke="#d1cfc5" rx="6"/><text x="656" y="380" class="label-sm">推断契约</text><text x="656" y="396" class="desc">字段约束推断</text><text x="656" y="410" class="desc">类型 / 枚举规则</text><path stroke="#d1cfc5" stroke-dasharray="4,3" d="M490 430h270"/><rect width="270" height="50" x="490" y="436" fill="#141413" rx="6"/><text x="504" y="454" class="label-sm white">Pact 契约输出</text><text x="504" y="470" class="desc-white">path: /api/orders/{id} · method: GET · status: 200</text><text x="504" y="482" class="desc-white">body: { id, status, total.amount, total.currency }</text><text x="40" y="470" class="desc">契约测试是微服务架构的&quot;安全带&quot; — 平时感觉不到，关键时刻能救命</text><text x="700" y="470" class="desc">AI-Native 软件工程系列 #9</text><defs><marker id="arrowRed" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#d97757" d="M0 0v6l8-3z"/></marker><marker id="arrowGreen" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#788c5d" d="M0 0v6l8-3z"/></marker></defs></svg>