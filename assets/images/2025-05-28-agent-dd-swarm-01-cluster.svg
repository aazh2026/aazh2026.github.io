<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Agent-DD Swarm: Architect/Dev/Test/Review → Coordinator → SharedState -->
  <rect width="560" height="180" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">Agent-DD Swarm：Architect/Dev/Test/Review Agent 协作</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/28</text>

  <!-- Four agents (top row) -->
  <rect x="30" y="50" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="30" y="50" width="100" height="16" rx="6" fill="#FEF0EC" stroke="#D97757" stroke-width="1"/>
  <text x="80" y="63" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Architect</text>
  <text x="80" y="82" text-anchor="middle" font-size="9" fill="#141413">架构 Agent</text>
  <text x="80" y="96" text-anchor="middle" font-size="8" fill="#87867F">架构设计</text>

  <rect x="150" y="50" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="150" y="50" width="100" height="16" rx="6" fill="#FEF0EC" stroke="#D97757" stroke-width="1"/>
  <text x="200" y="63" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">DevAgent</text>
  <text x="200" y="82" text-anchor="middle" font-size="9" fill="#141413">开发 Agent</text>
  <text x="200" y="96" text-anchor="middle" font-size="8" fill="#87867F">代码生成</text>

  <rect x="270" y="50" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="270" y="50" width="100" height="16" rx="6" fill="#FEF0EC" stroke="#D97757" stroke-width="1"/>
  <text x="320" y="63" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">TestAgent</text>
  <text x="320" y="82" text-anchor="middle" font-size="9" fill="#141413">测试 Agent</text>
  <text x="320" y="96" text-anchor="middle" font-size="8" fill="#87867F">测试生成</text>

  <rect x="390" y="50" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="390" y="50" width="100" height="16" rx="6" fill="#FEF0EC" stroke="#D97757" stroke-width="1"/>
  <text x="440" y="63" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">ReviewAgent</text>
  <text x="440" y="82" text-anchor="middle" font-size="9" fill="#141413">审查 Agent</text>
  <text x="440" y="96" text-anchor="middle" font-size="8" fill="#87867F">代码审查</text>

  <!-- Arrows to Coordinator -->
  <line x1="80" y1="105" x2="280" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="200" y1="105" x2="280" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="320" y1="105" x2="280" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="440" y1="105" x2="280" y2="130" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Coordinator -->
  <rect x="180" y="130" width="200" height="32" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="180" y="130" width="200" height="14" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="280" y="143" text-anchor="middle" font-size="9.5" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Coordinator · 协调 Agent</text>
  <text x="280" y="156" text-anchor="middle" font-size="9" fill="#141413">任务协调 · 冲突解决 · 结果聚合</text>

  <!-- Arrow Coordinator → SharedState -->
  <line x1="280" y1="162" x2="280" y2="172" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,172 280,180 284,172" fill="#D1CFC5"/>

  <!-- SharedState (bottom) -->
  <rect x="160" y="172" width="240" height="10" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.2"/>
  <text x="280" y="180" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">Shared State</text>
</svg>