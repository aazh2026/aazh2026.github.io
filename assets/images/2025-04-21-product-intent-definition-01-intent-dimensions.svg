  <text x="605" y="255" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" opacity=".85">系统需要具备什么能力？</text>
  <text x="605" y="273" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".85">core_capabilities · non_functional</text>
