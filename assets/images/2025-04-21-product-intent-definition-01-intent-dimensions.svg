  <rect width="12" height="12" x="340" y="570" fill="#87867f" rx="3"/>
  <text x="358" y="580" fill="#87867f" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10">技术/功能</text>
  <rect width="12" height="12" x="440" y="570" fill="#d1cfc5" rx="3"/>
  <text x="458" y="580" fill="#87867f" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10">约束/演化</text>
