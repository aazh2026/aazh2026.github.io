  <text x="130" y="136" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" opacity=".85">要解决什么业务问题？成功指标是什么？</text>
  <text x="700" y="130" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" text-anchor="middle">problem · opportunity · success_metrics</text>
  <path stroke="#d1cfc5" stroke-dasharray="5,3" stroke-width="2" d="M450 160v88"/>
  <rect width="260" height="100" x="60" y="210" fill="#788c5d" filter="url(#shadow3)" rx="10"/>
