  <text x="605" y="445" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" opacity=".8">功能如何随时间和反馈演进？</text>
  <text x="605" y="463" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".8">learning_mechanism · iteration_plan</text>
  <text x="605" y="481" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".8">feedback_loop · sunset_criteria</text>
  <path stroke="#d1cfc5" stroke-dasharray="5,3" stroke-width="2" d="m580 450-78-112"/>
