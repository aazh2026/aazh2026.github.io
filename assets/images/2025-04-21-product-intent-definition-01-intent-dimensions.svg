<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <filter id="shadow3" width="120%" height="130%" x="-10%" y="-10%">
      <feDropShadow dx="0" dy="4" flood-color="#141413" flood-opacity=".12" stdDeviation="6"/>
