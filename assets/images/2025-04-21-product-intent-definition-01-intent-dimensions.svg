  <text x="85" y="255" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" opacity=".85">用户希望获得什么价值？</text>
  <text x="85" y="273" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".85">user_segments · user_scenarios</text>
  <text x="85" y="291" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" opacity=".85">pain_point · expectation</text>
