  </defs>
  <rect width="900" height="600" fill="url(#bg3)" rx="16"/>
  <text x="450" y="42" fill="#141413" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" text-anchor="middle">Product Intent 五维度框架</text>
  <text x="450" y="64" fill="#87867f" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" text-anchor="middle">Five Dimensions of Product Intent for AI-Native Products</text>
  <circle cx="450" cy="310" r="52" fill="#d97757" filter="url(#shadow3)"/>
  <text x="450" y="303" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Product</text>
  <text x="450" y="320" fill="#faf9f5" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Intent</text>
