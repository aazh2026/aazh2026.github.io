<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 380"><title>智能设计系统循环</title><desc>设计令牌 → AI 一致性检查 → 组件库同步 → 开发者热更新的四阶段循环图</desc><path fill="#faf9f5" d="M0 0h680v380H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">智能设计系统循环</text><text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Design Token → AI Review → Component Library → Dev Handoff</text><path fill="none" stroke="#d97757" stroke-dasharray="8,4" stroke-width="3" d="M340 200a140 140 0 0 1 140 0"/><path fill="#d97757" d="m480 194 10 6-10 6z"/><text x="415" y="170" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600">自我维护</text><rect width="240" height="72" x="220" y="60" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="10"/><rect width="70" height="72" x="220" y="60" fill="#d97757" fill-opacity=".1" rx="10"/><text x="255" y="84" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Stage 1</text><text x="255" y="100" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">设计令牌</text><text x="340" y="86" fill="#141413" font-size="12">设计令牌更新</text><text x="340" y="104" fill="#87867f" font-size="10">品牌颜色 · 间距 · 字体变量</text><path stroke="#d1cfc5" stroke-width="1.8" d="m460 132 50 33"/><path fill="#d1cfc5" d="m514 169-8-8 10-1z"/><rect width="190" height="72" x="470" y="150" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="10"/><rect width="70" height="72" x="470" y="150" fill="#788c5d" fill-opacity=".1" rx="10"/><text x="505" y="174" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Stage 2</text><text x="505" y="190" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">AI Review</text><text x="565" y="176" fill="#141413" font-size="