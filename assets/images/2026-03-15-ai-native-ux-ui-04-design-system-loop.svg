<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>智能设计系统循环</title>
  <desc>设计令牌 → AI 一致性检查 → 组件库同步 → 开发者热更新的四阶段循环图</desc>

  <!-- Background -->
  <rect width="680" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">智能设计系统循环</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Design Token → AI Review → Component Library → Dev Handoff</text>

  <!-- Central loop arrow (large) -->
  <path d="M 340 200 A 140 140 0 0 1 480 200" stroke="#D97757" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <polygon points="480,194 490,200 480,206" fill="#D97757"/>
  <text x="415" y="170" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">自我维护</text>

  <!-- Stage 1: 设计令牌更新 (top) -->
  <rect x="220" y="60" width="240" height="72" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="220" y="60" width="70" height="72" rx="10" fill="#D97757" fill-opacity="0.1"/>
  <text x="255" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Stage 1</text>
  <text x="255" y="100" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">设计令牌</text>
  <text x="340" y="86" font-size="12" fill="#141413">设计令牌更新</text>
  <text x="340" y="104" font-size="10" fill="#87867F">品牌颜色 · 间距 · 字体变量</text>

  <!-- Arrow 1→2 (right side, clockwise) -->
  <line x1="460" y1="132" x2="510" y2="165" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="514,169 506,161 516,160" fill="#D1CFC5"/>

  <!-- Stage 2: AI 一致性检查 (right) -->
  <rect x="470" y="150" width="190" height="72" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="470" y="150" width="70" height="72" rx="10" fill="#788C5D" fill-opacity="0.1"/>
  <text x="505" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Stage 2</text>
  <text x="505" y="190" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">AI Review</text>
  <text x="565" y="176" font-size="12" fill="#141413">AI 一致性检查</text>
  <text x="565" y="194" font-size="10" fill="#87867F">跨平台 · 跨组件 · 冲突检测</text>

  <!-- Arrow 2→3 (right side, going down) -->
  <line x1="565" y1="222" x2="565" y2="250" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="561,254 565,246 569,254" fill="#D1CFC5"/>

  <!-- Stage 3: 组件库同步 (bottom right) -->
  <rect x="380" y="255" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="380" y="255" width="70" height="72" rx="10" fill="#D1CFC5" fill-opacity="0.3"/>
  <text x="415" y="279" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Stage 3</text>
  <text x="415" y="295" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Components</text>
  <text x="480" y="281" font-size="12" fill="#141413">组件库同步</text>
  <text x="480" y="299" font-size="10" fill="#87867F">自动映射 · 版本追踪 · 废弃预警</text>

  <!-- Arrow 3→4 (left side, going down then left) -->
  <line x1="380" y1="291" x2="310" y2="291" stroke="#D1CFC5" stroke-width="1.8"/>
  <polygon points="306,287 314,291 306,295" fill="#D1CFC5"/>

  <!-- Stage 4: 开发者热更新 (bottom left) -->
  <rect x="100" y="255" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="100" y="255" width="70" height="72" rx="10" fill="#D97757" fill-opacity="0.1"/>
  <text x="135" y="279" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Stage 4</text>
  <text x="135" y="295" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Dev Handoff</text>
  <text x="200" y="281" font-size="12" fill="#141413">开发者热更新</text>
  <text x="200" y="299" font-size="10" fill="#87867F">PR 自动生成 · CI 触发 · 部署就绪</text>

  <!-- Feedback arrow: Stage 4 → Stage 1 (big loop return) -->
  <path d="M 200 255 A 140 140 0 0 1 220 132" stroke="#D97757" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <polygon points="220,128 213,138 227,136" fill="#D97757"/>
  <text x="148" y="195" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">变更溯源</text>

  <!-- Sub-labels for each stage -->
  <text x="340" y="152" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">设计工具内修改</text>
  <text x="565" y="242" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">自动审查</text>
  <text x="480" y="338" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">推送至所有平台</text>
  <text x="200" y="338" text-anchor="middle" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">代码仓库自动更新</text>

  <!-- Bottom: key insight box -->
  <rect x="180" y="350" width="320" height="22" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="340" y="365" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">单一变更源 · 全链路自动传播 · 全程可追溯</text>
</svg>
