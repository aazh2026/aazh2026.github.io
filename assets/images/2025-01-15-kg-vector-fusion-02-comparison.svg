<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>向量记忆 vs 知识图谱对比</title>
  <desc>两种记忆系统的对比：向量记忆擅长语义联想，知识图谱擅长精确推理</desc>

  <!-- Background -->
  <rect width="640" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">两种记忆的本质差异</text>
  <text x="320" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">融合策略 · postcodeengineering.com · 2025/01/15</text>

  <!-- Left Card: 向量记忆 -->
  <rect x="32" y="60" width="248" height="210" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="32" y="60" width="248" height="36" rx="8" fill="#2563EB"/>
  <rect x="32" y="84" width="248" height="12" fill="#2563EB"/>
  <text x="156" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">向量记忆</text>

  <!-- Left: Strengths -->
  <text x="48" y="116" font-size="11" fill="#141413" font-weight="600">擅长</text>
  <text x="48" y="132" font-size="10" fill="#141413">语义相似匹配</text>
  <text x="48" y="146" font-size="10" fill="#141413">模糊查询 / 同义词召回</text>
  <text x="48" y="160" font-size="10" fill="#141413">大规模非结构化检索</text>
  <text x="48" y="174" font-size="10" fill="#141413">上下文联想</text>

  <!-- Left: Weaknesses -->
  <text x="48" y="198" font-size="11" fill="#141413" font-weight="600">弱点</text>
  <text x="48" y="214" font-size="10" fill="#87867F">不知道时间 / 版本 / 时效性</text>
  <text x="48" y="228" font-size="10" fill="#87867F">无法精确逻辑推理</text>
  <text x="48" y="242" font-size="10" fill="#87867F">"A是B的父亲"类推失败</text>

  <!-- Left pill tag -->
  <rect x="48" y="254" width="36" height="18" rx="9" fill="#2563EB"/>
  <text x="66" y="267" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">感</text>

  <!-- Center: 互补箭头 -->
  <line x1="295" y1="160" x2="345" y2="160" stroke="#D97757" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="320" y="150" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">互补</text>
  <polygon points="345,156 340,164 350,164" fill="#D97757"/>

  <!-- Cycle arrows -->
  <path d="M 320 175 C 300 195, 340 195, 320 175" stroke="#D97757" stroke-width="1.5" fill="none"/>
  <path d="M 320 175 C 340 155, 300 155, 320 175" stroke="#D97757" stroke-width="1.5" fill="none"/>
  <text x="320" y="185" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">循环</text>

  <!-- Right Card: 知识图谱 -->
  <rect x="360" y="60" width="248" height="210" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="360" y="60" width="248" height="36" rx="8" fill="#059669"/>
  <rect x="360" y="84" width="248" height="12" fill="#059669"/>
  <text x="484" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">知识图谱</text>

  <!-- Right: Strengths -->
  <text x="376" y="116" font-size="11" fill="#141413" font-weight="600">擅长</text>
  <text x="376" y="132" font-size="10" fill="#141413">精确关系推理</text>
  <text x="376" y="146" font-size="10" fill="#141413">实体 / 关系精确查询</text>
  <text x="376" y="160" font-size="10" fill="#141413">多跳遍历 (A→B→C)</text>
  <text x="376" y="174" font-size="10" fill="#141413">事实校验与版本追踪</text>

  <!-- Right: Weaknesses -->
  <text x="376" y="198" font-size="11" fill="#141413" font-weight="600">弱点</text>
  <text x="376" y="214" font-size="10" fill="#87867F">非结构化文本处理成本高</text>
  <text x="376" y="228" font-size="10" fill="#87867F">模糊查询能力弱</text>
  <text x="376" y="242" font-size="10" fill="#87867F">构建与维护成本高</text>

  <!-- Right pill tag -->
  <rect x="376" y="254" width="36" height="18" rx="9" fill="#059669"/>
  <text x="394" y="267" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">理</text>
</svg>