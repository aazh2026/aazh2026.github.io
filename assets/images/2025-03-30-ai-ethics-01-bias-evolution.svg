<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 600 300"><title>AI偏见的四个时代演变</title><desc>从20世纪显性歧视到2024年AI放大偏见的演变时间线</desc><path fill="#faf9f5" d="M0 0h600v300H0z"/><text x="300" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">AI偏见的四个时代</text><text x="300" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">1970s – 2024 · 偏见演变时间线</text><rect width="120" height="170" x="30" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="90" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">1970s</text><text x="90" y="100" fill="#141413" font-size="12" text-anchor="middle">显性歧视</text><text x="90" y="118" fill="#87867f" font-size="10" text-anchor="middle">明文规则</text><text x="90" y="136" fill="#141413" font-size="9.5" text-anchor="middle">&quot;不招女性&quot;</text><text x="90" y="150" fill="#141413" font-size="9.5" text-anchor="middle">&quot;不租给某些族裔&quot;</text><rect width="44" height="16" x="42" y="160" fill="#788c5d" rx="8"/><text x="64" y="172" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">高可见</text><rect width="44" height="16" x="92" y="160" fill="#788c5d" rx="8"/><text x="114" y="172" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">高追责</text><path stroke="#d1cfc5" stroke-width="1.5" d="M152 145h20"/><path fill="#d1cfc5" d="m170 141 8 4-8 4z"/><rect width="120" height="170" x="180" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="240" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">1980–2010</text><text x="240" y="100" fill="#141413" font-size="12" text-anchor="middle">隐性歧视</text><text x="240" y="118" fill="#87867f" font-size="10" text-anchor="middle">主观判断</text><text x="240" y="136" fill="#141413" font-size="9.5" text-anchor="middle">&quot;文化契合度&quot;</text><text x="240" y="150" fill="#141413" font-size="9.5" text-anchor="middle">替代性拒绝理由</text><rect width="44" height="16" x="192" y="160" fill="#d97757" opacity=".6" rx="8"/><text x="214" y="172" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">中可见</text><rect width="44" height="16" x="242" y="160" fill="#d97757" opacity=".6" rx="8"/><text x="264" y="172" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">中追责</text><path stroke="#d1cfc5" stroke-width="1.5" d="M302 145h20"/><path fill="#d1cfc5" d="m320 141 8 4-8 4z"/><rect width="120" height="170" x="330" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="390" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">2010–2018</text><text x="390" y="100" fill="#141413" font-size="12" text-anchor="middle">算法歧视</text><text x="390" y="118" fill="#87867f" font-size="10" text-anchor="middle">黑盒算法</text><text x="390" y="136" fill="#141413" font-size="9.5" text-anchor="middle">&quot;客观&quot;的偏见</text><text x="390" y="150" fill="#141413" font-size="9.5" text-anchor="middle">难以被发现</text><rect width="44" height="16" x="342" y="160" fill="#d97757" opacity=".35" rx="8"/><text x="364" y="172" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">低可见</text><rect width="44" height="16" x="392" y="160" fill="#d97757" opacity=".35" rx="8"/><text x="414" y="172" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">低追责</text><path stroke="#d97757" stroke-width="1.5" d="M452 145h20"/><path fill="#d97757" d="m470 141 8 4-8 4z"/><rect width="110" height="170" x="480" y="60" fill="#fff" stroke="#d97757" stroke-width="2.2" rx="8"/><text x="535" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">2024+</text><text x="535" y="100" fill="#141413" font-size="12" text-anchor="middle">AI放大偏见</text><text x="535" y="118" fill="#87867f" font-size="10" text-anchor="middle">深度学习</text><text x="535" y="136" fill="#141413" font-size="9.5" text-anchor="middle">历史偏见</text><text x="535" y="150" fill="#141413" font-size="9.5" text-anchor="middle">被编码进系统</text><rect width="52" height="16" x="490" y="160" fill="#d97757" opacity=".2" rx="8"/><text x="516" y="172" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">极低可见</text><rect width="28" height="16" x="548" y="160" fill="#d97757" opacity=".2" rx="8"/><text x="562" y="172" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">?</text><text x="300" y="255" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5" text-anchor="middle">每一次技术革新都被用来掩盖和放大偏见 · AI不是例外</text><path fill="none" stroke="#d97757" stroke-dasharray="3,2" stroke-width="1.5" d="M60 245q120-5 240-7t240-3" opacity=".5"/><text x="560" y="240" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" opacity=".7">可见性↓</text></svg>