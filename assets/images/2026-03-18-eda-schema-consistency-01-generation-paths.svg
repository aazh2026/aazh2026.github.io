<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Schema Generation Paths">
  <title>事件 Schema 生成路径</title>
  <desc>从代码和需求两种路径使用 AI 生成事件 Schema 的流程图</desc>

  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B8DB8"/>
      <stop offset="100%" stop-color="#4A73A0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#5F7350"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#87867F"/>
    </marker>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#141413" text-anchor="middle">AI 事件 Schema 生成路径</text>
  <text x="400" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#87867F" text-anchor="middle">两条生成路径：代码分析 · 需求理解</text>

  <!-- Path 1: Code → Schema -->
  <text x="180" y="95" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#5B8DB8" text-anchor="middle">路径 1：代码 → Schema</text>

  <!-- Path 1 boxes -->
  <rect x="30" y="110" width="300" height="70" fill="#FFFFFF" rx="10" filter="url(#shadow2)"/>
  <rect x="30" y="110" width="6" height="70" fill="url(#blueGrad)" rx="3"/>
  <text x="50" y="135" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">源代码分析</text>
  <text x="50" y="152" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 类型定义（TypeScript/Java）</text>
  <text x="50" y="167" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 注解/装饰器（@Event）</text>

  <line x1="180" y1="180" x2="180" y2="210" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrowHead)"/>

  <rect x="30" y="215" width="300" height="70" fill="#FFFFFF" rx="10" filter="url(#shadow2)"/>
  <rect x="30" y="215" width="6" height="70" fill="url(#blueGrad)" rx="3"/>
  <text x="50" y="240" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">AI 提取事件定义</text>
  <text x="50" y="257" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 识别事件类</text>
  <text x="50" y="272" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 提取字段类型与约束</text>

  <line x1="180" y1="285" x2="180" y2="315" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrowHead)"/>

  <rect x="30" y="320" width="300" height="70" fill="#FFFFFF" rx="10" filter="url(#shadow2)"/>
  <rect x="30" y="320" width="6" height="70" fill="url(#blueGrad)" rx="3"/>
  <text x="50" y="345" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">生成 Schema 文件</text>
  <text x="50" y="362" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">Avro · Protobuf · JSON Schema</text>
  <text x="50" y="377" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">AsyncAPI · TypeScript 类型</text>

  <!-- Path 2: Requirements → Schema -->
  <text x="600" y="95" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#788C5D" text-anchor="middle">路径 2：需求 → Schema</text>

  <rect x="420" y="110" width="300" height="70" fill="#FFFFFF" rx="10" filter="url(#shadow2)"/>
  <rect x="710" y="110" width="6" height="70" fill="url(#greenGrad)" rx="3"/>
  <text x="440" y="135" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">需求描述</text>
  <text x="440" y="152" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 用户故事</text>
  <text x="440" y="167" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 验收标准 · 示例数据</text>

  <line x1="570" y1="180" x2="570" y2="210" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrowHead)"/>

  <rect x="420" y="215" width="300" height="70" fill="#FFFFFF" rx="10" filter="url(#shadow2)"/>
  <rect x="710" y="215" width="6" height="70" fill="url(#greenGrad)" rx="3"/>
  <text x="440" y="240" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">AI 理解领域概念</text>
  <text x="440" y="257" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 识别实体与属性</text>
  <text x="440" y="272" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 推断关系与约束</text>

  <line x1="570" y1="285" x2="570" y2="315" stroke="#D1CFC5" stroke-width="2" marker-end="url(#arrowHead)"/>

  <rect x="420" y="320" width="300" height="70" fill="#FFFFFF" rx="10" filter="url(#shadow2)"/>
  <rect x="710" y="320" width="6" height="70" fill="url(#greenGrad)" rx="3"/>
  <text x="440" y="345" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">生成 Schema 草案</text>
  <text x="440" y="362" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 字段建议 · 类型推断</text>
  <text x="440" y="377" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">· 约束推荐 · 兼容性评估</text>

  <!-- Center convergence -->
  <line x1="330" y1="355" x2="420" y2="355" stroke="#D97757" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowHead)"/>
  <text x="375" y="345" font-family="system-ui,sans-serif" font-size="10" fill="#D97757" text-anchor="middle">合并</text>

  <!-- Output box -->
  <rect x="280" y="400" width="240" height="60" fill="#FFFFFF" rx="10" filter="url(#shadow2)" stroke="#D97757" stroke-width="2"/>
  <text x="400" y="425" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle">统一 Schema 注册中心</text>
  <text x="400" y="445" font-family="system-ui,sans-serif" font-size="11" fill="#87867F" text-anchor="middle">版本管理 · 兼容性检查 · 消费者发现</text>
</svg>