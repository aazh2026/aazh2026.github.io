<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>AI架构评审的范式演进</title>
  <desc>从传统人工评审到AI-First范式的四个发展阶段</desc>

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI架构评审的范式演进</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">基于 Addy Osmani 框架改编</text>

  <!-- Stage 1: 传统评审 -->
  <rect x="30" y="70" width="145" height="200" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="30" y="70" width="145" height="32" rx="8" fill="#E3DACC" stroke="none"/>
  <rect x="30" y="94" width="145" height="8" fill="#E3DACC" stroke="none"/>
  <text x="102" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">传统人工评审</text>
  <text x="102" y="122" text-anchor="middle" font-size="10" fill="#87867F">评审方式</text>
  <text x="102" y="138" text-anchor="middle" font-size="9.5" fill="#141413">人查人</text>
  <text x="102" y="156" text-anchor="middle" font-size="10" fill="#87867F">决策依据</text>
  <text x="102" y="172" text-anchor="middle" font-size="9.5" fill="#141413">经验与直觉</text>
  <text x="102" y="190" text-anchor="middle" font-size="10" fill="#87867F">量化程度</text>
  <text x="102" y="206" text-anchor="middle" font-size="9.5" fill="#141413">定性为主</text>
  <text x="102" y="224" text-anchor="middle" font-size="10" fill="#87867F">AI角色</text>
  <text x="102" y="240" text-anchor="middle" font-size="9.5" fill="#141413">无</text>
  <rect x="70" y="248" width="65" height="14" rx="7" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="102" y="258" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">历史阶段</text>

  <!-- Arrow 1→2 -->
  <line x1="175" y1="170" x2="200" y2="170" stroke="#D97757" stroke-width="2"/>
  <polygon points="200,166 192,170 192,174" fill="#D97757"/>
  <text x="187" y="160" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">过渡</text>

  <!-- Stage 2: AI辅助评审 -->
  <rect x="205" y="70" width="145" height="200" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="205" y="70" width="145" height="32" rx="8" fill="#E3DACC" stroke="none"/>
  <rect x="205" y="94" width="145" height="8" fill="#E3DACC" stroke="none"/>
  <text x="277" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">AI辅助评审</text>
  <text x="277" y="122" text-anchor="middle" font-size="10" fill="#87867F">评审方式</text>
  <text x="277" y="138" text-anchor="middle" font-size="9.5" fill="#141413">机查 + 人查</text>
  <text x="277" y="156" text-anchor="middle" font-size="10" fill="#87867F">决策依据</text>
  <text x="277" y="172" text-anchor="middle" font-size="9.5" fill="#141413">数据 + 经验</text>
  <text x="277" y="190" text-anchor="middle" font-size="10" fill="#87867F">量化程度</text>
  <text x="277" y="206" text-anchor="middle" font-size="9.5" fill="#141413">半定量</text>
  <text x="277" y="224" text-anchor="middle" font-size="10" fill="#87867F">AI角色</text>
  <text x="277" y="240" text-anchor="middle" font-size="9.5" fill="#141413">预审 + 建议</text>
  <rect x="245" y="248" width="65" height="14" rx="7" fill="#788C5D" stroke="none"/>
  <text x="277" y="258" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">当前主流</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="170" x2="375" y2="170" stroke="#D97757" stroke-width="2"/>
  <polygon points="375,166 367,170 367,174" fill="#D97757"/>
  <text x="362" y="160" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">演进</text>

  <!-- Stage 3: AI-First范式 -->
  <rect x="380" y="70" width="145" height="200" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="380" y="70" width="145" height="32" rx="8" fill="#D97757" stroke="none"/>
  <rect x="380" y="94" width="145" height="8" fill="#D97757" stroke="none"/>
  <text x="452" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">AI-First 范式</text>
  <text x="452" y="122" text-anchor="middle" font-size="10" fill="#87867F">评审方式</text>
  <text x="452" y="138" text-anchor="middle" font-size="9.5" fill="#141413">AI全流程主导</text>
  <text x="452" y="156" text-anchor="middle" font-size="10" fill="#87867F">决策依据</text>
  <text x="452" y="172" text-anchor="middle" font-size="9.5" fill="#141413">量化模型驱动</text>
  <text x="452" y="190" text-anchor="middle" font-size="10" fill="#87867F">量化程度</text>
  <text x="452" y="206" text-anchor="middle" font-size="9.5" fill="#141413">全定量</text>
  <text x="452" y="224" text-anchor="middle" font-size="10" fill="#87867F">AI角色</text>
  <text x="452" y="240" text-anchor="middle" font-size="9.5" fill="#141413">主导 + 人类监督</text>
  <rect x="420" y="248" width="65" height="14" rx="7" fill="#D97757"/>
  <text x="452" y="258" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">近期趋势</text>

  <!-- Arrow 3→4 -->
  <line x1="525" y1="170" x2="550" y2="170" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="550,166 542,170 542,174" fill="#D1CFC5"/>
  <text x="537" y="160" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">未来</text>

  <!-- Stage 4: 自主架构系统 -->
  <rect x="555" y="70" width="110" height="200" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="6,3"/>
  <rect x="555" y="70" width="110" height="32" rx="8" fill="#F0EEE6" stroke="none"/>
  <rect x="555" y="94" width="110" height="8" fill="#F0EEE6" stroke="none"/>
  <text x="610" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">自主架构</text>
  <text x="610" y="122" text-anchor="middle" font-size="10" fill="#87867F">评审方式</text>
  <text x="610" y="138" text-anchor="middle" font-size="9" fill="#87867F">自演进系统</text>
  <text x="610" y="156" text-anchor="middle" font-size="10" fill="#87867F">决策依据</text>
  <text x="610" y="172" text-anchor="middle" font-size="9" fill="#87867F">实时反馈</text>
  <text x="610" y="190" text-anchor="middle" font-size="10" fill="#87867F">量化程度</text>
  <text x="610" y="206" text-anchor="middle" font-size="9" fill="#87867F">动态量化</text>
  <text x="610" y="224" text-anchor="middle" font-size="10" fill="#87867F">AI角色</text>
  <text x="610" y="240" text-anchor="middle" font-size="9" fill="#87867F">完全自主</text>
  <rect x="587" y="248" width="46" height="14" rx="7" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="610" y="258" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">远景</text>

  <!-- Bottom note -->
  <text x="340" y="315" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">特征1：数据驱动的评审 —— 从"我觉得"到"数据显示"</text>

  <!-- Timeline arrow -->
  <line x1="30" y1="300" x2="650" y2="300" stroke="#D1CFC5" stroke-width="1.2"/>
  <polygon points="650,296 642,300 642,304" fill="#D1CFC5"/>
  <text x="340" y="292" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">范式演进时间线 →</text>
</svg>