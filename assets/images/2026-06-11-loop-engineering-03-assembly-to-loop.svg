<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 260">
  <title>汇编语言时代到循环时代的类比</title>
  <desc>
    左：手写每条指令的汇编时代；右：定义目标后自主循环的高级语言时代。同一类转变的两个层次。
  </desc>
  <path fill="#faf9f5" d="M0 0h680v260H0z"/>
  <text x="340" y="24" fill="#141413" font-size="13" font-weight="500" letter-spacing="-.01em" text-anchor="middle">同一类转变的两个层次</text>
  <text x="340" y="38" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">硬件层 ↑ 代码层 ↑ 循环层</text>
  <rect width="270" height="160" x="30" y="52" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="165" y="74" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">汇编语言时代</text>
  <text x="165" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Assembly Era</text>
  <circle cx="70" cy="120" r="12" fill="none" stroke="#d97757" stroke-width="1.5"/>
  <path stroke="#d97757" stroke-width="1.5" d="M70 132v26m0-18-15 10m15-10 15 10m-15 8-10 20m10-20 10 20"/>
  <text x="70" y="192" fill="#87867f" font-size="8" text-anchor="middle">工程师</text>
  <path stroke="#d1cfc5" d="M115 126h40"/>
  <path fill="#d1cfc5" d="m155 122 6 4-6 4z"/>
  <rect width="145" height="62" x="115" y="98" fill="#f5f4ef" stroke="#d1cfc5" rx="4"/>
  <text x="125" y="114" fill="#141413" font-family="ui-monospace, monospace" font-size="8">MOV AX, 5</text>
  <text x="125" y="126" fill="#141413" font-family="ui-monospace, monospace" font-size="8">ADD BX, AX</text>
  <text x="125" y="138" fill="#141413" font-family="ui-monospace, monospace" font-size="8">CMP BX, 10</text>
  <text x="125" y="150" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8">; 每条指令</text>
  <text x="125" y="160" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8">; 手动写出</text>
  <text x="165" y="228" fill="#141413" font-size="9" text-anchor="middle">低级指令 = 单次输入</text>
  <text x="165" y="242" fill="#87867f" font-size="8" text-anchor="middle">人驱动每一步</text>
  <path stroke="#d97757" stroke-width="2" d="M310 132h60"/>
  <path fill="#d97757" d="m370 128 6 4-6 4z"/>
  <rect width="70" height="22" x="315" y="108" fill="#d97757" opacity=".12" rx="11"/>
  <text x="340" y="123" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">同一类转变</text>
  <path stroke="#d97757" stroke-width="2" d="M310 148h60"/>
  <path fill="#d97757" d="m370 144 6 4-6 4z"/>
  <rect width="270" height="160" x="380" y="52" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="515" y="74" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">循环时代</text>
  <text x="515" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Loop Era</text>
  <circle cx="415" cy="120" r="12" fill="none" stroke="#d97757" stroke-width="1.5"/>
  <path stroke="#d97757" stroke-width="1.5" d="M415 132v26m0-18-15 10m15-10 15 10m-15 8-10 20m10-20 10 20"/>
  <text x="415" y="192" fill="#87867f" font-size="8" text-anchor="middle">工程师</text>
  <path stroke="#d1cfc5" d="M430 126h28"/>
  <path fill="#d1cfc5" d="m458 122 6 4-6 4z"/>
  <rect width="145" height="62" x="458" y="96" fill="#f5f4ef" stroke="#d97757" stroke-width="1.5" rx="4"/>
  <text x="468" y="112" fill="#141413" font-family="ui-monospace, monospace" font-size="8.5">Goal: 响应 &lt;300ms</text>
  <text x="468" y="124" fill="#141413" font-family="ui-monospace, monospace" font-size="8.5">Stop: test pass</text>
  <text x="468" y="140" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8">while not done:</text>
  <text x="468" y="152" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8">  agent.run()</text>
  <text x="515" y="228" fill="#141413" font-size="9" text-anchor="middle">高级意图 = 持续过程</text>
  <text x="515" y="242" fill="#87867f" font-size="8" text-anchor="middle">系统自主迭代直到达成</text>
  <path stroke="#d1cfc5" stroke-dasharray="3,2" d="M165 252h175m0 0h175"/>
  <text x="165" y="258" fill="#87867f" font-family="ui-monospace, monospace" font-size="7.5" text-anchor="middle">提示词 ≈ 汇编</text>
  <text x="515" y="258" fill="#87867f" font-family="ui-monospace, monospace" font-size="7.5" text-anchor="middle">循环 ≈ 高级语言</text>
</svg>
