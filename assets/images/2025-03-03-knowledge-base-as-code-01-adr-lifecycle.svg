<svg xmlns="http://www.w3.org/2000/svg" aria-label="ADR 状态流转图" viewBox="0 0 800 400"><title>ADR 状态流转图</title><desc>架构决策记录（ADR）的完整生命周期：提议 → 审核中 → 已接受/已拒绝 → 已弃用/被取代</desc><defs><marker id="arrow" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="9" refY="3"><path fill="#87867f" d="M0 0v6l9-3z"/></marker><marker id="arrow-dashed" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="9" refY="3"><path fill="#87867f" d="M0 0v6l9-3z"/></marker><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path fill="none" stroke="#e3dacc" stroke-width=".5" d="M20 0H0v20"/></pattern></defs><path fill="#faf9f5" d="M0 0h800v400H0z"/><rect width="720" height="320" x="40" y="40" fill="url(#grid)" rx="8"/><text x="400" y="28" fill="#141413" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle">ADR 状态流转图</text><rect width="110" height="60" x="60" y="160" fill="#e3dacc" stroke="#87867f" stroke-width="2" rx="8"/><text x="115" y="185" fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">提议</text><text x="115" y="202" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">Proposed</text><rect width="110" height="60" x="220" y="160" fill="#e3dacc" stroke="#87867f" stroke-width="2" rx="8"/><text x="275" y="185" fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">审核中</text><text x="275" y="202" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">Under Review</text><rect width="110" height="60" x="380" y="100" fill="#788c5d" stroke="#5a6d45" stroke-width="2" rx="8"/><text x="435" y="125" fill="#faf9f5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">已接受</text><text x="435" y="142" fill="#e3dacc" font-family="sans-serif" font-size="11" text-anchor="middle">Accepted</text><rect width="110" height="60" x="380" y="220" fill="#d97757" stroke="#b5613e" stroke-width="2" rx="8"/><text x="435" y="245" fill="#faf9f5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">已拒绝</text><text x="435" y="262" fill="#e3dacc" font-family="sans-serif" font-size="11" text-anchor="middle">Rejected</text><rect width="110" height="60" x="540" y="100" fill="#d1cfc5" stroke="#87867f" stroke-width="2" rx="8"/><text x="595" y="125" fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">已弃用</text><text x="595" y="142" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">Deprecated</text><rect width="110" height="60" x="540" y="220" fill="#d1cfc5" stroke="#87867f" stroke-width="2" rx="8"/><text x="595" y="245" fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">被取代</text><text x="595" y="262" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">Superseded</text><rect width="80" height="60" x="680" y="160" fill="#87867f" stroke="#5a5850" stroke-width="2" rx="8"/><text x="720" y="185" fill="#faf9f5" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">归档</text><text x="720" y="202" fill="#d1cfc5" font-family="sans-serif" font-size="11" text-anchor="middle">Archived</text><path stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M170 190h48"/><path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M330 185q20-45 48-55"/><path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M330 200q20 60 48 50"/><path stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M490 130h48"/><path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M650 135q10 20 30 30"/><path fill="none" stroke="#87867f" stroke-dasharray="5,3" stroke-width="2" marker-end="url(#arrow-dashed)" d="M490 250q90 30 190-55"/><path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M490 150q20 50 48 85"/><path fill="none" stroke="#87867f" stroke-width="2" marker-end="url(#arrow)" d="M650 250q10-30 30-55"/><text x="60" y="340" fill="#87867f" font-family="sans-serif" font-size="10">KBaaC — 知识库即代码</text><text x="60" y="354" fill="#d1cfc5" font-family="sans-serif" font-size="9">每一条 ADR 都是一封写给未来开发者的信</text><rect width="12" height="12" x="580" y="320" fill="#788c5d" rx="2"/><text x="598" y="330" fill="#87867f" font-family="sans-serif" font-size="9">有效决策</text><rect width="12" height="12" x="640" y="320" fill="#d97757" rx="2"/><text x="658" y="330" fill="#87867f" font-family="sans-serif" font-size="9">已拒绝</text><rect width="12" height="12" x="700" y="320" fill="#d1cfc5" stroke="#87867f" rx="2"/><text x="718" y="330" fill="#87867f" font-family="sans-serif" font-size="9">历史</text></svg>