<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="ADR 状态流转图">
  <title>ADR 状态流转图</title>
  <desc>架构决策记录（ADR）的完整生命周期：提议 → 审核中 → 已接受/已拒绝 → 已弃用/被取代</desc>

  <defs>
    <!-- 箭头标记 -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#87867F"/>
    </marker>
    <!-- 虚线箭头 -->
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#87867F"/>
    </marker>
    <!-- 背景网格 -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E3DACC" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#FAF9F5"/>
  <rect x="40" y="40" width="720" height="320" fill="url(#grid)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#141413">ADR 状态流转图</text>

  <!-- 主流程节点 -->
  <!-- Proposed -->
  <rect x="60" y="160" width="110" height="60" rx="8" fill="#E3DACC" stroke="#87867F" stroke-width="2"/>
  <text x="115" y="185" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">提议</text>
  <text x="115" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">Proposed</text>

  <!-- Under Review -->
  <rect x="220" y="160" width="110" height="60" rx="8" fill="#E3DACC" stroke="#87867F" stroke-width="2"/>
  <text x="275" y="185" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">审核中</text>
  <text x="275" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">Under Review</text>

  <!-- Accepted -->
  <rect x="380" y="100" width="110" height="60" rx="8" fill="#788C5D" stroke="#5a6d45" stroke-width="2"/>
  <text x="435" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">已接受</text>
  <text x="435" y="142" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E3DACC">Accepted</text>

  <!-- Rejected -->
  <rect x="380" y="220" width="110" height="60" rx="8" fill="#D97757" stroke="#b5613e" stroke-width="2"/>
  <text x="435" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">已拒绝</text>
  <text x="435" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E3DACC">Rejected</text>

  <!-- Deprecated -->
  <rect x="540" y="100" width="110" height="60" rx="8" fill="#D1CFC5" stroke="#87867F" stroke-width="2"/>
  <text x="595" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">已弃用</text>
  <text x="595" y="142" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">Deprecated</text>

  <!-- Superseded -->
  <rect x="540" y="220" width="110" height="60" rx="8" fill="#D1CFC5" stroke="#87867F" stroke-width="2"/>
  <text x="595" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">被取代</text>
  <text x="595" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">Superseded</text>

  <!-- 归档 -->
  <rect x="680" y="160" width="80" height="60" rx="8" fill="#87867F" stroke="#5a5850" stroke-width="2"/>
  <text x="720" y="185" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">归档</text>
  <text x="720" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D1CFC5">Archived</text>

  <!-- 连接线 -->
  <!-- Proposed -> Under Review -->
  <line x1="170" y1="190" x2="218" y2="190" stroke="#87867F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Under Review -> Accepted -->
  <path d="M 330 185 Q 350 140 378 130" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Under Review -> Rejected -->
  <path d="M 330 200 Q 350 260 378 250" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Accepted -> Deprecated -->
  <line x1="490" y1="130" x2="538" y2="130" stroke="#87867F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Deprecated -> Archived -->
  <path d="M 650 135 Q 660 155 680 165" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Rejected -> Archived -->
  <path d="M 490 250 Q 580 280 680 195" stroke="#87867F" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-dashed)"/>

  <!-- Accepted -> Superseded -->
  <path d="M 490 150 Q 510 200 538 235" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Superseded -> Archived -->
  <path d="M 650 250 Q 660 220 680 195" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 标注 -->
  <!-- KBaaC 标签 -->
  <text x="60" y="340" font-family="sans-serif" font-size="10" fill="#87867F">KBaaC — 知识库即代码</text>
  <text x="60" y="354" font-family="sans-serif" font-size="9" fill="#D1CFC5">每一条 ADR 都是一封写给未来开发者的信</text>

  <!-- 图例 -->
  <rect x="580" y="320" width="12" height="12" rx="2" fill="#788C5D"/>
  <text x="598" y="330" font-family="sans-serif" font-size="9" fill="#87867F">有效决策</text>

  <rect x="640" y="320" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="658" y="330" font-family="sans-serif" font-size="9" fill="#87867F">已拒绝</text>

  <rect x="700" y="320" width="12" height="12" rx="2" fill="#D1CFC5" stroke="#87867F" stroke-width="1"/>
  <text x="718" y="330" font-family="sans-serif" font-size="9" fill="#87867F">历史</text>
</svg>
