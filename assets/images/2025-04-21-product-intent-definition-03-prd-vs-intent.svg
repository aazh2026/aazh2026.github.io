<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 370">
  <path fill="#faf9f5" d="M0 0h680v370H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">PRD vs Product Intent</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">从需求文档到意图文档的转型</text>
  <path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="1.5" d="M340 60v280"/>
  <path fill="#d97757" d="m340 190-8-10h16zm0 20-8 10h16z"/>
  <text x="340" y="202" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">转型</text>
  <text x="170" y="68" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">PRD</text>
  <text x="170" y="82" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">传统需求文档</text>
  <rect width="290" height="52" x="20" y="94" fill="#f5e6e0" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="34" y="114" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600">静态性</text>
  <text x="34" y="130" fill="#141413" font-size="10.5">文档写完后很少更新</text>
  <text x="34" y="142" fill="#87867f" font-size="9.5">与实际业务脱节</text>
  <rect width="290" height="52" x="20" y="154" fill="#f5e6e0" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="34" y="174" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600">二义性</text>
  <text x="34" y="190" fill="#141413" font-size="10.5">&quot;智能回复&quot;可以有 100 种理解</text>
  <text x="34" y="202" fill="#87867f" font-size="9.5">AI 实现与期望不符</text>
  <rect width="290" height="52" x="20" y="214" fill="#f5e6e0" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="34" y="234" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600">缺约束</text>
  <text x="34" y="250" fill="#141413" font-size="10.5">只定义功能，不定义边界</text>
  <text x="34" y="262" fill="#87867f" font-size="9.5">AI 越界行为</text>
  <rect width="290" height="52" x="20" y="274" fill="#f5e6e0" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="34" y="294" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600">无演化</text>
  <text x="34" y="310" fill="#141413" font-size="10.5">假设需求不变</text>
  <text x="34" y="322" fill="#87867f" font-size="9.5">无法适应业务变化</text>
  <text x="510" y="68" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">Product Intent</text>
  <text x="510" y="82" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">五维意图框架</text>
  <rect width="290" height="52" x="370" y="94" fill="#edf2ea" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="384" y="114" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" font-weight="600">动态意图图谱</text>
  <text x="384" y="130" fill="#141413" font-size="10.5">意图随业务和反馈持续更新</text>
  <text x="384" y="142" fill="#87867f" font-size="9.5">evolution_intent</text>
  <rect width="290" height="52" x="370" y="154" fill="#edf2ea" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="384" y="174" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" font-weight="600">意图优先</text>
  <text x="384" y="190" fill="#141413" font-size="10.5">先定义&quot;要解决什么问题&quot;</text>
  <text x="384" y="202" fill="#87867f" font-size="9.5">business_intent + user_intent</text>
  <rect width="290" height="52" x="370" y="214" fill="#edf2ea" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="384" y="234" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" font-weight="600">约束完备</text>
  <text x="384" y="250" fill="#141413" font-size="10.5">精确约束 + 明确边界</text>
  <text x="384" y="262" fill="#87867f" font-size="9.5">constraint_intent</text>
  <rect width="290" height="52" x="370" y="274" fill="#edf2ea" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="384" y="294" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" font-weight="600">可验证标准</text>
  <text x="384" y="310" fill="#141413" font-size="10.5">每个维度都有验证机制</text>
  <text x="384" y="322" fill="#87867f" font-size="9.5">成功标准 · 监控指标</text>
  <text x="340" y="352" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">PRD 是为人类工程师设计的 — Product Intent 是为 AI 设计的</text>
</svg>
