<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 420"><path fill="#faf9f5" d="M0 0h680v420H0z"/><text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">两种复杂度的分类</text><text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Brooks, 1986 · No Silver Bullet</text><rect width="260" height="280" x="40" y="62" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><text x="170" y="88" fill="#d97757" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">本质复杂度</text><text x="170" y="104" fill="#87867f" font-size="10" text-anchor="middle">Essential Complexity</text><rect width="228" height="32" x="56" y="120" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="170" y="140" fill="#141413" font-size="11" text-anchor="middle">需求模糊且易变</text><rect width="228" height="32" x="56" y="160" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="170" y="180" fill="#141413" font-size="11" text-anchor="middle">约束条件相互冲突</text><rect width="228" height="32" x="56" y="200" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="170" y="220" fill="#141413" font-size="11" text-anchor="middle">边界情况爆炸</text><rect width="228" height="32" x="56" y="240" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="170" y="260" fill="#141413" font-size="11" text-anchor="middle">系统涌现行为</text><rect width="260" height="280" x="380" y="62" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/><text x="510" y="88" fill="#788c5d" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">偶然复杂度</text><text x="510" y="104" fill="#87867f" font-size="10" text-anchor="middle">Accidental Complexity</text><rect width="228" height="32" x="396" y="120" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="510" y="140" fill="#141413" font-size="11" text-anchor="middle">语法和样板代码</text><rect width="228" height="32" x="396" y="160" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="510" y="180" fill="#141413" font-size="11" text-anchor="middle">API 记忆负担</text><rect width="228" height="32" x="396" y="200" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="510" y="220" fill="#141413" font-size="11" text-anchor="middle">环境配置</text><rect width="228" height="32" x="396" y="240" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="6"/><text x="510" y="260" fill="#141413" font-size="11" text-anchor="middle">工具链摩擦</text><path stroke="#d1cfc5" stroke-dasharray="4,4" d="M340 80v260"/><rect width="116" height="22" x="282" y="180" fill="#faf9f5" stroke="#d1cfc5" rx="11"/><text x="340" y="195" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Brooks 1986</text><rect width="200" height="44" x="40" y="358" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="140" y="378" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">AI 已大幅削减</text><text x="140" y="394" fill="#87867f" font-size="10" text-anchor="middle">偶然复杂度</text><path stroke="#788c5d" stroke-width="2" d="M240 380h30"/><path fill="#788c5d" d="m274 380-8-6v12z"/><path stroke="#d97757" stroke-width="2" d="M410 380h30"/><path fill="#d97757" d="m444 380-8-6v12z"/><rect width="200" height="44" x="440" y="358" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="540" y="378" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">AI 难以触及</text><text x="540" y="394" fill="#87867f" font-size="10" text-anchor="middle">本质复杂度</text><title>两种复杂度的分类</title><desc>Brooks 1986 框架：本质复杂度（需求模糊、约束冲突、边界爆炸、涌现行为）与偶然复杂度（语法样板、API记忆、环境配置、工具链摩擦）的对比，以及 AI 对两者的不同影响。</desc></svg>