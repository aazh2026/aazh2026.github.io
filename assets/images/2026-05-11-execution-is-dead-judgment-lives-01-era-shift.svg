  <text x="155" y="418" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">skillify 循环：做→提取→技能→新技能</text>
  <text x="155" y="433" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">YC CEO 第二大脑</text>
  <rect width="230" height="60" x="285" y="385" fill="#d1cfc5" fill-opacity=".3" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="400" y="403" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Mnimiy — 约束即注意力</text>
  <text x="400" y="418" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Karpathy 4 条规则：41%→3% 错误率</text>
  <text x="400" y="433" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">4→12 条规则合规率几乎不变</text>
