<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#788c5d"/>
    </linearGradient>
    <filter id="shadow" width="110%" height="120%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="800" height="460" fill="#faf9f5" rx="12"/>
  <text x="40" y="40" fill="#141413" font-family="system-ui, sans-serif" font-size="18" font-weight="700">执行已死，判断力永生</text>
  <text x="40" y="60" fill="#87867f" font-family="system-ui, sans-serif" font-size="12">AI Agent 时代人类比较优势的根本转移</text>
  <defs>
