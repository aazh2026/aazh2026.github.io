  <text x="640" y="230" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">方向感 + 品味</text>
  <rect width="200" height="36" x="540" y="250" fill="#788c5d" fill-opacity=".15" rx="6"/>
  <text x="640" y="260" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">竞争力</text>
  <text x="640" y="275" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">问题定义得多准确</text>
  <rect width="200" height="36" x="540" y="295" fill="#788c5d" fill-opacity=".15" rx="6"/>
  <text x="640" y="305" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">风险</text>
  <text x="640" y="320" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">方向错误（无纠正）</text>
  <text x="640" y="355" fill="#788c5d" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">未来 →</text>
