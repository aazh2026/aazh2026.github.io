<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#788C5D"/>
    </linearGradient>
  </defs>

  <rect width="800" height="460" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="40" y="40" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#141413">执行已死，判断力永生</text>
  <text x="40" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">AI Agent 时代人类比较优势的根本转移</text>

  <!-- Central Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#141413"/>
    </marker>
  </defs>
  <line x1="200" y1="230" x2="600" y2="230" stroke="url(#arrowGrad)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowhead)" filter="url(#shadow)"/>
  <text x="400" y="220" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413" text-anchor="middle">时间轴</text>
  <text x="400" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">AI 能力增长</text>

  <!-- LEFT: Execution Era -->
  <rect x="40" y="95" width="240" height="260" rx="12" fill="#D97757" fill-opacity="0.08" stroke="#D97757" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="125" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#D97757" text-anchor="middle">执行者时代</text>
  <text x="160" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">人类优势：写代码</text>

  <!-- Execution Era Stats -->
  <rect x="60" y="160" width="200" height="36" rx="6" fill="#D97757" fill-opacity="0.15"/>
  <text x="160" y="170" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D97757" text-anchor="middle">80% 执行</text>
  <text x="160" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">20% 规划</text>

  <rect x="60" y="205" width="200" height="36" rx="6" fill="#D97757" fill-opacity="0.15"/>
  <text x="160" y="215" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D97757" text-anchor="middle">核心资产</text>
  <text x="160" y="230" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">技术栈知识</text>

  <rect x="60" y="250" width="200" height="36" rx="6" fill="#D97757" fill-opacity="0.15"/>
  <text x="160" y="260" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D97757" text-anchor="middle">竞争力</text>
  <text x="160" y="275" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">代码写得快 / 好 / 多</text>

  <rect x="60" y="295" width="200" height="36" rx="6" fill="#D97757" fill-opacity="0.15"/>
  <text x="160" y="305" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#D97757" text-anchor="middle">风险</text>
  <text x="160" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">被 AI 替代</text>

  <!-- Eras label -->
  <text x="160" y="355" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#D97757" text-anchor="middle">← 过去</text>

  <!-- RIGHT: Judgment Era -->
  <rect x="520" y="95" width="240" height="260" rx="12" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="125" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#788C5D" text-anchor="middle">判断力时代</text>
  <text x="640" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">人类优势：定义方向</text>

  <!-- Judgment Era Stats -->
  <rect x="540" y="160" width="200" height="36" rx="6" fill="#788C5D" fill-opacity="0.15"/>
  <text x="640" y="170" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">20% 执行</text>
  <text x="640" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">80% 规划</text>

  <rect x="540" y="205" width="200" height="36" rx="6" fill="#788C5D" fill-opacity="0.15"/>
  <text x="640" y="215" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">核心资产</text>
  <text x="640" y="230" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">方向感 + 品味</text>

  <rect x="540" y="250" width="200" height="36" rx="6" fill="#788C5D" fill-opacity="0.15"/>
  <text x="640" y="260" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">竞争力</text>
  <text x="640" y="275" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">问题定义得多准确</text>

  <rect x="540" y="295" width="200" height="36" rx="6" fill="#788C5D" fill-opacity="0.15"/>
  <text x="640" y="305" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#788C5D" text-anchor="middle">风险</text>
  <text x="640" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">方向错误（无纠正）</text>

  <text x="640" y="355" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#788C5D" text-anchor="middle">未来 →</text>

  <!-- Center: Bottleneck Insight -->
  <rect x="290" y="185" width="220" height="90" rx="10" fill="#141413" filter="url(#shadow)"/>
  <text x="400" y="210" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FAF9F5" text-anchor="middle">核心瓶颈</text>
  <text x="400" y="232" font-family="system-ui, sans-serif" font-size="11" fill="#D1CFC5" text-anchor="middle">软件工程的瓶颈</text>
  <text x="400" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#D1CFC5" text-anchor="middle">不再是智能，</text>
  <text x="400" y="268" font-family="system-ui, sans-serif" font-size="11" fill="#D1CFC5" text-anchor="middle">而是人类注意力</text>

  <!-- Three sources at bottom -->
  <rect x="40" y="385" width="230" height="60" rx="8" fill="#D1CFC5" fill-opacity="0.3" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="155" y="403" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">Garry Tan — 个人认知复利</text>
  <text x="155" y="418" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">skillify 循环：做→提取→技能→新技能</text>
  <text x="155" y="433" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">YC CEO 第二大脑</text>

  <rect x="285" y="385" width="230" height="60" rx="8" fill="#D1CFC5" fill-opacity="0.3" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="400" y="403" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">Mnimiy — 约束即注意力</text>
  <text x="400" y="418" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">Karpathy 4 条规则：41%→3% 错误率</text>
  <text x="400" y="433" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">4→12 条规则合规率几乎不变</text>

  <rect x="530" y="385" width="230" height="60" rx="8" fill="#D1CFC5" fill-opacity="0.3" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="645" y="403" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">Saito — 组织任务分解</text>
  <text x="645" y="418" font-family="system-ui, sans-serif" font-size="10" fill="#141413" text-anchor="middle">Missions 系统：最长跑了 16 天</text>
  <text x="645" y="433" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">目标是 30 天不漂移</text>
</svg>
