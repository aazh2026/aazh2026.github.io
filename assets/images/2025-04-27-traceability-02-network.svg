<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui,sans-serif">
  <rect width="800" height="450" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#141413" letter-spacing="1">全链路可追溯性网络</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#87867F">需求 → 代码 → 测试，语义关联自动建立</text>

  <!-- Req node -->
  <g transform="translate(120, 220)">
    <rect x="-60" y="-40" width="120" height="80" rx="12" fill="#D97757"/>
    <text x="0" y="-18" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">REQ-001</text>
    <text x="0" y="0" text-anchor="middle" font-size="10" fill="#E3DACC">用户下单功能</text>
    <text x="0" y="18" text-anchor="middle" font-size="9" fill="#E3DACC">选择商品·支付</text>
    <text x="0" y="32" text-anchor="middle" font-size="9" fill="#FAF9F5">confidence: 0.85</text>
  </g>

  <!-- Code node -->
  <g transform="translate(400, 220)">
    <rect x="-80" y="-45" width="160" height="90" rx="12" fill="#141413"/>
    <text x="0" y="-22" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">Commit abc123</text>
    <text x="0" y="-2" text-anchor="middle" font-size="10" fill="#D1CFC5">order_service.py</text>
    <text x="0" y="14" text-anchor="middle" font-size="10" fill="#D1CFC5">inventory_service.py</text>
    <text x="0" y="34" text-anchor="middle" font-size="9" fill="#788C5D">implemented_by</text>
  </g>

  <!-- Test nodes -->
  <!-- TEST-001 -->
  <g transform="translate(640, 160)">
    <rect x="-58" y="-36" width="116" height="72" rx="10" fill="#788C5D"/>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">TEST-001</text>
    <text x="0" y="4" text-anchor="middle" font-size="9" fill="#E3DACC">验证订单创建</text>
    <text x="0" y="20" text-anchor="middle" font-size="9" fill="#FAF9F5">tested_by: 0.82</text>
  </g>

  <!-- TEST-002 -->
  <g transform="translate(640, 280)">
    <rect x="-58" y="-36" width="116" height="72" rx="10" fill="#788C5D"/>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">TEST-002</text>
    <text x="0" y="4" text-anchor="middle" font-size="9" fill="#E3DACC">验证库存扣减</text>
    <text x="0" y="20" text-anchor="middle" font-size="9" fill="#FAF9F5">tested_by: 0.75</text>
  </g>

  <!-- Edges with confidence labels -->
  <!-- REQ -> Code -->
  <line x1="182" y1="220" x2="318" y2="220" stroke="#D97757" stroke-width="3" stroke-dasharray="8 3"/>
  <text x="250" y="210" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">0.85</text>
  <text x="250" y="240" text-anchor="middle" font-size="9" fill="#87867F">语义相似度</text>

  <!-- Code -> TEST-001 -->
  <path d="M 482 205 Q 560 180 582 128" fill="none" stroke="#788C5D" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text x="530" y="155" text-anchor="middle" font-size="9" fill="#788C5D" font-weight="600">0.82</text>

  <!-- Code -> TEST-002 -->
  <path d="M 482 235 Q 560 260 582 276" fill="none" stroke="#788C5D" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text x="530" y="270" text-anchor="middle" font-size="9" fill="#788C5D" font-weight="600">0.75</text>

  <!-- Semantic encoding boxes at bottom -->
  <rect x="30" y="365" width="740" height="70" rx="10" fill="#E3DACC" opacity="0.5"/>

  <rect x="50" y="378" width="140" height="44" rx="8" fill="#D97757" opacity="0.85"/>
  <text x="120" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">Step 1: 语义编码</text>
  <text x="120" y="410" text-anchor="middle" font-size="9" fill="#E3DACC">AI 理解需求语义</text>

  <line x1="195" y1="400" x2="250" y2="400" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="222" y="390" text-anchor="middle" font-size="9" fill="#87867F">编码</text>

  <rect x="255" y="378" width="140" height="44" rx="8" fill="#141413" opacity="0.85"/>
  <text x="325" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">Step 2: 相似度计算</text>
  <text x="325" y="410" text-anchor="middle" font-size="9" fill="#D1CFC5">余弦相似度匹配</text>

  <line x1="400" y1="400" x2="455" y2="400" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="427" y="390" text-anchor="middle" font-size="9" fill="#87867F">匹配</text>

  <rect x="460" y="378" width="140" height="44" rx="8" fill="#788C5D" opacity="0.85"/>
  <text x="530" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">Step 3: 建立关联</text>
  <text x="530" y="410" text-anchor="middle" font-size="9" fill="#E3DACC">confidence &gt; 阈值</text>

  <line x1="605" y1="400" x2="655" y2="400" stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="630" y="390" text-anchor="middle" font-size="9" fill="#87867F">关联</text>

  <rect x="660" y="378" width="100" height="44" rx="8" fill="#D1CFC5" opacity="0.85"/>
  <text x="710" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#141413">Step 4: 可视化</text>
  <text x="710" y="410" text-anchor="middle" font-size="9" fill="#87867F">追溯图</text>
</svg>