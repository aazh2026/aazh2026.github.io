<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="软件工程中的七种浪费">
  <title>AI 识别的 7 种浪费</title>
  <desc>展示软件工程中对应的7种浪费：过度设计、等待、上下文切换、代码库存、重复劳动、返工、缺陷</desc>

  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bgGrad5)"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#141413" text-anchor="middle">AI 识别的 7 种浪费</text>
  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">制造业浪费 → 软件工程映射</text>

  <!-- Row 1 -->
  <!-- Waste 1: Over-engineering -->
  <rect x="40" y="70" width="240" height="135" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="40" y="70" width="240" height="28" rx="10" fill="#D97757"/>
  <rect x="40" y="90" width="240" height="8" fill="#D97757"/>
  <text x="60" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">#1 过度设计</text>

  <text x="55" y="114" font-family="system-ui, sans-serif" font-size="10" fill="#141413">制造业：过度生产</text>
  <text x="55" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 为未来需求写代码</text>
  <text x="55" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 抽象层数 > 3</text>
  <text x="55" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ "万一以后..." 注释</text>

  <rect x="55" y="172" width="50" height="20" rx="4" fill="#D97757"/>
  <text x="80" y="186" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">检测</text>
  <text x="115" y="186" font-family="system-ui, sans-serif" font-size="9" fill="#141413">AST 复杂度分析</text>

  <!-- Waste 2: Waiting -->
  <rect x="300" y="70" width="240" height="135" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="300" y="70" width="240" height="28" rx="10" fill="#D97757"/>
  <rect x="300" y="90" width="240" height="8" fill="#D97757"/>
  <text x="320" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">#2 等待</text>

  <text x="315" y="114" font-family="system-ui, sans-serif" font-size="10" fill="#141413">制造业：等待</text>
  <text x="315" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ PR review 等待 > 4h</text>
  <text x="315" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ CI 排队 > 15min</text>
  <text x="315" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 外部依赖阻塞</text>

  <rect x="315" y="172" width="50" height="20" rx="4" fill="#D97757"/>
  <text x="340" y="186" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">检测</text>
  <text x="375" y="186" font-family="system-ui, sans-serif" font-size="9" fill="#141413">Git/API 时序分析</text>

  <!-- Waste 3: Context Switching -->
  <rect x="560" y="70" width="200" height="135" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="560" y="70" width="200" height="28" rx="10" fill="#D97757"/>
  <rect x="560" y="90" width="200" height="8" fill="#D97757"/>
  <text x="580" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">#3 上下文切换</text>

  <text x="575" y="114" font-family="system-ui, sans-serif" font-size="10" fill="#141413">制造业：运输</text>
  <text x="575" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 每天会议 > 3 个</text>
  <text x="575" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ WIP 项 > 3 个</text>
  <text x="575" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 无 90min 专注块</text>

  <rect x="575" y="172" width="50" height="20" rx="4" fill="#D97757"/>
  <text x="600" y="186" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">检测</text>
  <text x="635" y="186" font-family="system-ui, sans-serif" font-size="9" fill="#141413">Git 提交分析</text>

  <!-- Row 2 -->
  <!-- Waste 4: Code Inventory -->
  <rect x="40" y="220" width="240" height="135" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="40" y="220" width="240" height="28" rx="10" fill="#788C5D"/>
  <rect x="40" y="240" width="240" height="8" fill="#788C5D"/>
  <text x="60" y="238" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">#4 代码库存</text>

  <text x="55" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#141413">制造业：库存</text>
  <text x="55" y="280" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 分支 > 14 天未合并</text>
  <text x="55" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 特性开关 > 10 个</text>
  <text x="55" y="310" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ PR 长期 open</text>

  <rect x="55" y="322" width="50" height="20" rx="4" fill="#788C5D"/>
  <text x="80" y="336" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">检测</text>
  <text x="115" y="336" font-family="system-ui, sans-serif" font-size="9" fill="#141413">Git/平台 API</text>

  <!-- Waste 5: Duplication -->
  <rect x="300" y="220" width="240" height="135" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="300" y="220" width="240" height="28" rx="10" fill="#788C5D"/>
  <rect x="300" y="240" width="240" height="8" fill="#788C5D"/>
  <text x="320" y="238" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5">#5 重复劳动</text>

  <text x="315" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#141413">制造业：动作</text>
  <text x="315" y="280" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 手动测试重复执行</text>
  <text x="315" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ Boilerplate 复制粘贴</text>
  <text x="315" y="310" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">→ 重复的数据验证</text>

  <rect x="315" y="322" width="50" height="20" rx="4" fill="#788C5D"/>
  <text x="340" y="336" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#