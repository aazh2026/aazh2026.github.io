<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">语义一致性三要素</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">结构 · 行为 · 业务</text>

  <!-- Triangle connecting lines (drawn first, behind nodes) -->
  <!-- Top to Bottom-Left -->
  <line x1="300" y1="145" x2="165" y2="295" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Top to Bottom-Right -->
  <line x1="300" y1="145" x2="435" y2="295" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Bottom-Left to Bottom-Right -->
  <line x1="165" y1="295" x2="435" y2="295" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Center label -->
  <circle cx="300" cy="238" r="28" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="300" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">语义</text>
  <text x="300" y="248" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">一致性</text>

  <!-- Top node: 结构一致性 (clay pill) -->
  <rect x="190" y="88" width="220" height="54" rx="27" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="196" y="94" width="208" height="42" rx="23" fill="#D97757" opacity="0.08"/>
  <text x="300" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#D97757">结构一致性</text>
  <text x="300" y="132" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">字段存在 · 类型匹配 · 格式正确</text>

  <!-- Bottom-Left node: 行为一致性 (olive pill) -->
  <rect x="65" y="260" width="200" height="54" rx="27" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>
  <rect x="71" y="266" width="188" height="42" rx="23" fill="#788C5D" opacity="0.08"/>
  <text x="165" y="287" text-anchor="middle" font-size="13" font-weight="600" fill="#788C5D">行为一致性</text>
  <text x="165" y="304" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">相同输入 · 预期输出</text>

  <!-- Bottom-Right node: 业务一致性 (slate pill) -->
  <rect x="335" y="260" width="200" height="54" rx="27" fill="#FFFFFF" stroke="#141413" stroke-width="1.8"/>
  <rect x="341" y="266" width="188" height="42" rx="23" fill="#141413" opacity="0.06"/>
  <text x="435" y="287" text-anchor="middle" font-size="13" font-weight="600" fill="#141413">业务一致性</text>
  <text x="435" y="304" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">业务含义不变 · 规则不变</text>

  <!-- Example tags beneath nodes -->
  <!-- 结构一致性 examples -->
  <rect x="145" y="152" width="70" height="18" rx="4" fill="#D97757" opacity="0.1"/>
  <text x="180" y="164" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">user.phone</text>

  <rect x="225" y="152" width="70" height="18" rx="4" fill="#D97757" opacity="0.1"/>
  <text x="260" y="164" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">quantity:int</text>

  <rect x="305" y="152" width="70" height="18" rx="4" fill="#D97757" opacity="0.1"/>
  <text x="340" y="164" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">POST /orders</text>

  <!-- 行为一致性 examples -->
  <rect x="65" y="324" width="90" height="18" rx="4" fill="#788C5D" opacity="0.1"/>
  <text x="110" y="336" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">GET /orders → [ ]</text>

  <rect x="165" y="324" width="90" height="18" rx="4" fill="#788C5D" opacity="0.1"/>
  <text x="210" y="336" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">POST → 201 Created</text>

  <!-- 业务一致性 examples -->
  <rect x="335" y="324" width="90" height="18" rx="4" fill="#141413" opacity="0.08"/>
  <text x="380" y="336" text-anchor="middle" font-size="8.5" fill="#141413" font-family="ui-monospace, monospace">status=pending</text>

  <rect x="435" y="324" width="90" height="18" rx="4" fill="#141413" opacity="0.08"/>
  <text x="480" y="336" text-anchor="middle" font-size="8.5" fill="#141413" font-family="ui-monospace, monospace">含义=待付款</text>

  <!-- Key message at bottom -->
  <rect x="150" y="368" width="300" height="24" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="300" y="384" text-anchor="middle" font-size="10" fill="#141413">三要素同时满足 = 语义一致</text>
</svg>
