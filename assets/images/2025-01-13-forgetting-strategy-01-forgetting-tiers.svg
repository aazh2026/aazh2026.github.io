<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" viewBox="0 0 800 480">
  <defs>
    <marker id="arr3" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3">
      <path fill="#87867f" d="m0 0 8 3-8 3z"/>
    </marker>
    <filter id="sh3" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v480H0z"/>
  <text x="400" y="36" fill="#141413" font-size="18" font-weight="700" text-anchor="middle">遗忘策略：让 Agent 学会「整理房间」</text>
  <text x="400" y="56" fill="#87867f" font-size="11" text-anchor="middle">选择性遗忘 = 重要性筛选 | 记忆质量取决于记住了多少，更取决于忘记了多少</text>
  <rect width="220" height="260" x="40" y="76" fill="#e3dacc" filter="url(#sh3)" rx="10"/>
  <text x="150" y="100" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">艾宾浩斯遗忘曲线</text>
  <text x="150" y="116" fill="#87867f" font-size="9" text-anchor="middle">1885</text>
  <path stroke="#87867f" stroke-width="1.5" d="M65 230h170M65 140v90"/>
  <text x="65" y="136" fill="#87867f" font-size="8">100%</text>
  <text x="65" y="226" fill="#87867f" font-size="8">0%</text>
  <text x="235" y="244" fill="#87867f" font-size="8" text-anchor="end">时间</text>
  <text x="55" y="188" fill="#87867f" font-size="8" text-anchor="end">保留</text>
  <path fill="none" stroke="#d97757" stroke-width="2.5" d="m65 140 23 15 12 12 18 33 42 13 75 8"/>
  <path stroke="#d97757" stroke-dasharray="3,2" d="M88 155v75" opacity=".5"/>
  <text x="88" y="242" fill="#d97757" font-size="8" text-anchor="middle">20分钟</text>
  <text x="88" y="252" fill="#87867f" font-size="7" text-anchor="middle">58%</text>
  <path stroke="#d97757" stroke-dasharray="3,2" d="M100 167v63" opacity=".5"/>
  <text x="100" y="242" fill="#d97757" font-size="8" text-anchor="middle">1小时</text>
  <text x="100" y="252" fill="#87867f" font-size="7" text-anchor="middle">44%</text>
  <path stroke="#d97757" stroke-dasharray="3,2" d="M118 200v30" opacity=".5"/>
  <text x="118" y="242" fill="#d97757" font-size="8" text-anchor="middle">1天</text>
  <text x="118" y="252" fill="#87867f" font-size="7" text-anchor="middle">26%</text>
  <path stroke="#d97757" stroke-dasharray="3,2" d="M160 213v17" opacity=".5"/>
  <text x="160" y="242" fill="#d97757" font-size="8" text-anchor="middle">1月</text>
  <text x="160" y="252" fill="#87867f" font-size="7" text-anchor="middle">21%</text>
  <text x="150" y="310" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">遗忘不是缺陷</text>
  <text x="150" y="324" fill="#141413" font-size="10" font-weight="600" text-anchor="middle">是特征</text>
  <rect width="240" height="330" x="280" y="76" fill="#141413" filter="url(#sh3)" rx="10"/>
  <text x="400" y="102" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">四大遗忘策略</text>
  <rect width="204" height="52" x="298" y="116" fill="#d97757" rx="6"/>
  <text x="400" y="134" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">1. 时间衰减</text>
  <text x="400" y="150" fill="#faf9f5" font-size="9" opacity=".85" text-anchor="middle">越旧的信息相关性越低</text>
  <text x="400" y="162" fill="#faf9f5" font-size="8" opacity=".7" text-anchor="middle">不同类型不同速度</text>
  <rect width="204" height="52" x="298" y="178" fill="#788c5d" rx="6"/>
  <text x="400" y="196" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">2. 用进废退</text>
  <text x="400" y="212" fill="#faf9f5" font-size="9" opacity=".85" text-anchor="middle">访问频率决定去留</text>
  <text x="400" y="224" fill="#faf9f5" font-size="8" opacity=".7" text-anchor="middle">LRU 算法 + 人脑规律</text>
  <rect width="204" height="52" x="298" y="240" fill="#d97757" rx="6"/>
  <text x="400" y="258" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">3. 重要性分级</text>
  <text x="400" y="274" fill="#faf9f5" font-size="9" opacity=".85" text-anchor="middle">关键/重要/普通/临时</text>
  <text x="400" y="286" fill="#faf9f5" font-size="8" opacity=".7" text-anchor="middle">永不/1年/1月/1天</text>
  <rect width="204" height="52" x="298" y="302" fill="#788c5d" rx="6"/>
  <text x="400" y="320" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">4. 压缩而非删除</text>
  <text x="400" y="336" fill="#faf9f5" font-size="9" opacity=".85" text-anchor="middle">关键句子 → 要点 → 总结 → 标记</text>
  <text x="400" y="348" fill="#faf9f5" font-size="8" opacity=".7" text-anchor="middle">保留元信息</text>
  <rect width="220" height="260" x="540" y="76" fill="#e3dacc" filter="url(#sh3)" rx="10"/>
  <text x="650" y="100" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">Agent 记忆肥胖症</text>
  <circle cx="650" cy="160" r="50" fill="#d97757" opacity=".2"/>
  <circle cx="650" cy="160" r="35" fill="#d97757" opacity=".3"/>
  <circle cx="650" cy="160" r="20" fill="#d97757"/>
  <text x="650" y="156" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">50万</text>
  <text x="650" y="168" fill="#faf9f5" font-size="8" text-anchor="middle">条记忆</text>
  <rect width="190" height="22" x="555" y="225" fill="#d97757" opacity=".8" rx="4"/>
  <text x="650" y="240" fill="#faf9f5" font-size="9" text-anchor="middle">信噪比崩溃：99% 是噪音</text>
  <rect width="190" height="22" x="555" y="255" fill="#d97757" opacity=".8" rx="4"/>
  <text x="650" y="270" fill="#faf9f5" font-size="9" text-anchor="middle">检索延迟指数增长</text>
  <rect width="190" height="22" x="555" y="285" fill="#d97757" opacity=".8" rx="4"/>
  <text x="650" y="300" fill="#faf9f5" font-size="9" text-anchor="middle">上下文被过时信息污染</text>
  <text x="650" y="325" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">解决方案：</text>
  <text x="650" y="340" fill="#141413" font-size="10" text-anchor="middle">删除 2000 条旧记忆</text>
  <text x="650" y="355" fill="#141413" font-size="10" text-anchor="middle">→ 一切恢复正常</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arr3)" d="M540 190h-30"/>
  <text x="525" y="183" fill="#d97757" font-size="8" text-anchor="middle">选择性遗忘</text>
  <rect width="720" height="110" x="40" y="352" fill="#141413" filter="url(#sh3)" rx="10"/>
  <text x="400" y="376" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">从「记忆一切」到「智慧遗忘」— 穿越周期的对比</text>
  <rect width="150" height="60" x="80" y="390" fill="#d97757" rx="6"/>
  <text x="155" y="408" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">2024</text>
  <text x="155" y="423" fill="#faf9f5" font-size="9" text-anchor="middle">记忆一切</text>
  <text x="155" y="437" fill="#faf9f5" font-size="8" opacity=".8" text-anchor="middle">→ 信息过载崩溃</text>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr3)" d="M240 420h30"/>
  <rect width="150" height="60" x="280" y="390" fill="#e3dacc" rx="6"/>
  <text x="355" y="408" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">2025</text>
  <text x="355" y="423" fill="#141413" font-size="9" text-anchor="middle">简单删除</text>
  <text x="355" y="437" fill="#141413" font-size="8" opacity=".7" text-anchor="middle">→ 丢失重要信息</text>
  <path stroke="#87867f" stroke-width="2" marker-end="url(#arr3)" d="M440 420h30"/>
  <rect width="150" height="60" x="480" y="390" fill="#788c5d" rx="6"/>
  <text x="555" y="408" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">2026+</text>
  <text x="555" y="423" fill="#faf9f5" font-size="9" text-anchor="middle">智慧遗忘</text>
  <text x="555" y="437" fill="#faf9f5" font-size="8" opacity=".8" text-anchor="middle">→ 保留精华去除噪音</text>
  <path stroke="#788c5d" stroke-width="2" marker-end="url(#arr3)" d="M640 420h30"/>
  <text x="715" y="415" fill="#faf9f5" font-size="9" font-weight="700" text-anchor="middle">认知</text>
  <text x="715" y="428" fill="#faf9f5" font-size="9" font-weight="700" text-anchor="middle">进化</text>
</svg>
