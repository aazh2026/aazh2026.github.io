<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
    <filter id="sh3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#141413">遗忘策略：让 Agent 学会「整理房间」</text>
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#87867F">选择性遗忘 = 重要性筛选 | 记忆质量取决于记住了多少，更取决于忘记了多少</text>

  <!-- Left: Ebbinghaus curve (simplified) -->
  <rect x="40" y="76" width="220" height="260" rx="10" fill="#E3DACC" filter="url(#sh3)"/>
  <text x="150" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#141413">艾宾浩斯遗忘曲线</text>
  <text x="150" y="116" text-anchor="middle" font-size="9" fill="#87867F">1885</text>

  <!-- Chart axes -->
  <line x1="65" y1="230" x2="235" y2="230" stroke="#87867F" stroke-width="1.5"/>
  <line x1="65" y1="140" x2="65" y2="230" stroke="#87867F" stroke-width="1.5"/>
  <text x="65" y="136" font-size="8" fill="#87867F">100%</text>
  <text x="65" y="226" font-size="8" fill="#87867F">0%</text>
  <text x="235" y="244" font-size="8" fill="#87867F" text-anchor="end">时间</text>
  <text x="55" y="188" font-size="8" fill="#87867F" text-anchor="end">保留</text>

  <!-- Curve: retention percentage over time -->
  <!-- Points: 0min=100%, 20min=58%, 1hr=44%, 1day=26%, 1month=21% -->
  <!-- Canvas: x:65-235 (170px), y:140-230 (90px) -->
  <!-- 0min at x=65, 30days at x=235 -->
  <!-- 0min y=140, 20min y=173, 1hr y=181, 1day y=209, 1month y=217 -->
  <polyline
    points="65,140 88,155 100,167 118,200 160,213 235,221"
    fill="none" stroke="#D97757" stroke-width="2.5"/>

  <!-- Annotation lines -->
  <line x1="88" y1="155" x2="88" y2="230" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="88" y="242" text-anchor="middle" font-size="8" fill="#D97757">20分钟</text>
  <text x="88" y="252" text-anchor="middle" font-size="7" fill="#87867F">58%</text>

  <line x1="100" y1="167" x2="100" y2="230" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="100" y="242" text-anchor="middle" font-size="8" fill="#D97757">1小时</text>
  <text x="100" y="252" text-anchor="middle" font-size="7" fill="#87867F">44%</text>

  <line x1="118" y1="200" x2="118" y2="230" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="118" y="242" text-anchor="middle" font-size="8" fill="#D97757">1天</text>
  <text x="118" y="252" text-anchor="middle" font-size="7" fill="#87867F">26%</text>

  <line x1="160" y1="213" x2="160" y2="230" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="160" y="242" text-anchor="middle" font-size="8" fill="#D97757">1月</text>
  <text x="160" y="252" text-anchor="middle" font-size="7" fill="#87867F">21%</text>

  <!-- Insight text -->
  <text x="150" y="310" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">遗忘不是缺陷</text>
  <text x="150" y="324" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">是特征</text>

  <!-- Center: Four forgetting strategies -->
  <rect x="280" y="76" width="240" height="330" rx="10" fill="#141413" filter="url(#sh3)"/>
  <text x="400" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">四大遗忘策略</text>

  <!-- Strategy 1: Time decay -->
  <rect x="298" y="116" width="204" height="52" rx="6" fill="#D97757"/>
  <text x="400" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">1. 时间衰减</text>
  <text x="400" y="150" text-anchor="middle" font-size="9" fill="#FAF9F5" opacity="0.85">越旧的信息相关性越低</text>
  <text x="400" y="162" text-anchor="middle" font-size="8" fill="#FAF9F5" opacity="0.7">不同类型不同速度</text>

  <!-- Strategy 2: Use it or lose it -->
  <rect x="298" y="178" width="204" height="52" rx="6" fill="#788C5D"/>
  <text x="400" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">2. 用进废退</text>
  <text x="400" y="212" text-anchor="middle" font-size="9" fill="#FAF9F5" opacity="0.85">访问频率决定去留</text>
  <text x="400" y="224" text-anchor="middle" font-size="8" fill="#FAF9F5" opacity="0.7">LRU 算法 + 人脑规律</text>

  <!-- Strategy 3: Importance tagging -->
  <rect x="298" y="240" width="204" height="52" rx="6" fill="#D97757"/>
  <text x="400" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">3. 重要性分级</text>
  <text x="400" y="274" text-anchor="middle" font-size="9" fill="#FAF9F5" opacity="0.85">关键/重要/普通/临时</text>
  <text x="400" y="286" text-anchor="middle" font-size="8" fill="#FAF9F5" opacity="0.7">永不/1年/1月/1天</text>

  <!-- Strategy 4: Compression -->
  <rect x="298" y="302" width="204" height="52" rx="6" fill="#788C5D"/>
  <text x="400" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">4. 压缩而非删除</text>
  <text x="400" y="336" text-anchor="middle" font-size="9" fill="#FAF9F5" opacity="0.85">关键句子 → 要点 → 总结 → 标记</text>
  <text x="400" y="348" text-anchor="middle" font-size="8" fill="#FAF9F5" opacity="0.7">保留元信息</text>

  <!-- Right: Memory obesity problem -->
  <rect x="540" y="76" width="220" height="260" rx="10" fill="#E3DACC" filter="url(#sh3)"/>
  <text x="650" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#141413">Agent 记忆肥胖症</text>

  <!-- Bad state illustration -->
  <circle cx="650" cy="160" r="50" fill="#D97757" opacity="0.2"/>
  <circle cx="650" cy="160" r="35" fill="#D97757" opacity="0.3"/>
  <circle cx="650" cy="160" r="20" fill="#D97757"/>
  <text x="650" y="156" text-anchor="middle" font-size="10" font-weight="700" fill="#FAF9F5">50万</text>
  <text x="650" y="168" text-anchor="middle" font-size="8" fill="#FAF9F5">条记忆</text>

  <!-- Symptoms -->
  <rect x="555" y="225" width="190" height="22" rx="4" fill="#D97757" opacity="0.8"/>
  <text x="650" y="240" text-anchor="middle" font-size="9" fill="#FAF9F5">信噪比崩溃：99% 是噪音</text>

  <rect x="555" y="255" width="190" height="22" rx="4" fill="#D97757" opacity="0.8"/>
  <text x="650" y="270" text-anchor="middle" font-size="9" fill="#FAF9F5">检索延迟指数增长</text>

  <rect x="555" y="285" width="190" height="22" rx="4" fill="#D97757" opacity="0.8"/>
  <text x="650" y="300" text-anchor="middle" font-size="9" fill="#FAF9F5">上下文被过时信息污染</text>

  <text x="650" y="325" text-anchor="middle" font-size="10" fill="#141413" font-weight="700">解决方案：</text>
  <text x="650" y="340" text-anchor="middle" font-size="10" fill="#141413">删除 2000 条旧记忆</text>
  <text x="650" y="355" text-anchor="middle" font-size="10" fill="#141413">→ 一切恢复正常</text>

  <!-- Arrow from bad to good -->
  <line x1="540" y1="190" x2="510" y2="190" stroke="#D97757" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="525" y="183" text-anchor="middle" font-size="8" fill="#D97757">选择性遗忘</text>

  <!-- Bottom: Paradigm shift -->
  <rect x="40" y="352" width="720" height="110" rx="10" fill="#141413" filter="url(#sh3)"/>
  <text x="400" y="376" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">从「记忆一切」到「智慧遗忘」— 穿越周期的对比</text>

  <!-- Era comparison table -->
  <rect x="80" y="390" width="150" height="60" rx="6" fill="#D97757"/>
  <text x="155" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#FAF9F5">2024</text>
  <text x="155" y="423" text-anchor="middle" font-size="9" fill="#FAF9F5">记忆一切</text>
  <text x="155" y="437" text-anchor="middle" font-size="8" fill="#FAF9F5" opacity="0.8">→ 信息过载崩溃</text>

  <line x1="240" y1="420" x2="270" y2="420" stroke="#87867F" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="280" y="390" width="150" height="60" rx="6" fill="#E3DACC"/>
  <text x="355" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">2025</text>
  <text x="355" y="423" text-anchor="middle" font-size="9" fill="#141413">简单删除</text>
  <text x="355" y="437" text-anchor="middle" font-size="8" fill="#141413" opacity="0.7">→ 丢失重要信息</text>

  <line x1="440" y1="420" x2="470" y2="420" stroke="#87867F" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="480" y="390" width="150" height="60" rx="6" fill="#788C5D"/>
  <text x="555" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#FAF9F5">2026+</text>
  <text x="555" y="423" text-anchor="middle" font-size="9" fill="#FAF9F5">智慧遗忘</text>
  <text x="555" y="437" text-anchor="middle" font-size="8" fill="#FAF9F5" opacity="0.8">→ 保留精华去除噪音</text>

  <line x1="640" y1="420" x2="670" y2="420" stroke="#788C5D" stroke-width="2" marker-end="url(#arr3)"/>

  <text x="715" y="415" text-anchor="middle" font-size="9" fill="#FAF9F5" font-weight="700">认知</text>
  <text x="715" y="428" text-anchor="middle" font-size="9" fill="#FAF9F5" font-weight="700">进化</text>
</svg>