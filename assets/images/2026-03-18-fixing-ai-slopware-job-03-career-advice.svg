<svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Visual divider: 开发者职业建议 3 pillars -->
  <rect width="600" height="140" fill="#FAF9F5"/>

  <!-- Divider line left -->
  <line x1="0" y1="70" x2="180" y2="70" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Pillar 1 -->
  <rect x="195" y="30" width="60" height="80" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <rect x="208" y="42" width="34" height="34" rx="3" fill="#D97757"/>
  <text x="225" y="62" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace">分化</text>
  <text x="225" y="90" text-anchor="middle" font-size="10" fill="#141413">AI 市场分化</text>
  <text x="225" y="103" text-anchor="middle" font-size="9" fill="#87867F">3 类开发者</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="70" x2="275" y2="70" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="275,66 283,70 275,74" fill="#D1CFC5"/>

  <!-- Pillar 2 -->
  <rect x="288" y="30" width="60" height="80" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <rect x="301" y="42" width="34" height="34" rx="3" fill="#788C5D"/>
  <text x="318" y="62" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace">技能</text>
  <text x="318" y="90" text-anchor="middle" font-size="10" fill="#141413">高价值技能</text>
  <text x="318" y="103" text-anchor="middle" font-size="9" fill="#87867F">架构·性能·并发</text>

  <!-- Arrow 2→3 -->
  <line x1="353" y1="70" x2="368" y2="70" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="368,66 376,70 368,74" fill="#D1CFC5"/>

  <!-- Pillar 3 -->
  <rect x="381" y="30" width="60" height="80" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <rect x="394" y="42" width="34" height="34" rx="3" fill="#141413"/>
  <text x="411" y="62" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace">品牌</text>
  <text x="411" y="90" text-anchor="middle" font-size="10" fill="#141413">个人声誉</text>
  <text x="411" y="103" text-anchor="middle" font-size="9" fill="#87867F">博客·开源·咨询</text>

  <!-- Divider line right -->
  <line x1="446" y1="70" x2="600" y2="70" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Label -->
  <text x="300" y="128" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">开发者应对策略</text>
</svg>