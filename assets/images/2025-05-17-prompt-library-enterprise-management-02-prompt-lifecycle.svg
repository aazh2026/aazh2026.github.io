<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 240">
  <title>Prompt生命周期管理流程</title>
  <desc>
    Prompt从提交到持续优化的完整生命周期：提交 → 自动化检查 → 同行审查 → 效果测试 → 合并 → 发布 → 迭代优化
  </desc>
  <path fill="#faf9f5" d="M0 0h680v240H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Prompt生命周期管理流程</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">提交 → 自动化检查 → 同行审查 → 效果测试 → 合并 → 发布 → 迭代优化</text>
  <rect width="78" height="52" x="16" y="70" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="55" y="88" fill="#141413" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">1 提交</text>
  <text x="55" y="102" fill="#87867f" font-size="9" text-anchor="middle">Prompt Author</text>
  <text x="55" y="114" fill="#d1cfc5" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">Git PR</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M94 96h14"/>
  <path fill="#d1cfc5" d="m108 96-6-4v8z"/>
  <rect width="78" height="52" x="112" y="70" fill="#fff" stroke="#d97757" stroke-width="2" rx="6"/>
  <rect width="78" height="52" x="112" y="70" fill="#d97757" fill-opacity=".06" rx="6"/>
  <text x="151" y="88" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">2 自动化检查</text>
  <text x="151" y="102" fill="#87867f" font-size="9" text-anchor="middle">lint · format</text>
  <text x="151" y="114" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">CI/CD</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M190 96h14"/>
  <path fill="#d1cfc5" d="m204 96-6-4v8z"/>
  <rect width="78" height="52" x="208" y="70" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="247" y="88" fill="#141413" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">3 同行审查</text>
  <text x="247" y="102" fill="#87867f" font-size="9" text-anchor="middle">Prompt Engineer</text>
  <text x="247" y="114" fill="#d1cfc5" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">review</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M286 96h14"/>
  <path fill="#d1cfc5" d="m300 96-6-4v8z"/>
  <rect width="78" height="52" x="304" y="70" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="343" y="88" fill="#141413" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">4 效果测试</text>
  <text x="343" y="102" fill="#87867f" font-size="9" text-anchor="middle">A/B · 质量评估</text>
  <text x="343" y="114" fill="#d1cfc5" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">eval</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M382 96h14"/>
  <path fill="#d1cfc5" d="m396 96-6-4v8z"/>
  <rect width="78" height="52" x="400" y="70" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="439" y="88" fill="#141413" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">5 合并</text>
  <text x="439" y="102" fill="#87867f" font-size="9" text-anchor="middle">Maintainer</text>
  <text x="439" y="114" fill="#d1cfc5" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">approve</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M478 96h14"/>
  <path fill="#d1cfc5" d="m492 96-6-4v8z"/>
