  <text x="535" y="102" fill="#87867f" font-size="9" text-anchor="middle">Prompt Registry</text>
  <text x="535" y="114" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">published</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M574 122c0 38-234 48-519 38" opacity=".7"/>
  <path fill="#d97757" d="m55 160 6-6H49z" opacity=".7"/>
  <text x="310" y="178" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">7 迭代优化 · 持续改进</text>
  <rect width="10" height="10" x="16" y="188" fill="#d97757" fill-opacity=".15" stroke="#d97757" rx="2"/>
  <text x="32" y="197" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">质量卡点</text>
  <rect width="10" height="10" x="120" y="188" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" rx="2"/>
  <text x="136" y="197" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">发布里程碑</text>
  <rect width="10" height="10" x="248" y="188" fill="#d97757" fill-opacity=".7" stroke="#d1cfc5" stroke-dasharray="2,2" rx="2"/>
  <text x="264" y="197" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">反馈闭环</text>
</svg>
