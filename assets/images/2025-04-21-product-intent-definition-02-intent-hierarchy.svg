<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 400"><path fill="#faf9f5" d="M0 0h680v400H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Product Intent 层级结构</text><text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Level 2-3 = Product Intent 关注区间</text><rect width="600" height="60" x="40" y="58" fill="#e3dacc" stroke="#d97757" stroke-width="2" rx="8"/><text x="56" y="80" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 4 · AI 实现层</text><text x="56" y="98" fill="#141413" font-size="12">AI 自主决定：向量检索 + 排序模型，Top-K 召回后精排</text><rect width="66" height="20" x="562" y="68" fill="#d97757" rx="10"/><text x="595" y="83" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">AI 决策</text><path stroke="#d1cfc5" stroke-width="1.5" d="M340 118v16"/><path fill="#d1cfc5" d="m340 138-4-8h8z"/><rect width="600" height="60" x="40" y="142" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="56" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 3 · 功能规格层</text><text x="56" y="182" fill="#141413" font-size="12">&quot;首页个性化推荐模块：在 100ms 内展示 5 个相关商品&quot;</text><path stroke="#d1cfc5" stroke-width="1.5" d="M340 202v16"/><path fill="#d1cfc5" d="m340 222-4-8h8z"/><rect width="600" height="60" x="40" y="226" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/><text x="56" y="248" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 2 · 产品意图层</text><text x="56" y="266" fill="#141413" font-size="12">&quot;通过个性化推荐提升用户发现和购买效率&quot;</text><rect width="66" height="20" x="562" y="236" fill="#d97757" rx="10"/><text x="595" y="251" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">核心层</text><path stroke="#d1cfc5" stroke-width="1.5" d="M340 286v16"/><path fill="#d1cfc5" d="m340 306-4-8h8z"/><rect width="600" height="60" x="40" y="310" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="56" y="332" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Level 1 · 战略意图层</text><text x="56" y="350" fill="#141413" font-size="12">&quot;成为最懂用户的电商平台&quot;</text><path fill="none" stroke="#d97757" stroke-dasharray="5,3" stroke-width="2" d="M640 88c22 0 22 252 0 252" opacity=".6"/><path fill="#d97757" d="m640 340-6-8h12z" opacity=".6"/><text x="656" y="215" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">反馈改进</text><text x="656" y="228" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">← ← ←</text><text x="340" y="388" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Product Intent 关注 Level 2-3，将 Level 4 留给 AI 决定</text></svg>