<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Product Intent 层级结构</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Level 2-3 = Product Intent 关注区间</text>

  <!-- Level 4: AI Implementation (top) -->
  <rect x="40" y="58" width="600" height="60" rx="8" fill="#E3DACC" stroke="#D97757" stroke-width="2"/>
  <text x="56" y="80" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Level 4 · AI 实现层</text>
  <text x="56" y="98" font-size="12" fill="#141413">AI 自主决定：向量检索 + 排序模型，Top-K 召回后精排</text>
  <rect x="562" y="68" width="66" height="20" rx="10" fill="#D97757"/>
  <text x="595" y="83" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">AI 决策</text>

  <!-- Arrow 4→3 -->
  <line x1="340" y1="118" x2="340" y2="134" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,138 336,130 344,130" fill="#D1CFC5"/>

  <!-- Level 3: Functional Spec -->
  <rect x="40" y="142" width="600" height="60" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="56" y="164" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">Level 3 · 功能规格层</text>
  <text x="56" y="182" font-size="12" fill="#141413">"首页个性化推荐模块：在 100ms 内展示 5 个相关商品"</text>

  <!-- Arrow 3→2 -->
  <line x1="340" y1="202" x2="340" y2="218" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,222 336,214 344,214" fill="#D1CFC5"/>

  <!-- Level 2: Product Intent (highlighted) -->
  <rect x="40" y="226" width="600" height="60" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="56" y="248" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Level 2 · 产品意图层</text>
  <text x="56" y="266" font-size="12" fill="#141413">"通过个性化推荐提升用户发现和购买效率"</text>
  <rect x="562" y="236" width="66" height="20" rx="10" fill="#D97757"/>
  <text x="595" y="251" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">核心层</text>

  <!-- Arrow 2→1 -->
  <line x1="340" y1="286" x2="340" y2="302" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,306 336,298 344,298" fill="#D1CFC5"/>

  <!-- Level 1: Business Goal (bottom) -->
  <rect x="40" y="310" width="600" height="60" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="56" y="332" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">Level 1 · 战略意图层</text>
  <text x="56" y="350" font-size="12" fill="#141413">"成为最懂用户的电商平台"</text>

  <!-- Feedback arrow: Level 4 → Level 1 (right side, dashed) -->
  <path d="M 640 88 C 662 88, 662 340, 640 340" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="640,340 634,332 646,332" fill="#D97757" opacity="0.6"/>
  <text x="656" y="215" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">反馈改进</text>
  <text x="656" y="228" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">← ← ←</text>

  <!-- Key insight label at bottom -->
  <text x="340" y="388" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Product Intent 关注 Level 2-3，将 Level 4 留给 AI 决定</text>
</svg>
