<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="ivory-bg5" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <filter id="shadow5" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <path fill="url(#ivory-bg5)" d="M0 0h960v540H0z"/>
  <text x="480" y="38" fill="#141413" font-size="20" font-weight="bold" text-anchor="middle">Multi-Agent 效率曲线 / Efficiency vs. Agent Count</text>
  <path stroke="#d1cfc5" d="M160 50h640"/>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M120 80v360"/>
  <text x="55" y="260" fill="#87867f" font-size="11" text-anchor="middle" transform="rotate(-90 55 260)">系统效率</text>
  <path stroke="#e3dacc" stroke-dasharray="4,3" d="M120 90h680m-680 80h680m-680 80h680m-680 80h680m-680 80h680"/>
  <text x="108" y="94" fill="#87867f" font-size="9" text-anchor="end">300</text>
  <text x="108" y="174" fill="#87867f" font-size="9" text-anchor="end">240</text>
  <text x="108" y="254" fill="#87867f" font-size="9" text-anchor="end">180</text>
  <text x="108" y="334" fill="#87867f" font-size="9" text-anchor="end">120</text>
  <text x="108" y="414" fill="#87867f" font-size="9" text-anchor="end">60</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M120 440h680"/>
  <text x="460" y="490" fill="#87867f" font-size="11" text-anchor="middle">Agent 数量 (N)</text>
  <text x="120" y="456" fill="#87867f" font-size="9" text-anchor="middle">1</text>
  <text x="248" y="456" fill="#87867f" font-size="9" text-anchor="middle">2</text>
  <text x="376" y="456" fill="#87867f" font-size="9" text-anchor="middle">3</text>
  <text x="504" y="456" fill="#87867f" font-size="9" text-anchor="middle">4</text>
  <text x="632" y="456" fill="#87867f" font-size="9" text-anchor="middle">5</text>
  <text x="760" y="456" fill="#87867f" font-size="9" text-anchor="middle">6</text>
  <path fill="#788c5d" fill-opacity=".06" d="M376 80h256v360H376z"/>
  <path stroke="#788c5d" stroke-dasharray="5,3" stroke-width="1.5" d="M376 80v360M632 80v360"/>
  <text x="504" y="74" fill="#788c5d" font-size="10" font-weight="bold" text-anchor="middle">甜点区 3-5 Agents</text>
  <path fill="none" stroke="#788c5d" stroke-width="3" d="m120 420 128-80 128-100 128-65 128 60 128 90"/>
  <text x="768" y="340" fill="#788c5d" font-size="10" font-weight="bold">总效率</text>
  <text x="248" y="398" fill="#87867f" font-size="9" text-anchor="middle">协调: 20%</text>
  <text x="504" y="350" fill="#d97757" font-size="9" text-anchor="middle">协调: 43%</text>
  <text x="760" y="250" fill="#d97757" font-size="9" text-anchor="middle">协调: 56%</text>
  <circle cx="504" cy="175" r="7" fill="#788c5d"/>
  <text x="504" y="162" fill="#788c5d" font-size="10" font-weight="bold" text-anchor="middle">最优 N*</text>
  <path stroke="#788c5d" stroke-dasharray="3,3" d="M504 182v258"/>
  <rect width="295" height="320" x="640" y="65" fill="#fff" filter="url(#shadow5)" rx="12"/>
  <rect width="295" height="36" x="640" y="65" fill="#d97757" rx="12"/>
  <path fill="#d97757" d="M640 89h295v12H640z"/>
  <text x="787" y="87" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">💡 协作悖论核心</text>
  <text x="658" y="122" fill="#141413" font-size="12" font-weight="bold">协调成本公式：</text>
  <text x="658" y="142" fill="#141413" font-size="11">总成本 = T/N + C×N(N-1)/2</text>
  <text x="658" y="160" fill="#87867f" font-size="10">T = 任务总工作量</text>
  <text x="658" y="174" fill="#87867f" font-size="10">C = 单次协调成本</text>
  <path stroke="#e3dacc" d="M658 185h257"/>
  <text x="658" y="205" fill="#141413" font-size="12" font-weight="bold">最优 Agent 数量：</text>
  <text x="658" y="225" fill="#d97757" font-size="11" font-weight="bold">N* = √(2T/C)</text>
  <text x="658" y="243" fill="#87867f" font-size="10">协调成本增长 = O(n²)</text>
  <path stroke="#e3dacc" d="M658 253h257"/>
  <text x="658" y="273" fill="#141413" font-size="12" font-weight="bold">经验法则：</text>
  <text x="658" y="292" fill="#141413" font-size="10">• 简单任务：1-2 个 Agent</text>
  <text x="658" y="308" fill="#141413" font-size="10">• 中等复杂度：3-5 个 Agent</text>
  <text x="658" y="324" fill="#141413" font-size="10">• 高复杂任务：5-8 个 Agent</text>
  <text x="658" y="342" fill="#d97757" font-size="10" font-weight="bold">• 超过 8 个 → 架构设计问题</text>
  <path stroke="#e3dacc" d="M658 355h257"/>
  <text x="658" y="375" fill="#141413" font-size="11" font-weight="bold">5-Agent 法则：</text>
  <text x="658" y="393" fill="#87867f" font-size="10">大多数企业应用，</text>
  <text x="658" y="408" fill="#87867f" font-size="10">5 个 Agent 是甜点区</text>
  <text x="480" y="505" fill="#87867f" font-size="10" text-anchor="middle">协调成本随 Agent 数量平方增长，超过最优数量后，每增加一个 Agent，整体效率反而下降</text>
</svg>
