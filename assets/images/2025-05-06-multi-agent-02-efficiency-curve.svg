<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Georgia, serif">
  <defs>
    <linearGradient id="ivory-bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE4"/>
    </linearGradient>
    <filter id="shadow5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#ivory-bg5)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" fill="#141413" font-weight="bold">Multi-Agent 效率曲线 / Efficiency vs. Agent Count</text>
  <line x1="160" y1="50" x2="800" y2="50" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Chart area -->
  <!-- Y-axis -->
  <line x1="120" y1="80" x2="120" y2="440" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="55" y="260" text-anchor="middle" font-size="11" fill="#87867F" transform="rotate(-90,55,260)">系统效率</text>

  <!-- Y grid lines -->
  <line x1="120" y1="90" x2="800" y2="90" stroke="#E3DACC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="170" x2="800" y2="170" stroke="#E3DACC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="250" x2="800" y2="250" stroke="#E3DACC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="330" x2="800" y2="330" stroke="#E3DACC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="410" x2="800" y2="410" stroke="#E3DACC" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y labels -->
  <text x="108" y="94" text-anchor="end" font-size="9" fill="#87867F">300</text>
  <text x="108" y="174" text-anchor="end" font-size="9" fill="#87867F">240</text>
  <text x="108" y="254" text-anchor="end" font-size="9" fill="#87867F">180</text>
  <text x="108" y="334" text-anchor="end" font-size="9" fill="#87867F">120</text>
  <text x="108" y="414" text-anchor="end" font-size="9" fill="#87867F">60</text>

  <!-- X-axis -->
  <line x1="120" y1="440" x2="800" y2="440" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="460" y="490" text-anchor="middle" font-size="11" fill="#87867F">Agent 数量 (N)</text>

  <!-- X labels -->
  <text x="120" y="456" text-anchor="middle" font-size="9" fill="#87867F">1</text>
  <text x="248" y="456" text-anchor="middle" font-size="9" fill="#87867F">2</text>
  <text x="376" y="456" text-anchor="middle" font-size="9" fill="#87867F">3</text>
  <text x="504" y="456" text-anchor="middle" font-size="9" fill="#87867F">4</text>
  <text x="632" y="456" text-anchor="middle" font-size="9" fill="#87867F">5</text>
  <text x="760" y="456" text-anchor="middle" font-size="9" fill="#87867F">6</text>

  <!-- Optimal zone -->
  <rect x="376" y="80" width="256" height="360" fill="#788C5D" fill-opacity="0.06"/>
  <line x1="376" y1="80" x2="376" y2="440" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="632" y1="80" x2="632" y2="440" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="504" y="74" text-anchor="middle" font-size="10" fill="#788C5D" font-weight="bold">甜点区 3-5 Agents</text>

  <!-- Total efficiency curve (bell/inverted U) -->
  <polyline points="120,420 248,340 376,240 504,175 632,235 760,325" fill="none" stroke="#788C5D" stroke-width="3"/>
  <text x="768" y="340" font-size="10" fill="#788C5D" font-weight="bold">总效率</text>

  <!-- Coordination cost % labels -->
  <text x="248" y="398" text-anchor="middle" font-size="9" fill="#87867F">协调: 20%</text>
  <text x="504" y="350" text-anchor="middle" font-size="9" fill="#D97757">协调: 43%</text>
  <text x="760" y="250" text-anchor="middle" font-size="9" fill="#D97757">协调: 56%</text>

  <!-- Peak -->
  <circle cx="504" cy="175" r="7" fill="#788C5D"/>
  <text x="504" y="162" text-anchor="middle" font-size="10" fill="#788C5D" font-weight="bold">最优 N*</text>
  <line x1="504" y1="182" x2="504" y2="440" stroke="#788C5D" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Right panel -->
  <rect x="640" y="65" width="295" height="320" rx="12" fill="white" filter="url(#shadow5)"/>
  <rect x="640" y="65" width="295" height="36" rx="12" fill="#D97757"/>
  <rect x="640" y="89" width="295" height="12" fill="#D97757"/>
  <text x="787" y="87" text-anchor="middle" font-size="13" fill="white" font-weight="bold">💡 协作悖论核心</text>

  <text x="658" y="122" font-size="12" fill="#141413" font-weight="bold">协调成本公式：</text>
  <text x="658" y="142" font-size="11" fill="#141413">总成本 = T/N + C×N(N-1)/2</text>
  <text x="658" y="160" font-size="10" fill="#87867F">T = 任务总工作量</text>
  <text x="658" y="174" font-size="10" fill="#87867F">C = 单次协调成本</text>

  <line x1="658" y1="185" x2="915" y2="185" stroke="#E3DACC" stroke-width="1"/>

  <text x="658" y="205" font-size="12" fill="#141413" font-weight="bold">最优 Agent 数量：</text>
  <text x="658" y="225" font-size="11" fill="#D97757" font-weight="bold">N* = √(2T/C)</text>
  <text x="658" y="243" font-size="10" fill="#87867F">协调成本增长 = O(n²)</text>

  <line x1="658" y1="253" x2="915" y2="253" stroke="#E3DACC" stroke-width="1"/>

  <text x="658" y="273" font-size="12" fill="#141413" font-weight="bold">经验法则：</text>
  <text x="658" y="292" font-size="10" fill="#141413">• 简单任务：1-2 个 Agent</text>
  <text x="658" y="308" font-size="10" fill="#141413">• 中等复杂度：3-5 个 Agent</text>
  <text x="658" y="324" font-size="10" fill="#141413">• 高复杂任务：5-8 个 Agent</text>
  <text x="658" y="342" font-size="10" fill="#D97757" font-weight="bold">• 超过 8 个 → 架构设计问题</text>

  <line x1="658" y1="355" x2="915" y2="355" stroke="#E3DACC" stroke-width="1"/>

  <text x="658" y="375" font-size="11" fill="#141413" font-weight="bold">5-Agent 法则：</text>
  <text x="658" y="393" font-size="10" fill="#87867F">大多数企业应用，</text>
  <text x="658" y="408" font-size="10" fill="#87867F">5 个 Agent 是甜点区</text>

  <!-- Bottom note -->
  <text x="480" y="505" text-anchor="middle" font-size="10" fill="#87867F">协调成本随 Agent 数量平方增长，超过最优数量后，每增加一个 Agent，整体效率反而下降</text>
</svg>
