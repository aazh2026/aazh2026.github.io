<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">记忆归因四维度</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">每段记忆都有身份证</text>

  <!-- Card 1: Provenance -->
  <rect x="32" y="62" width="142" height="200" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <!-- Provenance badge -->
  <rect x="32" y="62" width="142" height="28" rx="8" fill="#D97757"/>
  <rect x="32" y="76" width="142" height="14" fill="#D97757"/>
  <text x="103" y="81" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">来源归因</text>
  <!-- Provenance icon: document/source -->
  <rect x="76" y="108" width="54" height="64" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="86" y1="124" x2="120" y2="124" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="86" y1="136" x2="120" y2="136" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="86" y1="148" x2="110" y2="148" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  <text x="103" y="196" text-anchor="middle" font-size="10" fill="#141413">来源段落</text>
  <text x="103" y="212" text-anchor="middle" font-size="10" fill="#141413">时间戳</text>
  <text x="103" y="228" text-anchor="middle" font-size="10" fill="#141413">对话记录</text>
  <text x="103" y="250" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Provenance</text>

  <!-- Card 2: Temporal -->
  <rect x="190" y="62" width="142" height="200" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <!-- Temporal badge -->
  <rect x="190" y="62" width="142" height="28" rx="8" fill="#D97757"/>
  <rect x="190" y="76" width="142" height="14" fill="#D97757"/>
  <text x="261" y="81" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">时间归因</text>
  <!-- Temporal icon: clock + decay curve -->
  <circle cx="261" cy="140" r="28" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="261" y1="122" x2="261" y2="140" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
  <line x1="261" y1="140" x2="273" y2="148" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
  <circle cx="261" cy="140" r="2" fill="#D97757"/>
  <!-- Decay curve -->
  <polyline points="220,210 250,198 280,205 310,222" stroke="#788C5D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="220" cy="210" r="3" fill="#788C5D"/>
  <circle cx="310" cy="222" r="3" fill="#788C5D"/>
  <text x="261" y="244" text-anchor="middle" font-size="10" fill="#141413">时间衰减</text>
  <text x="261" y="260" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Temporal</text>

  <!-- Card 3: Reasoning -->
  <rect x="348" y="62" width="142" height="200" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <!-- Reasoning badge -->
  <rect x="348" y="62" width="142" height="28" rx="8" fill="#D97757"/>
  <rect x="348" y="76" width="142" height="14" fill="#D97757"/>
  <text x="419" y="81" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">推理归因</text>
  <!-- Reasoning icon: chain of thought arrows -->
  <rect x="368" y="108" width="102" height="28" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="419" y="126" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">前提</text>
  <line x1="419" y1="136" x2="419" y2="150" stroke="#D97757" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="419,154 415,146 423,146" fill="#D97757"/>
  <rect x="368" y="158" width="102" height="28" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="419" y="176" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">推断</text>
  <line x1="419" y1="186" x2="419" y2="200" stroke="#D97757" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="419,204 415,196 423,196" fill="#D97757"/>
  <rect x="368" y="208" width="102" height="28" rx="4" fill="#F0EEE6" stroke="#D97757" stroke-width="1.2"/>
  <text x="419" y="226" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">结论</text>
  <text x="419" y="244" text-anchor="middle" font-size="10" fill="#141413">推理链显式化</text>
  <text x="419" y="260" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Reasoning</text>

  <!-- Card 4: Impact -->
  <rect x="506" y="62" width="142" height="200" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <!-- Impact badge -->
  <rect x="506" y="62" width="142" height="28" rx="8" fill="#D97757"/>
  <rect x="506" y="76" width="142" height="14" fill="#D97757"/>
  <text x="577" y="81" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">影响归因</text>
  <!-- Impact icon: bar chart -->
  <rect x="530" y="210" width="18" height="50" rx="2" fill="#D97757"/>
  <rect x="554" y="192" width="18" height="68" rx="2" fill="#788C5D"/>
  <rect x="578" y="204" width="18" height="56" rx="2" fill="#D1CFC5"/>
  <line x1="524" y1="210" x2="602" y2="210" stroke="#141413" stroke-width="1" stroke-opacity="0.3"/>
  <text x="539" y="270" text-anchor="middle" font-size="9" fill="#141413">低</text>
  <text x="563" y="270" text-anchor="middle" font-size="9" fill="#141413">高</text>
  <text x="587" y="270" text-anchor="middle" font-size="9" fill="#141413">中</text>
  <text x="577" y="244" text-anchor="middle" font-size="10" fill="#141413">使用频率</text>
  <text x="577" y="260" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Impact</text>

  <!-- Footer note -->
  <text x="340" y="334" text-anchor="middle" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">每段记忆都有身份证</text>

  <!-- Title + desc for accessibility -->
  <title>记忆归因四维度</title>
  <desc>记忆归因的四个维度：来源归因（Provenance）、时间归因（Temporal）、推理归因（Reasoning）、影响归因（Impact）</desc>
</svg>