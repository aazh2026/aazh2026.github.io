<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560"><defs><style>text{font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif}</style></defs><rect width="480" height="560" fill="#faf9f5" rx="12"/><text x="24" y="38" fill="#141413" font-size="15" font-weight="700">EU AI Act · 风险分级体系</text><text x="24" y="56" fill="#87867f" font-size="10">Risk Classification Framework</text><path fill="#788c5d" d="m240 90 55 60H185z" opacity=".85"/><text x="240" y="128" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">最小风险</text><text x="240" y="142" fill="#faf9f5" font-size="9" text-anchor="middle">Minimal Risk</text><path fill="#d1cfc5" d="M185 155h110l35 60H150z"/><text x="240" y="181" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">有限风险</text><text x="240" y="195" fill="#87867f" font-size="9" text-anchor="middle">Limited Risk · 透明度义务</text><path fill="#d97757" d="M150 220h180l40 65H110z" opacity=".85"/><text x="240" y="248" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">高风险</text><text x="240" y="262" fill="#faf9f5" font-size="9" text-anchor="middle">High Risk · 严格合规义务</text><path fill="#141413" d="M110 290h260l40 70H70z"/><text x="240" y="322" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">不可接受风险</text><text x="240" y="336" fill="#87867f" font-size="9" text-anchor="middle">Unacceptable Risk · 完全禁止</text><path stroke="#d1cfc5" d="M24 375h432"/><text x="24" y="397" fill="#141413" font-size="10" font-weight="600">典型场景</text><rect width="10" height="10" x="24" y="408" fill="#141413" rx="2"/><text x="40" y="417" fill="#141413" font-size="9.5">社会信用评分、实时生物识别（公共场所）</text><rect width="10" height="10" x="24" y="428" fill="#d97757" rx="2"/><text x="40" y="437" fill="#141413" font-size="9.5">招聘筛选、信贷评估、医疗诊断、教育评分</text><rect width="10" height="10" x="24" y="448" fill="#d1cfc5" rx="2"/><text x="40" y="457" fill="#141413" font-size="9.5">聊天机器人、情感识别系统（需用户知情）</text><rect width="10" height="10" x="24" y="468" fill="#788c5d" rx="2"/><text x="40" y="477" fill="#141413" font-size="9.5">垃圾邮件过滤、游戏AI、智能推荐</text><path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M385 310v70"/><path fill="#d97757" d="m385 385-4-10h8z"/><text x="400" y="350" fill="#d97757" font-size="8.5" font-weight="600">处罚</text><text x="400" y="362" fill="#d97757" font-size="8.5">力度</text><text x="24" y="530" fill="#87867f" font-size="9">Article 6-9 · 风险等级决定合规义务的严格程度</text><text x="24" y="544" fill="#87867f" font-size="9">来源：EU AI Act (Regulation 2024/1689)</text></svg>