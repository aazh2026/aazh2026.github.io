<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560"><path fill="#faf9f5" d="M0 0h800v560H0z"/><defs><filter id="shadow" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/></filter></defs><text x="400" y="40" fill="#141413" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">ICQ 四维意图复杂度模型</text><text x="400" y="62" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Intent Complexity Quadrant — Radar Visualization</text><g transform="translate(260 300)"><path fill="none" stroke="#d1cfc5" d="m0-160 138.6 80V80L0 160l-138.6-80V-80z"/><path fill="none" stroke="#d1cfc5" stroke-dasharray="4,4" d="m0-120 104 60V60L0 120l-104-60V-60z"/><path fill="none" stroke="#d1cfc5" stroke-dasharray="4,4" d="m0-80 69.3 40v80L0 80l-69.3-40v-80z"/><path fill="none" stroke="#d1cfc5" stroke-dasharray="4,4" d="m0-40 34.6 20v40L0 40l-34.6-20v-40z"/><path stroke="#d1cfc5" d="M0 0v-160M0 0l138.6-80M0 0l138.6 80M0 0v160M0 0l-138.6 80M0 0l-138.6-80"/><path fill="#d97757" fill-opacity=".2" stroke="#d97757" stroke-width="2" d="m0-96 110.9 32L97 56 0 112l-55.4-80v-64z"/><circle cy="-96" r="5" fill="#d97757"/><circle cx="110.9" cy="-64" r="5" fill="#d97757"/><circle cx="97" cy="56" r="5" fill="#d97757"/><circle cy="112" r="5" fill="#d97757"/><circle cx="-55.4" cy="32" r="5" fill="#d97757"/><circle cx="-55.4" cy="-32" r="5" fill="#d97757"/><text y="-172" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">语义复杂度</text><text y="-158" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Semantic (6)</text><text x="158" y="-72" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600">依赖复杂度</text><text x="158" y="-56" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">Dependency (8)</text><text x="158" y="88" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600">上下文跨度</text><text x="158" y="104" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">Context (7)</text><text y="178" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">不确定性</text><text y="194" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Uncertainty (4)</text><text x="-158" y="88" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="end">语义复杂度</text><text x="-158" y="104" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">Semantic</text><text x="-158" y="-56" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="end">依赖复杂度</text><text x="-158" y="-40" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">Dependency</text></g><g filter="url(#shadow)" transform="translate(530 140)"><rect width="240" height="300" fill="#fff" stroke="#e3dacc" rx="8"/><text x="120" y="28" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">综合 IC 计算公式</text><text x="20" y="60" fill="#141413" font-family="monospace" font-size="11">总意图复杂度 (IC) =</text><text x="20" y="80" fill="#141413" font-family="monospace" font-size="11">  √(SC² + DC² + CS² + UC²)</text><text x="20" y="100" fill="#141413" font-family="monospace" font-size="11">  ─────────────────────</text><text x="20" y="120" fill="#d97757" font-family="monospace" font-size="11" font-weight="700">             2</text><path stroke="#e3dacc" d="M20 135h200"/><text x="20" y="158" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="600">案例：电商退款流程</text><text x="20" y="180" fill="#87867f" font-family="monospace" font-size="10">SC = 6  (多规则，多条件)</text><text x="20" y="196" fill="#87867f" font-family="monospace" font-size="10">DC = 8  (涉及10+个服务)</text><text x="20" y="212" fill="#87867f" font-family="monospace" font-size="10">CS = 7  (跨多个服务)</text><text x="20" y="228" fill="#87867f" font-family="monospace" font-size="10">UC = 4  (需求相对明确)</text><path stroke="#e3dacc" d="M20 243h200"/><text x="20" y="265" fill="#141413" font-family="system-ui, sans-serif" font-size="11">IC = √(36+64+49+16) / 2</text><text x="20" y="285" fill="#788c5d" font-family="system-ui, sans-serif" font-size="12" font-weight="700">= 12.85 / 2 = 6.4</text><text x="120" y="285" fill="#d97757" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">(中高复杂度)</text></g><g fill="#87867f" font-family="system-ui, sans-serif"><text font-size="11" transform="translate(530 455)">● 案例数据点</text><text y="18" font-size="10" transform="translate(530 455)">  电商退款流程 IC=6.4</text><text y="36" font-size="10" transform="translate(530 455)">  范围 1-10，值越大越复杂</text><text y="54" font-size="10" transform="translate(530 455)">  IC &gt;7：高复杂度项目</text></g><path stroke="#e3dacc" d="M40 530h720"/><text x="40" y="548" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">ICQ 模型 · 四维评估体系 · 事前可估算</text></svg>