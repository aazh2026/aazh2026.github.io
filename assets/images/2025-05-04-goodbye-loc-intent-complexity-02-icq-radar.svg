<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <rect width="800" height="560" fill="#FAF9F5"/>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#141413">ICQ 四维意图复杂度模型</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">Intent Complexity Quadrant — Radar Visualization</text>

  <!-- Radar Chart -->
  <g transform="translate(260, 300)">
    <!-- Background circles -->
    <polygon points="0,-160 138.6,-80 138.6,80 0,160 -138.6,80 -138.6,-80" fill="none" stroke="#D1CFC5" stroke-width="1"/>
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="none" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>
    <polygon points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40" fill="none" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>
    <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="0" y1="0" x2="138.6" y2="-80" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="0" y1="0" x2="138.6" y2="80" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="160" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="0" y1="0" x2="-138.6" y2="80" stroke="#D1CFC5" stroke-width="1"/>
    <line x1="0" y1="0" x2="-138.6" y2="-80" stroke="#D1CFC5" stroke-width="1"/>

    <!-- Data polygon: SC=6, DC=8, CS=7, UC=4 -->
    <polygon points="0,-96 110.9,-64 97.0,56 0,112 -55.4,32 -55.4,-32" fill="#D97757" fill-opacity="0.2" stroke="#D97757" stroke-width="2"/>

    <!-- Data points -->
    <circle cx="0" cy="-96" r="5" fill="#D97757"/>
    <circle cx="110.9" cy="-64" r="5" fill="#D97757"/>
    <circle cx="97.0" cy="56" r="5" fill="#D97757"/>
    <circle cx="0" cy="112" r="5" fill="#D97757"/>
    <circle cx="-55.4" cy="32" r="5" fill="#D97757"/>
    <circle cx="-55.4" cy="-32" r="5" fill="#D97757"/>

    <!-- Dimension labels -->
    <text x="0" y="-172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">语义复杂度</text>
    <text x="0" y="-158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Semantic (6)</text>

    <text x="158" y="-72" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">依赖复杂度</text>
    <text x="158" y="-56" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Dependency (8)</text>

    <text x="158" y="88" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">上下文跨度</text>
    <text x="158" y="104" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Context (7)</text>

    <text x="0" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">不确定性</text>
    <text x="0" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Uncertainty (4)</text>

    <text x="-158" y="88" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">语义复杂度</text>
    <text x="-158" y="104" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Semantic</text>

    <text x="-158" y="-56" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#141413">依赖复杂度</text>
    <text x="-158" y="-40" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">Dependency</text>
  </g>

  <!-- Formula Card -->
  <g transform="translate(530, 140)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="300" rx="8" fill="white" stroke="#E3DACC" stroke-width="1"/>
    <text x="120" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">综合 IC 计算公式</text>

    <text x="20" y="60" font-family="monospace" font-size="11" fill="#141413">总意图复杂度 (IC) =</text>
    <text x="20" y="80" font-family="monospace" font-size="11" fill="#141413">  √(SC² + DC² + CS² + UC²)</text>
    <text x="20" y="100" font-family="monospace" font-size="11" fill="#141413">  ─────────────────────</text>
    <text x="20" y="120" font-family="monospace" font-size="11" fill="#D97757" font-weight="700">             2</text>

    <line x1="20" y1="135" x2="220" y2="135" stroke="#E3DACC" stroke-width="1"/>

    <text x="20" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#141413" font-weight="600">案例：电商退款流程</text>

    <text x="20" y="180" font-family="monospace" font-size="10" fill="#87867F">SC = 6  (多规则，多条件)</text>
    <text x="20" y="196" font-family="monospace" font-size="10" fill="#87867F">DC = 8  (涉及10+个服务)</text>
    <text x="20" y="212" font-family="monospace" font-size="10" fill="#87867F">CS = 7  (跨多个服务)</text>
    <text x="20" y="228" font-family="monospace" font-size="10" fill="#87867F">UC = 4  (需求相对明确)</text>

    <line x1="20" y1="243" x2="220" y2="243" stroke="#E3DACC" stroke-width="1"/>

    <text x="20" y="265" font-family="system-ui, sans-serif" font-size="11" fill="#141413">IC = √(36+64+49+16) / 2</text>
    <text x="20" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#788C5D" font-weight="700">= 12.85 / 2 = 6.4</text>
    <text x="120" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D97757">(中高复杂度)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(530, 455)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">● 案例数据点</text>
    <text x="0" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">  电商退款流程 IC=6.4</text>
    <text x="0" y="36" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">  范围 1-10，值越大越复杂</text>
    <text x="0" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">  IC &gt;7：高复杂度项目</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="530" x2="760" y2="530" stroke="#E3DACC" stroke-width="1"/>
  <text x="40" y="548" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">ICQ 模型 · 四维评估体系 · 事前可估算</text>
</svg>
