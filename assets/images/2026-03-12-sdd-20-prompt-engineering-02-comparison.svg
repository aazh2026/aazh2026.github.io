<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">传统用户故事 vs SDD 2.0 三元组</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">AI可消费性对比</text>

  <!-- Left column: 传统格式 -->
  <rect x="40" y="60" width="270" height="120" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="60" width="270" height="28" rx="8" fill="#87867F"/>
  <rect x="40" y="80" width="270" height="8" fill="#87867F"/>
  <text x="175" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">传统格式</text>
  <text x="56" y="110" font-size="11" fill="#141413">"作为顾客，我想要</text>
  <text x="56" y="126" font-size="11" fill="#141413">查看订单历史"</text>
  <text x="56" y="150" font-size="9.5" fill="#87867F">上下文缺失 · 约束模糊 · AC游离</text>
  <text x="56" y="168" font-size="9.5" fill="#D97757">需人工补充才能被AI理解</text>

  <!-- Right column: SDD 2.0 -->
  <rect x="370" y="60" width="270" height="120" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="370" y="60" width="270" height="28" rx="8" fill="#788C5D"/>
  <rect x="370" y="80" width="270" height="8" fill="#788C5D"/>
  <text x="505" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">SDD 2.0 三元组</text>
  <!-- Three mini boxes inside right column -->
  <rect x="382" y="96" width="72" height="20" rx="4" fill="#D97757" opacity="0.2" stroke="#D97757" stroke-width="1"/>
  <text x="418" y="110" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600">Context</text>
  <rect x="462" y="96" width="72" height="20" rx="4" fill="#788C5D" opacity="0.2" stroke="#788C5D" stroke-width="1"/>
  <text x="498" y="110" text-anchor="middle" font-size="9" fill="#788C5D" font-weight="600">Constraints</text>
  <rect x="542" y="96" width="86" height="20" rx="4" fill="#141413" opacity="0.2" stroke="#141413" stroke-width="1"/>
  <text x="585" y="110" text-anchor="middle" font-size="9" fill="#141413" font-weight="600">AC</text>
  <text x="386" y="136" font-size="9.5" fill="#141413">自包含 · 结构化 · 可验证</text>
  <text x="386" y="152" font-size="9.5" fill="#788C5D">AI可直接消费，无需人工解析</text>

  <!-- Bottom comparison: consequences row -->
  <!-- Left consequences -->
  <text x="175" y="205" text-anchor="middle" font-size="11" font-weight="500" fill="#141413">后果</text>

  <rect x="40" y="218" width="270" height="80" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <!-- X marks -->
  <text x="56" y="244" font-size="12" fill="#D97757" font-weight="700">✗</text>
  <text x="70" y="244" font-size="10" fill="#141413">低AI可消费性</text>
  <text x="56" y="260" font-size="12" fill="#D97757" font-weight="700">✗</text>
  <text x="70" y="260" font-size="10" fill="#141413">模糊可验证性</text>
  <text x="56" y="276" font-size="12" fill="#D97757" font-weight="700">✗</text>
  <text x="70" y="276" font-size="10" fill="#141413">弱可追溯性</text>

  <!-- Right consequences -->
  <rect x="370" y="218" width="270" height="80" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <!-- Check marks -->
  <text x="386" y="244" font-size="12" fill="#788C5D" font-weight="700">✓</text>
  <text x="400" y="244" font-size="10" fill="#141413">高AI可消费性</text>
  <text x="386" y="260" font-size="12" fill="#788C5D" font-weight="700">✓</text>
  <text x="400" y="260" font-size="10" fill="#141413">明确可验证性</text>
  <text x="386" y="276" font-size="12" fill="#788C5D" font-weight="700">✓</text>
  <text x="400" y="276" font-size="10" fill="#141413">强可追溯性</text>
</svg>
