<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 320"><path fill="#faf9f5" d="M0 0h680v320H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">传统用户故事 vs SDD 2.0 三元组</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AI可消费性对比</text><rect width="270" height="120" x="40" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="270" height="28" x="40" y="60" fill="#87867f" rx="8"/><path fill="#87867f" d="M40 80h270v8H40z"/><text x="175" y="78" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">传统格式</text><text x="56" y="110" fill="#141413" font-size="11">&quot;作为顾客，我想要</text><text x="56" y="126" fill="#141413" font-size="11">查看订单历史&quot;</text><text x="56" y="150" fill="#87867f" font-size="9.5">上下文缺失 · 约束模糊 · AC游离</text><text x="56" y="168" fill="#d97757" font-size="9.5">需人工补充才能被AI理解</text><rect width="270" height="120" x="370" y="60" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/><rect width="270" height="28" x="370" y="60" fill="#788c5d" rx="8"/><path fill="#788c5d" d="M370 80h270v8H370z"/><text x="505" y="78" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">SDD 2.0 三元组</text><rect width="72" height="20" x="382" y="96" fill="#d97757" stroke="#d97757" opacity=".2" rx="4"/><text x="418" y="110" fill="#d97757" font-size="9" font-weight="600" text-anchor="middle">Context</text><rect width="72" height="20" x="462" y="96" fill="#788c5d" stroke="#788c5d" opacity=".2" rx="4"/><text x="498" y="110" fill="#788c5d" font-size="9" font-weight="600" text-anchor="middle">Constraints</text><rect width="86" height="20" x="542" y="96" fill="#141413" stroke="#141413" opacity=".2" rx="4"/><text x="585" y="110" fill="#141413" font-size="9" font-weight="600" text-anchor="middle">A