<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="640" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Claude Code Remote vs OpenClaw 功能对比</text>
  <text x="320" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Anthropic vs OpenClaw · 2026/02</text>

  <!-- Left device: Claude Code Remote (phone icon) -->
  <rect x="60" y="70" width="220" height="110" rx="12" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="170" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Claude Code Remote</text>
  <text x="170" y="108" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">📱 手机 / Web / Desktop</text>

  <!-- Right device: OpenClaw (laptop icon) -->
  <rect x="360" y="70" width="220" height="110" rx="12" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>
  <text x="470" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">OpenClaw</text>
  <text x="470" y="108" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">💻 全平台支持</text>

  <!-- Feature comparison table -->
  <!-- Header row -->
  <rect x="60" y="196" width="220" height="30" rx="0" fill="#D97757"/>
  <text x="170" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Claude Code Remote</text>

  <rect x="360" y="196" width="220" height="30" rx="0" fill="#788C5D"/>
  <text x="470" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">OpenClaw</text>

  <!-- Row 1: 远程控制 -->
  <rect x="60" y="226" width="220" height="28" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="170" y="244" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">远程控制 ✅</text>

  <rect x="360" y="226" width="220" height="28" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="470" y="244" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">远程控制 ✅</text>

  <!-- Row 2: 定时任务 -->
  <rect x="60" y="254" width="220" height="28" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="170" y="272" text-anchor="middle" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">定时任务 ❌</text>

  <rect x="360" y="254" width="220" height="28" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="470" y="272" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">定时任务 ✅</text>

  <!-- Row 3: 云端执行 -->
  <rect x="60" y="282" width="220" height="28" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="170" y="300" text-anchor="middle" font-size="11" fill="#87867F" font-family="ui-monospace, monospace">云端执行 ❌</text>

  <rect x="360" y="282" width="220" height="28" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="470" y="300" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">云端执行 ✅</text>

  <!-- Dashed arrow: competition follow -->
  <path d="M 280 120 C 320 120, 320 120, 360 120" stroke="#D97757" stroke-width="2" stroke-dasharray="5,4" fill="none"/>
  <text x="320" y="116" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">竞争跟进</text>

  <!-- Current limitations box -->
  <rect x="60" y="330" width="520" height="42" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="80" y="350" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">⚠️ 当前限制：Desktop 必须打开 / 电脑必须保持唤醒</text>
  <text x="80" y="364" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">稳定性：偶发 API 500 错误，不支持危险权限跳过</text>

  <!-- Source note -->
  <text x="320" y="386" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">来源：https://code.claude.com/docs/en/remote-control</text>
</svg>
