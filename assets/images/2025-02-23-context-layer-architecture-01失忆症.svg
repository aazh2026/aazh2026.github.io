<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 360"><title>AI的失忆症示意图</title><desc>一个人形AI图标位于中心，周围散布着知识节点（Confluence、ADR、README、团队知识），用虚线连接表示无法访问</desc><path fill="#faf9f5" d="M0 0h680v360H0z"/><text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">AI的&quot;失忆症&quot;</text><text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">上下文获取的限制</text><circle cx="340" cy="180" r="50" fill="#d97757" opacity=".15"/><circle cx="340" cy="180" r="38" fill="#d97757" opacity=".25"/><circle cx="340" cy="180" r="26" fill="#d97757"/><ellipse cx="340" cy="168" fill="#faf9f5" rx="14" ry="16"/><path fill="none" stroke="#faf9f5" stroke-width="3" d="M326 192q14 28 28 0"/><circle cx="334" cy="166" r="2.5" fill="#d97757"/><circle cx="346" cy="166" r="2.5" fill="#d97757"/><path fill="none" stroke="#d97757" stroke-width="2.5" d="M160 180h125"/><path fill="#d97757" d="m285 174 10 6-10 6z"/><rect width="72" height="28" x="80" y="166" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="116" y="184" fill="#141413" font-size="11" text-anchor="middle">当前输入</text><rect width="100" height="50" x="90" y="72" fill="#fff" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="140" y="95" fill="#141413" font-size="11" text-anchor="middle">Confluence</text><text x="140" y="110" fill="#87867f" font-size="9" text-anchor="middle">架构文档</text><path stroke="#87867f" stroke-dasharray="4,3" d="m190 122 112 28" opacity=".5"/><rect width="100" height="50" x="490" y="72" fill="#fff" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="540" y="95" fill="#141413" font-size="11" text-anchor="middle">ADR</text><text x="540" y="110" fill="#87867f" font-size="9" text-anchor="middle">架构决策记录</text><path stroke="#87867f" stroke-dasharray="4,3" d="m490 122-112 28" opacity=".5"/><rect width="100" height="50" x="90" y="238" fill="#fff" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="140" y="261" fill="#141413" font-size="11" text-anchor="middle">README</text><text x="140" y="276" fill="#87867f" font-size="9" text-anchor="middle">项目规范</text><path stroke="#87867f" stroke-dasharray="4,3" d="m190 238 112-28" opacity=".5"/><rect width="100" height="50" x="490" y="238" fill="#fff" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="540" y="261" fill="#141413" font-size="11" text-anchor="middle">团队知识</text><text x="540" y="276" fill="#87867f" font-size="9" text-anchor="middle">经验与惯例</text><path stroke="#87867f" stroke-dasharray="4,3" d="m490 238-112-28" opacity=".5"/><path stroke="#d97757" stroke-width="2" d="m248 135 10 10m0-10-10 10m174-10 10 10m0-10-10 10m-174 70 10 10m0-10-10 10m174-10 10 10m0-10-10 10" opacity=".7"/><text x="340" y="320" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">虚线 = 无法自动获取</text><text x="340" y="185" fill="#faf9f5" font-size="16" font-weight="600" text-anchor="middle">?</text></svg>