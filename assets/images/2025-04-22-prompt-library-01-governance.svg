<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Prompt Library 治理五维度 -->
  <rect width="560" height="220" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Prompt Library 治理五维度</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/04/22</text>

  <!-- D1: Organization -->
  <rect x="40" y="54" width="96" height="80" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="54" width="96" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="88" y="67" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">D1 · 组织架构</text>
  <text x="88" y="86" text-anchor="middle" font-size="9" fill="#141413">Organization</text>
  <text x="88" y="100" text-anchor="middle" font-size="8.5" fill="#87867F">谁负责管理</text>
  <text x="88" y="112" text-anchor="middle" font-size="8.5" fill="#87867F">谁负责维护</text>
  <rect x="128" y="88" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="135" y="98" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">D1</text>

  <!-- D2: Taxonomy -->
  <rect x="152" y="54" width="96" height="80" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="152" y="54" width="96" height="18" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="200" y="67" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">D2 · 分类体系</text>
  <text x="200" y="86" text-anchor="middle" font-size="9" fill="#141413">Taxonomy</text>
  <text x="200" y="100" text-anchor="middle" font-size="8.5" fill="#87867F">如何分类</text>
  <text x="200" y="112" text-anchor="middle" font-size="8.5" fill="#87867F">如何命名</text>
  <rect x="240" y="88" width="14" height="14" rx="7" fill="#EA580C"/>
  <text x="247" y="98" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">D2</text>

  <!-- D3: Lifecycle -->
  <rect x="264" y="54" width="96" height="80" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="264" y="54" width="96" height="18" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="312" y="67" text-anchor="middle" font-size="9" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">D3 · 生命周期</text>
  <text x="312" y="86" text-anchor="middle" font-size="9" fill="#141413">Lifecycle</text>
  <text x="312" y="100" text-anchor="middle" font-size="8.5" fill="#87867F">创建→评审→发布</text>
  <text x="312" y="112" text-anchor="middle" font-size="8.5" fill="#87867F">更新→废弃</text>
  <rect x="352" y="88" width="14" height="14" rx="7" fill="#2563EB"/>
  <text x="359" y="98" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">D3</text>

  <!-- D4: Quality -->
  <rect x="376" y="54" width="96" height="80" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="376" y="54" width="96" height="18" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="424" y="67" text-anchor="middle" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">D4 · 质量管理</text>
  <text x="424" y="86" text-anchor="middle" font-size="9" fill="#141413">Quality</text>
  <text x="424" y="100" text-anchor="middle" font-size="8.5" fill="#87867F">质量标准·评审流程</text>
  <text x="424" y="112" text-anchor="middle" font-size="8.5" fill="#87867F">效果评估</text>
  <rect x="464" y="88" width="14" height="14" rx="7" fill="#059669"/>
  <text x="471" y="98" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">D4</text>

  <!-- D5: Platform (bottom center, wider) -->
  <rect x="192" y="150" width="176" height="60" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="192" y="150" width="176" height="18" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="280" y="164" text-anchor="middle" font-size="9" fill="#7C3AED" font-family="ui-monospace, monospace" font-weight="600">D5 · 平台工具 Platform</text>
  <text x="280" y="182" text-anchor="middle" font-size="9" fill="#141413">存储 · 检索 · 版本 · 权限</text>
  <text x="280" y="196" text-anchor="middle" font-size="8.5" fill="#87867F">Prompt 版本管理与权限控制</text>

  <!-- Connecting lines: D1-D2, D2-D3, D3-D4, D3-D5 -->
  <line x1="136" y1="94" x2="152" y2="94" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="248" y1="94" x2="264" y2="94" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="360" y1="94" x2="376" y2="94" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="312" y1="134" x2="312" y2="150" stroke="#D1CFC5" stroke-width="1"/>
  <!-- D5 connects to D3 -->
  <line x1="280" y1="150" x2="312" y2="110" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>
</svg>