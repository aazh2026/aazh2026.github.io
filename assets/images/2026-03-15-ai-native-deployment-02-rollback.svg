<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-size: 13px; }
      .text-sm { fill: #87867F; font-size: 11px; }
      .text-xs { fill: #87867F; font-size: 10px; }
      .text-label { fill: #141413; font-size: 12px; font-weight: 600; }
      .border { stroke: #D1CFC5; stroke-width: 1.5; }
      .fill-detector { fill: #fef3c7; stroke: #D97757; }
      .fill-assessor { fill: #fef3c7; stroke: #D97757; }
      .fill-generator { fill: #fef3c7; stroke: #D97757; }
      .fill-matrix { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .fill-strategy { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .fill-white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="800" height="420" class="bg"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="text-main" font-size="15" font-weight="700">智能回滚决策引擎架构</text>

  <!-- ========== Engine container ========== -->
  <rect x="40" y="50" width="720" height="350" rx="12" fill="none" class="border" stroke="#D1CFC5" stroke-width="2"/>
  <text x="60" y="70" class="text-label">智能回滚决策引擎</text>

  <!-- ========== Row 1: Detector ========== -->
  <rect x="70" y="85" width="660" height="70" rx="8" class="fill-detector"/>
  <text x="90" y="105" class="text-label" fill="#D97757">异常检测器</text>

  <rect x="90" y="115" width="135" height="30" rx="5" class="fill-white border"/>
  <text x="157" y="134" text-anchor="middle" class="text-xs">技术指标异常</text>

  <rect x="240" y="115" width="135" height="30" rx="5" class="fill-white border"/>
  <text x="307" y="134" text-anchor="middle" class="text-xs">业务指标异常</text>

  <rect x="390" y="115" width="135" height="30" rx="5" class="fill-white border"/>
  <text x="457" y="134" text-anchor="middle" class="text-xs">模型漂移检测</text>

  <rect x="540" y="115" width="135" height="30" rx="5" class="fill-white border"/>
  <text x="607" y="134" text-anchor="middle" class="text-xs">预测性故障检测</text>

  <!-- Arrow: Detector → Matrix -->
  <line x1="400" y1="155" x2="400" y2="178" class="border" stroke-width="2"/>
  <polygon points="400,178 395,170 405,170" fill="#141413"/>

  <!-- ========== Row 2: Assessor + Generator → Matrix ========== -->
  <!-- Assessor -->
  <rect x="70" y="178" width="300" height="70" rx="8" class="fill-assessor"/>
  <text x="90" y="198" class="text-label" fill="#D97757">影响评估器</text>

  <rect x="90" y="208" width="135" height="30" rx="5" class="fill-white border"/>
  <text x="157" y="227" text-anchor="middle" class="text-xs">用户体验影响</text>

  <rect x="240" y="208" width="115" height="30" rx="5" class="fill-white border"/>
  <text x="297" y="227" text-anchor="middle" class="text-xs">数据一致性</text>

  <!-- Arrow: Assessor → Matrix -->
  <line x1="300" y1="213" x2="350" y2="213" class="border"/>
  <polygon points="350,213 342,208 342,218" fill="#141413"/>

  <!-- Generator -->
  <rect x="430" y="178" width="300" height="70" rx="8" class="fill-generator"/>
  <text x="450" y="198" class="text-label" fill="#D97757">决策生成器</text>

  <rect x="450" y="208" width="135" height="30" rx="5" class="fill-white border"/>
  <text x="517" y="227" text-anchor="middle" class="text-xs">策略推荐</text>

  <rect x="600" y="208" width="115" height="30" rx="5" class="fill-white border"/>
  <text x="657" y="227" text-anchor="middle" class="text-xs">置信度评分</text>

  <!-- Arrow: Generator → Matrix -->
  <line x1="450" y1="213" x2="400" y2="213" class="border"/>
  <polygon points="400,213 408,208 408,218" fill="#141413"/>

  <!-- Arrow: both → Matrix -->
  <line x1="340" y1="248" x2="400" y2="248" class="border"/>
  <line x1="460" y1="248" x2="400" y2="248" class="border"/>
  <line x1="400" y1="248" x2="400" y2="258" class="border"/>
  <polygon points="400,258 395,250 405,250" fill="#141413"/>

  <!-- ========== Row 3: Decision Matrix ========== -->
  <rect x="200" y="258" width="400" height="65" rx="10" class="fill-matrix"/>
  <text x="400" y="278" text-anchor="middle" class="text-label" font-size="13">回滚决策矩阵</text>

  <!-- Matrix cells -->
  <rect x="220" y="288" width="85" height="26" rx="4" class="fill-white border"/>
  <text x="262" y="305" text-anchor="middle" class="text-xs">立即回滚</text>

  <rect x="315" y="288" width="85" height="26" rx="4" class="fill-white border"/>
  <text x="357" y="305" text-anchor="middle" class="text-xs">渐进回滚</text>

  <rect x="410" y="288" width="85" height="26" rx="4" class="fill-white border"/>
  <text x="452" y="305" text-anchor="middle" class="text-xs">区域回滚</text>

  <rect x="505" y="288" width="85" height="26" rx="4" class="fill-white border"/>
  <text x="547" y="305" text-anchor="middle" class="text-xs">功能降级</text>

  <!-- Arrow: Matrix → Strategy -->
  <line x1="400" y1="323" x2="400" y2="340" class="border" stroke-width="2"/>
  <polygon points="400,340 395,332 405,332" fill="#141413"/>

  <!-- ========== Row 4: Execution Strategy ========== -->
  <rect x="100" y="340" width="600" height="50" rx="10" class="fill-strategy"/>
  <text x="400" y="358" text-anchor="middle" class="text-label" font-size="13" fill="#059669">执行策略</text>

  <rect x="125" y="366" width="120" height="20" rx="4" class="fill-white border"/>
  <text x="185" y="380" text-anchor="middle" class="text-xs">Shadow Warmup</text>

  <rect x="260" y="366" width="120" height="20" rx="4" class="fill-white border"/>
  <text x="320" y="380" text-anchor="middle" class="text-xs">渐进流量迁移</text>

  <rect x="395" y="366" width="120" height="20" rx="4" class="fill-white border"/>
  <text x="455" y="380" text-anchor="middle" class="text-xs">状态格式兼容</text>

  <rect x="530" y="366" width="120" height="20" rx="4" class="fill-white border"/>
  <text x="590" y="380" text-anchor="middle" class="text-xs">健康检查通过后</text>

  <!-- ========== Legend ========== -->
  <rect x="620" y="55" width="140" height="130" rx="8" fill="none" class="border"/>
  <text x="690" y="73" text-anchor="middle" class="text-label">图例</text>

  <rect x="634" y="84" width="12" height="12" rx="2" class="fill-detector"/>
  <text x="652" y="95" class="text-xs">异常检测组件</text>

  <rect x="634" y="102" width="12" height="12" rx="2" class="fill-matrix"/>
  <text x="652" y="113" class="text-xs">决策矩阵（核心）</text>

  <rect x="634" y="120" width="12" height="12" rx="2" class="fill-strategy"/>
  <text x="652" y="131" class="text-xs">执行策略层</text>

  <line x1="634" y1="148" x2="720" y2="148" class="border" stroke-width="1.5"/>
  <polygon points="720,148 712,143 712,153" fill="#141413"/>
  <text x="652" y="160" class="text-xs">决策流向</text>
</svg>
