<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="720" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI 执行流程：Base Context + Delta Context</text>
  <text x="360" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Delta Specification 工作流</text>

  <!-- Node 1: Base Spec -->
  <rect x="40" y="70" width="180" height="100" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="70" width="180" height="24" rx="6" fill="#D1CFC5"/>
  <rect x="40" y="86" width="180" height="8" fill="#D1CFC5"/>
  <text x="130" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Base Spec</text>
  <text x="130" y="110" text-anchor="middle" font-size="11" fill="#141413">现有系统完整上下文</text>
  <text x="130" y="128" text-anchor="middle" font-size="10" fill="#87867F">domain/spec.yaml</text>
  <text x="130" y="144" text-anchor="middle" font-size="10" fill="#87867F">api/openapi.yaml</text>
  <text x="130" y="160" text-anchor="middle" font-size="10" fill="#87867F">existing tests/</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="120" x2="270" y2="120" stroke="#D97757" stroke-width="2"/>
  <polygon points="270,120 262,115 262,125" fill="#D97757"/>
  <text x="245" y="110" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">读取</text>

  <!-- Node 2: Delta Spec -->
  <rect x="270" y="70" width="180" height="100" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="270" y="70" width="180" height="24" rx="6" fill="#D97757"/>
  <rect x="270" y="86" width="180" height="8" fill="#D97757"/>
  <text x="360" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Delta Spec</text>
  <text x="360" y="110" text-anchor="middle" font-size="11" fill="#141413">增量变更规格</text>
  <text x="360" y="128" text-anchor="middle" font-size="10" fill="#D97757">change.md</text>
  <text x="360" y="144" text-anchor="middle" font-size="10" fill="#D97757">domain.delta.md</text>
  <text x="360" y="160" text-anchor="middle" font-size="10" fill="#D97757">api.delta.yaml</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="120" x2="500" y2="120" stroke="#D97757" stroke-width="2"/>
  <polygon points="500,120 492,115 492,125" fill="#D97757"/>
  <text x="475" y="110" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">合并</text>

  <!-- Node 3: AI Execution Context -->
  <rect x="500" y="70" width="180" height="100" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>
  <rect x="500" y="70" width="180" height="24" rx="6" fill="#788C5D"/>
  <rect x="500" y="86" width="180" height="8" fill="#788C5D"/>
  <text x="590" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">AI Execution Context</text>
  <text x="590" y="110" text-anchor="middle" font-size="11" fill="#141413">稳定merged上下文</text>
  <text x="590" y="128" text-anchor="middle" font-size="10" fill="#788C5D">Base + Delta</text>
  <text x="590" y="148" text-anchor="middle" font-size="10" fill="#87867F">AI 实现变更</text>
  <text x="590" y="164" text-anchor="middle" font-size="10" fill="#87867F">向后兼容</text>

  <!-- Stable Output badge -->
  <rect x="554" y="184" width="72" height="22" rx="11" fill="#788C5D"/>
  <text x="590" y="199" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Stable Output</text>

  <!-- Compatibility Rules annotation -->
  <rect x="40" y="200" width="640" height="44" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="56" y="218" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Compatibility Rules</text>
  <text x="140" y="218" font-size="10" fill="#141413">：AI 必须遵守的约束，确保不破坏已有逻辑</text>
  <text x="56" y="234" font-size="10" fill="#87867F">例：已发货订单不可取消 · DELETE /orders/{id} 不能暴露 · 已有 GET /orders/{id} 保持兼容</text>

  <!-- Step numbers -->
  <circle cx="130" cy="58" r="10" fill="#D1CFC5"/>
  <text x="130" y="62" text-anchor="middle" font-size="10" fill="#141413" font-family="ui-monospace, monospace">1</text>
  <circle cx="360" cy="58" r="10" fill="#D97757"/>
  <text x="360" y="62" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">2</text>
  <circle cx="590" cy="58" r="10" fill="#788C5D"/>
  <text x="590" y="62" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">3</text>
</svg>