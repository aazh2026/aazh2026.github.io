  <text x="376" y="176" fill="#87867f" font-family="ui-monospace, monospace" font-size="8">t=n</text>
  <text x="319" y="188" fill="#ea580c" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">因果链推理失效</text>
  <rect width="188" height="150" x="432" y="50" fill="#fff" stroke="#2563eb" stroke-width="1.5" rx="8"/>
  <rect width="188" height="28" x="432" y="50" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="8"/>
