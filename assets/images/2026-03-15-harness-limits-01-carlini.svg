  <text x="38" y="163" fill="#d97757" font-family="ui-monospace, monospace" font-size="8">Agent: context window full</text>
  <text x="38" y="174" fill="#d97757" font-family="ui-monospace, monospace" font-size="8">Agent: 任务是什么来着？</text>
  <text x="113" y="190" fill="#d97757" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">→ SUMMARY: N/M passed</text>
