  <path fill="#2563eb" d="m580 162-6-6v12z"/>
  <text x="526" y="186" fill="#2563eb" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">修复 → 新 bug → 再修</text>
  <text x="320" y="210" fill="#87867f" font-size="9" font-style="italic" text-anchor="middle">这三个限制不是 Harness 设计的失败，而是 LLM 作为测试执行者的根本性约束</text>
