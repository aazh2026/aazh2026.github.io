<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>CCC模型：Context-Constraints-Criteria</title>
  <desc>A horizontal diagram showing the three pillars of the CCC Model feeding into Executable Spec. Three pillars: Context (上下文), Constraints (约束), and Criteria (验收标准), each a rounded card in the blog color system. They connect via arrows to a central Executable Spec node at the bottom.</desc>

  <!-- Background -->
  <rect width="640" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">CCC模型：Context-Constraints-Criteria</text>
  <text x="320" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">PRD 结构化转型 · 可执行语义规格说明</text>

  <!-- Pillar 1: Context (left) -->
  <rect x="40" y="68" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="68" width="160" height="28" rx="8" fill="#D97757"/>
  <rect x="40" y="88" width="160" height="8" fill="#D97757"/> <!-- fill gap -->
  <text x="120" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Context</text>
  <text x="120" y="116" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">上下文</text>
  <text x="52" y="138" font-size="10.5" fill="#141413">业务环境声明</text>
  <text x="52" y="154" font-size="10.5" fill="#141413">用户场景定义</text>
  <text x="52" y="170" font-size="10.5" fill="#141413">数据边界说明</text>
  <text x="52" y="186" font-size="10.5" fill="#141413">系统前提条件</text>
  <text x="52" y="202" font-size="10.5" fill="#141413">共享背景（Shared Context）</text>
  <text x="52" y="222" font-size="10" fill="#87867F">回答：我们在什么</text>
  <text x="52" y="236" font-size="10" fill="#87867F">环境下解决这个问题？</text>

  <!-- Pillar 2: Constraints (center) -->
  <rect x="240" y="68" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="240" y="68" width="160" height="28" rx="8" fill="#D97757"/>
  <rect x="240" y="88" width="160" height="8" fill="#D97757"/>
  <text x="320" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Constraints</text>
  <text x="320" y="116" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">约束</text>
  <text x="252" y="138" font-size="10.5" fill="#141413">非功能性限制条件</text>
  <text x="252" y="154" font-size="10.5" fill="#141413">性能约束（延迟/吞吐）</text>
  <text x="252" y="170" font-size="10.5" fill="#141413">安全与合规边界</text>
  <text x="252" y="186" font-size="10.5" fill="#141413">技术栈限制条件</text>
  <text x="252" y="202" font-size="10.5" fill="#141413">成本与资源上限</text>
  <text x="252" y="222" font-size="10" fill="#87867F">回答：什么能做，</text>
  <text x="252" y="236" font-size="10" fill="#87867F">什么不能做？</text>

  <!-- Pillar 3: Criteria (right) -->
  <rect x="440" y="68" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="440" y="68" width="160" height="28" rx="8" fill="#D97757"/>
  <rect x="440" y="88" width="160" height="8" fill="#D97757"/>
  <text x="520" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Criteria</text>
  <text x="520" y="116" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">验收标准</text>
  <text x="452" y="138" font-size="10.5" fill="#141413">Given-When-Then 语法</text>
  <text x="452" y="154" font-size="10.5" fill="#141413">可验证的完成定义</text>
  <text x="452" y="170" font-size="10.5" fill="#141413">自动化测试用例</text>
  <text x="452" y="186" font-size="10.5" fill="#141413">需求可追溯标识</text>
  <text x="452" y="202" font-size="10.5" fill="#141413">机器可读格式</text>
  <text x="452" y="222" font-size="10" fill="#87867F">回答：怎么才算</text>
  <text x="452" y="236" font-size="10" fill="#87867F">真正完成了？</text>

  <!-- Arrows from pillars to Executable Spec -->
  <!-- Arrow from Context -->
  <line x1="120" y1="248" x2="120" y2="268" stroke="#D97757" stroke-width="1.8"/>
  <polygon points="120,274 116,266 124,266" fill="#D97757"/>

  <!-- Arrow from Constraints -->
  <line x1="320" y1="248" x2="320" y2="268" stroke="#D97757" stroke-width="1.8"/>
  <polygon points="320,274 316,266 324,266" fill="#D97757"/>

  <!-- Arrow from Criteria -->
  <line x1="520" y1="248" x2="520" y2="268" stroke="#D97757" stroke-width="1.8"/>
  <polygon points="520,274 516,266 524,266" fill="#D97757"/>

  <!-- Horizontal connector arrows -->
  <line x1="200" y1="258" x2="440" y2="258" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="258" x2="200" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="440" y1="258" x2="440" y2="248" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Executable Spec node (bottom center) -->
  <rect x="200" y="274" width="240" height="80" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>
  <rect x="200" y="274" width="240" height="24" rx="10" fill="#788C5D"/>
  <rect x="200" y="290" width="240" height="8" fill="#788C5D"/>
  <text x="320" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">Executable Spec</text>
  <text x="320" y="316" text-anchor="middle" font-size="11" fill="#141413">可执行语义规格说明</text>
  <text x="320" y="334" text-anchor="middle" font-size="10" fill="#87867F">机器可读 · 语义明确 · 可验证 · 可追踪</text>

  <!-- Legend (bottom) -->
  <rect x="40" y="356" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="58" y="366" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">CCC 支柱</text>
  <rect x="130" y="356" width="12" height="12" rx="2" fill="#788C5D"/>
  <text x="148" y="366" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">输出结果</text>
  <line x1="220" y1="362" x2="260" y2="362" stroke="#D97757" stroke-width="1.8"/>
  <text x="268" y="366" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">信息流</text>
  <line x1="330" y1="362" x2="370" y2="362" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="378" y="366" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">隐式关联</text>
</svg>
