<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 640 380"><title>CCC模型：Context-Constraints-Criteria</title><desc>A horizontal diagram showing the three pillars of the CCC Model feeding into Executable Spec. Three pillars: Context (上下文), Constraints (约束), and Criteria (验收标准), each a rounded card in the blog color system. They connect via arrows to a central Executable Spec node at the bottom.</desc><path fill="#faf9f5" d="M0 0h640v380H0z"/><text x="320" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">CCC模型：Context-Constraints-Criteria</text><text x="320" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">PRD 结构化转型 · 可执行语义规格说明</text><rect width="160" height="180" x="40" y="68" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><rect width="160" height="28" x="40" y="68" fill="#d97757" rx="8"/><path fill="#d97757" d="M40 88h160v8H40z"/><text x="120" y="86" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Context</text><text x="120" y="116" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">上下文</text><text x="52" y="138" fill="#141413" font-size="10.5">业务环境声明</text><text x="52" y="154" fill="#141413" font-size="10.5">用户场景定义</text><text x="52" y="170" fill="#141413" font-size="10.5">数据边界说明</text><text x="52" y="186" fill="#141413" font-size="10.5">系统前提条件</text><text x="52" y="202" fill="#141413" font-size="10.5">共享背景（Shared Context）</text><text x="52" y="222" fill="#87867f" font-size="10">回答：我们在什么</text><text x="52" y="236" fill="#87867f" font-size="10">环境下解决这个问题？</text><rect width="160" height="180" x="240" y="68" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><rect width="160" height="28" x="240" y="68" fill="#d97757" rx="8"/><path fill="#d97757" d="M240 88h160v8H240z"/><text x="320" y="86" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Constraints</text><text x="320" y="116" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">约束</text><text x="252" y="138" fill="#141413" font-size="10.5">非功能性限制条件</text><text x="252" y="154" fill="#141413" font-size="10.5">性能约束（延迟/吞吐）</text><text x="252" y="170" fill="#141413" font-size="10.5">安全与合规边界</text><text x="252" y="186" fill="#141413" font-size="10.5">技术栈限制条件</text><text x="252" y="202" fill="#141413" font-size="10.5">成本与资源上限</text><text x="252" y="222" fill="#87867f" font-size="10">回答：什么能做，</text><text x="252" y="236" fill="#87867f" font-size="10">什么不能做？</text><rect width="160" height="180" x="440" y="68" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><rect width="160" height="28" x="440" y="68" fill="#d97757" rx="8"/><path fill="#d97757" d="M440 88h160v8H440z"/><text x="520" y="86" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Criteria</text><text x="520" y="116" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">验收标准</text><text x="452" y="138" fill="#141413" font-size="10.5">Given-When-Then 语法</text><text x="452" y="154" fill="#141413" font-size="10.5">可验证的完成定义</text><text x="452" y="170" fill="#141413" font-size="10.5">自动化测试用例</text><text x="452" y="186" fill="#141413" font-size="10.5">需求可追溯标识</text><text x="452" y="202" fill="#141413" font-size="10.5">机器可读格式</text><text x="452" y="222" fill="#87867f" font-size="10">回答：怎么才算</text><text x="452" y="236" fill="#87867f" font-size="10">真正完成了？</text><path stroke="#d97757" stroke-width="1.8" d="M120 248v20"/><path fill="#d97757" d="m120 274-4-8h8z"/><path stroke="#d97757" stroke-width="1.8" d="M320 248v20"/><path fill="#d97757" d="m320 274-4-8h8z"/><path stroke="#d97757" stroke-width="1.8" d="M520 248v20"/><path fill="#d97757" d="m520 274-4-8h8z"/><path stroke="#d1cfc5" stroke-dashar