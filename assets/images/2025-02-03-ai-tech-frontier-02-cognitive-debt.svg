<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="640" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">认知债务累积路径</text>
  <text x="320" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Simon Willison · simonwillison.net · 2026/02</text>

  <!-- Three prevention badges above funnel -->
  <!-- Badge 1: 强制文档生成 -->
  <rect x="60" y="72" width="140" height="34" rx="17" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="130" y="93" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">强制文档生成</text>

  <!-- Badge 2: 交互式可视化 -->
  <rect x="250" y="72" width="140" height="34" rx="17" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="320" y="93" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">交互式可视化</text>

  <!-- Badge 3: 定期代码回顾 -->
  <rect x="440" y="72" width="140" height="34" rx="17" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="510" y="93" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">定期代码回顾</text>

  <!-- Down arrows from badges into funnel -->
  <line x1="130" y1="106" x2="130" y2="134" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="130,138 126,130 134,130" fill="#D1CFC5"/>

  <line x1="320" y1="106" x2="320" y2="134" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="320,138 316,130 324,130" fill="#D1CFC5"/>

  <line x1="510" y1="106" x2="510" y2="134" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="510,138 506,130 514,130" fill="#D1CFC5"/>

  <!-- Funnel: left wide input -->
  <rect x="60" y="142" width="240" height="56" rx="8" fill="#D97757"/>
  <text x="180" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">AI 生成代码</text>
  <text x="180" y="182" text-anchor="middle" font-size="10" fill="#E3DACC" font-family="ui-monospace, monospace">成本趋近于零</text>

  <!-- Funnel: middle stage - cognitive debt -->
  <rect x="140" y="208" width="360" height="56" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="320" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">认知债务累积</text>
  <text x="320" y="248" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">不理解 → 无力维护 → 迭代减速</text>

  <!-- Funnel: right narrow output -->
  <rect x="240" y="274" width="160" height="44" rx="8" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="320" y="297" text-anchor="middle" font-size="12" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">长期成本</text>

  <!-- Arrow from AI input to cognitive debt -->
  <path d="M 320 198 L 320 202" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="320,206 316,198 324,198" fill="#D1CFC5"/>

  <!-- Arrow from cognitive debt to long-term cost -->
  <path d="M 320 264 L 320 268" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="320,272 316,264 324,264" fill="#D1CFC5"/>

  <!-- Callout box: Simon Willison quote -->
  <rect x="80" y="330" width="480" height="38" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="100" y="350" font-size="10.5" fill="#87867F" font-style="italic" font-family="Georgia, serif">Simon Willison: 认知债务 ≈ 技术债务 — 会拖慢未来的开发速度</text>

  <!-- Source note -->
  <text x="320" y="374" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">来源：https://simonwillison.net/guides/agentic-engineering-patterns/</text>
</svg>
