<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Multi-Agent 协作模式总览</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Multi-Agent 协作模式总览 · 2025/07/14</text>

  <!-- Card 1: Supervisor-Workers -->
  <rect x="30" y="60" width="190" height="190" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <!-- Supervisor node -->
  <rect x="90" y="76" width="50" height="24" rx="6" fill="#D97757"/>
  <text x="115" y="92" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">Supervisor</text>
  <!-- Arrow down -->
  <line x1="115" y1="100" x2="115" y2="116" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="115,120 111,112 119,112" fill="#D1CFC5"/>
  <!-- Worker nodes -->
  <rect x="45" y="126" width="50" height="22" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.2"/>
  <text x="70" y="141" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">Worker A</text>
  <rect x="90" y="158" width="50" height="22" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.2"/>
  <text x="115" y="173" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">Worker B</text>
  <rect x="135" y="126" width="50" height="22" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.2"/>
  <text x="160" y="141" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">Worker C</text>
  <!-- Arrows to workers -->
  <line x1="70" y1="120" x2="70" y2="126" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="160" y1="120" x2="160" y2="126" stroke="#D1CFC5" stroke-width="1.2"/>
  <!-- Card label -->
  <text x="125" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">Supervisor-Workers</text>
  <text x="125" y="243" text-anchor="middle" font-size="10" fill="#87867F">主管-工作者模式</text>
  <text x="125" y="256" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">集中协调 · 任务分发</text>

  <!-- Card 2: Peer-to-Peer -->
  <rect x="245" y="60" width="190" height="190" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <!-- Peer nodes in triangle -->
  <rect x="295" y="80" width="50" height="22" rx="5" fill="#788C5D"/>
  <text x="320" y="95" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">Peer A</text>
  <rect x="255" y="158" width="50" height="22" rx="5" fill="#788C5D"/>
  <text x="280" y="173" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">Peer B</text>
  <rect x="365" y="158" width="50" height="22" rx="5" fill="#788C5D"/>
  <text x="390" y="173" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">Peer C</text>
  <!-- Bidirectional arrows: A-B -->
  <line x1="295" y1="102" x2="280" y2="136" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="280" y1="136" x2="295" y2="102" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Bidirectional arrows: A-C -->
  <line x1="345" y1="102" x2="390" y2="136" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="390" y1="136" x2="345" y2="102" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Bidirectional arrows: B-C -->
  <line x1="305" y1="168" x2="365" y2="168" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="365" y1="168" x2="305" y2="168" stroke="#D1CFC5" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Card label -->
  <text x="340" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">Peer-to-Peer</text>
  <text x="340" y="243" text-anchor="middle" font-size="10" fill="#87867F">对等协作模式</text>
  <text x="340" y="256" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">去中心 · 平等协商</text>

  <!-- Card 3: Hierarchical -->
  <rect x="460" y="60" width="190" height="190" rx="8" fill="#FFFFFF" stroke="#141413" stroke-width="1.8"/>
  <!-- Layer 1 (top) -->
  <rect x="515" y="76" width="80" height="22" rx="5" fill="#141413"/>
  <text x="555" y="91" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">战略层</text>
  <!-- Layer 2 (middle) -->
  <line x1="555" y1="98" x2="555" y2="114" stroke="#D1CFC5" stroke-width="1.2"/>
  <rect x="500" y="118" width="110" height="22" rx="5" fill="#FFFFFF" stroke="#141413" stroke-width="1.2"/>
  <text x="555" y="133" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">战术层</text>
  <!-- Layer 3 (bottom) -->
  <line x1="555" y1="140" x2="555" y2="156" stroke="#D1CFC5" stroke-width="1.2"/>
  <rect x="485" y="160" width="140" height="22" rx="5" fill="#FFFFFF" stroke="#141413" stroke-width="1.2"/>
  <text x="555" y="175" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">执行层</text>
  <!-- Vertical connectors -->
  <line x1="510" y1="98" x2="510" y2="114" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="600" y1="98" x2="600" y2="114" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="510" y1="140" x2="510" y2="156" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="600" y1="140" x2="600" y2="156" stroke="#D1CFC5" stroke-width="1.2"/>
  <!-- Card label -->
  <text x="555" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">Hierarchical</text>
  <text x="555" y="243" text-anchor="middle" font-size="10" fill="#87867F">层级组织模式</text>
  <text x="555" y="256" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">多层次 · 战略到执行</text>

  <!-- Bottom caption -->
  <text x="340" y="282" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">各模式详情见下文 ↓</text>
</svg>
