<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Georgia, serif">
  <title>Code Watermark Three Layers</title>
  <desc>代码水印的三重境界：文本水印、语法水印、语义水印</desc>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97757"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3DACC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D1CFC5" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D1CFC5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#87867F" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#788C5D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#788C5D" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#141413" letter-spacing="1">代码水印的三重境界</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#87867F" letter-spacing="0.5">从可见注释到不可见的算法特征</text>
  <line x1="200" y1="70" x2="700" y2="70" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Layer 1: Textual Watermark -->
  <rect x="60" y="90" width="780" height="115" rx="12" fill="url(#grad1)" stroke="#D97757" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="90" width="140" height="115" rx="12" fill="#D97757" opacity="0.15"/>
  <rect x="190" y="90" width="10" height="115" fill="#D97757" opacity="0.15"/>
  <text x="140" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#D97757">第一层</text>
  <text x="140" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#141413">TEXTUAL</text>
  <text x="140" y="160" text-anchor="middle" font-size="11" fill="#87867F">文本水印</text>
  <line x1="200" y1="108" x2="200" y2="192" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Layer 1 content -->
  <text x="230" y="115" font-size="11" fill="#141413" font-weight="bold">方法：在注释、变量名中嵌入标识</text>
  <text x="230" y="134" font-size="10" fill="#87867F">// AI-GEN-COMPANY-X-2025Q1  |  # Generated by InternalAI</text>
  <rect x="230" y="144" width="590" height="52" rx="6" fill="#141413" opacity="0.06"/>
  <text x="244" y="160" font-size="10" font-family="Courier New, monospace" fill="#141413">def calculate_total(items):</text>
  <text x="268" y="176" font-size="10" font-family="Courier New, monospace" fill="#141413"># AI-GEN-COMPANY-X-2025Q1</text>
  <text x="268" y="188" font-size="10" font-family="Courier New, monospace" fill="#141413">total_sum = sum(item.price for item in items)</text>

  <rect x="650" y="110" width="172" height="88" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  <text x="736" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#141413">优点：简单可验证</text>
  <text x="736" y="148" text-anchor="middle" font-size="10" fill="#788C5D">✓ 易于实现</text>
  <text x="736" y="163" text-anchor="middle" font-size="10" fill="#788C5D">✓ 直接比对</text>
  <text x="736" y="183" text-anchor="middle" font-size="10" fill="#D97757">✗ 容易被删除/修改</text>

  <!-- Layer 2: Syntactic Watermark -->
  <rect x="60" y="218" width="780" height="115" rx="12" fill="url(#grad2)" stroke="#87867F" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="218" width="140" height="115" rx="12" fill="#87867F" opacity="0.15"/>
  <rect x="190" y="218" width="10" height="115" fill="#87867F" opacity="0.15"/>
  <text x="140" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#87867F">第二层</text>
  <text x="140" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#141413">SYNTAX</text>
  <text x="140" y="288" text-anchor="middle" font-size="11" fill="#87867F">语法水印</text>
  <line x1="200" y1="236" x2="200" y2="320" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Layer 2 content -->
  <text x="230" y="243" font-size="11" fill="#141413" font-weight="bold">方法：不改变功能，调整代码语法结构</text>
  <text x="230" y="262" font-size="10" fill="#87867F">AI模型有特定「代码风格」偏好 → 统计学可识别</text>
  <rect x="230" y="272" width="590" height="52" rx="6" fill="#141413" opacity="0.06"/>
  <text x="244" y="287" font-size="10" font-family="Courier New, monospace" fill="#141413"># 无水印: list → []</text>
  <text x="244" y="300" font-size="10" font-family="Courier New, monospace" fill="#141413"># 有水印: list() 而非 []    if item.valid == True:  # 显式比较</text>
  <text x="244" y="313" font-size="10" font-family="Courier New, monospace" fill="#141413">#              continue  # 冗余continue</text>

  <rect x="650" y="238" width="172" height="88" rx="8" fill="#FAF9F5" stroke="#87867F" stroke-width="1.5"/>
  <text x="736" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="#141413">优点：难以删除</text>
  <text x="736" y="276" text-anchor="middle" font-size="10" fill="#788C5D">✓ 需重写代码才能去除</text>
  <text x="736" y="291" text-anchor="middle" font-size="10" fill="#788C5D">✓ 统计学分析可靠</text>
  <text x="736" y="311" text-anchor="middle" font-size="10" fill="#D97757">✗ 格式化工具可破坏</text>

  <!-- Layer 3: Semantic Watermark -->
  <rect x="60" y="346" width="780" height="115" rx="12" fill="url(#grad3)" stroke="#788C5D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="346" width="140" height="115" rx="12" fill="#788C5D" opacity="0.15"/>
  <rect x="190" y="346" width="10" height="115" fill="#788C5D" opacity="0.15"/>
  <text x="140" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#788C5D">第三层</text>
  <text x="140" y="396" text-anchor="middle" font-size="16" font-weight="bold" fill="#141413">SEMANTIC</text>
  <text x="140" y="416" text-anchor="middle" font-size="11" fill="#87867F">语义水印</text>
  <line x1="200" y1="364" x2="200" y2="448" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Layer 3 content -->
  <text x="230" y="371" font-size="11" fill="#141413" font-weight="bold">方法：在算法逻辑中嵌入不可见特征</text>
  <text x="230" y="390" font-size="10" fill="#87867F">选择特定算法组合 + 数学运算中嵌入微小偏差</text>
  <rect x="230" y="400" width="590" height="52" rx="6" fill="#141413" opacity="0.06"/>
  <text x="244" y="415" font-size="10" font-family="Courier New, monospace" fill="#141413"># quicksort + mergesort 特定组合  |  sorted(items, key=lambda x: x.priority * 1.000001)</text>
  <text x="244" y="429" font-size="10" font-family="Courier New, monospace" fill="#141413">#                    ↑ 微小的乘数因子（不可见但可检测）</text>
  <text x="244" y="442" font-size="10" font-family="Courier New, monospace" fill="#141413"># 特定控制流模式 = 模型的「代码指纹」</text>

  <rect x="650" y="366" width="172" height="88" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
  <text x="736" y="384" text-anchor="middle" font-size="11" font-weight="bold" fill="#141413">优点：极难发现和删除</text>
  <text x="736" y="404" text-anchor="middle" font-size="10" fill="#788C5D">✓ 不可见</text>
  <text x="736" y="419" text-anchor="middle" font-size="10" fill="#788C5D">✓ 重写也无法消除</text>
  <text x="736" y="439" text-anchor="middle" font-size="10" fill="#D97757">✗ 可能影响性能</text>

  <!-- Progression arrow -->
  <path d="M 840 147 L 840 178 L 835 170 M 840 178 L 845 170" stroke="#D97757" stroke-width="2" fill="none"/>
  <path d="M 840 273 L 840 304 L 835 296 M 840 304 L 845 296" stroke="#87867F" stroke-width="2" fill="none"/>

  <!-- Bottom note -->
  <text x="450" y="492" text-anchor="middle" font-size="10" fill="#87867F">鲁棒性递增：文本水印 ← 语法水印 ← 语义水印</text>
</svg>
