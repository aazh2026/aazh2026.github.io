<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 900 520">
  <title>Code Watermark Three Layers</title>
  <desc>
    代码水印的三重境界：文本水印、语法水印、语义水印
  </desc>
  <defs>
    <linearGradient id="grad1" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#e3dacc" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#d1cfc5" stop-opacity=".3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#d1cfc5" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#87867f" stop-opacity=".3"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#788c5d" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#788c5d" stop-opacity=".1"/>
    </linearGradient>
    <filter id="shadow" width="120%" height="120%" x="-10%" y="-10%">
      <feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="5"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h900v520H0z"/>
  <text x="450" y="38" fill="#141413" font-size="18" font-weight="bold" letter-spacing="1" text-anchor="middle">代码水印的三重境界</text>
  <text x="450" y="60" fill="#87867f" font-size="12" letter-spacing=".5" text-anchor="middle">从可见注释到不可见的算法特征</text>
  <path stroke="#d1cfc5" d="M200 70h500"/>
  <rect width="780" height="115" x="60" y="90" fill="url(#grad1)" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="12"/>
  <rect width="140" height="115" x="60" y="90" fill="#d97757" opacity=".15" rx="12"/>
  <path fill="#d97757" d="M190 90h10v115h-10z" opacity=".15"/>
  <text x="140" y="120" fill="#d97757" font-size="14" font-weight="bold" text-anchor="middle">第一层</text>
  <text x="140" y="140" fill="#141413" font-size="16" font-weight="bold" text-anchor="middle">TEXTUAL</text>
  <text x="140" y="160" fill="#87867f" font-size="11" text-anchor="middle">文本水印</text>
  <path stroke="#d1cfc5" stroke-dasharray="4,4" d="M200 108v84"/>
  <text x="230" y="115" fill="#141413" font-size="11" font-weight="bold">方法：在注释、变量名中嵌入标识</text>
  <text x="230" y="134" fill="#87867f" font-size="10">// AI-GEN-COMPANY-X-2025Q1  |  # Generated by InternalAI</text>
  <rect width="590" height="52" x="230" y="144" fill="#141413" opacity=".06" rx="6"/>
  <text x="244" y="160" fill="#141413" font-family="Courier New, monospace" font-size="10">def calculate_total(items):</text>
  <text x="268" y="176" fill="#141413" font-family="Courier New, monospace" font-size="10"># AI-GEN-COMPANY-X-2025Q1</text>
  <text x="268" y="188" fill="#141413" font-family="Courier New, monospace" font-size="10">total_sum = sum(item.price for item in items)</text>
  <rect width="172" height="88" x="650" y="110" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="736" y="128" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">优点：简单可验证</text>
  <text x="736" y="148" fill="#788c5d" font-size="10" text-anchor="middle">✓ 易于实现</text>
  <text x="736" y="163" fill="#788c5d" font-size="10" text-anchor="middle">✓ 直接比对</text>
  <text x="736" y="183" fill="#d97757" font-size="10" text-anchor="middle">✗ 容易被删除/修改</text>
  <rect width="780" height="115" x="60" y="218" fill="url(#grad2)" stroke="#87867f" stroke-width="2" filter="url(#shadow)" rx="12"/>
  <rect width="140" height="115" x="60" y="218" fill="#87867f" opacity=".15" rx="12"/>
  <path fill="#87867f" d="M190 218h10v115h-10z" opacity=".15"/>
  <text x="140" y="248" fill="#87867f" font-size="14" font-weight="bold" text-anchor="middle">第二层</text>
  <text x="140" y="268" fill="#141413" font-size="16" font-weight="bold" text-anchor="middle">SYNTAX</text>
  <text x="140" y="288" fill="#87867f" font-size="11" text-anchor="middle">语法水印</text>
  <path stroke="#d1cfc5" stroke-dasharray="4,4" d="M200 236v84"/>
  <text x="230" y="243" fill="#141413" font-size="11" font-weight="bold">方法：不改变功能，调整代码语法结构</text>
  <text x="230" y="262" fill="#87867f" font-size="10">AI模型有特定「代码风格」偏好 → 统计学可识别</text>
  <rect width="590" height="52" x="230" y="272" fill="#141413" opacity=".06" rx="6"/>
  <text x="244" y="287" fill="#141413" font-family="Courier New, monospace" font-size="10"># 无水印: list → []</text>
  <text x="244" y="300" fill="#141413" font-family="Courier New, monospace" font-size="10"># 有水印: list() 而非 []    if item.valid == True:  # 显式比较</text>
  <text x="244" y="313" fill="#141413" font-family="Courier New, monospace" font-size="10">#              continue  # 冗余continue</text>
  <rect width="172" height="88" x="650" y="238" fill="#faf9f5" stroke="#87867f" stroke-width="1.5" rx="8"/>
  <text x="736" y="256" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">优点：难以删除</text>
  <text x="736" y="276" fill="#788c5d" font-size="10" text-anchor="middle">✓ 需重写代码才能去除</text>
  <text x="736" y="291" fill="#788c5d" font-size="10" text-anchor="middle">✓ 统计学分析可靠</text>
  <text x="736" y="311" fill="#d97757" font-size="10" text-anchor="middle">✗ 格式化工具可破坏</text>
  <rect width="780" height="115" x="60" y="346" fill="url(#grad3)" stroke="#788c5d" stroke-width="2" filter="url(#shadow)" rx="12"/>
  <rect width="140" height="115" x="60" y="346" fill="#788c5d" opacity=".15" rx="12"/>
  <path fill="#788c5d" d="M190 346h10v115h-10z" opacity=".15"/>
  <text x="140" y="376" fill="#788c5d" font-size="14" font-weight="bold" text-anchor="middle">第三层</text>
  <text x="140" y="396" fill="#141413" font-size="16" font-weight="bold" text-anchor="middle">SEMANTIC</text>
  <text x="140" y="416" fill="#87867f" font-size="11" text-anchor="middle">语义水印</text>
  <path stroke="#d1cfc5" stroke-dasharray="4,4" d="M200 364v84"/>
  <text x="230" y="371" fill="#141413" font-size="11" font-weight="bold">方法：在算法逻辑中嵌入不可见特征</text>
  <text x="230" y="390" fill="#87867f" font-size="10">选择特定算法组合 + 数学运算中嵌入微小偏差</text>
  <rect width="590" height="52" x="230" y="400" fill="#141413" opacity=".06" rx="6"/>
  <text x="244" y="415" fill="#141413" font-family="Courier New, monospace" font-size="10"># quicksort + mergesort 特定组合  |  sorted(items, key=lambda x: x.priority * 1.000001)</text>
  <text x="244" y="429" fill="#141413" font-family="Courier New, monospace" font-size="10">#                    ↑ 微小的乘数因子（不可见但可检测）</text>
  <text x="244" y="442" fill="#141413" font-family="Courier New, monospace" font-size="10"># 特定控制流模式 = 模型的「代码指纹」</text>
  <rect width="172" height="88" x="650" y="366" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="736" y="384" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">优点：极难发现和删除</text>
  <text x="736" y="404" fill="#788c5d" font-size="10" text-anchor="middle">✓ 不可见</text>
  <text x="736" y="419" fill="#788c5d" font-size="10" text-anchor="middle">✓ 重写也无法消除</text>
  <text x="736" y="439" fill="#d97757" font-size="10" text-anchor="middle">✗ 可能影响性能</text>
  <path fill="none" stroke="#d97757" stroke-width="2" d="M840 147v31l-5-8m5 8 5-8"/>
  <path fill="none" stroke="#87867f" stroke-width="2" d="M840 273v31l-5-8m5 8 5-8"/>
  <text x="450" y="492" fill="#87867f" font-size="10" text-anchor="middle">鲁棒性递增：文本水印 ← 语法水印 ← 语义水印</text>
</svg>
