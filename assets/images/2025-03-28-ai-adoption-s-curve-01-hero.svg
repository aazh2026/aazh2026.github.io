<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">三层嵌套 S-curve Adoption 模型</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">postcodeeng · 2025/03/28</text>

  <!-- === Panel 1: Individual Adoption === -->
  <!-- Card background -->
  <rect x="24" y="60" width="196" height="240" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <!-- Clay left accent bar -->
  <rect x="24" y="68" width="4" height="224" rx="2" fill="#D97757"/>

  <!-- Panel 1 Title -->
  <text x="40" y="84" font-size="11" font-weight="700" fill="#D97757" font-family="ui-monospace, monospace">Individual Adoption</text>
  <text x="40" y="100" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Month 1–6</text>

  <!-- S-curve path for Individual -->
  <!-- Slow start, acceleration, maturity -->
  <path d="M 40 240 Q 80 240, 100 200 Q 120 160, 160 130 Q 190 108, 210 100"
        stroke="#D97757" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Axis -->
  <line x1="40" y1="250" x2="220" y2="250" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="130" y="264" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">时间 →</text>

  <!-- Phase labels -->
  <text x="60" y="234" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Early</text>
  <text x="115" y="174" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Growth</text>
  <text x="170" y="108" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Maturity</text>

  <!-- Dots on curve -->
  <circle cx="50" cy="238" r="3" fill="#D97757"/>
  <circle cx="100" cy="200" r="3" fill="#D97757"/>
  <circle cx="140" cy="155" r="3" fill="#D97757"/>
  <circle cx="175" cy="118" r="3" fill="#D97757"/>
  <circle cx="205" cy="102" r="3" fill="#D97757"/>

  <!-- Panel 1 footer -->
  <text x="40" y="288" font-size="9.5" fill="#141413">个人层</text>
  <text x="40" y="302" font-size="9" fill="#87867F">每层有自己的采用节奏</text>

  <!-- Arrow 1→2 (dashed, right side) -->
  <path d="M 222 180 C 242 180, 242 180, 258 172" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="258,172 250,169 251,177" fill="#D1CFC5"/>
  <text x="240" y="170" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">feeds into</text>

  <!-- === Panel 2: Team Adoption === -->
  <rect x="258" y="60" width="196" height="240" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="258" y="68" width="4" height="224" rx="2" fill="#788C5D"/>

  <text x="274" y="84" font-size="11" font-weight="700" fill="#788C5D" font-family="ui-monospace, monospace">Team Adoption</text>
  <text x="274" y="100" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Month 7–18</text>

  <!-- S-curve for Team (nested, slightly higher) -->
  <path d="M 274 238 Q 314 238, 330 202 Q 348 165, 378 138 Q 408 115, 430 107"
        stroke="#788C5D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="274" y1="248" x2="448" y2="248" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="362" y="262" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">时间 →</text>

  <text x="294" y="232" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Early</text>
  <text x="346" y="170" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Growth</text>
  <text x="400" y="115" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Maturity</text>

  <circle cx="284" cy="236" r="3" fill="#788C5D"/>
  <circle cx="330" cy="202" r="3" fill="#788C5D"/>
  <circle cx="368" cy="155" r="3" fill="#788C5D"/>
  <circle cx="400" cy="126" r="3" fill="#788C5D"/>
  <circle cx="428" cy="109" r="3" fill="#788C5D"/>

  <text x="274" y="288" font-size="9.5" fill="#141413">团队层</text>
  <text x="274" y="302" font-size="9" fill="#87867F">依赖个人层成熟度</text>

  <!-- Arrow 2→3 -->
  <path d="M 456 180 C 476 180, 476 180, 492 172" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="492,172 484,169 485,177" fill="#D1CFC5"/>
  <text x="474" y="170" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">feeds into</text>

  <!-- === Panel 3: Organizational Adoption === -->
  <rect x="492" y="60" width="164" height="240" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="492" y="68" width="4" height="224" rx="2" fill="#141413"/>

  <text x="508" y="84" font-size="11" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">Organizational Adoption</text>
  <text x="508" y="100" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Year 2–5+</text>

  <!-- S-curve for Org (nested, highest) -->
  <path d="M 508 236 Q 546 236, 558 205 Q 572 172, 598 148 Q 622 128, 642 120"
        stroke="#141413" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="508" y1="246" x2="656" y2="246" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="584" y="260" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">时间 →</text>

  <text x="528" y="230" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Early</text>
  <text x="572" y="178" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Growth</text>
  <text x="618" y="130" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">Maturity</text>

  <circle cx="518" cy="234" r="3" fill="#141413"/>
  <circle cx="558" cy="205" r="3" fill="#141413"/>
  <circle cx="592" cy="162" r="3" fill="#141413"/>
  <circle cx="622" cy="136" r="3" fill="#141413"/>
  <circle cx="640" cy="122" r="3" fill="#141413"/>

  <text x="508" y="288" font-size="9.5" fill="#141413">组织层</text>
  <text x="508" y="302" font-size="9" fill="#87867F">依赖团队层成熟度</text>

  <!-- Source line -->
  <text x="340" y="348" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">三层嵌套的S-curve：个人层、团队层、组织层，每层有各自的采用节奏</text>

  <title>三层嵌套 S-curve Adoption 模型</title>
  <desc>Horizontal three-panel diagram showing Individual Adoption (Month 1-6), Team Adoption (Month 7-18), and Organizational Adoption (Year 2-5+) as nested S-curves. Each panel is a white card with a colored left border accent. Dashed arrows indicate feed-into dependency between layers.</desc>
</svg>