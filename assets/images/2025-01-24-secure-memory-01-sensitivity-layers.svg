<svg xmlns="http://www.w3.org/2000/svg" aria-label="敏感记忆分层架构" viewBox="0 0 800 400">
  <title>敏感记忆分层架构</title>
  <desc>
    四层敏感度分类（L1-L4）及其对应的安全策略：从不存储到标准存储
  </desc>
  <defs>
    <marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="3">
      <path fill="#87867f" d="M0 0v6l7-3z"/>
    </marker>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v400H0z"/>
  <text x="400" y="28" fill="#141413" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle">敏感记忆分层架构</text>
  <text x="400" y="46" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">从「永不存储」到「标准存储」— 差异化安全策略</text>
  <rect width="280" height="36" x="260" y="60" fill="#141413" rx="18"/>
  <text x="400" y="83" fill="#faf9f5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">最小化 · 加密化 · 隔离化 · 透明化</text>
  <path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr)" d="M400 96v24"/>
  <rect width="720" height="52" x="40" y="125" fill="none" stroke="#d97757" stroke-width="2.5" rx="8"/>
  <circle cx="75" cy="151" r="18" fill="#d97757"/>
  <text x="75" y="156" fill="#faf9f5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">L1</text>
  <text x="105" y="146" fill="#d97757" font-family="sans-serif" font-size="12" font-weight="bold">极度敏感</text>
  <text x="105" y="162" fill="#87867f" font-family="sans-serif" font-size="10">密码 · API密钥 · PII · 医疗记录</text>
  <rect width="110" height="28" x="460" y="137" fill="#d97757" rx="4"/>
  <text x="515" y="156" fill="#faf9f5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">🚫 不持久化</text>
  <text x="590" y="150" fill="#141413" font-family="sans-serif" font-size="10" font-weight="bold">内存短暂存在</text>
  <text x="590" y="164" fill="#87867f" font-family="sans-serif" font-size="9">仅内存处理 + Secure Enclave</text>
  <rect width="720" height="52" x="40" y="185" fill="none" stroke="#788c5d" stroke-width="2" rx="8"/>
  <circle cx="75" cy="211" r="18" fill="#788c5d"/>
  <text x="75" y="216" fill="#faf9f5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">L2</text>
  <text x="105" y="206" fill="#788c5d" font-family="sans-serif" font-size="12" font-weight="bold">高度敏感</text>
  <text x="105" y="222" fill="#87867f" font-family="sans-serif" font-size="10">公司机密 · 商业机密 · 个人财务</text>
  <rect width="110" height="28" x="460" y="197" fill="#788c5d" rx="4"/>
  <text x="515" y="216" fill="#faf9f5" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">AES-256-GCM</text>
  <text x="590" y="210" fill="#141413" font-family="sans-serif" font-size="10" font-weight="bold">HSM 密钥管理</text>
  <text x="590" y="224" fill="#87867f" font-family="sans-serif" font-size="9">RBAC + 审计日志</text>
  <rect width="720" height="52" x="40" y="245" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <circle cx="75" cy="271" r="18" fill="#d1cfc5"/>
  <text x="75" y="276" fill="#141413" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">L3</text>
  <text x="105" y="266" fill="#141413" font-family="sans-serif" font-size="12" font-weight="bold">中度敏感</text>
  <text x="105" y="282" fill="#87867f" font-family="sans-serif" font-size="10">个人偏好 · 社交关系 · 位置历史</text>
  <rect width="110" height="28" x="460" y="257" fill="#d1cfc5" rx="4"/>
  <text x="515" y="276" fill="#141413" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">AES-256</text>
  <text x="590" y="270" fill="#141413" font-family="sans-serif" font-size="10" font-weight="bold">隔离存储</text>
  <text x="590" y="284" fill="#87867f" font-family="sans-serif" font-size="9">标准加密 + 访问控制</text>
  <rect width="720" height="52" x="40" y="305" fill="none" stroke="#e3dacc" rx="8"/>
  <circle cx="75" cy="331" r="18" fill="#e3dacc"/>
  <text x="75" y="336" fill="#141413" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">L4</text>
  <text x="105" y="326" fill="#141413" font-family="sans-serif" font-size="12" font-weight="bold">低敏感</text>
  <text x="105" y="342" fill="#87867f" font-family="sans-serif" font-size="10">一般偏好 · 公开信息 · 技术偏好</text>
  <rect width="110" height="28" x="460" y="317" fill="#e3dacc" rx="4"/>
  <text x="515" y="336" fill="#141413" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">标准存储</text>
  <text x="590" y="330" fill="#141413" font-family="sans-serif" font-size="10" font-weight="bold">无加密</text>
  <text x="590" y="344" fill="#87867f" font-family="sans-serif" font-size="9">标准访问控制</text>
  <rect width="720" height="28" x="40" y="365" fill="#141413" rx="4"/>
  <text x="400" y="383" fill="#e3dacc" font-family="sans-serif" font-size="10" text-anchor="middle">信任建立在安全之上。没有安全，就没有真正的 Agent。</text>
</svg>
