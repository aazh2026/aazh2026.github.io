<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="敏感记忆分层架构">
  <title>敏感记忆分层架构</title>
  <desc>四层敏感度分类（L1-L4）及其对应的安全策略：从不存储到标准存储</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#FAF9F5"/>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#141413">敏感记忆分层架构</text>
  <text x="400" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">从「永不存储」到「标准存储」— 差异化安全策略</text>

  <!-- 中心安全原则 -->
  <rect x="260" y="60" width="280" height="36" rx="18" fill="#141413"/>
  <text x="400" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FAF9F5">最小化 · 加密化 · 隔离化 · 透明化</text>

  <!-- 连接线 -->
  <line x1="400" y1="96" x2="400" y2="120" stroke="#87867F" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- L1: 极度敏感 -->
  <rect x="40" y="125" width="720" height="52" rx="8" fill="none" stroke="#D97757" stroke-width="2.5"/>
  <circle cx="75" cy="151" r="18" fill="#D97757"/>
  <text x="75" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FAF9F5">L1</text>
  <text x="105" y="146" font-family="sans-serif" font-size="12" font-weight="bold" fill="#D97757">极度敏感</text>
  <text x="105" y="162" font-family="sans-serif" font-size="10" fill="#87867F">密码 · API密钥 · PII · 医疗记录</text>
  <rect x="460" y="137" width="110" height="28" rx="4" fill="#D97757"/>
  <text x="515" y="156" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FAF9F5">🚫 不持久化</text>
  <text x="590" y="150" font-family="sans-serif" font-size="10" fill="#141413" font-weight="bold">内存短暂存在</text>
  <text x="590" y="164" font-family="sans-serif" font-size="9" fill="#87867F">仅内存处理 + Secure Enclave</text>

  <!-- L2: 高度敏感 -->
  <rect x="40" y="185" width="720" height="52" rx="8" fill="none" stroke="#788C5D" stroke-width="2"/>
  <circle cx="75" cy="211" r="18" fill="#788C5D"/>
  <text x="75" y="216" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FAF9F5">L2</text>
  <text x="105" y="206" font-family="sans-serif" font-size="12" font-weight="bold" fill="#788C5D">高度敏感</text>
  <text x="105" y="222" font-family="sans-serif" font-size="10" fill="#87867F">公司机密 · 商业机密 · 个人财务</text>
  <rect x="460" y="197" width="110" height="28" rx="4" fill="#788C5D"/>
  <text x="515" y="216" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#FAF9F5">AES-256-GCM</text>
  <text x="590" y="210" font-family="sans-serif" font-size="10" fill="#141413" font-weight="bold">HSM 密钥管理</text>
  <text x="590" y="224" font-family="sans-serif" font-size="9" fill="#87867F">RBAC + 审计日志</text>

  <!-- L3: 中度敏感 -->
  <rect x="40" y="245" width="720" height="52" rx="8" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="75" cy="271" r="18" fill="#D1CFC5"/>
  <text x="75" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#141413">L3</text>
  <text x="105" y="266" font-family="sans-serif" font-size="12" font-weight="bold" fill="#141413">中度敏感</text>
  <text x="105" y="282" font-family="sans-serif" font-size="10" fill="#87867F">个人偏好 · 社交关系 · 位置历史</text>
  <rect x="460" y="257" width="110" height="28" rx="4" fill="#D1CFC5"/>
  <text x="515" y="276" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#141413">AES-256</text>
  <text x="590" y="270" font-family="sans-serif" font-size="10" fill="#141413" font-weight="bold">隔离存储</text>
  <text x="590" y="284" font-family="sans-serif" font-size="9" fill="#87867F">标准加密 + 访问控制</text>

  <!-- L4: 低敏感 -->
  <rect x="40" y="305" width="720" height="52" rx="8" fill="none" stroke="#E3DACC" stroke-width="1"/>
  <circle cx="75" cy="331" r="18" fill="#E3DACC"/>
  <text x="75" y="336" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#141413">L4</text>
  <text x="105" y="326" font-family="sans-serif" font-size="12" font-weight="bold" fill="#141413">低敏感</text>
  <text x="105" y="342" font-family="sans-serif" font-size="10" fill="#87867F">一般偏好 · 公开信息 · 技术偏好</text>
  <rect x="460" y="317" width="110" height="28" rx="4" fill="#E3DACC"/>
  <text x="515" y="336" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#141413">标准存储</text>
  <text x="590" y="330" font-family="sans-serif" font-size="10" fill="#141413" font-weight="bold">无加密</text>
  <text x="590" y="344" font-family="sans-serif" font-size="9" fill="#87867F">标准访问控制</text>

  <!-- 底部核心理念 -->
  <rect x="40" y="365" width="720" height="28" rx="4" fill="#141413"/>
  <text x="400" y="383" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E3DACC">信任建立在安全之上。没有安全，就没有真正的 Agent。</text>
</svg>
