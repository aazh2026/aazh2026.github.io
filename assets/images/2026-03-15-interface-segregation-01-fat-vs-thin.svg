<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Fat Interface vs Thin Interfaces</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Interface Segregation Principle · SOLID</text>

  <!-- LEFT: Fat Interface -->
  <rect x="40" y="68" width="240" height="240" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="160" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">GodObject Interface</text>
  <text x="160" y="108" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">（所有方法打包在一个接口）</text>

  <!-- Fat interface methods -->
  <rect x="56" y="122" width="208" height="28" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="160" y="140" text-anchor="middle" font-size="11" fill="#141413">read()</text>

  <rect x="56" y="156" width="208" height="28" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="160" y="174" text-anchor="middle" font-size="11" fill="#141413">write()</text>

  <rect x="56" y="190" width="208" height="28" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="160" y="208" text-anchor="middle" font-size="11" fill="#141413">close()</text>

  <rect x="56" y="224" width="208" height="28" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="160" y="242" text-anchor="middle" font-size="11" fill="#141413">flush()</text>

  <rect x="56" y="258" width="208" height="28" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="160" y="276" text-anchor="middle" font-size="11" fill="#141413">seek()</text>

  <!-- X mark -->
  <circle cx="290" cy="180" r="18" fill="#D97757"/>
  <text x="290" y="186" text-anchor="middle" font-size="20" fill="#FFFFFF" font-weight="bold">✗</text>

  <!-- Arrow left to center -->
  <line x1="280" y1="180" x2="305" y2="180" stroke="#D97757" stroke-width="2"/>
  <polygon points="312,180 304,176 304,184" fill="#D97757"/>

  <!-- CENTER: Client depends on everything -->
  <rect x="320" y="140" width="40" height="80" rx="6" fill="#D97757"/>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">调用方</text>
  <text x="340" y="182" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">Client</text>

  <!-- Arrow center to right -->
  <line x1="360" y1="180" x2="385" y2="180" stroke="#788C5D" stroke-width="2"/>
  <polygon points="392,180 384,176 384,184" fill="#788C5D"/>

  <!-- RIGHT: Thin Interfaces -->
  <text x="530" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Thin Interfaces</text>
  <text x="530" y="98" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">（每个能力独立接口）</text>

  <!-- Thin interface 1: Readable -->
  <rect x="420" y="116" width="220" height="38" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="436" y="134" font-size="10.5" font-weight="500" fill="#788C5D" font-family="ui-monospace, monospace">Readable</text>
  <text x="436" y="148" font-size="10.5" fill="#141413">read()</text>

  <!-- Thin interface 2: Closeable -->
  <rect x="420" y="160" width="220" height="38" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="436" y="178" font-size="10.5" font-weight="500" fill="#788C5D" font-family="ui-monospace, monospace">Closeable</text>
  <text x="436" y="192" font-size="10.5" fill="#141413">close()</text>

  <!-- Thin interface 3: Flushable -->
  <rect x="420" y="204" width="220" height="38" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="436" y="222" font-size="10.5" font-weight="500" fill="#788C5D" font-family="ui-monospace, monospace">Flushable</text>
  <text x="436" y="236" font-size="10.5" fill="#141413">flush()</text>

  <!-- Thin interface 4: Seekable -->
  <rect x="420" y="248" width="220" height="38" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="436" y="266" font-size="10.5" font-weight="500" fill="#788C5D" font-family="ui-monospace, monospace">Seekable</text>
  <text x="436" y="280" font-size="10.5" fill="#141413">seek()</text>

  <!-- Checkmark -->
  <circle cx="390" cy="180" r="18" fill="#788C5D"/>
  <text x="390" y="186" text-anchor="middle" font-size="20" fill="#FFFFFF" font-weight="bold">✓</text>

  <!-- Bottom labels -->
  <text x="160" y="318" text-anchor="middle" font-size="11" fill="#D97757">❌ 胖接口：调用者被迫依赖不需要的方法</text>
  <text x="530" y="318" text-anchor="middle" font-size="11" fill="#788C5D">✅ 瘦接口：调用者只依赖其所需</text>

  <!-- Dependency lines from client to thin interfaces -->
  <line x1="340" y1="220" x2="420" y2="135" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="220" x2="420" y2="179" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="220" x2="420" y2="223" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="220" x2="420" y2="267" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>
</svg>