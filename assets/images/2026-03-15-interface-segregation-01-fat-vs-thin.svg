<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 360">
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Fat Interface vs Thin Interfaces</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Interface Segregation Principle · SOLID</text>
  <rect width="240" height="240" x="40" y="68" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="160" y="92" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">GodObject Interface</text>
  <text x="160" y="108" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">（所有方法打包在一个接口）</text>
  <rect width="208" height="28" x="56" y="122" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="5"/>
  <text x="160" y="140" fill="#141413" font-size="11" text-anchor="middle">read()</text>
  <rect width="208" height="28" x="56" y="156" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="5"/>
  <text x="160" y="174" fill="#141413" font-size="11" text-anchor="middle">write()</text>
  <rect width="208" height="28" x="56" y="190" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="5"/>
  <text x="160" y="208" fill="#141413" font-size="11" text-anchor="middle">close()</text>
  <rect width="208" height="28" x="56" y="224" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="5"/>
  <text x="160" y="242" fill="#141413" font-size="11" text-anchor="middle">flush()</text>
  <rect width="208" height="28" x="56" y="258" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="5"/>
  <text x="160" y="276" fill="#141413" font-size="11" text-anchor="middle">seek()</text>
  <circle cx="290" cy="180" r="18" fill="#d97757"/>
  <text x="290" y="186" fill="#fff" font-size="20" font-weight="bold" text-anchor="middle">✗</text>
  <path stroke="#d97757" stroke-width="2" d="M280 180h25"/>
  <path fill="#d97757" d="m312 180-8-4v8z"/>
  <rect width="40" height="80" x="320" y="140" fill="#d97757" rx="6"/>
  <text x="340" y="168" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">调用方</text>
  <text x="340" y="182" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Client</text>
  <path stroke="#788c5d" stroke-width="2" d="M360 180h25"/>
  <path fill="#788c5d" d="m392 180-8-4v8z"/>
  <text x="530" y="82" fill="#788c5d" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Thin Interfaces</text>
  <text x="530" y="98" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">（每个能力独立接口）</text>
  <rect width="220" height="38" x="420" y="116" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="436" y="134" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5" font-weight="500">Readable</text>
  <text x="436" y="148" fill="#141413" font-size="10.5">read()</text>
  <rect width="220" height="38" x="420" y="160" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="436" y="178" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5" font-weight="500">Closeable</text>
  <text x="436" y="192" fill="#141413" font-size="10.5">close()</text>
  <rect width="220" height="38" x="420" y="204" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="436" y="222" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5" font-weight="500">Flushable</text>
  <text x="436" y="236" fill="#141413" font-size="10.5">flush()</text>
  <rect width="220" height="38" x="420" y="248" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="436" y="266" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5" font-weight="500">Seekable</text>
  <text x="436" y="280" fill="#141413" font-size="10.5">seek()</text>
  <circle cx="390" cy="180" r="18" fill="#788c5d"/>
  <text x="390" y="186" fill="#fff" font-size="20" font-weight="bold" text-anchor="middle">✓</text>
  <text x="160" y="318" fill="#d97757" font-size="11" text-anchor="middle">❌ 胖接口：调用者被迫依赖不需要的方法</text>
  <text x="530" y="318" fill="#788c5d" font-size="11" text-anchor="middle">✅ 瘦接口：调用者只依赖其所需</text>
  <path stroke="#d1cfc5" stroke-dasharray="3,2" d="m340 220 80-85m-80 85 80-41m-80 41 80 3m-80-3 80 47"/>
</svg>
