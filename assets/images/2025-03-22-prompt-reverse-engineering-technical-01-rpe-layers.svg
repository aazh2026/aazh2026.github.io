<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="100%" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-size: 13px; }
      .text-sm { fill: #87867F; font-size: 11px; }
      .text-xs { fill: #87867F; font-size: 10px; }
      .text-label { fill: #141413; font-size: 12px; font-weight: 600; }
      .border { stroke: #D1CFC5; stroke-width: 1.5; }
      .fill-l1 { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .fill-l2 { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .fill-l3 { fill: #fed7aa; stroke: #ea580c; stroke-width: 2; }
      .fill-l4 { fill: #fef3c7; stroke: #D97757; stroke-width: 2; }
      .fill-white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="900" height="580" class="bg"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" class="text-main" font-size="15" font-weight="700">Prompt 逆向工程四层架构（RPE）</text>

  <!-- ========== Layer 4 (top) ========== -->
  <rect x="60" y="55" width="780" height="115" rx="10" class="fill-l4"/>
  <text x="90" y="78" class="text-label" fill="#D97757" font-size="16">Layer 4</text>
  <rect x="60" y="55" width="4" height="115" rx="2" fill="#D97757"/>

  <text x="450" y="76" text-anchor="middle" class="text-label" font-size="14">Workflow Reconstruction</text>
  <text x="450" y="96" text-anchor="middle" class="text-sm">工作流重建层 — 目标：理解 Agent 系统的完整架构</text>

  <!-- L4 sub-items -->
  <rect x="140" y="112" width="155" height="46" rx="6" class="fill-white border"/>
  <text x="217" y="130" text-anchor="middle" class="text-xs">多轮对话分析</text>
  <text x="217" y="146" text-anchor="middle" class="text-xs">analyze_conversation_flow</text>

  <rect x="310" y="112" width="155" height="46" rx="6" class="fill-white border"/>
  <text x="387" y="130" text-anchor="middle" class="text-xs">Workflow 图重建</text>
  <text x="387" y="146" text-anchor="middle" class="text-xs">reconstruct_workflow_graph</text>

  <rect x="480" y="112" width="155" height="46" rx="6" class="fill-white border"/>
  <text x="557" y="130" text-anchor="middle" class="text-xs">状态机模型推断</text>
  <text x="557" y="146" text-anchor="middle" class="text-xs">infer_state_machine</text>

  <rect x="650" y="112" width="155" height="46" rx="6" class="fill-white border"/>
  <text x="727" y="130" text-anchor="middle" class="text-xs">Agent 交互模式</text>
  <text x="727" y="146" text-anchor="middle" class="text-xs">extract_agent_patterns</text>

  <!-- Arrow: L4 → L3 -->
  <line x1="450" y1="170" x2="450" y2="192" class="border" stroke-width="2"/>
  <polygon points="450,192 445,184 455,184" fill="#141413"/>

  <!-- ========== Layer 3 ========== -->
  <rect x="60" y="192" width="780" height="100" rx="10" class="fill-l3"/>
  <text x="90" y="215" class="text-label" fill="#ea580c" font-size="16">Layer 3</text>
  <rect x="60" y="192" width="4" height="100" rx="2" fill="#ea580c"/>

  <text x="450" y="213" text-anchor="middle" class="text-label" font-size="14">Tool Schema Inference</text>
  <text x="450" y="233" text-anchor="middle" class="text-sm">工具模式推断层 — 目标：重建 Tool Definition 和调用逻辑</text>

  <!-- L3 sub-items -->
  <rect x="140" y="248" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="217" y="271" text-anchor="middle" class="text-xs">工具触发探测 detect_tool_usage</text>

  <rect x="310" y="248" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="387" y="271" text-anchor="middle" class="text-xs">Tool Schema 重建 reconstruct_tool_schema</text>

  <rect x="480" y="248" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="557" y="271" text-anchor="middle" class="text-xs">参数类型推断 infer_param_types</text>

  <rect x="650" y="248" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="727" y="271" text-anchor="middle" class="text-xs">调用逻辑推断 infer_call_logic</text>

  <!-- Arrow: L3 → L2 -->
  <line x1="450" y1="292" x2="450" y2="314" class="border" stroke-width="2"/>
  <polygon points="450,314 445,306 455,306" fill="#141413"/>

  <!-- ========== Layer 2 ========== -->
  <rect x="60" y="314" width="780" height="100" rx="10" class="fill-l2"/>
  <text x="90" y="337" class="text-label" fill="#2563eb" font-size="16">Layer 2</text>
  <rect x="60" y="314" width="4" height="100" rx="2" fill="#2563eb"/>

  <text x="450" y="335" text-anchor="middle" class="text-label" font-size="14">System Prompt Extraction</text>
  <text x="450" y="355" text-anchor="middle" class="text-sm">系统 Prompt 提取层 — 目标：提取核心 System Prompt</text>

  <!-- L2 sub-items -->
  <rect x="140" y="370" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="217" y="393" text-anchor="middle" class="text-xs">角色推断 infer_role</text>

  <rect x="310" y="370" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="387" y="393" text-anchor="middle" class="text-xs">任务模板重建 reconstruct_task_template</text>

  <rect x="480" y="370" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="557" y="393" text-anchor="middle" class="text-xs">约束条件提取 extract_constraints</text>

  <rect x="650" y="370" width="155" height="36" rx="6" class="fill-white border"/>
  <text x="727" y="393" text-anchor="middle" class="text-xs">Prompt 片段还原 reconstruct_prompt</text>

  <!-- Arrow: L2 → L1 -->
  <line x1="450" y1="414" x2="450" y2="436" class="border" stroke-width="2"/>
  <polygon points="450,436 445,428 455,428" fill="#141413"/>

  <!-- ========== Layer 1 (bottom) ========== -->
  <rect x="60" y="436" width="780" height="120" rx="10" class="fill-l1"/>
  <text x="90" y="459" class="text-label" fill="#059669" font-size="16">Layer 1</text>
  <rect x="60" y="436" width="4" height="120" rx="2" fill="#059669"/>

  <text x="450" y="457" text-anchor="middle" class="text-label" font-size="14">Behavior Analysis</text>
  <text x="450" y="477" text-anchor="middle" class="text-sm">行为分析层 — 目标：从输入输出映射推断约束和模式</text>

  <!-- L1 sub-items -->
  <rect x="100" y="490" width="155" height="56" rx="6" class="fill-white border"/>
  <text x="177" y="510" text-anchor="middle" class="text-xs">采样分析</text>
  <text x="177" y="524" text-anchor="middle" class="text-xs">sampling_analysis</text>
  <text x="177" y="538" text-anchor="middle" class="text-xs">多次采样 → 模式提取</text>

  <rect x="270" y="490" width="155" height="56" rx="6" class="fill-white border"/>
  <text x="347" y="510" text-anchor="middle" class="text-xs">约束探测</text>
  <text x="347" y="524" text-anchor="middle" class="text-xs">constraint_probing</text>
  <text x="347" y="538" text-anchor="middle" class="text-xs">边界测试 → 约束推断</text>

  <rect x="440" y="490" width="155" height="56" rx="6" class="fill-white border"/>
  <text x="517" y="510" text-anchor="middle" class="text-xs">Fuzzing 测试</text>
  <text x="517" y="524" text-anchor="middle" class="text-xs">prompt_fuzzing</text>
  <text x="517" y="538" text-anchor="middle" class="text-xs">渐进变异 → 敏感度映射</text>

  <rect x="610" y="490" width="155" height="56" rx="6" class="fill-white border"/>
  <text x="687" y="510" text-anchor="middle" class="text-xs">I/O 映射表构建</text>
  <text x="687" y="524" text-anchor="middle" class="text-xs">build_io_mapping</text>
  <text x="687" y="538" text-anchor="middle" class="text-xs">输入 → 输出 关系建模</text>

  <!-- ========== Difficulty indicator ========== -->
  <rect x="60" y="55" width="780" height="26" rx="4" fill="none" stroke="#D97757" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="60" y="192" width="780" height="26" rx="4" fill="none" stroke="#ea580c" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="60" y="314" width="780" height="26" rx="4" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="60" y="436" width="780" height="26" rx="4" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Difficulty label -->
  <text x="850" y="75" text-anchor="end" class="text-xs" fill="#D97757">极难 ⭐⭐⭐⭐⭐</text>
  <text x="850" y="212" text-anchor="end" class="text-xs" fill="#ea580c">困难 ⭐⭐⭐⭐</text>
  <text x="850" y="334" text-anchor="end" class="text-xs" fill="#2563eb">中等 ⭐⭐⭐</text>
  <text x="850" y="456" text-anchor="end" class="text-xs" fill="#059669">容易 ⭐⭐</text>
</svg>
