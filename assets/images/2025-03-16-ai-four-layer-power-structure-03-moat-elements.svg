<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="320" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">护城河五要素</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">AI时代商业护城河模型</text>

  <!-- Element 1: Data Flywheel (top-left) -->
  <rect x="20" y="60" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="20" y="60" width="120" height="22" rx="8" fill="#D97757"/>
  <rect x="20" y="74" width="120" height="8" fill="#D97757"/>
  <text x="80" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">01</text>
  <text x="80" y="98" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">数据飞轮</text>
  <text x="80" y="114" text-anchor="middle" font-size="9.5" fill="#87867F">Data Flywheel</text>
  <text x="80" y="130" text-anchor="middle" font-size="8.5" fill="#87867F">越多使用 →</text>
  <text x="80" y="144" text-anchor="middle" font-size="8.5" fill="#87867F">越多数据 →</text>
  <text x="80" y="154" text-anchor="middle" font-size="8.5" fill="#87867F">产品越好</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="110" x2="158" y2="110" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="158,106 166,110 158,114" fill="#D97757"/>

  <!-- Element 2: Network Effects (top-center) -->
  <rect x="170" y="60" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="170" y="60" width="120" height="22" rx="8" fill="#D97757"/>
  <rect x="170" y="74" width="120" height="8" fill="#D97757"/>
  <text x="230" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">02</text>
  <text x="230" y="98" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">网络效应</text>
  <text x="230" y="114" text-anchor="middle" font-size="9.5" fill="#87867F">Network Effects</text>
  <text x="230" y="130" text-anchor="middle" font-size="8.5" fill="#87867F">用户越多 →</text>
  <text x="230" y="144" text-anchor="middle" font-size="8.5" fill="#87867F">价值越高</text>

  <!-- Arrow 2→3 -->
  <line x1="290" y1="110" x2="308" y2="110" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="308,106 316,110 308,114" fill="#D97757"/>

  <!-- Element 3: Workflow Embedding (top-right) -->
  <rect x="320" y="60" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="320" y="60" width="120" height="22" rx="8" fill="#D97757"/>
  <rect x="320" y="74" width="120" height="8" fill="#D97757"/>
  <text x="380" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">03</text>
  <text x="380" y="98" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">工作流嵌入</text>
  <text x="380" y="114" text-anchor="middle" font-size="9.5" fill="#87867F">Workflow Embedding</text>
  <text x="380" y="130" text-anchor="middle" font-size="8.5" fill="#87867F">深度集成 →</text>
  <text x="380" y="144" text-anchor="middle" font-size="8.5" fill="#87867F">替换成本高</text>

  <!-- Arrow 3→4 -->
  <line x1="440" y1="110" x2="458" y2="110" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="458,106 466,110 458,114" fill="#D97757"/>

  <!-- Element 4: Compliance Barriers (bottom-left) -->
  <rect x="170" y="180" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="170" y="180" width="120" height="22" rx="8" fill="#788C5D"/>
  <rect x="170" y="194" width="120" height="8" fill="#788C5D"/>
  <text x="230" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">04</text>
  <text x="230" y="218" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">合规壁垒</text>
  <text x="230" y="234" text-anchor="middle" font-size="9.5" fill="#87867F">Compliance Barriers</text>
  <text x="230" y="250" text-anchor="middle" font-size="8.5" fill="#87867F">牌照/认证 →</text>
  <text x="230" y="264" text-anchor="middle" font-size="8.5" fill="#87867F">准入门槛</text>

  <!-- Arrow 4↔5 (bidirectional between 4 and 5) -->
  <line x1="290" y1="230" x2="308" y2="230" stroke="#788C5D" stroke-width="1.5"/>
  <polygon points="308,226 316,230 308,234" fill="#788C5D"/>

  <!-- Element 5: Economies of Scale (bottom-right) -->
  <rect x="320" y="180" width="120" height="100" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="320" y="180" width="120" height="22" rx="8" fill="#788C5D"/>
  <rect x="320" y="194" width="120" height="8" fill="#788C5D"/>
  <text x="380" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">05</text>
  <text x="380" y="218" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">规模经济</text>
  <text x="380" y="234" text-anchor="middle" font-size="9.5" fill="#87867F">Economies of Scale</text>
  <text x="380" y="250" text-anchor="middle" font-size="8.5" fill="#87867F">规模越大 →</text>
  <text x="380" y="264" text-anchor="middle" font-size="8.5" fill="#87867F">单位成本越低</text>

  <!-- Vertical connector: Element 3 → Element 4 -->
  <path d="M 380 160 L 380 170 L 230 170 L 230 180" stroke="#D1CFC5" stroke-width="1.5" fill="none"/>
  <polygon points="226,170 234,170 230,176" fill="#D1CFC5"/>

  <!-- Vertical connector: Element 5 ← Element 2 -->
  <path d="M 380 160 L 380 170 L 380 180" stroke="#D1CFC5" stroke-width="1.5" fill="none"/>
  <polygon points="376,170 384,170 380,176" fill="#D1CFC5"/>

  <!-- Bottom label: Source -->
  <text x="340" y="305" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">来源：产业深度洞察系列 #01 · 2025/03/16</text>
</svg>
