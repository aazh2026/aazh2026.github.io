<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" viewBox="0 0 820 500">
  <defs>
    <marker id="arr" markerHeight="7" markerWidth="7" orient="auto" refX="6" refY="3">
      <path fill="#d97757" d="m0 0 6 3-6 3Z"/>
    </marker>
  </defs>
  <path fill="#faf9f5" d="M0 0h820v500H0z"/>
  <text x="410" y="30" fill="#141413" font-size="17" font-weight="700" text-anchor="middle">AI时代 Clean Room 困境：传统 vs AI实现对比</text>
  <text x="410" y="50" fill="#87867f" font-size="12" text-anchor="middle">信息隔离 · 独立实现 · 可追溯性 — 三个核心要素的差异</text>
  <rect width="380" height="390" x="20" y="68" fill="#e3dacc" stroke="#788c5d" stroke-width="2.5" rx="10"/>
  <rect width="380" height="36" x="20" y="68" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M20 90h380v14H20z"/>
  <text x="210" y="91" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">传统 Clean Room（1982年 Compaq案例）</text>
  <rect width="348" height="52" x="36" y="118" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <rect width="26" height="52" x="36" y="118" fill="#788c5d" rx="6"/>
  <text x="49" y="150" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">A</text>
  <text x="54" y="136" fill="#141413" font-size="10" font-weight="700">团队A（解剖组）</text>
  <text x="54" y="150" fill="#87867f" font-size="9">仔细阅读原始代码 → 写出功能规格说明（不含代码）</text>
  <path fill="none" stroke="#788c5d" stroke-width="2" marker-end="url(#arr)" d="M210 174v14"/>
  <rect width="348" height="42" x="36" y="192" fill="#faf9f5" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" rx="6"/>
  <text x="210" y="211" fill="#d97757" font-size="10" font-weight="700" text-anchor="middle">🧱 信息隔离墙 — 团队A与B完全隔离，不能交流</text>
  <text x="210" y="226" fill="#87867f" font-size="9" text-anchor="middle">物理/逻辑严格隔离 · 无任何直接信息传递</text>
  <path fill="none" stroke="#788c5d" stroke-width="2" marker-end="url(#arr)" d="M210 238v14"/>
  <rect width="348" height="52" x="36" y="256" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <rect width="26" height="52" x="36" y="256" fill="#788c5d" rx="6"/>
  <text x="49" y="288" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">B</text>
  <text x="54" y="274" fill="#141413" font-size="10" font-weight="700">团队B（实现组）</text>
  <text x="54" y="288" fill="#87867f" font-size="9">只根据规格说明，从头编写代码 — 从未接触原始代码</text>
  <path fill="none" stroke="#788c5d" stroke-width="2" marker-end="url(#arr)" d="M210 312v14"/>
  <rect width="348" height="52" x="36" y="330" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".15" rx="6"/>
  <text x="210" y="352" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">✓ 法律合规的功能兼容实现</text>
  <text x="210" y="368" fill="#87867f" font-size="9" text-anchor="middle">代码完全不同，不侵犯版权 · 可用新许可证发布</text>
  <text x="210" y="400" fill="#788c5d" font-size="9" font-weight="700" text-anchor="middle">三个核心要素</text>
  <text x="72" y="420" fill="#141413" font-size="9" text-anchor="middle">1. 信息隔离 ✓</text>
  <text x="210" y="420" fill="#141413" font-size="9" text-anchor="middle">2. 独立实现 ✓</text>
  <text x="348" y="420" fill="#141413" font-size="9" text-anchor="middle">3. 可追溯文档 ✓</text>
  <rect width="380" height="390" x="420" y="68" fill="#e3dacc" stroke="#d97757" stroke-width="2.5" rx="10"/>
  <rect width="380" height="36" x="420" y="68" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M420 90h380v14H420z"/>
  <text x="610" y="91" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">AI Clean Room（2026 Anthropic实验）</text>
  <rect width="348" height="52" x="436" y="118" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <rect width="26" height="52" x="436" y="118" fill="#d97757" rx="6"/>
  <text x="449" y="150" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">🤖</text>
  <text x="454" y="136" fill="#141413" font-size="10" font-weight="700">AI（LLM）</text>
  <text x="454" y="150" fill="#87867f" font-size="9">训练数据包含海量开源代码（GPL/MIT/专有）</text>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arr)" d="M610 174v14"/>
  <rect width="348" height="42" x="436" y="192" fill="#faf9f5" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" rx="6"/>
  <text x="610" y="211" fill="#d97757" font-size="10" font-weight="700" text-anchor="middle">❓ Prompt隔离墙 — &quot;不要参考任何现有实现&quot;</text>
  <text x="610" y="226" fill="#87867f" font-size="9" text-anchor="middle">无法证明AI没有从训练记忆中提取代码结构</text>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arr)" d="M610 238v14"/>
  <rect width="348" height="52" x="436" y="256" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <rect width="26" height="52" x="436" y="256" fill="#d97757" rx="6"/>
  <text x="449" y="288" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">🤖</text>
  <text x="454" y="274" fill="#141413" font-size="10" font-weight="700">AI 生成代码</text>
  <text x="454" y="288" fill="#87867f" font-size="9">根据Prompt描述生成 — 实质是训练记忆的重组，而非独立创作</text>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arr)" d="M610 312v14"/>
  <rect width="348" height="52" x="436" y="330" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".15" rx="6"/>
  <text x="610" y="352" fill="#d97757" font-size="11" font-weight="700" text-anchor="middle">⚠ 法律灰色地带</text>
  <text x="610" y="368" fill="#87867f" font-size="9" text-anchor="middle">AI输出是否继承训练数据许可证？无明确判例</text>
  <text x="610" y="400" fill="#d97757" font-size="9" font-weight="700" text-anchor="middle">三个核心要素</text>
  <text x="472" y="420" fill="#87867f" font-size="9" text-anchor="middle">1. 信息隔离 ❓</text>
  <text x="610" y="420" fill="#87867f" font-size="9" text-anchor="middle">2. 独立实现 ❓</text>
  <text x="748" y="420" fill="#87867f" font-size="9" text-anchor="middle">3. 可追溯文档 ❓</text>
  <circle cx="410" cy="270" r="20" fill="#141413"/>
  <text x="410" y="266" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">VS</text>
  <text x="410" y="278" fill="#d1cfc5" font-size="8" text-anchor="middle">对比</text>
  <path fill="#d1cfc5" d="M20 466h780v1H20z"/>
  <text x="410" y="484" fill="#87867f" font-size="10" text-anchor="middle">核心问题：AI没有&quot;接触&quot;代码的概念 — 它从训练数据中学习，但无法证明&quot;没有参考&quot;特定代码</text>
</svg>
