<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="价值流瓶颈分析与优化">
  <title>价值流瓶颈分析与优化</title>
  <desc>展示从需求到用户激活的完整价值流、各阶段效率分析以及瓶颈识别</desc>

  <defs>
    <filter id="sf2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
    <marker id="vArrow" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#D1CFC5"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="30" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#141413">价值流瓶颈分析</text>
  <text x="30" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">从需求提出到用户激活的完整流程 · 灰色 = 等待时间 · 彩色 = 价值增加时间</text>

  <!-- Stage 1: 需求澄清 -->
  <g filter="url(#sf2)">
    <rect x="30" y="70" width="130" height="90" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="95" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">需求澄清</text>
    <text x="95" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Touch: 2h</text>
    <text x="95" y="128" font-family="system-ui,sans-serif" font-size="10" fill="#D97757" text-anchor="middle">Wait: 46h</text>
    <text x="95" y="147" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D97757" text-anchor="middle">4%</text>
  </g>

  <!-- Arrow -->
  <line x1="160" y1="115" x2="185" y2="115" stroke="#D1CFC5" stroke-width="2" marker-end="url(#vArrow)"/>

  <!-- Stage 2: 开发 -->
  <g filter="url(#sf2)">
    <rect x="190" y="70" width="130" height="90" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="255" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">开发</text>
    <text x="255" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#788C5D" text-anchor="middle">Touch: 4h</text>
    <text x="255" y="128" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Wait: 20h</text>
    <text x="255" y="147" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#87867F" text-anchor="middle">17%</text>
  </g>

  <!-- Arrow -->
  <line x1="320" y1="115" x2="345" y2="115" stroke="#D1CFC5" stroke-width="2" marker-end="url(#vArrow)"/>

  <!-- Stage 3: Code Review -->
  <g filter="url(#sf2)">
    <rect x="350" y="70" width="130" height="90" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <rect x="350" y="70" width="130" height="90" rx="8" fill="#D97757" fill-opacity="0.08"/>
    <rect x="350" y="70" width="130" height="5" rx="3" fill="#D97757"/>
    <text x="415" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D97757" text-anchor="middle">Code Review</text>
    <text x="415" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#D97757" text-anchor="middle">⚠ 瓶颈</text>
    <text x="415" y="128" font-family="system-ui,sans-serif" font-size="10" fill="#D97757" text-anchor="middle">Touch: 1h / Wait: 7h</text>
    <text x="415" y="147" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#D97757" text-anchor="middle">13%</text>
  </g>

  <!-- Arrow -->
  <line x1="480" y1="115" x2="505" y2="115" stroke="#D1CFC5" stroke-width="2" marker-end="url(#vArrow)"/>

  <!-- Stage 4: 测试 -->
  <g filter="url(#sf2)">
    <rect x="510" y="70" width="130" height="90" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="575" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">测试</text>
    <text x="575" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Touch: 2h</text>
    <text x="575" y="128" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Wait: 14h</text>
    <text x="575" y="147" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#87867F" text-anchor="middle">13%</text>
  </g>

  <!-- Arrow -->
  <line x1="640" y1="115" x2="665" y2="115" stroke="#D1CFC5" stroke-width="2" marker-end="url(#vArrow)"/>

  <!-- Stage 5: 部署 -->
  <g filter="url(#sf2)">
    <rect x="670" y="70" width="130" height="90" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="735" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">部署</text>
    <text x="735" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Touch: 0.5h</text>
    <text x="735" y="128" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Wait: 3.5h</text>
    <text x="735" y="147" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#87867F" text-anchor="middle">13%</text>
  </g>

  <!-- Arrow -->
  <line x1="800" y1="115" x2="825" y2="115" stroke="#D1CFC5" stroke-width="2" marker-end="url(#vArrow)"/>

  <!-- Stage 6: 用户激活 -->
  <g filter="url(#sf2)">
    <rect x="830" y="70" width="55" height="90" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <text x="857" y="93" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#141413" text-anchor="middle">用户</text>
    <text x="857" y="105" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#141413" text-anchor="middle">激活</text>
    <text x="857" y="128" font-family="system-ui,sans-serif" font-size="9" fill="#87867F" text-anchor="middle">0.5h</text>
    <text x="857" y="147" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#87867F" text-anchor="middle">&lt;1%</text>
  </g>

  <!-- Total -->
  <rect x="30" y="175" width="855" height="2" fill="#E3DACC"/>
  <text x="30" y="195" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413">总周期时间: 172 小时 | 价值增加时间: 10 小时 | 流效率: 5.8% ⚠ (优秀: &gt;15%)</text>

  <!-- Optimization section -->
  <rect x="30" y="210" width="855" height="1" fill="#E3DACC"/>
  <text x="30" y="228" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#141413">瓶颈优化建议</text>

  <!-- Code Review optimization -->
  <g filter="url(#sf2)">
    <rect x="30" y="245" width="410" height="100" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
    <rect x="30" y="245" width="410" height="5" rx="3" fill="#D97757"/>
    <text x="48" y="268" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#D97757">优化 #1: Code Review 等待</text>
    <text x="48" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#141413">当前: 等待 7h → 目标: &lt; 2h</text>
    <text x="48" y="300" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">• 小批量 PR（&lt;200行）</text>
    <text x="48" y="313" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">• Review SLA 4小时轮值</text>
    <text x="48" y="326" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">• AI 预审过滤明显问题</text>
    <text x="48" y="340" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#788C5D">预计提升流效率: +3%</text>
  </g>

  <!-- 需求澄清 optimization -->
  <g filter="url(#sf2)">
    <rect x="455" y="245" width="430" height="100" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
    <rect x="455" y="245" width="430" height="5" rx="3" fill="#788C5D"/>
    <text x="473" y="268" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#788C5D">优化 #2: 需求澄清等待</text>
    <text x="473" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#141413">当前: 等待 46h → 目标: &lt; 10h</text>
    <text x="473" y="300" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">• User Story Pack 标准化</text>
    <text x="473" y="313" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">• AI 自动生成验收标准</text>
    <text x="473" y="326" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">• 需求澄清每日站会</text>
    <text x="473" y="340" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#788C5D">预计提升流效率: +5%</text>
  </g>

  <!-- Kaizen flywheel -->
  <rect x="30" y="360" width="855" height="1" fill="#E3DACC"/>
  <text x="30" y="380" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#141413">持续改进飞轮 (Kaizen)</text>
  <text x="200" y="380" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">识别浪费 → 量化基线 → 设计实验 → 执行改进 → 测量效果 → 标准化 → 重复</text>

  <!-- Flywheel arrows -->
  <g transform="translate(790, 372)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#788C5D" stroke-width="2"/>
    <polygon points="0,-12 5,-4 -5,-4" fill="#788C5D"/>
    <polygon points="12,0 4,5 4,-5" fill="#788C5D"/>
    <polygon points="0,12 -5,4 5,4" fill="#788C5D"/>
    <polygon points="-12,0 -4,-5 -4,5" fill="#788C5D"/>
    <text x="0" y="4" font-family="system-ui,sans-serif" font-size="7" fill="#788C5D" text-anchor="middle" font-weight="700">AI</text>
  </g>
</svg>
