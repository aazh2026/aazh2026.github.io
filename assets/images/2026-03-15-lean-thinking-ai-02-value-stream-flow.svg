y="147" fill="#87867f" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">17%</text></g><path stroke="#d1cfc5" stroke-width="2" marker-end="url(#vArrow)" d="M320 115h25"/><g filter="url(#sf2)"><rect width="130" height="90" x="350" y="70" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/><rect width="130" height="90" x="350" y="70" fill="#d97757" fill-opacity=".08" rx="8"/><rect width="130" height="5" x="350" y="70" fill="#d97757" rx="3"/><text x="415" y="93" fill="#d97757" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Code Review</text><text x="415" y="112" fill="#d97757" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">⚠ 瓶颈</text><text x="415" y="128" fill="#d97757" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Touch: 1h / Wait: 7h</text><text x="415" y="147" fill="#d97757" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">13%</text></g><path stroke="#d1cfc5" stroke-width="2" marker-end="url(#vArrow)" d="M480 115h25"/><g filter="url(#sf2)"><rect width="130" height="90" x="510" y="70" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/><text x="575" y="93" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">测试</text><text x="575" y="112" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Touch: 2h</text><text x="575" y="128" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Wait: 14h</text><text x="575" y="147" fill="#87867f" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">13%</text></g><path stroke="#d1cfc5" stroke-width="2" marker-end="url(#vArrow)" d="M640 115h25"/><g filter="url(#sf2)"><rect width="130" height="90" x="670" y="70" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/><text x="735" y="93" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">部署</text><text x="735" y="112" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Touch: 0.5h</text><text x="735" y="128" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Wait: 3.5h</text><text x="735" y="147" fill="#87867f" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">13%</text></g><path stroke="#d1cfc5" stroke-width="2" marker-end="url(#vArrow)" d="M800 115h25"/><g filter="url(#sf2)"><rect width="55" height="90" x="830" y="70" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/><text x="857" y="93" fill="#141413" font-family="system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">用户</text><text x="857" y="105" fill="#141413" font-family="system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">激活</text><text x="857" y="128" fill="#87867f" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">0.5h</text><text x="857" y="147" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">&lt;1%</text></g><path fill="#e3dacc" d="M30 175h855v2H30z"/><text x="30" y="195" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="700">总周期时间: 172 小时 | 价值增加时间: 10 小时 | 流效率: 5.8% ⚠ (优秀: &gt;15%)</text><path fill="#e3dacc" d="M30 210h855v1H30z"/><text x="30" y="228" fill="#141413" font-family="system-ui,sans-serif" font-size="13" font-weight="700">瓶颈优化建议</text><g filter="url(#sf2)"><rect width="410" height="100" x="30" y="245" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="8"/><rect width="410" height="5" x="30" y="245" fill="#d97757" rx="3"/><text x="48" y="268" fill="#d97757" font-family="system-ui,sans-serif" font-size="11" font-weight="700">优化 #1: Code Review 等待</text><text x="48" y="285" fill="#141413" font-family="system-ui,sans-serif" font-size="9">当前: 等待 7h → 目标: &lt; 2h</text><text x="48" y="300" fill="#87867f" font-family="system-ui,sans-serif" font-size="9">• 小批量 PR（&lt;200行）</text><text x="48" y="313" fill="#87867f" font-family="system-ui,sans-serif" font-size="9">• Review SLA 4小时轮值</text><text x="48" y="326" fill="#87867f" font-family="system-ui,sans-serif" font-size="9">• AI 预审过滤明显问题</text><text x="48" y="340" fill="#788c5d" font-family="system-ui,sans-serif" font-size="10" font-weight="600">预计提升流效率: +3%</text></g><g filter="url(#sf2)"><rect width="430" height="100" x="455" y="245" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/><rect width="430" height="5" x="455" y="245" fill="#788c5d" rx="3"/><text x="473" y="268" fill="#788c5d" font-family="system-ui,sans-serif" font-size="11" font-weight="700">优化 #2: 需求澄清等待</text><text x="473" y="285" fill="#141413" font-family="system-ui,sans-serif" font-size="9">当前: 等待 46h → 目标: &lt; 10h</text><text x="473" y="300" fill="#87867f" font-family="system-ui,sans-serif" font-size="9">• User Story Pack 标准化</text><text x="473" y="313" fill="#87867f" font-family="system-ui,sans-serif" font-size="9">• AI 自动生成验收标准</text><text x="473" y="326" fill="#87867f" font-family="system-ui,sans-serif" font-size="9">• 需求澄清每日站会</text><text x="473" y="340" fill="#788c5d" font-family="system-ui,sans-serif" font-size="10" font-weight="600">预计提升流效率: +5%</text></g><path fill="#e3dacc" d="M30 360h855v1H30z"/><text x="30" y="380" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600">持续改进飞轮 (Kaizen)</text><text x="200" y="380" fill="#87867f" font-family="system-ui,sans-serif" font-size="10">识别浪费 → 量化基线 → 设计实验 → 执行改进 → 测量效果 → 标准化 → 重复</text><g transform="translate(790 372)"><circle r="18" fill="none" stroke="#788c5d" stroke-width="2"/><path fill="#788c5d" d="m0-12 5 8H-5z"/><path fill="#788c5d" d="M12 0 4 5V-5z"/><path fill="#788c5d" d="m0 12-5-8H5z"/><path fill="#788c5d" d="m-12 0 8-5V5z"/><text y="4" fill="#788c5d" font-family="system-ui,sans-serif" font-size="7" font-weight="700" text-anchor="middle">AI</text></g></svg>