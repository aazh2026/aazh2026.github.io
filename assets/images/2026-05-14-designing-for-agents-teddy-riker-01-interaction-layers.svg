  <text x="399" y="434" fill="#d1cfc5" font-family="monospace" font-size="9" text-anchor="middle">Ramp / Notion MCP</text>
  <path stroke="#87867f" stroke-width="2.5" marker-end="url(#arrow)" d="M459 426h50"/>
  <text x="484" y="418" fill="#87867f" font-family="monospace" font-size="9" text-anchor="middle">查询</text>
  <rect width="85" height="42" x="511" y="405" fill="url(#db)" rx="6"/>
