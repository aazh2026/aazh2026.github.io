  <text x="400" y="36" fill="#141413" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">为 Agent 设计：交互模式的演进</text>
  <text x="400" y="56" fill="#87867f" font-family="Georgia, serif" font-size="12" text-anchor="middle">Ramp 产品负责人 Teddy Riker · 双 LLM 协作驱动结果</text>
  <text x="70" y="95" fill="#87867f" font-family="monospace" font-size="11" font-weight="bold">ERA 1</text>
