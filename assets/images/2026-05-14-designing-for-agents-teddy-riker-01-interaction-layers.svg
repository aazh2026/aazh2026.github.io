  <text x="227" y="434" fill="#faf9f5" font-family="monospace" font-size="9" text-anchor="middle">Claude chief of staff</text>
  <path stroke="#788c5d" stroke-width="2.5" marker-end="url(#arrow)" d="M287 426h50"/>
  <text x="312" y="418" fill="#788c5d" font-family="monospace" font-size="9" text-anchor="middle">MCP</text>
