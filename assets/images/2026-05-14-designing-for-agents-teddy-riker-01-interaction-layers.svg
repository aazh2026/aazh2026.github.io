  <text x="280" y="306" fill="#faf9f5" font-family="monospace" font-size="9" text-anchor="middle">Claude / ChatGPT</text>
  <path stroke="#788c5d" stroke-width="2" marker-end="url(#arrow)" d="M330 296h58"/>
