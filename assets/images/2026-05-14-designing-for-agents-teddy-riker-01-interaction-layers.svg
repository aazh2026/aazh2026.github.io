  <text x="553" y="436" fill="#faf9f5" font-family="monospace" font-size="9" text-anchor="middle">DB</text>
  <rect width="165" height="370" x="620" y="95" fill="#141413" rx="8"/>
  <text x="702" y="118" fill="#d97757" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">设计原则</text>
  <path stroke="#3a3a38" d="M632 128h140"/>
  <text x="632" y="148" fill="#faf9f5" font-family="monospace" font-size="10" font-weight="bold">① 直接给到 spec</text>
  <text x="632" y="164" fill="#d1cfc5" font-family="monospace" font-size="9">把文档 spec 在需要</text>
  <text x="632" y="178" fill="#d1cfc5" font-family="monospace" font-size="9">时刻直接交给 Agent</text>
  <text x="632" y="192" fill="#87867f" font-family="monospace" font-size="9">不要让它猜</text>
  <path stroke="#3a3a38" d="M632 204h140"/>
  <text x="632" y="224" fill="#faf9f5" font-family="monospace" font-size="10" font-weight="bold">② 反馈循环</text>
  <text x="632" y="240" fill="#d1cfc5" font-family="monospace" font-size="9">rationale 参数</text>
  <text x="632" y="254" fill="#d1cfc5" font-family="monospace" font-size="9">feedback tool</text>
  <text x="632" y="268" fill="#d1cfc5" font-family="monospace" font-size="9">tool-specific seeds</text>
  <path stroke="#3a3a38" d="M632 280h140"/>
  <text x="632" y="300" fill="#faf9f5" font-family="monospace" font-size="10" font-weight="bold">③ 承认 Context Gap</text>
  <text x="632" y="316" fill="#d1cfc5" font-family="monospace" font-size="9">你的系统有 Agent</text>
  <text x="632" y="330" fill="#d1cfc5" font-family="monospace" font-size="9">没有的 context</text>
  <text x="632" y="344" fill="#d1cfc5" font-family="monospace" font-size="9">设计时要承认</text>
  <text x="632" y="358" fill="#d1cfc5" font-family="monospace" font-size="9">这一点</text>
  <path stroke="#3a3a38" d="M632 370h140"/>
  <text x="632" y="390" fill="#d97757" font-family="monospace" font-size="10" font-weight="bold">80/20 已翻转</text>
  <text x="632" y="406" fill="#d1cfc5" font-family="monospace" font-size="9">新 80% 交互</text>
  <text x="632" y="420" fill="#d1cfc5" font-family="monospace" font-size="9">通过 Agent 完成</text>
  <text x="632" y="438" fill="#87867f" font-family="monospace" font-size="9">Salesforce:</text>
  <text x="632" y="452" fill="#87867f" font-family="monospace" font-size="9">Headless 360</text>
  <text x="400" y="498" fill="#87867f" font-family="monospace" font-size="10" text-anchor="middle">数据来源：Teddy Riker (Ramp) · X / @teddy_riker · 751K views</text>
