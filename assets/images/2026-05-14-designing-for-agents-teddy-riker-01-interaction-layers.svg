<svg xmlns="http://www.w3.org/2000/svg" aria-label="Agent 交互模式演进" viewBox="0 0 800 520">
  <title>为 Agent 设计：交互模式演进</title>
  <desc>
    从 User→Interface→Database 到 User→User&apos;s Agent→Software&apos;s Agent→Database 的双 LLM 协作新模式
  </desc>
  <defs>
    <linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <linearGradient id="user" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#b85a3f"/>
