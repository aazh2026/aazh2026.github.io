<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <path fill="#faf9f5" d="M0 0h900v560H0z"/>
  <text x="450" y="42" fill="#141413" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">AI-First 测试三层模型</text>
  <rect width="800" height="130" x="50" y="70" fill="#d97757" fill-opacity=".15" stroke="#d97757" stroke-width="2" rx="12"/>
  <text x="110" y="102" fill="#d97757" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">1</text>
  <text x="180" y="100" fill="#141413" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">意图层 (Intent Layer)</text>
  <text x="180" y="120" fill="#87867f" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">描述 · 维护者：人类</text>
  <rect width="550" height="100" x="280" y="85" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="555" y="115" fill="#141413" font-family="Georgia, serif" font-size="13" font-style="italic" text-anchor="middle">&quot;当用户未登录时，访问 /dashboard 应该重定向到 /login&quot;</text>
  <text x="555" y="140" fill="#87867f" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">自然语言描述期望的行为</text>
  <rect width="200" height="22" x="350" y="155" fill="#141413" rx="3"/>
  <text x="450" y="171" fill="#faf9f5" font-family="Courier, monospace" font-size="10" text-anchor="middle">user-registration.intent.yml</text>
  <path fill="none" stroke="#87867f" stroke-width="2.5" d="M450 205v30m-10-10 10 10 10-10"/>
  <text x="475" y="228" fill="#87867f" font-family="Arial, sans-serif" font-size="11">AI 扩展</text>
  <rect width="800" height="130" x="50" y="240" fill="#788c5d" fill-opacity=".15" stroke="#788c5d" stroke-width="2" rx="12"/>
  <text x="110" y="272" fill="#788c5d" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">2</text>
  <text x="180" y="270" fill="#141413" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">场景层 (Scenario Layer)</text>
  <text x="180" y="290" fill="#87867f" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">扩展 · 生成者：AI</text>
  <rect width="160" height="45" x="280" y="255" fill="#faf9f5" stroke="#788c5d" rx="6"/>
  <text x="360" y="283" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">完全未登录用户</text>
  <rect width="160" height="45" x="455" y="255" fill="#faf9f5" stroke="#788c5d" rx="6"/>
  <text x="535" y="283" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">登录但 token 过期</text>
  <rect width="200" height="45" x="630" y="255" fill="#faf9f5" stroke="#788c5d" rx="6"/>
  <text x="730" y="283" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">登录但权限不足</text>
  <rect width="550" height="45" x="280" y="310" fill="#faf9f5" stroke="#788c5d" rx="6"/>
  <text x="555" y="338" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">并发注册场景 (AI 自动识别的高价值边界条件)</text>
  <path fill="none" stroke="#87867f" stroke-width="2.5" d="M450 375v30m-10-10 10 10 10-10"/>
  <text x="475" y="398" fill="#87867f" font-family="Arial, sans-serif" font-size="11">AI 生成</text>
  <rect width="800" height="130" x="50" y="410" fill="#141413" fill-opacity=".08" stroke="#141413" stroke-width="2" rx="12"/>
  <text x="110" y="442" fill="#141413" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">3</text>
  <text x="180" y="440" fill="#141413" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">验证层 (Verification Layer)</text>
  <text x="180" y="460" fill="#87867f" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">代码生成 · 生成者：AI · 审查者：人类</text>
  <rect width="550" height="100" x="280" y="425" fill="#141413" rx="8"/>
  <text x="300" y="450" fill="#faf9f5" font-family="Courier, monospace" font-size="11">test(&apos;redirects to login when not authenticated&apos;, () =&gt; {</text>
  <text x="300" y="468" fill="#faf9f5" font-family="Courier, monospace" font-size="11">  const req = { session: null, path: &apos;/dashboard&apos; };</text>
  <text x="300" y="486" fill="#faf9f5" font-family="Courier, monospace" font-size="11">  const res = mockResponse();</text>
  <text x="300" y="504" fill="#788c5d" font-family="Courier, monospace" font-size="11">  expect(authMiddleware(req, res)).to.redirectTo(&apos;/login&apos;);</text>
  <text x="300" y="522" fill="#faf9f5" font-family="Courier, monospace" font-size="11">});</text>
  <rect width="800" height="30" x="50" y="20" fill="#d97757" fill-opacity=".2" rx="4"/>
  <text x="450" y="40" fill="#141413" font-family="Georgia, serif" font-size="12" font-style="italic" text-anchor="middle">人类定义意图，AI 生成验证 —— 测试的本质从未改变</text>
</svg>
