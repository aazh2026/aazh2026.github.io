<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Background -->
  <rect width="720" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#141413">CCC模型：PRD结构化的三支柱</text>
  <text x="360" y="54" text-anchor="middle" font-size="12" fill="#87867F">Context · Constraints · Criteria — 从叙述需求到定义规格</text>

  <!-- Center: PRD as Spec -->
  <circle cx="360" cy="200" r="50" fill="#141413"/>
  <text x="360" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">结构化</text>
  <text x="360" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">PRD</text>
  <text x="360" y="220" text-anchor="middle" font-size="9" fill="#D1CFC5">可执行语义规格</text>

  <!-- Context box -->
  <rect x="30" y="100" width="190" height="180" rx="10" fill="#E3DACC" stroke="#D97757" stroke-width="2.5"/>
  <rect x="30" y="100" width="190" height="34" rx="10" fill="#D97757"/>
  <rect x="30" y="120" width="190" height="14" fill="#D97757"/> <!-- square bottom of header -->
  <text x="125" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">Context</text>
  <text x="125" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">上下文</text>
  <text x="42" y="155" font-size="10" fill="#141413" font-weight="600">回答：</text>
  <text x="42" y="168" font-size="10" fill="#87867F">我们在什么环境下</text>
  <text x="42" y="181" font-size="10" fill="#87867F">解决这个问题？</text>
  <line x1="42" y1="193" x2="208" y2="193" stroke="#D1CFC5" stroke-width="1"/>
  <text x="42" y="208" font-size="9" fill="#141413">• 用户角色与权限</text>
  <text x="42" y="222" font-size="9" fill="#141413">• 业务领域与约束</text>
  <text x="42" y="236" font-size="9" fill="#141413">• 依赖服务版本</text>
  <text x="42" y="250" font-size="9" fill="#141413">• 峰值流量假设</text>
  <text x="42" y="264" font-size="9" fill="#141413">• 法规合规要求</text>

  <!-- Constraints box -->
  <rect x="265" y="100" width="190" height="180" rx="10" fill="#E3DACC" stroke="#788C5D" stroke-width="2.5"/>
  <rect x="265" y="100" width="190" height="34" rx="10" fill="#788C5D"/>
  <rect x="265" y="120" width="190" height="14" fill="#788C5D"/>
  <text x="360" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">Constraints</text>
  <text x="360" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">约束条件</text>
  <text x="277" y="155" font-size="10" fill="#141413" font-weight="600">回答：</text>
  <text x="277" y="168" font-size="10" fill="#87867F">什么能做，什么不能做？</text>
  <line x1="277" y1="181" x2="443" y2="181" stroke="#D1CFC5" stroke-width="1"/>
  <text x="277" y="196" font-size="9" fill="#141413">• 性能约束（延迟、QPS）</text>
  <text x="277" y="210" font-size="9" fill="#141413">• 安全约束（加密、审计）</text>
  <text x="277" y="224" font-size="9" fill="#141413">• 兼容性约束</text>
  <text x="277" y="238" font-size="9" fill="#141413">• 数据隔离要求</text>
  <text x="277" y="252" font-size="9" fill="#141413">• 合规性要求</text>
  <text x="277" y="266" font-size="9" fill="#141413">• 成本限制</text>

  <!-- Criteria box -->
  <rect x="500" y="100" width="190" height="180" rx="10" fill="#E3DACC" stroke="#D97757" stroke-width="2.5"/>
  <rect x="500" y="100" width="190" height="34" rx="10" fill="#D97757"/>
  <rect x="500" y="120" width="190" height="14" fill="#D97757"/>
  <text x="595" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">Criteria</text>
  <text x="595" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">验收标准</text>
  <text x="512" y="155" font-size="10" fill="#141413" font-weight="600">回答：</text>
  <text x="512" y="168" font-size="10" fill="#87867F">如何判断"完成了"？</text>
  <line x1="512" y1="181" x2="678" y2="181" stroke="#D1CFC5" stroke-width="1"/>
  <text x="512" y="196" font-size="9" fill="#141413">• Given-When-Then 场景</text>
  <text x="512" y="210" font-size="9" fill="#141413">• 可自动化测试的断言</text>
  <text x="512" y="224" font-size="9" fill="#141413">• 性能基准测试</text>
  <text x="512" y="238" font-size="9" fill="#141413">• 异常场景覆盖</text>
  <text x="512" y="252" font-size="9" fill="#141413">• 可验证的度量指标</text>

  <!-- Connecting lines to center -->
  <path d="M220,190 L308,190" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M412,190 L480,200" stroke="#788C5D" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M690,190 L412,200" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arr)" marker-start="url(#arr2)"/>

  <!-- Output arrow -->
  <path d="M360,254 L360,290" stroke="#141413" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Output: 可执行规格 -->
  <rect x="250" y="300" width="220" height="60" rx="8" fill="#141413"/>
  <text x="360" y="324" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">可执行的语义规格说明</text>
  <text x="360" y="342" text-anchor="middle" font-size="10" fill="#D1CFC5">机器可读 · 语义明确 · 可验证 · 可追踪</text>

  <!-- Side labels -->
  <text x="125" y="300" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">环境定义</text>
  <text x="360" y="300" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">核心转换</text>
  <text x="595" y="300" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">完成定义</text>
</svg>