<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- CCC Model: Context-Constraints-Criteria -->
  <rect width="560" height="220" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">CCC 模型：PRD as Code 的核心框架</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/02/16</text>

  <!-- Three pillars arranged horizontally -->

  <!-- C1: Context (left) -->
  <rect x="20" y="52" width="165" height="148" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="20" y="52" width="165" height="28" rx="8" fill="#FEF3C7" stroke="#D97757" stroke-width="1.5"/>
  <text x="102" y="71" text-anchor="middle" font-size="11" fill="#D97757" font-weight="700">Context</text>
  <text x="102" y="87" text-anchor="middle" font-size="9" fill="#87867F">在什么环境下</text>
  <line x1="30" y1="96" x2="175" y2="96" stroke="#D1CFC5" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="35" y="112" font-size="9.5" fill="#141413">· 用户角色</text>
  <text x="35" y="126" font-size="9.5" fill="#141413">· 业务规则</text>
  <text x="35" y="140" font-size="9.5" fill="#141413">· 系统边界</text>
  <text x="35" y="154" font-size="9.5" fill="#141413">· 依赖关系</text>
  <text x="35" y="176" font-size="9" fill="#87867F">PRD 中的 context 字段</text>

  <!-- Arrows between pillars -->
  <line x1="190" y1="126" x2="218" y2="126" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="218,122 212,126 218,130" fill="#D1CFC5"/>
  <text x="204" y="120" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">+约束</text>

  <!-- C2: Constraints (center) -->
  <rect x="223" y="52" width="165" height="148" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.8"/>
  <rect x="223" y="52" width="165" height="28" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="305" y="71" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="700">Constraints</text>
  <text x="305" y="87" text-anchor="middle" font-size="9" fill="#87867F">边界是什么</text>
  <line x1="233" y1="96" x2="378" y2="96" stroke="#D1CFC5" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="238" y="112" font-size="9.5" fill="#141413">· 性能约束</text>
  <text x="238" y="126" font-size="9.5" fill="#141413">· 安全约束</text>
  <text x="238" y="140" font-size="9.5" fill="#141413">· 兼容性约束</text>
  <text x="238" y="154" font-size="9.5" fill="#141413">· 合规约束</text>
  <text x="238" y="176" font-size="9" fill="#87867F">PRD 中的 constraints 字段</text>

  <!-- Arrow C2 → C3 -->
  <line x1="393" y1="126" x2="421" y2="126" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="421,122 415,126 421,130" fill="#D1CFC5"/>
  <text x="407" y="120" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">+标准</text>

  <!-- C3: Criteria (right) -->
  <rect x="426" y="52" width="115" height="148" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.8"/>
  <rect x="426" y="52" width="115" height="28" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="483" y="71" text-anchor="middle" font-size="11" fill="#059669" font-weight="700">Criteria</text>
  <text x="483" y="87" text-anchor="middle" font-size="9" fill="#87867F">怎样算完成</text>
  <line x1="436" y1="96" x2="531" y2="96" stroke="#D1CFC5" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="441" y="112" font-size="9.5" fill="#141413">· Given-When</text>
  <text x="441" y="126" font-size="9.5" fill="#141413">· Then 断言</text>
  <text x="441" y="140" font-size="9.5" fill="#141413">· 自动化测试</text>
  <text x="441" y="154" font-size="9.5" fill="#141413">· 可追溯</text>
  <text x="441" y="176" font-size="9" fill="#87867F">PRD 中的 acceptance</text>
  <text x="441" y="186" font-size="9" fill="#87867F">字段</text>

  <!-- Bottom note -->
  <text x="280" y="210" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">三要素缺一不可：Context 定义前提，Constraints 限制范围，Criteria 定义完成标准</text>
</svg>