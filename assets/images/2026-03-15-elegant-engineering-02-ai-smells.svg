<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 620 360">
  <path fill="#faf9f5" d="M0 0h620v360H0z"/>
  <text x="310" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">AI 代码的「气味」：机器 vs 人类</text>
  <text x="310" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">左：LLM 生成的「合理」代码 · 右：人类书写的优雅代码</text>
  <path stroke="#d1cfc5" stroke-dasharray="6,4" d="M310 58v282"/>
  <rect width="270" height="282" x="20" y="58" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="155" y="80" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">LLM 生成的代码</text>
  <text x="155" y="96" fill="#87867f" font-size="10" text-anchor="middle">总是合理，很少优雅</text>
  <rect width="238" height="26" x="36" y="110" fill="#fdf5f3" stroke="#d97757" opacity=".8" rx="5"/>
  <text x="46" y="127" fill="#141413" font-size="10.5">① 过度注释 # Initialize counter to 0</text>
  <rect width="238" height="26" x="36" y="142" fill="#fdf5f3" stroke="#d97757" opacity=".8" rx="5"/>
  <text x="46" y="159" fill="#141413" font-size="10.5">② 命名不一致 get_user / fetchUser</text>
  <rect width="238" height="26" x="36" y="174" fill="#fdf5f3" stroke="#d97757" opacity=".8" rx="5"/>
  <text x="46" y="191" fill="#141413" font-size="10.5">③ 参数膨胀 10+ 参数的函数</text>
  <rect width="238" height="26" x="36" y="206" fill="#fdf5f3" stroke="#d97757" opacity=".8" rx="5"/>
  <text x="46" y="223" fill="#141413" font-size="10.5">④ 嵌套地狱 5 层 if/for 嵌套</text>
  <rect width="238" height="26" x="36" y="238" fill="#fdf5f3" stroke="#d97757" opacity=".8" rx="5"/>
  <text x="46" y="255" fill="#141413" font-size="10.5">⑤ 重复代码 copy-paste 逻辑</text>
  <rect width="238" height="26" x="36" y="270" fill="#fdf5f3" stroke="#d97757" opacity=".8" rx="5"/>
  <text x="46" y="287" fill="#141413" font-size="10.5">⑥ 异常滥用 用异常处理正常流程</text>
  <path fill="#d97757" d="M268 116v16l12-8zm0 32v16l12-8zm0 32v16l12-8zm0 32v16l12-8zm0 32v16l12-8zm0 32v16l12-8z" opacity=".7"/>
  <rect width="270" height="282" x="330" y="58" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="465" y="80" fill="#788c5d" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">人类书写的代码</text>
  <text x="465" y="96" fill="#87867f" font-size="10" text-anchor="middle">约束前置，信任类型系统</text>
  <rect width="238" height="120" x="346" y="116" fill="#f7f9f4" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="358" y="138" fill="#141413" font-family="ui-monospace, monospace" font-size="11">def get_user(uid: str) -&gt; User:</text>
  <text x="358" y="154" fill="#141413" font-family="ui-monospace, monospace" font-size="11">    &quot;&quot;&quot;Fetch user by ID.&quot;&quot;&quot;</text>
  <text x="358" y="170" fill="#141413" font-family="ui-monospace, monospace" font-size="11">    return db.query(User).filter(</text>
  <text x="358" y="186" fill="#141413" font-family="ui-monospace, monospace" font-size="11">        User.id == uid).first()</text>
  <text x="358" y="202" fill="#87867f" font-family="ui-monospace, monospace" font-size="11">    # 边界处验证</text>
  <text x="358" y="218" fill="#141413" font-family="ui-monospace, monospace" font-size="11">    or raise NotFoundError(uid)</text>
  <path stroke="#788c5d" stroke-width="1.5" d="M465 248v12"/>
  <path fill="#788c5d" d="m465 264-4-8h8z"/>
  <rect width="138" height="28" x="396" y="270" fill="#788c5d" rx="14"/>
  <text x="465" y="289" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">清晰 · 克制 · 意图明确</text>
  <circle cx="352" cy="306" r="8" fill="#788c5d" opacity=".8"/>
  <text x="352" y="310" fill="#fff" font-size="9" text-anchor="middle">✓</text>
  <circle cx="406" cy="306" r="8" fill="#788c5d" opacity=".8"/>
  <text x="406" y="310" fill="#fff" font-size="9" text-anchor="middle">✓</text>
  <circle cx="460" cy="306" r="8" fill="#788c5d" opacity=".8"/>
  <text x="460" y="310" fill="#fff" font-size="9" text-anchor="middle">✓</text>
</svg>
