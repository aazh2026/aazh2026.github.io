<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560"><path fill="#faf9f5" d="M0 0h420v560H0z"/><style>text{font-family:&quot;SF Mono&quot;,&quot;Cascadia Code&quot;,&quot;Fira Code&quot;,monospace;font-size:12px}.divider{stroke:#d1cfc5;stroke-width:1}.agent-text,text{fill:#141413}.user-text{fill:#87867f}.button{fill:#e3dacc;stroke:#d1cfc5;stroke-width:1;rx:4}.button-text{font-size:11px;fill:#141413}</style><rect width="380" height="520" x="20" y="20" rx="8" style="fill:none;stroke:#141413;stroke-width:1.5"/><rect width="380" height="40" x="20" y="20" fill="#141413" rx="8"/><path fill="#141413" d="M20 44h380v16H20z"/><text x="36" y="45" fill="#faf9f5" font-size="13" font-weight="bold">💬 Agent Assistant</text><path d="M20 60h380" class="divider"/><text x="36" y="100" class="agent-text">Agent: 你好！我是你的销售</text><text x="36" y="116" class="agent-text">助手。今天需要我做什么？</text><path stroke="#d1cfc5" stroke-dasharray="4,4" d="M36 150h348"/><text x="36" y="180" class="user-text">User: 帮我看看这周要跟进</text><text x="36" y="196" class="user-text">的客户</text><text x="36" y="230" class="agent-text">Agent: 找到 5 个客户需要</text><text x="36" y="246" class="agent-text">跟进：</text><text x="36" y="270" class="agent-text">1. Acme Corp - 合同待签</text><text x="36" y="290" class="agent-text">2. ...</text><rect width="130" height="28" x="36" y="340" class="button" rx="6"/><text x="101" y="358" class="button-text" text-anchor="middle">帮我起草邮件</text><rect width="110" height="28" x="176" y="340" class="button" rx="6"/><text x="231" y="358" class="button-text" text-anchor="middle">安排会议</text><path d="M20 420h380" class="divider"/><rect width="290" height="36" x="36" y="440" rx="6" style="fill:#e3dacc;stroke:#d1cfc5;stroke-width:1;rx:6"/><text x="52" y="463" style="fill:#d1cfc5">输入消息...</text><rect width="52" height="36" x="336" y="440" fill="#788c5d" rx="6"/><text x="362" y="463" fill="#faf9f5" font-weight="bold" text-anchor="middle">发送</text></svg>