<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>Prompt-driven vs Pipeline-gated</title>
  <desc>A two-panel comparison showing how prompt-driven AI coding is unsafe while pipeline-gated AI coding enforces security controls</desc>

  <!-- Background -->
  <rect width="680" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">告诉 AI 要安全，不等于强制它安全</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Prompt 可以被覆盖 · Pipeline 门控不可绕过</text>

  <!-- LEFT PANEL: Prompt-driven -->
  <rect x="20" y="62" width="310" height="250" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="175" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">Prompt-driven</text>

  <!-- Human icon left -->
  <circle cx="60" cy="130" r="14" fill="#D1CFC5"/>
  <circle cx="60" cy="122" r="6" fill="#87867F"/>
  <path d="M46 144 Q60 134 74 144" stroke="#87867F" stroke-width="2" fill="none"/>

  <!-- Speech bubble -->
  <rect x="82" y="112" width="80" height="28" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="122" y="130" text-anchor="middle" font-size="10" fill="#141413">要安全！</text>

  <!-- Arrow to AI agent -->
  <line x1="60" y1="160" x2="60" y2="185" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="60,189 56,181 64,181" fill="#D1CFC5"/>

  <!-- AI Agent left -->
  <rect x="30" y="193" width="60" height="36" rx="6" fill="#87867F"/>
  <text x="60" y="216" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="500">AI Agent</text>

  <!-- Arrow to output -->
  <line x1="90" y1="211" x2="120" y2="211" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="124,211 116,207 116,215" fill="#D1CFC5"/>

  <!-- Unchecked code output with question mark -->
  <rect x="128" y="177" width="80" height="68" rx="6" fill="#FFFFFF" stroke="#87867F" stroke-width="1.5"/>
  <text x="168" y="198" text-anchor="middle" font-size="10" fill="#141413">未检查代码</text>
  <text x="168" y="214" text-anchor="middle" font-size="16" fill="#87867F">?</text>
  <text x="168" y="232" text-anchor="middle" font-size="9" fill="#87867F">secret 暴露</text>
  <text x="168" y="244" text-anchor="middle" font-size="9" fill="#87867F">过度权限</text>

  <!-- X mark -->
  <circle cx="220" cy="211" r="18" fill="none" stroke="#D97757" stroke-width="2"/>
  <line x1="208" y1="199" x2="232" y2="223" stroke="#D97757" stroke-width="2"/>
  <line x1="232" y1="199" x2="208" y2="223" stroke="#D97757" stroke-width="2"/>

  <!-- RIGHT PANEL: Pipeline-gated -->
  <rect x="350" y="62" width="310" height="250" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="505" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Pipeline-gated</text>

  <!-- Human icon right -->
  <circle cx="390" cy="130" r="14" fill="#D1CFC5"/>
  <circle cx="390" cy="122" r="6" fill="#87867F"/>
  <path d="M376 144 Q390 134 404 144" stroke="#87867F" stroke-width="2" fill="none"/>

  <!-- Speech bubble right -->
  <rect x="412" y="112" width="80" height="28" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="452" y="130" text-anchor="middle" font-size="10" fill="#141413">要安全！</text>

  <!-- Arrow to pipeline -->
  <line x1="390" y1="160" x2="390" y2="185" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="390,189 386,181 394,181" fill="#D1CFC5"/>

  <!-- Pipeline box -->
  <rect x="355" y="193" width="200" height="100" rx="6" fill="#F0EEE6" stroke="#D97757" stroke-width="1.5"/>

  <!-- Gate 1: SAST -->
  <rect x="363" y="201" width="56" height="28" rx="4" fill="#D97757"/>
  <text x="391" y="219" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="500">SAST</text>

  <!-- Gate 2: Secret scan -->
  <rect x="427" y="201" width="56" height="28" rx="4" fill="#D97757"/>
  <text x="455" y="219" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="500">Secret Scan</text>

  <!-- Gate 3: Permission check -->
  <rect x="363" y="237" width="120" height="28" rx="4" fill="#D97757"/>
  <text x="423" y="255" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="500">Permission Check</text>

  <!-- Arrow from pipeline to AI Agent -->
  <line x1="505" y1="293" x2="505" y2="312" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="505,316 501,308 509,308" fill="#D97757"/>

  <!-- AI Agent right -->
  <rect x="475" y="198" width="60" height="36" rx="6" fill="#788C5D"/>
  <text x="505" y="221" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="500">AI Agent</text>

  <!-- Arrow to safe output -->
  <line x1="535" y1="216" x2="570" y2="216" stroke="#788C5D" stroke-width="2"/>
  <polygon points="574,216 566,212 566,220" fill="#788C5D"/>

  <!-- Safe code output with checkmark -->
  <rect x="578" y="182" width="70" height="68" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="613" y="203" text-anchor="middle" font-size="10" fill="#141413">安全代码</text>
  <text x="613" y="223" text-anchor="middle" font-size="18" fill="#788C5D">✓</text>
  <text x="613" y="241" text-anchor="middle" font-size="9" fill="#788C5D">通过门控</text>

  <!-- Divider arrow between panels -->
  <line x1="338" y1="187" x2="344" y2="187" stroke="#D97757" stroke-width="2"/>
  <polygon points="342,183 348,187 342,191" fill="#D97757"/>

  <!-- Bottom labels -->
  <text x="175" y="328" text-anchor="middle" font-size="10" fill="#87867F">阻力最小路径 · 可绕过</text>
  <text x="505" y="328" text-anchor="middle" font-size="10" fill="#D97757" font-weight="500">确定性门控 · 不可绕过</text>
</svg>
