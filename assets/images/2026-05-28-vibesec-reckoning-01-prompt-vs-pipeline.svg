<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 340">
  <title>Prompt-driven vs Pipeline-gated</title>
  <desc>
    A two-panel comparison showing how prompt-driven AI coding is unsafe while pipeline-gated AI coding enforces security controls
  </desc>
  <path fill="#faf9f5" d="M0 0h680v340H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">告诉 AI 要安全，不等于强制它安全</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Prompt 可以被覆盖 · Pipeline 门控不可绕过</text>
  <rect width="310" height="250" x="20" y="62" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="175" y="86" fill="#87867f" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Prompt-driven</text>
  <circle cx="60" cy="130" r="14" fill="#d1cfc5"/>
  <circle cx="60" cy="122" r="6" fill="#87867f"/>
  <path fill="none" stroke="#87867f" stroke-width="2" d="M46 144q14-10 28 0"/>
  <rect width="80" height="28" x="82" y="112" fill="#f0eee6" stroke="#d1cfc5" rx="6"/>
  <text x="122" y="130" fill="#141413" font-size="10" text-anchor="middle">要安全！</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M60 160v25"/>
  <path fill="#d1cfc5" d="m60 189-4-8h8z"/>
  <rect width="60" height="36" x="30" y="193" fill="#87867f" rx="6"/>
  <text x="60" y="216" fill="#fff" font-size="11" font-weight="500" text-anchor="middle">AI Agent</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M90 211h30"/>
  <path fill="#d1cfc5" d="m124 211-8-4v8z"/>
  <rect width="80" height="68" x="128" y="177" fill="#fff" stroke="#87867f" stroke-width="1.5" rx="6"/>
  <text x="168" y="198" fill="#141413" font-size="10" text-anchor="middle">未检查代码</text>
  <text x="168" y="214" fill="#87867f" font-size="16" text-anchor="middle">?</text>
  <text x="168" y="232" fill="#87867f" font-size="9" text-anchor="middle">secret 暴露</text>
  <text x="168" y="244" fill="#87867f" font-size="9" text-anchor="middle">过度权限</text>
  <circle cx="220" cy="211" r="18" fill="none" stroke="#d97757" stroke-width="2"/>
  <path stroke="#d97757" stroke-width="2" d="m208 199 24 24m0-24-24 24"/>
  <rect width="310" height="250" x="350" y="62" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="505" y="86" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Pipeline-gated</text>
  <circle cx="390" cy="130" r="14" fill="#d1cfc5"/>
  <circle cx="390" cy="122" r="6" fill="#87867f"/>
  <path fill="none" stroke="#87867f" stroke-width="2" d="M376 144q14-10 28 0"/>
  <rect width="80" height="28" x="412" y="112" fill="#f0eee6" stroke="#d1cfc5" rx="6"/>
  <text x="452" y="130" fill="#141413" font-size="10" text-anchor="middle">要安全！</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M390 160v25"/>
  <path fill="#d1cfc5" d="m390 189-4-8h8z"/>
  <rect width="200" height="100" x="355" y="193" fill="#f0eee6" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <rect width="56" height="28" x="363" y="201" fill="#d97757" rx="4"/>
  <text x="391" y="219" fill="#fff" font-size="9" font-weight="500" text-anchor="middle">SAST</text>
  <rect width="56" height="28" x="427" y="201" fill="#d97757" rx="4"/>
  <text x="455" y="219" fill="#fff" font-size="9" font-weight="500" text-anchor="middle">Secret Scan</text>
  <rect width="120" height="28" x="363" y="237" fill="#d97757" rx="4"/>
  <text x="423" y="255" fill="#fff" font-size="9" font-weight="500" text-anchor="middle">Permission Check</text>
  <path stroke="#d97757" stroke-width="1.5" d="M505 293v19"/>
  <path fill="#d97757" d="m505 316-4-8h8z"/>
  <rect width="60" height="36" x="475" y="198" fill="#788c5d" rx="6"/>
  <text x="505" y="221" fill="#fff" font-size="11" font-weight="500" text-anchor="middle">AI Agent</text>
  <path stroke="#788c5d" stroke-width="2" d="M535 216h35"/>
  <path fill="#788c5d" d="m574 216-8-4v8z"/>
  <rect width="70" height="68" x="578" y="182" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="613" y="203" fill="#141413" font-size="10" text-anchor="middle">安全代码</text>
  <text x="613" y="223" fill="#788c5d" font-size="18" text-anchor="middle">✓</text>
  <text x="613" y="241" fill="#788c5d" font-size="9" text-anchor="middle">通过门控</text>
  <path stroke="#d97757" stroke-width="2" d="M338 187h6"/>
  <path fill="#d97757" d="m342 183 6 4-6 4z"/>
  <text x="175" y="328" fill="#87867f" font-size="10" text-anchor="middle">阻力最小路径 · 可绕过</text>
  <text x="505" y="328" fill="#d97757" font-size="10" font-weight="500" text-anchor="middle">确定性门控 · 不可绕过</text>
</svg>
