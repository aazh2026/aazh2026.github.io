<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="640" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">详细设计分层模型</text>
  <text x="320" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Intent-Driven · AI-Native SDLC</text>

  <!-- Layer 1: Intent-Driven (80%) -->
  <rect x="40" y="60" width="560" height="100" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="40" y="60" width="40" height="100" rx="8" fill="#D97757" opacity="0.12"/>
  <text x="56" y="85" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Layer 1</text>
  <text x="56" y="102" font-size="13" fill="#D97757" font-weight="600">Intent-Driven（80% 的需求）</text>
  <text x="56" y="120" font-size="10.5" fill="#87867F">常规业务功能 · CRUD · 标准流程</text>
  <!-- Three elements -->
  <rect x="140" y="84" width="110" height="56" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="195" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Intent</text>
  <text x="195" y="118" text-anchor="middle" font-size="9" fill="#141413">意图</text>
  <text x="195" y="132" text-anchor="middle" font-size="8.5" fill="#87867F">为什么要做</text>

  <rect x="265" y="84" width="110" height="56" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="320" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Constraints</text>
  <text x="320" y="118" text-anchor="middle" font-size="9" fill="#141413">约束</text>
  <text x="320" y="132" text-anchor="middle" font-size="8.5" fill="#87867F">边界 · 不能做的事</text>

  <rect x="390" y="84" width="110" height="56" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="445" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Examples</text>
  <text x="445" y="118" text-anchor="middle" font-size="9" fill="#141413">示例</text>
  <text x="445" y="132" text-anchor="middle" font-size="8.5" fill="#87867F">3-5 个高质量例子</text>

  <!-- Arrow down -->
  <line x1="320" y1="160" x2="320" y2="178" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="320,182 316,174 324,174" fill="#D1CFC5"/>
  <text x="320" y="194" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">按需选择详细程度</text>

  <!-- Layer 2: Structured Design (15%) -->
  <rect x="40" y="202" width="560" height="82" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="202" width="40" height="82" rx="8" fill="#788C5D" opacity="0.10"/>
  <text x="56" y="227" font-size="11" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">Layer 2</text>
  <text x="56" y="244" font-size="13" fill="#141413" font-weight="600">Structured Design（15% 的需求）</text>
  <text x="56" y="262" font-size="10.5" fill="#87867F">复杂业务逻辑 · 跨模块交互 · 性能敏感功能</text>
  <!-- Architecture icon -->
  <rect x="500" y="218" width="80" height="50" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="510" y="228" width="24" height="14" rx="3" fill="#788C5D" opacity="0.25"/>
  <rect x="546" y="228" width="24" height="14" rx="3" fill="#788C5D" opacity="0.25"/>
  <line x1="522" y1="242" x2="546" y2="242" stroke="#788C5D" stroke-width="1.5"/>
  <rect x="520" y="248" width="30" height="10" rx="3" fill="#788C5D" opacity="0.25"/>

  <!-- Arrow down -->
  <line x1="320" y1="284" x2="320" y2="298" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="320,302 316,294 324,294" fill="#D1CFC5"/>

  <!-- Layer 3: Detailed Design (5%) -->
  <rect x="40" y="310" width="560" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="310" width="40" height="72" rx="8" fill="#141413" opacity="0.06"/>
  <text x="56" y="335" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Layer 3</text>
  <text x="56" y="352" font-size="13" fill="#141413" font-weight="600">Detailed Design（5% 的需求）</text>
  <text x="56" y="370" font-size="10.5" fill="#87867F">核心算法 · 安全关键 · 架构级变更</text>
  <!-- Document icon -->
  <rect x="516" y="322" width="64" height="48" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="526" y1="334" x2="566" y2="334" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="526" y1="342" x2="566" y2="342" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="526" y1="350" x2="556" y2="350" stroke="#D1CFC5" stroke-width="1.2"/>
  <line x1="526" y1="358" x2="562" y2="358" stroke="#D1CFC5" stroke-width="1.2"/>

  <!-- Percentage labels on right -->
  <text x="610" y="112" text-anchor="end" font-size="22" font-weight="700" fill="#D97757" font-family="ui-monospace, monospace">80%</text>
  <text x="610" y="244" text-anchor="end" font-size="22" font-weight="700" fill="#788C5D" font-family="ui-monospace, monospace">15%</text>
  <text x="610" y="348" text-anchor="end" font-size="22" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">5%</text>

  <!-- Accessibility -->
  <title>详细设计分层模型</title>
  <desc>三层堆叠图：Layer 1 Intent-Driven（80%）、Layer 2 Structured Design（15%）、Layer 3 Detailed Design（5%），展示 AI-Native 时代详细设计的分层选择</desc>
</svg>