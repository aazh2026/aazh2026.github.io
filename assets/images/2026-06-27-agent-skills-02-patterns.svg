<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 640 160">
  <path fill="#faf9f5" d="M0 0h640v160H0z"/>
  <text x="320" y="18" fill="#141413" font-size="12" font-weight="500" letter-spacing="-.02em" text-anchor="middle">SKILL.md 五种内容设计模式</text>
  <rect width="112" height="90" x="12" y="34" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="68" y="54" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">① Tool Wrapper</text>
  <text x="68" y="72" fill="#141413" font-size="10" text-anchor="middle">监听关键词</text>
  <text x="68" y="86" fill="#141413" font-size="9.5" text-anchor="middle">加载 conventions</text>
  <text x="68" y="100" fill="#87867f" font-size="9" text-anchor="middle">→ 最高优先级规则</text>
  <text x="68" y="116" fill="#87867f" font-size="8.5" text-anchor="middle">例: api-expert</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M124 79h18"/>
  <path fill="#d1cfc5" d="m142 75-6 4 6 4z"/>
  <rect width="112" height="90" x="148" y="34" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="204" y="54" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">② Generator</text>
  <text x="204" y="72" fill="#141413" font-size="10" text-anchor="middle">模板 + 变量</text>
  <text x="204" y="86" fill="#141413" font-size="9.5" text-anchor="middle">读模板 → 填变量</text>
  <text x="204" y="100" fill="#87867f" font-size="9" text-anchor="middle">→ 格式确定输出</text>
  <text x="204" y="116" fill="#87867f" font-size="8.5" text-anchor="middle">例: report-generator</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M260 79h18"/>
  <path fill="#d1cfc5" d="m278 75-6 4 6 4z"/>
  <rect width="112" height="90" x="284" y="34" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="340" y="54" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">③ Reviewer</text>
  <text x="340" y="72" fill="#141413" font-size="10" text-anchor="middle">checklist 分级</text>
  <text x="340" y="86" fill="#141413" font-size="9.5" text-anchor="middle">逐条输出结论</text>
  <text x="340" y="100" fill="#87867f" font-size="9" text-anchor="middle">→ 结构化报告</text>
  <text x="340" y="116" fill="#87867f" font-size="8.5" text-anchor="middle">例: code-reviewer</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" d="M396 60c18 0 18-16 34-16"/>
  <path fill="#d1cfc5" d="m430 40-6 4 6 4z"/>
  <rect width="112" height="90" x="426" y="34" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="482" y="54" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">④ Inversion</text>
  <text x="482" y="72" fill="#141413" font-size="10" text-anchor="middle">先反问后动手</text>
  <text x="482" y="86" fill="#141413" font-size="9.5" text-anchor="middle">硬闸门规则</text>
  <text x="482" y="100" fill="#87867f" font-size="9" text-anchor="middle">→ 三阶段访谈</text>
  <text x="482" y="116" fill="#87867f" font-size="8.5" text-anchor="middle">例: project-planner</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" d="M482 124v16"/>
  <path fill="#d1cfc5" d="m478 140 4 7 4-7z"/>
  <path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.2" d="M426 79c-20 0-20 59-156 59-30 0-30-23-10-23"/>
  <text x="352" y="134" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">Inversion→Generator</text>
  <rect width="112" height="90" x="516" y="34" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="572" y="54" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" font-weight="600" text-anchor="middle">⑤ Pipeline</text>
  <text x="572" y="72" fill="#141413" font-size="10" text-anchor="middle">多步串行</text>
  <text x="572" y="86" fill="#141413" font-size="9.5" text-anchor="middle">硬门禁检查点</text>
  <text x="572" y="100" fill="#87867f" font-size="9" text-anchor="middle">→ 环环相扣</text>
  <text x="572" y="116" fill="#87867f" font-size="8.5" text-anchor="middle">例: doc-pipeline</text>
  <text x="320" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">实线: 串行依赖　虚线: 常见组合</text>
</svg>
