<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #141413; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #87867F; }
      .cell-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #141413; font-weight: 600; }
      .cell-val { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; fill: #141413; font-weight: 700; }
      .cell-sub { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #87867F; }
      .divider { stroke: #D1CFC5; stroke-width: 1; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect class="bg" width="900" height="540"/>

  <!-- Header -->
  <text x="30" y="34" class="title">AI时代 DORA 四项新指标与基准线</text>
  <text x="30" y="54" class="subtitle">意图交付频率 · 意图交付周期 · 意图恢复时间 · 意图偏离率</text>
  <line x1="30" y1="64" x2="870" y2="64" class="divider"/>

  <!-- Table Header -->
  <g transform="translate(30, 78)">
    <rect width="220" height="40" fill="#141413"/>
    <text x="110" y="26" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#FAF9F5">指标</text>

    <rect x="220" width="162" height="40" fill="#788C5D"/>
    <text x="301" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#FAF9F5">精英 Elite</text>
    <text x="301" y="30" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="rgba(250,249,245,0.7)">高绩效</text>

    <rect x="382" width="162" height="40" fill="#D1CFC5"/>
    <text x="463" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#141413">高绩效 High</text>
    <text x="463" y="30" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="#87867F">良好</text>

    <rect x="544" width="162" height="40" fill="#E3DACC"/>
    <text x="625" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#141413">中等 Medium</text>
    <text x="625" y="30" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="#87867F">需改进</text>

    <rect x="706" width="162" height="40" fill="#D97757"/>
    <text x="787" y="16" text-anchor="middle" font-family="Helvetica Neue" font-size="11" font-weight="700" fill="#FAF9F5">低绩效 Low</text>
    <text x="787" y="30" text-anchor="middle" font-family="Helvetica Neue" font-size="10" fill="rgba(250,249,245,0.7)">风险</text>
  </g>

  <!-- Row 1: Intent Delivery Frequency -->
  <g transform="translate(30, 118)">
    <rect width="838" height="88" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="0.5"/>
    <rect width="220" height="88" fill="#141413" opacity="0.04"/>
    <text x="14" y="24" font-family="Helvetica Neue" font-size="12" font-weight="700" fill="#141413">意图交付频率</text>
    <text x="14" y="38" font-family="Helvetica Neue" font-size="10" fill="#87867F">Intent Delivery Frequency</text>
    <text x="14" y="56" font-family="Helvetica Neue" font-size="9" fill="#87867F">单位时间成功交付的</text>
    <text x="14" y="68" font-family="Helvetica Neue" font-size="9" fill="#87867F">意图变更数量</text>
    <text x="14" y="82" font-family="Helvetica Neue" font-size="9" fill="#87867F">传统: 部署频率</text>

    <g transform="translate(220,0)"><rect width="162" height="88" fill="#788C5D" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#788C5D">按需</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">每天多次</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#788C5D" font-weight="700">≥1次/天</text>
    </g>
    <g transform="translate(382,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.5"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">每天~每周</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">每日1次</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">1-7次/周</text>
    </g>
    <g transform="translate(544,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.3"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">每周~每月</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">周级迭代</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">0.2-1次/周</text>
    </g>
    <g transform="translate(706,0)"><rect width="162" height="88" fill="#D97757" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#D97757">&lt;每月1次</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">月级部署</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#D97757" font-weight="700">&lt;0.2次/周</text>
    </g>
  </g>

  <!-- Row 2: Intent Lead Time -->
  <g transform="translate(30, 206)">
    <rect width="838" height="88" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="0.5"/>
    <rect width="220" height="88" fill="#141413" opacity="0.04"/>
    <text x="14" y="24" font-family="Helvetica Neue" font-size="12" font-weight="700" fill="#141413">意图交付周期</text>
    <text x="14" y="38" font-family="Helvetica Neue" font-size="10" fill="#87867F">Intent Lead Time</text>
    <text x="14" y="56" font-family="Helvetica Neue" font-size="9" fill="#87867F">意图定义 → 交付</text>
    <text x="14" y="68" font-family="Helvetica Neue" font-size="9" fill="#87867F">的时间</text>
    <text x="14" y="82" font-family="Helvetica Neue" font-size="9" fill="#87867F">传统: 代码前置时间</text>

    <g transform="translate(220,0)"><rect width="162" height="88" fill="#788C5D" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#788C5D">&lt;1天</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">当天完成</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#788C5D" font-weight="700">&lt;24h</text>
    </g>
    <g transform="translate(382,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.5"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">1天~1周</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">周内交付</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">1-7天</text>
    </g>
    <g transform="translate(544,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.3"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">1周~1月</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">月级迭代</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">7-30天</text>
    </g>
    <g transform="translate(706,0)"><rect width="162" height="88" fill="#D97757" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#D97757">&gt;1月</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">超长周期</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#D97757" font-weight="700">&gt;30天</text>
    </g>
  </g>

  <!-- Row 3: Intent Recovery Time -->
  <g transform="translate(30, 294)">
    <rect width="838" height="88" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="0.5"/>
    <rect width="220" height="88" fill="#141413" opacity="0.04"/>
    <text x="14" y="24" font-family="Helvetica Neue" font-size="12" font-weight="700" fill="#141413">意图恢复时间</text>
    <text x="14" y="38" font-family="Helvetica Neue" font-size="10" fill="#87867F">Intent Recovery Time</text>
    <text x="14" y="56" font-family="Helvetica Neue" font-size="9" fill="#87867F">意图偏离被发现</text>
    <text x="14" y="68" font-family="Helvetica Neue" font-size="9" fill="#87867F">到恢复正常的时间</text>
    <text x="14" y="82" font-family="Helvetica Neue" font-size="9" fill="#87867F">传统: 恢复服务时间</text>

    <g transform="translate(220,0)"><rect width="162" height="88" fill="#788C5D" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#788C5D">&lt;1小时</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">快速纠错</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#788C5D" font-weight="700">&lt;60min</text>
    </g>
    <g transform="translate(382,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.5"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">1小时~1天</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">日内恢复</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">1h-24h</text>
    </g>
    <g transform="translate(544,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.3"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">1天~1周</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">周内修复</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">1-7天</text>
    </g>
    <g transform="translate(706,0)"><rect width="162" height="88" fill="#D97757" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#D97757">&gt;1周</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">长期故障</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#D97757" font-weight="700">&gt;7天</text>
    </g>
  </g>

  <!-- Row 4: Intent Deviation Rate -->
  <g transform="translate(30, 382)">
    <rect width="838" height="88" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="0.5"/>
    <rect width="220" height="88" fill="#141413" opacity="0.04"/>
    <text x="14" y="24" font-family="Helvetica Neue" font-size="12" font-weight="700" fill="#141413">意图偏离率</text>
    <text x="14" y="38" font-family="Helvetica Neue" font-size="10" fill="#87867F">Intent Deviation Rate</text>
    <text x="14" y="56" font-family="Helvetica Neue" font-size="9" fill="#87867F">导致返工或修正的</text>
    <text x="14" y="68" font-family="Helvetica Neue" font-size="9" fill="#87867F">意图变更占比</text>
    <text x="14" y="82" font-family="Helvetica Neue" font-size="9" fill="#87867F">传统: 变更失败率</text>

    <g transform="translate(220,0)"><rect width="162" height="88" fill="#788C5D" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#788C5D">0-10%</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">几乎无偏离</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#788C5D" font-weight="700">高质量</text>
    </g>
    <g transform="translate(382,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.5"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">10-20%</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">低偏离</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">需监控</text>
    </g>
    <g transform="translate(544,0)"><rect width="162" height="88" fill="#E3DACC" opacity="0.3"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val">20-30%</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">中等偏离</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#141413" font-weight="700">需改进</text>
    </g>
    <g transform="translate(706,0)"><rect width="162" height="88" fill="#D97757" opacity="0.1"/>
      <text x="81" y="28" text-anchor="middle" class="cell-val" fill="#D97757">&gt;30%</text>
      <text x="81" y="44" text-anchor="middle" class="cell-sub">高偏离</text>
      <text x="81" y="64" text-anchor="middle" font-family="Courier New" font-size="11" fill="#D97757" font-weight="700">风险</text>
    </g>
  </g>

  <!-- Bottom insight bar -->
  <rect x="30" y="488" width="838" height="40" rx="10" fill="#E3DACC" opacity="0.5"/>
  <text x="50" y="512" font-family="Helvetica Neue" font-size="13" fill="#141413" font-weight="700">💡 关键洞察</text>
  <text x="180" y="512" font-family="Helvetica Neue" font-size="12" fill="#87867F">AI时代，度量的是"意图流动"的效率，而非"代码流动"。质量的新定义是"意图保真度"</text>
</svg>
