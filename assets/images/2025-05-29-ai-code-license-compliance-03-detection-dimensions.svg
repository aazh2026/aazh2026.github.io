<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 800 460"><title>AI代码溯源四维度检测</title><desc>Four-panel grid showing AST比对、控制流分析、N-gram匹配、Token序列四种代码溯源检测维度</desc><path fill="#faf9f5" d="M0 0h800v460H0z"/><text x="400" y="26" fill="#141413" font-size="15" font-weight="600" letter-spacing="-.02em" text-anchor="middle">AI 代码溯源：四维度检测体系</text><text x="400" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">AST 结构 · 控制流语义 · N-gram 文本 · Token 序列</text><rect width="350" height="170" x="40" y="60" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="10"/><rect width="350" height="30" x="40" y="60" fill="#d97757" rx="10"/><path fill="#d97757" d="M40 80h350v10H40z"/><text x="215" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">AST 比对</text><g transform="translate(65 110)"><rect width="60" height="24" fill="#d97757" rx="4"/><text x="30" y="16" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">FunctionDecl</text><path stroke="#d1cfc5" stroke-width="1.5" d="M30 24v14"/><path fill="#d1cfc5" d="m30 42-4-6h8z"/><rect width="60" height="24" y="42" fill="#e3dacc" rx="4"/><rect width="60" height="24" y="42" fill="none" stroke="#d1cfc5" rx="4"/><text x="30" y="58" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">BlockStmt</text><path stroke="#d1cfc5" stroke-width="1.5" d="M30 66v12"/><rect width="80" height="22" y="78" fill="#faf9f5" stroke="#d1cfc5" rx="4"/><text x="40" y="93" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">VarDecl (x, y)</text></g><g transform="translate(200 110)"><rect width="60" height="24" fill="#d97757" rx="4"/><text x="30" y="16" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">FunctionDecl</text><path stroke="#d1cfc5" stroke-width="1.5" d="M30 24v14"/><path fill="#d1cfc5" d="m30 42-4-6h8z"/><rect width="60" height="24" y="42" fill="#e3dacc" rx="4"/><rect width="60" height="24" y="42" fill="none" stroke="#d1cfc5" rx="4"/><text x="30" y="58" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">BlockStmt</text><path stroke="#d1cfc5" stroke-width="1.5" d="M30 66v12"/><rect width="80" height="22" y="78" fill="#faf9f5" stroke="#d1cfc5" rx="4"/><text x="40" y="93" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">VarDecl (a, b)</text></g><rect width="80" height="20" x="80" y="215" fill="#788c5d" rx="10"/><text x="120" y="229" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">结构匹配 ✓</text><text x="215" y="248" fill="#87867f" font-size="10" text-anchor="middle">忽略变量名 (x→a, y→b)，比对语法树结构</text><rect width="350" height="170" x="410" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="10"/><rect width="350" height="30" x="410" y="60" fill="#87867f" rx="10"/><path fill="#87867f" d="M410 80h350v10H410z"/><text x="585" y="81" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">控制流分析</text><g transform="translate(445 105)"><ellipse cx="50" cy="12" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="30" ry="14"/><text x="50" y="17" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Start</text><path stroke="#d1cfc5" stroke-width="1.5" d="M50 26v16"/><path fill="#d1cfc5" d="m50 46-4-6h8z"/><path fill="#faf9f5" stroke="#d97757" stroke-width="1.5" d="m50 46 30 24-30 24-30-24z"/><text x="50" y="74" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">if (x&gt;0)</text><path stroke="#d1cfc5" stroke-width="1.5" d="M20 70h-30m0 0v40"/><path fill="#d1cfc5" d="m-10 114-4-6h8z"/><rect width="60" height="22" x="-40" y="114" fill="#faf9f5" stroke="#d1cfc5" rx="4"/><text x="-10" y="129" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">doX()</text><path stroke="#d1cfc5" stroke-width="1.5" d="M80 70h30m0 0v40"/><path fill="#d1cfc5" d="m110 114-4-6h8z"/><rect width="60" height="22" x="80" y="114" fill="#faf9f5" stroke="#d1cfc5" rx="4"/><text x="110" y="129" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">doY()</text><path stroke="#d1cfc5" stroke-width="1.5" d="M-10 136v16m120-16v16m-120 0h60m60 0H50"/><path fill="#d1cfc5" d="m50 156-4-6h8z"/></g><text x="585" y="248" fill="#87867f" font-size="10" text-anchor="middle">比对控制流图结构，检测算法逻辑相似性</text><rect width="350" height="170" x="40" y="264" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="10"/><rect width="350" height="30" x="40" y="264" fill="#87867f" rx="10"/><path fill="#87867f" d="M40 284h350v10H40z"/><text x="215" y="285" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">N-gram 匹配</text><g transform="translate(60 310)"><text fill="#141413" font-family="ui-monospace, monospace" font-size="10">代码片段 A：</text><rect width="30" height="16" y="8" fill="#d97757" rx="3"/><text x="15" y="20" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">if</text><rect width="30" height="16" x="34" y="8" fill="#e3dacc" stroke="#d1cfc5" rx="3"/><text x="49" y="20" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">(x&gt;0)</text><rect width="30" height="16" x="68" y="8" fill="#d97757" rx="3"/><text x="83" y="20" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">doX()</text><rect width="30" height="16" x="102" y="8" fill="#e3dacc" stroke="#d1cfc5" rx="3"/><text x="117" y="20" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">else</text><rect width="100" height="14" y="32" fill="#788c5d" opacity=".25" rx="3"/><rect width="36" height="14" x="34" y="32" fill="#788c5d" opacity=".25" rx="3"/><text y="62" fill="#141413" font-family="ui-monospace, monospace" font-size="10">代码片段 B：</text><rect width="30" height="16" y="70" fill="#d97757" rx="3"/><text x="15" y="82" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">if</text><rect width="30" height="16" x="34" y="70" fill="#e3dacc" stroke="#d1cfc5" rx="3"/><text x="49" y="82" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">(a&gt;0)</text><rect width="30" height="16" x="68" y="70" fill="#d97757" rx="3"/><text x="83" y="82" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">doX()</text><rect width="30" height="16" x="102" y="70" fill="#e3dacc" stroke="#d1cfc5" rx="3"/><text x="117" y="82" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">else</text></g><rect width="80" height="20" x="70" y="420" fill="#788c5d" rx="10"/><text x="110" y="434" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">72% 匹配</text><text x="215" y="424" fill="#87867f" font-size="10" text-anchor="middle">滑动窗口检测代码片段复制，忽略空格和注释</text><rect width="350" height="170" x="410" y="264" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="10"/><rect width="350" height="30" x="410" y="264" fill="#87867f" rx="10"/><path fill="#87867f" d="M410 284h350v10H410z"/><text x="585" y="285" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">标准化 Token 比对</text><text fill="#141413" font-family="ui-monospace, monospace" font-size="10" transform="translate(430 308)">原始代码：</text><g transform="translate(430 318)"><rect width="36" height="18" fill="#d97757" rx="3"/><text x="18" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">INT</text><rect width="36" height="18" x="40" fill="#d97757" rx="3"/><text x="58" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">ID:x</text><rect width="36" height="18" x="80" fill="#e3dacc" stroke="#d1cfc5" rx="3"/><text x="98" y="13" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">SEMI</text><rect width="36" height="18" x="120" fill="#d97757" rx="3"/><text x="138" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">INT</text><rect width="36" height="18" x="160" fill="#d97757" rx="3"/><text x="178" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">ID:y</text></g><text y="52" fill="#141413" font-family="ui-monospace, monospace" font-size="10" transform="translate(430 308)">AI 生成：</text><g transform="translate(430 370)"><rect width="36" height="18" fill="#d97757" rx="3"/><text x="18" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">INT</text><rect width="36" height="18" x="40" fill="#788c5d" rx="3"/><text x="58" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">ID:a</text><rect width="36" height="18" x="80" fill="#e3dacc" stroke="#d1cfc5" rx="3"/><text x="98" y="13" fill="#141413" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">SEMI</text><rect width="36" height="18" x="120" fill="#d97757" rx="3"/><text x="138" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">INT</text><rect width="36" height="18" x="160" fill="#788c5d" rx="3"/><text x="178" y="13" fill="#fff" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">ID:b</text></g><path stroke="#788c5d" stroke-dasharray="3,2" d="M488 336v34m120-34v34"/><rect width="80" height="20" x="460" y="420" fill="#788c5d" rx="10"/><text x="500" y="434" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">ID 映射 ✓</text><text x="585" y="424" fill="#87867f" font-size="10" text-anchor="middle">将变量名标准化后再比对，过滤命名干扰</text></svg>