<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #141413; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #87867F; }
      .lvl-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #FAF9F5; }
      .lvl-sub { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: rgba(250,249,245,0.75); }
      .pill { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #FAF9F5; }
      .item-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #141413; font-weight: 600; }
      .item-desc { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #87867F; }
      .period { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #FAF9F5; font-weight: 600; }
      .arrow { fill: none; stroke: #D1CFC5; stroke-width: 2; }
      .divider { stroke: #D1CFC5; stroke-width: 1; }
      .tag { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #87867F; }
      .tag-light { fill: #FAF9F5; opacity: 0.8; }
      .lvl-num { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 48px; font-weight: 800; fill: rgba(250,249,245,0.12); }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" width="900" height="520"/>

  <!-- Header -->
  <text x="30" y="34" class="title">Prompt 工程梯队：三级开发者能力模型</text>
  <text x="30" y="54" class="subtitle">从模板使用者到架构师，每一级都有清晰的能力边界和培养路径</text>
  <line x1="30" y1="64" x2="870" y2="64" class="divider"/>

  <!-- ============ LEVEL 3: Senior (top) ============ -->
  <g transform="translate(30, 80)">
    <!-- Card with shadow -->
    <rect width="260" height="290" rx="14" fill="#141413" filter="url(#shadow)"/>
    <!-- Accent top bar -->
    <rect width="260" height="6" rx="3" fill="#D97757"/>

    <!-- Level number -->
    <text x="228" y="72" class="lvl-num" text-anchor="end">03</text>

    <!-- Header -->
    <text x="20" y="32" class="lvl-title">高级开发者</text>
    <text x="20" y="50" class="lvl-sub">Prompt Architect · Prompt 架构师</text>

    <!-- Period pill -->
    <rect x="20" y="60" width="110" height="20" rx="10" fill="#D97757"/>
    <text x="75" y="74" text-anchor="middle" class="period">培养周期 2-3年</text>

    <!-- Divider -->
    <line x1="20" y1="92" x2="240" y2="92" stroke="#87867F" stroke-width="0.5" opacity="0.4"/>

    <!-- Capabilities -->
    <g transform="translate(20, 106)">
      <g>
        <rect width="6" height="6" rx="2" y="3" fill="#D97757"/>
        <text x="14" y="10" class="item-label" fill="#FAF9F5">架构设计</text>
        <text x="14" y="24" class="item-desc" fill="#87867F">设计企业级 Prompt 系统架构</text>
      </g>
      <g transform="translate(0, 36)">
        <rect width="6" height="6" rx="2" y="3" fill="#D97757"/>
        <text x="14" y="10" class="item-label" fill="#FAF9F5">规范制定</text>
        <text x="14" y="24" class="item-desc" fill="#87867F">制定团队/企业级 Prompt 标准</text>
      </g>
      <g transform="translate(0, 72)">
        <rect width="6" height="6" rx="2" y="3" fill="#D97757"/>
        <text x="14" y="10" class="item-label" fill="#FAF9F5">战略规划</text>
        <text x="14" y="24" class="item-desc" fill="#87867F">规划 Prompt 能力发展路线</text>
      </g>
      <g transform="translate(0, 108)">
        <rect width="6" height="6" rx="2" y="3" fill="#D97757"/>
        <text x="14" y="10" class="item-label" fill="#FAF9F5">组织建设</text>
        <text x="14" y="24" class="item-desc" fill="#87867F">建设 Prompt 工程师团队</text>
      </g>
    </g>

    <!-- Output tag -->
    <rect x="20" y="268" width="220" height="16" rx="8" fill="#D97757" opacity="0.2"/>
    <text x="30" y="280" class="tag" fill="#D97757">核心产出：Prompt 系统 &amp; 团队规范</text>
  </g>

  <!-- Arrow L2 → L3 -->
  <g transform="translate(298, 218)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#D1CFC5" stroke-width="2"/>
    <polygon points="16,-5 24,0 16,5" fill="#D1CFC5"/>
  </g>

  <!-- ============ LEVEL 2: Mid ============ -->
  <g transform="translate(322, 150)">
    <rect width="260" height="290" rx="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- Accent top bar -->
    <rect width="260" height="6" rx="3" fill="#788C5D"/>

    <text x="228" y="72" class="lvl-num" text-anchor="end" fill="#E3DACC">02</text>

    <!-- Header -->
    <text x="20" y="32" class="lvl-title" fill="#141413">中级开发者</text>
    <text x="20" y="50" class="lvl-sub" fill="#87867F">Prompt Designer · Prompt 设计者</text>

    <!-- Period pill -->
    <rect x="20" y="60" width="110" height="20" rx="10" fill="#788C5D"/>
    <text x="75" y="74" text-anchor="middle" class="period">培养周期 6-12月</text>

    <!-- Divider -->
    <line x1="20" y1="92" x2="240" y2="92" stroke="#D1CFC5" stroke-width="0.5"/>

    <!-- Capabilities -->
    <g transform="translate(20, 106)">
      <g>
        <rect width="6" height="6" rx="2" y="3" fill="#788C5D"/>
        <text x="14" y="10" class="item-label">Prompt 设计</text>
        <text x="14" y="24" class="item-desc">从零设计复杂 Prompt</text>
      </g>
      <g transform="translate(0, 36)">
        <rect width="6" height="6" rx="2" y="3" fill="#788C5D"/>
        <text x="14" y="10" class="item-label">优化调试</text>
        <text x="14" y="24" class="item-desc">诊断和优化 Prompt 效果</text>
      </g>
      <g transform="translate(0, 72)">
        <rect width="6" height="6" rx="2" y="3" fill="#788C5D"/>
        <text x="14" y="10" class="item-label">Context 管理</text>
        <text x="14" y="24" class="item-desc">有效管理 Prompt 上下文</text>
      </g>
      <g transform="translate(0, 108)">
        <rect width="6" height="6" rx="2" y="3" fill="#788C5D"/>
        <text x="14" y="10" class="item-label">质量评估</text>
        <text x="14" y="24" class="item-desc">建立 Prompt 质量评估标准</text>
      </g>
    </g>

    <!-- Output tag -->
    <rect x="20" y="268" width="220" height="16" rx="8" fill="#788C5D" opacity="0.12"/>
    <text x="30" y="280" class="tag" fill="#788C5D">核心产出：50+ 高质量 Prompt</text>
  </g>

  <!-- Arrow L1 → L2 -->
  <g transform="translate(590, 308)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#D1CFC5" stroke-width="2"/>
    <polygon points="16,-5 24,0 16,5" fill="#D1CFC5"/>
  </g>

  <!-- ============ LEVEL 1: Junior (bottom) ============ -->
  <g transform="translate(614, 220)">
    <rect width="260" height="290" rx="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- Accent top bar -->
    <rect width="260" height="6" rx="3" fill="#87867F"/>

    <text x="228" y="72" class="lvl-num" text-anchor="end" fill="#E3DACC">01</text>

    <!-- Header -->
    <text x="20" y="32" class="lvl-title" fill="#141413">初级开发者</text>
    <text x="20" y="50" class="lvl-sub" fill="#87867F">Prompt User · Prompt 使用者</text>

    <!-- Period pill -->
    <rect x="20" y="60" width="110" height="20" rx="10" fill="#87867F"/>
    <text x="75" y="74" text-anchor="middle" class="period" fill="#FAF9F5">培养周期 2-3月</text>

    <!-- Divider -->
    <line x1="20" y1="92" x2="240" y2="92" stroke="#D1CFC5" stroke-width="0.5"/>

    <!-- Capabilities -->
    <g transform="translate(20, 106)">
      <g>
        <rect width="6" height="6" rx="2" y="3" fill="#87867F"/>
        <text x="14" y="10" class="item-label">基础使用</text>
        <text x="14" y="24" class="item-desc">熟练使用现有 Prompt 模板</text>
      </g>
      <g transform="translate(0, 36)">
        <rect width="6" height="6" rx="2" y="3" fill="#87867F"/>
        <text x="14" y="10" class="item-label">简单修改</text>
        <text x="14" y="24" class="item-desc">根据需求修改变量占位符</text>
      </g>
      <g transform="translate(0, 72)">
        <rect width="6" height="6" rx="2" y="3" fill="#87867F"/>
        <text x="14" y="10" class="item-label">结果评估</text>
        <text x="14" y="24" class="item-desc">判断 AI 输出是否符合预期</text>
      </g>
      <g transform="translate(0, 108)">
        <rect width="6" height="6" rx="2" y="3" fill="#87867F"/>
        <text x="14" y="10" class="item-label">反馈记录</text>
        <text x="14" y="24" class="item-desc">记录 Prompt 使用效果</text>
      </g>
    </g>

    <!-- Output tag -->
    <rect x="20" y="268" width="220" height="16" rx="8" fill="#87867F" opacity="0.12"/>
    <text x="30" y="280" class="tag">核心产出：熟练使用 20+ 模板</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 526)">
    <text class="tag" fill="#87867F">核心洞察：Prompt 能力不是天生的，而是可以通过系统化训练培养和评估的技能</text>
  </g>
</svg>
