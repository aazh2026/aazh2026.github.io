<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- ReAct cycle: Thought → Action → Observation → ... → Final Answer -->
  <!-- Blog colors: ivory #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5, g500 #87867F -->

  <rect width="640" height="200" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">ReAct 工作循环</text>
  <text x="320" y="37" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">Yao et al. · arXiv:2210.03629 · 2022</text>

  <!-- Central dashed loop line -->
  <ellipse cx="320" cy="108" rx="230" ry="60" fill="none" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Thought node -->
  <rect x="40" y="72" width="110" height="72" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="95" y="98" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Thought</text>
  <text x="95" y="116" text-anchor="middle" font-size="10" fill="#141413">推理</text>
  <text x="95" y="130" text-anchor="middle" font-size="9" fill="#87867F">思考下一步做什么</text>

  <!-- Arrow: Thought → Action -->
  <line x1="150" y1="108" x2="192" y2="108" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="192,104 185,108 192,112" fill="#D97757"/>
  <text x="171" y="102" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">L</text>

  <!-- Action node -->
  <rect x="198" y="72" width="110" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="253" y="98" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Action</text>
  <text x="253" y="116" text-anchor="middle" font-size="10" fill="#141413">行动</text>
  <text x="253" y="130" text-anchor="middle" font-size="9" fill="#87867F">调用工具/环境交互</text>

  <!-- Arrow: Action → Observation -->
  <line x1="308" y1="108" x2="350" y2="108" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="350,104 343,108 350,112" fill="#D1CFC5"/>
  <text x="329" y="102" text-anchor="middle" font-size="8" fill="#D1CFC5" font-family="ui-monospace, monospace">L</text>

  <!-- Observation node -->
  <rect x="356" y="72" width="110" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="411" y="98" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">Observation</text>
  <text x="411" y="116" text-anchor="middle" font-size="10" fill="#141413">观察</text>
  <text x="411" y="130" text-anchor="middle" font-size="9" fill="#87867F">获取执行结果</text>

  <!-- Arrow: Observation → (loop back) -->
  <path d="M 466 108 C 510 108, 510 178, 320 178 C 130 178, 130 108, 174 108" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="174,104 167,108 174,112" fill="#D97757"/>
  <text x="500" y="170" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">循环</text>

  <!-- Final Answer badge -->
  <rect x="514" y="80" width="96" height="56" rx="8" fill="#F0EEE6" stroke="#788C5D" stroke-width="1.5"/>
  <text x="562" y="102" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">Final</text>
  <text x="562" y="116" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">Answer</text>
  <text x="562" y="130" text-anchor="middle" font-size="9" fill="#87867F">停止</text>

  <!-- Loop Engineering arrow: from ReAct to Loop Engineering -->
  <line x1="320" y1="20" x2="320" y2="8" stroke="#D1CFC5" stroke-width="1"/>
  <text x="320" y="4" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">局部推理 → 全链路循环</text>

  <!-- Benchmark stats -->
  <rect x="40" y="162" width="110" height="30" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1"/>
  <text x="95" y="178" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">+34% ALFWorld</text>
  <text x="95" y="188" text-anchor="middle" font-size="8.5" fill="#87867F">+10% WebShop</text>

  <rect x="160" y="162" width="110" height="30" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="215" y="178" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">1–2 examples</text>
  <text x="215" y="188" text-anchor="middle" font-size="8.5" fill="#87867F">few-shot in-context</text>
</svg>
