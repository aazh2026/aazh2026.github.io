<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420"><defs><linearGradient id="spectrumGrad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#d97757"/><stop offset="50%" stop-color="#d1cfc5"/><stop offset="100%" stop-color="#788c5d"/></linearGradient><filter id="shadow" width="110%" height="120%" x="-5%" y="-5%"><feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".15" stdDeviation="3"/></filter></defs><rect width="800" height="420" fill="#faf9f5" rx="12"/><text x="40" y="40" fill="#141413" font-family="system-ui, sans-serif" font-size="18" font-weight="700">编程已解决的光谱</text><text x="40" y="60" fill="#87867f" font-family="system-ui, sans-serif" font-size="12">Coding Is Solved — 代码库类型与 AI 能力覆盖率</text><rect width="720" height="24" x="40" y="90" fill="url(#spectrumGrad)" filter="url(#shadow)" rx="12"/><text x="40" y="82" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="600">未解决 0%</text><text x="400" y="82" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">混合地带</text><text x="760" y="82" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end">已解决 100%</text><path stroke="#141413" stroke-width="2" d="M40 90v10"/><path stroke="#141413" stroke-width="1.5" d="M220 90v8"/><path stroke="#141413" stroke-width="2" d="M400 90v10"/><path stroke="#141413" stroke-width="1.5" d="M580 90v8"/><path stroke="#141413" stroke-width="2" d="M760 90v10"/><circle cx="80" cy="102" r="10" fill="#d97757" stroke="#faf9f5" stroke-width="3"/><text x="80" y="130" fill="#d97757" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">SAP / ABAP</text><text x="80" y="146" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">~10%</text><circle cx="170" cy="102" r="9" fill="#c47b52" stroke="#faf9f5" stroke-width="3"/><text x="170" y="130" fill="#c47b52" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">游戏引擎 C++</text><text x="170" y="146" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">~25%</text><circle cx="280" cy="102" r="9" fill="#b08a6a" stroke="#faf9f5" stroke-width="3"/><text x="280" y="130" fill="#b08a6a" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">遗留系统</text><text x="280" y="146" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">~40%</text><circle cx="700" cy="102" r="12" fill="#788c5d" stroke="#faf9f5" stroke-width="4"/><text x="700" y="130" fill="#788c5d" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">TypeScript + React</text><text x="700" y="146" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">~100%</text><text x="700" y="162" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">(Boris Cherny)</text><path stroke="#d1cfc5" stroke-dasharray="4,3" d="M40 175v15m720-15v15"/><rect width="165" height="100" x="40" y="195" fill="#d97757" fill-opacity=".1" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="122" y="215" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">阻碍 AI 解决的因素</text><text x="122" y="232" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• 小众语言（C++, ABAP）</text><text x="122" y="247" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• 三十年技术债务</text><text x="122" y="262" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• 业务逻辑高度复杂</text><text x="122" y="277" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• 高合规要求</text><text x="122" y="292" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">等下一代模型</text><rect width="356" height="100" x="222" y="195" fill="#87867f" fill-opacity=".08" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="400" y="215" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">中间地带：取决于具体栈</text><text x="400" y="232" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Python / Django, Java Spring, Go, Rust — 模型训练数据充足，但业务复杂度因项目而异</text><text x="400" y="252" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">决定因素：① 栈的主流程度 ② 代码库老化程度 ③ 是否用内部专用模型</text><text x="400" y="272" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Anthropic 内部 Mythos 模型 SWB-bench 93.9%</text><rect width="165" height="100" x="595" y="195" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="677" y="215" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">AI 已解决的类型</text><text x="677" y="232" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• TypeScript + React</text><text x="677" y="247" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• Python 数据处理</text><text x="677" y="262" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• 主流 Web 框架</text><text x="677" y="277" fill="#141413" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">• 标准 CRUD 应用</text><text x="677" y="292" fill="#788c5d" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">等模型，而不是等奇迹</text><rect width="720" height="50" x="40" y="315" fill="#141413" rx="8"/><text x="60" y="337" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="12" font-weight="600">&quot;编程已被解决&quot; 的结构性偏差：</text><text x="60" y="355" fill="#d1cfc5" font-family="system-ui, sans-serif" font-size="11">Boris 用的是 TS+React（模型最熟的栈）+ Anthropic 内部 Mythos 模型 + 成熟代码库</text><text x="740" y="355" fill="#d1cfc5" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">→ 结论不普世</text><circle cx="50" cy="390" r="6" fill="#d97757"/><text x="62" y="394" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">低 AI 覆盖率</text><circle cx="165" cy="390" r="6" fill="#788c5d"/><text x="177" y="394" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">高 AI 覆盖率</text><circle cx="285" cy="390" r="6" fill="#87867f"/><text x="297" y="394" fill="#87867f" font-family="system-ui, sans-serif" font-size="10">Boris Cherny 自评</text><text x="760" y="394" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">来源：Sequoia AI Ascent 2026</text></svg>