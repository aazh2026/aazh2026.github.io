<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-label="设计范式转变">
  <title>从像素驱动到意图驱动的设计范式转变</title>
  <desc>展示 AI-Native UX/UI 设计中，从传统像素驱动设计到意图驱动设计的范式转变</desc>

  <defs>
    <linearGradient id="bgGrad9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bgGrad9)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#141413" text-anchor="middle">从像素驱动到意图驱动的设计范式</text>

  <!-- Left: Traditional -->
  <rect x="40" y="55" width="350" height="260" rx="10" fill="#FAF9F5" stroke="#D97757" stroke-width="2.5"/>
  <rect x="40" y="55" width="350" height="36" rx="10" fill="#D97757"/>
  <rect x="40" y="79" width="350" height="12" fill="#D97757"/>
  <text x="215" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">❌ 传统设计（Pixel-Driven）</text>

  <!-- Traditional details -->
  <text x="60" y="115" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#141413">思维模式：</text>
  <text x="60" y="133" font-family="monospace" font-size="9" fill="#141413">"这个按钮需要 48px 高，</text>
  <text x="60" y="146" font-family="monospace" font-size="9" fill="#141413">蓝色渐变，阴影 2px..."</text>

  <rect x="60" y="158" width="310" height="6" rx="3" fill="#D97757"/>
  <text x="65" y="176" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">决策层次：微观</text>

  <text x="60" y="195" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#141413">时间分配：</text>

  <rect x="60" y="210" width="230" height="16" rx="4" fill="#E3DACC"/>
  <rect x="60" y="210" width="138" height="16" rx="4" fill="#D97757"/>
  <text x="215" y="222" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">60% 重复性操作</text>

  <rect x="60" y="232" width="230" height="16" rx="4" fill="#E3DACC"/>
  <rect x="60" y="232" width="57" height="16" rx="4" fill="#788C5D"/>
  <text x="140" y="244" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">25% 沟通同步</text>

  <rect x="60" y="254" width="230" height="16" rx="4" fill="#E3DACC"/>
  <rect x="60" y="254" width="34" height="16" rx="4" fill="#5B8BD4"/>
  <text x="130" y="266" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">15% 创造性思考</text>

  <rect x="60" y="282" width="310" height="22" rx="5" fill="#FDECEA"/>
  <text x="215" y="297" font-family="system-ui, sans-serif" font-size="10" fill="#D97757" text-anchor="middle">问题：设计师成为「人肉样式计算器」</text>

  <!-- Arrow -->
  <text x="400" y="185" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#D1CFC5" text-anchor="middle">→</text>
  <text x="400" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">AI</text>
  <text x="400" y="225" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">辅助</text>

  <!-- Right: AI-Native -->
  <rect x="410" y="55" width="350" height="260" rx="10" fill="#FAF9F5" stroke="#788C5D" stroke-width="2.5"/>
  <rect x="410" y="55" width="350" height="36" rx="10" fill="#788C5D"/>
  <rect x="410" y="79" width="350" height="12" fill="#788C5D"/>
  <text x="585" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">✓ AI-Native 设计（Intent-Driven）</text>

  <!-- AI-Native details -->
  <text x="430" y="115" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#141413">思维模式：</text>
  <text x="430" y="133" font-family="monospace" font-size="9" fill="#141413">"这个按钮需要突出显示，</text>
  <text x="430" y="146" font-family="monospace" font-size="9" fill="#141413">适合主要操作..."</text>

  <rect x="430" y="158" width="310" height="6" rx="3" fill="#788C5D"/>
  <text x="435" y="176" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">决策层次：宏观</text>

  <text x="430" y="195" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#141413">时间分配：</text>

  <rect x="430" y="210" width="310" height="16" rx="4" fill="#E3DACC"/>
  <rect x="430" y="210" width="62" height="16" rx="4" fill="#788C5D"/>
  <text x="465" y="222" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">10% 审阅 AI 输出</text>

  <rect x="430" y="232" width="310" height="16" rx="4" fill="#E3DACC"/>
  <rect x="430" y="232" width="77" height="16" rx="4" fill="#5B8BD4"/>
  <text x="470" y="244" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">25% 用户研究洞察</text>

  <rect x="430" y="254" width="310" height="16" rx="4" fill="#E3DACC"/>
  <rect x="430" y="254" width="124" height="16" rx="4" fill="#141413"/>
  <text x="495" y="266" font-family="system-ui, sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle">40% 创新概念设计</text>

  <rect x="430" y="282" width="310" height="22" rx="5" fill="#E8F5E9"/>
  <text x="585" y="297" font-family="system-ui, sans-serif" font-size="10" fill="#788C5D" text-anchor="middle">优势：设计师专注于战略决策</text>

  <!-- Bottom: Key shift -->
  <rect x="40" y="330" width="720" height="95" rx="10" fill="#141413"/>
  <text x="400" y="358" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">关键转变</text>

  <rect x="80" y="372" width="200" height="44" rx="6" fill="#D97757"/>
  <text x="180" y="393" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FAF9F5" text-anchor="middle">从「怎么做」</text>
  <text x="180" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">（像素、颜色、间距）</text>

  <text x="400" y="400" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#FAF9F5" text-anchor="middle">→</text>

  <rect x="520" y="372" width="200" height="44" rx="6" fill="#788C5D"/>
  <text x="620" y="393" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FAF9F5" text-anchor="middle">到「要什么」</text>
  <text x="620" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">（目标、意图、价值）</text>
</svg>
