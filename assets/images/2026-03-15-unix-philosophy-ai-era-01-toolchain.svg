<svg xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" viewBox="0 0 860 440"><defs><style>.text-main{fill:#141413;font-size:13px}.text-xs{fill:#87867f;font-size:10px}.text-label{fill:#141413;font-size:12px;font-weight:600}.border{stroke:#d1cfc5;stroke-width:1.5}.fill-user{fill:#e3dacc}.fill-parser{fill:#fef3c7;stroke:#d97757}.fill-router{fill:#fed7aa;stroke:#ea580c}.fill-executor{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.fill-pipeline{fill:#bfdbfe;stroke:#3b82f6}.fill-formatter{fill:#d1fae5;stroke:#059669}</style></defs><path d="M0 0h860v440H0z" style="fill:#faf9f5"/><text x="430" y="28" class="text-main" font-size="15" font-weight="700" text-anchor="middle">Agent 工具链全景图：Unix 哲学的 AI 时代回响</text><rect width="200" height="40" x="330" y="48" class="fill-user border" rx="8"/><text x="430" y="70" class="text-label" text-anchor="middle">User Input</text><path stroke-width="2" d="M430 88v20" class="border"/><path fill="#141413" d="m430 108-5-8h10z"/><rect width="780" height="210" x="40" y="108" fill="none" stroke="#d1cfc5" stroke-width="2" class="border" rx="12"/><text x="60" y="126" class="text-label">Agent 工具链</text><rect width="160" height="60" x="60" y="140" class="fill-parser" rx="8"/><text x="140" y="162" fill="#d97757" class="text-label" text-anchor="middle">IntentParser</text><text x="140" y="178" class="text-xs" text-anchor="middle">Intent 解析（类似 shell 解析命令）</text><text x="140" y="192" class="text-xs" text-anchor="middle">将自然语言转为结构化 Intent</text><path stroke-width="2" d="M220 170h35" class="border"/><path fill="#141413" d="m255 170-8-5v10z"/><rect width="160" height="60" x="255" y="140" class="fill-router" rx="8"/><text x="335" y="162" fill="#ea580c" class="text-label" text-anchor="middle">Router</text><text x="335" y="178" class="text-xs" text-anchor="middle">路由（类似 shell 的 which）</text><text x="335" y="192" class="text-xs" text-anchor="middle">根据 Intent 选择 Agent</text><path stroke-width="2" d="M415 170h35" class="border"/><path fill="#141413" d="m450 170-8-5v10z"/><rect width="160" height="60" x="450" y="140" class="fill-executor" rx="8"/><text x="530" y="162" class="text-label" text-anchor="middle">Executor</text><text x="530" y="178" class="text-xs" text-anchor="middle">执行（类似 fork/exec）</text><text x="530" y="192" class="text-xs" text-anchor="middle">运行选定的 Agent</text><path stroke-width="2" d="M610 170h35" class="border"/><path fill="#141413" d="m645 170-8-5v10z"/><rect width="160" height="60" x="645" y="140" class="fill-pipeline" rx="8"/><text x="725" y="162" class="text-label" text-anchor="middle">Pipeline</text><text x="725" y="178" class="text-xs" text-anchor="middle">管道（类似 pipe）</text><text x="725" y="192" class="text-xs" text-anchor="middle">连接多个 Agent</text><rect width="180" height="50" x="340" y="258" class="fill-formatter" rx="8"/><text x="430" y="280" fill="#059669" class="text-label" text-anchor="middle">Formatter</text><text x="430" y="296" class="text-xs" text-anchor="middle">格式化（类似 printf）结果格式化输出</text><path stroke-width="2" d="m725 200-295 58" class="border"/><path fill="#141413" d="m430 258 8-6-8-6z"/><path stroke-width="2" d="M430 308v20" class="border"/><path fill="#141413" d="m430 328-5-8h10z"/><rect width="200" height="40" x="330" y="328" class="fill-user border" rx="8"/><text x="430" y="350" class="text-label" text-anchor="middle">User Output</text><rect width="780" height="52" x="40" y="380" fill="none" stroke="#d1cfc5" stroke-dasharray="5 4" class="border" rx="8"/><text x="430" y="397" class="text-main" font-size="12" font-weight="600" text-anchor="middle">Unix 命令类比</text><text x="430" y="415" style="fill:#87867f;font-size:11px" text-anchor="middle">
    IntentParser ≈ bash 解析 | Router ≈ which/command lookup | Executor ≈ fork+exec | Pipeline ≈ | 管道符 | Formatter ≈ printf
  </text><rect width="130" height="160" x="690" y="48" fill="none" class="border" rx="8"/><text x="755" y="66" class="text-label" text-anchor="middle">图例</text><rect width="12" height="12" x="704" y="78" class="fill-parser" rx="2"/><text x="722" y="89" class="text-xs">Intent 解析</text><rect width="12" height="12" x="704" y="96" class="fill-router" rx="2"/><text x="722" y="107" class="text-xs">Intent 路由</text><rect width="12" height="12" x="704" y="114" class="fill-executor" rx="2"/><text x="722" y="125" class="text-xs">Agent 执行器</text><rect width="12" height="12" x="704" y="132" class="fill-pipeline" rx="2"/><text x="722" y="143" class="text-xs">Agent 管道</text><rect width="12" height="12" x="704" y="150" class="fill-formatter" rx="2"/><text x="722" y="161" class="text-xs">输出格式化</text><path stroke-width="1.5" d="M704 176h86" class="border"/><path fill="#141413" d="m790 176-8-5v10z"/><text x="722" y="188" class="text-xs">数据流向</text></svg>