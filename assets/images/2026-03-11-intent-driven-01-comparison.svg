<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Intent-Driven vs Traditional 详细设计 -->
  <rect width="560" height="240" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">传统详细设计 vs Intent-Driven 详细设计</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/11</text>

  <!-- Arrow -->
  <line x1="195" y1="120" x2="345" y2="120" stroke="#D97757" stroke-width="2"/>
  <polygon points="345,116 339,120 345,124" fill="#D97757"/>
  <text x="270" y="114" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">范式转移</text>

  <!-- LEFT: Traditional -->
  <rect x="20" y="52" width="170" height="170" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="20" y="52" width="170" height="26" rx="8" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="105" y="70" text-anchor="middle" font-size="11" fill="#87867F" font-weight="600">传统详细设计</text>
  <line x1="30" y1="84" x2="180" y2="84" stroke="#D1CFC5" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="35" y="100" font-size="9" fill="#87867F">→ 规定"怎么实现"</text>
  <text x="35" y="114" font-size="9" fill="#87867F">→ 覆盖所有技术细节</text>
  <text x="35" y="128" font-size="9" fill="#87867F">→ 文档与代码同步难</text>
  <text x="35" y="142" font-size="9" fill="#87867F">→ AI 只能执行指令</text>
  <text x="35" y="156" font-size="9" fill="#87867F">→ 维护负担重</text>
  <text x="35" y="170" font-size="9" fill="#87867F">→ 约束而非引导</text>
  <text x="35" y="192" font-size="9" fill="#D97757" font-weight="600">Spec 驱动</text>

  <!-- RIGHT: Intent-Driven -->
  <rect x="370" y="52" width="170" height="170" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="370" y="52" width="170" height="26" rx="8" fill="#FEF3C7" stroke="#D97757" stroke-width="1.5"/>
  <text x="455" y="70" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">Intent-Driven</text>
  <line x1="380" y1="84" x2="530" y2="84" stroke="#D97757" stroke-width="0.5" stroke-dasharray="2,2"/>

  <text x="385" y="100" font-size="9" fill="#059669">→ 规定"要达成什么"</text>
  <text x="385" y="114" font-size="9" fill="#059669">→ 保留设计自由度</text>
  <text x="385" y="128" font-size="9" fill="#059669">→ 文档即意图表达</text>
  <text x="385" y="142" font-size="9" fill="#059669">→ AI 理解业务目标</text>
  <text x="385" y="156" font-size="9" fill="#059669">→ Examples 比 Spec 更有效</text>
  <text x="385" y="170" font-size="9" fill="#059669">→ 引导而非约束</text>
  <text x="385" y="192" font-size="9" fill="#059669" font-weight="600">Intent 驱动</text>

  <!-- Bottom insight -->
  <text x="280" y="234" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">Intent-Driven = 描述意图而非步骤，AI 获得设计自由度</text>
</svg>