<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 560 240"><path fill="#faf9f5" d="M0 0h560v240H0z"/><text x="280" y="20" fill="#141413" font-size="13" font-weight="500" letter-spacing="-.02em" text-anchor="middle">传统详细设计 vs Intent-Driven 详细设计</text><text x="280" y="36" fill="#87867f" font-family="ui-monospace, monospace" font-size="9.5" text-anchor="middle">postcodeengineering.com · 2026/03/11</text><path stroke="#d97757" stroke-width="2" d="M195 120h150"/><path fill="#d97757" d="m345 116-6 4 6 4z"/><text x="270" y="114" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">范式转移</text><rect width="170" height="170" x="20" y="52" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="170" height="26" x="20" y="52" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="105" y="70" fill="#87867f" font-size="11" font-weight="600" text-anchor="middle">传统详细设计</text><path stroke="#d1cfc5" stroke-dasharray="2,2" stroke-width=".5" d="M30 84h150"/><text x="35" y="100" fill="#87867f" font-size="9">→ 规定&quot;怎么实现&quot;</text><text x="35" y="114" fill="#87867f" font-size="9">→ 覆盖所有技术细节</text><text x="35" y="128" fill="#87867f" font-size="9">→ 文档与代码同步难</text><text x="35" y="142" fill="#87867f" font-size="9">→ AI 只能执行指令</text><text x="35" y="156" fill="#87867f" font-size="9">→ 维护负担重</text><text x="35" y="170" fill="#87867f" font-size="9">→ 约束而非引导</text><text x="35" y="192" fill="#d97757" font-size="9" font-weight="600">Spec 驱动</text><rect width="170" height="170" x="370" y="52" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><rect width="170" height="26" x="370" y="52" fill="#fef3c7" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="455" y="70" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">Intent-Driven</text><path stroke="#d97757" stroke-dasharray="2,2" stroke-width=".5" d="M380 84h150"/><text x="385" y="100" fill="#059669" font-size="9">→ 规定&quot;要达成什么&quot;</text><text x="385" y="114" fill="#059669" font-size="9">→ 保留设计自由度</text><text x="385" y="128" fill="#059669" font-size="9">→ 文档即意图表达</text><text x="385" y="142" fill="#059669" font-size="9">→ AI 理解业务目标</text><text x="385" y="156" fill="#059669" font-size="9">→ Examples 比 Spec 更有效</text><text x="385" y="170" fill="#059669" font-size="9">→ 引导而非约束</text><text x="385" y="192" fill="#059669" font-size="9" font-weight="600">Intent 驱动</text><text x="280" y="234" fill="#87867f" font-size="9" font-style="italic" text-anchor="middle">Intent-Driven = 描述意图而非步骤，AI 获得设计自由度</text></svg>