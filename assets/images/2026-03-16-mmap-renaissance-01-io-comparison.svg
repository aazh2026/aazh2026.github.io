<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#141413"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#141413">mmap  vs 传统 I/O：两种数据访问模式</text>

  <!-- Traditional I/O side -->
  <rect x="40" y="65" width="340" height="300" rx="12" fill="#FAF9F5" stroke="#87867F" stroke-width="2"/>
  <text x="210" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#141413">传统 I/O</text>
  <text x="210" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">一次性加载整个文件</text>

  <!-- Disk -->
  <rect x="60" y="130" width="100" height="70" rx="8" fill="#D1CFC5"/>
  <text x="110" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#141413">磁盘/SSD</text>
  <text x="110" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#87867F">graph.bin</text>

  <!-- Arrow down -->
  <line x1="110" y1="205" x2="110" y2="235" stroke="#141413" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="110" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#D97757">全部读入</text>

  <!-- RAM -->
  <rect x="60" y="240" width="100" height="70" rx="8" fill="#788C5D"/>
  <text x="110" y="272" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#FAF9F5">内存</text>
  <text x="110" y="288" text-anchor="middle" font-family="monospace" font-size="10" fill="#E3DACC">64GB 全占用</text>

  <!-- X mark on unused -->
  <rect x="180" y="240" width="80" height="70" rx="8" fill="#D1CFC5" opacity="0.5"/>
  <text x="220" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">其他程序</text>
  <text x="220" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">无空间</text>

  <!-- Characteristics -->
  <text x="60" y="335" font-family="system-ui,sans-serif" font-size="11" fill="#141413">● 启动慢：需等全部加载</text>
  <text x="60" y="352" font-family="system-ui,sans-serif" font-size="11" fill="#141413">● 内存占用：高</text>
  <text x="60" y="369" font-family="system-ui,sans-serif" font-size="11" fill="#141413">● 图规模：受内存限制</text>

  <!-- mmap side -->
  <rect x="420" y="65" width="340" height="300" rx="12" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <text x="590" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#788C5D">mmap (内存映射)</text>
  <text x="590" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">按需加载，按页调度</text>

  <!-- Disk -->
  <rect x="440" y="130" width="100" height="70" rx="8" fill="#D1CFC5"/>
  <text x="490" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#141413">磁盘/SSD</text>
  <text x="490" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#87867F">graph.bin</text>

  <!-- Virtual memory box -->
  <rect x="560" y="130" width="180" height="70" rx="8" fill="#E3DACC" stroke="#788C5D" stroke-width="1.5"/>
  <text x="650" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#141413">虚拟内存空间</text>
  <text x="650" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#788C5D">ptr = mmap(..., file)</text>
  <text x="650" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">按需换页</text>

  <!-- Arrow to virtual memory -->
  <path d="M500 165 L 550 165" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="525" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#788C5D">映射</text>

  <!-- Page fault illustration -->
  <rect x="560" y="220" width="80" height="45" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
  <text x="600" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#D97757">Page</text>
  <text x="600" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#D97757">Fault!</text>

  <rect x="660" y="220" width="80" height="45" rx="6" fill="#788C5D"/>
  <text x="700" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FAF9F5">加载</text>
  <text x="700" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FAF9F5">需要的页</text>

  <!-- RAM only partial -->
  <rect x="440" y="280" width="100" height="60" rx="8" fill="#788C5D"/>
  <text x="490" y="307" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#FAF9F5">内存</text>
  <text x="490" y="323" text-anchor="middle" font-family="monospace" font-size="10" fill="#E3DACC">按需缓存</text>

  <rect x="560" y="280" width="180" height="60" rx="8" fill="#D1CFC5" opacity="0.5"/>
  <text x="650" y="307" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#141413">其他程序</text>
  <text x="650" y="323" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#141413">仍有空间</text>

  <!-- Characteristics -->
  <text x="440" y="365" font-family="system-ui,sans-serif" font-size="11" fill="#141413">● 首次慢：page fault 代价</text>
  <text x="440" y="382" font-family="system-ui,sans-serif" font-size="11" fill="#141413">● 内存占用：低（按需）</text>
  <text x="440" y="399" font-family="system-ui,sans-serif" font-size="11" fill="#141413">● 图规模：受磁盘限制</text>

  <!-- VS -->
  <text x="400" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#D97757">VS</text>
</svg>