<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 640 300">
  <title>IH-Challenge RL 训练循环</title>
  <desc>
    强化学习训练循环图：生成冲突指令对话 → 模型生成响应 → 奖励信号 → 更新模型
  </desc>
  <path fill="#faf9f5" d="M0 0h640v300H0z"/>
  <text x="320" y="26" fill="#141413" font-size="14" font-weight="500" text-anchor="middle">IH-Challenge 强化学习训练循环</text>
  <text x="320" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">OpenAI Instruction Hierarchy · 2026/03</text>
  <rect width="140" height="90" x="30" y="80" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="100" y="104" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Step 1</text>
  <text x="100" y="124" fill="#141413" font-size="12" text-anchor="middle">生成冲突指令对话</text>
  <text x="100" y="142" fill="#87867f" font-size="10" text-anchor="middle">System / Developer /</text>
  <text x="100" y="156" fill="#87867f" font-size="10" text-anchor="middle">User / Tool 冲突</text>
  <path stroke="#d1cfc5" stroke-width="2" d="M170 125h25"/>
  <path fill="#d1cfc5" d="m195 125-8-6v12z"/>
  <rect width="140" height="90" x="200" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <text x="270" y="104" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Step 2</text>
  <text x="270" y="124" fill="#141413" font-size="12" text-anchor="middle">模型生成响应</text>
  <text x="270" y="142" fill="#87867f" font-size="10" text-anchor="middle">给定对话上下文</text>
  <text x="270" y="156" fill="#87867f" font-size="10" text-anchor="middle">预测下一步输出</text>
  <path stroke="#d1cfc5" stroke-width="2" d="M340 125h25"/>
  <path fill="#d1cfc5" d="m365 125-8-6v12z"/>
  <rect width="160" height="90" x="370" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <text x="450" y="104" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Step 3</text>
  <text x="450" y="124" fill="#141413" font-size="12" text-anchor="middle">奖励信号判定</text>
  <rect width="58" height="26" x="382" y="134" fill="#788c5d" rx="5"/>
  <text x="411" y="151" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">✓ 遵循正确指令</text>
  <rect width="58" height="26" x="450" y="134" fill="#c9544d" rx="5"/>
  <text x="479" y="151" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">✗ 遵循错误指令</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.8" d="M450 170c0 50-180 50-180 0"/>
  <path fill="#d97757" d="m270 170 8 8h-16z"/>
  <text x="360" y="236" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">反向传播更新</text>
  <text x="320" y="270" fill="#87867f" font-size="10" text-anchor="middle">模型通过反复试错学会在冲突中选择正确的指令来源</text>
  <rect width="12" height="12" x="30" y="252" fill="#788c5d" rx="2"/>
  <text x="48" y="262" fill="#87867f" font-size="9">正确奖励</text>
  <rect width="12" height="12" x="100" y="252" fill="#c9544d" rx="2"/>
  <text x="118" y="262" fill="#87867f" font-size="9">错误惩罚</text>
</svg>
