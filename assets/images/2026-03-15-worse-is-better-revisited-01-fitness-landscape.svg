<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 380">
  <title>Fitness Landscape: Worse is Better vs The Right Thing</title>
  <desc>
    适应度景观对比图：The Right Thing 追求全局最优但路径更长、风险更高；Worse is Better 接受局部最优，快速迭代抵达可用的峰顶。
  </desc>
  <path fill="#faf9f5" d="M0 0h680v380H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Fitness Landscape 适应度景观</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Richard Gabriel · 1989 · worseisbetter</text>
  <text x="18" y="200" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" transform="rotate(-90 18 200)">适应度 →</text>
  <text x="340" y="368" fill="#87867f" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">设计空间 →</text>
  <path stroke="#d1cfc5" stroke-dasharray="4,4" stroke-width=".8" d="M60 60v280M620 60v280"/>
  <path fill="#e8e4dc" stroke="#d1cfc5" d="M100 340q30-20 60-140 20-100 40-130 20 30 40 130 30 120 60 140"/>
  <path fill="none" stroke="#d97757" stroke-width="2" d="M160 200q20-100 40-130 20 30 40 130" opacity=".3"/>
  <circle cx="200" cy="70" r="5" fill="#d97757"/>
  <text x="200" y="56" fill="#d97757" font-size="12" font-weight="600" text-anchor="middle">The Right Thing</text>
  <text x="200" y="345" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">全局最优峰</text>
  <path fill="#e8edde" stroke="#d1cfc5" d="M380 340q40-40 80-160 30-60 60-80 30 20 60 80 40 120 80 160"/>
  <path fill="none" stroke="#788c5d" stroke-width="2" d="M460 180q30-60 60-80 30 20 60 80" opacity=".3"/>
  <circle cx="520" cy="100" r="5" fill="#788c5d"/>
  <text x="520" y="86" fill="#788c5d" font-size="12" font-weight="600" text-anchor="middle">Worse is Better</text>
  <text x="520" y="345" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">局部最优峰（可达）</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="6,4" stroke-width="2" d="M80 340q40-40 70-90 20-70 50-180" opacity=".6"/>
  <text x="130" y="240" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" opacity=".8">需要太多</text>
  <text x="130" y="253" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" opacity=".8">前置信息</text>
  <circle cx="120" cy="290" r="3" fill="#d97757" opacity=".6"/>
  <circle cx="150" cy="250" r="3" fill="#d97757" opacity=".6"/>
  <circle cx="170" cy="180" r="3" fill="#d97757" opacity=".6"/>
  <circle cx="190" cy="120" r="3" fill="#d97757" opacity=".6"/>
  <path fill="none" stroke="#788c5d" stroke-width="2.5" d="M660 340q-60-40-100-100-20-60-40-140"/>
  <circle cx="640" cy="310" r="4" fill="#788c5d"/>
  <circle cx="600" cy="280" r="4" fill="#788c5d"/>
  <circle cx="570" cy="240" r="4" fill="#788c5d"/>
  <circle cx="550" cy="190" r="4" fill="#788c5d"/>
  <circle cx="530" cy="140" r="4" fill="#788c5d"/>
  <path fill="none" stroke="#788c5d" marker-end="url(#arrowhead)" d="M638 306q-20-14-36-28"/>
  <path fill="none" stroke="#788c5d" marker-end="url(#arrowhead)" d="M598 276q-16-14-26-38"/>
  <path fill="none" stroke="#788c5d" marker-end="url(#arrowhead)" d="M568 236q-10-24-16-48"/>
  <path fill="none" stroke="#788c5d" marker-end="url(#arrowhead)" d="M548 186q-10-24-16-44"/>
  <defs>
    <marker id="arrowhead" markerHeight="6" markerWidth="6" orient="auto" refX="5" refY="3">
      <path fill="#788c5d" d="m0 0 6 3-6 3z"/>
    </marker>
  </defs>
  <text x="600" y="315" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">快速迭代</text>
  <text x="600" y="328" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">真实学习</text>
  <path stroke="#d1cfc5" stroke-dasharray="8,4" d="M340 60v280" opacity=".5"/>
  <text x="340" y="58" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">两条路径</text>
  <rect width="14" height="14" x="40" y="358" fill="#d97757" opacity=".6" rx="2"/>
  <text x="60" y="369" fill="#141413" font-size="10">The Right Thing（追求完美路径）</text>
  <rect width="14" height="14" x="280" y="358" fill="#788c5d" rx="2"/>
  <text x="300" y="369" fill="#141413" font-size="10">Worse is Better（接受局部最优）</text>
</svg>
