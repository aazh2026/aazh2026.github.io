<svg viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- AI时代四层权力结构 -->
  <rect width="560" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI 时代四层权力结构</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/03/16</text>

  <!-- Layer 4: Application (top, most replaceable) -->
  <rect x="40" y="50" width="480" height="52" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="50" width="480" height="22" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="66" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L4 · Application Layer</text>
  <text x="210" y="66" font-size="12" fill="#141413" font-weight="600">应用层</text>
  <text x="60" y="84" font-size="10" fill="#87867F">ChatGPT · Jasper · CopyAI</text>
  <text x="60" y="96" font-size="9.5" fill="#D97757">最易被替代，差异化最小，护城河：无</text>
  <rect x="490" y="62" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="75" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L4</text>

  <!-- Arrow -->
  <line x1="280" y1="102" x2="280" y2="112" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,112 280,120 284,112" fill="#D1CFC5"/>

  <!-- Layer 3: Agent Runtime -->
  <rect x="40" y="120" width="480" height="44" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="40" y="120" width="480" height="20" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="60" y="136" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">L3 · Agent Runtime Layer</text>
  <text x="240" y="136" font-size="12" fill="#141413" font-weight="600">代理运行时层</text>
  <text x="60" y="154" font-size="10" fill="#87867F">LangChain · AutoGPT · OpenClaw · 新兴战场，标准未定型</text>
  <rect x="490" y="130" width="18" height="18" rx="9" fill="#EA580C"/>
  <text x="499" y="143" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L3</text>

  <!-- Arrow -->
  <line x1="280" y1="164" x2="280" y2="174" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,174 280,182 284,174" fill="#D1CFC5"/>

  <!-- Layer 2: Action APIs -->
  <rect x="40" y="182" width="480" height="38" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="182" width="480" height="18" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="198" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L2 · Action APIs</text>
  <text x="190" y="198" font-size="12" fill="#141413" font-weight="600">行动 API 层</text>
  <text x="60" y="214" font-size="10" fill="#87867F">Stripe · Twilio · Salesforce API · AI 的执行接口，护城河：数据网络 + 执行深度</text>
  <rect x="490" y="192" width="18" height="14" rx="9" fill="#2563EB"/>
  <text x="499" y="203" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">L2</text>

  <!-- Arrow -->
  <line x1="280" y1="220" x2="280" y2="230" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,230 280,238 284,230" fill="#D1CFC5"/>

  <!-- Layer 1: Data & Infrastructure (bottom, most defensible) -->
  <rect x="40" y="238" width="480" height="18" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="250" font-size="9" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L1 · Data & Infrastructure</text>
  <text x="240" y="250" font-size="10" fill="#141413" font-weight="600">数据与基础设施层</text>
  <text x="400" y="250" font-size="9" fill="#87867F">Snowflake · Databricks · Cloudflare</text>
  <rect x="490" y="241" width="18" height="12" rx="6" fill="#059669"/>
  <text x="499" y="250" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">L1</text>

  <!-- Defensibility arrow -->
  <text x="540" y="90" font-size="8" fill="#059669" font-family="ui-monospace, monospace" transform="rotate(-90,540,90)">护城河强度 ↑</text>
  <line x1="536" y1="70" x2="536" y2="238" stroke="#059669" stroke-width="1" stroke-dasharray="2,2"/>
  <polygon points="536,70 532,76 540,76" fill="#059669"/>
</svg>