<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="500" height="420">
  <style>
    .bg { fill: #FAF9F5; }
    .border { stroke: #D1CFC5; stroke-width: 1.5; fill: none; }
    .border-dark { stroke: #87867F; stroke-width: 1.5; fill: none; }
    .box-planner { fill: #D97757; }
    .box-executor { fill: #E3DACC; }
    .box-critic { fill: #E3DACC; }
    .box-memory { fill: #E3DACC; }
    .box-tool { fill: #788C5D; }
    .box-generic { fill: #E3DACC; }
    .text-white { fill: #FAF9F5; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .text-dark { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .text-label { fill: #87867F; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; }
    .text-dark-small { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 500; }
    .text-heading { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 700; }
    .text-clay { fill: #D97757; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .arrow { stroke: #D1CFC5; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-dark { stroke: #87867F; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-dark); }
    .arrow-clay { stroke: #D97757; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-clay); }
    .divider { stroke: #D1CFC5; stroke-width: 1; }
    .cell-label { fill: #87867F; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 10px; }
    .cell-value { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 600; }
    .cell-value-clay { fill: #D97757; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1CFC5"/>
    </marker>
    <marker id="arrowhead-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
    <marker id="arrowhead-clay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97757"/>
    </marker>
  </defs>
  <rect class="bg" width="500" height="420" rx="8"/>

  <text x="250" y="35" text-anchor="middle" class="text-heading">gstack 与 Claude Code 决策流程</text>
  <rect x="110" y="175" width="280" height="48" class="border" rx="4"/>
  <text x="250" y="199" text-anchor="middle" class="text-label" style="font-size:11px">决策：使用 gstack 命令还是加载 Skill？</text>
  <line x1="110" y1="207" x2="390" y2="207" class="divider"/>
  <rect x="111" y="208" width="139" height="16" fill="#E3DACC" rx="0"/>
  <text x="179" y="227" text-anchor="middle" class="text-dark-small">gstack 命令（如 /review）</text>
  <line x1="249" y1="208" x2="249" y2="223" class="divider"/>
  <text x="179" y="240" text-anchor="middle" class="text-label" style="font-size:10px">预置流程执行（用 Skill 机制实现）</text>
  <rect x="251" y="208" width="139" height="16" fill="#E3DACC" rx="0"/>
  <text x="320" y="227" text-anchor="middle" class="text-dark-small">自定义 Skill（如 deploy-service）</text>
  <text x="320" y="240" text-anchor="middle" class="text-label" style="font-size:10px">能力扩展执行</text>
  <rect x="190" y="238" width="120" height="38" class="border" rx="4"/>
  <text x="250" y="262" text-anchor="middle" class="text-dark-small">结果输出</text>
  <line x1="250" y1="108" x2="250" y2="170" class="arrow"/>
  <line x1="250" y1="223" x2="250" y2="238" class="arrow"/>
  <line x1="250" y1="223" x2="250" y2="238" class="arrow"/>
  <line x1="179" y1="223" x2="179" y2="231" class="arrow"/>
  <line x1="320" y1="223" x2="320" y2="231" class="arrow"/>
  <rect x="200" y="55" width="100" height="38" fill="#D97757" rx="4"/>
  <text x="250" y="81" text-anchor="middle" class="text-white">用户输入</text>
  <line x1="250" y1="93" x2="250" y2="108" class="arrow"/>
  <rect x="140" y="110" width="220" height="38" fill="#E3DACC" rx="4"/>
  <text x="250" y="136" text-anchor="middle" class="text-dark-small">意图识别（Claude Code）</text>
  <line x1="250" y1="148" x2="250" y2="163" class="arrow"/>
  <line x1="250" y1="163" x2="250" y2="170" class="arrow"/>
  <line x1="179" y1="231" x2="179" y2="238" class="arrow"/>
  <line x1="320" y1="231" x2="320" y2="238" class="arrow"/>
  <path d="M 179 231 Q 179 248 250 248" class="arrow" fill="none"/>
  <path d="M 320 231 Q 320 248 250 248" class="arrow" fill="none"/>
  <line x1="250" y1="248" x2="250" y2="256" class="arrow"/>
</svg>