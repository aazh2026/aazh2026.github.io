<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg4" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f5"/>
      <stop offset="100%" style="stop-color:#e3dacc"/>
    </linearGradient>
  </defs>
  <path fill="url(#bg4)" d="M0 0h800v420H0z"/>
  <text x="400" y="32" fill="#141413" font-family="system-ui,sans-serif" font-size="20" font-weight="700" text-anchor="middle">XML 与 S-Expression：结构同构的两种 DSL</text>
  <rect width="360" height="300" x="30" y="55" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="12"/>
  <text x="210" y="80" fill="#788c5d" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">Lisp S-Expression</text>
  <text x="210" y="97" fill="#87867f" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">&quot;Code as data, data as code&quot;</text>
  <rect width="320" height="100" x="50" y="110" fill="#141413" rx="8"/>
  <text x="65" y="133" fill="#e3dacc" font-family="monospace" font-size="12">(workflow &quot;order&quot;</text>
  <text x="75" y="152" fill="#e3dacc" font-family="monospace" font-size="12">  (step &quot;validate&quot;</text>
  <text x="85" y="171" fill="#e3dacc" font-family="monospace" font-size="12">    (input &quot;order-data&quot;)</text>
  <text x="85" y="190" fill="#e3dacc" font-family="monospace" font-size="12">    (rule &quot;amount &gt; 0&quot;))</text>
  <text x="75" y="209" fill="#e3dacc" font-family="monospace" font-size="12">  (step &quot;payment&quot;</text>
  <text x="65" y="228" fill="#e3dacc" font-family="monospace" font-size="12">    (action &quot;pay&quot;)))</text>
  <rect width="320" height="80" x="50" y="245" fill="#e3dacc" rx="8"/>
  <text x="210" y="268" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">✓ 语法即 AST（抽象语法树）</text>
  <text x="210" y="286" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">✓ 极简语法，极致表达能力</text>
  <text x="210" y="304" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">✓ Homoiconicity（同象性）</text>
  <text x="210" y="322" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">代码本身可以被当作数据操作</text>
  <text x="400" y="195" fill="#d97757" font-family="system-ui,sans-serif" font-size="28" font-weight="700" text-anchor="middle">≅</text>
  <text x="400" y="215" fill="#87867f" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">结构同构</text>
  <rect width="360" height="300" x="410" y="55" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="12"/>
  <text x="590" y="80" fill="#d97757" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">XML</text>
  <text x="590" y="97" fill="#87867f" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">&quot;Tag-based hierarchical DSL&quot;</text>
  <rect width="320" height="100" x="430" y="110" fill="#faf9f5" stroke="#d1cfc5" rx="8"/>
  <text x="445" y="133" fill="#141413" font-family="monospace" font-size="11">&lt;workflow name=&quot;order&quot;&gt;</text>
  <text x="455" y="152" fill="#141413" font-family="monospace" font-size="11">&lt;step id=&quot;validate&quot;&gt;</text>
  <text x="465" y="171" fill="#141413" font-family="monospace" font-size="11">&lt;input&gt;order-data&lt;/input&gt;</text>
  <text x="465" y="190" fill="#141413" font-family="monospace" font-size="11">&lt;rule&gt;amount &gt; 0&lt;/rule&gt;</text>
  <text x="455" y="209" fill="#141413" font-family="monospace" font-size="11">&lt;/step&gt;</text>
  <text x="445" y="228" fill="#141413" font-family="monospace" font-size="11">&lt;/workflow&gt;</text>
  <rect width="320" height="80" x="430" y="245" fill="#e3dacc" rx="8"/>
  <text x="590" y="268" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">✓ 层级结构，语义清晰</text>
  <text x="590" y="286" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">✓ 属性 vs 元素区分语义</text>
  <text x="590" y="304" fill="#141413" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">✓ Schema 验证 + 命名空间</text>
  <text x="590" y="322" fill="#87867f" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">XSD、XPath、XSLT 丰富工具链</text>
  <rect width="740" height="40" x="30" y="370" fill="#141413" rx="8"/>
  <text x="400" y="397" fill="#faf9f5" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">&quot;Imagine lisp but instead of parens you had xml tags&quot; — Reddit</text>
</svg>
