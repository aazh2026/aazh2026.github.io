<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 900 520"><title>Judgment vs Execution Separation</title><desc>判断力与执行力必须分离——Generator-Evaluator双Agent架构</desc><defs><marker id="arr" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#d97757" d="m0 0 10 3.5L0 7z"/></marker><marker id="arr2" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#788c5d" d="m0 0 10 3.5L0 7z"/></marker><filter id="shadow" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="5"/></filter></defs><path fill="#faf9f5" d="M0 0h900v520H0z"/><text x="450" y="36" fill="#141413" font-size="18" font-weight="bold" letter-spacing="1" text-anchor="middle">JUDGMENT 与 EXECUTION 必须分离</text><text x="450" y="58" fill="#87867f" font-size="12" letter-spacing=".5" text-anchor="middle">AI无法可靠评判自己的工作——需要一个独立的Evaluator</text><path stroke="#d1cfc5" d="M180 68h540"/><rect width="400" height="52" x="250" y="84" fill="#141413" filter="url(#shadow)" rx="12"/><text x="450" y="106" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">「评判能力需要距离感，执行能力需要沉浸感」</text><text x="450" y="124" fill="#d97757" font-size="11" text-anchor="middle">这两种认知状态是互斥的</text><rect width="280" height="180" x="40" y="165" fill="#faf9f5" stroke="#d97757" stroke-width="2.5" filter="url(#shadow)" rx="12"/><rect width="280" height="36" x="40" y="165" fill="#d97757" opacity=".15" rx="12"/><path fill="#d97757" d="M40 185h280v16H40z" opacity=".15"/><text x="180" y="187" fill="#d97757" font-size="13" font-weight="bold" text-anchor="middle">✗ 错误做法</text><text x="180" y="187" fill="#d97757" font-size="13" font-weight="bold" letter-spacing="0" text-anchor="middle">✗ 错误做法</text><text x="180" y="210" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">单模型既写代码又评判代码</text><path stroke="#d1cfc5" d="M90 220h180"/><rect width="160" height="60" x="100" y="230" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".12" rx="8"/><text x="180" y="252" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">SAME MODEL</text><text x="180" y="270" fill="#d97757" font-size="11" text-anchor="middle">Generator + Evaluator</text><text x="80" y="308" fill="#141413" font-size="10">• 无法保持外部观察者视角</text><text x="80" y="324" fill="#141413" font-size="10">• 对自己的工作评价过于正面</text><text x="80" y="340" fill="#141413" font-size="10">• 知道代码从哪里来，无法客观</text><text x="80" y="356" fill="#d97757" font-size="10">→ 评价不可信</text><path stroke="#d97757" stroke-width="3" d="m50 330 260-165" opacity=".6"/><rect width="480" height="280" x="380" y="165" fill="#faf9f5" stroke="#788c5d" stroke-width="2.5" filter="url(#shadow)" rx="12"/><rect width="480" height="36" x="380" y="165" fill="#788c5d" opacity=".15" rx="12"/><path fill="#788c5d" d="M380 185h480v16H380z" opacity=".15"/><text x="620" y="187" fill="#788c5d" font-size="13" font-weight="bold" letter-spacing="1" text-anchor="middle">✓ 正确架构：GENERATOR + EVALUATOR 双模型</text><rect width="200" height="120" x="400" y="215" fill="#e3dacc" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="10"/><rect width="200" height="30" x="400" y="215" fill="#d97757" rx="10"/><path fill="#d97757" d="M400 235h200v10H400z"/><text x="500" y="235" fill="#faf9f5" font-size="13" font-weight="bold" letter-spacing="1" text-anchor="middle">GENERATOR</text><text x="500" y="262" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">执行 (Execution)</text><path stroke="#d1cfc5" d="M430 272h140"/><text x="500" y="290" fill="#141413" font-size="10" text-anchor="middle">写代码</text><text x="500" y="306" fill="#141413" font-size="10" text-anchor="middle">实现功能</text><text x="500" y="322" fill="#141413" font-size="10" text-anchor="middle">提出解决方案</text><path stroke="#d97757" stroke-width="2.5" marker-end="url(#arr)" d="M500 335v20"/><text x="520" y="348" fill="#d97757" font-size="10">生成代码</text><rect width="160" height="55" x="420" y="358" fill="#141413" opacity=".06" rx="6"/><text x="432" y="374" fill="#141413" font-family="Courier New, monospace" font-size="9">def sort_items(items):</text><text x="432" y="387" fill="#141413" font-family="Courier New, monospace" font-size="9">  return sorted(items)</text><text x="432" y="400" fill="#87867f" font-family="Courier New, monospace" font-size="9">  # ...更多代码</text><rect width="200" height="120" x="640" y="215" fill="#e3dacc" stroke="#788c5d" stroke-width="2" filter="url(#shadow)" rx="10"/><rect width="200" height="30" x="640" y="215" fill="#788c5d" rx="10"/><path fill="#788c5d" d="M640 235h200v10H640z"/><text x="740" y="235" fill="#faf9f5" font-size="13" font-weight="bold" letter-spacing="1" text-anchor="middle">EVALUATOR</text><text x="740" y="262" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">判断 (Judgment)</text><path stroke="#d1cfc5" d="M670 272h140"/><text x="740" y="290" fill="#141413" font-size="10" text-anchor="middle">独立验证行为</text><text x="740" y="306" fill="#141413" font-size="10" text-anchor="middle">从代码中得出自己的分析</text><text x="740" y="322" fill="#141413" font-size="10" text-anchor="middle">标记缺陷</text><path stroke="#788c5d" stroke-width="2.5" marker-end="url(#arr2)" d="M740 335v20"/><text x="760" y="348" fill="#788c5d" font-size="10">评判结果</text><rect width="160" height="55" x="660" y="358" fill="#788c5d" opacity=".12" rx="6"/><text x="672" y="374" fill="#141413" font-family="Courier New, monospace" font-size="9">Bug: sorted()不稳定</text><text x="672" y="387" fill="#141413" font-family="Courier New, monospace" font-size="9">建议: 用quicksort</text><text x="672" y="400" fill="#d97757" font-family="Courier New, monospace" font-size="9">Severity: HIGH</text><path fill="none" stroke="#d1cfc5" stroke-dasharray="5,4" stroke-width="2" d="M600 275q20-20 40 0m0 30q-20 20-40 0"/><text x="620" y="250" fill="#87867f" font-size="10" text-anchor="middle">独立</text><text x="620" y="340" fill="#87867f" font-size="10" text-anchor="middle">交叉</text><rect width="280" height="80" x="40" y="365" fill="#e3dacc" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="180" y="384" fill="#141413" font-size="10" font-weight="bold" text-anchor="middle">Nolan Lawson实践：</text><text x="180" y="400" fill="#141413" font-size="10" text-anchor="middle">Claude sub-agent + Codex +</text><text x="180" y="414" fill="#141413" font-size="10" text-anchor="middle">Cursor Bugbot</text><text x="180" y="434" fill="#788c5d" font-size="10" text-anchor="middle">三模型都认为有问题→</text><text x="180" y="446" fill="#788c5d" font-size="10" text-anchor="middle">误报概率接近于零</text><rect width="480" height="68" x="380" y="435" fill="#141413" filter="url(#shadow)" rx="10"/><text x="620" y="458" fill="#faf9f5" font-size="12" font-weight="bold" text-anchor="middle">架构原则，不是AI的bug</text><path stroke="#87867f" d="M430 466h380"/><text x="620" y="483" fill="#d1cfc5" font-size="10" text-anchor="middle">Unix small tools · TDD红/绿/重构 · 代码审查制度</text><text x="620" y="498" fill="#d97757" font-size="10" text-anchor="middle">judgment/execution分离是工程原则，不是对AI缺陷的妥协</text></svg>