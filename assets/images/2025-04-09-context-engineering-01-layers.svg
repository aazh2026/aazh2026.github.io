<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 360">
  <title>Context Engineering 五层金字塔</title>
  <desc>
    五层上下文层次结构：L1任务上下文、L2领域上下文、L3用户上下文、L4组织上下文、L5世界上下文，AI向上可见
  </desc>
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Context Engineering · 五层金字塔</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">上下文层次结构</text>
  <rect width="320" height="50" x="180" y="58" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <text x="196" y="80" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">L5</text>
  <text x="224" y="80" fill="#141413" font-size="13" font-weight="600">World Context</text>
  <text x="480" y="80" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">实时数据 · 外部系统</text>
  <rect width="380" height="50" x="150" y="116" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="166" y="138" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">L4</text>
  <text x="194" y="138" fill="#141413" font-size="13" font-weight="600">Organizational Context</text>
  <text x="510" y="138" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">组织政策 · 团队文化</text>
  <rect width="440" height="50" x="120" y="174" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="136" y="196" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">L3</text>
  <text x="164" y="196" fill="#141413" font-size="13" font-weight="600">User Context</text>
  <text x="540" y="196" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">用户偏好 · 历史记录</text>
  <rect width="500" height="50" x="90" y="232" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="106" y="254" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">L2</text>
  <text x="134" y="254" fill="#141413" font-size="13" font-weight="600">Domain Context</text>
  <text x="570" y="254" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">业务规则 · 产品信息</text>
  <rect width="560" height="50" x="60" y="290" fill="#fff" stroke="#d97757" stroke-width="2" rx="8"/>
  <text x="76" y="312" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">L1</text>
  <text x="104" y="312" fill="#141413" font-size="13" font-weight="600">Task Context</text>
  <text x="600" y="312" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">用户查询 · 会话状态</text>
  <rect width="36" height="180" x="620" y="100" fill="#f0eee6" stroke="#d1cfc5" rx="6"/>
  <text x="638" y="122" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">AI</text>
  <text x="638" y="134" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">向上</text>
  <text x="638" y="146" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">可见</text>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M638 280V156"/>
  <path fill="#d97757" d="m638 152-5 10h10z"/>
  <rect width="560" height="10" x="60" y="344" fill="#d97757" opacity=".15" rx="3"/>
