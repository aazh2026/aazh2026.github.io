<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>Context Engineering 五层金字塔</title>
  <desc>五层上下文层次结构：L1任务上下文、L2领域上下文、L3用户上下文、L4组织上下文、L5世界上下文，AI向上可见</desc>

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Context Engineering · 五层金字塔</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">上下文层次结构</text>

  <!-- Layer 5 (top, widest) - World Context -->
  <rect x="180" y="58" width="320" height="50" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="196" y="80" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L5</text>
  <text x="224" y="80" font-size="13" fill="#141413" font-weight="600">World Context</text>
  <text x="480" y="80" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">实时数据 · 外部系统</text>

  <!-- Layer 4 - Organizational Context -->
  <rect x="150" y="116" width="380" height="50" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="166" y="138" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L4</text>
  <text x="194" y="138" font-size="13" fill="#141413" font-weight="600">Organizational Context</text>
  <text x="510" y="138" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">组织政策 · 团队文化</text>

  <!-- Layer 3 - User Context -->
  <rect x="120" y="174" width="440" height="50" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="136" y="196" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L3</text>
  <text x="164" y="196" font-size="13" fill="#141413" font-weight="600">User Context</text>
  <text x="540" y="196" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">用户偏好 · 历史记录</text>

  <!-- Layer 2 - Domain Context -->
  <rect x="90" y="232" width="500" height="50" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="106" y="254" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L2</text>
  <text x="134" y="254" font-size="13" fill="#141413" font-weight="600">Domain Context</text>
  <text x="570" y="254" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">业务规则 · 产品信息</text>

  <!-- Layer 1 (bottom, widest) - Task Context -->
  <rect x="60" y="290" width="560" height="50" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <text x="76" y="312" font-size="11" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L1</text>
  <text x="104" y="312" font-size="13" fill="#141413" font-weight="600">Task Context</text>
  <text x="600" y="312" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">用户查询 · 会话状态</text>

  <!-- Right side: AI sees upward arrow -->
  <rect x="620" y="100" width="36" height="180" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="638" y="122" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">AI</text>
  <text x="638" y="134" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">向上</text>
  <text x="638" y="146" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">可见</text>

  <!-- Dashed upward arrow on right -->
  <line x1="638" y1="280" x2="638" y2="156" stroke="#D97757" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="638,152 633,162 643,162" fill="#D97757"/>

  <!-- Bottom insight box -->
  <rect x="60" y="344" width="560" height="10" rx="3" fill="#D97757" opacity="0.15"/>
</svg>