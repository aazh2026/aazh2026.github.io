<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 360">
  <title>open-swe 异步事件循环工作原理</title>
  <desc>
    展示 AsyncIO 事件循环如何调度协程、任务队列和 I/O 等待，实现单线程高并发
  </desc>
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" text-anchor="middle">open-swe 异步事件循环</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AsyncIO · 协程调度 · I/O 并发</text>
  <circle cx="340" cy="160" r="52" fill="#fff" stroke="#d97757" stroke-width="2"/>
  <circle cx="340" cy="160" r="38" fill="#d97757" opacity=".12"/>
  <text x="340" y="155" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Event</text>
  <text x="340" y="170" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Loop</text>
  <rect width="120" height="100" x="40" y="108" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="100" y="130" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">Task Queue</text>
  <path stroke="#d1cfc5" d="M60 138h80"/>
  <rect width="88" height="14" x="56" y="148" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="100" y="159" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Task A: await LLM</text>
  <rect width="88" height="14" x="56" y="166" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="100" y="177" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Task B: read file</text>
  <rect width="88" height="14" x="56" y="184" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="100" y="195" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Task C: write file</text>
  <rect width="200" height="90" x="450" y="68" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="550" y="90" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">协程 Coroutines</text>
  <path stroke="#d1cfc5" d="M470 98h160"/>
  <rect width="80" height="18" x="462" y="108" fill="#e8f0e0" stroke="#788c5d" rx="5"/>
  <text x="502" y="121" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">async def run()</text>
  <rect width="80" height="18" x="554" y="108" fill="#e8f0e0" stroke="#788c5d" rx="5"/>
  <text x="594" y="121" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">async def tool()</text>
  <rect width="80" height="18" x="462" y="132" fill="#e8f0e0" stroke="#788c5d" rx="5"/>
  <text x="502" y="145" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">await create_task()</text>
  <rect width="80" height="18" x="554" y="132" fill="#e8f0e0" stroke="#788c5d" rx="5"/>
  <text x="594" y="145" fill="#141413" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">await gather()</text>
  <rect width="200" height="90" x="450" y="188" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="550" y="210" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">I/O await 处理器</text>
  <path stroke="#d1cfc5" d="M470 218h160"/>
  <rect width="56" height="20" x="462" y="228" fill="#fdf0ec" stroke="#d97757" rx="4"/>
  <text x="490" y="242" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">HTTP</text>
  <rect width="56" height="20" x="528" y="228" fill="#fdf0ec" stroke="#d97757" rx="4"/>
  <text x="556" y="242" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">File I/O</text>
  <rect width="56" height="20" x="462" y="254" fill="#fdf0ec" stroke="#d97757" rx="4"/>
  <text x="490" y="268" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">subprocess</text>
  <rect width="56" height="20" x="528" y="254" fill="#fdf0ec" stroke="#d97757" rx="4"/>
  <text x="556" y="268" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">sleep</text>
  <path fill="none" stroke="#788c5d" stroke-dasharray="5,3" stroke-width="1.5" d="M160 158h128"/>
  <path fill="#788c5d" d="m288 158-8-4v8z"/>
  <text x="200" y="152" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">dequeue</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" d="M392 130q28-30 58-22"/>
  <path fill="#d97757" d="m450 108-8 4 6 8z"/>
  <text x="410" y="106" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">schedule</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,3" stroke-width="1.5" d="M392 190q28 30 58 28"/>
  <path fill="#d97757" d="m450 218-8-4 6 8z"/>
  <text x="410" y="228" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">await</text>
  <rect width="600" height="58" x="40" y="288" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="56" y="308" fill="#141413" font-size="11" font-weight="600">CPU 利用率对比</text>
  <text x="140" y="322" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">同步</text>
  <rect width="120" height="16" x="170" y="314" fill="#e8c0b8" stroke="#c06050" rx="4"/>
  <text x="290" y="325" fill="#c06050" font-family="ui-monospace, monospace" font-size="9">20%</text>
  <text x="140" y="342" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">异步</text>
  <rect width="120" height="16" x="170" y="334" fill="#c06050" fill-opacity=".85" stroke="#c06050" rx="4"/>
  <text x="290" y="345" fill="#c06050" font-family="ui-monospace, monospace" font-size="9">90%</text>
  <text x="430" y="322" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">I/O 等待时 CPU 空闲</text>
  <text x="430" y="338" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">协程让 CPU 持续忙碌</text>
  <text x="430" y="354" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">单线程高并发不是梦</text>
</svg>
