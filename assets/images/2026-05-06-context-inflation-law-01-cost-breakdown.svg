<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="Agent 请求成本结构对比">
  <title>上下文成本结构：未优化 vs 优化后</title>
  <desc>对比图展示未优化系统和优化后系统中 Base Cost、Context Cost、Tool Cost 的占比变化，以及缓存节省效果</desc>

  <defs>
    <pattern id="hatch-base" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#D1CFC5" stroke-width="3"/>
    </pattern>
    <pattern id="hatch-ctx" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#D97757" stroke-width="3"/>
    </pattern>
    <pattern id="hatch-tool" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#87867F" stroke-width="3"/>
    </pattern>
    <pattern id="hatch-cache" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#788C5D" stroke-width="3"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="420" fill="#FAF9F5"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#141413">Agent 请求成本结构</text>
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87867F">未优化系统 vs 优化后系统 — 上下文管理是核心杠杆</text>

  <!-- 左侧：未优化系统 -->
  <text x="175" y="78" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">❌ 未优化系统</text>

  <!-- 饼图：未优化 30/55/15 -->
  <circle cx="175" cy="185" r="95" fill="none" stroke="#87867F" stroke-width="1"/>
  <!-- Base 30% = 108deg -->
  <path d="M 175 185 L 175 90 A 95 95 0 0 1 256 242 Z" fill="#D1CFC5"/>
  <!-- Context 55% = 198deg -->
  <path d="M 175 185 L 256 242 A 95 95 0 1 1 107 136 Z" fill="#D97757"/>
  <!-- Tool 15% = 54deg -->
  <path d="M 175 185 L 107 136 A 95 95 0 0 1 175 90 Z" fill="#87867F"/>

  <!-- 标注线 -->
  <line x1="256" y1="242" x2="310" y2="275" stroke="#87867F" stroke-width="1"/>
  <text x="315" y="278" font-family="sans-serif" font-size="10" fill="#141413">Base 30%</text>
  <text x="315" y="290" font-family="sans-serif" font-size="9" fill="#87867F">模型计算</text>

  <line x1="107" y1="136" x2="50" y2="100" stroke="#87867F" stroke-width="1"/>
  <text x="10" y="95" font-family="sans-serif" font-size="10" fill="#141413">Tool 15%</text>
  <text x="10" y="107" font-family="sans-serif" font-size="9" fill="#87867F">工具调用</text>

  <line x1="175" y1="90" x2="175" y2="50" stroke="#87867F" stroke-width="1"/>
  <text x="155" y="42" font-family="sans-serif" font-size="11" font-weight="bold" fill="#D97757">Context 55%</text>
  <text x="135" y="56" font-family="sans-serif" font-size="9" fill="#87867F">← 主要成本来源</text>

  <!-- 中心标签 -->
  <text x="175" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#141413">总成本</text>
  <text x="175" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#D97757" font-weight="bold">$12,000/月</text>

  <!-- 右侧：优化后 -->
  <text x="575" y="78" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#141413">✅ 优化后系统</text>

  <!-- 堆叠条形图：优化后 -->
  <rect x="460" y="110" width="220" height="38" rx="4" fill="#D1CFC5"/>
  <text x="455" y="130" font-family="sans-serif" font-size="10" fill="#141413" text-anchor="end">Base 25%</text>
  <text x="690" y="130" font-family="sans-serif" font-size="9" fill="#87867F">$600</text>

  <rect x="460" y="152" width="154" height="38" rx="4" fill="#D97757"/>
  <text x="455" y="172" font-family="sans-serif" font-size="10" fill="#141413" text-anchor="end">Context 35%</text>
  <text x="690" y="172" font-family="sans-serif" font-size="9" fill="#D97757">$840</text>

  <rect x="460" y="194" width="66" height="38" rx="4" fill="#87867F"/>
  <text x="455" y="214" font-family="sans-serif" font-size="10" fill="#141413" text-anchor="end">Tool 15%</text>
  <text x="690" y="214" font-family="sans-serif" font-size="9" fill="#87867F">$360</text>

  <rect x="460" y="236" width="110" height="38" rx="4" fill="#788C5D"/>
  <text x="455" y="256" font-family="sans-serif" font-size="10" fill="#141413" text-anchor="end">缓存节省</text>
  <text x="690" y="256" font-family="sans-serif" font-size="9" fill="#788C5D">$600</text>

  <!-- 中心总成本 -->
  <text x="570" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#141413">实际成本</text>
  <text x="570" y="320" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#788C5D">$2,400/月</text>
  <text x="570" y="336" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87867F">节省 80%</text>

  <!-- 中间箭头 -->
  <path d="M 295 185 Q 340 140 430 185" stroke="#788C5D" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="370" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#788C5D">语义缓存</text>
  <text x="370" y="167" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#788C5D">+ 上下文压缩</text>

  <path d="M 295 185 Q 340 230 430 185" stroke="#788C5D" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="370" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#788C5D">智能路由</text>

  <!-- 底部关键洞察 -->
  <rect x="40" y="360" width="720" height="48" rx="6" fill="#141413"/>
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FAF9F5">💡 核心洞察</text>
  <text x="400" y="397" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E3DACC">最贵的 token 是那些本来不该存在的 token。上下文优化比换便宜模型有效 10 倍。</text>

  <!-- 图例 -->
  <rect x="100" y="310" width="14" height="14" rx="2" fill="#D1CFC5"/>
  <text x="118" y="322" font-family="sans-serif" font-size="10" fill="#87867F">Base Cost 模型计算</text>

  <rect x="230" y="310" width="14" height="14" rx="2" fill="#D97757"/>
  <text x="248" y="322" font-family="sans-serif" font-size="10" fill="#87867F">Context Cost 上下文</text>

  <rect x="370" y="310" width="14" height="14" rx="2" fill="#87867F"/>
  <text x="388" y="322" font-family="sans-serif" font-size="10" fill="#87867F">Tool Cost 工具</text>

  <rect x="490" y="310" width="14" height="14" rx="2" fill="#788C5D"/>
  <text x="508" y="322" font-family="sans-serif" font-size="10" fill="#87867F">缓存节省</text>
</svg>
