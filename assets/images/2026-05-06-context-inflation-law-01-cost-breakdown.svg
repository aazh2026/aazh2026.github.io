<svg xmlns="http://www.w3.org/2000/svg" aria-label="Agent 请求成本结构对比" viewBox="0 0 800 420">
  <title>上下文成本结构：未优化 vs 优化后</title>
  <desc>
    对比图展示未优化系统和优化后系统中 Base Cost、Context Cost、Tool Cost 的占比变化，以及缓存节省效果
  </desc>
  <path fill="#faf9f5" d="M0 0h800v420H0z"/>
  <text x="400" y="30" fill="#141413" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle">Agent 请求成本结构</text>
  <text x="400" y="48" fill="#87867f" font-family="sans-serif" font-size="11" text-anchor="middle">未优化系统 vs 优化后系统 — 上下文管理是核心杠杆</text>
  <text x="175" y="78" fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">❌ 未优化系统</text>
  <circle cx="175" cy="185" r="95" fill="none" stroke="#87867f"/>
  <path fill="#d1cfc5" d="M175 185V90a95 95 0 0 1 81 152Z"/>
  <path fill="#d97757" d="m175 185 81 57a95 95 0 1 1-149-106Z"/>
  <path fill="#87867f" d="m175 185-68-49a95 95 0 0 1 68-46Z"/>
  <path stroke="#87867f" d="m256 242 54 33"/>
  <text x="315" y="278" fill="#141413" font-family="sans-serif" font-size="10">Base 30%</text>
  <text x="315" y="290" fill="#87867f" font-family="sans-serif" font-size="9">模型计算</text>
  <path stroke="#87867f" d="m107 136-57-36"/>
  <text x="10" y="95" fill="#141413" font-family="sans-serif" font-size="10">Tool 15%</text>
  <text x="10" y="107" fill="#87867f" font-family="sans-serif" font-size="9">工具调用</text>
  <path stroke="#87867f" d="M175 90V50"/>
  <text x="155" y="42" fill="#d97757" font-family="sans-serif" font-size="11" font-weight="bold">Context 55%</text>
  <text x="135" y="56" fill="#87867f" font-family="sans-serif" font-size="9">← 主要成本来源</text>
  <text x="175" y="180" fill="#141413" font-family="sans-serif" font-size="11" text-anchor="middle">总成本</text>
  <text x="175" y="195" fill="#d97757" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">$12,000/月</text>
  <text x="575" y="78" fill="#141413" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">✅ 优化后系统</text>
  <rect width="220" height="38" x="460" y="110" fill="#d1cfc5" rx="4"/>
  <text x="455" y="130" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="end">Base 25%</text>
  <text x="690" y="130" fill="#87867f" font-family="sans-serif" font-size="9">$600</text>
  <rect width="154" height="38" x="460" y="152" fill="#d97757" rx="4"/>
  <text x="455" y="172" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="end">Context 35%</text>
  <text x="690" y="172" fill="#d97757" font-family="sans-serif" font-size="9">$840</text>
  <rect width="66" height="38" x="460" y="194" fill="#87867f" rx="4"/>
  <text x="455" y="214" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="end">Tool 15%</text>
  <text x="690" y="214" fill="#87867f" font-family="sans-serif" font-size="9">$360</text>
  <rect width="110" height="38" x="460" y="236" fill="#788c5d" rx="4"/>
  <text x="455" y="256" fill="#141413" font-family="sans-serif" font-size="10" text-anchor="end">缓存节省</text>
  <text x="690" y="256" fill="#788c5d" font-family="sans-serif" font-size="9">$600</text>
  <text x="570" y="300" fill="#141413" font-family="sans-serif" font-size="11" text-anchor="middle">实际成本</text>
  <text x="570" y="320" fill="#788c5d" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">$2,400/月</text>
  <text x="570" y="336" fill="#87867f" font-family="sans-serif" font-size="10" text-anchor="middle">节省 80%</text>
  <path fill="none" stroke="#788c5d" stroke-dasharray="6,3" stroke-width="2" d="M295 185q45-45 135 0"/>
  <text x="370" y="155" fill="#788c5d" font-family="sans-serif" font-size="10" text-anchor="middle">语义缓存</text>
  <text x="370" y="167" fill="#788c5d" font-family="sans-serif" font-size="10" text-anchor="middle">+ 上下文压缩</text>
  <path fill="none" stroke="#788c5d" stroke-dasharray="6,3" stroke-width="2" d="M295 185q45 45 135 0"/>
  <text x="370" y="230" fill="#788c5d" font-family="sans-serif" font-size="10" text-anchor="middle">智能路由</text>
  <rect width="720" height="48" x="40" y="360" fill="#141413" rx="6"/>
  <text x="400" y="380" fill="#faf9f5" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">💡 核心洞察</text>
  <text x="400" y="397" fill="#e3dacc" font-family="sans-serif" font-size="11" text-anchor="middle">最贵的 token 是那些本来不该存在的 token。上下文优化比换便宜模型有效 10 倍。</text>
  <rect width="14" height="14" x="100" y="310" fill="#d1cfc5" rx="2"/>
  <text x="118" y="322" fill="#87867f" font-family="sans-serif" font-size="10">Base Cost 模型计算</text>
  <rect width="14" height="14" x="230" y="310" fill="#d97757" rx="2"/>
  <text x="248" y="322" fill="#87867f" font-family="sans-serif" font-size="10">Context Cost 上下文</text>
  <rect width="14" height="14" x="370" y="310" fill="#87867f" rx="2"/>
  <text x="388" y="322" fill="#87867f" font-family="sans-serif" font-size="10">Tool Cost 工具</text>
  <rect width="14" height="14" x="490" y="310" fill="#788c5d" rx="2"/>
  <text x="508" y="322" fill="#87867f" font-family="sans-serif" font-size="10">缓存节省</text>
</svg>
