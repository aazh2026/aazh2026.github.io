<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <defs>
    <linearGradient id="bg9" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <marker id="arr10" markerHeight="8" markerWidth="8" orient="auto" refX="5" refY="4">
      <path fill="#d97757" d="M0 0v8l8-4z"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="url(#bg9)" rx="16"/>
  <text x="450" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-.3" text-anchor="middle">实践路径：知识入库的四种场景</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M200 56h500"/>
  <g transform="translate(40 76)">
    <rect width="290" height="70" fill="#d97757" opacity=".06" rx="10"/>
    <text x="145" y="24" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">❌ 传统做法</text>
    <text x="145" y="42" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">会议讨论 → 口头决策 → 遗忘</text>
    <text x="145" y="58" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="11" opacity=".7" text-anchor="middle">一个月后不知为何这样决定</text>
  </g>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" marker-end="url(#arr10)" d="M338 111h27" opacity=".6"/>
  <g transform="translate(373 76)">
    <rect width="487" height="70" fill="#788c5d" opacity=".08" rx="10"/>
    <text x="243" y="24" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">✅ Harness 工程做法</text>
    <text x="243" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">会议讨论 → 写入 docs/decisions/YYYY-MM-DD-*.md → 决策 → 永久可查阅</text>
    <text x="243" y="58" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">背景、选项、理由、影响、参与者 — 全部记录</text>
  </g>
  <g transform="translate(40 162)">
    <rect width="290" height="70" fill="#d97757" opacity=".06" rx="10"/>
    <text x="145" y="24" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">❌ 传统做法</text>
    <text x="145" y="42" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">Slack 讨论 → 2周后淹没</text>
    <text x="145" y="58" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="11" opacity=".7" text-anchor="middle">关键上下文随时间消失</text>
  </g>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" marker-end="url(#arr10)" d="M338 197h27" opacity=".6"/>
  <g transform="translate(373 162)">
    <rect width="487" height="70" fill="#788c5d" opacity=".08" rx="10"/>
    <text x="243" y="24" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">✅ Harness 工程做法</text>
    <text x="243" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">Slack 讨论 → 总结入库 → docs/sessions/YYYY-MM-DD-*.md</text>
    <text x="243" y="58" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">任何人和 Agent 都可以 later 查阅</text>
  </g>
  <g transform="translate(40 248)">
    <rect width="290" height="70" fill="#d97757" opacity=".06" rx="10"/>
    <text x="145" y="24" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">❌ 传统做法</text>
    <text x="145" y="42" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">Review 评论 → PR 合并 → 评论消失</text>
    <text x="145" y="58" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="11" opacity=".7" text-anchor="middle">同样的错误在下一个 PR 重复出现</text>
  </g>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" marker-end="url(#arr10)" d="M338 283h27" opacity=".6"/>
  <g transform="translate(373 248)">
    <rect width="487" height="70" fill="#788c5d" opacity=".08" rx="10"/>
    <text x="243" y="24" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">✅ Harness 工程做法</text>
    <text x="243" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">重复问题 → linter 规则 → 自动化检查</text>
    <text x="243" y="58" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">PR 评论知识 → .pylintrc / .eslintrc → 永久自动化</text>
  </g>
  <g transform="translate(40 334)">
    <rect width="290" height="70" fill="#d97757" opacity=".06" rx="10"/>
    <text x="145" y="24" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">❌ 传统做法</text>
    <text x="145" y="42" fill="#87867f" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">经验传承 → 师徒制</text>
    <text x="145" y="58" fill="#d97757" font-family="system-ui,-apple-system,sans-serif" font-size="11" opacity=".7" text-anchor="middle">员工离职带走关键知识</text>
  </g>
  <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" marker-end="url(#arr10)" d="M338 369h27" opacity=".6"/>
  <g transform="translate(373 334)">
    <rect width="487" height="70" fill="#788c5d" opacity=".08" rx="10"/>
    <text x="243" y="24" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">✅ Harness 工程做法</text>
    <text x="243" y="42" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">经验 → docs/troubleshooting.md → 制度化留存</text>
    <text x="243" y="58" fill="#788c5d" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle">新员工 onboarding 时间缩短 30-50%（Netflix 研究）</text>
  </g>
  <rect width="820" height="36" x="40" y="418" fill="#141413" opacity=".05" rx="10"/>
  <text x="450" y="442" fill="#141413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-style="italic" text-anchor="middle">&quot;Harness 工程只是给了我们一个理由去正视这些问题 — 知识必须显性化。&quot;</text>
</svg>
