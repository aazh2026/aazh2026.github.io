<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 460"><defs><style>.border{fill:none;stroke:#d97757;stroke-width:2.5}.border-inner{fill:none;stroke:#d1cfc5;stroke-width:1}.layer-bullet,.layer-title{font-family:&quot;Courier New&quot;,monospace}.layer-title{fill:#141413;font-size:13px;font-weight:700}.layer-bullet{fill:#87867f;font-size:11.5px}.corner{fill:#d97757}</style></defs><path d="M0 0h480v460H0z" style="fill:#faf9f5"/><rect width="8" height="8" x="14" y="14" class="corner" rx="0"/><rect width="8" height="8" x="458" y="14" class="corner" rx="0"/><rect width="8" height="8" x="14" y="438" class="corner" rx="0"/><rect width="8" height="8" x="458" y="438" class="corner" rx="0"/><rect width="452" height="42" x="14" y="22" rx="3" style="fill:#d97757"/><text x="240" y="50" style="fill:#faf9f5;font-family:&quot;Courier New&quot;,monospace;font-size:15px;font-weight:700" text-anchor="middle">Codex Security 架构</text><path d="M14 68h452" class="border"/><rect width="452" height="108" x="14" y="72" rx="0" style="fill:#e3dacc"/><text x="30" y="96" class="layer-title">第一层：数据流分析（静态）</text><text x="42" y="118" class="layer-bullet">- 追踪用户输入到危险操作的完整路径</text><text x="42" y="136" class="layer-bullet">- 识别潜在的污染数据流</text><path d="M14 184h452" class="border-inner"/><rect width="452" height="108" x="14" y="188" rx="0" style="fill:#faf9f5"/><text x="30" y="212" class="layer-title">第二层：约束推理（AI）</text><text x="42" y="234" class="layer-bullet">- 理解代码语义和意图</text><text x="42" y="252" class="layer-bullet">- 判断数据流是否真正危险</text><path d="M14 300h452" class="border-inner"/><rect width="452" height="108" x="14" y="304" rx="0" style="fill:#e3dacc"/><text x="30" y="328" class="layer-title">第三层：动态验证（执行）</text><text x="42" y="350" class="layer-bullet">- 验证漏洞是否真实可利用</text><text x="42" y="368" class="layer-bullet">- 生成 PoC 证明可行性</text><path d="M14 416h452" class="border"/><path stroke="#d97757" stroke-width="2.5" d="M22 14h436M22 438h436M14 22v394M466 22v394"/></svg>