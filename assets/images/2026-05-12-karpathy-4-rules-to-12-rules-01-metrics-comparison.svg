<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <linearGradient id="ess-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#B05540"/>
    </linearGradient>
    <linearGradient id="acc-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#5F7249"/>
    </linearGradient>
    <linearGradient id="cog-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87867F"/>
      <stop offset="100%" stop-color="#6A675F"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#141413" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#141413" letter-spacing="-0.3">规则演进：错误率 vs 合规率</text>
  <line x1="180" y1="50" x2="620" y2="50" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Rule progression row -->
  <g transform="translate(400,90)">
    <!-- 0 rules -->
    <circle cx="-240" cy="0" r="20" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5"/>
    <text x="-240" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#141413">0</text>
    <text x="-240" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">无规则</text>

    <!-- Arrow 0→4 -->
    <line x1="-215" y1="0" x2="-130" y2="0" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="-172" y="-14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">+4条</text>

    <!-- 4 rules -->
    <circle cx="-105" cy="0" r="20" fill="#D97757" opacity="0.85" stroke="#D97757" stroke-width="2"/>
    <text x="-105" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5">4</text>
    <text x="-105" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#D97757">Karpathy</text>

    <!-- Arrow 4→12 -->
    <line x1="-80" y1="0" x2="105" y2="0" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="12" y="-14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">+8条</text>

    <!-- 12 rules -->
    <circle cx="130" cy="0" r="20" fill="#D97757" stroke="#D97757" stroke-width="2"/>
    <text x="130" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF9F5">12</text>
    <text x="130" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#D97757">实测扩展</text>

    <!-- Arrow 12→18+ (broken) -->
    <line x1="155" y1="0" x2="240" y2="0" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="197" y="-14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">>14条崩</text>

    <!-- 18 rules (broken) -->
    <circle cx="265" cy="0" r="20" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="265" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#87867F">18</text>
    <text x="265" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">过载</text>
  </g>

  <!-- Col 1: Error Rate -->
  <rect x="40" y="135" width="350" height="250" rx="14" fill="#FAF9F5" filter="url(#shadow)"/>
  <rect x="40" y="135" width="350" height="48" rx="14" fill="url(#ess-grad)"/>
  <rect x="40" y="169" width="350" height="14" fill="url(#ess-grad)"/>
  <text x="215" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#FAF9F5">错误率（越低越好）</text>

  <!-- Error rate bars -->
  <text x="60" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#D97757" letter-spacing="1">无规则</text>
  <rect x="130" y="194" width="240" height="22" rx="6" fill="#D97757" opacity="0.85"/>
  <text x="375" y="209" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#D97757">41%</text>

  <text x="60" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#D97757" letter-spacing="1">4 条规则</text>
  <rect x="130" y="232" width="17" height="22" rx="6" fill="#D97757"/>
  <text x="152" y="247" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#D97757" font-weight="600">~3%</text>
  <text x="60" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">下降 38 个百分点</text>

  <text x="60" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#D97757" letter-spacing="1">12 条规则</text>
  <rect x="130" y="287" width="14" height="22" rx="6" fill="#B05540"/>
  <text x="149" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#B05540" font-weight="600">~3%</text>
  <text x="60" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#87867F">再降 8pp</text>

  <!-- Vertical scale -->
  <line x1="130" y1="194" x2="130" y2="320" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Col 2: Compliance Rate -->
  <rect x="410" y="135" width="350" height="250" rx="14" fill="#FAF9F5" filter="url(#shadow)"/>
  <rect x="410" y="135" width="350" height="48" rx="14" fill="url(#acc-grad)"/>
  <rect x="410" y="169" width="350" height="14" fill="url(#acc-grad)"/>
  <text x="585" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#FAF9F5">合规率（越高越好）</text>

  <!-- Compliance rate bars -->
  <text x="430" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#788C5D" letter-spacing="1">4 条规则</text>
  <rect x="510" y="194" width="226" height="22" rx="6" fill="#788C5D" opacity="0.85"/>
  <text x="741" y="209" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#788C5D">78%</text>

  <text x="430" y="247" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#788C5D" letter-spacing="1">12 条规则</text>
  <rect x="510" y="234" width="221" height="22" rx="6" fill="#5F7249"/>
  <text x="736" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#5F7249">76%</text>

  <!-- Scale reference line -->
  <line x1="510" y1="194" x2="510" y2="260" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="510" y1="234" x2="736" y2="234" stroke="#788C5D" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Key insight callout -->
  <rect x="510" y="268" width="230" height="55" rx="8" fill="#E3DACC" opacity="0.7"/>
  <text x="525" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413" font-weight="600">关键洞察：</text>
  <text x="525" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">+8 条规则，合规成本仅降 2%</text>
  <text x="525" y="318" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#141413">却覆盖了 8 个新失败模式</text>

  <!-- Bottom note -->
  <rect x="40" y="395" width="720" height="38" rx="10" fill="#141413" opacity="0.04"/>
  <text x="400" y="418" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#141413">数据来源：30 代码库 × 6 周实测 | ">14 条规则"时 Claude 开始整体 pattern-match 而非逐条处理</text>
</svg>
