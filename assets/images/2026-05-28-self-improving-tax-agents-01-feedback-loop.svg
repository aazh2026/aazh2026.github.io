<svg xmlns="http://www.w3.org/2000/svg" aria-label="Self-improving Tax AI feedback loop" viewBox="0 0 800 480">
  <title>自我改进税务 Agent 反馈循环</title>
  <desc>
    三阶段反馈循环：从业者纠正 → 结构化评估 → Codex 工程改进
  </desc>
  <defs>
    <marker id="arrowClay" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#d97757" d="m0 0 10 3.5L0 7z"/>
    </marker>
    <filter id="shadow" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="2" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="3"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h800v480H0z"/>
  <text x="400" y="38" fill="#141413" font-family="Georgia, serif" font-size="17" font-weight="bold" text-anchor="middle">Tax AI 反馈循环：从生产到改进</text>
  <path stroke="#d1cfc5" d="M120 50h560"/>
  <rect width="220" height="180" x="30" y="72" fill="#e3dacc" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="220" height="34" x="30" y="72" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M30 96h220v10H30z"/>
  <text x="140" y="93" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">① 从业者纠正</text>
  <text x="140" y="125" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle"> Practitioner Correction</text>
  <path stroke="#d1cfc5" stroke-width=".8" d="M55 136h170"/>
  <text x="50" y="158" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 捕获差异：预测值 vs 实际</text>
  <text x="50" y="175" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 分类失败：提取失误 / 偏好 / 噪音</text>
  <text x="50" y="192" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 记录结构化数据</text>
  <text x="50" y="209" fill="#141413" font-family="Arial, sans-serif" font-size="11">  — 期望值 / 预测值 / 操作性</text>
  <text x="50" y="226" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 分组重复模式</text>
  <text x="50" y="243" fill="#141413" font-family="Arial, sans-serif" font-size="11">  → 形成 eval target 候选</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrowClay)" d="M250 162h45"/>
  <text x="272" y="153" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">结构化</text>
  <text x="272" y="175" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">finding</text>
  <rect width="220" height="180" x="300" y="72" fill="#e3dacc" stroke="#788c5d" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="220" height="34" x="300" y="72" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M300 96h220v10H300z"/>
  <text x="410" y="93" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">② 评估流水线</text>
  <text x="410" y="125" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle"> Evaluation Pipeline</text>
  <path stroke="#d1cfc5" stroke-width=".8" d="M325 136h170"/>
  <text x="320" y="158" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 审查相似 review rows</text>
  <text x="320" y="175" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 测量重复失败频率</text>
  <text x="320" y="192" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 分离产品失败 vs 噪音</text>
  <text x="320" y="209" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 转化为 targeted eval set</text>
  <text x="320" y="226" fill="#141413" font-family="Arial, sans-serif" font-size="11">  — 代表性源包 + 期望输出</text>
  <text x="320" y="243" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 量化改进目标</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrowClay)" d="M520 162h45"/>
  <text x="542" y="153" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">eval</text>
  <text x="542" y="175" fill="#87867f" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">targets</text>
  <rect width="210" height="180" x="570" y="72" fill="#e3dacc" stroke="#141413" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="210" height="34" x="570" y="72" fill="#141413" rx="10"/>
  <path fill="#141413" d="M570 96h210v10H570z"/>
  <text x="675" y="93" fill="#faf9f5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">③ Codex 改进</text>
  <text x="675" y="125" fill="#141413" font-family="Arial, sans-serif" font-size="11" text-anchor="middle"> Codex Engineering</text>
  <path stroke="#d1cfc5" stroke-width=".8" d="M595 136h160"/>
  <text x="590" y="158" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 调查管道：trace / eval / repo</text>
  <text x="590" y="175" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 定位根本原因</text>
  <text x="590" y="192" fill="#141413" font-family="Arial, sans-serif" font-size="11">  — 提取模式 / mapper / grader</text>
  <text x="590" y="209" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 实施有针对性修复</text>
  <text x="590" y="226" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 回归验证 + PR 提交</text>
  <text x="590" y="243" fill="#141413" font-family="Arial, sans-serif" font-size="11">• 关闭循环，路由不明确案例</text>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arrowClay)" d="M675 252v28H400v-20l-5-5"/>
  <text x="537" y="292" fill="#d97757" font-family="Arial, sans-serif" font-size="10" font-style="italic" text-anchor="middle">持续迭代 → 准确率从 25% 升至 86%</text>
  <rect width="740" height="155" x="30" y="310" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="400" y="332" fill="#141413" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">关键数字</text>
  <path stroke="#d1cfc5" stroke-width=".8" d="M80 340h640"/>
  <rect width="155" height="55" x="80" y="352" fill="#e3dacc" rx="6"/>
  <text x="157" y="373" fill="#d97757" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle">25% → 86%</text>
  <text x="157" y="392" fill="#87867f" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">六周内达标申报单比例</text>
  <rect width="155" height="55" x="260" y="352" fill="#e3dacc" rx="6"/>
  <text x="337" y="373" fill="#d97757" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle">97%</text>
  <text x="337" y="392" fill="#87867f" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">最终 draft 准确率</text>
  <rect width="155" height="55" x="440" y="352" fill="#e3dacc" rx="6"/>
  <text x="517" y="373" fill="#d97757" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle">~50%</text>
  <text x="517" y="392" fill="#87867f" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">吞吐量提升</text>
  <rect width="120" height="55" x="620" y="352" fill="#e3dacc" rx="6"/>
  <text x="680" y="373" fill="#d97757" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle">15h</text>
  <text x="680" y="392" fill="#87867f" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">去年 180h → 今年</text>
  <rect width="680" height="38" x="80" y="418" fill="#141413" rx="6"/>
  <text x="420" y="436" fill="#faf9f5" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">💡 Key Insight: 核心不是「让 AI 更聪明」，而是建立让生产环境持续产生结构化信号的反馈循环</text>
  <rect width="10" height="10" x="30" y="465" fill="#d97757" rx="2"/>
  <text x="46" y="474" fill="#87867f" font-family="Arial, sans-serif" font-size="9">从业者输入</text>
  <rect width="10" height="10" x="110" y="465" fill="#788c5d" rx="2"/>
  <text x="126" y="474" fill="#87867f" font-family="Arial, sans-serif" font-size="9">评估流水线</text>
  <rect width="10" height="10" x="210" y="465" fill="#141413" rx="2"/>
  <text x="226" y="474" fill="#87867f" font-family="Arial, sans-serif" font-size="9">Codex 工程</text>
</svg>
