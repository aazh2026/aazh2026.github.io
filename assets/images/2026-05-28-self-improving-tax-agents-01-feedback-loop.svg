<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Self-improving Tax AI feedback loop">
  <title>自我改进税务 Agent 反馈循环</title>
  <desc>三阶段反馈循环：从业者纠正 → 结构化评估 → Codex 工程改进</desc>

  <defs>
    <marker id="arrowClay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97757"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#141413">Tax AI 反馈循环：从生产到改进</text>
  <line x1="120" y1="50" x2="680" y2="50" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Stage 1: 从业者纠正 -->
  <rect x="30" y="72" width="220" height="180" rx="10" fill="#E3DACC" stroke="#D97757" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="72" width="220" height="34" rx="10" fill="#D97757"/>
  <rect x="30" y="96" width="220" height="10" fill="#D97757"/>
  <text x="140" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">① 从业者纠正</text>

  <text x="140" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413"> Practitioner Correction</text>
  <line x1="55" y1="136" x2="225" y2="136" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="50" y="158" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 捕获差异：预测值 vs 实际</text>
  <text x="50" y="175" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 分类失败：提取失误 / 偏好 / 噪音</text>
  <text x="50" y="192" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 记录结构化数据</text>
  <text x="50" y="209" font-family="Arial, sans-serif" font-size="11" fill="#141413">  — 期望值 / 预测值 / 操作性</text>
  <text x="50" y="226" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 分组重复模式</text>
  <text x="50" y="243" font-family="Arial, sans-serif" font-size="11" fill="#141413">  → 形成 eval target 候选</text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="162" x2="295" y2="162" stroke="#D97757" stroke-width="2" marker-end="url(#arrowClay)"/>
  <text x="272" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">结构化</text>
  <text x="272" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">finding</text>

  <!-- Stage 2: 评估流水线 -->
  <rect x="300" y="72" width="220" height="180" rx="10" fill="#E3DACC" stroke="#788C5D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="300" y="72" width="220" height="34" rx="10" fill="#788C5D"/>
  <rect x="300" y="96" width="220" height="10" fill="#788C5D"/>
  <text x="410" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">② 评估流水线</text>

  <text x="410" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413"> Evaluation Pipeline</text>
  <line x1="325" y1="136" x2="495" y2="136" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="320" y="158" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 审查相似 review rows</text>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 测量重复失败频率</text>
  <text x="320" y="192" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 分离产品失败 vs 噪音</text>
  <text x="320" y="209" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 转化为 targeted eval set</text>
  <text x="320" y="226" font-family="Arial, sans-serif" font-size="11" fill="#141413">  — 代表性源包 + 期望输出</text>
  <text x="320" y="243" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 量化改进目标</text>

  <!-- Arrow 2→3 -->
  <line x1="520" y1="162" x2="565" y2="162" stroke="#D97757" stroke-width="2" marker-end="url(#arrowClay)"/>
  <text x="542" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">eval</text>
  <text x="542" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#87867F">targets</text>

  <!-- Stage 3: Codex 改进 -->
  <rect x="570" y="72" width="210" height="180" rx="10" fill="#E3DACC" stroke="#141413" stroke-width="2" filter="url(#shadow)"/>
  <rect x="570" y="72" width="210" height="34" rx="10" fill="#141413"/>
  <rect x="570" y="96" width="210" height="10" fill="#141413"/>
  <text x="675" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FAF9F5">③ Codex 改进</text>

  <text x="675" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#141413"> Codex Engineering</text>
  <line x1="595" y1="136" x2="755" y2="136" stroke="#D1CFC5" stroke-width="0.8"/>

  <text x="590" y="158" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 调查管道：trace / eval / repo</text>
  <text x="590" y="175" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 定位根本原因</text>
  <text x="590" y="192" font-family="Arial, sans-serif" font-size="11" fill="#141413">  — 提取模式 / mapper / grader</text>
  <text x="590" y="209" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 实施有针对性修复</text>
  <text x="590" y="226" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 回归验证 + PR 提交</text>
  <text x="590" y="243" font-family="Arial, sans-serif" font-size="11" fill="#141413">• 关闭循环，路由不明确案例</text>

  <!-- Cycle return arrow -->
  <path d="M 675 252 L 675 280 L 400 280 L 400 260 L 395 255" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arrowClay)"/>
  <text x="537" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97757" font-style="italic">持续迭代 → 准确率从 25% 升至 86%</text>

  <!-- Bottom metrics row -->
  <rect x="30" y="310" width="740" height="155" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#141413">关键数字</text>
  <line x1="80" y1="340" x2="720" y2="340" stroke="#D1CFC5" stroke-width="0.8"/>

  <!-- Metrics grid -->
  <!-- Row 1 -->
  <rect x="80" y="352" width="155" height="55" rx="6" fill="#E3DACC"/>
  <text x="157" y="373" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#D97757">25% → 86%</text>
  <text x="157" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#87867F">六周内达标申报单比例</text>

  <rect x="260" y="352" width="155" height="55" rx="6" fill="#E3DACC"/>
  <text x="337" y="373" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#D97757">97%</text>
  <text x="337" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#87867F">最终 draft 准确率</text>

  <rect x="440" y="352" width="155" height="55" rx="6" fill="#E3DACC"/>
  <text x="517" y="373" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#D97757">~50%</text>
  <text x="517" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#87867F">吞吐量提升</text>

  <rect x="620" y="352" width="120" height="55" rx="6" fill="#E3DACC"/>
  <text x="680" y="373" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#D97757">15h</text>
  <text x="680" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#87867F">去年 180h → 今年</text>

  <!-- Row 2: Key insight -->
  <rect x="80" y="418" width="680" height="38" rx="6" fill="#141413"/>
  <text x="420" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FAF9F5">💡 Key Insight: 核心不是「让 AI 更聪明」，而是建立让生产环境持续产生结构化信号的反馈循环</text>

  <!-- Legend -->
  <rect x="30" y="465" width="10" height="10" rx="2" fill="#D97757"/>
  <text x="46" y="474" font-family="Arial, sans-serif" font-size="9" fill="#87867F">从业者输入</text>
  <rect x="110" y="465" width="10" height="10" rx="2" fill="#788C5D"/>
  <text x="126" y="474" font-family="Arial, sans-serif" font-size="9" fill="#87867F">评估流水线</text>
  <rect x="210" y="465" width="10" height="10" rx="2" fill="#141413"/>
  <text x="226" y="474" font-family="Arial, sans-serif" font-size="9" fill="#87867F">Codex 工程</text>
</svg>
