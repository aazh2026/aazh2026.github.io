<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <title>GPT-5.4 272k 分界线定价策略</title>
  <desc>Two-tier pricing diagram showing 272k token threshold and code library distribution</desc>

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">272k 分界线：精心设计的定价策略</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">OpenAI 定价策略分析 · 2026/03/05</text>

  <!-- Left card: 基础定价 (≤272k) -->
  <rect x="40" y="64" width="260" height="140" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="40" y="64" width="260" height="36" rx="8" fill="#788C5D"/>
  <rect x="40" y="88" width="260" height="12" fill="#788C5D"/>
  <text x="170" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">基础定价 ≤ 272k tokens</text>

  <text x="60" y="122" font-size="11" fill="#141413">Input</text>
  <text x="170" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">$3.00</text>
  <text x="220" y="122" font-size="10" fill="#87867F">/ 1M tokens</text>

  <text x="60" y="148" font-size="11" fill="#141413">Output</text>
  <text x="170" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#788C5D" font-family="ui-monospace, monospace">$15.00</text>
  <text x="220" y="148" font-size="10" fill="#87867F">/ 1M tokens</text>

  <rect x="60" y="166" width="220" height="22" rx="11" fill="#E8EDE0"/>
  <text x="170" y="182" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">覆盖 90% 代码库</text>

  <!-- Vertical dotted line at 272k -->
  <line x1="340" y1="80" x2="340" y2="220" stroke="#D97757" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="310" y="62" width="60" height="20" rx="4" fill="#D97757"/>
  <text x="340" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">272k</text>

  <!-- Right card: 溢价区间 (>272k) -->
  <rect x="380" y="64" width="260" height="140" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="380" y="64" width="260" height="36" rx="8" fill="#D97757"/>
  <rect x="380" y="88" width="260" height="12" fill="#D97757"/>
  <text x="510" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">溢价区间 &gt; 272k tokens</text>

  <text x="400" y="122" font-size="11" fill="#141413">Input</text>
  <text x="510" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">$5.00</text>
  <text x="560" y="122" font-size="10" fill="#87867F">/ 1M tokens</text>

  <text x="400" y="148" font-size="11" fill="#141413">Output</text>
  <text x="510" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">$25.00</text>
  <text x="560" y="148" font-size="10" fill="#87867F">/ 1M tokens</text>

  <rect x="400" y="166" width="220" height="22" rx="11" fill="#F5E8E0"/>
  <text x="510" y="182" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">企业级重度用户</text>

  <!-- Arrow from 272k to distribution -->
  <path d="M 340 224 C 340 244, 200 254, 200 264" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="200,264 194,256 206,256" fill="#D97757"/>
  <text x="250" y="258" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">覆盖 90%</text>

  <!-- Code library distribution chart -->
  <rect x="40" y="236" width="600" height="104" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="56" y="256" font-size="11" font-weight="500" fill="#141413">代码库规模分布</text>
  <text x="200" y="256" font-size="10" fill="#87867F">GitHub 统计数据</text>

  <!-- Stacked bar: 65% / 25% / 8% / 2% -->
  <!-- Total width = 540, starting at x=56 -->
  <!-- 65% = 351px, 25% = 135px, 8% = 43px, 2% = 11px -->

  <!-- Bar 1: < 100k tokens (65%) -->
  <rect x="56" y="266" width="351" height="28" rx="4" fill="#788C5D"/>
  <text x="231" y="284" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF" font-family="ui-monospace, monospace">65%</text>
  <text x="420" y="278" font-size="10" fill="#141413">&lt; 100k tokens</text>
  <text x="420" y="290" font-size="9" fill="#87867F">小型库、工具、脚本</text>

  <!-- Bar 2: 100k-272k tokens (25%) -->
  <rect x="407" y="266" width="135" height="28" rx="4" fill="#8BA06F"/>
  <text x="474" y="284" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF" font-family="ui-monospace, monospace">25%</text>
  <text x="560" y="278" font-size="10" fill="#141413">100k-272k</text>
  <text x="560" y="290" font-size="9" fill="#87867F">中型项目、微服务</text>

  <!-- Bar 3: 272k-1M tokens (8%) -->
  <rect x="542" y="266" width="43" height="28" rx="4" fill="#D97757"/>
  <text x="563" y="284" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" font-family="ui-monospace, monospace">8%</text>
  <text x="600" y="278" font-size="10" fill="#141413">272k-1M</text>
  <text x="600" y="290" font-size="9" fill="#87867F">大型项目</text>

  <!-- Bar 4: > 1M tokens (2%) -->
  <rect x="585" y="266" width="11" height="28" rx="4" fill="#C4634A"/>
  <text x="618" y="278" font-size="10" fill="#141413">&gt; 1M</text>
  <text x="618" y="290" font-size="9" fill="#87867F">超大型</text>

  <!-- Key insight callout -->
  <rect x="56" y="302" width="584" height="28" rx="4" fill="#FAF9F5" stroke="#D97757" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="70" y="320" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">272k 正好覆盖 90% 代码库：大多数开发者按基础定价使用，只有大型项目才进入溢价区间</text>
</svg>