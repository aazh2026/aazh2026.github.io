<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 800 500">
  <defs>
    <style>
      .label,.label-sm{fill:#141413;font-size:13px;font-weight:600}.label-sm{font-size:11px;font-weight:500}.desc{fill:#87867f;font-size:11px}.desc-white{fill:rgba(255,255,255,.85);font-size:11px}.white{fill:#fff}.accent-olive{fill:#788c5d}
    </style>
  </defs>
  <path d="M0 0h800v500H0z" style="fill:#faf9f5"/>
  <text x="40" y="38" style="fill:#141413;font-size:20px;font-weight:700">PDD Prompt 生命周期：从临时指令到第一等制品</text>
  <text x="40" y="58" style="fill:#87867f;font-size:12px">Prompt 需要版本控制、Code Review、CI/CD — 与源代码享有同等待遇</text>
  <text x="40" y="90" class="label">制品演进</text>
  <rect width="300" height="36" x="40" y="104" fill="#d1cfc5" rx="6"/>
  <text x="56" y="126" class="desc">2000 年：源代码是唯一制品</text>
  <rect width="300" height="36" x="40" y="146" fill="#d1cfc5" rx="6"/>
  <text x="56" y="168" class="desc">2010 年：源代码 + 测试 + 文档</text>
  <rect width="300" height="36" x="40" y="188" fill="#d1cfc5" rx="6"/>
  <text x="56" y="210" class="desc">2020 年：+ 配置 + 基础设施代码</text>
  <rect width="300" height="36" x="40" y="230" fill="#d97757" rx="6"/>
  <text x="56" y="252" class="label-sm white">2026 年：+ Prompt（第一等制品）✦</text>
  <text x="370" y="90" class="label">Prompt CI/CD 流水线</text>
  <rect width="120" height="80" x="370" y="108" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <circle cx="390" cy="130" r="12" fill="#141413"/>
  <text x="390" y="135" class="label-sm white" text-anchor="middle">1</text>
  <text x="406" y="134" class="label-sm">Commit</text>
  <text x="380" y="154" class="desc">Prompts 变更</text>
  <text x="380" y="170" class="desc">Push 到 Git</text>
  <text x="380" y="186" class="desc accent-olive">触发 CI</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrowRed)" d="M490 148h26"/>
  <rect width="120" height="80" x="526" y="108" fill="#e3dacc" rx="8"/>
  <rect width="120" height="80" x="526" y="108" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <circle cx="546" cy="130" r="12" fill="#d97757"/>
  <text x="546" y="135" class="label-sm white" text-anchor="middle">2</text>
  <text x="562" y="134" class="label-sm">验证</text>
  <text x="536" y="154" class="desc">• Prompt 语法检查</text>
  <text x="536" y="170" class="desc">• Schema 验证</text>
  <text x="536" y="186" class="desc">• 自动化测试</text>
  <path stroke="#d97757" stroke-width="2" d="M646 148h26"/>
  <rect width="78" height="80" x="682" y="108" fill="#e3dacc" rx="8"/>
  <rect width="78" height="80" x="682" y="108" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <circle cx="700" cy="130" r="12" fill="#d97757"/>
  <text x="700" y="135" class="label-sm white" text-anchor="middle">3</text>
  <text x="714" y="134" class="label-sm">回归</text>
  <text x="690" y="154" class="desc">与 Baseline</text>
  <text x="690" y="170" class="desc">输出对比</text>
  <text x="690" y="186" class="desc accent-olive">质量评分</text>
  <rect width="390" height="30" x="370" y="196" fill="#d97757" rx="6"/>
  <text x="390" y="215" class="label-sm white">✗ 失败：阻断发布</text>
  <rect width="390" height="30" x="370" y="232" fill="#788c5d" rx="6"/>
  <text x="390" y="251" class="label-sm white">✓ 通过：发布到 Prompt Registry</text>
  <text x="40" y="290" class="label">PDD 成熟度模型</text>
  <rect width="720" height="38" x="40" y="310" fill="#d1cfc5" rx="6"/>
  <rect width="720" height="38" x="40" y="310" fill="none" stroke="#d1cfc5" rx="6"/>
  <text x="56" y="332" class="label-sm white">L1 临时</text>
  <text x="110" y="332" class="desc-white">偶尔使用 AI，Prompt 随意编写，复制粘贴到 ChatGPT</text>
  <rect width="70" height="26" x="680" y="316" fill="rgba(255,255,255,0.3)" rx="4"/>
  <text x="715" y="334" class="label-sm white" text-anchor="middle">无</text>
  <rect width="540" height="38" x="40" y="354" fill="#e3dacc" rx="6"/>
  <rect width="540" height="38" x="40" y="354" fill="none" stroke="#d1cfc5" rx="6"/>
  <text x="56" y="376" class="label-sm">L2 规范</text>
  <text x="110" y="376" class="desc">建立 Prompt 编写规范，有标准模板和检查清单</text>
  <rect width="70" height="26" x="680" y="360" fill="#e3dacc" stroke="#d1cfc5" rx="4"/>
  <text x="715" y="378" class="label-sm" text-anchor="middle">手动</text>
  <rect width="360" height="38" x="40" y="398" fill="#788c5d" rx="6"/>
  <rect width="360" height="38" x="40" y="398" fill="none" stroke="#788c5d" rx="6"/>
  <text x="56" y="420" class="label-sm white">L3 版本化</text>
  <text x="120" y="420" class="desc-white">Prompt 纳入 Git 版本控制，有 commit 记录和 diff</text>
  <rect width="70" height="26" x="680" y="404" fill="#788c5d" rx="4"/>
  <text x="715" y="422" class="label-sm white" text-anchor="middle">半自动</text>
  <rect width="180" height="38" x="40" y="442" fill="#d97757" rx="6"/>
  <text x="56" y="464" class="label-sm white">L4 自动化 ✦</text>
  <rect width="70" height="26" x="680" y="448" fill="#d97757" rx="4"/>
  <text x="715" y="466" class="label-sm white" text-anchor="middle">自动</text>
  <path fill="none" stroke="#87867f" stroke-dasharray="3,3" stroke-width="1.5" d="M762 320v148"/>
  <text x="40" y="490" class="desc">Prompt 质量直接决定 AI 产出质量 — 管理好 Prompt 就管理好了软件开发的源头</text>
  <text x="700" y="490" class="desc">AI-Native 软件工程系列 #5</text>
  <defs>
    <marker id="arrowRed" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#d97757" d="M0 0v6l8-3z"/>
    </marker>
  </defs>
</svg>
