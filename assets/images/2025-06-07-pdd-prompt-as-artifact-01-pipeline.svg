<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .title { fill: #141413; font-size: 20px; font-weight: 700; }
      .subtitle { fill: #87867F; font-size: 12px; }
      .label { fill: #141413; font-size: 13px; font-weight: 600; }
      .label-sm { fill: #141413; font-size: 11px; font-weight: 500; }
      .desc { fill: #87867F; font-size: 11px; }
      .desc-white { fill: rgba(255,255,255,0.85); font-size: 11px; }
      .white { fill: #ffffff; }
      .accent-clay { fill: #D97757; }
      .accent-olive { fill: #788C5D; }
      .accent-g300 { fill: #D1CFC5; }
      .accent-g500 { fill: #87867F; }
      .accent-oat { fill: #E3DACC; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg"/>

  <!-- Title -->
  <text x="40" y="38" class="title">PDD Prompt 生命周期：从临时指令到第一等制品</text>
  <text x="40" y="58" class="subtitle">Prompt 需要版本控制、Code Review、CI/CD — 与源代码享有同等待遇</text>

  <!-- ===== LEFT: Artifact Evolution ===== -->
  <text x="40" y="90" class="label">制品演进</text>

  <!-- Evolution steps -->
  <rect x="40" y="104" width="300" height="36" rx="6" fill="#D1CFC5"/>
  <text x="56" y="126" class="desc">2000 年：源代码是唯一制品</text>

  <rect x="40" y="146" width="300" height="36" rx="6" fill="#D1CFC5"/>
  <text x="56" y="168" class="desc">2010 年：源代码 + 测试 + 文档</text>

  <rect x="40" y="188" width="300" height="36" rx="6" fill="#D1CFC5"/>
  <text x="56" y="210" class="desc">2020 年：+ 配置 + 基础设施代码</text>

  <rect x="40" y="230" width="300" height="36" rx="6" fill="#D97757"/>
  <text x="56" y="252" class="label-sm white">2026 年：+ Prompt（第一等制品）✦</text>

  <!-- ===== RIGHT: PDD CI/CD Pipeline ===== -->
  <text x="370" y="90" class="label">Prompt CI/CD 流水线</text>

  <!-- Pipeline stages -->
  <!-- Stage 1: Commit -->
  <rect x="370" y="108" width="120" height="80" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="390" cy="130" r="12" fill="#141413"/>
  <text x="390" y="135" text-anchor="middle" class="label-sm white">1</text>
  <text x="406" y="134" class="label-sm">Commit</text>
  <text x="380" y="154" class="desc">Prompts 变更</text>
  <text x="380" y="170" class="desc">Push 到 Git</text>
  <text x="380" y="186" class="desc accent-olive">触发 CI</text>

  <line x1="490" y1="148" x2="516" y2="148" stroke="#D97757" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Stage 2: Validation -->
  <rect x="526" y="108" width="120" height="80" rx="8" fill="#E3DACC"/>
  <rect x="526" y="108" width="120" height="80" rx="8" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="546" cy="130" r="12" fill="#D97757"/>
  <text x="546" y="135" text-anchor="middle" class="label-sm white">2</text>
  <text x="562" y="134" class="label-sm">验证</text>
  <text x="536" y="154" class="desc">• Prompt 语法检查</text>
  <text x="536" y="170" class="desc">• Schema 验证</text>
  <text x="536" y="186" class="desc">• 自动化测试</text>

  <line x1="646" y1="148" x2="672" y2="148" stroke="#D97757" stroke-width="2"/>

  <!-- Stage 3: Regression -->
  <rect x="682" y="108" width="78" height="80" rx="8" fill="#E3DACC"/>
  <rect x="682" y="108" width="78" height="80" rx="8" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="700" cy="130" r="12" fill="#D97757"/>
  <text x="700" y="135" text-anchor="middle" class="label-sm white">3</text>
  <text x="714" y="134" class="label-sm">回归</text>
  <text x="690" y="154" class="desc">与 Baseline</text>
  <text x="690" y="170" class="desc">输出对比</text>
  <text x="690" y="186" class="desc accent-olive">质量评分</text>

  <!-- Failed/Passed outputs -->
  <rect x="370" y="196" width="390" height="30" rx="6" fill="#D97757"/>
  <text x="390" y="215" class="label-sm white">✗ 失败：阻断发布</text>

  <rect x="370" y="232" width="390" height="30" rx="6" fill="#788C5D"/>
  <text x="390" y="251" class="label-sm white">✓ 通过：发布到 Prompt Registry</text>

  <!-- ===== BOTTOM: Maturity Model ===== -->
  <text x="40" y="290" class="label">PDD 成熟度模型</text>

  <!-- Maturity levels as horizontal bars -->
  <!-- L1: Ad-hoc -->
  <rect x="40" y="310" width="720" height="38" rx="6" fill="#D1CFC5"/>
  <rect x="40" y="310" width="720" height="38" rx="6" fill="none" stroke="#D1CFC5" stroke-width="1"/>
  <text x="56" y="332" class="label-sm white">L1 临时</text>
  <text x="110" y="332" class="desc-white">偶尔使用 AI，Prompt 随意编写，复制粘贴到 ChatGPT</text>
  <rect x="680" y="316" width="70" height="26" rx="4" fill="rgba(255,255,255,0.3)"/>
  <text x="715" y="334" text-anchor="middle" class="label-sm white">无</text>

  <!-- L2: Standardized -->
  <rect x="40" y="354" width="540" height="38" rx="6" fill="#E3DACC"/>
  <rect x="40" y="354" width="540" height="38" rx="6" fill="none" stroke="#D1CFC5" stroke-width="1"/>
  <text x="56" y="376" class="label-sm">L2 规范</text>
  <text x="110" y="376" class="desc">建立 Prompt 编写规范，有标准模板和检查清单</text>
  <rect x="680" y="360" width="70" height="26" rx="4" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="715" y="378" text-anchor="middle" class="label-sm">手动</text>

  <!-- L3: Versioned -->
  <rect x="40" y="398" width="360" height="38" rx="6" fill="#788C5D"/>
  <rect x="40" y="398" width="360" height="38" rx="6" fill="none" stroke="#788C5D" stroke-width="1"/>
  <text x="56" y="420" class="label-sm white">L3 版本化</text>
  <text x="120" y="420" class="desc-white">Prompt 纳入 Git 版本控制，有 commit 记录和 diff</text>
  <rect x="680" y="404" width="70" height="26" rx="4" fill="#788C5D"/>
  <text x="715" y="422" text-anchor="middle" class="label-sm white">半自动</text>

  <!-- L4: Automated -->
  <rect x="40" y="442" width="180" height="38" rx="6" fill="#D97757"/>
  <text x="56" y="464" class="label-sm white">L4 自动化 ✦</text>
  <rect x="680" y="448" width="70" height="26" rx="4" fill="#D97757"/>
  <text x="715" y="466" text-anchor="middle" class="label-sm white">自动</text>

  <!-- Maturity progress arrow -->
  <path d="M 762 320 L 762 468" stroke="#87867F" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>

  <!-- Footer -->
  <text x="40" y="490" class="desc">Prompt 质量直接决定 AI 产出质量 — 管理好 Prompt 就管理好了软件开发的源头</text>
  <text x="700" y="490" class="desc">AI-Native 软件工程系列 #5</text>

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97757"/>
    </marker>
  </defs>
</svg>
