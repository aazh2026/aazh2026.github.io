<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, border #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="340" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">验证器经济学：生成 vs 筛选</text>
  <text x="300" y="42" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">Cobbe et al. · arXiv:2110.14168 · 2021</text>

  <!-- Generator card (left) -->
  <rect x="40" y="60" width="210" height="200" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="40" y="60" width="210" height="32" rx="6" fill="#F0EEE6"/>
  <rect x="40" y="80" width="210" height="12" fill="#F0EEE6"/>
  <text x="60" y="81" font-size="11" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">Generator</text>
  <text x="60" y="96" font-size="9.5" fill="#87867F">模型生成候选答案</text>

  <!-- Model icon (simplified neural net) -->
  <circle cx="145" cy="160" r="16" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="125" cy="145" r="8" fill="#E3DACC"/>
  <circle cx="165" cy="145" r="8" fill="#E3DACC"/>
  <circle cx="125" cy="175" r="8" fill="#E3DACC"/>
  <circle cx="165" cy="175" r="8" fill="#E3DACC"/>
  <line x1="145" y1="160" x2="125" y2="145" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="145" y1="160" x2="165" y2="145" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="145" y1="160" x2="125" y2="175" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="145" y1="160" x2="165" y2="175" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="133" y1="149" x2="157" y2="149" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="133" y1="171" x2="157" y2="171" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="125" y1="153" x2="125" y2="167" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="165" y1="153" x2="165" y2="167" stroke="#D1CFC5" stroke-width="1"/>
  <text x="145" y="200" text-anchor="middle" font-size="9" fill="#87867F">LLM</text>

  <!-- Output: 100 candidates arrow -->
  <line x1="40" y1="230" x2="40" y2="272" stroke="#D1CFC5" stroke-width="1"/>
  <polygon points="40,280 36,270 44,270" fill="#D1CFC5"/>
  <text x="26" y="258" font-size="9" fill="#87867F" font-family="ui-monospace, monospace" transform="rotate(-90,26,258)">生成 100 个</text>

  <!-- Arrow from Generator to Verifier -->
  <line x1="250" y1="160" x2="320" y2="160" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="328,160 318,155 318,165" fill="#D1CFC5"/>
  <text x="285" y="153" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">候选答案</text>

  <!-- Verifier card (right) - highlighted with clay border -->
  <rect x="330" y="60" width="230" height="200" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="330" y="60" width="230" height="32" rx="6" fill="#FDF5F2"/>
  <rect x="330" y="80" width="230" height="12" fill="#FDF5F2"/>
  <text x="350" y="81" font-size="11" font-weight="700" fill="#D97757" font-family="ui-monospace, monospace">Verifier</text>
  <text x="350" y="96" font-size="9.5" fill="#87867F">验证器筛选最佳答案</text>

  <!-- Checkmark filter icon -->
  <rect x="420" y="130" width="70" height="60" rx="4" fill="#FDF5F2" stroke="#D97757" stroke-width="1.5"/>
  <polyline points="432,162 443,174 458,148" stroke="#D97757" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="420" y1="163" x2="490" y2="163" stroke="#D97757" stroke-width="1"/>
  <line x1="420" y1="160" x2="420" y2="175" stroke="#D97757" stroke-width="1"/>
  <line x1="490" y1="160" x2="490" y2="175" stroke="#D97757" stroke-width="1"/>
  <text x="455" y="120" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">筛选</text>

  <!-- Output: 1 best answer arrow -->
  <line x1="560" y1="160" x2="560" y2="272" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="560,280 556,270 564,270" fill="#D97757"/>
  <text x="572" y="258" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" transform="rotate(-90,572,258)">最佳答案</text>

  <!-- Bottom accuracy improvement section -->
  <rect x="40" y="295" width="520" height="36" rx="5" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="60" y="317" font-size="11" fill="#141413" font-family="ui-monospace, monospace">准确率提升</text>
  <line x1="170" y1="313" x2="170" y2="317" stroke="#87867F" stroke-width="1"/>
  <rect x="175" y="305" width="55" height="16" rx="3" fill="#E3DACC"/>
  <text x="202" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">~50%</text>
  <line x1="240" y1="313" x2="270" y2="313" stroke="#D97757" stroke-width="2"/>
  <polygon points="278,313 268,309 268,317" fill="#D97757"/>
  <rect x="285" y="305" width="55" height="16" rx="3" fill="#D97757"/>
  <text x="312" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">~70%</text>
  <text x="360" y="317" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">+20pp · 超线性扩展</text>

  <!-- Arrow pointing to Verifier card label -->
  <path d="M 395 92 C 380 108, 370 120, 360 130" stroke="#D97757" stroke-width="1" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <polygon points="360,130 366,122 354,126" fill="#D97757" opacity="0.7"/>
  <text x="396" y="108" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">关键价值</text>
</svg>