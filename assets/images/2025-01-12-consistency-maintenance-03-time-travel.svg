<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 420">
  <title>时间旅行问题的四步工作流</title>
  <desc>
    处理&quot;我上周说的那个方案，现在想改一下&quot;的四步流程：定位、找到、理解、更新
  </desc>
  <path fill="#faf9f5" d="M0 0h680v420H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">时间旅行问题：跨会话上下文定位</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">用户：&quot;我上周说的那个方案，现在想改一下&quot;</text>
  <rect width="140" height="80" x="60" y="80" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <rect width="6" height="80" x="60" y="80" fill="#d97757" rx="3"/>
  <text x="80" y="102" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Step 1</text>
  <text x="80" y="120" fill="#141413" font-size="11.5">定位历史</text>
  <text x="80" y="136" fill="#141413" font-size="11.5">上下文</text>
  <text x="80" y="152" fill="#87867f" font-size="10">时间戳 + 会话ID</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M200 120h24"/>
  <path fill="#d1cfc5" d="m228 120-8-4v8z"/>
  <rect width="140" height="80" x="234" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="6" height="80" x="234" y="80" fill="#d1cfc5" rx="3"/>
  <text x="254" y="102" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Step 2</text>
  <text x="254" y="120" fill="#141413" font-size="11.5">找到目标</text>
  <text x="254" y="136" fill="#141413" font-size="11.5">方案</text>
  <text x="254" y="152" fill="#87867f" font-size="10">语义检索</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M374 120h24"/>
  <path fill="#d1cfc5" d="m402 120-8-4v8z"/>
  <rect width="140" height="80" x="408" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="6" height="80" x="408" y="80" fill="#d1cfc5" rx="3"/>
  <text x="428" y="102" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Step 3</text>
  <text x="428" y="120" fill="#141413" font-size="11.5">理解变更</text>
  <text x="428" y="136" fill="#141413" font-size="11.5">意图</text>
  <text x="428" y="152" fill="#87867f" font-size="10">意图分类</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M548 120h24"/>
  <path fill="#d1cfc5" d="m576 120-8-4v8z"/>
  <rect width="90" height="80" x="582" y="80" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <rect width="6" height="80" x="582" y="80" fill="#788c5d" rx="3"/>
  <text x="602" y="102" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Step 4</text>
  <text x="602" y="120" fill="#141413" font-size="10.5">更新记忆</text>
  <text x="602" y="136" fill="#141413" font-size="10.5">保留审计</text>
  <text x="602" y="152" fill="#87867f" font-size="9.5">不可变性</text>
  <rect width="520" height="56" x="60" y="196" fill="#fff" stroke="#d97757" stroke-dasharray="6,4" stroke-width="1.5" rx="8"/>
  <text x="80" y="220" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="500">挑战：</text>
  <text x="124" y="220" fill="#141413" font-size="11">如何在海量记忆中准确定位历史上下文？</text>
  <text x="80" y="238" fill="#87867f" font-size="10.5">时间戳稀疏 · 语义漂移 · 跨会话关联断裂</text>
  <path fill="none" stroke="#d97757" stroke-dasharray="5,4" stroke-width="2" d="M620 300q20-20 0-40t0-40 0-40" opacity=".7"/>
  <path fill="#d97757" d="m620 180-6 12h12z" opacity=".7"/>
  <text x="600" y="250" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" transform="rotate(-90 600 250)">时间维度</text>
  <rect width="520" height="50" x="60" y="288" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="80" y="310" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5">检索策略：</text>
  <text x="172" y="310" fill="#141413" font-size="10.5">时间范围限定 → 语义相似度排序 → 意图匹配过滤</text>
  <text x="80" y="326" fill="#87867f" font-size="10">底层摘要优先加载（细节准确），顶层摘要作为背景知识补充</text>
  <rect width="520" height="44" x="60" y="360" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
  <text x="80" y="380" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5">审计要求：</text>
  <text x="156" y="380" fill="#141413" font-size="10.5">更新记忆时保留历史版本，不原地覆盖，支持溯源</text>
  <text x="80" y="396" fill="#87867f" font-size="10">每次变更记录：时间戳、操作类型、变更内容、变更原因</text>
</svg>
