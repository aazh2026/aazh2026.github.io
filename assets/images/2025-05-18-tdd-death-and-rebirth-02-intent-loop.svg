<svg viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="560" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">意图契约循环</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">Intent Contract Loop</text>

  <!-- Top node: 人类意图 (clay) -->
  <rect x="190" y="50" width="180" height="56" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="190" y="50" width="180" height="18" rx="10" fill="#D97757"/>
  <rect x="190" y="62" width="180" height="6" fill="#D97757"/>
  <text x="280" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">人类意图</text>
  <text x="280" y="86" text-anchor="middle" font-size="11" fill="#141413">自然语言描述 / Prompt</text>

  <!-- Bottom-right node: AI 生成 (olive) -->
  <rect x="320" y="170" width="180" height="56" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="320" y="170" width="180" height="18" rx="10" fill="#788C5D"/>
  <rect x="320" y="182" width="180" height="6" fill="#788C5D"/>
  <text x="410" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">AI 生成</text>
  <text x="410" y="206" text-anchor="middle" font-size="11" fill="#141413">代码 + 测试套件</text>

  <!-- Bottom-left node: 契约验证 (slate) -->
  <rect x="60" y="170" width="180" height="56" rx="10" fill="#FFFFFF" stroke="#141413" stroke-width="1.8"/>
  <rect x="60" y="170" width="180" height="18" rx="10" fill="#141413"/>
  <rect x="60" y="182" width="180" height="6" fill="#141413"/>
  <text x="150" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">契约验证</text>
  <text x="150" y="206" text-anchor="middle" font-size="11" fill="#141413">通过？重新生成？</text>

  <!-- Arrow: 意图 → AI生成 (top-right to bottom-right) -->
  <line x1="355" y1="106" x2="355" y2="162" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="355,168 350,160 360,160" fill="#D97757"/>
  <text x="374" y="138" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">生成</text>

  <!-- Arrow: AI生成 → 契约验证 (right to left) -->
  <line x1="320" y1="198" x2="240" y2="198" stroke="#788C5D" stroke-width="1.5"/>
  <polygon points="234,198 242,193 242,203" fill="#788C5D"/>
  <text x="280" y="192" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">验证</text>

  <!-- Arrow: 契约验证 → 意图 (bottom-left to top) -->
  <line x1="155" y1="170" x2="220" y2="106" stroke="#141413" stroke-width="1.5"/>
  <polygon points="223,101 214,109 226,109" fill="#141413"/>
  <text x="128" y="138" font-size="8.5" fill="#141413" font-family="ui-monospace, monospace">修正意图</text>

  <!-- Loop return: 契约验证 → 意图 (curved left side) -->
  <path d="M 60 188 C 30 188, 30 80, 190 80" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="190,75 184,84 196,84" fill="#D1CFC5"/>
  <text x="34" y="136" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">重新</text>
  <text x="34" y="148" font-size="8.5" fill="#87867F" font-family="ui-monospace, monospace">理解</text>

  <title>意图契约循环</title>
  <desc>三节点循环图：顶部是人类意图节点（自然语言/Prompt），右下是AI生成节点（代码+测试套件），左下是契约验证节点（通过或重新生成）。三个节点之间有双向箭头连接，形成完整的意图-验证循环。</desc>
</svg>
