<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 390" width="680" height="390">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#D97757"/>
    </marker>
    <!-- Dot marker for flow arrows -->
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="2.5" fill="#D97757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="390" fill="#FAF9F5" rx="0"/>

  <!-- Outer double border -->
  <rect x="15" y="15" width="650" height="360" fill="none" stroke="#D1CFC5" stroke-width="1"/>
  <rect x="17" y="17" width="646" height="356" fill="none" stroke="#D1CFC5" stroke-width="3"/>

  <!-- Title separator lines -->
  <line x1="17" y1="58" x2="663" y2="58" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="17" y1="60" x2="663" y2="60" stroke="#D1CFC5" stroke-width="3"/>

  <!-- Title -->
  <text x="340" y="40" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="bold" fill="#141413">智能API网关</text>

  <!-- Column headers -->
  <text x="130" y="95" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#87867F">自然语言接口</text>
  <text x="350" y="95" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#87867F">编排引擎</text>
  <text x="570" y="95" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#87867F">服务适配层</text>

  <!-- Top row boxes -->
  <!-- Box 1: NL Query Parser -->
  <rect x="50" y="108" width="160" height="72" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5" rx="4"/>
  <rect x="50" y="108" width="160" height="72" fill="none" stroke="#D1CFC5" stroke-width="1" rx="4" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="130" y="135" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#141413">NL Query</text>
  <text x="130" y="153" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#141413">Parser</text>
  <!-- Box 2: Planner & Optimizer -->
  <rect x="260" y="108" width="180" height="72" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5" rx="4"/>
  <rect x="260" y="108" width="180" height="72" fill="none" stroke="#D1CFC5" stroke-width="1" rx="4" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="350" y="135" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#141413">Planner</text>
  <text x="350" y="153" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#141413">Optimizer</text>
  <!-- Box 3: Service Connectors -->
  <rect x="480" y="108" width="180" height="72" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1.5" rx="4"/>
  <rect x="480" y="108" width="180" height="72" fill="none" stroke="#D1CFC5" stroke-width="1" rx="4" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="570" y="135" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#141413">Service</text>
  <text x="570" y="153" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#141413">Connectors</text>

  <!-- Flow arrows (horizontal) -->
  <line x1="210" y1="144" x2="255" y2="144" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="144" x2="475" y2="144" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Flow labels -->
  <text x="232" y="136" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#87867F">需求描述</text>
  <text x="457" y="136" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#87867F">执行计划</text>

  <!-- Vertical flow arrows -->
  <line x1="130" y1="180" x2="130" y2="215" stroke="#D97757" stroke-width="1.5" marker-end="url(#dot)"/>
  <line x1="350" y1="180" x2="350" y2="215" stroke="#D97757" stroke-width="1.5" marker-end="url(#dot)"/>
  <line x1="570" y1="180" x2="570" y2="215" stroke="#D97757" stroke-width="1.5" marker-end="url(#dot)"/>

  <!-- Flow labels -->
  <text x="155" y="200" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#87867F">↓</text>
  <text x="375" y="200" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#87867F">↓</text>
  <text x="595" y="200" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#87867F">↓</text>

  <!-- Middle labels -->
  <text x="232" y="204" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#87867F">服务调用</text>

  <!-- Cache layer container -->
  <rect x="50" y="228" width="580" height="130" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1" rx="6"/>
  <rect x="50" y="228" width="580" height="130" fill="none" stroke="#D1CFC5" stroke-width="1.5" rx="6" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- Cache layer title -->
  <text x="340" y="248" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" font-weight="bold" fill="#788C5D">缓存层</text>

  <!-- L1 Cache box -->
  <rect x="80" y="258" width="150" height="80" fill="#FAF9F5" stroke="#D97757" stroke-width="2" rx="5"/>
  <text x="155" y="283" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#D97757">L1 Cache</text>
  <text x="155" y="301" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#87867F">(Memory)</text>

  <!-- L2 Cache box -->
  <rect x="265" y="258" width="150" height="80" fill="#FAF9F5" stroke="#D97757" stroke-width="2" rx="5"/>
  <text x="340" y="283" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#D97757">L2 Cache</text>
  <text x="340" y="301" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#87867F">(Redis)</text>

  <!-- L3 Cache box -->
  <rect x="450" y="258" width="150" height="80" fill="#FAF9F5" stroke="#D97757" stroke-width="2" rx="5"/>
  <text x="525" y="283" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#D97757">L3 Cache</text>
  <text x="525" y="301" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#87867F">(CDN)</text>
</svg>
