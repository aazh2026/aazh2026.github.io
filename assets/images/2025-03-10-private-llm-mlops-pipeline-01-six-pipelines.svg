<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380"><defs><style>text{font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif}</style></defs><rect width="620" height="380" fill="#faf9f5" rx="12"/><text x="24" y="36" fill="#141413" font-size="15" font-weight="700">私有 LLM · MLOps 六管道全景</text><text x="24" y="54" fill="#87867f" font-size="10">Private LLM MLOps: Six Core Pipelines</text><rect width="115" height="90" x="24" y="80" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="81" y="100" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">1 · 数据管道</text><text x="81" y="115" fill="#788c5d" font-size="9" text-anchor="middle">Data Pipeline</text><text x="81" y="132" fill="#87867f" font-size="8.5" text-anchor="middle">代码扫描</text><text x="81" y="144" fill="#87867f" font-size="8.5" text-anchor="middle">脱敏过滤</text><text x="81" y="156" fill="#87867f" font-size="8.5" text-anchor="middle">版本控制 (DVC)</text><path stroke="#788c5d" stroke-width="2" d="M139 125h21"/><path fill="#788c5d" d="m160 121 7 4-7 4z"/><rect width="115" height="90" x="167" y="80" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="224" y="100" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">2 · 训练管道</text><text x="224" y="115" fill="#788c5d" font-size="9" text-anchor="middle">Training Pipeline</text><text x="224" y="132" fill="#87867f" font-size="8.5" text-anchor="middle">基础模型选择</text><text x="224" y="144" fill="#87867f" font-size="8.5" text-anchor="middle">LoRA 高效微调</text><text x="224" y="156" fill="#87867f" font-size="8.5" text-anchor="middle">增量持续训练</text><path stroke="#788c5d" stroke-width="2" d="M282 125h21"/><path fill="#788c5d" d="m303 121 7 4-7 4z"/><rect width="115" height="90" x="310" y="80" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="367" y="100" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">3 · 评估管道</text><text x="367" y="115" fill="#788c5d" font-size="9" text-anchor="middle">Evaluation Pipeline</text><text x="367" y="132" fill="#87867f" font-size="8.5" text-anchor="middle">自动化基准</text><text x="367" y="144" fill="#87867f" font-size="8.5" text-anchor="middle">企业自定义测试</text><text x="367" y="156" fill="#87867f" font-size="8.5" text-anchor="middle">工程师人工评估</text><path stroke="#788c5d" stroke-width="2" d="M425 125h21"/><path fill="#788c5d" d="m446 121 7 4-7 4z"/><rect width="115" height="90" x="453" y="80" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".8" rx="8"/><text x="510" y="100" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">4 · 部署管道</text><text x="510" y="115" fill="#e3dacc" font-size="9" text-anchor="middle">Deployment Pipeline</text><text x="510" y="132" fill="#faf9f5" font-size="8.5" text-anchor="middle">金丝雀发布</text><text x="510" y="144" fill="#faf9f5" font-size="8.5" text-anchor="middle">自动回滚机制</text><text x="510" y="156" fill="#faf9f5" font-size="8.5" text-anchor="middle">A/B 流量测试</text><path stroke="#d1cfc5" stroke-dasharray="4,4" d="M24 188h572"/><rect width="140" height="85" x="24" y="206" fill="#e3dacc" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="94" y="226" fill="#141413" font-size="10" font-weight="700" text-anchor="middle">5 · 监控管道</text><text x="94" y="241" fill="#788c5d" font-size="9" text-anchor="middle">Monitoring Pipeline</text><text x="94" y="258" fill="#87867f" font-size="8.5" text-anchor="middle">技术指标：延迟、GPU</text><text x="94" y="270" fill="#87867f" font-size="8.5" text-anchor="middle">业务指标：接受率、buggy率</text><text x="94" y="282" fill="#87867f" font-size="8.5" text-anchor="middle">数据漂移检测</text><path stroke="#788c5d" stroke-width="2" d="M164 251h21"/><path fill="#788c5d" d="m185 247 7 4-7 4z"/><rect width="140" height="85" x="192" y="206" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".8" rx="8"/><text x="262" y="226" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">6 · 反馈闭环</text><text x="262" y="241" fill="#e3dacc" font-size="9" text-anchor="middle">Feedback Loop</text><text x="262" y="258" fill="#faf9f5" font-size="8.5" text-anchor="middle">开发者一键评价</text><text x="262" y="270" fill="#faf9f5" font-size="8.5" text-anchor="middle">自动收集训练批次</text><text x="262" y="282" fill="#faf9f5" font-size="8.5" text-anchor="middle">触发增量训练</text><path fill="none" stroke="#788c5d" stroke-dasharray="5,3" stroke-width="1.5" d="M192 251h-12V60h-13"/><path fill="#788c5d" d="m167 56-4 7h7z"/><text x="155" y="155" fill="#788c5d" font-size="8" font-weight="600">持续</text><text x="155" y="167" fill="#788c5d" font-size="8" font-weight="600">迭代</text><rect width="236" height="85" x="360" y="206" fill="#141413" rx="8"/><text x="376" y="230" fill="#faf9f5" font-size="10" font-weight="700">⚡ 关键洞察</text><text x="376" y="248" fill="#d1cfc5" font-size="9">训练只占 5%</text><text x="376" y="262" fill="#d1cfc5" font-size="9">MLOps 占 95%</text><text x="376" y="276" fill="#87867f" font-size="8.5">回滚能力比发布能力更重要</text><rect width="572" height="42" x="24" y="320" fill="#e3dacc" rx="6"/><text x="40" y="340" fill="#141413" font-size="9.5" font-weight="600">核心原则：</text><text x="120" y="340" fill="#87867f" font-size="9">数据质量 &gt; 数据量</text><text x="230" y="340" fill="#87867f" font-size="9">• 持续改进 &gt; 一次性完美</text><text x="380" y="340" fill="#87867f" font-size="9">• 回滚能力 &gt; 发布能力</text><text x="510" y="340" fill="#87867f" font-size="9">• 用户反馈是最宝贵数据</text></svg>