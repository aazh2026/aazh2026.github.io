<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" width="100%">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="620" height="380" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="24" y="36" font-size="15" font-weight="700" fill="#141413">私有 LLM · MLOps 六管道全景</text>
  <text x="24" y="54" font-size="10" fill="#87867F">Private LLM MLOps: Six Core Pipelines</text>

  <!-- Pipeline boxes -->
  <!-- Box 1: Data Pipeline -->
  <rect x="24" y="80" width="115" height="90" fill="#E3DACC" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="81" y="100" font-size="10" font-weight="700" fill="#141413" text-anchor="middle">1 · 数据管道</text>
  <text x="81" y="115" font-size="9" fill="#788C5D" text-anchor="middle">Data Pipeline</text>
  <text x="81" y="132" font-size="8.5" fill="#87867F" text-anchor="middle">代码扫描</text>
  <text x="81" y="144" font-size="8.5" fill="#87867F" text-anchor="middle">脱敏过滤</text>
  <text x="81" y="156" font-size="8.5" fill="#87867F" text-anchor="middle">版本控制 (DVC)</text>

  <!-- Arrow 1-2 -->
  <line x1="139" y1="125" x2="160" y2="125" stroke="#788C5D" stroke-width="2"/>
  <polygon points="160,121 167,125 160,129" fill="#788C5D"/>

  <!-- Box 2: Training Pipeline -->
  <rect x="167" y="80" width="115" height="90" fill="#E3DACC" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="224" y="100" font-size="10" font-weight="700" fill="#141413" text-anchor="middle">2 · 训练管道</text>
  <text x="224" y="115" font-size="9" fill="#788C5D" text-anchor="middle">Training Pipeline</text>
  <text x="224" y="132" font-size="8.5" fill="#87867F" text-anchor="middle">基础模型选择</text>
  <text x="224" y="144" font-size="8.5" fill="#87867F" text-anchor="middle">LoRA 高效微调</text>
  <text x="224" y="156" font-size="8.5" fill="#87867F" text-anchor="middle">增量持续训练</text>

  <!-- Arrow 2-3 -->
  <line x1="282" y1="125" x2="303" y2="125" stroke="#788C5D" stroke-width="2"/>
  <polygon points="303,121 310,125 303,129" fill="#788C5D"/>

  <!-- Box 3: Evaluation Pipeline -->
  <rect x="310" y="80" width="115" height="90" fill="#E3DACC" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="367" y="100" font-size="10" font-weight="700" fill="#141413" text-anchor="middle">3 · 评估管道</text>
  <text x="367" y="115" font-size="9" fill="#788C5D" text-anchor="middle">Evaluation Pipeline</text>
  <text x="367" y="132" font-size="8.5" fill="#87867F" text-anchor="middle">自动化基准</text>
  <text x="367" y="144" font-size="8.5" fill="#87867F" text-anchor="middle">企业自定义测试</text>
  <text x="367" y="156" font-size="8.5" fill="#87867F" text-anchor="middle">工程师人工评估</text>

  <!-- Arrow 3-4 -->
  <line x1="425" y1="125" x2="446" y2="125" stroke="#788C5D" stroke-width="2"/>
  <polygon points="446,121 453,125 446,129" fill="#788C5D"/>

  <!-- Box 4: Deployment Pipeline -->
  <rect x="453" y="80" width="115" height="90" fill="#D97757" opacity="0.8" rx="8" stroke="#D97757" stroke-width="1.5"/>
  <text x="510" y="100" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">4 · 部署管道</text>
  <text x="510" y="115" font-size="9" fill="#E3DACC" text-anchor="middle">Deployment Pipeline</text>
  <text x="510" y="132" font-size="8.5" fill="#FAF9F5" text-anchor="middle">金丝雀发布</text>
  <text x="510" y="144" font-size="8.5" fill="#FAF9F5" text-anchor="middle">自动回滚机制</text>
  <text x="510" y="156" font-size="8.5" fill="#FAF9F5" text-anchor="middle">A/B 流量测试</text>

  <!-- Divider line -->
  <line x1="24" y1="188" x2="596" y2="188" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Lower row: Monitoring + Feedback + Loop back -->
  <!-- Box 5: Monitoring Pipeline -->
  <rect x="24" y="206" width="140" height="85" fill="#E3DACC" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="94" y="226" font-size="10" font-weight="700" fill="#141413" text-anchor="middle">5 · 监控管道</text>
  <text x="94" y="241" font-size="9" fill="#788C5D" text-anchor="middle">Monitoring Pipeline</text>
  <text x="94" y="258" font-size="8.5" fill="#87867F" text-anchor="middle">技术指标：延迟、GPU</text>
  <text x="94" y="270" font-size="8.5" fill="#87867F" text-anchor="middle">业务指标：接受率、buggy率</text>
  <text x="94" y="282" font-size="8.5" fill="#87867F" text-anchor="middle">数据漂移检测</text>

  <!-- Arrow 5 to 6 -->
  <line x1="164" y1="251" x2="185" y2="251" stroke="#788C5D" stroke-width="2"/>
  <polygon points="185,247 192,251 185,255" fill="#788C5D"/>

  <!-- Box 6: Feedback Loop -->
  <rect x="192" y="206" width="140" height="85" fill="#788C5D" opacity="0.8" rx="8" stroke="#788C5D" stroke-width="1.5"/>
  <text x="262" y="226" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">6 · 反馈闭环</text>
  <text x="262" y="241" font-size="9" fill="#E3DACC" text-anchor="middle">Feedback Loop</text>
  <text x="262" y="258" font-size="8.5" fill="#FAF9F5" text-anchor="middle">开发者一键评价</text>
  <text x="262" y="270" font-size="8.5" fill="#FAF9F5" text-anchor="middle">自动收集训练批次</text>
  <text x="262" y="282" font-size="8.5" fill="#FAF9F5" text-anchor="middle">触发增量训练</text>

  <!-- Loop arrow: from box 6 back to box 2 -->
  <path d="M192,251 L180,251 L180,60 L167,60" fill="none" stroke="#788C5D" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="167,56 163,63 170,63" fill="#788C5D"/>
  <text x="155" y="155" font-size="8" fill="#788C5D" font-weight="600">持续</text>
  <text x="155" y="167" font-size="8" fill="#788C5D" font-weight="600">迭代</text>

  <!-- Right side: Key insight box -->
  <rect x="360" y="206" width="236" height="85" fill="#141413" rx="8"/>
  <text x="376" y="230" font-size="10" font-weight="700" fill="#FAF9F5">⚡ 关键洞察</text>
  <text x="376" y="248" font-size="9" fill="#D1CFC5">训练只占 5%</text>
  <text x="376" y="262" font-size="9" fill="#D1CFC5">MLOps 占 95%</text>
  <text x="376" y="276" font-size="8.5" fill="#87867F">回滚能力比发布能力更重要</text>

  <!-- Bottom labels -->
  <rect x="24" y="320" width="572" height="42" fill="#E3DACC" rx="6"/>
  <text x="40" y="340" font-size="9.5" font-weight="600" fill="#141413">核心原则：</text>
  <text x="120" y="340" font-size="9" fill="#87867F">数据质量 &gt; 数据量</text>
  <text x="230" y="340" font-size="9" fill="#87867F">• 持续改进 &gt; 一次性完美</text>
  <text x="380" y="340" font-size="9" fill="#87867F">• 回滚能力 &gt; 发布能力</text>
  <text x="510" y="340" font-size="9" fill="#87867F">• 用户反馈是最宝贵数据</text>
</svg>
