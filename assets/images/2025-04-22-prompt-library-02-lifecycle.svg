<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ede5"/>
    </linearGradient>
    <marker id="arr2" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#87867f" d="m0 0 6 3-6 3Z"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="url(#bg3)" rx="12"/>
  <text x="450" y="36" fill="#141413" font-size="17" font-weight="700" text-anchor="middle">Prompt 生命周期管理环</text>
  <text x="450" y="56" fill="#87867f" font-size="12" text-anchor="middle">从创建到废弃的五个阶段 — 每个阶段都有明确的质量门禁</text>
  <g transform="translate(450 300)">
    <circle r="210" fill="none" stroke="#d1cfc5" stroke-width="20" opacity=".4"/>
    <path fill="none" stroke="#788c5d" stroke-linecap="round" stroke-width="36" d="M0-200a200 200 0 0 1 173 100"/>
    <path fill="none" stroke="#d97757" stroke-linecap="round" stroke-width="36" d="M180-87a200 200 0 0 1-93 267"/>
    <path fill="none" stroke="#141413" stroke-linecap="round" stroke-width="36" d="M80 183A200 200 0 0 1-183 80"/>
    <path fill="none" stroke="#d1cfc5" stroke-linecap="round" stroke-width="36" d="M-180 87a200 200 0 0 1 93-267"/>
    <circle r="140" fill="#faf9f5"/>
    <text y="-20" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">Prompt</text>
    <text fill="#141413" font-size="13" font-weight="700" text-anchor="middle">生命周期</text>
    <text y="20" fill="#87867f" font-size="11" text-anchor="middle">质量门禁</text>
    <text y="38" fill="#87867f" font-size="11" text-anchor="middle">贯穿全程</text>
    <text y="-232" fill="#788c5d" font-size="13" font-weight="700" text-anchor="middle">创建</text>
    <text y="-218" fill="#87867f" font-size="10" text-anchor="middle">Create</text>
    <text x="218" y="-60" fill="#d97757" font-size="13" font-weight="700">评审</text>
    <text x="218" y="-46" fill="#87867f" font-size="10">Review</text>
    <text y="248" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">发布</text>
    <text y="262" fill="#87867f" font-size="10" text-anchor="middle">Publish</text>
    <text x="-218" y="-60" fill="#141413" font-size="13" font-weight="700" text-anchor="end">更新</text>
    <text x="-218" y="-46" fill="#87867f" font-size="10" text-anchor="end">Update</text>
    <path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr2)" d="m145-155 13 15"/>
    <path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr2)" d="m155 145-15 13"/>
    <path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr2)" d="m-145 155-13-15"/>
    <path fill="none" stroke="#87867f" stroke-width="1.5" marker-end="url(#arr2)" d="m-155-145 15-13"/>
  </g>
  <g transform="translate(16 80)">
    <rect width="200" height="100" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/>
    <rect width="200" height="24" fill="#788c5d" clip-path="url(#clip10)" rx="6"/>
    <text x="12" y="16" fill="#fff" font-size="11" font-weight="700">1. 创建 Create</text>
    <text x="10" y="40" fill="#141413" font-size="10">• 工程师调优发现效果良好</text>
    <text x="10" y="54" fill="#141413" font-size="10">• 填写 Prompt 创建表单</text>
    <text x="10" y="68" fill="#141413" font-size="10">• 提交到 Prompt 库</text>
    <text x="10" y="82" fill="#141413" font-size="10">• 初始状态：Draft</text>
    <rect width="180" height="8" x="10" y="86" fill="#e3dacc" rx="4"/>
    <text x="100" y="93" fill="#141413" font-size="8" text-anchor="middle">门禁：基础格式检查</text>
    <rect width="200" height="100" y="112" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/>
    <rect width="200" height="24" y="112" fill="#d97757" clip-path="url(#clip11)" rx="6"/>
    <text x="12" y="128" fill="#fff" font-size="11" font-weight="700">2. 评审 Review</text>
    <text x="10" y="152" fill="#141413" font-size="10">• Prompt Curator 评审</text>
    <text x="10" y="166" fill="#141413" font-size="10">• 内容质量、业务价值检查</text>
    <text x="10" y="180" fill="#141413" font-size="10">• 技术规范、测试用例</text>
    <text x="10" y="194" fill="#141413" font-size="10">• 通过 → 发布队列</text>
    <rect width="180" height="8" x="10" y="198" fill="#fff0e8" rx="4"/>
    <text x="100" y="205" fill="#d97757" font-size="8" text-anchor="middle">门禁：质量检查清单</text>
  </g>
  <g transform="translate(684 80)">
    <rect width="200" height="100" fill="#fff" stroke="#141413" stroke-width="1.5" rx="6"/>
    <rect width="200" height="24" fill="#141413" clip-path="url(#clip12)" rx="6"/>
    <text x="12" y="16" fill="#fff" font-size="11" font-weight="700">3. 发布 Publish</text>
    <text x="10" y="40" fill="#141413" font-size="10">• 进入发布队列</text>
    <text x="10" y="54" fill="#141413" font-size="10">• 分配质量等级（Tier 1-3）</text>
    <text x="10" y="68" fill="#141413" font-size="10">• 通知相关团队</text>
    <text x="10" y="82" fill="#141413" font-size="10">• 更新文档和示例</text>
    <rect width="180" height="8" x="10" y="86" fill="#e3dacc" rx="4"/>
    <text x="100" y="93" fill="#141413" font-size="8" text-anchor="middle">门禁：发布审批</text>
    <rect width="200" height="100" y="112" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
    <rect width="200" height="24" y="112" fill="#d1cfc5" clip-path="url(#clip13)" rx="6"/>
    <text x="12" y="128" fill="#141413" font-size="11" font-weight="700">4. 更新 Update</text>
    <text x="10" y="152" fill="#141413" font-size="10">• 触发：业务变更 / 反馈</text>
    <text x="10" y="166" fill="#141413" font-size="10">• 版本号 +1，简化评审</text>
    <text x="10" y="180" fill="#141413" font-size="10">• 发布新版本，保留旧版</text>
    <text x="10" y="194" fill="#141413" font-size="10">• 支持回滚</text>
    <rect width="180" height="8" x="10" y="198" fill="#e3dacc" rx="4"/>
    <text x="100" y="205" fill="#141413" font-size="8" text-anchor="middle">门禁：回归测试</text>
  </g>
  <g transform="translate(16 460)">
    <rect width="868" height="84" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
    <text x="16" y="20" fill="#141413" font-size="12" font-weight="700">5. 废弃 Deprecate</text>
    <text x="16" y="38" fill="#141413" font-size="10">触发条件：业务不再需要 / 被更好 Prompt 替代 / 长期无使用 / 严重问题</text>
    <text x="16" y="54" fill="#141413" font-size="10">流程：标记 Deprecated → 设置替代方案 → 通知使用者 → 保留 6 个月后删除</text>
    <path stroke="#d1cfc5" d="M340 8v68"/>
    <text x="370" y="20" fill="#141413" font-size="12" font-weight="700">质量等级</text>
    <rect width="16" height="16" x="370" y="30" fill="#788c5d" rx="2"/>
    <text x="394" y="43" fill="#141413" font-size="10">Tier 1 官方推荐 — 生产验证、持续维护</text>
    <rect width="16" height="16" x="370" y="52" fill="#d97757" rx="2"/>
    <text x="394" y="65" fill="#141413" font-size="10">Tier 2 团队认可 — 团队内评审、定期更新</text>
    <rect width="16" height="16" x="630" y="30" fill="#d1cfc5" rx="2"/>
    <text x="654" y="43" fill="#141413" font-size="10">Tier 3 实验性 — 个人创建、使用风险自负</text>
  </g>
</svg>
