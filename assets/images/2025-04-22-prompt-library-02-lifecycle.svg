<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE5"/>
    </linearGradient>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#87867F"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#141413">Prompt 生命周期管理环</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#87867F">从创建到废弃的五个阶段 — 每个阶段都有明确的质量门禁</text>

  <!-- Center ring: circular flow -->
  <g transform="translate(450, 300)">
    <!-- Background circle track -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#D1CFC5" stroke-width="20" opacity="0.4"/>

    <!-- Arc segments (clockwise: Create → Review → Publish → Update → Deprecate → back to Create) -->
    <!-- Create arc (Olive, top-right) -->
    <path d="M 0,-200 A 200,200 0 0,1 173,-100" fill="none" stroke="#788C5D" stroke-width="36" stroke-linecap="round"/>
    <!-- Review arc (Clay, bottom-right) -->
    <path d="M 180,-87 A 200,200 0 0,1 87,180" fill="none" stroke="#D97757" stroke-width="36" stroke-linecap="round"/>
    <!-- Publish arc (Slate, bottom-left) -->
    <path d="M 80,183 A 200,200 0 0,1 -183,80" fill="none" stroke="#141413" stroke-width="36" stroke-linecap="round"/>
    <!-- Update arc (G300, top-left) -->
    <path d="M -180,87 A 200,200 0 0,1 -87,-180" fill="none" stroke="#D1CFC5" stroke-width="36" stroke-linecap="round"/>

    <!-- Center circle with title -->
    <circle cx="0" cy="0" r="140" fill="#FAF9F5"/>
    <text x="0" y="-20" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">Prompt</text>
    <text x="0" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">生命周期</text>
    <text x="0" y="20" text-anchor="middle" font-size="11" fill="#87867F">质量门禁</text>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#87867F">贯穿全程</text>

    <!-- Node labels around the ring -->
    <!-- Create (top) -->
    <text x="0" y="-232" text-anchor="middle" font-size="13" font-weight="700" fill="#788C5D">创建</text>
    <text x="0" y="-218" text-anchor="middle" font-size="10" fill="#87867F">Create</text>

    <!-- Review (right) -->
    <text x="218" y="-60" text-anchor="start" font-size="13" font-weight="700" fill="#D97757">评审</text>
    <text x="218" y="-46" text-anchor="start" font-size="10" fill="#87867F">Review</text>

    <!-- Publish (bottom) -->
    <text x="0" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">发布</text>
    <text x="0" y="262" text-anchor="middle" font-size="10" fill="#87867F">Publish</text>

    <!-- Update (left) -->
    <text x="-218" y="-60" text-anchor="end" font-size="13" font-weight="700" fill="#141413">更新</text>
    <text x="-218" y="-46" text-anchor="end" font-size="10" fill="#87867F">Update</text>

    <!-- Arrows on the ring -->
    <path d="M 145,-155 L 158,-140" stroke="#87867F" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
    <path d="M 155,145 L 140,158" stroke="#87867F" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
    <path d="M -145,155 L -158,140" stroke="#87867F" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
    <path d="M -155,-145 L -140,-158" stroke="#87867F" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
  </g>

  <!-- Left panel: stage details -->
  <g transform="translate(16, 80)">
    <!-- Create card -->
    <rect x="0" y="0" width="200" height="100" fill="white" stroke="#788C5D" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="200" height="24" fill="#788C5D" rx="6" clip-path="url(#clip10)"/>
    <text x="12" y="16" font-size="11" font-weight="700" fill="white">1. 创建 Create</text>
    <text x="10" y="40" font-size="10" fill="#141413">• 工程师调优发现效果良好</text>
    <text x="10" y="54" font-size="10" fill="#141413">• 填写 Prompt 创建表单</text>
    <text x="10" y="68" font-size="10" fill="#141413">• 提交到 Prompt 库</text>
    <text x="10" y="82" font-size="10" fill="#141413">• 初始状态：Draft</text>
    <rect x="10" y="86" width="180" height="8" fill="#E3DACC" rx="4"/>
    <text x="100" y="93" text-anchor="middle" font-size="8" fill="#141413">门禁：基础格式检查</text>

    <!-- Review card -->
    <rect x="0" y="112" width="200" height="100" fill="white" stroke="#D97757" stroke-width="1.5" rx="6"/>
    <rect x="0" y="112" width="200" height="24" fill="#D97757" rx="6" clip-path="url(#clip11)"/>
    <text x="12" y="128" font-size="11" font-weight="700" fill="white">2. 评审 Review</text>
    <text x="10" y="152" font-size="10" fill="#141413">• Prompt Curator 评审</text>
    <text x="10" y="166" font-size="10" fill="#141413">• 内容质量、业务价值检查</text>
    <text x="10" y="180" font-size="10" fill="#141413">• 技术规范、测试用例</text>
    <text x="10" y="194" font-size="10" fill="#141413">• 通过 → 发布队列</text>
    <rect x="10" y="198" width="180" height="8" fill="#FFF0E8" rx="4"/>
    <text x="100" y="205" text-anchor="middle" font-size="8" fill="#D97757">门禁：质量检查清单</text>
  </g>

  <!-- Right panel: stage details -->
  <g transform="translate(684, 80)">
    <!-- Publish card -->
    <rect x="0" y="0" width="200" height="100" fill="white" stroke="#141413" stroke-width="1.5" rx="6"/>
    <rect x="0" y="0" width="200" height="24" fill="#141413" rx="6" clip-path="url(#clip12)"/>
    <text x="12" y="16" font-size="11" font-weight="700" fill="white">3. 发布 Publish</text>
    <text x="10" y="40" font-size="10" fill="#141413">• 进入发布队列</text>
    <text x="10" y="54" font-size="10" fill="#141413">• 分配质量等级（Tier 1-3）</text>
    <text x="10" y="68" font-size="10" fill="#141413">• 通知相关团队</text>
    <text x="10" y="82" font-size="10" fill="#141413">• 更新文档和示例</text>
    <rect x="10" y="86" width="180" height="8" fill="#E3DACC" rx="4"/>
    <text x="100" y="93" text-anchor="middle" font-size="8" fill="#141413">门禁：发布审批</text>

    <!-- Update card -->
    <rect x="0" y="112" width="200" height="100" fill="white" stroke="#D1CFC5" stroke-width="1.5" rx="6"/>
    <rect x="0" y="112" width="200" height="24" fill="#D1CFC5" rx="6" clip-path="url(#clip13)"/>
    <text x="12" y="128" font-size="11" font-weight="700" fill="#141413">4. 更新 Update</text>
    <text x="10" y="152" font-size="10" fill="#141413">• 触发：业务变更 / 反馈</text>
    <text x="10" y="166" font-size="10" fill="#141413">• 版本号 +1，简化评审</text>
    <text x="10" y="180" font-size="10" fill="#141413">• 发布新版本，保留旧版</text>
    <text x="10" y="194" font-size="10" fill="#141413">• 支持回滚</text>
    <rect x="10" y="198" width="180" height="8" fill="#E3DACC" rx="4"/>
    <text x="100" y="205" text-anchor="middle" font-size="8" fill="#141413">门禁：回归测试</text>
  </g>

  <!-- Bottom: deprecate + quality tier legend -->
  <g transform="translate(16, 460)">
    <rect x="0" y="0" width="868" height="84" fill="white" stroke="#D1CFC5" stroke-width="1.5" rx="6"/>

    <!-- Deprecate -->
    <text x="16" y="20" font-size="12" font-weight="700" fill="#141413">5. 废弃 Deprecate</text>
    <text x="16" y="38" font-size="10" fill="#141413">触发条件：业务不再需要 / 被更好 Prompt 替代 / 长期无使用 / 严重问题</text>
    <text x="16" y="54" font-size="10" fill="#141413">流程：标记 Deprecated → 设置替代方案 → 通知使用者 → 保留 6 个月后删除</text>

    <!-- Divider -->
    <line x1="340" y1="8" x2="340" y2="76" stroke="#D1CFC5" stroke-width="1"/>

    <!-- Quality tiers -->
    <text x="370" y="20" font-size="12" font-weight="700" fill="#141413">质量等级</text>

    <rect x="370" y="30" width="16" height="16" fill="#788C5D" rx="2"/>
    <text x="394" y="43" font-size="10" fill="#141413">Tier 1 官方推荐 — 生产验证、持续维护</text>

    <rect x="370" y="52" width="16" height="16" fill="#D97757" rx="2"/>
    <text x="394" y="65" font-size="10" fill="#141413">Tier 2 团队认可 — 团队内评审、定期更新</text>

    <rect x="630" y="30" width="16" height="16" fill="#D1CFC5" rx="2"/>
    <text x="654" y="43" font-size="10" fill="#141413">Tier 3 实验性 — 个人创建、使用风险自负</text>
  </g>
</svg>