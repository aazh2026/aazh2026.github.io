<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" width="100%">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="520" height="440" fill="#FAF9F5" rx="12"/>

  <!-- Title -->
  <text x="24" y="36" font-size="15" font-weight="700" fill="#141413">知识冰山：隐性知识 vs 显性知识</text>
  <text x="24" y="54" font-size="10" fill="#87867F">The Knowledge Iceberg: Tacit vs Explicit Knowledge</text>

  <!-- Water line label -->
  <text x="24" y="208" font-size="10" font-weight="600" fill="#87867F">水面</text>
  <line x1="60" y1="212" x2="496" y2="212" stroke="#87867F" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="466" y="208" font-size="10" font-weight="600" fill="#87867F">Water Line</text>

  <!-- Water fill (semi-transparent) -->
  <rect x="0" y="212" width="520" height="228" fill="#D1CFC5" opacity="0.3"/>

  <!-- Iceberg below water (tacit) -->
  <polygon points="260,215 400,340 120,340" fill="#87867F" opacity="0.6"/>
  <text x="260" y="280" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">隐性知识 90%</text>
  <text x="260" y="298" font-size="10" fill="#E3DACC" text-anchor="middle">Tacit Knowledge</text>

  <!-- Iceberg above water (explicit) -->
  <polygon points="260,75 340,210 180,210" fill="#D97757" opacity="0.85"/>
  <text x="260" y="145" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">显性知识 10%</text>
  <text x="260" y="163" font-size="10" fill="#FAF9F5" text-anchor="middle">Explicit Knowledge</text>

  <!-- Explicit knowledge examples (above water) -->
  <text x="360" y="110" font-size="10" font-weight="600" fill="#141413">显性知识示例</text>
  <text x="360" y="126" font-size="9.5" fill="#141413">• API 文档</text>
  <text x="360" y="141" font-size="9.5" fill="#141413">• 架构图</text>
  <text x="360" y="156" font-size="9.5" fill="#141413">• 代码注释</text>
  <text x="360" y="171" font-size="9.5" fill="#141413">• 操作手册</text>

  <!-- Tacit knowledge examples (below water) -->
  <text x="360" y="270" font-size="10" font-weight="600" fill="#141413">隐性知识示例</text>
  <text x="360" y="286" font-size="9.5" fill="#141413">• "感觉不对劲"的直觉</text>
  <text x="360" y="301" font-size="9.5" fill="#141413">• 架构决策的背景</text>
  <text x="360" y="316" font-size="9.5" fill="#141413">• 判断供应商虚实</text>
  <text x="360" y="331" font-size="9.5" fill="#141413">• 识别潜在性能问题</text>

  <!-- Left side labels -->
  <text x="80" y="145" font-size="10" font-weight="600" fill="#D97757" text-anchor="middle">可见</text>
  <text x="80" y="295" font-size="10" font-weight="600" fill="#87867F" text-anchor="middle">不可见</text>

  <!-- Key insight box -->
  <rect x="24" y="365" width="472" height="58" fill="#E3DACC" rx="8"/>
  <text x="40" y="385" font-size="10" font-weight="700" fill="#141413">💡 关键洞察</text>
  <text x="40" y="401" font-size="9.5" fill="#141413">显性知识告诉你"怎么做"，</text>
  <text x="40" y="415" font-size="9.5" fill="#141413">隐性知识告诉你"什么时候做、为什么做、什么时候不该做"。</text>
</svg>
