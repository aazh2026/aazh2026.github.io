<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 900 400"><defs><linearGradient id="bg6" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#faf9f5"/><stop offset="100%" style="stop-color:#e3dacc"/></linearGradient><filter id="shadow6" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/></filter></defs><rect width="900" height="400" fill="url(#bg6)" rx="12"/><text x="450" y="38" fill="#141413" font-size="20" font-weight="700" text-anchor="middle">AI 时代的复杂度类型</text><text x="450" y="60" fill="#87867f" font-size="12" text-anchor="middle">Brooks 框架 + AI 引入的新型复杂度</text><g filter="url(#shadow6)" transform="translate(40 85)"><rect width="260" height="280" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/><rect width="260" height="36" fill="#788c5d" rx="8" ry="0"/><path fill="#788c5d" d="M0 28h260v8H0z"/><text x="130" y="24" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">AI 消除的偶然复杂度</text><g transform="translate(15 50)"><rect width="230" height="42" fill="#788c5d" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">✅ 样板代码</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">CRUD、API 封装、测试用例</text></g><g transform="translate(15 102)"><rect width="230" height="42" fill="#788c5d" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">✅ 记忆负担</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">API 细节、算法实现</text></g><g transform="translate(15 154)"><rect width="230" height="42" fill="#788c5d" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#788c5d" font-size="11" font-weight="600" text-anchor="middle">✅ 快速原型</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">Demo、算法验证、探索</text></g><g transform="translate(15 206)"><rect width="230" height="55" fill="#141413" fill-opacity=".05" rx="4"/><text x="115" y="20" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">⚠️ 陷阱</text><text x="115" y="38" fill="#141413" font-size="10" text-anchor="middle">生成的样板代码仍是代码</text><text x="115" y="50" fill="#87867f" font-size="9" text-anchor="middle">可能增加而非减少复杂性</text></g></g><g filter="url(#shadow6)" transform="translate(320 85)"><rect width="260" height="280" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="8"/><rect width="260" height="36" fill="#d97757" rx="8" ry="0"/><path fill="#d97757" d="M0 28h260v8H0z"/><text x="130" y="24" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">AI 无法触及的本质复杂度</text><g transform="translate(15 50)"><rect width="230" height="42" fill="#d97757" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">❌ 需求理解</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">用户说的 ≠ 用户想的 ≠ 需要</text></g><g transform="translate(15 102)"><rect width="230" height="42" fill="#d97757" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">❌ 架构设计</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">权衡的艺术、相互冲突的目标</text></g><g transform="translate(15 154)"><rect width="230" height="42" fill="#d97757" fill-opacity=".1" rx="4"/><text x="115" y="18" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">❌ 系统思考</text><text x="115" y="34" fill="#141413" font-size="10" text-anchor="middle">涌现性、直觉、二阶效应</text></g><g transform="translate(15 206)"><rect width="230" height="55" fill="#141413" fill-opacity=".05" rx="4"/><text x="115" y="20" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">核心洞察</text><text x="115" y="38" fill="#141413" font-size="10" text-anchor="middle">AI 解决&quot;如何做&quot;</text><text x="115" y="50" fill="#87867f" font-size="9" text-anchor="middle">无法决定&quot;为什么&quot;和&quot;应不应该&quot;</text></g></g><g filter="url(#shadow6)" transform="translate(600 85)"><rect width="260" height="280" fill="#faf9f5" stroke="#141413" stroke-width="1.5" rx="8"/><rect width="260" height="36" fill="#141413" fill-opacity=".8" rx="8" ry="0"/><path fill="#141413" d="M0 28h260v8H0z"/><text x="130" y="24" fill="#faf9f5" font-size="13" font-weight="700" text-anchor="middle">AI 引入的新型复杂度</text><text fill="#141413" font-size="12" font-weight="600" transform="translate(15 50)">认知分裂</text><text y="18" fill="#87867f" font-size="10" transform="translate(15 50)">使用不理解的东西</text><text y="32" fill="#d97757" font-size="10" transform="translate(15 50)">代码跳跃 vs 理解跳跃</text><text fill="#141413" font-size="12" font-weight="600" transform="translate(15 100)">验证负担</text><text y="18" fill="#87867f" font-size="10" transform="translate(15 100)">每行 AI 代码都需要审查</text><text y="32" fill="#d97757" font-size="10" transform="translate(15 100)">从&quot;写&quot;转移到&quot;验证&quot;</text><text fill="#141413" font-size="12" font-weight="600" transform="translate(15 150)">信任校准</text><text y="18" fill="#87867f" font-size="10" transform="translate(15 150)">何时该信、何时该质疑</text><text y="32" fill="#d97757" font-size="10" transform="translate(15 150)">需要建立有效的验证流程</text><g transform="translate(15 200)"><rect width="230" height="65" fill="#d97757" fill-opacity=".08" rx="4"/><text x="115" y="20" fill="#d97757" font-size="11" font-weight="700" text-anchor="middle">复杂性守恒定律</text><text x="115" y="40" fill="#141413" font-size="10" text-anchor="middle">复杂性只能从一种形式</text><text x="115" y="54" fill="#141413" font-size="10" text-anchor="middle">转化为另一种，无法消除</text></g></g><text x="450" y="385" fill="#87867f" font-size="10" text-anchor="middle">AI 没有改变软件复杂性的本质，只是改变了我们与复杂性互动的方式</text></svg>