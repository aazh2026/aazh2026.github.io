<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <filter id="shadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="400" fill="url(#bg6)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#141413">AI 时代的复杂度类型</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#87867F">Brooks 框架 + AI 引入的新型复杂度</text>

  <!-- Left: AI eliminates -->
  <g transform="translate(40, 85)" filter="url(#shadow6)">
    <rect width="260" height="280" fill="#FAF9F5" rx="8" stroke="#788C5D" stroke-width="2"/>
    <rect width="260" height="36" fill="#788C5D" rx="8" ry="0"/>
    <rect y="28" width="260" height="8" fill="#788C5D"/>
    <text x="130" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">AI 消除的偶然复杂度</text>

    <g transform="translate(15, 50)">
      <rect width="230" height="42" fill="#788C5D" fill-opacity="0.1" rx="4"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D">✅ 样板代码</text>
      <text x="115" y="34" text-anchor="middle" font-size="10" fill="#141413">CRUD、API 封装、测试用例</text>
    </g>

    <g transform="translate(15, 102)">
      <rect width="230" height="42" fill="#788C5D" fill-opacity="0.1" rx="4"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D">✅ 记忆负担</text>
      <text x="115" y="34" text-anchor="middle" font-size="10" fill="#141413">API 细节、算法实现</text>
    </g>

    <g transform="translate(15, 154)">
      <rect width="230" height="42" fill="#788C5D" fill-opacity="0.1" rx="4"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#788C5D">✅ 快速原型</text>
      <text x="115" y="34" text-anchor="middle" font-size="10" fill="#141413">Demo、算法验证、探索</text>
    </g>

    <g transform="translate(15, 206)">
      <rect width="230" height="55" fill="#141413" fill-opacity="0.05" rx="4"/>
      <text x="115" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">⚠️ 陷阱</text>
      <text x="115" y="38" text-anchor="middle" font-size="10" fill="#141413">生成的样板代码仍是代码</text>
      <text x="115" y="50" text-anchor="middle" font-size="9" fill="#87867F">可能增加而非减少复杂性</text>
    </g>
  </g>

  <!-- Center: AI cannot solve -->
  <g transform="translate(320, 85)" filter="url(#shadow6)">
    <rect width="260" height="280" fill="#FAF9F5" rx="8" stroke="#D97757" stroke-width="2"/>
    <rect width="260" height="36" fill="#D97757" rx="8" ry="0"/>
    <rect y="28" width="260" height="8" fill="#D97757"/>
    <text x="130" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">AI 无法触及的本质复杂度</text>

    <g transform="translate(15, 50)">
      <rect width="230" height="42" fill="#D97757" fill-opacity="0.1" rx="4"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757">❌ 需求理解</text>
      <text x="115" y="34" text-anchor="middle" font-size="10" fill="#141413">用户说的 ≠ 用户想的 ≠ 需要</text>
    </g>

    <g transform="translate(15, 102)">
      <rect width="230" height="42" fill="#D97757" fill-opacity="0.1" rx="4"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757">❌ 架构设计</text>
      <text x="115" y="34" text-anchor="middle" font-size="10" fill="#141413">权衡的艺术、相互冲突的目标</text>
    </g>

    <g transform="translate(15, 154)">
      <rect width="230" height="42" fill="#D97757" fill-opacity="0.1" rx="4"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757">❌ 系统思考</text>
      <text x="115" y="34" text-anchor="middle" font-size="10" fill="#141413">涌现性、直觉、二阶效应</text>
    </g>

    <g transform="translate(15, 206)">
      <rect width="230" height="55" fill="#141413" fill-opacity="0.05" rx="4"/>
      <text x="115" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757">核心洞察</text>
      <text x="115" y="38" text-anchor="middle" font-size="10" fill="#141413">AI 解决"如何做"</text>
      <text x="115" y="50" text-anchor="middle" font-size="9" fill="#87867F">无法决定"为什么"和"应不应该"</text>
    </g>
  </g>

  <!-- Right: New complexity types -->
  <g transform="translate(600, 85)" filter="url(#shadow6)">
    <rect width="260" height="280" fill="#FAF9F5" rx="8" stroke="#141413" stroke-width="1.5"/>
    <rect width="260" height="36" fill="#141413" fill-opacity="0.8" rx="8" ry="0"/>
    <rect y="28" width="260" height="8" fill="#141413"/>
    <text x="130" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">AI 引入的新型复杂度</text>

    <g transform="translate(15, 50)">
      <text x="0" y="0" font-size="12" font-weight="600" fill="#141413">认知分裂</text>
      <text x="0" y="18" font-size="10" fill="#87867F">使用不理解的东西</text>
      <text x="0" y="32" font-size="10" fill="#D97757">代码跳跃 vs 理解跳跃</text>
    </g>

    <g transform="translate(15, 100)">
      <text x="0" y="0" font-size="12" font-weight="600" fill="#141413">验证负担</text>
      <text x="0" y="18" font-size="10" fill="#87867F">每行 AI 代码都需要审查</text>
      <text x="0" y="32" font-size="10" fill="#D97757">从"写"转移到"验证"</text>
    </g>

    <g transform="translate(15, 150)">
      <text x="0" y="0" font-size="12" font-weight="600" fill="#141413">信任校准</text>
      <text x="0" y="18" font-size="10" fill="#87867F">何时该信、何时该质疑</text>
      <text x="0" y="32" font-size="10" fill="#D97757">需要建立有效的验证流程</text>
    </g>

    <g transform="translate(15, 200)">
      <rect width="230" height="65" fill="#D97757" fill-opacity="0.08" rx="4"/>
      <text x="115" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#D97757">复杂性守恒定律</text>
      <text x="115" y="40" text-anchor="middle" font-size="10" fill="#141413">复杂性只能从一种形式</text>
      <text x="115" y="54" text-anchor="middle" font-size="10" fill="#141413">转化为另一种，无法消除</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="450" y="385" text-anchor="middle" font-size="10" fill="#87867F">AI 没有改变软件复杂性的本质，只是改变了我们与复杂性互动的方式</text>
</svg>