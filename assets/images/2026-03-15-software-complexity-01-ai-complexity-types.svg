<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="AI and Software Complexity">
  <title>AI 与软件复杂性的关系</title>
  <desc>Brooks 本质复杂度 vs 偶然复杂度框架下，AI 的能力边界与新型复杂度类型</desc>

  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <linearGradient id="blue5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B8DB8"/>
      <stop offset="100%" stop-color="#4A73A0"/>
    </linearGradient>
    <linearGradient id="clay5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#C0634A"/>
    </linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="520" fill="url(#bg5)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#141413" text-anchor="middle">AI 与软件复杂性：Brooks 框架下的能力边界</text>
  <text x="400" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#87867F" text-anchor="middle">本质复杂度 vs 偶然复杂度 — AI 擅长什么，无法什么</text>

  <!-- Left column: Accidental Complexity -->
  <rect x="30" y="85" width="360" height="310" fill="#FFFFFF" rx="12" filter="url(#sh5)"/>
  <rect x="30" y="85" width="360" height="44" fill="#5B8DB8" rx="12"/>
  <rect x="30" y="113" width="360" height="16" fill="#5B8DB8"/>
  <text x="210" y="113" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" dy="14">偶然复杂度（Accidental）</text>

  <g transform="translate(50, 155)">
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B8DB8">AI 擅长消除的复杂度来源：</text>

    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="320" height="50" fill="#F0F7FF" rx="6"/>
      <text x="15" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#141413">✅ 样板代码生成</text>
      <text x="15" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">CRUD · 序列化 · 配置 · 测试桩</text>
    </g>

    <g transform="translate(0, 76)">
      <rect x="0" y="0" width="320" height="50" fill="#F0F7FF" rx="6"/>
      <text x="15" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#141413">✅ API 记忆与检索</text>
      <text x="15" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">降低外在认知负荷</text>
    </g>

    <g transform="translate(0, 134)">
      <rect x="0" y="0" width="320" height="50" fill="#F0F7FF" rx="6"/>
      <text x="15" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#141413">✅ 快速原型探索</text>
      <text x="15" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">验证方案可行性，压缩探索周期</text>
    </g>
  </g>

  <text x="210" y="365" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B8DB8" text-anchor="middle">工具和方法带来的复杂性 → AI 可消除</text>

  <!-- Right column: Essential Complexity -->
  <rect x="410" y="85" width="360" height="310" fill="#FFFFFF" rx="12" filter="url(#sh5)"/>
  <rect x="410" y="85" width="360" height="44" fill="#D97757" rx="12"/>
  <rect x="410" y="113" width="360" height="16" fill="#D97757"/>
  <text x="590" y="113" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" dy="14">本质复杂度（Essential）</text>

  <g transform="translate(430, 155)">
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#D97757">AI 无法触及的复杂度来源：</text>

    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="320" height="50" fill="#FFF5F2" rx="6"/>
      <text x="15" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#141413">❌ 需求理解与翻译</text>
      <text x="15" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">用户说的 ≠ 用户想的 ≠ 用户需要</text>
    </g>

    <g transform="translate(0, 76)">
      <rect x="0" y="0" width="320" height="50" fill="#FFF5F2" rx="6"/>
      <text x="15" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#141413">❌ 架构权衡决策</text>
      <text x="15" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">性能 vs 可维护性 · 短期 vs 长期</text>
    </g>

    <g transform="translate(0, 134)">
      <rect x="0" y="0" width="320" height="50" fill="#FFF5F2" rx="6"/>
      <text x="15" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#141413">❌ 系统涌现性思维</text>
      <text x="15" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">预见二阶/三阶效应 · 模糊中判断</text>
    </g>
  </g>

  <text x="590" y="365" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#D97757" text-anchor="middle">问题本身固有的复杂性 → AI 无法消除</text>

  <!-- Bottom section: New complexity types -->
  <rect x="30" y="390" width="740" height="115" fill="#FFFFFF" rx="12" filter="url(#sh5)" stroke="#788C5D" stroke-width="1.5"/>
  <text x="400" y="415" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#788C5D" text-anchor="middle">⚠️ AI 引入的新型复杂度</text>

  <g transform="translate(50, 432)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="225" height="60" fill="#F5FAF0" rx="6"/>
      <text x="12" y="18" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#788C5D">认知分裂</text>
      <text x="12" y="34" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">使用不理解的东西</text>
      <text x="12" y="48" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">vs 花费精力理解它</text>
    </g>

    <g transform="translate(258, 0)">
      <rect x="0" y="0" width="225" height="60" fill="#F5FAF0" rx="6"/>
      <text x="12" y="18" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#788C5D">验证负担</text>
      <text x="12" y="34" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">AI 能力越强</text>
      <text x="12" y="48" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">验证其输出的负担越重</text>
    </g>

    <g transform="translate(516, 0)">
      <rect x="0" y="0" width="225" height="60" fill="#F5FAF0" rx="6"/>
      <text x="12" y="18" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#788C5D">信任校准</text>
      <text x="12" y="34" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">过度信任 vs 过度不信任</text>
      <text x="12" y="48" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">判断何时该信、何时该质疑</text>
    </g>
  </g>
</svg>