<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 340"><path fill="#faf9f5" d="M0 0h680v340H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">虚假 star 经济：信任的商品化</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">攻击者视角 vs 受害者视角</text><rect width="290" height="230" x="30" y="60" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><text x="175" y="82" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">攻击者/买家视角</text><rect width="250" height="52" x="50" y="95" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><rect width="78" height="52" x="50" y="95" fill="#d97757" opacity=".15" rx="6"/><text x="89" y="120" fill="#d97757" font-family="ui-monospace, monospace" font-size="20" font-weight="700" text-anchor="middle">$50</text><text x="230" y="115" fill="#141413" font-size="12">500 stars</text><text x="230" y="130" fill="#87867f" font-size="10">基础套餐</text><rect width="250" height="52" x="50" y="153" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><rect width="78" height="52" x="50" y="153" fill="#d97757" opacity=".15" rx="6"/><text x="89" y="178" fill="#d97757" font-family="ui-monospace, monospace" font-size="20" font-weight="700" text-anchor="middle">$100</text><text x="230" y="173" fill="#141413" font-size="12">1200 stars + 假评论</text><text x="230" y="188" fill="#87867f" font-size="10">进阶套餐</text><rect width="250" height="52" x="50" y="211" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><rect width="78" height="52" x="50" y="211" fill="#d97757" opacity=".15" rx="6"/><text x="89" y="236" fill="#d97757" font-family="ui-monospace, monospace" font-size="20" font-weight="700" text-anchor="middle">$500</text><text x="230" y="231" fill="#141413" font-size="12">Premium: 伪造 contributor</text><text x="230" y="246" fill="#87867f" font-size="10">活动 + 提交历史</text><rect width="290" height="230" x="360" y="60" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/><text x="505" y="82" fill="#788c5d" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">受害者/信任信号</text><text x="380" y="115" fill="#141413" font-size="11">100 stars</text><rect width="100" height="16" x="380" y="120" fill="#e8ede3" stroke="#788c5d" rx="4"/><rect width="100" height="16" x="380" y="120" fill="#788c5d" opacity=".4" rx="4"/><text x="490" y="132" fill="#788c5d" font-size="9">有人用过</text><text x="380" y="165" fill="#141413" font-size="11">1000 stars</text><rect width="200" height="16" x="380" y="170" fill="#e8ede3" stroke="#788c5d" rx="4"/><rect width="200" height="16" x="380" y="170" fill="#788c5d" opacity=".5" rx="4"/><text x="590" y="182" fill="#788c5d" font-size="9" text-anchor="end">社区认可</text><text x="380" y="215" fill="#141413" font-size="11">10000 stars</text><rect width="250" height="16" x="380" y="220" fill="#e8ede3" stroke="#788c5d" rx="4"/><rect width="250" height="16" x="380" y="220" fill="#788c5d" opacity=".6" rx="4"/><text x="640" y="232" fill="#788c5d" font-size="9" text-anchor="end">行业标准</text><text x="380" y="262" fill="#87867f" font-size="9.5">但这些信号都可以被购买——</text><text x="380" y="276" fill="#d97757" font-size="9.5" font-weight="500">信任已被商品化</text><path fill="none" stroke="#d1cfc5" stroke-width="2" d="M320 175h40"/><path fill="#d1cfc5" d="m358 171 10 4-10 4z"/><text x="340" y="165" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">信任商品化</text><text x="340" y="320" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Fiverr / 刷量网站 · 2026</text></svg>