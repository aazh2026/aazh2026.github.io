<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>测试技术演化史</title>
  <desc>
    从1970年代手工测试到2024年AI生成测试的演进时间线
  </desc>
  <defs>
    <marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#87867f" d="m0 0 10 3.5L0 7z"/>
    </marker>
    <style>
      .text-accent,.text-main,.text-secondary{font-family:system-ui,sans-serif}.text-main,.text-secondary{fill:#141413}.text-secondary{fill:#87867f}.text-accent{fill:#d97757;font-weight:600}.era-bg{fill:#e3dacc}
    </style>
  </defs>
  <path d="M0 0h800v400H0z" style="fill:#faf9f5"/>
  <text x="400" y="35" class="text-main" font-size="18" font-weight="600" text-anchor="middle">测试技术的演化史</text>
  <path stroke="#d1cfc5" stroke-width="2" d="M60 200h680"/>
  <g transform="translate(100)">
    <circle cy="200" r="8" fill="#d97757"/>
    <rect width="110" height="70" x="-55" y="90" class="era-bg" rx="6"/>
    <text y="115" class="text-accent" font-size="14" text-anchor="middle">1970s</text>
    <text y="135" class="text-main" font-size="12" text-anchor="middle">手工测试</text>
    <text y="152" class="text-secondary" font-size="10" text-anchor="middle">人工运行，低覆盖率</text>
  </g>
  <g transform="translate(230)">
    <circle cy="200" r="8" fill="#d97757"/>
    <rect width="110" height="70" x="-55" y="90" class="era-bg" rx="6"/>
    <text y="115" class="text-accent" font-size="14" text-anchor="middle">1990s</text>
    <text y="135" class="text-main" font-size="12" text-anchor="middle">自动化测试</text>
    <text y="152" class="text-secondary" font-size="10" text-anchor="middle">xUnit框架，中覆盖率</text>
  </g>
  <g transform="translate(360)">
    <circle cy="200" r="8" fill="#d97757"/>
    <rect width="110" height="70" x="-55" y="90" class="era-bg" rx="6"/>
    <text y="115" class="text-accent" font-size="14" text-anchor="middle">2000s</text>
    <text y="135" class="text-main" font-size="12" text-anchor="middle">TDD时代</text>
    <text y="152" class="text-secondary" font-size="10" text-anchor="middle">先测试后代码</text>
  </g>
  <g transform="translate(490)">
    <circle cy="200" r="8" fill="#d97757"/>
    <rect width="110" height="70" x="-55" y="90" class="era-bg" rx="6"/>
    <text y="115" class="text-accent" font-size="14" text-anchor="middle">2010s</text>
    <text y="135" class="text-main" font-size="12" text-anchor="middle">平台时代</text>
    <text y="152" class="text-secondary" font-size="10" text-anchor="middle">Selenium/Appium</text>
  </g>
  <g transform="translate(620)">
    <circle cy="200" r="10" fill="#788c5d"/>
    <rect width="120" height="70" x="-60" y="90" fill="#788c5d" opacity=".15" rx="6"/>
    <rect width="120" height="70" x="-60" y="90" rx="6" style="stroke:#d1cfc5;stroke-width:1;fill:none"/>
    <text y="115" fill="#788c5d" class="text-accent" font-size="14" text-anchor="middle">2024</text>
    <text y="135" class="text-main" font-size="12" font-weight="600" text-anchor="middle">AI生成测试</text>
    <text y="152" class="text-secondary" font-size="10" text-anchor="middle">自动维护，高覆盖</text>
  </g>
  <text x="400" y="280" class="text-secondary" font-size="11" text-anchor="middle">每一次跃迁都让测试更高效、更可靠</text>
  <text x="400" y="300" class="text-accent" font-size="13" font-weight="500" text-anchor="middle">AI生成测试是下一次跃迁</text>
  <g transform="translate(0 320)">
    <rect width="100" height="50" x="80" fill="#e3dacc" opacity=".5" rx="4"/>
    <text x="130" y="20" class="text-secondary" font-size="10" text-anchor="middle">维护成本</text>
    <text x="130" y="38" class="text-main" font-size="12" text-anchor="middle">高 → 低</text>
    <rect width="100" height="50" x="220" fill="#e3dacc" opacity=".5" rx="4"/>
    <text x="270" y="20" class="text-secondary" font-size="10" text-anchor="middle">覆盖率</text>
    <text x="270" y="38" class="text-main" font-size="12" text-anchor="middle">低 → 高</text>
    <rect width="100" height="50" x="360" fill="#e3dacc" opacity=".5" rx="4"/>
    <text x="410" y="20" class="text-secondary" font-size="10" text-anchor="middle">编写者</text>
    <text x="410" y="38" class="text-main" font-size="12" text-anchor="middle">人 → AI</text>
    <rect width="100" height="50" x="500" fill="#e3dacc" opacity=".5" rx="4"/>
    <text x="550" y="20" class="text-secondary" font-size="10" text-anchor="middle">测试方式</text>
    <text x="550" y="38" class="text-main" font-size="12" text-anchor="middle">手工 → 自动</text>
  </g>
</svg>
