<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 正确的分层结构：编排层 + 专业 Agent + 工具层 + LLM Client -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">正确的层次结构：编排层 + 专业 Agent</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- Orchestrator (top) -->
  <rect x="160" y="50" width="240" height="46" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="160" y="50" width="240" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="280" y="64" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">编排层 Orchestrator</text>
  <text x="280" y="80" text-anchor="middle" font-size="9" fill="#141413">不做具体工作，只做协调：「让合适的 Agent 做合适的事」</text>
  <rect x="392" y="60" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="399" y="71" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">O</text>

  <!-- Arrow: Orchestrator → Agents -->
  <line x1="280" y1="96" x2="280" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,110 280,118 284,110" fill="#D1CFC5"/>

  <!-- Agent layer (middle) -->
  <rect x="40" y="118" width="480" height="44" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="60" y="134" font-size="10" fill="#141413" font-weight="600">专业 Agent 层：</text>

  <rect x="160" y="126" width="100" height="28" rx="5" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="210" y="138" text-anchor="middle" font-size="9" fill="#D97757" font-weight="600">邮件 Agent</text>
  <rect x="252" y="133" width="10" height="10" rx="5" fill="#D97757"/>
  <text x="257" y="141" text-anchor="middle" font-size="6" fill="#FFFFFF">A</text>

  <rect x="270" y="126" width="100" height="28" rx="5" fill="#FFFFFF" stroke="#87867F" stroke-width="1.5"/>
  <text x="320" y="138" text-anchor="middle" font-size="9" fill="#87867F" font-weight="600">日程 Agent</text>
  <rect x="362" y="133" width="10" height="10" rx="5" fill="#87867F"/>
  <text x="367" y="141" text-anchor="middle" font-size="6" fill="#FFFFFF">B</text>

  <rect x="380" y="126" width="100" height="28" rx="5" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="430" y="138" text-anchor="middle" font-size="9" fill="#87867F" font-weight="600">文档 Agent</text>
  <rect x="472" y="133" width="10" height="10" rx="5" fill="#D1CFC5"/>
  <text x="477" y="141" text-anchor="middle" font-size="6" fill="#FFFFFF">C</text>

  <!-- Arrow Agents → Tool -->
  <line x1="280" y1="162" x2="280" y2="174" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,174 280,182 284,174" fill="#D1CFC5"/>

  <!-- Tool Layer -->
  <rect x="40" y="182" width="240" height="20" rx="5" fill="#FFFFFF" stroke="#87867F" stroke-width="1.2"/>
  <text x="60" y="196" font-size="9" fill="#87867F" font-weight="600">工具层 Tool Layer</text>
  <text x="160" y="196" font-size="9" fill="#87867F">Gmail API · Calendar API · Docs API</text>

  <!-- LLM Client -->
  <rect x="300" y="182" width="220" height="20" rx="5" fill="#FFFFFF" stroke="#87867F" stroke-width="1.2"/>
  <text x="320" y="196" font-size="9" fill="#87867F" font-weight="600">LLM Client</text>
  <text x="410" y="196" font-size="9" fill="#87867F">GPT-4 / Claude / Gemini</text>

  <!-- Note -->
  <text x="280" y="214" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">Orchestrator 只负责任务分发，具体执行由专业 Agent 负责</text>
</svg>