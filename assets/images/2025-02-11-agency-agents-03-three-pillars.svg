<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 420"><path fill="#faf9f5" d="M0 0h680v420H0z"/><text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">agency-agents 三大工程机制</text><text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">个性 · 流程 · 交付物</text><path stroke="#d1cfc5" stroke-width="1.5" d="M228 58v332M456 58v332"/><rect width="200" height="36" x="20" y="58" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="120" y="81" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">01 个性 (Personality)</text><rect width="210" height="36" x="238" y="58" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="343" y="81" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">02 流程 (Process)</text><rect width="194" height="36" x="466" y="58" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="563" y="81" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">03 交付物 (Deliverable)</text><rect width="180" height="68" x="30" y="108" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="120" y="132" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">认知风格</text><text x="120" y="150" fill="#87867f" font-size="10" text-anchor="middle">前端&quot;视觉优先&quot;</text><text x="120" y="165" fill="#87867f" font-size="10" text-anchor="middle">后端&quot;系统优先&quot;</text><rect width="180" height="68" x="30" y="186" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="120" y="210" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">沟通风格</text><text x="120" y="228" fill="#87867f" font-size="10" text-anchor="middle">产品经理: 业务↔技术</text><text x="120" y="243" fill="#87867f" font-size="10" text-anchor="middle">社区运营: 技术→用户语言</text><rect width="180" height="68" x="30" y="264" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="120" y="288" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">决策偏好</text><text x="120" y="306" fill="#87867f" font-size="10" text-anchor="middle">安全专家&quot;风险厌恶型&quot;</text><text x="120" y="321" fill="#87867f" font-size="10" text-anchor="middle">研究Agent&quot;创新偏好型&quot;</text><rect width="190" height="68" x="248" y="108" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="343" y="132" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">设计评审流程</text><text x="343" y="150" fill="#87867f" font-size="10" text-anchor="middle">设计稿→可行性评估</text><text x="343" y="165" fill="#87867f" font-size="10" text-anchor="middle">→业务价值确认→开发</text><rect width="190" height="68" x="248" y="186" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="343" y="210" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Bug修复流程</text><text x="343" y="228" fill="#87867f" font-size="10" text-anchor="middle">监控→诊断→修复→测试</text><text x="343" y="243" fill="#87867f" font-size="10" text-anchor="middle">→文档更新</text><rect width="190" height="68" x="248" y="264" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="343" y="288" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">新功能开发流程</text><text x="343" y="306" fill="#87867f" font-size="10" text-anchor="middle">需求→方案→原型</text><text x="343" y="321" fill="#87867f" font-size="10" text-anchor="middle">→内测→用户测试→发布</text><rect width="174" height="68" x="476" y="108" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="563" y="132" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">代码</text><text x="563" y="150" fill="#87867f" font-size="10" text-anchor="middle">可执行 · 带测试</text><text x="563" y="165" fill="#87867f" font-size="10" text-anchor="middle">符合代码规范</text><rect width="174" height="68" x="476" y="186" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="563" y="210" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">文档</text><text x="563" y="228" fill="#87867f" font-size="10" text-anchor="middle">背景·方案·风险评估</text><text x="563" y="243" fill="#87867f" font-size="10" text-anchor="middle">后续行动</text><rect width="174" height="68" x="476" y="264" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="563" y="288" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">数据</text><text x="563" y="306" fill="#87867f" font-size="10" text-anchor="middle">带Schema · 可验证</text><text x="563" y="321" fill="#87867f" font-size="10" text-anchor="middle">可追溯来源</text><rect width="640" height="38" x="20" y="350" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="340" y="374" fill="#141413" font-size="11" text-anchor="middle">三大机制共同构成 agency-agents 的工程基础：个性定义角色 · 流程约束协作 · 交付物验证产出</text><title>agency-agents 三大工程机制</title><desc>Three-column layout with labeled column headers &apos;01 个性 (Personality)&apos;, &apos;02 流程 (Process)&apos;, &apos;03 交付物 (Deliverable)&apos;. Each column contains 3 compact cards with Chinese descriptor text.</desc></svg>