<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" viewBox="0 0 900 560"><defs><linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#f0ede5"/></linearGradient><marker id="arr3" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#87867f" d="m0 0 6 3-6 3Z"/></marker></defs><rect width="900" height="560" fill="url(#bg4)" rx="12"/><text x="450" y="36" fill="#141413" font-size="17" font-weight="700" text-anchor="middle">AI 辅助术语对齐流水线</text><text x="450" y="56" fill="#87867f" font-size="12" text-anchor="middle">从业务语言到规范代码：术语表作为人机协作的桥梁</text><g transform="translate(30 80)"><rect width="210" height="200" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><rect width="210" height="30" fill="#d1cfc5" clip-path="url(#clip14)" rx="8"/><text x="105" y="20" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">① 用户输入</text><text x="12" y="46" fill="#141413" font-size="10" font-weight="600">业务语言描述：</text><rect width="186" height="56" x="12" y="54" fill="#faf9f5" stroke="#d1cfc5" rx="4"/><text x="20" y="68" fill="#141413" font-size="10">&quot;为客户生成</text><text x="20" y="82" fill="#141413" font-size="10">订单历史查询</text><text x="20" y="96" fill="#141413" font-size="10">功能&quot;</text><text x="12" y="124" fill="#141413" font-size="10" font-weight="600">关键术语提取：</text><rect width="186" height="56" x="12" y="132" fill="#e3dacc" rx="4"/><text x="20" y="148" fill="#141413" font-size="10.5">📌 <tspan font-weight="600">客户</tspan> → Customer</text><text x="20" y="163" fill="#141413" font-size="10.5">📌 <tspan font-weight="600">订单</tspan> → Order</text><text x="20" y="178" fill="#141413" font-size="10.5">📌 <tspan font-weight="600">历史查询</tspan> → findOrders...</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr3)" d="M220 100h28"/><rect width="210" height="200" x="258" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="8"/><rect width="210" height="30" x="258" fill="#788c5d" clip-path="url(#clip15)" rx="8"/><text x="363" y="20" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">② 术语表查询</text><text x="270" y="46" fill="#141413" font-size="10" font-weight="600">业务术语定义：</text><rect width="186" height="76" x="270" y="54" fill="#edf3e5" stroke="#788c5d" rx="4"/><text x="280" y="68" fill="#141413" font-size="9.5"><tspan font-weight="600">Customer</tspan>：平台注册者</text><text x="280" y="81" fill="#141413" font-size="9.5"><tspan font-weight="600">class:</tspan> Customer</text><text x="280" y="94" fill="#141413" font-size="9.5"><tspan font-weight="600">package:</tspan> sales.domain</text><text x="280" y="107" fill="#141413" font-size="9.5"><tspan font-weight="600">Order</tspan>：购买记录</text><text x="280" y="120" fill="#141413" font-size="9.5"><tspan font-weight="600">class:</tspan> Order</text><text x="280" y="133" fill="#87867f" font-size="9.5"><tspan font-weight="600">rel:</tspan> Customer 1:N Order</text><text x="270" y="148" fill="#141413" font-size="10" font-weight="600">代码命名规范：</text><rect width="186" height="32" x="270" y="156" fill="#e3dacc" rx="4"/><text x="280" y="170" fill="#141413" font-size="9.5">方法：findOrdersByCustomerId</text><text x="280" y="183" fill="#141413" font-size="9.5">返回：List&lt;Order&gt;，最多100条</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr3)" d="M478 100h28"/><rect width="210" height="200" x="516" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/><rect width="210" height="30" x="516" fill="#d97757" clip-path="url(#clip16)" rx="8"/><text x="621" y="20" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">③ AI 语境构建</text><text x="528" y="46" fill="#141413" font-size="10" font-weight="600">Prompt Context：</text><rect width="186" height="134" x="528" y="54" fill="#fff0e8" stroke="#d97757" rx="4"/><text x="538" y="68" fill="#141413" font-size="9"><tspan font-weight="600">业务语境：</tspan></text><text x="538" y="80" fill="#141413" font-size="9">Customer: 平台注册者</text><text x="538" y="92" fill="#141413" font-size="9">Order: 购买记录，1:N 关系</text><text x="538" y="104" fill="#141413" font-size="9" font-weight="600">代码规范：</text><text x="538" y="116" fill="#141413" font-size="9">类名：Customer, Order</text><text x="538" y="128" fill="#141413" font-size="9">方法：findOrdersByCustomerId</text><text x="538" y="140" fill="#141413" font-size="9" font-weight="600">约束：</text><text x="538" y="152" fill="#141413" font-size="9">只返回已完成订单</text><text x="538" y="164" fill="#141413" font-size="9">按时间倒序，最多100条</text><text x="538" y="176" fill="#141413" font-size="9">使用 Repository 模式</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr3)" d="M736 100h28"/><rect width="96" height="200" x="774" fill="#fff" stroke="#788c5d" stroke-width="2" rx="8"/><rect width="96" height="30" x="774" fill="#788c5d" clip-path="url(#clip17)" rx="8"/><text x="822" y="20" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">④ 代码</text><rect width="72" height="148" x="786" y="40" fill="#edf3e5" rx="4"/><text x="822" y="56" fill="#141413" font-size="9" font-weight="700" text-anchor="middle">结果</text><path stroke="#788c5d" stroke-width=".5" d="M796 62h52"/><text x="794" y="74" fill="#141413" font-size="8.5">@Service</text><text x="794" y="86" fill="#141413" font-size="8.5">OrderQuery</text><text x="794" y="98" fill="#141413" font-size="8.5">Service</text><text x="794" y="112" fill="#141413" font-size="8.5">findOrders</text><text x="794" y="124" fill="#141413" font-size="8.5">ByCustomer</text><text x="794" y="136" fill="#141413" font-size="8.5">Id(customer)</text><text x="794" y="148" fill="#141413" font-size="8.5">{</text><text x="794" y="160" fill="#141413" font-size="8.5">return repo</text><text x="794" y="172" fill="#141413" font-size="8.5">.find...</text><text x="794" y="184" fill="#141413" font-size="8.5">}</text><path stroke="#d1cfc5" d="M0 218h840"/><g transform="translate(0 232)"><rect width="410" height="138" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="16" y="20" fill="#141413" font-size="12" font-weight="700">术语冲突检测（Linter）</text><text x="16" y="40" fill="#87867f" font-size="10">自动扫描代码中的命名不一致</text><rect width="178" height="74" x="16" y="52" fill="#fff5f0" stroke="#d97757" rx="4"/><text x="24" y="66" fill="#d97757" font-size="9" font-weight="600">⚠️ 代码中的命名</text><text x="24" y="80" fill="#141413" font-size="9">class <tspan fill="#d97757" font-weight="600">User</tspan> {</text><text x="32" y="94" fill="#141413" font-size="9">List&lt;<tspan fill="#d97757" font-weight="600">Purchase</tspan>&gt; h;</text><text x="24" y="108" fill="#141413" font-size="9">}</text><path stroke="#87867f" stroke-width="1.5" marker-end="url(#arr3)" d="M204 89h24"/><rect width="160" height="74" x="238" y="52" fill="#edf3e5" stroke="#788c5d" rx="4"/><text x="246" y="66" fill="#788c5d" font-size="9" font-weight="600">✅ 检测结果</text><text x="246" y="80" fill="#141413" font-size="9"><tspan font-weight="600">User</tspan> → 应该是 Customer</text><text x="246" y="94" fill="#141413" font-size="9"><tspan font-weight="600">Purchase</tspan> → 考虑用 Order</text><text x="246" y="108" fill="#87867f" font-size="9">建议自动重构</text></g><g transform="translate(430 232)"><rect width="410" height="138" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="16" y="20" fill="#141413" font-size="12" font-weight="700">IDE 实时集成</text><text x="16" y="40" fill="#87867f" font-size="10">开发时即时提示术语规范</text><rect width="378" height="74" x="16" y="52" fill="#faf9f5" stroke="#d1cfc5" rx="4"/><text x="24" y="68" fill="#141413" font-size="9">开发者输入：<tspan font-weight="600">class Client</tspan></text><text x="24" y="84" fill="#d97757" font-size="9">⚠️ 命名建议：&quot;Client&quot; 可能对应业务术语 &quot;客户&quot;</text><text x="24" y="96" fill="#141413" font-size="9"><tspan font-weight="600">建议改为 &quot;Customer&quot; 以符合规范</tspan></text><rect width="72" height="16" x="24" y="104" fill="#788c5d" rx="4"/><text x="60" y="116" fill="#fff" font-size="9" font-weight="600" text-anchor="middle">自动重构</text><rect width="60" height="16" x="104" y="104" fill="#d1cfc5" rx="4"/><text x="134" y="116" fill="#141413" font-size="9" text-anchor="middle">查看定义</text><rect width="60" height="16" x="172" y="104" fill="#fff" stroke="#d1cfc5" rx="4"/><text x="202" y="116" fill="#141413" font-size="9" text-anchor="middle">忽略</text></g></g><rect width="840" height="52" x="30" y="458" fill="#edf3e5" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="450" y="480" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">术语治理的战略价值</text><text x="450" y="496" fill="#141413" font-size="11" text-anchor="middle">术语是 AI 理解的桥梁 | 没有术语治理 = garbage in, garbage out | ROI极高：投入1小时，节省100小时沟通</text></svg>