<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 架构师能力模型：从 T 型到 π 型 -->
  <rect width="560" height="240" fill="#FAF9F5"/>

  <text x="280" y="18" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">架构师能力模型重构：从 T 型到 π 型</text>
  <text x="280" y="34" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/02/14</text>

  <!-- === T-SHAPED MODEL (left) === -->
  <!-- Title -->
  <text x="140" y="54" text-anchor="middle" font-size="10" fill="#87867F" font-weight="600">T 型（传统）</text>

  <!-- Vertical bar of T -->
  <rect x="118" y="62" width="44" height="110" rx="4" fill="#D1CFC5" stroke="#87867F" stroke-width="1.5"/>
  <text x="140" y="84" text-anchor="middle" font-size="8" fill="#141413" font-weight="600">技术深度</text>
  <text x="140" y="97" text-anchor="middle" font-size="7.5" fill="#141413">某一领域</text>
  <text x="140" y="109" text-anchor="middle" font-size="7.5" fill="#87867F">分布式系统</text>
  <text x="140" y="121" text-anchor="middle" font-size="7.5" fill="#87867F">ML/AI 等</text>

  <!-- Horizontal bar of T -->
  <rect x="54" y="176" width="172" height="24" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="140" y="192" text-anchor="middle" font-size="8" fill="#87867F">跨领域广度：前端 · 后端 · 运维 · 产品</text>

  <!-- Center label T -->
  <text x="140" y="215" text-anchor="middle" font-size="8" fill="#87867F">重心：执行</text>

  <!-- === π-SHAPED MODEL (right) === -->
  <!-- Title -->
  <text x="400" y="54" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600">π 型（AI 时代）</text>

  <!-- Left leg: 技术评估能力 -->
  <rect x="318" y="62" width="54" height="110" rx="4" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="318" y="62" width="54" height="20" rx="4" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="345" y="74" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">左竖</text>
  <text x="345" y="92" text-anchor="middle" font-size="8" fill="#141413" font-weight="600">技术评估</text>
  <text x="345" y="106" text-anchor="middle" font-size="7.5" fill="#141413">评估而非执行</text>
  <text x="345" y="120" text-anchor="middle" font-size="7" fill="#87867F">判断什么对</text>
  <text x="345" y="132" text-anchor="middle" font-size="7" fill="#87867F">而非亲手做</text>
  <rect x="364" y="66" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="371" y="76" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">L</text>

  <!-- Right leg: Context 设计能力 (NEW) -->
  <rect x="448" y="62" width="54" height="110" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.8"/>
  <rect x="448" y="62" width="54" height="20" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="475" y="74" text-anchor="middle" font-size="8.5" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">右竖</text>
  <text x="475" y="92" text-anchor="middle" font-size="8" fill="#141413" font-weight="600">Context 设计</text>
  <text x="475" y="106" text-anchor="middle" font-size="7.5" fill="#141413">AI 时代新核心</text>
  <text x="475" y="120" text-anchor="middle" font-size="7" fill="#141413">五维度能力</text>
  <text x="475" y="132" text-anchor="middle" font-size="7" fill="#87867F">差异化竞争力</text>
  <rect x="494" y="66" width="14" height="14" rx="7" fill="#2563EB"/>
  <text x="501" y="76" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">R</text>

  <!-- Horizontal bar of π: 跨领域整合 -->
  <rect x="238" y="176" width="340" height="24" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="408" y="192" text-anchor="middle" font-size="8" fill="#87867F">横杠：跨领域整合（比 T 型更宽）技术 · 业务 · 组织</text>

  <!-- Center label π -->
  <text x="408" y="215" text-anchor="middle" font-size="8" fill="#D97757" font-weight="600">重心转移：执行 → 评估 + Context 设计</text>

  <!-- Arrow: T → π -->
  <line x1="230" y1="120" x2="310" y2="120" stroke="#D1CFC5" stroke-width="2"/>
  <polygon points="310,116 318,120 310,124" fill="#D1CFC5"/>
  <text x="270" y="116" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">演进</text>

  <!-- NEW badge on right leg -->
  <rect x="502" y="50" width="28" height="12" rx="3" fill="#DC2626"/>
  <text x="516" y="59" text-anchor="middle" font-size="7" fill="#FFFFFF" font-weight="600">NEW</text>
</svg>