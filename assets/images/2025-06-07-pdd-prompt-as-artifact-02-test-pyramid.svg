<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 800 440">
  <defs>
    <style>
      .label,.label-sm{fill:#141413;font-size:13px;font-weight:600}.label-sm{font-size:11px;font-weight:500}.desc{fill:#87867f;font-size:11px}.desc-white{fill:rgba(255,255,255,.85);font-size:11px}.white{fill:#fff}.accent-g500{fill:#87867f}
    </style>
  </defs>
  <path d="M0 0h800v440H0z" style="fill:#faf9f5"/>
  <text x="40" y="38" style="fill:#141413;font-size:20px;font-weight:700">Prompt 测试金字塔与制品对比</text>
  <text x="40" y="58" style="fill:#87867f;font-size:12px">单元测试单个 Prompt 质量 → 契约测试格式契约 → 集成测试完整功能</text>
  <text x="40" y="90" class="label">Prompt 测试金字塔</text>
  <path fill="#d97757" d="M195 108h120l-20 80h-80z"/>
  <path fill="none" stroke="#d97757" d="M195 108h120l-20 80h-80z"/>
  <text x="255" y="145" class="label-sm white" text-anchor="middle">集成测试</text>
  <text x="255" y="163" class="desc-white" text-anchor="middle">Prompt + 上下文 → 完整功能</text>
  <path fill="#e3dacc" d="M175 190h160l-25 80H200z"/>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" d="M175 190h160l-25 80H200z"/>
  <text x="255" y="225" class="label-sm" text-anchor="middle">契约测试</text>
  <text x="255" y="243" class="desc" text-anchor="middle">Prompt 输出格式验证</text>
  <path fill="#788c5d" d="M195 272h120l-30 80h-60z"/>
  <text x="255" y="305" class="label-sm white" text-anchor="middle">单元测试</text>
  <text x="255" y="323" class="desc-white" text-anchor="middle">单个 Prompt 输出质量</text>
  <text x="255" y="340" class="desc-white" text-anchor="middle">成功率 &gt; 80%</text>
  <text x="330" y="148" class="accent-g500" font-size="10" text-anchor="end">少量</text>
  <text x="330" y="228" class="accent-g500" font-size="10" text-anchor="end">中量</text>
  <text x="330" y="310" class="accent-g500" font-size="10" text-anchor="end">大量</text>
  <text x="160" y="230" class="desc" transform="rotate(-90 160 230)">测试覆盖量</text>
  <text x="370" y="90" class="label">源代码 vs Prompt 制品特征对比</text>
  <rect width="390" height="28" x="370" y="108" fill="#141413" rx="6"/>
  <text x="386" y="126" class="label-sm white">制品特征</text>
  <text x="510" y="126" class="label-sm white">源代码</text>
  <text x="610" y="126" class="label-sm white">Prompt</text>
  <rect width="390" height="32" x="370" y="140" fill="#e3dacc" rx="0"/>
  <rect width="390" height="32" x="370" y="140" fill="#e3dacc" rx="6"/>
  <path fill="none" stroke="#d1cfc5" d="M370 140h390v32H370z"/>
  <text x="386" y="161" class="label-sm">版本控制</text>
  <text x="530" y="161" class="desc" text-anchor="middle">✓ Git commit/diff</text>
  <text x="650" y="161" class="desc" text-anchor="middle">✓ Git commit/diff</text>
  <rect width="390" height="32" x="370" y="174" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="386" y="195" class="label-sm">Code Review</text>
  <text x="530" y="195" class="desc" text-anchor="middle">人工审查代码逻辑</text>
  <text x="650" y="195" class="desc" text-anchor="middle">审查 Prompt 约束和验收标准</text>
  <rect width="390" height="32" x="370" y="208" fill="#e3dacc" rx="6"/>
  <rect width="390" height="32" x="370" y="208" fill="#e3dacc" stroke="#d1cfc5" rx="6"/>
  <text x="386" y="229" class="label-sm">可测试</text>
  <text x="530" y="229" class="desc" text-anchor="middle">单元测试 + 集成测试</text>
  <text x="650" y="229" class="desc" text-anchor="middle">输出验证 + 回归测试</text>
  <rect width="390" height="32" x="370" y="242" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="386" y="263" class="label-sm">可复用</text>
  <text x="530" y="263" class="desc" text-anchor="middle">函数 / 模块复用</text>
  <text x="650" y="263" class="desc" text-anchor="middle">模板复用 / Prompt 库</text>
  <rect width="390" height="32" x="370" y="276" fill="#e3dacc" rx="6"/>
  <rect width="390" height="32" x="370" y="276" fill="#e3dacc" stroke="#d1cfc5" rx="6"/>
  <text x="386" y="297" class="label-sm">最佳实践</text>
  <text x="530" y="297" class="desc" text-anchor="middle">设计模式 / 重构</text>
  <text x="650" y="297" class="desc" text-anchor="middle">Prompt 工程指南</text>
  <rect width="390" height="32" x="370" y="310" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="386" y="331" class="label-sm">CI/CD</text>
  <text x="530" y="331" class="desc" text-anchor="middle">Build → Test → Deploy</text>
  <text x="650" y="331" class="desc" text-anchor="middle">Lint → Validate → Publish</text>
  <rect width="390" height="32" x="370" y="344" fill="#d97757" rx="6"/>
  <text x="386" y="365" class="label-sm white">组织资产</text>
  <text x="530" y="365" class="desc-white" text-anchor="middle">代码库</text>
  <text x="650" y="365" class="desc-white" text-anchor="middle">Prompt 库（核心竞争力）</text>
  <rect width="390" height="40" x="370" y="384" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="386" y="402" class="label-sm" style="fill:#788c5d">💡 关键洞察</text>
  <text x="386" y="418" class="desc">Review Prompt 比 Review 代码更高效 — 改 Prompt 一分钟，改代码可能需要一小时</text>
  <text x="40" y="428" class="desc">Prompt 是意图的表达，代码是意图的实现 — 管理好 Prompt 就管理好了软件开发的源头</text>
  <text x="700" y="428" class="desc">AI-Native 软件工程系列 #5</text>
</svg>
