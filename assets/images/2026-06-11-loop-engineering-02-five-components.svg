<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 240"><title>Loop Engineering 五组件详解</title><desc>目标、上下文管理、工具、评估、停止条件——五个结构性组件的循环迭代关系图</desc><path fill="#faf9f5" d="M0 0h680v240H0z"/><text x="340" y="24" fill="#141413" font-size="13" font-weight="500" letter-spacing="-.01em" text-anchor="middle">五组件循环</text><text x="340" y="38" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Goal · Context · Tools · Eval · Stop</text><rect width="112" height="120" x="20" y="50" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><rect width="112" height="6" x="20" y="50" fill="#d97757" rx="3"/><text x="76" y="76" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">目标</text><text x="76" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Goal</text><text x="76" y="108" fill="#141413" font-size="9" text-anchor="middle">可验证的完成标准</text><text x="76" y="122" fill="#87867f" font-size="8.5" text-anchor="middle">稳定的迭代锚点</text><text x="76" y="136" fill="#87867f" font-size="8.5" text-anchor="middle">每轮校准依据</text><text x="76" y="158" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">→ 上下文</text><path stroke="#d1cfc5" stroke-width="1.5" d="M132 110h16"/><path fill="#d1cfc5" d="m148 106 6 4-6 4z"/><rect width="112" height="120" x="154" y="50" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><rect width="112" height="6" x="154" y="50" fill="#d97757" rx="3"/><text x="210" y="76" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">上下文管理</text><text x="210" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Context Mgmt</text><text x="210" y="108" fill="#141413" font-size="9" text-anchor="middle">锚点文件 · git 历史</text><text x="210" y="122" fill="#87867f" font-size="8.5" text-anchor="middle">避免上下文污染</text><text x="210" y="136" fill="#87867f" font-size="8.5" text-anchor="middle">每次迭代重置</text><text x="210" y="158" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">→ 工具</text><path stroke="#d1cfc5" stroke-width="1.5" d="M266 110h16"/><path fill="#d1cfc5" d="m282 106 6 4-6 4z"/><rect width="112" height="120" x="288" y="50" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><rect width="112" height="6" x="288" y="50" fill="#d97757" rx="3"/><text x="344" y="76" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">工具</text><text x="344" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Tools</text><text x="344" y="108" fill="#141413" font-size="9" text-anchor="middle">精心选择的工具集</text><text x="344" y="122" fill="#87867f" font-size="8.5" text-anchor="middle">每个工具有清晰</text><text x="344" y="136" fill="#87867f" font-size="8.5" text-anchor="middle">用途和使用时机</text><text x="344" y="158" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">→ 评估</text><path stroke="#d1cfc5" stroke-width="1.5" d="M400 110h16"/><path fill="#d1cfc5" d="m416 106 6 4-6 4z"/><rect width="112" height="120" x="422" y="50" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><rect width="112" height="6" x="422" y="50" fill="#d97757" rx="3"/><text x="478" y="76" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">评估</text><text x="478" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Evaluation</text><text x="478" y="108" fill="#141413" font-size="9" text-anchor="middle">自动化的 grader</text><text x="478" y="122" fill="#87867f" font-size="8.5" text-anchor="middle">关键节点人工介入</text><text x="478" y="136" fill="#87867f" font-size="8.5" text-anchor="middle">独立于执行 Agent</text><text x="478" y="158" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">→ 停止条件</text><path stroke="#d1cfc5" stroke-width="1.5" d="M534 110h16"/><path fill="#d1cfc5" d="m550 106 6 4-6 4z"/><rect width="112" height="120" x="556" y="50" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><rect width="112" height="6" x="556" y="50" fill="#d97757" rx="3"/><text x="612" y="76" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">停止条件</text><text x="612" y="90" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Stop Conditions</text><text x="612" y="108" fill="#141413" font-size="9" text-anchor="middle">成功 · 失败 · 资源</text><text x="612" y="122" fill="#87867f" font-size="8.5" text-anchor="middle">风险检查点</text><text x="612" y="136" fill="#87867f" font-size="8.5" text-anchor="middle">可验证的退出</text><path fill="none" stroke="#d97757" stroke-dasharray="4,3" stroke-width="1.5" d="M612 172c0 24-536 24-536 0" opacity=".5"/><path fill="#d97757" d="m76 172-6-4h12z" opacity=".5"/><text x="340" y="206" fill="#d97757" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">← 循环迭代，直到停止条件满足 →</text><rect width="84" height="18" x="298" y="210" fill="#d97757" opacity=".12" rx="9"/><text x="340" y="223" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">迭代</text></svg>