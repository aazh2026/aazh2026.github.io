<svg viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>Loop Engineering 五组件详解</title>
  <desc>目标、上下文管理、工具、评估、停止条件——五个结构性组件的循环迭代关系图</desc>

  <!-- Background -->
  <rect width="680" height="240" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.01em">五组件循环</text>
  <text x="340" y="38" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Goal · Context · Tools · Eval · Stop</text>

  <!-- Five cards -->
  <!-- Card 1: Goal -->
  <rect x="20" y="50" width="112" height="120" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="20" y="50" width="112" height="6" rx="3" fill="#D97757"/>
  <text x="76" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">目标</text>
  <text x="76" y="90" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Goal</text>
  <text x="76" y="108" text-anchor="middle" font-size="9" fill="#141413">可验证的完成标准</text>
  <text x="76" y="122" text-anchor="middle" font-size="8.5" fill="#87867F">稳定的迭代锚点</text>
  <text x="76" y="136" text-anchor="middle" font-size="8.5" fill="#87867F">每轮校准依据</text>
  <text x="76" y="158" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">→ 上下文</text>

  <!-- Arrow 1→2 -->
  <line x1="132" y1="110" x2="148" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="148,106 154,110 148,114" fill="#D1CFC5"/>

  <!-- Card 2: Context Management -->
  <rect x="154" y="50" width="112" height="120" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="154" y="50" width="112" height="6" rx="3" fill="#D97757"/>
  <text x="210" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">上下文管理</text>
  <text x="210" y="90" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Context Mgmt</text>
  <text x="210" y="108" text-anchor="middle" font-size="9" fill="#141413">锚点文件 · git 历史</text>
  <text x="210" y="122" text-anchor="middle" font-size="8.5" fill="#87867F">避免上下文污染</text>
  <text x="210" y="136" text-anchor="middle" font-size="8.5" fill="#87867F">每次迭代重置</text>
  <text x="210" y="158" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">→ 工具</text>

  <!-- Arrow 2→3 -->
  <line x1="266" y1="110" x2="282" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="282,106 288,110 282,114" fill="#D1CFC5"/>

  <!-- Card 3: Tools -->
  <rect x="288" y="50" width="112" height="120" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="288" y="50" width="112" height="6" rx="3" fill="#D97757"/>
  <text x="344" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">工具</text>
  <text x="344" y="90" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Tools</text>
  <text x="344" y="108" text-anchor="middle" font-size="9" fill="#141413">精心选择的工具集</text>
  <text x="344" y="122" text-anchor="middle" font-size="8.5" fill="#87867F">每个工具有清晰</text>
  <text x="344" y="136" text-anchor="middle" font-size="8.5" fill="#87867F">用途和使用时机</text>
  <text x="344" y="158" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">→ 评估</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="110" x2="416" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="416,106 422,110 416,114" fill="#D1CFC5"/>

  <!-- Card 4: Evaluation -->
  <rect x="422" y="50" width="112" height="120" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="422" y="50" width="112" height="6" rx="3" fill="#D97757"/>
  <text x="478" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">评估</text>
  <text x="478" y="90" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Evaluation</text>
  <text x="478" y="108" text-anchor="middle" font-size="9" fill="#141413">自动化的 grader</text>
  <text x="478" y="122" text-anchor="middle" font-size="8.5" fill="#87867F">关键节点人工介入</text>
  <text x="478" y="136" text-anchor="middle" font-size="8.5" fill="#87867F">独立于执行 Agent</text>
  <text x="478" y="158" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">→ 停止条件</text>

  <!-- Arrow 4→5 -->
  <line x1="534" y1="110" x2="550" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="550,106 556,110 550,114" fill="#D1CFC5"/>

  <!-- Card 5: Stop Conditions -->
  <rect x="556" y="50" width="112" height="120" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="556" y="50" width="112" height="6" rx="3" fill="#D97757"/>
  <text x="612" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">停止条件</text>
  <text x="612" y="90" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Stop Conditions</text>
  <text x="612" y="108" text-anchor="middle" font-size="9" fill="#141413">成功 · 失败 · 资源</text>
  <text x="612" y="122" text-anchor="middle" font-size="8.5" fill="#87867F">风险检查点</text>
  <text x="612" y="136" text-anchor="middle" font-size="8.5" fill="#87867F">可验证的退出</text>

  <!-- Feedback arrow: bottom from card 5 back to card 1 (dashed) -->
  <path d="M 612 172 C 612 196, 76 196, 76 172" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="76,172 70,168 82,168" fill="#D97757" opacity="0.5"/>
  <text x="340" y="206" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">← 循环迭代，直到停止条件满足 →</text>

  <!-- Iteration label -->
  <rect x="298" y="210" width="84" height="18" rx="9" fill="#D97757" opacity="0.12"/>
  <text x="340" y="223" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">迭代</text>
</svg>
