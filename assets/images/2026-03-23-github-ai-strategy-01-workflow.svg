<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="100%" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-size: 13px; }
      .text-sm { fill: #87867F; font-size: 11px; }
      .text-xs { fill: #87867F; font-size: 10px; }
      .text-label { fill: #141413; font-size: 12px; font-weight: 600; }
      .border { stroke: #D1CFC5; stroke-width: 1.5; }
      .fill-issue { fill: #dbeafe; stroke: #2563eb; }
      .fill-branch { fill: #dbeafe; stroke: #2563eb; }
      .fill-commit { fill: #dbeafe; stroke: #2563eb; }
      .fill-pr { fill: #dbeafe; stroke: #2563eb; }
      .fill-review { fill: #dbeafe; stroke: #2563eb; }
      .fill-merge { fill: #dbeafe; stroke: #2563eb; }
      .fill-deploy { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .fill-white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="760" height="280" class="bg"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" class="text-main" font-size="15" font-weight="700">GitHub Agent 工作流整合</text>

  <!-- ========== Main pipeline ========== -->
  <!-- Issue -->
  <rect x="40" y="80" width="90" height="52" rx="8" class="fill-issue"/>
  <text x="85" y="100" text-anchor="middle" class="text-label">Issue</text>
  <text x="85" y="116" text-anchor="middle" class="text-xs">问题描述</text>

  <!-- Arrow: Issue → Branch -->
  <line x1="130" y1="106" x2="160" y2="106" class="border" stroke-width="2"/>
  <polygon points="160,106 152,101 152,111" fill="#141413"/>

  <!-- Branch -->
  <rect x="160" y="80" width="90" height="52" rx="8" class="fill-branch"/>
  <text x="205" y="100" text-anchor="middle" class="text-label">Branch</text>
  <text x="205" y="116" text-anchor="middle" class="text-xs">创建分支</text>

  <!-- Arrow: Branch → Commit -->
  <line x1="250" y1="106" x2="280" y2="106" class="border" stroke-width="2"/>
  <polygon points="280,106 272,101 272,111" fill="#141413"/>

  <!-- Commit -->
  <rect x="280" y="80" width="90" height="52" rx="8" class="fill-commit"/>
  <text x="325" y="100" text-anchor="middle" class="text-label">Commit</text>
  <text x="325" y="116" text-anchor="middle" class="text-xs">代码提交</text>

  <!-- Arrow: Commit → PR -->
  <line x1="370" y1="106" x2="400" y2="106" class="border" stroke-width="2"/>
  <polygon points="400,106 392,101 392,111" fill="#141413"/>

  <!-- PR -->
  <rect x="400" y="80" width="90" height="52" rx="8" class="fill-pr"/>
  <text x="445" y="100" text-anchor="middle" class="text-label">PR</text>
  <text x="445" y="116" text-anchor="middle" class="text-xs">Pull Request</text>

  <!-- Arrow: PR → Review -->
  <line x1="490" y1="106" x2="520" y2="106" class="border" stroke-width="2"/>
  <polygon points="520,106 512,101 512,111" fill="#141413"/>

  <!-- Review -->
  <rect x="520" y="80" width="90" height="52" rx="8" class="fill-review"/>
  <text x="565" y="100" text-anchor="middle" class="text-label">Review</text>
  <text x="565" y="116" text-anchor="middle" class="text-xs">代码审查</text>

  <!-- Arrow: Review → Merge -->
  <line x1="610" y1="106" x2="640" y2="106" class="border" stroke-width="2"/>
  <polygon points="640,106 632,101 632,111" fill="#141413"/>

  <!-- Merge -->
  <rect x="640" y="80" width="90" height="52" rx="8" class="fill-merge"/>
  <text x="685" y="100" text-anchor="middle" class="text-label">Merge</text>
  <text x="685" y="116" text-anchor="middle" class="text-xs">合并代码</text>

  <!-- Arrow: Merge → Deploy (dashed loop back) -->
  <line x1="685" y1="132" x2="685" y2="190" class="border" stroke-width="2"/>
  <line x1="685" y1="190" x2="445" y2="190" class="border" stroke-width="2"/>
  <line x1="445" y1="190" x2="445" y2="160" class="border" stroke-width="2"/>
  <polygon points="445,160 440,168 450,168" fill="#141413"/>

  <!-- Deploy -->
  <rect x="400" y="160" width="90" height="52" rx="8" class="fill-deploy"/>
  <text x="445" y="180" text-anchor="middle" class="text-label" fill="#059669">Deploy</text>
  <text x="445" y="196" text-anchor="middle" class="text-xs">部署上线</text>

  <!-- Loop back label -->
  <text x="565" y="204" text-anchor="middle" class="text-xs" fill="#87867F">GitHub Agent 可介入任意环节</text>

  <!-- ========== Agent intervention indicators ========== -->
  <!-- Agent badges on top -->
  <rect x="40" y="45" width="740" height="28" rx="6" fill="#fef3c7" stroke="#D97757" stroke-width="1.5"/>
  <text x="410" y="63" text-anchor="middle" class="text-sm" fill="#D97757">GitHub Agent 可介入任意环节：Issue → Branch → Commit → PR → Review → Merge → Deploy</text>

  <!-- ========== Agent capabilities ========== -->
  <rect x="40" y="230" width="720" height="40" rx="8" fill="none" class="border" stroke="#D1CFC5" stroke-dasharray="5 4"/>
  <text x="80" y="252" class="text-sm" fill="#87867F">Agent 能力介入点：</text>
  <text x="220" y="252" class="text-xs">Issue-to-PR</text>
  <line x1="200" y1="247" x2="200" y2="257" stroke="#D97757" stroke-width="1.5"/>
  <text x="340" y="252" class="text-xs">Code Review Agent</text>
  <line x1="320" y1="247" x2="320" y2="257" stroke="#D97757" stroke-width="1.5"/>
  <text x="490" y="252" class="text-xs">Architecture Agent</text>
  <line x1="470" y1="247" x2="470" y2="257" stroke="#D97757" stroke-width="1.5"/>
  <text x="640" y="252" class="text-xs">Security Scan Agent</text>
  <line x1="620" y1="247" x2="620" y2="257" stroke="#D97757" stroke-width="1.5"/>
</svg>
