<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#141413">Skill 三层 Context 成本</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#87867F">每个 session 每个用户都在付 token 税</text>

  <!-- Index Layer -->
  <g transform="translate(40, 90)" filter="url(#shadow3)">
    <rect width="260" height="120" fill="#FAF9F5" rx="8" stroke="#D97757" stroke-width="2"/>
    <rect width="260" height="36" fill="#D97757" rx="8" ry="0"/>
    <rect y="28" width="260" height="8" fill="#D97757"/>
    <text x="130" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF9F5">Index 层</text>

    <text x="20" y="65" font-size="12" font-weight="600" fill="#141413">加载内容：name + description</text>
    <text x="20" y="85" font-size="11" fill="#87867F">每个非隐藏 Skill 各 ~100 tokens</text>
    <text x="20" y="105" font-size="11" fill="#D97757" font-weight="600">💸 每个 session，每个用户，始终付出</text>
  </g>

  <!-- Arrow -->
  <path d="M305 150 L345 150" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L7,3 z" fill="#D97757"/>
  </marker></defs>

  <!-- Load Layer -->
  <g transform="translate(360, 90)" filter="url(#shadow3)">
    <rect width="260" height="120" fill="#FAF9F5" rx="8" stroke="#788C5D" stroke-width="2"/>
    <rect width="260" height="36" fill="#788C5D" rx="8" ry="0"/>
    <rect y="28" width="260" height="8" fill="#788C5D"/>
    <text x="130" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF9F5">Load 层</text>

    <text x="20" y="65" font-size="12" font-weight="600" fill="#141413">加载内容：完整 SKILL.md body</text>
    <text x="20" y="85" font-size="11" fill="#87867F">每个 Skill ~5,000 tokens</text>
    <text x="20" y="105" font-size="11" fill="#788C5D" font-weight="600">💸 加载后整个对话都要支付</text>
  </g>

  <!-- Arrow -->
  <path d="M625 150 L665 150" stroke="#D97757" stroke-width="2" fill="none"/>

  <!-- Runtime Layer -->
  <g transform="translate(680, 90)" filter="url(#shadow3)">
    <rect width="180" height="120" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="180" height="36" fill="#D1CFC5" rx="8" ry="0"/>
    <rect y="28" width="180" height="8" fill="#D1CFC5"/>
    <text x="90" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#141413">Runtime 层</text>

    <text x="15" y="65" font-size="11" font-weight="600" fill="#141413">scripts/ references/</text>
    <text x="15" y="82" font-size="11" font-weight="600" fill="#141413">assets/ 子 Skills</text>
    <text x="15" y="105" font-size="11" fill="#87867F">仅当 agent 读取时</text>
  </g>

  <!-- Right side: Zen of Python vs Skills -->
  <g transform="translate(40, 230)" filter="url(#shadow3)">
    <rect width="820" height="165" fill="#FAF9F5" rx="8" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="410" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#141413">Zen of Python vs Zen of Skills — 至少一半在 Skills 写作里是错的</text>

    <!-- Table header -->
    <rect x="20" y="48" width="380" height="26" fill="#141413" fill-opacity="0.08" rx="4"/>
    <rect x="420" y="48" width="380" height="26" fill="#D97757" fill-opacity="0.1" rx="4"/>
    <text x="210" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">Zen of Python</text>
    <text x="610" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#D97757">Zen of Skills</text>

    <!-- Row 1 -->
    <text x="35" y="90" font-size="10" fill="#141413">Simple is better than complex</text>
    <text x="435" y="90" font-size="10" fill="#D97757">Complexity is the feature — Skill 是文件夹</text>

    <!-- Row 2 -->
    <text x="35" y="110" font-size="10" fill="#141413">Explicit is better than implicit</text>
    <text x="435" y="110" font-size="10" fill="#D97757">Progressive disclosure — 激活是隐式模式匹配</text>

    <!-- Row 3 -->
    <text x="35" y="130" font-size="10" fill="#141413">Sparse is better than dense</text>
    <text x="435" y="130" font-size="10" fill="#D97757">Maximum signal per token — context 昂贵</text>

    <!-- Row 4 -->
    <text x="35" y="150" font-size="10" fill="#141413">If easy to explain, it may be good</text>
    <text x="435" y="150" font-size="10" fill="#D97757">如果容易解释，模型已经知道了，删掉</text>
  </g>

  <!-- Footer -->
  <text x="450" y="405" text-anchor="middle" font-size="10" fill="#87867F">Perplexity Research: "Self-generated Skills provide no benefit on average" — 需要人类注入判断</text>
</svg>