<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bg3" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f5"/>
      <stop offset="100%" style="stop-color:#e3dacc"/>
    </linearGradient>
    <filter id="shadow3" width="140%" height="140%" x="-20%" y="-20%">
      <feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg3)" rx="12"/>
  <text x="450" y="38" fill="#141413" font-size="20" font-weight="700" text-anchor="middle">Skill 三层 Context 成本</text>
  <text x="450" y="60" fill="#87867f" font-size="12" text-anchor="middle">每个 session 每个用户都在付 token 税</text>
  <g filter="url(#shadow3)" transform="translate(40 90)">
    <rect width="260" height="120" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="8"/>
    <rect width="260" height="36" fill="#d97757" rx="8" ry="0"/>
    <path fill="#d97757" d="M0 28h260v8H0z"/>
    <text x="130" y="24" fill="#faf9f5" font-size="14" font-weight="700" text-anchor="middle">Index 层</text>
    <text x="20" y="65" fill="#141413" font-size="12" font-weight="600">加载内容：name + description</text>
    <text x="20" y="85" fill="#87867f" font-size="11">每个非隐藏 Skill 各 ~100 tokens</text>
    <text x="20" y="105" fill="#d97757" font-size="11" font-weight="600">💸 每个 session，每个用户，始终付出</text>
  </g>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arr)" d="M305 150h40"/>
  <defs>
    <marker id="arr" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="3">
      <path fill="#d97757" d="M0 0v6l7-3z"/>
    </marker>
  </defs>
  <g filter="url(#shadow3)" transform="translate(360 90)">
    <rect width="260" height="120" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/>
    <rect width="260" height="36" fill="#788c5d" rx="8" ry="0"/>
    <path fill="#788c5d" d="M0 28h260v8H0z"/>
    <text x="130" y="24" fill="#faf9f5" font-size="14" font-weight="700" text-anchor="middle">Load 层</text>
    <text x="20" y="65" fill="#141413" font-size="12" font-weight="600">加载内容：完整 SKILL.md body</text>
    <text x="20" y="85" fill="#87867f" font-size="11">每个 Skill ~5,000 tokens</text>
    <text x="20" y="105" fill="#788c5d" font-size="11" font-weight="600">💸 加载后整个对话都要支付</text>
  </g>
  <path fill="none" stroke="#d97757" stroke-width="2" d="M625 150h40"/>
  <g filter="url(#shadow3)" transform="translate(680 90)">
    <rect width="180" height="120" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <rect width="180" height="36" fill="#d1cfc5" rx="8" ry="0"/>
    <path fill="#d1cfc5" d="M0 28h180v8H0z"/>
    <text x="90" y="24" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">Runtime 层</text>
    <text x="15" y="65" fill="#141413" font-size="11" font-weight="600">scripts/ references/</text>
    <text x="15" y="82" fill="#141413" font-size="11" font-weight="600">assets/ 子 Skills</text>
    <text x="15" y="105" fill="#87867f" font-size="11">仅当 agent 读取时</text>
  </g>
  <g filter="url(#shadow3)" transform="translate(40 230)">
    <rect width="820" height="165" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <text x="410" y="28" fill="#141413" font-size="14" font-weight="700" text-anchor="middle">Zen of Python vs Zen of Skills — 至少一半在 Skills 写作里是错的</text>
    <rect width="380" height="26" x="20" y="48" fill="#141413" fill-opacity=".08" rx="4"/>
    <rect width="380" height="26" x="420" y="48" fill="#d97757" fill-opacity=".1" rx="4"/>
    <text x="210" y="66" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">Zen of Python</text>
    <text x="610" y="66" fill="#d97757" font-size="11" font-weight="700" text-anchor="middle">Zen of Skills</text>
    <text x="35" y="90" fill="#141413" font-size="10">Simple is better than complex</text>
    <text x="435" y="90" fill="#d97757" font-size="10">Complexity is the feature — Skill 是文件夹</text>
    <text x="35" y="110" fill="#141413" font-size="10">Explicit is better than implicit</text>
    <text x="435" y="110" fill="#d97757" font-size="10">Progressive disclosure — 激活是隐式模式匹配</text>
    <text x="35" y="130" fill="#141413" font-size="10">Sparse is better than dense</text>
    <text x="435" y="130" fill="#d97757" font-size="10">Maximum signal per token — context 昂贵</text>
    <text x="35" y="150" fill="#141413" font-size="10">If easy to explain, it may be good</text>
    <text x="435" y="150" fill="#d97757" font-size="10">如果容易解释，模型已经知道了，删掉</text>
  </g>
  <text x="450" y="405" fill="#87867f" font-size="10" text-anchor="middle">Perplexity Research: &quot;Self-generated Skills provide no benefit on average&quot; — 需要人类注入判断</text>
</svg>
