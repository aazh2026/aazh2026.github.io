<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 900 540"><title>Two Paths to Deterministic AI Programming</title><desc>Dynamic Workflows 与 iii agent harness 两条路径的本质比较——从实时编排走向确定性执行</desc><defs><marker id="arr" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#d97757" d="m0 0 10 3.5L0 7z"/></marker><marker id="arr2" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#788c5d" d="m0 0 10 3.5L0 7z"/></marker><filter id="shadow" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".1" stdDeviation="5"/></filter></defs><path fill="#faf9f5" d="M0 0h900v540H0z"/><text x="450" y="36" fill="#141413" font-size="18" font-weight="bold" letter-spacing="1" text-anchor="middle">确定性AI编程的两条路径</text><text x="450" y="58" fill="#87867f" font-size="12" letter-spacing=".5" text-anchor="middle">Dynamic Workflows vs iii agent harness——脚本化与总线化的殊途同归</text><path stroke="#d1cfc5" d="M150 68h600"/><rect width="400" height="60" x="250" y="84" fill="#141413" filter="url(#shadow)" rx="12"/><text x="450" y="105" fill="#faf9f5" font-size="13" font-weight="bold" text-anchor="middle">核心问题</text><text x="450" y="124" fill="#d1cfc5" font-size="11" text-anchor="middle">当agent工作规模大到需要协调数十上百个并行任务</text><text x="450" y="138" fill="#d97757" font-size="11" text-anchor="middle">纯靠模型实时判断已不够用</text><rect width="300" height="36" x="40" y="168" fill="#d97757" filter="url(#shadow)" rx="8"/><text x="190" y="191" fill="#faf9f5" font-size="14" font-weight="bold" letter-spacing="1" text-anchor="middle">路径一：SCRIPTED 脚本化</text><text x="190" y="204" fill="#e3dacc" font-size="10" text-anchor="middle">Anthropic Dynamic Workflows</text><rect width="300" height="110" x="40" y="218" fill="#faf9f5" stroke="#d97757" stroke-width="2" filter="url(#shadow)" rx="10"/><text x="190" y="240" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">做法：让Claude把编排逻辑</text><text x="190" y="260" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">写成JavaScript脚本</text><path stroke="#d1cfc5" d="M90 272h200"/><text x="190" y="288" fill="#87867f" font-size="10" text-anchor="middle">循环、分支、中间结果的收集</text><text x="190" y="302" fill="#87867f" font-size="10" text-anchor="middle">全部固化在代码里</text><text x="190" y="316" fill="#d97757" font-size="11" text-anchor="middle">模型只在agent()调用时「醒来」</text><rect width="300" height="70" x="40" y="342" fill="#e3dacc" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="190" y="362" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">案例：Bun 75万行Rust迁移</text><text x="190" y="380" fill="#141413" font-size="10" text-anchor="middle">Jarred Sumner，11天，99.8%测试通过</text><text x="190" y="396" fill="#87867f" font-size="10" text-anchor="middle">数百agent并行，互相review</text><path stroke="#d97757" stroke-width="2.5" marker-end="url(#arr)" d="M190 424v36"/><text x="210" y="445" fill="#d97757" font-size="10">确定性运行时</text><text x="210" y="458" fill="#d97757" font-size="10">执行脚本</text><rect width="300" height="36" x="560" y="168" fill="#788c5d" filter="url(#shadow)" rx="8"/><text x="710" y="191" fill="#faf9f5" font-size="14" font-weight="bold" letter-spacing="1" text-anchor="middle">路径二：BUS-FIRST 总线化</text><text x="710" y="204" fill="#e3dacc" font-size="10" text-anchor="middle">iii agent harness (Mike Piccolo)</text><rect width="300" height="110" x="560" y="218" fill="#faf9f5" stroke="#788c5d" stroke-width="2" filter="url(#shadow)" rx="10"/><text x="710" y="240" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">做法：把harness的15种职责</text><text x="710" y="260" fill="#141413" font-size="12" font-weight="bold" text-anchor="middle">拆成独立worker，WebSocket总线连接</text><path stroke="#d1cfc5" d="M610 272h200"/><text x="710" y="288" fill="#87867f" font-size="10" text-anchor="middle">凭证解析、状态机驱动、policy检查、</text><text x="710" y="302" fill="#87867f" font-size="10" text-anchor="middle">skill加载、session持久化…</text><text x="710" y="316" fill="#788c5d" font-size="11" text-anchor="middle">iii.trigger()通信，可独立版本化</text><rect width="300" height="70" x="560" y="342" fill="#e3dacc" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="710" y="362" fill="#141413" font-size="11" font-weight="bold" text-anchor="middle">15种职责拆解</text><text x="710" y="380" fill="#141413" font-size="10" text-anchor="middle">credential解析、model查询、policy检查、</text><text x="710" y="396" fill="#87867f" font-size="10" text-anchor="middle">session持久化、OpenTelemetry trace…</text><path stroke="#788c5d" stroke-width="2.5" marker-end="url(#arr2)" d="M710 424v36"/><text x="730" y="445" fill="#788c5d" font-size="10">确定性协议通信</text><text x="730" y="458" fill="#788c5d" font-size="10">结果可预期</text><rect width="400" height="58" x="250" y="468" fill="#141413" filter="url(#shadow)" rx="14"/><text x="450" y="490" fill="#faf9f5" font-size="14" font-weight="bold" text-anchor="middle">✓ 共同终点：确定性执行</text><text x="450" y="509" fill="#d1cfc5" font-size="11" text-anchor="middle">编排从「实时决策」变成「静态资产」</text><path stroke="#d97757" stroke-width="2" marker-end="url(#arr)" d="M190 468h60"/><path stroke="#788c5d" stroke-width="2" marker-end="url(#arr2)" d="M710 468h-60"/><rect width="180" height="58" x="40" y="468" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="130" y="490" fill="#141413" font-size="10" font-weight="bold" text-anchor="middle">把控制权还给代码</text><text x="130" y="507" fill="#87867f" font-size="10" text-anchor="middle">Workflow = LLM调用的编排</text><text x="130" y="520" fill="#87867f" font-size="10" text-anchor="middle">变成确定性代码</text><rect width="180" height="58" x="680" y="468" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="770" y="490" fill="#141413" font-size="10" font-weight="bold" text-anchor="middle">让每个组件只做一件事</text><text x="770" y="507" fill="#87867f" font-size="10" text-anchor="middle">通过组合而非集成</text><text x="770" y="520" fill="#87867f" font-size="10" text-anchor="middle">实现复杂功能</text><path fill="none" stroke="#d1cfc5" stroke-dasharray="5,4" stroke-width="1.5" d="M355 115q95-20 190 0"/><text x="450" y="100" fill="#87867f" font-size="10" text-anchor="middle">同一问题的两个解法</text></svg>