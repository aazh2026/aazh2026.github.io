<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320" role="img" aria-label="Firefox AI 窗口架构图">
  <title>Firefox 侧边栏 AI 助手架构</title>
  <desc>Firefox 149 侧边栏 AI 助手布局示意图，上方为正常浏览区域，下方左侧为 AI 问答区域。</desc>

  <defs>
    <style>
      .bg        { fill: #FAF9F5; }
      .accent    { fill: #D97757; }
      .text      { fill: #141413; font-family: monospace; }
      .muted     { fill: #87867F; font-family: monospace; }
      .border    { stroke: #D1CFC5; stroke-width: 1.5; fill: none; }
      .border-iv { stroke: #D1CFC5; stroke-width: 1; fill: none; }
      .fill-iv   { fill: #E3DACC; }
      .fill-accent { fill: #D97757; }
      .divider   { stroke: #D97757; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="560" height="320" class="bg"/>

  <!-- === TOP SECTION: 网页内容 === -->
  <!-- Outer border -->
  <rect x="30" y="20" width="500" height="200" rx="4" class="border"/>

  <!-- Label: 网页内容 -->
  <rect x="30" y="20" width="110" height="22" rx="4" class="fill-iv"/>
  <text x="40" y="35" class="text" font-size="11" font-weight="bold">网页内容</text>

  <!-- Inner browsing area -->
  <rect x="55" y="60" width="450" height="140" rx="3" class="border-iv"/>
  <text x="65" y="88" class="muted" font-size="11">┌─────────────────────────────┐</text>
  <text x="65" y="102" class="muted" font-size="11">│                             │</text>
  <text x="65" y="116" class="muted" font-size="11">│    正常浏览区域              │</text>
  <text x="65" y="130" class="muted" font-size="11">│                             │</text>
  <text x="65" y="144" class="muted" font-size="11">│                             │</text>
  <text x="65" y="158" class="muted" font-size="11">│                             │</text>
  <text x="65" y="172" class="muted" font-size="11">└─────────────────────────────┘</text>

  <!-- === DIVIDER === -->
  <line x1="30" y1="235" x2="530" y2="235" class="divider"/>

  <!-- === BOTTOM LEFT: AI 窗口 === -->
  <!-- AI window outer box -->
  <rect x="30" y="235" width="200" height="65" rx="0" class="border" style="stroke:#D97757;"/>
  <!-- Label: AI 窗口（可选） -->
  <rect x="30" y="235" width="120" height="22" rx="4" class="fill-accent" opacity="0.15"/>
  <text x="40" y="250" class="text" font-size="11" font-weight="bold" fill="#D97757">AI 窗口（可选）</text>

  <!-- AI input box -->
  <rect x="50" y="265" width="130" height="26" rx="3" class="border-iv"/>
  <text x="60" y="282" class="muted" font-size="11">问题输入</text>

  <!-- AI response separator -->
  <line x1="50" y1="291" x2="180" y2="291" class="border-iv"/>

  <!-- AI response area -->
  <text x="60" y="295" class="muted" font-size="10">AI 回答</text>
  <text x="60" y="307" class="muted" font-size="10">区域</text>

  <!-- === BOTTOM RIGHT: empty === -->
  <rect x="230" y="235" width="300" height="65" rx="0" class="border" style="stroke:#D1CFC5;" opacity="0.4"/>

  <!-- Corner label -->
  <text x="245" y="273" class="muted" font-size="11" opacity="0.5">← 正常浏览区域继续</text>
</svg>
