<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <title>康威定律 2.0 框架：组织架构到 Agent 拓扑的映射</title>
  <desc>展示三种组织架构（中心化、分布式、分层管理）如何映射到对应的 Agent 拓扑（Supervisor/P2P/Hierarchical）</desc>

  <!-- Background -->
  <rect width="680" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">康威定律 2.0 框架</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">组织架构 → Agent 拓扑 映射</text>

  <!-- Top row label: 组织架构 -->
  <text x="56" y="80" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">组织架构</text>

  <!-- Org node 1: 中心化 -->
  <rect x="100" y="95" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="160" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">中心化决策</text>
  <text x="160" y="132" text-anchor="middle" font-size="10" fill="#87867F">Hub-and-Spoke</text>

  <!-- Org node 2: 分布式 -->
  <rect x="280" y="95" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="340" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">分布式自治</text>
  <text x="340" y="132" text-anchor="middle" font-size="10" fill="#87867F">P2P / Mesh</text>

  <!-- Org node 3: 分层管理 -->
  <rect x="460" y="95" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="520" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">分层管理</text>
  <text x="520" y="132" text-anchor="middle" font-size="10" fill="#87867F">Hierarchical</text>

  <!-- Arrow: 康威定律 -->
  <line x1="40" y1="119" x2="70" y2="119" stroke="#D97757" stroke-width="2"/>
  <polygon points="70,115 62,119 70,123" fill="#D97757"/>
  <text x="20" y="108" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" text-anchor="middle">康威定律</text>
  <text x="20" y="130" font-size="9" fill="#D97757" font-family="ui-monospace, monospace" text-anchor="middle">2.0</text>

  <!-- Downward mapping arrows from top to bottom row -->
  <!-- Arrow 1 -->
  <line x1="160" y1="143" x2="160" y2="163" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="160,167 156,159 164,159" fill="#D1CFC5"/>
  <text x="160" y="158" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace" text-anchor="middle">映射</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="143" x2="340" y2="163" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="340,167 336,159 344,159" fill="#D1CFC5"/>
  <text x="340" y="158" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace" text-anchor="middle">映射</text>

  <!-- Arrow 3 -->
  <line x1="520" y1="143" x2="520" y2="163" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="520,167 516,159 524,159" fill="#D1CFC5"/>
  <text x="520" y="158" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace" text-anchor="middle">映射</text>

  <!-- Middle label: AI-Native 映射 -->
  <text x="340" y="182" text-anchor="middle" font-size="10" fill="#788C5D" font-family="ui-monospace, monospace">↓ AI-Native 映射 ↓</text>

  <!-- Bottom row label: Agent 拓扑 -->
  <text x="56" y="215" font-size="11" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Agent 拓扑</text>

  <!-- Agent node 1: Supervisor -->
  <rect x="100" y="228" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="160" y="249" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">Supervisor</text>
  <text x="160" y="265" text-anchor="middle" font-size="10" fill="#87867F">中心协调型</text>
  <!-- Hub icon: center dot + spokes -->
  <circle cx="160" cy="257" r="5" fill="#D97757"/>
  <line x1="160" y1="252" x2="160" y2="245" stroke="#D97757" stroke-width="1.5"/>
  <line x1="155" y1="259" x2="148" y2="262" stroke="#D97757" stroke-width="1.5"/>
  <line x1="165" y1="259" x2="172" y2="262" stroke="#D97757" stroke-width="1.5"/>

  <!-- Agent node 2: P2P Mesh -->
  <rect x="280" y="228" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="340" y="249" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">P2P / Mesh</text>
  <text x="340" y="265" text-anchor="middle" font-size="10" fill="#87867F">对等协作型</text>
  <!-- P2P icon: three dots connected -->
  <circle cx="320" cy="255" r="4" fill="#788C5D"/>
  <circle cx="340" cy="247" r="4" fill="#788C5D"/>
  <circle cx="360" cy="255" r="4" fill="#788C5D"/>
  <line x1="323" y1="253" x2="337" y2="249" stroke="#788C5D" stroke-width="1.5"/>
  <line x1="343" y1="249" x2="357" y2="253" stroke="#788C5D" stroke-width="1.5"/>
  <line x1="323" y1="257" x2="357" y2="257" stroke="#788C5D" stroke-width="1.5"/>

  <!-- Agent node 3: Hierarchical -->
  <rect x="460" y="228" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <text x="520" y="249" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">Hierarchical</text>
  <text x="520" y="265" text-anchor="middle" font-size="10" fill="#87867F">分层授权型</text>
  <!-- Hierarchy icon: stacked boxes -->
  <rect x="506" y="245" width="28" height="12" rx="2" fill="#788C5D"/>
  <rect x="506" y="259" width="28" height="12" rx="2" fill="#D1CFC5" stroke="#788C5D" stroke-width="1"/>
  <rect x="506" y="273" width="28" height="12" rx="2" fill="#D1CFC5" stroke="#788C5D" stroke-width="1"/>

  <!-- Key insight box -->
  <rect x="40" y="295" width="600" height="48" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="60" y="315" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">💡 核心洞察</text>
  <text x="160" y="315" font-size="11" fill="#141413">你的 Agent 系统，就是你的组织架构在数字世界的投影。</text>
  <text x="60" y="333" font-size="10" fill="#87867F">组织结构 → 沟通结构 → 软件架构 / Agent 拓扑</text>

  <!-- Attribution -->
  <text x="340" y="355" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">康威定律 2.0 · 2026/03/15</text>
</svg>
