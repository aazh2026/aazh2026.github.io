<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Intent Complexity 五大维度 -->
  <rect width="560" height="220" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="18" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">Intent Complexity 评估维度</text>
  <text x="280" y="34" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/04/16</text>

  <!-- Center label -->
  <circle cx="280" cy="122" r="28" fill="#F0EEE6" stroke="#D97757" stroke-width="1.5"/>
  <text x="280" y="118" text-anchor="middle" font-size="10" fill="#D97757" font-weight="600" font-family="ui-monospace, monospace">Intent</text>
  <text x="280" y="130" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">Complexity</text>

  <!-- D1: top -->
  <rect x="170" y="30" width="220" height="44" rx="8" fill="#FEF3C7" stroke="#D97757" stroke-width="1.5"/>
  <text x="190" y="50" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">D1</text>
  <text x="210" y="50" font-size="11" fill="#141413" font-weight="600">业务规则复杂度</text>
  <text x="190" y="65" font-size="9.5" fill="#87867F">规则数量、依赖、冲突检测</text>
  <line x1="280" y1="74" x2="280" y2="88" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="276,74 280,68 284,74" fill="#D97757"/>

  <!-- D2: top-right -->
  <rect x="320" y="80" width="200" height="44" rx="8" fill="#FED7AA" stroke="#EA580C" stroke-width="1.5"/>
  <text x="340" y="100" font-size="10" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">D2</text>
  <text x="360" y="100" font-size="11" fill="#141413" font-weight="600">场景覆盖度</text>
  <text x="340" y="115" font-size="9.5" fill="#87867F">正常·边界·异常场景</text>
  <line x1="320" y1="106" x2="308" y2="106" stroke="#EA580C" stroke-width="1.5"/>
  <polygon points="308,102 302,106 308,110" fill="#EA580C"/>

  <!-- D3: bottom-right -->
  <rect x="320" y="150" width="200" height="44" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="340" y="170" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">D3</text>
  <text x="360" y="170" font-size="11" fill="#141413" font-weight="600">约束条件</text>
  <text x="340" y="185" font-size="9.5" fill="#87867F">性能·安全·合规约束</text>
  <line x1="320" y1="160" x2="308" y2="138" stroke="#2563EB" stroke-width="1.5"/>
  <polygon points="308,138 302,140 306,146" fill="#2563EB"/>

  <!-- D4: bottom-left -->
  <rect x="40" y="150" width="200" height="44" rx="8" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="170" font-size="10" fill="#3B82F6" font-family="ui-monospace, monospace" font-weight="600">D4</text>
  <text x="80" y="170" font-size="11" fill="#141413" font-weight="600">跨系统集成</text>
  <text x="60" y="185" font-size="9.5" fill="#87867F">外部依赖、数据流、接口契约</text>
  <line x1="240" y1="160" x2="252" y2="138" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="252,138 258,140 254,146" fill="#3B82F6"/>

  <!-- D5: top-left -->
  <rect x="40" y="80" width="200" height="44" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="100" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">D5</text>
  <text x="80" y="100" font-size="11" fill="#141413" font-weight="600">演化适应性</text>
  <text x="60" y="115" font-size="9.5" fill="#87867F">扩展性、可修改性、技术债务</text>
  <line x1="240" y1="106" x2="252" y2="106" stroke="#059669" stroke-width="1.5"/>
  <polygon points="252,102 258,106 252,110" fill="#059669"/>
</svg>