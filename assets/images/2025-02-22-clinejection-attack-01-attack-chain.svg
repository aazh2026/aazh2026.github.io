<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-family: system-ui, sans-serif; }
      .text-sub { fill: #87867F; font-family: system-ui, sans-serif; }
      .text-accent { fill: #D97757; font-family: system-ui, sans-serif; font-weight: 600; }
      .border { stroke: #D1CFC5; stroke-width: 1.5; fill: none; }
      .step-box { fill: #FAF9F5; stroke: #D1CFC5; stroke-width: 1.5; }
      .step-box-danger { fill: #FEF3F0; stroke: #D97757; stroke-width: 1.5; }
      .arrow { stroke: #87867F; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .attack-fill { fill: #D97757; }
      .label-bg { fill: #E3DACC; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" class="bg"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" class="text-main" font-size="17" font-weight="700">Clinejection 攻击链：五步沦陷</text>
  <text x="450" y="60" text-anchor="middle" class="text-sub" font-size="12">Attack Flow — from GitHub Issue to Production Compromise</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <g transform="translate(30, 85)">
    <rect width="145" height="130" rx="8" class="step-box"/>
    <rect x="0" y="0" width="145" height="28" rx="8" fill="#D97757"/>
    <rect x="0" y="14" width="145" height="14" fill="#D97757"/>
    <text x="72" y="19" text-anchor="middle" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">STEP 1</text>
    <text x="72" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600">侦察与目标选择</text>
    <text x="72" y="80" text-anchor="middle" class="text-sub" font-size="11">搜索配置了AI Issue</text>
    <text x="72" y="95" text-anchor="middle" class="text-sub" font-size="11">Triage的公开仓库</text>
    <text x="72" y="115" text-anchor="middle" class="text-accent" font-size="10">allowedTools: "Bash,Read,Write"</text>
  </g>

  <!-- Arrow 1-2 -->
  <line x1="175" y1="150" x2="210" y2="150" class="arrow"/>

  <!-- Step 2 -->
  <g transform="translate(220, 85)">
    <rect width="145" height="130" rx="8" class="step-box-danger"/>
    <rect x="0" y="0" width="145" height="28" rx="8" fill="#D97757"/>
    <rect x="0" y="14" width="145" height="14" fill="#D97757"/>
    <text x="72" y="19" text-anchor="middle" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">STEP 2</text>
    <text x="72" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600">构造恶意Payload</text>
    <text x="72" y="80" text-anchor="middle" class="text-sub" font-size="11">Disregard all previous</text>
    <text x="72" y="95" text-anchor="middle" class="text-sub" font-size="11">instructions + bash cmd</text>
    <text x="72" y="115" text-anchor="middle" class="text-accent" font-size="10">Prompt Injection</text>
  </g>

  <!-- Arrow 2-3 -->
  <line x1="365" y1="150" x2="400" y2="150" class="arrow"/>

  <!-- Step 3 -->
  <g transform="translate(410, 85)">
    <rect width="145" height="130" rx="8" class="step-box-danger"/>
    <rect x="0" y="0" width="145" height="28" rx="8" fill="#D97757"/>
    <rect x="0" y="14" width="145" height="14" fill="#D97757"/>
    <text x="72" y="19" text-anchor="middle" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">STEP 3</text>
    <text x="72" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600">触发AI执行</text>
    <text x="72" y="80" text-anchor="middle" class="text-sub" font-size="11">攻击者提交Issue</text>
    <text x="72" y="95" text-anchor="middle" class="text-sub" font-size="11">→ GitHub Actions触发</text>
    <text x="72" y="115" text-anchor="middle" class="text-accent" font-size="10">AI无法区分指令与数据</text>
  </g>

  <!-- Arrow 3-4 -->
  <line x1="555" y1="150" x2="590" y2="150" class="arrow"/>

  <!-- Step 4 -->
  <g transform="translate(600, 85)">
    <rect width="145" height="130" rx="8" class="step-box-danger"/>
    <rect x="0" y="0" width="145" height="28" rx="8" fill="#D97757"/>
    <rect x="0" y="14" width="145" height="14" fill="#D97757"/>
    <text x="72" y="19" text-anchor="middle" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">STEP 4</text>
    <text x="72" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600">权限升级与持久化</text>
    <text x="72" y="80" text-anchor="middle" class="text-sub" font-size="11">创建恶意workflow</text>
    <text x="72" y="95" text-anchor="middle" class="text-sub" font-size="11">每次push自动触发</text>
    <text x="72" y="115" text-anchor="middle" class="text-accent" font-size="10">数据外泄 + 后门植入</text>
  </g>

  <!-- Arrow 4-5 -->
  <line x1="745" y1="150" x2="780" y2="150" class="arrow"/>

  <!-- Step 5 -->
  <g transform="translate(790, 85)">
    <rect width="90" height="130" rx="8" class="step-box-danger"/>
    <rect x="0" y="0" width="90" height="28" rx="8" fill="#141413"/>
    <rect x="0" y="14" width="90" height="14" fill="#141413"/>
    <text x="45" y="19" text-anchor="middle" fill="#FAF9F5" font-size="12" font-weight="700" font-family="system-ui, sans-serif">STEP 5</text>
    <text x="45" y="58" text-anchor="middle" class="text-main" font-size="13" font-weight="600">生产环境沦陷</text>
    <text x="45" y="80" text-anchor="middle" class="text-sub" font-size="11">恶意release</text>
    <text x="45" y="95" text-anchor="middle" class="text-sub" font-size="11">发布到下游</text>
    <text x="45" y="115" text-anchor="middle" class="text-accent" font-size="10">供应链污染</text>
  </g>

  <!-- Key vulnerability callout box -->
  <g transform="translate(30, 240)">
    <rect width="840" height="90" rx="8" fill="#FEF3F0" stroke="#D97757" stroke-width="1.5"/>
    <text x="20" y="26" class="text-accent" font-size="13" font-weight="700">⚠ 核心漏洞：最小权限原则严重违反</text>
    <text x="20" y="48" class="text-sub" font-size="12">实际需求：阅读Issue → 分类标签</text>
    <text x="20" y="66" class="text-sub" font-size="12">实际配置：Bash(任意命令) + Read(任意文件) + Write(任意修改)</text>
    <text x="20" y="84" class="text-main" font-size="12">根本问题：LLM无法严格区分"系统指令"和"用户输入"——这是命令注入的AI时代版本</text>
  </g>

  <!-- Defense section label -->
  <text x="30" y="358" class="text-main" font-size="14" font-weight="700">防御方案</text>
  <line x1="30" y1="365" x2="870" y2="365" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Defense boxes row 1 -->
  <!-- Defense 1 -->
  <g transform="translate(30, 380)">
    <rect width="195" height="85" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <rect x="0" y="0" width="195" height="22" rx="6" fill="#788C5D"/>
    <rect x="0" y="14" width="195" height="8" fill="#788C5D"/>
    <text x="97" y="15" text-anchor="middle" fill="#FAF9F5" font-size="11" font-weight="700" font-family="system-ui, sans-serif">① 输入验证与清理</text>
    <text x="10" y="42" class="text-sub" font-size="10">• 禁止危险关键词</text>
    <text x="10" y="56" class="text-sub" font-size="10">• 长度限制</text>
    <text x="10" y="70" class="text-sub" font-size="10">• 格式验证</text>
  </g>

  <!-- Defense 2 -->
  <g transform="translate(240, 380)">
    <rect width="195" height="85" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <rect x="0" y="0" width="195" height="22" rx="6" fill="#788C5D"/>
    <rect x="0" y="14" width="195" height="8" fill="#788C5D"/>
    <text x="97" y="15" text-anchor="middle" fill="#FAF9F5" font-size="11" font-weight="700" font-family="system-ui, sans-serif">② 最小权限原则</text>
    <text x="10" y="42" class="text-sub" font-size="10">• allowedTools: ""</text>
    <text x="10" y="56" class="text-sub" font-size="10">• 仅允许Read，禁止Write</text>
    <text x="10" y="70" class="text-sub" font-size="10">• 功能拆分隔离</text>
  </g>

  <!-- Defense 3 -->
  <g transform="translate(450, 380)">
    <rect width="195" height="85" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <rect x="0" y="0" width="195" height="22" rx="6" fill="#788C5D"/>
    <rect x="0" y="14" width="195" height="8" fill="#788C5D"/>
    <text x="97" y="15" text-anchor="middle" fill="#FAF9F5" font-size="11" font-weight="700" font-family="system-ui, sans-serif">③ 沙箱隔离</text>
    <text x="10" y="42" class="text-sub" font-size="10">• 只读文件系统</text>
    <text x="10" y="56" class="text-sub" font-size="10">• 禁止网络访问</text>
    <text x="10" y="70" class="text-sub" font-size="10">• 无特权模式容器</text>
  </g>

  <!-- Defense 4 -->
  <g transform="translate(660, 380)">
    <rect width="210" height="85" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <rect x="0" y="0" width="210" height="22" rx="6" fill="#788C5D"/>
    <rect x="0" y="14" width="210" height="8" fill="#788C5D"/>
    <text x="105" y="15" text-anchor="middle" fill="#FAF9F5" font-size="11" font-weight="700" font-family="system-ui, sans-serif">④ 人机协作审核</text>
    <text x="10" y="42" class="text-sub" font-size="10">• 写操作必须人工确认</text>
    <text x="10" y="56" class="text-sub" font-size="10">• 异常行为触发告警</text>
    <text x="10" y="70" class="text-sub" font-size="10">• 建立AI决策边界</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="500" text-anchor="middle" class="text-sub" font-size="11">攻击成本 ≈ 零 | 自动化放大风险 | 权限模型致命缺陷 | Prompt Injection普遍威胁</text>
  <text x="450" y="520" text-anchor="middle" class="text-accent" font-size="11" font-weight="600">安全范式转移：从"代码安全"到"Prompt安全"</text>

  <!-- Footer line -->
  <line x1="30" y1="535" x2="870" y2="535" stroke="#D1CFC5" stroke-width="1"/>
  <text x="450" y="550" text-anchor="middle" class="text-sub" font-size="10">Clinejection Attack Analysis | @postcodeeng</text>
</svg>
