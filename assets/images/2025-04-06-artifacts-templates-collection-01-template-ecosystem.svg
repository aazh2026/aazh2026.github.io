<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="AI-Native SDLC 交付件生态系统">
  <title>AI-Native SDLC 交付件模板生态</title>
  <desc>展示8种交付件模板之间的关系、依赖与整体架构，以及与CI/CD和追溯矩阵的集成</desc>

  <defs>
    <filter id="sf3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
    <marker id="biArr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#D1CFC5"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="30" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#141413">AI-Native SDLC 交付件模板生态</text>
  <text x="30" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">从产品意图到运维手册的完整交付链路 · 模板间存在依赖关系</text>

  <!-- Center: Traceability Matrix -->
  <g filter="url(#sf3)">
    <ellipse cx="450" cy="240" rx="200" ry="150" fill="none" stroke="#E3DACC" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="450" y="230" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#141413" text-anchor="middle">追溯矩阵</text>
    <text x="450" y="248" font-family="system-ui,sans-serif" font-size="10" fill="#87867F" text-anchor="middle">Traceability Matrix</text>
    <text x="450" y="265" font-family="system-ui,sans-serif" font-size="9" fill="#87867F" text-anchor="middle">需求 ↔ 代码 ↔ 测试 ↔ 部署</text>
  </g>

  <!-- PI: Product Intent - top left -->
  <g filter="url(#sf3)">
    <rect x="50" y="60" width="160" height="72" rx="8" fill="#788C5D"/>
    <text x="130" y="85" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Product Intent</text>
    <text x="130" y="102" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle" opacity="0.85">产品意图定义</text>
    <text x="130" y="118" font-family="system-ui,sans-serif" font-size="8" fill="#FAF9F5" text-anchor="middle" opacity="0.7">PI-{id}</text>
  </g>

  <!-- US: User Story Pack - top center -->
  <g filter="url(#sf3)">
    <rect x="370" y="50" width="160" height="72" rx="8" fill="#D97757"/>
    <text x="450" y="75" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">User Story Pack</text>
    <text x="450" y="92" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle" opacity="0.85">用户故事包</text>
    <text x="450" y="108" font-family="system-ui,sans-serif" font-size="8" fill="#FAF9F5" text-anchor="middle" opacity="0.7">USP-{id}</text>
  </g>

  <!-- Arch: Architecture Spec - top right -->
  <g filter="url(#sf3)">
    <rect x="690" y="60" width="160" height="72" rx="8" fill="#141413"/>
    <text x="770" y="85" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Architecture Spec</text>
    <text x="770" y="102" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle" opacity="0.85">架构规范</text>
    <text x="770" y="118" font-family="system-ui,sans-serif" font-size="8" fill="#FAF9F5" text-anchor="middle" opacity="0.7">ARCH-{id}</text>
  </g>

  <!-- EP: Execution Plan - middle left -->
  <g filter="url(#sf3)">
    <rect x="50" y="220" width="160" height="72" rx="8" fill="#87867F"/>
    <text x="130" y="245" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Execution Plan</text>
    <text x="130" y="262" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5" text-anchor="middle" opacity="0.85">执行计划</text>
    <text x="130" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#FAF9F5" text-anchor="middle" opacity="0.7">EP-{id}</text>
  </g>

  <!-- QC: Quality Contract - middle right -->
  <g filter="url(#sf3)">
    <rect x="690" y="220" width="160" height="72" rx="8" fill="#D1CFC5"/>
    <text x="770" y="245" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">Quality Contract</text>
    <text x="770" y="262" font-family="system-ui,sans-serif" font-size="9" fill="#141413" text-anchor="middle" opacity="0.85">质量契约</text>
    <text x="770" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#141413" text-anchor="middle" opacity="0.7">QC-{id}</text>
  </g>

  <!-- OR: Operations Runbook - bottom -->
  <g filter="url(#sf3)">
    <rect x="370" y="340" width="160" height="72" rx="8" fill="#E3DACC"/>
    <text x="450" y="365" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#141413" text-anchor="middle">Operations Runbook</text>
    <text x="450" y="382" font-family="system-ui,sans-serif" font-size="9" fill="#141413" text-anchor="middle" opacity="0.85">运维手册</text>
    <text x="450" y="398" font-family="system-ui,sans-serif" font-size="8" fill="#141413" text-anchor="middle" opacity="0.7">ORB-{id}</text>
  </g>

  <!-- Connection lines from templates to center -->
  <!-- PI to center -->
  <path d="M210 96 L300 160" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#biArr)"/>
  <!-- US to center -->
  <line x1="450" y1="122" x2="450" y2="180" stroke="#D1CFC5" stroke-width="1.5" marker-end="url(#biArr)"/>
  <!-- Arch to center -->
  <path d="M690 96 L600 160" stroke="#D1CFC5" stroke-width="1.5" fill="none" marker-end="url(#biArr)"/>
  <!-- EP to center -->
  <line x1="210" y1="256" x2="320" y2="256" stroke="#D1CFC5" stroke-width="1.5" marker-end="url(#biArr)"/>
  <!-- QC to center -->
  <line x1="690" y1="256" x2="580" y2="256" stroke="#D1CFC5" stroke-width="1.5" marker-end="url(#biArr)"/>
  <!-- OR to center -->
  <line x1="450" y1="340" x2="450" y2="300" stroke="#D1CFC5" stroke-width="1.5" marker-end="url(#biArr)"/>

  <!-- Dependency labels -->
  <text x="250" y="125" font-family="system-ui,sans-serif" font-size="7" fill="#87867F">定义目标</text>
  <text x="470" y="150" font-family="system-ui,sans-serif" font-size="7" fill="#87867F">细化需求</text>
  <text x="630" y="125" font-family="system-ui,sans-serif" font-size="7" fill="#87867F">技术约束</text>
  <text x="265" y="248" font-family="system-ui,sans-serif" font-size="7" fill="#87867F">执行计划</text>
  <text x="605" y="248" font-family="system-ui,sans-serif" font-size="7" fill="#87867F">验证质量</text>
  <text x="470" y="320" font-family="system-ui,sans-serif" font-size="7" fill="#87867F">运维保障</text>

  <!-- CI/CD Integration bottom left -->
  <g filter="url(#sf3)">
    <rect x="30" y="420" width="200" height="45" rx="6" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
    <text x="45" y="440" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#788C5D">CI/CD 集成</text>
    <text x="45" y="456" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">自动验证 · Schema 检查 · 覆盖率报告</text>
  </g>

  <!-- AI Tool Integration bottom right -->
  <g filter="url(#sf3)">
    <rect x="670" y="420" width="200" height="45" rx="6" fill="#FAF9F5" stroke="#D97757" stroke-width="1.5"/>
    <text x="685" y="440" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#D97757">AI 辅助编写</text>
    <text x="685" y="456" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">Cursor Rules · 自动补全 · 验证检查</text>
  </g>

  <!-- Legend -->
  <g transform="translate(260, 420)">
    <rect width="10" height="10" rx="2" fill="#788C5D"/>
    <text x="16" y="10" font-family="system-ui,sans-serif" font-size="8" fill="#87867F">业务层</text>
    <rect x="70" width="10" height="10" rx="2" fill="#D97757"/>
    <text x="86" y="10" font-family="system-ui,sans-serif" font-size="8" fill="#87867F">需求层</text>
    <rect x="135" width="10" height="10" rx="2" fill="#141413"/>
    <text x="151" y="10" font-family="system-ui,sans-serif" font-size="8" fill="#87867F">架构层</text>
    <rect x="205" width="10" height="10" rx="2" fill="#87867F"/>
    <text x="221" y="10" font-family="system-ui,sans-serif" font-size="8" fill="#87867F">执行层</text>
    <rect x="275" width="10" height="10" rx="2" fill="#D1CFC5"/>
    <text x="291" y="10" font-family="system-ui,sans-serif" font-size="8" fill="#87867F">质量层</text>
    <rect x="345" width="10" height="10" rx="2" fill="#E3DACC"/>
    <text x="361" y="10" font-family="system-ui,sans-serif" font-size="8" fill="#87867F">运维层</text>
  </g>
</svg>
