<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 360">
  <title>Context Layer工作流程</title>
  <desc>
    水平流程图展示6个步骤：AI请求 → 上下文分析 → 并行获取 → 整合缓存 → 注入Prompt → 生成代码
  </desc>
  <path fill="#faf9f5" d="M0 0h680v360H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Context Layer 工作流程</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">六阶段上下文获取与注入</text>
  <rect width="85" height="85" x="20" y="80" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <circle cx="62" cy="108" r="14" fill="#d97757"/>
  <text x="62" y="113" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">1</text>
  <text x="62" y="136" fill="#141413" font-size="10" text-anchor="middle">AI</text>
  <text x="62" y="150" fill="#141413" font-size="10" text-anchor="middle">Request</text>
  <text x="62" y="162" fill="#87867f" font-size="8" text-anchor="middle">发起请求</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M105 122h20"/>
  <path fill="#d1cfc5" d="m125 117 10 5-10 5z"/>
  <rect width="85" height="85" x="135" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <circle cx="177" cy="108" r="14" fill="#d97757"/>
  <text x="177" y="113" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">2</text>
  <text x="177" y="136" fill="#141413" font-size="10" text-anchor="middle">Context</text>
  <text x="177" y="150" fill="#141413" font-size="10" text-anchor="middle">Analysis</text>
  <text x="177" y="162" fill="#87867f" font-size="8" text-anchor="middle">分析需求</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M220 122h20"/>
  <path fill="#d1cfc5" d="m240 117 10 5-10 5z"/>
  <rect width="85" height="85" x="250" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <circle cx="292" cy="108" r="14" fill="#d97757"/>
  <text x="292" y="113" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">3</text>
  <text x="292" y="136" fill="#141413" font-size="10" text-anchor="middle">Parallel</text>
  <text x="292" y="150" fill="#141413" font-size="10" text-anchor="middle">Fetch</text>
  <text x="292" y="162" fill="#87867f" font-size="8" text-anchor="middle">并行获取</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M335 122h20"/>
  <path fill="#d1cfc5" d="m355 117 10 5-10 5z"/>
  <rect width="85" height="85" x="365" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <circle cx="407" cy="108" r="14" fill="#d97757"/>
  <text x="407" y="113" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">4</text>
  <text x="407" y="136" fill="#141413" font-size="10" text-anchor="middle">Integration</text>
  <text x="407" y="150" fill="#141413" font-size="10" text-anchor="middle">&amp; Cache</text>
  <text x="407" y="162" fill="#87867f" font-size="8" text-anchor="middle">整合缓存</text>
  <path stroke="#788c5d" stroke-width="2" d="M450 122h20"/>
  <path fill="#788c5d" d="m470 117 10 5-10 5z"/>
  <rect width="85" height="85" x="480" y="80" fill="#fff" stroke="#788c5d" stroke-width="2" rx="8"/>
  <circle cx="522" cy="108" r="14" fill="#788c5d"/>
  <text x="522" y="113" fill="#fff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">5</text>
  <text x="522" y="136" fill="#141413" font-size="10" text-anchor="middle">Inject to</text>
  <text x="522" y="150" fill="#141413" font-size="10" text-anchor="middle">Prompt</text>
  <text x="522" y="162" fill="#87867f" font-size="8" text-anchor="middle">注入Prompt</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M565 122h20"/>
  <path fill="#d1cfc5" d="m585 117 10 5-10 5z"/>
  <rect width="65" height="85" x="595" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.8" rx="8"/>
  <circle cx="627" cy="108" r="14" fill="#d97757"/>
