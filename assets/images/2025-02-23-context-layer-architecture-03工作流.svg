  <text x="627" y="136" fill="#141413" font-size="10" text-anchor="middle">Generate</text>
  <text x="627" y="150" fill="#141413" font-size="10" text-anchor="middle">Code</text>
  <text x="627" y="162" fill="#87867f" font-size="8" text-anchor="middle">生成代码</text>
  <rect width="640" height="130" x="20" y="195" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <text x="40" y="218" fill="#141413" font-size="10" font-weight="500">数据源</text>
  <rect width="70" height="22" x="40" y="226" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="75" y="241" fill="#141413" font-size="9" text-anchor="middle">GitHub</text>
  <rect width="70" height="22" x="116" y="226" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="151" y="241" fill="#141413" font-size="9" text-anchor="middle">Confluence</text>
  <rect width="70" height="22" x="192" y="226" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="227" y="241" fill="#141413" font-size="9" text-anchor="middle">ADR</text>
  <rect width="70" height="22" x="268" y="226" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="303" y="241" fill="#141413" font-size="9" text-anchor="middle">Notion</text>
  <rect width="70" height="22" x="344" y="226" fill="#f0eee6" stroke="#d1cfc5" rx="4"/>
  <text x="379" y="241" fill="#141413" font-size="9" text-anchor="middle">Slack</text>
  <text x="40" y="272" fill="#141413" font-size="10" font-weight="500">缓存策略</text>
  <rect width="100" height="28" x="40" y="280" fill="#fff" stroke="#788c5d" stroke-width="1.2" rx="4"/>
  <text x="90" y="294" fill="#141413" font-size="9" text-anchor="middle">TTL 短期缓存</text>
  <text x="90" y="304" fill="#87867f" font-size="8" text-anchor="middle">技术栈/架构决策</text>
  <rect width="100" height="28" x="150" y="280" fill="#fff" stroke="#d97757" stroke-width="1.2" rx="4"/>
  <text x="200" y="294" fill="#141413" font-size="9" text-anchor="middle">长期缓存</text>
  <text x="200" y="304" fill="#87867f" font-size="8" text-anchor="middle">领域模型/术语表</text>
  <rect width="100" height="28" x="260" y="280" fill="#fff" stroke="#d1cfc5" stroke-width="1.2" rx="4"/>
  <text x="310" y="294" fill="#141413" font-size="9" text-anchor="middle">不缓存</text>
  <text x="310" y="304" fill="#87867f" font-size="8" text-anchor="middle">项目状态/成员</text>
  <text x="420" y="218" fill="#141413" font-size="10" font-weight="500">图例</text>
  <rect width="10" height="10" x="420" y="226" fill="#d97757" rx="2"/>
  <text x="436" y="235" fill="#87867f" font-size="9">步骤编号</text>
  <rect width="10" height="10" x="420" y="244" fill="#788c5d" rx="2"/>
  <text x="436" y="253" fill="#87867f" font-size="9">关键转换</text>
  <rect width="10" height="10" x="420" y="262" fill="#d1cfc5" rx="2"/>
  <text x="436" y="271" fill="#87867f" font-size="9">数据/连接</text>
</svg>
