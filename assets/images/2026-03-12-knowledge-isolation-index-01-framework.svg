<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>知识孤岛形成双路径</title>
  <desc>知识孤岛指数 (KII) 双路径对比图：AI生成代码导致知识孤岛路径（高KII）vs 知识共享路径（低KII）</desc>

  <rect width="720" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#141413">知识孤岛形成双路径</text>
  <text x="360" y="46" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">知识孤岛指数 (KII) · 2026/03/12</text>

  <!-- Left: start node -->
  <rect x="30" y="160" width="100" height="60" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="80" y="183" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">AI-Generated</text>
  <text x="80" y="200" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">Code</text>

  <!-- Divider arrow from start -->
  <line x1="130" y1="190" x2="170" y2="190" stroke="#D1CFC5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Path labels above/below -->
  <text x="360" y="105" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">知识孤岛路径（高 KII）</text>
  <text x="360" y="300" text-anchor="middle" font-size="11" fill="#788C5D" font-weight="600">集体理解路径（低 KII）</text>

  <!-- Top path: clay (isolation) -->
  <!-- Intermediate nodes top -->
  <rect x="185" y="130" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="240" y="155" text-anchor="middle" font-size="11" fill="#141413">代码复杂度</text>

  <rect x="315" y="130" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="370" y="155" text-anchor="middle" font-size="11" fill="#141413">个人化Prompt</text>

  <rect x="445" y="130" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="500" y="155" text-anchor="middle" font-size="11" fill="#141413">审查 Gap</text>

  <!-- Arrows top path -->
  <line x1="170" y1="151" x2="183" y2="151" stroke="#D97757" stroke-width="1.2" marker-end="url(#arrowClay)"/>
  <line x1="295" y1="151" x2="313" y2="151" stroke="#D97757" stroke-width="1.2" marker-end="url(#arrowClay)"/>
  <line x1="425" y1="151" x2="443" y2="151" stroke="#D97757" stroke-width="1.2" marker-end="url(#arrowClay)"/>

  <!-- Connector to end node top -->
  <line x1="555" y1="151" x2="590" y2="170" stroke="#D97757" stroke-width="1.2"/>
  <line x1="590" y1="170" x2="590" y2="240" stroke="#D97757" stroke-width="1.2" marker-end="url(#arrowClay)"/>

  <!-- Bottom path: olive (understanding) -->
  <!-- Intermediate nodes bottom -->
  <rect x="185" y="230" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="240" y="255" text-anchor="middle" font-size="11" fill="#141413">文档化</text>

  <rect x="315" y="230" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="370" y="255" text-anchor="middle" font-size="11" fill="#141413">共享Prompt</text>

  <rect x="445" y="230" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="500" y="255" text-anchor="middle" font-size="11" fill="#141413">团队审查</text>

  <!-- Arrows bottom path -->
  <line x1="170" y1="251" x2="183" y2="251" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>
  <line x1="295" y1="251" x2="313" y2="251" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>
  <line x1="425" y1="251" x2="443" y2="251" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>

  <!-- Connector to end node bottom -->
  <line x1="555" y1="251" x2="590" y2="232" stroke="#788C5D" stroke-width="1.2"/>
  <line x1="590" y1="232" x2="590" y2="170" stroke="#788C5D" stroke-width="1.2" marker-end="url(#arrowOlive)"/>

  <!-- Right: end node (shared for visual convergence) -->
  <rect x="590" y="170" width="100" height="70" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="640" y="196" text-anchor="middle" font-size="11" fill="#141413" font-weight="600">End State</text>
  <text x="640" y="213" text-anchor="middle" font-size="10" fill="#D97757">KII: High</text>
  <text x="640" y="228" text-anchor="middle" font-size="10" fill="#87867F">or</text>
  <text x="640" y="243" text-anchor="middle" font-size="10" fill="#788C5D">KII: Low</text>

  <!-- Legend -->
  <rect x="30" y="340" width="14" height="14" rx="3" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="50" y="352" font-size="10" fill="#141413">高KII路径（clay）</text>

  <rect x="165" y="340" width="14" height="14" rx="3" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.5"/>
  <text x="185" y="352" font-size="10" fill="#141413">低KII路径（olive）</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#D1CFC5"/>
    </marker>
    <marker id="arrowClay" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#D97757"/>
    </marker>
    <marker id="arrowOlive" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#788C5D"/>
    </marker>
  </defs>
</svg>