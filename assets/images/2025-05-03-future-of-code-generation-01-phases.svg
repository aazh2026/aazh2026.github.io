<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360"><title>代码生成三阶段演进</title><desc>从AI辅助到AI协作到AI主导的演进路径</desc><defs><marker id="arrow3" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#87867f" d="m0 0 8 3-8 3z"/></marker><style>.text-main{fill:#141413}.text-accent,.text-main,.text-olive,.text-secondary{font-family:system-ui,sans-serif}.text-secondary{fill:#87867f}.text-accent{fill:#d97757}.text-olive{fill:#788c5d}.border{stroke:#d1cfc5;stroke-width:1;fill:none}</style></defs><path d="M0 0h800v360H0z" style="fill:#faf9f5"/><text x="400" y="30" class="text-main" font-size="18" font-weight="600" text-anchor="middle">代码生成的三次范式转移</text><g transform="translate(50 60)"><rect width="210" height="260" rx="8" style="fill:#e3dacc"/><rect width="210" height="260" class="border" rx="8"/><text x="105" y="25" class="text-accent" font-size="14" font-weight="600" text-anchor="middle">Phase 1</text><text x="105" y="45" class="text-main" font-size="13" text-anchor="middle">AI辅助时代</text><text x="105" y="62" class="text-secondary" font-size="10" text-anchor="middle">(现在)</text><path stroke="#d1cfc5" d="M20 75h170"/><g transform="translate(105 100)"><circle cx="-30" cy="-15" r="20" fill="#d97757" opacity=".2"/><text x="-30" y="-11" class="text-accent" font-size="9" text-anchor="middle">人类</text><text x="-30" y="2" class="text-secondary" font-size="7" text-anchor="middle">主导者</text><circle cx="30" cy="-15" r="20" fill="#788c5d" opacity=".2"/><text x="30" y="-11" class="text-olive" font-size="9" text-anchor="middle">AI</text><text x="30" y="2" class="text-secondary" font-size="7" text-anchor="middle">建议者</text></g><text x="105" y="145" class="text-secondary" font-size="10" text-anchor="middle">交互方式：对话式辅助</text><text x="105" y="160" class="text-secondary" font-size="10" text-anchor="middle">工作粒度：函数/文件级</text><path stroke="#d1cfc5" d="M20 175h170"/><rect width="100" height="30" x="55" y="185" fill="#d97757" opacity=".15" rx="4"/><text x="105" y="200" class="text-accent" font-size="11" font-weight="600" text-anchor="middle">效率提升 1.5x</text><text x="105" y="235" class="text-secondary" font-size="9" text-anchor="middle">代表工具：</text><text x="105" y="248" class="text-main" font-size="10" text-anchor="middle">Copilot / Cursor</text></g><path stroke="#87867f" stroke-width="2" marker-end="url(#arrow3)" d="M0 0h30" transform="translate(260 185)"/><text x="15" y="-8" class="text-secondary" font-size="9" text-anchor="middle" transform="translate(260 185)">1-2年</text><g transform="translate(295 60)"><rect width="210" height="260" fill="#d97757" opacity=".08" rx="8"/><rect width="210" height="260" stroke="#d97757" stroke-width="2" class="border" rx="8"/><text x="105" y="25" class="text-accent" font-size="14" font-weight="600" text-anchor="middle">Phase 2</text><text x="105" y="45" class="text-main" font-size="13" text-anchor="middle">AI协作时代</text><text x="105" y="62" class="text-secondary" font-size="10" text-anchor="middle">(未来1-2年)</text><path stroke="#d97757" d="M20 75h170"/><g transform="translate(105 100)"><circle cx="-30" cy="-15" r="20" fill="#d97757" opacity=".3"/><text x="-30" y="-11" class="text-accent" font-size="9" text-anchor="middle">人类</text><text x="-30" y="2" class="text-secondary" font-size="7" text-anchor="middle">决策者</text><circle cx="30" cy="-15" r="20" fill="#788c5d" opacity=".3"/><text x="30" y="-11" class="text-olive" font-size="9" text-anchor="middle">AI</text><text x="30" y="2" class="text-secondary" font-size="7" text-anchor="middle">执行者</text></g><text x="105" y="145" class="text-secondary" font-size="10" text-anchor="middle">交互方式：任务委托式</text><text x="105" y="160" class="text-secondary" font-size="10" text-anchor="middle">工作粒度：模块/服务级</text><path stroke="#d97757" d="M20 175h170"/><rect width="100" height="30" x="55" y="185" fill="#d97757" opacity=".25" rx="4"/><text x="105" y="200" class="text-accent" font-size="11" font-weight="600" text-anchor="middle">效率提升 3x</text><text x="105" y="235" class="text-secondary" font-size="9" text-anchor="middle">代表技术：</text><text x="105" y="248" class="text-main" font-size="10" text-anchor="middle">Agent / 多Agent协作</text></g><path stroke="#87867f" stroke-width="2" marker-end="url(#arrow3)" d="M0 0h30" transform="translate(505 185)"/><text x="15" y="-8" class="text-secondary" font-size="9" text-anchor="middle" transform="translate(505 185)">3-5年</text><g transform="translate(540 60)"><rect width="210" height="260" fill="#788c5d" opacity=".1" rx="8"/><rect width="210" height="260" stroke="#788c5d" stroke-width="2" class="border" rx="8"/><text x="105" y="25" class="text-olive" font-size="14" font-weight="600" text-anchor="middle">Phase 3</text><text x="105" y="45" class="text-main" font-size="13" text-anchor="middle">AI主导时代</text><text x="105" y="62" class="text-secondary" font-size="10" text-anchor="middle">(未来3-5年)</text><path stroke="#788c5d" d="M20 75h170"/><g transform="translate(105 100)"><circle cx="-30" cy="-15" r="20" fill="#d97757" opacity=".2"/><text x="-30" y="-11" class="text-accent" font-size="9" text-anchor="middle">人类</text><text x="-30" y="2" class="text-secondary" font-size="7" text-anchor="middle">架构师</text><circle cx="30" cy="-15" r="20" fill="#788c5d" opacity=".4"/><text x="30" y="-11" class="text-olive" font-size="9" text-anchor="middle">AI</text><text x="30" y="2" class="text-secondary" font-size="7" text-anchor="middle">实现者</text></g><text x="105" y="145" class="text-secondary" font-size="10" text-anchor="middle">交互方式：意图规格</text><text x="105" y="160" class="text-secondary" font-size="10" text-anchor="middle">工作粒度：系统/产品级</text><path stroke="#788c5d" d="M20 175h170"/><rect width="100" height="30" x="55" y="185" fill="#788c5d" opacity=".3" rx="4"/><text x="105" y="200" class="text-olive" font-size="11" font-weight="600" text-anchor="middle">效率提升 10x+</text><text x="105" y="235" class="text-secondary" font-size="9" text-anchor="middle">代表角色：</text><text x="105" y="248" class="text-main" font-size="10" text-anchor="middle">意图架构师</text></g></svg>