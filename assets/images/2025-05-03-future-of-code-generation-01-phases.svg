<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img">
  <title>代码生成三阶段演进</title>
  <desc>从AI辅助到AI协作到AI主导的演进路径</desc>

  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-family: system-ui, sans-serif; }
      .text-secondary { fill: #87867F; font-family: system-ui, sans-serif; }
      .text-accent { fill: #D97757; font-family: system-ui, sans-serif; }
      .text-olive { fill: #788C5D; font-family: system-ui, sans-serif; }
      .border { stroke: #D1CFC5; stroke-width: 1; fill: none; }
      .box-phase { fill: #E3DACC; }
    </style>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" class="bg"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="text-main" font-size="18" font-weight="600">代码生成的三次范式转移</text>

  <!-- Phase 1: AI辅助时代 -->
  <g transform="translate(50, 60)">
    <rect width="210" height="260" rx="8" class="box-phase"/>
    <rect width="210" height="260" rx="8" class="border"/>

    <text x="105" y="25" text-anchor="middle" class="text-accent" font-size="14" font-weight="600">Phase 1</text>
    <text x="105" y="45" text-anchor="middle" class="text-main" font-size="13">AI辅助时代</text>
    <text x="105" y="62" text-anchor="middle" class="text-secondary" font-size="10">(现在)</text>

    <line x1="20" y1="75" x2="190" y2="75" stroke="#D1CFC5" stroke-width="1"/>

    <!-- Human/AI roles -->
    <g transform="translate(105, 100)">
      <circle cx="-30" cy="-15" r="20" fill="#D97757" opacity="0.2"/>
      <text x="-30" y="-11" text-anchor="middle" class="text-accent" font-size="9">人类</text>
      <text x="-30" y="2" text-anchor="middle" class="text-secondary" font-size="7">主导者</text>

      <circle cx="30" cy="-15" r="20" fill="#788C5D" opacity="0.2"/>
      <text x="30" y="-11" text-anchor="middle" class="text-olive" font-size="9">AI</text>
      <text x="30" y="2" text-anchor="middle" class="text-secondary" font-size="7">建议者</text>
    </g>

    <text x="105" y="145" text-anchor="middle" class="text-secondary" font-size="10">交互方式：对话式辅助</text>
    <text x="105" y="160" text-anchor="middle" class="text-secondary" font-size="10">工作粒度：函数/文件级</text>

    <line x1="20" y1="175" x2="190" y2="175" stroke="#D1CFC5" stroke-width="1"/>

    <!-- Efficiency badge -->
    <rect x="55" y="185" width="100" height="30" rx="4" fill="#D97757" opacity="0.15"/>
    <text x="105" y="200" text-anchor="middle" class="text-accent" font-size="11" font-weight="600">效率提升 1.5x</text>

    <text x="105" y="235" text-anchor="middle" class="text-secondary" font-size="9">代表工具：</text>
    <text x="105" y="248" text-anchor="middle" class="text-main" font-size="10">Copilot / Cursor</text>
  </g>

  <!-- Arrow 1->2 -->
  <g transform="translate(260, 185)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#87867F" stroke-width="2" marker-end="url(#arrow3)"/>
    <text x="15" y="-8" text-anchor="middle" class="text-secondary" font-size="9">1-2年</text>
  </g>

  <!-- Phase 2: AI协作时代 -->
  <g transform="translate(295, 60)">
    <rect width="210" height="260" rx="8" fill="#D97757" opacity="0.08"/>
    <rect width="210" height="260" rx="8" class="border" stroke="#D97757" stroke-width="2"/>

    <text x="105" y="25" text-anchor="middle" class="text-accent" font-size="14" font-weight="600">Phase 2</text>
    <text x="105" y="45" text-anchor="middle" class="text-main" font-size="13">AI协作时代</text>
    <text x="105" y="62" text-anchor="middle" class="text-secondary" font-size="10">(未来1-2年)</text>

    <line x1="20" y1="75" x2="190" y2="75" stroke="#D97757" stroke-width="1"/>

    <!-- Human/AI roles -->
    <g transform="translate(105, 100)">
      <circle cx="-30" cy="-15" r="20" fill="#D97757" opacity="0.3"/>
      <text x="-30" y="-11" text-anchor="middle" class="text-accent" font-size="9">人类</text>
      <text x="-30" y="2" text-anchor="middle" class="text-secondary" font-size="7">决策者</text>

      <circle cx="30" cy="-15" r="20" fill="#788C5D" opacity="0.3"/>
      <text x="30" y="-11" text-anchor="middle" class="text-olive" font-size="9">AI</text>
      <text x="30" y="2" text-anchor="middle" class="text-secondary" font-size="7">执行者</text>
    </g>

    <text x="105" y="145" text-anchor="middle" class="text-secondary" font-size="10">交互方式：任务委托式</text>
    <text x="105" y="160" text-anchor="middle" class="text-secondary" font-size="10">工作粒度：模块/服务级</text>

    <line x1="20" y1="175" x2="190" y2="175" stroke="#D97757" stroke-width="1"/>

    <!-- Efficiency badge -->
    <rect x="55" y="185" width="100" height="30" rx="4" fill="#D97757" opacity="0.25"/>
    <text x="105" y="200" text-anchor="middle" class="text-accent" font-size="11" font-weight="600">效率提升 3x</text>

    <text x="105" y="235" text-anchor="middle" class="text-secondary" font-size="9">代表技术：</text>
    <text x="105" y="248" text-anchor="middle" class="text-main" font-size="10">Agent / 多Agent协作</text>
  </g>

  <!-- Arrow 2->3 -->
  <g transform="translate(505, 185)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#87867F" stroke-width="2" marker-end="url(#arrow3)"/>
    <text x="15" y="-8" text-anchor="middle" class="text-secondary" font-size="9">3-5年</text>
  </g>

  <!-- Phase 3: AI主导时代 -->
  <g transform="translate(540, 60)">
    <rect width="210" height="260" rx="8" fill="#788C5D" opacity="0.1"/>
    <rect width="210" height="260" rx="8" class="border" stroke="#788C5D" stroke-width="2"/>

    <text x="105" y="25" text-anchor="middle" class="text-olive" font-size="14" font-weight="600">Phase 3</text>
    <text x="105" y="45" text-anchor="middle" class="text-main" font-size="13">AI主导时代</text>
    <text x="105" y="62" text-anchor="middle" class="text-secondary" font-size="10">(未来3-5年)</text>

    <line x1="20" y1="75" x2="190" y2="75" stroke="#788C5D" stroke-width="1"/>

    <!-- Human/AI roles -->
    <g transform="translate(105, 100)">
      <circle cx="-30" cy="-15" r="20" fill="#D97757" opacity="0.2"/>
      <text x="-30" y="-11" text-anchor="middle" class="text-accent" font-size="9">人类</text>
      <text x="-30" y="2" text-anchor="middle" class="text-secondary" font-size="7">架构师</text>

      <circle cx="30" cy="-15" r="20" fill="#788C5D" opacity="0.4"/>
      <text x="30" y="-11" text-anchor="middle" class="text-olive" font-size="9">AI</text>
      <text x="30" y="2" text-anchor="middle" class="text-secondary" font-size="7">实现者</text>
    </g>

    <text x="105" y="145" text-anchor="middle" class="text-secondary" font-size="10">交互方式：意图规格</text>
    <text x="105" y="160" text-anchor="middle" class="text-secondary" font-size="10">工作粒度：系统/产品级</text>

    <line x1="20" y1="175" x2="190" y2="175" stroke="#788C5D" stroke-width="1"/>

    <!-- Efficiency badge -->
    <rect x="55" y="185" width="100" height="30" rx="4" fill="#788C5D" opacity="0.3"/>
    <text x="105" y="200" text-anchor="middle" class="text-olive" font-size="11" font-weight="600">效率提升 10x+</text>

    <text x="105" y="235" text-anchor="middle" class="text-secondary" font-size="9">代表角色：</text>
    <text x="105" y="248" text-anchor="middle" class="text-main" font-size="10">意图架构师</text>
  </g>
</svg>