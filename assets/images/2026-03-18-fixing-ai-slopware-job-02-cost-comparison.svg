<svg xmlns="http://www.w3.org/2000/svg" aria-label="AI垃圾代码清理经济学" viewBox="0 0 800 480">
  <title>AI垃圾代码清理经济学</title>
  <desc>
    对比短期低成本方案vs正确方案的长期总成本对比，展示cleanup的经济价值
  </desc>
  <defs>
    <linearGradient id="bg2" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
  </defs>
  <path fill="url(#bg2)" d="M0 0h800v480H0z"/>
  <text x="400" y="38" fill="#141413" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Cleanup 经济学：短期节约 vs 长期代价</text>
  <text x="400" y="60" fill="#87867f" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">当企业选择&quot;AI + 初级开发者&quot;方案时的真实成本分解</text>
  <g transform="translate(60 80)">
    <text x="100" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">短期视角（看起来便宜）</text>
    <rect width="200" height="40" y="20" fill="#788c5d" rx="4"/>
    <text x="100" y="46" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">AI + 初级开发者</text>
    <text x="210" y="46" fill="#788c5d" font-family="system-ui, sans-serif" font-size="12">$50K/月</text>
    <text x="100" y="90" fill="#87867f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">看起来：每月 $50K</text>
    <text x="100" y="108" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">❌ 隐藏成本未计入</text>
  </g>
  <g transform="translate(350 80)">
    <text x="200" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">长期真实总成本（6个月）</text>
    <rect width="200" height="36" y="20" fill="#788c5d" opacity=".6" rx="4"/>
    <text x="6" y="42" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">AI + 初级开发者 (6个月)</text>
    <text x="210" y="42" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11">$300K</text>
    <rect width="180" height="36" y="62" fill="#d97757" rx="4"/>
    <text x="6" y="84" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">Cleanup 账单</text>
    <text x="190" y="84" fill="#d97757" font-family="system-ui, sans-serif" font-size="11">$200K</text>
    <rect width="140" height="36" y="104" fill="#141413" opacity=".7" rx="4"/>
    <text x="6" y="126" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">客户流失损失</text>
    <text x="150" y="126" fill="#141413" font-family="system-ui, sans-serif" font-size="11">$500K+</text>
    <rect width="80" height="36" y="146" fill="#87867f" opacity=".5" rx="4"/>
    <text x="6" y="168" fill="#141413" font-family="system-ui, sans-serif" font-size="10">团队士气</text>
    <text x="90" y="168" fill="#87867f" font-family="system-ui, sans-serif" font-size="11">难量化</text>
    <rect width="400" height="44" y="198" fill="#d97757" rx="4"/>
    <text x="200" y="224" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">真实总成本：$750K+</text>
  </g>
  <text y="30" fill="#d97757" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle" transform="translate(290 130)">→</text>
  <g transform="translate(60 340)">
    <rect width="340" height="120" fill="#788c5d" stroke="#788c5d" stroke-width="1.5" opacity=".15" rx="8"/>
    <text x="170" y="24" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">一开始就做对（正确方案）</text>
    <rect width="310" height="30" x="15" y="40" fill="#788c5d" rx="4"/>
    <text x="170" y="60" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">资深开发者 + AI 辅助 · $80K/月</text>
    <text x="170" y="88" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">6 个月总成本：$480K</text>
    <text x="170" y="106" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">✅ 质量达标，无需 cleanup</text>
  </g>
  <g transform="translate(430 360)">
    <rect width="320" height="100" fill="#d97757" stroke="#d97757" stroke-width="1.5" opacity=".12" rx="8"/>
    <text x="160" y="28" fill="#d97757" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">💡 净节省：$270K+</text>
    <text x="160" y="52" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">($750K+ 问题方案) − ($480K 正确方案)</text>
    <text x="160" y="76" fill="#141413" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">+ 客户不流失、团队士气高、系统稳定</text>
    <text x="160" y="94" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">ROI 远超账面数字</text>
  </g>
</svg>
