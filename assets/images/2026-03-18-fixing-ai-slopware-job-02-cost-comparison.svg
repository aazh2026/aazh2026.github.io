<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="AI垃圾代码清理经济学">
  <title>AI垃圾代码清理经济学</title>
  <desc>对比短期低成本方案vs正确方案的长期总成本对比，展示cleanup的经济价值</desc>

  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#141413">Cleanup 经济学：短期节约 vs 长期代价</text>
  <text x="400" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#87867F">当企业选择"AI + 初级开发者"方案时的真实成本分解</text>

  <!-- Bar Chart Area -->
  <!-- Left bar: Short-term view -->
  <g transform="translate(60, 80)">
    <text x="100" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">短期视角（看起来便宜）</text>

    <!-- AI + Junior bar -->
    <rect x="0" y="20" width="200" height="40" rx="4" fill="#788C5D"/>
    <text x="100" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FAF9F5">AI + 初级开发者</text>
    <text x="210" y="46" font-family="system-ui, sans-serif" font-size="12" fill="#788C5D">$50K/月</text>

    <!-- Hidden costs label -->
    <text x="100" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">看起来：每月 $50K</text>
    <text x="100" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#D97757">❌ 隐藏成本未计入</text>
  </g>

  <!-- Right side: Long-term total cost -->
  <g transform="translate(350, 80)">
    <text x="200" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">长期真实总成本（6个月）</text>

    <!-- Stacked bar components -->
    <!-- Layer 1: AI + Junior ongoing -->
    <rect x="0" y="20" width="200" height="36" rx="4" fill="#788C5D" opacity="0.6"/>
    <text x="6" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">AI + 初级开发者 (6个月)</text>
    <text x="210" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#788C5D">$300K</text>

    <!-- Layer 2: Cleanup bill -->
    <rect x="0" y="62" width="180" height="36" rx="4" fill="#D97757"/>
    <text x="6" y="84" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">Cleanup 账单</text>
    <text x="190" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#D97757">$200K</text>

    <!-- Layer 3: Customer churn -->
    <rect x="0" y="104" width="140" height="36" rx="4" fill="#141413" opacity="0.7"/>
    <text x="6" y="126" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">客户流失损失</text>
    <text x="150" y="126" font-family="system-ui, sans-serif" font-size="11" fill="#141413">$500K+</text>

    <!-- Layer 4: Team morale -->
    <rect x="0" y="146" width="80" height="36" rx="4" fill="#87867F" opacity="0.5"/>
    <text x="6" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#141413">团队士气</text>
    <text x="90" y="168" font-family="system-ui, sans-serif" font-size="11" fill="#87867F">难量化</text>

    <!-- Total -->
    <rect x="0" y="198" width="400" height="44" rx="4" fill="#D97757"/>
    <text x="200" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FAF9F5">真实总成本：$750K+</text>
  </g>

  <!-- Comparison arrow -->
  <g transform="translate(290, 130)">
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#D97757">→</text>
  </g>

  <!-- Right panel: Doing it right from start -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="340" height="120" rx="8" fill="#788C5D" opacity="0.15" stroke="#788C5D" stroke-width="1.5"/>
    <text x="170" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413">一开始就做对（正确方案）</text>

    <rect x="15" y="40" width="310" height="30" rx="4" fill="#788C5D"/>
    <text x="170" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FAF9F5">资深开发者 + AI 辅助 · $80K/月</text>

    <text x="170" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#141413">6 个月总成本：$480K</text>
    <text x="170" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#788C5D">✅ 质量达标，无需 cleanup</text>
  </g>

  <!-- Savings callout -->
  <g transform="translate(430, 360)">
    <rect x="0" y="0" width="320" height="100" rx="8" fill="#D97757" opacity="0.12" stroke="#D97757" stroke-width="1.5"/>
    <text x="160" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#D97757">💡 净节省：$270K+</text>
    <text x="160" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#141413">($750K+ 问题方案) − ($480K 正确方案)</text>
    <text x="160" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#141413">+ 客户不流失、团队士气高、系统稳定</text>
    <text x="160" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#87867F">ROI 远超账面数字</text>
  </g>
</svg>
