<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 300">
  <title>同步 Agent vs 异步 Agent 性能与资源对比</title>
  <desc>
    对比同步多进程 Agent 和异步协程 Agent 在时间、内存、CPU、网络连接四个维度的差异
  </desc>
  <path fill="#faf9f5" d="M0 0h680v300H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" text-anchor="middle">同步 Agent vs 异步 Agent</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">100 个 Python 函数生成 · 性能与资源消耗</text>
  <path stroke="#d1cfc5" stroke-dasharray="4,3" d="M340 58v212"/>
  <text x="170" y="68" fill="#c06050" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">同步 Agent</text>
  <text x="170" y="82" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">多进程 · 串行等待</text>
  <rect width="220" height="36" x="60" y="92" fill="#fdf0ec" stroke="#e8c0b8" stroke-width="1.5" rx="6"/>
  <text x="76" y="108" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">总时间</text>
  <text x="76" y="122" fill="#c06050" font-size="13" font-weight="600">300 秒</text>
  <text x="180" y="122" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">每个任务独立进程</text>
  <rect width="220" height="36" x="60" y="134" fill="#fdf0ec" stroke="#e8c0b8" stroke-width="1.5" rx="6"/>
  <text x="76" y="150" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">内存占用</text>
  <text x="76" y="164" fill="#c06050" font-size="13" font-weight="600">10 GB</text>
  <text x="180" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">进程间无共享</text>
  <rect width="220" height="36" x="60" y="176" fill="#fdf0ec" stroke="#e8c0b8" stroke-width="1.5" rx="6"/>
  <text x="76" y="192" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">CPU 利用率</text>
  <text x="76" y="206" fill="#c06050" font-size="13" font-weight="600">20%</text>
  <text x="180" y="206" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">I/O 等待时 CPU 空闲</text>
  <rect width="220" height="36" x="60" y="218" fill="#fdf0ec" stroke="#e8c0b8" stroke-width="1.5" rx="6"/>
  <text x="76" y="234" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">网络连接</text>
  <text x="76" y="248" fill="#c06050" font-size="13" font-weight="600">100 个</text>
  <text x="180" y="248" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">每个任务独立连接</text>
  <text x="510" y="68" fill="#788c5d" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">异步 Agent</text>
  <text x="510" y="82" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">协程 · 事件循环</text>
  <rect width="220" height="36" x="400" y="92" fill="#e8f0e0" stroke="#b8d0a8" stroke-width="1.5" rx="6"/>
  <text x="416" y="108" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">总时间</text>
  <text x="416" y="122" fill="#788c5d" font-size="13" font-weight="600">30 秒</text>
  <text x="510" y="122" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">协程并发执行</text>
  <rect width="220" height="36" x="400" y="134" fill="#e8f0e0" stroke="#b8d0a8" stroke-width="1.5" rx="6"/>
  <text x="416" y="150" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">内存占用</text>
  <text x="416" y="164" fill="#788c5d" font-size="13" font-weight="600">500 MB</text>
  <text x="510" y="164" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">协程共享内存</text>
  <rect width="220" height="36" x="400" y="176" fill="#e8f0e0" stroke="#b8d0a8" stroke-width="1.5" rx="6"/>
  <text x="416" y="192" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">CPU 利用率</text>
  <text x="416" y="206" fill="#788c5d" font-size="13" font-weight="600">90%</text>
  <text x="510" y="206" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">I/O 期间调度其他任务</text>
  <rect width="220" height="36" x="400" y="218" fill="#e8f0e0" stroke="#b8d0a8" stroke-width="1.5" rx="6"/>
  <text x="416" y="234" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">网络连接</text>
  <text x="416" y="248" fill="#788c5d" font-size="13" font-weight="600">10 个</text>
  <text x="510" y="248" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">连接复用</text>
  <circle cx="340" cy="155" r="38" fill="#fff" stroke="#d97757" stroke-width="2"/>
  <circle cx="340" cy="155" r="30" fill="#d97757" opacity=".1"/>
  <text x="340" y="150" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">10x</text>
  <text x="340" y="164" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">性能提升</text>
  <rect width="200" height="20" x="240" y="268" fill="#fff" stroke="#d1cfc5" rx="10"/>
  <text x="340" y="282" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">测试：生成 100 个 Python 函数 · AsyncIO 协程</text>
</svg>
