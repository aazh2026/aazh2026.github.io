  <text x="501" y="231" fill="#788c5d" font-size="10" text-anchor="middle">资源充足后自动重启</text>
  <rect width="68" height="20" x="582" y="218" fill="#87867f" opacity=".2" rx="4"/>
  <text x="616" y="231" fill="#87867f" font-size="10" font-weight="600" text-anchor="middle">待恢复</text>
