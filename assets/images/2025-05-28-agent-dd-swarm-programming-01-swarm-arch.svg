<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="680" height="420" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Agent-DD Swarm Programming 架构</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Agent-DD · 2025/05/28</text>

  <!-- Top row: 4 agent cards -->
  <!-- Architect Agent -->
  <rect x="40" y="68" width="130" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="40" y="68" width="130" height="22" rx="8" fill="#F0EEE6"/>
  <rect x="40" y="82" width="130" height="8" fill="#F0EEE6"/>
  <text x="105" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">Architect</text>
  <text x="105" y="108" text-anchor="middle" font-size="11" fill="#141413">架构师 Agent</text>
  <text x="105" y="124" text-anchor="middle" font-size="9" fill="#87867F">系统设计 · API 契约</text>

  <!-- Developer Agent -->
  <rect x="195" y="68" width="130" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="195" y="68" width="130" height="22" rx="8" fill="#F0EEE6"/>
  <rect x="195" y="82" width="130" height="8" fill="#F0EEE6"/>
  <text x="260" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">Developer</text>
  <text x="260" y="108" text-anchor="middle" font-size="11" fill="#141413">开发 Agent</text>
  <text x="260" y="124" text-anchor="middle" font-size="9" fill="#87867F">功能实现 · 代码生成</text>

  <!-- Tester Agent -->
  <rect x="350" y="68" width="130" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="350" y="68" width="130" height="22" rx="8" fill="#F0EEE6"/>
  <rect x="350" y="82" width="130" height="8" fill="#F0EEE6"/>
  <text x="415" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">Tester</text>
  <text x="415" y="108" text-anchor="middle" font-size="11" fill="#141413">测试 Agent</text>
  <text x="415" y="124" text-anchor="middle" font-size="9" fill="#87867F">测试用例 · 质量把关</text>

  <!-- Reviewer Agent -->
  <rect x="505" y="68" width="130" height="72" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.8"/>
  <rect x="505" y="68" width="130" height="22" rx="8" fill="#F0EEE6"/>
  <rect x="505" y="82" width="130" height="8" fill="#F0EEE6"/>
  <text x="570" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="#141413" font-family="ui-monospace, monospace">Reviewer</text>
  <text x="570" y="108" text-anchor="middle" font-size="11" fill="#141413">审查 Agent</text>
  <text x="570" y="124" text-anchor="middle" font-size="9" fill="#87867F">逻辑审查 · 风格检查</text>

  <!-- Arrows from top agents to Coordinator -->
  <line x1="105" y1="140" x2="105" y2="172" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="105,176 101,168 109,168" fill="#D1CFC5"/>
  <line x1="260" y1="140" x2="260" y2="172" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="260,176 256,168 264,168" fill="#D1CFC5"/>
  <line x1="415" y1="140" x2="415" y2="172" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="415,176 411,168 419,168" fill="#D1CFC5"/>
  <line x1="570" y1="140" x2="570" y2="172" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="570,176 566,168 574,168" fill="#D1CFC5"/>

  <!-- Horizontal convergence lines -->
  <line x1="105" y1="160" x2="340" y2="160" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="260" y1="160" x2="340" y2="160" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="415" y1="160" x2="340" y2="160" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="570" y1="160" x2="340" y2="160" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Coordinator Agent (clay-colored, center) -->
  <rect x="240" y="176" width="200" height="88" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="240" y="176" width="200" height="26" rx="10" fill="#D97757"/>
  <rect x="240" y="194" width="200" height="8" fill="#D97757"/>
  <text x="340" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, monospace">Coordinator</text>
  <text x="340" y="220" text-anchor="middle" font-size="12" fill="#141413">协调 Agent</text>
  <text x="340" y="238" text-anchor="middle" font-size="10" fill="#87867F">任务调度 · 冲突仲裁 · 结果整合</text>
  <text x="340" y="256" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">去中心化协调</text>

  <!-- Arrows from Coordinator down to Shared State -->
  <line x1="340" y1="264" x2="340" y2="296" stroke="#D97757" stroke-width="2"/>
  <polygon points="340,304 334,292 346,292" fill="#D97757"/>

  <!-- Shared State bar (bottom, olive) -->
  <rect x="120" y="304" width="440" height="70" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>
  <rect x="120" y="304" width="440" height="24" rx="10" fill="#788C5D"/>
  <rect x="120" y="320" width="440" height="8" fill="#788C5D"/>
  <text x="340" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, monospace">Shared State</text>

  <!-- Shared State contents -->
  <rect x="144" y="336" width="88" height="26" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="188" y="353" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">代码</text>

  <rect x="244" y="336" width="88" height="26" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="288" y="353" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">设计</text>

  <rect x="344" y="336" width="88" height="26" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="388" y="353" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">指标</text>

  <rect x="444" y="336" width="88" height="26" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="488" y="353" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">冲突日志</text>

  <!-- Key insight annotation -->
  <text x="40" y="402" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">涌现智能：群体协作 &gt; 个体智能</text>
  <text x="640" y="402" text-anchor="end" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">Swarm Programming</text>

  <!-- Accessibility -->
  <title>Agent-DD Swarm Programming 架构图</title>
  <desc>展示四个专业 Agent（架构师、开发、测试、审查）通过协调 Agent 汇聚到共享状态的架构。顶部四个 Agent 节点通过虚线汇聚到中央协调节点，箭头指向底部的共享状态栏。</desc>
</svg>