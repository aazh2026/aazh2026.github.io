<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="640" height="360" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Context设计的五个维度</text>
  <text x="320" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Context设计师的核心能力框架</text>

  <!-- Central node: Context设计师 -->
  <circle cx="320" cy="185" r="50" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <circle cx="320" cy="185" r="40" fill="#D97757" opacity="0.12"/>
  <text x="320" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Context</text>
  <text x="320" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">设计师</text>

  <!-- Card 1: 问题定义 (top) -->
  <rect x="210" y="36" width="220" height="68" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="226" y="50" width="68" height="20" rx="10" fill="#D97757"/>
  <text x="260" y="65" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">问题定义</text>
  <text x="226" y="84" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Problem Framing</text>
  <text x="226" y="97" font-size="9" fill="#87867F">我们要解决什么？什么不在范围内？</text>

  <!-- Arrow from card 1 to center -->
  <line x1="320" y1="104" x2="320" y2="130" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="320,134 316,124 324,124" fill="#D97757"/>

  <!-- Card 2: 约束空间 (top-left) -->
  <rect x="36" y="100" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="52" y="114" width="68" height="20" rx="10" fill="#D97757"/>
  <text x="86" y="129" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">约束空间</text>
  <text x="52" y="148" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Constraint Space</text>
  <text x="52" y="161" font-size="9" fill="#87867F">成本上限、时间窗口、合规要求</text>

  <!-- Arrow from card 2 to center -->
  <line x1="236" y1="134" x2="278" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="278,160 271,155 275,163" fill="#D1CFC5"/>

  <!-- Card 3: 协作协议 (top-right) -->
  <rect x="404" y="100" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="420" y="114" width="68" height="20" rx="10" fill="#D97757"/>
  <text x="454" y="129" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">协作协议</text>
  <text x="420" y="148" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Collaboration Protocol</text>
  <text x="420" y="161" font-size="9" fill="#87867F">AI和人类如何分工？谁对什么负责？</text>

  <!-- Arrow from card 3 to center -->
  <line x1="404" y1="134" x2="362" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="362,160 369,155 365,163" fill="#D1CFC5"/>

  <!-- Card 4: 质量标准 (bottom-left) -->
  <rect x="36" y="206" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="52" y="220" width="68" height="20" rx="10" fill="#788C5D"/>
  <text x="86" y="235" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">质量标准</text>
  <text x="52" y="254" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Quality Standards</text>
  <text x="52" y="267" font-size="9" fill="#87867F">什么算"好"？什么算"完成"？</text>

  <!-- Arrow from card 4 to center -->
  <line x1="236" y1="240" x2="278" y2="210" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="278,210 271,215 275,207" fill="#D1CFC5"/>

  <!-- Card 5: 演化路径 (bottom-right) -->
  <rect x="404" y="206" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="420" y="220" width="68" height="20" rx="10" fill="#788C5D"/>
  <text x="454" y="235" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">演化路径</text>
  <text x="420" y="254" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Evolution Path</text>
  <text x="420" y="267" font-size="9" fill="#87867F">架构如何随业务演化？技术债务如何管理？</text>

  <!-- Arrow from card 5 to center -->
  <line x1="404" y1="240" x2="362" y2="210" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="362,210 369,215 365,207" fill="#D1CFC5"/>

  <!-- Card 6: 整合 (bottom) -->
  <rect x="210" y="280" width="220" height="56" rx="8" fill="#FFFFFF" stroke="#788C5D" stroke-width="1.8"/>
  <rect x="226" y="294" width="68" height="20" rx="10" fill="#788C5D"/>
  <text x="260" y="309" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">跨域整合</text>
  <text x="226" y="326" font-size="10" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">Cross-domain Integration</text>

  <!-- Arrow from center to card 6 -->
  <line x1="320" y1="235" x2="320" y2="275" stroke="#788C5D" stroke-width="1.5"/>
  <polygon points="320,279 316,269 324,269" fill="#788C5D"/>

  <!-- Bottom source credit -->
  <text x="320" y="350" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">AI时代架构师的新能力模型 · 2025/02/14</text>
</svg>
