<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>2008 雷曼兄弟 vs 高盛：降级模式对比</title>
  <desc>两条时间轴对比：雷曼兄弟灾难性崩溃 vs 高盛以降级模式运行72小时</desc>

  <rect width="680" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">2008 金融危机的系统启示</text>
  <text x="340" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">雷曼兄弟 vs 高盛 · 2008/09/15</text>

  <!-- Lehman timeline bar -->
  <rect x="40" y="68" width="600" height="80" rx="8" fill="#FFFFFF" stroke="#C0392B" stroke-width="1.5"/>
  <text x="56" y="86" font-size="11" font-weight="600" fill="#C0392B" font-family="ui-monospace, monospace">雷曼兄弟 LEHMAN BROTHERS</text>
  <text x="56" y="100" font-size="10" fill="#87867F">灾难性崩溃 · 2008-09-15</text>

  <!-- Lehman failure indicators -->
  <rect x="460" y="74" width="80" height="60" rx="4" fill="#C0392B" opacity="0.15"/>
  <text x="500" y="102" text-anchor="middle" font-size="11" fill="#C0392B" font-weight="600">全面</text>
  <text x="500" y="116" text-anchor="middle" font-size="11" fill="#C0392B" font-weight="600">崩溃</text>
  <text x="500" y="130" text-anchor="middle" font-size="9" fill="#C0392B">0% 功能</text>

  <!-- Lehman labels -->
  <text x="140" y="124" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Trading Core</text>
  <text x="220" y="124" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Complex Derivatives</text>
  <text x="320" y="124" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Non-core Features</text>

  <!-- Lehman X marks -->
  <text x="140" y="118" text-anchor="middle" font-size="14" fill="#C0392B">✗</text>
  <text x="220" y="118" text-anchor="middle" font-size="14" fill="#C0392B">✗</text>
  <text x="320" y="118" text-anchor="middle" font-size="14" fill="#C0392B">✗</text>

  <!-- Goldman timeline bar -->
  <rect x="40" y="162" width="600" height="80" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="56" y="180" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">高盛 GOLDMAN SACHS</text>
  <text x="56" y="194" font-size="10" fill="#87867F">降级模式运行 72 小时 · 2008/09/15</text>

  <!-- Goldman stepped degradation -->
  <rect x="130" y="172" width="100" height="58" rx="4" fill="#788C5D" opacity="0.2"/>
  <text x="180" y="198" text-anchor="middle" font-size="10" fill="#788C5D" font-weight="500">Trading Core</text>
  <text x="180" y="214" text-anchor="middle" font-size="9" fill="#788C5D">100% 运行</text>

  <rect x="240" y="172" width="100" height="58" rx="4" fill="#D97757" opacity="0.2"/>
  <text x="290" y="198" text-anchor="middle" font-size="10" fill="#D97757" font-weight="500">Complex Derivatives</text>
  <text x="290" y="214" text-anchor="middle" font-size="9" fill="#D97757">降级</text>

  <rect x="350" y="172" width="100" height="58" rx="4" fill="#87867F" opacity="0.15"/>
  <text x="400" y="198" text-anchor="middle" font-size="10" fill="#87867F" font-weight="500">Non-core Features</text>
  <text x="400" y="214" text-anchor="middle" font-size="9" fill="#87867F">关闭</text>

  <!-- 72h label -->
  <rect x="460" y="174" width="80" height="56" rx="4" fill="#D97757" opacity="0.15"/>
  <text x="500" y="198" text-anchor="middle" font-size="11" fill="#D97757" font-weight="600">72h+</text>
  <text x="500" y="214" text-anchor="middle" font-size="9" fill="#D97757">降级运行</text>

  <!-- Bankruptcy dashed line -->
  <line x1="420" y1="58" x2="420" y2="252" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="420" y="256" text-anchor="middle" font-size="8" fill="#C0392B" font-family="ui-monospace, monospace">雷曼破产</text>

  <!-- Legend -->
  <rect x="540" y="260" width="100" height="28" rx="4" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1"/>
  <text x="548" y="274" font-size="9" fill="#141413">■ 完全运行</text>
  <text x="548" y="284" font-size="9" fill="#141413">■ 降级运行</text>
  <text x="604" y="274" font-size="9" fill="#87867F">■ 关闭</text>
</svg>