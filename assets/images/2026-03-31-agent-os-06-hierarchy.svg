<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- CEO Agent → VP → Team -->
  <rect width="560" height="200" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">CEO Agent 分层管理模式</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/31</text>

  <!-- CEO Agent (top) -->
  <rect x="180" y="48" width="200" height="42" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="180" y="48" width="200" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="280" y="62" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">CEO Agent</text>
  <text x="280" y="78" text-anchor="middle" font-size="9" fill="#87867F">战略决策 · 全局协调</text>
  <rect x="372" y="56" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="379" y="67" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">C</text>

  <!-- Arrows: CEO → VP1, VP2, VP3 -->
  <line x1="280" y1="90" x2="110" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="280" y1="90" x2="280" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="280" y1="90" x2="450" y2="110" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- VP1 -->
  <rect x="50" y="110" width="120" height="38" rx="5" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="50" y="110" width="120" height="14" rx="5" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="110" y="123" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">VP 1</text>
  <text x="110" y="138" text-anchor="middle" font-size="9" fill="#141413">工程VP</text>
  <rect x="162" y="118" width="12" height="12" rx="6" fill="#EA580C"/>
  <text x="168" y="127" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">V1</text>

  <!-- VP2 -->
  <rect x="220" y="110" width="120" height="38" rx="5" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="220" y="110" width="120" height="14" rx="5" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="280" y="123" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">VP 2</text>
  <text x="280" y="138" text-anchor="middle" font-size="9" fill="#141413">产品VP</text>
  <rect x="332" y="118" width="12" height="12" rx="6" fill="#EA580C"/>
  <text x="338" y="127" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">V2</text>

  <!-- VP3 -->
  <rect x="390" y="110" width="120" height="38" rx="5" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="390" y="110" width="120" height="14" rx="5" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="450" y="123" text-anchor="middle" font-size="9" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">VP 3</text>
  <text x="450" y="138" text-anchor="middle" font-size="9" fill="#141413">运营VP</text>
  <rect x="502" y="118" width="12" height="12" rx="6" fill="#EA580C"/>
  <text x="508" y="127" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">V3</text>

  <!-- VP1 → Team1 -->
  <line x1="110" y1="148" x2="80" y2="170" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="110" y1="148" x2="140" y2="170" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Team1 -->
  <rect x="30" y="170" width="150" height="22" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
