  <!-- VP3 → Team2 -->
  <line x1="450" y1="148" x2="420" y2="170" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="450" y1="148" x2="480" y2="170" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- Team2 -->
  <rect x="380" y="170" width="150" height="22" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
  <text x="455" y="186" text-anchor="middle" font-size="9" fill="#2563EB" font-weight="600">Team 2</text>

  <text x="280" y="198" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">多级决策链条，适用于大型组织</text>
