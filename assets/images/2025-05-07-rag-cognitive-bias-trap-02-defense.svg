    <style>
      .slate-text{fill:#141413;font-family:monospace}.box{stroke:#141413;stroke-width:1.5}.arrow,.garrow{stroke:#87867f;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.garrow{stroke:#788c5d;stroke-width:1.5;marker-end:url(#garrowhead)}
    </style>
  </defs>
  <path d="M0 0h800v440H0z" style="fill:#faf9f5"/>
