  <rect width="360" height="16" x="490" y="420" fill="#e3dacc" rx="3"/>
  <text x="514" y="432" fill="#87867f" class="slate-text" font-size="9">对立查询生成: &quot;Python局限性&quot; &quot;Java优势&quot; &quot;编程语言选择不应只看popularity&quot;</text>
