  <text x="122" y="429" fill="#87867f" class="slate-text" font-size="9">多样化检索</text>
  <rect width="10" height="10" x="200" y="420" fill="#e3dacc" rx="2"/>
  <text x="214" y="429" fill="#87867f" class="slate-text" font-size="9">交叉验证</text>
