<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="AI Agent成本层级拆解图">
  <title>AI Agent 部署成本层级拆解</title>
  <desc>从原型到规模阶段的四层成本结构：API调用、基础设施、数据存储、监控人力</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#C0623F"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#788C5D"/>
      <stop offset="100%" stop-color="#5E7347"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87867F"/>
      <stop offset="100%" stop-color="#6A6860"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1CFC5"/>
      <stop offset="100%" stop-color="#B8B5AB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#141413">AI Agent 部署成本层级拆解</text>
  <text x="400" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#87867F">从 $0 原型 → $10,000 规模 · 成本构成比例</text>

  <!-- Chart area -->
  <!-- Y-axis labels -->
  <text x="130" y="90" text-anchor="end" font-family="monospace" font-size="11" fill="#87867F">$10,000</text>
  <text x="130" y="175" text-anchor="end" font-family="monospace" font-size="11" fill="#87867F">$7,500</text>
  <text x="130" y="260" text-anchor="end" font-family="monospace" font-size="11" fill="#87867F">$5,000</text>
  <text x="130" y="345" text-anchor="end" font-family="monospace" font-size="11" fill="#87867F">$2,500</text>
  <text x="130" y="430" text-anchor="end" font-family="monospace" font-size="11" fill="#87867F">$0</text>

  <!-- Grid lines -->
  <line x1="140" y1="87" x2="760" y2="87" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="140" y1="172" x2="760" y2="172" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="140" y1="257" x2="760" y2="257" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="140" y1="342" x2="760" y2="342" stroke="#D1CFC5" stroke-width="1"/>
  <line x1="140" y1="427" x2="760" y2="427" stroke="#141413" stroke-width="1.5"/>

  <!-- Stacked bars -->
  <!-- Level 1: $0 (height 0, just show label) -->
  <rect x="160" y="427" width="90" height="0" fill="url(#bar1)" rx="3 3 0 0"/>
  <rect x="160" y="427" width="90" height="0" fill="url(#bar2)" rx="0"/>
  <rect x="160" y="427" width="90" height="0" fill="url(#bar3)" rx="0"/>
  <rect x="160" y="427" width="90" height="0" fill="url(#bar4)" rx="0 0 3 3"/>
  <text x="205" y="447" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#141413">$0</text>
  <text x="205" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#87867F">原型</text>

  <!-- Level 2: $100/month - stacked bar -->
  <!-- API: $50, Infra: $30, Storage: $15, Monitor: $5 -->
  <!-- Total height for $100 = 340/100 * 100 = 340px from bottom -->
  <!-- 427 - 340 = 87 (top at y=87) -->
  <rect x="300" y="359" width="90" height="68" fill="url(#bar1)" rx="3 3 0 0"/>
  <text x="345" y="394" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">API $50</text>

  <rect x="300" y="390" width="90" height="34" fill="url(#bar2)" rx="0"/>
  <text x="345" y="407" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">Infra $30</text>

  <rect x="300" y="407" width="90" height="17" fill="url(#bar3)" rx="0"/>
  <text x="345" y="416" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">存储$15</text>

  <rect x="300" y="417" width="90" height="10" fill="url(#bar4)" rx="0 0 3 3"/>
  <text x="345" y="424" text-anchor="middle" font-family="monospace" font-size="8" fill="#141413">监$5</text>

  <text x="345" y="447" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#141413">$100</text>
  <text x="345" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#87867F">测试</text>

  <!-- Level 3: $1,000/month -->
  <!-- API: $400, Infra: $300, Storage: $150, Monitor: $100, CDN: $50 -->
  <!-- 427 - 340 = 87, full bar height = 340 -->
  <!-- API: 400/1000*340 = 136 -->
  <rect x="440" y="226" width="90" height="201" fill="url(#bar1)" rx="3 3 0 0"/>
  <text x="485" y="316" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">API $400</text>

  <!-- Infra: 300/1000*340 = 102 -->
  <rect x="440" y="305" width="90" height="121" fill="url(#bar2)" rx="0"/>
  <text x="485" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">Infra $300</text>

  <!-- Storage: 150/1000*340 = 51 -->
  <rect x="440" y="343" width="90" height="62" fill="url(#bar3)" rx="0"/>
  <text x="485" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">存储 $150</text>

  <!-- Monitor+CDN: 150/1000*340 = 51 -->
  <rect x="440" y="378" width="90" height="49" fill="url(#bar4)" rx="0 0 3 3"/>
  <text x="485" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#141413">监$100</text>

  <text x="485" y="447" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#141413">$1,000</text>
  <text x="485" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#87867F">生产</text>

  <!-- Level 4: $10,000/month -->
  <!-- API: $3000, Infra: $3500, Storage: $1500, Monitor: $1000, Human: $1000 -->
  <!-- Full height = 340px -->
  <!-- API: 3000/10000*340 = 102 -->
  <rect x="580" y="260" width="90" height="167" fill="url(#bar1)" rx="3 3 0 0"/>
  <text x="625" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">API $3k</text>

  <!-- Infra: 3500/10000*340 = 119 -->
  <rect x="580" y="346" width="90" height="81" fill="url(#bar2)" rx="0"/>
  <text x="625" y="386" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">Infra $3.5k</text>

  <!-- Storage: 1500/10000*340 = 51 -->
  <rect x="580" y="381" width="90" height="46" fill="url(#bar3)" rx="0"/>
  <text x="625" y="404" text-anchor="middle" font-family="monospace" font-size="9" fill="#FAF9F5">存储 $1.5k</text>

  <!-- Monitor+Human: 2000/10000*340 = 68 -->
  <rect x="580" y="414" width="90" height="13" fill="url(#bar4)" rx="0 0 3 3"/>
  <text x="625" y="423" text-anchor="middle" font-family="monospace" font-size="8" fill="#141413">+$1k</text>

  <text x="625" y="447" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#D97757">$10,000</text>
  <text x="625" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#87867F">规模</text>

  <!-- Legend -->
  <rect x="720" y="90" width="14" height="14" fill="url(#bar1)" rx="2"/>
  <text x="740" y="102" font-family="monospace" font-size="10" fill="#141413">API调用</text>

  <rect x="720" y="112" width="14" height="14" fill="url(#bar2)" rx="2"/>
  <text x="740" y="124" font-family="monospace" font-size="10" fill="#141413">基础设施</text>

  <rect x="720" y="134" width="14" height="14" fill="url(#bar3)" rx="2"/>
  <text x="740" y="146" font-family="monospace" font-size="10" fill="#141413">数据存储</text>

  <rect x="720" y="156" width="14" height="14" fill="url(#bar4)" rx="2"/>
  <text x="740" y="168" font-family="monospace" font-size="10" fill="#141413">监控/人力</text>

  <!-- Arrow showing cost growth -->
  <path d="M250 440 C350 440 350 440 450 440 C550 440 550 440 650 440" stroke="#D97757" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="450" y="472" text-anchor="middle" font-family="monospace" font-size="10" fill="#D97757">规模增长 →</text>

</svg>
