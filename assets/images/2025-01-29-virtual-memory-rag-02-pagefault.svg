<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <marker id="arrowhead" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3">
      <path fill="#87867f" d="m0 0 8 3-8 3z"/>
    </marker>
    <style>
      .slate-text{fill:#141413;font-family:monospace}.arrow{stroke:#87867f;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.box{stroke:#141413;stroke-width:1.5}
    </style>
  </defs>
  <path d="M0 0h800v420H0z" style="fill:#faf9f5"/>
  <text x="400" y="32" fill="#141413" class="slate-text" font-size="15" font-weight="bold" text-anchor="middle">LLM Page Fault 处理流程</text>
  <rect width="200" height="36" x="300" y="52" fill="#faf9f5" class="box" rx="4"/>
  <text x="400" y="75" fill="#141413" class="slate-text" font-size="12" text-anchor="middle">用户查询: &quot;SRE 黄金信号&quot;</text>
  <path d="M400 88v20" class="arrow"/>
  <rect width="280" height="52" x="260" y="112" fill="#e3dacc" class="box" rx="6"/>
  <text x="400" y="134" fill="#141413" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle">Step 1: Context Page Table 查询</text>
  <text x="400" y="152" fill="#87867f" class="slate-text" font-size="11" text-anchor="middle">检查目标页是否在 Context Window</text>
  <path d="M400 164v12" class="arrow"/>
  <rect width="160" height="64" x="40" y="180" fill="#788c5d" class="box" rx="6"/>
  <text x="120" y="204" fill="#faf9f5" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle">✅ Page Hit</text>
  <text x="120" y="222" fill="#e3dacc" class="slate-text" font-size="11" text-anchor="middle">直接读取上下文</text>
  <text x="120" y="238" fill="#e3dacc" class="slate-text" font-size="10" text-anchor="middle">延迟: ~10ms</text>
  <rect width="160" height="64" x="600" y="180" fill="#d97757" class="box" rx="6"/>
  <text x="680" y="204" fill="#faf9f5" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle">❌ Page Fault</text>
  <text x="680" y="222" fill="#e3dacc" class="slate-text" font-size="11" text-anchor="middle">触发检索加载</text>
  <text x="680" y="238" fill="#e3dacc" class="slate-text" font-size="10" text-anchor="middle">延迟: ~200-500ms</text>
  <path d="m400 176-280 4" class="arrow"/>
  <path d="m400 176 280 4" class="arrow"/>
  <text x="240" y="172" fill="#788c5d" class="slate-text" font-size="10" text-anchor="middle">命中</text>
  <text x="560" y="172" fill="#d97757" class="slate-text" font-size="10" text-anchor="middle">缺页</text>
  <rect width="280" height="130" x="490" y="258" fill="#faf9f5" stroke="#d1cfc5" class="box" rx="6"/>
  <text x="630" y="278" fill="#141413" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle">Page Fault Handler</text>
  <rect width="248" height="26" x="506" y="290" fill="#e3dacc" rx="3"/>
  <text x="630" y="308" fill="#141413" class="slate-text" font-size="11" text-anchor="middle">① 从向量库检索相关页</text>
  <rect width="248" height="26" x="506" y="322" fill="#e3dacc" rx="3"/>
  <text x="630" y="340" fill="#141413" class="slate-text" font-size="11" text-anchor="middle">② Context 满 → LRU 置换一页</text>
  <rect width="248" height="26" x="506" y="354" fill="#e3dacc" rx="3"/>
  <text x="630" y="372" fill="#141413" class="slate-text" font-size="11" text-anchor="middle">③ 加载页到 Context Window</text>
  <path d="m680 244-50 14" class="arrow"/>
  <text x="470" y="340" fill="#87867f" class="slate-text" font-size="10" text-anchor="middle" transform="rotate(-90 470 340)">LRU 置换</text>
  <rect width="200" height="130" x="60" y="258" fill="#faf9f5" stroke="#d1cfc5" class="box" rx="6"/>
  <text x="160" y="278" fill="#141413" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle">Working Set Tracker</text>
  <rect width="168" height="20" x="76" y="292" fill="#e3dacc" rx="2"/>
  <text x="160" y="306" fill="#141413" class="slate-text" font-size="10" text-anchor="middle">访问记录: [P3, P1, P7, ...]</text>
  <rect width="168" height="20" x="76" y="318" fill="#788c5d" opacity=".7" rx="2"/>
  <text x="160" y="332" fill="#faf9f5" class="slate-text" font-size="10" text-anchor="middle">活跃页 = {P3, P1, P7}</text>
  <rect width="168" height="20" x="76" y="344" fill="#d97757" opacity=".7" rx="2"/>
  <text x="160" y="358" fill="#faf9f5" class="slate-text" font-size="10" text-anchor="middle">可置换 = P5 (最久未用)</text>
  <rect width="168" height="14" x="76" y="370" fill="#e3dacc" rx="2"/>
  <text x="160" y="381" fill="#87867f" class="slate-text" font-size="10" text-anchor="middle">预取: P8 (空间局部性)</text>
  <path d="M490 323H260" class="arrow"/>
  <path d="M400 388v20" class="arrow"/>
  <text x="400" y="405" fill="#141413" class="slate-text" font-size="11" text-anchor="middle">→ 生成回答</text>
  <rect width="10" height="10" x="44" y="388" fill="#788c5d" rx="2"/>
  <text x="58" y="397" fill="#87867f" class="slate-text" font-size="10">命中路径</text>
  <rect width="10" height="10" x="130" y="388" fill="#d97757" rx="2"/>
  <text x="144" y="397" fill="#87867f" class="slate-text" font-size="10">缺页路径</text>
  <rect width="10" height="10" x="216" y="388" fill="#e3dacc" rx="2"/>
  <text x="230" y="397" fill="#87867f" class="slate-text" font-size="10">操作步骤</text>
</svg>
