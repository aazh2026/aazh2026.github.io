<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .slate-text { fill: #141413; font-family: monospace; }
      .clay-fill { fill: #D97757; }
      .clay-stroke { stroke: #D97757; fill: none; }
      .slate-fill { fill: #141413; }
      .g300-fill { fill: #D1CFC5; }
      .g500-fill { fill: #87867F; }
      .oat-fill { fill: #E3DACC; }
      .olive-fill { fill: #788C5D; }
      .arrow { stroke: #87867F; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .box { stroke: #141413; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
  </defs>
  <rect width="800" height="420" class="bg"/>

  <!-- Title -->
  <text x="400" y="32" class="slate-text" font-size="15" font-weight="bold" text-anchor="middle" fill="#141413">LLM Page Fault 处理流程</text>

  <!-- Input Box -->
  <rect x="300" y="52" width="200" height="36" rx="4" class="box" fill="#FAF9F5"/>
  <text x="400" y="75" class="slate-text" font-size="12" text-anchor="middle" fill="#141413">用户查询: "SRE 黄金信号"</text>

  <!-- Arrow down -->
  <line x1="400" y1="88" x2="400" y2="108" class="arrow"/>

  <!-- Step 1: Context Page Table Check -->
  <rect x="260" y="112" width="280" height="52" rx="6" class="box" fill="#E3DACC"/>
  <text x="400" y="134" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle" fill="#141413">Step 1: Context Page Table 查询</text>
  <text x="400" y="152" class="slate-text" font-size="11" text-anchor="middle" fill="#87867F">检查目标页是否在 Context Window</text>

  <!-- Hit or Miss split -->
  <line x1="400" y1="164" x2="400" y2="176" class="arrow"/>

  <!-- Hit Box -->
  <rect x="40" y="180" width="160" height="64" rx="6" class="box" fill="#788C5D"/>
  <text x="120" y="204" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle" fill="#FAF9F5">✅ Page Hit</text>
  <text x="120" y="222" class="slate-text" font-size="11" text-anchor="middle" fill="#E3DACC">直接读取上下文</text>
  <text x="120" y="238" class="slate-text" font-size="10" text-anchor="middle" fill="#E3DACC">延迟: ~10ms</text>

  <!-- Miss Box -->
  <rect x="600" y="180" width="160" height="64" rx="6" class="box" fill="#D97757"/>
  <text x="680" y="204" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle" fill="#FAF9F5">❌ Page Fault</text>
  <text x="680" y="222" class="slate-text" font-size="11" text-anchor="middle" fill="#E3DACC">触发检索加载</text>
  <text x="680" y="238" class="slate-text" font-size="10" text-anchor="middle" fill="#E3DACC">延迟: ~200-500ms</text>

  <!-- Arrows to Hit/Miss -->
  <line x1="400" y1="176" x2="120" y2="180" class="arrow"/>
  <line x1="400" y1="176" x2="680" y2="180" class="arrow"/>

  <!-- Label: Hit path -->
  <text x="240" y="172" class="slate-text" font-size="10" text-anchor="middle" fill="#788C5D">命中</text>
  <!-- Label: Miss path -->
  <text x="560" y="172" class="slate-text" font-size="10" text-anchor="middle" fill="#D97757">缺页</text>

  <!-- Page Fault Handler (center right) -->
  <rect x="490" y="258" width="280" height="130" rx="6" class="box" fill="#FAF9F5" stroke="#D1CFC5"/>
  <text x="630" y="278" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle" fill="#141413">Page Fault Handler</text>

  <!-- Sub-steps inside -->
  <rect x="506" y="290" width="248" height="26" rx="3" fill="#E3DACC"/>
  <text x="630" y="308" class="slate-text" font-size="11" text-anchor="middle" fill="#141413">① 从向量库检索相关页</text>

  <rect x="506" y="322" width="248" height="26" rx="3" fill="#E3DACC"/>
  <text x="630" y="340" class="slate-text" font-size="11" text-anchor="middle" fill="#141413">② Context 满 → LRU 置换一页</text>

  <rect x="506" y="354" width="248" height="26" rx="3" fill="#E3DACC"/>
  <text x="630" y="372" class="slate-text" font-size="11" text-anchor="middle" fill="#141413">③ 加载页到 Context Window</text>

  <!-- Arrow from Miss to Handler -->
  <line x1="680" y1="244" x2="630" y2="258" class="arrow"/>

  <!-- LRU eviction label -->
  <text x="470" y="340" class="slate-text" font-size="10" text-anchor="middle" fill="#87867F" transform="rotate(-90, 470, 340)">LRU 置换</text>

  <!-- Working Set Update -->
  <rect x="60" y="258" width="200" height="130" rx="6" class="box" fill="#FAF9F5" stroke="#D1CFC5"/>
  <text x="160" y="278" class="slate-text" font-size="12" font-weight="bold" text-anchor="middle" fill="#141413">Working Set Tracker</text>
  <rect x="76" y="292" width="168" height="20" rx="2" fill="#E3DACC"/>
  <text x="160" y="306" class="slate-text" font-size="10" text-anchor="middle" fill="#141413">访问记录: [P3, P1, P7, ...]</text>
  <rect x="76" y="318" width="168" height="20" rx="2" fill="#788C5D" opacity="0.7"/>
  <text x="160" y="332" class="slate-text" font-size="10" text-anchor="middle" fill="#FAF9F5">活跃页 = {P3, P1, P7}</text>
  <rect x="76" y="344" width="168" height="20" rx="2" fill="#D97757" opacity="0.7"/>
  <text x="160" y="358" class="slate-text" font-size="10" text-anchor="middle" fill="#FAF9F5">可置换 = P5 (最久未用)</text>
  <rect x="76" y="370" width="168" height="14" rx="2" fill="#E3DACC"/>
  <text x="160" y="381" class="slate-text" font-size="10" text-anchor="middle" fill="#87867F">预取: P8 (空间局部性)</text>

  <!-- Arrow: Fault Handler to Working Set -->
  <line x1="490" y1="323" x2="260" y2="323" class="arrow"/>

  <!-- Final output -->
  <line x1="400" y1="388" x2="400" y2="408" class="arrow"/>
  <rect x="300" y="408" width="200" height="0" rx="4" fill="none"/>

  <!-- Latency comparison -->
  <text x="400" y="405" class="slate-text" font-size="11" text-anchor="middle" fill="#141413">→ 生成回答</text>

  <!-- Legend -->
  <rect x="44" y="388" width="10" height="10" fill="#788C5D" rx="2"/>
  <text x="58" y="397" class="slate-text" font-size="10" fill="#87867F">命中路径</text>
  <rect x="130" y="388" width="10" height="10" fill="#D97757" rx="2"/>
  <text x="144" y="397" class="slate-text" font-size="10" fill="#87867F">缺页路径</text>
  <rect x="216" y="388" width="10" height="10" fill="#E3DACC" rx="2"/>
  <text x="230" y="397" class="slate-text" font-size="10" fill="#87867F">操作步骤</text>

</svg>
