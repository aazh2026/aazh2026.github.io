<svg viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- 代码敏感度分级金字塔 -->
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <rect width="560" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="280" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">代码敏感度分级金字塔</text>
  <text x="280" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">混合云 AI 编程架构 · 2025/05/16</text>

  <!-- L4 - Critical (top, narrowest) - clay #D97757 -->
  <polygon points="280,64 190,134 370,134" fill="#D97757" stroke="#141413" stroke-width="1.5"/>
  <text x="280" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">L4 核心代码</text>
  <text x="280" y="106" text-anchor="middle" font-size="10" fill="#FFFFFF">Critical</text>
  <text x="280" y="122" text-anchor="middle" font-size="9" fill="#F5E6E0">加密算法 · 交易引擎 · 密钥管理</text>
  <!-- code icon -->
  <text x="210" y="100" font-size="10" fill="#F5E6E0" font-family="ui-monospace, monospace">&lt;/&gt;</text>
  <!-- processing label -->
  <rect x="375" y="88" width="54" height="18" rx="9" fill="#F5E6E0"/>
  <text x="402" y="101" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">纯本地</text>

  <!-- L3 - Sensitive - olive #788C5D -->
  <polygon points="190,140 120,220 440,220 370,140" fill="#788C5D" stroke="#141413" stroke-width="1.5"/>
  <text x="280" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF" font-family="ui-monospace, monospace">L3 敏感代码</text>
  <text x="280" y="184" text-anchor="middle" font-size="10" fill="#FFFFFF">Sensitive</text>
  <text x="280" y="200" text-anchor="middle" font-size="9" fill="#E8EDE3">业务逻辑 · 用户权限 · 订单流程</text>
  <!-- code icon -->
  <text x="140" y="178" font-size="10" fill="#E8EDE3" font-family="ui-monospace, monospace">&lt;/&gt;</text>
  <!-- processing label -->
  <rect x="446" y="168" width="54" height="18" rx="9" fill="#E8EDE3"/>
  <text x="473" y="181" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">本地+云端</text>

  <!-- L2 - Internal - white fill, g300 #D1CFC5 border -->
  <polygon points="120,226 60,316 500,316 440,226" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="280" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">L2 内部代码</text>
  <text x="280" y="274" text-anchor="middle" font-size="10" fill="#87867F">Internal</text>
  <text x="280" y="290" text-anchor="middle" font-size="9" fill="#87867F">脚手架 · 日志 · 配置解析</text>
  <!-- code icon -->
  <text x="82" y="268" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">&lt;/&gt;</text>
  <!-- processing label -->
  <rect x="502" y="258" width="46" height="18" rx="9" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="525" y="271" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">云端</text>

  <!-- L1 - Public (base, widest) - white fill, border only -->
  <polygon points="60,322 0,420 560,420 500,322" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="280" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#141413" font-family="ui-monospace, monospace">L1 公开代码</text>
  <text x="280" y="374" text-anchor="middle" font-size="10" fill="#87867F">Public</text>
  <text x="280" y="390" text-anchor="middle" font-size="9" fill="#87867F">开源工具 · 标准库 · 通用算法</text>
  <!-- code icon -->
  <text x="22" y="368" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">&lt;/&gt;</text>
  <!-- processing label -->
  <rect x="502" y="358" width="46" height="18" rx="9" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <text x="525" y="371" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">云端</text>

  <!-- Vertical divider line between code icon and label on each tier -->
  <line x1="480" y1="68" x2="480" y2="412" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Source line -->
  <text x="280" y="470" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">混合云 AI 编程架构 · 2025/05/16</text>
</svg>
