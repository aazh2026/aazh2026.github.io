<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 900 520">
  <title>Human-AI Collaboration Loop</title>
  <desc>
    Human researcher提出深刻问题，AI系统探索解空间、尝试构造、验证思路，人类验证发现、提炼洞察、提出下一个问题——形成协作闭环
  </desc>
  <defs>
    <marker id="arrow" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
      <path fill="#d97757" d="m0 0 10 3.5L0 7z"/>
    </marker>
    <filter id="shadow" width="120%" height="120%" x="-10%" y="-10%">
      <feDropShadow dx="2" dy="3" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/>
    </filter>
  </defs>
  <path fill="#faf9f5" d="M0 0h900v520H0z"/>
  <text x="450" y="42" fill="#141413" font-size="18" font-weight="bold" letter-spacing="1" text-anchor="middle">HUMAN-AI COLLABORATION</text>
  <text x="450" y="64" fill="#87867f" font-size="12" letter-spacing=".5" text-anchor="middle">从「工具」到「协作者」的质变</text>
  <path stroke="#d1cfc5" d="M200 74h500"/>
  <circle cx="450" cy="295" r="200" fill="none" stroke="#d1cfc5" stroke-dasharray="8,6" stroke-width="2"/>
  <path fill="none" stroke="#d97757" stroke-width="2.5" marker-end="url(#arrow)" d="M450 95a200 200 0 0 1 185 40"/>
  <rect width="180" height="130" x="60" y="230" fill="#faf9f5" stroke="#141413" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="180" height="32" x="60" y="230" fill="#141413" rx="10"/>
  <path fill="#141413" d="M60 250h180v12H60z"/>
  <text x="150" y="251" fill="#faf9f5" font-size="13" font-weight="bold" letter-spacing="2" text-anchor="middle">HUMAN RESEARCHER</text>
  <circle cx="100" cy="286" r="7" fill="#d97757"/>
  <text x="116" y="291" fill="#141413" font-size="12">提出深刻问题</text>
  <circle cx="100" cy="313" r="7" fill="#d97757"/>
  <text x="116" y="318" fill="#141413" font-size="12">验证AI的发现</text>
  <circle cx="100" cy="340" r="7" fill="#d97757"/>
  <text x="116" y="345" fill="#141413" font-size="12">提炼洞察</text>
  <rect width="180" height="130" x="660" y="230" fill="#faf9f5" stroke="#141413" stroke-width="2" filter="url(#shadow)" rx="10"/>
  <rect width="180" height="32" x="660" y="230" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M660 250h180v12H660z"/>
  <text x="750" y="251" fill="#faf9f5" font-size="13" font-weight="bold" letter-spacing="2" text-anchor="middle">AI SYSTEM</text>
  <circle cx="700" cy="286" r="7" fill="#788c5d"/>
  <text x="716" y="291" fill="#141413" font-size="12">探索解空间</text>
  <circle cx="700" cy="313" r="7" fill="#788c5d"/>
  <text x="716" y="318" fill="#141413" font-size="12">尝试构造</text>
  <circle cx="700" cy="340" r="7" fill="#788c5d"/>
  <text x="716" y="345" fill="#141413" font-size="12">验证思路</text>
  <rect width="240" height="56" x="330" y="267" fill="#d97757" filter="url(#shadow)" rx="28"/>
  <text x="450" y="293" fill="#faf9f5" font-size="13" font-weight="bold" text-anchor="middle">PARADIGM SHIFT</text>
  <text x="450" y="311" fill="#faf9f5" font-size="11" text-anchor="middle">工具 → 协作者</text>
  <rect width="200" height="46" x="350" y="108" fill="#e3dacc" stroke="#87867f" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <text x="450" y="127" fill="#141413" font-size="11" text-anchor="middle">Human: 提出深刻问题</text>
  <text x="450" y="144" fill="#87867f" font-size="10" text-anchor="middle">直觉 · 领域知识 · 重要性判断</text>
  <rect width="200" height="46" x="350" y="436" fill="#e3dacc" stroke="#87867f" stroke-width="1.5" filter="url(#shadow)" rx="8"/>
  <text x="450" y="455" fill="#141413" font-size="11" text-anchor="middle">Human: 提炼洞察</text>
  <text x="450" y="472" fill="#87867f" font-size="10" text-anchor="middle">批判性思维 · 创造性综合</text>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arrow)" d="M240 270q90-50 100-20"/>
  <path fill="none" stroke="#d97757" stroke-width="2" marker-end="url(#arrow)" d="M240 340q80 20 100-20"/>
  <path fill="none" stroke="#788c5d" stroke-width="2" marker-end="url(#arrow)" d="M660 250q-90-30-100-10"/>
  <path fill="none" stroke="#788c5d" stroke-width="2" marker-end="url(#arrow)" d="M660 320q-80 40-100 10"/>
  <text x="450" y="492" fill="#87867f" font-size="10" text-anchor="middle">闭环：每一次「下一个问题」都建立在前一次协作的发现之上</text>
</svg>
