<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="RAG-DD流水线">
  <title>RAG-DD 实时融合流水线</title>
  <desc>RAG-DD的五个阶段：意图解析→知识检索→上下文融合→代码生成→合规验证</desc>
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#D97757"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#141413" letter-spacing="1">RAG-DD 实时融合流水线</text>
  <line x1="180" y1="44" x2="620" y2="44" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Step 1: Intent Parser -->
  <rect x="40" y="65" width="130" height="130" rx="10" fill="#788C5D" opacity="0.15" stroke="#788C5D" stroke-width="2"/>
  <rect x="55" y="80" width="100" height="30" rx="6" fill="#788C5D"/>
  <text x="105" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FAF9F5" font-weight="bold">意图解析器</text>
  <text x="105" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#141413">Intent Parser</text>
  <text x="105" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">提取领域</text>
  <text x="105" y="163" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">操作 · 实体</text>
  <text x="105" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">约束 · 上下文</text>

  <!-- Arrow -->
  <line x1="172" y1="130" x2="200" y2="130" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Knowledge Retrieval -->
  <rect x="204" y="65" width="130" height="130" rx="10" fill="#D97757" opacity="0.15" stroke="#D97757" stroke-width="2"/>
  <rect x="219" y="80" width="100" height="30" rx="6" fill="#D97757"/>
  <text x="269" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FAF9F5" font-weight="bold">知识检索</text>
  <text x="269" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#141413">Knowledge Retrieval</text>
  <text x="269" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">编码规范</text>
  <text x="269" y="163" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">架构模式</text>
  <text x="269" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">业务规则</text>

  <!-- Arrow -->
  <line x1="336" y1="130" x2="364" y2="130" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Context Fusion -->
  <rect x="368" y="65" width="130" height="130" rx="10" fill="#87867F" opacity="0.15" stroke="#87867F" stroke-width="2"/>
  <rect x="383" y="80" width="100" height="30" rx="6" fill="#87867F"/>
  <text x="433" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FAF9F5" font-weight="bold">上下文融合</text>
  <text x="433" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#141413">Context Fusion</text>
  <text x="433" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">意图 + 知识</text>
  <text x="433" y="163" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">组装Prompt</text>
  <text x="433" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">精确Context</text>

  <!-- Arrow -->
  <line x1="500" y1="130" x2="528" y2="130" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Code Generation -->
  <rect x="532" y="65" width="130" height="130" rx="10" fill="#141413" opacity="0.15" stroke="#141413" stroke-width="2"/>
  <rect x="547" y="80" width="100" height="30" rx="6" fill="#141413"/>
  <text x="597" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FAF9F5" font-weight="bold">代码生成</text>
  <text x="597" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#141413">Code Generation</text>
  <text x="597" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">LLM推理</text>
  <text x="597" y="163" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">生成企业代码</text>
  <text x="597" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">符合规范</text>

  <!-- Arrow -->
  <line x1="664" y1="130" x2="692" y2="130" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Compliance Check -->
  <rect x="696" y="65" width="70" height="130" rx="10" fill="#D97757" opacity="0.9"/>
  <text x="731" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#FAF9F5" font-weight="bold">合规</text>
  <text x="731" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#FAF9F5" font-weight="bold">验证</text>
  <text x="731" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#E3DACC">规范</text>
  <text x="731" y="153" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#E3DACC">检查</text>
  <text x="731" y="166" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#E3DACC">通过</text>

  <!-- Output arrow down -->
  <line x1="731" y1="197" x2="731" y2="225" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output box -->
  <rect x="626" y="228" width="210" height="80" rx="8" fill="#788C5D" opacity="0.2" stroke="#788C5D" stroke-width="1.5"/>
  <text x="731" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#141413" font-weight="bold">企业级代码输出</text>
  <text x="731" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#87867F">✓ 符合编码规范</text>
  <text x="731" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#87867F">✓ 遵循架构模式</text>
  <text x="731" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#87867F">✓ 自动应用业务规则</text>

  <!-- Knowledge base on left -->
  <rect x="40" y="228" width="140" height="110" rx="8" fill="#D1CFC5" opacity="0.4" stroke="#87867F" stroke-width="1"/>
  <text x="110" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#141413" font-weight="bold">企业知识库</text>
  <text x="110" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">编码规范 YAML</text>
  <text x="110" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">架构模式库</text>
  <text x="110" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">业务规则集</text>
  <text x="110" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#87867F">历史代码示例</text>
  <line x1="110" y1="318" x2="110" y2="335" stroke="#D97757" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="110" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#D97757">向量检索引擎</text>

  <!-- Footer -->
  <text x="400" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#87867F">不是让AI"学习"企业知识，而是让AI"查阅"企业知识 — 检索成本低，实时融合</text>
</svg>
