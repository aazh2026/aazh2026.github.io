" fill="#87867f" font-family="Georgia, serif" font-size="9" text-anchor="middle">业务规则集</text><text x="110" y="312" fill="#87867f" font-family="Georgia, serif" font-size="9" text-anchor="middle">历史代码示例</text><path stroke="#d97757" stroke-dasharray="3,3" stroke-width="1.5" d="M110 318v17"/><text x="110" y="330" fill="#d97757" font-family="Georgia, serif" font-size="8" text-anchor="middle">向量检索引擎</text><text x="400" y="378" fill="#87867f" font-family="Georgia, serif" font-size="10" text-anchor="middle">不是让AI&quot;学习&quot;企业知识，而是让AI&quot;查阅&quot;企业知识 — 检索成本低，实时融合</text></svg>