<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 决策矩阵：2×2 -->
  <rect width="560" height="220" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">Agent + Human 决策矩阵</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- Row labels: Low/High complexity -->
  <text x="40" y="62" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">低复杂度</text>
  <text x="40" y="132" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">高复杂度</text>

  <!-- Column labels -->
  <text x="175" y="46" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">低出错成本</text>
  <text x="385" y="46" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">高出错成本</text>

  <!-- Cell A: Low complexity + Low error cost → Agent autonomous -->
  <rect x="80" y="52" width="180" height="90" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="2"/>
  <rect x="80" y="52" width="180" height="22" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="170" y="66" text-anchor="middle" font-size="9.5" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">A · Agent 自主处理</text>
  <text x="170" y="90" text-anchor="middle" font-size="10" fill="#141413">Agent 完全自主决策</text>
  <text x="170" y="107" text-anchor="middle" font-size="9" fill="#87867F">无需人类介入</text>
  <text x="170" y="126" text-anchor="middle" font-size="8" fill="#059669">✓ 最优效率</text>

  <!-- Cell B: Low complexity + High error cost → Agent + Human review -->
  <rect x="290" y="52" width="180" height="90" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
  <rect x="290" y="52" width="180" height="22" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="380" y="66" text-anchor="middle" font-size="9.5" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">B · Agent + 人类审核</text>
  <text x="380" y="90" text-anchor="middle" font-size="10" fill="#141413">Agent 执行，人类最终审批</text>
  <text x="380" y="107" text-anchor="middle" font-size="9" fill="#87867F">降低高风险错误</text>
  <text x="380" y="126" text-anchor="middle" font-size="8" fill="#2563EB">⚠ 适度效率</text>

  <!-- Cell C: High complexity + Low error cost → Agent assists, Human decides -->
  <rect x="80" y="148" width="180" height="60" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <rect x="80" y="148" width="180" height="22" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="170" y="162" text-anchor="middle" font-size="9.5" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">C · Agent 辅助 · 人类决策</text>
  <text x="170" y="182" text-anchor="middle" font-size="10" fill="#141413">Agent 提供分析，人类最终决策</text>
  <text x="170" y="198" text-anchor="middle" font-size="9" fill="#87867F">发挥人类判断力</text>

  <!-- Cell D: High complexity + High error cost → Human leads, Agent supports -->
  <rect x="290" y="148" width="180" height="60" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
  <rect x="290" y="148" width="180" height="22" rx="6" fill="#FED7AA" stroke="#EA580C" stroke-width="1"/>
  <text x="380" y="162" text-anchor="middle" font-size="9.5" fill="#EA580C" font-family="ui-monospace, monospace" font-weight="600">D · 人类主导 · Agent 支持</text>
  <text x="380" y="182" text-anchor="middle" font-size="10" fill="#141413">人类主导决策，Agent 提供执行支持</text>
  <text x="380" y="198" text-anchor="middle" font-size="9" fill="#87867F">最严风险控制</text>
</svg>