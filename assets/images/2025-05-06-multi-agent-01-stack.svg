<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 三层 Agent 架构 -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">三层 Agent 协作架构</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/06</text>

  <!-- L1: 协调层 (top) -->
  <rect x="40" y="50" width="480" height="48" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="50" width="480" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="65" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">L1 · 协调层</text>
  <text x="150" y="65" font-size="12" fill="#141413" font-weight="600">Coordinator Agent（1个）</text>
  <text x="60" y="83" font-size="10" fill="#87867F">任务分解 · 结果聚合 · 冲突解决</text>
  <rect x="490" y="60" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="73" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L1</text>

  <!-- Arrow -->
  <line x1="280" y1="98" x2="280" y2="108" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,108 280,116 284,98" fill="#D1CFC5"/>

  <!-- L2: 执行层 (middle) -->
  <rect x="40" y="116" width="480" height="40" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="116" width="480" height="18" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="131" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">L2 · 执行层</text>
  <text x="150" y="131" font-size="12" fill="#141413" font-weight="600">Specialist Agents（3-5个）</text>
  <text x="60" y="148" font-size="10" fill="#87867F">每个 Agent 负责特定子任务</text>
  <rect x="490" y="126" width="18" height="14" rx="9" fill="#2563EB"/>
  <text x="499" y="137" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="ui-monospace, monospace">L2</text>

  <!-- Arrow -->
  <line x1="280" y1="156" x2="280" y2="166" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,166 280,174 284,156" fill="#D1CFC5"/>

  <!-- L3: 工具层 (bottom) -->
  <rect x="40" y="174" width="480" height="20" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="187" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">L3 · 工具层</text>
  <text x="150" y="187" font-size="12" fill="#141413" font-weight="600">External APIs / Services</text>
  <text x="360" y="187" font-size="10" fill="#87867F">数据库 · 搜索引擎 · 计算资源</text>

  <!-- Note -->
  <text x="280" y="200" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">L1 协调 → L2 执行 → L3 调用工具，三层分离实现横向扩展</text>
</svg>