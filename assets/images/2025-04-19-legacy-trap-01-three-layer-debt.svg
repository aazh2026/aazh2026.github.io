<svg xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif" viewBox="0 0 800 520">
  <path d="M0 0h800v520H0z" style="fill:#faf9f5"/>
  <text x="40" y="36" style="fill:#141413;font-size:13px;font-weight:600">遗留系统的三层债务模型</text>
  <text x="40" y="52" style="fill:#87867f;font-size:11px">Three-Layer Debt Model of Legacy Systems: Technical / Cognitive / Contract</text>
  <path fill="#d97757" d="M200 290V150a140 140 0 0 1 133 97Z"/>
  <path fill="#141413" d="m200 290 133-43a140 140 0 1 1-266 0Z"/>
  <path fill="#788c5d" d="M200 290 67 247a140 140 0 0 1 133-97Z"/>
  <circle cx="200" cy="290" r="70" fill="#faf9f5"/>
  <text x="200" y="278" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">遗留系统</text>
  <text x="200" y="296" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">复杂性构成</text>
  <text x="200" y="314" fill="#87867f" font-size="10" text-anchor="middle">Legacy System</text>
  <rect width="380" height="90" x="380" y="100" fill="#d97757" rx="10"/>
  <text x="400" y="126" fill="#faf9f5" font-size="13" font-weight="700">技术债务 Technical Debt — 20%</text>
  <text x="400" y="146" fill="#faf9f5" font-size="11" opacity=".85">过时的技术栈、糟糕的代码结构、缺乏测试</text>
  <text x="400" y="164" fill="#faf9f5" font-size="11" opacity=".85">代码耦合、框架老旧、依赖混乱</text>
  <text x="400" y="182" fill="#141413" font-size="11" font-weight="700">✅ AI 可以帮助解决这部分</text>
  <rect width="380" height="130" x="380" y="200" fill="#141413" rx="10"/>
  <text x="400" y="226" fill="#faf9f5" font-size="13" font-weight="700">认知债务 Cognitive Debt — 60% ⚠️</text>
  <text x="400" y="246" fill="#87867f" font-size="11">业务逻辑的历史沉淀、tribal knowledge</text>
  <text x="400" y="264" fill="#87867f" font-size="11">为什么这个字段要这样计算？</text>
  <text x="400" y="282" fill="#87867f" font-size="11">这个奇怪的逻辑是为了解决什么历史问题？</text>
  <text x="400" y="300" fill="#87867f" font-size="11">存在于退休员工脑中、丢失的文档里</text>
  <text x="400" y="318" fill="#d97757" font-size="11" font-weight="600">❌ AI 不能解决 — 需要人类领域知识</text>
  <rect width="380" height="90" x="380" y="340" fill="#788c5d" fill-opacity=".8" stroke="#788c5d" rx="10"/>
  <text x="400" y="366" fill="#faf9f5" font-size="13" font-weight="700">契约债务 Contract Debt — 20% ⚠️</text>
  <text x="400" y="386" fill="#faf9f5" font-size="11" opacity=".85">与外部系统的隐性契约、边界条件</text>
  <text x="400" y="404" fill="#faf9f5" font-size="11" opacity=".85">未文档化的API行为、批处理时间窗口、第三方集成</text>
  <text x="400" y="422" fill="#e3dacc" font-size="11" font-weight="600">❌ AI 不能解决 — 需要社会工程学</text>
  <rect width="720" height="50" x="40" y="450" fill="#141413" rx="8"/>
  <text x="60" y="474" fill="#d97757" font-size="12" font-weight="700">核心洞察</text>
  <text x="140" y="474" fill="#faf9f5" font-size="12">AI可以处理技术债务（20%），但认知债务（60%）和契约债务（20%）</text>
  <text x="140" y="492" fill="#faf9f5" font-size="12">需要人类的领域知识和社会工程学。这两类债务占遗留系统复杂性的</text>
  <text x="580" y="492" fill="#d97757" font-size="14" font-weight="700">80%</text>
</svg>
