<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-primary { fill: #141413; font-size: 13px; font-weight: 600; }
      .text-secondary { fill: #87867F; font-size: 11px; }
    </style>
  </defs>
  <rect width="800" height="520" class="bg"/>

  <!-- Title -->
  <text x="40" y="36" class="text-primary" font-size="15px">遗留系统的三层债务模型</text>
  <text x="40" y="52" class="text-secondary">Three-Layer Debt Model of Legacy Systems: Technical / Cognitive / Contract</text>

  <!-- Pie chart: center 200, 290, radius 140 -->
  <!-- Technical debt: 20% = 72° from -90° (top) -->
  <!-- Cognitive debt: 60% = 216° -->
  <!-- Contract debt: 20% = 72° -->
  <!-- Starting from -90° (top), going clockwise -->

  <!-- Sectors (approximated with path arcs) -->
  <!-- Technical: -90° to -90+72° = -90° to -18° (Clay #D97757, 20%) -->
  <!-- Cognitive: -18° to -18+216° = -18° to 198° (Slate #141413, 60%) -->
  <!-- Contract: 198° to 270° = -162° to -90° (Olive #788C5D, 20%) -->

  <!-- SVG arc path for pie: M cx,cy L x1,y1 A r,r 0 flag,1 x2,y2 Z -->
  <!-- Technical (20%, Clay): -90° to -18° -->
  <!-- -90°: x=200, y=150; -18°: x=200+140*cos(-18°)=200+133=333, y=290+140*sin(-18°)=290-43=247 -->
  <path d="M 200,290 L 200,150 A 140,140 0 0,1 333,247 Z" fill="#D97757"/>

  <!-- Cognitive (60%, Slate): -18° to 198° -->
  <!-- -18°: 333,247; 198°: x=200+140*cos(198°)=200-133=67, y=290+140*sin(198°)=290-43=247 -->
  <!-- arc flag: sweep 1, large-arc 1 (since 216° > 180°) -->
  <path d="M 200,290 L 333,247 A 140,140 0 1,1 67,247 Z" fill="#141413"/>

  <!-- Contract (20%, Olive): 198° to -90° (270°) -->
  <!-- 198°: 67,247; -90°: 200,150 -->
  <!-- arc: sweep 1, large-arc 0 (72° < 180°) -->
  <path d="M 200,290 L 67,247 A 140,140 0 0,1 200,150 Z" fill="#788C5D"/>

  <!-- Center white circle for donut -->
  <circle cx="200" cy="290" r="70" fill="#FAF9F5"/>

  <!-- Center text in donut hole -->
  <text x="200" y="278" fill="#141413" font-size="13px" font-weight="700" text-anchor="middle">遗留系统</text>
  <text x="200" y="296" fill="#141413" font-size="13px" font-weight="700" text-anchor="middle">复杂性构成</text>
  <text x="200" y="314" fill="#87867F" font-size="10px" text-anchor="middle">Legacy System</text>

  <!-- Legend with details on right side -->
  <!-- Technical Debt -->
  <rect x="380" y="100" width="380" height="90" rx="10" fill="#D97757"/>
  <text x="400" y="126" fill="#FAF9F5" font-size="13px" font-weight="700">技术债务 Technical Debt — 20%</text>
  <text x="400" y="146" fill="#FAF9F5" font-size="11px" opacity="0.85">过时的技术栈、糟糕的代码结构、缺乏测试</text>
  <text x="400" y="164" fill="#FAF9F5" font-size="11px" opacity="0.85">代码耦合、框架老旧、依赖混乱</text>
  <text x="400" y="182" fill="#141413" font-size="11px" font-weight="700">✅ AI 可以帮助解决这部分</text>

  <!-- Cognitive Debt -->
  <rect x="380" y="200" width="380" height="130" rx="10" fill="#141413"/>
  <text x="400" y="226" fill="#FAF9F5" font-size="13px" font-weight="700">认知债务 Cognitive Debt — 60% ⚠️</text>
  <text x="400" y="246" fill="#87867F" font-size="11px">业务逻辑的历史沉淀、tribal knowledge</text>
  <text x="400" y="264" fill="#87867F" font-size="11px">为什么这个字段要这样计算？</text>
  <text x="400" y="282" fill="#87867F" font-size="11px">这个奇怪的逻辑是为了解决什么历史问题？</text>
  <text x="400" y="300" fill="#87867F" font-size="11px">存在于退休员工脑中、丢失的文档里</text>
  <text x="400" y="318" fill="#D97757" font-size="11px" font-weight="600">❌ AI 不能解决 — 需要人类领域知识</text>

  <!-- Contract Debt -->
  <rect x="380" y="340" width="380" height="90" rx="10" fill="#788C5D" fill-opacity="0.8" stroke="#788C5D" stroke-width="1"/>
  <text x="400" y="366" fill="#FAF9F5" font-size="13px" font-weight="700">契约债务 Contract Debt — 20% ⚠️</text>
  <text x="400" y="386" fill="#FAF9F5" font-size="11px" opacity="0.85">与外部系统的隐性契约、边界条件</text>
  <text x="400" y="404" fill="#FAF9F5" font-size="11px" opacity="0.85">未文档化的API行为、批处理时间窗口、第三方集成</text>
  <text x="400" y="422" fill="#E3DACC" font-size="11px" font-weight="600">❌ AI 不能解决 — 需要社会工程学</text>

  <!-- Key insight -->
  <rect x="40" y="450" width="720" height="50" rx="8" fill="#141413"/>
  <text x="60" y="474" fill="#D97757" font-size="12px" font-weight="700">核心洞察</text>
  <text x="140" y="474" fill="#FAF9F5" font-size="12px">AI可以处理技术债务（20%），但认知债务（60%）和契约债务（20%）</text>
  <text x="140" y="492" fill="#FAF9F5" font-size="12px">需要人类的领域知识和社会工程学。这两类债务占遗留系统复杂性的</text>
  <text x="580" y="492" fill="#D97757" font-size="14px" font-weight="700">80%</text>
</svg>