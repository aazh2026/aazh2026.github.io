<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340"><title>RAG确认偏误循环</title><desc>RAG系统如何放大用户确认偏误的循环过程</desc><defs><marker id="arrow4" markerHeight="8" markerWidth="10" orient="auto" refX="9" refY="4"><path fill="#d97757" d="m0 0 10 4L0 8z"/></marker><style>.text-accent,.text-main,.text-secondary{font-family:system-ui,sans-serif}.text-main{fill:#141413}.text-secondary{fill:#87867f}.text-accent{fill:#d97757;font-weight:600}</style></defs><path d="M0 0h680v340H0z" style="fill:#faf9f5"/><text x="340" y="28" class="text-main" font-size="18" font-weight="600" text-anchor="middle">RAG确认偏误的循环</text><g transform="translate(340 170)"><circle r="50" fill="#d97757" opacity=".12"/><circle r="50" fill="none" stroke="#d97757" stroke-width="2"/><circle cy="-15" r="18" fill="#d97757" opacity=".4"/><ellipse cy="22" fill="#d97757" opacity=".4" rx="25" ry="15"/><text y="70" class="text-accent" font-size="12" font-weight="600" text-anchor="middle">用户</text><text y="85" class="text-secondary" font-size="10" text-anchor="middle">带着偏见提问</text></g><g transform="translate(340 55)"><rect width="160" height="44" x="-80" y="-22" fill="#e3dacc" rx="6"/><rect width="160" height="44" x="-80" y="-22" fill="none" stroke="#d1cfc5" rx="6"/><text y="2" class="text-main" font-size="12" text-anchor="middle">RAG检索到</text><text y="18" class="text-accent" font-size="11" text-anchor="middle">支持偏见的内容</text></g><path stroke="#87867f" stroke-dasharray="4,3" stroke-width="1.5" d="M340 85v25"/><text x="15" y="12" class="text-secondary" font-size="9" transform="translate(340 85)">查询</text><path marker-end="url(#arrow4)" d="M420 55q120 0 120 115 0 70-120 70" style="stroke:#d97757;stroke-width:2.5;fill:none"/><g transform="translate(480 240)"><rect width="180" height="44" x="-90" y="-22" fill="#d97757" opacity=".1" rx="6"/><rect width="180" height="44" x="-90" y="-22" fill="none" stroke="#d97757" stroke-width="1.5" rx="6"/><text y="2" class="text-main" font-size="12" text-anchor="middle">RAG生成</text><text y="18" class="text-accent" font-size="11" text-anchor="middle">强化偏见的回答</text></g><path stroke="#87867f" stroke-dasharray="4,3" stroke-width="1.5" d="M480 255H260"/><text x="30" y="-6" class="text-secondary" font-size="9" transform="translate(340 255)">回答</text><g transform="translate(340 295)"><rect width="200" height="36" x="-100" y="-18" fill="#d97757" opacity=".15" rx="6"/><text y="2" class="text-accent" font-size="11" text-anchor="middle">偏见被强化</text><text y="16" class="text-secondary" font-size="10" text-anchor="middle">循环继续，偏见加深</text></g><text class="text-main" font-size="11" font-weight="500" transform="translate(60 170)">结果：</text><text y="18" class="text-secondary" font-size="10" transform="translate(60 170)">RAG成为</text><text y="33" class="text-secondary" font-size="10" transform="translate(60 170)">用户的</text><text y="48" class="text-accent" font-size="12" font-weight="600" transform="translate(60 170)">&quot;回音壁&quot;</text></svg>