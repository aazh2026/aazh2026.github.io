<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" role="img">
  <title>RAG确认偏误循环</title>
  <desc>RAG系统如何放大用户确认偏误的循环过程</desc>

  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-main { fill: #141413; font-family: system-ui, sans-serif; }
      .text-secondary { fill: #87867F; font-family: system-ui, sans-serif; }
      .text-accent { fill: #D97757; font-family: system-ui, sans-serif; font-weight: 600; }
      .arrow { stroke: #D97757; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow4" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#D97757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="340" class="bg"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" class="text-main" font-size="18" font-weight="600">RAG确认偏误的循环</text>

  <!-- Center: User with bias -->
  <g transform="translate(340, 170)">
    <!-- User circle -->
    <circle cx="0" cy="0" r="50" fill="#D97757" opacity="0.12"/>
    <circle cx="0" cy="0" r="50" stroke="#D97757" stroke-width="2" fill="none"/>
    <circle cx="0" cy="-15" r="18" fill="#D97757" opacity="0.4"/>
    <ellipse cx="0" cy="22" rx="25" ry="15" fill="#D97757" opacity="0.4"/>
    <text x="0" y="70" text-anchor="middle" class="text-accent" font-size="12" font-weight="600">用户</text>
    <text x="0" y="85" text-anchor="middle" class="text-secondary" font-size="10">带着偏见提问</text>
  </g>

  <!-- Step 1: RAG检索 (top) -->
  <g transform="translate(340, 55)">
    <rect x="-80" y="-22" width="160" height="44" rx="6" fill="#E3DACC"/>
    <rect x="-80" y="-22" width="160" height="44" rx="6" stroke="#D1CFC5" stroke-width="1" fill="none"/>
    <text x="0" y="2" text-anchor="middle" class="text-main" font-size="12">RAG检索到</text>
    <text x="0" y="18" text-anchor="middle" class="text-accent" font-size="11">支持偏见的内容</text>
  </g>

  <!-- Arrow: User -> RAG search -->
  <g transform="translate(340, 85)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="#87867F" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="15" y="12" class="text-secondary" font-size="9">查询</text>
  </g>

  <!-- Arrow: RAG search -> RAG generate (loop around right) -->
  <path d="M 420 55 Q 540 55 540 170 Q 540 240 420 240" class="arrow" marker-end="url(#arrow4)"/>

  <!-- Step 2: RAG生成 (right) -->
  <g transform="translate(480, 240)">
    <rect x="-90" y="-22" width="180" height="44" rx="6" fill="#D97757" opacity="0.1"/>
    <rect x="-90" y="-22" width="180" height="44" rx="6" stroke="#D97757" stroke-width="1.5" fill="none"/>
    <text x="0" y="2" text-anchor="middle" class="text-main" font-size="12">RAG生成</text>
    <text x="0" y="18" text-anchor="middle" class="text-accent" font-size="11">强化偏见的回答</text>
  </g>

  <!-- Arrow: RAG generate -> User (bottom) -->
  <g transform="translate(340, 255)">
    <line x1="140" y1="0" x2="-80" y2="0" stroke="#87867F" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="30" y="-6" class="text-secondary" font-size="9">回答</text>
  </g>

  <!-- Result label (bottom center) -->
  <g transform="translate(340, 295)">
    <rect x="-100" y="-18" width="200" height="36" rx="6" fill="#D97757" opacity="0.15"/>
    <text x="0" y="2" text-anchor="middle" class="text-accent" font-size="11">偏见被强化</text>
    <text x="0" y="16" text-anchor="middle" class="text-secondary" font-size="10">循环继续，偏见加深</text>
  </g>

  <!-- Side annotation -->
  <g transform="translate(60, 170)">
    <text x="0" y="0" class="text-main" font-size="11" font-weight="500">结果：</text>
    <text x="0" y="18" class="text-secondary" font-size="10">RAG成为</text>
    <text x="0" y="33" class="text-secondary" font-size="10">用户的</text>
    <text x="0" y="48" class="text-accent" font-size="12" font-weight="600">"回音壁"</text>
  </g>
</svg>