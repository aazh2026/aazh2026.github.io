  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">蜜月期 → 临界点 → 失控期</text>
  <path fill="none" stroke="#d1cfc5" stroke-dasharray="4,4" stroke-width="2" d="M60 290q100-5 140-20t100-70 80-100 60-60"/>
  <text x="450" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">成本曲线</text>
  <rect width="180" height="190" x="40" y="68" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <rect width="180" height="28" x="40" y="68" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M40 88h180v8H40z"/>
  <text x="130" y="86" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">阶段一</text>
  <text x="130" y="118" fill="#141413" font-size="14" text-anchor="middle">蜜月期</text>
  <text x="130" y="136" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Honeymoon</text>
  <text x="56" y="160" fill="#141413" font-size="10">使用量稳定增长</text>
  <text x="56" y="176" fill="#141413" font-size="10">成本与使用量成正比</text>
  <text x="56" y="192" fill="#141413" font-size="10">ROI 符合预期</text>
  <circle cx="130" cy="218" r="12" fill="#788c5d" opacity=".2"/>
  <text x="130" y="222" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">可控</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M220 163h28"/>
  <path fill="#d1cfc5" d="m252 163-8-4v8z"/>
  <text x="236" y="156" fill="#87867f" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">临界点</text>
  <rect width="180" height="190" x="256" y="68" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="10"/>
  <rect width="180" height="28" x="256" y="68" fill="#d97757" opacity=".7" rx="10"/>
  <path fill="#d97757" d="M256 88h180v8H256z" opacity=".7"/>
  <text x="346" y="86" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">阶段二</text>
  <text x="346" y="118" fill="#141413" font-size="14" text-anchor="middle">临界点</text>
  <text x="346" y="136" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Tipping Point</text>
  <text x="272" y="160" fill="#141413" font-size="10">成本增速 &gt; 用户增速</text>
  <text x="272" y="176" fill="#141413" font-size="10">单位用户成本上升</text>
  <text x="272" y="192" fill="#141413" font-size="10">&quot;账单怎么了？&quot;</text>
  <text x="272" y="208" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">触发: 功能扩展/用户行为变化/模型升级</text>
  <circle cx="346" cy="218" r="12" fill="#d97757" opacity=".3"/>
  <text x="346" y="222" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">预警</text>
  <path stroke="#d97757" stroke-width="1.5" d="M436 163h28"/>
  <path fill="#d97757" d="m468 163-8-4v8z"/>
  <text x="452" y="156" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">失控</text>
  <rect width="180" height="190" x="472" y="68" fill="#fff" stroke="#d97757" stroke-width="2" rx="10"/>
  <rect width="180" height="28" x="472" y="68" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M472 88h180v8H472z"/>
  <text x="562" y="86" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">阶段三</text>
  <text x="562" y="118" fill="#141413" font-size="14" text-anchor="middle">失控期</text>
  <text x="562" y="136" fill="#d97757" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Out of Control</text>
  <text x="488" y="160" fill="#141413" font-size="10">成本曲线近乎垂直</text>
  <text x="488" y="176" fill="#141413" font-size="10">紧急优化效果有限</text>
  <text x="488" y="192" fill="#141413" font-size="10">质疑 AI 策略可行性</text>
  <text x="488" y="208" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">根因: 架构已深度依赖 AI</text>
  <text x="488" y="222" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">重构成本极高</text>
  <circle cx="562" cy="238" r="12" fill="#d97757"/>
  <text x="562" y="242" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">危险</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M40 300h600"/>
  <circle cx="130" cy="300" r="4" fill="#788c5d"/>
  <circle cx="346" cy="300" r="4" fill="#d97757" opacity=".7"/>
  <circle cx="562" cy="300" r="4" fill="#d97757"/>
  <text x="130" y="316" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">月 1-6</text>
  <text x="346" y="316" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">月 7-9</text>
  <text x="562" y="316" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">月 10+</text>
