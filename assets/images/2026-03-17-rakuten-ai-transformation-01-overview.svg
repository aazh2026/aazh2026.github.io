<svg xmlns="http://www.w3.org/2000/svg" aria-label="Rakuten AI 工具链集成架构" viewBox="0 0 620 560">
  <title>Rakuten AI 工具链集成架构</title>
  <desc>
    Rakuten AI 工具链集成架构图，展示从 IDE 层、代码审查层、CI/CD 层到运维层的完整 AI 增强开发流程
  </desc>
  <style>
    .item,.label{fill:#141413;font-family:system-ui,-apple-system,sans-serif}.label{font-size:12px;font-weight:600}.item{font-size:11.5px}
  </style>
  <rect width="620" height="560" rx="10" style="fill:#faf9f5"/>
  <rect width="618" height="558" x="1" y="1" rx="10" style="stroke:#d1cfc5;stroke-width:1.5;fill:#faf9f5"/>
  <path fill="#d97757" d="M10 10h600v30H10Z"/>
  <rect width="618" height="38" x="1" y="1" fill="#d97757" rx="9.5"/>
  <text x="310" y="29" style="fill:#faf9f5;font-family:ui-serif,Georgia,serif;font-size:13px;font-weight:600" text-anchor="middle">Rakuten AI 工具链</text>
  <g transform="translate(10 50)">
    <path fill="none" stroke="#d1cfc5" d="M0 0h600v105H0z"/>
    <path fill="#e3dacc" d="M0 0h600v105H0z" opacity=".5"/>
    <rect width="120" height="22" x="2" y="2" fill="#788c5d" opacity=".85" rx="3"/>
    <text x="62" y="17" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">IDE 层</text>
    <text x="135" y="17" class="label">Cursor / VS Code + AI 插件</text>
    <text x="15" y="45" class="item">• 代码补全</text>
    <text x="15" y="65" class="item">• 代码生成</text>
    <text x="15" y="85" class="item">• Inline 聊天</text>
    <path stroke="#d1cfc5" d="M600 0v105"/>
  </g>
  <g transform="translate(10 157)">
    <path fill="none" stroke="#d1cfc5" d="M0 0h600v105H0z"/>
    <path fill="#e3dacc" d="M0 0h600v105H0z" opacity=".5"/>
    <rect width="130" height="22" x="2" y="2" fill="#788c5d" opacity=".85" rx="3"/>
    <text x="67" y="17" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">代码审查层</text>
    <text x="145" y="17" class="label">AI 预审查</text>
    <text x="15" y="45" class="item">• 自动检查常见错误</text>
    <text x="15" y="65" class="item">• 风格一致性检查</text>
    <text x="15" y="85" class="item">• 安全漏洞扫描</text>
    <path stroke="#d1cfc5" d="M600 0v105"/>
  </g>
  <g transform="translate(10 264)">
    <path fill="none" stroke="#d1cfc5" d="M0 0h600v105H0z"/>
    <path fill="#e3dacc" d="M0 0h600v105H0z" opacity=".5"/>
    <rect width="100" height="22" x="2" y="2" fill="#788c5d" opacity=".85" rx="3"/>
    <text x="52" y="17" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">CI/CD 层</text>
    <text x="115" y="17" class="label">AI 增强流水线</text>
    <text x="15" y="45" class="item">• 自动化测试生成</text>
    <text x="15" y="65" class="item">• 智能回归测试</text>
    <text x="15" y="85" class="item">• 部署影响分析</text>
    <path stroke="#d1cfc5" d="M600 0v105"/>
  </g>
  <g transform="translate(10 371)">
    <path fill="none" stroke="#d1cfc5" d="M0 0h600v105H0z"/>
    <path fill="#e3dacc" d="M0 0h600v105H0z" opacity=".5"/>
    <rect width="80" height="22" x="2" y="2" fill="#788c5d" opacity=".85" rx="3"/>
    <text x="42" y="17" fill="#faf9f5" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">运维层</text>
    <text x="95" y="17" class="label">AI 辅助监控</text>
    <text x="15" y="45" class="item">• 异常检测</text>
    <text x="15" y="65" class="item">• 根因分析</text>
    <text x="15" y="85" class="item">• 自动修复建议</text>
  </g>
  <rect width="618" height="558" x="1" y="1" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="9.5"/>
</svg>
