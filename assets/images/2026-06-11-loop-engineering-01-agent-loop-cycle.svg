<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#87867F"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="520" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#141413" letter-spacing="0.5">Agent Loop Cycle — 五组件闭环</text>
  <text x="400" y="58" text-anchor="middle" font-size="11" fill="#87867F">Loop Engineering: 从操作者到设计师的范式转移</text>

  <!-- Outer loop ring -->
  <circle cx="400" cy="275" r="190" fill="none" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Center: Goal -->
  <circle cx="400" cy="275" r="52" fill="#141413" filter="url(#shadow)"/>
  <text x="400" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">目标</text>
  <text x="400" y="284" text-anchor="middle" font-size="11" fill="#D1CFC5">Goal</text>
  <text x="400" y="298" text-anchor="middle" font-size="9" fill="#87867F">锚点 · 可验证</text>

  <!-- 5 component nodes around the circle -->
  <!-- Node 1: Action (top) -->
  <circle cx="400" cy="95" r="40" fill="#D97757" filter="url(#shadow)"/>
  <text x="400" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">行动</text>
  <text x="400" y="105" text-anchor="middle" font-size="10" fill="#FAF9F5" opacity="0.85">Action</text>

  <!-- Node 2: Observation (top-right) -->
  <circle cx="572" cy="158" r="40" fill="#788C5D" filter="url(#shadow)"/>
  <text x="572" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">观察</text>
  <text x="572" y="168" text-anchor="middle" font-size="10" fill="#FAF9F5" opacity="0.85">Observation</text>

  <!-- Node 3: Evaluation (bottom-right) -->
  <circle cx="572" cy="392" r="40" fill="#D97757" filter="url(#shadow)"/>
  <text x="572" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">评估</text>
  <text x="572" y="402" text-anchor="middle" font-size="10" fill="#FAF9F5" opacity="0.85">Evaluation</text>

  <!-- Node 4: Revision (bottom-left) -->
  <circle cx="228" cy="392" r="40" fill="#788C5D" filter="url(#shadow)"/>
  <text x="228" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#FAF9F5">修正</text>
  <text x="228" y="402" text-anchor="middle" font-size="10" fill="#FAF9F5" opacity="0.85">Revision</text>

  <!-- Node 5: Tools / Context (top-left) -->
  <circle cx="228" cy="158" r="40" fill="#E3DACC" filter="url(#shadow)"/>
  <text x="228" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#141413">上下文</text>
  <text x="228" y="164" text-anchor="middle" font-size="10" fill="#141413" opacity="0.8">Context</text>
  <text x="228" y="176" text-anchor="middle" font-size="9" fill="#141413" opacity="0.6">+ Tools</text>

  <!-- Arrows: Goal to Action -->
  <path d="M 400 223 L 400 137" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="420" y="180" font-size="9" fill="#87867F">指令</text>

  <!-- Arrows: Action to Observation -->
  <path d="M 435 103 L 548 146" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="112" font-size="9" fill="#87867F">结果</text>

  <!-- Arrows: Observation to Evaluation -->
  <path d="M 592 197 L 592 354" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="605" y="280" font-size="9" fill="#87867F">状态</text>

  <!-- Arrows: Evaluation to Revision -->
  <path d="M 548 415 L 267 415" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="408" y="430" font-size="9" fill="#87867F">偏差</text>

  <!-- Arrows: Revision to Goal -->
  <path d="M 228 353 L 352 228" stroke="#87867F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="258" y="295" font-size="9" fill="#87867F">调整</text>

  <!-- Stop Conditions label (outside ring) -->
  <rect x="620" y="258" width="148" height="38" rx="6" fill="#E3DACC" filter="url(#shadow)"/>
  <text x="694" y="274" text-anchor="middle" font-size="10" font-weight="700" fill="#141413">停止条件</text>
  <text x="694" y="288" text-anchor="middle" font-size="9" fill="#87867F">Stop Conditions</text>

  <!-- Bottom annotation -->
  <rect x="80" y="460" width="640" height="44" rx="6" fill="#E3DACC"/>
  <text x="400" y="477" text-anchor="middle" font-size="10" fill="#141413">工程师的位置：从循环内操作者 → 循环外设计师</text>
  <text x="400" y="493" text-anchor="middle" font-size="9" fill="#87867F">定义目标 · 设计上下文 · 选择工具 · 设计评估 · 设置停止条件</text>
</svg>