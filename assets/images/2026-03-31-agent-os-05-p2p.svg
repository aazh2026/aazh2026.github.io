<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- P2P Agent 协作 -->
  <rect width="560" height="160" fill="#FAF9F5"/>
  <text x="280" y="18" text-anchor="middle" font-size="12" font-weight="500" fill="#141413" letter-spacing="-0.02em">平等协作（Peer-to-Peer）模式</text>
  <text x="280" y="32" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/31</text>

  <!-- Four agents in 2×2 grid with all-to-all connections -->
  <!-- Agent A (top-left) -->
  <rect x="80" y="54" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.8"/>
  <rect x="80" y="54" width="100" height="16" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="130" y="67" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Agent A</text>
  <text x="130" y="87" text-anchor="middle" font-size="9" fill="#141413">任务协调</text>
  <text x="130" y="100" text-anchor="middle" font-size="8" fill="#87867F">自主通信</text>

  <!-- Agent B (top-right) -->
  <rect x="380" y="54" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.8"/>
  <rect x="380" y="54" width="100" height="16" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="430" y="67" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Agent B</text>
  <text x="430" y="87" text-anchor="middle" font-size="9" fill="#141413">数据处理</text>
  <text x="430" y="100" text-anchor="middle" font-size="8" fill="#87867F">自主通信</text>

  <!-- Agent C (bottom-left) -->
  <rect x="80" y="120" width="100" height="32" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="80" y="120" width="100" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="130" y="133" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Agent C</text>
  <text x="130" y="148" text-anchor="middle" font-size="9" fill="#141413">信息检索</text>

  <!-- Agent D (bottom-right) -->
  <rect x="380" y="120" width="100" height="32" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="380" y="120" width="100" height="14" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="430" y="133" text-anchor="middle" font-size="10" fill="#2563EB" font-family="ui-monospace, monospace" font-weight="600">Agent D</text>
  <text x="430" y="148" text-anchor="middle" font-size="9" fill="#141413">执行操作</text>

  <!-- All-to-all connection lines -->
  <!-- A → B -->
  <line x1="180" y1="82" x2="380" y2="82" stroke="#D1CFC5" stroke-width="1"/>
  <polygon points="376,78 380,82 376,86" fill="#D1CFC5"/>
  <!-- A → C -->
  <line x1="130" y1="109" x2="130" y2="120" stroke="#D1CFC5" stroke-width="1"/>
  <!-- A → D -->
  <line x1="180" y1="100" x2="380" y2="136" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- B → D -->
  <line x1="430" y1="109" x2="430" y2="120" stroke="#D1CFC5" stroke-width="1"/>
  <!-- C → D -->
  <line x1="180" y1="136" x2="380" y2="136" stroke="#D1CFC5" stroke-width="1"/>
  <polygon points="376,132 380,136 376,140" fill="#D1CFC5"/>
  <!-- B → C -->
  <line x1="180" y1="82" x2="380" y2="136" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="280" y="155" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">Agent 间自主协商，无需中心协调节点</text>
</svg>