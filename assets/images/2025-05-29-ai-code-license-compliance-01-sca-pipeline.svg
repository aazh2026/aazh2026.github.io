<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 800 500">
  <defs>
    <style>
      .label,.label-sm{fill:#141413;font-size:13px;font-weight:600}.label-sm{font-size:11px;font-weight:500}.desc{fill:#87867f;font-size:11px}.desc-white{fill:rgba(255,255,255,.85);font-size:11px}.white{fill:#fff}.accent-clay{fill:#d97757}
    </style>
  </defs>
  <path d="M0 0h800v500H0z" style="fill:#faf9f5"/>
  <text x="40" y="38" style="fill:#141413;font-size:20px;font-weight:700">AI 增强 SCA 流程：代码溯源与风险标记</text>
  <text x="40" y="58" style="fill:#87867f;font-size:12px">传统 SCA 依赖 manifest，AI-SCA 直接分析代码并标记 License 风险</text>
  <text x="40" y="90" class="label">传统 SCA vs AI 增强 SCA</text>
  <rect width="330" height="100" x="40" y="104" fill="#e3dacc" rx="8"/>
  <rect width="330" height="100" x="40" y="104" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="56" y="124" class="label-sm">传统 SCA</text>
  <text x="56" y="140" class="desc">依赖 manifest 文件 · 精确匹配 · 已知组件</text>
  <rect width="60" height="44" x="56" y="150" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="86" y="170" class="desc" text-anchor="middle">代码</text>
  <text x="86" y="186" class="desc" text-anchor="middle">输入</text>
  <path stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow)" d="M116 172h24"/>
  <rect width="80" height="44" x="140" y="150" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="180" y="170" class="desc" text-anchor="middle">依赖分析</text>
  <text x="180" y="186" class="desc" text-anchor="middle">manifest</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M220 172h24"/>
  <rect width="80" height="44" x="244" y="150" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="284" y="170" class="desc" text-anchor="middle">License</text>
  <text x="284" y="186" class="desc" text-anchor="middle">数据库</text>
  <rect width="330" height="130" x="40" y="218" fill="#e3dacc" rx="8"/>
  <rect width="330" height="130" x="40" y="218" fill="none" stroke="#d97757" stroke-width="2" rx="8"/>
  <text x="56" y="238" class="label-sm accent-clay">AI 增强 SCA ✦</text>
  <text x="56" y="254" class="desc">直接分析代码 · 模糊相似度检测 · AI 生成代码溯源</text>
  <rect width="70" height="52" x="56" y="264" fill="#d97757" rx="6"/>
  <text x="91" y="285" class="label-sm white" text-anchor="middle">AI 生成</text>
  <text x="91" y="301" class="label-sm white" text-anchor="middle">代码</text>
  <path stroke="#d97757" stroke-width="1.5" d="M126 290h24"/>
  <rect width="76" height="52" x="150" y="264" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="188" y="283" class="desc" text-anchor="middle">代码指纹</text>
  <text x="188" y="297" class="desc" text-anchor="middle">AST+语义</text>
  <text x="188" y="311" class="desc" text-anchor="middle">特征提取</text>
  <path stroke="#d97757" stroke-width="1.5" d="M226 290h24"/>
  <rect width="76" height="52" x="250" y="264" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="288" y="283" class="desc" text-anchor="middle">开源代码</text>
  <text x="288" y="297" class="desc" text-anchor="middle">指纹库</text>
  <text x="288" y="311" class="desc" text-anchor="middle">相似度比对</text>
  <text x="410" y="90" class="label">License 风险等级</text>
  <rect width="350" height="28" x="410" y="108" fill="#141413" rx="6"/>
  <text x="425" y="126" class="label-sm white">License</text>
  <text x="510" y="126" class="label-sm white">类型</text>
  <text x="585" y="126" class="label-sm white">风险</text>
  <text x="665" y="126" class="label-sm white">主要义务</text>
  <rect width="350" height="44" x="410" y="140" fill="#d97757" rx="0"/>
  <rect width="350" height="44" x="410" y="140" fill="#d97757" rx="6"/>
  <text x="425" y="162" class="label-sm white">AGPL</text>
  <text x="510" y="158" class="desc-white">超强 Copyleft</text>
  <text x="585" y="162" class="label-sm white">🔴 极高</text>
  <text x="665" y="162" class="desc-white">网络使用也开源</text>
  <rect width="350" height="44" x="410" y="186" fill="#e3dacc" rx="0"/>
  <rect width="350" height="44" x="410" y="186" fill="#e3dacc" rx="0"/>
  <rect width="350" height="44" x="410" y="186" fill="#e3dacc" rx="6"/>
  <path fill="none" stroke="#d1cfc5" d="M410 186h350v44H410z"/>
  <text x="425" y="208" class="label-sm">GPL v2/v3</text>
  <text x="510" y="204" class="desc">强 Copyleft</text>
  <text x="585" y="208" class="label-sm accent-clay">🔴 高</text>
  <text x="665" y="208" class="desc">衍生作品需开源</text>
  <rect width="350" height="44" x="410" y="232" fill="#e3dacc" rx="0"/>
  <rect width="350" height="44" x="410" y="232" fill="#e3dacc" rx="0"/>
  <rect width="350" height="44" x="410" y="232" fill="#e3dacc" rx="6"/>
  <path fill="none" stroke="#d1cfc5" d="M410 232h350v44H410z"/>
  <text x="425" y="254" class="label-sm">LGPL</text>
  <text x="510" y="250" class="desc">弱 Copyleft</text>
  <text x="585" y="254" fill="#e3a000" class="label-sm">🟡 中</text>
  <text x="665" y="254" class="desc">修改需开源</text>
  <rect width="350" height="44" x="410" y="278" fill="#faf9f5" stroke="#d1cfc5" rx="6"/>
  <text x="425" y="300" class="label-sm">MIT / Apache 2.0 / BSD</text>
  <text x="510" y="296" class="desc">宽松</text>
  <text x="585" y="300" fill="#788c5d" class="label-sm">🟢 低</text>
  <text x="665" y="300" class="desc">保留版权声明</text>
  <text x="40" y="370" class="label">AI 代码溯源流程</text>
  <rect width="170" height="80" x="40" y="384" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="56" y="406" class="label-sm">Step 1：生成代码指纹</text>
  <text x="56" y="424" class="desc">AST 特征提取</text>
  <text x="56" y="440" class="desc">N-gram 签名</text>
  <text x="56" y="456" class="desc">语义哈希</text>
  <path stroke="#d97757" stroke-width="2" marker-end="url(#arrowRed)" d="M210 424h30"/>
  <rect width="170" height="80" x="250" y="384" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="266" y="406" class="label-sm">Step 2：比对开源指纹库</text>
  <text x="266" y="424" class="desc">GitHub 公开代码</text>
  <text x="266" y="440" class="desc">相似度 &gt; 70% 标记</text>
  <text x="266" y="456" class="desc">识别潜在来源</text>
  <path stroke="#d97757" stroke-width="2" d="M420 424h30"/>
  <rect width="170" height="80" x="460" y="384" fill="#d97757" rx="8"/>
  <text x="476" y="406" class="label-sm white">Step 3：风险评估</text>
  <text x="476" y="424" class="desc-white">GPL/AGPL → CRITICAL</text>
  <text x="476" y="440" class="desc-white">相似度 &gt; 90% → HIGH</text>
  <text x="476" y="456" class="desc-white">触发 IDE 告警 + CI 阻断</text>
  <text x="40" y="490" class="desc">AI 生成的代码可能携带开源代码的 License 基因，预防胜于治疗</text>
  <text x="680" y="490" class="desc">AI-Native 软件工程系列 #48</text>
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#d1cfc5" d="M0 0v6l8-3z"/>
    </marker>
    <marker id="arrowRed" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#d97757" d="M0 0v6l8-3z"/>
    </marker>
  </defs>
</svg>
