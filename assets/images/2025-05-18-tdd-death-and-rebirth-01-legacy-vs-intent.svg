<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="620" height="300" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="310" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">TDD 到 AI-DD：范式转移</text>
  <text x="310" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Kent Beck 1999 · 2026</text>

  <!-- Left column: Legacy TDD -->
  <rect x="40" y="62" width="210" height="170" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="145" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#87867F" font-family="ui-monospace, monospace">传统 TDD</text>

  <!-- Loop icon: three small arrows in circle -->
  <circle cx="145" cy="145" r="38" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <!-- Arrow 1: top -->
  <line x1="145" y1="110" x2="145" y2="120" stroke="#87867F" stroke-width="1.5"/>
  <polygon points="145,124 141,116 149,116" fill="#87867F"/>
  <text x="145" y="104" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">测试</text>
  <!-- Arrow 2: bottom right -->
  <line x1="178" y1="142" x2="168" y2="148" stroke="#87867F" stroke-width="1.5"/>
  <polygon points="162,151 170,144 173,153" fill="#87867F"/>
  <text x="185" y="160" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">代码</text>
  <!-- Arrow 3: bottom left -->
  <line x1="112" y1="148" x2="122" y2="142" stroke="#87867F" stroke-width="1.5"/>
  <polygon points="128,151 120,144 117,153" fill="#87867F"/>
  <text x="105" y="160" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">重构</text>

  <!-- Label below loop -->
  <text x="145" y="202" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">红 · 绿 · 重构</text>
  <text x="145" y="218" text-anchor="middle" font-size="9.5" fill="#87867F">验证正确性</text>

  <!-- Center dashed arrow -->
  <line x1="260" y1="148" x2="345" y2="148" stroke="#D97757" stroke-width="1.8" stroke-dasharray="5,4"/>
  <polygon points="355,148 345,143 345,153" fill="#D97757"/>
  <text x="310" y="136" text-anchor="middle" font-size="9.5" fill="#D97757" font-family="ui-monospace, monospace">范式转移</text>

  <!-- Right column: Intent-Driven Development -->
  <rect x="370" y="62" width="210" height="170" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="475" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">AI-DD 新范式</text>

  <!-- Larger loop: 意图 → AI → 验证 -->
  <circle cx="475" cy="145" r="44" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <!-- Arrow 1: top → right (意图→AI) -->
  <line x1="475" y1="104" x2="498" y2="133" stroke="#D97757" stroke-width="1.8"/>
  <polygon points="505,138 496,130 502,126" fill="#D97757"/>
  <text x="500" y="96" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">意图</text>
  <!-- Arrow 2: right → bottom left (AI→验证) -->
  <line x1="498" y1="159" x2="452" y2="181" stroke="#788C5D" stroke-width="1.8"/>
  <polygon points="444,183 454,177 455,187" fill="#788C5D"/>
  <text x="516" y="175" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">AI生成</text>
  <!-- Arrow 3: bottom left → top (验证→意图) -->
  <line x1="436" y1="138" x2="460" y2="115" stroke="#141413" stroke-width="1.5"/>
  <polygon points="460,109 455,119 466,118" fill="#141413"/>
  <text x="430" y="188" text-anchor="middle" font-size="9" fill="#141413" font-family="ui-monospace, monospace">契约验证</text>

  <!-- Label below loop -->
  <text x="475" y="202" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace">意图 · AI · 契约</text>
  <text x="475" y="218" text-anchor="middle" font-size="9.5" fill="#141413">约束意图表达</text>

  <!-- Bottom row: three small cards showing what changed -->
  <rect x="40" y="250" width="160" height="38" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="120" y="267" text-anchor="middle" font-size="9.5" fill="#87867F">测试 = 稀缺资源</text>
  <text x="120" y="281" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">Kent Beck, 1999</text>

  <rect x="230" y="250" width="160" height="38" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="310" y="267" text-anchor="middle" font-size="9.5" fill="#87867F">人类写 → 人+AI协作</text>
  <text x="310" y="281" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">过渡期 2022-2025</text>

  <rect x="420" y="250" width="160" height="38" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="500" y="267" text-anchor="middle" font-size="9.5" fill="#D97757">契约语言 = 测试</text>
  <text x="500" y="281" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">AI-DD 2026+</text>

  <title>TDD 到 AI-DD：范式转移</title>
  <desc>左列展示Kent Beck 1999年提出的传统TDD循环：测试→代码→重构。右列展示2026年AI-DD新范式：意图→AI生成→契约验证，标注范式转移过程。</desc>
</svg>
