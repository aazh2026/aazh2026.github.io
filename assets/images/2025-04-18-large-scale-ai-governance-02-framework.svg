<svg viewBox="0 0 620 260" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="620" height="260" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="310" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI 工程治理框架</text>
  <text x="310" y="38" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/04/18</text>

  <!-- Pillar 1: 工具标准化 (left) -->
  <rect x="30" y="60" width="160" height="130" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="30" y="60" width="160" height="22" rx="8" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="110" y="76" text-anchor="middle" font-size="10.5" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">工具标准化</text>
  <text x="110" y="95" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">Standardization</text>
  <line x1="50" y1="104" x2="170" y2="104" stroke="#D1CFC5" stroke-width="1"/>
  <text x="110" y="120" text-anchor="middle" font-size="9" fill="#87867F">统一采购 Cursor 企业版</text>
  <text x="110" y="135" text-anchor="middle" font-size="9" fill="#87867F">禁止未审核工具</text>
  <text x="110" y="150" text-anchor="middle" font-size="9" fill="#87867F">工具减少：50 → 3 种</text>
  <rect x="70" y="160" width="80" height="20" rx="10" fill="#788C5D" opacity="0.15"/>
  <text x="110" y="174" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">CI/CD 自动化检查</text>

  <!-- Pillar 2: Prompt规范化 (center, taller) -->
  <rect x="210" y="50" width="200" height="150" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="210" y="50" width="200" height="24" rx="8" fill="#D97757" stroke="#D97757" stroke-width="1"/>
  <text x="310" y="68" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">Prompt 规范化</text>
  <text x="310" y="88" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">Prompt Standardization</text>
  <line x1="230" y1="98" x2="390" y2="98" stroke="#D1CFC5" stroke-width="1"/>
  <text x="310" y="116" text-anchor="middle" font-size="9.5" fill="#141413">建立 10 个核心 Prompt 模板</text>
  <text x="310" y="132" text-anchor="middle" font-size="9.5" fill="#141413">强制使用标准模板</text>
  <text x="310" y="148" text-anchor="middle" font-size="9.5" fill="#141413">可微调，需团队审核</text>
  <text x="310" y="164" text-anchor="middle" font-size="9" fill="#87867F">新模板需 AI CoE 审核</text>
  <rect x="250" y="172" width="120" height="20" rx="10" fill="#D97757" opacity="0.12"/>
  <text x="310" y="186" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">代码风格一致性 60%→90%</text>

  <!-- Pillar 3: 代码溯源 (right) -->
  <rect x="430" y="60" width="160" height="130" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="430" y="60" width="160" height="22" rx="8" fill="#E8F0E8" stroke="#788C5D" stroke-width="1"/>
  <text x="510" y="76" text-anchor="middle" font-size="10.5" fill="#788C5D" font-family="ui-monospace, monospace" font-weight="600">代码溯源</text>
  <text x="510" y="95" text-anchor="middle" font-size="9.5" fill="#141413" font-weight="600">Traceability</text>
  <line x1="450" y1="104" x2="570" y2="104" stroke="#D1CFC5" stroke-width="1"/>
  <text x="510" y="120" text-anchor="middle" font-size="9" fill="#87867F">AI-GENERATED 标记</text>
  <text x="510" y="135" text-anchor="middle" font-size="9" fill="#87867F">决策记录制度</text>
  <text x="510" y="150" text-anchor="middle" font-size="9" fill="#87867F">变更追踪系统</text>
  <rect x="470" y="160" width="80" height="20" rx="10" fill="#788C5D" opacity="0.15"/>
  <text x="510" y="174" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">100% 可溯源</text>

  <!-- Bottom: Arrow and Results -->
  <line x1="310" y1="200" x2="310" y2="215" stroke="#D97757" stroke-width="1.5"/>
  <polygon points="310,220 305,212 315,212" fill="#D97757"/>
  <text x="310" y="210" text-anchor="middle" font-size="8" fill="#87867F" font-family="ui-monospace, monospace">治理框架</text>

  <!-- Result box -->
  <rect x="160" y="225" width="300" height="28" rx="14" fill="#D97757" opacity="0.1" stroke="#D97757" stroke-width="1.5"/>
  <text x="310" y="243" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">效率提升 50%  ·  质量稳定  ·  创新加速</text>
</svg>
