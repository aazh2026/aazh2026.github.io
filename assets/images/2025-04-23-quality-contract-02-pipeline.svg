<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#141413">Quality Contract → Automated Test Pipeline</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#87867F">From structured YAML contract to multi-layer test generation — zero manual translation</text>

  <!-- Input: Quality Contract YAML -->
  <g transform="translate(40, 85)" filter="url(#shadow3)">
    <rect width="180" height="240" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <rect width="180" height="28" rx="8" fill="#788C5D"/>
    <rect y="16" width="180" height="12" fill="#788C5D"/>
    <text x="90" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="white">Quality Contract</text>
    <text x="90" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="white">Quality Contract</text>

    <text x="12" y="50" font-size="10" fill="#87867F">functional:</text>
    <text x="12" y="64" font-size="9" fill="#141413">  acceptance_criteria:</text>
    <text x="24" y="78" font-size="9" fill="#141413">    - id: AC-001</text>
    <text x="36" y="90" font-size="9" fill="#141413">      when: create order</text>
    <text x="36" y="102" font-size="9" fill="#141413">      then:</text>
    <text x="48" y="114" font-size="9" fill="#141413">        - status: pending</text>

    <text x="12" y="136" font-size="10" fill="#87867F">performance:</text>
    <text x="24" y="150" font-size="9" fill="#141413">  latency_p95: &lt; 200ms</text>
    <text x="24" y="162" font-size="9" fill="#141413">  error_rate: &lt; 0.1%</text>

    <text x="12" y="184" font-size="10" fill="#87867F">security:</text>
    <text x="24" y="198" font-size="9" fill="#141413">  auth: jwt_required</text>
    <text x="24" y="210" font-size="9" fill="#141413">  input_validation: strict</text>

    <text x="12" y="232" font-size="10" fill="#87867F">compliance:</text>
    <text x="24" y="246" font-size="9" fill="#141413">  audit_log: required</text>
    <text x="24" y="258" font-size="9" fill="#141413">  retention: 7_years</text>
    <text x="24" y="270" font-size="9" fill="#141413">  gdpr: enforced</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="205" x2="260" y2="205" stroke="#D1CFC5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="255,200 268,205 255,210" fill="#D1CFC5"/>
  <text x="240" y="195" text-anchor="middle" font-size="10" fill="#87867F">compile</text>

  <!-- Contract Compiler -->
  <g transform="translate(270, 140)" filter="url(#shadow3)">
    <rect width="140" height="130" rx="10" fill="#141413"/>
    <text x="70" y="45" text-anchor="middle" font-size="14" font-weight="700" fill="white">Contract</text>
    <text x="70" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="white">Compiler</text>
    <line x1="30" y1="80" x2="110" y2="80" stroke="#D1CFC5" stroke-width="1"/>
    <text x="70" y="98" text-anchor="middle" font-size="10" fill="#D1CFC5">YAML → AST</text>
    <text x="70" y="114" text-anchor="middle" font-size="10" fill="#D1CFC5">AST → Test Code</text>
    <text x="70" y="130" text-anchor="middle" font-size="10" fill="#D1CFC5">Schema Validation</text>
  </g>

  <!-- Arrow -->
  <line x1="410" y1="205" x2="450" y2="205" stroke="#D1CFC5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="445,200 458,205 445,210" fill="#D1CFC5"/>
  <text x="430" y="195" text-anchor="middle" font-size="10" fill="#87867F">generate</text>

  <!-- Generated Test Types -->
  <g transform="translate(460, 80)" filter="url(#shadow3)">
    <rect width="400" height="280" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
    <text x="200" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#141413">Generated Test Suite</text>
    <line x1="20" y1="36" x2="380" y2="36" stroke="#D1CFC5" stroke-width="1"/>

    <!-- Functional Tests -->
    <g transform="translate(20, 48)">
      <rect width="170" height="100" rx="6" fill="#E3DACC"/>
      <rect width="170" height="22" rx="6" fill="#788C5D"/>
      <rect y="16" width="170" height="6" fill="#788C5D"/>
      <text x="85" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="white">Functional Tests</text>
      <text x="85" y="44" text-anchor="middle" font-size="9" fill="#141413">pytest / JUnit / Jest</text>
      <text x="10" y="62" font-size="9" fill="#87867F">• Happy path coverage</text>
      <text x="10" y="76" font-size="9" fill="#87867F">• Boundary conditions</text>
      <text x="10" y="90" font-size="9" fill="#87867F">• Error handling cases</text>
    </g>

    <!-- Performance Tests -->
    <g transform="translate(210, 48)">
      <rect width="170" height="100" rx="6" fill="#E3DACC"/>
      <rect width="170" height="22" rx="6" fill="#D97757"/>
      <rect y="16" width="170" height="6" fill="#D97757"/>
      <text x="85" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="white">Performance Tests</text>
      <text x="85" y="44" text-anchor="middle" font-size="9" fill="#141413">k6 / JMeter / Locust</text>
      <text x="10" y="62" font-size="9" fill="#87867F">• Latency p50/p95/p99</text>
      <text x="10" y="76" font-size="9" fill="#87867F">• Throughput (rps)</text>
      <text x="10" y="90" font-size="9" fill="#87867F">• Load + stress tests</text>
    </g>

    <!-- Security Tests -->
    <g transform="translate(20, 160)">
      <rect width="170" height="100" rx="6" fill="#E3DACC"/>
      <rect width="170" height="22" rx="6" fill="#141413"/>
      <rect y="16" width="170" height="6" fill="#141413"/>
      <text x="85" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="white">Security Tests</text>
      <text x="85" y="44" text-anchor="middle" font-size="9" fill="#141413">OWASP ZAP / Burp</text>
      <text x="10" y="62" font-size="9" fill="#87867F">• SQL/XSS injection</text>
      <text x="10" y="76" font-size="9" fill="#87867F">• Auth/Authz validation</text>
      <text x="10" y="90" font-size="9" fill="#87867F">• Input sanitization</text>
    </g>

    <!-- Compliance Reports -->
    <g transform="translate(210, 160)">
      <rect width="170" height="100" rx="6" fill="#E3DACC"/>
      <rect width="170" height="22" rx="6" fill="#87867F"/>
      <rect y="16" width="170" height="6" fill="#87867F"/>
      <text x="85" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="white">Compliance Reports</text>
      <text x="85" y="44" text-anchor="middle" font-size="9" fill="#141413">Audit trail + PDF/HTML</text>
      <text x="10" y="62" font-size="9" fill="#87867F">• GDPR checks</text>
      <text x="10" y="76" font-size="9" fill="#87867F">• PCI-DSS validation</text>
      <text x="10" y="90" font-size="9" fill="#87867F">• Data retention proof</text>
    </g>
  </g>

  <!-- Key Insight Box -->
  <g transform="translate(40, 390)" filter="url(#shadow3)">
    <rect width="820" height="110" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
    <text x="410" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#788C5D">Key Insight: Triple Translation Eliminated</text>
    <line x1="40" y1="34" x2="780" y2="34" stroke="#E3DACC" stroke-width="1"/>

    <g transform="translate(60, 48)">
      <text x="0" y="0" font-size="11" font-weight="600" fill="#141413">Before Quality Contract:</text>
      <text x="0" y="16" font-size="10" fill="#87867F">Product spec (自然语言)</text>
      <text x="0" y="30" font-size="10" fill="#87867F">  ↓ 理解偏差 #1</text>
      <text x="0" y="44" font-size="10" fill="#87867F">Test case (半结构化)</text>
      <text x="0" y="58" font-size="10" fill="#87867F">  ↓ 理解偏差 #2</text>
      <text x="0" y="72" font-size="10" fill="#87867F">Test code (代码)</text>
    </g>

    <line x1="380" y1="48" x2="380" y2="100" stroke="#D97757" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="380" y="42" text-anchor="middle" font-size="9" fill="#D97757">3× translation loss</text>

    <g transform="translate(460, 48)">
      <text x="0" y="0" font-size="11" font-weight="600" fill="#141413">With Quality Contract:</text>
      <text x="0" y="16" font-size="10" fill="#141413">Quality Contract YAML</text>
      <text x="0" y="30" font-size="10" fill="#788C5D">  ↓ 1× compile (deterministic)</text>
      <text x="0" y="44" font-size="10" fill="#141413">Executable Test Suite</text>
      <text x="0" y="58" font-size="10" fill="#788C5D">No interpretation ambiguity</text>
      <text x="0" y="72" font-size="10" fill="#788C5D">Full traceability maintained</text>
    </g>
  </g>
</svg>