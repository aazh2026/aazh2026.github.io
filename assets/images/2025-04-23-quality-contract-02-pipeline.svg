<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg3" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
    <filter id="shadow3" width="120%" height="120%" x="-10%" y="-10%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".08" stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg3)" rx="12"/>
  <text x="450" y="38" fill="#141413" font-size="18" font-weight="700" text-anchor="middle">Quality Contract → Automated Test Pipeline</text>
  <text x="450" y="58" fill="#87867f" font-size="12" text-anchor="middle">From structured YAML contract to multi-layer test generation — zero manual translation</text>
  <g filter="url(#shadow3)" transform="translate(40 85)">
    <rect width="180" height="240" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <rect width="180" height="28" fill="#788c5d" rx="8"/>
    <path fill="#788c5d" d="M0 16h180v12H0z"/>
    <text x="90" y="19" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Quality Contract</text>
    <text x="90" y="19" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Quality Contract</text>
    <text x="12" y="50" fill="#87867f" font-size="10">functional:</text>
    <text x="12" y="64" fill="#141413" font-size="9">  acceptance_criteria:</text>
    <text x="24" y="78" fill="#141413" font-size="9">    - id: AC-001</text>
    <text x="36" y="90" fill="#141413" font-size="9">      when: create order</text>
    <text x="36" y="102" fill="#141413" font-size="9">      then:</text>
    <text x="48" y="114" fill="#141413" font-size="9">        - status: pending</text>
    <text x="12" y="136" fill="#87867f" font-size="10">performance:</text>
    <text x="24" y="150" fill="#141413" font-size="9">  latency_p95: &lt; 200ms</text>
    <text x="24" y="162" fill="#141413" font-size="9">  error_rate: &lt; 0.1%</text>
    <text x="12" y="184" fill="#87867f" font-size="10">security:</text>
    <text x="24" y="198" fill="#141413" font-size="9">  auth: jwt_required</text>
    <text x="24" y="210" fill="#141413" font-size="9">  input_validation: strict</text>
    <text x="12" y="232" fill="#87867f" font-size="10">compliance:</text>
    <text x="24" y="246" fill="#141413" font-size="9">  audit_log: required</text>
    <text x="24" y="258" fill="#141413" font-size="9">  retention: 7_years</text>
    <text x="24" y="270" fill="#141413" font-size="9">  gdpr: enforced</text>
  </g>
  <path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="2.5" d="M220 205h40"/>
  <path fill="#d1cfc5" d="m255 200 13 5-13 5z"/>
  <text x="240" y="195" fill="#87867f" font-size="10" text-anchor="middle">compile</text>
  <g filter="url(#shadow3)" transform="translate(270 140)">
    <rect width="140" height="130" fill="#141413" rx="10"/>
    <text x="70" y="45" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Contract</text>
    <text x="70" y="65" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Compiler</text>
    <path stroke="#d1cfc5" d="M30 80h80"/>
    <text x="70" y="98" fill="#d1cfc5" font-size="10" text-anchor="middle">YAML → AST</text>
    <text x="70" y="114" fill="#d1cfc5" font-size="10" text-anchor="middle">AST → Test Code</text>
    <text x="70" y="130" fill="#d1cfc5" font-size="10" text-anchor="middle">Schema Validation</text>
  </g>
  <path stroke="#d1cfc5" stroke-dasharray="6,4" stroke-width="2.5" d="M410 205h40"/>
  <path fill="#d1cfc5" d="m445 200 13 5-13 5z"/>
  <text x="430" y="195" fill="#87867f" font-size="10" text-anchor="middle">generate</text>
  <g filter="url(#shadow3)" transform="translate(460 80)">
    <rect width="400" height="280" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
    <text x="200" y="24" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">Generated Test Suite</text>
    <path stroke="#d1cfc5" d="M20 36h360"/>
    <g transform="translate(20 48)">
      <rect width="170" height="100" fill="#e3dacc" rx="6"/>
      <rect width="170" height="22" fill="#788c5d" rx="6"/>
      <path fill="#788c5d" d="M0 16h170v6H0z"/>
      <text x="85" y="15" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Functional Tests</text>
      <text x="85" y="44" fill="#141413" font-size="9" text-anchor="middle">pytest / JUnit / Jest</text>
      <text x="10" y="62" fill="#87867f" font-size="9">• Happy path coverage</text>
      <text x="10" y="76" fill="#87867f" font-size="9">• Boundary conditions</text>
      <text x="10" y="90" fill="#87867f" font-size="9">• Error handling cases</text>
    </g>
    <g transform="translate(210 48)">
      <rect width="170" height="100" fill="#e3dacc" rx="6"/>
      <rect width="170" height="22" fill="#d97757" rx="6"/>
      <path fill="#d97757" d="M0 16h170v6H0z"/>
      <text x="85" y="15" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Performance Tests</text>
      <text x="85" y="44" fill="#141413" font-size="9" text-anchor="middle">k6 / JMeter / Locust</text>
      <text x="10" y="62" fill="#87867f" font-size="9">• Latency p50/p95/p99</text>
      <text x="10" y="76" fill="#87867f" font-size="9">• Throughput (rps)</text>
      <text x="10" y="90" fill="#87867f" font-size="9">• Load + stress tests</text>
    </g>
    <g transform="translate(20 160)">
      <rect width="170" height="100" fill="#e3dacc" rx="6"/>
      <rect width="170" height="22" fill="#141413" rx="6"/>
      <path fill="#141413" d="M0 16h170v6H0z"/>
      <text x="85" y="15" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Security Tests</text>
      <text x="85" y="44" fill="#141413" font-size="9" text-anchor="middle">OWASP ZAP / Burp</text>
      <text x="10" y="62" fill="#87867f" font-size="9">• SQL/XSS injection</text>
      <text x="10" y="76" fill="#87867f" font-size="9">• Auth/Authz validation</text>
      <text x="10" y="90" fill="#87867f" font-size="9">• Input sanitization</text>
    </g>
    <g transform="translate(210 160)">
      <rect width="170" height="100" fill="#e3dacc" rx="6"/>
      <rect width="170" height="22" fill="#87867f" rx="6"/>
      <path fill="#87867f" d="M0 16h170v6H0z"/>
      <text x="85" y="15" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Compliance Reports</text>
      <text x="85" y="44" fill="#141413" font-size="9" text-anchor="middle">Audit trail + PDF/HTML</text>
      <text x="10" y="62" fill="#87867f" font-size="9">• GDPR checks</text>
      <text x="10" y="76" fill="#87867f" font-size="9">• PCI-DSS validation</text>
      <text x="10" y="90" fill="#87867f" font-size="9">• Data retention proof</text>
    </g>
  </g>
  <g filter="url(#shadow3)" transform="translate(40 390)">
    <rect width="820" height="110" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/>
    <text x="410" y="22" fill="#788c5d" font-size="12" font-weight="700" text-anchor="middle">Key Insight: Triple Translation Eliminated</text>
    <path stroke="#e3dacc" d="M40 34h740"/>
    <text fill="#141413" font-size="11" font-weight="600" transform="translate(60 48)">Before Quality Contract:</text>
    <text y="16" fill="#87867f" font-size="10" transform="translate(60 48)">Product spec (自然语言)</text>
    <text y="30" fill="#87867f" font-size="10" transform="translate(60 48)">  ↓ 理解偏差 #1</text>
    <text y="44" fill="#87867f" font-size="10" transform="translate(60 48)">Test case (半结构化)</text>
    <text y="58" fill="#87867f" font-size="10" transform="translate(60 48)">  ↓ 理解偏差 #2</text>
    <text y="72" fill="#87867f" font-size="10" transform="translate(60 48)">Test code (代码)</text>
    <path stroke="#d97757" stroke-dasharray="4,3" stroke-width="2" d="M380 48v52"/>
    <text x="380" y="42" fill="#d97757" font-size="9" text-anchor="middle">3× translation loss</text>
    <text fill="#141413" font-size="11" font-weight="600" transform="translate(460 48)">With Quality Contract:</text>
    <text y="16" fill="#141413" font-size="10" transform="translate(460 48)">Quality Contract YAML</text>
    <text y="30" fill="#788c5d" font-size="10" transform="translate(460 48)">  ↓ 1× compile (deterministic)</text>
    <text y="44" fill="#141413" font-size="10" transform="translate(460 48)">Executable Test Suite</text>
    <text y="58" fill="#788c5d" font-size="10" transform="translate(460 48)">No interpretation ambiguity</text>
    <text y="72" fill="#788c5d" font-size="10" transform="translate(460 48)">Full traceability maintained</text>
  </g>
</svg>
