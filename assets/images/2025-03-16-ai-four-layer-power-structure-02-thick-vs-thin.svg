<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .card { fill: #FFFFFF; stroke: #D1CFC5; stroke-width: 1.5; rx: 12; }
      .card-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #141413; }
      .card-sub { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #87867F; }
      .badge { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #FAF9F5; }
      .badge-good { fill: #788C5D; }
      .badge-bad { fill: #D97757; }
      .badge-warn { fill: #87867F; }
      .tag { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #87867F; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #141413; font-weight: 600; }
      .desc { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #87867F; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #141413; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #87867F; }
      .arrow { stroke: #D1CFC5; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .divider { stroke: #D1CFC5; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1CFC5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="560"/>

  <!-- Header -->
  <text x="30" y="36" class="title">薄API vs 厚API：护城河的本质差异</text>
  <text x="30" y="56" class="subtitle">Thin API has no moat — Thick API compounds over time</text>
  <line x1="30" y1="66" x2="870" y2="66" class="divider"/>

  <!-- THIN API Column -->
  <g transform="translate(30, 80)">
    <!-- Card -->
    <rect class="card" width="400" height="390"/>

    <!-- Header bar -->
    <rect width="400" height="52" fill="#D97757" rx="12"/>
    <rect y="12" width="400" height="40" fill="#D97757"/>
    <text x="20" y="34" class="badge" font-size="15">薄 API — Thin API</text>

    <!-- API Icon -->
    <circle cx="350" cy="26" r="18" fill="#FAF9F5" opacity="0.2"/>
    <text x="350" y="32" text-anchor="middle" font-family="monospace" font-size="18" fill="#FAF9F5" opacity="0.9">{;}</text>

    <!-- Layers -->
    <g transform="translate(20, 68)">
      <text class="label" x="0" y="0">API 接口层</text>
      <text class="desc" x="0" y="18">只封装功能，无数据积累</text>

      <!-- Separator -->
      <line x1="0" y1="30" x2="360" y2="30" class="divider" stroke-dasharray="4,4"/>

      <!-- Moat elements - all gray/crossed -->
      <g transform="translate(0, 44)">
        <!-- Data Flywheel -->
        <g opacity="0.4">
          <circle cx="12" cy="8" r="6" fill="#D1CFC5"/>
          <text x="26" y="12" class="tag" text-decoration="line-through">数据飞轮 Data Flywheel</text>
        </g>
        <!-- Network Effects -->
        <g transform="translate(0, 22)" opacity="0.4">
          <circle cx="12" cy="8" r="6" fill="#D1CFC5"/>
          <text x="26" y="12" class="tag" text-decoration="line-through">网络效应 Network Effects</text>
        </g>
        <!-- Workflow Embedding -->
        <g transform="translate(0, 44)" opacity="0.4">
          <circle cx="12" cy="8" r="6" fill="#D1CFC5"/>
          <text x="26" y="12" class="tag" text-decoration="line-through">工作流嵌入 Workflow Embedding</text>
        </g>
        <!-- Compliance -->
        <g transform="translate(0, 66)" opacity="0.4">
          <circle cx="12" cy="8" r="6" fill="#D1CFC5"/>
          <text x="26" y="12" class="tag" text-decoration="line-through">合规壁垒 Compliance Barriers</text>
        </g>
        <!-- Scale -->
        <g transform="translate(0, 88)" opacity="0.4">
          <circle cx="12" cy="8" r="6" fill="#D1CFC5"/>
          <text x="26" y="12" class="tag" text-decoration="line-through">规模经济 Economies of Scale</text>
        </g>
      </g>
    </g>

    <!-- Result badge -->
    <rect x="20" y="372" width="360" height="32" rx="8" fill="#D97757" opacity="0.12"/>
    <text x="30" y="393" class="badge badge-bad">❌ 护城河: 无 — 容易被替代</text>

    <!-- Examples -->
    <text x="20" y="340" class="card-sub">案例</text>
    <g transform="translate(20, 316)">
      <rect width="70" height="18" rx="4" fill="#E3DACC"/>
      <text x="35" y="13" text-anchor="middle" class="tag">OpenAI API</text>
      <rect x="80" width="70" height="18" rx="4" fill="#E3DACC"/>
      <text x="115" y="13" text-anchor="middle" class="tag">天气 API</text>
      <rect x="160" width="70" height="18" rx="4" fill="#E3DACC"/>
      <text x="195" y="13" text-anchor="middle" class="tag">短信 API</text>
    </g>
  </g>

  <!-- Arrow between columns -->
  <g transform="translate(435, 270)">
    <text text-anchor="middle" font-size="28" fill="#87867F">→</text>
  </g>

  <!-- THICK API Column -->
  <g transform="translate(470, 80)">
    <!-- Card -->
    <rect class="card" width="400" height="390"/>

    <!-- Header bar -->
    <rect width="400" height="52" fill="#788C5D" rx="12"/>
    <rect y="12" width="400" height="40" fill="#788C5D"/>
    <text x="20" y="34" class="badge" font-size="15">厚 API — Thick API</text>

    <!-- API Icon -->
    <circle cx="350" cy="26" r="18" fill="#FAF9F5" opacity="0.2"/>
    <text x="350" y="32" text-anchor="middle" font-family="monospace" font-size="18" fill="#FAF9F5" opacity="0.9">{∑}</text>

    <!-- Layers -->
    <g transform="translate(20, 68)">
      <text class="label" x="0" y="0">API 接口层</text>
      <text class="desc" x="0" y="18">封装复杂能力，积累数据</text>

      <!-- Separator -->
      <line x1="0" y1="30" x2="360" y2="30" class="divider" stroke-dasharray="4,4"/>

      <!-- Moat elements - all green/filled -->
      <g transform="translate(0, 44)">
        <!-- Data Flywheel -->
        <g>
          <circle cx="12" cy="8" r="6" fill="#788C5D"/>
          <text x="26" y="12" class="tag" fill="#788C5D" font-weight="600">数据飞轮 Data Flywheel</text>
          <text x="340" y="12" class="tag" fill="#788C5D" text-anchor="end">✅</text>
        </g>
        <!-- Network Effects -->
        <g transform="translate(0, 22)">
          <circle cx="12" cy="8" r="6" fill="#788C5D"/>
          <text x="26" y="12" class="tag" fill="#788C5D" font-weight="600">网络效应 Network Effects</text>
          <text x="340" y="12" class="tag" fill="#788C5D" text-anchor="end">✅</text>
        </g>
        <!-- Workflow Embedding -->
        <g transform="translate(0, 44)">
          <circle cx="12" cy="8" r="6" fill="#788C5D"/>
          <text x="26" y="12" class="tag" fill="#788C5D" font-weight="600">工作流嵌入 Workflow Embedding</text>
          <text x="340" y="12" class="tag" fill="#788C5D" text-anchor="end">✅</text>
        </g>
        <!-- Compliance -->
        <g transform="translate(0, 66)">
          <circle cx="12" cy="8" r="6" fill="#788C5D"/>
          <text x="26" y="12" class="tag" fill="#788C5D" font-weight="600">合规壁垒 Compliance Barriers</text>
          <text x="340" y="12" class="tag" fill="#788C5D" text-anchor="end">✅</text>
        </g>
        <!-- Scale -->
        <g transform="translate(0, 88)">
          <circle cx="12" cy="8" r="6" fill="#788C5D"/>
          <text x="26" y="12" class="tag" fill="#788C5D" font-weight="600">规模经济 Economies of Scale</text>
          <text x="340" y="12" class="tag" fill="#788C5D" text-anchor="end">✅</text>
        </g>
      </g>
    </g>

    <!-- Result badge -->
    <rect x="20" y="372" width="360" height="32" rx="8" fill="#788C5D" opacity="0.12"/>
    <text x="30" y="393" class="badge badge-good">✅ 护城河: 强 — 切换成本极高</text>

    <!-- Examples -->
    <text x="20" y="340" class="card-sub">案例</text>
    <g transform="translate(20, 316)">
      <rect width="70" height="18" rx="4" fill="#E3DACC"/>
      <text x="35" y="13" text-anchor="middle" class="tag">Stripe API</text>
      <rect x="100" width="90" height="18" rx="4" fill="#E3DACC"/>
      <text x="145" y="13" text-anchor="middle" class="tag">Salesforce API</text>
      <rect x="200" width="90" height="18" rx="4" fill="#E3DACC"/>
      <text x="245" y="13" text-anchor="middle" class="tag">Snowflake API</text>
    </g>
  </g>

  <!-- Footer insight -->
  <rect x="30" y="488" width="840" height="54" rx="10" fill="#E3DACC" opacity="0.5"/>
  <text x="50" y="514" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#141413" font-weight="700">💡 关键洞察</text>
  <text x="50" y="532" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#87867F">API只是入口，不是护城河。真正的护城河在API背后的厚度——数据网络效应 + 工作流嵌入 + 合规壁垒</text>
</svg>
