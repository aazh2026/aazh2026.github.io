<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <marker id="arrowhead" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3">
      <path fill="#d1cfc5" d="m0 0 8 3-8 3z"/>
    </marker>
    <style>
      .card{fill:#fff;stroke:#d1cfc5;stroke-width:1.5;rx:12}.badge,.card-sub{font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif}.card-sub{font-size:12px;fill:#87867f}.badge{font-size:11px;font-weight:600;fill:#faf9f5}.tag{font-size:10px;fill:#87867f}.desc,.label,.tag{font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif}.label{font-size:13px;fill:#141413;font-weight:600}.desc{font-size:11px;fill:#87867f}.divider{stroke:#d1cfc5;stroke-width:1}
    </style>
  </defs>
  <path d="M0 0h900v560H0z" style="fill:#faf9f5"/>
  <text x="30" y="36" style="font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif;font-size:22px;font-weight:800;fill:#141413">薄API vs 厚API：护城河的本质差异</text>
  <text x="30" y="56" style="font-family:&quot;Helvetica Neue&quot;,Arial,sans-serif;font-size:13px;fill:#87867f">Thin API has no moat — Thick API compounds over time</text>
  <path d="M30 66h840" class="divider"/>
  <g transform="translate(30 80)">
    <path d="M0 0h400v390H0z" class="card"/>
    <rect width="400" height="52" fill="#d97757" rx="12"/>
    <path fill="#d97757" d="M0 12h400v40H0z"/>
    <text x="20" y="34" class="badge" font-size="15">薄 API — Thin API</text>
    <circle cx="350" cy="26" r="18" fill="#faf9f5" opacity=".2"/>
    <text x="350" y="32" fill="#faf9f5" font-family="monospace" font-size="18" opacity=".9" text-anchor="middle">{;}</text>
    <text class="label" transform="translate(20 68)">API 接口层</text>
    <text y="18" class="desc" transform="translate(20 68)">只封装功能，无数据积累</text>
    <path stroke-dasharray="4,4" d="M20 98h360" class="divider"/>
    <g opacity=".4" transform="translate(20 112)">
      <circle cx="12" cy="8" r="6" fill="#d1cfc5"/>
      <text x="26" y="12" class="tag" text-decoration="line-through">数据飞轮 Data Flywheel</text>
    </g>
    <g opacity=".4" transform="translate(20 134)">
      <circle cx="12" cy="8" r="6" fill="#d1cfc5"/>
      <text x="26" y="12" class="tag" text-decoration="line-through">网络效应 Network Effects</text>
    </g>
    <g opacity=".4" transform="translate(20 156)">
      <circle cx="12" cy="8" r="6" fill="#d1cfc5"/>
      <text x="26" y="12" class="tag" text-decoration="line-through">工作流嵌入 Workflow Embedding</text>
    </g>
    <g opacity=".4" transform="translate(20 178)">
      <circle cx="12" cy="8" r="6" fill="#d1cfc5"/>
      <text x="26" y="12" class="tag" text-decoration="line-through">合规壁垒 Compliance Barriers</text>
    </g>
    <g opacity=".4" transform="translate(20 200)">
      <circle cx="12" cy="8" r="6" fill="#d1cfc5"/>
      <text x="26" y="12" class="tag" text-decoration="line-through">规模经济 Economies of Scale</text>
    </g>
    <rect width="360" height="32" x="20" y="372" fill="#d97757" opacity=".12" rx="8"/>
    <text x="30" y="393" class="badge" style="fill:#d97757">❌ 护城河: 无 — 容易被替代</text>
    <text x="20" y="340" class="card-sub">案例</text>
    <g transform="translate(20 316)">
      <rect width="70" height="18" fill="#e3dacc" rx="4"/>
      <text x="35" y="13" class="tag" text-anchor="middle">OpenAI API</text>
      <rect width="70" height="18" x="80" fill="#e3dacc" rx="4"/>
      <text x="115" y="13" class="tag" text-anchor="middle">天气 API</text>
      <rect width="70" height="18" x="160" fill="#e3dacc" rx="4"/>
      <text x="195" y="13" class="tag" text-anchor="middle">短信 API</text>
    </g>
  </g>
  <text fill="#87867f" font-size="28" text-anchor="middle" transform="translate(435 270)">→</text>
  <g transform="translate(470 80)">
    <path d="M0 0h400v390H0z" class="card"/>
    <rect width="400" height="52" fill="#788c5d" rx="12"/>
    <path fill="#788c5d" d="M0 12h400v40H0z"/>
    <text x="20" y="34" class="badge" font-size="15">厚 API — Thick API</text>
    <circle cx="350" cy="26" r="18" fill="#faf9f5" opacity=".2"/>
    <text x="350" y="32" fill="#faf9f5" font-family="monospace" font-size="18" opacity=".9" text-anchor="middle">{∑}</text>
    <text class="label" transform="translate(20 68)">API 接口层</text>
    <text y="18" class="desc" transform="translate(20 68)">封装复杂能力，积累数据</text>
    <path stroke-dasharray="4,4" d="M20 98h360" class="divider"/>
    <g transform="translate(20 112)">
      <circle cx="12" cy="8" r="6" fill="#788c5d"/>
      <text x="26" y="12" fill="#788c5d" class="tag" font-weight="600">数据飞轮 Data Flywheel</text>
      <text x="340" y="12" fill="#788c5d" class="tag" text-anchor="end">✅</text>
    </g>
    <g transform="translate(20 134)">
      <circle cx="12" cy="8" r="6" fill="#788c5d"/>
      <text x="26" y="12" fill="#788c5d" class="tag" font-weight="600">网络效应 Network Effects</text>
      <text x="340" y="12" fill="#788c5d" class="tag" text-anchor="end">✅</text>
    </g>
    <g transform="translate(20 156)">
      <circle cx="12" cy="8" r="6" fill="#788c5d"/>
      <text x="26" y="12" fill="#788c5d" class="tag" font-weight="600">工作流嵌入 Workflow Embedding</text>
      <text x="340" y="12" fill="#788c5d" class="tag" text-anchor="end">✅</text>
    </g>
    <g transform="translate(20 178)">
      <circle cx="12" cy="8" r="6" fill="#788c5d"/>
      <text x="26" y="12" fill="#788c5d" class="tag" font-weight="600">合规壁垒 Compliance Barriers</text>
      <text x="340" y="12" fill="#788c5d" class="tag" text-anchor="end">✅</text>
    </g>
    <g transform="translate(20 200)">
      <circle cx="12" cy="8" r="6" fill="#788c5d"/>
      <text x="26" y="12" fill="#788c5d" class="tag" font-weight="600">规模经济 Economies of Scale</text>
      <text x="340" y="12" fill="#788c5d" class="tag" text-anchor="end">✅</text>
    </g>
    <rect width="360" height="32" x="20" y="372" fill="#788c5d" opacity=".12" rx="8"/>
    <text x="30" y="393" class="badge" style="fill:#788c5d">✅ 护城河: 强 — 切换成本极高</text>
    <text x="20" y="340" class="card-sub">案例</text>
    <g transform="translate(20 316)">
      <rect width="70" height="18" fill="#e3dacc" rx="4"/>
      <text x="35" y="13" class="tag" text-anchor="middle">Stripe API</text>
      <rect width="90" height="18" x="100" fill="#e3dacc" rx="4"/>
      <text x="145" y="13" class="tag" text-anchor="middle">Salesforce API</text>
      <rect width="90" height="18" x="200" fill="#e3dacc" rx="4"/>
      <text x="245" y="13" class="tag" text-anchor="middle">Snowflake API</text>
    </g>
  </g>
  <rect width="840" height="54" x="30" y="488" fill="#e3dacc" opacity=".5" rx="10"/>
  <text x="50" y="514" fill="#141413" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700">💡 关键洞察</text>
  <text x="50" y="532" fill="#87867f" font-family="Helvetica Neue, Arial, sans-serif" font-size="12">API只是入口，不是护城河。真正的护城河在API背后的厚度——数据网络效应 + 工作流嵌入 + 合规壁垒</text>
</svg>
