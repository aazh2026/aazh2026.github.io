<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 720 400">
  <title>AI-Native 用户研究方法</title>
  <desc>
    传统用户研究方法与 AI-Native 用户研究方法的对比，展示从滞后分析到实时预测的转变
  </desc>
  <path fill="#faf9f5" d="M0 0h720v400H0z"/>
  <text x="360" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">AI-Native 用户研究：从滞后分析到实时预测</text>
  <text x="360" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">传统研究局限 → AI-Native 能力 → 预测性输出</text>
  <rect width="200" height="270" x="30" y="66" fill="#fff" stroke="#d1cfc5" stroke-dasharray="6,4" rx="10"/>
  <text x="130" y="90" fill="#87867f" font-size="12" font-weight="600" text-anchor="middle">传统用户研究</text>
  <text x="130" y="106" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">样本量小 · 周期长 · 事后分析</text>
  <rect width="160" height="44" x="50" y="120" fill="#f5f3ee" stroke="#d1cfc5" rx="6"/>
  <text x="130" y="138" fill="#87867f" font-size="10" text-anchor="middle">用户访谈</text>
  <text x="130" y="153" fill="#d1cfc5" font-size="9" text-anchor="middle">小样本 · 主观性强</text>
  <rect width="160" height="44" x="50" y="174" fill="#f5f3ee" stroke="#d1cfc5" rx="6"/>
  <text x="130" y="192" fill="#87867f" font-size="10" text-anchor="middle">A/B 测试</text>
  <text x="130" y="207" fill="#d1cfc5" font-size="9" text-anchor="middle">周期长 · 验证已知假设</text>
  <rect width="160" height="44" x="50" y="228" fill="#f5f3ee" stroke="#d1cfc5" rx="6"/>
  <text x="130" y="246" fill="#87867f" font-size="10" text-anchor="middle">数据分析</text>
  <text x="130" y="261" fill="#d1cfc5" font-size="9" text-anchor="middle">事后分析 · 问题发现滞后</text>
  <rect width="160" height="36" x="50" y="282" fill="#f5f3ee" stroke="#d1cfc5" rx="6"/>
  <text x="130" y="298" fill="#87867f" font-size="9" text-anchor="middle">无法预测 · 被动响应</text>
  <text x="130" y="312" fill="#87867f" font-size="9" text-anchor="middle">仅能验证已有假设</text>
  <path stroke="#d97757" stroke-width="2.5" d="M230 200h40"/>
  <path fill="#d97757" d="m274 196-6 4 6 4z"/>
  <text x="250" y="188" fill="#d97757" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">AI 赋能</text>
  <rect width="200" height="270" x="280" y="66" fill="#fff" stroke="#d97757" stroke-width="2" rx="10"/>
  <text x="380" y="90" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">AI-Native 用户研究</text>
  <text x="380" y="106" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">实时 · 规模化 · 预测性</text>
  <rect width="168" height="52" x="296" y="120" fill="#d97757" fill-opacity=".1" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="380" y="140" fill="#141413" font-size="11" text-anchor="middle">实时行为理解</text>
  <text x="380" y="157" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">会话分析 · 鼠标轨迹 · 停留时间</text>
  <rect width="168" height="52" x="296" y="180" fill="#788c5d" fill-opacity=".1" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="380" y="200" fill="#141413" font-size="11" text-anchor="middle">预测性行为建模</text>
  <text x="380" y="217" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">模式识别 · 异常检测 · 趋势预测</text>
  <rect width="168" height="52" x="296" y="240" fill="#d97757" fill-opacity=".1" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="380" y="260" fill="#141413" font-size="11" text-anchor="middle">自动化可用性测试</text>
  <text x="380" y="277" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">对比度 · 标签清晰度 · 交互预期</text>
  <rect width="80" height="22" x="340" y="305" fill="#d97757" rx="11"/>
  <text x="380" y="320" fill="#fff" font-family="ui-monospace, monospace" font-size="9" font-weight="600" text-anchor="middle">1000+ 会话</text>
  <path stroke="#788c5d" stroke-width="2.5" d="M480 200h40"/>
  <path fill="#788c5d" d="m524 196-6 4 6 4z"/>
  <text x="500" y="188" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">产出</text>
  <rect width="170" height="270" x="530" y="66" fill="#fff" stroke="#788c5d" stroke-width="2" rx="10"/>
  <text x="615" y="90" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">AI 研究输出</text>
  <text x="615" y="106" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">可操作 · 实时 · 规模化</text>
  <rect width="138" height="52" x="546" y="122" fill="#788c5d" fill-opacity=".12" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="615" y="144" fill="#141413" font-size="11" text-anchor="middle">预测性洞察</text>
  <text x="615" y="161" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">未满足需求 · 潜在痛点</text>
  <rect width="138" height="52" x="546" y="184" fill="#788c5d" fill-opacity=".12" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="615" y="206" fill="#141413" font-size="11" text-anchor="middle">干预建议</text>
  <text x="615" y="223" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">时机 · 位置 · 方式</text>
  <rect width="138" height="52" x="546" y="246" fill="#788c5d" fill-opacity=".12" stroke="#788c5d" stroke-width="1.5" rx="8"/>
  <text x="615" y="268" fill="#141413" font-size="11" text-anchor="middle">可用性报告</text>
  <text x="615" y="285" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">评分 · 优先级 · 修复建议</text>
  <rect width="560" height="32" x="80" y="352" fill="#f0eee6" stroke="#d1cfc5" rx="8"/>
  <circle cx="108" cy="368" r="7" fill="#d97757"/>
  <text x="124" y="372" fill="#141413" font-family="ui-monospace, monospace" font-size="10">💡</text>
  <text x="144" y="372" fill="#141413" font-size="10">AI 不仅分析已有行为，更能预测用户需求 — 在用户遇到问题之前主动干预</text>
  <text x="130" y="58" fill="#d1cfc5" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">n ≈ 10-20</text>
  <text x="380" y="58" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">n ≈ 1000+</text>
  <text x="615" y="58" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">可操作</text>
</svg>
