<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <title>AI-Native 用户研究方法</title>
  <desc>传统用户研究方法与 AI-Native 用户研究方法的对比，展示从滞后分析到实时预测的转变</desc>

  <!-- Background -->
  <rect width="720" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI-Native 用户研究：从滞后分析到实时预测</text>
  <text x="360" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">传统研究局限 → AI-Native 能力 → 预测性输出</text>

  <!-- Left Column: 传统用户研究 (dotted border) -->
  <rect x="30" y="66" width="200" height="270" rx="10" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="130" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#87867F">传统用户研究</text>
  <text x="130" y="106" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">样本量小 · 周期长 · 事后分析</text>

  <!-- Traditional methods -->
  <rect x="50" y="120" width="160" height="44" rx="6" fill="#F5F3EE" stroke="#D1CFC5" stroke-width="1"/>
  <text x="130" y="138" text-anchor="middle" font-size="10" fill="#87867F">用户访谈</text>
  <text x="130" y="153" text-anchor="middle" font-size="9" fill="#D1CFC5">小样本 · 主观性强</text>

  <rect x="50" y="174" width="160" height="44" rx="6" fill="#F5F3EE" stroke="#D1CFC5" stroke-width="1"/>
  <text x="130" y="192" text-anchor="middle" font-size="10" fill="#87867F">A/B 测试</text>
  <text x="130" y="207" text-anchor="middle" font-size="9" fill="#D1CFC5">周期长 · 验证已知假设</text>

  <rect x="50" y="228" width="160" height="44" rx="6" fill="#F5F3EE" stroke="#D1CFC5" stroke-width="1"/>
  <text x="130" y="246" text-anchor="middle" font-size="10" fill="#87867F">数据分析</text>
  <text x="130" y="261" text-anchor="middle" font-size="9" fill="#D1CFC5">事后分析 · 问题发现滞后</text>

  <!-- Limitation note -->
  <rect x="50" y="282" width="160" height="36" rx="6" fill="#F5F3EE" stroke="#D1CFC5" stroke-width="1"/>
  <text x="130" y="298" text-anchor="middle" font-size="9" fill="#87867F">无法预测 · 被动响应</text>
  <text x="130" y="312" text-anchor="middle" font-size="9" fill="#87867F">仅能验证已有假设</text>

  <!-- Arrow: Traditional → AI-Native -->
  <line x1="230" y1="200" x2="270" y2="200" stroke="#D97757" stroke-width="2.5"/>
  <polygon points="274,196 268,200 274,204" fill="#D97757"/>
  <text x="250" y="188" text-anchor="middle" font-size="8.5" fill="#D97757" font-family="ui-monospace, monospace">AI 赋能</text>

  <!-- Center Column: AI-Native 用户研究 (solid clay border) -->
  <rect x="280" y="66" width="200" height="270" rx="10" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>

  <text x="380" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">AI-Native 用户研究</text>
  <text x="380" y="106" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">实时 · 规模化 · 预测性</text>

  <!-- AI-Native capabilities -->
  <rect x="296" y="120" width="168" height="52" rx="8" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="1.5"/>
  <text x="380" y="140" text-anchor="middle" font-size="11" fill="#141413">实时行为理解</text>
  <text x="380" y="157" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">会话分析 · 鼠标轨迹 · 停留时间</text>

  <rect x="296" y="180" width="168" height="52" rx="8" fill="#788C5D" fill-opacity="0.1" stroke="#788C5D" stroke-width="1.5"/>
  <text x="380" y="200" text-anchor="middle" font-size="11" fill="#141413">预测性行为建模</text>
  <text x="380" y="217" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">模式识别 · 异常检测 · 趋势预测</text>

  <rect x="296" y="240" width="168" height="52" rx="8" fill="#D97757" fill-opacity="0.1" stroke="#D97757" stroke-width="1.5"/>
  <text x="380" y="260" text-anchor="middle" font-size="11" fill="#141413">自动化可用性测试</text>
  <text x="380" y="277" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">对比度 · 标签清晰度 · 交互预期</text>

  <!-- Stats badge -->
  <rect x="340" y="305" width="80" height="22" rx="11" fill="#D97757"/>
  <text x="380" y="320" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace" font-weight="600">1000+ 会话</text>

  <!-- Arrow: AI-Native → Output -->
  <line x1="480" y1="200" x2="520" y2="200" stroke="#788C5D" stroke-width="2.5"/>
  <polygon points="524,196 518,200 524,204" fill="#788C5D"/>
  <text x="500" y="188" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">产出</text>

  <!-- Right Column: 输出 (olive border) -->
  <rect x="530" y="66" width="170" height="270" rx="10" fill="#FFFFFF" stroke="#788C5D" stroke-width="2"/>

  <text x="615" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#141413">AI 研究输出</text>
  <text x="615" y="106" text-anchor="middle" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">可操作 · 实时 · 规模化</text>

  <!-- Output cards -->
  <rect x="546" y="122" width="138" height="52" rx="8" fill="#788C5D" fill-opacity="0.12" stroke="#788C5D" stroke-width="1.5"/>
  <text x="615" y="144" text-anchor="middle" font-size="11" fill="#141413">预测性洞察</text>
  <text x="615" y="161" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">未满足需求 · 潜在痛点</text>

  <rect x="546" y="184" width="138" height="52" rx="8" fill="#788C5D" fill-opacity="0.12" stroke="#788C5D" stroke-width="1.5"/>
  <text x="615" y="206" text-anchor="middle" font-size="11" fill="#141413">干预建议</text>
  <text x="615" y="223" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">时机 · 位置 · 方式</text>

  <rect x="546" y="246" width="138" height="52" rx="8" fill="#788C5D" fill-opacity="0.12" stroke="#788C5D" stroke-width="1.5"/>
  <text x="615" y="268" text-anchor="middle" font-size="11" fill="#141413">可用性报告</text>
  <text x="615" y="285" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">评分 · 优先级 · 修复建议</text>

  <!-- Bottom key insight -->
  <rect x="80" y="352" width="560" height="32" rx="8" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1"/>
  <circle cx="108" cy="368" r="7" fill="#D97757"/>
  <text x="124" y="372" font-size="10" fill="#141413" font-family="ui-monospace, monospace">💡</text>
  <text x="144" y="372" font-size="10" fill="#141413">AI 不仅分析已有行为，更能预测用户需求 — 在用户遇到问题之前主动干预</text>

  <!-- Scale indicator -->
  <text x="130" y="58" text-anchor="middle" font-size="8" fill="#D1CFC5" font-family="ui-monospace, monospace">n ≈ 10-20</text>
  <text x="380" y="58" text-anchor="middle" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">n ≈ 1000+</text>
  <text x="615" y="58" text-anchor="middle" font-size="8" fill="#788C5D" font-family="ui-monospace, monospace">可操作</text>
</svg>
