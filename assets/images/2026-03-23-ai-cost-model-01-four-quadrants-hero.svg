<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 680 440">
  <title>成本结构四象限模型</title>
  <desc>
    AI系统成本优化的四象限框架：高频低复杂度用缓存优化，高频高复杂度用架构重构，低频低复杂度用模型降级，低频高复杂度用预计算
  </desc>
  <path fill="#faf9f5" d="M0 0h680v440H0z"/>
  <text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">成本结构四象限模型</text>
  <text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AI-Native Engineering · 2026</text>
  <text x="22" y="220" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle" transform="rotate(-90 22 220)" writing-mode="vertical-rl">高频 ←→ 低频</text>
  <text x="340" y="418" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">低复杂度 ←→ 高复杂度</text>
  <path stroke="#d97757" stroke-dasharray="6,4" stroke-width="1.5" d="M80 380 600 80" opacity=".5"/>
  <text x="340" y="215" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" opacity=".7" text-anchor="middle">架构越复杂 → 成本越高</text>
  <path stroke="#d1cfc5" d="M340 65v330M55 230h570"/>
  <rect width="285" height="165" x="55" y="65" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="285" height="26" x="55" y="65" fill="#788c5d" rx="8"/>
  <path fill="#788c5d" d="M55 83h285v8H55z"/>
  <text x="67" y="82" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Q1 · 高频低复杂度</text>
  <text x="67" y="106" fill="#141413" font-size="13">缓存优化</text>
  <text x="67" y="122" fill="#87867f" font-size="10">语义缓存 · 结果缓存 · 智能预取</text>
  <text x="67" y="142" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10.5">成本降低 60-80%</text>
  <text x="67" y="160" fill="#141413" font-size="10">客服Agent案例：</text>
  <text x="67" y="175" fill="#87867f" font-size="10">80%问题重复，缓存命中率&gt;70%</text>
  <text x="67" y="190" fill="#87867f" font-size="10">$0.05/次 → $0.01/次</text>
  <rect width="36" height="15" x="290" y="205" fill="#788c5d" rx="7.5"/>
  <text x="308" y="216" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">缓存</text>
  <rect width="285" height="165" x="340" y="65" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <rect width="285" height="26" x="340" y="65" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M340 83h285v8H340z"/>
  <text x="352" y="82" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Q2 · 高频高复杂度</text>
  <text x="352" y="106" fill="#141413" font-size="13">架构重构</text>
  <text x="352" y="122" fill="#87867f" font-size="10">任务分解 · 异步处理 · 预计算+增量更新</text>
  <text x="352" y="142" fill="#d97757" font-family="ui-monospace, monospace" font-size="10.5">成本降低 40-60% · 延迟降低 50%</text>
  <text x="352" y="160" fill="#141413" font-size="10">金融分析Agent案例：</text>
  <text x="352" y="175" fill="#87867f" font-size="10">实时生成 → 预计算+增量</text>
  <text x="352" y="190" fill="#87867f" font-size="10">$10/报告 → $4/报告 · 30s → 5s</text>
  <rect width="36" height="15" x="575" y="205" fill="#d97757" rx="7.5"/>
  <text x="593" y="216" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">重构</text>
  <rect width="285" height="165" x="55" y="230" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="285" height="26" x="55" y="230" fill="#87867f" rx="8"/>
  <path fill="#87867f" d="M55 248h285v8H55z"/>
  <text x="67" y="247" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Q3 · 低频低复杂度</text>
  <text x="67" y="271" fill="#141413" font-size="13">模型降级</text>
  <text x="67" y="287" fill="#87867f" font-size="10">智能路由 · 边缘计算 · 批处理聚合</text>
  <text x="67" y="307" fill="#87867f" font-family="ui-monospace, monospace" font-size="10.5">成本降低 70-90%</text>
  <text x="67" y="325" fill="#141413" font-size="10">内部工具Agent案例：</text>
  <text x="67" y="340" fill="#87867f" font-size="10">80%任务用GPT-3.5 · 20%用GPT-4</text>
  <text x="67" y="355" fill="#87867f" font-size="10">平均成本降低75%</text>
  <rect width="36" height="15" x="290" y="370" fill="#87867f" rx="7.5"/>
  <text x="308" y="381" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">降级</text>
  <rect width="285" height="165" x="340" y="230" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <rect width="285" height="26" x="340" y="230" fill="#141413" rx="8"/>
  <path fill="#141413" d="M340 248h285v8H340z"/>
  <text x="352" y="247" fill="#fff" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Q4 · 低频高复杂度</text>
  <text x="352" y="271" fill="#141413" font-size="13">预计算</text>
  <text x="352" y="287" fill="#87867f" font-size="10">离线预生成 · 增量更新 · 人机协作</text>
  <text x="352" y="307" fill="#141413" font-family="ui-monospace, monospace" font-size="10.5">成本降低 50-70% · 质量提升</text>
  <text x="352" y="325" fill="#141413" font-size="10">市场研报生成案例：</text>
  <text x="352" y="340" fill="#87867f" font-size="10">实时生成 → 每日凌晨预生成</text>
  <text x="352" y="355" fill="#87867f" font-size="10">$50/报告 → $15/报告 · 质量因人工Review提升</text>
  <rect width="36" height="15" x="575" y="370" fill="#141413" rx="7.5"/>
  <text x="593" y="381" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">预计算</text>
  <path stroke="#d1cfc5" d="M55 405h570"/>
  <text x="340" y="420" fill="#d97757" font-family="ui-monospace, monospace" font-size="9.5" text-anchor="middle">核心洞察：80% 的成本浪费来自结构性错配</text>
</svg>
