<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .title { fill: #141413; font-size: 20px; font-weight: 700; }
      .subtitle { fill: #87867F; font-size: 12px; }
      .label { fill: #141413; font-size: 13px; font-weight: 600; }
      .value { fill: #141413; font-size: 22px; font-weight: 700; }
      .value-sm { fill: #141413; font-size: 15px; font-weight: 600; }
      .desc { fill: #87867F; font-size: 11px; }
      .accent { fill: #D97757; }
      .accent-olive { fill: #788C5D; }
      .accent-g300 { fill: #D1CFC5; }
      .accent-g500 { fill: #87867F; }
      .accent-oat { fill: #E3DACC; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" class="bg"/>

  <!-- Title -->
  <text x="40" y="38" class="title">AI 幻觉成本模型：三层成本结构</text>
  <text x="40" y="58" class="subtitle">总成本 = 直接成本 + 间接成本 × 2.5 倍 + 风险成本</text>

  <!-- Total cost box -->
  <rect x="540" y="28" width="220" height="60" rx="8" class="accent-oat"/>
  <rect x="540" y="28" width="220" height="60" rx="8" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="560" y="52" class="value-sm">总成本</text>
  <text x="560" y="74" class="value accent">$970K / 年</text>

  <!-- Layer 1: Direct Costs -->
  <rect x="40" y="88" width="340" height="180" rx="10" fill="#E3DACC"/>
  <rect x="40" y="88" width="340" height="180" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="60" y="114" class="label">直接成本 Direct Costs</text>
  <text x="60" y="130" class="desc">可量化、可跟踪的实际支出</text>

  <!-- Direct cost items -->
  <rect x="60" y="145" width="140" height="54" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="72" y="163" class="desc">检测成本</text>
  <text x="72" y="183" class="value-sm" fill="#D97757">$20K/月</text>

  <rect x="210" y="145" width="140" height="54" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="222" y="163" class="desc">修复成本</text>
  <text x="222" y="183" class="value-sm" fill="#D97757">$1.6K/次</text>

  <rect x="60" y="207" width="140" height="54" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="72" y="225" class="desc">回滚成本</text>
  <text x="72" y="245" class="value-sm" fill="#D97757">$50K/次</text>

  <rect x="210" y="207" width="140" height="54" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="222" y="225" class="desc">复核成本</text>
  <text x="222" y="245" class="value-sm" fill="#D97757">$8.3/决策</text>

  <!-- Layer 2: Indirect Costs -->
  <rect x="40" y="278" width="340" height="108" rx="10" fill="#E3DACC"/>
  <rect x="40" y="278" width="340" height="108" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="60" y="302" class="label">间接成本 Indirect Costs</text>
  <text x="60" y="318" class="desc">声誉损失 + 效率下降 + 机会成本</text>

  <!-- Indirect cost items -->
  <rect x="60" y="332" width="100" height="46" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="70" y="350" class="desc">声誉损失</text>
  <text x="70" y="366" class="value-sm" fill="#788C5D">$500K/年</text>

  <rect x="170" y="332" width="100" height="46" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="180" y="350" class="desc">效率下降</text>
  <text x="180" y="366" class="value-sm" fill="#788C5D">−20%</text>

  <rect x="280" y="332" width="80" height="46" rx="6" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="290" y="350" class="desc">机会成本</text>
  <text x="290" y="366" class="value-sm" fill="#788C5D">$1M</text>

  <!-- Multiplier arrow -->
  <text x="396" y="330" class="accent-g500" font-size="28" font-weight="700">×</text>
  <text x="388" y="350" class="accent-g500" font-size="14">2.5</text>
  <text x="385" y="368" class="desc">倍</text>

  <!-- Layer 3: Risk Costs -->
  <rect x="40" y="396" width="340" height="80" rx="10" fill="#E3DACC"/>
  <rect x="40" y="396" width="340" height="80" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="60" y="420" class="label">风险成本 Risk Costs</text>
  <text x="60" y="436" class="desc">概率加权的极端损失期望值</text>

  <rect x="60" y="446" width="90" height="22" rx="4" fill="#D97757"/>
  <text x="68" y="461" class="value-sm white">监管罚款</text>

  <rect x="160" y="446" width="70" height="22" rx="4" fill="#D97757"/>
  <text x="166" y="461" class="value-sm white">诉讼</text>

  <rect x="240" y="446" width="70" height="22" rx="4" fill="#D97757"/>
  <text x="247" y="461" class="value-sm white">保险费</text>

  <!-- Right side: ROI comparison -->
  <rect x="420" y="88" width="340" height="388" rx="10" fill="#E3DACC"/>
  <rect x="420" y="88" width="340" height="388" rx="10" fill="none" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="440" y="114" class="label">概率化 ROI 对比</text>
  <text x="440" y="130" class="desc">场景：AI 代码生成工具投资 $500K</text>

  <!-- Traditional ROI -->
  <rect x="440" y="148" width="300" height="100" rx="8" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1"/>
  <text x="456" y="170" class="desc">传统 ROI（不考虑幻觉）</text>
  <text x="456" y="200" class="value" fill="#87867F">100%</text>
  <text x="556" y="200" class="desc">= ($1M − $500K) / $500K</text>

  <!-- Probabilistic ROI -->
  <rect x="440" y="258" width="300" height="100" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <text x="456" y="280" class="desc">概率化 ROI（考虑 10% 幻觉率）</text>
  <text x="456" y="310" class="value accent">840%</text>
  <text x="556" y="310" class="desc">期望收益 $970K − $100K摊销</text>

  <!-- Key insight box -->
  <rect x="440" y="370" width="300" height="94" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="1.5"/>
  <text x="456" y="392" class="label" fill="#788C5D">💡 关键洞察</text>
  <text x="456" y="412" class="desc">传统 ROI 低估收益；</text>
  <text x="456" y="428" class="desc">间接成本是直接成本的 2-3 倍</text>
  <text x="456" y="444" class="desc">风险成本决定极端情况暴露</text>

  <!-- Footer note -->
  <text x="40" y="490" class="desc">数据来源：AI-Native 软件工程系列 #42 | 2025-05-24</text>
</svg>
