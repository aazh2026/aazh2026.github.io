<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 800 500"><defs><style>.label{fill:#141413;font-size:13px;font-weight:600}.value,.value-sm{fill:#141413;font-size:22px;font-weight:700}.value-sm{font-size:15px;font-weight:600}.desc{fill:#87867f;font-size:11px}.accent{fill:#d97757}.accent-g500{fill:#87867f}.white{fill:#fff}</style></defs><path d="M0 0h800v500H0z" style="fill:#faf9f5"/><text x="40" y="38" style="fill:#141413;font-size:20px;font-weight:700">AI 幻觉成本模型：三层成本结构</text><text x="40" y="58" style="fill:#87867f;font-size:12px">总成本 = 直接成本 + 间接成本 × 2.5 倍 + 风险成本</text><rect width="220" height="60" x="540" y="28" rx="8" style="fill:#e3dacc"/><rect width="220" height="60" x="540" y="28" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="560" y="52" class="value-sm">总成本</text><text x="560" y="74" class="value accent">$970K / 年</text><rect width="340" height="180" x="40" y="88" fill="#e3dacc" rx="10"/><rect width="340" height="180" x="40" y="88" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><text x="60" y="114" class="label">直接成本 Direct Costs</text><text x="60" y="130" class="desc">可量化、可跟踪的实际支出</text><rect width="140" height="54" x="60" y="145" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="72" y="163" class="desc">检测成本</text><text x="72" y="183" fill="#d97757" class="value-sm">$20K/月</text><rect width="140" height="54" x="210" y="145" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="222" y="163" class="desc">修复成本</text><text x="222" y="183" fill="#d97757" class="value-sm">$1.6K/次</text><rect width="140" height="54" x="60" y="207" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="72" y="225" class="desc">回滚成本</text><text x="72" y="245" fill="#d97757" class="value-sm">$50K/次</text><rect width="140" height="54" x="210" y="207" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="222" y="225" class="desc">复核成本</text><text x="222" y="245" fill="#d97757" class="value-sm">$8.3/决策</text><rect width="340" height="108" x="40" y="278" fill="#e3dacc" rx="10"/><rect width="340" height="108" x="40" y="278" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><text x="60" y="302" class="label">间接成本 Indirect Costs</text><text x="60" y="318" class="desc">声誉损失 + 效率下降 + 机会成本</text><rect width="100" height="46" x="60" y="332" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="70" y="350" class="desc">声誉损失</text><text x="70" y="366" fill="#788c5d" class="value-sm">$500K/年</text><rect width="100" height="46" x="170" y="332" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="180" y="350" class="desc">效率下降</text><text x="180" y="366" fill="#788c5d" class="value-sm">−20%</text><rect width="80" height="46" x="280" y="332" fill="#faf9f5" stroke="#d1cfc5" rx="6"/><text x="290" y="350" class="desc">机会成本</text><text x="290" y="366" fill="#788c5d" class="value-sm">$1M</text><text x="396" y="330" class="accent-g500" font-size="28" font-weight="700">×</text><text x="388" y="350" class="accent-g500" font-size="14">2.5</text><text x="385" y="368" class="desc">倍</text><rect width="340" height="80" x="40" y="396" fill="#e3dacc" rx="10"/><rect width="340" height="80" x="40" y="396" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><text x="60" y="420" class="label">风险成本 Risk Costs</text><text x="60" y="436" class="desc">概率加权的极端损失期望值</text><rect width="90" height="22" x="60" y="446" fill="#d97757" rx="4"/><text x="68" y="461" class="value-sm white">监管罚款</text><rect width="70" height="22" x="160" y="446" fill="#d97757" rx="4"/><text x="166" y="461" class="value-sm white">诉讼</text><rect width="70" height="22" x="240" y="446" fill="#d97757" rx="4"/><text x="247" y="461" class="value-sm white">保险费</text><rect width="340" height="388" x="420" y="88" fill="#e3dacc" rx="10"/><rect width="340" height="388" x="420" y="88" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><text x="440" y="114" class="label">概率化 ROI 对比</text><text x="440" y="130" class="desc">场景：AI 代码生成工具投资 $500K</text><rect width="300" height="100" x="440" y="148" fill="#faf9f5" stroke="#d1cfc5" rx="8"/><text x="456" y="170" class="desc">传统 ROI（不考虑幻觉）</text><text x="456" y="200" fill="#87867f" class="value">100%</text><text x="556" y="200" class="desc">= ($1M − $500K) / $500K</text><rect width="300" height="100" x="440" y="258" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="8"/><text x="456" y="280" class="desc">概率化 ROI（考虑 10% 幻觉率）</text><text x="456" y="310" class="value accent">840%</text><text x="556" y="310" class="desc">期望收益 $970K − $100K摊销</text><rect width="300" height="94" x="440" y="370" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="456" y="392" fill="#788c5d" class="label">💡 关键洞察</text><text x="456" y="412" class="desc">传统 ROI 低估收益；</text><text x="456" y="428" class="desc">间接成本是直接成本的 2-3 倍</text><text x="456" y="444" class="desc">风险成本决定极端情况暴露</text><text x="40" y="490" class="desc">数据来源：AI-Native 软件工程系列 #42 | 2025-05-24</text></svg>