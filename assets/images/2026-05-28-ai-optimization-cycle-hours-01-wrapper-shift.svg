<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="480" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#141413">优化对象的转移：从模型权重到 Markdown Wrapper</text>
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#87867F">Brooks 框架：偶发复杂度消除，本质复杂度迁移</text>

  <!-- Left column: Model weights -->
  <rect x="40" y="80" width="200" height="320" rx="10" fill="#E3DACC" filter="url(#sh)"/>
  <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">模型权重</text>
  <text x="140" y="124" text-anchor="middle" font-size="10" fill="#87867F">Model Weights</text>

  <rect x="60" y="140" width="160" height="28" rx="5" fill="#D97757"/>
  <text x="140" y="159" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">训练集群</text>

  <rect x="60" y="178" width="160" height="28" rx="5" fill="#D97757"/>
  <text x="140" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">标注数据</text>

  <rect x="60" y="216" width="160" height="28" rx="5" fill="#D97757"/>
  <text x="140" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">数月迭代</text>

  <rect x="60" y="254" width="160" height="28" rx="5" fill="#87867F" opacity="0.4"/>
  <text x="140" y="273" text-anchor="middle" font-size="10" fill="#141413" opacity="0.5">GPU 集群</text>

  <rect x="60" y="292" width="160" height="28" rx="5" fill="#87867F" opacity="0.4"/>
  <text x="140" y="311" text-anchor="middle" font-size="10" fill="#141413" opacity="0.5">重新训练</text>

  <text x="140" y="345" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">偶发复杂度</text>
  <text x="140" y="362" text-anchor="middle" font-size="9" fill="#87867F">已消除</text>

  <!-- Arrow between columns -->
  <line x1="250" y1="240" x2="290" y2="240" stroke="#D97757" stroke-width="3" marker-end="url(#arr)"/>
  <text x="270" y="228" text-anchor="middle" font-size="9" fill="#D97757" font-weight="700">优化对象</text>
  <text x="270" y="256" text-anchor="middle" font-size="9" fill="#D97757">转移</text>

  <!-- Center column: Brooks framework -->
  <rect x="300" y="130" width="200" height="220" rx="10" fill="#141413" filter="url(#sh)"/>
  <text x="400" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF9F5">Brooks 框架</text>
  <text x="400" y="178" text-anchor="middle" font-size="10" fill="#87867F">No Silver Bullet (1986)</text>

  <rect x="320" y="194" width="160" height="26" rx="5" fill="#788C5D"/>
  <text x="400" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">偶发复杂度 → 已消除</text>

  <rect x="320" y="230" width="160" height="26" rx="5" fill="#D97757"/>
  <text x="400" y="248" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">本质复杂度 → 迁移</text>

  <text x="400" y="285" text-anchor="middle" font-size="9" fill="#D1CFC5">1986: 编程语言消除复杂度</text>
  <text x="400" y="300" text-anchor="middle" font-size="9" fill="#D1CFC5">2026: AI Wrapper 再次消除</text>
  <text x="400" y="315" text-anchor="middle" font-size="9" fill="#D1CFC5">但本质复杂度永远存在</text>

  <!-- Arrow to right column -->
  <line x1="510" y1="240" x2="550" y2="240" stroke="#D97757" stroke-width="3" marker-end="url(#arr)"/>
  <text x="530" y="228" text-anchor="middle" font-size="9" fill="#D97757" font-weight="700">本质复杂度</text>
  <text x="530" y="256" text-anchor="middle" font-size="9" fill="#D97757">落脚点</text>

  <!-- Right column: Markdown wrapper -->
  <rect x="560" y="80" width="200" height="320" rx="10" fill="#E3DACC" filter="url(#sh)"/>
  <text x="660" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#141413">Markdown Wrapper</text>
  <text x="660" y="124" text-anchor="middle" font-size="10" fill="#87867F">Skill 文件 · Prompt</text>

  <rect x="580" y="140" width="160" height="28" rx="5" fill="#788C5D"/>
  <text x="660" y="159" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">编辑器即可修改</text>

  <rect x="580" y="178" width="160" height="28" rx="5" fill="#788C5D"/>
  <text x="660" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">目标定义即可迭代</text>

  <rect x="580" y="216" width="160" height="28" rx="5" fill="#788C5D"/>
  <text x="660" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">几小时完成优化</text>

  <rect x="580" y="254" width="160" height="28" rx="5" fill="#D97757"/>
  <text x="660" y="273" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">判断力成为瓶颈</text>

  <rect x="580" y="292" width="160" height="28" rx="5" fill="#D97757"/>
  <text x="660" y="311" text-anchor="middle" font-size="10" font-weight="600" fill="#FAF9F5">"Better" 定义权</text>

  <text x="660" y="345" text-anchor="middle" font-size="10" fill="#141413" font-weight="600">本质复杂度</text>
  <text x="660" y="362" text-anchor="middle" font-size="9" fill="#87867F">新落脚点</text>

  <!-- evo loop annotation -->
  <rect x="40" y="420" width="720" height="46" rx="8" fill="#141413" filter="url(#sh)"/>
  <text x="400" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#FAF9F5">evo 闭环: 并行探索 → 树搜索 → Gates → 自动化优化 (50次实验: 5/20 → 11/20)</text>
  <text x="400" y="455" text-anchor="middle" font-size="9" fill="#D1CFC5">优化周期: 月 → 小时 | 优化成本: 数万$ → 编辑器 + 目标定义</text>
</svg>