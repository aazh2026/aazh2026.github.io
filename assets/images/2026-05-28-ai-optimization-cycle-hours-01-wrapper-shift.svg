  <text x="400" y="438" fill="#faf9f5" font-size="11" font-weight="700" text-anchor="middle">evo 闭环: 并行探索 → 树搜索 → Gates → 自动化优化 (50次实验: 5/20 → 11/20)</text>
  <text x="400" y="455" fill="#d1cfc5" font-size="9" text-anchor="middle">优化周期: 月 → 小时 | 优化成本: 数万$ → 编辑器 + 目标定义</text>
</svg>
