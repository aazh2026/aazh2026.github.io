<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, gray #87867F, g300 #D1CFC5 -->

  <title>组织记忆的流失</title>
  <desc>A human silhouette connected to code blocks with knowledge graph showing 87% disconnected nodes</desc>

  <!-- Background -->
  <rect width="640" height="400" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">组织记忆的流失</text>
  <text x="320" y="42" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">王工离职时，他带走了87%的支付网关知识</text>

  <!-- Human silhouette area -->
  <rect x="40" y="65" width="140" height="160" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="110" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">王工</text>

  <!-- Human icon (simplified) -->
  <circle cx="110" cy="130" r="22" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="90" cy="155" width="40" height="50" rx="6" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- X over human (clay color) -->
  <line x1="80" y1="85" x2="140" y2="145" stroke="#D97757" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="85" x2="80" y2="145" stroke="#D97757" stroke-width="3" stroke-linecap="round"/>

  <!-- Dashed connection lines from human to code blocks -->
  <path d="M 180 110 Q 220 110, 240 100" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 180 150 Q 220 150, 240 160" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 180 190 Q 220 190, 240 220" stroke="#D1CFC5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Code blocks connected to human -->
  <!-- Block 1: PaymentService -->
  <rect x="240" y="75" width="170" height="50" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="325" y="98" text-anchor="middle" font-size="11" fill="#D97757" font-family="ui-monospace, monospace">PaymentService.java</text>
  <text x="325" y="115" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">支付网关核心逻辑</text>

  <!-- Block 2: GatewayAdapter -->
  <rect x="240" y="135" width="170" height="50" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="325" y="158" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">GatewayAdapter</text>
  <text x="325" y="175" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">第三方网关适配层</text>

  <!-- Block 3: CurrencyHandler -->
  <rect x="240" y="195" width="170" height="50" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="325" y="218" text-anchor="middle" font-size="11" fill="#141413" font-family="ui-monospace, monospace">CurrencyHandler</text>
  <text x="325" y="235" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">多币种处理逻辑</text>

  <!-- Knowledge Graph section -->
  <rect x="440" y="65" width="180" height="180" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="530" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">知识图谱</text>

  <!-- Active nodes (13%) -->
  <circle cx="480" cy="130" r="6" fill="#788C5D"/>
  <circle cx="520" cy="115" r="6" fill="#788C5D"/>
  <circle cx="560" cy="140" r="6" fill="#788C5D"/>
  <circle cx="540" cy="170" r="6" fill="#788C5D"/>
  <circle cx="500" cy="180" r="6" fill="#788C5D"/>

  <!-- Faded nodes (87%) -->
  <circle cx="500" cy="120" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="540" cy="120" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="580" cy="160" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="560" cy="190" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="520" cy="195" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="490" cy="200" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="470" cy="170" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="450" cy="140" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="460" cy="190" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="590" cy="180" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="600" cy="150" r="6" fill="#D1CFC5" opacity="0.4"/>
  <circle cx="480" cy="160" r="6" fill="#D1CFC5" opacity="0.4"/>

  <!-- Connection lines (active only) -->
  <line x1="480" y1="130" x2="520" y2="115" stroke="#788C5D" stroke-width="1" opacity="0.5"/>
  <line x1="520" y1="115" x2="560" y2="140" stroke="#788C5D" stroke-width="1" opacity="0.5"/>
  <line x1="540" y1="170" x2="500" y2="180" stroke="#788C5D" stroke-width="1" opacity="0.5"/>

  <!-- Percentage indicator -->
  <rect x="480" y="220" width="100" height="18" rx="9" fill="#D97757"/>
  <text x="530" y="233" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="ui-monospace, monospace">87% 知识流失</text>

  <!-- Bottom insight box -->
  <rect x="40" y="270" width="580" height="110" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <text x="330" y="294" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">CodeArchaeologist 的第三层：人员与知识图谱</text>

  <text x="60" y="318" font-size="10.5" fill="#141413">CodeArchaeologist 识别"知识热点"——只有特定人员理解的复杂逻辑。</text>
  <text x="60" y="336" font-size="10.5" fill="#141413">Lisa意识到：这是组织记忆的系统性流失。</text>
  <text x="60" y="354" font-size="10.5" fill="#141413">那些注释、那些TODO、那些"临时方案"，都是王工大脑的外部存储。</text>
  <text x="60" y="372" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">现在存储介质失效了，剩下的只有一堆无法解析的比特。</text>

  <!-- Bottom note -->
  <text x="320" y="392" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">真正的解决方案是文化：写 ADR、做知识分享、把离职当作知识转移的最后期限</text>
</svg>