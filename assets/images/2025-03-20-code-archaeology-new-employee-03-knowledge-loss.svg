<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 640 400">
  <title>组织记忆的流失</title>
  <desc>
    A human silhouette connected to code blocks with knowledge graph showing 87% disconnected nodes
  </desc>
  <path fill="#faf9f5" d="M0 0h640v400H0z"/>
  <text x="320" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">组织记忆的流失</text>
  <text x="320" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">王工离职时，他带走了87%的支付网关知识</text>
  <rect width="140" height="160" x="40" y="65" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="110" y="90" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">王工</text>
  <circle cx="110" cy="130" r="22" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5"/>
  <rect width="40" height="50" x="90" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <path stroke="#d97757" stroke-linecap="round" stroke-width="3" d="m80 85 60 60m0-60-60 60"/>
  <path fill="none" stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="1.5" d="M180 110q40 0 60-10m-60 50q40 0 60 10m-60 30q40 0 60 30"/>
  <rect width="170" height="50" x="240" y="75" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/>
  <text x="325" y="98" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">PaymentService.java</text>
  <text x="325" y="115" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">支付网关核心逻辑</text>
  <rect width="170" height="50" x="240" y="135" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="325" y="158" fill="#141413" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">GatewayAdapter</text>
  <text x="325" y="175" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">第三方网关适配层</text>
  <rect width="170" height="50" x="240" y="195" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="325" y="218" fill="#141413" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">CurrencyHandler</text>
  <text x="325" y="235" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">多币种处理逻辑</text>
  <rect width="180" height="180" x="440" y="65" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/>
  <text x="530" y="88" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">知识图谱</text>
  <circle cx="480" cy="130" r="6" fill="#788c5d"/>
  <circle cx="520" cy="115" r="6" fill="#788c5d"/>
  <circle cx="560" cy="140" r="6" fill="#788c5d"/>
  <circle cx="540" cy="170" r="6" fill="#788c5d"/>
  <circle cx="500" cy="180" r="6" fill="#788c5d"/>
  <circle cx="500" cy="120" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="540" cy="120" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="580" cy="160" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="560" cy="190" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="520" cy="195" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="490" cy="200" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="470" cy="170" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="450" cy="140" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="460" cy="190" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="590" cy="180" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="600" cy="150" r="6" fill="#d1cfc5" opacity=".4"/>
  <circle cx="480" cy="160" r="6" fill="#d1cfc5" opacity=".4"/>
  <path stroke="#788c5d" d="m480 130 40-15m0 0 40 25m-20 30-40 10" opacity=".5"/>
  <rect width="100" height="18" x="480" y="220" fill="#d97757" rx="9"/>
  <text x="530" y="233" fill="#fff" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">87% 知识流失</text>
  <rect width="580" height="110" x="40" y="270" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="8"/>
  <text x="330" y="294" fill="#d97757" font-size="12" font-weight="600" text-anchor="middle">CodeArchaeologist 的第三层：人员与知识图谱</text>
  <text x="60" y="318" fill="#141413" font-size="10.5">CodeArchaeologist 识别&quot;知识热点&quot;——只有特定人员理解的复杂逻辑。</text>
  <text x="60" y="336" fill="#141413" font-size="10.5">Lisa意识到：这是组织记忆的系统性流失。</text>
  <text x="60" y="354" fill="#141413" font-size="10.5">那些注释、那些TODO、那些&quot;临时方案&quot;，都是王工大脑的外部存储。</text>
  <text x="60" y="372" fill="#87867f" font-family="ui-monospace, monospace" font-size="10">现在存储介质失效了，剩下的只有一堆无法解析的比特。</text>
  <text x="320" y="392" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">真正的解决方案是文化：写 ADR、做知识分享、把离职当作知识转移的最后期限</text>
</svg>
