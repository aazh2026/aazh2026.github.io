<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif" viewBox="0 0 640 380"><path fill="#faf9f5" d="M0 0h640v380H0z"/><text x="320" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">Clean Room 的两种形态：信息隔离 vs 知识污染</text><text x="320" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">antirez · @postcodeeng · 2026/03</text><rect width="290" height="260" x="20" y="62" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><text x="165" y="84" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Traditional Clean Room</text><rect width="110" height="70" x="40" y="100" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="95" y="122" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Team A</text><text x="95" y="137" fill="#87867f" font-size="10" text-anchor="middle">规格说明编写者</text><text x="95" y="152" fill="#87867f" font-size="9" text-anchor="middle">(Specification Writers)</text><rect width="10" height="190" x="150" y="100" fill="#d97757" opacity=".85" rx="2"/><text x="155" y="250" fill="#faf9f5" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle" transform="rotate(-90 155 250)">信息隔离墙</text><rect width="110" height="70" x="180" y="100" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="235" y="122" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Team B</text><text x="235" y="137" fill="#87867f" font-size="10" text-anchor="middle">实现者</text><text x="235" y="152" fill="#87867f" font-size="9" text-anchor="middle">(Implementers)</text><path fill="none" stroke="#788c5d" stroke-dasharray="5,3" stroke-width="1.8" d="M95 172q0 28 60 28t80-28"/><path fill="#788c5d" d="m235 168-7 10h14z"/><text x="155" y="195" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8.5" text-anchor="middle">规格说明</text><text x="165" y="222" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">✗ 无直接接触</text><text x="165" y="236" fill="#87867f" font-size="9" text-anchor="middle">绝对信息隔离</text><text x="165" y="305" fill="#141413" font-size="9" text-anchor="middle">目标：独立实现，不复制表达</text><rect width="290" height="260" x="330" y="62" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/><text x="475" y="84" fill="#d97757" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">AI Clean Room</text><rect width="100" height="55" x="350" y="100" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="6"/><text x="400" y="120" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Human</text><text x="400" y="135" fill="#87867f" font-size="9" text-anchor="middle">写出 Functional Spec</text><path stroke="#788c5d" stroke-width="1.8" d="M400 157v18"/><path fill="#788c5d" d="m400 179-4-8h8z"/><text x="418" y="170" fill="#788c5d" font-family="ui-monospace, monospace" font-size="8.5">prompt</text><rect width="160" height="50" x="360" y="183" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="6"/><text x="440" y="203" fill="#d97757" font-size="11" font-weight="600" text-anchor="middle">LLM</text><text x="440" y="220" fill="#87867f" font-size="9" text-anchor="middle">生成代码</text><rect width="184" height="65" x="348" y="241" fill="#faf9f5" stroke="#87867f" stroke-dasharray="6,3" stroke-width="1.2" rx="6"/><text x="440" y="258" fill="#141413" font-size="9" font-weight="500" text-anchor="middle">Training Data</text><text x="440" y="273" fill="#87867f" font-size="8.5" text-anchor="middle">GitHub · Stack Overflow · Books</text><text x="440" y="288" fill="#87867f" font-size="8.5" text-anchor="middle">GPL / MIT / Proprietary</text><path fill="none" stroke="#87867f" stroke-dasharray="3,2" stroke-width="1.2" d="M440 241v-6"/><text x="520" y="255" fill="#d97757" font-family="ui-monospace, monospace" font-size="8">知识污染</text><text x="475" y="335" fill="#d97757" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">⚠ 输出可能含训练数据中的结构相似性</text><text x="475" y="305" fill="#141413" font-size="9" text-anchor="middle">目标：独立实现，不复制表达</text><rect width="600" height="32" x="20" y="330" fill="#f0eee6" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="320" y="350" fill="#141413" font-size="9.5" text-anchor="middle">Goal: Independent Implementation without copying expression</text><title>Traditional vs AI Clean Room Architecture</title><desc>Two-panel comparison: Traditional Clean Room with information barrier between Team A and Team B versus AI Clean Room where LLM training data contaminates the output</desc></svg>