<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, 'Times New Roman', serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="640" height="380" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">Clean Room 的两种形态：信息隔离 vs 知识污染</text>
  <text x="320" y="44" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">antirez · @postcodeeng · 2026/03</text>

  <!-- Left Panel: Traditional Clean Room -->
  <rect x="20" y="62" width="290" height="260" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="165" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">Traditional Clean Room</text>

  <!-- Team A (left) -->
  <rect x="40" y="100" width="110" height="70" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="95" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">Team A</text>
  <text x="95" y="137" text-anchor="middle" font-size="10" fill="#87867F">规格说明编写者</text>
  <text x="95" y="152" text-anchor="middle" font-size="9" fill="#87867F">(Specification Writers)</text>

  <!-- Barrier / Wall -->
  <rect x="150" y="100" width="10" height="190" rx="2" fill="#D97757" opacity="0.85"/>
  <text x="155" y="250" text-anchor="middle" font-size="8" fill="#FAF9F5" font-family="ui-monospace, monospace" transform="rotate(-90, 155, 250)">信息隔离墙</text>

  <!-- Team B (right) -->
  <rect x="180" y="100" width="110" height="70" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="235" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">Team B</text>
  <text x="235" y="137" text-anchor="middle" font-size="10" fill="#87867F">实现者</text>
  <text x="235" y="152" text-anchor="middle" font-size="9" fill="#87867F">(Implementers)</text>

  <!-- Arrow: A spec → B code -->
  <path d="M 95 172 Q 95 200, 155 200 Q 215 200, 235 172" stroke="#788C5D" stroke-width="1.8" fill="none" stroke-dasharray="5,3"/>
  <polygon points="235,168 228,178 242,178" fill="#788C5D"/>
  <text x="155" y="195" text-anchor="middle" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">规格说明</text>

  <!-- No contact indicators -->
  <text x="165" y="222" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">✗ 无直接接触</text>
  <text x="165" y="236" text-anchor="middle" font-size="9" fill="#87867F">绝对信息隔离</text>

  <!-- Left footer -->
  <text x="165" y="305" text-anchor="middle" font-size="9" fill="#141413">目标：独立实现，不复制表达</text>

  <!-- Right Panel: AI Clean Room -->
  <rect x="330" y="62" width="290" height="260" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="475" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757" font-family="ui-monospace, monospace">AI Clean Room</text>

  <!-- Human (prompt writer) -->
  <rect x="350" y="100" width="100" height="55" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="400" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#141413">Human</text>
  <text x="400" y="135" text-anchor="middle" font-size="9" fill="#87867F">写出 Functional Spec</text>

  <!-- Arrow: Human → LLM -->
  <line x1="400" y1="157" x2="400" y2="175" stroke="#788C5D" stroke-width="1.8"/>
  <polygon points="400,179 396,171 404,171" fill="#788C5D"/>
  <text x="418" y="170" font-size="8.5" fill="#788C5D" font-family="ui-monospace, monospace">prompt</text>

  <!-- LLM -->
  <rect x="360" y="183" width="160" height="50" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <text x="440" y="203" text-anchor="middle" font-size="11" font-weight="600" fill="#D97757">LLM</text>
  <text x="440" y="220" text-anchor="middle" font-size="9" fill="#87867F">生成代码</text>

  <!-- Training data cloud (dashed enclosure) -->
  <rect x="348" y="241" width="184" height="65" rx="6" fill="#FAF9F5" stroke="#87867F" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="440" y="258" text-anchor="middle" font-size="9" fill="#141413" font-weight="500">Training Data</text>
  <text x="440" y="273" text-anchor="middle" font-size="8.5" fill="#87867F">GitHub · Stack Overflow · Books</text>
  <text x="440" y="288" text-anchor="middle" font-size="8.5" fill="#87867F">GPL / MIT / Proprietary</text>

  <!-- Contamination arrow: Training data → LLM -->
  <path d="M 440 241 Q 440 225, 440 235" stroke="#87867F" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
  <text x="520" y="255" font-size="8" fill="#D97757" font-family="ui-monospace, monospace">知识污染</text>

  <!-- Warning node -->
  <text x="475" y="335" text-anchor="middle" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">⚠ 输出可能含训练数据中的结构相似性</text>

  <!-- Right footer -->
  <text x="475" y="305" text-anchor="middle" font-size="9" fill="#141413">目标：独立实现，不复制表达</text>

  <!-- Shared footer bar -->
  <rect x="20" y="330" width="600" height="32" rx="4" fill="#F0EEE6" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="320" y="350" text-anchor="middle" font-size="9.5" fill="#141413">Goal: Independent Implementation without copying expression</text>

  <title>Traditional vs AI Clean Room Architecture</title>
  <desc>Two-panel comparison: Traditional Clean Room with information barrier between Team A and Team B versus AI Clean Room where LLM training data contaminates the output</desc>
</svg>