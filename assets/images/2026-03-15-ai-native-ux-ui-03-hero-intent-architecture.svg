<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 900 420">
  <title>AI-Native UX/UI 工作流 vs 传统工作流对比</title>
  <desc>
    左侧展示传统 UX/UI 工作流的线性流程：像素→布局→规格→代码→QA，右侧展示 AI-Native 意图驱动工作流，以及两者之间的转变
  </desc>
  <path fill="#faf9f5" d="M0 0h900v420H0z"/>
  <text x="450" y="26" fill="#141413" font-size="15" font-weight="500" letter-spacing="-.02em" text-anchor="middle">AI-Native UX/UI 设计工作流</text>
  <text x="450" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">意图驱动 vs 像素驱动</text>
  <path stroke="#d97757" stroke-width="2" d="M448 80h4"/>
  <text x="450" y="96" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">意图驱动</text>
  <rect width="400" height="300" x="30" y="72" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="10"/>
  <text x="230" y="100" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">传统 UX/UI 工作流</text>
  <rect width="80" height="44" x="55" y="120" fill="#f5f3ee" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="95" y="138" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">像素调整</text>
  <text x="95" y="154" fill="#141413" font-size="11" text-anchor="middle">像素→布局</text>
  <path stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow)" d="M135 142h13"/>
  <rect width="80" height="44" x="155" y="120" fill="#f5f3ee" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="195" y="138" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">布局设计</text>
  <text x="195" y="154" fill="#141413" font-size="11" text-anchor="middle">出设计稿</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M235 142h13"/>
  <rect width="80" height="44" x="255" y="120" fill="#f5f3ee" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="295" y="138" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">标注说明</text>
  <text x="295" y="154" fill="#141413" font-size="11" text-anchor="middle">写设计规范</text>
  <path stroke="#d1cfc5" stroke-width="1.5" d="M335 142h13"/>
  <rect width="60" height="44" x="355" y="120" fill="#f5f3ee" stroke="#d1cfc5" stroke-width="1.5" rx="6"/>
  <text x="385" y="138" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">开发</text>
  <text x="385" y="154" fill="#141413" font-size="11" text-anchor="middle">实现</text>
  <g transform="translate(55 178)">
    <circle cx="15" cy="10" r="8" fill="none" stroke="#87867f" stroke-width="1.5"/>
    <path stroke="#87867f" stroke-width="1.5" d="M15 18v20M5 26h20M15 38 5 55m10-17 10 17"/>
    <text x="15" y="68" fill="#87867f" font-size="8" text-anchor="middle">设计师</text>
  </g>
  <g transform="translate(195 178)">
    <circle cx="15" cy="10" r="8" fill="none" stroke="#87867f" stroke-width="1.5"/>
    <path stroke="#87867f" stroke-width="1.5" d="M15 18v20M5 26h20M15 38 5 55m10-17 10 17"/>
    <text x="15" y="68" fill="#87867f" font-size="8" text-anchor="middle">设计师</text>
  </g>
  <g transform="translate(295 178)">
    <circle cx="15" cy="10" r="8" fill="none" stroke="#87867f" stroke-width="1.5"/>
    <path stroke="#87867f" stroke-width="1.5" d="M15 18v20M5 26h20M15 38 5 55m10-17 10 17"/>
    <text x="15" y="68" fill="#87867f" font-size="8" text-anchor="middle">开发者</text>
  </g>
  <text x="230" y="300" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">↑ 手动同步 · 版本迭代 · 沟通损耗</text>
  <rect width="360" height="50" x="55" y="312" fill="#f5f3ee" stroke="#d1cfc5" rx="6"/>
  <text x="100" y="330" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">60%</text>
  <text x="100" y="344" fill="#87867f" font-size="8" text-anchor="middle">重复操作</text>
  <text x="220" y="330" fill="#141413" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">25%</text>
  <text x="220" y="344" fill="#87867f" font-size="8" text-anchor="middle">版本同步</text>
  <text x="340" y="330" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">15%</text>
  <text x="340" y="344" fill="#87867f" font-size="8" text-anchor="middle">创造性思考</text>
  <rect width="400" height="300" x="470" y="72" fill="#fff" stroke="#788c5d" stroke-width="2" rx="10"/>
  <text x="670" y="100" fill="#141413" font-size="13" font-weight="600" text-anchor="middle">AI-Native UX/UI 工作流</text>
  <rect width="90" height="50" x="495" y="118" fill="#d97757" fill-opacity=".12" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="540" y="138" fill="#141413" font-size="11" text-anchor="middle">意图描述</text>
  <text x="540" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Intent Input</text>
  <path stroke="#d97757" stroke-width="2" d="M585 143h13"/>
  <rect width="90" height="50" x="605" y="118" fill="#d97757" fill-opacity=".12" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <text x="650" y="138" fill="#141413" font-size="11" text-anchor="middle">AI 生成</text>
  <text x="650" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">多方案输出</text>
  <path stroke="#788c5d" stroke-width="2" d="M695 143h13"/>
  <rect width="90" height="50" x="715" y="118" fill="#788c5d" fill-opacity=".12" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <text x="760" y="138" fill="#141413" font-size="11" text-anchor="middle">评估筛选</text>
  <text x="760" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">A/B 建议</text>
  <path stroke="#788c5d" stroke-width="2" d="M805 143h13"/>
  <rect width="45" height="50" x="825" y="118" fill="#788c5d" fill-opacity=".12" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <text x="847" y="138" fill="#141413" font-size="11" text-anchor="middle">发布</text>
  <text x="847" y="154" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Ship</text>
  <g transform="translate(670 180)">
    <circle cx="15" cy="10" r="7" fill="none" stroke="#d97757" stroke-width="1.5"/>
    <path stroke="#d97757" stroke-width="1.5" d="M15 17v17M7 24h16m-8 10L8 48m7-14 7 14"/>
    <text x="15" y="62" fill="#d97757" font-size="8" text-anchor="middle">设计师=审核者</text>
  </g>
  <rect width="80" height="28" x="700" y="252" fill="#d97757" rx="14"/>
  <text x="740" y="271" fill="#fff" font-family="ui-monospace, monospace" font-size="13" font-weight="700" text-anchor="middle">21×</text>
  <text x="740" y="286" fill="#d97757" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">速度提升</text>
  <text x="670" y="312" fill="#788c5d" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">意图驱动 · AI 执行细节 · 设计师专注决策</text>
  <rect width="360" height="34" x="495" y="330" fill="#f5f3ee" stroke="#d1cfc5" rx="6"/>
  <circle cx="518" cy="347" r="5" fill="#d97757"/>
  <text x="530" y="351" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">人类主导</text>
  <circle cx="610" cy="347" r="5" fill="#788c5d"/>
  <text x="622" y="351" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">AI 执行</text>
  <circle cx="700" cy="347" r="5" fill="#d1cfc5" stroke="#87867f"/>
  <text x="712" y="351" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">自动流程</text>
  <path stroke="#d97757" stroke-width="2" d="M770 347h20"/>
  <text x="798" y="351" fill="#87867f" font-family="ui-monospace, monospace" font-size="9">核心转变</text>
  <defs>
    <marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="6" refY="3">
      <path fill="#d1cfc5" d="m0 0 6 3-6 3"/>
    </marker>
  </defs>
</svg>
