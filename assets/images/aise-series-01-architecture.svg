<svg xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif" viewBox="0 0 900 540"><defs><filter id="shadow4" width="120%" height="120%" x="-10%" y="-10%"><feDropShadow dx="2" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="3"/></filter></defs><path fill="#faf9f5" d="M0 0h900v540H0z"/><text x="450" y="34" fill="#141413" font-size="16" font-weight="bold" text-anchor="middle">AI-Native 软件工程知识体系</text><text x="450" y="53" fill="#87867f" font-size="11" text-anchor="middle">6 层架构 · 27 篇文章 · 约 300 分钟深度阅读</text><rect width="160" height="60" x="20" y="72" fill="#d97757" filter="url(#shadow4)" rx="8"/><text x="100" y="93" fill="#faf9f5" font-size="10" font-weight="bold" text-anchor="middle">理论基础层</text><text x="100" y="109" fill="#e3dacc" font-size="9" text-anchor="middle">Theory Layer</text><text x="100" y="124" fill="#faf9f5" font-size="8" text-anchor="middle">4 篇文章</text><rect width="685" height="60" x="195" y="72" fill="#faf9f5" stroke="#d97757" stroke-width="1.5" rx="8"/><text x="210" y="93" fill="#141413" font-size="9" font-weight="bold">Context Engineering · TDD vs Intent-Driven · Intent Complexity · AISE Manifesto</text><text x="210" y="110" fill="#87867f" font-size="9">AI 不是替代程序员，而是改变了上下文管理的复杂度层级</text><rect width="160" height="60" x="20" y="142" fill="#788c5d" filter="url(#shadow4)" rx="8"/><text x="100" y="163" fill="#faf9f5" font-size="10" font-weight="bold" text-anchor="middle">需求与设计层</text><text x="100" y="179" fill="#e3dacc" font-size="9" text-anchor="middle">Requirements &amp; Design</text><text x="100" y="194" fill="#faf9f5" font-size="8" text-anchor="middle">2 篇文章</text><rect width="685" height="60" x="195" y="142" fill="#faf9f5" stroke="#788c5d" stroke-width="1.5" rx="8"/><text x="210" y="163" fill="#141413" font-size="9" font-weight="bold">Executable PRD · S-curve Adoption</text><text x="210" y="180" fill="#87867f" font-size="9">PRD 不再是文档，而是可直接执行的意图表达 · AI 采用是 S 曲线的三次跃迁</text><rect width="160" height="60" x="20" y="212" fill="#d1cfc5" filter="url(#shadow4)" rx="8"/><text x="100" y="233" fill="#141413" font-size="10" font-weight="bold" text-anchor="middle">开发实践层</text><text x="100" y="249" fill="#141413" font-size="9" text-anchor="middle">Development Practice</text><text x="100" y="264" fill="#141413" font-size="8" text-anchor="middle">4 篇文章</text><rect width="685" height="60" x="195" y="212" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="210" y="233" fill="#141413" font-size="9" font-weight="bold">Code Review 死亡 · Semantic Diff · Agent Swarm · 停止写单元测试</text><text x="210" y="250" fill="#87867f" font-size="9">人类评审的认知天花板与 AI 评审三形态 · 从文本 diff 到语义 diff</text><rect width="160" height="60" x="20" y="282" fill="#e3dacc" filter="url(#shadow4)" rx="8"/><text x="100" y="303" fill="#141413" font-size="10" font-weight="bold" text-anchor="middle">代码与知识层</text><text x="100" y="319" fill="#141413" font-size="9" text-anchor="middle">Code &amp; Knowledge</text><text x="100" y="334" fill="#141413" font-size="8" text-anchor="middle">3 篇文章</text><rect width="685" height="60" x="195" y="282" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/><text x="210" y="303" fill="#141413" font-size="9" font-weight="bold">Knowledge Assetization · Context ROT · Code Archaeology</text><text x="210" y="320" fill="#87867f" font-size="9">代码从资产变成负债，知识才是真正的资产 · Context 衰减与四层防线治理</text><rect width="160" height="60" x="20" y="352" fill="#87867f" filter="url(#shadow4)" rx="8"/><text x="100" y="373" fill="#faf9f5" font-size="10" font-weight="bold" text-anchor="middle">团队与组织层</text><text x="100" y="389" fill="#e3dacc" font-size="9" text-anchor="middle">Team &amp; Organization</text><text x="100" y="404" fill="#faf9f5" font-size="8" text-anchor="middle">1 篇文章</text><rect width="685" height="60" x="195" y="352" fill="#faf9f5" stroke="#87867f" stroke-width="1.5" rx="8"/><text x="210" y="373" fill="#141413" font-size="9" font-weight="bold">AI-Native Team Restructure · Intent Architect</text><text x="210" y="390" fill="#87867f" font-size="9">从技能持有到 Intent 架构师的组织演化 · 从个人杠杆到系统杠杆的价值跃迁</text><rect width="160" height="60" x="20" y="422" fill="#141413" filter="url(#shadow4)" rx="8"/><text x="100" y="443" fill="#faf9f5" font-size="10" font-weight="bold" text-anchor="middle">治理与质量层</text><text x="100" y="459" fill="#d1cfc5" font-size="9" text-anchor="middle">Governance &amp; Quality</text><text x="100" y="474" fill="#87867f" font-size="8" text-anchor="middle">4 篇文章</text><rect width="685" height="60" x="195" y="422" fill="#faf9f5" stroke="#141413" stroke-width="1.5" rx="8"/><text x="210" y="443" fill="#141413" font-size="9" font-weight="bold">Context/Prompt/HA 治理 · 可追溯性 · Human-AI SLA · Prompt Library</text><text x="210" y="460" fill="#87867f" font-size="9">Context 治理、Prompt 治理、人机协作治理 · 四层技术架构端到端可追溯</text><rect width="860" height="36" x="20" y="495" fill="#d97757" stroke="#141413" stroke-width="1.5" rx="8"/><text x="450" y="517" fill="#faf9f5" font-size="11" font-weight="bold" text-anchor="middle">核心问题：当 AI 可以写代码时，软件工程还剩下什么？</text></svg>