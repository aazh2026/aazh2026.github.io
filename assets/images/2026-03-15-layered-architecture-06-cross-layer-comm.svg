<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 600 280"><path fill="#faf9f5" d="M0 0h600v280H0z"/><text x="300" y="24" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">层间通信的三种模式</text><text x="300" y="40" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Sequential · Event-based · Streaming</text><rect width="160" height="180" x="30" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="110" y="82" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Sequential</text><text x="110" y="96" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">(Context Object)</text><rect width="120" height="32" x="50" y="108" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="110" y="128" fill="#141413" font-size="10" text-anchor="middle">上层 Layer N</text><path stroke="#d97757" stroke-width="2" d="M110 140v18"/><path fill="#d97757" d="m110 164-4-8h8z"/><text x="118" y="154" fill="#d97757" font-family="ui-monospace, monospace" font-size="9">context</text><rect width="120" height="32" x="50" y="168" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="110" y="188" fill="#141413" font-size="10" text-anchor="middle">下层 Layer N-1</text><text x="110" y="228" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">顺序传递 · 同步调用</text><rect width="160" height="180" x="220" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="300" y="82" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Event-based</text><text x="300" y="96" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">(Event Bus)</text><rect width="56" height="28" x="234" y="108" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="262" y="126" fill="#141413" font-size="9" text-anchor="middle">L5/I</text><rect width="56" height="28" x="310" y="108" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="338" y="126" fill="#141413" font-size="9" text-anchor="middle">L4/O</text><circle cx="300" cy="154" r="22" fill="#fff" stroke="#d97757" stroke-width="2"/><circle cx="300" cy="154" r="14" fill="#d97757"/><text x="300" y="158" fill="#fff" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">Bus</text><path stroke="#d97757" stroke-dasharray="3,2" stroke-width="1.5" d="m278 142-38-20m82 20 38-20m-60 54-60 16m60-16 60 16"/><rect width="56" height="28" x="234" y="188" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="262" y="206" fill="#141413" font-size="9" text-anchor="middle">L3/C</text><rect width="56" height="28" x="310" y="188" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="338" y="206" fill="#141413" font-size="9" text-anchor="middle">L2/M</text><text x="300" y="228" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">发布/订阅 · 异步解耦</text><rect width="160" height="180" x="410" y="60" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="490" y="82" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">Streaming</text><text x="490" y="96" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">(Continuous)</text><rect width="120" height="32" x="430" y="108" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="490" y="128" fill="#141413" font-size="10" text-anchor="middle">上层 Layer N</text><path fill="none" stroke="#788c5d" stroke-width="2" d="M490 140q10 8 0 16t0 16 0 16"/><path fill="#788c5d" d="m490 192-4-8h8z"/><text x="498" y="168" fill="#788c5d" font-family="ui-monospace, monospace" font-size="9">stream</text><rect width="120" height="32" x="430" y="198" fill="#e8e6e0" stroke="#d1cfc5" stroke-width="1.2" rx="4"/><text x="490" y="218" fill="#141413" font-size="10" text-anchor="middle">下层 Layer N-1</text><text x="490" y="228" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">流式响应 · 边读边处理</text><title>层间通信的三种模式</title><desc>三种层间通信模式对比图：顺序传递（同步调用 Context Object）、事件驱动（Event Bus 发布/订阅）、流式（连续数据流）</desc></svg>