<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- Color palette: ivory bg #FAF9F5, clay #D97757, olive #788C5D, slate #141413, g300 #D1CFC5 -->

  <!-- Background -->
  <rect width="600" height="280" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="500" fill="#141413" letter-spacing="-0.02em">层间通信的三种模式</text>
  <text x="300" y="40" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace">Sequential · Event-based · Streaming</text>

  <!-- === Panel 1: Sequential === -->
  <rect x="30" y="60" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="11" fill="#141413" font-weight="600">Sequential</text>
  <text x="110" y="96" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">(Context Object)</text>

  <!-- Upper layer box -->
  <rect x="50" y="108" width="120" height="32" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="110" y="128" text-anchor="middle" font-size="10" fill="#141413">上层 Layer N</text>

  <!-- Arrow down (solid) -->
  <line x1="110" y1="140" x2="110" y2="158" stroke="#D97757" stroke-width="2"/>
  <polygon points="110,164 106,156 114,156" fill="#D97757"/>
  <text x="118" y="154" font-size="9" fill="#D97757" font-family="ui-monospace, monospace">context</text>

  <!-- Lower layer box -->
  <rect x="50" y="168" width="120" height="32" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="110" y="188" text-anchor="middle" font-size="10" fill="#141413">下层 Layer N-1</text>

  <!-- Label -->
  <text x="110" y="228" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">顺序传递 · 同步调用</text>

  <!-- === Panel 2: Event-based === -->
  <rect x="220" y="60" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="300" y="82" text-anchor="middle" font-size="11" fill="#141413" font-weight="600">Event-based</text>
  <text x="300" y="96" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">(Event Bus)</text>

  <!-- Layer boxes -->
  <rect x="234" y="108" width="56" height="28" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="262" y="126" text-anchor="middle" font-size="9" fill="#141413">L5/I</text>
  <rect x="310" y="108" width="56" height="28" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="338" y="126" text-anchor="middle" font-size="9" fill="#141413">L4/O</text>

  <!-- Event bus (central node, clay accent) -->
  <circle cx="300" cy="154" r="22" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
  <circle cx="300" cy="154" r="14" fill="#D97757"/>
  <text x="300" y="158" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">Bus</text>

  <!-- Radiating arrows from bus -->
  <line x1="278" y1="142" x2="240" y2="122" stroke="#D97757" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="322" y1="142" x2="360" y2="122" stroke="#D97757" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="176" x2="240" y2="192" stroke="#D97757" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="176" x2="360" y2="192" stroke="#D97757" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Lower layer boxes -->
  <rect x="234" y="188" width="56" height="28" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="262" y="206" text-anchor="middle" font-size="9" fill="#141413">L3/C</text>
  <rect x="310" y="188" width="56" height="28" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="338" y="206" text-anchor="middle" font-size="9" fill="#141413">L2/M</text>

  <!-- Label -->
  <text x="300" y="228" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">发布/订阅 · 异步解耦</text>

  <!-- === Panel 3: Streaming === -->
  <rect x="410" y="60" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="490" y="82" text-anchor="middle" font-size="11" fill="#141413" font-weight="600">Streaming</text>
  <text x="490" y="96" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">(Continuous)</text>

  <!-- Upper layer box -->
  <rect x="430" y="108" width="120" height="32" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="490" y="128" text-anchor="middle" font-size="10" fill="#141413">上层 Layer N</text>

  <!-- Wavy arrow (streaming) -->
  <path d="M 490 140 Q 500 148 490 156 Q 480 164 490 172 Q 500 180 490 188" stroke="#788C5D" stroke-width="2" fill="none"/>
  <polygon points="490,192 486,184 494,184" fill="#788C5D"/>
  <text x="498" y="168" font-size="9" fill="#788C5D" font-family="ui-monospace, monospace">stream</text>

  <!-- Lower layer box -->
  <rect x="430" y="198" width="120" height="32" rx="4" fill="#E8E6E0" stroke="#D1CFC5" stroke-width="1.2"/>
  <text x="490" y="218" text-anchor="middle" font-size="10" fill="#141413">下层 Layer N-1</text>

  <!-- Label -->
  <text x="490" y="228" text-anchor="middle" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">流式响应 · 边读边处理</text>

  <!-- Title + Desc for accessibility -->
  <title>层间通信的三种模式</title>
  <desc>三种层间通信模式对比图：顺序传递（同步调用 Context Object）、事件驱动（Event Bus 发布/订阅）、流式（连续数据流）</desc>
</svg>
