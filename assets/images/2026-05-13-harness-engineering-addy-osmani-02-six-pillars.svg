<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" viewBox="0 0 860 420">
  <rect width="860" height="420" fill="#faf9f5" rx="12"/>
  <text x="30" y="38" fill="#141413" font-size="15" font-weight="700">Harness 六层基础构件：从行为倒推设计</text>
  <text x="30" y="56" fill="#87867f" font-size="11">Addy Osmani — 每个组件对应一个具体行为，没有行为就没有组件</text>
  <rect width="255" height="140" x="30" y="78" fill="none" stroke="#788c5d" stroke-width="2" rx="10"/>
  <rect width="255" height="30" x="30" y="78" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M30 98h255v10H30z"/>
  <text x="157" y="98" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">1. 文件系统 &amp; Git</text>
  <text x="157" y="126" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">持久状态</text>
  <text x="157" y="146" fill="#87867f" font-size="10" text-anchor="middle">工作区 · 中间结果 offload</text>
  <text x="157" y="163" fill="#87867f" font-size="10" text-anchor="middle">版本控制 · 分支实验 · 回滚</text>
  <rect width="155" height="22" x="80" y="178" fill="#e3dacc" rx="5"/>
  <text x="157" y="193" fill="#141413" font-size="10" text-anchor="middle">Filesystem = 工作区</text>
  <rect width="255" height="140" x="302" y="78" fill="none" stroke="#d97757" stroke-width="2" rx="10"/>
  <rect width="255" height="30" x="302" y="78" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M302 98h255v10H302z"/>
  <text x="430" y="98" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">2. Bash &amp; 代码执行</text>
  <text x="430" y="126" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">通用工具</text>
  <text x="430" y="146" fill="#87867f" font-size="10" text-anchor="middle">ReAct loop: Reason → Act → Observe</text>
  <text x="430" y="163" fill="#87867f" font-size="10" text-anchor="middle">按需构建，而非预建所有工具</text>
  <rect width="180" height="22" x="340" y="178" fill="#e3dacc" rx="5"/>
  <text x="430" y="193" fill="#141413" font-size="10" text-anchor="middle">Bash = 按需构建工具</text>
  <rect width="255" height="140" x="574" y="78" fill="none" stroke="#788c5d" stroke-width="2" rx="10"/>
  <rect width="255" height="30" x="574" y="78" fill="#788c5d" rx="10"/>
  <path fill="#788c5d" d="M574 98h255v10H574z"/>
  <text x="702" y="98" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">3. Sandboxes &amp; 默认工具</text>
  <text x="702" y="126" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">安全隔离环境</text>
  <text x="702" y="146" fill="#87867f" font-size="10" text-anchor="middle">预装运行时 · 测试 CLI</text>
  <text x="702" y="163" fill="#87867f" font-size="10" text-anchor="middle">Headless browsers · 强默认</text>
  <rect width="175" height="22" x="615" y="178" fill="#e3dacc" rx="5"/>
  <text x="702" y="193" fill="#141413" font-size="10" text-anchor="middle">安全执行环境</text>
  <rect width="255" height="140" x="30" y="232" fill="none" stroke="#d97757" stroke-width="2" rx="10"/>
  <rect width="255" height="30" x="30" y="232" fill="#d97757" rx="10"/>
  <path fill="#d97757" d="M30 252h255v10H30z"/>
  <text x="157" y="252" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">4. 内存 &amp; 搜索</text>
  <text x="157" y="280" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">持续学习</text>
  <text x="157" y="300" fill="#87867f" font-size="10" text-anchor="middle">AGENTS.md 跨 session 注入知识</text>
  <text x="157" y="317" fill="#87867f" font-size="10" text-anchor="middle">Web search / MCP 实时信息</text>
  <rect width="195" height="22" x="60" y="332" fill="#e3dacc" rx="5"/>
  <text x="157" y="347" fill="#141413" font-size="10" text-anchor="middle">Session 间知识持久化</text>
  <rect width="255" height="140" x="302" y="232" fill="none" stroke="#d1cfc5" stroke-width="2" rx="10"/>
  <rect width="255" height="30" x="302" y="232" fill="#87867f" rx="10"/>
  <path fill="#87867f" d="M302 252h255v10H302z"/>
  <text x="430" y="252" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">5. 对抗 Context Rot</text>
  <text x="430" y="280" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">上下文窗口稀缺管理</text>
  <text x="430" y="300" fill="#87867f" font-size="10" text-anchor="middle">Compaction · Tool-call offloading</text>
  <text x="430" y="317" fill="#87867f" font-size="10" text-anchor="middle">Progressive disclosure</text>
  <rect width="215" height="22" x="322" y="332" fill="#e3dacc" rx="5"/>
  <text x="430" y="347" fill="#141413" font-size="10" text-anchor="middle">窗口填满 → 推理退化</text>
  <rect width="255" height="140" x="574" y="232" fill="none" stroke="#d1cfc5" stroke-width="2" rx="10"/>
  <rect width="255" height="30" x="574" y="232" fill="#87867f" rx="10"/>
  <path fill="#87867f" d="M574 252h255v10H574z"/>
  <text x="702" y="252" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">6. 长时执行</text>
  <text x="702" y="280" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">对抗 early stopping</text>
  <text x="702" y="300" fill="#87867f" font-size="10" text-anchor="middle">Loops · Planning · Splits</text>
  <text x="702" y="317" fill="#87867f" font-size="10" text-anchor="middle">Gen + Eval 分离防 self-bias</text>
  <rect width="193" height="22" x="605" y="332" fill="#e3dacc" rx="5"/>
  <text x="702" y="347" fill="#141413" font-size="10" text-anchor="middle">强制继续 vs 模型退出</text>
  <rect width="800" height="26" x="30" y="388" fill="#141413" rx="6"/>
  <text x="430" y="406" fill="#faf9f5" font-size="11" text-anchor="middle">Harness Engineering = discipline，不是 one-size-fits-all framework</text>
  <text x="770" y="406" fill="#d97757" font-size="10" font-weight="700" text-anchor="end">竞争在地基</text>
</svg>
