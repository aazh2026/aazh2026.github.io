<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-label="交付件模板关系图">
  <title>AI-Native SDLC 交付件关系图</title>
  <desc>展示 8 种交付件模板之间的关系和层次</desc>

  <defs>
    <linearGradient id="bgGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bgGrad7)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#141413" text-anchor="middle">AI-Native SDLC 交付件关系图</text>
  <text x="400" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">8 大模板，从战略到运营的完整闭环</text>

  <!-- Product Intent (Top center) -->
  <rect x="260" y="65" width="280" height="52" rx="8" fill="#D97757"/>
  <text x="400" y="88" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">Product Intent</text>
  <text x="400" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5" text-anchor="middle">产品意图 · 业务目标</text>

  <!-- Arrows down from PI -->
  <line x1="310" y1="117" x2="310" y2="135" stroke="#D97757" stroke-width="2"/>
  <polygon points="310,142 305,134 315,134" fill="#D97757"/>
  <line x1="400" y1="117" x2="400" y2="135" stroke="#D97757" stroke-width="2"/>
  <polygon points="400,142 395,134 405,134" fill="#D97757"/>
  <line x1="490" y1="117" x2="490" y2="135" stroke="#D97757" stroke-width="2"/>
  <polygon points="490,142 485,134 495,134" fill="#D97757"/>

  <!-- Row 2: User Story Pack + Architecture Spec -->
  <rect x="60" y="145" width="260" height="52" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="60" y="145" width="260" height="24" rx="8" fill="#788C5D"/>
  <rect x="60" y="161" width="260" height="8" fill="#788C5D"/>
  <text x="190" y="160" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">User Story Pack</text>
  <text x="190" y="183" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">用户故事包 · 验收即测试</text>

  <rect x="480" y="145" width="260" height="52" rx="8" fill="#FAF9F5" stroke="#5B8BD4" stroke-width="2"/>
  <rect x="480" y="145" width="260" height="24" rx="8" fill="#5B8BD4"/>
  <rect x="480" y="161" width="260" height="8" fill="#5B8BD4"/>
  <text x="610" y="160" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Architecture Spec</text>
  <text x="610" y="183" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">架构规范 · 技术决策</text>

  <!-- Arrows to Execution Plan -->
  <line x1="190" y1="197" x2="380" y2="220" stroke="#788C5D" stroke-width="1.5"/>
  <polygon points="378,223 372,215 386,218" fill="#788C5D"/>
  <line x1="610" y1="197" x2="420" y2="220" stroke="#5B8BD4" stroke-width="1.5"/>
  <polygon points="422,223 428,215 414,218" fill="#5B8BD4"/>

  <!-- Execution Plan (Center) -->
  <rect x="300" y="220" width="200" height="52" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="2.5"/>
  <rect x="300" y="220" width="200" height="24" rx="8" fill="#141413"/>
  <rect x="300" y="236" width="200" height="8" fill="#141413"/>
  <text x="400" y="235" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Execution Plan</text>
  <text x="400" y="258" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">执行计划 · 任务拆解</text>

  <!-- Arrows down -->
  <line x1="350" y1="272" x2="250" y2="295" stroke="#141413" stroke-width="1.5"/>
  <polygon points="248,298 254,290 242,293" fill="#141413"/>
  <line x1="400" y1="272" x2="400" y2="295" stroke="#141413" stroke-width="1.5"/>
  <polygon points="400,302 394,294 406,294" fill="#141413"/>
  <line x1="450" y1="272" x2="550" y2="295" stroke="#141413" stroke-width="1.5"/>
  <polygon points="552,298 546,290 558,293" fill="#141413"/>

  <!-- Row 4: Quality Contract + Operations Runbook -->
  <rect x="120" y="300" width="230" height="52" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="120" y="300" width="230" height="24" rx="8" fill="#D97757"/>
  <rect x="120" y="316" width="230" height="8" fill="#D97757"/>
  <text x="235" y="315" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Quality Contract</text>
  <text x="235" y="338" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">质量契约 · 验收标准</text>

  <rect x="450" y="300" width="230" height="52" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="450" y="300" width="230" height="24" rx="8" fill="#D97757"/>
  <rect x="450" y="316" width="230" height="8" fill="#D97757"/>
  <text x="565" y="315" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Operations Runbook</text>
  <text x="565" y="338" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">运维手册 · 故障剧本</text>

  <!-- Arrow to Traceability Matrix -->
  <line x1="320" y1="352" x2="320" y2="370" stroke="#87867F" stroke-width="1.5"/>
  <polygon points="320,377 315,369 325,369" fill="#87867F"/>
  <line x1="480" y1="352" x2="480" y2="370" stroke="#87867F" stroke-width="1.5"/>
  <polygon points="480,377 475,369 485,369" fill="#87867F"/>
  <line x1="320" y1="374" x2="480" y2="374" stroke="#87867F" stroke-width="1.5"/>
  <line x1="480" y1="374" x2="480" y2="374" stroke="#87867F" stroke-width="1.5"/>

  <!-- Traceability Matrix (Bottom center) -->
  <rect x="280" y="377" width="240" height="48" rx="8" fill="#FAF9F5" stroke="#87867F" stroke-width="2"/>
  <rect x="280" y="377" width="240" height="22" rx="8" fill="#87867F"/>
  <rect x="280" y="391" width="240" height="8" fill="#87867F"/>
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Traceability Matrix</text>
  <text x="400" y="413" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">追溯矩阵 · 需求到代码的全链路追踪</text>

  <!-- Legend -->
  <text x="40" y="420" font-family="system-ui, sans-serif" font-size="9" fill="#87867F">虚线框：辅助交付件 | 实线框：核心交付件 | 箭头：依赖关系</text>
</svg>
