<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-label="交付件模板关系图">
  <title>AI-Native SDLC 交付件关系图</title>
  <desc>展示 8 种交付件模板之间的关系和层次：Product Intent → User Story Pack → Architecture Spec → Execution Plan → Quality Contract → Operations Runbook → Traceability Matrix</desc>

  <defs>
    <linearGradient id="bgGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <marker id="arrowDark" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#141413"/>
    </marker>
    <marker id="arrowClay" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97757"/>
    </marker>
    <marker id="arrowOlive" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#788C5D"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <rect width="800" height="440" fill="url(#bgGrad7)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#141413" text-anchor="middle">AI-Native SDLC 交付件关系图</text>
  <text x="400" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#87867F" text-anchor="middle">8 大模板 → 从战略到运营的完整闭环</text>

  <!-- Product Intent (Top) -->
  <rect x="260" y="65" width="280" height="52" rx="8" fill="#D97757" stroke="#D97757" stroke-width="2"/>
  <text x="400" y="88" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">Product Intent</text>
  <text x="400" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5" text-anchor="middle">产品意图 · 业务目标 · 用户价值</text>

  <!-- Arrows down from PI -->
  <line x1="310" y1="117" x2="310" y2="135" stroke="#D97757" stroke-width="2" marker-end="url(#arrowClay)"/>
  <line x1="400" y1="117" x2="400" y2="135" stroke="#D97757" stroke-width="2" marker-end="url(#arrowClay)"/>
  <line x1="490" y1="117" x2="490" y2="135" stroke="#D97757" stroke-width="2" marker-end="url(#arrowClay)"/>

  <!-- Row 2: User Story Pack + Architecture Spec -->
  <rect x="60" y="140" width="260" height="52" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="60" y="140" width="260" height="24" rx="8" fill="#788C5D"/>
  <rect x="60" y="156" width="260" height="8" fill="#788C5D"/>
  <text x="190" y="155" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">User Story Pack</text>
  <text x="190" y="179" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">用户故事包 · 验收即测试</text>

  <rect x="480" y="140" width="260" height="52" rx="8" fill="#FAF9F5" stroke="#5B8BD4" stroke-width="2"/>
  <rect x="480" y="140" width="260" height="24" rx="8" fill="#5B8BD4"/>
  <rect x="480" y="156" width="260" height="8" fill="#5B8BD4"/>
  <text x="610" y="155" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Architecture Spec</text>
  <text x="610" y="179" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">架构规范 · 技术决策记录</text>

  <!-- Arrows to Execution Plan -->
  <line x1="190" y1="192" x2="400" y2="215" stroke="#788C5D" stroke-width="1.5" marker-end="url(#arrowOlive)"/>
  <line x1="610" y1="192" x2="400" y2="215" stroke="#5B8BD4" stroke-width="1.5" marker-end="url(#arrowOlive)"/>

  <!-- Execution Plan (Center) -->
  <rect x="300" y="215" width="200" height="52" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="2.5"/>
  <rect x="300" y="215" width="200" height="24" rx="8" fill="#141413"/>
  <rect x="300