<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" viewBox="0 0 860 380"><rect width="860" height="380" fill="#faf9f5" rx="12"/><text x="30" y="38" fill="#141413" font-size="15" font-weight="700">Skill 库的复利效应：积累 vs 消耗</text><text x="30" y="56" fill="#87867f" font-size="11">10 Skills × 30分钟/周 = 6.5 个完整工作周 / 年 — 真正的资产是系统，不是信息</text><rect width="360" height="240" x="30" y="76" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><text x="210" y="100" fill="#141413" font-size="13" font-weight="700" text-anchor="middle">核心数学</text><rect width="320" height="34" x="50" y="114" fill="#e3dacc" rx="8"/><text x="210" y="137" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">1 Skill × 30 分钟/周 = 26 小时/年</text><rect width="320" height="34" x="50" y="158" fill="#e3dacc" rx="8"/><text x="210" y="181" fill="#141413" font-size="12" font-weight="600" text-anchor="middle">10 Skills × 30 分钟/周 = 260 小时/年</text><rect width="320" height="44" x="50" y="204" fill="#d97757" rx="8"/><text x="210" y="227" fill="#faf9f5" font-size="15" font-weight="800" text-anchor="middle">= 6.5 个完整工作周 / 年</text><text x="210" y="268" fill="#141413" font-size="11" text-anchor="middle">52 周 × 5 工作日 × 8 小时 = 2080 小时/年</text><text x="210" y="286" fill="#87867f" font-size="10" text-anchor="middle">260 小时 ≈ 6.5 周 ≈ 32.5 个工作日</text><rect width="140" height="24" x="50" y="300" fill="#d1cfc5" rx="6"/><text x="120" y="316" fill="#141413" font-size="10" text-anchor="middle">每天重复输入</text><text x="210" y="316" fill="#87867f" font-size="10" text-anchor="middle">vs</text><rect width="130" height="24" x="240" y="300" fill="#788c5d" rx="6"/><text x="305" y="316" fill="#faf9f5" font-size="10" font-weight="700" text-anchor="middle">构建 Skill 库</text><rect width="200" height="150" x="410" y="76" fill="none" stroke="#d1cfc5" stroke-width="1.5" rx="10"/><rect width="200" height="28" x="410" y="76" fill="#d1cfc5" rx="10"/><path fill="#d1cfc5" d="M410 94h200v10H410z"/><text x="510" y="94" fill="#141413" font-size="12" font-weight="700" text-anchor="middle">❌ 不构建 Skill 库</text><path stroke="#d1cfc5" d="M410 114h200"/><text x="510" y="136" fill="#141413" font-size="10" text-anchor="middle">每天手动输入相同指令</text><text x="510" y="154" fill="#87867f" font-size="10" text-anchor="middle">每次对话 = 从零开始</text><text x="510" y="172" fill="#87867f" font-size="10" text-anchor="middle">没有积累</text><text x="510" y="190" fill="#d97757" font-size="10" font-weight="600" text-anchor="middle">Year 1 = 0 资产</text><text x="510" y="206" fill="#d97757" font-size="10" font-weight="600" text-anchor="middle">Year 2 = 0 资产</text><text x="510" y="222" fill="#d97757" font-size="10" font-weight="600" text-anchor="middle">Year N = 0 资产</text><rect width="200" height="150" x="630" y="76" fill="none" stroke="#788c5d" stroke-width="2" rx="10"/><rect width="200" height="28" x="630" y="76" fill="#788c5d" rx="10"/><path fill="#788c5d" d="M630 94h200v10H630z"/><text x="730" y="94" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">✅ 构建 Skill 库</text><path stroke="#e3dacc" d="M630 114h200"/><text x="730" y="136" fill="#141413" font-size="10" text-anchor="middle">每个 Skill 可积累、可优化</text><text x="730" y="154" fill="#87867f" font-size="10" text-anchor="middle">每月优化输出质量</text><text x="730" y="172" fill="#87867f" font-size="10" text-anchor="middle">Skill 可跨项目复用</text><text x="730" y="190" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">Year 1 = 10 Skills</text><text x="730" y="206" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">Year 2 = 20 Skills</text><text x="730" y="222" fill="#788c5d" font-size="10" font-weight="600" text-anchor="middle">Year N = N×10 Skills</text><rect width="420" height="80" x="410" y="236" fill="none" stroke="#d97757" stroke-width="2" rx="10"/><rect width="420" height="28" x="410" y="236" fill="#d97757" rx="10"/><path fill="#d97757" d="M410 254h420v10H410z"/><text x="620" y="254" fill="#faf9f5" font-size="12" font-weight="700" text-anchor="middle">核心洞察 ⭐</text><text x="620" y="280" fill="#141413" font-size="10" text-anchor="middle">60 天内：</text><text x="620" y="296" fill="#141413" font-size="11" font-weight="700" text-anchor="middle">不建 Skill 库 → 每天重复消耗</text><text x="620" y="312" fill="#87867f" font-size="10" text-anchor="middle">vs</text><text x="620" y="304" fill="#788c5d" font-size="11" font-weight="700" text-anchor="middle">建 Skill 库 → 运行完全不同的 operation</text><rect width="800" height="36" x="30" y="336" fill="#141413" rx="8"/><text x="430" y="358" fill="#faf9f5" font-size="12" font-weight="600" text-anchor="middle">积累不是信息，是系统。真正的复利是你外化的判断力。</text><text x="790" y="358" fill="#d97757" font-size="10" font-weight="700" text-anchor="end">Skillify · Harness · Mission — 同一条主线</text></svg>