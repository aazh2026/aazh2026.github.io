<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 360"><path fill="#faf9f5" d="M0 0h680v360H0z"/><text x="340" y="26" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">GitHub vs npm：供应链危险等级对比</text><text x="340" y="42" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">GitHub 危险 · npm 相对安全</text><text x="200" y="68" fill="#d97757" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">GitHub（危险）</text><text x="480" y="68" fill="#788c5d" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">npm（相对安全）</text><rect width="160" height="50" x="30" y="80" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="110" y="100" fill="#d97757" font-size="10" font-weight="500" text-anchor="middle">包管理</text><text x="110" y="116" fill="#141413" font-size="9" text-anchor="middle">无统一注册表</text><text x="110" y="128" fill="#87867f" font-size="8" text-anchor="middle">任意仓库可发布</text><rect width="160" height="50" x="310" y="80" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="390" y="100" fill="#788c5d" font-size="10" font-weight="500" text-anchor="middle">包管理</text><text x="390" y="116" fill="#141413" font-size="9" text-anchor="middle">中央统一 curation</text><text x="390" y="128" fill="#87867f" font-size="8" text-anchor="middle">npm registry 审核</text><rect width="160" height="50" x="30" y="140" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="110" y="160" fill="#d97757" font-size="10" font-weight="500" text-anchor="middle">代码执行</text><text x="110" y="176" fill="#141413" font-size="9" text-anchor="middle">setup.py / install.sh</text><text x="110" y="188" fill="#87867f" font-size="8" text-anchor="middle">直接执行任意代码</text><rect width="160" height="50" x="310" y="140" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="390" y="160" fill="#788c5d" font-size="10" font-weight="500" text-anchor="middle">代码执行</text><text x="390" y="176" fill="#141413" font-size="9" text-anchor="middle">隔离的构建沙箱</text><text x="390" y="188" fill="#87867f" font-size="8" text-anchor="middle">npm install 限制权限</text><rect width="160" height="50" x="30" y="200" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="110" y="220" fill="#d97757" font-size="10" font-weight="500" text-anchor="middle">信任信号</text><text x="110" y="236" fill="#141413" font-size="9" text-anchor="middle">Star 可购买</text><text x="110" y="248" fill="#87867f" font-size="8" text-anchor="middle">$50 = 500 stars</text><rect width="160" height="50" x="310" y="200" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="390" y="220" fill="#788c5d" font-size="10" font-weight="500" text-anchor="middle">信任信号</text><text x="390" y="236" fill="#141413" font-size="9" text-anchor="middle">下载量 + 验证发布者</text><text x="390" y="248" fill="#87867f" font-size="8" text-anchor="middle">下载计数不可伪造</text><rect width="160" height="50" x="30" y="260" fill="#fff" stroke="#d97757" stroke-width="1.5" rx="6"/><text x="110" y="280" fill="#d97757" font-size="10" font-weight="500" text-anchor="middle">检测难度</text><text x="110" y="296" fill="#141413" font-size="9" text-anchor="middle">隐藏于 build/test</text><text x="110" y="308" fill="#87867f" font-size="8" text-anchor="middle">无中央日志</text><rect width="160" height="50" x="310" y="260" fill="#fff" stroke="#788c5d" stroke-width="1.5" rx="6"/><text x="390" y="280" fill="#788c5d" font-size="10" font-weight="500" text-anchor="middle">检测难度</text><text x="390" y="296" fill="#141413" font-size="9" text-anchor="middle">自动化安全扫描</text><text x="390" y="308" fill="#87867f" font-size="8" text-anchor="middle">aggregate 统计可用</text><rect width="130" height="230" x="520" y="80" fill="#fff" stroke="#d1cfc5" stroke-width="1.5" rx="8"/><text x="585" y="105" fill="#141413" font-size="11" font-weight="600" text-anchor="middle">关键差异</text><path stroke="#d1cfc5" d="M530 115h110"/><text x="530" y="138" fill="#141413" font-size="9.5" font-weight="500">攻击门槛</text><rect width="120" height="10" x="530" y="143" fill="#d97757" opacity=".3" rx="3"/><rect width="110" height="10" x="530" y="143" fill="#d97757" opacity=".6" rx="3"/><text x="530" y="165" fill="#87867f" font-size="8">极低 · 任意账号</text><text x="530" y="188" fill="#141413" font-size="9.5" font-weight="500">检测难度</text><rect width="120" height="10" x="530" y="193" fill="#d97757" opacity=".3" rx="3"/><rect width="105" height="10" x="530" y="193" fill="#d97757" opacity=".6" rx="3"/><text x="530" y="215" fill="#87867f" font-size="8">高 · 无中央监控</text><text x="530" y="238" fill="#141413" font-size="9.5" font-weight="500">影响范围</text><rect width="120" height="10" x="530" y="243" fill="#d97757" opacity=".3" rx="3"/><rect width="95" height="10" x="530" y="243" fill="#d97757" opacity=".6" rx="3"/><text x="530" y="265" fill="#87867f" font-size="8">CI/CD + 开发者</text><text x="530" y="288" fill="#141413" font-size="9.5" font-weight="500">防御成本</text><rect width="120" height="10" x="530" y="293" fill="#d97757" opacity=".3" rx="3"/><rect width="85" height="10" x="530" y="293" fill="#d97757" opacity=".5" rx="3"/><text x="530" y="305" fill="#87867f" font-size="8">高 · 需纵深防御</text><text x="340" y="345" fill="#87867f" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">GitHub vs npm 供应链安全对比 · 2026</text></svg>