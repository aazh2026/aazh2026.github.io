<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- AI-Native 安全三环防护模型 -->
  <rect width="560" height="200" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">AI-Native 安全三环防护模型</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2025/05/02</text>

  <!-- L1: 第一环 (bottom/largest, green) -->
  <rect x="40" y="158" width="480" height="38" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.8"/>
  <rect x="40" y="158" width="480" height="18" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="60" y="173" font-size="10" fill="#059669" font-family="ui-monospace, monospace" font-weight="600">🟢 L1 · 第一环：感知监测层</text>
  <text x="280" y="173" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">Perception Monitoring</text>
  <text x="60" y="188" font-size="10" fill="#87867F">输入分析 · 上下文评估（最先触发的防线）</text>

  <!-- Arrow -->
  <line x1="280" y1="154" x2="280" y2="146" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,146 280,138 284,146" fill="#D1CFC5"/>

  <!-- L2: 第二环 (middle, yellow/orange) -->
  <rect x="40" y="98" width="480" height="46" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
  <rect x="40" y="98" width="480" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="113" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">🟡 L2 · 第二环：决策控制层</text>
  <text x="280" y="113" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">Decision Control</text>
  <text x="60" y="130" font-size="10" fill="#87867F">意图理解 · 风险评估</text>
  <rect x="490" y="108" width="18" height="18" rx="9" fill="#D97757"/>
  <text x="499" y="121" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L2</text>

  <!-- Arrow -->
  <line x1="280" y1="94" x2="280" y2="86" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,86 280,78 284,86" fill="#D1CFC5"/>

  <!-- L3: 第三环 (top/smallest, red) -->
  <rect x="40" y="46" width="480" height="38" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.8"/>
  <rect x="40" y="46" width="480" height="18" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="60" y="61" font-size="10" fill="#DC2626" font-family="ui-monospace, monospace" font-weight="600">🔴 L3 · 第三环：执行验证层</text>
  <text x="280" y="61" text-anchor="middle" font-size="12" fill="#141413" font-weight="600">Execution Verification</text>
  <text x="60" y="76" font-size="10" fill="#87867F">最后防线，行为审计</text>
  <rect x="490" y="56" width="18" height="18" rx="9" fill="#DC2626"/>
  <text x="499" y="69" text-anchor="middle" font-size="9" fill="#FFFFFF" font-family="ui-monospace, monospace">L3</text>

  <!-- Direction label -->
  <text x="320" y="120" font-size="9" fill="#87867F" font-family="ui-monospace, monospace">层层递进 ↑</text>
</svg>