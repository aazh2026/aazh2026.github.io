<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #FAF9F5; }
      .text-primary { fill: #141413; font-size: 13px; font-weight: 600; }
      .text-secondary { fill: #87867F; font-size: 11px; }
      .text-light { fill: #FAF9F5; font-size: 12px; font-weight: 600; }
    </style>
  </defs>
  <rect width="800" height="540" class="bg"/>

  <!-- Title -->
  <text x="40" y="36" class="text-primary" font-size="15px">自解释系统四层架构</text>
  <text x="40" y="52" class="text-secondary">Four-Layer Self-Explanatory System Architecture for API-First Era</text>

  <!-- Left side: 4 stacked layer cards, from bottom to top (layer 4 at bottom, layer 1 at top) -->
  <!-- We'll stack them vertically with visual connection -->

  <!-- Layer 1: Contract-First (top, most foundational) -->
  <rect x="40" y="80" width="380" height="100" rx="12" fill="#D97757"/>
  <text x="60" y="108" fill="#FAF9F5" font-size="14px" font-weight="700">第一层 · 契约优先 Contract-First</text>
  <text x="60" y="126" fill="#FAF9F5" font-size="11px" opacity="0.8">API行为由契约定义，契约即代码</text>

  <rect x="60" y="138" width="100" height="26" rx="5" fill="#FAF9F5" fill-opacity="0.2"/>
  <text x="110" y="156" fill="#FAF9F5" font-size="11px" font-weight="600" text-anchor="middle">OpenAPI/Swagger</text>
  <rect x="170" y="138" width="80" height="26" rx="5" fill="#FAF9F5" fill-opacity="0.2"/>
  <text x="210" y="156" fill="#FAF9F5" font-size="11px" font-weight="600" text-anchor="middle">GraphQL</text>
  <rect x="260" y="138" width="70" height="26" rx="5" fill="#FAF9F5" fill-opacity="0.2"/>
  <text x="295" y="156" fill="#FAF9F5" font-size="11px" font-weight="600" text-anchor="middle">gRPC</text>
  <rect x="340" y="138" width="60" height="26" rx="5" fill="#FAF9F5" fill-opacity="0.2"/>
  <text x="370" y="156" fill="#FAF9F5" font-size="11px" font-weight="600" text-anchor="middle">Smithy</text>

  <!-- Connector down -->
  <line x1="230" y1="180" x2="230" y2="200" stroke="#D97757" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="230,200 226,190 234,190" fill="#D97757"/>

  <!-- Layer 2: Semantic API -->
  <rect x="40" y="200" width="380" height="90" rx="12" fill="#141413" stroke="#D1CFC5" stroke-width="1"/>
  <text x="60" y="228" fill="#FAF9F5" font-size="14px" font-weight="700">第二层 · 语义化 API Semantic API</text>
  <text x="60" y="246" fill="#87867F" font-size="11px">API不仅是端点，而是有语义的、可推理的</text>
  <rect x="60" y="256" width="340" height="24" rx="5" fill="#2a2a2a"/>
  <text x="230" y="272" fill="#E3DACC" font-size="11px" text-anchor="middle">JSON-LD + Schema.org → AI理解数据结构语义</text>

  <!-- Connector down -->
  <line x1="230" y1="290" x2="230" y2="310" stroke="#87867F" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="230,310 226,300 234,300" fill="#87867F"/>

  <!-- Layer 3: Intent Discovery -->
  <rect x="40" y="310" width="380" height="90" rx="12" fill="#141413" stroke="#D1CFC5" stroke-width="1"/>
  <text x="60" y="338" fill="#FAF9F5" font-size="14px" font-weight="700">第三层 · 意图发现 Intent Discovery</text>
  <text x="60" y="356" fill="#87867F" font-size="11px">系统理解开发者意图，主动提供所需信息</text>
  <rect x="60" y="366" width="340" height="24" rx="5" fill="#2a2a2a"/>
  <text x="230" y="382" fill="#E3DACC" font-size="11px" text-anchor="middle">自然语言需求 → AI发现API → 生成代码示例</text>

  <!-- Connector down -->
  <line x1="230" y1="400" x2="230" y2="420" stroke="#87867F" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="230,420 226,410 234,410" fill="#87867F"/>

  <!-- Layer 4: Auto-Integration (top layer, most advanced) -->
  <rect x="40" y="420" width="380" height="90" rx="12" fill="#788C5D"/>
  <text x="60" y="448" fill="#FAF9F5" font-size="14px" font-weight="700">第四层 · 自动集成 Auto-Integration</text>
  <text x="60" y="466" fill="#FAF9F5" font-size="11px" opacity="0.8">AI读取契约 → 理解需求 → 自动生成集成代码</text>
  <rect x="60" y="476" width="340" height="24" rx="5" fill="#FAF9F5" fill-opacity="0.2"/>
  <text x="230" y="492" fill="#FAF9F5" font-size="11px" text-anchor="middle">处理错误和边界条件 | GitHub Copilot 已实现</text>

  <!-- Right side: Traditional docs comparison -->
  <rect x="460" y="80" width="300" height="200" rx="12" fill="#141413"/>
  <text x="480" y="110" fill="#D97757" font-size="13px" font-weight="700">传统文档的问题</text>
  <line x1="480" y1="122" x2="740" y2="122" stroke="#D97757" stroke-width="1.5"/>

  <text x="480" y="146" fill="#87867F" font-size="11px">73% 开发者认为文档经常过时</text>
  <text x="480" y="166" fill="#87867F" font-size="11px">文档滞后代码 2-6 个月</text>
  <text x="480" y="186" fill="#87867F" font-size="11px">开发者首选 AI助手 而非文档</text>
  <text x="480" y="206" fill="#87867F" font-size="11px">Stripe API 文档错误存在 3 年</text>

  <line x1="480" y1="222" x2="740" y2="222" stroke="#2a2a2a" stroke-width="1"/>

  <text x="480" y="244" fill="#E3DACC" font-size="11px" font-weight="600">文档团队很努力</text>
  <text x="480" y="262" fill="#E3DACC" font-size="11px" font-weight="600">但"文档"这个形式本身</text>
  <text x="480" y="280" fill="#D97757" font-size="11px" font-weight="600">已不适合AI时代</text>

  <!-- Right side: Evolution timeline -->
  <rect x="460" y="300" width="300" height="200" rx="12" fill="#141413"/>
  <text x="480" y="330" fill="#FAF9F5" font-size="13px" font-weight="700">信息载体演化</text>
  <line x1="480" y1="342" x2="740" y2="342" stroke="#D97757" stroke-width="1.5"/>

  <!-- Mini timeline -->
  <line x1="490" y1="390" x2="740" y2="390" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="510" cy="390" r="6" fill="#D97757"/>
  <text x="510" y="378" fill="#87867F" font-size="10px" text-anchor="middle">泥板</text>
  <text x="510" y="406" fill="#87867F" font-size="10px" text-anchor="middle">公元前</text>

  <circle cx="580" cy="390" r="6" fill="#87867F"/>
  <text x="580" y="378" fill="#87867F" font-size="10px" text-anchor="middle">手抄本</text>
  <text x="580" y="406" fill="#87867F" font-size="10px" text-anchor="middle">中世纪</text>

  <circle cx="640" cy="390" r="6" fill="#87867F"/>
  <text x="640" y="378" fill="#87867F" font-size="10px" text-anchor="middle">书籍</text>
  <text x="640" y="406" fill="#87867F" font-size="10px" text-anchor="middle">印刷时代</text>

  <circle cx="700" cy="390" r="6" fill="#788C5D"/>
  <text x="700" y="378" fill="#788C5D" font-size="10px" text-anchor="middle">电子文档</text>
  <text x="700" y="406" fill="#788C5D" font-size="10px" text-anchor="middle">互联网</text>

  <circle cx="740" cy="390" r="6" fill="#D97757" stroke="#FAF9F5" stroke-width="2"/>
  <text x="740" y="430" fill="#D97757" font-size="10px" text-anchor="middle">自解释代码</text>
  <text x="740" y="446" fill="#87867F" font-size="10px" text-anchor="middle">AI时代</text>

  <text x="480" y="470" fill="#87867F" font-size="10px">代码本身成为最好的知识载体</text>
</svg>