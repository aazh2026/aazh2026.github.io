<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Georgia, serif">
  <defs>
    <linearGradient id="ivory-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#F0EDE4"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#ivory-bg)"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" fill="#141413" font-weight="bold">软件复杂性的分类法 / Taxonomy of Software Complexity</text>
  <line x1="200" y1="52" x2="760" y2="52" stroke="#D1CFC5" stroke-width="1"/>

  <!-- Left: Essential Complexity -->
  <rect x="40" y="75" width="420" height="420" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="75" width="420" height="40" rx="12" fill="#D97757"/>
  <rect x="40" y="103" width="420" height="12" fill="#D97757"/>
  <text x="250" y="103" text-anchor="middle" font-size="15" fill="white" font-weight="bold">本质复杂度 Essential Complexity</text>
  <text x="250" y="130" text-anchor="middle" font-size="11" fill="#87867F">问题本身固有，无法消除</text>

  <!-- Essential items -->
  <g transform="translate(60, 145)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#D97757"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">需求内在矛盾</text>
    <text x="44" y="37" font-size="11" fill="#87867F">安全 ↔ 开放、简单 ↔ 功能强大</text>
  </g>

  <g transform="translate(60, 205)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#D97757"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">状态空间爆炸</text>
    <text x="44" y="37" font-size="11" fill="#87867F">可能状态组合呈指数级增长</text>
  </g>

  <g transform="translate(60, 265)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#D97757"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">严格一致性要求</text>
    <text x="44" y="37" font-size="11" fill="#87867F">每一部分必须与所有其他部分精确一致</text>
  </g>

  <g transform="translate(60, 325)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#D97757"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">4</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">持续适应变化</text>
    <text x="44" y="37" font-size="11" fill="#87867F">软件必须随业务环境持续演化</text>
  </g>

  <!-- AI cannot solve -->
  <g transform="translate(60, 390)">
    <rect width="380" height="50" rx="8" fill="#D97757" fill-opacity="0.08" stroke="#D97757" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="190" y="415" text-anchor="middle" font-size="13" fill="#D97757" font-weight="bold">❌ AI 无法触及本质复杂度</text>
  </g>

  <!-- Right: Accidental Complexity -->
  <rect x="500" y="75" width="420" height="420" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="500" y="75" width="420" height="40" rx="12" fill="#788C5D"/>
  <rect x="500" y="103" width="420" height="12" fill="#788C5D"/>
  <text x="710" y="103" text-anchor="middle" font-size="15" fill="white" font-weight="bold">偶然复杂度 Accidental Complexity</text>
  <text x="710" y="130" text-anchor="middle" font-size="11" fill="#87867F">工具和方案带来的额外负担</text>

  <!-- Accidental items -->
  <g transform="translate(520, 145)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#788C5D"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">依赖地狱</text>
    <text x="44" y="37" font-size="11" fill="#87867F">版本冲突、依赖冲突、依赖地狱</text>
  </g>

  <g transform="translate(520, 205)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#788C5D"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">配置爆炸</text>
    <text x="44" y="37" font-size="11" fill="#87867F">配置文件数量和复杂度的膨胀</text>
  </g>

  <g transform="translate(520, 265)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#788C5D"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">云原生复杂度</text>
    <text x="44" y="37" font-size="11" fill="#87867F">部署、扩缩容、服务治理的 overhead</text>
  </g>

  <g transform="translate(520, 325)">
    <rect width="380" height="50" rx="8" fill="#FAF9F5" stroke="#E3DACC" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="12" fill="#788C5D"/>
    <text x="22" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">4</text>
    <text x="44" y="20" font-size="13" fill="#141413" font-weight="bold">微服务治理</text>
    <text x="44" y="37" font-size="11" fill="#87867F">服务发现、负载均衡、熔断、超时</text>
  </g>

  <!-- AI CAN solve -->
  <g transform="translate(520, 390)">
    <rect width="380" height="50" rx="8" fill="#788C5D" fill-opacity="0.08" stroke="#788C5D" stroke-width="1.5"/>
    <text x="190" y="415" text-anchor="middle" font-size="13" fill="#788C5D" font-weight="bold">✓ AI 擅长消除偶然复杂度</text>
  </g>

  <!-- Arrow between sections -->
  <g transform="translate(460, 265)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="20" y="-10" text-anchor="middle" font-size="10" fill="#87867F">Brooks</text>
    <text x="20" y="18" text-anchor="middle" font-size="10" fill="#87867F">1986</text>
  </g>
</svg>
