<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="ivory-bg" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <filter id="shadow" width="110%" height="110%" x="-5%" y="-5%">
      <feDropShadow dx="0" dy="2" flood-color="#141413" flood-opacity=".12" stdDeviation="4"/>
    </filter>
  </defs>
  <path fill="url(#ivory-bg)" d="M0 0h960v540H0z"/>
  <text x="480" y="40" fill="#141413" font-size="20" font-weight="bold" text-anchor="middle">软件复杂性的分类法 / Taxonomy of Software Complexity</text>
  <path stroke="#d1cfc5" d="M200 52h560"/>
  <rect width="420" height="420" x="40" y="75" fill="#fff" filter="url(#shadow)" rx="12"/>
  <rect width="420" height="40" x="40" y="75" fill="#d97757" rx="12"/>
  <path fill="#d97757" d="M40 103h420v12H40z"/>
  <text x="250" y="103" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">本质复杂度 Essential Complexity</text>
  <text x="250" y="130" fill="#87867f" font-size="11" text-anchor="middle">问题本身固有，无法消除</text>
  <g transform="translate(60 145)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#d97757"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">1</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">需求内在矛盾</text>
    <text x="44" y="37" fill="#87867f" font-size="11">安全 ↔ 开放、简单 ↔ 功能强大</text>
  </g>
  <g transform="translate(60 205)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#d97757"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">2</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">状态空间爆炸</text>
    <text x="44" y="37" fill="#87867f" font-size="11">可能状态组合呈指数级增长</text>
  </g>
  <g transform="translate(60 265)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#d97757"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">3</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">严格一致性要求</text>
    <text x="44" y="37" fill="#87867f" font-size="11">每一部分必须与所有其他部分精确一致</text>
  </g>
  <g transform="translate(60 325)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#d97757"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">4</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">持续适应变化</text>
    <text x="44" y="37" fill="#87867f" font-size="11">软件必须随业务环境持续演化</text>
  </g>
  <g fill="#d97757" transform="translate(60 390)">
    <rect width="380" height="50" fill-opacity=".08" stroke="#d97757" stroke-dasharray="6,3" stroke-width="1.5" rx="8"/>
    <text x="190" y="415" font-size="13" font-weight="bold" text-anchor="middle">❌ AI 无法触及本质复杂度</text>
  </g>
  <rect width="420" height="420" x="500" y="75" fill="#fff" filter="url(#shadow)" rx="12"/>
  <rect width="420" height="40" x="500" y="75" fill="#788c5d" rx="12"/>
  <path fill="#788c5d" d="M500 103h420v12H500z"/>
  <text x="710" y="103" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">偶然复杂度 Accidental Complexity</text>
  <text x="710" y="130" fill="#87867f" font-size="11" text-anchor="middle">工具和方案带来的额外负担</text>
  <g transform="translate(520 145)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#788c5d"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">1</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">依赖地狱</text>
    <text x="44" y="37" fill="#87867f" font-size="11">版本冲突、依赖冲突、依赖地狱</text>
  </g>
  <g transform="translate(520 205)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#788c5d"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">2</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">配置爆炸</text>
    <text x="44" y="37" fill="#87867f" font-size="11">配置文件数量和复杂度的膨胀</text>
  </g>
  <g transform="translate(520 265)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#788c5d"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">3</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">云原生复杂度</text>
    <text x="44" y="37" fill="#87867f" font-size="11">部署、扩缩容、服务治理的 overhead</text>
  </g>
  <g transform="translate(520 325)">
    <rect width="380" height="50" fill="#faf9f5" stroke="#e3dacc" stroke-width="1.5" rx="8"/>
    <circle cx="22" cy="25" r="12" fill="#788c5d"/>
    <text x="22" y="30" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">4</text>
    <text x="44" y="20" fill="#141413" font-size="13" font-weight="bold">微服务治理</text>
    <text x="44" y="37" fill="#87867f" font-size="11">服务发现、负载均衡、熔断、超时</text>
  </g>
  <g fill="#788c5d" transform="translate(520 390)">
    <rect width="380" height="50" fill-opacity=".08" stroke="#788c5d" stroke-width="1.5" rx="8"/>
    <text x="190" y="415" font-size="13" font-weight="bold" text-anchor="middle">✓ AI 擅长消除偶然复杂度</text>
  </g>
  <path stroke="#d1cfc5" stroke-dasharray="4,3" stroke-width="2" d="M460 265h40"/>
  <text x="20" y="-10" fill="#87867f" font-size="10" text-anchor="middle" transform="translate(460 265)">Brooks</text>
  <text x="20" y="18" fill="#87867f" font-size="10" text-anchor="middle" transform="translate(460 265)">1986</text>
</svg>
