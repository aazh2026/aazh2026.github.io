  <text x="740" y="395" fill="#141413" font-size="10" text-anchor="middle">多层次验证（测试+审查+形式化）</text>
  <text x="20" y="440" fill="#141413" font-size="11" font-weight="700">适用场景</text>
  <rect width="260" height="40" x="20" y="446" fill="#e3dacc" stroke="#d1cfc5" rx="5"/>
  <text x="150" y="469" fill="#141413" font-size="10" text-anchor="middle">确定性算法 · 控制系统</text>
  <rect width="260" height="40" x="310" y="446" fill="#e3dacc" stroke="#d1cfc5" rx="5"/>
