<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#141413">Software 1.0 → 2.0 → 3.0：计算范式演进</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#87867F">LLM作为通用计算单元的可行性分析</text>

  <!-- Column headers -->
  <!-- S1.0 header -->
  <rect x="20" y="72" width="260" height="44" rx="8" fill="#D97757"/>
  <text x="150" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF9F5">Software 1.0</text>
  <text x="150" y="112" text-anchor="middle" font-size="11" fill="#FAF9F5">确定性计算</text>

  <!-- S2.0 header -->
  <rect x="310" y="72" width="260" height="44" rx="8" fill="#788C5D"/>
  <text x="440" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF9F5">Software 2.0</text>
  <text x="440" y="112" text-anchor="middle" font-size="11" fill="#FAF9F5">概率性计算</text>

  <!-- S3.0 header -->
  <rect x="600" y="72" width="280" height="44" rx="8" fill="#141413"/>
  <text x="740" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF9F5">Software 3.0（目标）</text>
  <text x="740" y="112" text-anchor="middle" font-size="11" fill="#D1CFC5">统计确定性 + 验证层</text>

  <!-- Arrows between columns -->
  <path d="M283,94 L306,94" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="MM573,94 L596,94" stroke="#788C5D" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Row 1: 计算单元 -->
  <text x="20" y="144" font-size="11" font-weight="700" fill="#141413">计算单元</text>
  <rect x="20" y="150" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="150" y="173" text-anchor="middle" font-size="11" fill="#141413">二进制指令（机器码）</text>

  <rect x="310" y="150" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="440" y="173" text-anchor="middle" font-size="11" fill="#141413">神经网络权重（浮点数）</text>

  <rect x="600" y="150" width="280" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="740" y="173" text-anchor="middle" font-size="11" fill="#141413">权重 + 验证层 + 工具契约</text>

  <!-- Row 2: 确定性 -->
  <text x="20" y="218" font-size="11" font-weight="700" fill="#141413">确定性</text>
  <rect x="20" y="224" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="150" y="247" text-anchor="middle" font-size="11" fill="#141413">✓ 完美确定性</text>

  <rect x="310" y="224" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="440" y="247" text-anchor="middle" font-size="11" fill="#141413">✗ 概率性（不确定性）</text>

  <rect x="600" y="224" width="280" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="740" y="247" text-anchor="middle" font-size="11" fill="#141413">~ 统计确定性 + 边界保证</text>

  <!-- Row 3: 可解释性 -->
  <text x="20" y="292" font-size="11" font-weight="700" fill="#141413">可解释性</text>
  <rect x="20" y="298" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="150" y="321" text-anchor="middle" font-size="11" fill="#141413">✓ 完全可解释</text>

  <rect x="310" y="298" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="440" y="321" text-anchor="middle" font-size="11" fill="#141413">✗ 黑箱（不可解释）</text>

  <rect x="600" y="298" width="280" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="740" y="321" text-anchor="middle" font-size="11" fill="#141413">~ 思维链近似 + 接口契约</text>

  <!-- Row 4: 验证方法 -->
  <text x="20" y="366" font-size="11" font-weight="700" fill="#141413">验证方法</text>
  <rect x="20" y="372" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="150" y="395" text-anchor="middle" font-size="10" fill="#141413">形式化证明 + 单元测试</text>

  <rect x="310" y="372" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="440" y="395" text-anchor="middle" font-size="10" fill="#141413">统计测试 · 分布验证</text>

  <rect x="600" y="372" width="280" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="740" y="395" text-anchor="middle" font-size="10" fill="#141413">多层次验证（测试+审查+形式化）</text>

  <!-- Row 5: 适用场景 -->
  <text x="20" y="440" font-size="11" font-weight="700" fill="#141413">适用场景</text>
  <rect x="20" y="446" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="150" y="469" text-anchor="middle" font-size="10" fill="#141413">确定性算法 · 控制系统</text>

  <rect x="310" y="446" width="260" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="440" y="469" text-anchor="middle" font-size="10" fill="#141413">模式识别 · 感知任务</text>

  <rect x="600" y="446" width="280" height="40" rx="5" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="740" y="469" text-anchor="middle" font-size="10" fill="#141413">复杂开放性问题 · Agent系统</text>

  <!-- Bottom note -->
  <rect x="20" y="498" width="860" height="1" fill="#D1CFC5"/>
  <text x="450" y="514" text-anchor="middle" font-size="11" fill="#87867F">Software 3.0 不是回归 1.0，而是融合两者优势：保留神经网络的能力 + 建立工程化的控制机制</text>
</svg>