<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="交付件模板演进">
  <title>交付件模板的演进路径</title>
  <desc>从传统手工到 AI-Native 的交付件管理演进</desc>

  <defs>
    <linearGradient id="bgGrad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad8)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#141413" text-anchor="middle">交付件模板的演进路径</text>

  <!-- Timeline -->
  <line x1="60" y1="80" x2="740" y2="80" stroke="#D1CFC5" stroke-width="3"/>

  <!-- Phase 1 -->
  <circle cx="120" cy="80" r="12" fill="#D97757"/>
  <text x="120" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">1</text>
  <rect x="40" y="100" width="160" height="110" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <text x="120" y="122" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#141413" text-anchor="middle">Phase 1</text>
  <text x="120" y="140" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D97757" text-anchor="middle">纸质文档</text>
  <text x="50" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• Word 编写</text>
  <text x="50" y="174" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 邮件传递</text>
  <text x="50" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 版本混乱</text>
  <text x="50" y="202" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 难以追踪</text>

  <!-- Phase 2 -->
  <circle cx="300" cy="80" r="12" fill="#788C5D"/>
  <text x="300" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">2</text>
  <rect x="220" y="100" width="160" height="110" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <text x="300" y="122" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#141413" text-anchor="middle">Phase 2</text>
  <text x="300" y="140" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#788C5D" text-anchor="middle">结构化模板</text>
  <text x="230" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 统一 Word 模板</text>
  <text x="230" y="174" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 版本控制</text>
  <text x="230" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 人工审查</text>
  <text x="230" y="202" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• AI 难解析</text>

  <!-- Phase 3 -->
  <circle cx="500" cy="80" r="12" fill="#5B8BD4"/>
  <text x="500" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">3</text>
  <rect x="420" y="100" width="160" height="110" rx="8" fill="#FAF9F5" stroke="#5B8BD4" stroke-width="2"/>
  <text x="500" y="122" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#141413" text-anchor="middle">Phase 3</text>
  <text x="500" y="140" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5B8BD4" text-anchor="middle">机器可读</text>
  <text x="430" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• YAML/JSON 格式</text>
  <text x="430" y="174" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• Schema 验证</text>
  <text x="430" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• CI 集成</text>
  <text x="430" y="202" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 基础 AI 解析</text>

  <!-- Phase 4 -->
  <circle cx="680" cy="80" r="12" fill="#141413"/>
  <text x="680" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">4</text>
  <rect x="600" y="100" width="160" height="110" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="2.5"/>
  <text x="680" y="122" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#141413" text-anchor="middle">Phase 4</text>
  <text x="680" y="140" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#141413" text-anchor="middle">AI-Native</text>
  <text x="610" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 自动生成</text>
  <text x="610" y="174" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 智能补全</text>
  <text x="610" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 自动验证</text>
  <text x="610" y="202" font-family="system-ui, sans-serif" font-size="9" fill="#141413">• 全链路追踪</text>

  <!-- Bottom insight box -->
  <rect x="40" y="240" width="720" height="145" rx="10" fill="#141413"/>
  <text x="400" y="268" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">模板设计的 4 大原则</text>

  <rect x="60" y="282" width="340" height="48" rx="6" fill="#D97757"/>
  <text x="230" y="300" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">1. 机器可读优先</text>
  <text x="75" y="318" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">YAML/JSON > Word/PDF</text>

  <rect x="420" y="282" width="340" height="48" rx="6" fill="#788C5D"/>
  <text x="590" y="300" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">2. 自包含</text>
  <text x="435" y="318" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">不依赖外部解释</text>

  <rect x="60" y="340" width="340" height="48" rx="6" fill="#5B8BD4"/>
  <text x="230" y="358" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">3. 可验证</text>
  <text x="75" y="376" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">每个字段有验证规则</text>

  <rect x="420" y="340" width="340" height="48" rx="6" fill="#87867F"/>
  <text x="590" y="358" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">4. 可扩展</text>
  <text x="435" y="376" font-family="system-ui, sans-serif" font-size="10" fill="#FAF9F5">支持自定义字段</text>
</svg>
