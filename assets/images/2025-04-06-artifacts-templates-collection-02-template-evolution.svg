<svg xmlns="http://www.w3.org/2000/svg" aria-label="交付件模板演进" viewBox="0 0 800 400">
  <title>交付件模板的演进路径</title>
  <desc>
    从传统手工到 AI-Native 的交付件管理演进
  </desc>
  <defs>
    <linearGradient id="bgGrad8" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#e3dacc"/>
    </linearGradient>
  </defs>
  <path fill="url(#bgGrad8)" d="M0 0h800v400H0z"/>
  <text x="400" y="30" fill="#141413" font-family="system-ui, sans-serif" font-size="17" font-weight="700" text-anchor="middle">交付件模板的演进路径</text>
  <path stroke="#d1cfc5" stroke-width="3" d="M60 80h680"/>
  <circle cx="120" cy="80" r="12" fill="#d97757"/>
  <text x="120" y="85" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">1</text>
  <rect width="160" height="110" x="40" y="100" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="8"/>
  <text x="120" y="122" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Phase 1</text>
  <text x="120" y="140" fill="#d97757" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">纸质文档</text>
  <text x="50" y="160" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• Word 编写</text>
  <text x="50" y="174" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 邮件传递</text>
  <text x="50" y="188" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 版本混乱</text>
  <text x="50" y="202" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 难以追踪</text>
  <circle cx="300" cy="80" r="12" fill="#788c5d"/>
  <text x="300" y="85" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">2</text>
  <rect width="160" height="110" x="220" y="100" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/>
  <text x="300" y="122" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Phase 2</text>
  <text x="300" y="140" fill="#788c5d" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">结构化模板</text>
  <text x="230" y="160" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 统一 Word 模板</text>
  <text x="230" y="174" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 版本控制</text>
  <text x="230" y="188" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 人工审查</text>
  <text x="230" y="202" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• AI 难解析</text>
  <circle cx="500" cy="80" r="12" fill="#5b8bd4"/>
  <text x="500" y="85" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">3</text>
  <rect width="160" height="110" x="420" y="100" fill="#faf9f5" stroke="#5b8bd4" stroke-width="2" rx="8"/>
  <text x="500" y="122" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Phase 3</text>
  <text x="500" y="140" fill="#5b8bd4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">机器可读</text>
  <text x="430" y="160" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• YAML/JSON 格式</text>
  <text x="430" y="174" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• Schema 验证</text>
  <text x="430" y="188" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• CI 集成</text>
  <text x="430" y="202" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 基础 AI 解析</text>
  <circle cx="680" cy="80" r="12" fill="#141413"/>
  <text x="680" y="85" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">4</text>
  <rect width="160" height="110" x="600" y="100" fill="#faf9f5" stroke="#141413" stroke-width="2.5" rx="8"/>
  <text x="680" y="122" fill="#141413" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Phase 4</text>
  <text x="680" y="140" fill="#141413" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">AI-Native</text>
  <text x="610" y="160" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 自动生成</text>
  <text x="610" y="174" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 智能补全</text>
  <text x="610" y="188" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 自动验证</text>
  <text x="610" y="202" fill="#141413" font-family="system-ui, sans-serif" font-size="9">• 全链路追踪</text>
  <rect width="720" height="145" x="40" y="240" fill="#141413" rx="10"/>
  <text x="400" y="268" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">模板设计的 4 大原则</text>
  <rect width="340" height="48" x="60" y="282" fill="#d97757" rx="6"/>
  <text x="230" y="300" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">1. 机器可读优先</text>
  <text x="75" y="318" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">YAML/JSON &gt; Word/PDF</text>
  <rect width="340" height="48" x="420" y="282" fill="#788c5d" rx="6"/>
  <text x="590" y="300" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">2. 自包含</text>
  <text x="435" y="318" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">不依赖外部解释</text>
  <rect width="340" height="48" x="60" y="340" fill="#5b8bd4" rx="6"/>
  <text x="230" y="358" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">3. 可验证</text>
  <text x="75" y="376" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">每个字段有验证规则</text>
  <rect width="340" height="48" x="420" y="340" fill="#87867f" rx="6"/>
  <text x="590" y="358" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">4. 可扩展</text>
  <text x="435" y="376" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10">支持自定义字段</text>
</svg>
