<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#141413" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#87867F"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#141413" letter-spacing="-0.3">AI 时代的认知债务动态</text>
  <line x1="200" y1="56" x2="700" y2="56" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- LEFT: AI makes Easy easier -->
  <rect x="40" y="76" width="270" height="340" rx="14" fill="#FAF9F5" filter="url(#shadow2)"/>
  <rect x="40" y="76" width="270" height="52" rx="14" fill="#D97757"/>
  <rect x="40" y="110" width="270" height="18" fill="#D97757"/>
  <text x="175" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#FAF9F5">AI 让「容易」更容易</text>

  <!-- Downward spiral items -->
  <g transform="translate(60,148)">
    <!-- Arrow down indicating "easier" -->
    <rect x="0" y="0" width="230" height="36" rx="8" fill="#D97757" opacity="0.08"/>
    <text x="115" y="23" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D97757" font-weight="600">代码生成：几秒完成 ✓</text>

    <path d="M115,42 L115,56" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

    <rect x="0" y="62" width="230" height="36" rx="8" fill="#D97757" opacity="0.14"/>
    <text x="115" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D97757" font-weight="600">一键部署：不需要理解 ✓</text>

    <path d="M115,104 L115,118" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

    <rect x="0" y="124" width="230" height="36" rx="8" fill="#D97757" opacity="0.20"/>
    <text x="115" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D97757" font-weight="600">自动化：不需要学习 ✓</text>

    <path d="M115,166 L115,180" stroke="#D97757" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

    <rect x="0" y="186" width="230" height="36" rx="8" fill="#D97757" opacity="0.26"/>
    <text x="115" y="209" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D97757" font-weight="600">复杂度被隐藏 ≠ 消除 ⚠</text>
  </g>

  <!-- CENTER: Dividing line with X -->
  <line x1="355" y1="100" x2="355" y2="390" stroke="#D1CFC5" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="355" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="#87867F">→</text>

  <!-- RIGHT: But makes Simple harder -->
  <rect x="400" y="76" width="270" height="340" rx="14" fill="#FAF9F5" filter="url(#shadow2)"/>
  <rect x="400" y="76" width="270" height="52" rx="14" fill="#788C5D"/>
  <rect x="400" y="110" width="270" height="18" fill="#788C5D"/>
  <text x="535" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#FAF9F5">但 AI 让「简单」更难</text>

  <!-- Climbing difficulty items -->
  <g transform="translate(420,148)">
    <rect x="0" y="0" width="230" height="36" rx="8" fill="#788C5D" opacity="0.08"/>
    <text x="115" y="23" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#788C5D" font-weight="600">代码工作了，但不知道原因 ❓</text>

    <path d="M115,42 L115,56" stroke="#788C5D" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

    <rect x="0" y="62" width="230" height="36" rx="8" fill="#788C5D" opacity="0.14"/>
    <text x="115" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#788C5D" font-weight="600">隐藏的依赖链，无法推理 ❓</text>

    <path d="M115,104 L115,118" stroke="#788C5D" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

    <rect x="0" y="124" width="230" height="36" rx="8" fill="#788C5D" opacity="0.20"/>
    <text x="115" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#788C5D" font-weight="600">黑盒系统，理解边界模糊 ❓</text>

    <path d="M115,166 L115,180" stroke="#788C5D" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

    <rect x="0" y="186" width="230" height="36" rx="8" fill="#788C5D" opacity="0.26"/>
    <text x="115" y="209" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#788C5D" font-weight="600">认知债务持续累积 💀</text>
  </g>

  <!-- FAR RIGHT: Result / Insight -->
  <rect x="700" y="76" width="165" height="340" rx="14" fill="#141413" filter="url(#shadow2)"/>
  <text x="782" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#FAF9F5">结果</text>

  <line x1="720" y1="132" x2="845" y2="132" stroke="#D1CFC5" stroke-width="1" opacity="0.3"/>

  <!-- Pyramid of debt -->
  <polygon points="782,155 840,340 724,340" fill="#D97757" opacity="0.3"/>
  <polygon points="782,155 810,260 754,260" fill="#D97757" opacity="0.5"/>
  <polygon points="782,155 795,220 769,220" fill="#D97757" opacity="0.8"/>

  <text x="782" y="365" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">认知债务</text>
  <text x="782" y="382" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#87867F">金字塔</text>

  <!-- Bottom quote -->
  <rect x="40" y="432" width="820" height="38" rx="10" fill="#141413" opacity="0.05"/>
  <text x="450" y="456" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#141413" font-style="italic">"认知债务：当下省下的理解成本，未来要连本带利偿还。"</text>
</svg>
