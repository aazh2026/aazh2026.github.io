<svg xmlns="http://www.w3.org/2000/svg" aria-label="设计到代码的演进" viewBox="0 0 800 420"><title>设计交付的演进：设计即代码</title><desc>展示设计交付从像素交付到 AI-Native 设计即代码的4个阶段演进</desc><defs><linearGradient id="bgGrad10" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#faf9f5"/><stop offset="100%" stop-color="#e3dacc"/></linearGradient></defs><path fill="url(#bgGrad10)" d="M0 0h800v420H0z"/><text x="400" y="30" fill="#141413" font-family="system-ui, sans-serif" font-size="17" font-weight="700" text-anchor="middle">设计交付的演进：设计即代码</text><rect width="170" height="200" x="40" y="55" fill="#faf9f5" stroke="#d97757" stroke-width="2" rx="8"/><rect width="170" height="28" x="40" y="55" fill="#d97757" rx="8"/><path fill="#d97757" d="M40 75h170v8H40z"/><text x="125" y="74" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Phase 1</text><text x="125" y="105" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">像素交付</text><text x="55" y="128" fill="#141413" font-family="system-ui, sans-serif" font-size="9">设计师输出：</text><text x="55" y="143" fill="#87867f" font-family="monospace" font-size="9">PSD / Sketch</text><text x="55" y="162" fill="#141413" font-family="system-ui, sans-serif" font-size="9">问题：</text><text x="55" y="177" fill="#d97757" font-family="monospace" font-size="9">&quot;设计 vs 开发</text><text x="55" y="190" fill="#d97757" font-family="monospace" font-size="9">永远不一致&quot;</text><rect width="60" height="20" x="55" y="220" fill="#d97757" rx="4"/><text x="85" y="234" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">手工重建</text><text x="215" y="155" fill="#d1cfc5" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">→</text><rect width="170" height="200" x="225" y="55" fill="#faf9f5" stroke="#788c5d" stroke-width="2" rx="8"/><rect width="170" height="28" x="225" y="55" fill="#788c5d" rx="8"/><path fill="#788c5d" d="M225 75h170v8H225z"/><text x="310" y="74" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Phase 2</text><text x="310" y="105" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">标注交付</text><text x="240" y="128" fill="#141413" font-family="system-ui, sans-serif" font-size="9">设计师输出：</text><text x="240" y="143" fill="#87867f" font-family="monospace" font-size="9">Figma Dev Mode</text><text x="240" y="162" fill="#141413" font-family="system-ui, sans-serif" font-size="9">问题：</text><text x="240" y="177" fill="#d97757" font-family="monospace" font-size="9">&quot;标注是参考，</text><text x="240" y="190" fill="#d97757" font-family="monospace" font-size="9">实现还是手工&quot;</text><rect width="60" height="20" x="240" y="220" fill="#788c5d" rx="4"/><text x="270" y="234" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">手动编码</text><text x="400" y="155" fill="#d1cfc5" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">→</text><rect width="170" height="200" x="410" y="55" fill="#faf9f5" stroke="#5b8bd4" stroke-width="2" rx="8"/><rect width="170" height="28" x="410" y="55" fill="#5b8bd4" rx="8"/><path fill="#5b8bd4" d="M410 75h170v8H410z"/><text x="495" y="74" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Phase 3</text><text x="495" y="105" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">组件映射</text><text x="425" y="128" fill="#141413" font-family="system-ui, sans-serif" font-size="9">设计师输出：</text><text x="425" y="143" fill="#87867f" font-family="monospace" font-size="9">设计系统组件</text><text x="425" y="162" fill="#141413" font-family="system-ui, sans-serif" font-size="9">问题：</text><text x="425" y="177" fill="#d97757" font-family="monospace" font-size="9">&quot;系统覆盖不全，</text><text x="425" y="190" fill="#d97757" font-family="monospace" font-size="9">定制仍需手工&quot;</text><rect width="60" height="20" x="425" y="220" fill="#5b8bd4" rx="4"/><text x="455" y="234" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">引用组件</text><text x="585" y="155" fill="#d1cfc5" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">→</text><rect width="165" height="200" x="595" y="55" fill="#faf9f5" stroke="#141413" stroke-width="2.5" rx="8"/><rect width="165" height="28" x="595" y="55" fill="#141413" rx="8"/><path fill="#141413" d="M595 75h165v8H595z"/><text x="677" y="74" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Phase 4</text><text x="677" y="105" fill="#141413" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">设计即代码</text><text x="610" y="128" fill="#141413" font-family="system-ui, sans-serif" font-size="9">设计师输出：</text><text x="610" y="143" fill="#87867f" font-family="monospace" font-size="9">意图描述 + 确认</text><text x="610" y="162" fill="#788c5d" font-family="system-ui, sans-serif" font-size="9">优势：</text><text x="610" y="177" fill="#788c5d" font-family="monospace" font-size="9">&quot;设计=实现</text><text x="610" y="190" fill="#788c5d" font-family="monospace" font-size="9">真正统一&quot;</text><rect width="80" height="20" x="610" y="220" fill="#141413" rx="4"/><text x="650" y="234" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">AI 生成代码</text><rect width="720" height="130" x="40" y="275" fill="#141413" rx="10"/><text x="400" y="300" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">传统 vs AI-Native 时间对比</text><text x="120" y="328" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">线框图</text><rect width="230" height="18" x="60" y="335" fill="#d97757" rx="4"/><rect width="230" height="18" x="60" y="335" fill="#e3dacc" rx="4"/><rect width="6" height="18" x="60" y="335" fill="#d97757" rx="3"/><text x="175" y="348" fill="#141413" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">2h → 5min (24x)</text><text x="120" y="370" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">视觉设计</text><rect width="230" height="18" x="60" y="377" fill="#d97757" rx="4"/><rect width="230" height="18" x="60" y="377" fill="#e3dacc" rx="4"/><rect width="4" height="18" x="60" y="377" fill="#d97757" rx="2"/><text x="175" y="390" fill="#141413" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">8h → 30min (16x)</text><text x="400" y="328" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">响应式适配</text><rect width="230" height="18" x="340" y="335" fill="#d97757" rx="4"/><rect width="230" height="18" x="340" y="335" fill="#e3dacc" rx="4"/><rect width="6" height="18" x="340" y="335" fill="#d97757" rx="3"/><text x="455" y="348" fill="#141413" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">4h → 10min (24x)</text><text x="400" y="370" fill="#87867f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">交互说明</text><rect width="230" height="18" x="340" y="377" fill="#d97757" rx="4"/><rect width="230" height="18" x="340" y="377" fill="#c8e6c9" rx="4"/><text x="455" y="390" fill="#788c5d" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">2h → 自动 (∞)</text><rect width="145" height="60" x="595" y="332" fill="#788c5d" rx="6"/><text x="667" y="355" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">总计</text><text x="667" y="375" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">16h → 45min</text><text x="667" y="393" fill="#faf9f5" font-family="system-ui, sans-serif" font-size="13" font-weight="800" text-anchor="middle">21x</text></svg>