<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="设计到代码的演进">
  <title>设计交付的演进：设计即代码</title>
  <desc>展示设计交付从像素交付到 AI-Native 设计即代码的4个阶段演进</desc>

  <defs>
    <linearGradient id="bgGrad10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F5"/>
      <stop offset="100%" stop-color="#E3DACC"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bgGrad10)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#141413" text-anchor="middle">设计交付的演进：设计即代码</text>

  <!-- Phase 1 -->
  <rect x="40" y="55" width="170" height="200" rx="8" fill="#FAF9F5" stroke="#D97757" stroke-width="2"/>
  <rect x="40" y="55" width="170" height="28" rx="8" fill="#D97757"/>
  <rect x="40" y="75" width="170" height="8" fill="#D97757"/>
  <text x="125" y="74" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Phase 1</text>
  <text x="125" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413" text-anchor="middle">像素交付</text>
  <text x="55" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#141413">设计师输出：</text>
  <text x="55" y="143" font-family="monospace" font-size="9" fill="#87867F">PSD / Sketch</text>
  <text x="55" y="162" font-family="system-ui, sans-serif" font-size="9" fill="#141413">问题：</text>
  <text x="55" y="177" font-family="monospace" font-size="9" fill="#D97757">"设计 vs 开发</text>
  <text x="55" y="190" font-family="monospace" font-size="9" fill="#D97757">永远不一致"</text>
  <rect x="55" y="220" width="60" height="20" rx="4" fill="#D97757"/>
  <text x="85" y="234" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">手工重建</text>

  <!-- Arrow 1 -->
  <text x="215" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#D1CFC5" text-anchor="middle">→</text>

  <!-- Phase 2 -->
  <rect x="225" y="55" width="170" height="200" rx="8" fill="#FAF9F5" stroke="#788C5D" stroke-width="2"/>
  <rect x="225" y="55" width="170" height="28" rx="8" fill="#788C5D"/>
  <rect x="225" y="75" width="170" height="8" fill="#788C5D"/>
  <text x="310" y="74" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Phase 2</text>
  <text x="310" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413" text-anchor="middle">标注交付</text>
  <text x="240" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#141413">设计师输出：</text>
  <text x="240" y="143" font-family="monospace" font-size="9" fill="#87867F">Figma Dev Mode</text>
  <text x="240" y="162" font-family="system-ui, sans-serif" font-size="9" fill="#141413">问题：</text>
  <text x="240" y="177" font-family="monospace" font-size="9" fill="#D97757">"标注是参考，</text>
  <text x="240" y="190" font-family="monospace" font-size="9" fill="#D97757">实现还是手工"</text>
  <rect x="240" y="220" width="60" height="20" rx="4" fill="#788C5D"/>
  <text x="270" y="234" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">手动编码</text>

  <!-- Arrow 2 -->
  <text x="400" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#D1CFC5" text-anchor="middle">→</text>

  <!-- Phase 3 -->
  <rect x="410" y="55" width="170" height="200" rx="8" fill="#FAF9F5" stroke="#5B8BD4" stroke-width="2"/>
  <rect x="410" y="55" width="170" height="28" rx="8" fill="#5B8BD4"/>
  <rect x="410" y="75" width="170" height="8" fill="#5B8BD4"/>
  <text x="495" y="74" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Phase 3</text>
  <text x="495" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413" text-anchor="middle">组件映射</text>
  <text x="425" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#141413">设计师输出：</text>
  <text x="425" y="143" font-family="monospace" font-size="9" fill="#87867F">设计系统组件</text>
  <text x="425" y="162" font-family="system-ui, sans-serif" font-size="9" fill="#141413">问题：</text>
  <text x="425" y="177" font-family="monospace" font-size="9" fill="#D97757">"系统覆盖不全，</text>
  <text x="425" y="190" font-family="monospace" font-size="9" fill="#D97757">定制仍需手工"</text>
  <rect x="425" y="220" width="60" height="20" rx="4" fill="#5B8BD4"/>
  <text x="455" y="234" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">引用组件</text>

  <!-- Arrow 3 -->
  <text x="585" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#D1CFC5" text-anchor="middle">→</text>

  <!-- Phase 4 -->
  <rect x="595" y="55" width="165" height="200" rx="8" fill="#FAF9F5" stroke="#141413" stroke-width="2.5"/>
  <rect x="595" y="55" width="165" height="28" rx="8" fill="#141413"/>
  <rect x="595" y="75" width="165" height="8" fill="#141413"/>
  <text x="677" y="74" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FAF9F5" text-anchor="middle">Phase 4</text>
  <text x="677" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#141413" text-anchor="middle">设计即代码</text>
  <text x="610" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#141413">设计师输出：</text>
  <text x="610" y="143" font-family="monospace" font-size="9" fill="#87867F">意图描述 + 确认</text>
  <text x="610" y="162" font-family="system-ui, sans-serif" font-size="9" fill="#788C5D">优势：</text>
  <text x="610" y="177" font-family="monospace" font-size="9" fill="#788C5D">"设计=实现</text>
  <text x="610" y="190" font-family="monospace" font-size="9" fill="#788C5D">真正统一"</text>
  <rect x="610" y="220" width="80" height="20" rx="4" fill="#141413"/>
  <text x="650" y="234" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#FAF9F5" text-anchor="middle">AI 生成代码</text>

  <!-- Speed comparison -->
  <rect x="40" y="275" width="720" height="130" rx="10" fill="#141413"/>
  <text x="400" y="300" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FAF9F5" text-anchor="middle">传统 vs AI-Native 时间对比</text>

  <text x="120" y="328" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">线框图</text>
  <rect x="60" y="335" width="230" height="18" rx="4" fill="#D97757"/>
  <rect x="60" y="335" width="230" height="18" rx="4" fill="#E3DACC"/>
  <rect x="60" y="335" width="6" height="18" rx="3" fill="#D97757"/>
  <text x="175" y="348" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">2h → 5min (24x)</text>

  <text x="120" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">视觉设计</text>
  <rect x="60" y="377" width="230" height="18" rx="4" fill="#D97757"/>
  <rect x="60" y="377" width="230" height="18" rx="4" fill="#E3DACC"/>
  <rect x="60" y="377" width="4" height="18" rx="2" fill="#D97757"/>
  <text x="175" y="390" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">8h → 30min (16x)</text>

  <text x="400" y="328" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">响应式适配</text>
  <rect x="340" y="335" width="230" height="18" rx="4" fill="#D97757"/>
  <rect x="340" y="335" width="230" height="18" rx="4" fill="#E3DACC"/>
  <rect x="340" y="335" width="6" height="18" rx="3" fill="#D97757"/>
  <text x="455" y="348" font-family="system-ui, sans-serif" font-size="9" fill="#141413" text-anchor="middle">4h → 10min (24x)</text>

  <text x="400" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#87867F" text-anchor="middle">交互说明</text>
  <rect x="340" y="377" width="230" height="18" rx="4" fill="#D97757"/>
  <rect x="340" y="377" width="230" height="18" rx="4" fill="#C8E6C9"/>
  <rect x="340" y="377" width="0" height="18" rx="0" fill="#D97757"/>
  <text x="455" y="390" font-family="system-ui, sans-serif" font-size="9" fill="#788C5D" text-anchor="middle">2h → 自动 (∞)</text>

  <rect x="595" y="332" width="145" height="60" rx="6" fill="#788C5D"/>
  <text x="667" y="355" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FAF9F5" text-anchor="middle">总计</text>
  <text x="667" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#FAF9F5" text-anchor="middle">16h → 45min</text>
  <text x="667" y="393" font-family="system-ui, sans-serif" font-size="13" font-weight="800" fill="#FAF9F5" text-anchor="middle">21x</text>
</svg>
