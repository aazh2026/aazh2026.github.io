<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="680" height="500">
  <style>
    .bg { fill: #FAF9F5; }
    .border { stroke: #D1CFC5; stroke-width: 1.5; fill: none; }
    .box-planner { fill: #D97757; }
    .box-executor { fill: #E3DACC; }
    .box-critic { fill: #E3DACC; }
    .box-memory { fill: #E3DACC; }
    .box-tool { fill: #788C5D; }
    .text-white { fill: #FAF9F5; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .text-dark { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .text-label { fill: #87867F; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; }
    .text-dark-small { fill: #141413; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
    .arrow { stroke: #D1CFC5; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-dark { stroke: #87867F; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-dark); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D1CFC5"/>
    </marker>
    <marker id="arrowhead-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#87867F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="680" height="500" rx="8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" fill="#141413" font-family="'SF Mono', monospace" font-size="12px" font-weight="700">Prompt Graph：多层防御架构</text>

  <!-- === Planner Box (Top) === -->
  <!-- Outer border box -->
  <rect x="220" y="50" width="240" height="60" rx="4" class="border"/>
  <!-- Inner fill -->
  <rect x="222" y="52" width="236" height="56" rx="3" fill="#D97757"/>
  <!-- Text -->
  <text x="340" y="77" text-anchor="middle" class="text-white">Planner</text>
  <text x="340" y="95" text-anchor="middle" class="text-white">Prompt</text>

  <!-- Arrow from Planner to branching point -->
  <line x1="340" y1="110" x2="340" y2="145" class="arrow"/>

  <!-- === Branching Node === -->
  <circle cx="340" cy="155" r="5" fill="#D1CFC5"/>

  <!-- === Three branches to Executor, Critic, Memory === -->
  <!-- Left branch to Executor -->
  <path d="M340 155 L200 155 L200 185" class="arrow"/>
  <!-- Center branch to Critic -->
  <path d="M340 155 L340 185" class="arrow"/>
  <!-- Right branch to Memory -->
  <path d="M340 155 L480 155 L480 185" class="arrow"/>

  <!-- === Executor Box === -->
  <rect x="105" y="185" width="190" height="75" rx="4" class="border"/>
  <rect x="107" y="187" width="186" height="71" rx="3" fill="#E3DACC"/>
  <text x="200" y="215" text-anchor="middle" class="text-dark-small">Executor</text>
  <text x="200" y="233" text-anchor="middle" class="text-label">Prompt</text>

  <!-- === Critic Box === -->
  <rect x="245" y="185" width="190" height="75" rx="4" class="border"/>
  <rect x="247" y="187" width="186" height="71" rx="3" fill="#E3DACC"/>
  <text x="340" y="215" text-anchor="middle" class="text-dark-small">Critic</text>
  <text x="340" y="233" text-anchor="middle" class="text-label">Prompt</text>

  <!-- === Memory Box === -->
  <rect x="385" y="185" width="190" height="75" rx="4" class="border"/>
  <rect x="387" y="187" width="186" height="71" rx="3" fill="#E3DACC"/>
  <text x="480" y="215" text-anchor="middle" class="text-dark-small">Memory</text>
  <text x="480" y="233" text-anchor="middle" class="text-label">Prompt</text>

  <!-- === Converging branches === -->
  <!-- From Executor -->
  <circle cx="200" cy="260" r="4" fill="#D1CFC5"/>
  <line x1="200" y1="260" x2="200" y2="280" class="arrow"/>
  <!-- From Critic -->
  <circle cx="340" cy="260" r="4" fill="#D1CFC5"/>
  <line x1="340" y1="260" x2="340" y2="280" class="arrow"/>
  <!-- From Memory -->
  <circle cx="480" cy="260" r="4" fill="#D1CFC5"/>
  <line x1="480" y1="260" x2="480" y2="280" class="arrow"/>

  <!-- Converge to center -->
  <path d="M200 280 L200 300 L340 300" class="arrow" style="display:none"/>
  <path d="M200 280 L200 305 L340 305" class="arrow"/>
  <path d="M480 280 L480 305 L340 305" class="arrow"/>
  <path d="M340 260 L340 305" class="arrow"/>

  <!-- === Convergence point === -->
  <circle cx="340" cy="315" r="5" fill="#D1CFC5"/>

  <!-- Arrow from convergence to Tool Use -->
  <line x1="340" y1="320" x2="340" y2="360" class="arrow"/>

  <!-- === Tool Use Logic Box (Bottom) === -->
  <rect x="200" y="360" width="280" height="70" rx="4" class="border"/>
  <rect x="202" y="362" width="276" height="66" rx="3" fill="#788C5D"/>
  <text x="340" y="390" text-anchor="middle" class="text-white">Tool Use</text>
  <text x="340" y="408" text-anchor="middle" class="text-white">Logic</text>

  <!-- === User Input Label (left side) === -->
  <text x="50" y="80" fill="#87867F" font-family="'SF Mono', monospace" font-size="11px">User Input</text>
  <line x1="50" y1="85" x2="100" y2="85" stroke="#87867F" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- === Output Label (bottom) === -->
  <text x="520" y="445" fill="#87867F" font-family="'SF Mono', monospace" font-size="11px">→ Output</text>

  <!-- === Legend === -->
  <rect x="40" y="430" width="12" height="12" rx="2" fill="#D97757"/>
  <text x="58" y="441" fill="#87867F" font-family="'SF Mono', monospace" font-size="10px">Core Prompt</text>

  <rect x="130" y="430" width="12" height="12" rx="2" fill="#E3DACC" stroke="#D1CFC5" stroke-width="1"/>
  <text x="148" y="441" fill="#87867F" font-family="'SF Mono', monospace" font-size="10px">Sub-Prompt</text>

  <rect x="210" y="430" width="12" height="12" rx="2" fill="#788C5D"/>
  <text x="228" y="441" fill="#87867F" font-family="'SF Mono', monospace" font-size="10px">Logic Layer</text>
</svg>
