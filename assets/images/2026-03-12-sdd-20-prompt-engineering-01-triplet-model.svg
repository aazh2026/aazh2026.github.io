<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif" viewBox="0 0 680 400">
  <path fill="#faf9f5" d="M0 0h680v400H0z"/>
  <text x="340" y="28" fill="#141413" font-size="14" font-weight="500" letter-spacing="-.02em" text-anchor="middle">SDD 2.0 三元组模型</text>
  <text x="340" y="44" fill="#87867f" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">Context + Constraints + Acceptance Criteria</text>
  <rect width="180" height="110" x="60" y="72" fill="#fff" stroke="#d97757" stroke-width="1.8" rx="8"/>
  <rect width="180" height="28" x="60" y="72" fill="#d97757" rx="8"/>
  <path fill="#d97757" d="M60 92h180v8H60z"/>
  <text x="150" y="90" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Context</text>
  <text x="76" y="120" fill="#141413" font-size="10.5">actor: 顾客</text>
  <text x="76" y="136" fill="#141413" font-size="10.5">state: 已登录，持有优惠券</text>
  <text x="76" y="152" fill="#141413" font-size="10.5">goal: 领取一张兑换券</text>
  <text x="76" y="172" fill="#87867f" font-size="9.5">谁？当前状态？目标？</text>
  <rect width="180" height="110" x="440" y="72" fill="#fff" stroke="#788c5d" stroke-width="1.8" rx="8"/>
  <rect width="180" height="28" x="440" y="72" fill="#788c5d" rx="8"/>
  <path fill="#788c5d" d="M440 92h180v8H440z"/>
  <text x="530" y="90" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Constraints</text>
  <text x="456" y="120" fill="#141413" font-size="10.5">功能: 每人限领1张</text>
  <text x="456" y="136" fill="#141413" font-size="10.5">性能: 3秒内响应</text>
  <text x="456" y="152" fill="#141413" font-size="10.5">合规: 同IP不超10次</text>
  <text x="456" y="172" fill="#87867f" font-size="9.5">怎么做？做到什么程度？</text>
  <rect width="240" height="110" x="220" y="220" fill="#fff" stroke="#141413" stroke-width="1.8" rx="8"/>
  <rect width="240" height="28" x="220" y="220" fill="#141413" rx="8"/>
  <path fill="#141413" d="M220 240h240v8H220z"/>
  <text x="340" y="238" fill="#fff" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">Acceptance Criteria</text>
  <text x="236" y="268" fill="#141413" font-size="10.5">Given: 已登录，优惠券有库存</text>
  <text x="236" y="284" fill="#141413" font-size="10.5">When: 点击领取按钮</text>
  <text x="236" y="300" fill="#141413" font-size="10.5">Then: 跳转卡包，显示&quot;领取成功&quot;</text>
  <text x="236" y="320" fill="#87867f" font-size="9.5">如何验证？</text>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow1)" d="M240 120c60-20 140-20 200-20"/>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow1)" d="M530 182c-50 13-130 18-170 28"/>
  <path fill="none" stroke="#d1cfc5" stroke-width="1.5" marker-end="url(#arrow1)" d="M220 275c-60-15-120-65-140-93"/>
  <defs>
    <marker id="arrow1" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3">
      <path fill="#d1cfc5" d="M0 0v6l8-3z"/>
    </marker>
  </defs>
  <path stroke="#d1cfc5" d="M60 355h560"/>
  <text x="340" y="372" fill="#141413" font-size="11" font-weight="500" text-anchor="middle">实例：搜索订单历史</text>
  <rect width="560" height="14" x="60" y="382" fill="#e3dacc" rx="4"/>
  <text x="76" y="393" fill="#141413" font-family="ui-monospace, monospace" font-size="9">context: actor=会员, state=已登录, goal=查询近2年订单</text>
</svg>
