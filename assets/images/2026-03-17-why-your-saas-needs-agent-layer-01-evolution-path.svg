<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#E3DACC"/>
    </linearGradient>
    <filter id="shadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#141413" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="440" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#141413">SaaS Agent 化演进路径：从 Copilot 到 Autonomous Agent</text>

  <!-- Timeline arrow -->
  <line x1="80" y1="75" x2="720" y2="75" stroke="#D1CFC5" stroke-width="3"/>
  <polygon points="720,70 730,75 720,80" fill="#D1CFC5"/>
  <text x="400" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#87867F">演进时间线</text>

  <!-- Phase 1: Copilot -->
  <circle cx="140" cy="75" r="12" fill="#788C5D"/>
  <text x="140" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5">1</text>
  <rect x="60" y="100" width="160" height="160" rx="12" fill="#FAF9F5" stroke="#788C5D" stroke-width="2" filter="url(#shadow5)"/>
  <text x="140" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#788C5D">Copilot 模式</text>
  <text x="140" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">第 1-3 个月</text>

  <text x="75" y="158" font-family="system-ui,sans-serif" font-size="11" fill="#141413">👤 用户主导</text>
  <text x="75" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#141413">🤖 AI 辅助</text>
  <text x="75" y="192" font-family="system-ui,sans-serif" font-size="11" fill="#141413">✍️ 用户最终决策</text>

  <rect x="70" y="205" width="140" height="35" rx="6" fill="#788C5D"/>
  <text x="140" y="227" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#FAF9F5">难度: ⭐⭐</text>

  <!-- Phase 2: Workflow -->
  <circle cx="340" cy="75" r="12" fill="#D97757"/>
  <text x="340" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5">2</text>
  <rect x="260" y="100" width="160" height="160" rx="12" fill="#FAF9F5" stroke="#D97757" stroke-width="2" filter="url(#shadow5)"/>
  <text x="340" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#D97757">Workflow Automation</text>
  <text x="340" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">第 4-6 个月</text>

  <text x="275" y="158" font-family="system-ui,sans-serif" font-size="11" fill="#141413">⚡ 规则驱动</text>
  <text x="275" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#141413">🔄 预定义工作流</text>
  <text x="275" y="192" font-family="system-ui,sans-serif" font-size="11" fill="#141413">🤖 AI 执行，人审批</text>

  <rect x="270" y="205" width="140" height="35" rx="6" fill="#D97757"/>
  <text x="340" y="227" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#FAF9F5">难度: ⭐⭐⭐</text>

  <!-- Phase 3: Autonomous -->
  <circle cx="540" cy="75" r="12" fill="#141413"/>
  <text x="540" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#FAF9F5">3</text>
  <rect x="460" y="100" width="160" height="160" rx="12" fill="#FAF9F5" stroke="#141413" stroke-width="2" filter="url(#shadow5)"/>
  <text x="540" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#141413">Autonomous Agent</text>
  <text x="540" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#87867F">第 7-12 个月</text>

  <text x="475" y="158" font-family="system-ui,sans-serif" font-size="11" fill="#141413">🧠 AI 自主决策</text>
  <text x="475" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#141413">📋 人保留否决权</text>
  <text x="475" y="192" font-family="system-ui,sans-serif" font-size="11" fill="#141413">📈 持续学习优化</text>

  <rect x="470" y="205" width="140" height="35" rx="6" fill="#141413"/>
  <text x="540" y="227" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#FAF9F5">难度: ⭐⭐⭐⭐⭐</text>

  <!-- Business value bar -->
  <rect x="60" y="290" width="640" height="80" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
  <text x="380" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#141413">商业价值提升</text>

  <!-- Bar chart -->
  <rect x="100" y="325" width="80" height="35" rx="4" fill="#788C5D"/>
  <text x="140" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FAF9F5">ARPU +30%</text>

  <rect x="260" y="305" width="80" height="55" rx="4" fill="#D97757"/>
  <text x="300" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FAF9F5">ARPU +2-3x</text>

  <rect x="460" y="280" width="80" height="80" rx="4" fill="#141413"/>
  <text x="500" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FAF9F5">ARPU +3-5x</text>

  <!-- X axis labels -->
  <text x="140" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">Copilot</text>
  <text x="300" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">Workflow</text>
  <text x="500" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#87867F">Autonomous</text>

  <!-- Bottom message -->
  <rect x="60" y="390" width="640" height="38" rx="8" fill="#E3DACC"/>
  <text x="380" y="415" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#141413">"做 Agent 层不是选择题，是必答题。区别在于：你现在开始，还是等别人做成功了再跟风。"</text>
</svg>