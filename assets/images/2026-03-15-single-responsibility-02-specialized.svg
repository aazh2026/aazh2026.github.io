<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="ui-serif, Georgia, serif">
  <!-- 三个专业化 Agent 协作 -->
  <rect width="560" height="180" fill="#FAF9F5"/>

  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#141413" letter-spacing="-0.02em">专业化 Agent 协作：各司其职</text>
  <text x="280" y="36" text-anchor="middle" font-size="9.5" fill="#87867F" font-family="ui-monospace, monospace">postcodeengineering.com · 2026/03/15</text>

  <!-- Agent A: 邮件 (clay) -->
  <rect x="40" y="60" width="130" height="80" rx="6" fill="#FFFFFF" stroke="#D97757" stroke-width="1.8"/>
  <rect x="40" y="60" width="130" height="18" rx="6" fill="#FEF3C7" stroke="#D97757" stroke-width="1"/>
  <text x="105" y="74" text-anchor="middle" font-size="10" fill="#D97757" font-family="ui-monospace, monospace" font-weight="600">A · 邮件管理 Agent</text>
  <text x="60" y="94" font-size="9" fill="#141413">• 读取邮件</text>
  <text x="60" y="108" font-size="9" fill="#141413">• 撰写回复</text>
  <text x="60" y="122" font-size="9" fill="#141413">• 发送邮件</text>
  <rect x="162" y="88" width="14" height="14" rx="7" fill="#D97757"/>
  <text x="169" y="99" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">A</text>

  <!-- Agent B: 日程 (gray variant) -->
  <rect x="215" y="60" width="130" height="80" rx="6" fill="#FFFFFF" stroke="#87867F" stroke-width="1.5"/>
  <rect x="215" y="60" width="130" height="18" rx="6" fill="#F5F4F0" stroke="#87867F" stroke-width="1"/>
  <text x="280" y="74" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">B · 日程协调 Agent</text>
  <text x="235" y="94" font-size="9" fill="#141413">• 查询空闲</text>
  <text x="235" y="108" font-size="9" fill="#141413">• 安排会议</text>
  <text x="235" y="122" font-size="9" fill="#141413">• 处理冲突</text>
  <rect x="337" y="88" width="14" height="14" rx="7" fill="#87867F"/>
  <text x="344" y="99" text-anchor="middle" font-size="7" fill="#FFFFFF" font-family="ui-monospace, monospace">B</text>

  <!-- Agent C: 文档 (border only, lighter) -->
  <rect x="390" y="60" width="130" height="80" rx="6" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <rect x="390" y="60" width="130" height="18" rx="6" fill="#F8F7F4" stroke="#D1CFC5" stroke-width="1"/>
  <text x="455" y="74" text-anchor="middle" font-size="10" fill="#87867F" font-family="ui-monospace, monospace" font-weight="600">C · 文档处理 Agent</text>
  <text x="410" y="94" font-size="9" fill="#141413">• 创建文档</text>
  <text x="410" y="108" font-size="9" fill="#141413">• 编辑内容</text>
  <text x="410" y="122" font-size="9" fill="#141413">• 管理版本</text>
  <rect x="512" y="88" width="14" height="14" rx="7" fill="#D1CFC5"/>
  <text x="519" y="99" text-anchor="middle" font-size="7" fill="#87867F" font-family="ui-monospace, monospace">C</text>

  <!-- Collaboration arrows -->
  <line x1="172" y1="100" x2="213" y2="100" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="345" y1="100" x2="388" y2="100" stroke="#D1CFC5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="280" y1="140" x2="280" y2="160" stroke="#D1CFC5" stroke-width="1.5"/>
  <polygon points="276,160 280,168 284,160" fill="#D1CFC5"/>

  <!-- Note -->
  <text x="280" y="176" text-anchor="middle" font-size="9" fill="#87867F" font-style="italic">各 Agent 独立演进，按需协作，符合 SRP</text>
</svg>