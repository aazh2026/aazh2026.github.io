title: "Post-Code Engineering"
description: "AI-Native软件工程 | 从代码到意图 | 探索后代码时代的工程范式"
url: "https://aazh2026.github.io"
baseurl: ""
author: "Aaron"
email: "sophi@example.com"

# Google Analytics 4
google_analytics: G-DBLJ6HTZL5  # Stream ID: 13693046864

# 主题
theme: minima

# 构建设置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 分页
paginate: 10
paginate_path: "/page:num/"

# 显示未来日期的文章
future: true

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Aaron"
