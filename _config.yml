title: "Post-Code Engineering"
description: "AI-Native软件工程 | 从代码到意图 | 探索后代码时代的工程范式"
url: "https://aazh2026.github.io"
baseurl: ""
author: "@postcodeeng"
# email removed: was a placeholder "sophi@example.com"; re-add real address when ready

# Google Analytics 4 (legacy; requires cookie banner in EU)
# google_analytics: G-DBLJ6HTZL5

# Plausible Analytics (preferred — cookieless, GDPR-compliant, lighter)
# Sign up at https://plausible.io and replace with your domain
plausible_domain: aazh2026.github.io

# 主题
theme: minima

# 构建设置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# 永久链接格式 - 移除日期
permalink: /:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-last-modified-at
  - jekyll-minifier

# Minifier config
minifier:
  type: html
  preserve: 'pre,code,script,style'

# last_modified_at 配置
last_modified_at:
  time: full
  format: "%Y-%m-%d"

# 显示未来日期的文章
future: true

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "@postcodeeng"
