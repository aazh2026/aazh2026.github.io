title: "Post-Code Engineering"
description: "AI-Native软件工程 | 从代码到意图 | 探索后代码时代的工程范式"
url: "https://aazh2026.github.io"
baseurl: ""
author: "@postcodeeng"
# email removed: was a placeholder "sophi@example.com"; re-add real address when ready

# Google Analytics 4 (legacy; requires cookie banner in EU)
# google_analytics: G-DBLJ6HTZL5

# Plausible Analytics (preferred — cookieless, GDPR-compliant, lighter)
# Sign up at https://plausible.io and replace with your domain
plausible_domain: aazh2026.github.io

# 主题
theme: minima

# 构建设置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# 永久链接格式 - 移除日期
permalink: /:title/

# 插件
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-last-modified-at
  - jekyll-minifier

# 分页
paginate: 10
paginate_path: "/page:num/"

# Minifier config
# jekyll-minifier 0.1.10 reads its config from the `jekyll-minifier`
# key (NOT `minifier` — that key is silently ignored). uglifier_args
# are passed through to Uglifier.new; harmony: true enables ES2015+
# parsing so the ES5-only default doesn't reject modern JS in sw.js,
# web-vitals inline reporters, etc.
jekyll-minifier:
  type: html
  preserve: 'pre,code,script,style'
  uglifier_args:
    harmony: true

# last_modified_at 配置
last_modified_at:
  time: full
  format: "%Y-%m-%d"

# 显示未来日期的文章
future: true

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "@postcodeeng"

# Exclude development tool directories from the build output.
# scripts/ holds Node + Python CI helpers (e.g. check-color-contrast.js
# uses ES6 `const`) — Jekyll 4.3 would otherwise copy them to _site/
# as static files, and jekyll-minifier 0.1.10 would feed them to the
# ES5-only Uglifier, failing the build.
exclude:
  - scripts
  - vendor
  - .bundle
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - CONTRIBUTING.md
  - DEPLOY.md
  - BLOG-SOP.md
  - BLOG_TOPICS.md
  - AI-NATIVE-WEEKLY-GUIDE.md
  - "*.gemspec"

# Collections
collections:
  series:
    output: true
    permalink: /:path/
