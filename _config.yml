title: "Sophi的代码花园"
description: "全栈工程师的思维碎片 | SRE实践 | AI工程探索"
url: "https://aazh2026.github.io"
baseurl: ""
author: "Sophi"
email: "sophi@example.com"

# Google Analytics 4
google_analytics: G-XXXXXXXXXX  # 请替换为你的 GA4 跟踪 ID

# 主题
theme: minima

# 构建设置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 分页
paginate: 10
paginate_path: "/page:num/"

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Sophi"
