name: Deploy Jekyll Blog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Add Linux platform to Gemfile.lock
        run: |
          gem install bundler -v '4.0.9' --no-document
          bundle _4.0.9_ lock --add-platform x86_64-linux

      - name: Install dependencies
        run: |
          bundle _4.0.9_ config set --local path 'vendor/bundle'
          bundle _4.0.9_ install --jobs 4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm deps (svgo for SVG verification)
        run: npm ci

      - name: Verify SVGs are svgo-optimized
        run: node scripts/check-svgo.js

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # PageFind builds a static search index over the built site, written to
      # _site/pagefind/. Must run after Jekyll so it sees the final HTML, and
      # before upload-pages-artifact so the chunks ship with the deploy.
      - name: Build search index (PageFind)
        run: npx pagefind --site _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # SEO检查
  seo-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Wait for deployment
        run: sleep 60
        
      - name: Check sitemap
        run: |
          curl -s https://aazh2026.github.io/sitemap.xml | grep -q "urlset" && echo "✅ Sitemap OK" || echo "❌ Sitemap missing"
          
      - name: Check robots.txt
        run: |
          curl -s https://aazh2026.github.io/robots.txt | grep -q "Sitemap" && echo "✅ Robots OK" || echo "❌ Robots missing"
          
      - name: Check feed
        run: |
          curl -s https://aazh2026.github.io/feed.xml | grep -q "rss" && echo "✅ RSS Feed OK" || echo "❌ Feed missing"

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, seo-check]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success' && needs.seo-check.result == 'success'
        run: |
          echo "🎉 博客部署成功！"
          echo "🔗 https://aazh2026.github.io"
          
      - name: Notify failure
        if: needs.deploy.result == 'failure' || needs.seo-check.result == 'failure'
        run: |
          echo "❌ 博客部署失败"
          exit 1