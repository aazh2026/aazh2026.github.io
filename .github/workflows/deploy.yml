name: Deploy Jekyll Blog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
          
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # SEO检查
  seo-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Wait for deployment
        run: sleep 60
        
      - name: Check sitemap
        run: |
          curl -s https://aazh2026.github.io/sitemap.xml | grep -q "urlset" && echo "✅ Sitemap OK" || echo "❌ Sitemap missing"
          
      - name: Check robots.txt
        run: |
          curl -s https://aazh2026.github.io/robots.txt | grep -q "Sitemap" && echo "✅ Robots OK" || echo "❌ Robots missing"
          
      - name: Check feed
        run: |
          curl -s https://aazh2026.github.io/feed.xml | grep -q "rss" && echo "✅ RSS Feed OK" || echo "❌ Feed missing"

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, seo-check]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success' && needs.seo-check.result == 'success'
        run: |
          echo "🎉 博客部署成功！"
          echo "🔗 https://aazh2026.github.io"
          
      - name: Notify failure
        if: needs.deploy.result == 'failure' || needs.seo-check.result == 'failure'
        run: |
          echo "❌ 博客部署失败"
          exit 1