name: HTML Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --baseurl ""

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install --no-save html-validate@8

      - name: Validate built HTML
        # jekyll-redirect-from emits bare meta-refresh stub HTML for each
        # `redirect_from:` entry — those pages intentionally omit <head>/<body>
        # wrappers (browsers only need the meta refresh). Skip them; the
        # canonical post page is what gets validated.
        run: |
          find _site -name "*.html" \
            -not -exec grep -l '<meta http-equiv="refresh"' {} \; \
            | xargs npx html-validate --config .htmlvalidate.json
