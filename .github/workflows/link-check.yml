name: Link Check

# Catches broken internal links and missing asset references before they
# reach production. Triggers on PR + push to main.
#
# Two stages:
# 1. Pre-build: scan source HTML/MD for broken internal links (fast, no jekyll)
# 2. Post-build: run lychee against _site/ to catch external link rot

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - '*.html'
      - '*.md'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'scripts/check-internal-links.js'
      - '.github/workflows/link-check.yml'
  pull_request:
    branches: [main]
    paths:
      - '_posts/**'
      - '*.html'
      - '*.md'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'scripts/check-internal-links.js'
      - '.github/workflows/link-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "link-check"
  cancel-in-progress: true

jobs:
  link-check:
    name: Check internal links and asset references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: "Pre-build: internal link check"
        run: node scripts/check-internal-links.js

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 0

      - name: Build site
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --exclude-loopback
            --exclude-mail
            --exclude 'https://github.com/.*/issues/new'
            --exclude 'https://x.com/.*'
            --exclude 'https://twitter.com/.*'
            --exclude 'https://.*\.gstatic\.com/.*'
            --exclude 'https://fonts\..*\.com/.*'
            --format compact
            --max-concurrency 8
            --timeout 10
            --retry-wait-time 2
            --accept '200,301,302,303,304,307,308'
            './_site/**/*.html'
            './_posts/**/*.md'
            './_includes/**/*.html'
            './_layouts/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        if: always()
        run: |
          echo "## Link check results" >> $GITHUB_STEP_SUMMARY
          echo "See lychee logs above for broken links." >> $GITHUB_STEP_SUMMARY
