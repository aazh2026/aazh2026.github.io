name: Link Check

# Catches broken internal links and missing asset references before they
# reach production. Triggers on PR + push to main.
#
# Two stages:
# 1. Pre-build: scan source HTML/MD for broken internal links (fast, no jekyll)
# 2. Post-build: run lychee against _site/ to catch external link rot

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - '*.html'
      - '*.md'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'scripts/check-internal-links.js'
      - '.github/workflows/link-check.yml'
  pull_request:
    branches: [main]
    paths:
      - '_posts/**'
      - '*.html'
      - '*.md'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'scripts/check-internal-links.js'
      - '.github/workflows/link-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "link-check"
  cancel-in-progress: true

jobs:
  link-check:
    name: Check internal links and asset references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: "Pre-build: verify SVGs are svgo-optimized"
        run: node scripts/check-svgo.js

      - name: "Pre-build: verify post frontmatter"
        run: |
          node scripts/check-aria-labels.js
          node scripts/check-code-fence-langs.js
          node scripts/check-series.js

      - name: "Pre-build: internal link check"
        run: node scripts/check-internal-links.js

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 0

      - name: Build site
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Source files (posts/includes/layouts) are validated pre-build by
          # scripts/check-internal-links.js — lychee here only audits the
          # built output, so we point --root-dir at _site to resolve the
          # site-rooted paths Jekyll emits (e.g. /about/, /feed.xml).
          args: >-
            --offline
            --no-progress
            --exclude-loopback
            --exclude 'https://github.com/.*/issues/new'
            --exclude 'https://x.com/.*'
            --exclude 'https://twitter.com/.*'
            --exclude 'https://.*\.gstatic\.com/.*'
            --exclude 'https://fonts\..*\.com/.*'
            --exclude-file lychee-excludes.txt
            --root-dir _site
            --format compact
            --max-concurrency 8
            --timeout 10
            --extensions html
            --retry-wait-time 2
            --accept '200,301,302,303,304,307,308'
            './_site/**/*.html'
          fail: true
          # Disable the default $GITHUB_STEP_SUMMARY write — large sites blow
          # past the 1024 KiB summary cap. The action still writes its full
          # report to lychee/out.md and we echo a one-line note ourselves.
          jobSummary: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        if: always()
        run: |
          echo "## Link check results" >> $GITHUB_STEP_SUMMARY
          echo "See lychee/out.md artifact for full broken-link report." >> $GITHUB_STEP_SUMMARY
