name: CodeQL

# Static analysis for security issues. Runs on push/PR to main, weekly schedule.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Standard 5-field cron: minute hour day-of-month month day-of-week
    # 0 17 * * 1 = 17:00 UTC every Monday
    - cron: '0 17 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
