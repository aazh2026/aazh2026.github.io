name: Deploy Jekyll Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v2
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install dependencies
        run: |
          gem install bundler -v '4.0.9' --no-document
          bundle config set --local frozen false
          bundle install --jobs 4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps (svgo for SVG verification)
        run: npm ci

      - name: Verify SVGs are svgo-optimized
        run: node scripts/check-svgo.js

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        
      - name: Build site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # PageFind builds a static search index over the built site, written to
      # _site/pagefind/. Must run after Jekyll so it sees the final HTML, and
      # before upload-pages-artifact so the chunks ship with the deploy.
      - name: Build search index (PageFind)
        run: npx pagefind --site _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
