<!-- 社交分享组件 -->
<div class="share-buttons" style="margin: 2rem 0; padding: 1.5rem; border-top: 1px solid #e9ecef; border-bottom: 1px solid #e9ecef;">
  <p style="margin: 0 0 1rem 0; color: #666; font-size: 0.875rem;">
    分享这篇文章：
  </p>
  
  <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
    <!-- Twitter -->
    <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url }}{{ page.url | url_encode }}"
       target="_blank" rel="noopener"
       style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: #1da1f2; color: white; text-decoration: none; border-radius: 4px; font-size: 0.875rem; transition: opacity 0.2s;"
       onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
      Twitter
    </a>
    
    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ page.url | url_encode }}"
       target="_blank" rel="noopener"
       style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: #0077b5; color: white; text-decoration: none; border-radius: 4px; font-size: 0.875rem; transition: opacity 0.2s;"
       onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>
    
    <!-- 复制链接 -->
    <button onclick="copyLink()"
            style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: #6c757d; color: white; border: none; border-radius: 4px; font-size: 0.875rem; cursor: pointer; transition: opacity 0.2s;"
            onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span id="copy-text">复制链接</span>
    </button>
  </div>
</div>

<script>
  function copyLink() {
    var url = window.location.href;
    navigator.clipboard.writeText(url).then(function() {
      var btn = document.getElementById('copy-text');
      var originalText = btn.textContent;
      btn.textContent = '已复制！';
      setTimeout(function() {
        btn.textContent = originalText;
      }, 2000);
    });
  }
</script>
