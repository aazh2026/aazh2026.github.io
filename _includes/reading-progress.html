{% comment %}
  阅读进度条 - 固定在顶部，显示当前阅读进度
{% endcomment %}

<div class="reading-progress-container" aria-hidden="true">
  <div class="reading-progress-bar" id="reading-progress"></div>
</div>

<script>
(function() {
  function initReadingProgress() {
    var progressBar = document.getElementById('reading-progress');
    var article = document.querySelector('.post-content') || document.querySelector('article');
    
    if (!progressBar || !article) return;
    
    function updateProgress() {
      var scrollTop = window.pageYOffset;
      var docHeight = article.offsetHeight;
      var winHeight = window.innerHeight;
      
      // 计算阅读进度
      var scrollPercent = scrollTop / (docHeight - winHeight);
      scrollPercent = Math.max(0, Math.min(1, scrollPercent)); // 限制在 0-1 之间
      
      progressBar.style.width = (scrollPercent * 100) + '%';
    }
    
    // 使用 requestAnimationFrame 优化性能
    var ticking = false;
    function onScroll() {
      if (!ticking) {
        window.requestAnimationFrame(function() {
          updateProgress();
          ticking = false;
        });
        ticking = true;
      }
    }
    
    window.addEventListener('scroll', onScroll, { passive: true });
    
    // 初始状态
    updateProgress();
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initReadingProgress);
  } else {
    initReadingProgress();
  }
})();
</script>
