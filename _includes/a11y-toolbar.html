<!-- A11y 工具栏: 减少动效 / 高对比度 / 字号 调整 -->
<div class="a11y-toolbar" role="toolbar" aria-label="可访问性设置">
  <button type="button" data-a11y="reduce-motion" aria-pressed="false" title="减少动效">
    <span aria-hidden="true">𝛁</span>
  </button>
  <button type="button" data-a11y="high-contrast" aria-pressed="false" title="高对比度">
    <span aria-hidden="true">◐</span>
  </button>
  <button type="button" data-a11y="font-smaller" aria-label="缩小字体" title="缩小字体">
    <span aria-hidden="true">A−</span>
  </button>
  <button type="button" data-a11y="font-larger" aria-label="放大字体" title="放大字体">
    <span aria-hidden="true">A+</span>
  </button>
  <button type="button" data-a11y="font-reset" aria-label="重置字号" title="重置字号">
    <span aria-hidden="true">A=</span>
  </button>
</div>

<script>
(function() {
  var STORAGE_KEY = 'pce-a11y';
  var root = document.documentElement;

  // Load saved preferences
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch (e) {}

  function apply(state) {
    root.setAttribute('data-reduce-motion', state.reduceMotion ? '1' : '0');
    root.setAttribute('data-high-contrast', state.highContrast ? '1' : '0');
    root.setAttribute('data-font-scale', String(state.fontScale || 1));
    // Update aria-pressed
    document.querySelectorAll('[data-a11y]').forEach(function(btn) {
      var key = btn.getAttribute('data-a11y');
      var pressed = false;
      if (key === 'reduce-motion') pressed = !!state.reduceMotion;
      else if (key === 'high-contrast') pressed = !!state.highContrast;
      else if (key === 'font-smaller' || key === 'font-larger' || key === 'font-reset') {
        pressed = (state.fontScale || 1) !== 1;
      }
      btn.setAttribute('aria-pressed', pressed ? 'true' : 'false');
    });
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  var state = {
    reduceMotion: !!saved.reduceMotion,
    highContrast: !!saved.highContrast,
    fontScale: saved.fontScale || 1,
  };
  apply(state);

  document.querySelectorAll('[data-a11y]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var key = btn.getAttribute('data-a11y');
      if (key === 'reduce-motion') state.reduceMotion = !state.reduceMotion;
      else if (key === 'high-contrast') state.highContrast = !state.highContrast;
      else if (key === 'font-smaller') state.fontScale = Math.max(0.8, (state.fontScale || 1) - 0.1);
      else if (key === 'font-larger') state.fontScale = Math.min(1.4, (state.fontScale || 1) + 0.1);
      else if (key === 'font-reset') state.fontScale = 1;
      apply(state);
      save();
    });
  });
})();
</script>
