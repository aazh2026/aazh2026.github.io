<header class="site-header">
  <div class="header-inner">
    <a class="site-brand" href="{{ "/" | relative_url }}">
      <span class="site-brand-icon">◈</span>
      <span class="site-brand-text">Post-Code Engineering</span>
    </a>
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="切换菜单">
      <span class="hamburger"></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">首页</a>
      <a href="/archive" class="nav-link{% if page.url contains 'archive' %} active{% endif %}">归档</a>
      <a href="/tags" class="nav-link{% if page.url contains 'tags' %} active{% endif %}">标签</a>
      <a href="/subscribe/" class="nav-link{% if page.url contains 'subscribe' %} active{% endif %}">订阅</a>
      <a href="/about/" class="nav-link{% if page.url contains 'about' %} active{% endif %}">关于</a>
    </nav>
  </div>
</header>

<style>
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--paper);
  border-bottom: 1.5px solid var(--border);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 2rem;
  height: 56px;
}
.site-brand {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  color: var(--text);
}
.site-brand:hover { color: var(--accent); }
.site-brand-icon {
  color: var(--accent);
  font-size: 1.3rem;
  line-height: 1;
}
.site-brand-text {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
}
.site-nav {
  display: flex;
  gap: 2rem;
  align-items: center;
}
.nav-link {
  text-decoration: none;
  color: var(--muted);
  font-size: 14px;
  transition: color 120ms;
  white-space: nowrap;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--accent); font-weight: 600; }
.mobile-menu-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.5rem;
}
.hamburger {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text);
  position: relative;
}
.hamburger::before, .hamburger::after {
  content: '';
  position: absolute;
  width: 22px;
  height: 2px;
  background: var(--text);
  transition: all 0.3s;
}
.hamburger::before { top: -7px; }
.hamburger::after { top: 7px; }
.mobile-menu-toggle.active .hamburger { background: transparent; }
.mobile-menu-toggle.active .hamburger::before { transform: rotate(45deg); top: 0; }
.mobile-menu-toggle.active .hamburger::after { transform: rotate(-45deg); top: 0; }
@media (max-width: 900px) {
  .mobile-menu-toggle { display: block; }
  .site-nav {
    position: absolute;
    top: 56px;
    left: 0;
    right: 0;
    flex-direction: column;
    gap: 0;
    background: var(--paper);
    padding: 1rem;
    border-top: 1.5px solid var(--border);
    box-shadow: 0 4px 20px rgba(20,20,19,0.08);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s;
  }
  .site-nav.active { opacity: 1; visibility: visible; transform: translateY(0); }
  .nav-link { padding: 0.75rem 0; width: 100%; text-align: center; border-bottom: 1px solid var(--border); }
}
</style>

<script>
(function() {
  var toggle = document.getElementById('mobile-menu-toggle');
  var nav = document.getElementById('site-nav');
  if (!toggle || !nav) return;
  toggle.addEventListener('click', function() {
    toggle.classList.toggle('active');
    nav.classList.toggle('active');
  });
  nav.querySelectorAll('.nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      toggle.classList.remove('active');
      nav.classList.remove('active');
    });
  });
})();
</script>
