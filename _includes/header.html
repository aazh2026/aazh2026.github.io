<header class="site-header" role="banner">
  <div class="wrapper">
    <!-- 左侧：Logo/标题 -->
    <a class="site-brand" rel="author" href="{{ "/" | relative_url }}">
      <span class="site-brand-icon">◈</span>
      <span class="site-brand-text">Post-Code Engineering</span>
    </a>
    
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="切换菜单">
      <span class="hamburger"></span>
    </button>
    
    <!-- 中间：导航菜单 -->
    <nav class="site-nav" id="site-nav">
      <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">首页</a>
      <a href="/archive" class="nav-link{% if page.url contains 'archive' %} active{% endif %}">归档</a>
      <a href="/tags" class="nav-link{% if page.url contains 'tags' %} active{% endif %}">标签</a>
      <a href="/subscribe/" class="nav-link{% if page.url contains 'subscribe' %} active{% endif %}">订阅</a>
      <a href="/about/" class="nav-link{% if page.url contains 'about' %} active{% endif %}">关于</a>
    </nav>
    
    <!-- 右侧：工具栏 -->
    <div class="nav-tools">
    </div>
  </div>
</header>

<!-- 导航栏样式 -->
<style>
  /* 导航栏 - 与内容区风格一致 */
  .site-header {
    position: relative;
    z-index: 100;
    background: var(--ivory);
    border-bottom: 1.5px solid var(--g300);
  }
  
  /* 布局优化 - 与内容区同宽 */
  .site-header .wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1120px;
    margin: 0 auto;
    padding: 0.85rem 1rem;
    position: relative;
  }
  
  /* 品牌区域 */
  .site-brand {
    text-decoration: none;
    color: var(--slate);
    font-weight: 700;
    font-size: 1.1rem;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.375rem;
    letter-spacing: -0.02em;
  }
  
  .site-brand:hover {
    color: var(--clay);
  }
  
  .site-brand-icon {
    color: var(--clay);
    font-size: 1.3rem;
    line-height: 1;
  }
  
  .site-brand-text {
    font-weight: 700;
  }
  
  /* 导航菜单 */
  .site-nav {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  
  .nav-link {
    text-decoration: none;
    color: var(--g700);
    font-size: 14px;
    font-family: var(--sans);
    padding: 0.375rem 0.625rem;
    border-radius: 6px;
    transition: color 120ms, background 120ms;
    white-space: nowrap;
  }
  
  .nav-link:hover {
    color: var(--slate);
    background: var(--g100);
  }
  
  /* 当前页面高亮 */
  .nav-link.active {
    color: var(--clay);
    font-weight: 600;
  }
  
  /* 工具栏 */
  .nav-tools {
    display: none;
  }
  
  /* 移动端菜单按钮 - 默认隐藏 */
  .mobile-menu-toggle {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    z-index: 1001;
  }
  
  .hamburger {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--slate);
    position: relative;
    transition: all 0.3s ease;
  }
  
  .hamburger::before,
  .hamburger::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 2px;
    background: var(--slate);
    transition: all 0.3s ease;
  }
  
  .hamburger::before {
    top: -7px;
  }
  
  .hamburger::after {
    top: 7px;
  }
  
  /* 汉堡菜单动画 */
  .mobile-menu-toggle.active .hamburger {
    background: transparent;
  }
  
  .mobile-menu-toggle.active .hamburger::before {
    transform: rotate(45deg);
    top: 0;
  }
  
  .mobile-menu-toggle.active .hamburger::after {
    transform: rotate(-45deg);
    top: 0;
  }
  
  /* 响应式：小屏幕 */
  @media (max-width: 900px) {
    .mobile-menu-toggle {
      display: block;
      order: 2;
    }
    
    .site-brand {
      font-size: 1.05rem;
      order: 1;
    }
    
    .nav-tools {
      order: 3;
    }
    
    .site-nav {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      background: var(--ivory);
      padding: 1rem;
      gap: 0;
      border-top: 1.5px solid var(--g300);
      box-shadow: 0 4px 20px rgba(20, 20, 19, 0.08);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 999;
    }
    
    .site-nav.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    
    .nav-link {
      padding: 0.75rem 0;
      width: 100%;
      text-align: center;
      border-bottom: 1px solid var(--g200);
    }
    
    .nav-link:last-child {
      border-bottom: none;
    }
    
    .nav-link.active {
      background: var(--g100);
      border-radius: 6px;
    }
  }
</style>

<!-- 移动端菜单切换脚本 -->
<script>
(function() {
  var menuToggle = document.getElementById('mobile-menu-toggle');
  var siteNav = document.getElementById('site-nav');
  
  if (menuToggle && siteNav) {
    menuToggle.addEventListener('click', function() {
      menuToggle.classList.toggle('active');
      siteNav.classList.toggle('active');
    });
    
    var navLinks = siteNav.querySelectorAll('.nav-link');
    navLinks.forEach(function(link) {
      link.addEventListener('click', function() {
        menuToggle.classList.remove('active');
        siteNav.classList.remove('active');
      });
    });
  }
})();
</script>
