<header class="site-header" role="banner">
  <div class="wrapper">
    <!-- 左侧：Logo/标题 -->
    <a class="site-brand" rel="author" href="{{ "/" | relative_url }}">
      <span class="site-title">{{ site.title | escape }}</span>
    </a>
    
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="切换菜单">
      <span class="hamburger"></span>
    </button>
    
    <!-- 中间：导航菜单 -->
    <nav class="site-nav" id="site-nav">
      <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">首页</a>
      <a href="/archive" class="nav-link{% if page.url contains 'archive' %} active{% endif %}">归档</a>
      <a href="/tags" class="nav-link{% if page.url contains 'tags' %} active{% endif %}">标签</a>
      <a href="/aise-series" class="nav-link{% if page.url contains 'aise' %} active{% endif %}">AISE系列</a>
      <a href="/agent-os-series" class="nav-link{% if page.url contains 'agent-os' %} active{% endif %}">🦞 Agent OS</a>
      <a href="/daily-signal" class="nav-link{% if page.url contains 'daily-signal' %} active{% endif %}">📡 Daily Signal</a>
      <a href="/about/" class="nav-link{% if page.url contains 'about' %} active{% endif %}">关于</a>
    </nav>
    
    <!-- 右侧：工具栏 -->
    <div class="nav-tools">
      <button class="theme-toggle" id="nav-theme-toggle" title="切换深色模式">🌙</button>
    </div>
  </div>
</header>

<!-- 导航栏样式 -->
<style>
  /* 固定导航栏 */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
  }
  
  /* 滚动时增加阴影 */
  .site-header.scrolled {
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
  }
  
  /* 深色模式适配 */
  [data-theme="dark"] .site-header {
    background: rgba(26, 26, 46, 0.95);
    border-bottom-color: rgba(255, 255, 255, 0.1);
  }
  
  [data-theme="dark"] .site-header.scrolled {
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
  }
  
  /* 布局优化 */
  .site-header .wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.75rem 1rem;
    position: relative;
  }
  
  /* 品牌区域 */
  .site-brand {
    text-decoration: none;
    color: #333;
    font-weight: 600;
    font-size: 1.25rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  
  [data-theme="dark"] .site-brand {
    color: #eaeaea;
  }
  
  /* 导航菜单 */
  .site-nav {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  
  .nav-link {
    text-decoration: none;
    color: #666;
    font-size: 0.95rem;
    padding: 0.5rem 0;
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  
  .nav-link:hover {
    color: #667eea;
  }
  
  /* 当前页面高亮 */
  .nav-link.active {
    color: #667eea;
    font-weight: 600;
    border-bottom-color: #667eea;
  }
  
  [data-theme="dark"] .nav-link {
    color: #b0b0b0;
  }
  
  [data-theme="dark"] .nav-link:hover,
  [data-theme="dark"] .nav-link.active {
    color: #7b8cde;
  }
  
  [data-theme="dark"] .nav-link.active {
    border-bottom-color: #7b8cde;
  }
  
  /* 工具栏 */
  .nav-tools {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }
  
  .theme-toggle {
    background: none;
    border: none;
    font-size: 1.25rem;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: 50%;
    transition: all 0.2s ease;
  }
  
  .theme-toggle:hover {
    background: rgba(102, 126, 234, 0.1);
  }
  
  /* 移动端菜单按钮 - 默认隐藏 */
  .mobile-menu-toggle {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    z-index: 1001;
  }
  
  .hamburger {
    display: block;
    width: 24px;
    height: 2px;
    background: #333;
    position: relative;
    transition: all 0.3s ease;
  }
  
  .hamburger::before,
  .hamburger::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 2px;
    background: #333;
    transition: all 0.3s ease;
  }
  
  .hamburger::before {
    top: -7px;
  }
  
  .hamburger::after {
    top: 7px;
  }
  
  /* 汉堡菜单动画 */
  .mobile-menu-toggle.active .hamburger {
    background: transparent;
  }
  
  .mobile-menu-toggle.active .hamburger::before {
    transform: rotate(45deg);
    top: 0;
  }
  
  .mobile-menu-toggle.active .hamburger::after {
    transform: rotate(-45deg);
    top: 0;
  }
  
  [data-theme="dark"] .hamburger,
  [data-theme="dark"] .hamburger::before,
  [data-theme="dark"] .hamburger::after {
    background: #eaeaea;
  }
  
  [data-theme="dark"] .mobile-menu-toggle.active .hamburger {
    background: transparent;
  }
  
  /* 响应式：小屏幕 */
  @media (max-width: 900px) {
    .mobile-menu-toggle {
      display: block;
      order: 2;
    }
    
    .site-brand {
      font-size: 1.1rem;
      order: 1;
    }
    
    .nav-tools {
      order: 3;
    }
    
    .site-nav {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.98);
      padding: 1rem;
      gap: 0;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 999;
    }
    
    [data-theme="dark"] .site-nav {
      background: rgba(26, 26, 46, 0.98);
      border-top-color: rgba(255, 255, 255, 0.1);
    }
    
    .site-nav.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    
    .nav-link {
      padding: 0.75rem 0;
      width: 100%;
      text-align: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    .nav-link:last-child {
      border-bottom: none;
    }
    
    .nav-link.active {
      border-bottom-color: transparent;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 4px;
    }
  }
</style>

<!-- 移动端菜单切换脚本 + 主题切换 -->
<script>
(function() {
  // 移动端菜单切换
  var menuToggle = document.getElementById('mobile-menu-toggle');
  var siteNav = document.getElementById('site-nav');
  
  if (menuToggle && siteNav) {
    menuToggle.addEventListener('click', function() {
      menuToggle.classList.toggle('active');
      siteNav.classList.toggle('active');
    });
    
    // 点击导航链接后关闭菜单
    var navLinks = siteNav.querySelectorAll('.nav-link');
    navLinks.forEach(function(link) {
      link.addEventListener('click', function() {
        menuToggle.classList.remove('active');
        siteNav.classList.remove('active');
      });
    });
  }
  
  // 滚动时添加阴影
  var header = document.querySelector('.site-header');
  if (header) {
    function updateHeader() {
      if (window.pageYOffset > 10) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    }
    
    window.addEventListener('scroll', updateHeader, { passive: true });
    updateHeader();
  }
  
  // 主题切换功能（独立实现，不依赖其他组件）
  var navToggle = document.getElementById('nav-theme-toggle');
  var html = document.documentElement;
  
  if (navToggle) {
    // 初始化：检查本地存储的主题
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      html.setAttribute('data-theme', savedTheme);
      navToggle.innerHTML = savedTheme === 'dark' ? '☀️' : '🌙';
      navToggle.title = savedTheme === 'dark' ? '切换浅色模式' : '切换深色模式';
    }
    
    // 点击切换主题
    navToggle.addEventListener('click', function() {
      var current = html.getAttribute('data-theme');
      var newTheme = current === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      navToggle.innerHTML = newTheme === 'dark' ? '☀️' : '🌙';
      navToggle.title = newTheme === 'dark' ? '切换浅色模式' : '切换深色模式';
      
      // 同步更新其他主题切换按钮（如果存在）
      var otherToggles = document.querySelectorAll('#dark-mode-toggle');
      otherToggles.forEach(function(toggle) {
        toggle.innerHTML = newTheme === 'dark' ? '☀️' : '🌙';
      });
    });
  }
})();
</script>
