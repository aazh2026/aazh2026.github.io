{% comment %}
  文章目录组件 - 自动生成并高亮当前阅读位置
  需要在 post 模板中包含此文件
{% endcomment %}

{% if page.toc != false %}
<nav class="toc-nav" id="toc-nav" aria-label="文章目录">
  <div class="toc-header">
    <span class="toc-title">📋 目录</span>
    <button class="toc-toggle" id="toc-toggle" title="展开/收起目录" aria-label="展开/收起目录">−</button>
  </div>
  <div class="toc-content" id="toc-content">
    <ul class="toc-list" id="toc-list">
      <!-- 由 JavaScript 动态生成 -->
    </ul>
  </div>
</nav>

<script>
(function() {
  function initTOC() {
    var content = document.querySelector('.post-content');
    var tocList = document.getElementById('toc-list');
    var tocNav = document.getElementById('toc-nav');
    var tocToggle = document.getElementById('toc-toggle');

    if (!content || !tocList) return;

    var headings = content.querySelectorAll('h2, h3, h4');
    if (headings.length === 0) {
      tocNav.style.display = 'none';
      return;
    }

    var tocHTML = '';
    headings.forEach(function(heading, index) {
      if (!heading.id) heading.id = 'section-' + index;
      var level = heading.tagName.toLowerCase() === 'h2' ? 1 :
                  heading.tagName.toLowerCase() === 'h3' ? 2 : 3;
      var text = heading.textContent.replace(/^\d+\.\s*/, '');
      tocHTML += '<li><a href="#' + heading.id + '" class="level-' + level + '" data-target="' + heading.id + '">' + text + '</a></li>';
    });
    tocList.innerHTML = tocHTML;

    if (tocToggle && tocNav) {
      tocToggle.addEventListener('click', function() {
        tocNav.classList.toggle('collapsed');
        tocToggle.textContent = tocNav.classList.contains('collapsed') ? '+' : '−';
      });
    }

    tocList.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.getElementById(this.getAttribute('data-target'));
        if (target) {
          var headerOffset = 80;
          var elementPosition = target.getBoundingClientRect().top;
          var offsetPosition = elementPosition + window.pageYOffset - headerOffset;
          window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
          history.pushState(null, null, '#' + this.getAttribute('data-target'));
        }
      });
    });

    function updateActiveHeading() {
      var scrollPos = window.pageYOffset + 100;
      for (var i = headings.length - 1; i >= 0; i--) {
        var heading = headings[i];
        if (scrollPos >= heading.offsetTop) {
          tocList.querySelectorAll('a').forEach(function(link) { link.classList.remove('active'); });
          var activeLink = tocList.querySelector('a[data-target="' + heading.id + '"]');
          if (activeLink) activeLink.classList.add('active');
          break;
        }
      }
    }
    window.addEventListener('scroll', updateActiveHeading, { passive: true });
    updateActiveHeading();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initTOC);
  } else {
    initTOC();
  }
})();
</script>
{% endif %}
