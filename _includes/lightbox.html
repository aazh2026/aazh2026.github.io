<!-- 图片点击放大 (Lightbox) -->
<div id="lightbox" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
     background: rgba(0,0,0,0.9); z-index: 10000; cursor: zoom-out;">
  <img id="lightbox-img" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
       max-width: 90%; max-height: 90%; object-fit: contain; cursor: default;">
  <button id="lightbox-close" style="position: absolute; top: 20px; right: 20px; background: none; 
     border: none; color: white; font-size: 30px; cursor: pointer;">&times;</button>
</div>

<script>
(function() {
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  var lightboxClose = document.getElementById('lightbox-close');
  
  document.querySelectorAll('.post-content img').forEach(function(img) {
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function(e) {
      e.preventDefault();
      lightboxImg.src = this.src;
      lightbox.style.display = 'block';
      document.body.style.overflow = 'hidden';
    });
  });
  
  function closeLightbox() {
    lightbox.style.display = 'none';
    document.body.style.overflow = '';
  }
  
  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) closeLightbox();
  });
  lightboxClose.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lightbox.style.display === 'block') closeLightbox();
  });
})();
</script>
