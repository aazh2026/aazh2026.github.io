<!-- 站内搜索 — PageFind-powered full-text search.
     PageFind indexes the built site post-build (`npx pagefind --site _site`)
     and ships its index as ~50KB chunked WASM-friendly files under /pagefind/.
     We use the modular ESM API to keep the custom search-input/dropdown UI. -->
<div class="site-search">
  <input type="search"
         id="search-input"
         role="searchbox"
         aria-label="搜索文章"
         placeholder="搜索文章 (全文)..."
         autocomplete="off"
         aria-controls="search-results"
         aria-expanded="false"
  >
  <div id="search-results" role="listbox" aria-label="搜索结果"></div>
</div>

<script type="module">
(async function() {
  const input = document.getElementById("search-input");
  const results = document.getElementById("search-results");
  if (!input || !results) return;

  // Lazy-load PageFind only when the user actually focuses the search input.
  // PageFind's first init pulls the WASM blob + a few index chunks (~100KB),
  // so deferring it saves a request on cold page loads.
  let pagefind = null;
  async function ensurePagefind() {
    if (pagefind) return pagefind;
    const mod = await import(/* @vite-ignore */ "/pagefind/pagefind.js");
    await mod.init();
    pagefind = mod;
    return pagefind;
  }

  let activeIdx = -1;
  let lastQuery = "";
  let pending = 0;

  function renderEmpty() {
    results.style.display = "none";
    results.innerHTML = "";
    input.setAttribute("aria-expanded", "false");
    activeIdx = -1;
  }

  async function search(q) {
    const pf = await ensurePagefind();
    if (!q || q.length < 2) {
      renderEmpty();
      return;
    }
    if (q === lastQuery) return;
    lastQuery = q;

    const token = ++pending;
    const response = await pf.search(q, { excerptLength: 25 });
    if (token !== pending) return; // a newer keystroke superseded us

    if (!response.results.length) {
      results.innerHTML = '<div class="empty">没有找到相关文章</div>';
      results.style.display = "block";
      input.setAttribute("aria-expanded", "true");
      activeIdx = -1;
      return;
    }

    const top = response.results.slice(0, 10);
    const html = await Promise.all(
      top.map(async (r, i) => {
        const data = await r.data();
        const title = data.meta && data.meta.title ? data.meta.title : data.url;
        return (
          '<a href="' + data.url + '" role="option" data-i="' + i + '">' +
            '<span class="title">' + title + '</span>' +
            '<span class="excerpt">' + data.excerpt + '</span>' +
          '</a>'
        );
      })
    );
    if (token !== pending) return;
    results.innerHTML = html.join("");
    results.style.display = "block";
    input.setAttribute("aria-expanded", "true");
    activeIdx = -1;
  }

  function moveActive(delta) {
    const items = results.querySelectorAll("a[role=option]");
    if (!items.length) return;
    activeIdx = (activeIdx + delta + items.length) % items.length;
    items.forEach((el, i) => {
      el.classList.toggle("active", i === activeIdx);
      if (i === activeIdx) el.scrollIntoView({ block: "nearest" });
    });
  }

  input.addEventListener("input", e => search(e.target.value.trim()));
  input.addEventListener("focus", () => {
    if (input.value.trim().length >= 2) search(input.value.trim());
  });
  input.addEventListener("keydown", e => {
    if (e.key === "ArrowDown") { e.preventDefault(); moveActive(1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); moveActive(-1); }
    else if (e.key === "Enter") {
      if (activeIdx >= 0) {
        const items = results.querySelectorAll("a[role=option]");
        const target = items[activeIdx];
        if (target) { e.preventDefault(); window.location.href = target.href; }
      }
    } else if (e.key === "Escape") {
      input.value = "";
      lastQuery = "";
      renderEmpty();
      input.blur();
    }
  });
  document.addEventListener("click", e => {
    if (!e.target.closest(".site-search")) renderEmpty();
  });
})();
</script>
