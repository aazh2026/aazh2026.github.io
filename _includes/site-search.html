<!-- 站内搜索 -->
<div class="site-search">
  <input type="text" 
         id="search-input" 
         placeholder="搜索文章..." 
         style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
  <div id="search-results" 
       style="display: none; margin-top: 0.5rem; max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px;">
  </div>
</div>

<script>
// 简单的客户端搜索
(function() {
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  
  // 文章索引（将在构建时生成）
  var posts = [
    {% for post in site.posts %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url | relative_url }}",
      date: "{{ post.date | date: '%Y-%m-%d' }}",
      tags: [{% for tag in post.tags %}"{{ tag }}"{% unless forloop.last %},{% endunless %}{% endfor %}]
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  
  searchInput.addEventListener('input', function(e) {
    var query = e.target.value.toLowerCase().trim();
    
    if (query.length < 2) {
      searchResults.style.display = 'none';
      return;
    }
    
    var results = posts.filter(function(post) {
      return post.title.toLowerCase().includes(query) ||
             post.tags.some(function(tag) { return tag.toLowerCase().includes(query); });
    }).slice(0, 10);
    
    if (results.length === 0) {
      searchResults.innerHTML = '<div style="padding: 1rem; color: #666;">没有找到相关文章</div>';
    } else {
      searchResults.innerHTML = results.map(function(post) {
        return '<a href="' + post.url + '" style="display: block; padding: 0.75rem; border-bottom: 1px solid #eee; text-decoration: none; color: #333;">' +
          '<div style="font-weight: 500;">' + post.title + '</div>' +
          '<div style="font-size: 0.85rem; color: #888; margin-top: 0.25rem;">' + post.date + '</div>' +
        '</a>';
      }).join('');
    }
    
    searchResults.style.display = 'block';
  });
  
  // 点击外部关闭搜索结果
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.site-search')) {
      searchResults.style.display = 'none';
    }
  });
})();
</script>
