<!-- 站内搜索 — 客户端 fuzzy search over all posts (full-text via /assets/search.json) -->
<div class="site-search">
  <input type="search"
         id="search-input"
         role="searchbox"
         aria-label="搜索文章"
         placeholder="搜索文章 (全文)..."
         autocomplete="off"
         aria-controls="search-results"
         aria-expanded="false"
  >
  <div id="search-results" role="listbox" aria-label="搜索结果"></div>
</div>

<script>
(function() {
  var input = document.getElementById('search-input');
  var results = document.getElementById('search-results');
  if (!input || !results) return;

  var posts = null;       // loaded lazily on first focus
  var activeIdx = -1;     // keyboard nav index

  function loadIndex(cb) {
    if (posts) return cb(posts);
    fetch('/assets/search.json', { credentials: 'same-origin' })
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(data) {
        posts = data.map(function(p) {
          p._hay = ((p.title || '') + ' ' +
                    (p.tags || []).join(' ') + ' ' +
                    (p.series || '') + ' ' +
                    (p.desc || '') + ' ' +
                    (p.body || '')).toLowerCase();
          return p;
        });
        cb(posts);
      })
      .catch(function() { posts = []; cb([]); });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  function highlight(s, q) {
    if (!q) return escapeHtml(s);
    var safe = escapeHtml(s);
    var safeQ = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<mark>$1</mark>');
  }

  function score(p, terms) {
    var t = (p.title || '').toLowerCase();
    var tag = (p.tags || []).join(' ').toLowerCase();
    var desc = (p.desc || '').toLowerCase();
    var s = 0;
    for (var i = 0; i < terms.length; i++) {
      var term = terms[i];
      if (!term) continue;
      if (t.indexOf(term) !== -1) s += 10;
      if (tag.indexOf(term) !== -1) s += 5;
      if (desc.indexOf(term) !== -1) s += 3;
      if (p._hay.indexOf(term) !== -1) s += 1;
    }
    return s;
  }

  function render(query) {
    if (!query || query.length < 2) {
      results.style.display = 'none';
      results.innerHTML = '';
      input.setAttribute('aria-expanded', 'false');
      activeIdx = -1;
      return;
    }
    loadIndex(function(posts) {
      var terms = query.toLowerCase().split(/\s+/).filter(Boolean);
      var hits = posts
        .map(function(p) { return { p: p, s: score(p, terms) }; })
        .filter(function(x) { return x.s > 0; })
        .sort(function(a, b) { return b.s - a.s; })
        .slice(0, 10);

      if (hits.length === 0) {
        results.innerHTML = '<div class="empty">没有找到相关文章</div>';
      } else {
        results.innerHTML = hits.map(function(x, i) {
          var p = x.p;
          return '<a href="' + p.url + '" role="option" data-i="' + i + '">' +
                   '<span class="title">' + highlight(p.title, query) + '</span>' +
                   '<span class="date">' + p.date + '</span>' +
                 '</a>';
        }).join('');
        activeIdx = -1;
      }
      results.style.display = 'block';
      input.setAttribute('aria-expanded', 'true');
    });
  }

  function moveActive(delta) {
    var items = results.querySelectorAll('a[role="option"]');
    if (items.length === 0) return;
    activeIdx = (activeIdx + delta + items.length) % items.length;
    items.forEach(function(el, i) {
      el.classList.toggle('active', i === activeIdx);
      if (i === activeIdx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  input.addEventListener('input', function(e) { render(e.target.value); });
  input.addEventListener('focus', function() { if (input.value.length >= 2) render(input.value); });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveActive(-1); }
    else if (e.key === 'Enter') {
      if (activeIdx >= 0) {
        var items = results.querySelectorAll('a[role="option"]');
        var target = items[activeIdx];
        if (target) { e.preventDefault(); window.location.href = target.href; }
      }
    } else if (e.key === 'Escape') {
      input.value = '';
      results.style.display = 'none';
      input.setAttribute('aria-expanded', 'false');
      input.blur();
    }
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.site-search')) {
      results.style.display = 'none';
      input.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
