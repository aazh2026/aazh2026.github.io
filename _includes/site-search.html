<!-- 站内搜索 — 客户端 fuzzy search over all posts -->
<div class="site-search">
  <input type="search"
         id="search-input"
         role="searchbox"
         aria-label="搜索文章"
         placeholder="搜索文章..."
         autocomplete="off"
  >
  <div id="search-results" role="listbox" aria-label="搜索结果"></div>
</div>

<script>
(function() {
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  if (!searchInput) return;

  // 文章索引（构建时由 Jekyll 生成）
  var posts = [
    {% for post in site.posts %}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      date: {{ post.date | date: '%Y-%m-%d' | jsonify }},
      tags: [{% for tag in post.tags %}{{ tag | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}],
      desc: {{ post.description | default: '' | strip_html | truncate: 100 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  // 预计算 lowercase 搜索字段
  posts.forEach(function(p) {
    p._search = (p.title + ' ' + p.tags.join(' ') + ' ' + p.desc).toLowerCase();
  });

  function render(query) {
    if (query.length < 2) {
      searchResults.style.display = 'none';
      searchResults.innerHTML = '';
      return;
    }
    var q = query.toLowerCase();
    var hits = posts.filter(function(p) { return p._search.indexOf(q) !== -1; }).slice(0, 10);
    if (hits.length === 0) {
      searchResults.innerHTML = '<div class="empty">没有找到相关文章</div>';
    } else {
      searchResults.innerHTML = hits.map(function(p) {
        return '<a href="' + p.url + '" role="option">' +
          '<span class="title">' + p.title + '</span>' +
          '<span class="date">' + p.date + '</span>' +
        '</a>';
      }).join('');
    }
    searchResults.style.display = 'block';
  }

  searchInput.addEventListener('input', function(e) { render(e.target.value); });
  searchInput.addEventListener('focus', function(e) {
    if (e.target.value.length >= 2) render(e.target.value);
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.site-search')) searchResults.style.display = 'none';
  });
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchResults.style.display = 'none';
      searchInput.blur();
    }
  });
})();
</script>
