<script>
// 404页面搜索功能
(function() {
  var searchInput = document.getElementById('search-404');
  var searchResults = document.getElementById('search-404-results');

  // 文章数据（简化版）
  var posts = [
    { title: "Context Engineering: 五层架构模型", url: "/posts/context-engineering/" },
    { title: "TDD vs Intent-Driven Development", url: "/tdd-vs-ai-first/" },
    { title: "Intent Complexity Metrics", url: "/intent-complexity-metrics/" },
    { title: "Executable PRD: 可执行规格说明", url: "/executable-prd/" },
    { title: "S-curve Adoption: 三层演化模型", url: "/ai-adoption-s-curve/" },
    { title: "大规模AI治理", url: "/large-scale-ai-governance/" },
    { title: "全链路可追溯性", url: "/traceability-auto-tracking/" },
    { title: "AI-Native软件工程宣言", url: "/aise-manifesto/" },
    { title: "AISE系列导航", url: "/aise-series/" },
    { title: "为什么你的代码正在变成负债？", url: "/knowledge-assetization/" },
    { title: "为什么代码评审正在死亡？", url: "/death-of-code-reviews/" }
  ];

  searchInput.addEventListener('input', function(e) {
    var query = e.target.value.toLowerCase().trim();

    if (query.length < 2) {
      searchResults.style.display = 'none';
      return;
    }

    var results = posts.filter(function(post) {
      return post.title.toLowerCase().includes(query);
    }).slice(0, 5);

    if (results.length === 0) {
      searchResults.innerHTML = '<div class="empty">没有找到相关文章</div>';
    } else {
      searchResults.innerHTML = results.map(function(post) {
        return '<a href="' + post.url + '">' + post.title + '</a>';
      }).join('');
    }

    searchResults.style.display = 'block';
  });

  // 点击外部关闭搜索结果
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-404')) {
      searchResults.style.display = 'none';
    }
  });
})();
</script>
