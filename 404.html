<script>
// 404页面搜索功能
(function() {
  var searchInput = document.getElementById('search-404');
  var searchResults = document.getElementById('search-404-results');
  
  // 文章数据（简化版）
  var posts = [
    { title: "Context Engineering: 五层架构模型", url: "/2026/03/08/context-engineering-importance.html" },
    { title: "TDD vs Intent-Driven Development", url: "/2026/03/08/tdd-vs-intent-driven.html" },
    { title: "Intent Complexity Metrics", url: "/2026/03/08/intent-complexity-metrics.html" },
    { title: "Executable PRD: 可执行规格说明", url: "/2026/03/08/executable-prd.html" },
    { title: "S-curve Adoption: 三层演化模型", url: "/2026/03/08/ai-adoption-s-curve.html" },
    { title: "大规模AI治理", url: "/2026/03/08/large-scale-ai-governance.html" },
    { title: "全链路可追溯性", url: "/2026/03/08/traceability-auto-tracking.html" },
    { title: "人-AI SLA: 协作契约框架", url: "/2026/03/08/human-ai-sla.html" },
    { title: "为什么你的代码正在变成负债？", url: "/2026/03/09/knowledge-assetization.html" },
    { title: "为什么代码评审正在死亡？", url: "/2026/03/09/death-of-code-reviews.html" },
    { title: "AI-Native软件工程宣言", url: "/aise-manifesto/" },
    { title: "AISE系列导航", url: "/aise-series/" }
  ];
  
  searchInput.addEventListener('input', function(e) {
    var query = e.target.value.toLowerCase().trim();
    
    if (query.length < 2) {
      searchResults.style.display = 'none';
      return;
    }
    
    var results = posts.filter(function(post) {
      return post.title.toLowerCase().includes(query);
    }).slice(0, 5);
    
    if (results.length === 0) {
      searchResults.innerHTML = '<div style="padding: 1rem; color: #666;">没有找到相关文章</div>';
    } else {
      searchResults.innerHTML = results.map(function(post) {
        return '<a href="' + post.url + '" style="display: block; padding: 0.75rem; border-bottom: 1px solid #eee; text-decoration: none; color: #333;">' +
          post.title +
        '</a>';
      }).join('');
    }
    
    searchResults.style.display = 'block';
  });
  
  // 点击外部关闭搜索结果
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#search-404')) {
      searchResults.style.display = 'none';
    }
  });
})();
</script>
