---
layout: default
---

<article class="post-wrap">
  
  <!-- 返回导航 -->
  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">← 返回首页</a>
  </nav>

  <!-- 文章头部 -->
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    
    <div class="post-meta">
      <time>{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.author %}
      <span class="separator">/</span>
      <span>{{ page.author }}</span>
      {% endif %}
    </div>

    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <a href="/tags/#{{ tag | slugify }}" class="tag">{{ tag }}</a>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <!-- 文章正文 -->
  <div class="post-content">
    {{ content }}
  </div>

  <!-- 文章底部 -->
  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}">← 查看更多文章</a>
  </footer>

</article>

<style>
  .post-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 48px 100px;
  }

  .post-nav {
    margin-bottom: 32px;
  }
  .post-nav a {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--g500);
    text-decoration: none;
  }
  .post-nav a:hover {
    color: var(--clay);
  }

  .post-header {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1.5px solid var(--g300);
  }

  .post-title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 20px;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--g500);
  }
  .post-meta .separator {
    color: var(--g300);
  }

  .post-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
  }
  .post-tags .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    background: var(--paper);
    border: 1.5px solid var(--g300);
    border-radius: 999px;
    color: var(--g700);
    text-decoration: none;
    transition: all 120ms;
  }
  .post-tags .tag:hover {
    border-color: var(--slate);
    color: var(--slate);
  }

  .post-footer {
    margin-top: 60px;
    padding-top: 32px;
    border-top: 1.5px solid var(--g300);
  }
  .post-footer a {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--g500);
    text-decoration: none;
  }
  .post-footer a:hover {
    color: var(--clay);
  }

  @media (max-width: 640px) {
    .post-wrap {
      padding: 48px 20px 60px;
    }
    .post-title {
      font-size: 26px;
    }
  }
</style>

<script>
(function() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
