---
layout: default
---
<article class="post" itemscope itemtype="http://schema.org/BlogPosting">

  <!-- 导航 -->
  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}" class="back-link">← 首页</a>
  </nav>

  <!-- 文章头部 -->
  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    
    <div class="post-meta">
      <time class="date dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%Y-%m-%d" }}
      </time>
      
      {% if page.author %}
      <span class="author p-author h-card" itemprop="author" itemscope itemtype="http://schema.org/Person">
        {{ page.author }}
      </span>
      {% endif %}
    </div>

    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <!-- 文章正文 -->
  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <!-- 页脚信息 -->
  <footer class="post-footer">
    <div class="post-actions">
      <span>如果这篇文章对你有用，可以分享给朋友。</span>
    </div>
    
    {% if page.series %}
    <div class="series-nav">
      <a href="{{ '/archive' | relative_url }}#series">← 查看更多文章</a>
    </div>
    {% endif %}
  </footer>

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>

<!-- 深色模式切换 -->
<button class="theme-toggle" aria-label="切换深色模式" onclick="toggleTheme()">
  🌙
</button>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// 初始化主题
(function() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
